###Events

tst.1.t:0 "Solar spies"
tst.1.d:0 "Today in the area of Tonalcintli, we noticed a group of spies from the solar thestrals"
tst.1.a:0 "Surround."
tst.1.b:0 "Release."

tst.2.t:0 "Tenochtitlan"
tst.2.d:0 "The news from Tenochtitlan is very bad because they are unhappy with our actions with their spy groups and in return they demand to give the city to Tonalcinelli or declare war on us"
tst.2.a:0 "Not to give."
tst.2.b:0 "To give."

tst.4.t:0 "defeat of Tenochtitlan"
 tst.4.d:0 "The news from Tenochtitlan is very bad, as our troops were unable to recapture it from the Neiguan army and some fled from the front and some were captured."
tst.4.a:0 "Accept defeat."
tst.4.b:0 "Protest."

tst.9.t:0 "Warning"
 tst.9.d:0 "Hello, player!\n\nThe country is under active development.\n\n At the moment, only 1 path is available, but at the moment most of the story events are missing.\n\nThe country is suitable for those who usually do not read the events during the passage.Have a good game!"
tst.9.a:0 "Good."

tst.10.t:0 "Anniversary"
 tst.10.d:0 "Our great regency has been triumphant and ruling for two hundred years, even though it is not an official state holiday, members of the ruling elite have a tradition of gathering on this day and getting drunk until they turn blue, and then there's the anniversary!\n\n— Uh-hey! Myron!.. Why don't you drink? You don't have to worry that someone will judge you! — one of the members of the entourage said drunkenly, already swaying from side to side from the amount of alcohol he had drunk.\n\n— I don't feel like drinking, you know, we have too many problems in our country to just ignore them by throwing the holidays! — The young regent said decisively. He was well aware of the existing problem of peasant uprisings, but in the process of this drunkenness, he began to notice another, no less serious: the irresponsible behavior of his entourage. But these are, for a moment, representatives of ancient clans and the spiritual elite!He sat with a thoughtful frown until the end of the event."
tst.10.a:0""Problems need to be solved.""