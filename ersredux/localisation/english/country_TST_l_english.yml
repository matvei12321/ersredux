 ###Characters
 
 TST_Miron:0 "Regent Miron I"
 TST_Miron_desc:0 "Miron was well-off from his very birth, indeed, what else could the life of a thestral born into a family of the Ayakachtli nobility be? The social status of his family allowed him to receive a good religious education by the standards of his relatives, which allowed him to become one of the members of the regency council at a more mature age. After the death of Ocelotos I, who was a close friend of his family, Myron was easily able to become the new head of the regency council, while at the same time taking on the problems left by the previous regent."
 
 TST_Sirius:0 "The Holy Regent Sirius"
 
