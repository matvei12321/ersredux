l_english:
 PGS_GATHERING_STORM_DESC:0 "The last civil war ended only a year ago, and a new one is already in the air. No Pegasus, because of confidence in his ideals, will ever agree to compromise, even if it threatens to destroy internal stability in the country. This is how the Pegasus tribes lived their entire history, shedding the blood of their relatives, and this is how steel was tempered in wars.This time, a military faction led by the brilliant Field Marshal Andreas Hurricane has seized power in the country, but the black and red banners of the oppressed dangerously hover on the horizon. But who knows, maybe this dubious period of peace will last for some time... or will the Pegasi drown forever in the flood of their own cruelty?"
 ERP_GATHERING_STORM_DESC:0 "Pandoria is a country of Earth ponies, which is governed by religious organizations, but this has not always been the case. Once upon a time, even before the Great Migration of Ponies, Pandoria had a prototype of a democratic state. But a full-fledged republic did not have time to be realized, as religion already played too big a role in the life of ponies, and the people found protection not in the foundations of a rule-of-law state, but in prayers and blessings.But times are changing, and Pandora itself must change and abandon theocracy in order to confidently step into the future. Moreover, the people themselves are waiting for changes..."
 UNC_GATHERING_STORM_DESC:0 "Unicornia is a wonderland. At least that's what foreigners who have never been here say about it.The Pyunikornian Platinum dynasty, unlike the Pegasus Neo dynasty, has not suffered for many generations and has never been in crisis, on the contrary: The kingdom has always been considered the center of stability not only for Equus, but for the whole world. And the current king, Ernest Platinum... She's coping. As with all his predecessors, society is happy.Not counting the incidents in Severyan, Philadelphia, Prance, and the intensified nationalist movement Union of National Purification."
 ers_CHN_GATHERING_STORM_DESC:0 "The lands of the Changelings are beset by strife. Queen Chrysalis, although she has formally crowned herself Supreme Queen, in reality has not even a small part of the power over other Hives.The era of wars between the hives ended only a few years ago, but... Is it really over?"
 
 

 ers_YAK_GATHERING_STORM_DESC:0 "Formally, the Yaks lived in isolation under the leadership of the prince, but in reality, each mini-state (khanate) went about its own business. When Nova Gryphonia, with its colonial ambitions, invaded these lands and inflicted a crushing defeat on the Yaks, these khanates began to blame their neighbors for everything, which eventually resulted in a bloody feud.When Nova Gryphonia attempted to capture the Yak lands for the second time, the Yak people, seeing a deadly threat, united and repelled the attack.But the drums of war have not subsided yet. The Yaks will have to... to resolve the issue of unification and banish the impudent catbirds forever."
 
 
 ROK_GATHERING_STORM_DESC:0 "WIP"
 ers_CRY_GATHERING_STORM_DESC:0 "WIP"
 PRA_GATHERING_STORM_DESC:0 "Prance was an independent state, holding a confident position as one of the most powerful unicorn countries. But due to a tragic combination of circumstances, Prance fell into disrepair. During the chaos and turmoil, the troops of Unicornia entered the territory of the kingdom in order to "protect the French people." After this intervention, Prantia practically lost its independence, as well as many lands.These events of many years ago have long been haunting the revanchists..."
 ers_TST_GATHERING_STORM_DESC:0 "Ayakachtli is the eponymous name of both the city and this land. Once upon a time, this was the heart of a single thestral state under the rule of the dynasty of §2MATUM§!, which, according to legend, descended from the goddess herself §2metztli§!. About 400 years ago, the kingdom began to decline, and 200 years later, the last queen died §2Lunaria§!. Having been killed in battle at an extremely young age, the queen did not have time to leave any descendants. The death of the queen led to the separation of the underdeveloped border territories from the kingdom. A Presidential council was urgently formed in Ayakachtli, the purpose of which was to find an heir to the deceased queen, but all applicants were recognized as heretics. In fact, §2Regent§! he himself assumed the status of monarch, although it was not advertised anywhere.\n\n A year ago, the regent §2Logarius I§! died after a prolonged illness, and was succeeded by the young and energetic §Rmiron I§!, who intended to reform and restore his homeland to its former greatness. However, his reign was not the best of times, peasant discontent is stronger than ever, and it was further aggravated by the refugees from the Northern Territory! thestrals from among the former officers, such as 0armedge Sage! and RMash Norushkin!."
 
 LYC_GATHERING_STORM_DESC:0 "Lyctida is the industrial hive of the Changeling Hegemony. Its purpose is to supply other hives with wood, steel and other resources, but it seems that Queen Aurantia has other plans.\n\nRecently, there has been an increase in the rate of militarization of the economy in Lyctida. What could it mean?"
 VRX_GATHERING_STORM_DESC:0 "WIP"
 SRF_GATHERING_STORM_DESC:0 "WIP"
 LOS_GATHERING_STORM_DESC:0 "Los Pegasus is a rogue state that broke away from the Pegasus Tribes during one of the many civil wars. The idea of creating a country with democracy in such conditions does not seem very reasonable, but surprisingly, it worked. While the Pegasus tribes were constantly recovering and falling back into protracted internal wars, the Republic of Los Pegasus continued to survive relatively quietly.But it seems to the new leader of the republic that the people of Los Pegasus, represented by the fleeing aristocrats, monarchists and some workers, have been too passive all this time. The issue of the tyrants of the metropolis must be resolved once and for all."
 STL_GATHERING_STORM_DESC:0 ""This is my last message to all the survivors. In the south of the northern communes lies an extremely totalitarian and almost esoteric society of the equa-n (THE ANTISOCIAL ELEMENT HAS BEEN ELIMINATED IN ACCORDANCE WITH THE POPULAR WILL OF THE ENLIGHTENER. A NEW TEXT IS BEING PREPARED.)\n"So, there must be something like this: "Communism! Communism! We have a lot of communism! Leave the fascist concentration camps of the false socialists! Come to us!" No, that won't do. Wait, is that stallion's thing recording everything else? How to disable it...""
 CLT_GATHERING_STORM_DESC:0 "Debauchery, drunkenness, greed, murder - and this is not a complete list of sins committed daily in Dodge City. There is no authority or any semblance of order here.To the west is the small town of Applusa. The situation is a little better in it: at least it can be considered suitable and relatively safe for life.\n\These lands are absolutely incompetent as a state and expansion is out of the question unless a real miracle happens."
 UNP_GATHERING_STORM_DESC:0 "WIP"
 NEI_GATHERING_STORM_DESC:0 "Among the jungles of the southeastern Equus, there are a great many Thestral tribes that have not been conquered by the progress of the North. Each of them strives to preserve its independence, but tension in the region is raised by such tribes as the militant Slave-owning Republic of Chilchotl, cruel Ravagers and the fanatical tribe of Neigua.nNeigua are thestrals who make the worship of the Sun absolute. While other tribes that believe in solarianism usually pursue a moderate policy, the Neigua seek to impose their faith on every thestral. And the fact that a Sun-worshipping tribe is adjacent to a moon-worshipping tribe doesn't make the situation any better... The priests of Neigua, under the guise of a "diplomatic mission," have so far tried to maintain a semblance of peace between the two tribes, but will this peace last long?"
 
 
 MNH_GATHERING_STORM_DESC:0 ""You can't create a state solely with money!" they said. Well. Flim and Flem (tm) have once again proved that you can do anything with the help of capital!"
 