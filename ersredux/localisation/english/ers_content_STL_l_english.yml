 #### EVENTS
 ers_stl.1.t:0 "Our Best Enlightener"
 ers_stl.1.d:0 "A traitor was discovered in Our City in the morning. He criticized Our Enlightener, claiming that "this mare picked up an entire city-state to her hooves and established a crazy cult in it." Our punitive detachments quickly and smoothly eliminated the violator of the order.\n\nThe next day, campaigns were held in Our homes to explain to Our residents the essence of such a phenomenon of the era as Starlight Glimmer. Our Enlightener does not control the masses, but only leads everyone on the right path and does not have any privileges from this. And Our society voluntarily follows her spirit of true equality, no one forces anyone to do anything. And She is the same pony of Our Society as we are, comrade!"
 ers_btl.1.a:0 "Let the younger generation take an example from the Enlightener!"
 
 ers_stl.2.t:0 "The Equalists Demand a Change of Our Ideology"
 ers_stl.2.d:0 ""
 ers_stl.2.a:0 "These madponies again..."

 ers_stl.3.t:0 "The Severyana Refuses"
 ers_stl.3.d:0 "Communes continue to live in a blinded vision of "equality". They refuse to accept that all ponies should live under the same banner of equalism.\n\nBut we know that the people in the communes really want freedom from the oppressors. But the party of tyrants, hiding behind the ideas of socialism, overshadowed their minds.\n\nOne day Our Enlightener will be able to convey the truth to them! She will launch the great equalism machine, and even after her death nothing will be able to stop it. "
 ers_stl.3.a:0 "Three cheers for our true vision of equality!"
 
 ers_stl.4.t:0 "Victory Over the Blood-red Threat"
 ers_stl.4.d:0 "The element of surprise together with the ardent devotion of soldiers create an indestructible force. Before they had time to come to their senses, their warehouses with equipment and outposts were destroyed, and our soldiers even received several combat trophies that will be transferred to the common possession of our community." 
 ers_stl.4.a:0 "One thing is clear: it is we who will decide the fate of the entire Severyana."

 ers_stl.8.t:0 "In Our City..."
 ers_stl.8.d:0 "Among all the inhabitants of Our Society, there were like those who experienced wild euphoria from being here, but some felt themselves... not too comfortable. They did not want to overthrow Starlight and were not against her rule, but still they were not comfortable. Young Wynn Volkerov was just like that.\n\n"Don't worry, you'll get used to it soon. Just start having fun with what you're doing! And besides, pay attention to everyone around you. The inhabitants of Our Town are mostly unicorns, and you are an Earth pony. And no one even thinks you are somehow "not like that"! For pony races, this is very unusual," said Wynn's friend, Carl Hayes casually.\n"Huh, I would like as much optimism as you have. The only good news lately is that I was miraculously able to get luciferium."\n"Luciferium? The kind of herb that can cure almost any diseases and wounds? Why do you need it?"\n"Well. My sister has something like a lung lesion. This luciferium is my last hope."\n"I understand... Okay, I went on shift, Our Duty calls. Good luck! But my advice to you: don't get caught with this grass in the eyes of the patrol. They will definitely take away such a thing."\n"Thank you! Good luck on the shift."\n"I think you need luck. Don't let your lil' sister down.""
 ers_stl.8.a:0 "It's so good to have understanding friends."
 
 ers_stl.9.t:0 "In Our City..."
 ers_stl.9.d:0 ""NO! WHAT ARE YOU DOING? GIVE IT BACK TO ME!"\n\n"Cell of Our society, on behalf of Our society, I thank you for finding such a rare medicinal herb and kindly handing it over to the hooves of Our Police. Glory to the Star-"\n\n" Freak! Without luciferium, my sister will die, you know? I deeply shat on your army, on your politics, I HAVE TO SAVE HER!"\n\n"Listen here. I don't want to shoot you, an inferior racial Earth-like freak, and I don't care about your daughter at all."\n\n"SHE'S MY SISTER!"\n\n"Calm down. Just pretend I never took away your luciferium. Pretend you've never had a sister. And I'll pretend I didn't see or hear you. And you and the rest of your relatives will not suffer. Got it?"\n\n"...got it."\n\n""Great! Glory to the Starlight the Enlightener!\n\n"Glory..."\n\nThe patrolpony slowly left to hand over the "sudden find" to the army department, tears welled up in Wynn's eyes."
 ers_stl.9.a:0 "He is so happy that he serves Our Society."
 
 ers_stl.10.t:0 "Smile! Smile! Smile!"
 ers_stl.10.d:0 "Earthpony Wynn hasn't been out of bed for days. Now he lived in the house alone. He buried his sister in a small grave on the hill next to his house. He \n\n"Co-o-o-mrade Volkerov, wa-ake up! It's already 7:00, it's time to go to the central square, for the day of Happiness!\n\n"Carl, leave me alone, please."\n\n"I... listen, I know about your sister. I'm sorry that even luciferium couldn't cope with the disease, but life didn't end there. Let's go. Starlight has issued a mandatory law that every Sunday is recognized as a Day of Happiness."\n\n"And what does it mean?"\n\n"Come on, you'll see for yourself!"\n\nWynn felt lousy. But he must be strong. For the sake of those who still remain and believe in him. His friend was smiling strangely as they walked to the square. Wide, in all teeth... Unnatural."\n\n"Carl, is everything okay? Should I call for help?"\n\n"Quickly, smile!"\n\n"What?"\n\n"Smile if you want to live!"\n\n"Wynn saw two patrolmen walking towards them. Like Carl, they had a smile on their faces from ear to ear."\n\n"Glory to Starlight the Enlightener!"\n\n"Glory to Starlight the Enlightener!" \n\pS with great difficulty, but Wynn pulled a smile. And so they reached the square itself. All the ponies were smiling, laughing, some were trying to march to the beat of street music.\n\nThe day of Happiness turned out to be the most hated day for Wynn. All the residents gathered in the square to hear how beautiful Starlight is, how terrible the communists in the south are. And the obligatory element of this day was a smile. So the citizens had to show their own... sincere emotions and all my joy for the achievements that Our society has achieved.It was just painful for Winn to keep smiling for several hours - and so he had to hold out until the very end of the day. Only an Enlightener knows what would have happened to him if he had stopped suppressing a smile for even a moment. Meanwhile, the muscles of the muzzle ached and ached, tears welled up in his eyes. "Look! This cell of Our Society is so happy about the news about the imminent execution of vagrants who stole food from barns! He's crying with happiness!"\n\nThe next day it hurt him to open his mouth."
 ers_stl.10.a:0 "Smile!"
 
 ers_stl.11.t:0 "Our culture"
 ers_stl.11.d:0 ""...Join in Our utopia, come out of the dark. Bound by equality, by the cutie mark!"\n\n-Well done, foals! This time you were able to sing the anthem of Our community in almost the same manner! This is exactly what we expect from you. At the next evening concert, you have to show how much you have learned to be like each other...\n\nWynn looked at this scene of the foal choir rehearsal with some dislike. He resigned himself and almost got used to the fact that every Sunday he has to smile from ear to ear from morning to night. However, he still didn't quite like the anthem of this country. And I don't think I'll ever like it. It seemed to him that in some places he was too aggressive, and some lines were inappropriate, but once a day he could survive it.\n\nInteresting. His sister had left this world only a few months ago, and he had already begun to forget it a little. Does the community really affect him that much? Although it is in any case better than starving and waiting for a strike from the west in the Red Northerners. His thoughts were interrupted by Karl playfully sneaking up from behind. \n\n- Comrade Wynn! Sign the petition!\n\n- "Comrade"? Aren't they referring to each other here as "the cell of Our society"?\n\n- Well done! You get it on the fly, even though you said you'd never get used to it, ha-ha!\n\nnHa-ha? What's so fucking funny about that?\n\n- In any case, sign the petition.\n\n- About?\n\n- About Our anthem. Although this is not a petition... I don't know what to call this document correctly, but the point is this. Starlight decided that it was necessary to change how often the anthem is played from megaphones on the street.\n\n- So. I'm already interested.\n\n- In general, we have developed a whole belluten with answer options for us. And whichever option gets the most votes will be put into action. Imagine, democracy!\n\n- I hope there is an option to "cancel playing the anthem".\n\n- Ah... haha... yes...\n\nWynn looked at the answer options."
 ers_stl.11.a:0 "I want the anthem to be played every day without a break!"
 ers_stl.11.b:0 "I want the anthem to be played 24 hours a day and 7 hours a week!"
 ers_stl.11.c:0 "I want the anthem to be played from 8 a.m. to 8 a.m.!"
 ers_stl.11.e:0 "I want the anthem to be played constantly!"