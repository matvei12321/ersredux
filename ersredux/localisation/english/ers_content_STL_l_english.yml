 STL_annex_STG:0 "Наша Красная Северяна"
 stl_has_more_5_influence:0 "Имеет §G6§! влияния или больше"
 stl_unification_tt:0 "Сделает все территории §RКрасной Северяны§!, §Yкоторыми мы владеем§!, §Gнациональными§!"
 
 STL_unification_cat:0 "Dreams of a Perfect Severyana"
 STL_unification_cat_desc:0 "Influence on the state [STG.getname] for its annexation: [stl_annex_points_colored_status]/§G6§!"
 stl_annex_points_red:0 "§R[?STL.stl_annex_stg_var]§!"
 stl_annex_points_yellow:0 "§Y[?STL.stl_annex_stg_var]§!"
 stl_annex_points_green:0 "§G[?STL.stl_annex_stg_var]§!"
 stl_state_debuff_i:0 "The influence of equalists I"
 stl_state_debuff_ii:0 "The influence of equalists II"
 stl_state_debuff_iii:0 "The influence of equalists III"
 stl_state_debuff_iv:0 "Influence of equalists IV"
 stl_state_debuff_v:0 "The influence of equalists V"
 STL_influence_zayatsk:0 "Send Spies to Zayatsk"
 STL_annex_zayatsk:0 "Reunite With the Residents of Zayatsk"
 STL_annex_zlatocvet:0 "Reunite With the Residents of Zlatotsvet"
 stl_zayatsk_5_flag:0 "Has §YThe influence of equalists V§! (debuffs reached -25.00%) in the region §YZayatsk§!"
 stl_zlatocvet_5_flag:0 "Has §YThe influence of equalists V§! (debuffs reached -25.00%) in the region §YZlatotsvet§!"
 STL_unify_with_communists_decision:0 "Finally Free"
 STL_economic_politics_cat:0 "Our War"
 STL_war_taxes:0 "Introduce a Military Tax"
 STL_war_taxes_desc:0 "War has come to our lands, and the cells of Our Society must sacrifice everything so that we can achieve victory. The war tax will last exactly one year. Even if we defeat our enemies before that time... the effect of the tax will still continue. Such a scheme was invented personally by the illuminator §!, so there are no (and cannot be) any disadvantages in it! Keep it up, Comrade Starlight!"
 STL_war_polozh:0 "Declare Martial Law"
 STL_war_polozh_desc:0 "War has come to our lands, and the cells of Our Society must zealously serve in the name of victory. Martial law will last exactly one year. Even if we defeat our enemies before that time... martial law will continue anyway. Such a scheme was invented personally by the illuminator!, so there are no (and cannot be) any disadvantages in it! Keep it up, Comrade Starlight!"


 ##### IDEAS
 STL_ers_equality:0 "True Equality"
 STL_ers_equality_desc:0 "The Northern communes disappointed us. Ponies need true equality, not the tyranny of the party! Our ideology is the only true one, and Our spirit is unshakable!\n\nGlory to Starlight the Enlightener!"
 idea_STL_buro:0 "Bureau of Political Control"
 idea_STL_buro_desc:0 "We'll just make sure you don't do anything. Meanwhile, try to inform us if you suspect your friends of illegal activities."
 idea_STL_peoners:0 "Nova Pioneeria"
 idea_STL_peoners_desc:0 "Purposeful and infinitely devoted to the idea of equalism - that's how real pioneers should be."
 idea_STL_purge:0 "Taking out the trash..."
 STL_courage:0 "Crush the Stallionists"
 STL_prpr:0 "Private Property is Our Property"
 STL_prpr_desc:0 "In the name of the common cause, of course."
 STL_isolatsia:0 "Our Impenetrable Line of Defense"
 STL_more_guns_idea:0 "Intensive Military Industry"
 STL_prepared_attack_idea:0 "We Are Ready to Rear the False Communists to Shreds"
 STL_prepared_attack_idea_desc:0 "For the betrayal of the Caramel Marx cause, for the torture of the people of the Northerners, for the death of millions of unfortunate people, for the spread of rotting capitalism... they will pay. And they will pay with blood."
 STL_no_more_lazyness:0 "Laziness is Punishable"
 STL_no_more_lazyness_desc:0 "What is laziness? It's a tumor. A country that is sick with a tumor, the wound will fall sooner or later. But not us, because the cells of Our society simply do not know what laziness is."
 STL_society_works_idea:0 "Community Service"
 STL_society_works_idea_desc:0 "All cells of Our society should participate in public works - to help in the construction of roads, repair and manufacture of equipment."
 STL_collective_mind:0 "Unity of Mind"
 STL_STG_threatened:0 "No Changes on the Northern Front
 
 
