l_english:


 ##### NATIONAL FOCUS
 #------main tree
 ers_STL_our_town:0 "Our Millennial City"
 ers_STL_our_town_desc:0 "Our society is that small utopia in which there are no selfish concepts of "I" or "Mine". And there is nothing "Party". There is only "Our personality", "Our" and "Public". And it will last for many generations."
 ers_STL_our_politics:0 "Our Order"
 ers_STL_our_politics_desc:0 "Not all ponies like to live in our happy society. But they will not be able to leave it, because they have already entered the true path of light and equality."
 ers_STL_buro:0 "Our Politburo"
 ers_STL_buro_desc:0 "More and more workers are flocking to our little utopia, looking for an ideal place for communist life. But not all of them expect that our society will be so perfect that they will not believe in its reality. They are looking for pitfalls where there are definitely none, and it is worth creating an authority that would monitor so that no one digs too deep."
 ers_STL_peoners:0 "Our Young Generation"
 ers_STL_peoners_desc:0 "The system of pioneers in the Red Severyana is a spit in the face of communism. It teaches foals from an early age that it is honorable to stand out with her superiority among others. A true pioneer should preach equalism from an early age, and also be ready to go shoulder to shoulder with his comrades."
 ers_STL_jobs:0 "§RNo Dissatisfied§!"
 ers_STL_jobs_desc:0 ""Don't you like our society? Well, I can take you to your like-minded people. In the next world, you will have a lot of time to change your mind.""
 ers_STL_consumer_goods:0 "Our Needs"
 ers_STL_consumer_goods_desc:0 "If we want to gut true communism and defeat the capitalists of Severyana, we must be sure that everypony gives everything to society that he can give. After all, it's not "his" property.\n\nIt is our property."
 ers_STL_war_spirit:0 "Our Fighting Spirit"
 ers_STL_war_spirit_desc:0 "It is obvious that corrupt novosocialism is our worst enemy. And our sacred mission is to destroy all those who perverted the original idea of communism!"
 ers_STL_patriotism:0 "The Magic of Patriotism"
 ers_STL_patriotism_desc:0 ""A soldier in Our army" is not a special status, because every inhabitant of our society equally shares the function of a worker, a soldier and any other profession. But recently a group of pure volunteers decided that they want to devote their lives to the protection of our state until their death. Perfectly! In our city, no one will be denied such an aspiration."
 ers_STL_STG_demands:0 "Our Requirements"
 ers_STL_STG_demands_desc:0 "The government in the city of Princessin can still be saved. We will send a message there, in which we will put forward demands for the complete annexation of the territory of Krasnaya Severyana and the transfer of armed and industrial forces to our City."
 ers_STL_raid:0 "Our First Steps to Liberation"
 ers_STL_raid_desc:0 "Although there are many times fewer of us, this does not make us weaker than the Red Severyana. We will use the element of surprise and show them that we should not be perceived as isolationist fanatics."

#------isolation tree
 ers_STL_positive_equalism:0 "Isolation Equalism"
 ers_STL_positive_equalism_desc:0 "Everything is clear as day: capitalist countries (that is, those that do not follow equalism) will fall in the next ten years and destroy themselves from within. We have already built a utopia and will be watching the decline of the age of capital."
 stl_no_way_further:0 "-----------------\n§R We will remain to defend the utopia of§! §POur City.§!"
 ers_STL_p_eq_bunkers:0 "Our Modern Defense"
 ers_STL_p_eq_bunkers_desc:0 "Let the envious enemy throw at us even with tanks, even with airplanes - he will not break into our little utopia."
 ers_STL_p_eq_factories:0 "Internal Industry Support"
 ers_STL_p_eq_factories_desc:0 "It is important to support our internal development. Although we have achieved harmony, we cannot lag behind our neighbors in development. No, we will not just keep up: we will surpass all the leading imperialist powers! Even a united Griffin will seem like an insect compared to Our City."
 ers_STL_p_eq_neutrality_policy:0 "Pacify Militarism"
 ers_STL_p_eq_neutrality_policy_desc:0 "The desire for war was relevant before we realized that we had achieved our goals. Now the war is seen not as a means of accomplishing a super-task, but as an event because of which our young officers may die. We will not allow war!"
 ers_STL_p_eq_neutrality_policy_2:0 "We Will not Retreat!"
 ers_STL_p_eq_neutrality_policy_2_desc:0 "The order "Not a step back, Our City is behind" is now used not just in emergency situations, now it is the motto of our armed forces!"
 ers_STL_p_eq_neutrality_policy_3:0 "The Army of Our Defenders"
 ers_STL_p_eq_neutrality_policy_3_desc:0 "Our military-defensive power is growing! Along with it, the needs of the army are growing. It wouldn't be a big sin if we ordered some ponies to serve in the army."

#------influence tree
 ers_STL_social_equalism:0 "Psycho-Equalism"
 ers_STL_social_equalism_desc:0 "We will be able to capture the Red Severyana without spilling a drop of blood. Increased propaganda, espionage and a few political crimes will break the spirit of Serov's gang, Pantsushenko, Dark Wing and all the false communists."
 can_influence_zlatocvet:0 "Can impose negative modifiers on §YZlatotsvet§!\n\n"
 can_influence_princessin:0 "Can impose negative modifiers on §YThe capital of the Red Severyana§!\n\n"
 can_influence_zayatsk:0 "Can impose negative modifiers on §YZayatsk§!\n\n"
 ers_STL_social_equalism_zayatsk:0 "Send Spies"
 ers_STL_social_equalism_zayatsk_desc:0 "We will start spying on the inhabitants of Severyana. We will find information about each of its inhabitants and use it so that the outcome of events turns out not in favor of the bloody regime."
 ers_STL_social_equalism_zlatocvet:0 "Wreak Havoc"
 ers_STL_social_equalism_zlatocvet_desc:0 "We will send some of our trained cells directly to the cities of Severyana, so that they spread rumors and the truth that they are actually manipulated by capitalism. In addition, some diversionists will openly discredit the Red Government. It may take a long time, but such a psychological attack will only benefit both sides - we will get more followers, and the Red Severyana will be freed from the shackles of fascism."
 ers_STL_social_equalism_princessin:0 "Rise Up, Residents of the Capital"
 ers_STL_social_equalism_princessin_desc:0 "It's time to start influencing the breeding ground of pseudo-communist contagion. And although the capital of the Red Severyana is teeming with fascist henchmen, this will not stop us."
 ers_STL_social_equalism_steal_equipment:0 "Our Diversions"
 ers_STL_social_equalism_steal_equipment_desc:0 "When words and espionage are not enough, we will resort to methods that others would call "terror", but in fact we will destroy warehouses with provisions and equipment, as well as houses of Severyana. Our spies and infiltrated cells will arrange everything as if it was arranged by the very "benevolent" government of the Red Severyana. This should infuriate the Severyanians and set them up to fight monstrous capitalism."
 ers_STL_social_equalism_send_spies:0 "Convince Them of Uur Rightness"
 ers_STL_social_equalism_send_spies_desc:0 "Someone will call this a "kidnapping". And this "someone" will be a dirty, greedy capitalist who does not understand the basics of a true communist society! We will send missionaries to the cities in order to take the citizens of the Severyana right out from under the noses of the capitalists."
 ers_STL_social_equalism_last_chance:0 "Last Argument"
 ers_STL_social_equalism_last_chance_desc:0 "We tried to reach the residents of Krasnaya Severyana. We tried to show them that their supposedly "socialist" way of life is a deception of dirty capitalists. But they refuse to listen to us. It means only one thing...\n\nCAPITALISTS USE MAGIC TO BRAINWASH SEVERYANIANS! WE ARE NOT AFFECTED BY IT, BECAUSE WE FOLLOW THE ONLY TRUE TEACHING - EQUALISM, AND ONLY IN OUR POWER TO FREE THE SEVERYANIANS FROM THIS CURSE.\nThe last ARGUMENT IS WAR!"

#------war tree
 ers_stl_military_equalism:0 "Military Equalism"
 ers_STL_military_equalism_desc:0 "Foals and adults, workers and diplomats: get ready for battle, because Red October is still far away... and we will cut a path to it with pure war."
 ers_STL_teach_em_war:0 "Our Military Exercises"
 ers_STL_teach_em_war_desc:0""For betraying the idea of Caramel Marx, for torturing the people of the Severyana, for the death of millions of unfortunate people, for the deliberate spread of capitalism, for the destruction of Our childhood... they will pay. And we know - they will pay with blood!"\n\n- From the propaganda speech of the novapionary foals"
 ers_STL_give_em_guns:0 "Rifle For Everyone"
 ers_STL_give_em_guns_desc:0 "Every foal and adult should know how to handle weapons. And we will teach them."
 ers_STL_conversion_to_military:0 "On the Rails of War"
 ers_STL_conversion_to_military_desc:0 "Our military factories should produce more equipment. Yes, it's that simple: let them give us more guns!"
 ers_STL_military_bandits_no:0 "Keep Them in Penal Battalions"
 ers_STL_military_bandits_no_desc:0 "We will not allow the dirty traitors who are kept in the Sovenok concentration camp to fight side by side with the true soldiers of Our society. But yes, we need pony resources catastrophically, so we will attract some camp prisoners to the service - but they will not play a dominant role in the new divisions. They will be kept in penal battalions under the vigilant supervision of equalist commissars."
 ers_STL_military_bandits_yes:0 "Sudden Surge of Patriotism"
 ers_STL_military_bandits_yes_desc:0 "Of course, we will not allow convicts in the Sovenok camp to serve in our army... but we desperately need pony resources. Jailers report that most of the prisoners of the "Owl" suddenly experienced a surge of patriotism and wants to go to the battlefield en masse. There are so many willing that there are not enough commissars for them - we will have to form full-fledged divisions from former prisoners."
 ers_STL_military_conscription:0 ""Have YOU Already Signed Up For the Army?""
 ers_STL_military_conscription_desc:0 "In this dark hour, we must tighten our belts and forget for a while about what our work was before. Now we are all taking on the role of a soldier.\n\n§R MARCH LEFT, TWO, THREE!\nMARCH LEFT, TWO, THREE!§!"
 can_control_conscription_flag:0 "Will allow you to change the §Ylaw on military conscription§!"
 stl_create_division_tt:0 "§PThe spirit of true equality§! will allow us to create a §Yfully equipped division!§!"
 stl_antiair_antitank:0 "Will research basic  §Yanti-air§! and §Yanti-tank§! technologies"
 ers_STL_military_attack_STG:0 "Big March-throw"
 ers_STL_military_attack_STG_desc:0 "That moment has come. The moment that everyone was waiting for - both the residents of Our society and the long-suffering residents of the Red Severyana. We will begin our sacred campaign against capitalism, which is brazenly covered with the ideas of communism. But Starlight knows the truth. And as an Enlightener, we will all devote ourselves to destroying the rotten infection in the south."


#------industry tree
 ers_STL_1_factory:0 "Our Industrialization"
 ers_STL_1_factory_desc:0 "In order to maintain the existence of our Utopia, we must develop our industrial capacities. And let the small size of our country not confuse anyone - our industry will become the greatest in the world..."
 ers_STL_2_factory:0 "Our Diligence"
 ers_STL_2_factory_desc:0 "It will not be possible to build too many industrial plants in Our City. Therefore, we must make every effort to use Our resources as efficiently as possible..."
 ers_STL_peoners_profiction:0 "Young and Purposeful"
 ers_STL_peoners_profiction_desc:0 "New Novapioneers are our future. And in order to feel all the joy of serving Starlight and Our Society from an early age, the foals will work in factories in the same conditions as adults. What a wonderful childhood!"
 ers_stl_military_factory:0 "Measured Hum"
 ers_STL_military_factory_desc:0 "The chains of bloody oppression have been broken,\n\nThe people have overthrown the enemy.\n\pI zakpiela dashing work:\n\The worker lived, and the factory came to life!"
 ers_STL_no_lazyness:0 "Comrade, Laziness is Ruinous!"
 ers_STL_no_lazyness_desc:0 "The worst enemy of every worker is laziness! Parasites who do not want to work passively destroy our Utopia, in which everyone must fulfill their duty in the name of universal happiness. From now on, anyone who shirks his duty in the workplace will be punished. This is the will of the people!"
 ers_STL_destroy_tsarist_culture:0 "Destroy the Culture of the Tsarists"
 ers_STL_destroy_tsarist_culture_desc:0 "Once these lands belonged to... the disgusting royal family. Monuments to these Romanovsky monsters stand here and there! And although the active cells of Our society tried to destroy these vile statues, no serious attempts were made to do so. Starlight will order to finally end this terrible legacy of the brutal Romanovsky regime."
 ers_stl_society_works:0 "Public Works"
 ers_STL_military_factory_left_1:0 "All Roads Lead to Our City"
 ers_STL_military_factory_right_1:0 "Preparation for Martial Law"
 can_do_woyennoye_polozhenie_tt:0 "Allows the introduction of §Ymartial law§! and §Ymilitary tax§! through the decisions."
 ers_STL_military_factory_left_2:0 "Purity of Mind on the Labor Front"
 ers_STL_military_factory_right_2:0 "Use the Labor of Traitors"
 ers_STL_bread_for_all:0 "Bread for Our People"
 
