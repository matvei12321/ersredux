 #### EVENTS
 chn.1.t:0 "Meeting with Helvia"
 chn.1.d:0 "- You know, Chrysalis, that I am against all these political intrigues aimed at sabotaging each other.The two Hive Queens organized a one-on-one meeting, and Queen Helvia is most likely the only one to whom Chrysalis even sympathizes, but it does not seem that these feelings were mutual.\n\n- Helvia, tell me this. Your predecessor actively supported my policy of uniting the nation and generally treated me positively. How do I earn respect from you?\n\Phelvia chuckled.\n\n- What's all this about? You can get rid of me and proclaim yourself the double queen of Vesalipolis and Ditrisium. But in that case, the people of my hive will turn against you.Perhaps it's worth giving Helvia time to get used to Chrysalis' power. Or declare yourself the queen of Vesalipolis and Ditrisium right now? Chrysalis didn't know. But as long as Helvia doesn't openly confront her, everything should be fine.\n\n- Helvia...\n\n- Yes?\n\n- ...Never mind, forget it."
 chn.1.a:0 ""At least someone besides me is doing something so that everything doesn't collapse.""
 
 chn.2.t:0 "Arginnis letter"
 chn.2.d:0 "Queen Chrysalis has decided to devote this week to trying to establish a relationship with Vrax. She sent dozens of letters to Arginnis, and received dozens of the same type of responses, in which there was not a drop of respect for the queen of Vesalipolis. It seems that Arginnis does not want to make minimal efforts to unite the Changeling peoples. Does this mean that she wants to sow discord in the Hegemony? Does this mean that she is a traitor, and all she cares about is the throne of the Supreme Queen?Chrysalis pushed these thoughts away. After all, they are both sensible rulers, and both understand that another war between Vesalipolis and Vrax will lead to nothing. And Arginnis has probably forgotten old grudges, although for some reason she doesn't want to get closer to Chrysalis. Strange."
 chn.2.a:0 " "I don't hate her, do I?""
 
 chn.3.t:0 "Meeting with Yaria"
 chn.3.d:0 "- Greetings, Chrysalis, Supreme Queen of Changelings...Pyaria, Queen of Sorifa, bowed before Chrysalis and uttered this phrase. But Chrysalis knew something was wrong. Her greeting was completely insincere, and her bow was completely optional. As always, Yaria was just trying to give the impression of being a very devoted queen.\n\n- Greetings, Yariya. How is the research progressing?\n\n is quite acceptable. But their progress could have been accelerated if they had sent us more... "experimental material." And, of course, we need highway markers.\n\n- Yes, of course. Starting next week, Vesalipolis will bring you terrorist groups. And we will also increase investments.\n\n- Fine.Chrysalis wanted to discuss something else with the queen of the science hive. But it seemed that their conversation was over, and it would be pointless to continue it.\n\nThat, at least Yaria agrees to cooperate for the benefit of the Hegemony."
 chn.3.a:0""Cooperation is a sign of friendship, right?""
 
 chn.4.t:0 "Where is Aurantia?"
 chn.4.d:0 "Atlantis has never been a welcoming place. Not for foreigners, not for changelings, not even for Chrysalis. She had not visited this hive for a long time, and hoped that the locals would pay attention to her, or at least whisper among themselves: "The Queen has arrived.".. But none of this happened. It seemed that all the changelings here worked like a quiet and well-coordinated mechanism. What do they care about some High Queen?\n\nThe purpose of her visit was different. She had hoped to meet with Aurantia and personally discuss why the military spending of Lyktis had increased tenfold in the past four years. Chrysalis was genuinely curious as to why Aurantia was training an army. Was she a traitor, too? Is she in cahoots with Arginnis? Or maybe...\n\n- What does "Aurantia cannot meet us" mean? Do you have any idea who you're telling, you damn drone? I, the Supreme Queen of the Changelings, Chrysalis! You must escort me to the Aurantia residence!\n\n- Unfortunately, this is not possible. Aurantia has left for the secret testing grounds and will arrive in at least a week.\n\n- Polygons? And what is she doing there?\n\n is classified information. We don't give out anything to civilians.\n\n To citizens? A CIVILIAN? Did that Lycthidian guard just treat Chrysalis as a common citizen?!! Chrysalis fumed with anger, but High Marshal Synovial, who accompanied her on this trip, calmed his monarch. The Queen decided to leave Lyktis. Maybe she'll try to contact Aurantia again. Or not."
 chn.4.a:0 ""I hope she gets better.""
 
 chn.5.t:0 "The army is overstepping its authority"
 chn.5.d:0 "Today, Chrysalis received a message that High Marshal Synovial has organized the arrest of several civilian changelings of Sorif. He justified this by saying that they planned to undermine the work of Sorif's Reich camps through the mass release of prisoners. Since, as he claims, there was no time to inform the Supreme Queen about this, he single-handedly decided to send an elite squad and detain the suspects. These changelings really turned out to be traitors sympathizing with the prisoners, who developed a whole plan to blow up the walls of the camps and neutralize the guards.\n\On the part of the law, this act is inexcusable, but the public believes that Synovial did the right thing."
 chn.5.a:0 "As long as it doesn't go beyond the reasonable..."
 
 chn.6.t:0 "High Marshal and General"
 chn.6.d:0 "It seems that a conflict has recently broken out between High Marshal Synovial and General Trimmel. No one can say for sure what happened between them, but now Synovial demands Trimmel's immediate resignation.pSynovial considers Trimmel "incompetent," "insubordinate," and "the ultimate scoundrel." Given that a High Marshal is a higher rank than a general, as well as the fact that Synovial has tremendous military experience, it is quite possible that the young Trimmel really does not live up to the Queen's expectations. He managed to establish himself as a very promising commander of tank brigades, but it seems that he managed to make enemies among his superiors..."
 chn.6.a:0"§Strimmel§! He will stay with us."
 chn.6.b:0 "§Dhive Marshal§! always right."
 
 chn.8.t:0 "When everything is assembled"
 chn.8.d:0 "The clock in the hall is 17:00, and, much to Chrysalis' surprise, she watched all four monarchs in front of her eyes. Who would have thought that an invitation to a royal dinner would bring them all together. However... The other queens didn't seem to share the same admiration.Chrysalis was surprised that Aurantia herself had appeared. The queen she hadn't seen in a long time.  She had lost a lot of weight, there were all the signs of lack of sleep under her eyes, and she was nervously biting the edges of her hoof, forgetting about manners. She didn't pay much attention to the other queens and only occasionally looked towards Chrysalis.\n\n- Well, dear monarchs, - Chrysalis began. - I hope that our relationship will become clearer this evening than before...\n\n- No need for mawkish speeches, Queen of Vesalipolis," Arginnis scolded sarcastically, examining the wine cup. "Your plan is quite good. But you forgot that we have relatives, and some even have heirs, so you've already lost.\n\n- What are you talking about, Arginnis?\n\n- This is obvious. Tonight was supposed to be our last night. All the food and drinks that you have prepared are obviously poisoned. You think you can poison everyone in one move and usurp our titles, but no. This is not going to happen!\n\Chrysalis was shocked. - Yes, how... How dare you accuse me of this?!\n\n- Blame? Ha. I'm not accusing, I KNOW what you're up to. In fact, I knew in advance, and I came to this hive just to make sure of it. There will be no more hooves of mine in Vesalipolis.The rest of the audience watched in silence, not wanting to fall under the hot hoof of the two dictators."
 chn.8.a:0 "This is absurd!"
 
 chn.9.t:0 "A political scandal"
 chn.9.d:0 "The two queens got into a heated argument... More precisely, not in an argument. It was more like a mutual insult. At one point, Arginnis threw a porcelain dish at Chrysalis, fortunately missing. After that, she left the dining room, ostentatiously slamming the doors. Chrysalis, who was sighing heavily after such a situation, finally sat down.\n\n- I hope my reputation has not been damaged in your eyes...Queen Ulyev continued her conversation with Aurantia, Yaria and Helvia in a more relaxed atmosphere. Although Yaria and Helvia behaved adequately, Aurantia only mumbled something unintelligible instead of answering the question of why Lyktida's military spending had increased almost tenfold. With the exception of the Arginnis incident (the queens pretended that nothing had happened), the evening passed quite calmly. The queens left Vesalipolis, and Chrysalis received information about the problems in other hives and the general attitude of the queens towards her policies.Later, Chrysalis was informed that the Queen of Vrax had left the territory of Vesalipolis, and in addition, recalled the embassy of Vrax.When Chrysalis returned to her quiet office, she thought about everything that had happened. And she decided..."
 chn.9.a:0 "I'll listen to them."
 chn.9.b:0 "I'm sick of their fooling around. I will crush my opposition, as it should be."
 chn.9.c:0 "I'm so tired of solving other people's problems..."
 
 
 chn.7.t:0 "State of emergency"
 chn.7.d:0 "According to the Wehrmacht, other Queens are already gathering troops near our borders. We are surrounded by potential enemies from all sides, and it seems that we are doomed. High Marshal Synovial demands the introduction of immediate martial law and the temporary transfer of the ruler's powers to him.He claims that only if we can defeat the traitors will he have full control over the situation."
 chn.7.a:0 "The Queen can handle it!"
 chn.7.b:0 "The High Marshal is seizing power... temporarily."


 chn.10.t:0 "New queen for the restless hive"
 chn.10.d:0 "WIP"
 chn.10.a:0 "WIP"
 
 chn.11.t:0 "Degree of authority of the Wehrmacht"
 chn.11.d:0 "It was decided that Chrysalis would use the Wehrmacht to intimidate rivals in the face of opposition queens. But how much is she willing to entrust the organization of political terror to High Marshal Synovial?"
 chn.11.a:0 "Let's not get arrogant."
 chn.11.b:0 "Moderation is the key to victory."
 chn.11.c:0 "Let him do whatever he sees fit."
 
 
 chn.12.t:0 "Vesalipolis is gathering troops at the border"
 chn.12.d:0 "It looks like Chrysalis is serious. We either obey it or we stand up to it alone."
 chn.12.a:0 "To arms!"
 chn.12.b:0 "Bad day for Arginnis."
 
