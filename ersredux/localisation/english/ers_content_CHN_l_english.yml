 chn.14.t:0 "This perfect day"
 chn.14.d:0 "Today, Chrysalis woke up especially refreshed, and for good reason. She dressed quickly, tidied up her tousled mane, and even put on sunglasses. Looking in the mirror, she thought about how impressive (and not at all "cute"!) she looks like this. When she left the bedroom and entered the halls of the hive, she expected to see a crowd that... However, there was no one there anyway. Only one guard patrolled his perimeter. Did Chrysalis wake up too wounded? No, it's already 9:12 on the clock, even on normal days at this time Vesalipolis is teeming with changelings. Chrysalis confidently approached the guard.\n\n- Tell me, where is everyone?\n\n- Is that it? And... it seems that the guards and staff are doing something in the courtyard. I don't know what.\n\n- Clearly... Do you happen to know what day it is?\n\n-Sorry, I have no idea. I need to keep patrolling. Hatzl Chrysalis!\n\What is it? No, that's not right! Who in their right mind could forget about this day? The guard said something about the courtyard. Chrysalis galloped over there.\n\n- Explain that-\n\The air defense yard had all the personnel, the guard and even the military command of Vesalipolis, since the yard had a very large area. Everyone was bustling, and in the center of the courtyard stood something huge, covered with a tarp. When everyone noticed Chrysalis, those gathered in unison, regardless of their status, raised their right front hoof up and shouted, "Hail Chrysalis!"\n\The queen was very confused and did not quite understand what was happening. But High Marshal Synovial came up to her, and everything became clear.\n\n- You look great, Queen. Well, it looks like we weren't in a hurry enough... A surprise for your birthday will now have a different effect, because not everything has been organized yet-\n\n- SO YOU HAVEN'T FORGOTTEN?Chrysalis did not take off her sunglasses, but it was clear from her voice and intonation that she was in Valhalla with happiness.\n\n- That's right, Queen! And I, as the High Marshal, have prepared a small gift for you...\n\n- Really, it wasn't worth it. Last time, I received a large-caliber Dora artillery from Vaspir... do not think that this can be surpassed.pSinovial grinned and ordered the tarp to be pulled off the huge structure. Seeing what was underneath, Chrysalis gasped and took off her glasses to see him better."
 chn.14.a:0 "Next"

 chn.15.t:0 "This perfect day"
 chn.15.d:0 "It was a tank... more precisely, something that represents a tank, but it's too big. Seven meters high and the devil knows how long, the huge titan towered menacingly over the changelings, as if over flies.\n\n- Is this FOR ME?\n\n- Exactly, Chrysalis. Unfortunately, this is just a mock-up, but I assure you, all the components are made of metal. This tank is only in the dreams of our engineers, because they have not yet invented an engine that can pull such a chassis...Chrysalis, like a small filly, examined and approached the giant. Going to the muzzle, she stood under it, looking up. It was as if stars shone in her eyes - the shadow from the muzzle completely covered her muzzle.\n- Wow... How big...\n- Exactly. 550 mm caliber-\n\n- HOW MUCH? It can't be... If he were a worker, he could demolish entire buildings!\n\nthat was all viewed from the side by Trimmel. He was a professional in the field of tanks, but his talent was still not appreciated enough. But he knew enough to be sure that this thing would never work. And no one would have been able to move it, no matter what the engines and tracks were. As if to spite her, Chrysalis caught Trimmel's annoyed gaze.\n\n- Hey, Trimble! Look what I have now!  She addressed him as if he hadn't been there before, which only infuriated Trimmel more. - And how can you be called a pioneer of tank doctrine? This must be the title of Synovial! Just look at what he gave me, haha!\n\n- And I will do better, my queen.  The trimmer sounded loud and everyone heard it, but now there was no turning back. And Chrysalis's interest was piqued.\n\n- Keep going.\n\n - What stands here is this... it won't work. And it's not your fault, it's Sinovil's fault, or whoever designed this monster... and I... yes. I can design a better tank! More armored, faster and more powerful! And most importantly, it is fully functional.\n\n- And what's next?  Synovial impudently intervened.\n\n- If I design and build such a tank... By your own means... In five, no... in THREE years! You, Synovial, will finally recognize my skill, and I will become a field marshal along with you.\n\n- If you fail, you will say goodbye to the miserable position of general that you have now.Watching the argument, Chrysalis chuckled, muttering, "What sycophants..." However, the two did not hear her.Grimmel and Synovial grinned and extended their hooves to each other, then looked at Chrysalis. She slowly approached them and, not without pleasure, approved the bet. It seemed that Chrysalis took it as something frivolous. Picking up a glass for the guests, she said: "Well, for me, for Pax Chrysalia... and may the best of you win!"\n\n During the day, other generals praised Trimmel for his courage, and the general himself basked in the rays of short-term glory. But in the evening, I began to dig into Trimmel's thoughts, thinking about what he had done."
 chn.15.a:0 ""I have three whole years, right?""