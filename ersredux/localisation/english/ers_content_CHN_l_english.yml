 CHN_light_ruling_diplomacy_for_the_final_time_desc:0 "WIP"
 CHN_light_ruling_ultimatun:0 "Ultimatum!"
 CHN_light_ruling_ultimatun_desc:0 "That's enough! Queen Arginnis, the vile warmonger, has been trying to prevent our unity for too long and has harmed us in every way. For these crimes, she must be abdicated!"
 CHN_queen_in_the_high_castle:0 "The Queen in the High Tower"
 CHN_queen_in_the_high_castle_desc:0 " According to the project, it will be the tallest building in the Changeling lands. The 400-meter-high pyramid-shaped tower of concrete and glass will be located in the center of Vesalipolis and will completely wrap around and hide the former beehive spire. It is supposed to symbolize the power and authority of the queen, as well as the entire Changeling nation. This building is the official residence of Queen Chrysalis, as well as the location of various government agencies and bureaucratic apparatus. Modern communications and structure will simplify management and improve the organization of the state."
 CHN_military_marches:0 "New Wehrmacht Headquarters"
 CHN_military_marches_desc:0 "WIP"
 CHN_ss_shtab:0 "Deploy assault troops"
 CHN_ss_shtab_desc:0 "In the past, the assault troops helped Chrysalis in military conflicts with Vrax and Olenia. Now they should be directed in a new direction...they are perfect for eliminating dissenters."
 
 CHN_heavy_ruling:0 "Hard Hoof"
 CHN_heavy_ruling_desc:0 "Insubordination from other hives is unacceptable. Chrysalis is the supreme queen, and everyone must obey her! Anyone who resists her will be branded a traitor to the nation."
 CHN_heavy_ruling_l_1:0 "Autocratic Empire"
 CHN_heavy_ruling_l_1_desc:0 "Queen Chrysalis is the best! She should be the sole totalitarian ruler. The Supreme Ruler of the Empire of all Changelings! Until other hives realize who is in charge here, we will have to apply a variety of sanctions measures against them."
 CHN_heavy_ruling_tt:0 "§All bonuses of this branch§! §G will stop§! if the irreversible happens.§!"
 CHN_heavy_ruling_r_1:0 "Militarization"
 CHN_heavy_ruling_r_1_desc:0 "Vesalipolis should be militarized and turned into a military hive. Because we need to prepare for an all-out war, the conquest of the continent for the sake of Chrysalis' ambitions... and, if necessary, to destroy the rebels."
 CHN_heavy_ruling_l_2:0 "Center of Hegemony"
 CHN_heavy_ruling_l_2_desc:0 "Just as Chrysalis must become the absolute leader, Vesalipolis must rise above the other hives. He must shine, even if he outshines others with his own light."
 CHN_heavy_ruling_centre_2:0 "Imperial Stormtroopers"
 CHN_heavy_ruling_centre_2_desc:0 "Wehrmacht soldiers should be used to suppress any dissent by integrating some of them into the military police. It also makes sense to send them to other hives to keep order, since the local queens are not up to the task."
 CHN_heavy_ruling_centre_2_tt:0 "SKrizalis will strengthen his iron grip for the sake of personal power.§!"
 CHN_heavy_ruling_r_2:0 "Aggressive UOBV"
 CHN_heavy_ruling_r_2_desc:0 "WIP"
 CHN_heavy_ruling_l_l_3:0 "Witch Hunt"
 CHN_heavy_ruling_l_l_3_desc:0 "WIP"
 CHN_heavy_ruling_l_3:0 "Claims to the title of all hives"
 CHN_heavy_ruling_l_3_desc:0 "Chrysalis must become the queen of all the hives that exist in the Hegemony. What's it? Do the other queens disagree with this? Chrysalis doesn't care about their opinions. The only opinion that matters is Chrysalis' opinion, and she fundamentally disagrees with the concept of independent hives."
 CHN_heavy_ruling_r_3:0 "Cult of Personality"
 CHN_heavy_ruling_r_3_desc:0 "Chrysalis is your Queen. You obey her. The military, politicians, workers, and even your neighbors obey her. Be like everyone else - be a good girl, and give your life to the Queen."
 CHN_heavy_ruling_r_r_3:0 "Cut out an oppositional tumor"
 CHN_heavy_ruling_r_r_3_desc:0 "Damn communists, damn utopians - they hide from us everywhere. And not only in Vesalipolis, but also in other hives - therefore, having reduced the opposition in Vesalipolis, there will be pockets of resistance in other places. But it doesn't matter, does it? Only a politically cleansed Vesalipolis will be able to unite the Hegemony."
 CHN_long_swords_night:0 "Night of the Long Swords"
 CHN_long_swords_night_desc:0 "The night is coming, during which the assault groups will celebrate terror and death. Cases of "mysterious" murders of those changelings who disagree with Chrysalis' rule will be discovered throughout the Hegemony. Fear and awe of our Queen's tyranny will engulf the entire Hegemony. This will be the largest cleansing campaign we have ever organized."
 CHN_vraks_coronation:0 "Coronation"
 CHN_vraks_coronation_desc:0 "We have already solved the Vrax problem. The damned traitors are crushed... All that remains is to declare Chrysalis the sole queen of Vesalipolis and Vrax."
 CHN_heavy_ruling_vraks_intervention:0 "Strike on separatists"
 CHN_heavy_ruling_vraks_intervention_desc:0 "That's enough! Queen Arginnis, the vile warmonger, has been trying to prevent our unity for too long and has harmed us in every way. For these crimes, she should be thrown into prison, and Vrax should be placed under the immediate occupation of Vesalipolis troops!"
 CHN_prepare_inner_invasion:0 "Following our nature"
 CHN_prepare_inner_invasion_desc:0 "For hundreds and thousands of years, various hives have been fighting for survival and dominance. In the course of this struggle, many hives died and were wiped off the face of the planet, until the strongest remained. In the modern era, someone tried to propose a peaceful union of all our states, but diplomatic unification is simply impossible. The war with each other is in the Changeling's blood.\pI Vesalipolis will prove that nothing will stand in his way."
 CHN_prepare_invasion_dytrysium:0 "Prepare the invasion of Ditrysium"
 CHN_prepare_invasion_dytrysium_desc:0 "WIP"
 CHN_prepare_invasion_lyctida:0 "Prepare the invasion of Lyctida"
 CHN_prepare_invasion_lyctida_desc:0 "WIP"
 CHN_prepare_invasion_soryth:0 "Prepare the Sorif invasion"
 CHN_prepare_invasion_soryth_desc:0 "WIP"
 CHN_prepare_invasion_volistad:0 "Prepare the invasion of Volistad"
 CHN_prepare_invasion_volistad_desc:0 "WIP"
 CHN_heavy_ruling_guards_on_hives:0 "The army keeps order"
 CHN_heavy_ruling_guards_on_hives_desc:0 "There are guerrillas and separatists operating in the conquered territories. To suppress them, we need to use everything in our army's arsenal - artillery, planes, tanks, flamethrowers - to terrorize and crush any armed resistance."
 CHN_heavy_ruling_fate_of_queens:0 "The Fate of Queens"
 CHN_heavy_ruling_fate_of_queens_desc:0 "WIP"
 CHN_heavy_ruling_destroy_hives_opposition:0 "Destruction of dissenters"
 CHN_heavy_ruling_destroy_hives_opposition_desc:0 "All hives are now under the direct control of the UOBV. Nothing stops our agency from conducting its activities in all changeling hives with impunity anymore. Wherever the traitors are hiding, they will definitely be found."
 CHN_changelingia:0 "Changeling"
 CHN_changelingia_desc:0 "The great state that will stretch from Sorif to Lyktis - Changeling, or Pax Vesalipolia, will be the country that unites the changelings of Equus. No more strife and internal wars - Chrysalis, our unifier, has managed to overcome many problems and proved herself worthy of the title of Supreme Queen. And our empire, our Pan-Changeling Reich, will stand and will stand for thousands of years."
 CHN_i_am_the_state:0 "I am the State"
 CHN_i_am_the_state_desc:0 "I, Chrysalis, Queen of Vesalipolis, Vrax, Lyktis, Ditrisium, Volistad, Sorifa, and Supreme Queen of the Changelings, announce that my reign will certainly lead the Changelings to victory. Follow me, my armies: I promise that I will give you the whole world."
 
 
 CHN_evolution_revolution:0 "Evolutionists are making a move"
 CHN_evolution_revolution_desc:0 "WIP"
 
 
