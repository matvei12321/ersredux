l_english:
 
 #### Characters
 CHN_chrysalis_vesalipolia:0 "Queen Chrysalis of Vesalipolis"
 CHN_dremes_desc:0 "Если вы хоть раз смотрели в экономические отчёты, вы могли заметить что перед пунктом "Новые шубы для королевы" есть пункт "Поддержка колоний в Зебрике". Вроде ничего необычного для империи, но у Весалиполиса вообще нет колоний на южном континенте. Хотя министерство, связанное с ними, есть. Кто-то говорит, что это олицетворение амбиций Гегемонии.\n\n"Рано или поздно, копыто чейнджлинга покорит последнее государство на Эквусе, а затем под натиском Пакс Чейнджлингии падут Зебрика и Грифония. Так почему бы не подготовиться заранее?"\n\nПропаганда активно продвигает подобные идеи, хотя большая часть руководства считает это пустой ресурсов. А УОБВ уже давно прозвало это министерство "Главным рассадником коррупции"."
 
 #### Focuses
 

 CHN_family_problems:0 "Problems of Hegemony"
 CHN_family_problems_desc:0 "The Changeling nation is not united and has never been. From generation to generation, the hive queens rule their lands separately from each other, and they do not care about the problems of others. Queen Chrysalis has set herself a clear goal - to unite the Changeling people by improving relations with other rulers."
 CHN_helvia:0 "Queen of the Sea"
 CHN_helvia_desc:0 "Although Helvia doesn't love Chrysalis as much as her predecessor, but in the end, she understands that a good relationship with Vesalipolis is more important than personal hostility. She is ready to cooperate with Chrysalis.\n\n At least that's what she thinks..."
 CHN_argynnis:0 "The Hatchet"
 CHN_argynnis_desc:0 "Arginnis believes that she deserves to be the Supreme Queen of the Hives and makes every effort to undermine the power of Chrysalis. In addition, during the last war, Arginnis' mother committed suicide to avoid facing Chrysalis' wrath, and her eldest daughter, Arginnis, blames the High Queen directly for this."
 CHN_yharia:0 "The Queen of Science"
 CHN_yharia_desc:0 "Yarya may seem friendly, but in reality she is cold, like her beehive Sorif. She hides it, but Chrysalis knows that Yaria treats her as an investor, not as a respected ruler."
 CHN_aurantia:0 "Intoxicated with Revenge"
 CHN_aurantia_desc:0 "For some unknown reason, Aurantia began to move away from the other Queens and became unpredictable. It's better to visit her and check if everything is okay."
 
 CHN_helvia_left:0 "Join forces"
 CHN_helvia_left_desc:0 "Helvia seems to be one of those who understands the importance of the unity of the Hegemony. You can rely on her and cooperate with her."
 CHN_helvia_right:0 "Equalize the fleet"
 CHN_helvia_right_desc:0 "Helvia's dream is to own a huge fleet. Funds should be allocated from our budget in order to sponsor the construction of ships in Ditrisium. After all, the sea power of Ditrisium is the sea power of the entire Hegemony."
 CHN_argynnis_left:0 "Joint Military Industry"
 CHN_argynnis_left_desc:0 "To strengthen the bond between the two hives, we need to be connected by a common military-industrial complex."
 CHN_argynnis_right:0 "General military exercises"
 CHN_argynnis_right_desc:0 "Arginnis is known as the "Queen of War", and perhaps Chrysalis will be able to improve relations with her if she organizes high-quality military exercises for the troops of Vesalipolis and Vrax. Even if Arginnis' opinion doesn't change, the exercises will benefit both hives."
 CHN_yharia_left:0 "Banish more criminals"
 CHN_yharia_left_desc:0 "Sorif is a good place in the far north to set up concentration camps where we can exile regime traitors."
 CHN_yharia_right:0 "Learn from their experience"
 CHN_yharia_right_desc:0 "Sorif is known for his scientific experiments on both non-living and living objects. Such experiments make it possible to make incredible breakthroughs in the field of medicine, because the body of changelings can be studied in real time. But, just as Sorif is not only engaged in research, Vesalipolis is also developing independently. We can conduct our own experiments and even make our own breakthroughs in science."
 CHN_aurantia_left:0 "Wood import"
 CHN_aurantia_left_desc:0 "Lyktida produces a number of resources for the Hegemony, including high-quality wood. Why don't we get it?"
 CHN_aurantia_right:0 "Maintain a foothold"
 CHN_aurantia_right_desc:0 "There are rumors that Aurantia is preparing an attack on Olenia. However, it sounds silly. Comparing the size and capacity of our hive and the Deer, it cannot be said that Lycthys has any chances. However, Chrysalis has been dreaming of walking tanks through the deer lands for two years... However, it is worth preparing in advance for such an event."
 CHN_invite_everyone:0 "Gather everyone"
 CHN_invite_everyone_desc:0 "In order to resolve the issue of the unity of the Hegemony once and for all, an important meeting should be organized, at which all the queens will be present. This is the only way other rulers will finally understand what is required of them."
 CHN_light_ruling:0 "Soft Rule"
 CHN_light_ruling_desc:0 "Chrysalis was unable to unite the changelings in a short time because her policies were too harsh. She should change her bias from dictatorial propaganda to political rapprochement of the Changeling peoples."
 CHN_light_ruling_tt:0 "§ Most of the bonuses of this branch§! It will be deleted if the irreversible happens."
