cld.12.t:0 "The last living being"
 cld.12.d:0 "When the storm started in your native Rouen, you did not flee the city like many others. With a group of brave unicorns, you stayed in the city, deciding that you can wait out the storm. It seemed to you that nothing abnormal is expected - after all, spring will surely come. You set up a small shelter with a campfire and supplies, wrapped yourself in fur gear, but your survival soon turned into a nightmare. The temperature was dropping dramatically every day.\n\There were seven of them. Elysia disappeared first. She got tired of enduring the frozen and hungry Tartarus and went into the storm without returning.\n\ The way Marcel died. Lying on a frozen bed, he confessed his love to Eliana, which greatly touched her. Then he fell asleep and never woke up again.\n\nThe weather was getting worse. One day you saw some spirits flying over the shelter. The Olgimsky brothers froze to death when one creature looked at them. Then the spirits moved on.\n\nThe fire has not been lit for a week. There are three left. All that kept you from dying was your spell. With it, you could keep the temperature in the shelter at least forty degrees below zero.\n\nThe collapse happened. A thick layer of snow has covered all of you. In this snowy grave, the two remaining unicorns drifted away from you, and most likely died at the same moment. But you were able to concentrate the heat on your body and stay under the snow. However, you can't move or even open your eyes in this position.You don't know how many days you spent in a snow grave. You don't think about how to escape anymore. You're thinking about how to survive. That spring is coming.\n\nThe snow above you is getting heavier by the minute. You want to fall asleep and not wake up.But some part of you still believes that spring will come one day."
 cld.12.a:0 "Fight!"
cld.12.b:0 "Stop breathing..."
