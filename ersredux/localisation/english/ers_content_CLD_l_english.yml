 cld.2.t:0 "The way to the castle"
cld.2.d:0 "She ran forward along the path. I ran until I reached the abyss. A chasm leading nowhere.When she turned around, she saw only pitch blackness. The filly saw that all this time she had been running along a path littered with the stiff bodies of living creatures. There was only a black abyss beyond the limits of this path.\n\pOna looked ahead. It's there! A place she's been rushing to get to all her life. The shining castle stood so far away at the other end of the damn abyss. But you can't get to him - the trail of bodies has ended.\n\n Then she had only one thought."
 cld.2.a:0 "This path is not enough... This is wrong! I should have reached the castle!"
cld.2.b:0 "It's not fair. This path is so narrow that only one person could run along it."
cld.2.c:0 "If this path is not enough, I will expand it."

cld.3.t:0 "Victim"
 cld.3.d:0 "The little filly appeared in front of Him. There were thousands of sounds and hundreds of voices, but there was no one among them who could interrupt their conversation.\n\n- I feel warmth in you. You are warmed and guided by your dream. Through hundreds of trials and hardships, I have become the one who decides the fate of beings. But that was my dream, and what is yours?\n\The girl looked at Him in fascination, and he looked at her. She soon found the strength to confess.\n\n- ...I want a kingdom of my own.Pon nodded his head slowly and understandingly.\n\n is a very bold dream. And the path to it will not be easy.\n\nThe girl remembered running away from everyone. From those who looked at her differently from the others.\n\n- And this path will lie through a multitude of hardships. Do you understand it?\n\n"My little crybaby. Why do you want to stand out from the rest so much?"\n\PKTHE girl heard someone's painfully familiar voice. But whose... She turned around, but there was no one there.\n\n- Yes... Now I understand.\n\n She won't be coming back. Never again.\n\n "I sacrifice," the filly muttered softly.\n\All the sounds stopped in the blink of an eye. And they will never sound again in the whole eternity. The north wind began to envelop her body.\n\n- I..."
cld.3.a:0 "§R"I sacrifice... myself!"§""

cld.4.t:0 "How much?"
 cld.4.d:0"- Time feels different in cold space, doesn't it?  He was still there, enveloping the pony in a frosty shroud.\n\n- I'm ready to give all the time I have left.\n\n- So you don't believe in fate? Things may go differently than you plan, and you may not even know about it.\n\n- My goal is everything that is important in the world.\n\n- Don't you care about the aspirations of others? How much are you willing to sacrifice on your way to the castle?\n\n- I'm not going to kill. I will be a wise ruler.\n\pOn moved the filly to another place. They ended up where she ended up physically. The entrance to the ice cave was already covered with snow, but there was a small hill next to the entrance. Under this hill was the already frozen body of a small blue unicorn with a snow-white mane.\n\n- You've already killed yourself along the way. If your determination has allowed you to do this, then what's to stop you from getting rid of others?\n\The bottle did not respond. When she reached the mound of snow, she dug up the body. His eyes were looking straight at her.\n\n- My name is #F!S9 Gjvv/. You're a #F too!S9 Gjvv/.?\n\n- Yes, I am the one who is called #F!S9 Gjvv/.. And you're coming with me.She laid the body on her back. Meanwhile, He looked at her in silence, and when the pony was ready to leave, He finally brought them back."
cld.4.a:0 "No one will die in my way."

