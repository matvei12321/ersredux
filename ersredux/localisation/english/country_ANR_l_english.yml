 ANR_ignore_illiteracy:0 "Ignore illiteracy"
 ANR_ignore_illiteracy_desc:0 "Illiterates will eventually die out."
 ANR_support_banditism:0 "Bandit solidarity"
 ANR_support_banditism_desc:0 "Anarchists... They are also a kind of bandits. So why should we consider robberies and raids as something bad? They shouldn't. These bandits are just continuing the revolution and defending their freedom. Conversely. Let's support the pogroms! Let's support the robberies! Let's support the revolution!"

 
