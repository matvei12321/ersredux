 ANR_civil_war_ignorance:0 "We no longer live in the state"
 ANR_civil_war_ignorance_desc:0 "If we lived in a state, we would be concerned about the need to rebuild it after the civil war. But why do extra work if there is no state? We're all free. You and me. Don't give a damn about the state. Don't give a damn about the welfare of others.  Get to the bottom of the authorities, spit on their moral standards, create anarchy and muddy them up. Create as much chaos and disorder as you can!"
 
