 anr.5.t:0 "Gulyai Pole"
 anr.5.d:0 "The civil war ended, and real anarchy began. Most of the militarists were slaughtered during the war, but there were still those who lived and even led the resistance. One of them was none other than Andreas Hurricane.\n\The pig. The bastard. Killer. Words cannot describe him, much less count the crimes that this scum has committed against the freedom of the people. And, fortunately, this vulture was finally caught. He defended the positions in Pegasopolis for a long time, until the garrison ran out of ammunition, and this cowardly rat and his soldiers surrendered.It is natural that only execution awaits him. And our bright father, our inspirer, Eleferiy, must execute him. For such a significant event, a small wooden platform was organized in Pegasopolis so that the pegasi could see what was happening from all sides. Bound by wings and hooves, Hurricane was dragged onto the podium by the anarchists. The crowd shouted and demanded to shoot him immediately, but everyone was waiting for Eleferia.When he finally arrived, a crowd of Pegasi had gathered at the square. There was no room left on the ground, and some viewers had to watch while hovering above the ground. With a sense of triumph, the revolutionary ascended to the former field marshal. The crowd cheered when they saw him.\n\To make his friends even more happy, Eleferius decided to pull off the execution spectacularly. Under the noise of the crowd, he took out his captured revolver, after which he quickly and roughly shoved the barrel into the prisoner's mouth. The impact shattered his two front teeth. Without a word, Eleferius cocked the trigger, and Hurricane's brains flew to the floor. The crowd cheered, throwing their caps up, but Eleferius fired again, this time into the air. So, there will be a fiery speech.\n\n- I wish that everything...\n\nthat he realized that he had not prepared a speech. So, we need to improvise! Ah, though... fuck it. The job has already been done. Eleferius took a bottle out of his shoulder bag and smashed it against Hurricane's lifeless body. The bottle broke, and he started drinking beer right out of it. The beer got into his mouth, but mostly spread over his face, which made him wet, as if he had been caught in the rain.The crowd took this gesture as a good ending for the execution, and a black and red flag was raised over the square. Looking at him, the drunken Eleferius thought..."
 anr.5.a:0 ""Dirty rag...""

 anr.6.t:0 "Not my concern!"
 anr.6.d:0 "Eleferiy, as a true anarchist revolutionary, denied any state, and, moreover, denied the concept of "home." Those who are free do not keep anything, and sooner or later the place that you call a small homeland will remind you of itself. That is why Eleferiy never mentioned where he was born or what he did before the revolution, and in principle no one knew. With his small retinue of bandits, he constantly roamed from town to town. The leaders of the revolution had no headquarters, only portable tents. Anyway, he despised those ponies who were attached to their homes more than anyone else.\n\n- Please do something!  The adult pegasus howled, pleading with Eleferia. - They burned down my family's fields, shot my husband because he resisted them, and took my son and daughter with them!\n\n- And?\n\n- I know who they are! They said they were the Ceraris squad! You can find them, right? They'll listen to you, won't they? Will you bring my children back?Eleferiy smoked a pipe with tobacco, which was mixed with many different intoxicating herbs. In a slightly amused tone, he said, "Take off your clothes."\n\n- H-what?..\n\n- Make my boys happy, filly. And then I'll think about it.\n\n- But... me...\n\n- Do you want to save your foals?\n\nThe mask looked around in confusion. Eleferia's comrades were already giggling among themselves, examining the victim. For the next few hours, Pony thought about only one thing: she was doing this for the sake of the children she loved...\n\Panarchists have already had enough of it. Humiliated and depressed, she returned to Eleferius.\n\n- Please.. Do something...\n\n- About what? Who are you, bitch? A. Stop. The one who's looking for kids?\n\Pona nodded in response.\n\n- So did the fuck come to me? Your children, save them yourself. And that's not my concern!\n\Our world has turned upside down. Screaming, she attacked the pegasus, but the bandits' strong hooves dragged her far from the camp and threw her into a puddle of mud.\n\n- Well, shall we shoot the insolent bastard?\n\n- That's how it is... There was no such order.\n\n- Why do I need these orders? Ah. And I made something up. Let me give you a silver coin. Eagle, let's shoot. Tails - do not shoot."
 anr.6.a:0 "And..."
 
 
 
 
 
 
 