 ### Events ###
 anr.1.t:0 "Happiness"
 anr.1.d:0 "Eleferios Politis, known among his supporters as the "Red Flame", drank incessantly. It seemed to him that he was fifty percent beer and vodka (which was partly true), and this morning started especially badly for him.Earlier, he managed to get drunk for a while, but in the end he still found himself in a noisy group of anarchist friends and got drunk to unconsciousness to group drunken songs.\n\nNo... he was sure that everything was under control."
 anr.1.a:0 "Bring another bottle!"

 anr.2.t:0 "Hot temper"
 anr.2.d:0 "The supporters of Eleferia were mostly greyhound stallions, but there was one exception. The Pegasus Agalis, nicknamed Pink Ears, was one of the confidants of the leader of the revolution. And despite his attitude towards the fillies, he respected her. What other anarchists should do.During an ordinary and calm day, an unpleasant-looking bandit approached Agalis. He was covered with unshaven stubble, in torn clothes and with a smell of alcohol from his mouth. And he appeared not alone, but with a whole group of the same tramps.\n\n- Hey, baby girl. Isn't that you, my dad's girlfriend?In response, Agalis only looked contemptuously at him and the whole squad. His friends were stupidly smiling and giggling.\n\n- Why are you silent, huh? Or are you more talkative in bed? Come on, we know why Dad's so worried about you. If you're courting him, why not have fun with us? He's alone, always busy. And there's a whole crowd of us, even for the whole night. Eh, guys?\n\The guards laughed approvingly in response.\n\n- Come on, pretty girl, don't break down. We won't hurt you. Even on the contrary, Bandit has already come too close to Agalis. His mouth smelled so strongly of a mixture of vodka and cheap tobacco that she thought she was going to be sick. But in the blink of an eye, the bandit fell to the ground and writhed in pain, clutching at his dignity, which Agalis kicked nobly after completing her combat move. Then she took out her trophy Mauser and shot him right in the eye.Other bandits, as if sobered up, understood everything without words and quickly retreated."
 anr.2.a:0 "Who else wants to taste the commissar's body?"

