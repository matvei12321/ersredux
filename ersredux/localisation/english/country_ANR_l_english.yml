 ### National Focuses ####

 ANR_we_are_at_fucking_war:0 "Anarchy is the mother of order!"
 ANR_we_are_at_fucking_war_desc:0 "CHAOS is THE FATHER OF ORDER!"
 ANR_partizans:0 "Activate the guerrillas"
 ANR_partizans_desc:0 "What is there to explain? He infiltrated the rear, found our people, and started hitting all the enemies. Our points in the depths of the enemy's rear are already eagerly awaiting the order to attack."
 anr_can_create_partizans_tt:0 " Will activate the partisan divisions! in the rear of the state §R[PGS.getname]§!"
 ANR_find_guns:0 "I wish I had a gun."
 ANR_find_guns_desc:0 "We have just discovered a shortage of firearms among our infantrymen. Drag everything you have onto the battlefield, take the rifles off the corpses! Everyone should have at least a broken bottle that can be used to kill an enemy soldier in close combat!"
 ANR_recover:0 "To establish an organization at the front"
 ANR_recover_desc:0 "What is the strength of our opponent? In the organization. Everyone knows and understands who is subordinate to whom, and in our ranks there is an outspoken commanding officer. Because...This is our strategy! Yes, that's right!"
 ANR_reorganize_people:0 "Get everyone to the front"
 ANR_reorganize_people_desc:0 "More than half of our Pegasi have not arrived at the field of slaughter! These assholes decided to celebrate our victory in advance. Stop having fun in a drunken frenzy in the rear, hurry to the front!"
 ANR_recover:0 "Half of Toklom's peasants don't know how to fire the rusty guns they have. But who said it could be a problem? Everything can be learned on the battlefield!"
 ANR_build_tachankas:0 "Invention of the pegasus genius"
 ANR_build_tachankas_desc:0" Cars are the most awesome equipment we have. And I don't care about its dubious practicality, because the attack on these bands looks just awesome!"
 ANR_even_more_soldiers:0 "To attract the rabble to our cause"
 ANR_even_more_soldiers_desc:0 "There's nothing to put on airs and choose more experienced soldiers from a bunch of drunks and other rabble. Freedom is for everyone, so let everyone fight for it!"
 anr_hire_bad_diviisons_tt:0 "Create many rapidly manned and untrained divisions! §Y(8)§!\n§Maybe quantity, not quality, will ensure our victory...§!"
 ANR_build_industry:0 "Work again..."
 ANR_build_industry_desc:0 "Our wave of revolution is destroying everything in its path. And our positions too. We can find outsiders so that they are responsible for the restoration of infarction... inst... In short, they need to repair roads and all houses."
 ANR_more_military:0 "Send gunsmiths to the rear"
 ANR_more_military_desc:0 "Perhaps the best way to obtain weapons is not to steal them from the corpses of enemies, but to produce them right in the rear. It sounds logical to some extent."
 ANR_again_not_ok:0 "Something's wrong again"
 ANR_again_not_ok_desc:0 "WIP"
 ANR_no_religion:0 "The gods won't stop the bullets"
 ANR_no_religion_desc:0 "WIP"
 ANR_motivation:0 "§RMOTIVATION§!"
 ANR_motivation_desc:0 "In order to motivate all the brothers to attack, we will focus our attacks on those cities and villages where vodka, beer, and all similar top anarchist values are stored and produced."
 ANR_decisions_focus:0 "Do we have a plan?"
 ANR_decisions_focus_desc:0 "Unlikely."
 anr_unlock_anarchy_civ_war_decisions_tt:0 "Unlocks the special £decision_icon_small § Solutions.§!"
 ANR_red_flag:0 "Raise red flags"
 ANR_red_flag_desc:0 "Those were the days of the uprising of the people\The slaves who had risen up furiously\And died by the hundreds from sabers and shooting\With a mighty shout: "Long live freedom!""
 ANR_civil_war_finale:0 "Black and red sky"
 ANR_civil_war_finale_desc:0 ""
 ANR_after_c_w_bottles:0 "A bottle for each..."
 ANR_after_c_w_bottles_desc:0 "Now that all beer warehouses and breweries are under our control, alcohol will flow into the people like a river. And even if we wanted to do something about it... We won't do that."
 ANR_after_c_w_mares:0 "... and a filly for each!"
 ANR_after_c_w_mares_desc:0 "Our guys did a very good job for the glory of the revolution. They have the right to relax and spend a few stormy nights with the captive Pegasuses."
 
 
 
 ANR_super_tachanka:0 "All four wheels"
 ANR_super_tachanka_desc:0" Cars with machine guns attached helped us a lot during the war. Now we can use them to carry out raids on peasant homes in order to forcibly impose a dictatorship of anarchy on everyone."
 ANR_anarchic_power:0 "Anarchic force"
 ANR_anarchic_power_desc:0 "WIP"
 ANR_trin_trava:0 "§R EVERYTHING ELSE IS TRASH-GRASS!§!"
 ANR_trin_trava_desc:0 "WIP"
 ANR_dont_touch_its_not_yours:0 "Don't touch it, it's not yours!"
 ANR_did_you_get_it_good:0 "Did you grab it? Good girl!"
 ANR_total_celebration:0 "Everyone's drinking!"
 ANR_total_celebration_desc:0 "It doesn't matter who fought for our revolution and who holed up in the rear. Anarchy is for everyone, and bread is for everyone too!"
 ANR_only_who_worked:0 "Those who have not worked do not eat"
 ANR_only_who_worked_desc:0 "If you didn't fight or risk your life, get out! Only veterans can have plenty of rest."
 ANR_apple:0 "Oh, bullseye"
 ANR_apple_desc:0 "WIP"
 ANR_stop_dengi:0 "Stop the money!"
 ANR_stop_dengi_desc:0 "No money should exist! Money is a tool used by the bourgeoisie to enslave us. But in fact, there is no value in money! And in our territory, only freedom is valued."
 ANR_stop_state:0 "Stop the state!"
 ANR_stop_state_desc:0 "For hundreds of years, the state has slowly enslaved the working people. We stopped it! For hundreds of years, the peasants have been fighting to destroy the oppressive system. So let's repeal all the laws of the old regime, abolish borders, and just be happy that each of us is now free to do whatever we want!"
 ANR_stop_politika:0 "Stop politics!"
 ANR_stop_politika_desc:0 "Politics is crap invented by the bourgeoisie. No one in the ranks of our resistance has ever been interested in politics, and did this prevent the glorious revolution? On the contrary, it rallied us against a terrible enemy. Politics must be destroyed."
 ANR_train_anarchy:0 "Steam locomotive 'Anarchy'"
 ANR_train_anarchy_desc:0 "WIP"
 ANR_more_guns:0 "Every man for himself"
 ANR_more_guns_desc:0 "You can't rely on your comrades forever. In other words, you can't ride on other people's backs! How to get a rifle and devour it is always ready, and how to die on the battlefield is so immediately indignant. Let everyone do what they want. In the end, only true revolutionaries will survive."
