TST_Masha_Norushkina_focus_1:0 "Labor camps"
TST_Masha_Norushkina_focus_1_desc:0 "From now on, there is no place for confessors, nobles and the like in our country, now there is a slightly different purpose for them..."

TST_Masha_Norushkina_focus_2:0 "Patriotic appeal"

TST_Masha_Norushkina_focus_3:0 " Plunder the caravans"
 TST_Masha_Norushkina_focus_3_desc:0 "Several trade routes pass through our territories, although they bring some benefits to our economy, at the same time, merchants brainwash our citizens with their stupid ideas."

