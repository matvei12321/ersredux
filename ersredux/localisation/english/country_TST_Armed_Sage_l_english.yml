 TST_Masha_Norushkina_focus_24:0 "Retribution Plan"
TST_Masha_Norushkina_focus_24_desc:0 "For many years, the monarchists of Unicorn treated us and our relatives with contempt, considering us savages. Many of our kind died in Unicorn slavery. It's time for retribution."

TST_Masha_Norushkina_focus_25:0 "Import of Northern technologies"
 
 TST_comm_ec_1:0 "The first step towards industrialization"

TST_comm_ec_2:0 "Foundry Facilities"

TST_comm_ec_3:0 "Alpha Project"
 TST_comm_ec_3_desc:0 "The development of infantry weapons of a new era. By creating a magic rifle to replace old powder rifles, we will not only modernize our army, but also make it the most modern in the world. Even if its production can be many times more expensive than any other standard weapons of other armies, our natural reserves of crystals should more than cover production."

TST_comm_ec_4:0 "Modern manufactories"
TST_comm_ec_4_tt:0 "§G The effect will change depending on the selected leader.§!"
TST_comm_ec_4_alt_tt:0 "§The uFocus can be skipped when taking the focus "Industrial Revolution"§!"
 
 TST_comm_ec_5:0 "Foreign specialists"
TST_comm_ec_5_desc:0 "You can't rely on yourself to make up for hundreds of years of progress. In order to develop, we need significant outside help, which is now not so difficult to obtain. As an island of stability in the raging sea of modern madness, we attract the widest contingent of professionals in our field. of all races, from all over the world. By cordially opening the doors to these specialists and providing them with work, we will gain knowledge that can accelerate our modernization for decades."

TST_comm_ec_6:0 "Radio engineering"
 
 TST_comm_ec_7:0 "Mass production of weapons"

TST_comm_ec_8:0 "Heavy artillery"
 
 TST_comm_ec_9:0 "Public food"
 
 TST_comm_ec_10:0 "Iron Eagles"
TST_comm_ec_10_desc:0 "The experience of past conflicts has proven one thing - air control gives an undeniable advantage to soldiers on the ground. The creation of light-engine aircraft will be the easiest solution for our industry. to increase our presence in the air as soon as possible."

TST_comm_ec_11:0 "Taming Nature"
 TST_comm_ec_11_desc:0 "Our nature is truly beautiful, but it is also inconvenient. The green jungle hinders our further development, it is difficult for us to lay new railway tracks, build new cities and connect existing ones. Whether we want to or not. but we will have to go to extreme measures and start fighting against nature for the sake of our revolution and our prosperity."
TST_comm_ec_11_tt:0 "§0 Solutions for raising the level of the regions will be open.§!\n\R NOTE:§! §0 A certain amount of infrastructure is required to upgrade for the appropriate level of the region.§!"
 
 TST_comm_ec_12:0 "Southeastern Scientific Community"
TST_comm_ec_12_desc:0 "Beings from the outside consider the population of these parts to be poor both intellectually and physically. But, of course, this is not the case, the land here is rich in talents no less than others. Having found the most sparkling nuggets among the local minds, we will unite them into a single organization, allowing us to calmly exchange ideas among ourselves and serve for the benefit of the common homeland. Real talents, regardless of their origin, will lead us into the future."

TST_comm_ec_13:0 "Southern University"
 TST_comm_ec_13_desc:0 "The time has come to take care of the fate of higher education. Having found enough resources, we can finally build a monstrous university in Ayakachtli, surpassing even the most ancient and prestigious institutions of Timbaktu and Yale. It is here that all beings will be able to receive the best available education in any field on an equal footing, and its countless departments will be able to train an army of specialists ready to serve our state."

TST_comm_ec_14:0 "Black Gold"

TST_comm_ec_15:0 "Additional equipment"
 
 TST_comm_ec_16:0 "New vehicles"
TST_comm_ec_16_tt:0 "§uFocus can be skipped when taking focus "Southern Automobile Industry"§!"

TST_comm_ec_17:0 "Experimental mechanization"
 
 TST_comm_ec_18:0 "Heavy and medium aircraft"
TST_comm_ec_18_desc:0 "The Zeppelin is a fairly simple and in some ways even primitive aircraft. However, the simplicity of their design makes them more preferable against the background of more complex multi-engine aircraft, which is crucial in our industry."

TST_comm_ec_19:0 "Advanced Electronics"
 TST_comm_ec_19_desc:0 "It is difficult to overestimate the importance of computing technologies. By devoting resources to the design and commissioning of more and more new electrical devices, we will not only be able to develop our basic "working tools" but also significantly improve the lives of both our soldiers and ordinary citizens alike."
 
