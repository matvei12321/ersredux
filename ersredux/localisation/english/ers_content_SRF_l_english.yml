 SRF_heavy_tank_destroyer_equipment_2_desc:0 "Elefant (Elephant) is a heavy anti—tank self-propelled gun based on the body of the cancelled Carpace Motors Tiger project and equipped with an 88 mm Panzerabwehrkanone 43/2 cannon."
 SRF_heavy_tank_destroyer_equipment_2_short:0 "Elefant"
