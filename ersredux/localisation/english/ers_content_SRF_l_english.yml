 #### EVENTS
 
 srf_border_conflict.1.t:0 "Captured bears"
 srf_border_conflict.1.d:0 "It is not surprising that our soldiers were able to break through the poorly fortified garrisons of the bear state. Now we have several captive bears at our disposal, which we can use in our Projects. Due to the exceptional size and endurance of the bears, if we translate them into the equivalent of a regular water resource, we can say that we have hit a real jackpot."
 srf_border_conflict.1.a:0 "Savages will never resist the march of progress."
 
 
 
 srf.1.t:0 "TOP SECRET"
 srf.1.d:0 "Report n-415, access level: A-1\n\The laboratories |ZENSIERT|,|ZENSIERT|, |ZENSIERT| and|ZENSIERT| announce the termination of research in the field of the |ZENSIERT| project codenamed "Gestaalt". Laboratory staff who disclose information about |ZENSIERT| will be eliminated regardless of their positions. Disclosure of information about |ZENSIERT| in the future will also be punished as a state crime of the highest degree of guilt.All the physical results of the project will be destroyed, the documentation and the theoretical basis will be stored in the General Archive of Sorif at the Eric access level. Comments from |ZENSIERT|, the lead scientist of the project, are attached.\n\n"I hoped that Gestalt would be our joint stunning achievement. But I was wrong. It's good that we realized the main thing in time: regardless of ambition, it is impossible to predict the exact consequences if the project is successful, and no one even wanted to think about its failure. We will continue our research in other areas in the name of progress and Sorif. Heil Yaria.""
 srf.1.a:0 "Heil Yaria!"
 
 srf.2.t:0 "Escape"
 srf.2.d:0 "The Pegasso-changeling border was crossed by something that looked like a changeling, but there was nothing of any intelligent being in it. According to reports, the creature's absurd speed of movement did not allow the Vrax border guards to detain it.\n\n- Farinx, you scoundrel!\n\n- What's the matter, Zigster?\n\n- Don't pretend that you don't know WHAT has left the borders of Hegemony. Everyone has long known what they were working on... who your department was working on. Yaria has invested so much in your project, how did you manage to violate the conditions of detention?!\n\n- We have notified other departments about the risks. The Albionen project was a biological, uh, DNA-changeling experiment...\n\n- Let's get to the point. What the hell have you done?\n\n- Whatever you say. Albionen had a tendency to fly into a rage if she wasn't fed enough. Actually, our department's security couldn't hold her back.\n\n- Did you have insufficient feeding volumes? I've seen reports on the transportation of tons of food products to you, and IT wasn't enough?!\n\n- It looks like yes. Or Albionen wanted to... another kind of food. Anyway, she's not going to hurt the Changelings anymore, is she?\n\n- You... Okay. But after that, your funding will definitely be cut soon.After a few days, a terrifying-looking creature miraculously found itself in a God-forsaken town south of Pandoria. Although, it's not as terrifying as it used to be... She met some pony along the way and adopted his image as much as possible for her."
 srf.2.a:0 "It's not our problem anymore."

 srf.3.t:0 "Into the icy lands"
 srf.3.d:0 "According to recent geological survey data, there should be a huge amount of valuable resources in this region for the hive. But to get these resources, it was necessary to take possession of these lands, and even the hardiest Changelings could not do such a task. Only local druids and pagan hermits miraculously survived in this region in the cold, which sometimes exceeded -45 degrees. To establish a fully-functioning settlement, it is necessary to install thermal generators that will ensure a minimum temperature comfortable for ordinary changeling.The generator was assembled in Sorif, and its transportation was to be handled by convicts under the supervision of guards. They had a long way to go from the cold Sorif to the lifeless icy lands. Along the way, several convicts died due to the cold. There was a risk that the transportation would end in failure.\n\n"Yours... I don't like this expedition. I don't like these settlers. I don't like this orgomic charcoal generator! HOW ARE WE GOING TO FLOOD IT AT ALL, WITH WHAT KIND OF COALS?"\n\nThat, Commissioner Gezer, you will have to deal with this yourself."
 srf.3.a:0 ""I don't like anything at all!"""

 srf.4.t:0 "TOP SECRET"
 srf.4.d:0 "By order of Her Majesty Queen Yaria, special departments RA-41 and LF-12 were created. The head of the RA-41 department is |ZENSIERT|, the head of the LF-12 department is |ZENSIERT|. Spreading information about these departments is tantamount to treason. Reports on the results of research in the above-mentioned departments should not be sent to the Imperial Chancellery of Vesalipolis or anywhere else. All developments are conducted at a secret level.\n\Pyle Yariya!"
 srf.4.a:0 "New magic tricks are unlocked."

 srf.5.t:0 "No problem"
 srf.5.d:0 "It's the middle of the night, there's no light in the office. The changeling, dressed in a scientific uniform, was looking for something in a pile of papers and some books. Over the years, her eyes had already developed and got used to such loads, and besides, small basic implants helped reduce the strain on her eyes. Another changeling walked past the office and entered the office without knocking.\n\n— And you dare to break into my office, Crixus?  Without looking up from her notes and instantly reading the texts of entire pages, Netida continued to search greedily for something.\n\n— Your office is never locked, there is no Lock. So, I assume that you are always waiting for visitors.  He came closer, picked up one sheet with various notes and, squinting, began to decipher his colleague's handwriting.\n\n— So... What exactly are you trying to find at night?Puchenaya put the last stack of papers aside and rolled away from the table on her wheelchair.\n\n— Initial developments of magic rifles. Daraxis is preparing to present them at a future conference, but he won't even say a word about the fact that it was my concept! My creation!\n\n— So what? After all, the end result is important. And what Daraxis will present tomorrow may not be an implementable model at all. Why worry so much?\n\n is a matter of principle. Once he's the first to talk about these developments, it doesn't matter who creates a working model - this savage Daraxis will be considered the inventor of the magic rifle, and all because he started talking about them first. I always write down the dates when the drawing is made. This should be my proof that I was the one who created the concept of the magic rifle...\n\n— Isn't that him by any chance?  The changeling handed her the piece of paper he had been holding in his hooves all the time.\n\n— Exactly... Him! Great. I would even say excellent. Now I need to put it there so that I can easily find it tomorrow...\n\Only now Netida felt that her eyes were starting to stick together after all. After exchanging a couple of news items with Netida for the day, Crixus left.It was only when she had already collapsed into bed that she had her last conscious thought before going to bed: "What was Crixus doing so late in the scientific laboratories?""
 srf.5.a:0 "Science can wait until tomorrow."

 srf.6.t:0 "Daraxis"
 srf.6.d:0 "Yariya did not find much pleasure in nature walks, especially in frosty and cold weather. But still, sometimes it's useful to go out, get some air and refresh your thoughts. At such times, she prefers not to start conversations, so that her optional stay in the cold does not last too long. She has long planned a route for her walk from the royal palace to a couple of notable places, such as the shore of Klyuch Lake. According to the plan, she usually did not meet anyone on this walking route, but this time she was unlucky enough to meet Daraxis, the leader of the Rod Scientific Society, who was admiring the views of Lake Klyuch. As soon as he saw Yaria, the changeling in a dark fur coat walked towards her.\n\n— Heil Yaria! — Raising a hoof, he said.\n\n— Do you need something? — The queen asked, not particularly interested. The wind suddenly increased, causing the fur on her fur coat to sway.\n\n— If I didn't need something, I wouldn't have waited for you here for so long. The weather is especially frosty today, not very pleasant, right?\n\n— Did you know that I would come here? — Yaria tried to hide her indignation. Daraxis was one of those who is an influential figure in Sorif, which is why Yaria couldn't just tell him off. Daraxis himself knew this and took full advantage of it. \n\n— That's right, Queen. And taking this opportunity to finally catch you, I would like to discuss a proposal in a one-on-one conversation.\n\n Just not conversations. By now, Yaria would have seen the outlines of her palace long ago, but now she's standing here with this makeover. The wind blew again.\n\n— I would like you to become a member of our scientific society... As far as I know, Netida has not made such an offer to you about her technocratic company. If I had lent you this within Sorif, then Nethida would have found out about it right away and caused another commotion with us... You see, she doesn't like it when she doesn't get into someone's favorites.\n\n— And why should I "officially support you"? "Just to get this over with and get back to the warm Hive."\n\n— That's a good question, Yariya. The "genus" has always relied on our pagan roots in a scientific sense... And we are sure that not blind technocracy, but the sensitive essence of the Soul can guide us on the right path. However, you already know that. I hope you'll think about my offer at your leisure.The frost became too unpleasant for Yaria, and she quickly turned towards Sorif, quickly saying goodbye to Daraxis. Of course, she'll think about it if she doesn't freeze off now."
 srf.6.a:0 "Glory to Rod, I suppose?"
 
 
 
 
