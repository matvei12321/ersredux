 ##### NATIONAL FOCUS
 #------start tree
 SRF_queen_focus:0 "Queen of Fury"
 SRF_queen_focus_desc:0 "Our Queen is the greatest of all. She is smart, intelligent, and even managed to prevent the possibility of conflict with Vesalipolis. You have to pay a price for everything...n\n It doesn't matter! Heil Yaria!"
 SRF_cancel_geshtalt:0 "The Gestalt Project §!"
 SRF_cancel_geshtalt_desc:0 "Gestalt was an interesting but doomed experiment. It's time for us to stop financing it and direct resources to more useful industries."
 SRF_scientists:0 "Society of Progress"
 SRF_scientists_desc:0 "WIP"
 SRF_esotericists:0 "Society of the Pagan Spirit"
 SRF_esotericists_desc:0 "WIP"
 SRF_this_is_vissenschtat:0 "Wissensstatt Yards"
 SRF_this_is_vissenschtat_desc:0 "WIP"
 
 
 
 SRF_science_research:0 "Scientific research"
 SRF_science_research_desc:0 ""Scientific esotericism"? We consider this and the word "absurd" to be one and the same thing. We honor various pagan traditions, but we should not go beyond that. Let the technocrats lead us into that future."
 SRF_pagan_research:0 "Passion for esotericism"
 SRF_pagan_research_desc:0 "Relatively recently, groups of pagan esotericists began to form in scientific departments. They offer bold and original theories based on ancient pagan practices. We should give scientific esotericism a chance to develop."
 SRF_lake:0 "Klyuch Lake"
 SRF_lake_desc:0 "The Key Lake is just a unique phenomenon. It radiates warmth, which allows changers to live comfortably on its shores, and it contains magical resources... And a lot of other cool stuff. It would be foolish not to continue exploiting this miracle of nature."
 SRF_colonisation_hooves:0 "Hire new scientists"
 SRF_colonisation_tt:0 "We will start colonizing the region §White Hooves§! for further resource extraction."
 SRF_colonisation_2_tt:0 "We will begin the colonization of the region §The Northern Sad Coast§! for further resource extraction."
 SRF_colonisation_hooves:0 "Colonization of snowy lands"
 SRF_colonisation_hooves_desc:0 "These lands are potentially rich in resources. But maybe there's nothing in them. Geological exploration in cold conditions was not feasible for a long time. But now that we have changelings that we don't feel sorry for, we'll at least make room for them in the Sorif. If we're lucky, we'll find veins of resources!"
 SRF_colonisation_bereg:0 "Colonization of the icy shores"
 SRF_colonisation_bereg_desc:0 "These shores are potentially rich in resources. But maybe there's nothing in them. Geological exploration in cold conditions was not feasible for a long time. But now that we have changelings that we don't feel sorry for, we'll at least make room for them in the Sorif. If we're lucky, we'll find resource cores!"
 SRF_heat_generators:0 "Installing thermal generators"
 SRF_heat_generators_desc:0 "Even the hardiest changelings will fall before the harsh climate of the North. But if we can overcome the harsh nature of the icy lands, huge reserves of iron, aluminum, diamonds, crystals and other things will fall into our hooves."
 SRF_new_research_commands:0 "Hire new scientists"
 SRF_new_research_commands_desc:0 "It is always important to have changelings with fresh perspectives on the research process. Our scientific institutions will receive new and promising specialists."
 SRF_hide_researches:0 "The value of thought"
 SRF_hide_researches_desc:0 "On what basis do we give all the results of our inquisitive minds to Vesalipolis? This is not justice. We know better who should use our technologies and how..."
 SRF_research:0 "Continue to study"
 SRF_research_desc:0 "Our Hive is most suitable for research and experimentation. Although sometimes Chrysalis treats Sorif not as an advanced center of Science, but as a prison for convicts. Well... More opportunities for experiments on living beings!"
 SRF_native_people:0 "Civil sector development"
 SRF_native_people_desc:0 "Our Hive is not limited to scientists and prisoners alone, no! We also have civilians, and every year, due to the expansion of prison camps, they feel less comfortable. We need to expand our Sorif. Heil to the citizens of Sorifa!"
 SRF_borning_program:0 "Birth programs"
 SRF_borning_program_desc:0 "Statistics show that fewer and fewer changeling families want to start a family in Sorif. This is influenced by the absurdly cold climate and the unattractiveness of the hive itself. But once you introduce maternity capital and other guarantees for mothers, everything should start to improve gradually."
 SRF_manpower:0 "Workforce from Vesalipolis"
 SRF_manpower_desc:0 "Another batch of political and other criminals from Vesalipolis arrives. It seems that the changelings there don't respect the law at all... But should we worry about that? Free labor is what really matters."
 SRF_manpower_workers:0 "To the factories!"
 SRF_manpower_workers_desc:0 "Work, the shift will never end!"
 SRF_workers_experiments:0 "Experiments with industry"
 SRF_workers_experiments_desc:0 "We can't boast of titanic factory complexes, but we can definitely improve what we have now."
 SRF_MANPOWER_SOLDERS:0 "To the army brigades!"
 SRF_manpower_soldiers_desc:0 "You and I are destined to serve the Vulture, to serve the Vulture, the hive of light in this darkness, when the gray sun rises...\Pyle Yaria!"
 SRF_army_experiments:0 "Experiments with war"
 SRF_army_experiments_desc:0 "Sorif is unlikely to be involved in any major war, because he is protected by a strong shield in the form of Vesalipolis. But in case of danger, we must be ready to meet the enemy with the latest weapons in our arsenal."
 srf_create_unit_tt:0 "Will create a single combat unit.!"
 SRF_expand_camps:0 "Expand camps for convicts"
 SRF_science_resources:0 "Technobury"
 SRF_science_resources_desc:0 "Our latest developments will allow us to extract iron, copper and other metals from almost unlimited depths."
 SRF_pagan_resources:0 "Spiritual connection with the earth and soil"
 SRF_pagan_resources_desc:0 "We will not harm our nature for the sake of resources. Instead, we can train the Reichschamans to learn how to convert organic matter into metals. This way we will reduce the burden on our extractive industry."
 SRF_form_secret_researches:0 "To form priority departments"
 chryssy_agro:0 "§UNemnogo§! will increase the suspicion of R! Chrysalis"
 SRF_science_army_cyber:0 "Steel implants for soldiers"
 srf_pagi_army:0 "Army of Psionics"

 
