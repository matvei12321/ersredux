 SRF_heavy_tank_destroyer_equipment_3_desc:0 "Jagdtiger was the heaviest armored fighting vehicle used operationally by the Changeling army. The vehicle has a 128mm PaK44L/55 main cannon and heavy frontal armor."
 SRF_heavy_tank_destroyer_equipment_3_short:0 "Jagdtiger"
 SRF_heavy_tank_equipment_1:0 "Grosstraktor"
 SRF_heavy_tank_equipment_1_desc:The 0" Grosstractor was a series of prototypes for the development of a heavier tank for the Changeling army. Until recently, the Changelings were limited in military development due to a lack of industrial potential, which changed dramatically when the Queen emphasized the rapid industrialization of the hives. At the initiative of General Vect himself, the Changeling army took up a secret program. Eventually, the development of original armored vehicles and artillery began under the code name "Tractor"."
 SRF_heavy_tank_equipment_1_short:0 "Grosstraktor"
 SRF_heavy_tank_equipment_2:0 "Panzerkampfwagen VI Tiger"
 SRF_heavy_tank_equipment_2_desc:The 0" Tiger I is a changeling heavy tank developed in 1012."
 SRF_heavy_tank_equipment_2_short:0 "Tiger"
 SRF_heavy_tank_equipment_3:0 "Panzerkampfwagen VI Ausf. B Tiger II"
 SRF_heavy_tank_equipment_3_desc:0 "Known informally as the Königtiger, which is often literally translated by Unicorn soldiers as the Royal Tiger, the tank followed the same concept as the Tiger I, but was designed to be even more formidable. The Tiger II combined the thick armor of the Tiger I with the sloping armor used on the Panther medium tank. The tank weighs almost seventy tons, is protected by armor from 100 to 180 mm thick and is armed with a long 8.8 cm Kampfwagenkanone 43L/71 cannon."
 SRF_heavy_tank_equipment_3_short:0 "Tiger II"
