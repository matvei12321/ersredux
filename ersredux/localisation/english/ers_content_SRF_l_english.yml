 SRF_light_tank_aa_equipment_3_short:0 "FlakPz 1602"
 SRF_light_tank_artillery_equipment_1:0 "Sturmpanzer I Bison"
 SRF_light_tank_artillery_equipment_1_desc:0 "Towed guns, which were equipped with artillery companies of motorized infantry regiments, often could not keep up with the tanks during the battle. The simplest solution to the problem was to install the gun on the tank chassis. In the case of the Bison ACS, it uses the chassis of the Panzer I."
 SRF_light_tank_artillery_equipment_1_short:0 "Bison"
 SRF_light_tank_artillery_equipment_2:0 "Sd. Kfz. 124 Wespe"
 SRF_light_tank_artillery_equipment_2_desc:0 "Sd.Kfz. 124 Wespe is a self-propelled artillery changeling vehicle based on a modified Panzer II chassis."
 SRF_light_tank_artillery_equipment_2_short:0 "Wespe"
 SRF_light_tank_artillery_equipment_3:0 "Waffentrager Leopard"
 SRF_light_tank_artillery_equipment_3_desc:0 "Waffentrager Leopard is a self—propelled artillery vehicle based on the VK1602 Leopard chassis."
 SRF_light_tank_artillery_equipment_3_short:0 "WT Leopard"
 SRF_light_tank_destroyer_equipment_1:0 "Panzerjaeger I"
 SRF_light_tank_destroyer_equipment_1_desc:0 "Panzerjaeger I was the first of the Changeling tank destroyers that the Changeling army saw. It is designed with a 47mm PaK anti-tank cannon on a modified Panzer I Ausf chassis."
 SRF_light_tank_destroyer_equipment_1_short:0 "Pzjager I"
 SRF_light_tank_destroyer_equipment_2:0 "7.5 cm PaK 40 auf Fahrgestell Marder II"
 SRF_light_tank_destroyer_equipment_2_desc:0 "Marder II is a tank destroyer based on the Panzer II chassis."
 SRF_light_tank_destroyer_equipment_2_short:0 "Marder II"
 SRF_light_tank_destroyer_equipment_3:0 "Sturmgeschutz auf Leopard"
 SRF_light_tank_destroyer_equipment_3_desc:0 "JagdLeopard was an anti-tank modification of the VK1602 Leopard light tank."
 SRF_light_tank_destroyer_equipment_3_short:0 "JagdLeopard"
 SRF_light_tank_equipment_1:0 "Panzerkampfwagen I"
 SRF_light_tank_equipment_1_desc:0 "The Panzer I is a light tank produced in the Changeling Lands in the 1000's. Designed in 1005 and put into production in 1006, it was originally intended as a training tank for training soldiers in the concept of tank warfare, however, due to the lack of more modern models, the PzKpfw I was widely used on the battlefield."
 SRF_light_tank_equipment_1_short:0 "Panzer I"
 SRF_light_tank_equipment_2:0 "Panzerkampfwagen II"
 SRF_light_tank_equipment_2_desc:0 "The Panzer II was originally developed as a temporary measure while larger and more advanced tanks were being developed, but it was widely used in combat due to the lack of more advanced models."
 SRF_light_tank_equipment_2_short:0 "Panzer II"
 SRF_light_tank_equipment_3:0 "VK 1602 Leopard"
 SRF_light_tank_equipment_3_desc:0"VK1602 Leopard is a machine originally created for reconnaissance and developed in 1012. It was planned to arm the vehicle with a 75 mm Kwk41 cannon, but it was replaced with a smaller 50 mm cannon. The VK 1602 had sloping frontal armor, influenced by the Panther tank. In order to increase the all-terrain properties, the VK1602 was adapted to a 350 mm wide track."
 SRF_light_tank_equipment_3_short:0 "VK1602 Leopard"
 SRF_medium_tank_aa_equipment_1:0 "Flakpanzer III Möbelwagen"
 SRF_medium_tank_aa_equipment_1_desc:0"ZSU, dubbed "Mebelwagen" ("van") due to the angular shape of the turret in the closed position, was built on a Pz III chassis and armed with a quadruple 20 mm cannon."
 SRF_medium_tank_aa_equipment_1_short:0 "Möbelwagen"
 SRF_medium_tank_aa_equipment_2:0 "Flakpanzer IV Ostwind"
 SRF_medium_tank_aa_equipment_2_desc:0 "Flakpanzer IV "Ostwind" ("east wind") is a self—propelled anti-aircraft gun mounted on the chassis of the Pz IV tank. It was created in 1012 to replace the earlier Flakpanzer III. The Pz IV turret was replaced with an open hexagonal turret with a 37 mm FlaK 43 cannon. A closed turret would have been preferable, but its use proved impossible due to heavy smoke during firing."
 SRF_medium_tank_aa_equipment_2_short:0 "Ostwind"
 SRF_medium_tank_aa_equipment_3:0 "Flakpanzer Coelian"
 SRF_medium_tank_aa_equipment_3_desc:0 "Flakpanzer Koelian is a self—propelled anti-aircraft gun developed by Arsenal Concern for the Changeling armed forces. She was armed with twin 37 mm FlaK 43 cannons mounted in a fully enclosed rotating turret on the hull of a medium Panther tank."
 SRF_medium_tank_aa_equipment_3_short:0 "Coelian"
 SRF_medium_tank_artillery_equipment_1:0 "Grille"
 SRF_medium_tank_artillery_equipment_1_desc:0 "Sd.Kfz.138/1 Grille — self-propelled guns, popular in tank divisions fighting on rough terrain."
 SRF_medium_tank_artillery_equipment_1_short:0 "Grille"
 SRF_medium_tank_artillery_equipment_2:0 "Hummel"
 SRF_medium_tank_artillery_equipment_2_desc:0 "Hummel — self-propelled guns based on the Geschützwagen III/IV chassis, armed with a 15-cm howitzer."
 SRF_medium_tank_artillery_equipment_2_short:0 "Hummel"
 SRF_medium_tank_artillery_equipment_3:0 "Grille 12"
 SRF_medium_tank_artillery_equipment_3_desc:0 "The concept of a self-propelled artillery cannon proposed by the Arsenal concern in the 1014th year, and developed on the basis of components Panther with a 12.8 cm howitzer cannon."
 SRF_medium_tank_artillery_equipment_3_short:0 "Grille 12"
 SRF_medium_tank_destroyer_equipment_1:0 "Sturmgeschütz III"
 SRF_medium_tank_destroyer_equipment_1_desc:0 "The Sturmgeschütz III assault cannon is the most common changeling anti—tank self-propelled gun. It was created on the chassis of the proven Pz III tank (originally as a mobile armored gun for infantry support). During the war, the StuG III was repeatedly upgraded and widely used as a tank destroyer."
 SRF_medium_tank_destroyer_equipment_1_short:0 "StuG III"
 SRF_medium_tank_destroyer_equipment_2:0 "Jagdpanzer IV"
 SRF_medium_tank_destroyer_equipment_2_desc:0 "Jagdpanzer IV served in anti-tank units of tank divisions. They were very successful tank destroyers, but were extremely ineffective when used as a substitute for tanks or assault guns."
 SRF_medium_tank_destroyer_equipment_2_short:0 "Stug IV"
 SRF_medium_tank_destroyer_equipment_3:0 "Jagdpanther"
 SRF_medium_tank_destroyer_equipment_3_desc:0 "Jagdpanther is a tank destroyer built on the Panther tank chassis. It entered service at the end of 1014. The Jagdpanther combines the very powerful 8.8cm PaK43 cannon from the Tiger II and the characteristic sloping armor and suspension of the Panther."
 SRF_medium_tank_destroyer_equipment_3_short:0 "Jagdpanther"
 SRF_medium_tank_equipment_1:0 "Panzerkampfwagen III"
 SRF_medium_tank_equipment_1_desc:0 "Back in 1005-6, General Vect envisioned two main types of tanks that would act as the most numerous weapons for future tank divisions. The first vehicle was to be armed with an anti—tank cannon and two machine guns, while the second, an auxiliary vehicle, was to be armed with a larger—caliber infantry cannon. The first of these eventually became known as the Panzerkampfwagen III, which was to become the standard tank for the three light companies of a tank battalion. The second became known as Panzerkampfwagen IV."
 SRF_medium_tank_equipment_1_short:0 "Panzer III"
 SRF_medium_tank_equipment_2:0 "Panzerkampfwagen IV"
 SRF_medium_tank_equipment_2_desc:0" was designed as a support tank, the Panzer IV was not intended for battles with armored vehicles — this function was performed by the Panzer III. However, as the flaws of the pre-war doctrine became more and more apparent, and in the face of the Stalingrad T-34, the Panzer IV soon assumed the role of an older brother. The Pz IV became the most mass-produced and used changeling tank, and its design formed the basis for many other combat vehicles."
 SRF_medium_tank_equipment_2_short:0 "Panzer IV"
 SRF_medium_tank_equipment_3:0 "Panzerkampfwagen V Panther"
 SRF_medium_tank_equipment_3_desc:0 "Panther is a standard medium tank developed by Changelings in the middle of 1014. It was supposed to be a response to the Stalingrad T-34 and gradually replace the obsolete Panzer III and Panzer IV. However, a complete replacement never occurred, and the Panther remained a support for the heavier Tiger tanks. The superior combination of firepower, mobility, and armor allowed the Panther to become the model for many late and post-war tank models, so that it is rightfully considered one of the best tanks of its time."
 SRF_medium_tank_equipment_3_short:0 "Panther"
 SRF_modern_tank_destroyer_equipment_1:0 "E-25 Standardpanzer"
SRF_modern_tank_destroyer_equipment_1_desc:0 "Improved version of Jagdpanzer IV, E-25, features high speed and armor."
 SRF_modern_tank_destroyer_equipment_1_short:0 "E-25"
 SRF_modern_tank_equipment_1:0 "E-50 Standardpanzer"
 SRF_modern_tank_equipment_1_short:0 "E-50"
 SRF_modern_tank_equipment_1_desc:The 0" Entwicklung series was a changeling experiment to create a modern main battle tank, the first draft of which was released in 1016. As part of this series, 6 standardized models of different weight categories were created. The E-50 Standardpanzer was developed as a medium tank to replace the Panther and Tiger models, as well as others based on them."
 SRF_motorized_equipment_1:0 "Open Blitz"
 SRF_super_heavy_tank_aa_equipment_1:0 "Flakpanzer VIII Maus"
 SRF_super_heavy_tank_aa_equipment_1_desc:0" Maus tank chassis, armed with a twin 88 mm anti-aircraft gun."
 SRF_super_heavy_tank_aa_equipment_1_short:0 "FlakMaus"
 SRF_super_heavy_tank_artillery_equipment_1:0 "Geschützwagen E-100 SPG"
 SRF_super_heavy_tank_artillery_equipment_1_desc:A 0" 210mm artillery piece mounted on the chassis of a super heavy tank can compete with some railway guns when it comes to firepower."
 SRF_super_heavy_tank_artillery_equipment_1_short:0 "GW E-100"
 SRF_super_heavy_tank_destroyer_equipment_1:0 "Sturmgeschütz auf Fahrgestell Maus"
 SRF_super_heavy_tank_destroyer_equipment_1_desc:0 "Maus tank chassis with a 150 mm cannon fixed in a fixed armored wheelhouse."
SRF_super_heavy_tank_destroyer_equipment_1_short:0 "Jagdmaus"
SRF_super_heavy_tank_equipment_1:0 "Panzerkampfwagen VIII Maus"
 SRF_super_heavy_tank_equipment_1_desc:0 "The Panzerkampfwagen VIII Maus was a super-heavy changeling tank built in late 1014. It was the heaviest armored fighting vehicle the world had ever seen. The Mouse was armed with a 128 mm KwK44L/55 cannon with a twin 75 mm auxiliary cannon. To the sadness of the changelings, she did not have time to participate in the battles."
 SRF_super_heavy_tank_equipment_1_short:0 "Maus"

