 SRF_colonisation_cat:0 "Sorif - Colonization of the icy lands"
 SRF_colonisation_cat_desc:0 "Thermal generator cells are running: [?SRF.colonisation_generator_var]/§Y3§!\Quantity of food in warehouses: §Y[?SRF.colonisation_food_var]§!, max. - §Y500§!.\n§Settlers' Arrogance§!: [?SRF.colonisation_hope_var]%\n§Settlers' Complacency§!: [?SRF.colonisation_hope_var]%"

 SRF_special_projects_cat:0 "§1special§! §Simplify the rules!"
 SRF_special_projects_cat_desc:0 "Wissenshta demands that science constantly move forward with a relentless step. If someone dies in the name of science, so be it.\n\n£manpower_icon §Upresource§! for §1Projects§!: [?ROOT.srf_special_ponypower]"
 SRF_collect_pony_resources:0 "Scientific harvest"
 SRF_collect_pony_resources_desc:0 "Prisoners, changelings who are politically objectionable to our regime... They may all end up at our complete disposal one day, and there's nothing they can do about it."
 SRF_raid_bears_for_ponypower:0 "Aggressive collection of energy resources"
 SRF_research_speed_for_ponypower:0 "Experiments on living beings"
 SRF_research_speed_for_ponypower_desc:0 "Classics of the scientific genre. Nothing spectacular, but conducting experiments on still-living specimens allows you to achieve great results.Well, don't worry about their fate and what will happen to them. They're just numbers."
 
 
