wig_politcs.1.t:0 "Elections to Parliament" # elections, elections, candidates...
wig_politcs.1.d:0 "By decree of King Garibald III, elections were scheduled for February 19, 1007. And now, the ballots have been counted, the winners..."

wig_politcs.1.a:0 "...VSDRP!"
wig_politcs.1.b:0 "...NFVK!"
wig_politcs.1.c:0 "...CPV!"

wig_politcs.2.t:0 "Candidates for Victory"
wig_politcs.2.d:0 "VSDRP - Vingbardian Social Democratic Labor Party defends workers' rights and social equality. The party arose under the influence of Aquileian republicanism and the ideas of Caramel Marx.\n\nNFVC - National Front for the Restoration of Carthia supports the ideals of protectionist economic doctrine and Carthinian nationalism - the idea of ​​​​reviving the greatness of the Carthinian Empire.\n\nCPV - Constitutionalist Party of Vingbardia for the creation of a constitutional monarchy in Vingbardia and supporters of the market economy."

wig_politcs.2.a:0 "Hmm, interesting"

wig_politcs.3.t:0 "Report"
wig_politcs.3.d:0 "[GetDateText]\n\nURGENT\n\nTO THE CHIEF OF POLICE OF THE CITY OF FALCOR\n\nDuring a trip to Falcor, an attempt was made on the life of Archduke Grover the Seventh by an unknown person. An investigation is already underway. According to preliminary data, the terrorist was a member of the "Young Falcor" group. A curfew has been imposed in the city."

wig_politcs.3.a:0 "That's all I needed..."

wig_politcs.4.t:0 "In Falcor"
wig_politcs.4.d:0 ""Here you go, Bart," said the griffin, handing his friend an old rifle.\n\n Bart took it and said, "Theo, are we going soon?"\n\n"We'll go as soon as the radio gives the signal." Theo replied.\n\nA few minutes later, the radio broadcast, "Rise up, Falcorians! It's time to gain freedom from these damned Wingbardian invaders! GLORY TO FALCOR!"\n\n"Did you hear that? Let's go. It's time to get to work." Theo said, after which he and Bart stood up and walked out of the house with their weapons."

wig_politcs.4.a:0 ""The time has come for our freedom.""

