    #characters
    WIG_alexander_kemerskai_char:0 "Marshal Kemerskai"
    WIG_alexander_kemerskai_char_desc:0 "Alexander Kemerskai II, a Herzlander by origin and culture, was born in 964 in his family's estate near Vinnin. Being the youngest son, he did not count on an inheritance, and therefore, like any other young nobleman in his position, he rushed from one occupation to another. Fate led him to the artillery troops, in which he quickly made a career. In 1005, he was appointed to the post of military governor of Wingbardia, which he occupies to this day."
    
