    WIG_gun_konkurs_desc:0 "The army needs a new, modern rifle."

    WIG_vnii_tochmag:0 "VNII TochMag"
    WIG_vnii_tochmag_desc:0 "The Wingbardian Research Institute of Precision Magicraft is one of the national treasures of Wingbardia and is currently in a deplorable state. This needs to be sorted out."

    WIG_new_arty:0 "Update artillery"
    WIG_new_arty_desc:0 "Artillery is the god of war, and if our god is lame, then he is useless."

