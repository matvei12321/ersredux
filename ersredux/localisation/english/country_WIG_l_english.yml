    WIG_gotta_go_fast_desc:0 "Speed ​​is of the essence on the battlefield these days."

    WIG_regia_marina_shared:0 "Regia Marina"
    WIG_regia_marina_shared_desc:0 "Yes, I don't use a navy, how did you know?"

    WIG_king_speaks_shared:0 "The King's Speech"
    WIG_king_speaks_shared_desc:0 "Today, King Garibald Talonuel of Wingbardia will give a radio address on the future of the country."

    WIG_call_parliament:0 "Re-elections to Parliament"
    WIG_call_parliament_desc:0 "The King announced re-elections to Parliament in his recent speech."

    WIG_commies_path:0 "VSDRP"

    WIG_commies_path_desc:0 "The VSDRP won the elections."

    WIG_trudovoi_kodeks:0 "Трудовой кодекс"
    WIG_trudovoi_kodeks_desc:0 "В Вингбардии до сих пор нет четкого трудового законодательства, однако у многих стран Грифонии оно уже давно есть. Чем мы хуже?"
    
    WIG_grifsomol:0 "Молодёжные организации"
    WIG_grifsomol_desc:0 "Создание молодёжных организаций поможет нам воспитать верных патриотов своей страны, своей великой родины - Вингбардии."
    
    WIG_increase_industrial:0 "Пятилетний план"
    WIG_increase_industrial_desc:0 "С помощью пятилетнего плана развития экономики мы улучшим нестабильное экономическое положение Вингбардии."
    
    WIG_workers_samoupr:0 "Профсоюзы рабочих"
    WIG_workers_samoupr_desc:0 ""После принятия закона о легитимизации профсоюзов рабочие будут уверены в том, что завтра их не уволят по надуманной причине, будут уверены в том, что свою плату они будут получать вовремя и соразмерно труду, будут уверены в том, что их права всегда соблюдены!" \n\- Джованни Гаччи, [GetYear]"
    
    WIG_nazi_path:0 "НФВК" # национал-популисты
    WIG_nazi_path_desc:0 "На выборах победили НФВК."
    
    WIG_nationalise_heavy:0 "Национализация военпрома"
    WIG_nationalise_heavy_desc:0 "Военная промышленность является важнейшей для национальной безопасности отраслью экономики, и нельзя допустить чтобы она попала ни в когти проклятых буржуев, стремящихся максимально съэкономить, ни в когти иностранных шпионов."
    
    WIG_free_food:0 "Раздача еды беднякам"
    WIG_free_food_desc:0 "Раздача еды бедным слоям населения поможет им не помереть с голодухи, а нам повысит репутацию."
    
    WIG_empower_stazi:0 "Учреждение тайной полиции"
    WIG_empower_stazi_desc:0 "Тайная полиция следит за каждым приезжим не-вингбардийцем, так, ни один антивингбардийский элемент не проникнет в наше общество."
    
    WIG_talont_massacre:0 "Roundup of the Insurgents"
    WIG_talont_massacre_desc:0 "It's time to hold a couple of show raids on these creatures who call themselves "freedom fighters", but in reality are just terrorists destabilizing our society."

    WIG_neutral_path:0 "CPV" # Constitutionalists
