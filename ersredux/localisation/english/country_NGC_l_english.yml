 NGC_Smert_mozga3:0 "Project dot"
 NGC_Woor:0 "Stolen Gold"
 NGC_Woda_idea:0 "Drown the bugs"
 NGC_Mertvtz_idea:0 "Bury the dead man"
 NGC_deserttribes:0 "Surprisingly, there is only a desert here"
 NGC_deserttribes_desc:0 "It was stupid to think that capturing these places would bring at least something good. There are even particularly gifted people who manage to lose to this desert. However, let me tell you a joke instead.:\n\nThe Griffin crawls through the desert. Thirsty, exhausted. He looks like hell.. On my last legs, basically. Suddenly he looks — there's a well ahead! The griffin falls to his knees and screams in a cracked voice:\n— Water-ah!A thestral's face instantly appears from the well, looking even cooler, with a wild roar:\n— Where is it?!"
 NGC_Blitcrig:0 "Blitzkrieg"
 NGC_Blitcrig_desc:0 "Our enemy is strong and dangerous, we are forced to abandon all available resources for the sake of victory! (Otherwise we will stand like sheep and look at the sand)"
 
