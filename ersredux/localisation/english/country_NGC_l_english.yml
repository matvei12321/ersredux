 NGC_Ger_Drem:0 "Herr Dream"
 NGC_Ger_Drem_desc:0 ""A miser pays twice, but Chrysalis always"\n\nLet's be honest, NO ONE needs Nouveau Gryphonics! This country was abandoned by its own metropolis, so what should changelings care about them?Chrysalis always wants to be the first, the one who surpasses other queens in everything. And tell me, do other queens have colonies somewhere outside the Hegemony? And Chrysalis has! And the rich, the rich, and those who revere the queen. Does Arginnis have colonies? No? What a sucker.\n\Pogrom funds are spent on maintaining the image. And these same funds go into our pockets. And when Chrysalis's ambitions destroy her, we'll be far away."
 NGC_Ger_Drem:0 "Dresden Bunker Guard"
 
 NGC_Zulgus:0 "Zulgus"
 NGC_Zulgus_desc:0 "Yes, Dresler has a private bunker. If you didn't know that, then congratulations, you know less than this guard.To be honest, even the top management of the UGU has little knowledge of this mysterious bunker and its location. Attempts to find out were unsuccessful. And the guard just nods at all the questions.\n\n(Hmm, I was wondering what's in there? Maybe there's a miracle weapon for destroying the Ayakatachli, developed by Kappingheimer himself?)"
