 NGC_Spokoino:0 "Мы не самоубийцы"
 NGC_Spokoino_desc:0 ""Ну почему с этими Дреслером так сложно? Сказали умереть, и умирай как все нормальные. Но нет, надо воскреснуть и все испортить. А чейнджлинги? Сидели бы, гребли деньги, но нет надо показать какие крутые. Что же, они сами выбрали свою судьбу "" #Ну почему с этими Дреслером так сложно?! Потому-что Дреслер поехал на СВО!
 NGC_Spokoino1:0 "Сохраняйте спокойствие"
 NGC_Spokoino1_desc:0  ""Кретин, дурак, сволочь, это же надо в самый трудный час уйти в запой! Получается я теперь здесь главная? Это заметно облегчает задачу, по внедрению. В прочем народ не должен знать что происходит за кулисами""
 NGC_Spokoino2:0 "Мертвые умрут"
 NGC_Spokoino2_desc:0  ""Дреслер продолжает пользоваться популярностью в народе и УГУ, ставя наш режим под сомнение. Что же, если этот грифон продолжит мешать нам, я намерена лично закапать его в яме, а после забетонировав, чтобы наверняка""
 NGC_Spokoino3:0 "Жуки утонут"
 NGC_Spokoino3_desc:0  ""Эти мерзкие жуки уже достали, за день - двадцать их агентов уже раскрыли и это число всё растёт и растёт! Ныне они представляют наибольшую угрозу, ибо с поддержкой остальных ульев они имеют неограниченные возможности""
 NGC_Spokoino4:0 "Вскрываемся"
 NGC_Spokoino4_desc:0 "Сегодня в южный порт прибыл корабль, загруженный вооружением и помощью для наших солдат. Как выразились местные: "всё это является добровольной помощью Юникорнии во благо мира""
 NGC_Spokoino5:0 "Крайгер жив"
 NGC_Spokoino5_desc:0 ""Вера в Губернатора один из столбов, создавших Нуво Грифонику, а ныне этот столб лежит, напившись в хлам. Впрочем, этот маленький секретик мы оставим у себя, пусть народ продолжает верить, что Крайгер что-то значит. Ну а после хаоса, я займусь его лечением""
 NGC_Spokoino6:0 "Мобилизируемся"
 NGC_Spokoino6_desc:0 ""
 NGC_Spokoino7:0 "Полная оторванность"
 NGC_Spokoino7_desc:0 ""
 NGC_Spokoino8:0 "Еще не поздно"
 NGC_Spokoino8_desc:0 ""Ну что котяра, доигрался? Вместо рычага давления мы получили неуправляемую проблему, которая меняет всё под себя. И армию она уже перестроила, поэтому в отличие от тебя, я не смогу её выкинуть. Если ты думаешь пересидеть у себя, то готовь верёвку и мыло. Поэтому если хочешь жить, немедленно поднимай свои дивизии и веди их на Нуво Грифонику, ибо потом будет поздно!""
 NGC_Spokoino9:0 "Нуво Грифоника выстоит!"
 NGC_Spokoino9_desc:0 ""Да! да! да! Мы сделали это! Мы смогли отстоять наши идеалы и сохранить власть в Нуво Грифонике! Что же, осталось только сообщить Крайгеру о победе, он явно будет счастлив узнав это.""

