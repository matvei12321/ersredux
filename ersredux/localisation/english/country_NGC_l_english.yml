 NGC_heisenberg:0 "Kapingeimer"
 NGC_heisenberg_desc:0 "The problem of many great scientists is simple and well-known, they were born in a time of technological backwardness. If we talk about Kappingheimer, he was also born in the poorest country in science. Having written hundreds of works on various topics, he became the greatest scientist on the continent (well, at least he thinks so) Unfortunately, his mind is limited by the country's technology. Even if fighting over a microscope is commonplace, how can you do great things in such conditions?"
