 NGC_Oswald:0 "Oswald"
 NGC_Oswald_desc:0 ""Our ancestors did not give their lives for this country..."The last general of the old guard, and the one for whom honor and morality are not empty words. All his life, he lived by loyalty to the old ideals of the colonists, fighting and defending the empire's land.After the Dresler coup and the beginning of Kreiger's rule, he turned out to be the only general who was able to retain his position. However, very soon he began to regret such a "gift" because before his eyes the old world collapsed.Now all sorts of outsiders are leading the army, and the governor's power is in the clutches of some narcissistic blacksmith..."
