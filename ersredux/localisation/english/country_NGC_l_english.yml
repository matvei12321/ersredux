 NGC_focuss_Z:0 "Twenty years of peace"
 NGC_focuss_Z_desc:0 "§Y"Let's drink to Kryger, the one who saved Nuva from destruction"§! Our history is not famous for great victories or stories, but on the contrary, we are known for our constant flight. We fled from the Batpony savages, from the squirrel tribes, and eventually ran to the ocean, where we had to stop. Now our mission is to return the lost lands, and finally fulfill our duty to the Empire "
 NGC_focuss_V:0"...ambitions..."
 NGC_focuss_V_desc:Did you find 0 "§Y" in the library? Well, let him sit for a couple of years, and then go to waste after the previous one."!\n\n Do we want peace? Yes, and preferably all of it! But for a start, the Southwest will be enough for us. And while our politicians are shouting about peaceful unification under our flag, the generals are preparing for war. We will send ambassadors to neighboring countries with a proposal to form a federation, and expand trade between the countries "
 NGC_focuss_S:0 "...enemies"
 NGC_focuss_S_desc:0 "§Y"There's a cage for every brazen Octavia!"§!\n\pRouk has historically been a haven for all kinds of rabble and scum. But that's not enough for them, and they're always trying to get in and fix things up. Octavia's bandits with the motto "Take what's not nailed down" deserve special attention because they get most of their money at our expense. Well, let's see how they will pass through our new fortifications"
 NGC_focuss_X:0 "Our successes..."
 NGC_focuss_X_desc:0 "§Y"You would have been sold anyway, the only question is the price"§!\n\nThe governors, although they were considered the chosen gods, were only interested in parties and pleasures. Truth… Kreiger chose a different approach, throwing all his efforts into the development of industry. The price of our industrialization is the blood of the people. But even then, we had to give in to Nouveau Griffins for supporting our industry. Some consider it treason, but it was the only chance to make up for lost time"
 NGC_focuss_Skam:0 "Into the future!"
 NGC_focuss_Skam_desc:0 "§Y"Dresler is a naive griffin. But, there is no one better than him."!\n\n The word about unity is certainly good, you tell everyone how good and positive you are, but what about proving it with actions? We will invite all the leaders of the Southwestern countries to the negotiating table, and finally unite against external threats. Glory to the Federation!"
 NGC_focuss_U:0 ""Change of plans""
 NGC_focuss_U_desc:0 ""There will be no peaceful solution, everyone is too busy stuffing their pockets"\n\nThe first stage of the Dresler plan was a success. Our people believe that we are the first peacemakers and fighters for a good cause, and it's time to spread these ideals throughout the region. May those who doubt our love of peace drown in blood, for our mercy is merciless "
 NGC_focuss_CN:0 "A walk in the garden" 
 NGC_focuss_CN_desc:0 "Ah, the desolate lands, a wonderful place that no one needs. Why? It has always been a graveyard of armies and an absolute void. According to rumors, it was here that the squirrels lost 70% of their army, bypassing the mountains. And since no one needs this desert, we'll just take it for ourselves, and just annoy our northern neighbor. The main thing is to carry out a small victorious campaign quickly, and not get stuck in these deserts"
 NGC_focuss_CN1:0 "To find failures... Patriots"
 NGC_focuss_CN1_desc:0 "The teacher asks: what did the children do during the war.\nThe: - I worked at the factory. I made shells.Teacher: - Well done, Petya! What were you doing, Vovochka?\The button: - And I helped on the front line, I brought cartridges to the soldiers.Teacher: - Yes? And what did they tell you?Vovochka: Oh, I, zeer gut Voldemar, zeer gut"
 NGC_focuss_CN2:0 "Southern Jerk"
 NGC_focuss_CN2_desc:0 "In the past, the squirrels were the masters of the entire Southeast, but now they are only a shadow of their former power. They have no industry, and their entire army is a collection of backward tribes equipped with anything. And even the last war at the door has not taught them anything, and they still continue to live in the past. Well, it makes us feel better. According to the army, the war will be quick, but it may cause a ruckus among our neighbors."
 NGC_focuss_CNA:0 "It's all bullshit, all over again"
 NGC_focuss_CNA_desc:0 "Drezel has always had opponents of varying degrees of danger, but the old officer Henschel took a special place. At one time, he could easily have started a civil war against Doesler, but an unexpected poisoning and death prevented this from happening. Since then, the army has been mired in corruption and sin, and experienced cadres have sworn allegiance to the UGCC. Now our fighters can only chase pigeons, and it is not known who will win. Now we will put the army on a war footing, simultaneously tearing off the paws of thieves and crooks."
 NGC_Armi:0 "Uh-huh chapter §SDresler§! I intend to reform the Russian army! or finish them off"
 NGC_New_Focys:0"We recommend that you study all the past tricks, because depending on your decisions, § creates tricks!§"
 NGC_VooZ:0 "§CHo§ , in addition, they will be engaged in the project §r Ascension§"
 NGC_Oskor:0 "§Before shaking this trick, I recommend §R To think a hundred times how good life is§"
 NGC_Opperat:0 "§Gives up access to operations§"
 NGC_focuss_CNA5:0 "This is not a Madhouse for you!"
 NGC_focuss_CNA5_desc:0 "Imagine if an army was like monkeys escaping from a zoo. A whole horde of chaos and destruction, who consider it their duty to jump on lampposts and steal hats from the locals. We need something similar, but manageable at the same time. Our army will be like controlled chaos, which the enemy will not only not stop, but will not even be able to understand the main directions of the strike and the goals. Naturally, this requires training, training, and more training. Fortunately, the officers of the UGU are ready to impart knowledge, and if necessary, to hammer it into the heads of soldiers."
 NGC_focuss_CNA6:0 "Every patriot gets a gun"
 NGC_focuss_CNA6_desc:0 "Just as in theory a peasant can beat a knight with pitchforks, so our soldiers can beat a bandit with sticks. The only question is, is it necessary to use such methods in modern warfare? No, even in the most difficult hours, our fighters must have proper guns. This will not only preserve the effectiveness of the entire army, but will also save the lives of our soldiers. Fortunately, the current industry and stocks in warehouses will allow every patriot to get a gun."
 NGC_focuss_CNA7:0 "The elite was elite but not elite"
 NGC_focuss_CNA7_desc:0 "Commissioner Cain has seen a lot fighting against the Storm King. But he especially liked the concept of assault groups, special units packed with everything they can, and breaking through gaps in the enemy's defenses. A couple of such divisions would be extremely useful to us in the upcoming conflict. The enemy learns firsthand all the delights of modern warfare."
 NGC_focuss_CNA8:0 "Give freedom to a Bespectacled Man"
 NGC_focuss_CNA8_desc:0 "Why do we need scientists? To smash vases with a bat, in an attempt to find out how old this vase is. However, our scientists only live on "initiative", they are not supported or funded. But a special place is occupied by Kappingheimer, the only scientist who lives by science and his crazy ideas. We can offer him and a group of talented scientists a special department equipped with the latest science. And we can only hope that they don't let us down."
 NGC_focuss_CNA9:0 "Strelkov's Plan"
 NGC_focuss_CNA9_desc:0 "Do we have an army to destroy Roke? Yes! Do we have an army to fight the South? No! This fact alone is enough to restructure the mobilization system. Nowadays, we don't need a hundred irreplaceable fighters. We need thousands of easily replaceable divisions! Therefore, we have developed a new draft plan, from now on, every resident should be able to handle weapons and be ready to fall for their homeland and family!"
 NGC_focuss_CNA1:0 "Northern exercises"
 NGC_focuss_CNA1_desc:0 ""What kind of aggression? This is our land and we are just holding annual exercises.""
 NGC_focuss_CNA2:0 "Operation Ether"
 NGC_focuss_CNA2_desc:0 "Ethereal lands, the lands from where most bandits get into Nouveau Gryphonics. In addition, this region is populated and has a significant industry for Roke. We intend to conduct a small "Rehearsal" before a large-scale war. Our elite units will start a border conflict, and in the course of Little victorious they will take over the region"
 NGC_focuss_CNG:0 "Good time for contracts"
 NGC_focuss_CNG_desc:0 ""Friends, are you preparing for a war with Roke? Oh, friends, it's a pity you didn't contact me earlier, because our queen has a bunch of promising gizmos that will clearly help you in the upcoming conflict. Do you know about, say, a helicopter? No? Would you like to get the blueprints of these monsters? Well, we are ready to provide them to you in return for a small change, for example, for the access of our corporations to your resources. And as a bonus, you will get all the best and perfect""
 NGC_focuss_CNG1:0 "Take advantage of the experience of colleagues"
 NGC_focuss_CNG1_desc:0 "Our Changeling friends have been living in a state of war all their history. They know nothing else but to fight for their lives in the name of their queen. However, all this is only according to the words of their ambassador, it is difficult to say how things really are. But, they are ready to provide their advisers as assistance for the speedy modernization of our army according to modern standards."
 NGC_focuss_CNG2:0 "Expansion of the Pact"
 NGC_focuss_CNG2_desc:0 "Extensive oil reserves have been discovered in the new lands. But, unfortunately, we do not have sufficient technical base for their extraction. But the changelings are very interested in these deposits, and they are ready to buy them back for technology. They were drilling for water, and oil was poured. Now I'm both without a plot and without oil"
 NGC_focuss_CNG3:0 "Spiz... to borrow the technology of "
 NGC_focuss_CNG3_desc:0" The new griffin tanks will be equipped with impenetrable armor."
 NGC_focuss_CNG4:0 "Look into the forgotten"
 NGC_focuss_CNG4_desc:0 "Waiting for the April update"
 NGC_focuss_CN14:0 "On the rails of war"
 NGC_focuss_CN14_desc:0 "Do these fools from Roke think that the alliance they have created will stop us? No, no, no, this pathetic alliance only gives us a reason to strike. Mobilization will be announced today, and then we intend to conduct a number of operations before the start of the war."
 NGC_focuss_CN15:0 "Legion SOUTH""
 NGC_focuss_CN15_desc:0 ""
 NGC_focuss_CN16:0 "You're not my brother, you black-haired nit."

 NGC_focuss_CNG6:0 "Operation Vacation"
 NGC_focuss_CNG6_desc:0 ""Bison? How many divisions do they have?" After getting rid of some savages, we went to the border with other savages who are in alliance with Roke... Yeah, they chose their own sad fate. Our command is planning to make a small raid, and as a result, move the border a little further east. Well, then it's not far to Cuatlicue"
 NGC_focuss_CNG7:0 "Heavenly nightmare"
 NGC_focuss_CNG7_desc:0 ""
 NGC_focuss_CNG8:0 "Was our"
 NGC_focuss_CNG8_desc:0 "It has also become ours, only now the factories are located in Nouveau Gryphonics"
 NGC_focuss_CNGP:0 "Northern Threat"
 NGC_focuss_CNGP_desc:0 "Roke is our last obstacle on the way to domination in the Southwest, and further expansion to the east. By getting rid of Roke, we will put an end to the gang plague and crime. Naturally, we should prepare well before the start of the war, because the failure of the invasion is unacceptable"
 NGC_focuss_Betpons:0 "The true enemy"
 NGC_focuss_Betpons_desc:0 "§IN DEVELOPMENT§!\n\n"Are you saying that in six months, some kind of Marov's son turned villages into megacities? And during that time they started fighting with tanks instead of sticks? Are you really there!?! I knew your counterintelligence was crazy, but not that bad! What's it? Fucking shit... We've been sitting around eating breadcrumbs for twenty years to build a road, and they're feasting all over there. Contact Roke's management immediately, I have a serious conversation with them""
 NGC_focuss_Betpons1:0 "Desert Conquerors"
 NGC_focuss_Betpons1_desc:0 "The thestral went to Karfinsk with difficulty making out the road. In the morning, the railway from Roke to Karfinsk was completely dismantled..."
 NGC_focuss_Betpons2:0 "They will know fear"
 NGC_focuss_Buuuun1:0 "Purchase of equipment"
 NGC_focuss_Buuuun2:0 "Stall for time"
 NGC_focuss_Buuuun:0 "Citadel Plan"
 NGC_focuss_Buuuun_desc:0 "§SWAP§!"
 NGC_focuss_CNGP1:0 "Operation "Vacation""
 NGC_focuss_CNGP1_desc:0 ""Bison? How many divisions do they have?" After getting rid of some savages, we went to the border with other savages who are in alliance with Roke... Yeah, they chose their own sad fate. Our command is planning to make a small raid, and as a result, move the border a little further east. Well, then it's not far to Cuatlicue"
 NGC_focuss_CNGP2:0 "Operation Ether"
 NGC_focuss_CNGP2_desc:0 "Ethereal lands, the lands from where most bandits get into Nouveau Gryphonics. In addition, this region is populated and has a significant industry for Roke. We intend to conduct a small "Rehearsal" before a large-scale war. Our elite units will start a border conflict, and in the course of the victorious war they will take over the region"
 NGC_focuss_CNGP3:0 "How beautiful the south is at night"
 NGC_focuss_CNGP3_desc:0""
 NGC_focuss_CNGP4:0 "Gateway to the Southeast"
 NGC_focuss_CNGP4_desc:0 "The successful deployment of troops has strengthened our control over the region. However, the local leader is meeting with the eastern leaders more and more often, clearly trying to come to an agreement on something. Well, one blow from our army will destroy this child of history. And after that, the local governor will lead the expansion to the east"
 NGC_focuss_CNGP5:0 "Sofa troops"
 NGC_focuss_CNGP5_desc:0 "The fall of Roke has led to a dramatic increase in the number of collaborators and those willing to help our ideals. Well, we are ready to offer them the wonderful role of "Sofa Soldiers". Their task is simply to distort the past in every possible way, making our ideals attractive in the eyes of ordinary people. Over time, even an absolute lie will be indistinguishable from the truth"
 NGC_focuss_CNGP6:0 "Castrate the loonies"
 NGC_focuss_CNGP6_desc: "Dodge City is like rot on the body of a creature, it slowly but irreversibly destroys more and more until it eventually destroys its host from the inside. Well, fortunately, science already knows the easiest way to eliminate rot - amputation of an infected limb"
 NGC_focuss_CNGP7:0 "Knock out all the crap"
 NGC_focuss_CNGP7_desc:0 "The brilliant victory over Dodge City revealed to us a terrible picture of their city. The worship of madmen, coupled with poverty and illiteracy, has created a truly terrible place. If we want to pull the city out of this rot, we will have to use harsh methods. Burn and destroy all their legacy!"
 NGC_focuss_CNGP10:0 "The last chord"
 NGC_focuss_CNGP10_desc:0 "After so many years, the Southwest is finally united like never before. Our banners are proudly flying over the defeated, and the troops are marching to the cheers of the crowd. Now our task is to consolidate our success, and prepare for new campaigns..."
 NGC_focuss_CNGP8:0 "Knock down the door"
 NGC_focuss_CNGP8_desc:0""
 
 
 
 
 
 
 
 
 
 
 NGC_focuss_VES:0  "Весна в Нуво Грифонике"
 NGC_focuss_VES_desc:0 "Да! да! да! Юг наш, бандиты разбиты, а народ славится наших лидеров. Что ж, пора переходить к новому этапу плана Крайгера, и сегодня мы начнём менять облик Нуво Грифоники. Как жаль, что многие не увидят нашу мечту. Но ради великой цели, можно многими пожертвовать "
 NGC_focuss_VES1:0  "Все равны, но.."
 NGC_focuss_VES1_desc:0 "Никаких – НО! Нуво Грифоника должна стать примером равенства народов, и примером хорошей жизни. С этого дня, гражданином нашей страны сможет стать любой, в независимости от вида или прошлой жизни."
 NGC_focuss_VES2:0  "Национальные Автономии"
 NGC_focuss_VES2_desc:0 "С самого своего появления, Нуво Грифоникой всегда правили Грифоны. Так было всегда, но, сейчас пора уступить место другим народам. Нуво Грифоника будет перестроена, и у каждого народа появится своя земля, где они смогут жить по своим правилам. Естественно, жить в рамках закона"
 NGC_focuss_VES3:0  "Вы имеете право"
 NGC_focuss_VES3_desc:0 "Вы имеете право! Почему бизон не может получить образование, только потому что он бизон? С этого дня каждый житель имеет право на помощь со стороны государства, и как следствие, возможность жить, а не выживать"
 NGC_focuss_VES4:0  "Победителей судят!"
 NGC_focuss_VES4_desc:0 "Бандиты Роука совершили чересчур много преступлений, как на территории Нуво Грифоники, так и в странах союзниках. К сожалению, это касается и наших солдат. Знаменитая резня в Роуке лишь маленькая часть прошлых ошибок. Мы не имеем права оставлять их в живых, и должны немедленно провести разбирательство. Особый взгляд будет на солдатах и офицерах УГУ "
 NGC_focuss_VES5:0  "Никогда снова!"
 NGC_focuss_VES5_desc:0 "Одно дело солдаты, в большинстве случаев они лишь выполняли приказы и у них не было выбора. Поэтому нужно избавиться от тех, кто составлял эти приказы. Среди нашего руководства полно тех, для кого жизни не стоят ничего. Что ж, если для них смерть ничего не значить, то почему мы должны жалеть об них?"
 NGC_focuss_VES6:0  "Ликвидация УГУ"
 NGC_focuss_VES6_desc:0 "УГУ- стало синонимом ужасного прошлого, и преступлений на территории Юга. Дальнейшее существование такой организации недопустимо. Организация будет запрещена, а все руководители пойдут в расход."
 NGC_focuss_VES7:0  "Это ваш шанс!"
 NGC_focuss_VES7_desc:0 "Наша победа привела к стабилизации региона. Немыслимое раньше - возможно сейчас. Богатство как ресурсами, так и дешёвой рабочей силой, делает Нуво Грифонику великолепным местом для инвестиций. Особенно инвестиции коснутся предпринимателей. Им нужно только помочь, и завтра у нас будет новое предприятие"
 NGC_focuss_VES8:0  "Гранты для Бизнеса"
 NGC_focuss_VES8_desc:0 "Шестерёнки начали свою работу. Но, нужно больше! Увеличив количество инвестиций, мы ускорим прогресс. Да это обойдётся в солидную сумму, но в будущему это обязательно окупится"
 NGC_focuss_VES9:0  "Конец Монополий"
 NGC_focuss_VES9_desc:0 "Борьба против монополий началась недавно, но уже начала приносить свои плоды. Множество мелких предприятий начали свою работу, ещё столько на подходе. К тому же, чейнджлинги согласились ослабить хватку. Правда, касаемо ресурсов договор поменять не удалось"
 NGC_focuss_VES10:0  "Новый день"
 NGC_focuss_VES10_desc:0 "Было ваше"
 NGC_focuss_VES15:0  "Вернуть Рудники"
 NGC_focuss_VES15_desc:0 "Ни для кого не секрет, что чейнджлинги владеют большинством рудников в нашей стране. К сожалению, вернуть их сейчас - значить начать конфликт с чейнджлингами. Единственное, что можно сделать, это поменять условия сделки. Мы откажемся от их услуг, а в замен, они покинут родники в течение трех лет. Ну а пока, новости покажут это в качестве очередной победы"
 NGC_focuss_VES16:0  "Армия мира"
 NGC_focuss_VES16_desc:0 "Невозможно исправить прошлые ошибки. Но, в наших силах сделать всё чтобы этого не произошло снова! Армия будет перестроена наподобие Юникорской. А место её лидера, займёт наша любимая Сара. Пускай у неё мало опыта, но она определённо справится с этой работой"
 NGC_focuss_K1:0 "Наш Звездный час"
 NGC_focuss_K1_desc:0 "Фокусы не покажу, зато есть решение на воскрешение Твайлайт. Кабанчик, сало ты такое, когда ты уже наконец прославишь Империю?"
 NGC_focuss_YGY1:0 "Только свистни он появится"
 NGC_focuss_YGY1_desc:0 "Как жаль, но наш дорогой Крайгер был предан его любимыми пони. Что ж, его смерть показала всем нам, главный союзник грифонов - сами грифоны. Завладев полным руководством в государстве, можно заняться окончательным уничтожением Роука"
 NGC_focuss_YGY2:0 "Вынос мусора"
 NGC_focuss_YGY3:0 "Заставьте их работать!"
 NGC_focuss_YGY4:0 "Новые офицеры"
 NGC_focuss_YGY5:0 "Бомбезный день"
 NGC_focuss_YGY6:0 "Вскрыть склады"
 NGC_focuss_YGY7:0 "Вновь в Роук"
 NGC_focuss_YGY8:0 "Шашлык готов"
 NGC_focuss_YGY9:0 "ДреслерЮгент"
 NGC_focuss_YGY10:0 "В земли Бизонов"
 NGC_focuss_YGY11:0 "Юг чей? ЮГ НАШ!"
 NGC_focuss_WAS:0 "Как там юг?"
 NGC_focuss_WAS_desc:0 "По результатам войны, нам достался весь Юго-Западный регион, обладающий достаточными ресурсами и населением. К сожалению, не все народы испытывают радость от освобождения. Поэтому мы разделим регион на три оккупационные зоны. Нува - займется реформированием страны и белокопытными. Оккупационная зона - поддержанием порядка. А Бэтпони - кушаньем манго"
 NGC_focuss_WAS1:0 "Разбитая мелодия"
 NGC_focuss_WAS1_desc:0 "Октавия - в прошлом лидер Роука. Ныне, пленница находящиеся в заточение. На её копытах реки крови, и целый ряд смертельных преступлений. Попытки поменять её и сделать лояльной режиму абсолютно бесполезны. А если поменять не получится, решение лишь одно..."
 NGC_focuss_WAS2:0 "Добейте выживших!"
 NGC_focuss_WAS2_desc:0 "На данный момент большинство бандитов ушли в подполье и ждут своего момента. Их решение остатся - фатальная ошибка. Завладев Роуком, мы получили достаточно информации об них. Одним ударом мы намерены очистить Юго-восток, и поставить точку в нестабильности региона"
 NGC_focuss_WAS3:0 "Северный путь"
 NGC_focuss_WAS3_desc:0 "Нуво-Грифонинс, это город подобный неограненному алмазу. Но, мы можем легко это исправить. Постройка железной дороги между Нуво-Грифониском и Эфиорм, позволит не только эффективно перевозить ресурсы с севера. Но и укрепит влияние в оккупационной зоне"
 NGC_focuss_WAS4:0 "Порты в Нуво-Грифонинске"
 NGC_focuss_WAS4_desc:0 "Всё чаще и чаще, в Нуво-Грифоненске начинают останавливаться торговые корабли разных стран. И как следствие, появилась идея сделать этот город перевалочным лагерем. В теории, тут можно спокойно отремонтировать корабль и пополнить запасы. К сожалению, для расширения города понадобится время и значительные средства"
 NGC_focuss_WAS5:0 "Южный путь"
 NGC_focuss_WAS5_desc:0 "Племя Куатликуэ было прекрасным союзником в нашей борьбе. Но, при этом остаются разобщенными племенами. Чтоб укрепить центральное племя, мы намерены поддержать их технологиями. А постройка железной дороги, обеспечит бесперебойно сообщение между нами"
 NGC_focuss_WAS6:0 "Награда за верность"
 NGC_focuss_WAS6_desc:0 "Постройка дороги и передача технологий, это конечно хорошо. Но, они явно достойны большего. За их верность Грифоньему роду, мы предложим им стать часть нашей великой истории. Лишь объединившись с нами, они смогут подняться до невиданных ранее высот"
 NGC_focuss_WAS7:0 "А врагов еще ближе"
 NGC_focuss_WAS7_desc:0 "Помимо врагов внутренних, появились новые внешние проблемы. На севере активизировались племена пегасов. На юге, нелояльные бэтпони продолжают совершать набеги. К сожалению, сейчас мы не можем ликвидировать эти проблемы, но, старый добрый забор поможет укрепить границу. И покажет, что мы не рады иностранцам"
 NGC_focuss_WAS8:0 "Держи друзей близко"
 NGC_focuss_WAS8_desc:0 "Как когда-то наши предки прибыли на Эквус, так наши поселенцы начнут осваивать Роук. Да, места там не самые безопасные. Но, мы замотивировать поселенцев свободной землёй и разрешением на "средства самообороны" Кому какое дело если пострадают другие?"
 NGC_focuss_WAS9:0 "Жемчужина юга"
 NGC_focuss_WAS9_desc:0 "Наши действия начинают давать свои плоды. Множество инвесторов из разных стран, уже выразили своё желание инвестировать в город. И как следствие, расширяются слухи об нашем прекрасном городе. Некоторые даже называют его будущей "Жемчужиной Юга". Что ж, нам остаётся только сделать всё возможное, чтобы оправдать это название"
 NGC_focuss_WAS10:0 "Объединенное командование"
 NGC_focuss_WAS10_desc:0 "Успех, наши друзья Бэтпони теперь часть нашей нации. Но, их вооружённые силы желают оставлять лучшего. Оставлять их в таком состоянии нельзя, но, можно их объединить с нашей армией. Обеим сторонам будет крайне выгодно такое объединение. Наша армия получит больше новобранцев, а им остаётся кушать манго"
 NGC_focuss_WAS11:0 "Копай, продавай, богатей"
 NGC_focuss_WAS11_desc:0 "Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука"
