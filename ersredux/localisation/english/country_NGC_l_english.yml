 NGC_YGY_lev_side:0 "Left wing\n\n- §g"Cretins stuck in childhood dreams"\Ponies were leftists and remained leftists with the ideals of free Nouveau Gryphonics. In their ideas, they envisage a return to the roots and the division of power into three parts. Uh-huh should ensure the observance of order and stability, the council should become the legislative basis, and the function of the executive branch will be in the clutches of the governors!!"
 NGC_YGY_Prav_side:0 "Right wing\n\n- §g"Cretins with megalomania and big guns" Historically, the right wing fought for the superiority of the griffin species and continued colonization on the continent. But over time, the ideas of the superiority of the species were replaced by the superiority of the organization, and the goal of colonization was replaced by the concept of "Total War". They believe that Nouveau Gryphonics is only a resource on the way to a great goal.§!"
