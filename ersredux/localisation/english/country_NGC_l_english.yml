 YGY_Dreslers:0 "Dresler"
 YGY_Dreslers_desc:0 "Falling from an airplane divided his life into before and after. Without anything, crawling inch by inch, he was doomed to die. Eating berries and sleeping in the rain, he continued to fight for his life. Days later, he crawled to the river, but lost consciousness exhausted. That's how the story would have ended. But fate had other plans. The local Bat Ponies were able to detect him, move him to the camp, and then cure him. For them, he became the embodiment of an ancient legend about a creature that would lead them to prosperity. When Dresler recovered, he used this to strengthen the influence of Nouveau Gryphonics in the region. But after learning what was happening to his homeland, he changed his plans and intends to get rid of the Kryger experiment"
