 NGC_Dobrovolez:0 "Voluntary corps"
 NGC_Dobrovolez_desc:0 "An army volunteer recruitment officer was delighted when he saw a young man entering his office.\n- I read your poster with a call to join the army, - said the young man \n - Very good! So you decided to volunteer?\n- No.\n- No? Then why did you come to us?\n- I wanted to tell you not to count on me."
 
# Their ideas are relevant to breaking point
 NGC_left_alone:0 "The Unknown Pride of the Empire"
 NGC_left_alone_desc:0 "We have long forgotten when the griffin's paws first set foot on this land. And who was the first governor of this colony? It's not that important. One thing is important: we remember our sacred mission to develop these wild lands. We will... The largest colony of the Griffin Empire in the world! Grover will contact us across the oceans and inform us that it's time to continue colonization.\n\n We definitely haven't been abandoned. The Empire would never do that to us"
 NGC_genocide_idea:0 "Extermination of the natives"
 NGC_genocide_idea_desc:0 "This land rightfully belongs to our overlord, the great Griffin Empire. No dirty savages have the right to run amok here!"
 NGC_genocide_Z:0 "Corrupt Army"
 NGC_genocide_Z_desc:0 "The army of Nouveau gryphonics is a global phenomenon. Whatever you don't put in there always disappears. Everything that is not nailed down is removed from there, corruption is rampant at all levels. But what's worse is that soldiers are pushing what needs to be pushed and wearing what needs to be worn. Where is this seen? But fortunately, Dresler intends to put an end to this. His reforms will force soldiers to dye the grass and divide the snow!"
 NGC_genocide_Z1:0 "§The Legendary Army§!"
 NGC_genocide_Z2:0 "O Army mess!"
 NGC_genocide_Z3:0 "§Y Weak and corrupt§!"
 NGC_jagers_of_NGC:0 "Assault Troops"
 NGC_genocide_Iskra:0 "Iskra group"
 NGC_genocide_Koll:0 "Collaboration"
 NGC_genocide_Koll1:0 "Collaboration"
 NGC_genocide_V:0 "Pact of Governors"
 NGC_genocide_V1:0 "Pact of Governors"
 NGC_genocide_V2:0 "The Pact of Governors"
 NGC_genocide_V_desc:0 "I assure you, they can be trusted with Nouveau-Gryphoninsk"
 ngc_genocide_ide_dom_v:0 "House of Peoples"
 NGC_genocide_idea_Dom_V_desc:0 "The southern region is not the most peaceful place. There are either bandits who will steal everything, hello Roke. Or the cultists who carry you as victims, hello Dodge City. And I don't talk about the local tribes at all, because they are always running somewhere, and stealing something along the way. In general, compared to them, Nouveau Gryphonics seems like paradise. We have all the conditions for a peaceful life under the dictatorship of "
 NGC_IdVoznesenie:0 "Missing Citizens"
 NGC_Don_idea:0 "Bandits of Captain Manule"
 NGC_Don_idea_desc:0 "" Do you feel it, General? Now you're old and weak. And today is your judgment day.  Captain Manule is a real thorn in our side. By persistently penetrating secret facilities and destroying them, he seems to remind us of his presence. Why is he acting so ruthlessly? The answer is simple - he is taking revenge for the destroyed cottage. On that day, in a minute, what he had been building for years was destroyed. And now he lives for revenge"
 NGC_Don1_idea:0 "The Rise of Captain Manule"
 NGC_Don1_idea_desc:0 ""People like you... You sow death and destruction everywhere. Keep in mind, eventually... History will judge us. And not by what we destroyed, but by what we created." The invasion of Roke not only signaled the beginning of a mass uprising led by Manule, but also turned our lives into a living hell. Our enemies are doing everything possible to slow down our advance, trying their best to weaken our army and undermine our influence. While they are doing everything to undermine our strategy, we have to look for new ways and tactics to counter them and regain control of the situation."
 NGC_Don2_idea:0 "Captain Manule's struggle"
 ngc_don2_ide_desc:0 ""— The war is over. It's all over. There are no more regiments.\n— No. The war is not over. There are so many griffins walking around!" \n The war in the South is over, but not for Manule. As before, he undermines the roads"
 NGC_Blada_idea:0 "Welfare State"
 ngc_mobulizia_idea:0 "Intensive militarization"
 NGC_remember_idea:0 "We remember"
 NGC_Kult_Z:0 "Army Collapse"
 NGC_Kult_Z_desc:0 "Who is ours? Who is a stranger?"
 NGC_Kult_EV:0 "Mass evacuation"
 NGC_Kult_EV_desc:0 "The remnants of the UGU are holding the port in Haystin, and evacuating civilians. We must put an end to this!"
 NGC_Kult_OP:0 "Desolation"
 NGC_Kolonia:0 "Colony region"
 NGC_Kolonia_desc:0 "Colony Region"
 NGC_radio_silence:0 "Destroyed State"
 NGC_Neitrall:0 "Broken connections"
 NGC_Neitrall_desc:0 ""What do you mean we have to help you? No, no, no, you've assured this mess, and you can sort it out yourself. And all the best to you!"Despite remaining loyal, the Occupation Zone and Cuatlicue are unable to help Kryger. Both sides are immersed in their own problems, and are now fighting for survival. However, due to the lack of choice, they will willingly join the winning NGC_Tiw faction
 .:0 "Silence in the SOUTH"
 NGC_Tiw_desc:0 "Quiet, too quiet. During the march to Rok, Nuva's soldiers suffered from the guerrillas. But now everything is different, absolute silence. However, if something unexpected happens in Nouveau, then silence will come to an end."
 NGC_Wostanie:0 "Legions of Bat Ponies"
 NGC_Wostanie_desc:0 "We don't have fire sticks, tin monsters, and clothes are not the most practical. But we have faith in our chosen one. He will lead us to the age of gold, and after that we will give it to the sacred flame."
 NGC_Wera_YGY:0 "Army supports Uh-huh"
 NGC_Wera_Heittal:0 "Neutral Army"
 NGC_Wera_GYB:0 "The Army for Kryger"
 NGC_puppet_economic_control:0 "Changelings control the economy"
 NGC_changeling_advisors_idea:0 "Changeling Advisors"
 NGC_Plan_V_idea:0 "Last Dash "
 NGC_Plan_V_idea_desc:0 "The days of big construction and deaths have passed, and now we are ready for the last breakthrough, as a result of which Nouveau Gryphonica will become a modern country. Workers from the northern regions have already informed about the full readiness of the enterprises, it remains only to complete the railway, and then our industry will start working at full capacity."
 NGC_W_Rok_idea:0 "In the land of Roke"
 NGC_Skam_idea:0 "Purchase of zimmerite"
 NGC_Smert_mozga:0 "Project dot"
 NGC_Smert_mozga1:0 "Project dot"
