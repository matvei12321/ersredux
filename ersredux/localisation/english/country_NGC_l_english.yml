 NCH_Hellmut:0 "Helmut" 
 NCH_Hellmut_desc:0 "Ask §Y"Helmut"§! when the world ends, he will clearly answer that on any future day (except Thursday) \n\pSamo the same teaching §Y"Yesterday's hour."! it is difficult to explain because apart from §Y "Helmut"§! no one understands its essence. It seems that you need to break something, break it, fix it, then break it again, and bury it (the main thing is not on Thursday, and not deep)By the way, his connections in religious circles are of the greatest interest (Well, a small collection of artifacts that he buried somewhere (Although let's be honest, he's a simple drunk who invented these tales))"
