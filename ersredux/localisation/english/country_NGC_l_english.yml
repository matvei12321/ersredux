 NGC_Taras:0 "Taras"
 NGC_Taras_desc:0 "A simple connoisseur of living in a box and eating out of the trash, here he is, a typical Taras. \n\n To wake up, work, fall asleep, that was Taras' day. But then something flew into his house, and he abandoned everything and became a simple homeless man. A box and a trash can, it would seem there is nothing, but Taras is happy to live like this.Once a month, Taras likes to leave his modest home and go on a trip to the South. There he finds new friends, enemies, and sometimes even inspiration for his book called "The Book"
 NGC_Taras_king:0 "Just §UTaras§!"

 NCH_Quisling:0 "Quisling"
 NCH_Quisling_desc:0 "Like foxes §G"Quisling"§! with his fighters, he enters someone else's chicken coop, takes the chickens, and, under the loud cannonade of artillery, falls into the sunset.\n\nThe truth is, instead of chickens, Richthofen prefers to steal all kinds of prototypes from the continent. Rumor has it that he once stole a sofa from Emperor Grover himself (on which some kind of griffin was lying)"
