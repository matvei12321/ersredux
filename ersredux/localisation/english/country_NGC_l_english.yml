 ngc.84.t:0 "..."
 ngc.84.d:0 "Run anywhere, anywhere, even into the hooves of bandits, even to one of the damned cities, anywhere, but not to the desert! Jackie had been dreaming of escape for a long time, he hated the desert, the war, and the stupid jokes of his teammates. "Why haven't we won yet? Why are you stuck and forced to fight the void?" he did not know the answers to these questions, but only ran under the scorching sun. Very soon he ran out of strength and fell on the sand... The sun seemed to suck the strength out of him and make him weaker. Suddenly, he felt that something was happening, and the sand near him began to move down, carrying him down..."
 ngc.84.a:0 "... "
 
 ngc.85.t:0 "..."
 ngc.85.d:0 "Barely opening his eyes, Jackie saw the sun and vultures circling in the sky. Looking around, he realized that he had fallen into a pit full of skulls. "Wait, what?" He got up in fright, I don't understand how and why there are so many skeletons here. But beyond that, in the distance, he saw a gleam, which he immediately went to. As he got closer, he saw that the sword was shining with a jewel on it. After looking around, Jackie decided to take this sword for himself.\n"I'm sorry, buddy, but I need it more."\n\nThe sword is big, beautiful, and most importantly clearly expensive... Stop. Did someone touch him? He slowly turned his head, where he saw "
 ngc.85.a:0 " and "

