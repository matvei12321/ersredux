 ##### PARTIES

 ##### CHARACTERS
 OLE_EZ_ixiod_eidrich:0 "Ixiod Eidrich"
 OLE_EZ_maris_mandelis:0 "Marisa Mandelis"
 OLE_EZ_oscar_dirlewanderer:0 "Oscar Dirlewanderer"
 OLE_EZ_oscar_dirlewanderer_desc:0 "Oscar Dirlewanderer was sentenced to life imprisonment five times for crimes of the highest degree, but his connections in military circles miraculously helped him remain free. At one point, Chrysalis' patience ran out, and she personally issued an order to capture the stormtrooper general who served in the Vesalipolis military. However, by that time he had disappeared, and no one had heard anything about him until the puppet regime of Lyctida was established in Olenia. This suggests that Dirlewanderer was on good terms with von Krieger. Good enough for him to hide the criminal and allow him to become one of his closest rulers of the Kingdom of Death."
 
 ##### NATIONAL FOCUS
 #------start tree
 OLE_EZ_dawn_of_the_hope:0 "There is no hope in this darkness"
 OLE_EZ_dawn_of_the_hope_desc:0 "We have failed. We have fallen. We are doomed wretches, we are mere creatures unworthy of life. Now our future is uncertain, and our new masters spare no one in their path. Truly, this is the end for the Olenian nation."
 OLE_EZ_expluatation:0 "Fight for Extinction"
 OLE_EZ_expluatation_desc:0 "While Aurantia has given us clear instructions on how we should proceed, Krieger has... his own plans. He enjoys not so much the death of the reindeer, but the fact that they suffer.\nVon Krieger has ordered "competitions" to be held among the Reindeer in the Reindeer settlements. These competitions will include such tests as giving up love and life force, enduring torture, killing one's own kind, marathons through minefields, and much... MUCH more. The reward for victory will be a quick and noble death."
 OLE_EZ_cages:0 "Wildlife Cages"
 OLE_EZ_cages_desc:0 "Once we destroyed the deer state, they showed their TRUE nature. Worse than ants - they are disorganized, scurrying back and forth from village to village in panic, fearing for their lives. Just like wild animals. And such wild animals need appropriate cages to herd them into one area."
 OLE_EZ_destroy_culture:0 "Degenerate Culture"
 OLE_EZ_destroy_culture_desc:0 "All over the territory of Olenia, castles, temples, shrines, schools, museums were built... An abomination, honestly. The Olenia people consider this a manifestation of culture, but in fact these buildings are worth nothing. Deer have no culture. They are animals, and they could never build such a thing themselves. Can an Olenia man paint a picture? Can he compose a symphony? The answer is obvious: no.\n\nAll an Olenia man is capable of is lighting fires and throwing himself into the flames at will for the sake of his false gods."
 OLE_EZ_poverty:0 "Take away everything they have"
 OLE_EZ_poverty_desc:0 "The Oleni have things they absolutely do not deserve. Money, cars, clothes, home furnishings, food. This and much more should be forcibly confiscated from every Oleni settlement."
 OLE_EZ_flame:0 "Burn everything"
 OLE_EZ_flame_desc:0 "I will pour kerosene into your eyes."
 OLE_EZ_wack_woman:0 "Stop the birth"
 OLE_EZ_wack_woman_desc:0 "The deer females are the source of the cursed contagion, their wombs bearing generations of horror. If any male deer survive, they will die out on their own, but if even one female survives, the deer race will continue to multiply mindlessly until it consumes and destroys the entire world."
 OLE_EZ_spread_gas:0 "Spread Gas"
 OLE_EZ_spread_gas_desc:0 "The air itself is poisoned, because wild and harmful animals have coexisted in it for hundreds of years. Such air can only be cleaned in one way..."
 OLE_EZ_brainwash:0 "Mindwash"
 OLE_EZ_brainwash_desc:0 "The Oleniians should not consider themselves intelligent beings, because they are not. We will forbid them to think, and we will also instill in them that they are wild animals. In this we will be helped not only by psychological correction of the surviving population, but also by special radio waves developed using the technology of our scientists. This system will be called the "Brain Burner.""
 OLE_EZ_watchtowers:0 "You are being watched"
 OLE_EZ_watchtowers_desc:0 "We need to set up watchtowers to monitor the animals so that none of them escape. These watchtowers will be manned by snipers who will shoot poisoned hunting shells at escapees without warning.\nWhen a wild animal escapes from surveillance, it is not good."

 OLE_EZ_burn_sakhara:0 "Test the atomic bomb on Sakara"
 OLE_EZ_burn_sakhara_desc:0 "A new weapon is being created in the lands of Liktida. Deadly, but extremely expensive - it uses the energy of the atom and magical crystals to create an explosion of unprecedented power. But Krieger has an idea for a more effective weapon, even if no one listens to him. This "dirty atomic bomb" will contain hundreds of thousands of tons of toxic substances, which will spread for kilometers due to the kinetic energy of the explosion. Oskar Dirlewanderer joked that such a bomb would not destroy even cities in one explosion, and Krieger took this as a challenge. We will hastily create a dirty atomic bomb from what we have, and activate it in Sakara. The result should be satisfactory."
 OLE_EZ_burn_tservus:0 "Bomb Cervus"
 OLE_EZ_burn_tservus_desc:0 "Lictidian pilots haven't had any direct air combat training since the war. Pilots won't gain any experience at some training airfields... We need to urgently call in squadrons of Lictidian aviation, preferably aircraft that can cause area damage. These aircraft will be allowed to carry out non-training bombings of Cervus. I hope this bastard's semblance of a city will be smashed to smithereens."
 OLE_EZ_nuke_researches:0 "Squad 241"
 OLE_EZ_nuke_researches_desc:0 "WIP"
 OLE_EZ_burn_weiverfront:0 "Wipe the Population of Wavefront"
 OLE_EZ_burn_weiverfront_desc:0 "Wavefront is a major city bordering Ponjold. The nation of [PGV.getname] is an example of how the filthy hooves of the Olenians can reach other shores. If we had not stopped them, the Olenians would have spread their influence to the entire world. Wavefont, as the center of Olenism's spread to other countries, must be cleansed."
 OLE_EZ_burn_hjortland:0 "Rape Hjortland"
 OLE_EZ_burn_hjortland_desc:0 "The capital of Olenia, a stronghold of filth and degeneration. Previously, the local Oleni swarmed here like maggots, worshiping their vile gods of filth and degeneration. Now we will destroy all holy monuments, every relic, and on the altars we will pile up mountains of Oleni corpses. Although... no, this is not enough. The capital of the degenerate people itself must turn into a living hell. Life must no longer appear here, grass must not grow, and the Sun must not illuminate the ruins of Hjortland. A more thorough destruction is needed not only of the Oleni, but of nature itself, which is cursed by filthy paganism."
 OLE_EZ_toxic_researches:0 "Unit 731"
 OLE_EZ_toxic_researches_desc:0 "Unit 731 ("Einheit 731") is a special unit of the Anti-Olenia armed forces, engaged in research in the field of biological weapons, experiments are carried out on living Olenia. In this unit, experiments are carried out to determine the amount of time that an Olenia can survive under the influence of various factors (drying out, deprivation of food, deprivation of water, frostbite, exposure to boiling water, electric current, vivisection, etc.)."
 
 OLE_EZ_but_theres_somthing:0 "§RMeater§!" 
 OLE_EZ_but_theres_somthing_desc:0 "I will kill them all. I will kill every one of them. I will flay them, flay them, tear out their eyes and tongues just to make them understand. Oh yes, one day they will understand. But for now, there is only fate, which I control.\nI am beautiful. I am like an architect! I am a composer, a writer, and a philosopher all rolled into one. I am creating a world where they do not exist. A world that lives by new laws until it destroys itself.\nPerhaps I am God, who has come down here to save the promised land. For I am truly sinless. By my will, all the pagans have burst into flames. I see piles of corpses scattered haphazardly throughout every city in Olenia. I see every city at once. Because they are all the same. The stench from the corpses is already beginning to make my head spin..."
 OLE_EZ_who_dies_first:0 "Who will die first?"
 OLE_EZ_who_dies_first_desc:0 "Our soldiers have been raping the surviving Oleni population both physically and mentally for a long time. Let's see if they are ready to accept their fate and give up the territories they have considered theirs for hundreds of years."
 OLE_EZ_second_wave:0 "Wave 2"
 OLE_EZ_second_wave_desc:0 "WIP"
 OLE_EZ_traitors:0 "Deal with the spineless traitors"
 OLE_EZ_traitors_desc:0 "Reports are coming in of soldiers who are not killing the Deer. They are refusing to do their sacred duty. Bastards, scum, filthy worms - that's what they are. Such nightmare abominations with their sinister intentions of keeping the Deer alive have no place among us. Their place is among the entire barnyard. And they will be slaughtered, like the entire barnyard."
 OLE_EZ_no_science:0 "Drive the scientists away"
 OLE_EZ_no_science_desc:0 "Destruction has become more than a simple process - it is now a whole ritual, full of symbols and meaning. Destruction is what this land is, not creation. The Liktida scientists want to come here to study the corpses of the Olenians, but we will not allow them. Scientists are creators who create science, there is no place for them in the land of destruction."
 OLE_EZ_ritual_samoubiystva:0 "Ritual Self-Sacrifice"
 OLE_EZ_ritual_samoubiystva_desc:0 "The beasts of this land die like flies, as they should. But the changelings remain alive. The terrible truth is that this land, having become a separate entity, will not tolerate those who believe themselves worthy of life. The Queen will not know this: to save us, we must sacrifice ourselves. You understand - this is a mortal necessity, otherwise she will burst into a thousand fires against us ..."
 
 OLE_EZ_corpses_corpses_corpses_corpses:0 "Corpses, Corpses, Corpses"
 OLE_EZ_corpses_corpses_corpses_corpses_desc:0 "WIP"
 OLE_EZ_erase_small_cities:0 "Only Smoking Ruins"
 OLE_EZ_erase_small_cities_desc:0 "Some cities have already been exterminated of wild animals. No point in keeping a garrison there.\n\nGo home, boys."
 
 OLE_EZ_ill_be_the_one:0 "AND I WILL BECOME THE ONE"
 OLE_EZ_ill_be_the_one_desc:0 "WIP"
