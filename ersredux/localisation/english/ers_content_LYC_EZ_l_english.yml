 #### EVENTS
 
 ez.1.t:0 "Fear in their eyes"
 ez.1.d:0 "Houses were burned, families were killed, the land was poisoned. But this is not enough for Aurantia. We must ensure that Olenia is devastated, that no horned creature dares to tread these lands again.\n\n- Let the mares come out first, as well as the youngest of your brood!\n\nIt has already begun. This band of changelings has occupied and taken upon themselves the task of exterminating all the inhabitants of a small village. The deer were thrown out of their own homes at gunpoint, forcing them to stumble and fall on their disgusting faces in the mud. The villagers were herded into a small square in which they were forced to fit. They were surrounded by several soldiers, ready to shoot them at any moment.\n\n- I repeat once more. MOTHERS AND CHILDREN, COME OUT OF THE CROWD FORWARD!\n\n- Stanter, I suspect that they do not understand our language. Look into their eyes. It is as if they see aliens. They are terrified, they do not understand what is happening.\n\n- Hm.\n\nThey were all huddled in a helpless, noisy bunch. What a pitiful sight.\n\n- Those of you who understand our language, come forward!\n\nChangeling said this menacingly and clearly, and the Deer people fell silent. One came out of the crowd.\n\n- Ha. Ha-ha! The pig came out at the call of the master. Well, how well do you speak our language?\n\n- Please... Don't kill us. We are simple people, we do not need much. Please. We will even give you provisions so that you do not starve. Just do not touch-\n\nChangeling with a tired look took out his revolver. The next moment the deer's body fell into the mud.\n\n- What's the order?\n\n- Start herding them into that big barn over there. I think they'll all fit in there."
 ez.1.a:0 "And then burn the barn."
 
 ez.2.t:0 "At the Border"
 ez.2.d:0 "- Are you sure we'll find anything interesting patrolling along the border? It's boring. I suggest we stay at our post.\n\n- Oh, come on! Let's take a walk. Otherwise, you'll spend your entire service sitting at your post.\n\nThe two changelings were guarding a post located near the Lyctidio-Olenia border. But since Olenia capitulated, they were essentially guarding the border between Lyctis and the Lyctidia colony, so nothing interesting was happening. Their walk shouldn't take long.\n\n- Hey, look. What's that?\n\nThere were some peaks visible in the distance. A huge line of peaks sticking out of the ground.\n\n- Oh, that. That's how we demarcate the territory of Lyctis and Olenia. That is, this is there is a border.\n\n- Wait, those aren't just spikes. There's something on them...\n\nThe changelings came closer to the border. And indeed, there were skulls with horns on the spikes.\n\n- Creative, right? Aurantia came up with that. I'd even say...\n\nAnother changeling doubled over - he threw up right there.\n\n- Hm? Come on, that's not so bad.\n\nWipe his face with a napkin, the changeling pointed with his hoof at one of the spikes. There was a whole deer impaled on it. And it seemed to be still alive, despite being pierced with rusty metal. But it seemed the birds didn't think he was alive, and a flock of crows flew down on the body and started pecking at the deer."
 ez.2.a:0 ""That's not so bad.""
 
 ez.3.t:0 "The Black God"
 ez.3.d:0 "- I am Death, therefore I exist. I came to this land for one purpose - and that purpose I will fulfill. Then from the bones and ashes a new kingdom will rise, my subjects will be Death and Sorrow. And in the new kingdom I will be known as Veden, and I will be like the gods for all that I have done."\n\nVon Krieger conveniently set up temporary headquarters in the former Olenian temple. When alone, Krieger recited prayers to gods known only to him. Truly, this land was doomed from the moment the Beast set foot on it."
 ez.3.a:0 "I am Death, I am Destruction."
 
 ez.4.t:0 ""Getting ready for the campaign...""
 ez.4.d:0 "Near the city of Hovenhamn, there was a sinister concentration camp, of which there had already been a great many in Oleniya. The camp was not set up in the city itself, because the destruction and concentration of gas in it were unbearable for the most steadfast changeling soldiers with the best equipment.\n\nIn the morning, the captured Olenians were brought out into the street. There were several hundred of them or so. Sergeant Gorax was supposed to make a more accurate count. He was young and had an ardent nature, and when the war began, he happily signed up as a volunteer to "experience new sensations in war." He had killed many soldiers and was proud of his superiority. He could shoot any Olenian during a patrol - and nothing would happen to him. With these thoughts, whistling, he continued counting the Olenians lined up in a column. But among he came across something he hadn't expected. A small fawn stood in the column and looked straight at the changeling. Very young, about ten years old. Although Gorax had met deer on the battlefield, this was the first time he had seen such a young fawn so close. And the baby looked at the soldier and mumbled something to himself.\n\n- What are you muttering about? Do you want trouble? Come on, shut up, and no one will do anything to you.\n\nBut the fawn didn't stop. Only then did Gorax realize that he was humming a melody. Strange for a changeling - it seemed both melancholic and encouraging. Not knowing how to stop him, Gorax simply walked on. After passing several prisoners, he heard that they had also begun to hum a melody. So, very soon the entire chain of Deer was singing a folk tune, putting the changelings into a stupor. Over time, the crowd grew bolder, and instead of mooing, the Deer began to humming the words of a song in the Olenian language. The song echoed throughout the camp.\n\nA Olenian collaborator was brought to the camp commander. Although orders from the top were to spare no one, being able to communicate with the crowd of Olenians was very useful.\n\n- What are they doing?\n\n- They are singing, Herr Commander. Singing a song that is as old as the world.\n\n- Is it clear WHAT they are singing?\n\n- It is a song about a young Viking who fell in love with a young Olenian girl. But he decided that he would ignore this feeling and go on a campaign to plunder the lands with his comrades. During the campaign, the Viking sensed that something was wrong and returned to his homeland. There he found that his home had been destroyed, and, more importantly, his love had been stolen by the alien beetles from the east. The song ends with the Viking finally admitting that loves the fawn and vows to go to enemy lands and maybe sacrifice himself to save her.\n\nThe commander looked at the crowd with disdain. The changelings present had different reactions, but it was Gorax who felt something strange when he remembered the baby. Something that did not give him peace.\n\n- I see. I order the garrison to shoot a couple of singers to shut them up.\n\nGorax went to carry out the order. He shot two adult males without any effort, but ran into the baby again. The fawn looked at him with hatred.\n\n- You... It's your fault. It's your fault they were killed. If it weren't for you...\n\nThere was an unnatural tremor in his voice for a soldier."
 ez.4.a:0 "You just made yourself the worst enemy of Liktida, and there is only one approach to enemies."
 ez.4.b:0 "Although, you are not guilty of anything."
 
 # ez.5.t:0 "Break Them Down"
 # ez.5.d:0 "Two snipers in the Hjörtland concentration camp watched the life inside the walls from their tower. It was a common thing for the Olenins to be taken out of their cages and then shot one by one. The two snipers were getting tired of betting on who would die first. And today was the day that the process that had caught their attention began.\n\nAs usual, the Olenins were herded into a bunch and then lined up in several rows. The camp commandant stood in front of the columns of Olenins. The snipers couldn't hear what he was saying, but he was clearly launching into a tirade about something serious. Then a box was brought to him. From the box he took out a bag. It was small, but the snipers could see that there was something alive and moving in it. The commandant raised the bag menacingly, as if threatening to throw him onto the concrete floor, but a certain female deer ran out of the crowd. It was clear that she howled, bowing before the commandant. The snipers found this an absurd and funny sight.\n\nThen the commandant hit the female deer in the face with all his might with his free hoof, pouring verbal dirt on her, as if reproaching her for her misdeed. With the bundle levitating from the magic of his horn, he approached the concrete wall. The female deer, only now recovering from the blow, stood up and screamed so shrilly that the scream of her voice reached the snipers, although the words were still indistinguishable.\n\nThe commandant approached the wall of the camp almost point-blank. Gathering all his strength, he hit the vertical concrete with the sack. Then again, and again, until the sack stopped twitching and was stained with blood from the inside.\n\nThe female deer, looking at this, was silent. An expression of horror and despair froze on her face, and soon she fell to the ground, exhausted.\n\nWhen one of the snipers returned from a break, he told them what had happened. The soldiers who had been watching the process from close range said that it all began like this. Last night, the drone guards found a certain doe hiding a newborn fawn..."
 # ez.5.a:0 ""Blessed is he who will smash the heads of your babies on a stone.""

 ez.6.t:0 "Nothing else"
 ez.6.d:0 "A soldier from the western camp number 81 stared boredly at the sky, covered with a black veil. They say that such a sky is everywhere now - it is smoke from fires, bonfires and furnaces in which the corpses of wild animals are being burned right now. Each time his face filled with excitement when he managed to see the sun among the clouds of smoke beam. Periodically this idyll was interrupted by a strong cough - as luck would have it, he was one of those who did not get gas masks. He was forced to inhale unfiltered air poisoned by the stench of chemicals and lead, although the commander claimed that it should not cause much harm to health. A fellow soldier joined him, and now they were both looking at the monotonous black sky.\n\nA few hours later, Hans was already standing on the parade ground with all the other soldiers. Their commander announced that finally all the soldiers could return home. Having announced the gatherings, deadlines and tasks that needed to be completed before departure, the commander dismissed the soldiers.\n\nHere Hans is already collecting his things, and also helping his people in preserving the temporary camp.\n\nSoon he was already rushing to the column of trucks preparing to leave. The soldiers were smoking and discussing something among themselves, and someone was silent, but shared the general joy of the modest smile. Although, Hans could barely see the true emotions of his fellow soldiers through their gas masks. Both the soldiers and the vehicles were treated with some extremely smelly stuff, they said - disinfection. \n \nOn the way, Hans looked out the window of the truck. Sometimes he saw cities, or rather, what was left of them. Black earth and ruins, smoking and empty, flashed and disappeared, reminding him of all the days that Hans spent here. \n \nThat's right. They had sat on this land for too long. The land that was now unofficially called the Dead Land. The column of trucks drove through the iron gates, which then closed forever. \n \nHans had no family and he simply returned to loneliness in his small house. Even when he left the Dead Land, the cough did not leave him, but only got worse, sometimes spitting out blood. \n \nHans did not ask anyone for help. He just lay on bed, looking at the sky through the window and rejoicing that in his last minutes he sees a blue sky."
 ez.6.a:0 "And no one will come."
 