 unc.29.t:0 "Revenge"
 unc.29.d:0 "Unwilling to accept his defeat, Ernest Platinum ordered the carriage to be re-equipped in the crystal lands."
 unc.29.a:0 "Revenge"

 unc.31.t:0 "White Hawk"
 unc.31.d:0 "It's no secret that terrorists from the ultranationalist organization Union of National Purification are trying to destroy our country. We're trying our best to destroy them, but it looks like we're not alone in this fight.The so-called "Hawk Gang" has long been very popular. This band of mercenaries has performed very well in the battles against terrorist groups in the Midland, without losing a single battle and destroying countless of our enemies. The gang consists of representatives of different races, and is led by Pegasus Griffith, known as the "White Hawk". It is reported that his strategic skills exceed any of our generals, and the King had the thought that such a skilled leader would be useful to the great Unicorn army..."
 unc.31.a:0 "Send him an offer to join the royal army as a commander."
 unc.31.b:0 "PEGASUS??? He cannot even dream of being an equal among our unicorn soldiers!"

 unc.32.t:0 ""
 unc.32.d:0 "Two nobles were leisurely strolling through the royal garden in Bales. Very few people are allowed here, but these two were powerful enough to allow themselves such a walk.\n\n— This young heiress is a thorn in our side. She's so young and she's already causing so many problems. Imagine what she would do if she ascended to the throne?\n\n— "If?" Pf, she will definitely become a ruler. The king won't rule forever. I bet he'll spit on all our ancient traditions and declare her the heir before she's eighteen!\n\n— What a shame! It would have been better if Baravia had declared its independence from Unicornia by then.\n\n— And why is that?\n\n— I have connections with the relatives of the Duke of Barawa. I can leave here. Just to get away from the damn Platinum family. And from that splinter in particular.\n\n— AHA! So that's what the nobles think of me!Literally out of nowhere, a young unicorn appeared behind the nobles. She was wearing a student's uniform, but she looked at them as if they were just her subjects. Suddenly, the pony stood up in a menacing, victorious pose and pathetically pointed her hoof at the two nobles.\n\n— Guards! Execute them!\n\n— Charlotte!An older unicorn pony came panting to the place. Everyone knew her as Ferneza, the nanny of a young fourteen-year-old princess. After all, her mother is dead, and her father is too busy with royal affairs to devote more time to her.\n\n— Please forgive Charlotte, Your Excellency...Phernese apologized to the nobles for a long time and pointlessly, to which they only snorted and left.\n\n— Charlotte... I could still forgive you for running away from arithmetic lessons, but what you said to them... Were you going to "execute" them?\n\n— Yes, yes! I'm a princess! Well, the king's daughter. So I'll be the queen. And I read in a book that kings can execute anyone they want!\n\n— What... Where did you read about it?\n\n— In the history book. I liked the moment when Unicornia was on the verge of collapse because of the then ruler Julian. He was so short-tempered and clueless that he executed anyone who even looked askance at his bizarre hairstyle...\n\n— It was the wrong book. You should stop reading it. It was probably written by some French. Now, please be kind enough to return to class."
 unc.32.a:0 "Whatever you say, Ferneza!"
 
