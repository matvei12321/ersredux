 ##### PARTIES

 ##### CHARACTERS
 UNC_king_platinum:0 "King Ernest Platinum"
 KING_PLATINUM_DESC:0 ""Why change something if it's already working properly? Progress can wait."\n\nThe Platinum Dynasty is one of the oldest in the world. For thousands of years, even before the formation of the first Griffin Empire, Unicorns lived and developed under a single banner of the Platinum family.pSam King Platinum is currently very old, although he uses magic to maintain his body at a relatively young age. He is very conservative and believes that Unicorn has reached the peak of stability and power. But it remains to be seen how the merchants of Manehattan, the commissars of Philadelphia, and the revolutionaries of Stalliongrad will behave in the future..."
 UNC_unknown_leader_of_unp:0 "Unknown leader of the NDF"
 UNC_rarity:0 "Rarity Maidens"
 UNC_twilight:0 "Twilight Sparks"
 UNC_twilight_desc:0 ""I'm sure magic won't be able to save us when the war starts. But automatons and new weapons will be able to."\n\Ptwight Sparks is a materialistic unicorn who despises magic. She had once tried to learn magic, but had failed catastrophically in her last exam, realizing that years of studying magic had been wasted. Now she's trying to find herself in another field of science, and she seems to be doing well. She is Tesla Charm's junior assistant, and sometimes does some errands for him."
 UNC_tesla:0 "Tesla Charm"
 UNC_tesla_desc:0 ""One day, I swear that one day I will create a perpetual motion machine. And I will not know sleep and rest until I have an epiphany of how to make this dream come true.""
 UNC_trixie:0 "Trixis Le la moon"
 UNC_trixie_desc:0 ""It's not a good idea to bother the Great Trixis, the heiress of the mighty Le la Moon family. But if that's the king's will, then so be it, I'll do a couple of things for him.""
 UNC_victoria_ouren:0 "Victoria Ouren"
 
 UNC_field_marshal_1:0 "Shining Armor"
 UNC_field_marshal_2:0 "Marie Greytalon"
 UNC_corps_commander_1:0 "Otto de Carey"
 UNC_corps_commander_2:0 "Irene Stormhorn"
 UNC_corps_commander_3:0 "Albrecht Jaurese"
 UNC_corps_commander_4:0 "Gerhart Sanhoof"
 UNC_corps_commander_5:0 "Sarah of Midland"
 UNC_corps_commander_6:0 "Eva d'Orleans"
 UNC_corps_commander_7:0 "Rickard Weber"
 UNC_corps_commander_8:0 "Heinz Hamelin"
 UNC_corps_commander_9:0 "Adol Schmitler"
 UNC_corps_commander_10:0 "Julien Graf-Antonin-Hamelin-Berglen"

 fucking_griffith:0 "Griffith"
 
 
 ##### NATIONAL FOCUS
 UNC_royal_busyness:0 "United Kingdom"
 UNC_royal_busyness_desc:0 "Unicorns have been living in stability and conducting a passive foreign policy for many years. Let's keep this course."
 UNC_people_busyness:0 "And his happy people"
 UNC_people_busyness_desc:0 "Satiety, stability and universal prosperity - that's what Unicornia means." UNC_look_around
 UNC_look_around:0 "Attend to the affairs of the Kingdom"
 UNC_look_around_desc:0 "We are at the peak of our power, but this does not mean that the work is over. Our king is a wise ruler, and he will maintain the greatness of the Kingdom."
 UNC_problem_moments:0 "Problematic moments"
 UNC_problem_moments_desc:0 "Maybe there are a few... Undesirable elements in our Kingdom: insubordinate vassals, terrorists, and the plague. But none of this poses a real threat."
 UNC_STG_problem:0 "Children of the Revolution"
 UNC_STG_problem_desc:0 "There is absolutely no logic or selfless aspirations in their actions. The Communists just wanted to destroy our centuries-old kingdom in one revolution! But that's never going to happen. And now we will decide their fate."
 UNC_STG_no:0 "Our greatest mistake"
 UNC_baycall_reintegration:0 "Reintegration"
 UNC_baycall_reintegration_desc:0 "Initially, the Baikal region was dominated by Northerners. But under her control, the rebels got it! The Northerners government has failed in its tasks, so now Baikal will be managed directly from Bales."
 UNC_STG_no_desc:0 "The revolutionaries must be destroyed! It is necessary to prepare forces to invade Baikal and advance deep into Krasnaya Severyana. Although such a step is quite radical and will be condemned by our society, we are ready to make sacrifices to regain our rightful lands."UNC_STG_yes:0 "Recognize communes"
 UNC_STG_yes_desc:0 "Our forces are insufficient to suppress the revolutionaries. And we basically don't want unicorns to die in the war, so we recognize the Northern Communes as an independent state. The Northerners loyal to us will condemn this, but what you can't do for the sake of peace on the borders."
 finish_war_faster_tt:0 "\n§Rthe war needs to be completed in 35 days.§!\n§If successful:§!\n We are annexing the borderlands§! communes.\n§In case of defeat:§!\n     §R-5%§! stability.\n     §R-10%§! war support."
 UNC_our_puppets:0 "How are the vassals?"
 UNC_our_puppets_desc:0 "Our largest possessions are the Northerners and Prancia. They constantly want to slip out of our sphere of influence, but we will tighten our grip and put an end to the Northern communists and the French nationalists."
 can_influence_puppets_tt:0 "Unlocks £decision_icon_small §Solutions§! that eliminate §R Threats§! in the oldest vassal lands.§!"
 UNC_SVR_problem:0 "Star of the North"
 UNC_SVR_problem_desc:0 "There has been something going on in the North lately besides the fight against the Red revolutionaries. But we don't think it deserves much attention... All we demand from Northerners is loyalty and subordination to us."
 UNC_prance_problem:0 "To suppress French nationalism"
 UNC_prance_problem_desc:0 "The damned revenge guards are unlikely to calm down any time soon. But, in fact, the Prance is weakened so much that it will not be able to pose any serious threat. There can be no restoration of the "Great Prance".\n\n It's better they continue to export their wine to us!"
 UNC_northern_puppets:0 "Status of the Northern lands"
 UNC_MNH_problem:0 "Independent Merchant Guilds" 
 UNC_MNH_problem_desc:0 "Our king has sold some lands to the management of influential merchant guilds. It would seem that this solution is perfect and has no disadvantages, but these guilds, as before, did not depend on the Crown, and now they are completely independent.The Manehattan Federation should be our vassal, and it's time to remind them of this."
 UNC_plague_focus:0 "A dying city"
 UNC_plague_focus_desc:0 "Death reports in Philadelphia do not sparkle with good forecasts. We need to send some humanitarian aid to the exclusion zone."
 UNC_hide_plague_info:0 "No panic"
 UNC_hide_plague_info_desc:0 "Until now, we have not disclosed the fact that the plague is raging in Philadelphia. But just keeping quiet about it is not a very effective way to maintain stability, so we will stop all rumors that something bad is happening in the big city."
 UNC_alliance:0 "To consolidate the unity of our lands"
 UNC_alliance_desc:0 "The best way to ensure the loyalty of our puppets to us is to form a full-fledged alliance with them. Closer ties will ensure our prosperity for many years to come."
 UNC_inside:0 "Internal situation"
 UNC_inside_desc:0 "How nice it is to have officials and feudal lords who show complete obedience and obedience. They effectively manage our lands and don't even think about participating in corruption.There is simply no corruption in Unicorn, thanks to our King."
 UNC_check_the_industry:0 "Just look at our industry!"
 UNC_industry_researches:0 "Truly, the workshop of peace"
 UNC_our_neibghours:0 "Relations in foreign policy"
 UNC_our_neibghours_desc:0 "Although unicorns are superior to all other races, we cannot simply isolate ourselves from other states, no matter how wild they may be."
 UNC_wild_pegasi:0 "These... Savages"
 UNC_wild_pegasi_desc:0 "We have always seen Pegasi as bloodthirsty, dirty and uneducated creatures, otherwise nothing has changed over the years. There is peace and order in our kingdom, and the Pegasi are always solving some problems. This means that our society surpasses Pegasus at times."
 UNC_support_los:0 "Rather an exception"
 UNC_support_los_desc:0 "Las Pegasus is a real miracle. Where else can you see educated and intelligent Pegasi who not only can read and write, but also do not fight with everyone? We will make an exception by paying attention to them."
 UNC_wild_thestrals:0 "And more savages"
 UNC_ERP:0 "Not so great, but loyal friends"
 UNC_crystal_ponies:0 "Crystal Ponies"
 UNC_griffons:0 "Resume gryphon diplomacy"
 UNC_olenians:0 "The Great Western Kingdom"
 UNC_changelings_threat:0 "Nasty bugs"
 UNC_changelings_threat_desc:0 "We do not have and do not want to deal with changelings. There is one simple reason for this: they are nasty bugs. If anyone finds this offensive towards changelings, have you seen them yourself? It's like meeting a cockroach that is a hundred times bigger than its relatives. It's disgusting! Unicorns will never stoop to communicate with such creatures."
 unc_no_effect:0 "§At the moment, this focus thread has no practical effects, but you can run through it to learn a little about Laura Unicorn and her relationship to other countries through cosmetic events.§!"
 UNC_aristocrats:0 "Nobles and feudal lords"
 UNC_more_aristocrats:0 "Give them more privileges"
 UNC_more_aristocrats_desc:0 "Let our beloved feudal lords bathe in money and throw it into the sea."
 UNC_young_princess:0 "The Young Heiress"
 UNC_young_princess_desc:0 "The monarchy in Unicorn is a complex system, according to which the children of the monarch are considered heirs only from the age of 18. Until then, they are just princes and princesses, and in the event of the sudden death of the current king, they will not receive the rights to the throne until they come of age. Such a time-tested system definitely does not need reforms."
 princess_in_3_years:0 "§The Princess§! He will receive the rights to the throne upon reaching the age of majority in the year C1011.§!\n\n§R If something happens to the king and this trick is not performed, expect the consequences.§!"
 UNC_party:0 "For our unity!"
 UNC_party_desc:0 "The Grand Galloping Gala is a grand festival that has been held since the founding of the Kingdom. It is held in order to show the society that Unicornia is stable no matter what the trials. It also allows you to consolidate feudal unity - aristocrats who come from all over the country will swear allegiance to the Crown over a glass of French wine."
 UNC_party_good:0 "For our excellence"
 UNC_party_good_desc:0 "Everything went well. What could possibly go wrong?"
 UNC_party_good_2:0 "High society"
 UNC_party_bad:0 "Sometimes something doesn't go according to plan..."
 UNC_party_bad_desc:0 "Damn terrorists!"
 UNC_party_bad_2:0 "Strengthen security measures"
 UNC_party_bad_2_desc:0 "Due to the recent incident, we will strengthen police control in our lands... until the society calms down."
 UNC_fin:0 "Light in the midst of ignorance"
 UNC_fin_desc:0 "As we expected, the Kingdom is still standing strong. Only occasionally do non-fatal trials occur, which simply harden us."
 UNC_servants_of_god:0 "Servants of God"
 UNC_servants_of_god_desc:0 "The Church has supported our dynasty in all its endeavors for centuries. In addition, the clergy in Castelvania are engaged in protecting the whole world from universal evil. They definitely deserve a special status in our society."
 UNC_lower_army:0 "New summoning order"
 UNC_lower_army_desc:0 "In the next few decades, our competent politicians do not predict any wars - none of our neighbors have any reason to attack us. Then why do we need to develop an army? Even now it is considered one of the largest in the world, besides, we have invincible tank cars. We should reduce the rate of conscription into our army and generally give some soldiers a break from service. The period of peace and prosperity continues!"
 UNC_international_council:0 "Shield of a stable world"
 UNC_peasants:0 "Think about the problems of the lower classes"
 UNC_lower_training:0 "Reduce military spending"
 
 mojet_osudit_pegasov_flag:0 "If §Y[PGS.getname]§! If it attacks our friendly neighbors (§G[ERP.getname]§!, §G[PRG.getname]§!, §G[MNH.getname]§!, §G[SVR.getname]§!, §G[CRY.getname]§!), we can §Ship§! them."
 los_will_join_faction:0 "If the state is Y[LOS.getname]! If they agree, they will join our alliance when we fulfill the focus of consolidating the unity of our lands!"
 


 ##### DECISIONS 
 
 
 ##### IDEAS
 UNC_monarchy:0 "An established monarchy"
 UNC_monarchy_desc:0 "For many years, Unicornia lived under the glorious rule of the Platinum family, developing rapidly and making great strides forward. No peasant revolutions or even the invasions of strangers from the south could shake the eternal regime of the monarchy.Gods save the King, Queen and their children!"
 UNC_monarchy_1:0 "The established monarchy"
 UNC_monarchy_1_desc:0 "Even though our blessed monarch is not feeling at his best, the country is still as stable as ever. We hope Platinum gets better."
 UNC_corrupted_aristocrats_idea_1:0 "Loyal Aristocracy"
 UNC_intelligents:0 "The state of society: §Gintelligence dominates§!"
 UNC_intelligents_desc:0 "If you are not an ordinary worker in Unicorn, then you are a noble who owns a worker. It was this situation that led to the uprising of peasants in St. Petersburg, but it does not seem that the events of many years ago worried anyone.The intelligentsia - the nobles and various feudal lords - are a rich, cultured and highly intelligent caste in our society. They advance science and art, but drag down military development, believing that this way they can prevent the onset of war, which would deprive them of their noble status."
 UNC_workers:0 "Decadent"
 UNC_workers_desc:0 "Aristocratic unicorns prefer to offload hard work on others, be they servants or less influential unicorns. Some peasant owners go too far in their management, which causes protests in small towns."
 UNC_closed_from_griffonia:0 "Careful trading"
 UNC_closed_from_griffonia_desc:0 "Once upon a time, open trade with griffins has already brought us misfortune. We try our best not to repeat past mistakes again."
 UNC_rainbow_factory_effect:0 "§Negative effect§! from the Weather Factory"
 UNC_timed_trade_with_MNH:0 "Goods from loyal Manehattan"
 UNC_closed_politics_idea:0 "Frozen Foreign Policy"
 UNC_closed_politics_idea_desc:0 "Despite the loud statements that Unicorn preserves stability and order on the continent, unicorns have not intervened in any conflict that took place in Equus in recent decades, unless it directly threatened the stability of the country."
 UNC_closed_politics_idea_1:0 "Frozen foreign policy"
 UNC_closed_politics_idea_1_desc:0 "Despite the loud statements that Unicorn preserves stability and order on the continent, unicorns have not intervened in any conflict that took place in Equus in recent decades, unless it directly threatened the stability of the country."
 UNC_think_about_people_idea:0 "Minor concessions to peasants"
 UNC_less_trainings:0 "Reduced military budget"
 UNC_little_conscription:0 "Mitigation of terms of service"
 UNC_sell_lands_for_UNC:0 "Sale of land"
 UNC_sell_lands_for_MNH:0 "Pay for the land"
 UNC_unp_rising:0 "SNO is on the rise"

