 unc.34.t:0 "Meeting"
 unc.34.d:0 "— Ferneza! Ferneza! I saw a pony with wings in our castle!The young princess rushed to the teacher almost in tears.\n\n— Well, calm down. Does this pony happen to have a snow-white color and blue eyes?\n\n— Sort of. What a horror! Why hasn't he been caught yet?\n\n— You see... This pegasus's name is Griffith. And even though he's a Pegasus, he can... to benefit our country. Which is what he's been doing lately, ever since the king accepted him into the army.\n\n— Nonsense! He's just a pegasus! He doesn't have any horn, which means there's no magic! He can't be useful!The Princess turned around and saw the same Griffith walking through the halls of the palace with some of his subordinates. One of them, an unpleasant-looking griffin, heard Charlotte's claims.\n\n— Oh, you little one! How dare you say that about Griffith?! I'm not going to look at you for blue blood or any other nonsense, I'm going to-\n\n— Calm down, Corkas. Keep up appearances.\n\pSam the leader of the squad intervened in the conversation. The griffin fell silent, and Griffith looked at Charlotte in such a way that the young princess froze in place. There was something in his gaze... No, it wasn't fear, but some other feeling. The feeling that brought Charlotte to a standstill.\n\n— And you take care of yourself, Your Majesty. And I ask you to forgive the ignorance of my comrade-in-arms.\n\n— U-gum...  That was all she could say.\n\Pegasus just smiled sincerely in response. Then the squad left, and the rumble of armor continued to echo through the halls of the castle. It seems they were on their way to a war council. And Charlotte was just thinking: what was that? How did this pegasus affect her so much with just one glance? There was no malice, arrogance, kindness, or any other emotion known to Charlotte in his eyes. But it was as if his mere presence solved the situation the way he needed to."
 unc.34.a:0""Well, no... he definitely has magic!""