 #### TOOLTIPS
 
 accepted_griffith_flag_tt:0 "Hire a general: §UGriffit§!"
 
 
 
 #### EVENTS
 
 
 unc.1.t:0 "The life of a simple pony"
 unc.1.d:0 ""Our aristocrats are, without exaggeration, in bliss. They have dozens of privileges, the Crown protects their honor and property, and military service is not provided for them at all. But what about simple ponies? Let's look at the Northerners. Indeed, the region is cold and not the most developed: it is not surprising that some workers live on the verge of poverty. But when you see a similar picture here, in the capital of civilization Equus-\n\n- Uh, where did you go? Are you writing a report for the King or a plaintive memoir? Let's do it like a tutorial: everyone is happy, but the peasants are throwing up rainbows.\n\n- Actually, we clerks have to write truthful reports...\n\n- So you'll write the truth! And you'll miss a couple of moments about the peasants.\n\Parwrest is already used to this state of affairs. Perhaps he would give up trying to convey the unpleasant truth to the Crown.The workers are happy and completely loyal to their ruler. And they certainly haven't staged strikes lately."
 unc.1.a:0 "Who cares about them?"

 unc.2.t:0 "Big possessions are a big responsibility"
 unc.2.d:0 "Once upon a time, Henrich Grimmler sold us a significant part of Prance, and so the whole kingdom disappeared. Now Prance is just a duchy, and it is unlikely that the French will forget and forgive us for this. But as long as Prantia is ruled by a loyal Unicorn aristocrat, everything should be in relative order.\n\The confusion is one big misunderstanding. Everyone in Unicorn is loyal to their King, and the unicorns of the cold lands cannot resolve their social conflict in any way. The leaders of the Northerners loyal to us claim that it was despotism that led to the revolution, but they themselves should have kept order on their land better.\n\Manhattan... What's wrong with it? As long as these merchants act in our interests, we can call them dependent on us. They obey us, don't they?\n\pA Fillydelphia... The reports of hundreds and thousands of deaths sent from there are simply nightmarish. We will pray for Philadelphia and its people."
 unc.2.a:0 "But all problems always resolve themselves, right?"

 unc.3.t:0 "Unicorn demands submission"

 unc.4.t:0 "Partial agreement"
 unc.4.d:0 "The merchants of Manehattan have heard our demands, but they have informed us that there are certain circumstances that will not allow the Guild to become completely dependent on the Crown. But Flim and Flem, the leaders of the Guild, agree to supply more goods produced and purchased by Manehattan."
 unc.4.a:0 "Oh, these capitalists."

 unc.5.t:0 "Merchants' refusal"
 unc.5.d:0 "It seems that the Merchant Guild does not want to strengthen ties between Unicorn and Manehattan, referring to the fact that under the Manehattan land sale agreement, the Guild has every right to conduct any activity regardless of the will of the Crown. This has undermined our credibility."
 unc.5.a:0 "Damn!"

 unc.6.t:0 "Successful campaign against communism"
 unc.6.d:0 ""The recently launched operation to decommunize the Baikal part of Severyan turned out to be successful! No one doubted its outcome. Our officers plan to move further into the territory of the revolutionaries all the way to Princessin. Victory will be ours!"\n\This message was received by the King from the General Military Staff at 15:00. But already at 15:46 a similar telegram arrived... But not with such rosy forecasts anymore.\n\n"Our troops cannot continue advancing. Our forces conducted Operation Bullseye, which consisted of crossing Lake Baikal directly to launch a surprise attack by enemy forces on the other shore. But because of... not the most competent command and inadequate equipment, many soldiers drowned without ever reaching land. This is not taking into account other failures at the front. We may have advanced in the offensive, but our losses are simply absurd. The Supreme military Command of Unicorn announces the end of the operation to decommunize the Northerners.""
 unc.6.a:0 "But it's still a success, right?"

 unc.7.t:0 "Failure of the campaign"
 unc.7.d:0 "It's a nightmare. Our forces turned out to be insufficient to at least move forward in the front line! The King officially announced that this campaign would be completed in less than 70 days and with absolutely no casualties.. It seems like he underestimated the rebel forces a bit. Besides the fact that the peasant army held back our attack, the partisan detachments went on the offensive and sabotaged the supply in our camps. The PARTISANS have gone on the offensive!\n\n This campaign should not be continued. After all, Unicornia has more important things to do than the Northern "socialists"."
 unc.7.a:0" Ahem."

 unc.8.t:0 "Wine is pouring"
 unc.8.d:0 "The Grand Galloping Gala is not just a wonderful night where rich and famous unicorns from all over the country can meet and have a good time. This is the culmination of our journey. Every year, since the founding of the Kingdom, we have been holding this celebration, and it has always been great: the best wines are served, the best fireworks sparkle in the air, and the latest masterpieces by Unicorn composers are played on stage. It is this luxury that means that the unicorn can afford everything, unlike other, less great races. For example, is it possible to imagine something like this in dirty Pegasopolis?\n\n— Le Patron, really, a stable and peaceful period awaits us this year, so say the astronomers-stargazers.\n— And do you believe in this astronomical nonsense? Ho, if I were the king of Platinum, I would allocate more finances for snacks at the table than for this pseudo-science. There are always not enough lobsters!But two people stood out suspiciously among the crowd. They did not communicate with each other, did not cross eyes with anyone and sought to be closer to large gathering places of guests. In addition, one of them carried a rather strange box with meticulous care.Meanwhile, the event continued."
 unc.8.a:0 "To your health!"
 
 unc.9.t:0 "Tick."
 unc.9.d:0 "The atmosphere of celebration lasted all night. The aristocrats had a cultural rest, talked, and closer to midnight they began to talk about the fact that the king himself would soon come out with an address.\n\n"So, how many minutes are we going to set?"\n\n"The devil doesn't know when this grandfather will show up. But he's going to talk for a long time. We set the timer for fifteen minutes. During this time, we'll have time to slip away, and the king will bring his croup here."\n\n12:13. So.\n\n"This year has been difficult, including for me personally. The tragedy claimed the life of my only and beloved wife Ernessa. The damn terrorists took her life, but her memory will never be forgotten. That is why I dedicate today's fireworks in her honor, and may she see from heaven that she is still loved!"\n\Bird-like."
 unc.9.a:0"Boom."

 unc.10.t:0 "Great time"
 unc.10.d:0 "— Damn, where is Mr. Le Patron?\n"Look! I think I've found him!" After making their way through a small crowd, two unicorn deliverymen appeared in front of Count le Patron.\n\n"Your lobsters are delivered, the temperature should not have changed if the temporary spell has not lost its effect yet."\n"Great! This is truly going to be a perfect night."\n\That's how it went. As the clock struck midnight, King Platinum himself appeared on the main stage with his only daughter and guards. The Queen's seat was empty, but that didn't dampen his high spirits at all.The king made a promising appeal to all the gathered aristocrats and said that the fireworks that night would be dedicated in memory of his deceased wife. A bright explosive show in the sky depicted Ernessa Platinum herself and her life path. After honoring the memory of his beloved and only wife, Platinum and his daughter and retinue retired to the palace."
 unc.10.a:0 "Who will finish yesterday's salads?" 

 unc.12.t:0 "Party with nobles"
 unc.12.d:0 "The King has gathered his courtiers for a gathering. He announced that he was ready to play a chess game with three of the smartest unicorns among his entourage. And there were some. And so, the start of the chess game was announced."
 unc.12.a:0 "May this battle of wits be fair!"

 unc.13.t:0 "Disappointment"
 unc.13.d:0 "— Everything is fixed! These are the worst parties of my life!It would seem that the king should rejoice at the victory, because he smashed his rivals to smithereens. But still, he was extremely displeased.\n\n— And you think THIS is a fair game? You don't want to win, no you don't want to resist, so as not to ruin your image in my eyes. This easy victory means absolutely nothing to me when the opponents deliberately give in. What a humiliation!"
 unc.13.a:0 "I need better opponents."

 unc.14.t:0 "The Last Battle of Baravia"
 unc.14.d:0 "Duke Frederick of Baravia is known among all Unicorn vassals for his ability to play chess. However, he was very surprised when he received a letter from the King himself inviting him to play a game. The Duke of Varavia thought about this proposal - after all, Baravia, conquered by Unicornia a thousand years ago, gets a chance to defend its honor at least in a game like chess. There was a question about the honor of his ancestors. In the end, Griderich decided to fight.Upon arriving at the Bales Palace, Friedrich only exchanged a few words with Ernest to comply with formalities. He came here with one goal."
 unc.14.a:0 "Your move, missier."

 unc.15.t:0 "Choice of move"
 unc.15.d:0 "The game was intense. Ernest saw strength in his opponent, but he was far from a novice himself. And so, in one move, he saw an opportunity. By moving the rook into the opponent's field of control, he will open the way for a grand attack. This could be a combination that chess history has never seen before. But if Gridrich understands Platinum's train of thought... this means total defeat. On the other hand, he can make a move with the queen, making a check. This move will be trivial, but time-tested. However, the chess layout on the board allowed both players to gain an advantage in the event of such a move."
 unc.15.a:0 "I will make a risky move!"
 unc.15.b:0 "Let it be a measured game without impertinence."

 unc.16.t:0 "Victory "
 unc.16.d:0 "— Ha, perhaps this is a historical pattern, don't you think so, Gridrich?  Platinum turned to his opponent with a grin.\n\n— Yes. It's witty.\n\This is all that the Duke of Barawa replied. After this sentence, he confidently walked out of the hall and the palace, just as confidently as he entered it. But muddy and hurtful thoughts were spinning in his head. Another defeat of the Bararv kingdom... It looks like he really has the historical stigma of defeat."
 unc.16.a:0 "No one doubted."

 unc.17.t:0 "Surprise"
 unc.17.d:0 "— Checkmate! Black wins!\n\pArnest couldn't believe his eyes and ears. Had some upstart from Baravia defeated him? Some duke of a defeated kingdom was able to defeat a Unicorn monarch in a fair chess match? That was probably the reality. Griderich, despite his good manners and restraint, could not help but hide the smile on his face. The joy of such a small thing for others... But such a disappointment for Ernest.After the party, Frederick stayed at the palace for a short while to annoy the monarch. He was chatting with local ladies and gentlemen, and was clearly in high spirits.The evening before, at the end of the same day, the news reached the king that fireworks were being launched in the Baravian lands at the expense of the duke's treasury. It's unlikely that Friedrich celebrated an ordinary non-holiday like this."
 unc.17.a:0 "We'll see you again..."

 unc.18.t:0 "Revenge"
 unc.18.d:0 "King Platinum couldn't accept that the Duke of Barawa beat him. Revenge is the only right decision.\n\n- Miss Platinum, - Gridrich began his speech maliciously, - do you know that before the fall of Baravia, Unicornia tried to make more than ten military campaigns against it, and three of them did not even begin because of the incompetence of the army? Personally, I find it funny.This time, he even took several nobles from his entourage with him. And, of course, they let out an unpleasant laugh, which annoyed the king. And this fool dares to mock Unicornia itself?! Well, he definitely won't win this time."
 unc.18.a:0 ">"

 unc.21.t:0 "The baron's request"
 unc.21.d:0 "One influential baron from the lands stated that he needed to get his peasants back. He once gave a huge number of serf "volunteers" to the army, for which he found great favor with the king. However, now he thinks it's time to return the property to its rightful owner. Otherwise, he threatens to turn several major nobles against the crown."
 unc.21.a:0 "Return the peasants to the baron."
 unc.21.b:0 "They will remain in the army."

 unc.22.t:0 "Delegation to Crystal City"
 unc.22.d:0 "No one among the unicorns of Unicornia can defeat the King in chess, which means that we need to think more broadly, beyond Unicornia. He thought for a long time. Would [ERP.getleader] be a good opponent? Doubtful. Earth ponies are always digging in the ground, they haven't seen chess. Maybe [OLE.getleader]? Deer are graceful and proud creatures. Surely they can become rivals to the King. But the trip to [OLE.getname] will take too long.\n\n And then he remembered the ideal option. A unicorn that has lived for hundreds of years. Unicorn, who played the first chess game with one of the Unicorn kings. One of the wisest rulers of the past and modern times. Exactly. The trip to [CRY.getname] should not be too long.\n\n---------\ n-Somewhere near the borders of Unicorn and Princessstate-\n---------\ n\n— Hey, Helen, look! It's a diplomatic convoy with a royal carriage.  The border guard soldier seemed cheered up. You can't always see the royal convoy.\n\n— Really? It's a miracle. The king hadn't left the capital's Bales for decades, and now he decided to go abroad? It's like that... It's boring.\n\n— This means that it is a matter of national importance. Perhaps global issues will be resolved soon...Two guards saluted the convoy and silently let them through the border. After losing sight of the convoy with the royal carriage, they prayed for the safe return of the King."
 unc.22.a:0 "Who knows what might happen to him on the way."


 unc.24.t:0 "In the Crystal Palace"
 unc.24.d:0 "— Oh, Ernest Platinum? I was told that a delegation from Unicorn was heading to Princessstate, but I didn't expect to meet you in person... in times like these.\n\n— What are you talking about, Princess Amore?\n\n— I heard that the plague has come to the Kingdom. Some terrorists are constantly committing atrocities, vassals are arbitrary...\n\n— Ah, that. Don't pay attention to these rumors. The ridiculous ignoramuses just want to sow panic. The kingdom is thriving like never before... I am sure the same can be said about your country.\n\n— In my... yes. So, the purpose of your visit...\n\n— A game of chess.\n\n— Hmm. You probably know the stories that the first game of chess was played by me and the Unicorn king. It's true. The two of us came up with the rules and worked out the pieces and their moves... Don't think that you will get this victory so easily. Even though I'm a decent number of years old, I still remember ways to get into a winning situation for me from any situation.\n\n— Of course, Princess. But don't get your hopes up that an elderly stallion like me can't be a worthy rival.\n\n"Eh? Elderly? You don't look older than 40-50..."\n\nThe crystal chess table has been installed, and there are places for players too. Time has passed."
 unc.24.a:0 ">"


 unc.25.t:0 "Move selection"
 unc.25.d:0 "The game started badly for the king. The situation on the board was developing rapidly and clearly not in his favor. Several pawns of one pony have already been knocked out of the game, while Platinum has not been able to deprive Amore of a single piece. Not one, damn it!\n\n Now, a curious picture has formed on the board. Ernest had three possible paths open to him. He can aim his forces at the enemy queen and destroy her in one move - a powerful piece will be eliminated. However, at the same time, he saw that he risked losing the rook with his next move. Not that he regarded the loss of his rook and the enemy's queen as equivalent... In the end, he could have refrained from such actions, because the situation on the board allows him to organize his personal combination: the Unicorn Gambit. Amore doesn't know exactly about this combination, and he's unlikely to be able to counter it."
 unc.25.a:0 "Attack the queen!"
 unc.25.b:0 "Defend the rook!"
 unc.25.c:0 "Prepare the best positions for a perfect gambit!"

 unc.26.t:0 "Move selection"
 unc.26.d:0 "The decision to leave the rook now literally saved the king's position. During the game, the queens of both sides collided and were knocked out. Both Amore and Platinum didn't have many pieces left, so they had to contrive to gain an advantage.Now, the black king of Platinum is surrounded. No, it wasn't a checkmate, but the situation was critical. Besides, the minute was about to end... He couldn't afford a draw because of some kind of timer! He is the King! So let time itself be subject to him! In that short period of time, Ernest immediately came up with three options. He could checkmate the white king, save his king, or make a desperate attack. Platinum pushed the last thought away from himself, because in the course of such an adventure he would lose his already insignificant remnants of pieces..."
 unc.26.a:0 "Cut off enemy escape routes!"
 unc.26.b:0 "Get out of the encirclement and counterattack later!"
 unc.26.c:0 "Everything that I have, I'll just give it away!"
 
 
 
