###Events###
HRZ.1.t:0"Send out invitations"
HRZ.1.d:0"Gabriela Kramer had been sitting at her desk for four hours now, writing out letter after letter, sentence after sentence in calligraphic handwriting. It was already dark outside, and she had to work by candlelight. Yes, she had a lamp in her room, but she had become so accustomed to candlelight that she could only write by it. Her job was to write official royal letters, and her endurance, soft paw, and beautiful handwriting were perfect for this. She wrote these invitations every year, so she practically wrote them with her eyes closed. Finally, she finished writing the last invitation, put a period, and put the sheet aside. Tomorrow she would take these sheets to the Kaiser for signature and they would be sent to the countries, but for now she was very hungry..."
HRZ.1.a:0"Time for dinner"

HRZ.2.t:0"A Ruined Rout"
HRZ.2.d:0"—And where is the Archduke, Herr Kaiser?" Cecilia Gudro asked, approaching the elderly griffin. \n\n—He will be here soon, Mademoiselle Gudro, he is preparing some kind of address for us regarding his future reign. \n\nShe nodded and stepped aside to the King of Wingbardy and the chief knight of the Frontier Order, who were talking about new weapons. She, of course, understood little, but thought that it would be better to listen to their conversation. A few minutes later, the main doors opened and the Archduke entered the hall in his ceremonial uniform: a blue jacket, a red ribbon across the chest, a light gray cloak, awards and a cap of the Imperial Federation, also in the color of the jacket. He walked to the middle of the hall, and then attracted everyone's attention by knocking his glass against his glass, and then put them back. \n\n—Ahem... I'd like to tell you about the project that I'm preparing with my team of familiar ministers," he coughed again, looked at the piece of paper he was holding in his paws, but realized that it was better to speak as it is here. \n\nHe shifted from paw to paw and began to speak. \n\n—We need to start with history... let's all remember why the Frontier was created. This is the order that protects us from the hordes of ponies from the east, right? It has existed for about 200 years, and all this time it has valiantly guarded our borders, but here's the thing, - he paused. - The border has long passed through a more southern country and covers huge distances, relations with the River Federation are better than at any other time in history... I think many understood what I'm getting at... I believe that it's time to disband the knightly order of the Frontier, and include its territories in Herzland. \n\nTo say that this proposal shocked everyone is to say nothing. The harshest was the High Knight Winrich von Kniprode, who immediately began to curse. \n\n"What do you mean disband?! Herr Kaiser, this is nonsense! He wants to destroy our history! This is outrageous!" \n\nThe old griffin only looked at his son, without saying anything to him, which made the knight even more angry, and he left the hall cursing, heading for his chambers. Mademoiselle Gudro ran out after him, and the Archduke, shrugging his paws, also left the hall and went to his office, without even looking at the talking Winrich and Cecilia."
HRZ.2.a:0"The evening was ruined..."

HRZ.3.t:0"Stubborn Griffin"
HRZ.3.d:0"Cecilia ran out of the hall, hoping to catch up with Winrich, and managed to catch him in the corridor, calling out to him. He turned his attention to her and stopped. \n\n—What do you want, Mademoiselle Cecilia?! \n—I think you were hasty in drawing conclusions, Herr von Knichprode... \n—Is that so? And why? \n\nCecilia was glad that she was able to stop the old griffin. \n\n—Well, you see... I'm sure that this is a rough draft of his project, especially since, if we reason from the point of view of logic, and not emotions, then he is right, judge for yourself.... \n—And you are for him! - he abruptly interrupted Cecilia. - He wants to destroy our order, to destroy it, and what will he do then? Then he... \n—It shouldn't worry you! - also Mademoiselle President interrupted him so rudely that the griffin was even surprised. - You are a knight! You have guarded the border of the Empire all your lives, and your ancestors did so with honorable service to the Kaiser, and now the heir finally says that your task has been honorably completed and the Empire is safe, and what are you doing?! Instead of solemnly leaving your positions and leaving them to a new generation of defenders of the Empire, you, like a ram, have run into a wall and do not want to retreat! You know what, when the Archduke comes to power, I will be the first to approve of his plan to eliminate your order! \n\nShe growled, and turning around, proudly walked back into the hall."
HRZ.3.a:0"Stubborn ram!"

HRZ.4.t:0"Arrival in Aquila"
HRZ.4.d:0"The Archduke rode in a car that was in the center of a diplomatic column that was entering Aquila. The other cars were carrying his guards and other ambassadors. He loved visiting Aquila because of its beautiful architecture, some of which remained in the past, especially the central quarters. Having arrived at the Maximilian Palace, the column entered its territory. The president and several of her ministers were already standing on the steps, who immediately greeted the mission and the Archduke. Having entered the palace, the ministers went one way, and Gudro led Grover in the other direction to talk to an old friend.\n\n"Where is Maria?" Cecilia asked. "You were supposed to come with her, weren't you?"\n"Unfortunately, she fell ill and stayed in Griffenheim." with a little sadness the griffin replied. \n"Well, that's right," nodded Mademoiselle President, "the best thing for her is peace. \n"It's a pity that Maria didn't come home on this Blue Moon holiday...\n"She decided that it would be better to meet him in the circle of the imperial family. \n\nCecilia sighed, as she wanted to see her friend, then turned around and, realizing that they had nothing to talk about in principle, called him back to the ministers."
HRZ.4.a:0"It would be better to discuss military plans..."

HRZ.5.t:0"Night Talk"
HRZ.5.d:0"Cecilia was walking down the corridor of the palace when she noticed the Archduke standing on the balcony. She was surprised, as she did not expect to see him here at such a time, so she approached him, coughing a little, attracting his attention. \n\n"Oh, hello again, Cecilia," the griffin said, turning to face the president. \n"What are you doing here?" the griffin asked with interest. \n"Well, I'm resting and getting ready for sleep, watching the stars and the nature waking up from winter... your city is smaller than Griffinheim, and therefore the stars are visible better, and your nature is also beautiful... \n"Thank you," Cecilia answered with a little sarcasm, coming closer to the griffin and standing next to him. "I think you're lonely... you'll be away from Maria...\n—And I didn't know, thanks for reminding me...-snorted the griffin, turning away.\n\nCecilia quietly tried to put her paw on the griffin's paw, which the Archduke immediately noticed and quickly removed his paw, turning to the president with an irritated face.\n\n—Are you at it again?!-barked the griffin.-More than 10 years have passed, and you still continue to pester me!\n—So what? You've loved her for these 10 years, and I can't have feelings for the same length of time?-answered the griffin in a similarly harsh manner.\n—You will never be with me again! Soon I will become Kaiser, and no, I will not change my mind! The sooner you understand this, the easier it will be for you, I don't want to break off our friendship with you just like that...-the griffin began aggressively, but finished a little sadly, since he really valued friendship with her, especially if you understand that this is friendship between the heads of two states. \n—No! And I don’t plan to. She was always more beautiful than anyone, she always got the best looks and the best griffins, and what was left for a friend? Nothing! Even now, there is not a single normal male around me! Only idiots! \n\nShe turned sharply and walked away, leaving the Archduke in bewilderment and even more thought. Returning to her room, she suppressed the signs of tears and wrote in her diary: “Thursday. Evening. A small quarrel with Grover ...”. Then she put it aside and looked at the moon through her window, whose crescent was rising over the horizon. "
HRZ.5.a:0"A few more such quarrels, and I will definitely stop loving him."

HRZ.6.t:0"Starry Night"
HRZ.6.d:0"Grover and Maria were standing in the backyard of their cottage far north of Griffenheim. They were doing one of their favorite things together, namely, stargazing. Next to them was a telescope, a table with an atlas, but the most important thing for them was that they were standing next to each other and enjoying the starry sky, in which they constantly found something new, and constantly dreamed of what was somewhere out there, far away. The Archduke told his wife that her parents and her friend were upset that she did not come home for the winter holidays. \n\n—I understand, but I had to celebrate the Blue Moon holiday at least once in a new family... and still a new holiday for me... New Year. And I will not reveal to you a secret that your father did not have much time left, perhaps even this was the last holiday, so I was obliged...\n—I "I understand," the griffin interrupted her, hugging her with his wing and pulling her towards him. "But I promise you that we'll go to your village for the next winter holidays. I know how much the big city weighs on you... and I also miss your mother's gratin and fricassee. \n\nSmiling, he pulled his wife close and kissed her."
HRZ.6.a:0"We'll go home soon..."

HRZ.7.t:0"Assassination attempt in Falkor"
HRZ.7.d:0"The Archduke and Duchess got off the train in Falkor, where they were immediately met by a military orchestra. Here they were to watch the parade of the Wingbardian troops in the central square of the city. For this occasion, the flags of both states were hung, the newspaper headlines were full of loud headlines, and even the route of the imperial column was published so that everyone could see the heir to the throne. Grover and Maria left the steps of the station and got into an open-top car, this was a personal request of the Archduke, since the city was unbearably hot, and the Duchess did not tolerate high temperatures well. The route was specially chosen near the river, so that its coolness would at least somehow save the Duchess. \n\n—How hot it is here... \n\nMaria kept repeating, but her face was still cheerful, so as not to upset the huge the number of residents who had gathered along the route of the column. "I understand, dear, but we are here for one day, then we will go to Carfin, there is cooler weather, I looked in the forecast," Grover tried to cheer up his wife, deliberately hugging her in front of everyone, which was immediately captured by the nearest photographer. \n\nMaria was touched by this action, and smiling, she calmed down a little, when suddenly an explosion thundered behind and screams were heard. Turning around, they saw an overturned car that was following them. This was done by one of the terrorists of Falkor, who unsuccessfully threw a grenade, and was soon captured while trying to escape. \n\nGrover's personal driver immediately jumped up and drove as fast as possible, guided by the orders of the police chief sitting next to him, who showed the way. Arriving at the Falkor town hall, Grover sharply cursed all the ministers and the governor standing in front of him. \n\n—What "What are we going to do, dear?" Maria asked nervously, clinging to her husband.\n"I want to spend this day with my friends, not with these...you can say that the parade is canceled!"\n\nAfter which Grover turned around and got into the car, ordering them to take him to the Falcor hospital, where the wounded were taken. The car crossed the square and drove along the main street of Falcor, before turning right. After driving a few meters, a cry was heard in the car: "Wrong way! Next exit!" It was the police chief who showed the way. The car began to turn around, after which he said again that it was possible to drive here after all. One of the terrorists, who accidentally ended up on this street, took advantage of this delay. Everyone heard Grover's scream: "Maria!" and two shots rang out, after which the nearest unicorn policemen knocked the guns out of the griffin's hands and attacked him. \n\nThe personal driver, a friend of Grover and Maria, turned around and looked at his passengers: Maria was covered with Grover's body, on the back of whose jacket two traces of bullets were visible and from which blood was flowing. Grover managed to shield his wife from the shots, thereby saving her life. Everyone around began to try to somehow help and call an ambulance, and the barely alive archduke could only squeeze out a few sentences, which he screamed with all his might, however, not at all loudly and they were heard by only two people: the police chief and the personal driver. \n\n"You..." he looked at his wife, who was trying to do something. "You... will become the heir... you will be Kaiserin! Everyone hears... I... I pass my throne to... her... \n\nAfter these words, the griffin's eyes closed and in the arms of his wife, who was hysterically and tearfully calling for help, he stopped breathing."
HRZ.7.a:0"Something terrible is thundering..."

HRZ.8.t:0"In honor of Grover"
HRZ.8.d:0"Maria entered the room in the hotel where she and Grover were supposed to spend the night and then leave for Karfin. She had spent the whole day in the hospital, filling out paperwork and visiting the wounded from the first explosion. She was completely destroyed, and she no longer wanted anything, she had lost a part of herself. Walking into the kitchen, she saw her personal driver sitting at the table with a pistol in his paw and a bottle of schnapps. \n\n"What's wrong with you, Richter?" Maria asked fearfully, coming closer. \n"It's all my fault... it's all me!" The Griffin almost cried in despair. "It was me who drove us there, and it's my fault for his death... I can only atone for one thing before Boreas...\n"Hey, are you an idiot or something? Put the gun down, you're not guilty of anything." She tried to calm him down and began come closer.\n—Who took us there?! Who stopped at that fucking crossroads and started to turn around?- he looked even worse than Maria, there was nervousness and indecision in his voice.\n—If you look at it that way, then the police chief is to blame, you were only following orders. You don’t have to worry, we’ll judge him later, but the last thing Grover wanted was for his friend to just shoot himself, leaving me completely alone.\n\nThe Countess came up and snatched the gun from his paws, although he didn’t resist in principle and gave it to her himself. - That’s it.- she patted him on the shoulder.- Stop drinking this! There’s a better drink.\n\nShe reached into her bag and took out a bottle of homemade wine from her village. She unloaded the gun and put it there too.\n\n—We can’t help him anymore, the only thing we can do is...- she put the bottle on the table.- Nobly escort him to Boreas.\n\nShe also took the glasses, and pouring wine into them, the force moved to the opposite side of the table from Richter."
HRZ.8.a:0"For Grover!"

HRZ.9.t:0"News"
HRZ.9.d:0"Grover VI sat down at the table, where his wife Margaret and the servants, who had already brought everything for breakfast, were already waiting for him. \n\n"What are you reading, dear?" Grover asked, breaking a chicken egg in a poacher with a spoon. \n"Oh, just... Aquelian fantasy: "Flight to the Moon"... \n"Interesting."\n\nThe Kaiser asked the servants if they had brought the morning newspaper, to which one of the servants brought Grover a completely fresh newspaper, straight from the printing house. They wrote about the weather, about sports news, he liked to read about the lives of ordinary griffins, and this could only be found out from newspapers. However, just glancing at the first page, he asked again if this was the right newspaper, and after they answered positively, he dropped it from his paws and leaning back on back of the chair, began to breathe heavily. \n\n"What is it, dear?" - asked his wife worriedly, putting the book on the table. \n\nGrover's eyes darkened, and his chest was terribly squeezed and stabbed, from which he grabbed it, which caused panic in Margaret, who quickly ran to her husband, hoping to help. On the table lay a newspaper, the main headline of which was: "Archduke shot in Falkor. Who will now become heir to the throne?" The princess also felt unwell, but she did not lose her composure, and continued to be near the Kaiser until the ambulance arrived and stated that the Kaiser had a massive heart attack, as a result of which he fell into a coma."
HRZ.9.a:0"He does not have long left ..."

HRZ.10.t:0"A Lie for the Good"
HRZ.10.d:0"Maria, together with her new advisor Richter, who used to be their personal driver and constantly being near them gained a little experience in these matters, went into the imperial chambers and immediately headed to the dining room, where the princess was sitting, finishing the book that she started reading when her husband had a heart attack, which hit her perception very hard. When the princess saw these two, she took off her glasses and pointed at the griffin. \n\n"And who is this? You don't want to say...\n""What?! NO!" Maria interrupted sharply. "This is my new advisor and so far the only friend I can rely on. So now he will always go with me.\n\nThe princess lowered her eyes and, shaking her head a little, took off her glasses, putting them on the table.\n\n"And why did you come?" she asked Margaret.\n\nMaria and Richter sat down at the table, and she prepared herself for a difficult conversation.\n\n“The thing is... it’s hard to believe, but the Archduke, at the moment of his death, transferred the rights to the throne to me...”\n\nMargaret raised an eyebrow and it was clear that she did not believe a single word.\n\n“What else did he do?” the princess asked sarcastically.\n“It’s true. Of course, I understand that this is not a very reliable source, but he,” she pointed to Richter sitting next to her, “and the police chief heard it... But even if you don’t believe me... I ask you, we need to write a fake will of the Kaiser, to whom he transfers the throne. Understand... what will be better: if the Empire remains alone and with 100 percent probability will collapse and a civil war begins for the title of Kaiser, or if a fake, but still official heir comes to power, and no one takes the title of Kaiser can't claim? After all, you must understand that at such an age, people in a coma simply don't survive. You must understand that there are lies for the greater good, and this is exactly the case... or do you want the death of millions of innocent citizens who will die in a civil war? Do you want to reproach yourself for this, although you could have fixed it? I am waiting for your answer right now, you can think for a minute, but the life of the fatherland depends on you... \n\nShe leaned back in her chair, and the griffin sitting next to her closely watched the princess, whose eyes darted from not knowing what to do. A minute later, she exhaled and asked: "And what do you want from me?" \n\n—You must confirm the authenticity of the document, that this will was written while Grover was still conscious. Like he decided that his days were numbered and a new heir was needed. \n\nMargaret lowered her head and said the last words"
HRZ.10.a:0"Call Gabriella, we will write."

HRZ.11.t:0"Address to the People"
HRZ.11.d:0""Dear citizens of Vedina, Cloudbury, Aquileia, Francistia, Taluza, Wingbardia, Sicameon, Cyanolisium, Asterion, Pryven, Frontier and Herzland. It has been 20 days since our Kaiser fell into a coma. This was terrible news, but worse than that was the news of the death of the heir to the throne - Archduke Grover VII. In his sick state, the Kaiser still managed to compose his message, in case he himself would not be able to announce to you about the new heir to the throne, as we see ... this message was not composed in vain. The message about the new heir was supposed to be read only in the event of the death of the Kaiser, but as his wife, I believe that now is the best time ... "I, Kaiser Grover VI of the Imperial Federation, under the current circumstances must accept difficult choice. Since there are no more male heirs, I have chosen the Countess and wife of the Archduke, Maria-Grover Serzhelia, as the next heir to the Empire. Not only is she the closest in blood to the Archduke, if you don't take into account his parents, but she is also the closest griffin in spirit and character. I see no other candidates for the throne, so this is my final choice. I sincerely hope that the people of the Imperial Federation will share my choice. ". signature at the bottom: "To be published only after my death." In my opinion, the people should know their future Kaiserin before she comes to power. \n\nI express the same wish as my husband, I want you to accept Maria as the future Kaiserin in such a difficult situation, since she is the only suitable and closest griffin for the Archduke, and I am sure that he himself would want this. "" HRZ.11.a:0 "Even closer to the end..."

HRZ.12.t:0"Death of the Kaiser"
HRZ.12.d:0"Maria sat at her desk in Griffenheim and studied the cases of missing weapons from warehouses in the north, west and south of Herzland. Somewhere a few rifles would be stolen, somewhere a dozen, and somewhere a thousand. They tried to get to the bottom of it, since this not only depleted the garrisons' supplies, but also contributed to the arming of radicals in the region. The best inspectors and policemen of Herzland worked in parallel with her, but she preferred to work alone in order to use other methods. \n\nAt some point, a servant ran in to see her. He caught his breath and said that the princess urgently called her. She dropped everything she was doing and went to Margaret. \n\n"What is it, Margaret?" Marie asked, entering the imperial chambers.\n"Grover... died..." she lowered her head and it was clear that she was holding back tears.\nThe Countess slowly approached the princess and hugged her, stroking her head to calm her down.\n\n"He lived a long and good life, the longest of all the Kaisers. Now he is next to Boreas, and I am sure that the last thing he wanted was for you to be sad... So come on, we have a lot of work to do, we still need to organize the funeral and so on. This is not the time to be sad.\n\nIt was hard to believe, but the words calmed the princess and, wiping the tears from her eyes, she nodded to the Countess and they got to work."
HRZ.12.a:0"Notify the people"

HRZ.13.t:0"Steel Army"
HRZ.13.d:0""...you are all warriors of the great Empire, and not of this fool who will soon sit on the throne!" Major Daunklo kept saying to the local militia units that he was gathering for the march on Griffenham. "The Empire needs a Kaiser who understands strategy, and not a woman whose place is in the kitchen! The Empire needs a leader who supports its army, who understands the life of the people and how to direct it in a direction useful to the Empire! And I know that you know who the Empire needs!" \n\nFerdinand Daunklo!" the troops shouted loudly, when suddenly stormtroopers from the troops of von Katerinburg, one of the most radical griffins in the world, entered a covered warehouse in the north of a small town at the foot of the mountain. Everyone was alarmed: Daunklo's troops pointed their weapons at the stormtroopers, and they at Daunklo's troops. Von Katerinburg entered the warehouse and the two griffins' glances crossed. \n\n"I think you forgot about something else," Wingfried said sarcastically. \n"Really? Can you tell me... \n"In our new Empire, the dirty ponies who prevent us from living and who corrupt our beautiful society must completely disappear!"
HRZ.13.a:0"You said...in ours?"

HRZ.14.t:0"Heroes of the New Revolution"
HRZ.14.d:0""...And so, in a few days we will advance on Griffenheim. Herzland has been monarchical for too long! It is time to build a republic." With these words, Arthur Monte ended the military meeting and dispersed the new secret generals to their units and locations, so that on the right day they would capture strategic targets and, united, move on Griffenheim. However, after the commanders left, the griffin sat down in his chair and sighed. He understood that behind each such order there were hundreds of lives taken, and not necessarily military ones. He loved his people, he loved Herzland, and because of this he understood that Herzland deserved to be called and to be a republic like Aquileia. And if he had to make even the greatest sacrifices, through the pain in his heart, but he would do it... for the glory of the people of Herzland! "
HRZ.14.a:0"For the glory of the republic!"

HRZ.15.t:0"Everyone at their posts"
HRZ.15.d:0""We control almost all the youth clubs in the south, the workers are on our side, so during the revolution we are provided with normal production of the necessary equipment, and we also control almost all the railways, so it will not be difficult to deliver this equipment to the front line. As for the initial stocks of weapons, the guards of the warehouses are either on our side or bribed, so the weapons will be at the disposal of the red griffins a few minutes after your signal." - reported a unicorn filly with light green hair and a beret on her head. \n\nThe gray griffin nodded and rose from his chair. \n\n—Then comrades... the final preparations and the day before the coronation we set out. Everyone is free. \n\nHe sat back down, and almost everyone who was next to him stood up and left the room, leaving him alone with his assistant. "Pour me some "I want something..." the griffin asked, and then went to the window that looked out onto the central square of Greenback. \n\n"
HRZ.15.a:0"Readiness... a few days..."

HRZ.16.t:0"The Beginning of the End"
HRZ.16.d:0"—Countess! Countess!" shouted a griffin in military uniform, who had just run into her office. \n—You didn't even knock! - she growled angrily, jumping up from her chair. \n—No time, madam! In the north of Herzland, the lost army has become active and it is... hostile, they have already begun to seize some government buildings! - Maria was perplexed and furious, but that was not all the news. - There is also news about the beginning of strikes in the south, and in the west, activity of republican troops has been noticed. \nThe Countess sat in a little shock, everything began to happen too quickly. She quickly ran out from behind the table and ordered a council of generals to be convened... who remained in the location and did not move north."
HRZ.16.a:0"Urgent!"

HRZ.17.t:0"The Greatest Betrayal"
HRZ.17.d:0"During the first meeting of the emergency war council, the Countess sent a request for help to all members of the Imperial Federation, the letters from Aquilia and Cloudbury sounded more like pleas than requests. And so, when this morning, she received a response from everyone and wanted to read them at breakfast, she simply could not get a bite into her beak or even a drop of tea ... the answer from everyone was strictly negative. She understood the refusal of some Praiven, who was far away, or Vedina, even Cloudbury's refusal was justified by the same events, but Aquilia ... Maria understood, her old friend simply hated her ... \n \nShe got up from the table, put on her jacket and went out into the city, she needed to rest and collect her thoughts. Recently, she lost her half as an ordinary griffin, and now as a future ruler, and she I didn't even know which loss was more serious."
HRZ.17.a:0"Why did she have to go through all this..."

HRZ.18.t:0"Beginning of the Civil War"
HRZ.18.d:0"Maria was woken up in the middle of the night by Richter, who burst into her room and asked her in a commanding tone to come to her office. In her sleep, she did not even understand what was happening, but she began to get dressed. After 10 minutes, she was already approaching her office. Through the windows, she saw the full moon setting behind the horizon, which meant it was already early morning. However, it was not this that attracted her attention, but the crowd that stood near her office and waited for her. She recognized some mayors of cities located in troubled regions, recognized generals, officers and even ministers. As soon as they saw the Countess, they immediately began to talk about some kind of trouble, some clashes and so on. She wanted to ask them to be quieter, but Richter quickly shut everyone up in a loud, commanding voice, opened the office of the future Kaiserin and let her in. everyone inside. \n\n"What happened?" Maria asked, sitting down at her desk. "Just one at a time... let's hear the generals out."\n\nThe bravest of them stepped forward. It was a blue griffin, one of the few with a cap instead of a kepi. It was the founder of the few tank troops of Herzland - Reinhold Thundertail.\n\n"Countess... the fact is that my few tank troops began to come under fire and attacks from the north... I'm afraid that this is not just a bund... this is a real civil war. We," he pointed with his paw at the generals standing behind him, "all have reports of military skirmishes, shootouts, artillery shelling and losses on both sides. Apparently, we were able to notice and strike the columns moving towards the capital in time, so we mixed up their cards well.\n"The attacks on "the columns?" the Countess asked again. "Who gave the order to open such powerful fire, who gave the order to start the war at all? All the rebels must have goals, and firstly, we must listen to them, secondly...\n"All the diplomats were killed and we were subjected to heavy artillery fire in the north, but we responded along the entire front and thwarted their plans! If you want to punish us, then punish me as the griffin who gave the orders."\n\nHe lowered his head, ready to accept the punishment, when everyone turned to look at the door, through which the commander of the southern district of Herzland ran, all out of breath. He reported even more unpleasant news - fighting had begun in the south of Herzland. Perhaps he saved Reinhold with this report, confirming his fears.\n\nMaria glanced at the crowd, and then asked: "As I understand it, everyone has come to tell me the same thing that Thundertail is talking about?" When the whole crowd nodded, she stood up and walked up to the tank general and placed her paw on his shoulder. "
HRZ.18.a:0"Go ahead, Field Marshal."

