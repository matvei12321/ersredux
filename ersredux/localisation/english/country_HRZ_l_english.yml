HRZ_out_industry_desc:0"The industry of this country is still in the last century, if it does not quickly catch up with modernity, it may remain there"
HRZ_communst_problem:0"Communist problem"
HRZ_communst_problem_desc:0"There is great unrest with the communists in Herzland. The workers periodically stage demonstrations, and the voices among the people that the communists only want the good of the state and the people are growing"
HRZ_trade_contract_for_CHN:0"Trade agreement between Herzland and the Changelings"
HRZ_trade_contract_for_CHN_desc:0"At the beginning of the new millennium, an agreement was concluded with the main state of Griffonia. The agreement mainly concerned ordinary goods, but according to a secret additional protocol, the griffins also supply us with their prisoners, who are either sentenced to life or awaiting the death penalty. Here they fully work off the sins they committed in Griffonia... and our residents will always benefit from additional portions of love."
HRZ_trade_contract_for_DTS:0"Trade Agreement of Herzland and Changelings"
HRZ_trade_contract_for_DTS_desc:0"At the beginning of the new millennium, Chrysalis entered into a trade agreement with Grover VI, according to the secret protocol of which, the griffins are also obliged to supply us with their incorrigible prisoners to pump love out of them. Although the agreement was between Grover and Chrysalis, the Queen of Vesalipolis uses our ports for trade, so we can happily take a small... percentage from this agreement."
HRZ_trade_contract_for_HRZ:0"Herzland and Changeling Trade Treaty"
HRZ_trade_contract_for_HRZ_desc:0"At the beginning of the new millennium, a trade treaty was concluded between Kaiser Grover VI and Queen Chrysalis of Vesalipolis. This treaty gave us the opportunity to use the amazing technology of the Changelings, namely their super strong and sticky mucus... no one knows how they produce it, and let it remain a secret, but it gave us the opportunity to reduce the construction time of our buildings. But the treaty also made it clear to us that we are lagging behind our distant partners. A special committee was created, which was given one task - to reduce the technological gap between our countries, researching technology from the hives. However, we have to pay for this not only with part of our goods, but also with the labor force of prisoners, sending part of it to the hives for the forced extraction of love in order to lower the prices of already expensive love. We do not know, what happens to the prisoners next, but all the griffins I've spoken to would like to remain in the dark about it, like with the super slime situation"

