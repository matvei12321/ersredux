###Tricks###
HRZ_raut:0"Hedgehog Rout"
HRZ_raut_desc:0"There is a tradition in the Imperial Federation: on February 15th of each year, the heads of all the states of the Federation gather in the Imperial Palace for a rout to discuss past and future plans. The event is dedicated to the establishment of Heins Mold as regent of Grover IV"

HRZ_go_to_Aquila:0"Meeting in Aquila"
HRZ_go_to_Aquila_desc:0"Since the founding of the Federation, the Republic of Aquila has been one of our most important allies. The Archduke will visit Aquila to meet with President Cecelia Goudreau and discuss joint naval and military exercises"

HRZ_AUR_army_training:0"Ground Forces Training"
HRZ_AUR_army_training_desc:0"The armies of Aquileia and Herzland have existed for over two centuries, and their tactics differ despite being in the same Federation. Their joint maneuvers and training will give our armies even more combat and tactical experience"

HRZ_AUR_fleet_training:0"Naval Exercises"
HRZ_AUR_fleet_training_desc:0"Both Herzland and Aquileia have impressive fleets with a long history. It's time to share their knowledge with each other in the largest naval exercises in the history of these countries"

HRZ_AUR_cash_finance:0"Akvelia Investments"
HRZ_AUR_cash_finance_desc:0"Akvelia's economy is very rich, and if we can get them to invest in our economy, we will win very well"

HRZ_go_to_Wingbard:0"Trip to Wingbard"
HRZ_go_to_Wingbard_desc:0"Wingbard is the pearl of the south and establishing even closer economic relations with them is the key to improving and expanding our industry"

HRZ_Wingbard_fabric_HRZ:0"General industrial development"
HRZ_Wingbard_fabric_HRZ_desc:0"By creating general committees for the construction of new factories, we will be able to expand our civilian industrial sectors"

HRZ_Wingbard_war_factories_HRZ:0"General development of military industry"
HRZ_Wingbard_war_factories_HRZ_desc:0"By creating general committees for the construction of new military factories, we will be able to expand our military industrial sectors"

HRZ_Grover_vi:0"Death of Grover VI"
HRZ_Grover_vi_desc:0"Unfortunately, after a long illness, our Kaiser has died. It is time for the Archduke to prepare for his coronation"

HRZ_Grover_vii:0"Long live Grover VII"
HRZ_Grover_vii_desc:0"The Archduke is ready for his coronation, and can now sit upon the throne and become the seventh Kaiser of our glorious Empire \n\n§YLong live Kaiser Grover VII§!"

