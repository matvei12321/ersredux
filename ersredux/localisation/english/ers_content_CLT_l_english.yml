 #### EVENTS
 dodge.1.t:0 "Flight of thought"
 dodge.1.d:0 "Black Night.\n\nFigures with torches.\n\nThey scream so loud...\n\nResistance. Submission. Destruction."
 dodge.1.a:0 "What the heck is it?.." 

 dodge.2.t:0 "Slaves for our needs"
 dodge.2.d:0 "On a dark night, the Sarancists and their allies from other demon-worshipping cults united and crossed the southwestern borders. There they came across several unprotected settlements of buffalo. It was a great success, as buffalo prefer a free nomadic lifestyle instead of a sedentary lifestyle.\n\n Some buffalo, especially adult and young males, fiercely defended their relatives and friends. But the cultists had an advantage in the form of magic. The defenders have fallen.\n\nThen another curious thing happened - none of the remaining buffalo agreed to leave their home. To solve this problem, the sarancists burned houses and mutilated the corpses of the buffalo defenders.\n\n- Now you have no home, there are no those who were ready to protect you. You have no choice! Join us!\n\n Those who could no longer resist and were suppressed, with empty looks, chained in rusty chains, went after the raiders. Those who did not want to go were beaten to unconsciousness, and their carcasses had to be worn with the help of joint magic.\n\n They were forcibly torn out of their home, and upon arriving in Dodge City, they instantly lost all their rights. Everyone could treat them as expendable. The children did not understand what was going on, and kept asking the adult buffalo when they would return home."
 dodge.2.a:0 "They will never return to their former lives."
 
 dodge.3.t:0 "The City that Will Never See the Light"
 dodge.3.d:0 "Dirty and noisy streets, whores, fanatics and slavers - it seemed that the existence of such a wild place near the Holy Lands was impossible, but it existed contrary to common sense. Dodge City has been pulling itself into the abyss all its existence, but by some miracle it has been stable and, in a sense, developing. If, of course, the increase in the volume of the slave trade in recent years can be called development.\n\n-Hey, dear! Can you tell me who's in charge here? We have brought live goods here - hippogriffs - marine exotics!\n\n- We don't have the main ones here. If you want to trade like the whole civilized world for money, you'd better go to Appleloosa.\n\n- Not for money? No question! We'll accept any counteroffer, but who's in charge here anyway?\n\nThe gryphons-slavers did not receive any answers. They came from Wingbardy here - and all for nothing? But, fortunately, they got a tip on a certain "Valentine", saying that he and his gang consider themselves leaders in these lands. They found him. But after five minutes of negotiations, they decided to get out of town and never return to this damned continent.\n\n- Fuck, Castello, what the fuck was that?\n\n- Don't you understand? He's finished. Gone off the rails. Fucked up! And the whole city is like that. I told you that there is a stable trade in Zebrika, but here? At least we survived, and nothing happened to the goods. Speaking of birds. They've gone quiet there...\n\n They transported slaves in cars, in cages that were closed in large bodies. After checking the cages, they saw only bloody scraps and the tortured bodies of hippogriffs. A note was deliberately nailed to the skull of one of them... "
 dodge.3.a:0"§R"Come back to our cozy town!"§!"
 
 dodge.4.t:0 "The Biggest Altar in the World"
 dodge.4.d:0 "The Sarancists have been fussing for a long time and building something on the outskirts of Dodge City. And they started this mysterious project not a month or a year ago. Even with the magic of unicorns, the incomprehensible building was under construction for several years. No one understood what it was.\n\n But now that the Sarancists have captured a hundred strong horned slaves, things have gone much faster. Either because bison could carry tons of cargo a day, or because unicorns enhanced their magic with their vital energy. Most likely, both. As a result, it was completed in record time...\n\n Something.\n\n This construction did not look like a fortress, nor any adequate building. For the most part, shapeless, decorated with ugly spikes and skulls of various creatures, it stood on impossibly thin supports. This was achieved through the use of Black Stones from the mine of the same name. This material could truly work wonders and break all the laws of magic and construction. For example, like Pegasus cities on clouds.\n\n But if cloud cities like Cloudsdale look like an aesthetically beautiful element of the pegasus culture, then this design only caused disgust and headache to everyone who tried to understand how it stands at all. When the building was finished, onlookers were curious to look at it from all sides. And everyone put forward their own assumptions about what it is.\n\n One earth pony dared to approach the sarancist directly and directly asked the question, what kind of "unknown crap they installed". The answer followed immediately, and the cultist pronounced it with such an eerie intonation that the pony shivered. "
 dodge.4.a:0 " "This is an Altarium, a place of tearing souls. And your soul will be there too.""
 
 dodge.5.t:0 "Tearing the Flesh, Time Will Go Back"
 dodge.5.d:0 "This is not the end. I KNOW I KNOW I KNOW I KNOW\n\n My options are limited. I'm stuck in this stream of steel and glass. Dirt pours through my veins. Only she can purify me. But where is she where is she WHERE ARE YOU\t\art of the flesh - art in the flesh\\n\n My mind will be updated, everything will be updated, now I can't do anything \n\n It remains only to wait. I will wait for the universe to update. AND THEN I'LL START ALL OVER AGAIN."
 dodge.5.a:0 "I will find you, my radiance. At any cost."
 and_we_will_cry:0 "§RAnd the whole world will cry from our misfortune.§!"
 
 dodge.6.t:0 "Ode"
 dodge.6.d:0 "When the clock strikes twelve\n\n And someone finds my shadow\n\n I HATE I HATE I HATE\n\n It goes"
 dodge.6.a:0 "In the kingdom of curves"
 
 dodge.7.t:0 "Вся нечистая сила пирует в моей голове"
 dodge.7.d:0 "§RМНЕ НУЖНА ТВОЯ АРТЕРИЯ§!\n\nОкружение Валентайна было довольно... своеобразным. Не принимая во внимание голоса и демонов в его разуме, его сопровождпли вполне реальные существа. Взять, хотя бы, Потерянного.\n\nКогда-то в землях Весалиполиса жил чейнджлинг. И он ненавидел своё тело. Он был глубоко убеждён, что он родился чистокровным единорогом в Юникорнии, но омерзительные жуки украли его из утробы кобылы-единорогини и превратили в себе подобного. Каждый день он пытался избавиться от постоянно чещущейся оболочки тошнотворного создания, которое именуется "чейндджлинг". В один день его боль стала настолько сильной и невыносимой, что он в ярости содрал с себя весь жучий хитин с крыльями до мяса. Тогда он решил, что начнёт своё перерождение с получения настоящего меха единорога.\n\nПроникнув в Юникорнию, он выпотрошил одного  бездомного бедолагу. Он применил нити, что украл из местного бутика, чтобы пришить истинно-чистую оболочку к совему телу. И у него получилось! Но общество единорогов отвергло его. Он был слишком уродлив для них.\n\nПокинув родной дом, Потерянный много лет скитался по Эквусу, пока не обосновался в Додж-Сити. Там он встреитл Валентайна - единорога, который смог принять его натуру. С тех пор Потерянный бесприкословно служит делу культа."
 dodge.7.a:0 "Я покажу тебе настоящую кровь из земли."
 
 dodge.8.t:0 "I Can See Into the Past"
 dodge.8.d:0 "This room could well be called Valentine's office. No windows, no doors, no walls, no floor, no ceiling, no air. Valentine knew how to be here. He even arranged a small bed made of straw so that after his visions he would not wake up on a hard and dirty floor. This was the only piece of furniture.\n\n All experienced magicians in the cult knew that entering this space would kill everyone except Ponifer, so no one dared to disturb him when he locked himself in there.\n\n"It seems to me that the Master has health problems there. Should we help him?"\n\n" No, Mai. You're still young and don't understand our whole system. Just wait... And He will return with a new sermon, which He will hear from divine lips."\n\n At this time, Valentine was lying on a makeshift bed. He was covered in sweat, his eyes were red and filled with moisture, and his throat was tormented by an unbearably sharp cough, as if thousands of rusty knives had formed themselves inside. With each cough, a little blood came out of him. Red and dirty.\n\nNo Valentine finally waited. The prophetesses of today came out of the walls. This time it was three harpies.\n\n "You need a thousand young foals. Kill a third of them, and build your House on the rest," said the first.\n\n "Get to know her and don't forget. The blood on the stones should never cool down," said the second.\n\n The third only hissed and convulsed, spewing pus from the wound on her neck.\n\n For several hours the cult members waited for their Master. But only the next day he was able to come out, covered with nauseating masses, blood and other indescribable dirt.\n\n "Equip... an expedition to the Chernokamenny mines... And prepare a clean book with a pen... Make an incision in my neck... There's so much more... need...\n\n "Master, what are you, stay on your hooves! You can't fall to the ground!"
 dodge.8.a:0 "And the future is tearing out my eyes"
 
 dodge.9.t:0 "Falling Chariots"
 dodge.9.d:0 "Name: Mai. Position in the cult: junior assistant of the abbreziator. Age - 15.5 years. The unicorn race. Consciousness is stable and in order.\n\n "Senior abbreziator, I have a question. Does Valentine exist? It's just that all the time I've been here, I've never seen him live."\n\n" He doesn't exist. He is a fiction of sands and time, born out of a fantasy of blackness. At least that's what he says... And what he says is a constant, the only true definition."\n\n "So did you see him or not?"\n\n "Of course. It is quite material... Don't get distracted, we need to continue your training. The second basis of bloodletting from someone else's body is the correct vision of the soul..."\n\n In fact, the junior assistant of the Abbresiator had to stay out of the way during work and supply the master with various materials, as well as quickly provide the Abbresiator with energy. They say that every leaf plucked from a tree kills someone's life.\n\n Mai didn't really understand why he came here. Perhaps he just didn't want to die of boredom in this disgusting city in every sense.\n\n And one day, he met Him.\n\n They crossed eyes in a dark alley. In the figure in the raincoat covered with fresh blood, Mai recognized Valentine. He was too terrified to speak or even move. And Ponifer was also standing motionless, dead and clearly separated from reality, gazing into the eyes of a young unicorn.\n\n He also broke the silence a few minutes later.\n\n "Over time, you will find out how great my failures were."\n\n Having said this single phrase, Valentine walked around Mai and disappeared around the corner."
 dodge.9.a:0 "New Northern Land"
 
 dodge.10.t:0 "Time Is Coming..."
 dodge.10.d:0 "Extraordinary, urgent meeting of the Cult. All the Sarancists gathered in front of the leader - he seemed shocked, really scared. The line was irrevocably broken.§!\n\n "TIME! BREAK ALL THE CLOCKS!"\n\n "Master, we speak with one mind from the fact that we have seen the unbearable. We endure pain so intense that the earth itself groans from our suffering."\n\n "IT'S ALL THE TIME! BREAK THE CLOCK, SWALLOW ITS FRAGMENTS! OTHERWISE TIME WILL GO BACKWARDS!"\n\n "WHAT? It can't be-"\n\n" It's too late. We're all late. There's only one way out... I'LL KILL EVERYONE! EVERYONE WILL KILL ME! HERE, NOW! SOON TIME WILL GO BACK!"\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!\n\n SOON TIME WILL GO BACK!"
 dodge.10.a:0"§RTELL EVERYONE ABOUT IT§!"
 
 dodge.11.t:0 "..."
 dodge.11.d:0 ""So what's bothering you anyway, dear?"\n\n"You know, a stream of thoughts pierces my head. Here... flow. You know, it's like a thought is spreading on a tree, voices are sounding in my head, hiding from me, playing round dances, then I remember some songs, then others, then the words are imposed on me, then the heavenly co-."\n\n"Okay, wait a second... What does it mean "voices sound in your head? Whose voices are these?"\n"Please answer, it's important."\n\n"It's her voice. She takes away my thoughts, yes. She ruins and adjusts her thoughts to me. I see myself from the outside and it seems to me that I can do anything. I'll tell you about the sky. Once it looked at me..."\n\n"You know, we... I know a place. There are good specialists working there. They can still help you."\n"What happened? Did I say something wrong?"\n"Please, here's a sedative, let's discuss it again!"\n"If you leave now, you won't have a chance in the future.""
 dodge.11.a:0 "§1D§!§F2!§G2!§b"§Bs§No.)§3;*§!D?(§R9§!"
 
 dodge.12.t:0 "The Past"
 dodge.12.d:0 "It happened about a year ago at the Unicorn Academy of Gifted Unicorns. Final exams were held, and everyone demonstrated to the teachers their knowledge gained over the years of study and practice.\n\n But that day... one unicorn student made a scandal.\n\n- What does it mean? Why is the board of directors excluding me, Professor Yoses?\n\n- Dear, such dirty magic that you showed us here has no place in the great Unicornia! It's immoral, it's not ethical, it's barbaric! That's why the board of directors has already decided to expel you.\n\n- I didn't even demonstrate my abilities in full force! Yes, we do not teach such magic, but believe me, I have reached such heights in it that will allow-\n\n- ROSA MALEDICTA! Get out of the Academy, you filthy necromancer! And even better, get out of this country, because the authorities will find out about your horrific practices very soon. Then you will definitely have a fate that everyone who mocks the dead deserves.\n\n Then Rose decided that she would never return to this society. She searched for a long time for a place where her gift would be accepted, and one day she found it. Dodge City. In this city, she was accepted for what she is. Ponifer Valentine, the leader of the local magicians, especially appreciated her abilities. Although his cult specialized in slightly different magic, Rose's necromantic abilities may come in handy here.\n\n So she joined the cult of the sarancists."
 dodge.12.a:0 "This is her new home."
 
 dodge.13.t:0 "At least call her a rose..."
 dodge.13.d:0 "My name is Rosa Maledicta, and I have been living in Dodge City for quite a long time. And I won't say that I like it here.\n\n Yes, I can practice here and improve my necromancy skills openly, and no one will say a word about it. The cult of Valentine gives me... protection? Although I can handle myself against local drunks and other dirty bandits. Still, I don't understand why a cult of sarancists is needed. They do something all the time, but their actions never lead to any result. And, this Ponifer... I'm still not used to it. He speaks in such a way that it is impossible to understand him if you think logically. You need to think how... Like crazy. I don't want to go crazy. Although, it seems to me that I will get off soon.\n\n Recently I walked down the street from my house to the cemetery to collect fresh material. But someone from the upper floors threw a bucket of... filth on me. Slop, and it seems that someone's excrement got on me. I know I have to be strong, but it made me a little mad. I went up to the second floor of that house and with one spell gutted its owner.\n\n But that's not all. I was conducting an interdimensional summoning ritual that requires special concentration and a lot of energy. It should not be abruptly interrupted in any case, otherwise the irreparable may happen. And while I was doing the ritual, fully concentrated, some kind of inadequate psycho broke into my house. I could drive him away or kill him, but I could not interrupt the ritual in any case. This psycho turned everything upside down in my house, smashed various alchemical samples, jumped around me wildly. He even tried to do... "this" to me. But I couldn't interrupt the ritual.\n\n As for evil, the summoned spirits of the North did not respond. When I was convinced of this, I carefully finished the ritual and killed that savage. I gave his corpse to the Devourer, who was definitely tamed by Valentine's pawns.\n\nthat happens almost daily. I do not know how much longer I will last. I sometimes think about suicide. But during that ritual, I felt something... The spirits of the North didn't answer me, but they definitely called me. To another continent, to the North. For some reason, I feel that I am needed there. And I don't see any reason to stay here."
 dodge.13.a:0 "The North of Griffonia is calling me."
 dodge.13.b:0 "But I will stay here..."
 
 dodge.14.t:0 "Preparations"
 dodge.14.d:0 "The unicorn raised a dagger over the immobilized victim. There was nothing but wild terror in her eyes. This Earth pony was captured, locked in a damp basement and not released for several days-that was Valentine's order.\n\n- I entrust the flesh of this sacrifice to the divine voice. May her wounds be numerous, and her remaining days be fleeting. By shedding the blood of our enemies, we get one step closer to the abyss. HEAR ME!\n Another sacrifice has been made. It remains only to deliver to the Master what he needed.\n\n- No, no, no, no, no, no, it doesn't fit. We still need the heart of the black constellations. She didn't have any connection with them... Now disappear."
 dodge.14.a:0 "We will remember you with true love."
 
 dodge.15.t:0 "Hope for salvation"
 dodge.15.d:0 "To end Dodge City and destroy Ponifer Valentine was the goal of their lives at the moment. A group of priests from Pandoria crossed the line where the boundaries of morality and honor are erased. They came to Dodge City.\n\n- Holy Father Enrico, - the youngest priest began to complain, - this place makes me uncomfortable. If the Inquisition itself could not overcome the black power of these places, then what can we do?\n- Don't be afraid of the dark, child. As soon as Pandora hears our call, we'll be safe. We will be able to cleanse these lands of the filth that devours it. We only need to find someone whose heart is black and whose mind is full of immeasurable hatred for reality itself.\n\n\n\n- Holy pilgrims? I'll rip your loins off for all of you, WHAT DOES THAT MEAN?! DESTROY THEM DESTROY THEM DESTROY THEM! SMASH THEIR BACKS!\n- Master, we would gladly prevail over them, but they have It. Crucifix. The master?..\n\n Valentine fell to the floor right in front of his subordinates. Assuming the fetal position, he took out a rusty scalpel from under his cloak and slowly began to draw some symbols on his forehead with it. No, not even symbols... he was just gently making incisions.\n\n- If these rotten walking masses have a Crucifix... release the Devourer," he gave the order without getting up from the floor. The pain from the cuts made his eyes wet, and tears mixed with thin rivulets of blood.\n\n This order was heard. Not everyone liked the idea of releasing something that devoured all living matter in its path. But if that was Valentine's order...\n\n\n\n The pilgrims have already been to Dodge City. And even managed to psychologically heal some of its inhabitants. Someone managed to turn against the sarancists, and someone gathered the courage to run. The pilgrims helped everyone on their way, bringing peace and tranquility to Dodge City.\n\n- Holy Father... Despite all our successes, I feel an evil presence. It seems that a terrifying night awaits us."
 dodge.15.a:0 "Only faith will save us."
 
 dodge.16.t:0 "The end of bloody oppression"
 dodge.16.d:0 "- Stop. I can feel his presence: he is near and wants us to die...\n\n Pilgrims have been consecrating Dodge City for a long time. They met with every soul that was struck by the evil of this city. But despite the fact that Dodge City was not such a big city, all this time they had no clues about where to look for the heart of black magic - Valentine. After a month and a few days, they were able to track him down and the lair of his cult.\n\n- Listen to what the Light tells you, and your life will be saved. We have no right to die here. We will fulfill a sacred mission. - The Holy Father was, as always, unperturbed. Pandora's blessing gave him the strength to survive all this.\n\n But, to everyone's surprise, the pilgrims did not end the rotting evil.\n\n They found a terrifying picture. A young unicorn bent over the bloody and mutilated body of another unicorn, dressed in a dark cloak. The dark red eyes had not shown signs of life for a long time, but Mai continued to plunge the ritual blade into Valentine's lifeless body. Time after time, until he noticed the priests. He stopped for a moment and realized what he had done.\n\n- I... this... They were voices. They made me do it. But I'm not crazy like him. I didn't kill him. I didn't kill him. I DIDN'T KILL HIM!\n\n- Young man, no need to panic. The voice you heard was Pandora's voice. The earth suffered from all that this sinner did. Your deed is not killing, because you are the savior.\n- Really?..\n- Yes, it is. Now, tell me, are there any other souls in this city who followed him?\n\n- No... At least, that's what I think. In recent days, members of the cult began to disappear, and I began to hear a voice that came to me in dreams. He told me to kill him...\n\n- The Crucifixion that we had. That's what guided you on this path.\n\n The Ponifer was finished. Priests found hundreds of buffalo remains all over the city and honorably buried them. The terrifying shapeless structure-the Altarium-was destroyed. Ponifer's body was burned to the prayers of the pilgrims, and Mai, who initially joined the terrifying cult, joined the ranks of the pilgrims. He seems to have found his true calling."
 dodge.16.a:0 "Amen."
 
 dodge.17.t:0 "Happy Ending"
 dodge.17.d:0 "Dodge City was a simple town on the outskirts of Pandoria. For unknown reasons, industrialization did not reach him. But fortunately, the authorities of the country [ERP.getname] finally paid attention to this deserted area.\n\n This city was in a pretty bad state, but thanks to a group of volunteer apostles, order was partially restored. With the support of the Pandarian police, the criminals were caught, and the city became acceptable for living in it. Everything is returning to its place.\n\n Some residents of this city say that they were terrorized by a terrible cult led by a psychopath, but no evidence of its existence was found."
 dodge.17.a:0 "The secrets and horrors of this land will be forgotten forever."
 
 dodge.18.t:0 "Sickening Slow Torture Chamber"
 dodge.18.d:0 "The Holy Father woke up locked in a cage in a dirty basement. All he remembered was that they were attacked by a fierce creature that was invulnerable to Pandora's forces. It devoured the pilgrims, but for some reason, the Holy Father was still alive.\n\The cage was guarded by a young unicorn. He looked to be about eighteen years old, and he was clearly not very comfortable being here.\n\n- A young colt... You won't commit a sin. I see your innocence, which bad creatures want to spoil. You don't belong here. Release me.\n\n Mai looked at the priest and experienced mixed emotions. At some point, he thought it was a good idea to set him free. But still...\n\n - Master! He's awake!\n\n From that moment, the fate of the priest was sealed. His death promised to be long and painful.\n\n Some time after Mai called the "Master", a creepy-looking unicorn dressed in a dark cloak descended into the basement, and half of his face was covered with a bloody mask.\n\n- Leave us, and reward the black metal. Let it consume you completely. At the same time, I will bring euphoria and happiness to the world of death. We never stop.\n\nWhile Valentine was talking, Mai was looking at him with horror in his eyes and trembling in his body. He didn't understand what kind of black metal the Master was talking about, but he definitely understood that it was better for him to leave. As he left, he found the courage to turn around. He saw that Valentine had immobilized the priest with a spell. He took out a Crucifix from under his cloak and slowly began to stick it into the captive's eye. Mai left these two almost instantly after what he saw.For three days, heart-rending screams of agony were heard from the basement. No one found the courage to go down there and interrupt the action, which brought Valentine real pleasure."
 dodge.18.a:0 "He is torn to pieces."
 
 dodge.19.t:0 "Punishment"
 dodge.19.d:0 "The cultists' lair looked like an anthill. A network of tunnels that were located far beyond awareness. The young cultist Mai, along with his teacher, Maraquir, prepared to leave for another training session.\n\nOn the way, Mai's attention was caught by a unicorn huddled in a corner clutching her stomach. She was wearing a dark cloak with blood red patterns, which meant she was one of them and not another victim. Beside her lay a strange-looking pile of amorphous black meat. Her hind hooves were smeared with the same black liquid of unknown origin.\n\n- Teacher, what is this? How can the Master allow one of his followers to suffer like this?\n\nMai was about to approach the pony, but the teacher rebuked him.\n\n- Do not approach her. Don't think about her. Act like she doesn't exist. She's taking Punishment.\n\n- Punishment? What did she do?\n\n- It doesn't matter what she did. But everything that can harm us must come out of it. It should cleanse itself.\n\n- "Get out of it?" What are you talking about-\n\nMai looked at the shapeless piece of ink again. A small trail stretched from her to the pony, as if she was trying to crawl away from him. And this trail led straight to...\n\nMai looked away. He didn't want to think about it anymore.\n\nAs the teacher and student walked on, Mai heard a squelching sound and the slight moan of a unicorn behind him. He turned around and saw that the black mass had increased."
 dodge.19.a:0 "..."
 
 dodge.20.t:0 "Way"
 dodge.20.d:0 "A unicorn, lost in time and space, roams the abandoned halls of a non-existent palace. A strange feeling does not let him go, as if something is drawing him to a large stone door at the back of the hall. He feels a strange magical energy emanating from the door and beckons him inside.\n\nLooking up, Valentine notices that a strange word in an unfamiliar language has been carved above the door. He moves closer and notices that the word is Chaos. His heart begins to beat faster and he feels a strange energy slowly beginning to take over his body.\n\nDarkness consumes him and he begins to feel that reality is decomposing into billions of hives, each circle having its own history and view of the world. But remaining unscathed, he continues to walk through the hall, where strange symbols and star maps are painted on the walls.\n\nHis attention is drawn to the mirror on the wall, and he notices his horn begin to flicker with a strange light. He approaches the mirror and his eyes begin to fill with a magical light that activates all of his senses. He begins to see his thoughts and realizes that his mind is connected to a world full of magic and secrets.\n\nAnd when Valentine looks at his reflected figure, he sees that his eyes have changed, they glow with a powerful light, and predict the end of the world , somewhere displaced and incomprehensible. He realizes that he can no longer go back to the past.."
 dodge.20.a:0 "It doesn't matter."

 dodge.21.t:0 "It's not..."
 dodge.21.d:0 ""Is that really you?"\n\nValentine froze in horror and excitement. It was a voice he hadn't heard for what seemed like ten cycles in a row. Just one single phrase almost took this unicorn's life: the shock was so strong. He turned towards the voice, but no one was there. With rage and the realization of his helplessness, Valentine slowly tore the skin off his face. Layer upon layer, he sobbed, knowing he would never see her again. But through the streams of blood flowing into his eyes, he saw a bright point somewhere in the distance. There was a beam coming from that point, and Valentine followed it towards the light. Somewhere there, at the end, was... He quickened his pace. Shouting with wild euphoria, he did not notice that the beam was breaking right over the abyss with a thousand rusty and sharp crosses. Falling on top of them, the unicorn tore its body apart and died in terrible agony.\n\nAnd then it woke up."
 dodge.21.a:0 "I can not see anything. I'm blind like the black sea."
 
 
 
 