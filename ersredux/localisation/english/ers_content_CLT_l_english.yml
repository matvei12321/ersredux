 ##### CHARACTERS
 CLT_valentine:0 "Ponifer Valentine"
 valentine_desc:0 ""No need to be afraid. Voices are also hungry for blood. Bloody swing, white dress... We're in the desert. Cut off my eyes."\n\nIt is unknown who Valentine is, or what his motives are. One day he just showed up in a rotten hole called Dodge City with his gang of thugs. Ponifer does not follow any ideology, goals, or aspirations at all - for everyone around him, he is just a walking mass, spewing a stream of unrelated thoughts. Only by some miracle does he manage to find supporters and like-minded people."
