 CLT_lost:0 "Lost"
 CLT_lost_desc:0 "§Ln this world, everyone is chasing a certain ideal. But what can this pursuit lead to at the end of the road?§!"
 CLT_death:0 "Fifth Rider"
 clt_5_pony_desc:0 "§LIn the Pandorian faith there are four horses of the "Apocalypse" - Death, Plague, War and Famine. However, this pony claims to be the Fifth Rider of the End of the world - the Rider of the Misty Mind.§!"
