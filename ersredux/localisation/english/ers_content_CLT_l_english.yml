 ##### NATIONAL FOCUS
 #------main tree
 CLT_horrors_of_the_unknown:0 "Horrors of the Unknown"
 CLT_horrors_of_the_unknown_desc:0 "We didn't come from this dimension. We're scared. Only Valentine knows the truth, and that's why the Universe is on my shoulders -Blood, Euphoria and Ectoplasm.\n\nThey need to go around the whole planet, after which everyone will start to be afraid of him."
 CLT_visit_neibghours:0 "Friendly Visit to Neighbors"
 CLT_visit_neibghours_desc:0 "They exist, but they know the boundaries of three dimensions\n\nWe do not know them, and this is our greatest joy and sorrow\n\nThey will suffer just like hungry stars, the power of heaven."
 CLT_altar:0 "Complete the Construction of the Altarium"
 CLT_alter_desc:0 "Wonderful place wonderful thoughts\n\nBut when they realize it, it will be too late/early/free for them\n\nAnd on the first day, they bit red-hot steel with their teeth."
 CLT_usefulness:0 "Completely Voluntary Assistance"
 CLT_usefulness_desc:0 "Horned creatures turned out to be our friends\n\n Here they are, there, in ecstasy and emancipation, chained themselves in infinitely ethereal compounds \n\n Echo, echo, echo, sky."
 CLT_valentine_sistem:0 "Valentine's System"
 CLT_valentine_sistem_desc:0 ""Have you heard the news? This nutcase is preparing for something specifically "universal".\n\n"And? Do you think he will... er... succeed?"\n\n"No. He has an infinite-eternal in his head, if you know what I mean. Hmm... no, but who is Istrid?""
 CLT_valentine_system_tt:0 "Keep track of your indicators of self-revelation.§\n\n§r Do not make decisions that you may regret.§!"
 CLT_god_voices:0 "Divine Voices"
 CLT_god_voices_desc:0 "Hear when he goes deaf\n\n See when he goes blind\n\n Live and rule when he leaves us"
 CLT_god_voices_tt:0 "§YOnly by following the Master's visions, we stay on the path of truth.§!"
 CLT_expand_cult_army:0 "Our Strength is Beyond Reality"
 CLT_it_calls_us:0 "Hear Divine Voices"
 CLT_talk_to_citizens:0 "To Preach the Truth"
 CLT_talk_to_citizens_desc:0 "Burn the church - find a new dream. That's what Valentine said, and that's what all earthly creatures say. Everything sacred that exists in these lands is a poison that kills billions of lives.\n\n But all is not lost.\n\n Not for us.\n\n We are doomed.\n\n The skies are turning black.\n\n A deal with fate.\n\n Death leads to submission."
 CLT_can_nationalise_capital_tt:0 "Through violence and mass volitional torture, we will be able to convince the locals that our rule is indisputable.§!"
 CLT_destroy_priests:0 "Get Rid of the Priests"
 CLT_destroy_priests_desc:0 "Rip their heads off. Burn them, throw them into the ground. Smash their skulls, break their spinal bones, gnaw out all the vertebrae. Black claws. The abyss of the mountain. Copper skulls. I need their copper skulls-the rest... destroy it. I suffer from their mere existence in this universe. SO HELP THE UNIVERSE TO DESTROY THOSE WHO DESTROY IT, LIKE CORPSE WORMS. Then I will crush the skulls of all the creatures in this world. So many years... so many years..."
 CLT_has_to_destroy_priests_flag:0 "§THEY WANT TO DESTROY US, WE NEED TO ENSURE OUR SURVIVAL LET ANIMAL INSTINCTS SAVE OUR SOULS§!"
 CLT_prepare_new_plan:0 "Prepare a New Plan"
 CLT_prepare_new_plan_desc:0 "Blessed is he who will repay you for what you have done to us! Blessed is he who will take and break your babies on a stone."
 CLT_has_plan_flag:0 "§The Immaculate Trinity seemed to us§!"
 CLT_melting_skin:0 "Molten Skin"
 CLT_melting_skin_desc:0 "The heat of trillions of degrees is a real pleasure... Internal organs burn and burst. Give it to them.\n\n Their work will turn into mind-corrupting euphoria.\n\n When the eyeball is cut out, it is necessary to appeal to the higher energy.\n\n The chances are high."
 CLT_make_clouds_fall:0 "Falling Skies"
 CLT_make_clouds_fall_desc:0 "This earth keeps its secrets\n\n And one day the inevitable will happen\n\n We can only wait..."
 CLT_next_step:0 "Miracles of Self-Immolation"
 CLT_next_step_desc:0 "§BEGINS\n\nLIFE ENDS ITS CYCLE\n\n\nFALLING INTO AVALON§!"

