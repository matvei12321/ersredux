 LOS_monarch_cat:0 "§3Los Pegasus§! - monarchists"
 LOS_monarch_cat_desc:0 "The monarchists who fled to Las Pegasus seek to restore the former dynasty and return the monarch to the throne of the ruler of the united Pegasus lands. Unlike the like-minded people who remained in Pegasopolis, they are not so belligerent and cruel and prefer to have influence on the decisions of the monarch.\n\n£small_crown_icon §Pieces of legitimacy of our monarch:§! §Y[?LOS.los_legicimicy_point]§!\n\n For every legitimacy point:\n +5% gain in political power\n +1% stability\n +1% support for war\n +0.5% surrender limit\n\NIF the number of points is changed, the parameters of the heir can be changed §More! and § Solutions.§!"
