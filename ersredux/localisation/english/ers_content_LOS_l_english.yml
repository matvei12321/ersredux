 #### Faction

 #### EVENTS
 
 los.1.t:0 "Hope"
 los.1.d:0 "- Are you sure that it is... him?\n\The republic leader was finally sent a photo and information about the true heir of the blue blood. But the result turned out to be... not exactly what he expected.\n\n- Mr. Orion, we've checked all the facts ourselves several times. Yes, this fifteen-year-old pegasus lived and was raised in a peasant family. But his belonging to the dynasty is indisputably confirmed by this royal decree that we have found.\n\Porion was shown a document with the royal seal and signature. Amidis had worked in the king's office for many years, and knew better than anyone how to determine the authenticity of the royal seal. There is no doubt that this is not a fake.\n\nThe document contains the king's thoughts on the upcoming rebellion. It was as if he knew that a catastrophe was coming for his family, and ordered the evacuation of several of his children to the estates of loyal nobles far from the capital. That was the whole decree. Unfortunately, the aforementioned estates, along with the heirs of the Neos dynasty, were burned down during the revolution, but one of the sons of Neos ended up in a peasant village in the region of Arkedonia under unknown circumstances. Local peasants, seeing the royal carriage, attacked and looted it, but found a very young foal. They saved him, sheltered him, and raised him like a family. But even though the royal document was right in front of him, Orion was doubtful.\n\n- We can still be wrong. One of the signs of belonging to the Neos dynasty is a birthmark in the shape of a star on his neck...\n\n- Present, Mr. Orion. You seem tired. Don't bother, we monarchists will take that stallion under our protection and responsibility. This is a real holiday for us..."
 los.1.a:0 "New ray of light"
 
 los.5.t:0 "New Constitution"
 los.5.d:0 "Our republican-tyrannical-royalist government is capable of defending its ideals, but so far we have provided protection only to Pegasi. Recently, the issue of creating a new constitution has been acute, which, in fact, would be just a collection of our past laws, but in it all rights would belong not only to pegasi, but also to unicorns and Earth ponies.However, not all monarchists support such a democratic idea. They suggest recognizing that other ponies have a basic right to life, a name, and so on, but pegasi will have more privileges.\n\nwhose are generally unhappy with the proposal to create a new law and do not want dirty earth ponies and selfish unicorns to be in the same legal position as Pegasi."
 los.5.a:0 "All ponies, go ahead!"
 los.5.b:0 "There is no such thing as democracy."
 los.5.c:0 "So that the earthly pony is equal to the one who controls the sky? Ugh!"

 los.6.t:0 "Training"
 los.6.d:0 "The new heir was raised by peasants - and therefore the monarchists needed... reconfigure his way of thinking. To teach the basics of governance, the principles of monarchical power. The leader of the republic, as the former head of the royal Chancellery, could greatly help in this.\n\PS Does Orion agree to participate in Christopher's management training?"
 los.6.a:0 "Yes"
 kris_will_get_political_bonus:0 "§The heir§! will receive §G An additional bonus§! in C5% of the increase in political power.§!"
 los.6.b:0 "No"

 los.7.t:0 "Offer of cooperation"
 los.7.d:0 "Our expectations were fulfilled - after the victory of the Democratic Movement in Pandoria, the dictatorship of the theocracy was overthrown, and the current leader, the Earth pony Silva Hopestar, does not seem to mind cooperating with other races. Should we try to cooperate?"
 los.7.a:0 "Send Silva a letter with a proposal for mutual defense."
 los.7.b:0 "We will deal with our problems alone."

 los.8.t:0 "Offer of cooperation"
 los.8.d:0 "After winning the election, Silva became a little more fussy than before. While she was getting used to her office and arranging it so that its interior suited the status of the office of the ruler of a democratic country, she completely forgot to check the letters addressed to her.\n\n- Argh, what is it...Silva quickly started checking the mail that had been delivered over the previous few days. And among the congratulations from her loved ones and threatening letters from her enemies, she found an official letter from the Republic of Las Pegasus. In it, Orion Amidis, the head of the republic, suggested that Silva conclude a mutual defense pact - a "Democratic Bloc" to protect each other's interests against external threats."
 los.8.a:0 "Hooray! New friends!"
 los.8.b:0 "We will handle our problems alone."

 los.9.t:0 "Pandora agrees"
 los.9.d:0"Silva Hopestar finally sent a reply letter - she agrees to form an alliance. Our countries have already opened their borders to each other."
 los.9.a:0 "Great!"

 los.10.t:0 "Pandora refuses"
 los.10.d:0 "Silva Hopestar finally sent a reply letter - she does not agree to form an alliance."
 los.10.a:0 "Annoying."
 los.10.b:0 "To hell with Earth ponies! We can protect ourselves!"
 
 
