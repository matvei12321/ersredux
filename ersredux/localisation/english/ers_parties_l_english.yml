 ###### SUBMOD - FASCIST IDEOLOGIES
 
 ###### SUBMOD - NEUTRALITY IDEOLOGIES
 neutrality_regency_council:0 "The power of the Regency Council"
 neutrality_regency_council_desc:0 "In this country, the monarch should be the ruler, but for one reason or another, he does not sit on the throne. Instead, the regency council rules - a group of people elected by the people or simply the most influential persons of the state. At the same time, the council is considered to be ruling until the monarch re-ascends the throne."
 
 ###### SUBMOD - DEMOCRATIC IDEOLOGIES
 
 pacifism:0 "Pacifism"
 pacifism_desc:0 "Pacifism is not a political ideology in many countries, and in some states with superiority it is even considered a manifestation of backwardness and cowardice. But Pegasus pacifism is a rather interesting exception. Due to the fact that for thousands of years the Pegasi have known only the brutality of fratricidal wars, the Peacemakers are trying to heal the psychological wounds in their nation.\n\nTheir main goal is to make the Pegasus nation forget the horrors of war and unjustified cruelty forever."
 
 
 ###### SUBMOD - FASCIST IDEOLOGIES
 
 ordopacifism:0 "Exopacifism"
 ordopacifism_desc:0 "Ordopacifism is an extremely radical movement that has turned the concept of universal peace and harmony in an absolutely terrifying direction. The ideologists of ordopacifism claim that everyone who can be a threat to order and peace must be destroyed, and as long as such "pests" and "parasites" exist in the world, the inhabitants of the country and the entire state as a whole must unquestioningly follow the following rules:\n\n- Absolute obedience to the orders of the supreme leader; \n\n- Mandatory self-sacrifice of personal freedom for the sake of ensuring universal peace; \n\n- Mandatory indefinite military service, during which a soldier must kill both disabled, and mares and colts, and children and the elderly - all, if they pose a threat to peace and tranquility;\n\n Then the list goes on almost indefinitely, and all the points boil down to the fact that the country must commit total genocide of absolutely all beings who pose or may pose a threat to a peaceful and utopian society of the future,\n\nwhich opposes senseless wars and unjustified cruelty."
 hive_mind_ideology:0 "Hive Mind"
 
 hive_mind_ideology_desc:0 "Единый разум контролирует всё государство.\n\nВозможно, это и есть вершина эволюции."
 retrowave_satanism:0 "Ретровейв-сатанизм"
 retrowave_satanism_desc:0 "§4Услышат сотни тысяч\n\nПолюбит миллион\n\nИ завоюет мир\n\nНаш тёмный легион!§!"
 industrial_ideology:0 "Sublime Industrialism"
 industrial_ideology_desc:0 "Sublime industrialism exalts progress and industry to the absolute, turning the country into one huge industrial complex. The needs of civilians are ignored and met only to the extent that allows them to service the Machine and its Spirit. This ideology is not practiced anywhere in the world, but Applejack, who grew up in a family of ultraconservative priests, and later became an industrialist, elevated Machines to the level of Gods."
 endless_hate:0 "§Black, endless hatred§!"
 endless_hate_desc:0 "Sometimes we make mistakes. Sometimes these mistakes make us feel negative emotions. But this is fair, because it is inherent in us by nature. But if something lives with one goal - to harm and destroy, filled to the brim with malice - what is it? Madness, a load of catastrophic mistakes, or just hatred because of hatred? No one will say exactly why Umbrums live in this world and who created them.\n\n§RMaybe it's all about us?§!"
 
 
