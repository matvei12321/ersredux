 MNH_companies_cat:0 "Money and Power"
 MNH_companies_cat_desc:0 "Power in §Y[ROOT.getnamewithflag]§! it goes to the one who has the most capital. If one of the organizations receives too many resources and is disloyal, it can bring a number of problems.\n\n£GFX_harmony_texticon SLA Loyalty : §Y[?MNH.els_loyalty]%§!\n SLA resources: §Y[?MNH.els_money]§!\The liberalizers of the economy are those entrepreneurs who are dissatisfied with the current economic policy of the Federation. They advocate reducing the brutality of capital and improving the living conditions of ordinary people.\n----------------------------\ n£GFX_evolutionary Loyalty of capital Communists : §Y[?MNH.capital_communists_loyalty]%§!\n Capital-communist resources: §Y[?MNH.capital_communists_money]§!\n SLA resources: §Y[?MNH.els_money]§!Capital Communists believe that the capital produced by the working class should be distributed equally among all, and taxes should be eliminated as such.\n----------------------------\ n£GFX_pmc_text_icon Loyalty of Military Corporations: §Y[?MNH.military_companies_loyalty]%§!\n Resources of Military Corporations: §Y[?MNH.military_companies_money]§!\n----------------------------\ n£GFX_ff_text_icon F&F (TM) Loyalty: §Y100%§!\n F&F (TM) resources: §Y[?MNH.fnf_money]§!"
 
