 PGS_no_politics:0 "Государство третьего мира"
 PGS_no_politics_desc:0 "Несмотря на территориальные размеры и внушительную численность армии, пегасье государство - одно из самых неразвитых в мире, позицию ниже занимают только совсем дикие племена и незаселённые территории. Здесь отсутствуют реальные законы, кроме армейских, а политическая система была разрушена, когда солдаты захватили власть. Всё, что удерживает эти земли от анархии - шаткое правление армии Верховного Главнокомандующего.\n\nВ таком состоянии государство [PGS.getname] вряд ли сможет стать угрозой для своих соседей... пока что."
