 #### EVENTS
 pegasi.1.t:0 "Совет воинов"
 pegasi.1.d:0 "В большом зале одного из зданий военной администрации Пегасополиса начался традиционный совет касты воинов. Это собрание проводилось после каждой гражданской войны, если воины проигрывали - обсуждали методы дальнеййшей борьбы, если были у власти - обсуждали будущее племён. Обычно в этом участвовало три фракции - военные-националисты, которых возглавлял Харрикейн, военные-миротворцы, ведомые офицером Флаттершай и малочисленные священники, которые могли просто поддерживать или молча осуждать выступающих.\n\nНо, ко всеобщему удивлению, несмотря на крах королевской династиии, на совет явились монархисты - в основном бывшие аристократы. Их было немного, но они были интеллигентны и образованы, и приводили интересные аргументы в пользу возврвщения монархии, смешанной с нынешней стратократией (монархистов было действительно мало - те немногие дворяне, кто по каким-то причинам не сбежал в Лас-Пегасус).\n\nОбычно совещание воинов сопровождалось шумом и неразберихой, из-за чего курс страны так и не обсуждался должным образом, но сегодная всё прошло в необычно стабильной обстановке. Только Харрикейн черезчур пламенно выдвигал свои идеи, что немного напрягало остальных участников совета, но итогом собрания стало то, что..."
 pegasi.1.a:0 "Националисты опять выступили с пылкими речами." 
 pegasi.1.b:0 "Монархисты выступили убедительно." 
 pegasi.1.c:0 "Миротворцы задали спокойную обстановку." 
 
 pegasi.2.t:0 ""Товарищи, это беспредел!""
 pegasi.2.d:0 "Только что с жалобами к Харрикейну, как к правителю, обратилась семья верных нам крестьян. Ситуация такова, что отряд солдат, в изрядно подвыпившем состоянии совершил налёт на крестьянское хозяйство, забрал урожай и сжёг посевы. Пострадавшие требуют компенсации и справедливого наказания для солдат."
 pegasi.2.a:0 "Проблемы рабов... Сами виноваты."
 pegasi.2.b:0 "Возместить ущерб."
 pegasi.2.c:0 "Возместить ущерб и лишить солдат должности."
 pegasi.2.e:0 "Мы обязательно решим вашу проблему. В ближайшее время."

 pegasi.3.t:0 "Что,если..."
 pegasi.3.d:0 "Флаттершай является тем пегасом, которого можно назвать мечтательницой. Её идея всеобщего мира в племенах пегасов кажется утопией, такой далёкой и неосуществимой... В этом плане она, казалось бы, идеологический противник Харрикейна - и во фракционной борьбе за власть они оба пламенно оспаривали точки зрения друг друга. И хотя их взгляды на мир различаются: он - милитарист, она - пацифист-миротворец, судьба сложилась так, что их отношения вне политики были довольно интересными, что можно было бы даже назвать дружбой - Флаттершай позволяла себе болтать с Верховным Командующим в неформальной обстановке на самые разные темы.\n\n- Слушай, можно тебя спросить кое-что довольно... необычное?\n\n- Да, конечно, спрашивай о чём угодно! Я не прочь спокойно поболтать после всех недавних изматывающих событий. И те идиотоы из Совета... Впрочем, сама знаешь.\n\n- Кхм. если бы ты не был лидером воинов-националистов, да и если бы их вообще не существовало, чью бы сторону ты выбрал?\n\nЕсли бы Харрикейну такой вопрос задал рядовой пегас, то он бы немедленно был лишён должности. Но Флаттершай - исключительный случай.\n\nПодумав несколько мнгновений, Командующий ответил..."
 pegasi.3.a:0 ""Крестьян.""
 pegasi.3.b:0 ""Монархистов.""
 pegasi.3.c:0 ""Повстречавшись с тобой... Я бы примкнул к Миротворцам.""
 
 pegasi.4.t:0 "Рейды коммунистов"
 pegasi.4.d:0 "На отряд наших солдат был совершён внезапный рейд, устроенный революционерами-партизанами."
 pegasi.4.a:0 "Чёрт."
 
 pegasi.5.t:0 "Поиски монарха - часть 1"
 pegasi.5.d:0 "Недавно Совет Воинов постановил, что в нашем государстве должна быть восстановлена монархия. Основная часть населения довольно неоднозначно отреагировала на это, но мы считаем, что этот шаг является правильным, если мы хотим восстановить стабильность для нашей нации и установить легитимное правительство.\nБыли созданы специальные поисковые группы в сопровождении профессиональных историков, которые проверят каждое поселение и каждую семью на наличие членов династии."
 pegasi.5.a:0 "Они могут быть где угодно."
 
 pegasi.6.t:0 "Поиски монарха - часть 2"
 pegasi.6.d:0 "Уже прошло три недели с тех пор, как мы начали поиски наследников династии. Никаких результатов нет, и народ становится всё более недоволен тем, что воины всё ещё удерживают власть. Такими темпами мы можем дотянуть до очередной революции.\nНекоторые члены Совета, в частности монархисты, не видят иной альтернативы, кроме как короновать Верховного Командующего - Андреаса Харрикейна. Он показал себя как уверенного, сильного и решительного лидера, способного вести милитаризированные массы за собой.\nТакое решение не будет поддержано многими воинами, но учитывая то, что даже одного кандидата не было обнаружено..."
 pegasi.6.a:0 "Что за вздор? Продолжайте поиски."
 pegasi.6.b:0 "Король? Тогда уж Император Харрикейн!"
 
 pegasi.7.t:0 "Поиски монарха - часть 3"
 pegasi.7.d:0 "Время идёт, часы тикают, ни одного потенциального монарха не было обнаружено. Нервы Верховного Командующего уже начали сдавать, но в один момент к Харрикейну обратился пегас, которого он до этого ни разу не видел ни на одном заседании Совета. Он был одет в чистейший элегантный смокинг, сшитый, казалось, в лучшем швейном бутике Юникорнии, и его манеры речи и поведение контрастно отличались даже от того, как вели себя образованные пегасы-монархисты.\n\n"Меня зовут Лойд из рода Мон-дано'эр. На простом пегасьем - "Мундаунер", но я предпочитаю менее грубый юникорнийско-культурный вариант."\n\nОн утверждал, что к династии Пегасополиса не имеет никакого отношения, а во время первых революций его предки сбежали в Юникорнию. Там они заслужили верность короны и стали приравниваться к дворянам-единорогамя, ассимилировавшись с их культурой.\n\nСамо его присутствие и статус феодала Юникорнии почти взбесили Командующего, но Мундаунер пробил дно. Его предложение было чрезвычайно дерзким: он был готов заплатить огромные суммы, которые для трещащего по швам бюджета пегасов были невероятными. В обмен на это, он требовал, чтобы его признали тем монархом, которого так усердно ищут в последнее время. Когда Хуррикенй обдумает его предложение, Мон-дану'эр будет готов перевести средства и вступить на трон."
 pegasi.7.a:0 "Ну-ну."
 
 pegasi.8.t:0 "Поиски монарха - часть 4"
 pegasi.8.d:0 "Рабочее описание\n\nНашли настоящего наследника. Рос в крестьянской семье, не подозревая о своей принадлежности к династии."
 pegasi.8.a:0 "М-хм... если он действительно наследник престола..."
 
 pegasi.9.t:0 "Поиски монарха - окончательное решение"
 pegasi.9.d:0 "Король из рабочего класса\n\nКороль-самозванец\n\nКоронация Харрикейна"
 pegasi.9.a:0 "Законный наследник."
 pegasi.9.b:0 "Нам не помешают лишние деньги..."
 pegasi.9.c:0 "Настало время для новой династии."
 
 pegasi.10.t:0 "Гражданская война"
 pegasi.10.d:0 "То, что началось как небольшие нападения на гарнизоны, переросло в полномасштабное наступление. Нет сомнений - мы находимся в состоянии очередной гражданской войны.\n\nНо [Root.GetLeader] утверждает, что если мы смогли восстановить порядок в прошлый раз, то сможем и сейчас! За оружие!"
 pegasi.10.a:0 "Защитим родные земли от красных!"
 pegasi.10.b:0 "§RЭХ, РУБИ-УБИВАЙ!§!"
 pegasi_10_b_tt:0 "Вы продолжите игру за восставших крестьян.\n\n§RБыла б свобода, да для народа, всё остальное - трын-трава!§!"
 
 pegasi.11.t:0 "Индустриальное общество и его будущее"
 pegasi.11.d:0 "Сегодная был созван ещё один Совет. На этот раз инициатором были сторонники военной хунты. Они утверждали, что после того, как проблема рабочих будет решена, мы должны будем построить мощную и конкурентноспособную экономику. На секунду показалось, что в кои-то веки весь зал наконец-то был в едином согласии, но милитаристы начали описывать то, какой именно будет экономика: дикая военная промышленность, управляемая государством.\nКатегорически против этой идеи выступили миротворцы: Флаттершай утверждала, что военная экономика будет вредна для общества, и что промышленность стоит направить на развитие качества жизни населения.\n\nХаррикейн и Флаттершай чуть не устроили скандал, но группа монархистов вмешалась, сказав, что современные нации не ведут чисто военную или гражданскую экономику. Будущей стране пегасов нужны будут фабрики для удовлетворения гражданских нужд, и заводы войны для защиты от внешних угроз.\n\nПо итогу, Совет через долгие дебаты пришёл к выводу..." 
 pegasi.11.a:0 "Нам определённо будет нужна военная промышленность."
 pegasi.11.b:0 "Какие военные нужды? В нашем будущем мы вообще не должны допускать войн!"
 pegasi.11.c:0 "Впрочем, можно придти к компромиссу..."
 
 pegasi.12.t:0 "Вдохновитель революции, конец истории"
 pegasi.12.d:0 "По приказу нашего лидера, [Root.GetLeader], было совершено покушение на жизнь лидера красных революционеров - пегаса по прозвищу "Красное Пламя". Двое профессиональных убийц должны были внедриться в ячейки сопротивления крестьян и доблестно устранить разносчика заразы.\n\nНо по результатам операции, покушение на жизнь не только провалилось, но и наши ассасины были рассекречены.\n\nС тех пор, как их отправили на задание, они не выходили на связь..."
 pegasi.12.a:0 "Но мне сказали, что он умрёт!"
 
 pegasi.13.t:0 "Дружеская прогулка"
 pegasi.13.d:0 "В последнее время обстановка в стране становилась всё более напряжённой, и каждое заседание совета воинов по незначительным вопросам бесило Харрикейна. Лишь примерно два раза в неделю на повестке дня рассматривались действительно острые и актуальные проблемы. Это бы давно вывело Харрикейна из себя, если бы не Флаттершай. В её присутствии всё вдруг сразу становилось таким лёгким и простым. Даже когда они с идеологической ненавистью спорят друг с другом на Совете, они образуют странную синергию. Всем, и им в том числе, сразу становится ясно, чего они требуют и за что они готовы сражаться.\n\nПрохладным вечером генерал-диктатор и его ближайшая... знакомая? приятельница? союзниаца? Кем бы он не считал Флаттершай, они просто шли по тёмным улицам Полиса. В спокойной обстановке пегас и пегаска болтали на приземлённые темы, не связанные с политикой - чем они хотят завтра пообедать, насколько их спальные места жёсткие и какие все их союзники во фракциях бесполезные идиоты. Флаттершай, усмехнувшись, подметила, что не все солдаты в армии глупые. Она верила, что при необходимости и достаточной мотивации они могут свернуть горы.\n\nВнезапно идиллию прервал запыхавшийся пегас в тёмной военной форме.\n\n- Командующий Андреас Харрикейн, вы срочно нужны для разрешения межличностного конфликта! Без вашего вмешательства наши пьяные ребята совсем там поубивают друг дргуа!\n\nХаррикейн закрыл глаза на то, что солдат не отдал честь и не спросил разрешения на доклад."
 pegasi.13.a:0 ""От пьяных драк ещё никто не умирал. Тем более, у меня... есть дела поважнее.""
 pegasi.13.b:0 ""Точно. Проблема, ради которой можно прервать отдых.""
 fluttershy_x_hurr_tt:0 "§YФлаттершай§! и §YАндреас§! будут §Pпроводить больше времени друг с другом§! в будущем."
 
 pegasi.14.t:0 "Бот выбирает путь"
 pegasi.14.d:0 "Если вы видите этот ивент, то вы играете не очень честно!\n\nА вообще, суть в том, что если бы этого ивента не было, бот всегда бы выходил на диктатуру, ибо у него нет таких установок: "Ждать, пока путь по этому фокусу будет открыт". Этот ивент исправляет такую ситуацию, и бот, в зависимости от его рандомного выбора, не будет/будет ждать, пока фокус монархии или миротворцев будет доступен. Также, чтобы ИИ не застрял из-за не повышения популярности нужных партий, после этого ивента бот будет выбирать в последующих ивентах только варианты ответов определённого пути."
 pegasi.14.a:0 "Бот выбирает диктатуру"
 pegasi.14.b:0 "Бот выбирает монархию"
 pegasi.14.c:0 "Бот выбирает миротворцев"
 
 pegasi.15.t:0 "Тёмная ночь"
 pegasi.15.d:0 "Это была одна из темнейших ночей. Солдаты гарнизона были уверены, что теперь, когда их правители укрепили власть и решили крестьянские проблемы, они наконец-то смогут отдохнуть.\n\nСержант Фастклифф уже готовился попросить у начальства отпуск, чтобы наконец-то вернуться к своей жене и сыну. Всего через две недели мальчику исполнится десять лет. Такую дату нельзя пропускать!\nСержант полагал, что со стабилизацией ситуации в стране, слежка за порядком не будет такой приоритетной задачей, и пару сотен солдат отправят домой.\n\nВ кустах что-то зашуршало. Всего на пару мнгновений. И нет, это точно не был дикий зверь, это был кто-то, кто намеренно скрывался. Теперь он ускользнул.\n\nДа, отпуск может подождать."
 pegasi.15.a:0 "Пули не свистят... пока что."
 
 pegasi.16.t:0 "[Root.GetLeader], привет от детей революции!"
 pegasi.16.d:0 "Ты получил это письмо, грязный, зажравшийся тиран?\n\nЕсли да, то знай: мы уже на полпути к своей свободе!\n\nСкоро знамя свободы будет реять над Пегасополисом, Уайтбелом, над Клаудсдейлом, везде!\n\nМы будем сражаться за свою свободу! *неразборчиво* вам, а не наша жизнь! Мы не сдадимся без боя!\n\n\nЖДИТЕ КРАСНО-ЧЁРНЫХ ГОСТЕЙ!"
 pegasi.16.a:0 "Просто чья-то шутка..."
 
 pegasi.17.t:0 "Церковь не благославляет воинов"
 pegasi.17.d:0 "Священники рассмотрели наше предложение и отказали воинам в благословлении! Кроме того, они заявили, что то, что творят наши солдаты - братоубийство, и что они никогда не избавятся от этого греха."
 pegasi.17.a:0 "Разве не все заслуживают прощения?"
 
 pegasi.18.t:0 "Церковь благославляет воинов"
 pegasi.18.d:0 "Священники рассмотрели наше предложение и благословили воинов! Они посчитали очищение нашей земли от коммунистов раз и навсегда священной миссией, ведь таким образом наши солдаты защищают наших богов от красной атеистической угрозы."
 pegasi.18.a:0 "Вперёд и с верой."
 
 pegasi.19.d:0 "\n\n\n\n- Я хочу сказать, что не все солдаты поддерживают вашу политику. Точнее, практически никто. Националисты и монархисты негативно отзываются о ваших реформах, кроме того, считают, что вы ведёте нашу страну по пути слабости и трусости. Как вы на это ответите?\n\nТишина окутала зал заседаний. Верховная Главнокомандующая не давала ответа. Начало создаваться ощущение, что она впала в ступор и не знает, как реагировать на этот отчёт.\n\n- Кхм... Верховная Главнокомандующая Фла-\n\n- Я тебя услышала. Да. Спасибо всем присутствующим. Заседание Совета окончено.\n\n- Но..."
 pegasi.19.a:0 "Окончено."
 
 pegasi.20.t:0 "Ты со мною забудь обо всём..."
 pegasi.20.d:0 "Военный фельдмаршал и уверенная пацифистка. В последнее время их совместные прогулки стали частым и обычным явлением, а после избрания нового монарха этих двоих редко видели на заседаниях Совета.\n\n- Что ты об этом думаешь?\n\n- Странное ощущение. Всё это возвращение к монархии... Это ведь то, с чем я недавно боролся. Но сейчас этот парень просто взял и взошёл на престол. Очень странно.\n\n- Хм. А вот я спокойна.\n\n- Почему же?\n\n- Не знаю... Но я видела этого Кристофера. Я немного общалась с ним, мне он показался хорошим и честным пегасом. Он молод и неопытен, но у него доброе сердце. Он приведёт страну к лучшему будущему.\n\n- А как же твои Миротворцы? Вы же боролись за мир, пацифизм и прочую чушь. До сих пор этого не одобряю.\n\n- Кхм. Я как раз имею ввиду, что этот парень сможет сделать великие дела. Ему суждено привести страну к гармонии - а это и была цель Миротворцев. Я просто пущу всё дальше по течению. Моя миссия исполнена.\n\n- И что будешь делать?\n\n- Начну жить спокойной жизнью. Не знаю, где. Но подальше от всех беспорядков.\n\n- Если честно, я тоже. И... Флаттершай, я знаю один остров. Он находится практически у берегов Малиновой Рощи. Он не отмечен на картах, и мало примечателен. Мы могли бы остаться там... Вместе. Там, где нас никто не потервожит.\n\n- Я... согласна."
 pegasi.20.a:0 "Вместе."
 
 pegasi.21.t:0 "Наша борьба"
 pegasi.21.d:0 "Мундаунер - скользкий тип. По крайней мере, Харрикейн, который прошёл через множество жизненных испытаний, видел это. Что может быть хуже пегаса, который ставит культуру единорогов превыше пегасьей?\n\nНет, передача власти этому самозванцу была ошибкой. И Андреас её исправит.\n\nФлаттершай уже готовилась ко сну, который она так заслужила, как вдруг к ней прилетел пегас-гонец, передавший послание от некоего пони, пожелавшего назваться "приятелем".\n\n"Дорогая Флаттершай. Иногда мы совершаем ошибкт в жизни. Из-за моей ошибки, теперь враги будут окружать нас везде. Желание заполучить денег прямиком от каких-то дворян Юникорнии не стоило того.\nЗа всё то время, что я провёл с тобой, я понял: ты - единственная, кому я могу полностью доверять. Умоляю, мы должны вместе вернуть всё на свои места.""
 pegasi.21.a:0 "."
 
 pegasi.22.t:0 "Мятежники атакуют!"
 pegasi.22.d:0 "Ублюдки!\n\nЭти нытики-космополиты, которые засели в Лас-Пегасусе, перешли все границы. Мало того, что они предали нас в далёком прошлом, сейчас они воспользовались нашим положением и атакуют нас с южных направлений.\n\nНо не всё так просто. Вы не сможете просто открыть нам второй фронт и быстро заставить нас капитулировать. В Пичивлле есть множество солдат, которые ещё не были мобилизованы. Можно было бы оставить их в запасе, но они могут прямо сейчас сформировать несколько дивизий и дать отпор предателям."
 pegasi.22.a:0 "Оставим от них пыль."
 
 pegasi.23.t:0 "Зализывая раны"
 pegasi.23.d:0 "Гражданская война была окончена. Был ли это конец беспорядкам? Конечно же нет. И Харрикейн понимал, что его способы провалилсь. Пришло время вновь собрать Совет. Но на этот раз Харрикейн пригласил самых лояльных и организованных генералов.\n\n- Сидерис, я хочу знать текущкю обстановку. В каких регионах ещё идёт сопротивление?\n\n- Верховный Командуюущий, сопротивление в Фаргополисе достигает немыслимых масштабов. Похоже, анархисты основательно промыли мозги местному населению - никто там не принимает наших солдат.\n\n- На восточных землях восстания тоже не редкость - дополнила суровая Аркадия, - кажется, что даже присутствие наших военных группировок никак не смягчает обстановку в нашу пользу.\n\nВсё было просто паршиво. Север, юг, центр, запад - везде ещё была эта красная угроза. Единственное, что реально изменилось - это присутствие военных патрулей.\n\n- Каков наш дальнейший план действий, Верховный Командуюущий?\n\n- Мы превратим жизнь этих красных выродков в ад. Мы превратим нашу страну в такой аппарат, что они и слова в нашу сторону не кинут. Мы уже будем не страной с армией и рабочими... Мы будем армией с огромными подвластными территориями.\n\nПрисутствовавшие молчали. В конце-концов Сидерис предложил более мягкий вариант: держать страну в крепких копытах, при этом прекратив повсеместное крестьянское угнетение. Но всё равно решение мог принять только один пегас.\n\nПосле того собрания Харрикейн был сам не свой. Он был уверен, что может лучше всех управлять армиями. Но вряд ли он справится с управлением государственным аппаратом, так почему бы не превратить целую страну в армию? Но насколько это хорошая идея?"
 pegasi.23.a:0 "Первый раз в жизни его охватило сомнение."
 
 pegasi.24.t:0 "Зализывая раны"
 pegasi.24.d:0 "Прохладный западный ветер. Развалины некогда спокойной Платонии. Как нужно было реагировать на это зрелище? Кто-то бы впал в печаль от того, что такой прелестный городок стал жертвой разрушительной войны. Кто-то бы прошёл мимо всех этих полуразрушенных домов и не обратил на них внимания. Но у Харрикейна были свои чувства при взгляде на все эти руины. Когда-то этот город был его домом. И когда война окончилась, он первым делом отправился сюда.\n\n"Нечто вроде душевного удовлетворения".\n\nВерховный Командующий отсутствовал несколько дней. Другие генералы уже запеспокоились о его пропаже, но Харрикейн всё же вернулся.\n\n- Итак, какие города были разрушены и какие сёла были стёрты с земли? Элия, Авалон, Акорнейдж, Фаргополис - это всё фронт наших действий. Кроме того, я пересмотрел свои планы в отношении крестьян. Будет нелегко, но конечный результат превратит нашу армию в сильнейшую в мире. За работу, солдаты!\n- Так точно, Верховный Главнокомандующий!"
 pegasi.24.a:0 "Минута перерыва прошла."
 
 pegasi.25.t:0 "Она была слишком добра для этого мира"
 pegasi.25.d:0 "Флаттершай была окружена. Её союзников перебили. Ах, если бы они согласились сотрудничать с милитаристами в построении нового государства... Но было уже поздно. Сам Харрикейн со своей гвардией стоял перед ней, надменный и хладнокровный.\n\n- Оставьте нас. Я разберусь с лидером пацифистических червей лично.\n\nОтряд покроно повиновался, и два пегаса остались наедине - две абсолютно разные судьбы, разные взгляды на жизнь. Они оба знали исход этой встречи, но не каждый из них был к этому готов.\n\n- Делай, что должен.\n\n- Ч-что?\n\nРобкий голос пегаски словно выбил Харрикейна из колеи. Он ожидал, что она будет сопротивляться, но...\n\n- Послушай, я... могу дать тебе шанс. Мы всё ещё можем быть вместе. Просто откажись от своих идеалов.\n\n- Если бы это было так просто, Верховный Командующий. Если оставишь меня в живых, я буду лишь палкой в колесе военной машины, которую ты хочешь запустить. Это ведь твоя мечта - создать великую нацию, которой будешь править железным копытом? Я просто хочу, чтобы ты был счастлив, когда эта мечта осуществится. А мои убеждения уже не имеют значения. Я уже не имею значения.\n\n\n...\n\n\n- Возможно, ты права. Мы зашли слишком далеко, чтобы идти назад. Прощай.\n\n- Прощай, мой Верховный Командующий."
 pegasi.25.a:0 "Тлеют последние угли доброты."
 
 pegasi.26.t:0 "Последняя большая охота"
 pegasi.26.d:0 "Для поисков вдохновителя революции подключили несколько тысяч солдат. Это была уже не просто поисковая кампания - это был рейд государственного масштаба.\n\nПосле долгих поисков, Кристеса случайно нашли. После поражения он сбежал в Ионию, где пытался жить своей спокойной жизнью. Он оказался в омерзительном состоянии - спал в стогах сена, а рядом с ним лежали десятки бутылок с крестьянской водкой, половина из которых были опустошены. Он должен быть убит, но сержанту Дионису было интересно узнать, что творилось в голове этого горе-революционера.\n\n- Жалкое зрелище. И это ты повёл за собой армии? В чём была твоя цель?\n\n- Ха? За мной всё-таки пришли вояки. Пошли вы, суки.\n\n- Ты ведь сейчас умрёшь. Разве у тебя нет последних слов, чтобы хоть как-то себя оправдать?\n\n- Есть. Только вот мне как-то насрать.\n\n- ...хорошо."
 pegasi.26.a:0 "Одного выстрела на тебя будет более чем достаточно."
 
 pegasi.27.t:0 "Неожиданная проблема"
 pegasi.27.d:0 "У нас две новости. Первая состоит в том, что мы успешно восстановили научные кампусы Фаргополиса до довоенного уровня. Но вторая новость состоит в том, что у нас нет учёных, которые бы в них работали. Большинство светлых умов сбежало в Лас-Пегасус, и если мы хотим, чтобы научная отрасль работала в полную мощность, нам нужно или нанять новых учёных из других стран (что КРАЙНЕ маловероятно, учитывая "престижность" нашей страны) или... убедить учёных Лас-Пегасуса вернуться в Фаргополис."
 pegasi.27.a:0 "Конечно, они вернутся."
 
 pegasi.28.t:0 "[PGS.getname] требует возвращения наших учёных"
 pegasi.28.d:0 "Из Пегасополиса пришло сообщение с требованием о возвращении наших учёных, которые сбежади из столицы, объятой хаосом гражданской войны. Должны ли мы сделать это? Возможно, мы не хотим лишний раз злить более сильного противника в лице [PGS.GetLeader]..."
 pegasi.28.a:0 "Наши учёные останутся у нас!"
 pegasi.28.b:0 "Конечно..."
 
 pegasi.29.t:0 "[LOS.getname] отказывается"
 pegasi.29.d:0 "Какая наглость! Эти выскочки из Лас-Пегасуса думают, что могут так просто говорить нам "нет"! Они сказали, что не предоставят нам наших же учёных."
 pegasi.29.a:0 "Чтож..."
 
 pegasi.30.t:0 "[LOS.getname] соглашается"
 pegasi.30.d:0 "Учёные, которые трусливо сбежали в Лас-Пегасус, теперь вернулись на родину. Для дополнительной безопасности стоит предоставить им охрану, чтобы наши солдаты не напали на них, как на предателей. В конце-концов, они же вернулись к нам."
 pegasi.30.a:0 "Отлично!"
 
 pegasi.31.t:0 "Новые порядки"
 pegasi.31.d:0 "Семья Помпеи всегда работала в Полях Артемиды, тихо занимаясь ведением сельского хозяйства, как и многие другие крестьяне в этой стране. Она знала, что их социальное положение очень низко, но её семейство давно смирилось с этим, приняв превосходство воинской касты как данность. Помпея даже мечтала о том, чтобы её сын выбился в привелегированную группу солдат. Внезапно, это случилось. Её сына, вместе со многими другими жеребцами деревни, насильно вывели из их домов. Не так она представляла себе этот момент.\n\nПомпея сопротивлялась, умоляла не уводить его. Солдаты заявили, что отныне он "не будет работать на этих грязных фермах, как земной пони" - он будет покорять небеса и соседние народы, как и полагается истинному представителю пегасьей расы.\n\nСын, похоже, уже смирился со своей судьбой. Или же эта судьба наоборот принесёт ему успех и положение в новом пегасьем обществе? Как бы то ни было, Помпея об этом точно не узнает."
 pegasi.31.a:0 ""Рад послужить своей стране!..""
 
 pegasi.32.t:0 ""И что дальше?""
 pegasi.32.d:0 "Такой незамысловатый вопрос задал Верховному Главнокомандующему Кирос. А действительно - что Харрикейн собирался делать сейчас? Сработает ли радикализация всего народа и переход мирной жизни на постоянные военные рельсы? Он не знал этого. Но он гордо сказал прямо противоположное.\n\n- Что ещё за вопросы, генерал?! Кирос, вы сомневаетесь в эффективности моего управления?\n\n- Никак нет, Верховный Главнокомандующий!\n\n- Вот именно. Лучшее, что я могу делать - это командовать армией. А что насчёт управления страной со всей этой бюрократической вознёй? Какая разница, если вся страна и будет армией - всё будет так, как скажу я, логично?\n\n- Да... Вполне...\n\n- Свободен!\n\nПеред подчинёнными он не имеет права показывать неуверенность и любую слабость. Но он вполне может поговорить об этом с Флаттер-\n\n- Ах, да. Точно."
 pegasi.32.a:0 "Теперь он словно один в этом мире."
 
 pegasi.33.t:0 ""Где бы я ни была...""
 pegasi.33.d:0 ""Андреас Харрикейн,\n\nЯ понимаю, что ты хочешь власти. Хочешь, чтобы всё шло так, как задумал ты. Я понимала это с самого начала. И ты это понимал в той же степени. И всё же, ты решил оставить меня в живых. Не только меня, но и всех Миротворцев, чья философия будет просто язвой на теле твоего "нового общества"... Я в недоумении.\n\nИ всё же, я заявляю, что оставляю пост лидера миротворцев и покидаю свою родную страну. Я не буду мешаться под колёсами твоей военной машины. Развлекайся вдоволь."\n\nНа другой стороне письма расположилась непонятная писанина с мокрыми пятнами, словно кто-то в потоке нервного срыва пытался что-то выразить на бумаге. По тем словам, которые были еле разборчивы, можно было понять, что автор писал о чём-то "Прекрасном" и... "Далёком"?"
 pegasi.33.a:""...я всегда буду пытаться не вспоминать о тебе.""
 
 
 pegasi.35.t:0 "Вопрос чести"
 pegasi.35.d:0 "С одной стороны, по-настоящему талантливый строитель должен заниматься строительством. Талантливый фермер должен пахать землю. С другой стороны, в стране, в которой общество построено на принципах воинской чести, более почётным вариантом была бы служба в армии. Такая мысль пришла в голову простому кузнецу в Эретрии, но он быстро вспомнил о том, что должен изготовить десяток комплектов боевой брони к сегодняшнему вечеру: нет времени на размышления.\nИ правда, что делали бы эти десять солдат без боевой брони высшего качества, если бы он сейчас служил на передовой?"
 pegasi.35.a:0 "Стране нужны не только солдаты."
 
