 PGS_red_flame_desc:0 ""I will take the city by deception, I will beat, maim, hang and shoot\I will approve pogroms in every possible way\I just don't give a damn about the rest!""
 
 ##### CHARACTERS
 
 PGS_hurrikane:0 "Andreas Hurricane"
 PGS_hurrikane_desc:0 ""I think it is not necessary to explain that the strong and worthy have always crushed the weak. That's our nature... this is the natural order of things."\n\pAndreas Theodoris was born and raised in a family of hereditary soldiers. He spent his youth training in the barracks, and at the age of 14 he was sent on his first combat mission. Then all his comrades died, and only he survived, using his mind and strength. Then he realized - there is no place for the weak in this life, and only the strongest will survive. For several years, Andreas, following his philosophy, confidently and rapidly rose up in the hierarchy of the Pegasus army. His fame, strength, and resilience became known throughout the Pegasus lands, and he was nicknamed Hurricane after the legendary warrior of Pegasus mythology. When he was 28, the soldiers elected him their Supreme Commander. Andreas, being an excellent theorist and excellent practitioner, began to prepare plans for a military takeover of power in the country.In 1002, Andreas launched another civil war against the then-ruling monarchy, and personally killed the entire royal family, which meant the end of the monarchist regime.Since then, Hurricane has been trying to hold onto the power of the military junta, but sooner or later a new revolution will break out."
 PGS_stormbreeze:0 ""Stormy Breeze""
 PGS_amintas:0 "Amintas Sideris"
 PGS_arcadia:0 "Arcadia"
 PGS_crouly:0 "Kyros"
 PGS_fluttershy:0 "Fluttershy"
 PGS_fluttershy_advisor_desc:0 ""We don't want to hurt anyone. Our goal is a world without violence."\n\n A smart girl, a Komsomol member and just a beauty!§!"
 PGS_still_will:0 "Eleferia "Red Flame""
