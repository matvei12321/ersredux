 PGS_workers_desc:0 "С этим что-то надо делать."
 PGS_nedovolstvo:0 "Общественное недовольство"
 PGS_nedovolstvo_desc:0 "Недавно наше правительство приняло решение, которое не понравилось всем слоям общества ввиду незаконности или неразумности самого решения."
 PGS_hurrikane_cult_idea:0 "Культ личности правителя"
 PGS_stoitsism:0 "Пегасий стоицизм"
 PGS_stoitsism_desc:0 "Годы гражданских воин закалили нашу нацию. И хотя это повлияло на видение войны нашим народом, отменные боевые навыки теперь передаются из поколения в поколение."
