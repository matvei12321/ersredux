 ##### NATIONAL FOCUS
 PGS_warriors_first:0 "Once again"
 PGS_warriors_first_desc:0 "And once again, the warrior caste defeated the peasants as a result of a bloody civil war. It seems to many that this is just the calm before another storm, but our leader, Supreme General Andreas Hurricane, has a plan... reforms that will consolidate the supremacy of the warrior caste in Pegasus society once and for all."
 PGS_warriors_question:0 "Necessary changes"
 PGS_warriors_question_desc:0 "Soldiers can provide order, but it's not enough. We have entered a new age, and we need an ideology and strong leaders. All these issues will be resolved by the Council of Warriors."
 PGS_monarchy:0 "Monarchy"
 PGS_monarchy_desc:0 "Many people will not like the idea of restoring the monarchy... At least because the last heir to the throne was just killed by soldiers in the last civil war. Mdam. But! all is not lost yet. There is a chance that at least one Legitimate person is still alive! the heir, and we will find him, and we will put him on the throne."
 PGS_military_trap:0 "Dictatorship"
 PGS_military_trap_desc:0 "Andreas Harrierkain has shown himself to be a strong and truly worthy leader. Unlike past rulers, he can restore the iron order forever.This is how all the past dictators from the warrior caste thought, but he is special. He will definitely succeed."
 PGS_peacemakers:0 "Peacemakers"
 PGS_peacemakers_desc:0 "History has shown that none of the previously warring factions of warriors, workers and monarchists could hold on as the ruling one for too long. Their views always clashed with each other, which led to new conflicts. The goal of the Peacekeepers is to reconcile the sides that hate each other, so that peace and tranquility finally come to our lands."
 PGS_smash_the_revolution:0 "New methods of suppression"
 PGS_smash_the_revolution_desc:0 "The main mistake of the past rulers was a very soft attitude towards the peasant rabble. Serfdom has always been and is the natural order of things, because the main goal of workers is obviously work! But these ungrateful slaves never appreciated that the warriors kindly provided them with protection under a strong wing. If they don't want to respect us, we will force them."
 PGS_soldiers_cult:0 "The Cult of Warriors"
 PGS_soldiers_cult_desc:0 "What can more effectively consolidate the superiority of the warrior caste than romanticizing their image? In the view of the people, a "warrior" should become a valiant defender of the weak, who is ready to sacrifice himself in the name of the state and the nation."
 PGS_hurrikane_cult:0 "Cult of Personality"
 PGS_hurrikane_cult_desc:0 "The warriors have chosen a worthy leader who will govern the Pegasus state. So that the common population does not have doubts about the ruler, his fame and power will become one of the main elements of the propaganda of our regime."
 PGS_propaganda_vs:0 "Propaganda of the danger of revolutions"
 PGS_propaganda_vs_desc:0 "Revolution is a dangerous phenomenon, and not only for our country. Why did some unicorns in the North rebel, split the country into two parts and now live in poverty and hunger through their own fault? By separating from Unicornia, Stallongrad showed that socialist revolutions bring pain and suffering not only to the alleged "oppressors", but also to the workers themselves. This is the thought that needs to be conveyed to every Pegasus."
 PGS_reward_for_loyalty:0 "Loyalty Award"
 PGS_reward_for_loyalty_desc:0 "It seems to some that this is not true, but among the peasants there are Pegasi who are loyal to the warrior caste and agree with their low position. Although this practice has not yet been seen in our country, from now on, peasants who are especially loyal to the ruling regime will be able to officially transfer from the working class to the belligerent stratum. They will replenish our army and help us in our dictatorial policy."
 PGS_kills:0 "Mass demonstration executions"
 PGS_kills_desc:0 "What is the most effective way to get rid of dissatisfied people? Outweigh them! If we can get to them, of course."
 PGS_kill_revolution_leader:0 "Death of one"
 PGS_kill_revolution_leader_desc:0 "A revolution can never be fully organized by a simple mass. The leader of the Freedom or Death movement is smart and charismatic enough to lead the oppressed peasants. Let's eliminate him, and without an ideological mastermind, the revolution will stop by itself."
 PGS_order_restored_question_mark:0 "Has order been restored?"
 PGS_order_restored_question_mark_desc:0 "We did everything as planned. But still, for unknown reasons, the workers do not return to the factories, they do not praise our leader. Several groups of peasants have deserted from the resistance, but the result is not what we expected.We'll just put in more effort..."
 PGS_police:0 "Guards of Order"
 PGS_police_desc:0 "We have decided on what our future regime will be. But no matter how well we run the state, there will always be those who are dissatisfied with the government and simply do not want to comply with the laws. To solve this problem, it is necessary to create a suppression apparatus - a military militia that will keep order."
 PGS_cancel_execequtions:0 "Peasant Support Program"
 PGS_cancel_execequtions_desc:0 "Our judicial system is so absurd! We are sure that all the "criminals" are just trying to survive, but for this they receive disproportionately harsh punishments. Everyone deserves a second chance."
 PGS_but:0 "Abolition of an ineffective judicial system"
 PGS_but_desc:0 ""
 PGS_talks:0 "Negotiations"
 PGS_talks_desc:0 "Our so-called "enemies" still have a sense of kindness and a voice of reason, even if they don't think so themselves. We just need to show them that we don't have any evil intentions towards them. Fluttershy swears: not a single drop of peasant blood will be shed!"
 PGS_talks_ok:0 "Successful start of cooperation"
 PGS_talks_ok_desc:0 "In Las Pegasus, which is located to the south of us, there are aristocrats and powerful nobles who have fled the country. And they can be understood: no one wants to live in a society where everyone hates everyone. But our society has changed, and the nobles can return to a peaceful home again."
 PGS_our_pegasi:0 "The postulate of harmony"
 PGS_our_pegasi_desc:0 "The Peacekeepers still did not have any code or clear set of rules. It's time to fix it! The Supreme Commander will draw up the Postulate of peacekeepers, based on the ideas of a harmonious ideology that exists abroad."
 PGS_peace_propaganda:0 "Spread the ideas"
 PGS_peace_propaganda_desc:0 "Now that our ideology is clearly formulated, it's time to spread the idea of pacifism and mutual respect among all our soldiers."
 PGS_harmony:0 "Peace and harmony?"
 PGS_black_squads:0 "The Black Gardius Units"
 PGS_black_squads_desc:0 "Storm Gardius and his Black Squads are one of the toughest and most disciplined military formations that we have. They can be integrated into our newly formed military militia to exercise stricter control over public order."
 PGS_white_squads:0 "Sisters and Brothers of Mercy"
 PGS_step_forward:0 "Step forward"
 PGS_step_forward_desc:0 "We did it. The problem of the peasants has been solved. Our wise leader [root.getleader] has applied the most effective methods to combat revolutionary thinking. Now the peasants are happy and will serve us without complaining about anything.\A kind of revolution. We have avoided collapse. We persevered."
 PGS_new_focus_tt:0" Will load the New Focus Tree! §R, provided that everything goes as planned.§!"
 PGS_please_revolution:0 "Get into their position"
 PGS_please_revolution_desc:0 "The main mistake of the past rulers was a very dismissive attitude towards the working class. It was with the mistreatment of them as slaves that the endless cycle of civil wars began, and what is the state of our country now? This vicious circle of fratricidal wars must be stopped through peaceful negotiations as much as possible."
 
 #### CIVIL WAR
 PGS_carnage:0 "Massacre in Polis"
 PGS_carnage_desc:0 "What's going on? The revolutionary saboteurs managed to get through the guarded borders, entered our capital and staged a terrorist attack! How was this even allowed? Who is responsible for the garrison?! Find him! Or find the guerrillas... SOMEONE!"
 PGS_garnizon:0 "Attacks on the front"
 PGS_garnizon_desc:0 "Terrible news is coming from all over the front. Pegasi with black and red banners on wheelbarrows are storming individual poorly fortified defense posts. The commanders announce the mobilization."
 PGS_flame:0 "Our inevitable fate"
 PGS_flame_desc:0 "PREPARE YOUR RIFLES!Get ready!\Please!\n\n§R FOR THE NATION!§!"
 PGS_civil_war_focus_started:0 "The civil War has begun"
 PGS_civil_war_focus_started_desc:0 "Many assumed that this was how it would end. It seems that our methods were not enough to stop the revolution... But it's too late to think about it now."
 PGS_civil_war_cloudsdale:0 "Re-equip the weather factory"
 PGS_civil_war_cloudsdale_desc:0 "Our enemy has a mobile advantage, and he uses it to the fullest. We also have a trump card up our sleeve- the Cloudsdale Weather Factory. Rains and hurricanes will not stop the rebels, but the factory is ready to be transformed for military needs. She will not be able to fulfill her direct task, but we urgently need industry for the front right now."
 PGS_civil_war_total_mobilization:0 "Gather all the warriors"
 PGS_civil_war_total_mobilization_desc:0 "We need working hooves now more than ever! Although the factions of the warrior caste have different political beliefs, they all understand that we now have a common red enemy, and only by uniting can we shoot down the wings of the revolution."
 PGS_church_help:0 "Ask for the support of the clergy"
 PGS_church_help_desc:0 "The church and religion have recently become less appreciated in our society. But this does not mean that Pegasi, going into battle, do not remember that higher powers are protecting their lives. We can turn to the clergy to bless our soldiers and raise their morale."
 PGS_knights_in_the_elder_castle:0 "Knights of the Ancient Castle"
 PGS_knights_in_the_elder_castle_desc:0 "Dragon Mountain is one of the most dangerous places in the world. It is there that the Pegasus crusaders live and train, whose families have sworn an oath that they will protect their native lands from invaders. It's time to do your duty! They have incredible combat and military skills, and their generals will be useful to us."
 PGS_economy_militarization:0 "Militarization of the economy"
 PGS_economy_militarization_desc:0 "Now the economy is in our power. And why didn't the warriors understand this earlier? There are manufactories that produce things that we don't need in wartime. But all you have to do is give a push, and these enterprises will switch from civilian goods to front-line service."
 PGS_civil_war_attack:0 "The last leap"
 PGS_civil_war_attack_desc:0 "We are successfully fighting, and the formations in the ranks of the peasants are already losing their organization. This is the perfect moment to deal a crushing blow to the rebels. And it should not be missed."
 PGS_civil_war_the_end:0 "Clear sky"
 PGS_peacemakers_help:0 "Peacemaking Assistance"
 PGS_peacemakers_help_desc:0 "Even now, at a critical moment, the Peacekeepers do not support fratricide, although their opinion does not affect anything. We will FORCE them to fight for our common future, even if it means using even more violence."
 PGS_gardyers_help:0 "Guardian's Help"
 PGS_civil_war_defence:0 "Hold positions"
 PGS_civil_war_defence_desc:0 "The rebels can rejoice that they have captured several important points. But it's not critical. Knowing the experience of past civil wars, we will not rush forward and liberate them. We will strengthen our positions, recover, and definitely counterattack."
 PGS_civil_war_the_end_desc:0 "Bullets are not whistling over us, and the blood of our brothers is no longer being shed. But have we done enough? Have we chosen the right path? Nobody cares about that right now. Tomorrow is a new day and many new goals will be set. Until then, we will enjoy moments of peace and tranquility."
 
 can_control_unicornia_weather_tt:0 "Allows you to control the weather in the state §Y[UNC.getname]§!"
 can_control_pandaria_weather_tt:0 "Allows you to control the weather in the state §Y[ERP.getname]§!"
 can_control_poly old_weather_tt:0 "Allows you to control the weather in the state §Y[PG.getname]§!"
 can_control_loss_weather_tt:0 "Allows you to control the weather in the state §Y[LOS.getname]§!"
 
 #### ECONOMIC RECOVERY
 PGS_economic_recovery:0 "Restore the economy"
 PGS_economic_recovery_desc:0 "We will not hide that it is not only the anarchists who have done things. Buildings, roads, and factories were also being destroyed on our side... We will have to recover a lot after the war. You'll reap what you sow."
 PGS_repair_civilian:0 "Restoration of agriculture"
 PGS_repair_civilian_desc:0 "The years of civil wars did not allow us to develop a strong industry, and we lived mainly on productive crops, some of which were not even produced by us. Now the issue of food from Pandoria will be decided in our favor, so we should start cultivating our lands ourselves."
 PGS_repair_industry:0 "Heavy industry"
 PGS_repair_industry_desc:0 "As we planned, we will develop heavy industry - the hum of military factories will be heard throughout our lands!"
 PGS_repair_railroads:0 "Connect two capitals"
 PGS_repair_railroads_desc:0 "Pegasopolis and Fargopolis are two of our largest cities. It is in Fargopolis that active resistance is currently taking place, and we need to create more roads in order to bring reinforcements in time to quell the uprisings."
 PGS_repair_railroads_2:0 "To rebuild large cities"
 PGS_repair_railroads_2_desc:0 "The largest battles were fought in the largest cities - and they suffered significantly from this. We need to rebuild our industrial centers."
 PGS_repair_railroads_3:0 "Rebuild the countryside"
 PGS_repair_railroads_3_desc:0 "But the rural areas, which make up the majority of our country, have suffered no less. It will take a long time to rebuild the destroyed workshops and burned houses."
 PGS_rainbow_factory_militarize:0 "The final militarization of the Weather Factory"
 PGS_rainbow_factory_militarize_desc:0 "It no longer makes sense to use the Weather Factory as a weather controller. It will bring us much more benefits as a military-industrial complex."
 PGS_dont_call_workers:0 "Military recovery departments"
 PGS_dont_call_workers_desc:0 "Since our society consists mainly of warriors, all workers should be included in special economic recovery groups on an equal basis with soldiers. Such cooperation will reduce production efficiency somewhat, but it will increase the involvement of peasants in the army more than ever."
 PGS_call_workers:0 "Work in the rear"
 PGS_call_workers_desc:0 "It cannot be denied that not all Gotwa warriors are engaged in the construction and restoration of infrastructure. We will keep the old order and experienced peasant groups will act as builders."
 PGS_rainbow_factory_back:0 "Activate weather generators"
 PGS_rainbow_factory_back_desc:0 "The energy produced by the Weather Factory allowed us to produce many weapons during the war. But now we need to bring back a tool that will allow us to take advantage of the weather."
 PGS_rainbow_factory_pandoria_weather:0 "Earth Pony Weather"
 PGS_rainbow_factory_unicornia_weather:0 "Unicorn Weather"
 PGS_rainbow_factory_ponyold_weather:0 "Other Pegasus Weather"
 PGS_arms_factories_2:0 "Standardized Manufacturing"
 PGS_fargopolis_research:0 "Fargopolis Campuses"
 PGS_fargopolis_research_desc:0 "Before the revolutions, Fargopolis was, one might say, the scientific center of the country as much as it is possible for us. Scientists have conducted research on campuses, but now there is not even that. We need to rebuild our scientific field in order to keep up technologically with our neighbors."
 PGS_fargopolis_hire_scientists:0 "New Bright Minds"
 PGS_unlocks_scientists_decisions_tt:0 " Will appear in the decision_icon_small §Resolutions§! to fix the shortage of scientists"
 PGS_fargopolis_new_researches_electronics:0 "Electronics? What is it?"
 PGS_fargopolis_new_researches_electronics_desc:0 "Electricity scared and fascinated the Pegasi at the same time. But we will tame electricity and be able to recreate it, as we once did with fire."
 PGS_fargopolis_new_researches_industry:0 "Methods of transition to manufactures"
 PGS_fargopolis_new_researches_industry_desc:0 "Do not underestimate the technological achievements of our neighbors, especially when machines work in factories instead of the ponies themselves. We need to explore a similar industry."
 PGS_arms_factories_1:0 "To support the gunsmiths of Eretria"
 PGS_arms_factories_1_desc:0 "In peacetime, few weapons were produced in Eretria, but they were of high quality. To reduce the burden on our largest cities, we must develop the military industry here."
 PGS_arms_factories_3:0 "Involve the younger generation in reconstruction work"
 PGS_arms_factories_3_desc:0 "Some Pegasi are too young to be trained in warfare. They will be involved in restoration and construction work."
 PGS_race_technologies:0 "Magic technologies"
 PGS_race_technologies_desc:0 "Fargopolis campuses can not only conduct research in the field of industry and military affairs, but also explore some things that will allow us... let's just say that influencing this world is not only in the field of weather management."
 PGS_recover_resources:0 "Restore mines"
 PGS_recover_resources_desc:0 "Our lands are rich in natural resources. They were not a high-priority target during the riots, but now they are needed for our recovering economy."
 PGS_last_steps_economic_recovery:0 "Last steps in recovery"
 PGS_last_steps_economic_recovery_desc:0 "Great job! We were able to complete the entire recovery plan for our already shaky economy. But there is one problem... We have just returned to the state of industry as it was before the Civil War. In the future, we will have to make great efforts if we want to create new projects."
 PGS_decrease_illiteracy:0 "Teach people to read and write"
 PGS_decrease_illiteracy_desc:0 "Although there are Pegasi among us who can read, count and write, there is still a fairly large proportion of the population who have not been taught basic literacy - mostly peasants. It is necessary to create schools for such segments of the population."
 PGS_develop_society:0 "Learn from a foreign example"
 PGS_develop_society_desc:0 "Most of our neighbors have moved from an industrial society to a so-called "backward industry." Radios, telegraphs, railways and sewers are being installed in these countries... We need to study these technologies and do the same in order to keep up with our neighbors, and maybe even surpass them."
 PGS_modern_buildings:0 "New construction methods"
 PGS_modern_buildings_desc:0 "Using the acquired knowledge and skills, we can begin large-scale construction work. It's time to build hospitals, schools, and equip our cities with sewers. The old life support systems of the population will be upgraded to new standards."
 PGS_develop_tracktors:0 "New tools"
 PGS_develop_tracktors_desc:0 "WIP"
 PGS_quality_of_life:0 "Improve the quality of life"
 PGS_quality_of_life_desc:0 "WIP"
 PGS_destroy_poverty:0 "End poverty"
 PGS_destroy_poverty_desc:0 "WIP"
 PGS_inscreace_society:0 "Almost a modern country"
 PGS_inscreace_society_desc:0 "WIP"
 PGS_subcasts:0 "Subcasts"
 PGS_subcasts_desc:0 "In our country, in addition to peasants, military and rulers, there have always been those who do not belong to these castes, the so-called "subcasts". Merchants, scientists, builders, blacksmiths. We should pay attention to them and make these subcasts full-fledged spheres of public activity."
 PGS_new_proffessions:0 "Civil professions"
 PGS_new_proffessions_desc:0 "Civil professions"
 PGS_something_economical:0 "Something about economics" 
 
 #### ARMY EFFORT
 PGS_army_reforms:0 "Army reform"
 PGS_army_reforms_desc:0 "Our armed forces have not developed for a long time. We may have gained some experience from civil wars, but we have absolutely no experience of modern wars with foreign countries."
 PGS_army_reforms_old_school:0 "Proven strategies"
 PGS_army_reforms_old_school_desc:0 "The lessons we learned from the civil wars in the past should not be forgotten. On the contrary, we will adapt the acquired military knowledge and will develop it in the future."
 PGS_army_reforms_old_school_2:0 "Neos Omades"
 PGS_army_reforms_old_school_2_desc:0 "Neos Omades is a Pegasus military principle, according to which a soldier in battle does not rely on powerful weapons, but on his fighting spirit and his comrades."
 PGS_army_reforms_old_school_3:0 "Zers Warriors"
 PGS_army_reforms_old_school_3_desc:0 "Fate has decreed that not all Pegasi can know what it's like to be in flight. Therefore, in our army there is a separate type of troops - ground divisions for such "limited" Pegasi. However, we must continue to focus on the development of flying forces - after all, they form the backbone of our army."
 PGS_army_reforms_new_thoughts:0 "Innovations"
 PGS_army_reforms_planning_strategy:0 "Grand planning"
 PGS_army_reforms_planning_strategy_desc:0 "When Hurricane started the uprising a few years ago, he was able to win thanks to his planning skills. Proper use of available pony resources is the key to victory."
 PGS_army_reforms_artilleria_strategy:0 "Strikes from afar"
 PGS_army_reforms_artilleria_strategy_desc:0 "We have experience using artillery. These extremely effective weapons deserve more attention."
 PGS_army_reforms_blitzkrig_dreams:0 "Dreams of iron beasts"
 PGS_army_reforms_blitzkrig_dreams_desc:0 "We have heard about such technologies that make it possible to create nightmarish machines. These cars are not afraid of bullets and they are ready to go ahead, destroying everything in their path. This may not seem like a very appropriate strategy, given the capabilities of our military-industrial complex, but..."
 PGS_army_reforms_blitzkrig_dreams_2:0 "The first models"
 PGS_army_reforms_blitzkrig_dreams_2_desc:0 "It took us a long time to at least convince the generals that these mythical "tanks" could be useful on the battlefield. Now we should think about what kind of equipment we will produce."
 PGS_army_reforms_artilleria_strategy_2:0 "Replenish howitzers"
 PGS_army_reforms_artilleria_strategy_2_desc:0 "Before starting the development of new types of artillery, we need to make sure that all battalions have experience working with similar guns. Howitzers are old weapons, but very similar to modern artillery. We can use their supplies to train soldiers."
 PGS_army_reforms_planning_strategy_2:0 "Order on our battlefield"
 PGS_army_reforms_expand_military:0 "Military complex"
 PGS_army_reforms_support_equipment:0 "Develop an addendum. equipment"
 PGS_army_reforms_new_command:0 "New High Command" 
 
 
 #### HURRICANE PATH 
 PGS_big_hunt:0 "§RБольшая охота§!"
 PGS_big_hunt_desc:0 "На этот раз они от нас не скроются. Они падут. Готовьте петли..."
 pgs_they_will_die_tt:0 "§YРождается царство армейского террора.§!"
 PGS_hurricane_political_aftermath:0 "Последствия"
 PGS_hurricane_political_aftermath_desc:0 "Нет времени отдыхать. Наш Командующий уже готовит новые планы по восстановлению нашего общества. И они более грандиозные, чем когда-либо..."
 PGS_hurricane_new_purges:0 "По второму кругу"
 PGS_hurricane_new_purges_desc:0 "Лишь сейчас я осознал, что Совет Воинов - это абсурд. В настоящей армии всё подчиняется фельдмаршалу, всё подчиняется МНЕ. А куча пегасов-солдат не имеет права решать вопросы масштабов страны. Я объявлю об устранении Совета Воинов, и всё в этой чёртовой стране будет зависеть от меня, а не от мнения большинства."
 PGS_hurricane_kill_all_monarchists:0 "Никакой надежды для монархистов"
 PGS_hurricane_kill_all_monarchists_desc:0 "Хватит этим пегасам нежить себя мечтами о том, что монархия в Пегасополисе может восстановиться. Они должны перестать считать себя третьей альтернативой между пацифизмом и милитаризмом и наконец решить, за нас они или против нас!"
 PGS_hurricane_get_rid_of_pacifism:0 "Больше никакой слабости"
 PGS_hurricane_get_rid_of_pacifism_desc:0 "Пацифизм прямо противоположен самой сути пегасьего мышления. Пегас всегда знает, что можно и нужно дать отпор вездесущим врагам и стать сильнее, захватив слабых соседей. Поэтому нам нужно §Rизбавиться§! §Pот ВСЕХ§!, кто считает, что война не присуща нашей природе."
 PGS_hurricane_accept_pacifism:0 "Принять Миротворцев"
 PGS_hurricane_accept_pacifism_desc:0 "Миротворцы могут показаться слабыми пацифистами, но они всё ещё действуют ради нашего обшего блага. Если они не хотят воевать, они могут помочь в тылу, в гражданском секторе. Но Харрикейн... то есть, мы, воины, запретим им распространять антивоенные настроения."
 PGS_hurricane_hunt_him_down:0 "Найдите этого ублюдка"
 PGS_hurricane_hunt_him_down_desc:0 "Этот анархический уродец, возглавляющий восстание, всё ещё жив. Мы предпринимали попытки устранить его, но они были смехотворными. Пара солдат-убийц? Нет, мы должны призвать всех, всех солдат для того, чтобы его нашли. Он должен быть убит, иначе сохранится риск нового восстания." 
 PGS_hurricane_start_army_society:0 "Армия и государство - понятия равнозначные"
 PGS_hurricane_start_army_society_desc:0 "Совершенно то общество, в котором всё работает чётко и без проблем, словно в машине. Это означает отсутствие протестов, подчинение правящей партии и чистосердечная служба Родине. Но гражданская диктатура может привести к недовольству населения, демократия - к слишком большой свободе, коммунизм просто пожрёт страну изнутри... Поэтому Пегасьи Племена должны быть стёрты с лица Эквуса как государство, и реформированы в новое общество, которое представляет собой чистую армию, где всё решает не жестокость или мягкость режима, а дисциплина и военный порядок."
 PGS_hurricane_trainings:0 "Всеобщие военные учения"
 PGS_hurricane_trainings_desc:0 ""
 PGS_hurricane_forced_patriotism:0 "Навязанный патриотизм"
 PGS_hurricane_forced_patriotism_desc:0 ""Неважно, хочешь ли ты того или нет - твоя родная страна требует от тебя, чтобы ты всем сердцем и душой любил её. А любовь к стране может выражаться во многих формах - активное презирание коммунизма, подчинение старшему по званию, обязательное вступление в армию, когда станешь старше...\nЕсли же ты не будешь любить свою родину, то жди от неё наказания."\n\n      - Из обучающей листовки для несовершеннолетних жеребят"
 PGS_hurricane_kazarmi:0 "Дома в казармы"
 PGS_hurricane_kazarmi_desc:0 "Настоящий воин-пегас должен быть испытан всеми трудностями жизни: даже когда-то уютный и тёплый дом должен приносить минимум комфорта для закалки характера. Наши строители и инспекторы перестроят жилые дома под новые военные стандарты, превращая их в бараки."
 PGS_hurricane_kommisariats:0 "Создать сеть военных комиссариатов"
 PGS_hurricane_kommisariats_desc:0 "Наши новые подконтрольные высшему командованию органы будут следить, чтобы каждый пегас имел статус и опыт военнослужащего. Тех, кто уколняется от вступления в армию перестанет считаться гражданином и понесёт наказание, которое вынесет начальник комиссариата."
 PGS_hurricane_military_trial:0 "Военные суды"
 PGS_hurricane_military_trial_desc:0 "Возможно, идея дать командующим комиссариатов полномочия по назначению наказаний была слишком непредусмотрительной. Для предотвращения комиссарского произвола будут созданы особые военные суды для вынесения строгого наказания не только уклонистам, но и всем преступникам. Теперь даже простой вор будет судиться по законам военного времени военным судом."
 PGS_hurricane_hunt_his_dogs:0 "Найдите его псов"
 PGS_hurricane_hunt_his_dogs_desc:0 "Убийство одного пегаса может и облегчит наше бытие, но его самые ярые последователи -  аморальные красные предатели, у которых нет шанса на искупление. Нужно выследить их всех до одного и покончить с ними.\nНе допустите смерти простых гражданских."
 PGS_hurricane_ban_communism:0 "Запретить коммунизм во всех его проявлениях"
 PGS_hurricane_ban_communism_desc:0 "Анархокоммунизм? Новосоциализм? Синдикализм? Всё это дерьмо равнозначно губительно для нашего обшества. Мы запретим любое распространение околосоциалистических идей в нашей армии."
 PGS_hurricane_burn_anarchist_books:0 "Покончить с анархическиой "эстетикой""
 PGS_hurricane_burn_anarchist_books_desc:0 "Эти анархисты утверждали, что матерные песни о полном беззаконии и пьянство могут привести их к исинной свободе. Такое ошибочное утверждение должно быть опровергнуто, а подобное... народное творчество должно быть устранено."
 PGS_hurricane_organized_cleaning_groups:0 "Организованные группы зачистки"
 PGS_hurricane_organized_cleaning_groups_desc:0 "Мы предлагали им жить мирно - они возмущались. Мы пытались успокоить их силой - они сопротивлялись. Не выборочные казни, но полное физическое вычищение и навязываение правильных идей обеспечит, что новые революционеры никогда не появятся вновь. Для этих целей мы расширим чёрную гвадию Гардиуса, дав им ещё больше полномочий и обязанностей в сфере выявления и уничтожения предателей и диверсантов."
 PGS_hurricane_health_propaganda:0 "Пропаганда ЗОЖ"
 PGS_hurricane_health_propaganda_desc:0 "Пьянство, курение, употребление различных веществ снизит общую эффективность нащих солдат. Наравне с пропагандой милитаризма и национализма мы будем распространять идею здорового образа жизни, чтобы каждый солдат-гражданин нашего общества мог дать отпор врагу."
 PGS_hurricane_ban_alchogol:0 "Ввести запрет на алкоголь"
 PGS_hurricane_ban_alchogol_desc:0 "Практически все анархокоммунисты были беспросветными пьяницами. Неудивительно, что они не смогли противостоять нашим дивизиям. Алкоголь губит организм и боевой дух - этой отраве нет места в нашей армии!"
 PGS_hurricane_let_work_some:0 "Минимум рабочих"
 PGS_hurricane_let_work_some_desc:0 "В конце-концов, кто-то должен выполнять грязную работу, чтобы обеспечить функционирование нашей армии. Машинисты, чтобы управляли поездами, кузнецы, чтобы ковали доспехи..."
 PGS_hurricane_no_workers_only_warriors:0 "Нет рабочих - лишь солдаты"
 PGS_hurricane_no_workers_only_warriors_desc:0 "Не может быть исключений. Все подлежат воинскому призыву в нашу армию.\n\n§RАбсолютно все§!."
 PGS_hurricane_clean_nation:0 "Чистота нации"
 PGS_hurricane_clean_nation_desc:0 "Не только милитаризм обеспечит нашей стране процветание. Наш путь - национализм, учение о том, что лишь величественные пегасы могут быть высшим видом.\nОднако, если представители других рас будут нам покорно служить, они смогут присоединиться к нешей армии. Но занимать высокие должности вроде генералов и командиров им будет запрещено."
 PGS_hurricane_loyalty_principe:0 "Принцип Верности"
 PGS_hurricane_loyalty_principe_desc:0 "Настоящий Гражданин должен быть бесконечно предан идеалам нашего государства."
 PGS_hurricane_heroism_principe:0 "Принцип Героизма"
 PGS_hurricane_heroism_principe_desc:0 "Настоящий Гражданин должен жертвовать собой, если это будет нужно."
 PGS_hurricane_clear_mind_principe:0 "Принцип Чистого Разума"
 PGS_hurricane_clear_mind_principe_desc:0 "Настоящий Гражданин должен помнить, что нет никакого другого верного пути, чем пути, который прокладывает Верховный Главнокомандующий."
 PGS_hurricane_proffesionalism_principe:0 "Принцип Профессионализма"
 PGS_hurricane_proffesionalism_principe_desc:0 "Настоящий Гражданин должен храбро сражаться и использовать в бою все навыки и умения, которыми он обладает."
 PGS_hurricane_a_new_law:0 "Создать новый Высший Закон"
 PGS_hurricane_a_new_law_desc:0 "Пора создать новое общество, чьим основателем будет Верховный Главнокомандующий Харрикейн. Отбросив все ненужные вещи вроде гражданских нужд, пегасы превратили свою нацию в огромную армию, которая подчиняется исключительно своему Верховному Лидеру."
 pgs_new_law_tt:0 "Активация бонусов от фокусов §YПринцип Верности§!, §YПринцип Героизма§!, §YПринцип Чистого Разума§! и §YПринцип Профессионализма§!"
 pgs_proffesionalism_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nСкорость восстановления дивизии: §G+5.00%§!\nСтоимость командующего армией: §G-10%§!\nОрганизация дивизии: §G+5.00%§!"
 pgs_heroism_principe_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nЛимит капитуляции: §G+10.00%§!\nПоддержка войны: §G+10.00%§!"
 pgs_loyalty_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nЗащита от смены идеологии: §G+10.00%§!\nЗащита дивизии на национальной территории: §G+7.50%§!"
 pgs_clean_mind_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nТемпы исследований: §G+2.50%§!\nПоддержка войны в неделю (потери в бою): §G+0.50%§!"
 PGS_prepare_war_centre:0 "Пропаганда мировой войны"
 PGS_prepare_war_centre_desc:0 "Оглянись, солдат! Юг и север, запад и восток - враги окружают тебя повсюду! Так возьми свою винтовку и лети в бой плечом к плечу со своими боевыми товарищами."
 PGS_prepare_war_right:0 "Объединить пегасов"
 PGS_prepare_war_right_desc:0 "Наш народ разрознен. Проклятые оленийцы несколько веков назад нагло совершили ряд набегов на наши прибрежные земли и осели там, в результате чего появилось чудовище под названием Поньолд. Смесь оленийской и пегасьей культуры - это должно быть уничтожено до основания.\nЛас-Пегасус - это всего лишь вольный город простых предателей, коих мы уже повстречали бесчисленное множество. Стереть их с Эквуса не составит никакого труда. Конечно, если они уже не нашли себе союз с такими же трусами, как и они сами..."
 PGS_prepare_war_left:0 "Заявить о своих правах на мировое господство"
 PGS_prepare_war_left_desc:0 "Слишком долго другие нации видели в нас лишь дикарей, способных только воевать. Хотя... если они хотят, чтобы мы были такими, то так тому и быть."
 PGS_declare_war_on_los:0 "Вернуть Лас-Пегасус"
 PGS_declare_war_on_pgv:0 "Изгнать оккупантов"
 PGS_destroy_olenian_culture:0 "Уничтожить инородную культуру"
 PGS_declare_war_on_erp:0 "Покорить земных пони"
 PGS_declare_war_on_erp_desc:0 "Земные пони хорошо обрабатывают землю, значит, они хорошо роют траншеи. Такие навыки пригодятся в нашей армии. Но они вряд ли добровольно вступят в наши ряды. Значит, мы их заставим."
 PGS_fields_of_pandoria:0 "Пополнить склады с провизией"
 PGS_learn_to_defend:0 "Использовать их физическую силу"
 PGS_integrate_erp:0 "Массовый призыв земных пони"
 PGS_declare_war_on_unc:0 "Уничтожить королевство"
 PGS_declare_war_on_unc_desc:0 "Единороги. Одно это слово вызывает неприязнь. Надменные, высокомерные, всегда на вершине. Мы покончим с этим. Единороги НЕ ДОСТОЙНЫ править этим миром, и именно мы, пегасы, спустим их с небес на землю."
 PGS_exploit_unicorn_people:0 "Эксплуатация юникорнийского народа"
 PGS_exploit_unicorn_people_desc:0 ""
 PGS_parade_of_victory:0 "Парад Великой победы"
 PGS_parade_of_victory_desc:0 ""
 PGS_parade_of_victory_desc:0 "Мы победили!"
 PGS_integrate_unc:0 "Начать призыв единорогов"
 PGS_integrate_unc_desc:0 "Единороги по своей сути не бесполезны. Если исключить из их характера высокомерность, то из них получатся мощные боевые единицы, хотя, к сожалению, и использующие §Rмагию§!. В любом случае, нам нужно в ближайшее время заняться формированием добровольческих единорожьих корпусов, а со временем и ввести полноценный призыв для единорогов. Конечно, они не будут иметь права стать генералами и командирами, так что пусть не задирают нос."
 PGS_declare_war_on_south_west:0 "Укрощение юго-запада"
 PGS_declare_war_on_south_west_desc:0 "Юго-запад - одна большая мусорная яма. Сборная солянка из самого низшего сброда. Здесь нет ничего полезного кроме живой рабочей силы, которая будет пополнять ряды нашей бесконечно растущей армии."
 PGS_develop_los_territories:0 "Чистки среди дворян"
 PGS_develop_los_territories_desc:0 "Плешивые предатели. Выследить и уничтожить."
 PGS_rebuild_empire:0 "Едины вновь"
 PGS_rebuild_empire_desc:0 "Харрикейн смог добиться того, чего не добились его предвешственники. Он смог объединить народ пегасов, и теперь, когда всё государство функционирует, как единая военная машина, народ больше никогда не распадётся вновь."
 PGS_new_army_great:0 "Великая армия, единая и неделимая"
 PGS_new_army_great_desc:0 ""Оглядываясь на то, что мы сделали в последнее время, я задаю себе вопрос: а стоило ли оно того?  Чёрт возьми, да. Нация пегасов теперь считается самой могущественной в Эквусе, если не во всём мире. Земные пони и единороги, хотя и считаются солдатами, никогда не смогут обрести истинной свободы. Они обречены вечно оставаться в звании рядовых. Это обеспечит, что пегасы будут в безопасности. Больше никто не посмеет смотреть на нас свысока.\nНИКТО.\nПегасы достигли вершины пищевой цепи. Осталось только поглотить жалкие остатки того, что может представлять для нас угрозу...""
 PGS_declare_war_on_thestrals:0 "Захватить северные племена"
 PGS_declare_war_on_thestrals_desc:0 ""
 PGS_declare_war_on_who_is_left:0 "Добейте оставшихся"
 PGS_declare_war_on_who_is_left_desc:0 ""
 PGS_tst_full_citizenship:0 "Военное гражданство"
 PGS_tst_full_citizenship_desc:0 ""
 PGS_tst_worsip:0 "Использование труда"
 PGS_tst_worsip_desc:0 ""
 PGS_declare_war_on_yaks:0 "Якская угроза"
 PGS_declare_war_on_yaks_desc:0 "Якская угроза"
 PGS_declare_war_on_grf:0 "Сразить грифоньих рыцарей"
 PGS_declare_war_on_grf_desc:0 "Сразить грифоньих рыцарей"
 PGS_declare_war_on_chn:0 "Конфронтация с чейнджлингами"
 PGS_declare_war_on_chn_desc:0 ""
 
 PGS_hurricane_reforms:0 "Реформация"
 PGS_hurricane_reforms_desc:0 "Основы и базисы нашего общества установлены. Кажется, практически всё население понимает, что отныне все являются частью великого Пегасьего Воинства. Пора отредактировать почти идеальное общество парой изменений."
 PGS_hurricane_reforms_researches:0 "Роты военных исследователей"
 PGS_hurricane_reforms_researches_desc:0 ""
 PGS_hurricane_academy:0 "Милитария"
 PGS_hurricane_academy_desc:0 ""
 PGS_hurricane_propaganda_machine:0 "Машина пропаганды"
 PGS_hurricane_culture:0 "Неопегасья культура мышления"
 PGS_hurricane_culture_desc:0 ""Неопегас" - это новый вид пегаса, следующая ступень нашей эволюции. Видя перед собой угрозу, неопегас не думает о том, как с ней справиться, ибо он уже умеет постоять за себя на уровне инстинктов. Вместо этого его мозг постоянно должен обрабатывать только информацию, входящую из уст старшего по званию. К сожалению, мы не можем залезть в головы других пегасов, чтобы правильно настроить их мышление, но мы будем стремиться к этому."
 PGS_hurricane_reforms_update_pegasopolis:0 "Обновить Пегасополис"
 PGS_hurricane_reforms_update_pegasopolis_desc:0 "Есть пегасы, которые предали наше дело. Дезертиры. Тунеядцы. Уклонисты. Все они провинились перед Главнокомандующим и нет им прощения. Им нет места среди нас, гордых воинов... но мы можем в качестве наказания использовать их труд. Для начала мы заставим их перестроить Пегасополис так, как это нам нужно. Бесчисленные военные зоны, стрельбища и полигоны должны появиться в кратчайшие сроки."
 PGS_new_pegasus:0 "Тотальная субординация"
 PGS_new_pegasus_desc:0 "После того, как Харрикейн объявил всё наше население военнообязанным, количество рекрутов в армии прибавилось настолько, что уже можно не волноваться о потерях, как боевых, так и гражданских. Это предоставит возможность окончательно закрепить принцип верности в нашей армии. Отныне за любое неподчинение командиры могут казнить своих подчинённых. Мы потеряем несколько  товарищей, но это покажет другим пример, кроме того, казнённых можно будет легко заменить."
 PGS_hurricane_unity:0 "Энотита"
 PGS_hurricane_unity_desc:0 "Энотита - с пегастего языка "единство", "сплочённость". Солдат должен быть не просто дисциплинирован и хорошо обучен, но он должен чувствовать духовную связь с сослуживцами, как если бы они были его семьёй."
 PGS_military_order:0 "Военная вера"
 PGS_military_order_desc:0 ""
 
 
 
 #### PEGASI FOCUS - ARMY ####
 PGS_army_reforms:0 "Армейская реформа"
 PGS_army_reforms_desc:0 "Долгое время наши вооружённые силы не развивались от слова совсем. Возможно, мы и получили какой-то опыт из бесчисленных гражданских войн, но у нас совершенно нет опыта современных войн с иностранными государствами. Мы умеем убивать друг друга, но нам нужно научиться сражаться с чужаками."
 PGS_army_reforms_old_school:0 "Проверенные стратегии"
 PGS_army_reforms_old_school_desc:0 "Уроки, которые мы вынесли из гражданских войн в прошлом, не стоит забывать. Наоборот, мы адаптируем полученные военные знания и будем их развивать в дальнейшем."
 PGS_army_reforms_old_school_2:0 "Neos Omades"
 PGS_army_reforms_old_school_2_desc:0 "Neos Omades - древняя пегасья военная традиция, согласно которой солдат в бою полагается не на мощное оружие, а на свой боевой дух и своих товарищей."
 PGS_army_reforms_old_school_3:0 "Воины Зерса"
 PGS_army_reforms_old_school_3_desc:0 "Судьба распорядилась так, что не все пегасы могут познать, каково это - быть в полёте. Поэтому в нашей армии существуют отдельный вид войск - наземные дивизии для таких "ограниченных" пегасов. Однако, мы должны продолжать делать акцент на развитии летающих сил - в конце-концов, они составляют основу нашей армии."
 PGS_army_reforms_new_thoughts:0 "Нововведения"
 PGS_army_reforms_planning_strategy:0 "Грандиозное планирование"
 PGS_army_reforms_planning_strategy_desc:0 "Когда Харрикейн начинал восстание несколько лет назад, он смог победить своих врагов благодаря своим навыкам планирования. Грамотное использование имеющихся пони-ресурсов - ключ к победе."
 PGS_army_reforms_artilleria_strategy:0 "Удары из далека"
 PGS_army_reforms_artilleria_strategy_desc:0 "У нас есть опыт использования артиллерии. Эти чрезвычайно эффективные орудия заслуживают большего внимания."
 PGS_army_reforms_blitzkrig_dreams:0 "Мечты о железных зверях"
 PGS_army_reforms_blitzkrig_dreams_desc:0 "Мы слышали о таких технологиях, которые позволяют создавать кошмарных зверей. Этим зверям не страшны мечи и пули, и они готовы идти напролом, разнося всё на своём пути. Это может показаться не слишком подходящей стратегией, учитывая возможности нашего военно-промышленного комплекса, но..."
 PGS_army_reforms_blitzkrig_dreams_2:0 "Первые модели"
 PGS_army_reforms_blitzkrig_dreams_2_desc:0 "Нам потребовалось много времени, чтобы хотя бы убедить генералов в том, что эти мифические "танки" могут быть полезны на поле боя. Теперь нам следует подумать над тем, какую технику мы будем производить."
 PGS_army_reforms_artilleria_strategy_2:0 "Пополнить запасы гаубиц"
 PGS_army_reforms_artilleria_strategy_2_desc:0 "Прежде чем начать развитие новых видов артиллерии, мы должны убедиться, что все батальоны имеют опыт работы с подобными орудиями. Гаубицы - старое оружие, но очень похожее на современную артиллерию. Мы можем использовать их запасы для тренировки солдат."
 PGS_army_reforms_planning_strategy_2:0 "Порядок на нашем поле боя"
 PGS_army_reforms_expand_military:0 "Военный комплекс"
 PGS_army_reforms_support_equipment:0 "Разработать доп. экипировку"
 PGS_army_reforms_new_command:0 "Новое высшее командование"

