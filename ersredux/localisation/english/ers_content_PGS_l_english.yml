 pegasi.37.t:0 "Экономика государства [ROOT.getname] восстановлена!"
 pegasi.37.d:0 ""
 pegasi.37.a:0 "Превосходные новости."
 
 
 
 pegasi_h.1.t:0 "Ещё один отчёт"
 pegasi_h.1.d:0 "Ещё один рапорт. Ещё один документ. Ещё одна бесполезная, дряная бумажка. С момента окончания гражданской войны Харрикейну поступает столько документов. Столько бесполезных документов, и есть очень маленький шанс того, что среди них попадается что-то стоящее. Вот отчёт о том, что в какой-то захолутсной деревне солдаты зстрелили мать троих жеребят. Приказ нового комиссариата в Муртиасе на подпись. Указ генерала Кироса. Харрикейн не перестаёт удивляться, что в этой стране есть столько чернил и бумаги. Просьба командующего Арионоса предоставить ему денег из бюджета, чтобы он купил себе новую форму. "Старая уже вся в дырках и жмёт"... Блядь. Кто ты вообще такой? Кто ты такой, чтобы отправлять сюда ещё один бесполезный документ, ты, чёртов уёбок?!\n\n- Верховный Командующий...\n\n- Верховный ГЛАВНОКОМАНДУЮЩИЙ!\n\nХаррикейн не заметил, как в его резиденцию без стука вошёл солдат. И только что назвал его "Верховным Командуюущим". Вошёл без стука.\n\n- Простите, Верховный Главнокомандующий! Я тут случайно подслушал, как вы рассуждали вслух только что. И... У меня предложение. Почему бы вам не расширить администарцию? Я понимаю, что вы прекрасный стратег и невероятный генерал, но почему бы вам не развить свои социальные навыки? Ваши подчинённые возьмут часть ваших полномочий на себя.\n\n"Ты... ты ёбаный предатель... я тебя сейчас убью..."\n\n- Так что скажете? Если что, я с удовольствием могу вам помочь!\n\n- Что... что ты только что сказал? Зайди позже, солдат - я сейчас занят важными делами. Вольно.\n\n- Вот я и говорю об этом! Я-\n\n- Вольно, солдат.\n\nПегас ушёл с некоторой долей разочарования. А Харрикейн остался один. Неужели он только что думал о том, как избавиться от надоедливого подчинённого? Следующие полчаса он лишь бездумно смотрел на все документы с одной только мыслью..."
 pegasi_h.1.a:0 ""Я не предатель. Я не предатель. Я не...""
 
 pegasi_h.2.t:0 "День Великой победы"
 pegasi_h.2.d:0 "На площади Бейлса пегасы провели военный парад. Единорогам было запрещено в нём участвовать, и им пришлось наблюдать за ним со стороны. Некая группа террористов попыталась сорвать проведение марша, но они были остановлены."
 pegasi_h.2.a:0 "Единороги проиграли бой."
 
 pegasi_h.4.t:0 "Распорядок дня"
 pegasi_h.4.d:0 ""Подъём в пять утра, обучение стрельбе до девяти часов утра, полчаса на перерыв, затем до двенадцати часов тренировки общего плана, полчаса на перерыв, с двенадцати до шести практические боевые занятия, полчаса на перерыв, с шести до двенадцати тренировки общего плана, перерыв на полчаса, с двенадцати до шести повторяете практические боевые занятия. Всем всё ясно?\n\nПегас в военной форме выкрикивал распорядок дня, и его внимательно слушали сотни пегасов, которые собрались на тренировочных полях. Многие из них были безграмотны и банально не смогли в своей голове составить распорядок дня. Они больше привыкли опираться на метоположение солнца, чем на часы...\n\n"Вообще-то, у меня есть вопрос", - возразил один из пегасов, стоявший в первых рядах: "Если я правильно понял, то мы с утра до утра находимся на военных учениях. И что это всё значит? Когда у нас будет время на отдых и сон? В конце-концов, на личные дела?" - пегас-военачальник лишь усмехнулся. "О, ты у нас из этих, заумных? Смог посчитать часы? Так вот я не понял твоего вопроса. Если ты так внимательно слушал, то наверняка усвоил, что у вас есть перерывы на полчаса". "Полчаса??? Это же зверство! Мы все тут от усталости помрём!" "Может, ты и помрёшь. Но достойные и выносливые станут основой нашей армии. Всё просто."\n\nТолпа молчала.\n\n"Чего встали? На стрельбише - марш!""
 pegasi_h.4.a:0 "Адаптируйся. Выживай, чтобы стать сильнее."
 
 pegasi_h.5.t:0 "Конец анархии"
 pegasi_h.5.d:0 ""Эх, тачанка-растачанка-а-а, хе-хе..."\n\nДва пегаса, явно выпившие, еле держались на своих копытах, но каким-то чудом им удалось преодолеть большое расстояние от города до ближайшей деревни, несмотря на проливной дождь.\n\n"Эх, дружище, не грусти! Вот пере- ик- бошим всех вояк, во заживём! Будет нам свобода, всё у нас будет!". Если бы его спутник был в состоянии связать слова в предложения, он бы точно его поддержал.\n\nК сожалению для них, они наткнулись на проходивший мимо военный патруль. Командующий патруля отреагировал оперативно.\n\n"Что за беспорядок. Вы, двое, назовите дивизию, номер роты и части, в которой состоите!"\n\n"Вы че, вояки? Пошли вы! Я, мля, анархист, борец за свободу! Меня питает сила пива!"\n\nПатрульные переглянулись между собой. Старший ничего не сказал и лишь кивнул головой. В следующий момент пьяные анархисты лежали в луже с простреленными черепами.\n\n"Боже. И такие животные правили бы страной, если бы победили в войне? Какой ужас.""
 pegasi_h.5.a:0 "Больше никогда."
 
 pegasi_h.6.t:0 "Враги повсюду"
 pegasi_h.6.d:0 "- Верховный Главнокомандующий, разрешите задать вопрос.\n\n- Разрешаю, генерал Сотирис.\n\n- Кому вы в будущем передатите власть?\n\n- Передам власть?..\n\n- Так точно. Сколь велики бы ни были ваши военные навыки, вы должны понимать, что не сможете править вечно. Было бы разумно выбрать преемника, и сделать это заранее. Или же вы предпочтёте решить этот вопрос потом, ойенив, кто из генералов подходит на роль Верховного Главнокомандующего?\n\n- Я... Подумаю над этим, генерал.\n\nАндреас ответил спокойно, но в его голове пронеслась буря мыслей. С чего бы это молодому генералу интересоваться властью Харрикейна? И тут же он вспомнил, как Орион Икарус спрашивал его о чём-то подобном. Но с чего бы им интересоваться такими вопросами? Зачем им лезть в политику, когда все вопросы власти решает сам Харрикейн? Если они, конечно, сами не планируют присвоить себе титул Главнокомандующего. А это значит, что они хотят власти. Значит, они хотят свергнуть Харрикейна. И он вспомнил только два примера, а сколько таких генералов держат это в тайне? А сколько простых солдат желают власти? Но править может только Харрикейн. Отныне и навсегда. И те, кто осмелятся усомниться в его власти - предатели.\n\nРаньше Флаттершай бы прервала такой поток мыслей Андреаса и успокоила его, убедив, что всё в порядке. Но теперь...\n\nДа. Наверняка многие пегасы хотят отобрать его власть и присвоить себе. И таких пегасов много. Отныне он будет более внимателен и осторожен, чем когда-либо."
 pegasi_h.6.a:0 "И он уничтожит их всех."
 
 pegasi_h.7.t:0 "Осторожность"
 pegasi_h.7.d:0 "С тех пор, как Харрикейн начал обращать внимание на амбиции других генералов, он стал более подозрительным и строгим, чем раньше. Он знал, что в системе завелись предатели, но он не знал одного: где они?\n\nЖадные до власти пегасы готовят заговор против него. Но он уже начал строительство великого государства, поэтому никто не должен встать у него на пути.\n\nАндреас провёл вечер, избегая подчинённых. Это время он потратил на то, чтобы собрать мысли и составить список наиболее вероятных предателей. В этот список вошли десятки пегасов, и все они имели что-то общее: они жаждали власти Харрикейна. Хотя они это скрывают, но Харрикейн слишком умён, чтобы не заметить в их глазах зависть и жадность..."
 pegasi_h.7.a:0 "От предателей нужно избавляться, как мы и делали всегда."
 
