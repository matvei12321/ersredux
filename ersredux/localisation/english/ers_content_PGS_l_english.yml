 PGS_comissariats:0 "Бдительные комиссариаты"
 PGS_comissariats_desc:0 "Пегасьи военные комиссариаты ответственны за набор в армию, а также наделены некоторыми мелкими полномочиями по решению судьбы солдат после их прибытия в армию. Теперь число военнослужащих пегасов значительно увеличится."
 PGS_kazarmi_idea:0 "Спартанские условия"
 PGS_kazarmi_idea_desc:0 "Чтобы создать идеальное военное общество, необходимо воспитать наших граждан в таких условиях, которые сделают из любого пегаса настоящего солдата."
