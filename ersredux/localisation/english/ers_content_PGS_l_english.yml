 ##### PARTIES
 PGS_communism_party:0 "ASIC"
 PGS_communism_party_long:0 ""Freedom or death\n§W-----------------§!\n §Wideology:§! Anarcho-communism\n\wpolitical agenda:§! Revolution\n§W-----------------§!WE WILL OVERTHROW THE BLOODY TYRANT REGIME AND FLOOD ALL RIVERS WITH BEER!§!\n\W-----------------§!"
 PGS_neutrality_party:0 "PKD"
 PGS_neutrality_party_long:0 "Interrupted Royal Dynasty\n§W-----------------§!\n §Wideology:§! Monarchism\n\wpolitical agenda:§! -\n§W-----------------§!\n\There is no sadder story in the world than the tale of the Neo royal dynasty.In the days of the dawn of the young Pegasus state, the monarchy flourished. But the Pegasus people were apparently cursed to live in troubled times all the time, so the reign of the monarchs was constantly accompanied by the Xiantian uprisings. This was partly due to the harsh personalities of the Neos family members themselves, but still.To fight the peasants, the Pegasus kings began to strengthen the army and glorify the military, for which they later paid the price. The generals seized power, and then the well-known hurricane of civil wars began. And this hurricane finally demolished the Neos dynasty in 1002, when Andreas Hurricane personally killed every member of the dynasty.For a period, the monarchists did not lose hope. But in such a dark time, they began to give up and go over to the side of the military, peasants or peacemakers, as a result of which the faction, in fact, ceased to exist.§!\n\W-----------------§!"
 PGS_fascism_party:0 "Military Junta of Hurricane"
 PGS_fascism_party_long:0 "The Military Junta of Hurricane\n§W-----------------§!\n §Wideology:§! Stratocracy\n §Political agenda:§! Militarism\n§W-----------------§!The binary are one of the castes of the Pegasus society. Their internal structure is rigidly disciplined by hierarchical principles, and the Supreme Commander stands at the top of the hierarchy. However, the Commander-in-Chief is not the absolute leader of the army, as there is a Military Council that follows the principles of a kind of military democracy.\n\n The military played a big role in the history of the Pegasus state. Initially, they supported the royal dynasty in the war against the peasants, but over time they became a separate faction opposed not only to communism, but also to the monarchy.The Warriors are currently led by Andreas Hurricane, who was elected by the Council of Warriors as their leader after the death of the previous Commander-in-Chief.!-----------------§!"
 PGS_democratic_party:0 "Peacemakers"
 PGS_democratic_party_long:0 "Peacemakers\n§W-----------------§!\n §Wideology:§! Pacifism\n §Political agenda:§! Pacification of Society\n§W-----------------§!The Peacemakers are a fairly young faction among the military, formed around the end of 999 under the leadership of the humble Fluttershy!. Instead of trying to gain power and influence, the peacekeepers set a goal to end the eternal civil war at any cost. It's not the most popular movement, but even it has a number of supporters.!.\n§W-----------------§!"
