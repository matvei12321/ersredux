 ##### PARTIES

 ##### CHARACTERS
 YAC_marx_leader:0 "Caramel Marx, the great Khan of the Proletariat"
 YAC_chieftess_desc:0 ""Hooch chadal tavcher bane. Ta miniy duudlagig sonsozh, huleen avakhyn tould bi yamar ch soriltyg taswerlehad balag bayna, Marx! Hiik zuil mash their baina..."n\Nchiftess started out as a simple Yak-partisan who was close to the ideas of freedom and universal equality. There is no exact information on when and in what setting she became acquainted with the works of Caramel Marx, but they had a powerful influence on her. She was inspired by a great struggle-a struggle not just for the freedom of the proletariat... and for something more, something bright.Fighting among the guerrillas against the Jyakistan nationalists, Chieftess achieved recognition and became the leader of small territories in Shitedgasar. Then she led the offensive against Karsakag. It was a bloody battle, but the Shayak clique emerged victorious, liberating an important city from the tyranny of Khan Bradford. Then the southern part of the khanate was cut off from the capital's Kerekh Davsag, and the Communists finished off the scattered groups of Yaks. Chieftess attempted to attack Kerekh Davsag, but was forced to sign an armistice agreement, as were other Yak khanates. But it still means that the other varkhans have recognized the Socialist Republic of Yakov as a full-fledged enemy, and Chieftess is looking forward to being able to complete the revolutionary campaign. But he definitely won't limit himself to Kerekh Davsag alone..."
 
 YAC_priest_advisor1:0 "Hervidz"
