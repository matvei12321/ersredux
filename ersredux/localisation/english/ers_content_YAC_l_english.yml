 YAC_modern_esoterism_desc:0 "It is worth recognizing that the world revolution has failed. There are only a couple of socialist countries left of communism, and we are one of the few. The Caramel Marks case, which was launched many years ago, has failed.\n\n§But if we can get it back!..."
