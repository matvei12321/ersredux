 ##### DECISIONS 
 
 YAC_purify_BAD:0 "Burn the Bara'dur library"
 YAC_purify_BAD_desc:0 "This stupid old yak Baradur built an entire library, which he imported books from all over the world, including the "Teachings of Baradur" themselves. Our revolutionary security committee recognizes this collection of text as heretical writings, after which we will get rid of them and destroy the legacy of the stupidest yak in history."
 YAC_purify_JAK:0 "Hang the nationalists"
 YAC_purify_JAK_desc:0 "The Yakistanis were the first people we rebelled against as simple guerrillas, but now we are a great socialist state. It is necessary to hunt down the remnants of Bradford loyalists and bring them to a fair trial."
 YAC_purify_MNT:0 "Destroy pagan sanctuaries"
 YAC_purify_MNT_desc:0 "The Yakrun people worship the terrible deity Yakrun, making more and more sacrifices every day. We will end this barbaric tradition of worshipping the god of madness, and begin by banning the worship of Yakrun and destroying all altars dedicated to him."
 YAC_purify_NAK:0 "Demolish monuments of the old regime"
 YAC_purify_YAK:0 "Demolish monuments of the old regime"

