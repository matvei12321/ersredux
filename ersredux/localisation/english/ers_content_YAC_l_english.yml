 ##### NATIONAL FOCUS
 
 YAC_war_win:0 "The crushing victory of the Revolution"
 YAC_war_win_desc:0 "We won! Red Khan Chieftess led us to victory! Now it's time to start preparing for a real revolution."
 YAC_basis_of_communism:0 "Fundamentals of Communism"
 YAC_basis_of_communism_desc:0 "Freedom and equality. The working class will never suffer again."
 YAC_basis_of_new_society:0 "Fundamentals of the new Society"
 YAC_basis_of_new_society_desc:0 ""
 yac_basis_of_new_society_tt:0 "Unblocks solutions to Political purges!"
 YAC_equal_property:0 "Common property"
 YAC_equal_property_desc:0 ""
 YAC_shamans:0 "Shamanism"
 YAC_shamans_desc:0 "We use our shamans to communicate with the spirits of the revolution, but the main goals we pursue are:.. Only the shamans of Mathan Krikha can do this. They should not be harmed under any pretext. To ensure their safety, we should keep them under guard until they agree to cooperate with us."
 YAC_party_propaganda:0 "Party propaganda"
 YAC_party_propaganda_desc:0 ""
 YAC_spread_marks_personality:0 "How big is Her personality"
 YAC_spread_marks_personality_desc:0 "We don't know what Marx was like during her lifetime. But we can definitely say that she respected the Yakut culture and was an excellent leader.Unfortunately, not many Yaks know about the existence of such a bright personality. We need to tell everyone about her."
 YAC_religion:0 "People's faith in Her"
 YAC_religion_desc:0 "The spirit of Marx will deign to descend into our world only if we believe in Her. No gods, no lords, for only Marx can be called God."
 YAC_spread_marks_books:0 "Books that She wrote"
 YAC_spread_marks_books_desc:0 "Caramel Marx wrote the greatest book in history, Capital. In fact, this is the only book that should be distributed among the people. Not the false "Teaching of Baradur", not the heretical writings of the Yakrun people, but the sacred "Capital".Anyone who is found reading or having any literature other than Capital will be punished, and that book will be burned."
 YAC_agrarian_industry:0 "Agriculture"
 YAC_agrarian_industry_desc:0 "Industrialization leads to the stratification of society and the emergence of such an ulcer as the bourgeoisie. Marx wrote in Capital that the working class should rise up to fight the bourgeoisie, but why allow them to appear at all? By spitting in the face of the smoky factories, we will make sure that the bourgeoisie never appears. Everyone will work within the framework of the new agrarian economic policy."
 YAC_burn_moneys:0 "Destroy money"
 YAC_burn_moneys_desc:0 "Money is the basis of capital, capital is the basis of a destructive slave system. We will fight the capitalist system by destroying the monetary currency."
 YAC_religious_colkhoz:0 "Religious collective farms"
 YAC_religious_colkhoz_desc:0 "Our goal is to unite yaks to increase productivity, and this will be realized through the creation of collective farms. Agricultural work in the field shoulder to shoulder with comrades is what can unite ordinary citizens."
 YAC_nationalization:0 "Nationalization of handicraft industry"
 YAC_nationalisation_desc:0 "WIP"
 YAC_more_red_guns:0 "More red bangs"
 YAC_more_red_guns_desc:0 "WIP"
 YAC_miners_villages:0 "Establish mining towns"
 YAC_miners_villages_desc:0 "WIP"
 yac_noclass_utopy:0 "Classless utopia"
 yac_noclass_utopy_desc:0 "Every worker has his own needs, and no one should leave offended. In our glorious state, the construction of true communism will begin, in which every Yak will be able to feel connected by a single goal, even with the highest members of the PKK."
 YAC_sheyak_pyramid:0 "Pyramid of Shayak"
 YAC_sheyak_pyramid_desc:0 "Every worker has his own needs to be met, and this task is taken over by the state. But it is impossible to please everyone at once, so Sheyak has developed a special social pyramid, according to which certain categories of citizens will receive more privileges in our society than others. At the top of the pyramid are priests and members of the General Council of the PKK, in the middle are ordinary workers, and at the very bottom are former criminals, deserters, parasites and foreigners who have not brought much benefit to the state [ROOT.getname]."



 
