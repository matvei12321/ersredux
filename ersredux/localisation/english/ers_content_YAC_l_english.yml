 YAC_alt_history:0 "The real story"
 YAC_alt_history_desc:0 "Many people believe that Caramel Marx was a revolutionary from one of the unicorn countries. She allegedly participated in some Northern revolutions, and then disappeared.But that's a lie.Caramel Marks was a great khan. She united the Yako peoples from Winnipeg to Oitjiljin. She ruled the great khaganate in accordance with her Marxist idea of workers' equality, expanding the empire of the proletarian to the entire Equus. At one point, it took over the continents of Gryphonia and Zebrica, and the whole world shone in the rays of true communism. But the envious capitalists destroyed the workers' empire and meanly eliminated Marx herself. Since then, the imperial ponies and griffins have gained independence from the Yaks, and the Yaks themselves have found themselves on the verge of an era of fragmentation.That's the story. That's the truth."
 YAC_holy_portraits:0 "Sacred portraits"
 YAC_holy_portraits_desc:0 "The portrait of Caramel Marks should be placed in every government building in the most prominent place. Every Yak should see the mother of the revolution with his own eyes every day, so that the thought that she will return will never leave anyone. Sacred portraits should always be in perfect condition and cleaned regularly. If it is discovered that Her portrait has been desecrated, it will amount to high treason."
 YAC_communes:0 "Autonomous communities"
 YAC_communes_desc:0 "WIP"
 YAC_crusade:0 "Find what we need"
 YAC_crusade_desc:0 "The shamans finally told Chieftess what they needed to get in order for Marx to return to this world. It's time to send our yaks on a search."
 
 
 
 ##### IDEAS 
 
 YAC_alt_history_idea:0 "The real story"
 YAC_alt_history_idea_desc:0 "Many people believe that Caramel Marx was a revolutionary from one of the unicorn countries. She allegedly participated in some Northern revolutions, and then disappeared.But that's a lie. Brazen and unscientific.Caramel Marks was a great khan. She united the Yako peoples from Winnipeg to Oitjiljin. She ruled the great khaganate in accordance with her Marxist idea of workers' equality, expanding the empire of the proletarian to the entire Equus. At one point, it took over the continents of Gryphonia and Zebrica, and the whole world shone in the rays of true communism. But the envious capitalists destroyed the workers' empire and meanly eliminated Marx herself. Since then, the imperial ponies and griffins have gained independence from the Yaks, and the Yaks themselves have found themselves on the verge of an era of fragmentation.That's the story. This is the truth."
 YAC_homeland_of_revolution:0 "Revolutionary consciousness"
 YAC_homeland_of_revolution_desc:0 "We, the Yaks of Karsagak, have adopted a revolutionary way of life... No, we adopted a revolutionary mind to bring freedom to our people."
 YAC_homeland_of_revolution_2:0 "Revolutionary consciousness II"
 YAC_homeland_of_revolution_2_desc:0 "We, the Yaks of Karsagak, have adopted a revolutionary way of life... No, we adopted a revolutionary mind to bring freedom to our people."
 YAC_primitive_esoterism:0 "Red esotericism"
 YAC_primitive_esoterism_desc:0 "It is worth recognizing that the world revolution has failed. There are only a couple of socialist countries left of communism, and we are one of the few. The Caramel Marks case, which was launched many years ago, has failed.\n\n§But if we can get her back!..."
