 #### EVENTS
 
 olenian_resistance.1.t:0 "Resistance"
 olenian_resistance.1.d:0 "Krieger was not particularly concerned about the state of the garrisons in his protectorate. "A steely will and a victorious spirit will allow the Lyctidians to defeat any enemies in their path," he always said when it came to the army. However, his administrative assistants, who did all the paperwork, were getting more and more worried every day. The weapon disappears. Warehouses with provisions are burning down. The patrolmen leave for the post and do not return. Similar news came from the most remote corners of Olenia, from where the changeling camps had not yet been properly established.But no one reported this to Krieger - everyone was afraid. Or they just knew it was useless.\n\n"But you, brethren, are not in darkness, so that the day may find you like a thief."\n\n--- Somewhere in one of the coastal settlements of Olenia ---\n\n- So, what are the successes of the fifth detachment?\n\n- The Changeling warehouse with provisions was blown up. It seems they kept their weapons in the same place with other supplies. Now we are waiting for news about the bombing of the railway tracks.\n\n- Excellent. Keep up the good work. And yes, I hope you haven't forgotten? What do you think the names of the stars in the sky would be?\n\n is a good question. I think even the gods know the answer, because every star is a monster.\n\n- Great. You can go now.\n\n- That's right, Queen Velvet!"
 olenian_resistance.1.A:0" Resistance? Unacceptable!"