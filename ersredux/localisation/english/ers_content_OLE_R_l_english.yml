 ##### NATIONAL FOCUS
 
 OLE_R_beats_of_heart_tell_me_im_not_dead:0 "Heartbeats tell me that I'm not dead"
 OLE_R_beats_of_heart_tell_me_im_not_dead_desc:0 "WE STILL HAVE THE STRENGTH TO FIGHT WE STILL HAVE THE STRENGTH TO FIGHT WE STILL HAVE THE STRENGTH TO FIGHT WE STILL HAVE THE STRENGTH TO FIGHT"
 OLE_R_i_see_dawn_through_my_burned_eyes:0 "Through burnt eyelids I see the dawn"
 OLE_R_i_see_dawn_through_my_burned_eyes_desc:0 "The sun continues to shine and rise every day, but it gets dimmer every day. We can still see the light. When the last ray of sunlight goes out, we will find the Sun inside ourselves. The darkness will be blinded, we only need to fight to the end.But even if we lose the battle, there is no turning back. We will go forward, and even losing battle after battle, we will continue on our way. Because all other roads are closed.\n\All that remains is to go to meet death itself."
 OLE_R_i_open_my_eyes_and_see_it:0 "I open my eyes, there is a man standing over me"

 OLE_R_great_horror_that_has_no_name:0 "The Great Horror that has no name"
 OLE_R_great_horror_that_has_no_name_desc:0 "It's a monster - a monster with no name! A monster who knows no good. The queen who will be destroyed."
 OLE_R_they_came_like_snow_drop:0 "They came like an avalanche, like a Black Stream"
 OLE_R_they_came_like_snow_drop_desc:0 "The nauseating bugs attacked us unexpectedly when we weren't ready for it. We did not plan a defense against them. But it would be useless. A stream of black fire from the east rained down on us, and there was nothing we could do. We didn't have a plan. And now we have nothing but one abstract goal. Live. To die for others to live. Memorize the names of others so they don't forget themselves.\n\n We remember. We remember that the fawn's name was Jarno, and those sisters were Kata and Suvi. And we will not let the black fire take away this memory from us."
 OLE_R_they_crashed_us:0 "They just swept us away and trampled us into the mud"

 OLE_R_our_signs_are_burried:0 "All our banners and pennants are driven into the sand"

 OLE_R_they_destroyed_everything:0 "They destroyed everything"
 OLE_R_they_destroyed_everything_desc:0 "There is nothing left that belonged to us before. Our honor is trampled, our houses are burned, but our spirit is not broken. It's not over yet. These insect-like scum will not be able to break our spirit. AS LONG AS THE LAST DEER IS ALIVE, OLENIA IS ALIVE. Let them destroy everything. Let's not have anything to fight for anymore. Well, let it be.\n\n We will fight just to live."
 OLE_R_they_killed_all_of_us:0 "They killed all of us"
 OLE_R_they_killed_all_of_us_desc:0 ""

