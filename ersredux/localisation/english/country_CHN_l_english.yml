CHN_vesalipolis_queens_tower_tt:0 "§The Heart of Hegemony§!\n\n Enemy intelligence: §G-25%§!Supplies in the province: G+25%!Local construction rate: §G+25%§!Intelligence Network Enhancement: §G+25%§!Maximum fortification: §G+25.0%§! Division defense on national territory: §G+25.0%§! Static air defense probability coefficient: §G+25.00%§!Static Air Defense damage coefficient: G+25.00%!Maximum number of factories in the region: §G+3§!"
CHN_vesalipolis_queens_tower_tt_delayed:0 "§Lthe Great Queen Tower, which has 110 aboveground and 10 underground floors, is the tallest structure in all the Changeling Lands. This building is built around the central spire of Vesalipolis, which was squeezed into the largest atrium of the tower. This glass and steel structure dominates the Vesalipolis skyline, towering over the factories, offices, barracks, and apartment buildings of the Changeling capital. At the very top of the tower is the throne room of the great Queen Chrysalis, which can house hundreds of changelings of her court. With the exception of the Queen's private chambers located at the top of the tower, the rest of the buildings are intended to house the state and government apparatus of the Hegemony.This fortress-like tower is both a military facility, a royal palace, and a government residence. Along its sloping walls there are anti-aircraft batteries, radar stations, sniper nests and artillery firing points. Two special battalions of the Royal Guard are permanently stationed in the tower, responsible for its safety and security. Finally, in addition to the offices of the Army, the Luftwaffe, and other components of the armed forces of the Changeling, the tower also houses the headquarters of the Wesalipolis Office of Public Security. While Director Vaspir Ornisium manages the operations of the world's most dangerous intelligence service from his office, which is located just a few floors below the throne room, the investigators and psychological executioners of the UOBV work in the shadows, preferring to hide in the underground depths of the basement levels of the tower.!"
CHN_acornage_colonisation_custom_tt:0 " Will give the modifier '§Colony-Alvarium Hive§!'in §Wakorage§! with the following bonuses:Local factories: §G+50%§!\n Maximum factories in the region: §G+50%§!Resistance drop rate: G+50%!\n Military-liable population: §G+50.00%§!Monthly population growth: G+75.00%!\n Non-national province pony resources: §G+75.00%§!"
CHN_acornage_colony_tt:0 "SKolonia-Alvarium Hive!\n\n Local factories: §G+50%§!Maximum number of factories in the region: G+50%!The rate of decline of resistance: G+50%!Military-related population: §G+50.00%§!Monthly population growth: G+75.00%!\nThe resources of a non-national province: §G+75.00%§!"
CHN_acornage_colony_tt_delayed:0 "§The colony-the Alvarium hive was founded on the site of the Equestrian city of Acornage. Previously, it was located on the border with the Changeling Lands, so a considerable percentage of beetles already lived there. Acornage was one of the first Equestrian cities to fall during the Great War, so it became a hub for military transportation and logistics, through which equipment, weapons, and soldiers were sent to the part of the front that required them the most.The long-standing presence of Changelings in the city made it a prime candidate for large-scale colonization after the war. The former changeling quarter in Acornage soon covered most of the entire city, and the ponies who had previously lived there were relocated to the suburbs or inner-city ghettos, where they still make up the majority of the city's population. The immigrant changelings currently living in the hive colony mostly live in the city center, where several city blocks were demolished to make way for the construction of a massive hive built in the style of metropolises like Vesalipolis, Vrax and Ditrisium. Outside the city, colonies of settler changelings spread across rural areas. Some of them are completely created from scratch, while others, like Alvarium, are based on Equestrian towns or villages. These peripheral colonies support the main colony, the hive, providing it with food, water, resources, and workers. They are also militarized to a much higher degree, while Alvarium itself remains in the process of transition from military occupation to quasi-State colonial rule. But the peripheral colonies are bastions that allow changelings to control the region. They are ready to mobilize their population at any time and march on the Alvarium if the ponies openly begin to show disagreement.!"

CHN_canterlot_palace_focus_effect_tt:0 "Last modifier '§Ukanterlotsky Commissariat§!'in the Ukanterlot! with the following bonuses:\n\n\n£CHN_Jachs_icon_text\n Major General Yahs\n Governor of Canterlot\n\nThe daily increase in subordination: G+0.05%!Maximum number of factories in the region: G+50%!\n\n\n\CHN_Marsilio_icon_text\n General Staff Member Marsilio\n - Chief Surgeon\n\n Research speed: §G+3.00%§!\n\n\n£CHN_Alcippe_icon_text\n Oberstleutnant Alkippe\n is a substitute\n\Purone inflicted on garrisons: §G-25.00%§!Garrison penetration rate: G-25.00%!\n\n\n£CHN_Finicus_icon_text\n Finicus Weighed\n                  - Rich industrialist\n\n Local factories: §G+50%§!Local resources: §G+50%§!\n"
CHN_canterlot_palace_tt:0 "§Skanterlot Commissariat§!\n\n[CHN_scripted_loc_string_Jachs][CHN_scripted_loc_string_Marsilio][CHN_scripted_loc_string_Alcippe][CHN_scripted_loc_string_Second_Wind][CHN_scripted_loc_string_Finicus][CHN_scripted_loc_string_Gloriosa][CHN_scripted_loc_string_Octavia]\n"
CHN_canterlot_palace_tt_delayed:0 "§L Formed into [?CHN.CHN_canterlot_commissariat_GetFormDate] by order of the Great Queen Chrysalis, the Special Autonomous Commissariat for the Administration of the City of Canterlot and Former Royal Possessions is a semi-autonomous state responsible for the administration of the city of Canterlot and its rural surroundings, consisting of land holdings that were once under the direct control of the Equestrian Crown.The Army Commissariat is headed by Major General Yahs of the Royal Army of Changelings. The Canterlot Commissariat itself enjoys a unique status within the Changeling Hegemony due to its exclusive jurisdiction over the former capital of Equestria. As such, the Canterlot Commissariat has a considerable degree of administrative autonomy and broader jurisdiction in resolving local legal and economic issues relative to other administrative regional commissariats in the Changeling Hegemony.!"
