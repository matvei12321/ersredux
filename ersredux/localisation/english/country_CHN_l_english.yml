CHN_chaos_in_the_everfree:0 "Chaos in the Eternal Wild Forest"
CHN_chaos_in_the_everfree_desc:0 "We defeated everything Equestria threw at us, but we didn't conquer her land itself. The Evergladen Forest, an old and mystical bastion with amazing magical powers, is now resisting our war machine. The guerrillas flock to the forest, where, under the leadership of zebra Zekora, they use the magical growth of the forest to inflict crushing blows on us. If we hope to defeat the Enemy!, the Partisans! And § Fuck the forest, §! We must develop an effective strategy!. Although §Complete and absolute annihilation§! The unique and exotic flora and fauna of this forest will be a very significant loss for some, but it still cannot be compared with the loss of a significant part of central Equestria!§!"
CHN_chaos_in_the_everfree_ticking_mission:0 "Taming the Forest"
CHN_chaos_in_the_everfree_ticking_mission_desc:0 "The growth of the Everglades Forest is out of control. The magic of the forest, enhanced by zebra Zecora, makes trees and vines constantly move forward at high speed. And the forest is always followed by guerrillas and monsters. We must surround the forest around the perimeter and constantly attack it if we hope to contain its growth. If we don't do this, the entire central Equestria could soon be overrun by this forest!\n\n§For [?days_mission_timeout@CHN_chaos_in_the_everfree_ticking_mission] days:§!\n§Every day §R Unlimited growth§! § The Wild Candle Forest§! will seize the neighboring province!.§!"
CHN_ZRS_everfree_tamed_tt:0 "§Wild Candle Forest§! will no longer resist us!"
CHN_ZRS_everfree_failure_tt:0 "We are forced to withdraw! because we can no longer withstand the terrible exhaustion! § The Wild Candle Forest§!.\n"
CHN_operation_breakthrough:0 "Operation Durchbruch"
CHN_operation_breakthrough_desc:0 "To defeat the Everglades Forest, we must use all the technologies available to us against the magic of the old world. Armored trains supported by tanks will become the spearhead, which will move deeper into the forest, giving us much-desired positions to launch anti-insurgency operations and attacks. Pony workers will work themselves to death to cut down thickets and lay rails. After all, it was their brothers and sisters who turned the forest against us, and so they must prove their loyalty to the hegemony in order to save their families."
CHN_operation_longrangerecon:0 "Operation Fernauf"
CHN_operation_longrangerecon_desc:0 "As in war, an effective attack requires knowing where the enemy is, and then crushing them with superior firepower or outsmarting them with greater speed. We will send the elite Fernspecher regiments to the Evergladen Forest to find the guerrilla strongholds there and fight the ponies hiding in the forest on their own territory. For these missions, which are almost guaranteed to be suicidal, the best of the best will be selected. Their sacrifice in the name of Hegemony will not be forgotten."

CHN_resource_exploitation_cat:0 "Das KuKC Erforschung- und Extraktion Konzern"
CHN_resource_exploitation_cat_desc:0 "Das Königin und Kaiserin Chrysalis Erforschung- und Extraktion Konzern, or the Queen and Empress Chrysalis Exploration and Production Corporation, is a quasi-governmental body responsible for the management and use of natural resources within the Changeling Hegemony ."
CHN_resource_exploitation_decision:0 "Expropriate the resources of the region [From.getName]"
CHN_resource_exploitation_decision_state_req_tt:0 "[From.getName] is owned and controlled by the Umarionette! changelings."

### LOVE CONSUMPTION MECHANIC & GUI ###
CHN_love_consumption_mechanic:0 "Extraction and consumption of love"
CHN_love_consumption_mechanic_desc:0 "§Love§! — the source of the life force of the Changeling race. It is extracted from the subjects of the hegemony of the Changelings!. The methods by which collected love is quantified remain a very vague science. lovetax_text §Huerot§! approximately equal to the amount of love that is enough to significantly enhance the capabilities of a small hive for several months.\n\n§Skorolev's army of changelings§! consumes more §Love§! than any other institution in the world. The gigantic size of the army, along with its voracity, means that the effectiveness of the changeling war machine directly depends on the amount of Love! — or lack of it — in the reserves of the Changeling state.\n"
CHN_love_erot_explainer_tt:0 "Amount of stored love! in §Serotes§!:"
CHN_love_erot_stored_explainer_tt:0 "£lovetax_text §Love§! It can be obtained using §Solutions§!, §Continuous Focus§!, and §Improvements§!, and it can also be spent to receive various bonuses.\n\If there is a shortage of love, various penalties will be imposed, the severity of which will scale depending on the shortage and will be determined by the formula (RD§!) = (CE§!) × 25%\The maximum amount of fines is §R-150%§!."
CHN_battalions_explainer_tt:0 "Number of deployed frontline battalions!:"
CHN_battalions_detailed_explainer_tt:0 "This is the total number of frontline battalions and auxiliary companies deployed in our divisions. Battalions and companies stationed in garrisons are not included in this calculation."
CHN_carrying_capacity_explainer_tt:0 "The current maximum allowable number of deployed Frontline battalions!:"
CHN_carrying_capacity_detailed_explainer_tt:0 "The maximum allowable number of front-line battalions is determined by this formula: \n(10+(§YS§!)) × 10 battalions per region.\n\n[CHN_billeting_system_bonus_loc_string](§YS§!) represents the total number of §Unenational§! regions under state control [CHN.GetNameDef] (§Y[?CHN_directly_controlled_noncorestates_var]§!), in addition to §Y50%§! of the total number of regions controlled by §Umarionets§! (§Y[?CHN_weekly_love_gain_state_PUPPETS_var]§! × §Y50%§!)."
CHN_love_erot_cost_explainer_tt:0 "The number of §Loves§! in §Hundreds§!, §R decreasing weekly§! Depending on the number of §G Frontline battalions§! exceeding their maximum allowable number:"
CHN_love_erot_cost_detailed_explainer_tt:0" A fine of §R0.001§! will be imposed for each battalion exceeding the maximum allowable number. erotes.\n\n At the moment we exceed the maximum allowable number of battalions by §R[?CHN_excess_battalions]§!, which imposes a weekly fine on us in §R[?CHN_excess_battalions_cost]§! erotov (§Y[?CHN_excess_battalions]§! × §Y0.001§!)."
