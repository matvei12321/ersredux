CHN_tank_sirius_mustang_desc:0 "Consolidated State Enterprise Sirius-Mustang, formed as a result of the merger of the former Equestrian companies Sirius Metal Works and Mustang Developments under the management of changelings. Now it is the flagship of the military-industrial complex of the hegemony and wants to assimilate the rest of Equestrian business and its industrial companies."

