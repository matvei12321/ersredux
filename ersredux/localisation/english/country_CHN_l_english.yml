CHN_settlement_plan_cat:0 "Siedlungsplan Expansionism"
CHN_settlement_plan_cat_desc:0 "The best way to control Equestria is to fill it with our changelings. Plans to colonize regions along the old Equestria border will allow us to populate these lands with loyal Changelings, many of whom fought in the Great War, and thereby strengthen our control over the surrounding lands. So we can lower the resistance! and increase §Subordination§! in these territories, as well as get more resources from them."
