CHN_DESC_ARCUS:0 "§YДата рождения§!: 21 января 979 года в Сорифе\n\n§YЗвание§!: Генерал\n\n§YБиография§!: TBD\n\n§YАвтор портрета§!: Rich May"

CHN_DESC_LACIN:0 "§YДата рождения§!: 12 марта 962 года\n\n§YЗвание§!: Генерал-капитан\n\n§YБиография§!: Ласин Кардо родился в семье военных и вступил в королевскую гвардию в день своего совершеннолетия. Он быстро поднимался по служебной лестнице и был назначен в качестве первого атташе в Империи Грифонов.\n\nИмперия открыла Ласину глаза, после чего он увлекся её военным делом и историей. Хотя глубокое понимание империи Ласином, а также его рвение хорошо послужили Кризалис, его одержимость лишь росла, и в конце концов чейнджлинга перевели обратно в Весалиполис, пока всё не зашло слишком далеко.\n\nПо возвращении Ласин был назначен ответственным за модернизацию королевской гвардии и её интеграцию в новую армию чейнджлингов. Ласин - фанатик, убежденный в праве чейнджлингов на господство. Также он испытывает презрением ко всем, кого считает слабыми. Он заходит настолько далеко, что даже среди других чейнджлингов его считают радикалом. Ласин убежден, что ульи чейнджлингов могут стать равными Империи Грифонов или даже превзойти её. Кардо уверен, что сила является ключом к успеху.\n\n§YАвтор портрета§!: Flake"

CHN_DESC_RECINA:0 "§YДата рождения§!: 23 июля 976 года в Дитрисиуме\n\n§YЗвание§!: Генерал-адмирал\n\n§YБиография§!: Рецина выделяется среди адмиралтейства чейнджлингов, так как она — единственный королевский адмирал, который, к тому же, является принцессой. Она вылупилась всего на несколько минут позже королевы Хельвии, но это решило её судьбу. Их мать полностью сосредоточилась на Хельвии, практически бросив Рецину на произвол судьбы. Воспитание Рецины также было крайне специфическим: её окружали не родные братья и сёстры, а другие дроны. А недостаток любви привёл к тому, что физический статус и магические способности Рецины перестали соответствовать королевскому уровню. Они настолько ослабли, что её иногда принимают за королевского самца. Если бы не поддержка и личная дружба с Хельвией, то Рецина могла бы совсем зачахнуть и стать нимфой.\n\nОднако врождённая способность Рецины к лидерству не ослабла, и она нашла своё призвание во флоте, где и стала очень способным адмиралом. Потеря независимости Дитрисиума и его подчинение королеве Кризалис, а также всё возрастающая роль Весалиполиса замедлили восхождение Рецины к славе. Важность развития кригсмарине значительно снизилась. После провала нападения на Кантерлот в 1002 году Рецина решила полностью отказаться от своей позиции, разочарованная действиями Кризалис в качестве лидера. Вмешательство Кризалис в эту ситуацию было невозможно из-за нестабильного политического климата на тот момент.\n\nБыло непросто убедить Рецину возобновить свою карьеру, так как она совсем не горела желанием служить под началом Кризалис. Однако, благодаря убеждению Хельвии и уважению Рецины к своей сестре, а также доказательствам уверенного возрождения кригсмарине, адмирал в отставке согласилась снова приняться работу, но уже под управлением Весалиполиса.\n\nРецина является сторонницей авиации и выступает за развитие авианосцев. Она утверждает, что морские ВВС — это будущее флота. Радиус действия самолётов намного превышает дистанцию стрельбы орудий обычных кораблей.\n\n§YАвтор портрета§!: Scroup"

CHN_RECINA_stats_tp:0 "§RНавык ущерба§!: §Y5§!\n§YНавык защиты§!: §Y2§!\n§CНавык маневренности§!: §Y4§!\n§GНавык координации§!: §Y2§!\n\n"

CHN_DESC_MIMIC:0 "§YДата рождения§!:TBA\n\n§YЗвание§!: Генерал-адмирал\n\n§YБиография§!: Мимик, командующая подводным флотом кригсмарине, всегда твердо верила в то, что флот чейнджлингов должен вести себя также, как и сами чейнджлинги. Он должен наносить быстрые удары и сразу же исчезать, не давая противнику предпринять хоть какие-то действия. Её споры о доктринах с генерал-адмиралом Лисандером переросли в личную вражду, и оба чейнджлинга стали политическими противниками.\n\n§YАвтор портрета§!: Scroup"

CHN_DESC_LYSANDER:0 "§YДата рождения§!: TBA\n\n§YЗвание§!: Генерал-адмирал\n\n§YБиография§!: Лисандер, командующий надводным флотом кригсмарине, отдаёт предпочтение самым крупным кораблям, которые только могут производить верфи чейнджлингов. Он считает, что все отделения флота должны работать в тандеме, а также в то, что одна решительная битва может переломить ход войны на море. Он считает тактику Мимик "бей-и-беги" весьма раздражающей и глупой, и со временем оба чейнджлинга стали политическими противниками.\n\n§YАвтор портрета§!: Neither"

