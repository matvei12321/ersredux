chn_equestrii_insurgency_category_desc:0 "We may have won the Great War!, but our conquest of the continent is far from complete. The harmonious Resistance!!, as well as myriad other insurgent movements, threaten our tenuous control over the defeated ponies and deer. Until this movement is suppressed, we cannot be sure of control over Equestria and Equus."
