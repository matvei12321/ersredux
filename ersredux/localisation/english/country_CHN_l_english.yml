 ers_chn.4.t:0 "The hegemony has fallen."
 ers_chn.4.d:0 "Chrysalis couldn't believe it. She tried to get in touch with the other Queens, but to no avail. Only Yaria sent a few letters in response, but rather, she was disappointed.\n\pArginnis praised this moment and was already drawing plans for an attack on Vesalipolis. There were also scribbled maps of Lyktis, Sorif, and Ditrisium. This is in case they don't obey her after the victory...\n\Pyaria was disappointed. There will be no investment in research from Vesalipolis in the near future, as Chrysalis will be busy with the war. Damn, this is all wrong.\n\Phelvia wasn't particularly worried about this. She calmly walked through the Helvia-class battleship, and thought that even if the enemy set foot on the lands of Ditrisium, they would not reach the fleet.Power only said "At ease" to the messenger who reported the collapse of the union. She doesn't care what stupid mares fighting for power are doing there."
 ers_chn.4.a:0 "But..."
 ers_chn.4.b:0 "Well."

 ers_chn.5.t:0 "Our role in this conflict"
 ers_chn.5.d:0 ""
 ers_chn.5.a:0 "Well, war."
 ers_chn.5.b:0 "Well, war."
 ers_chn.5.c:0 "Well, war."
 ers_chn.5.e:0 "Well, war."
 ers_chn.5.f:0 "Well, war."
 ers_chn.5.g:0 "Well, war."


 ers_chn.6.t:0 "The Communists are rising!"
 ers_chn.6.d:0 "It seems that we caused great dissatisfaction with the Communists by our actions, and they organized an uprising!"
 ers_chn.6.a:0 "Destroy them!"
 ers_chn.6.b:0 "Into battle, for the Front!"
 
 
 
 
 # ERS_FOCUS LOCALISATION


Chrysalis:0 "Long live the Queen!"
Chrysalis_desc:0 "Radios have appeared in almost every home. Loudspeakers were installed in all squares. Portraits of prominent figures hang in each hive. Every changeling in the country should know the face and voice of his beloved queen. In these times of terrible uncertainty, the Changeling people need a strong ruler. Only under the rule of Queen Chrysalis can our race find unity and begin to flourish."
CHN_support_workers:0 "Provide assistance to workers' families"
CHN_support_workers_desc:0 "Millions of changelings are working tirelessly for the future of our nation. They are responsible for supplying the army with everything necessary and are the foundation of our upcoming victory. The government should provide support to ordinary workers. Let this prove to everyone that Chrysalis is ruthless only to her enemies and sincerely cares about her loyal subjects."
CHN_state_propaganda:0 "The last wave of propaganda"
CHN_state_propaganda_desc:0 "The propaganda machine has been running for 5 years — since the failed invasion of Equestria. Now the Ministry of Information will launch a new propaganda campaign. Everyone who lives in our country should be sure that the goal of his whole life is the superiority of the Changeling race over all others, and that under the rule of Queen Chrysalis this goal will be achieved."
unite_the_people:0 "Unite the nation"
unite_the_people_desc:0 "Queen Chrysalis has received tremendous support. She and her government commission are organizing several trips to the country's hives. Business plans will be drawn up, new deals will be concluded, and meetings will be held. Vesalipolis strives to strengthen ties with the regions in order to make the nation stronger."
hive_funding:0 "Financial support for Small Beehives"
hive_funding_desc:0 "The huge hives of Vesalipolis, Vrax, Ditrisium, Sorif, and Lyktis are the mighty centers of our industry, but there are also countless small hives. We should not neglect them, and their changelings should be grateful to their queen, as they are as important as any other hive. In turn, we expect them to contribute to the development of our nation."
Expansion_of_newhives:0 "Continue upgrading the hives"
Expansion_of_newhives_desc:0 "Due to our isolation and the sanctions imposed by Equestria, many hives have lagged behind in economic and social development. More advanced hives should help the laggards to make the country stronger. Public projects and smart investments will transform dilapidated and backward caves into shining modern beehives."
steel_industry:0 "Vrax Steelworks"
steel_industry_desc:0 "The northern mountains are rich in iron ore. However, in order to use it effectively for military production, processing plants and transport infrastructure must be built in the Vrax hive. Komoraf will oversee the project and ensure to the Queen that it will be completed on time."
army_research:0 "Military research"
army_research_desc:0 "The Department of Military Research is requesting additional resources to continue improving academic, industrial, and nonprofit laboratories that will serve the army."
research_tanks:0 "Development of armored forces"
research_tanks_desc:0 "Trimmel and several other members of the General Staff propose a further expansion of the mechanization of our army. They believe that speed is the key to winning modern battles, and that tanks will become the indefatigable and invincible hammer of the changeling army."
research_air:0 "Modern military aviation"
research_air_desc:0 "Victory will be achieved by destroying the enemy's ground forces. We must focus on gaining air superiority. Although changelings have always been able to fly and wage air warfare, airplanes have completely changed the strategy of war. We must adapt and continuously improve our pilot training projects and programs."
improve_economy:0 "Subsidize entrepreneurs"
improve_economy_desc:0 "The strategy of successful economic development should strive to improve the skills of the workforce and reduce business costs, as well as increase the availability of important resources for the prosperity of our country and successful competition with other states. Generous government subsidies will help businesses by allowing them to grow independently."
CHN_soryth:0 "Sorif"
CHN_soryth_desc:0 "Sorif is a beehive city located on the hilly shores of Klyuch Lake. It is an important northern hive with the only magical university in the country. To further improve our magical research capabilities, crystal mines will be opened nearby. And with sufficient funding, Queen Yaria and her university will be able to help in our research, allowing us to find new ways to use magic militarily."
nuclear_effort_CHN:0 "Northern Center for Nuclear Research"
nuclear_effort_CHN_desc:0 "The creation of several top-secret laboratories in the far north to explore the possibilities of superweapons will win the next war."
#equality_for_all_CHN:0 "Everyone should be equal"
thoraxian_betrayal:0 "The Betrayal of Thorax"
thoraxian_betrayal_desc:0 "The rotten tumor called harmony has finally wrapped its tentacles around several changelings in key government positions, and we can only wait for the results."
thoraxian_betrayal_tt:0 "Supporters of Inharmony! under the leadership of §Uthorax§! They will rise soon!\n"
destroy_thoraxian_opposition:0 "Suppress the Thoraxians"
destroy_thoraxian_opposition_desc:0 "The remnants of the dirty harmonica terrorists have become active again in various hive cities across the country. Numerous sources claim that an uprising against the legitimate government will begin soon. However, our loyal agents are already working to find their hiding places. We will take a decisive step. The resistance will be suppressed."
send_spies_to_EQS:0 "Equestria Agent Network"
send_spies_to_EQS_desc:0 "The lessons learned from the previous invasion of Canterlot were painful, but very important. During this war, spying on the industrial and military potential of our enemies will not only be useful, but also vital. Our agents will also be able to wreak havoc in their ranks, as no one is able to recognize us in our new guise."
steal_tech:0 "Infiltrate important posts"
steal_tech_desc:0 "Espionage and counterintelligence follow together like a pony and a cart. Spies have taken key positions at several Canterlot universities, and it's time for them to share their achievements. We will be able to maintain our technological superiority and keep up with our enemies."
CHN_develop_vesalipolis:0 Vesalipolis
CHN_develop_vesalipolis_desc:0 "The Queen has decided to develop the capital's beehive in Vesalipolis. We will build a subway, an underground factory, and finance other construction projects in the beehive city. The largest city in Equus will become even better, a true beacon of prosperity for all changelings."
CHN_develop_ditrysium:0 "Ditrisium"
CHN_develop_ditrysium_desc:0 "The Queen has decided to accelerate the development of the northern port city of Ditrysium. She ordered the construction of two shipyards and the financing of other shipbuilding facilities. New railways will also be built and fishing companies will be established. Queen Helvia should be grateful for this, even if the project is completed without her approval."
CHN_develop_vraks:0 "Vrax"
CHN_develop_vraks_desc:0 "After some hesitation, the Queen demands that we start developing the southern military center, Vrax. Two new military manufactories will be opened, and she will decide later whether further construction projects will be initiated or whether the efficiency of existing factories will be improved. Chrysalis demands that we complete the project without unnecessary delays."
air_research:0 "Equestrian aircraft drawings"
air_research_desc:0 "Our spies in Equestria have managed to steal various aircraft blueprints that can be used to improve our own models. Their Pegasi, admittedly, are competent designers. But they obviously don't think much about the safety of pilots."
technology_center:0 "Largus Research Center"
technology_centre_desc:0 "Modernization of the capital and central regions of the country is in full swing. More changelings means more possibilities. The grandiose research complex in the northern part of Vesalipolis has been under construction for several years, and it will be put into operation in the next couple of months. Long live the science of the Changeling Lands!"
naval_research:0 "Successes in naval espionage"
naval_research_desc:0 "A report has been received from our spies. They were able to get hold of key documents and blueprints for the latest Equestrian warships."
support_research:0 "Equestrian Equipment"
support_research_desc:0 "We received a report from our spies, they were able to get hold of documents and drawings related to Equestrian military research."
industrial_research:0 "Railways in the hives"
industrial_research_desc:0 "The core of our country requires an early modernization of the transport system. As more and more changelings arrive in the capital and neighboring cities, new routes must be created to connect residential areas. Railways will be built both above and below ground, providing fast, affordable and, most importantly, reliable transportation for everyone, in particular, for soldiers."
arctic_shelf_mining:0 "Explore the Arctic shelf"
arctic_shelf_mining_desc:0 "The Arctic contains large amounts of minerals, including phosphates, bauxite, iron ore, copper, and nickel, but the most important local resources are the large amounts of oil found there. We must get these resources for our purposes, and get them as soon as possible to improve the economy and provide our tanks with fuel. This is how we will protect our future."
pressure_olenia:0 "Put pressure on Olenia"
pressure_olenia_desc:0 "At this time, when Olenia is not in the best condition under the rule of the ruler [OLE.GetLeader], and our military power is rapidly increasing, the time has come to review the border agreement signed with King Aldar II and show the world that we are taking our rightful place as the lords of Equus. We will dominate them, so the deer are unlikely to resist us in the future."
offer_puppet:0 "Peaceful integration of Olenia"
offer_puppet_desc:0 "Although we could easily crush Olenia, it would be more appropriate to offer the ruler [OLE.GetLeader] a peaceful alternative to war. By offering our "protection" and giving the deer limited autonomy, we can focus our efforts on other things. This will save the changelings' lives, and Olenia will fall without a single drop of blood. If they refuse such a generous offer, we will always have time to declare war on them."
conquest:0 "The Conquest of Olenia"
conquest_desc:0 "Olenia has never respected us. There is no doubt that they will move against the Changeling Lands as soon as they put an end to their internal differences. Equestrian and Stallongrad influence in Olenia is growing every day, threatening ours, and there is only one way to protect our sovereignty and honor: war!"
national_resources:0 "Olenia Resources"
national_resources_desc:0 "By taking control of the Deer, we gained access to considerable deposits of iron ore that were not properly used by the deer. We will send prisoners to work in the rocky wastelands, so they can earn redemption with backbreaking work."
expanded_industry:0 "Modern industry"
expanded_industry_desc:0 "With all the new resources that we have received, it is time to improve the industrial potential of our hives again."
military_minds:0 "Reorganize the High Command"
military_minds_desc:0 "The Queen's old Guard, whose composition has not changed since the Canterlot invasion, has been idle for a long time. It's time to retire those who previously let us down and replace them with new personnel. Fresh blood will command our armies, and young minds full of innovative ideas will develop military doctrines."
war_academy:0 "Complete the reorganization"
war_academy_desc:0 "The old Guard failed us during the invasion of Canterlot, using traditional methods of war. Most of them "retired" after 1002, and since then we have been filling in the gaps in the officer ranks with fresh blood. Their young minds are full of innovative ideas on how to develop the art of war, and therefore, soon, we will complete the reorganization of our armed forces."
prepare_for_war:0 "Final preparations"
schedule_for_war_desc:0 "The time to take our place at the top of the world has almost come, but we must finish the final preparations for the second invasion. Roads, air bases and fortifications should be rebuilt at a rapid pace. We will also accumulate a huge amount of supplies for the upcoming operation, and begin large-scale military exercises at the border."
schedule_for_war2:0 "Railways and air bases"
prepare_for_war2_desc:0 "Both railways and airfields are important for warfare. The construction of important infrastructure will ensure the smooth flow of our war and the continuous supply of fresh meat and other supplies to our soldiers, and air bases will be necessary for our Air Force, which will facilitate the task of establishing air supremacy over enemy troops."
before_for_war3:0 "Work for victory!"
schedule_for_war3_desc:0 "Ensuring that our armies receive supplies smoothly and on time is a priority during the war. Construction is our only option. Every changeling must temporarily work even harder and longer, as well as make sacrifices for the glory of the Queen and her nation. After our inevitable victory, working hours will be returned to normal."
demand_equestria:0 "Forward, my armies!"
demand_equestria_desc:0 "It's time to atone for our failure in Canterlot! It's time to destroy our main competitor and become the lords of Equus. Our armed forces are ready to strike, and the death squads are ready to crush any dissidents as soon as we capture Equestria. The queen will lead us to glory and victory, go ahead!"
continuous_war_plan_CHN:0 "Enter a plan for a prolonged war"
continuous_war_plan_CHN_desc:0 "Despite the fact that some residents in the hives are opposed to the current war, we can ignore them. We must be ready to wage war for as long as possible, until its very end. We will not tolerate dissidents. We must win, at any cost!"
death_or_dishonour:0 "Death or dishonor"
death_or_dishonour_desc:0 "For some reason, we didn't take control of most of Equestria in the first months of the war. We need to raise the stakes. The Queen demands that everyone shed their last drop of blood for the sake of victory. The old, the young, the weak — everyone must serve, we will not be defeated a second time! We would rather die than be humiliated again!"
victory:0 "Leap to victory"
victory_desc:0 "It's time for the last battle, and Equestria will finally be in our hooves! Don't miss the moment!"
CHN_roads:0 "Pioneers"
CHN_roads_desc:0 "The Changeling lands are vast, but mostly deserted. We must establish the ability to quickly transport resources across the country by creating a network of small pioneer stations."
demand_stg:0 "Destroy Stalliongrad!"
demand_stg_desc:0 "The Queen has declared herself ruler of all Equestria, including Stalliongrad — those pathetic communist separatists. It's time to erase them from the big picture of the world, and destroy the heart of socialism once and for all."
militarism_CHN:0 "Militarization of the hives"
militarism_CHN_desc:0 "We must organize additional training for our subjects. Every citizen is a soldier, and they know it. Our culture is warlike, and death on the battlefield should be the only dream for everyone."
extra_research_2_CHN:0 "Unstoppable progress"
extra_research_2_CHN_desc:0 "It is possible to accelerate our technological development by changing the laws related to it."
rocket_effort_CHN:0 "Rocket technologies"
rocket_effort_CHN_desc:0 "Rocket engines themselves are the key to innovation."
demand_GRF:0 "Invade Nova Gryphonia"
demand_GRF_desc:0 "Nova Gryphonia, an isolated former colony of the fallen Griffin Empire, defiantly denies our legitimate right to own this continent. We must be ready to dispel their misunderstandings. The last remnants of the griffins on our continent must be destroyed. Without the protection of their empire, they will not be able to withstand our might."
research_tanks2:0 "Continue upgrading armored forces"
research_tanks2_desc:0 "Despite the addition of new large-caliber guns, tank technology has moved far from the simple goal of safely ferrying forces from point A to point B. We must create our own versions of modern tanks to compete with our neighbors."
research_air2:0 "Modern bombers"
research_air2_desc:0 "Victory will be guaranteed if we destroy our enemy's infrastructure and resources from the skies."
army_research2:0 "Continue military research"
army_research2_desc:0 "Fix bayonets! Attack! Follow me!"
army_research3:0 "Armored personnel carriers"
army_research3_desc:0 "Mechanized infantry is descended from motorized infantry, but its vehicles are able to sufficiently protect soldiers from enemy fire, unlike the "thin-skinned" wheeled vehicles (trucks or light all-terrain vehicles) of motorized infantry. Most armored personnel carriers and infantry fighting vehicles are fully tracked, or they are all-wheel drive vehicles with a 6x6 or 8x8 wheel formula for better mobility on rough terrain."
chn_navylysander:0 "Appoint Lysander as a Highway Commander"
chn_navylysander_desc:0 "Queen Chrysalis has decided to promote Lysander to High Admiral, noting his achievements in developing a strategy of direct and aggressive collisions on the high seas, despite the warnings of Mimic and her supporters."
chn_navymic:0 "Appoint Mimic Hyvesadmiral"
chn_navymimic_desc:0 "Queen Chrysalis has decided to promote Mimic to Hyvesadmiral, noting her achievements in developing a strategy for using the natural abilities of changelings to stealth and subterfuge, despite Lysander's ultimatum to resign."
chn_navylysander2:0 "Reconstruct the fleet"
chn_navylysander2_desc:0 "When we win, we win twice! First— when the enemy sees us, and then when the wrecks of his ships sink to the bottom of the sea under the fire of our guns. Let no one even dare to think about landing on our shore!"
chn_navymimic2:0 "Develop new submarines"
chn_navymimic2_desc:0 "Whoever takes the risk wins, but with our new submarines, no one will dare to raise a weapon against us! Everything under the water belongs to us now. From now on, only a fool takes risks."
chndestroyereffort:0 "Develop new destroyers"
chndestroyereffort_desc:0 "Speed and efficiency are winning the battles right now. That's why we decided to improve our anti-submarine ships. Just let them try to get under us or past us! Our destroyers will hunt them down like hounds."
chn_navybuildup:0 "Build additional shipyards"
chn_navybuildup_desc:0 "Steel and guns for ships! Our fleet must be supplemented with new packs of massive monsters that walk the sea, protecting our shores."
chncruisereffort:0 "New models of cruisers"
chncruisereffort_desc:0 "The bottom line is that we need to keep our battleships intact so that they strike fear into the hearts of our enemies and improve our defense at sea. Building cruisers will solve this problem."
#battleforthehives_chn:0 "Down with the Queen!"
#battleforthehives_chn_desc:0 "We've had enough! The hives have spoken, and it's time to take over the board! And even if chaos and fire consume our lands, our people must rule themselves! It must be their will. Down with the Queen!"
#assassinate_fieldmarshaltrimmel_CHN:0 "Eliminate Trimmel"
#assassinate_fieldmarshaltrimmel_CHN_desc:0 "We may have ousted Chrysalis, but as long as there are loyalists among us, our reorganized country is not immune from it. Marshal Trimmel is the loudest dissident, and we must crack down on him, despite his service to our people."
#changeling_liberation_front_CHN:0 "Transfer power to the Liberation Front"
#changeling_liberation_front_CHN_desc:0 "This has been going on for too long. We should no longer listen to the schizophrenic nonsense of these liberal parasites! Every member of the so-called "progressives" should be shot for treason against the state and its citizens!"
#union_of_progressive_changelings_CHN:0 "Transfer power to the Union of Progressives"
#union_of_progressive_changelings_CHN_desc:0 "We can no longer tolerate hatred and bigotry! Everyone from the so-called "liberation front" should be expelled from the country as soon as possible! We can't let what the Queen did happen again!"
#union_factories:0 "New military industry"
#union_factories_desc:0 "It's time to adopt a peaceful foreign policy! Those who come to us with a sword will die by the sword, but we will not draw our weapons ourselves. Unless they are opponents of the revolution, of course."
#blackarmy_CHN:0 "Create a Black Army"
#blackarmy_CHN_desc:0 "To arms, comrades! We must silence their guns with our numbers and dedication! Even winter won't slow us down — we are the endless winter that our enemies will face until they surrender!"
#CLF_Rebuilding_CHN:0 "Rebuild the hives"
#CLF_Rebuilding_CHN_desc:0 "The time has come! The power of the workers must forge a weapon of war, our instrument of destruction — with it we must destroy the enemies of the revolution and bring peace and equality to the world! May the fire in our factories never go out and may the spirit of our people live in them!"
#CLFRecruit:0 "Create district militia units"
#CLFRecruit_desc:0 "Your life is nothing compared to the collective power of the state! What is a sacrificed life compared to the common good that will come for all of us? Your self—sacrifice is a victory for us, and a defeat for the cowards who are our enemies. What will they get if not the dedication of our people?!"
#CHNCOM_infrastructure_effort:0 "New transport network"
#CHNCOM_infrastructure_effort_desc:0 "Who will build roads if there is no queen? The people will build! We need roads to lift our economy through the dark clouds that our aristocracy has left over us. Our roads will be the envy of the whole world!"
#UPPCongress:0 "To convene the Congress of Progressives"
#UPPCongress_desc:0 "During our first official congress, we came to the conclusion that the enemies of the revolution should not be allowed to breathe. We must not relax until these pests are cleared from our lands. Let's make war on them before they make it on their own!"
#second_phaseCHNCOM:0 "Continue industrialization"
#second_phaseCHNCOM_desc:0 "While our comrades celebrate heroic victories on the front line, the workers must be heroes throughout the war. The eternal flame cannot be extinguished now. And columns of smoke should be a constant sign that our military industry is awake. She never slept."
#foreignintelligenceservice:0 "The Hive Intelligence Council"
#foreignintelligenceservice_desc:0 "Because of our racial characteristics, we are well suited to infiltrate societies of other species. Despite this, we had no formalized programs or institutions set up to manage and organize these tasks. The establishment of the Hive Intelligence Council will be our first step."
#warplanwhite:0 "White's Plan"
#warplanwhite_desc:0 "Our infiltrators in Olenia say that their government is fragmented and weak. It's time to strike, and take back what's rightfully ours!"
#warplanpurple:0 "The Pearl Plan"
#warplanpurple_desc:0 "All our forces are ready for the greatest campaign. Where the old guard failed years earlier, we will succeed: Equestria will fall!"
#operationariettesphaseone:0 "Operation Ariettes, phase One"
#operationariettesphaseone_desc:0 "Olenia has great wealth, and their political crisis has left them vulnerable to outside influence. We must use our newly created intelligence service to create spy cells within the Olenic society, and have a reserve for operations in case of future subversive activity."
#operationariettesphasetwo:0 "Operation Ariettes, Phase Two"
#operationariettesphasetwo_desc:0 "All our infiltrators have taken their places, and we can effectively carry out our plan. First, we must spread our ideology among the Kenyan masses and gain enough support for the subsequent civil uprising. It will take time, but the result is truly worth it!"
#operationariettesphasethree:0 "Operation Ariettes, Phase Three"
#operationariettesphasethree_desc:0 "Everything is almost ready. We have gathered some local leaders who want to stage an uprising against the Kenyan government. All we need to do is arm the rebels and watch the fireworks."
#operationariettesphasefour:0 "Operation Ariettes, phase Four"
#operationariettesphasefour_desc:0 "Both the division of Olenia and the settlement of the Changelings within its parts show that we can openly lead another nation under good circumstances. Both the Olenians and the Changelings have shown that a syndicate country is possible, but it cannot exist while our archenemy, Equestria, is still in place."
#chncolonization:0 "Create commissariats"
#chncolonization_desc:0 "No matter how legitimate the new government of Olenia may be, the war has left the country in complete disarray. To protect the interests of ordinary citizens, we must once again intervene in their internal affairs. We hope that this will finally allow us to live normally among other races. Maybe this is even the beginning of something more..."
#chncomshowtrials:0 "The Waverfront process"
#chncomshowtrials_desc:0 "Now that the war has been won, the legitimate Kenyan government is reporting to us about the dire situation the country has been left in after the old regime. If we comply with their request, it will bring our countries closer both politically and socially."
#size_production_desc:0 "The nation is in great need of rapid industrialization. Obviously, the workforce itself knows better what to do. By allowing workers to control the centers of industry, we will see much better rates of development."
#equality_for_all_CHN_desc:0 "Despite the fact that we sympathize with Stallongrad and the statements that there is no such thing as a truly equal community, it can still be equal for changelings. For centuries, we have shown a level of cooperation unattainable by other races. If a great experiment can be successful everywhere, then our society is no exception."
CHN_canterlot_appropriation:0 "Canterlot"
CHN_canterlot_appropriation_desc:0 "Canterlot has become a well-deserved prize for our Queen. It had been many years since her defeat there, when the race she had worked so hard to unite was so close to separation. But these bitter memories can now be forgotten. The Queen has regained her honor, and with it all the changelings. Now the city will become her most valuable trophy."
CHN_crystal_city_appropriation:0 "Crystal City"
CHN_crystal_city_appropriation_desc:0 "The laboratories of Amethyst University in Crystal City can be used for many purposes. In particular, to improve our magical technologies. The vast reserves of crystals in the lands of the former Crystal Empire will be more than enough for any of our research projects. Even for the development of mago-nuclear weapons."
CHN_crystal_city_research:0 "Crystal City Laboratories"
CHN_invasion_of_griffonia:0 "Invasion of Gryphonia"
CHN_invasion_of_griffonia_desc:0 "On this day, our queen made a fateful decision. We must cross the sea and invade the land known as Gryphonia. We will do there what we have done here, and everyone will know about our great power. Long live the Queen!"
chn_populate_oleni_coast:0 "Populate the coast of Olenia"
CHN_populate_olenian_coast_desc:0 "The coast of Olenia is another outlet to the sea. Some workers, criminals, and the unemployed will be sent to populate the Olenia coast around the Waverfront. Local Olenians who want to cooperate will receive partial citizenship."
CHN_olenian_factories:0 "Move Deer Plants"
CHN_olenian_factories_desc:0 "Some of the most advanced deer factories are located on the coast. Unfortunately, using these factories for our tasks proved to be quite difficult, due to the activities of numerous guerrillas harassing our supply lines in the interior of the country. Until a more permanent solution to the logistical problems of the Region is found, these plants should be relocated to our main lands."
CHN_olenian_volunteers:0 "Reindeer collaborators"
CHN_olenian_volunteers_desc:0 "Propaganda can work wonders. Brainwashed young deer join our ranks to fight in the name of the Changelings and the Queen, because she is their savior and protector. They believe that the insidious influence of Equestria must be destroyed once and for all so that the deer can preserve their traditions and culture."
CHN_study_olenian_magic:0 "Deer magic"
CHN_study_olenian_magic_desc:0 "The Deer Seer once said, "Magic turns a warrior into a berserker." Our scientists will study the unique Olenic magic to better understand it. Perhaps we can use this information to improve our own magical abilities."
CHN_modern_cities:0 "Modern beehives"
CHN_modern_cities_desc:0 "Most beehives will finally get modern architecture with concrete spires, high-rise buildings, subways, and highways. The compact placement of buildings means that each section of the hive takes up less usable space, and companies and the government will be able to build more factories on the same area as before."
CHN_vesalipolis_protection:0 "Protection of the capital"
CHN_vesalipolis_protection_desc:0 "It seems unlikely, but our enemies can reach the capital with the help of modern aircraft. We must ensure the safety of the hearts of our great people, a glorious queen, and a just government. Air defense will be built on the outskirts of Vesalipolis and in the city itself. An air raid shelter will also be built near Vesalipolis."
CHN_queens_island_facility:0 "Secret facility on Queen's Island"
CHN_queens_island_facility_desc:0 "The isolated island of Korolev in Gorak Bay will be a great place for a secret science center. Big breakthroughs will be made here, which it is better for ordinary citizens not to know about. We will be able to experiment on intelligent living beings without any objections or diplomatic problems. This is the perfect place for this, and Queen Chrysalis has already ordered the work to begin."
CHN_great_war_beginning:0 "The "Sunset of the Alicorns" plan"
CHN_great_war_beginning_desc:0 "The time is coming for us to regain our lost honor. The Changelings will take their rightful place as the lords of Equus. All that stands in our way of glory is Equestria and her silly alicorn princesses. We will prove to the world that they are not deities, but only pitiful mortals. The twilight of the gods is about to descend, and their demise will be swift."
CHN_high_command_cabinet_1:0 "Restructuring of the command system"
CHN_high_command_cabinet_1_desc:0 "To create a clear and orderly military hierarchy, changes need to be made. Useless ranks will be abolished, and we will ensure that each officer has only one superior, which will prevent conflicting orders from appearing. The new command hierarchy should be clear to everyone, and they should also remember that the Queen herself is at the very top of it, and that disobeying her orders is very unwise."
CHN_high_command_cabinet_2:0 "Officers and Communications"
CHN_high_command_cabinet_2_desc:0 "To fill the gaps created by the recent reorganization of the ranks, promising officers will be promoted to higher ranks. We also realized the importance of fast and clear communication. Commands should not be interpreted in more than one way, and they must not get lost along the way. Radio operators will become an integral part of all units."
CHN_high_command_cabinet_3:0 "Order and discipline"
CHN_high_command_cabinet_3_desc:0 "Discord in our own ranks is unacceptable. We must fight as a unit, and any deviation from the rules and commands must be severely punished. Cowardice and desertion will be punishable by death. It is the iron discipline of the Changeling army that will bring us victory, not just shiny tanks and big guns."
CHN_changeling_school_of_war:0 "The Changeling School of War"
CHN_changeling_school_of_war_desc:0 "Our race fought internecine wars for many centuries before Queen Chrysalis united us. Quick, decisive attacks by mobile swarms led by competent commanders have always been the key to victory. Why break something that works? All we need to do is update our doctrine to the realities of the modern era, doing what the previous generation of officers failed to do."
CHN_griffon_school_of_war:0 "Griffin School of War"
CHN_griffon_school_of_war_desc:0 "The Griffin Empire had the largest army in the world before its collapse. Its units learned to fight on the defensive in order to hold vast tracts of territory and repel uprisings and raids. Perhaps defense is the best offense, because with the help of bite-and-hold tactics, we will slowly but surely move forward. We have a lot to learn from our feathered friends."
CHN_modern_cities2:0 "Swamp Railway"
CHN_modern_cities2_desc:0 "The huge swamp is the main obstacle to travel to Volistad and the Equestrian border. The construction of modern railways will allow for tourism, both international and domestic. In addition to this, it will help the goods of the southern enterprises to reach the central region easily. And most importantly, they will be very useful for our military operations."
CHN_demand_yak:0 "Invasion of the Yaks"
CHN_demand_yak_desc:0 "The Yaks are a proud warrior race, and they will not submit easily. They only respect strength, so if we want them to recognize Chrysalis as the mistress of Equus, we have to prove our strength to them. High mountains and frozen forests will not be an obstacle for our mighty army!"
CHN_demand_png:0 "Secure the North"
CHN_demand_png_desc:0 "The Penguins control the strategically important northern sea corridor and still refuse to recognize Chrysalis as their mistress. They need to be taught a cruel lesson! The pathetic flightless birds will become easy prey."
#END OF FOCUS LOC

#NEWSTUFF
CHN_Army:0 "Обновить армию"
CHN_Army_desc:0 "Армия — это постоянная военная сила Земель Чейнджлингов. Хотя армия верна только Весалиполису, в ней служат солдаты из всех ульев. Мы приняли новые доктрины и должны начать обучение наших солдат, чтобы они могли применить эту теорию на практике."
CHN_Infantry_2:0 "Новые орудия смерти"
CHN_Infantry_2_desc:0 "Хорошо обученная армия бесполезна без хорошего оружия, а наше оружие будет самым лучшим в мире! Оружейные конструкторы разработают для нас самые эффективные образцы вооружений."
CHN_Infantry_1:0 "Продолжить разработку оружия"
CHN_Infantry_1_desc:0 "Имеющегося недостаточно! Вооружение и вспомогательное оборудование армии должны быть не просто хорошими, а самыми лучшими. Попытки улучшения наших проектов никогда не должны заканчиваться, и мы не остановимся, пока не достигнем совершенства. Всегда есть что-то, что можно улучшить."
CHN_Chemical_Weapons:0 "Создать КЧВМИИХИМЗ"
CHN_Chemical_Weapons_desc:0 "Королевский Чейнджлингский Военно-Медицинский Исследовательский Институт Химической Защиты поможет нашей артиллерии не допустить проникновение потенциальных врагов на нашу землю, поставив их перед лицом химической угрозы."
CHN_Jager_1:0 "Разработать новую егерскую тактику"
CHN_Jager_1_desc:0 "Егеря появились ещё до объединения нашей расы. Они — солдаты, специализирующиеся на проникновении. Они могут прорваться через укрепленные позиции и маскироваться в лесистой местности. Слово "егерь" — означает "охотник", и хорошо описывает этих грозных солдат. Однако применяемая ими тактика несовместима с общевойсковой доктриной, и нуждается в тщательном пересмотре."
CHN_Motorized_1:0 "Новые грузовики"
CHN_Motorized_1_desc:0 "Более современные и надёжные грузовики и другие транспортные средства необходимы любой армии, которая опирается на мобильность своих сил. Хотя мы не сможем моторизовать всю армию, отдельные батальоны получат грузовики, чтобы они могли поддержать наши танки в атаке."
CHN_Blitzkrieg_1:0 "Танки для Блицкрига"
CHN_Blitzkrieg_1_desc:0 "Будущее войны заключается в эффективном использовании танков и их комбинированных возможностей борьбы с пехотой и укреплениями, прекрасно дополненных скоростью, с которой они способны реагировать на новые угрозы. Эти машины войны, по мнению королевы Кризалис, станут ключом к нашей победе."
CHN_Blitzkrieg_2:0 "Модернизация танков"
CHN_Blitzkrieg_2_desc:0 "Продолжающаяся модернизация танковых войск гарантирует, что они останутся совершенно непроницаемыми для всех будущих угроз. Наши враги разрабатывают своё противотанковое оружие, так что нам нужно улучшать броню. Это же верно и для доктрин. Гонка вооружений никогда не закончится, и мы не должны отставать. Иначе смерть неизбежна."
CHN_Magical_Infantry:0 "Магическая пехота"
CHN_Magical_Infantry_desc:0 "Использование магических кристаллов в оружии уже давно изучается нашими учеными, и сейчас конструкции такого оружия становятся достаточно эффективными, чтобы можно было говорить о широком применении. Предоставление нашим инфильтраторам специализированного, но более трудного для производства оборудования гарантирует, что они не только смогут с лёгкостью выполнить любые цели, но и, если попадутся, сумеют за себя постоять."
CHN_Infiltrators:0 "Тактика проникновения"
CHN_Infiltrators_desc:0 "Хитрость и обман всегда были неотъемлемой частью войны чейнджлингов. Несмотря на то, что они оказались неэффективными в Кантерлоте в 1002 году, эти тактики будут полезны для нас, если мы научимся применять их более виртуозно. Подготовка наших инфильтраторов должна принять во внимание характер современной войны."
CHN_Support_Companies_1:0 "Дополнительное снаряжение"
CHN_Support_Companies_1_desc:0 "Инвестиции в дополнительное снаряжение так же важны, как и инвестиции в оружие. Вспомогательные роты, способные проводить разведку, строить укрепления и лечить раненых, значительно повысят производительность наших солдат. Эти роты, в свою очередь, нуждаются в особом оборудовании."
CHN_Motorized_2:0 "Разработать БТР"
CHN_Motorized_2_desc:0 "Механизированная пехота на БТР и других бронемашинах имеет больше шансов выйти из боя без ранений. Любые инвестиции в это повысят эффективность мобильных пехотных подразделений, что позволит им лучше поддерживать наши танки."
CHN_Dedicated_Panzer_Production:0 "Увеличить производство танков"
CHN_Dedicated_Panzer_Production_desc:0 "Обучение целых заводов производить танки для нашей армии, несомненно, ускорит этот процесс, и не допустит трату материалов в пустую. Это позволит нам не только формировать новые бронетанковые батальоны, но также и восполнять потери, и даже производить запасные части для сломанных машин."
CHN_Dedicated_Motorized_Production:0 "Увеличить производство грузовиков"
CHN_Dedicated_Motorized_Production_desc:0 "Посвящение большей части нашего автомобилестроения производству транспорта для наших моторизованных сил ускорит нашу армию в целом и поможет войскам быстрее добираться до фронта. Мобильность — это ключ к победе в современной войне, а подвижности наших собственных копыт и крыльев уже не достаточно. В конце концов, мы сможем моторизовать все пехотные батальоны, но этот грандиозный проект займет немало лет."
CHN_Infantry_Academy:0 "Королевская пехотная академия"
CHN_Infantry_Academy_desc:0 "Мы всегда нуждаемся в элитной пехоте, но подготовка спецназа требует много времени и усилий. Для решения этой проблемы, мы можем открыть специализированное учебное заведение во Враксе, предназначенное для подготовки новых поколений грозных воинов."
CHN_Renewed_Militarization:0 "Ремилитаризация"
CHN_Renewed_Militarization_desc:0 "Королева Кризалис потерпела поражение, и всё благодаря солдатам, которые сражались за дружбу. Пришло время сосредоточиться на том, чтобы заставить чейнджлингов-ополченцев перейти от напряжения сил к чему-то профессиональному, чему-то, чем все служащие чейнджлинги могут гордиться."
CHN_Air_Force:0 "Оживить Люфтваффе"
CHN_Air_Force_desc:0 "Воздушные силы чейнджлингов являются одними из самых профессиональных и технологически продвинутых в мире. Тем не менее, нет предела даже совершенству."
CHN_Air_Doctrine_1:0 "Стратегические цели"
CHN_Air_Doctrine_1_desc:0 "В случае войны акцент на нанесении ущерба военной промышленности противника неизбежно спасёт огромное число жизней."
CHN_Air_Doctrine_2:0 "Превосходство в воздухе"
CHN_Air_Doctrine_2_desc:0 "В случае войны нужно гарантировать, что наши истребители будут настолько хороши, насколько они могут быть. Это может спасти жизни тех, кто находится на земле."
CHN_Bomber_1:0 "Тактические бомбардировщики"
CHN_Bomber_1_desc:0 "Тактические бомбардировщики, не так специализированные на атаку промышленности, как стратегические бомбардировщики, выполняют важную промежуточную роль, имея возможность не только наносить удары по мишеням, но и проводить длительные бомбардировки."
CHN_Bomber_2:0 "Штурмовики"
CHN_Bomber_2_desc:0 "Пикирующие бомбардировщики и другие ударные самолеты принесут большое преимущество силам на земле, удерживая противника подавленным на дальних дистанциях, открывая тем самым возможности для прямых атак на стратегические цели."
CHN_Bomber_3:0 "Стратегические бомбардировщики"
CHN_Bomber_3_desc:0 "Дальние стратегические бомбардировщики с большой высоты смогут наносить смертельный удар по промышленности гипотетического врага. Возможно, это именно та соломинка, которая переломит ход войны."
CHN_Paratroopers:0 "Десантники"
CHN_Paratroopers_desc:0 "Использование крыльев солдат чейнджлингов позволяет нам развертывать больше элитных подразделений за вражескими линиями обороны и занимать ключевые точки, чтобы, например, окружать их или захватывать порты для более крупного вторжения."
CHN_Fighter_1:0 "Истребители"
CHN_Fighter_1_desc:0 "Развитие истребителей в целом — это то, что поможет не только воздушным силам, но и гражданскому рекреационному сектору."
CHN_Fighter_2:0 "Улучшенные истребители"
CHN_Fighter_2_desc:0 "Более продвинутые истребители — это лишь наши мечты, но что, если мы решим воплотить их уже сегодня?"
CHN_Fighter_3:0 "Тяжёлые истребители"
CHN_Fighter_3_desc:0 "Тяжёлые истребители, которые сопровождают стратегические бомбардировщики, не только полезны для них, но также могут размещаться на аэродромах гораздо дальше от линии фронта, с минимальными потерями эффективности."
CHN_Rocketry:0 "Ракетные испытания"
CHN_Rocketry_desc:0 "Двигатель, работающий на топливе и окислителе — это не что-то из легенд и сказок, а в самом деле осуществимый проект."
CHN_Wunderwaffe:0 "Чудо-оружие"
CHN_Wunderwaffe_desc:0 "Ядерный проект, под кодовым названием "Wunderwaffe", является нашим самым большим секретом как нации чейнджлингов. Если позволить любой другой нации узнать о наших экспериментах по расщеплению атома, это станет серьёзным поводом для войны с нами."
CHN_Rocketry_Phase_Two:0 "Продолжать испытания ракет"
CHN_Rocketry_Phase_Two_desc:0 "Первоначальные испытания жидкостных ракет и импульсных двигателей были успешными, но если мы перейдем на твёрдое топливо, мы не только улучшим наши ракеты, но при необходимости сможем уменьшить их разброс."
CHN_Jets:0 "Реактивные двигатели"
CHN_Jets_desc:0 "Реактивный двигатель — это не только очень сложный кусок машины — он может полностью перевернуть гражданскую аэрокосмическую отрасль и военное воздушное пространство. Более высокие скорости, более длинные диапазоны... Единственное, что держит нас — отсутствие у нас такого двигателя."
CHN_Jet_Fighter:0 "Реактивные истребители"
CHN_Jet_Fighter_desc:0 "С новым двигателем, готовым к производству, нам также необходимо разработать самолет, который осилит полёт на высоких скоростях при высоких значениях тяги."
CHN_Jet_Tactical_Bomber:0 "Реактивные тактические бомбардировщики"
CHN_Jet_Tactical_Bomber_desc:0 "Тактический бомбардировщик средней дальности не нуждается в оборонительном вооружении, как его предшественники, находящиеся в авангарде, поскольку они, теоретически, могут опережать своих врагов. Кроме того, это может стать началом создания хороших пассажирских самолетов."
CHN_Jet_Strategic_Bomber:0 "Реактивные стратегические бомбардировщики"
CHN_Jet_Strategic_Bomber_desc:0 "Снаряды и бомбы требуют использования больших самолетов, несущих тяжелые грузы, и мощность реактивного двигателя позволит им нести на себе больше взрывчатки. Бум!"
CHN_defend_the_north:0 "Северная оборонительная линия"
CHN_defend_the_north_desc:0 "Несмотря на наши желания быть мирными и дружелюбными, другие страны непредсказуемы. Если бы север пал, наш враг не только контролировал бы наше побережье, но и стал бы на один шаг ближе к Весалиполису."
CHN_central_hives:0 "Центральная оборонительная линия"
CHN_central_hives_desc:0 "Обеспечение того, чтобы наша столица была подходящей областью, чтобы отступить туда и удержать позицию, даст нам преимущество против любого гипотетического врага."
CHN_defend_the_south:0 "Южная оборонительная линия"
CHN_defend_the_south_desc:0 "В то время, как пони Эквестрии помогли королю Тораксу узнать о магии дружбы, в последнее время ситуация в самой Эквестрии стала неопределенной. Нам может потребоваться резервный план действий."
CHN_fortress:0 "Укрепрайон в Весалиполисе"
CHN_fortress_desc:0 "В то время, как Весалиполис уже достаточно защищён со всех сторон, потеря самого сердца наших ульев приведет к краху нашей промышленности и поражению, и на этот раз мы не сможем вернуться."
CHN_Changeling_Naval_Supremacy:0 "Новый опыт"
CHN_Changeling_Naval_Supremacy_desc:0 "Даже если перед гражданской войной у нас и был военно-морской флот — Кризалис и её лоялисты потопили его, прежде чем мы сумели его захватить, и теперь нам придётся покупать суда у наших соседей."
CHN_carrier_navy:0 "Тактика авианосцев"
CHN_carrier_navy_desc:0 "Авианосец, по сути, является плавучий ульем с металлическими дронами. Они, как истинный рой, будут жалить наших врагов издалека. И так мы победим в истинно чейнджлингском стиле!"
CHN_battleship_navy:0 "Фокус на линкорах"
CHN_battleship_navy_desc:0 "Линкор представляет собой стальное чудовище титанических размеров, способное сокрушать все корабли, что осмеливаются вставать на его пути, и обстреливать берега своими впечатляющими пушками. Адмиралтейству стоит обратить внимание на такие корабли."
CHN_submarine_navy:0 "Тактика "Бей и беги""
CHN_submarine_navy_desc:0 "Подводные лодки как грозные кракены могут наносить удары по ничего не подозревающим кораблям, разрывать их на куски, а потом бесследно исчезать в глубинах океана. Если ты не видишь чудовища, то и не можешь его победить!"
CHN_submarine_effort:0 "Новые модели подводных лодок"
CHN_submarine_effort_desc:0 "Хотя подводные лодки не могут сравниться по скрытности с чейнджлингами, мы можем улучшить их конструкцию и использовать самые современные технологии, чтобы превратить их в невидимые машины смерти."
CHN_Naval_Bomber:0 "Торпедоносцы"
CHN_Naval_Bomber_desc:0 "Что представляет собой авианосец без своих торпедоносцев? Бесполезную громадину, вот что! Наша морская авиация будет самой лучшей в своём классе."
CHN_Navy_Doctrine:0 "Разработать новую морскую доктрину"
CHN_Navy_Doctrine_desc:0 "Без надлежащей доктрины ни один флот не способен на должном уровне выполнять свою работу. Лучшие и умнейшие чейнджлинги Дитрисиума разработают подробнейший план по развитию новейших военно-морских доктрин."
CHN_Destroyers:0 "Торпеды и корабли заграждения"
CHN_Destroyers_desc:0 "Наши крупные корабли никогда бы не выжили без защиты со стороны меньших судов, способных сражаться с быстрыми и маневренными противниками. Давайте не будем преуменьшать важность развития эсминцев!"
CHN_Light_Cruisers:0 "Экзоскелет флота"
CHN_Light_Cruisers_desc:0 "Универсальность крейсеров позволяет им бороться как с вражеской авиацией, так и с менее крупными судами. Они могут сдерживать силы противника, чтобы они не достигли наших крупных кораблей."
CHN_Escort_Carriers:0 "Эскортные авианосцы"
CHN_Escort_Carriers_desc:0 "Пусть они не так велики, как военные авианосцы, эскортные корабли полезны для обеспечения того, чтобы наши меньшие флоты имели военно-морскую авиационную мощь, достаточную, чтобы поддерживать их вне зависимости от ситуации."
CHN_Carriers:0 "Флотские авианосцы"
CHN_Carriers_desc:0 "Просторные палубы, мощные двигатели и достаточное количество зенитных орудий, что могут затмить солнце своими снарядами! Разработка всё более эффективных и неудержимых авианосцев не должна замедляться ни в коем случае. Это приказ самой Кризалис!"
CHN_raiding_cruisers:0 "Крейсера-рейдеры"
CHN_raiding_cruisers_desc:0 "Хоть мы и сосредоточились на подводных судах, мы не будем пренебрегать использованием проворных и хорошо вооруженных надводных рейдеров для охоты на беспомощные торговые суда. Тяжёлые крейсера отлично справятся с этой задачей!"
CHN_Battlecruisers:0 "Продвинутые крейсера"
CHN_Battlecruisers_desc:0 "Некоторые представители адмиралтейства выдвинули предложение создать линейные крейсера - тяжёлые корабли с огневой мощью линкора, но скоростью и броней крейсера. Многих убедили их аргументы об эффективности таких судов."
CHN_Battleships:0 "Быстрые линкоры"
CHN_Battleships_desc:0 "Королева Кризалис требует, чтобы на каждом новом линкоре были всё более крупные пушки и прочная броня. Это может быть весьма непросто, но конструкторы Дитрисиума уверяют нас, что они могут справиться с этим."
CHN_Super_Battleships:0 "Проект "Кризалис""
CHN_Super_Battleships_desc:0 "Наши инженеры предложили радикальный вариант, отличающийся от традиционных конструкций линкоров. Новый корабль будет весить более 70 000 тонн. Вдобавок он получит пушки калибром 46 сантиметров. Королева уже дала зелёный свет этому проекту."

CHN_Marine_Operations:0 "Морской десант"
CHN_Marine_Operations_desc:0 "Объединенный штаб морских и армейских офицеров пришел к выводу, что с помощью десантных операций в нужном месте можно обойти даже самые крепкие наземные укрепления. Стоит присмотреться к этой идее повнимательнее."
CHN_Swarms_In_The_Sky:0 "Небесный рой"
CHN_Swarms_In_The_Sky_desc:0 "Поднятие в небо истребителей как из ВВС, так и из ВМС гарантирует нашу победу, поскольку никакие вражеские самолеты не останутся в небе, чтобы нанести по нам удар."
CHN_Bomber_Command:0 "Единый воздушный центр"
CHN_Bomber_Command_desc:0 "Создание подразделения исключительно с целью управления нашими бомбардировщиками не только повысит эффективность коммуникаций, но и обеспечит достижение желаемых целей."

CHN_Hive_Factories:0 "Древесная промышленность Ликтидии"
CHN_Hive_Factories_desc:0 "Ликтидия — один из пяти самых крупных ульев. Исторически он известен своим массовым производством пиломатериалов. Древесина является стратегически важным ресурсом для нации, а создание новых лесопилок откроет нам возможности для расширения мебельной и бумажной промышленности."
CHN_polar_bear_envoy:0 "Отправить посольство к медведям"
CHN_polar_bear_envoy_desc:0 "На северо-востоке лежат земли полярных медведей. Сами по себе они, бесспорно, являются опасными существами, однако как держава они откровенно слабы, а их армия безнадёжно устарела. Очень легко будет заставить их платить нам дань золотом."
CHN_threaten_PLB:0 "Надавить на медведей"
CHN_threaten_PLB_desc:0 "Похоже, просто добрым словом не удалось добиться от них никакого толка. Нам следует показать, что к нашему доброму слову прилагается пистолет, которым мы не преминем воспользоваться в случае отказа. К границе будут направлены дополнительные воинские части, наши самолеты будут летать над их воздушным пространством, а флот развернётся вблизи их берегов. Может быть, тогда они начнут принимать нас всерьез."
CHN_attack_PLB:0 "Удар по медведям"
CHN_attack_PLB_desc:0 "Даже после очевидных угроз медведи не прекратили ломать комедию перед нами. Пора преподать им урок! Мы — чейнджлинги, и мы не позволим варварам диктовать нам свои условия. Мы с легкостью сокрушим диких зверей. Даже у могучих медведей нет шансов против дальнобойных крупнокалиберных орудий!"
CHN_resources_of_PLB:0 "Ресурсы Северного Полюса"
CHN_resources_of_PLB_desc:0 "С интеграцией бывших территорий полярных медведей в нашу великую Империю, мы получили доступ к ещё большей ресурсной базе. Мы найдём этим ресурсам достойное применение. Медведи сами по себе сильны, так что они пригодятся для добычи руды на своих землях. Мы заставим их работать и не потерпим инакомыслия."
CHN_modern_infrastructure_PLB:0 "Медвежья инфраструктура"
CHN_modern_infrastructure_PLB_desc:0 "Заполярные территории пребывают в ужасном состоянии. Там мало дорог, а из тех, что есть, лишь малая часть пригодна для тяжёлой промышленности и военных целей. Нам придётся приложить немало усилий, чтобы достойно обустроить эту пустошь. Только тогда мы сможем проводить военные операции в холодных пустошах дальнего севера."
CHN_thermonuclear_research_in_PLB:0 "Термоядерный полигон Ключ-Озера"
CHN_thermonuclear_research_in_PLB_desc:0 "Восточный берег Ключ-Озера является идеальным местом для проведения полевых испытаний. Малонаселённое и глухое место — что может быть лучше для экспериментов с более чем... опасным оружием? Мы огородим немалую территорию и будем проводить научные эксперименты, используя медведей в качестве подопытных, если это будет необходимо."
CHN_force_ponies_to_work:0 "Принудительное переселение пони"
CHN_force_ponies_to_work_desc:0 "Мы только начали наш завоевательный поход, а уже получаем с него выгоду. Новая программа переселения "План Запад" поможет нам застраивать наши земли копытами пони. Более 300 тысяч пони будут переселены из своих домов для того, чтобы трудиться на благо нашей Королевы и государства."
CHN_force_ponies_to_repair:0 "Сформировать стройотряды"
CHN_force_ponies_to_repair_desc:0 "По мере продвижения нашего войска вторжения богатые земли Эквестрии опустошаются. Формирование рабочих отрядов из местного населения поможет нам поддерживать работу инфраструктуры и промышленности на завоеванных территориях. В этих батальонах будет введена строгая дисциплина, а дезертиры будут расстреляны на месте."

#DECISIONS
CHN_kriegsmarine:0 "Действия Кригсмарине"
CHN_rehire_recina:0 "Вернуть адмирала Рецину на службу"
CHN_rehire_recina_desc:0 "Нынешнее состояние кригсмарине весьма неудовлетворительно. Нашим адмиралам явно не хватает надлежащего надзора, а кадровый резерв также не слишком впечатляет. Королева Хельвия из Дитрисиума предложила возможное решение этой проблемы, хотя оно и не порадовало многих морских офицеров. Бывшая адмирал Рецина — сестра Хельвии, в настоящее время оказывает помощь в управлении Дитрисиумом, но, возможно, нам удастся убедить её вернуться на службу в качестве генерал-адмирала.\n\nВосстановление Рецины в должности явно расстроит нынешних адмиралов, да и её услуги, скорее всего, окажутся весьма дорогостоящими. Со времён поражения под Кантерлотом в 1002 году Рецина перестала доверять надзору со стороны королевы Кризалис, и её смогут переубедить только доказательство возрождения флота да высокий пост в кригсмарине. Однако бывшая адмирал хорошо зарекомендовала себя в прошлом. Так что, возможно, нам придётся пойти не самое приятное решение, если мы намерены оживить кригсмарине."
CHN_Secret_Carrier:0 "Подарок от Дитрисиума?"
CHN_Secret_Carrier_desc:0 "Верфи Дитрисиума уже некоторое время работают над секретным проектом. Нам посоветовали не слишком интересоваться этим делом. На самом деле нам дали практически настоящий приказ не заглядывать в устье реки. Даже сейчас, когда прибыл глашатай с приглашением на торжественную церемонию презентации их последнего проекта, нас просят не заглядывать в пещеру, из которой появится новый корабль."
CHN_get_panzerschiffe:0 "Разработать карманный линкор"
CHN_get_panzerschiffe_desc:0 "Мы получили подарок от недавно повышенной в звании хайвсадмирала. Нам предоставили интересный проект для нового поколения линкоров. Мы называем его "карманным линкором". Он оснащён орудиями от более крупных судов, но значительно меньше стандартного линкора по размерам. Мы рассчитываем существенно снизить затраты на строительство и усилить свой флот судами данного типа."
CHN_WNG_Alliance:0 "Купить право на базирование флота у государства [WNG.GetName]"
CHN_WNG_Alliance_desc:0 "Доступ к [WNG.GetAdjective]им портам позволит нам проецировать мощь нашего флота на всю Южную Грифонию. Это также позволит нам чуть более пристально присмотреться к государству [EQC.GetName]..."

CHN_war_time_actions:0 "Политика военного времени"
CHN_stop_war_plan:0 "Приостановить действие плана продолжительной войны"
CHN_protectorates:0 "Инициатива по созданию рейхспротекторатов"
CHN_protectorates_desc:0 "После победы над пони и оленями нам стало крайне важно укрепить наше господство над обширными землями, которые мы завоевали по всему Эквусу. Маловероятно, что пони когда-либо прекратят сопротивляться нашей власти — они не питают симпатии и тёплых чувств к "ненавистным иностранным оккупантам, намеревающимся забрать их любовь и эксплуатировать природные ресурсы их земель."\nУчитывая вышесказанное, было бы разумно создать несколько автономных §Yпротекторатов§!, чтобы заменить нынешнюю временную военную оккупационную администрацию. Поскольку вооруженные силы сейчас слишком перегружены, эти номинальные гражданские правительства должны восстановить верховенство закона и порядка, но на этот раз — на основе ценностей чейнджлингов. Лучше всего будет организовать это до начала развития §Rнежелательных§! событий. Наш правитель, [CHN.GetLeader], намеревается поддерживать гегемонию и мощь расы чейнджлингов в течение многих столетий, и мы не можем колебаться после того, как одержали величайшую победу в великой борьбе за господство над континентом."
