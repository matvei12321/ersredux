CHN_domestic_affairs:0 "Программа поддержки населения"
CHN_domestic_affairs_desc:0 "Чтобы обеспечить процветание нашей нации, государственное финансирование будет направлено на субсидирование военного производства, улучшение условий труда и жизни, а также создание семейных учреждений."
CHN_extra_pay:0 "Выплатить сверхурочные рабочим фабрик"
CHN_extra_pay_construction:0 "Выплатить сверхурочные строителям"
