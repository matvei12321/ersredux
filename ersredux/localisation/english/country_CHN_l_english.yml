CHN_gw_tank_equipment:0 "Abteilung 7 Verkehrswesen"
CHN_gw_tank_equipment_desc:The 0" A7V was the first experimental changeling tank. Until recently, the Changelings were limited in military development due to a lack of industrial potential, which changed dramatically when the Queen emphasized the rapid industrialization of the hives. At the initiative of General Vect himself, the Changeling army took up a secret program. The drawings of armored vehicles were stolen from Stalliongrad, which was the first to use them during the winter Revolution. These plans were then modified and refined to create the first experimental tanks."
CHN_gw_tank_equipment_short:0 "A7V"
CHN_heavy_tank_artillery_equipment_2:0 "Sturmtiger"
CHN_heavy_tank_artillery_equipment_2_short:0 "Sturmtiger"
CHN_heavy_tank_artillery_equipment_3:0 "Geschützwagen Tiger"
CHN_heavy_tank_artillery_equipment_3_desc:0 "This machine was created on the chassis of the Royal Tiger, it should use a 170mm K72L/50 cannon."
CHN_heavy_tank_artillery_equipment_3_short:0 "GW Tiger"
CHN_heavy_tank_destroyer_equipment_1:0 "Selbstfahrlafette auf VK3001(A) Sturer Emil"
CHN_heavy_tank_destroyer_equipment_1_desc:0 "Selbstfahrlafette auf VK3001(A) Sturer Emil was a self-propelled anti-tank changeling gun based on the Aurelia Armory VK3001 chassis."
CHN_heavy_tank_destroyer_equipment_1_short:0 "Sturer Emil"
CHN_heavy_tank_destroyer_equipment_2:0 "Panzerjaeger Tiger (CM)"
CHN_heavy_tank_destroyer_equipment_2_desc:0 "Elefant (Elephant) is a heavy anti—tank self-propelled gun based on the body of the cancelled Carpace Motors Tiger project and equipped with an 88 mm Panzerabwehrkanone 43/2 cannon."
CHN_heavy_tank_destroyer_equipment_2_short:0 "Elefant"
CHN_heavy_tank_destroyer_equipment_3:0 "Panzerjaeger Tiger Ausf. B"
CHN_heavy_tank_destroyer_equipment_3_desc:0"Jagdtiger was the heaviest armored fighting vehicle operationally used by the Changeling army. The vehicle has a 128mm PaK44L/55 main cannon and heavy frontal armor."
CHN_heavy_tank_destroyer_equipment_3_short:0 "Jagdtiger"
CHN_heavy_tank_equipment_1:0 "Grosstraktor"
CHN_heavy_tank_equipment_1_desc:The 0" Grosstractor was a series of prototypes for the development of a heavier tank for the Changeling army. Until recently, the Changelings were limited in military development due to a lack of industrial potential, which changed dramatically when the Queen emphasized the rapid industrialization of the hives. At the initiative of General Vect himself, the Changeling army took up a secret program. Eventually, the development of original armored vehicles and artillery began under the code name "Tractor"."
CHN_heavy_tank_equipment_1_short:0 "Grosstraktor"
CHN_heavy_tank_equipment_2:0 "Panzerkampfwagen VI Tiger"
CHN_heavy_tank_equipment_2_desc:0 "Tiger I is a Changeling heavy tank developed in 1012 in response to the unexpectedly impressive Stalingrad armored vehicles that proved themselves during the first months of the Changeling invasion of Equestria, in particular the T-34 and KV-1."
CHN_heavy_tank_equipment_2_short:0 "Tiger"
CHN_heavy_tank_equipment_3:0 "Panzerkampfwagen VI Ausf. B Tiger II"
CHN_heavy_tank_equipment_3_desc:0 "Known informally as the Königtiger, which is often literally translated by Equestrian soldiers as the Royal Tiger, the tank followed the same concept as the Tiger I, but was designed to be even more formidable. The Tiger II combined the thick armor of the Tiger I with the sloping armor used on the Panther medium tank. The tank weighs almost seventy tons, is protected by armor from 100 to 180 mm thick and is armed with a long 8.8 cm Kampfwagenkanone 43L/71 cannon."
CHN_heavy_tank_equipment_3_short:0 "Tiger II"
CHN_light_tank_aa_equipment_1:0 "Flakpanzer I"
CHN_light_tank_aa_equipment_1_desc:0 "Anti-aircraft gun mounted on the chassis of the Panzer I."
CHN_light_tank_aa_equipment_1_short:0 "FlakPz I"
CHN_light_tank_aa_equipment_2:0 "Flakpanzer Luchs"
CHN_light_tank_aa_equipment_2_desc:0 "Anti-aircraft gun mounted on the chassis of the Panzer II tank."
CHN_light_tank_aa_equipment_2_short:0 "FlakPz Luchs"
CHN_light_tank_aa_equipment_3:0 "Flakpanzer 1602"
CHN_light_tank_aa_equipment_3_desc:0 "Anti-aircraft gun mounted on VK1602 tank chassis."
CHN_light_tank_aa_equipment_3_short:0 "FlakPz 1602"
CHN_light_tank_artillery_equipment_1:0 "Sturmpanzer I Bison"
CHN_light_tank_artillery_equipment_1_desc:0 "Towed guns, which were equipped with artillery companies of motorized infantry regiments, often could not keep up with the tanks during the battle. The simplest solution to the problem was to install the gun on the tank chassis. In the case of the Bison ACS, it uses the chassis of the Panzer I."
CHN_light_tank_artillery_equipment_1_short:0"Bison"
CHN_light_tank_artillery_equipment_2:0 "Sd. Kfz. 124 Wespe"
CHN_light_tank_artillery_equipment_2_desc:0 "Sd.Kfz. 124 Wespe is a self-propelled artillery changeling vehicle based on a modified Panzer II chassis."
CHN_light_tank_artillery_equipment_2_short:0 "Wespe"
CHN_light_tank_artillery_equipment_3:0 "Waffentrager Leopard"
CHN_light_tank_artillery_equipment_3_desc:0 "Waffentrager Leopard is a self—propelled artillery vehicle based on the VK1602 Leopard chassis."
CHN_light_tank_artillery_equipment_3_short:0 "WT Leopard"
CHN_light_tank_destroyer_equipment_1:0 "Panzerjaeger I"
CHN_light_tank_destroyer_equipment_1_desc:0 "Panzerjaeger I was the first of the Changeling tank destroyers that the Changeling army saw. It is designed with a 47 mm PaK anti-tank cannon on a modified Panzer I Ausf chassis."
CHN_light_tank_destroyer_equipment_1_short:0 "Pzjager I"
CHN_light_tank_destroyer_equipment_2:0 "7.5 cm PaK 40 auf Fahrgestell Marder II"
CHN_light_tank_destroyer_equipment_2_desc:0 "Marder II is a tank destroyer based on the Panzer II chassis."
CHN_light_tank_destroyer_equipment_2_short:0 "Marder II"
CHN_light_tank_destroyer_equipment_3:0 "Sturmgeschutz auf Leopard"
CHN_light_tank_destroyer_equipment_3_desc:0 "JagdLeopard was an anti-tank modification of the VK1602 Leopard light tank."
CHN_light_tank_destroyer_equipment_3_short:0 "JagdLeopard"
CHN_light_tank_equipment_1:0 "Panzerkampfwagen I"
CHN_light_tank_equipment_1_desc:0 "The Panzer I is a light tank produced in the Changeling Lands in the 1000's. Designed in 1005 and put into production in 1006, it was originally intended as a training tank for training soldiers in the concept of tank warfare, however, due to the lack of more modern models, the PzKpfw I was widely used on the battlefield."
CHN_light_tank_equipment_1_short:0 "Panzer I"
CHN_light_tank_equipment_2:0 "Panzerkampfwagen II"
CHN_light_tank_equipment_2_desc:0 "Panzer II was originally developed as a temporary measure while larger and more advanced tanks were being developed, but it was widely used in combat due to the lack of more advanced models."
CHN_light_tank_equipment_2_short:0 "Panzer II"
CHN_light_tank_equipment_3:0 "VK 1602 Leopard"
CHN_light_tank_equipment_3_desc:0"VK1602 Leopard is a machine originally created for reconnaissance and developed in 1012. It was planned to arm the vehicle with a 75 mm Kwk41 cannon, but it was replaced with a smaller 50 mm cannon. The VK 1602 had sloping frontal armor, influenced by the Panther tank. In order to increase the all-terrain properties, the VK1602 was adapted to a 350 mm wide track."
CHN_light_tank_equipment_3_short:0 "VK1602 Leopard"
CHN_medium_tank_aa_equipment_1:0 "Flakpanzer III Möbelwagen"
CHN_medium_tank_aa_equipment_1_desc:0"ZSU, dubbed "Mebelwagen" ("van") due to the angular shape of the turret in the closed position, was built on a Pz III chassis and armed with a quadruple 20 mm cannon."
CHN_medium_tank_aa_equipment_1_short:0 "Möbelwagen"
CHN_medium_tank_aa_equipment_2:0 "Flakpanzer IV Ostwind"
CHN_medium_tank_aa_equipment_2_desc:0 "Flakpanzer IV "Ostwind" ("east wind") is a self—propelled anti-aircraft gun mounted on the chassis of the Pz IV tank. It was created in 1012 to replace the earlier Flakpanzer III. The Pz IV turret was replaced with an open hexagonal turret with a 37 mm FlaK 43 cannon. A closed turret would have been preferable, but its use proved impossible due to heavy smoke during firing."
CHN_medium_tank_aa_equipment_2_short:0 "Ostwind"
CHN_medium_tank_aa_equipment_3:0 "Flakpanzer Coelian"
CHN_medium_tank_aa_equipment_3_desc:0 "Flakpanzer Koelian is a self—propelled anti-aircraft gun developed by Arsenal Concern for the Changeling armed forces. She was armed with twin 37 mm FlaK 43 cannons mounted in a fully enclosed rotating turret on the hull of a medium Panther tank."
CHN_medium_tank_aa_equipment_3_short:0 "Coelian"
CHN_medium_tank_artillery_equipment_1:0 "Grille"
CHN_medium_tank_artillery_equipment_1_desc:0 "Sd.Kfz.138/1 Grille is a self—propelled gun used by changelings during the invasion of Equestria. It was popular in tank divisions fighting on rough terrain."
CHN_medium_tank_artillery_equipment_1_short:0 "Grille"
CHN_medium_tank_artillery_equipment_2:0 "Hummel"
CHN_medium_tank_artillery_equipment_2_desc:0 "Hummel is a self—propelled gun based on the Geschützwagen III/IV chassis, armed with a 15-centimeter howitzer. It was used by the Changeling army during the invasion of Equestria."
CHN_medium_tank_artillery_equipment_2_short:0 "Hummel"
CHN_medium_tank_artillery_equipment_3:0 "Grille 12"
CHN_medium_tank_artillery_equipment_3_desc:0 "The concept of a self-propelled artillery cannon proposed by Arsenal concern in the 1014th year, and developed on the basis of Panther components with a 12.8 cm howitzer cannon."
CHN_medium_tank_artillery_equipment_3_short:0 "Grille 12"
CHN_medium_tank_destroyer_equipment_1:0 "Sturmgeschütz III"
CHN_medium_tank_destroyer_equipment_1_desc:0 "The Sturmgeschütz III assault cannon is the most common Changeling anti—tank self-propelled gun that gained recognition during the invasion of Equestria. It was created on the chassis of the proven Pz III tank (originally as a mobile armored gun for infantry support). During the war, the StuG III was repeatedly upgraded and widely used as a tank destroyer."
CHN_medium_tank_destroyer_equipment_1_short:0 "StuG III"
CHN_medium_tank_destroyer_equipment_2:0 "Jagdpanzer IV"
CHN_medium_tank_destroyer_equipment_2_desc:0 "Jagdpanzer IV served in anti-tank units of tank divisions. They were very successful tank destroyers, but were extremely ineffective when used as a substitute for tanks or assault guns."
CHN_medium_tank_destroyer_equipment_2_short:0 "Stug IV"
CHN_medium_tank_destroyer_equipment_3:0 "Jagdpanther"
CHN_medium_tank_destroyer_equipment_3_desc:0 "Jagdpanther is a tank destroyer built on the Panther tank chassis. It entered service at the end of 1014. Jagdpanther combines the very powerful 8.8cm PaK43 cannon from Tiger II and the characteristic sloping armor and suspension of the Panther."
CHN_medium_tank_destroyer_equipment_3_short:0 "Jagdpanther"
CHN_medium_tank_equipment_1:0 "Panzerkampfwagen III"
CHN_medium_tank_equipment_1_desc:0 "Back in 1005-6, General Vect envisioned two main types of tanks that would act as the most numerous weapons for future tank divisions. The first vehicle was to be armed with an anti—tank cannon and two machine guns, while the second, an auxiliary vehicle, was to be armed with a larger—caliber infantry cannon. The first of these eventually became known as the Panzerkampfwagen III, which was to become the standard tank for the three light companies of a tank battalion. The second became known as Panzerkampfwagen IV."
CHN_medium_tank_equipment_1_short:0 "Panzer III"
CHN_medium_tank_equipment_2:0 "Panzerkampfwagen IV"
CHN_medium_tank_equipment_2_desc:0" was designed as a support tank, the Panzer IV was not intended for battles with armored vehicles — this function was performed by the Panzer III. However, as the flaws of the pre-war doctrine became more and more apparent, and in the face of the Stalingrad T-34, the Panzer IV soon assumed the role of an older brother. The Pz IV became the most mass-produced and used changeling tank, and its design formed the basis for many other combat vehicles."
CHN_medium_tank_equipment_2_short:0 "Panzer IV"
CHN_medium_tank_equipment_3:0 "Panzerkampfwagen V Panther"
CHN_medium_tank_equipment_3_desc:0 "Panther is a standard medium tank developed by changelings in the middle of 1014. It was supposed to be the answer to the Stalingrad T-34 and gradually replace the obsolete Panzer III and Panzer IV. However, a complete replacement never occurred, and the Panther remained a support for the heavier Tiger tanks. The superior combination of firepower, mobility and armor allowed the Panther to become a model for many late and post-war tank models, so that it is rightfully considered one of the best tanks of its time."
CHN_medium_tank_equipment_3_short:0 "Panther"
CHN_modern_tank_destroyer_equipment_1:0 "E-25 Standardpanzer"
CHN_modern_tank_destroyer_equipment_1_desc:0 "Improved version of Jagdpanzer IV, E-25, features high speed and armor."
CHN_modern_tank_destroyer_equipment_1_short:0 "E-25"
CHN_modern_tank_equipment_1:0 "E-50 Standardpanzer"
CHN_modern_tank_equipment_1_short:0 "E-50"
CHN_modern_tank_equipment_1_desc:The 0" Entwicklung series was a changeling experiment to create a modern main battle tank, the first draft of which was released in 1016. As part of this series, 6 standardized models of different weight categories were created. The E-50 Standardpanzer was developed as a medium tank to replace the Panther and Tiger models, as well as others based on them."
CHN_motorized_equipment_1:0 "Open Blitz"
CHN_super_heavy_tank_aa_equipment_1:0 "Flakpanzer VIII Maus"
CHN_super_heavy_tank_aa_equipment_1_desc:0 "Maus tank chassis armed with a twin 88 mm anti-aircraft gun."
CHN_super_heavy_tank_aa_equipment_1_short:0 "FlakMaus"
CHN_super_heavy_tank_artillery_equipment_1:0 "Geschützwagen E-100 SPG"
CHN_super_heavy_tank_artillery_equipment_1_desc:A 0" 210mm artillery piece mounted on the chassis of a super heavy tank can compete with some railway guns when it comes to firepower."
CHN_super_heavy_tank_artillery_equipment_1_short:0 "GW E-100"
CHN_super_heavy_tank_destroyer_equipment_1:0 "Sturmgeschütz auf Fahrgestell Maus"
CHN_super_heavy_tank_destroyer_equipment_1_desc:0 "Maus tank chassis with a 150 mm cannon fixed in a fixed armored wheelhouse."
CHN_super_heavy_tank_destroyer_equipment_1_short:0 "Jagdmaus"
CHN_super_heavy_tank_equipment_1:0 "Panzerkampfwagen VIII Maus"
CHN_super_heavy_tank_equipment_1_desc:0 "The Panzerkampfwagen VIII Maus was a superheavy changeling tank built in late 1014. It was the heaviest armored fighting vehicle the world had ever seen. The Mouse was armed with a 128 mm KwK44L/55 cannon with a twin 75 mm auxiliary cannon. Unfortunately for the changelings, she did not have time to participate in the battles."
CHN_super_heavy_tank_equipment_1_short:0 "Maus"

