### Jachs' Drawer ###
CHN_open_jachs_drawer:0 "Major General's desk drawer"
CHN_open_jachs_drawer_desc:0 "Major General Jahs, Governor of Canterlot, is working in his spacious office located in one of the many elegant towers of Canterlot Castle. He keeps several memorabilia dear to him in a locked drawer of his desk."
CHN_open_jachs_drawer_effect_tt:0 "Open the drawer of the Major General's desk."

CHN_jachs_drawer_friendship_journal_short_tt:0 "Book in a dust jacket"
CHN_jachs_drawer_friendship_journal_tt:0 "Copy of Friendship Magazine"
CHN_jachs_drawer_friendship_journal_tt_delayed:0 "§l This book is contraband of the highest order. Any changeling who is found with a copy of Princess Twilight Sparkle's Friendship Magazine will suddenly be visited by WOBB agents in the middle of the night and no one will ever see him again. Yahs received this copy as a gift from Second-Hand Windows in gratitude for helping to make the occupation of Equestria more pleasant and tolerable for the ponies of this country. Maybe friendship is really magic?§!"

CHN_jachs_drawer_mauser_short_tt:0 "Yahsa Combat Pistol"
CHN_jachs_drawer_mauser_tt:0 "996 semi-automatic mauser"
CHN_jachs_drawer_mauser_tt_delayed:0 "§LGeneral-Major Yahs has been using this weapon since he first joined the army in 996. This reliable pistol accompanied him in numerous battles throughout the Great War, and Yahs repeatedly used it. The pistol has never failed him, and Yahs trusts this weapon more than any other soldier, except for a few select changelings, with whom he works daily.§!"

CHN_jachs_drawer_pack_of_cards_tt:0 "Deck of cards"
CHN_jachs_drawer_jachs_card_tt:0 "Major General Yahs"
CHN_jachs_drawer_jachs_card_tt_delayed:0 "Date of birth:§!§L On August 22, 977, General Major Yahs was born in the border town of Volistad and was therefore more familiar with pony life and culture than most other Changelings. Although initially his family insisted that he go to university and become a doctor, in 996 Yahs enlisted in the army and participated in the ill-fated attack on Canterlot in 1002 with the rank of sergeant major. He had risen through the ranks in these six short years thanks to his military acumen. The Yahsa company managed to become famous in this shameful company, as they managed to capture the harmony carriers before they could reach their elements. When the military consequences of the disaster in Canterlot were reviewed, Yahs began to advance even faster in the service and reached the rank of oberst by the time the Great War began. Although Yahs was on or near the front line for most of the war, his moment of glory came only when he was tasked with capturing Canterlot itself. Effectively using the resources at his disposal, Yahs managed to block the narrow passes in the mountains around Canterlot, isolating the capital from the rest of the Equestrian army. Veteran divisions capable of fighting in the harsh conditions of the mountains surrounding the capital went on the attack. Although the campaign was long and bloody, Yahs worked closely with the Luftwaffe to break through the Equestrian defenses before using two companies of Jaegers to outflank and destroy the first line of fortifications around the main road leading through the mountains into the city. As soon as this road was opened, the city fell within a few days. For this achievement, Yahs was promoted to Major General, and when the war ended, he was assigned to command the central Equestrian garrison, which was located at the site of his greatest victory.However, the trials of peace are completely different from the horrors of war. Major General Yahs knows the ponies better than most of the Changelings under his command, and therefore sympathizes with their plight. But since the changeling's power over the city is very weak, it may take a firm hoof to maintain it. Now the Major General will have to endure a real test for his morals: will he be able to keep Canterlot under control without resorting to senseless violence and bloodshed?§!"
CHN_jachs_drawer_alcippe_card_tt:0 "Oberstleutnant Alkippe"
CHN_jachs_drawer_alcippe_card_tt_delayed:0 "Date of birth:§!§L On February 19, 982, Lieutenant Alcippe was born into a privileged family in Ditrisium, and therefore she had many different opportunities. Thanks to her family's resources, overwhelmed by the opportunities opening up before her, Alkippe constantly changed her interests and was unable to choose what to devote her life to. After enrolling at the University of Vesalipolis and changing her specialties three times, Alkippe enlisted in the army just in time for the invasion of Canterlot in 1002, where she participated in the battle as a common soldier assigned to the company of Sergeant Sergeant Yahs. After she and her company successfully captured the elemental carriers and brought them to Queen Chrysalis, Alkippe was promoted after the army was reorganized. She was given a choice: stay with Yahs or join the Royal Guard. But Alkippe decided to stay with his senior officer as a member of his staff. This relationship proved fruitful, as Oberst Jahns and Major Alkippe successfully captured Canterlot using a carefully crafted strategy. When Oberst Jahns, promoted to major General, was given the task of holding Canterlot with his garrison, he asked Alkippe to become his deputy. Alkippe, the new oberstleutnant and admirer of her senior officer, was assigned to carry out Major General Yahs's decisions throughout central Equestria. The severity of "Pax Chrysalia" has put her beliefs to the test, and she hopes that Yahs will choose the right path in the difficult task of maintaining the changeling's power over Equestria.§!"
CHN_jachs_drawer_marsilio_card_tt:0 "General-oberstabsart Marsilio"
CHN_jachs_drawer_marsilio_card_tt_delayed:0 "Date of birth:§!§L October 30, 963\n\nThe future General General Marsilio, who was born in Vancouver on an unseasonably snowy night, is not a native citizen of the Changeling Hegemony. His family were poor shipyard workers, virtually exiled from society, and Marsilio initially grew up disliking the city's deer and ponies, who regarded his species with deep and unshakeable suspicion. Determined to improve his life, Marsilio often visited the city's largest library, studying all kinds of topics. His efforts paid off, and in 981 he was able to enroll at the University of Acornage, where changeling scientists and ponies worked closely together. There he will meet a young stallion named Spectrograf. After they became practically best friends, Marsilio's views on ponies and reindeer changed. They both graduated with honors, and Marsilio left Acornage to travel to Vesalipolis to continue his studies, learning from a new perspective. Marsilio was quite successful in Vemalipolis. There he received his doctorate and began working as a doctor on the border between changelings and deer. He even planned to return to Vancouver to continue his work and treat changelings in this multicultural city.Everything changed after the failed invasion of Canterlot in 1002. This was followed by riots in which the ponies burned down most of the neighborhoods of Van Hoover, where the Changelings lived. Many refugees went to the Changeling Lands. Instead of returning to Van Hoover, Marsilio decided to take care of the refugees who had escaped to Vesalipolis, where he eventually attracted the attention of the royal Army due to his knowledge of biology and anatomy of changelings, deer and ponies. Marsilio quickly moved up the ladder of his career as he worked to modernize the extraction of love and eventually became the chief surgeon of the Royal Army of Changelings by the time Olenia became a protectorate of the hegemony. He eventually moved his headquarters to Siddle, which was located on the opposite shore of Moon Bay from his old home in Vancouver. After that, Marsilio strengthened his ties with Pax Crisalia through his work on extracting love. His efforts to improve the extraction of love, which was supposed to be a painless and ethical process for the new subjects of the Hegemony, allowed him to establish contact with Major General Yahs. After both changelings discovered that they shared many of the ideas that ponies should be treated with respect, the changelings quickly became friends. Now the two of them are trying to do what many others consider impossible: transform Pax Chrysalia from a brutal regime oppressing ponies and deer into a mutually beneficial collaboration between the hives and their defeated enemies.§!"
CHN_jachs_drawer_finicus_card_tt:0 "Finikus Vesali"
CHN_jachs_drawer_finicus_card_tt_delayed:0 "Date of birth:§!§L1 April 979\n\Finicus Vesali was always destined to become the heir to his father's company, Main Highway Industries, from the very moment of his birth. From a young age, he was trained to lead a sprawling corporation, which his father tirelessly improved and expanded until his death in 1005 as a result of a car accident. At the young age of 26, Finikus found himself the head of the Hegemony's largest industrial giant. Such a situation would have crushed many less competent changelings. Finicus, on the other hand, was well prepared by his father and immediately shifted Main Highway's attention to the coming wars. By crowding out competitors, hiring the best specialists, and filing many thousands of protective and speculative patents, Finicus turned MHI into the largest industrial giant in the Changeling Hives and gained a complete monopoly in the field of heavy industry. Then, already anticipating the coming wars, Finicus made MHI practically inseparable from the royal Changeling army, supplying it with reliable and cheap equipment in exchange for lucrative exclusive contracts. By the time the Great War began, all parts of military equipment (from truck transmissions and tank tracks to rifle bolts) were manufactured at MHI factories. Finicus, because of his successful deals, became one of the richest changelings in the entire Hegemony, but even then something eluded him. Finicus never wanted to rule the MHI. As a teenager, he was more interested in art, but his father quickly put an end to this. Now, at the end of the Great War, Finikus became the head of one of the most successful companies that ever existed, but even that did not satisfy him. However, after meeting with Major General Yahs, Finikus found an opportunity to channel the huge resources of the MHI to achieve a difficult peace. Maybe Finicus will be able to feel personal satisfaction if he can change Pax Crisalia for the better.§!"
CHN_jachs_drawer_second_wind_card_tt:0 "Kommandant Second Windows"
CHN_jachs_drawer_second_wind_card_tt_delayed:0 "Date of birth:On November 5, 976, Second Wind knew from childhood that he was destined to become a soldier. He was born high above the ground in the city of Cloudsdale into a family of soldiers whose history can be traced back to the moment of the appearance of Nightmare Moon a thousand years ago. Military service was in the blood of the Pegasus race, and he immediately joined the Royal Guard at the age of 18 in 994.\n\The next decade was stressful for Second Windows. He was present in Canterlot during the infamous invasion of 1002, where, after a brief encounter with the Changelings on the outskirts of the city, he gathered together the members of the guard who patrolled the perimeter during the attack and organized a counterattack to retake the royal palace. Thanks to Princess Cadence and Shining Armor, this counterattack was unnecessary, and Second Wind didn't get a chance to prove himself. He was not a noble like many unicorns, so Second Wind was very low on his chances of promotion. It seemed that he was destined to spend years of service in minor positions, while the nobles simply bought their places in the officer corps, using the power behind their names and family lineage. The Second-hand Wind, coming from a proud military family, had little chance of promotion, especially against the background of unicorn aristocrats who saw a career in the army as another way to gain political dominance.Everything changed during the Great War, when the massive mobilization of Equestria and the bloody battles that followed gave Second Windows a chance to prove its worth. He fought valiantly throughout the war, but even then he received his long-awaited promotion only at the moment when the war was almost lost and the Guard desperately needed at least some officers. When Equestria surrendered and a new royal and imperial Canterlot Guard was created, Second Wind defected and became the head of the organization. Now pegasus personally observes how "Pax Chrysalia" is imposed on his kind, and he himself serves only as a tool with which the changelings try to keep the ponies under control. How long can a proud Pegasus warrior bow to foreign conquerors and keep his brothers in chains?§!"
CHN_jachs_drawer_gloriosa_card_tt:0 "Gloriosa"
CHN_jachs_drawer_gloriosa_card_tt_delayed:0 "Date of birth:Very little is known about the mare, who calls herself Gloriosa, and the Changelings only found out about her when she invited Major General Yahs to a personal meeting. But what is known about her is enough to consider her a powerful ally... or a dangerous enemy. Gloriosa is the matriarch of the Cornucopia Society, an organization that once supported unicorns who desired superiority over other pony species. But now it has become a drug den, offering unicorns the opportunity to forget about the problems of the world. Many minor aristocrats often visit this society operating in the old Kalichornia Hotel. Members of the society have managed to discover a new way of processing love, inaccessible even to changelings. It is unclear how closely the society was involved in the activities of the resistance in Canterlot (and was it?) before joining forces with Major General Yahs, but this society is undoubtedly powerful and influential. And if Gloriosa is interested in something that is happening in her city, then she always finds a way to put her hoof on the scales and give Yahs a little advice. Now he is a useful ally of the Major General, but is it possible to trust a mare who is constantly hiding behind a mask?§!
CHN_jachs_drawer_photos_short_tt:0 "Undeclared photos"
CHN_jachs_drawer_photos_tt:0 "Undeclared photos"
CHN_jachs_drawer_photos_tt_delayed:0 "§LGeneral-Major Yahs often takes a camera with him when he goes outside his office. He captures everything that catches his attention so that he can view the photos later. This film strip is currently still untouched. Perhaps one day someone will take it and develop it, creating images that can be shown to others...§!" ## appeal to player base to submit art ##

CHN_JACHS_DRAWER_DROPPERTT:0 "Bottle of recycled love"
CHN_jachs_drawer_dropper_tt_delayed:0 "§This bottle of recycled love was presented to Yahsu by Finikus Vesali as a sample using new methods of extracting and processing love used by concerns like Main Highway Industries. Before the war, love could not be stored after extraction, as it lost its power within minutes of extraction from the victim. The traditional solution to this problem was to place the unfortunate victims in cocoons, where their dreams became a constant and stable source of love for the hives. However, the love gathered in this way was often spoiled due to the context of the victim's dreams. And the prisoners themselves could only stay in the cocoon for a couple of months. However, nowadays the industrial giants of changeling have found a way to extract and preserve love without losing its power. This allows you to collect love in distant cities and deliver it directly to factories, where it is further purified and processed using newly rediscovered magical runes and processes in order to remove any unwanted emotions that could get into love during its collection. Thus, the love that is now widely available to the hives is becoming cleaner, stronger and much cheaper than ever before.§!"

CHN_jachs_drawer_film_reel_short_tt:0 "Film reel"
CHN_jachs_drawer_film_reel_tt:0 "The reel of film is the Great King" ## check notes ##
CHN_jachs_drawer_film_reel_tt_delayed:0 "§The Equestrian pre-war film,§! The Great King! §L, which starred actor Cheerful Chap, condemns the harsh ascent of the Changeling Hives. It was first shown to the public when the Changeling armies were marching through Hjertland. The film promotes peace and friendship against the backdrop of the terrible first industrial war on Equus. He condemns Queen Chrysalis and her militarism with thinly veiled satire. The most memorable moment of the film is the touching speech by Cheerful Chap at the climax, where he, disguised as the Changeling King of a fictional monarchy, stands for peace and begs the soldiers of the nation to drop their weapons and be kind to each other, not cruel. Although all the copies of the film that could be found were burned by the furious Queen Chrysalis after the fall of Equestria, Major General Yahs managed to keep a copy of this film along with some other works for his personal collection. This is Alkippe and Yahs' favorite movie.!"

CHN_jachs_drawer_medal_short_tt:0 "Royal Army of Changeling Combat Award"
CHN_jachs_drawer_medal_tt:0 "Order of the Great Queen, 1st Class"
CHN_jachs_drawer_medal_tt_delayed:0 "§LGeneral Major Yahs was awarded the Order of the Great Queen, First Class, for the successful capture of Canterlot during the Great War. For presenting Queen Chrysalis with her long-awaited award. The medal accompanied him in his promotion from oberst to major general, and Yahs keeps it in a drawer of his desk for safekeeping. However, whenever Chrysalis visits Canterlot, he always attaches a medal to his uniform.§!"

chn_jachs_drawer_vod_ka_short_tt:0 "Bottle of stallongrad vodka"
chn_jachs_drawer_vod_ktt:0 "Bottle of stallongrad vodka"
CHN_JACHS_DRAWER_VOD_KA_TT_DELAYED:0 "§l Managing the garrison of Canterlot and central Equestria is an exhausting and often very thankless task. Mountains of paperwork, disturbing reports, and new fires that constantly need to be put out mean that stress is a constant companion of Mars. Fortunately, alcohol can help you forget about this stress, and it's much easier to get it than love. Especially considering the reluctance of the city's citizens to share it. Yahs regularly orders shipments of Stallongrad vodka from the northeast to calm his nerves after a busy day. Unfortunately, these days happen sooner than he wants to. A little booze at work from time to time is excusable, given the fact that the stability of Pax Chrysalia is almost entirely supported by the exhausted efforts of a single determined bug.!"



