CHN_decentralised_fear:0 "Decentralized fear"
CHN_decentralised_fear_desc:0 "Sometimes an innocent lie poses a more serious danger than explicit threats. The UOBV showed the cunning characteristic of changelings and launched a "campaign" for mass recruitment of infiltrators. In fact, the influx of new changelings working directly for the UOBV has not changed compared to previous months. But ponies, nevertheless, are now suspicious of any stranger, believing that this is a disguised changeling. This has reduced the need for active policing."
CHN_decentralised_fear_better:0 "Decentralized Fear"
CHN_decentralised_fear_better_desc:0 "Sometimes an innocent lie poses a more serious danger than explicit threats. The UOBV showed the cunning characteristic of changelings and launched a "campaign" for mass recruitment of infiltrators. In fact, the influx of new changelings working directly for the UOBV has not changed compared to previous months. But ponies, nevertheless, are now suspicious of any stranger, believing that this is a disguised changeling. Further improvements to this strategy introduced by Major General Yahs have significantly reduced the need for active policing."
