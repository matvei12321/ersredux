CHN_GRI_Party:0 "Устроили прощальную вечеринку"

changelingattache.1.t:0 "Кризалис отзывает советников"
changelingattache.1.d:0 ""Из-за внутренних нужд в Землях Чейнджлингов ученым, солдатам, советникам и всему связанному с ними персоналу чейнджлингско-грифоньей военной миссии приказано немедленно вернуться домой по указу королевы Кризалис."\nТак гласило простое, но серьёзное по своему значению сообщение, написанное на такитурнском диалекте языка, который разделяют две далекие нации. За много лет чейнджлинги, помогающие Имперской Армии и прикреплённым исследовательским подразделениям, стали частью жизни для тех, кто находится в верхах командной иерархии, и теперь им пора уходить. Настроение было неудивительно мрачным, когда сообщение зачитывалось вслух, как из-за неожиданного требования ухода, так и из-за неизвестности того, что ждёт чейнджлингов на их родине.\nСиновиал, старший военный командир миссии, кажется, почувствовал облегчение от новости, как будто большой груз упал с его плеч. У его соотечественника, Транкса, похоже, была противоположная реакция, он впал в депрессивный ступор, который, в свою очередь, ещё сильнее снизил мораль всем вокруг. Разные реакции побудили одного из имперских командиров, который работал с ЧГВМ, озвучить идею о том, что они должны провести вечеринку для всех членов миссии, чтобы попрощаться с ними, потому что стоит добрым словом запечатлеть свои последние воспоминания о Грифоньей Империи, и что сделает их счастливыми."
changelingattache.1.a:0 "Давайте не будем суетиться по этому поводу и спровадим их со стоицизмом."
changelingattache.1.b:0 "Прощальная вечеринка звучит как хорошая идея!"

changelingattache.2.t:0 "Прощальная вечеринка"
changelingattache.2.d:0 "Ночь только началась, когда все чейнджлинги, участвовавшие в чейнджлингско-грифоньей военной миссии, прибыли в Имперский Дворец в Грифенхейме на свою прощальную вечеринку. Их сотни, а также сотни грифонов, которые тоже хотят присутствовать на вечеринке. К счастью для всех, кто был приглашён, когда столицу перенесли из Грифонстоуна в Грифенхейм, дизайнеры нового бального зала нового Императорского Дворца учли все.\nПродолжающаяся вечеринка заканчивается с рассветом, который многие гости смогли узреть. Учёные обменялись заметками в последнюю минуту, вспоминая о странных открытиях. Грифонья дворянка действительно сумела выдать себя за чейнджлинга-полковника, и солдаты обоих видов разразились песней, чокаясь большими кружками пива. Весело было всем, и кто-то даже смог заставить Транкса снова улыбнуться.\nПохоже, во время вечеринки [GRI.GetLeader] подслушал солдат Имперской Армии, желающих помочь своим друзьям из Земель Чейнджлингов, или даже сражаться вместе с ними с любой бедой, ожидавшей их по возвращению домой. Это привело бы к пересмотру запасов и численности войск на следующий день. Теоретически это предложение можно было бы осуществить, но его также можно было бы просто списать на вызванный алкоголем бред.\nВ любом случае, эта ночь будет долго вспоминаться как самая яркая вечеринка на памяти присутствовавших и поистине светлое пятно в списке имперских деяний." # или подслушала, окончания заскриптую уже в будущем.
changelingattache.2.a:0 "Мы желаем нашим друзьям успехов в их путешествии домой."
changelingattache.2.b:0 "Когда они отправятся назад, они должны взять с собой тысячу бойцов или пять тонн припасов."

changelingattache.3.t:0 "Прощальная вечеринка"
changelingattache.3.d:0 "Ночь только началась, когда все чейнджлинги, участвовавшие в чейнджлингско-грифоньей военной миссии, прибыли в Имперский Дворец в Грифенхейме на свою великую прощальную вечеринку. Их сотни, а также сотни грифонов, которые тоже хотят присутствовать на вечеринке. К счастью для всех, кто был приглашён, когда столицу перенесли из Грифонстоуна в Грифенхейм, дизайнеры нового бального зала нового Императорского Дворца учли все.\nПродолжающаяся вечеринка заканчивается с рассветом, который многие гости смогли узреть. Учёные обменялись заметками в последнюю минуту, вспоминая о странных открытиях. Грифонья дворянка действительно сумела выдать себя за чейнджлинга-полковника, и солдаты обоих видов разразились песней, чокаясь большими кружками пива. Весело было всем, и кто-то даже смог заставить Транкса снова улыбнуться.\nПохоже, во время вечеринки [GRI.GetLeader] подслушал солдат Имперской Армии, желающих помочь своим друзьям из Земель Чейнджлингов, или даже сражаться вместе с ними с любой бедой, ожидавшей их по возвращению домой. Это привело бы к пересмотру запасов и численности войск на следующий день. Теоретически это предложение можно было бы осуществить, но его также можно было бы просто списать на вызванный алкоголем бред.\nВ любом случае, эта ночь будет долго вспоминаться как самая яркая вечеринка на памяти присутствовавших и поистине светлое пятно в списке имперских деяний."
changelingattache.3.a:0 "Мы желаем нашим друзьям успехов в их путешествии домой."
changelingattache.3.b:0 "Когда они отправятся назад, они должны взять с собой тысячу бойцов или пять тонн припасов."
changelingattache.3.c:0 "Друзья не бросают друзей! Мы пошлём всех, кого можем, им в помощь!"

changelingattache.4.t:0 "Просьба об убежище"
changelingattache.4.d:0 "После поступления приказа о возвращении военной миссии чейнджлингов обратно в Весалиполис, генерал Транкс теперь обратился ни к кому иному, как к самому [GRI.GetLeader], попросив его позволить ему остаться в Империи.\nИ немедленно попал под перекрёстный огонь знати и советников. Некоторые были согласны, некоторые были против этого прошения о предоставлении убежища. В конце концов, однако, выбор зависел целиком и полностью от правителя империи.\nТранкс разрыдался прямо в тронном зале, но выбор нужно было сделать."
changelingattache.4.a:0 "Мы не высылаем своих друзей!"
changelingattache.4.b:0 "Отошлите его обратно к его королеве."

changelingattache.5.t:0 "Генерал-предатель"
changelingattache.5.d:0 "Ваше величество, у нас плохие новости из Грифоньей Империи.\nПохоже, что один из наших военных командиров, который был частью экспедиционной миссии, генерал Транкс, отказался прислушаться к вашей мудрой и разумной просьбе вернуться домой! Вместо этого он разрыдался как слабак, и попросил [GRI.GetLeader] о политическом убежище. И они его приняли!\nМоя Королева, это возмутительно. Мы должны добиться того, чтобы предателя наказали!"
changelingattache.5.a:0 "Я требую, чтобы они немедленно вернули его нам!"

changelingattache.6.t:0 "Кризалис требует возвращения Транкса домой"
changelingattache.6.d:0 "Королева чейнджлингов Кризалис издала очень громкий дипломатический протест против нашего решения укрывать генерала Транкса в Империи. Теперь она призывает нас вернуть его домой немедленно, чтобы она, как его законная королева, могла разобраться с ним и его предательскими деяниями.\nТранкс оказался хорошим и ценным другом для нас, и он ценит нашу помощь и поддержку. Но... стоит ли он того, чтобы мы рисковали и продолжили его укрывать?"
changelingattache.6.a:0 "Никогда! Он останется здесь!"
changelingattache.6.b:0 "Мы не должны рисковать конфликтом с королевой."

changelingattache.7.t:0 "Увольнение"
changelingattache.7.d:0 "Сегодня, с восходом солнца, генерал Транкс прибыл в Весалиполис. В цепях, естественно. Его сопровождали через великий улей, а по пути над ним насмехались и оскорбляли многие прочие чейнджлинги. Когда его привели к королеве, отвращение на её лице запечатлело судьбу молодого генерала. Не менее, чем через 20 минут после его прибытия в Весалиполис, ему завязали глаза, а хайвсмаршал Триммель лично командовал расстрельной командой. По всему улью раздался громкий выстрел, и Транкса больше не стало."
changelingattache.7.a:0 "Так ему и надо."

changelingattache.8.t:0 "Грифоний ответ"
changelingattache.8.d:0 "К нашему великому потрясению, имперское дворянство, включая самого [GRI.GetLeader], отклонило наше требование вернуть нам генерала Транкса. Это невероятно и не останется безнаказанным!\nНо сначала мы должны дать королеве знать об этом..."
changelingattache.8.a:0 "Королева будет очень недовольна..."

changelingattache.9.t:0 "Кризалис клянется отомстить"
changelingattache.9.d:0 "Королева внимательно слушала чейнджлинга перед ней, который передавал ответ Грифонов. В быстрой вспышке и последовавшем небольшом взрыве из её кривого рога маленький и бесполезный миньон был уничтожен, и только чёрный пыльный кратер остался там, где он стоял.\n"Слушайте меня, когда я говорю вам это: злые и отвратительные грифоны в Империи сегодня совершили самую большую ошибку в их жалких, мелочных жизнях! Их "империя" уже была разорвана своими собственными миньонами, и их упадочность и некомпетентность даже сегодня не перестают меня удивлять. Если они так мужественно отказываются от моих приказов и требований, тогда они должны совершенно не знать о том, кого они только что сделали своим врагом. Их жалкая маленькая Империя рухнет, как карточный домик, и я разорву его и сожгу, а их граждан превращу в пепел, если они встанут на моем пути!"\nДругие присутствовавшие чейнджлинги аплодировали и приветствовали свою королеву."
changelingattache.9.a:0 "Мы скоро по ним ударим."

changelingattache.10.t:0 "Возмездие Королевы"
changelingattache.10.d:0 "Сегодня был совершенно нормальный день. По большей части.\nГенерал Транкс использовал время в Грифонии и вдали от других чейнджлингов, чтобы лучше интегрироваться в жизнь грифонов. Часто он использовал свои способности к изменению облика, чтобы "вписаться", но многие грифоны, особенно те, кто ранее работал с ним, уважали и любили его в любом случае, независимо от внешнего вида.\nТранкс даже зашел настолько далеко, что нашел себе любовницу, которая жила недалеко от столицы. Казалось, всё было слишком прекрасно, и одинокий чейнджлинг оказался в хороших когтях.\nНо это было ничто иное, как уловка. Ранее сегодня, во время посещения ресторана, Транкс начал сильно кашлять, а вскоре после этого упал на землю. К нему сразу подбежали окружающие грифоны, увидев, как он кашляет кровью, но всё было бесполезно. Генерал Транкс... умер.\nПохороны уже были организованы для этого храброго чейнджлинга, и ему было выдано грифонье подданство, посмертно, чтобы поблагодарить его за уважение, которое он питал к нашей нации и культуре.\nВсех шокировало, когда полиция обнаружила, что причиной смерти Транкса был смертельный яд, который никогда раньше не видели и не использовали во всей Грифонии. Кроме того, его невесту нигде не могут найти после его смерти. Может ли это быть работой чейнджлинга, посланного Кризалис? Пока мы не уверены."
changelingattache.10.a:0 "Покойся с миром, друг."

changelingattache.11.t:0 "Лучше подавать с вином"
changelingattache.11.d:0 "Фантастические новости пришли к нам из Грифонии сегодня, моя королева! Проклятый предатель, генерал Транкс, был убит сегодня одним из наших агентов!\nПохоже, что Транкс пытался вписаться в общество грифонов. На самом деле, он пытался найти любовницу. Наш агент использовал эту возможность, чтобы очаровать его и приблизиться, а позже отравил его напиток, пока они ели в ресторане. Агенту удалось покинуть место происшествия, прежде чем кто-либо смог поймать его."
changelingattache.11.a:0 "Наконец-то предатель мертв!"

changelingattache.12.t:0 "Грифонья Империя присылает добровольцев"
changelingattache.12.d:0 "События приняли удивительный поворот, наши советники из ЧГВМ вернулись домой с тысячами бойцов-грифонов на буксире. Их командир говорит, что они добровольцы из Империи, здесь, чтобы вернуть благосклонность и укрепить узы дружбы, которые связывают две наши нации.\nКоролева Кризалис нашла эту новость отвратительной, особенно при простом упоминании слова "дружба". Прежде чем она успела ответить, Триммель публично поблагодарил добровольцев и назначил им должности в армии. Кризалис пришла в ярость от этого, и сказала, что если гармония будет распространяться, это будет виной Триммеля, но не предприняла никаких действий против этого."
changelingattache.12.a:0 "Из них выйдут неплохие живые мишени."
changelingattache.12.a_tt:0 "Даст §Yдве дивизии имперских волонтёров§!\n"

changelingattache.13.t:0 "Королевские приказы"
changelingattache.13.d:0 "Королева приказала вернуться персоналу чейнджлингско-грифоньей военной миссии, включая двух командиров, генерала Транкса и маршала Синовиала. Она считает, что больше нет необходимости в миссии, поскольку усилиям чейнджлингов лучше всего быть направленными на Эквестрию."
changelingattache.13.a:0 "Наконец-то, славься, моя королева!"

changelingattache.14.t:0 "Родина зовёт"
changelingattache.14.t_annex:0 "Солдаты без родины"
changelingattache.14.d:0 "В Грифенхейме наступил вечер, и газовые лампы города освещали улицы, когда последние магазины закрывались на ночь. Два чейнджлинга в военной форме сидели в кафе, потягивая кофе и наслаждаясь величием города. Прошло уже немало времени с тех пор, как они прибыли в город, но Café Central неизменно предлагало лучший кофе и вид. По крайней мере, намного лучше, чем то, что можно было получить в Весалиполисе.\nОдин из чейнджлингов с ярко-голубыми глазами заговорил, закуривая сигарету: "Давно мы не слышали новостей от Её Величества. Если верить Дер Бюргеру, война, должно быть, идет плохо, Синовиал."\n"Транкс, я считаю, что это просто пропаганда со стороны пони. Вскоре нас пригласят на торжество в Кантерлот," — ответил Синовиал, насыпая ложку сахара в кофе, прежде чем размешать его.\nТранкс сделал ещё один глоток кофе: "Я даже и не знаю. По телеграфу приходят те же самые новости. Бомбардировка Весалиполиса, потеря Хьёртланда. Хотя я могу допустить, что дворец намеренно держит нас в неведении."\n"Думаешь они действительно хотят, чтобы мы знали поменьше?" — ответил Синовиал невозмутимо.\n"Да. Мы здесь в добровольном порядке, из-за войны дома," — сказал Транкс, закуривая сигарету и наслаждаясь этой доступной здесь роскошью.\n"И все же, если бы мы хотели вернуться домой, то могли бы просто воспользоваться первым же почтовым самолётом. Не думаю, что они обидятся," — сказал Синовиал, не замечая идущего к нему официанта.\n"Господа? Вам звонят из посольства чейнджлингов. Они говорят, что это срочно," — сказал он, указывая левым когтем в направлении бара.\nСиновиал и Транкс поднялись из-за стола. "Похоже, долг зовёт," — вздохнул Транкс, положил несколько монет на стол и подошёл к телефону на стойке вместе с Синовиалом, что следовал за ним по пятам. Он взял трубку и начал внимательно слушать.\nУсталый и отчаянный голос с другой стороны трубки пробормотал несколько слов, прежде чем отключиться: "Весалиполис пал... полный крах... все офицеры отзываются на родину, чтобы бороться с эквестрийской угрозой."\nТранкс опустил трубку, смотря в сторону Синовиала, но не видя его.\n"Ну, что там сказали?" — спросил Синовиал, вероятно, в некоторой степени осведомлённый о сообщении, которое только что получил Транкс.\nТранкс пробормотал, а эти слова всё повторялись в его голове. "Родина пала. Мы должны вернуться назад, чтобы выполнить свой долг против угрозы со стороны Эквестрии."\nВскоре после этого чейнджлинги покинули Империю, направляясь на родину, чтобы принять там последний бой."
changelingattache.14.d_annex:0 "Титульные страницы газет по всей Грифонии сегодня озаглавлены одинаково — "Чейнджлинги объявили о безоговорочной капитуляции, мир в Эквестрии!"\nПосольство чейнджлингов в Грифенхейме подтвердило новости, но полностью не разорвало связи с родиной, насколько известно. Ввиду того, что Армия Чейнджлингов расформировывается, а будущее целой страны туманно, встал вопрос о судьбе военной миссии чейнджлингов в Империи. Они теперь чейнджлинги без родины, которые подчиняются уже не существующему командованию.\nЧейнджлинги Экспедиции хорошо адаптировались в Грифонии, многие приняли грифоньи обычаи за долгие годы нахождения в Грифенхейме. Предоставить им грифонье подданство и позволить им остаться — определённо, один из вариантов. Их знания в военной сфере сыграли бесценную роль в модернизации нашей армии. Транкс, в частности, чётко дал понять, что его полностью устраивает текущее положение вещей.\nВ ином случае, мы можем просто их отпустить, оставить их на произвол судьбы. Какое решение мы бы не приняли, мы больше можем не бояться навлечь на себя гнев Кризалис."
changelingattache.14.a:0 "Кто угодно может принять победу. Но немногие могут принять поражение."
changelingattache.14.b:0 "Мы позволим им остаться."
changelingattache.14.c:0 "Нам не стоит рисковать и устраивать очередной дипломатический инцидент."

changelings.44.t:0 "Посольство в государство [PLB.GetName]"
changelings.44.d:0 "Вдоль нашей северо-восточной границы лежит плохо организованные медвежьи владения. Государство [PLB.GetName] нельзя даже назвать государством — там нет единой экономики и сама нация состоит из разрозненных племен, объединенных властью [PLB.GetLeader]. Эта страна с трудом может поддерживать современную промышленную базу. Они слабы и малочисленны, и поэтому, естественно, должны бояться нас — сильнейшей нации в регионе.\n\nНо нехватку промышленности медведи восполняют другими способами. Золотые резервы медведей пойдут на укрепление нашей экономики, высвободив средства, которые теперь можно использовать в других местах. Кроме того, у медведей есть немало стали, которую можно использовать для укрепления нашего военного производства. И мы могли бы захватить часть медвежьих регионов, взяв их под наш прямой контроль. Это даст нам доступ к промышленности и гражданам этих территорий. Если медведи согласятся хоть на какое-то из наших требований, то мы всё равно выиграем. Взамен мы предложим медведям военную защиту, а также помощь наших учёных и инженеров.\n\nЧто мы потребуем от государства [PLB.GetName]?"
changelings.44.a:0 "Мы требуем золото."
changelings.44.b:0 "Мы хотим ресурсы."
changelings.44.c:0 "Нам нужны территории и золото."
changelings.44.e:0 "Нам нужны территории и ресурсы."

changelings_demand_gold_tt:0 "Государство §Y[CHN.GetNameDef]§! потребует от государства §Y[PLB.GetNameDef]§! предоставить золото и золотые шахты в обмен на защиту, технологии и учёных."
changelings_demand_resources_tt:0 "Государство §Y[CHN.GetNameDef]§! потребует от государства §Y[PLB.GetNameDef]§! предоставить природные ресурсы, а именно сталь, в обмен на защиту, технологии и учёных."
changelings_demand_land_and_gold_tt:0 "Государство §Y[CHN.GetNameDef]§! потребует от государства §Y[PLB.GetNameDef]§! предоставить золото и золотые шахты, а также два примыкающих к империи региона, в обмен на защиту, технологии и учёных."
changelings_demand_land_and_resources_tt:0 "Государство §Y[CHN.GetNameDef]§! потребует от государства §Y[PLB.GetNameDef]§! предоставить природные ресурсы, а именно сталь, а также два примыкающих к империи региона, в обмен на защиту, технологии и учёных."

changelings.45.t_gold:0 "Чейнджлинги требуют золото"
changelings.45.d_gold:0 "Наш правитель, [Root.GetLeader], принял посольство чейнджлингов королевы Кризалис. Трутень пояснил требования королевы: они желают получить большое количество золота, а в обмен предлагают свою протекцию."
changelings.45.t_resources:0 "Чейнджлинги требуют сталь"
changelings.45.d_resources:0 "Наш правитель, [Root.GetLeader], принял посольство чейнджлингов королевы Кризалис. Трутень пояснил требования королевы: они желают получить значительное количество стали, а в обмен предлагают свою протекцию."
changelings.45.t_resources_land:0 "Чейнджлинги требуют сталь и территории"
changelings.45.d_resources_land:0 "Наш правитель, [Root.GetLeader], принял посольство чейнджлингов королевы Кризалис. Трутень пояснил требования королевы: они желают получить значительное количество стали, а также наши земли, прилегающие к Ключ-Озеру, а в обмен предлагают свою протекцию."
changelings.45.t_gold_land:0 "Чейнджлинги требуют золото и территории"
changelings.45.d_gold_land:0 "Наш правитель, [Root.GetLeader], принял посольство чейнджлингов королевы Кризалис. Трутень пояснил требования королевы: они желают получить большое количество золота, а также наши земли, прилегающие к Ключ-Озеру, а в обмен предлагают свою протекцию."
changelings.45.a:0 "Это возмутительно! Медведи, к оружию!"
changelings.45.b:0 "Мы уступаем."
changelings.46.t_deal:0 "Полярные Медведи приняли ультиматум"
changelings.46.d_deal:0 "Наши посланники недавно предприняли опасное путешествие в холодные арктические земли для переговоров с [PLB.GetLeader] и выдвижения наших требований. Хотя переход по холодным пустошам обычно был опасной миссией, медведи позаботились о том, чтобы наши посланцы добрались до их столицы без особых трудностей, ясно понимая, что любой вред, причинённый нашим посланникам во время их пути, может быть использован в качестве предлога для войны. Когда наши посланники наконец прибыли в столицу полярных земель, они быстро изложили наши требования и дали понять, что мы не примем отказа. Вскоре [PLB.GetLeader] неохотно согласился на наши требования и составил с нашими послами условия договора, который будет возвращён королеве Кризалис для рассмотрения. Как только мы подпишем договор, то получим желаемом, а медведь перейдут под нашу защиту."
changelings.46.t_no_deal:0 "Полярные Медведи отвергли ультиматум"
changelings.46.d_no_deal:0 "Наши посланники недавно предприняли опасное путешествие в холодные арктические земли для переговоров с [PLB.GetLeader] и выдвижения наших требований. Хотя переход по холодным пустошам обычно был опасной миссией, медведи позаботились о том, чтобы наши посланцы добрались до их столицы без особых трудностей, ясно понимая, что любой вред, причинённый нашим посланникам во время их пути, может быть использован в качестве предлога для войны. Когда наши посланники наконец прибыли в столицу полярных земель, они быстро изложили наши требования и дали понять, что мы не примем отказа. И хотя наши намерения были ясны, [PLB.GetLeader] ответил отказом, настаивая на том, что гордый медвежий народ никогда не уступит нашим требованиям. Наши послы вернулись очень быстро, явно опасаясь за свою жизнь среди замерзших варварских пустошей, и передали плохие новости непосредственно королеве Кризалис. Разъяренная королева приказала немедленно мобилизовать войска на границе. Мы не потерпим оскорблений от этих жалких медведей!"
changelings.46.a:0 "Мы возьмем своё силой."
changelings.46.b:0 "Их храбрость достойна нашей дружбы!"
changelings.46.e:0 "Не будем обострять ситуацию."

threat_chn_attack_plb:0 "Военные действия против Полярных Медведей"
PLB_deal_CHN:0 "Полярные Медведи принимают наши требования"

politics_thorax_puppet_desc:0 "Изгнанный изо всех ульев, Торакс стал одним из первых сторонников гармонии среди чейнджлингов. Его вера в то, что любовь можно получить дружбой и мирной торговлей со своими соседями, медленно набирает популярность среди подавленных чейнджлингов, которые чувствуют, что их жизни бесполезно тратятся в процессе милитаристской экспансии. Тем не менее, его идеи не слишком распространены, а королевы ульев презирают его и считают идеи гармонии опасными и вредными для чейнджлингов. Это изменилось после поражения чейнджлингов в Великой Войне, и теперь Торакс ведёт изменившуюся нацию в светлое будущее, надеясь показать миру, что не все чейнджлинги являются монстрами."

#news events
changelings.47.t:0 "Чейнджлинги оккупировали страну Полярных Медведей"
changelings.47.d:0 "[This.GetNewspaperHeader]Очередная страна пала жертвой империалистических амбиций чейнджлингов, на этот раз это оказались Полярные Медведи с крайнего севера. Несмотря на то, что Медведи всегда были далеки от мировой политики, это не помешало чейнджлингам нахально прийти и потребовать уступок в пользу Империи. Правитель медведей, [PLB.GetLeader], отверг все эти безумные требования, заявив, что медведи никогда не склонятся перед угрозами, и если чейнджлинги так сильно хотят этих уступок, то им придётся прийти и взять их силой.\n\nОтвет Кризалис был очевиден и не заставил долго ждать, вскоре было развёрнуто полномасштабное вторжение. Оборона медведей быстро оказалась сломлена и перемирие было заключено уже на следующий день. Большинство медведей сбежало в более безопасные земли, а теми, кто остался, теперь правит медведь Бьорнлинг, симпатизирующий фашистским идеям."
changelings.47.d_had_border_wars:0 "[This.GetNewspaperHeader]\nОчередная страна пала жертвой империалистических амбиций чейнджлингов, на этот раз это оказались Полярные Медведи с крайнего севера. Несмотря на то, что Медведи всегда были далеки от мировой политики, это не помешало чейнджлингам нахально прийти и потребовать уступок в пользу Империи. Хотя правитель медведей, [PLB.GetLeader], принял некоторые из этих требований, посол счел это недостаточным, и посланник вернулся обратно неудовлетворенным частичным принятием условий. Однако северные медведи затаили дыхание и надеялись, чтобы уступок, которые они сделали Ульям Чейнджлингов, оказалось достаточно.\n\nКазалось, что все утихло, однако через неделю начались многочисленные рейды через границу между медведями и Империей, в результате чего многие деревни медведей оказались разрушены. Правительство медведей, зная, что это может в любой момент превратиться в полномасштабное вторжение, приняло все требования чейнджлингов, ради сохранения своей "независимости"."
changelings.47.d_plb_accepted_deal:0 "[This.GetNewspaperHeader]\nОчередная страна пала жертвой империалистических амбиций чейнджлингов, на этот раз это оказались Полярные Медведи с крайнего севера. Несмотря на то, что Медведи всегда были далеки от мировой политики, это не помешало чейнджлингам нахально прийти и потребовать уступок в пользу Империи. Зная, что сопротивление бесполезно, правитель медведей, [PLB.GetLeader], согласился на все требования чейнджлингов, в обмен на защиту и помощь.\n\nКоролева оказалась довольна таким исходом и заключила союз с медведями, навсегда связав медведей с Гегемонией чейнджлингов в обмен на военную защиту с их стороны. Большое количество золота и стали было вывезено в Весалиполис, в поддержку приготовлений к будущей войне. Жители недовольны сложившейся ситуацией, однако рады, что сохранили независимость и свои жизни."
changelings.47.a:0 "Это не может не беспокоить."
changelings.47.b:0 "Отлично!"

changelings.48.t:0 "Атака успешна!"
changelings.48.d:0 "Наша небольшая схватка с силами белых медведей вдоль границы привела к решающей победе наших войск. Поначалу медведи оказали жесткое сопротивление, но, когда заработала артиллерия и наши войска прорвались через их ряды, вся оборона медведей быстро рухнула, позволив нам захватить полный контроль над этим районом. Сейчас мы закрепляем наши успехи и ожидаем дальнейшего развития ситуации."
changelings.48.a:0 "Отлично."

changelings.49.t:0 "Атака была отражена"
changelings.49.d:0 "Наша небольшая схватка с силами белых медведей вдоль границы привела к ошеломляющему поражению наших войск. В наших попытках ограничения конфликта, дабы он не перерос в полномасштабную войну, мы задействовали лишь небольшую часть нашей армии, и, похоже, этого было недостаточно. Используя подготовленные оборонительные позиции, медведи сумели отбить нашу атаку, и вскоре наши силы были окончательно рассеяны решительной контратакой медведей. Это поражение унизило нас и заставило понести немалые потери."
changelings.49.a:0 "Армия чейнджлингов проиграла каким-то медведям?"
changelings.49.b:0 "Переходим ко второму этапу!"

changelings.50.t:0 "Пограничный конфликт прошёл без последствий"
changelings.50.d:0 "Похоже пограничное вторжение приняло патовую ситуацию — ни мы, ни медведи не оказались в состоянии одержать победу. Это весьма неожиданно. Как же наша превосходная армия не смогла одержать решительной победы над медведями?"
changelings.50.a:0 "Мишки нас остановили?"

changelings.51.t:0 "Могучая медвежья армия победила снова!"
changelings.51.d:0 "Мы обратили их в бегство! Наши земли снова в безопасности, они не посмеют снова совать к нам свою морду! Мы не знаем, сколько ещё раз они будут пытаться уничтожить нас, но теперь весь мир знает, что наша славная армия ещё раз спасла нас от неминуемой гибели!"
changelings.51.a:0 "Ура!"

changelings.52.t:0 "Чейнджлинги нас побили!"
changelings.52.d:0 "Беда! Наши силы были повержены и обращены в бегство, мы утратили контроль над регионом! Нам ничего не остается, кроме как отступить и сделать всё возможное, чтобы спасти остатки нашей страны и наследия!"
changelings.52.a:0 "Отступаем!"

changelings.53.t:0 "Атака отражена!"
changelings.53.d:0 "Чейнджлинги напали, но мы смогли отбиться! Несмотря на мощь их армии, кажущейся подавляющей, мы заставили жуков отступить с нашей земли! Они посчитали этот конфликт лёгкой войной, но он обернулся для их армии дорогостоящей катастрофой. Они не скоро забудут это поражение. Это наша земля, и сегодня мы показали этим жукам, что не сдадимся без боя!"
changelings.53.a:0 "Яр-р-р!"

changelings.54.t:0 "Стол переговоров"
changelings.54.d_gold:0 "Как и описано в договоре, мы возьмём указанную сумму золотом, в обмен на защиту в виде протектората под нашим управлением."
changelings.54.d_resources:0 "Как и описано в договоре, мы возьмём указанное количество стали, в обмен на защиту в виде протектората под нашим управлением."
changelings.54.d_resources_land:0 "Как и описано в договоре, мы возьмём указанное количество стали, а также получим контроль над указанными территориями, в обмен на защиту в виде протектората под нашим управлением."
changelings.54.d_gold_land:0 "Как и описано в договоре, мы возьмём указанную сумму золотом, а также получим контроль над указанными территориями, в обмен на защиту в виде протектората под нашим управлением."
changelings.54.a:0 "Королева всегда получает желаемое!"
changelings.54.b:0 "Ничто не устоит на пути королевы!"
changelings.54.c:0 "Медведи полюбят свою королеву."
changelings.54.e:0 "Королева — лучший правитель, которого можно желать."

changelings.55.t:0 "Медведи сопротивляются!"
changelings.55.d:0 "Похоже, что грубой силой с медведями справиться не получится, особенно на их родной земле. Местность слишком благоприятна для обороняющихся, и они хорошо это знают, препятствуя нашей явно более сильной армии. Однако мы — чейнджлинги, и у нас есть чем похвастаться, окромя грубой силы."
changelings.55.a:0 "Отправьте наших специалистов по внедрению."

changelings.56.t:0 "Шпионы чейнджлингов среди нас"
changelings.56.d:0 "Чейнджлинги внедрились в нашу страну, в ответ на оказанное им сопротивление! Они проникли в наши ряды, сея хаос и беспорядки. Никто не знает, кому можно доверять. Даже простого предположения о том, что кто-то может быть инфильтратором, достаточно, чтобы друзья и даже семья повернулись против обвиняемого. наша нация в хаосе, сможем ли мы так противостоять ульям?"
changelings.56.a:0 "Похоже, придётся сдаться!"
changelings.56.b:0 "Мы ещё поборемся!"

changelings.57.t:0 "Чейнджлинги следуют договору"
changelings.57.d:0 "Чейнджлинги сдержали своё слово! Мы не только официально получили протекцию с их стороны, но вместе с этим приобрели многие бонусы, например, они отправили к нам специалистов и строителей, готовых помочь нам довести нашу инфраструктуру до ума!"
changelings.57.a:0 "Возможно, так даже выгоднее для нас..."

changelings.58.t:0 "Время действовать!"
changelings.58.d:0 "Чейнджлинги проигрывают! Чего стоит их протекция, если они не могут защитить даже самих себя? У нас есть возможность принять сторону победителя! Как мы поступим?"
changelings.58.a:0 "В атаку!"
changelings.58.b:0 "Мы уважаем договор!"

changelings.59.t:0 "Общенациональные рейды"
changelings.59.d:0 "Тайная полиция Весалиполиса, Дитрисиума, Волистада, Ликтиды, Сикары, Фантины и прочих городов чейнджлингов начала секретную операцию под названием "Дегармонизация". Рейды на сеть сопротивления Торакса были осуществлены в каждом уголке страны. Инфильтраторы УОБВ обнаружили ячейки сопротивления Торакса, а затем поделились этой информацией с ближайшими патрулями. В течение нескольких часов вся сеть сопротивления, которую Торакс сумел создать в ульях, была уничтожена, и тысячи чейнджлингов "исчезли" посреди ночи. Большинство сторонников Торакса мертвы, а те, кто выжил, вскоре пожалеют об этом. Гражданские потери минимальны, а в немногих смертях были обвинены радикалы-гармонисты, что послужит дальнейшим оправданием необходимости захвата самого Торакса и прекращения насилия. Население не подозревает о нашей операции. К сожалению, сам Торакс сбежал куда-то на восток."
changelings.59.a:0 "Он не сможет скрываться от нас вечно."

changelings.60.t:0 "Королевы ульев"
changelings.60.d:0 "Во главе каждого традиционного города-улья находится королева, самый высокопоставленный член королевской семьи. Королевы четырёх самых могущественных ульев приняли Кризалис в качестве Единой Королевы земель чейнджлингов, пообещав ей преданность в эпоху объединения в 980-990-х годах. Королева Аргиннис во Враксе молода, подла, но верна королеве Кризалис. Она контролирует костяк Вооруженных сил чейнджлингов, что делает их одной из самых сильных армий в мире. Хельвия в Дитрисиуме является прагматичной королевой и капризной союзницей Кризалис. Она использует верфи своего улья для строительства флота, чтобы однажды вырвать контроль над морями у оленийцев и эквестрийцев. Ауранция в Ликтиде, самая верная и преданная сторонница королевы Кризалис, управляет огромными фабриками Ликтиды, производящими оборудование и товары для гегемонии, чтобы укрепить её возможности и сократить разрыв между ульями и промышленным гигантом Эквестрии. Ярия в Сорифе, усердная королева, верящая в величие вида чейнджлингов и славу королевы Кризалис, посвящает всё своё время и усилия раскрытию магических тайн своего вида, надеясь, что в один прекрасный день они будут доминировать над миром.\n\nВсе эти королевы из разных регионов гегемонии когда-то вгрызлись друг другу в глотки. Теперь, объединившись под властью королевы Кризалис, некогда злейшие враги теперь стали верными союзниками. Чего же они смогут добиться, работая вместе?"
changelings.60.a:0 "Лучше бы им быть верными, иначе..."

changelings.61.t:0 "Большой военный парад в Весалиполисе"
changelings.61.d:0 "Сегодня улицы города Весалиполиса до краев были полны гудящими чейнджлингами, многие из которых поднялись в воздух. Все они собрались, чтобы увидеть огромный военный парад, который готовился и рекламировался неделями. Чейнджлинги собрались со всей страны, и даже королевы ульев были там. Если не считать коронации Кризалис в качестве великой королевы Гегемонии, это был самый большой парад, который когда-либо видел город.\n\nКвадратные колонны солдат, одетых в серое, вскоре вышли из казарм, маршируя в ногу и неся белые знамёна. Когда они проходили мимо, мирные жители с одобрением приветствовали их и восхищались дисциплиной. Позади них катились новые блестящие танки, а маршал Триммель возглавлял длинную колонну из сотни танков. За ними следовали моторизованные дивизии в своих грузовиках, артиллерийские батальоны с колесными орудиями, морские пехотинцы, моряки, элитные отряды егерей, гвардейцы королевы и многое другое. Это был бесконечный поток солдат, вооруженных до краев новейшим оружием. Толпа была в восторге и убеждена в мощи своей нации, а вера в спасение, которое когда-то обещала им королева Кризалис, была сильнее, чем когда-либо прежде.\n\nВ конце колонны была сама Кризалис, которая ехала в машине и была облачена в белоснежную военную форму. Она приветствовала толпу, и толпа приветствовала её в ответ, скандируя: «Да здравствует королева!» почти фанатично. И чуть позже, в небе появились ревущие истребители и бомбардировщики, что затмили собой солнце.\n\nЭто было лишь начало. Вскоре солдаты и их оружие обратятся против всех врагов гегемонии, и эти народы один за другим падут и станут лишь источником любви для чейнджлингов."
changelings.61.a:0 "Слава чейнджлингам!"

changelings.63.t:0 "Охота за Тораксом"
changelings.63.d:0 "Королева Кризалис ворвалась в штаб-квартиру УОБВ в столь отвратительном настроении, в каком её прежде не видел никто. Она прошла мимо группы чейнджлингов, которые отчаянно пытались выглядеть занятыми, лишь одарив их кратким презрительным взглядом. Она пинком распахнула дверь кабинета Васпира Орна Кладисиума и швырнула ему на стол бежевую папку. Он инстинктивно отпрянул, но вспышка чистой ярости королевы заставила его застыть на месте. Прерывать Кризалис во время таких моментов было... неразумно.\n\n— Он сбежал, — прошипела Кризалис в мёртвой тишине. — Торакс сбежал.\n\nВаспир медленно кивнул, пытаясь успокоить разгневанную королеву. — Моя королева, я изо всех сил стараюсь найти его прямо сейчас...\n\n— Молчать! — резко рявкнула Кризалис. — Ты потерпел неудачу, директор. Я уже подумывала, не пристрелить ли тебя самого как сторонника Торакса, но потом вспомнила, что ты просто некомпетентен. Я считала, что никому не сбежать из-под твоего взора.\n\n— Прошу прощения за свою неудачу, — ответил он, поморщившись. Лучше проглотить оскорбления королевы, чем пытаться оправдываться. В глазах разъяренной королевы самозащита легко могла быть истолкована как измена. — Мы готовили операцию по захвату Торакса, но, похоже, кто-то из УОБВ предупредил его. Вероятно, у него есть союзники внутри организации. Я сейчас как раз проверяю своих агентов, чтобы это больше не повторилось.\n\n— В моём агентстве НЕ ДОЛЖНО быть никаких шпионов Торакса, — ледяным тоном ответила она. — Я и не надеюсь, что ты знаешь, что делаешь. Но поскольку я хочу, чтобы всё было сделано правильно, я расскажу как действовать. Он сбежит в гармоническую страну, так что пошли всех наших шпионов в Эквестрию, Кристальную Империю и Якякистан. Не обращай внимания на возможные политические последствия, всё равно нам никто не объявит войны, если мы поймаем внутреннего предателя.\n\n— Всех, моя королева? — Эхом повторил её слова Васпир.\n\n— ВСЕХ! — Практически прорычала Кризалис. — Я хочу, чтобы его нашли и разделались с ним НЕМЕДЛЕННО!\n\nВаспир покорно кивнул. — Конечно. Я отдам соответствующий приказ.\n\nУдовлетворенная Кризалис развернулась, чтобы уйти. Она оглянулась через плечо, и тень злобной ухмылки проскользнула по её морде. — И ещё одно, Васпир. — Он осторожно поднял голову.\n\n— Он нужен мне живым."
changelings.63.a:0 "Как скажете, Ваше Величество."

changelings.64.t:0 "Отчёт относительно Торакса"
changelings.64.d:0 "§RСОВЕРШЕННО СЕКРЕТНО§!\n\n§RТОЛЬКО ДЛЯ ГЛАВЫ УОБВ§!\n\nНаша разведка проследила путь Торакса до Якякистана. Было развёрнуто множество агентов, которые также получили лучшее оборудование для разведки и связи, а также хлороформ и прочие парализующие химикаты. Проникновение осложнялось небольшими размерами сообществ яков и тем фактом, что сами яки уже были довольно подозрительны, поэтому многие инфильтраторы держались подальше от населенных пунктов и наблюдали издалека. Мы предполагаем, что Торакс уже распространил слухи о действиях чейнджлингов. Хотя вполне возможно, что яки вблизи нашей границы просто стали параноиками из-за наших предыдущих действий. У нас нет полной уверенности относительно этого вопроса, и мы оставляем его для дальнейшего расследования.\n\nНо всё равно один из наших агентов столкнулся с Тораксом в Яктауне. К сожалению, немалое количество охранников позволило Тораксу избежать захвата. Торакс сбежал на юг, преследуемый нашими агентами. Взаимное недопонимание позволило ему сбежать в Кристальную Империю и прибыть туда раньше наших агентов. Однако мы подозревали, что он отправится именно в Кристальный Город, и поэтому заранее разместили шпионов в городе.\n\nУбийство было бы лёгким способом расправиться с предателем, но поскольку миссия требовала, чтобы его захватили живым, от этого пришлось бы отказаться. Торакс в своём истинном обличье предстал перед принцессой Каденс, которая проявила сочувствие к нему и провела параллели между Кризалис и Сомброй. Ещё одна попытка захватить его в Кристальном городе провалилась из-за вмешательства местных стражников. Торакс проявил классическую гармоническую слабость и призвал Каденс проявить милосердие к шпионке, посланной похитить его. Нашему агенту дали 10 лет тюремного заключения по обвинению в шпионаже, и мы надеемся вскоре освободить её.\n\nТоракс отправился на юг, в Эквестрию, где его следы затерялись. Все попытки найти его утонули в огромном количестве противоречивой информации. Мы получали сообщения о том, что Торакса видели в Балтимейре, Лас-Пегасусе, Кантерлоте, Сталлионграде, Хьёртланде и даже в самом Весалиполисе. Хотя некоторые из них могут быть признаком истерии и паники, скорее всего эти сообщения намеренно распространялись для того, чтобы парализовать УОБВ. К сожалению, в этом они значительно преуспели. В данный момент нам не на чём сконцентрировать наши усилия по расследованию, и вполне вероятно, что Торакс сможет покинуть этот континент."
changelings.64.a:0 "Кризалис это не понравится..."

changelings.65.t:0 "Иной вариант"
changelings.65.d:0 "Кризалис расхаживала взад-вперёд по своим личным покоям. Одна наглая личинка сумела ускользнуть от всей армии и лучших агентов УОБВ. Некомпетентные придурки! Она была окружена идиотами, а возможно, что и предателями. Хотя Васпир точно верен ей, лёгкость, с которой Торакс сбежал, заставила Кризалис заподозрить, что ему помогал кто-то из УОБВ. Она вздохнула и позвала: — Ласин, пожалуйста, входи.\n\nКапитан королевской гвардии вошёл с поклоном. — В чём дело, моя королева?\n\n— Ты единственный, кому я могу доверять. Мне нужно, чтобы ты провёл полную проверку УОБВ. Никаких казней и никаких арестов. Главное - проявлять осторожность. Ты, скажем, будешь просматривать улики в поисках следов Торакса. Но на самом деле ты должен будешь искать сторонников Торакса в УОБВ. Меня не волнует мелкая коррупция, но я не потерплю существования предателей. Васпир вне подозрений. Он некомпетентен, но предан. Считай всех остальных подозреваемыми. Если ты что-нибудь найдешь, то принеси доказательства мне лично. Я с этим разберусь.\n\nЛасин отдал честь. — Я всё сделаю.\n\nКризалис улыбнулась. — Спасибо. А теперь мне нужно было обсудить ещё один вопрос.\n\nЛасин вопросительно поднял бровь. — В чём дело, моя королева?\n\n— Поскольку Торакс в настоящее время вне нашей досягаемости, у меня возникла идея провести суд над лояльным нам опытным инфильтратором, маскирующимся под Торакса. Мы сможем "обвинить" его, он "сознается", и мы его "казним".\n\nЛасин тщательно подбирал слова. — Это было бы действительно полезно, если бы мы смогли добиться успеха. Но если окажется, что Торакс жив и свободен, то народу не понравится наш обман.\n\nКризалис обдумала его слова. Конечно, он был прав. И всё же бездействие заставило бы её правительство выглядеть слабым. Как ей поступить?"
changelings.65.a:0 "Мы проведем этот суд в прямом эфире для всей нации!"
changelings.65.b:0 "Фальшивый суд не стоит потенциальных рисков. Просто сосредоточься на УОБВ."

changelings.66.t:0 "Суд"
changelings.66.d:0 "Инфильтратора, превратившегося в Торакса, ввели в тяжёлых цепях в зал суда. Там присутствовали Её Величество Королева Кризалис, хайвсмаршал Триммель, капитан королевской гвардии Ласин Кардо, директор УОБВ Васпир Орн Кладисиум, брат обвиняемого Фаринкс и многие прочие офицеры и командиры. Большой радиоприемник с микрофоном гарантировал, что каждое слово будет передаваться в бесчисленные дома по всей стране.\n\n— Торакс, — крикнула Кризалис со своего места. — Ты обвиняешься в измене, составлении заговора и терроризме. Признаёшь ли ты себя виновным?\n\n— Да, я виновен, — жалобным голосом Торакса проскулил инфильтратор. — Но я всего лишь пытался помочь нашему народу!\n\n— И ты ради этого плёл заговор с целью свержения Её Величества? Да это бы унесло жизни сотен тысяч чейнджлингов, — прорычал в ответ Ласин. — Моя королева, я умоляю вас, не дайте этому предателю избежать справедливого правосудия!\n\nКризалис злобно ухмыльнулась. — Конечно нет, Ласин. А теперь, Торакс, не желаешь ли ты что-то сказать своим последователям?\n\n— Я никогда не желал никому вреда, — взмолился Не-Торакс. — Я лишь хотел принести гармонию в нашу страну. Но теперь ясно, что я потерпел неудачу. Мои последователи, я умоляю вас: остановитесь. У нас ничего не получится. Наш единственный выход - спрятаться и надеяться, что когда-нибудь в будущем всё изменится.\n\nКризалис одобрительно кивнула. — Хороший. Тогда, я полагаю, мы закончили? — Когда никто не ответил, королева снова кивнула. — За его преступления я приговариваю Торакса к смертной казни через расстрел. — Зал взорвался радостными возгласами и аплодисментами. Ненастоящего Торакса выпроводили и Кризалис улыбнулась.\n\nПо всей стране многие чейнджлинги праздновали этот момент. Кризалис остановила предателя и спасла Земли Чейнджлингов."
changelings.66.a:0 "Слава королеве!"

changelings.67.t:0 "Ответ"
changelings.67.d:0 "Прошлой ночью по Землям Чейнджлингов распространилось радиосообщение, в котором звучал голос чейнджлинга, которого считали мёртвым.\n\n— Мои товарищи-чейнджлинги, — начал Торакс, — я рад сообщить вам, что я ещё жив и свободен. Кризалис не удалось поймать меня, но она решила притвориться, что сделала это. Я предполагаю, что она заставила кого-то из Королевской Гвардии превратиться в меня и признаться во всех этих преступлениях. Для протокола, я отрицаю все обвинения, выдвинутые против меня. Мои действия ставили своей целью не измену, а освобождение, и не терроризм, а сопротивление. Противодействие несправедливому режиму - это благородное и справедливое дело.\n\n— Мои друзья, все те, кто ещё сражается, я призываю вас НЕ сдаваться. Может, сейчас и наступили тёмные времена, но гармония ещё не обречена. Не высовывайтесь и помогайте, где только можете. Революция в настоящее время невозможна, поэтому нам придётся творить добро незаметно.\n\nГолос Торакса надломился от боли. — Фаринкс, я знаю, что у нас сохраняются разногласия, но, пожалуйста, помни, что я всё ещё люблю тебя. Надеюсь, когда мы встретимся снова, то мы будем друзьями, а не врагами. Позаботься о себе.\n\n— Кризалис, — продолжил Торакс после короткой паузы, — я никогда не оставлю попыток победить тебя. Но если в твоём черном сердце осталась хоть капля заботы о своём народе, то ты не станешь тратить жизни чейнджлингов, только чтобы смыть кровью собственный позор в Кантерлоте. Пожалуйста, подумай о цене войны. И если ты продолжишь убивать и угнетать свой народ... тебя ждет та же участь, что и всех прочих тиранов.\n\n— Ульи чейнджлингов всё ещё могут освободиться. Не теряйте надежды! Гармония восторжествует!\n\nХотя цензура немедленно заработала, похоже, что эти новости всё же стали известны общественности. Сегодня правительство Кризалис стало посмешищем для всей страны... по крайней мере, за закрытыми дверями. Хотя никто не осмеливается говорить открыто о некомпетентности королевы и её сторонников, многие шутят за закрытыми дверями. Даже многие лоялисты посмеиваются над "ожившим предателем", а также ложью и некомпетентностью наших лидеров. Появилась новая популярная шутка. "Сколько королевских гвардейцев нужно, чтобы поймать одного предателя? Двое. Один, чтобы поймать предателя, а второй - чтобы притвориться им!"
changelings.67.a:0 "Проклятье."

changelings.68.t:0 "Проверка УОБВ"
changelings.68.d:0 "Капитан королевской гвардии Кардо вместе с Васпиром просматривал свои записи о недавней проверке УОБВ. Хотя королева Кризалис приказала ему самому изучить файлы УОБВ в поисках сторонников Торакса, он знал, что Васпир тут же узнает о его задумке. Вместо этого он сам обратился к Васпиру и предложил поработать вместе, зная, что он далеко не столь некомпетентен, как считала королева.\n\n— Всего четыре сторонника Торакса, — сказал Ласин, хмуро глядя на лежащие перед ним записи. — Удивительно, что их было так мало.\n\nВаспир в ответ лишь хитро улыбнулся, как будто знал все секреты о собеседнике. И даже парочку тех, про которые не ведал и сам Ласин. — Я удивлён, что их было так много, — сказал он, и у Ласина возникло подозрение, что в УОБВ нашлось гораздо больше четырёх таких чейнджлингов. — Хотя, наверное, это моё наказание за то, что я не занимаюсь проверками персонала лично. Этот инцидент больше не повторится.\n\n— Лучше бы ему не повторяться, — сказал Ласин, закрывая папку с записями и вставая. — В противном случае, я не думаю, что ты надолго останешься главой УОБВ.\n\n— Я буду беспокоиться о своей голове, а ты - о своей, — кивнул Васпир. — В конце концов, назвать кого-то сторонником Торакса в наши дни - это очень серьезное обвинение. Но я думаю, что мы оба прекрасно справимся с этим, если будем держаться поближе.\n\nХотя предупреждение Васпира заставило Ласина покрыться мурашками, он лишь коротко отсалютовал главе УОБВ. — Конечно. Я дам знать королеве, что обо всем позаботились."
changelings.68.a:0 "Кризалис будет очень рада это услышать."

changeling_diplo.1.t:0 "Чейнджлинги вторглись в земли Полярных Медведей"
changeling_diplo.1.d:0 "Слухи говорят о том, что чейнджлинги, после дипломатических угроз, напали на государство [PLB.GetName] после их отказа склониться перед королевой Кризалис. Медведи слабы и численно уступают чейнджлингам, так что они вряд ли выживут под натиском их военной машины. Похоже, что вскоре ульи покорят ещё одну нацию.\n\nНекоторые утверждают, что мы должны просто отступить, чтобы избежать конфронтации с королевой Кризалис, а вот другие настаивают на том, чтобы наше правительство заняло твёрдую позицию относительно конфликта и объявило об официальной поддержки одной из сторон."
changeling_diplo.1.a:0 "Выразите дипломатический протест."
changeling_diplo.1.b:0 "Выскажите наше одобрение."
changeling_diplo.1.c:0 "Сохраним нейтралитет."

changeling_diplo.2.t:0 "Государство [From.GetName] протестует против интервенции в государство [PLB.GetName]"
changeling_diplo.2.d:0 "Государство [From.GetName] выразило протест против нашей войны с медведями, назвав это "морально отвратительным" и "нарушением спокойствия в мире", требуя отозвать наши войска. Они явно проигнорировали наш законный повод к войне и предпочли встать на сторону преступного режима в государстве [PLB.GetName], ошибки и зло которого мы пытаемся исправить сами. Если им когда-нибудь понадобится поддержка, мы обязательно напомним им о том, как несправедливо они обошлись с нами сегодня.\n\nВозможно, в ближайшее время нам придётся разобраться с этой высокомерной нацией..."
changeling_diplo.2.a:0 "Они думают, мы будем их слушать, ХА!"

changeling_diplo.3.t:0 "Государство [From.GetName] одобряет интервенцию против государства [PLB.GetName]"
changeling_diplo.3.d:0 "Государство [From.GetName] официально одобрило нашу войну с медведями. Хотя мы не уверены, почему они это сделали, факт остается фактом. Это позволит придать одобрения нашим действиям на мировой арене. Так что никто не сможет сказать, что мы начали эту войну не имея причин."
changeling_diplo.3.a:0 "Всему есть своё объяснение."

CHN_disapproves_actions:0 "Не одобряет действия"
CHN_approves_actions:0 "Одобряет действия"

changeling_diplo.4.t:0 "Чейнджлинги вторгаются в Олению"
changeling_diplo.4.d:0 "До нас дошли сведения, что чейнджлинги официально объявили войну Олении. После долгих месяцев наращивания силы чейнджлингов и вступили в бой с войсками Олении. Поступают сообщения о многочисленных жертвах, и похоже, что ситуация в Олении вот-вот превратится в настоящую кровавую бойню. Хотя мы не до конца уверены в причинах конфликта, одно можно сказать точно: Оления находится в тяжелом положении.\n\nЛюбые предложения о дипломатическом посредничестве со стороны третьей стороны были грубо отвергнуты королевой Кризалис. Она говорит, что это вопрос касается лишь Олении и Земель Чейнджлингов, и что он скоро будет разрешен. И вмешательство других стран, таким образом, не является необходимым.\n\nМы не смогли остановить начало войны, и теперь нам нужно решить, что делать дальше. Мы могли бы либо выступить с официальным протестом, осуждающим любую из сторон за развязывание военных действий, либо просто промолчать и остаться в стороне. Ведь как только чейнджлинги закончат с Оленией, они демобилизуют свою армию и останутся довольны своими имеющимися завоеваниями."
changeling_diplo.4.a:0 "Выразите дипломатический протест."
changeling_diplo.4.b:0 "Выскажите наше одобрение."
changeling_diplo.4.c:0 "Сохраним нейтралитет."

changeling_diplo.5.t:0 "Государство [From.GetName] протестует против интервенции в государство [OLE.GetName]"
changeling_diplo.5.d:0 "Государство [From.Getname] выразило дипломатический протест против нашей интервенции в Олению, обвиняя нас в агрессии против слабых соседей, а также называя нас 'угрозой стабильности и покою этого мира'. Очевидно, они упустили из виду веские причины для нашего вторжения. Ведь всем известно, что Оления отказалась урегулировать спор дипломатическим путем. Однако одно можно сказать наверняка: Ульи Чейнджлингов больше не будут подвергаться издевательствам или неуважению за дипломатическим столом со стороны высокомерных оленей!\n\nКоролева Кризалис лично приказала уничтожить это дипломатическое послание и подтвердила свои приказы о продолжении вторжении. Теперь пути назад уже не будет. Оления должна быть уничтожена, а мнение остального мира не имеет значения."
changeling_diplo.5.a:0 "Да, да, конечно, продолжайте!"

changeling_diplo.6.t:0 "[From.GetName] одобряет интервенцию против [OLE.GetName]"
changeling_diplo.6.d:0 "Государство [From.Getname] прислало официальное одобрение наших действий, отметив, между прочим, что 'слабые должны преклониться перед сильными'. Какими бы ни были их намерения, они явно хотят улучшить отношения с нами. Возможно, они не хотят стать нашими следующими жертвами; в конце концов, выражение "слабый должен подчиниться сильным" можно применить как к ним, так и к оленям."
changeling_diplo.6.a:0 "Всему есть своё объяснение."

