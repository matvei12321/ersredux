CHN_equestria_chaos3:0 "Anti-changeling insurgency: Complete chaos!"
CHN_equestria_chaos3_desc:0 "Valor and weapons may have crushed the pony armies, but this did not convince the civilian population to stop and stop their resistance. Only a very stupid changeling would think that a conquered Equestria would not resist, but the current situation is becoming completely unbearable in the long run. Not a day goes by without reports of soldiers disappearing, railroad sabotage, or civil disobedience. The Changeling administration may have to spend more effort on holding Equestria than on the Great War itself."
CHN_equestria_chaos2:0 "Anti-changeling insurgency: Mass riots!"
CHN_equestria_chaos2_desc:0 "There are few reasons for ponies to love their Changeling masters, but our efforts to suppress their rebellious nature are gradually paying off. As the standard of living gradually improves and the rewards of submission become more enticing than the harsh life of a rebel, the Changelings still have a chance to eventually pacify the vast expanses of Equestria. However, the resistance is still active in areas where there are almost no our patrols, and the leaders of the resistance are still at large."
CHN_equestria_chaos1:0 "Anti-changeling insurgency: §R Sporadic riots§!"
CHN_equestria_chaos1_desc:0 "\n Despite the ferocity of the resistance, the constant failures in their quest to win freedom caused many ponies to despair, who decided that there was no point in fighting an enemy who was always one step ahead of their plans. However, changelings should be vigilant for any signs of disobedience. The ponies will take any sign of our weakness as an opportunity to rebel once more."
CHN_equestria_lockdown:0 "The anti-changeling insurgency: §Restrained§!"
CHN_equestria_lockdown_desc:0 " They almost lost hope, having failed to do anything against the overwhelming might of the Changeling war machine. Now all settlements of any importance are under constant control. The foreign sponsors of the resistance have reduced their activity, so that only the most desperate and idealistic ponies join the rebels. [CHN.GetLeader] will forever be celebrated not only as the great conqueror of Equestria, but also as the destroyer of the pony spirit."
CHN_equestria_chaos3_compliance_cap_tt:0 "The maximum subordination of Equestrian regions under Changeling occupation will be limited to §Y40%§!."
CHN_equestria_chaos2_compliance_cap_tt:0"The maximum subordination of Equestrian regions under Changeling occupation will be limited to §Y60%§!."
CHN_equestria_chaos1_compliance_cap_tt:0 "\The maximum subordination of Equestrian regions under the occupation of changelings will be limited with a level of Y80%!."

