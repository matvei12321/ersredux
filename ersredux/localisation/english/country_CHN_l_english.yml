## Everfree Forest Events ##
changelings_paxchrysalia.400.t:0 "Анархия в Вечнодиком лесу"
changelings_paxchrysalia.400.d:0 "— Это было ужасно, генерал-майор! Я потерял шестнадцать своих солдат, прежде чем отдал приказ отступать. Шестнадцать! А врагом была лишь куча растений!\n\n— Полегче, гауптфельдфебель. Успокойтесь, — Генерал-майор Яхс приказал сержанту. — Иди прогуляйся, выпей воды и успокойся. Твой доклад окончен. — Он кивнул двум солдатам, стоявшим у двери, и те осторожно вывели контуженного сержанта из конференц-зала. Вздохнув, Яхс повернулся к другим офицерам, сидевшим вокруг него: оберстлейтенанту Алкиппе, его незаменимому правому копыту, генерал-лейтенанту Марсилио, главному хирургу армии, а также целому ряду местных командиров из центрального региона Эквестрии. — Отчёт гауптфельдфебеля не является единственным в своём роде, — сказал Яхс им, постукивая по простой папке, лежащей перед ним. — Я уверен, что многие из вас, чьи войска размещены в окрестностях Вечнодикого леса, докладывали о том же самом. Нападения пони-повстанцев, раскрашенных краской и шаманскими знаками, которые после нападений исчезают как тени. Тревожное увеличение числа случаев наблюдения монстров вокруг Вечнодикого леса - разведывательный самолет даже заметил гидру. — Взяв пачку фотографий, Яхс продолжил. — Кроме того, партизаны, совершавшие налёты, были вооружены неизвестным алхимическим оружием. — Он разложил фотографии на столе: на одной было изображено то, что когда-то было танком чейнджлингов, а теперь превратилось в искореженный кусок металла. На другой был изображен солдат-чейнджлинг, приплавившийся к борту сгоревшего грузовика. Хитин чейнджлинга превратился в сталь там, где его панцирь слился с водительской дверью. — Вдобавок ко всему этому, линия деревьев, похоже, продвигается вперёд с пугающей скоростью.\n\nОберстлейтенант Алкиппе кивнула и предоставил чуть больше подробностей. — Железные дороги вокруг леса повреждаются хищными лозами, и несколько наших разведывательных постов уже захвачены растительностью. Генерал-оберштабсарцт, вы видели нечто похожее прежде?\n\nМарсилио покачал головой. — Вечнодикий лес - это место, полное дикой, неукротимой магии, непроницаемой даже для величайших магов-пони и учёных, которые жили рядом с ним, — сказал главный хирург. — Мы сражаемся против магии, которой не понимаем. И я не уверен, что мы победим.\n\n— Мы постараемся, — решительно заявил Яхс. — Это единственное, что мы можем сделать."
changelings_paxchrysalia.400.a:0 "Сама магия и мать-природа восстают против современного мира."

changelings_paxchrysalia.401.t:0 "Покорения рая"
changelings_paxchrysalia.401.d:0 "Ваниш наблюдал, как оранжевые языки пламени прогрызались сквозь кости Вечнодикого леса, заставляя умирающие листья скручиваться от жара и превращая растительность в пепел. Безжалостное давление армии чейнджлингов поставило на колени Вечнодикий лес, а вместе с ним и последний безопасный оплот сопротивления. Когда он впервые убежал в лес, чтобы сражаться за Зекору, то думал, что неукротимый лес на окраине Понивилля защитит его от чего угодно. Теперь, когда воздух в лесу густел от дыма и пепла, а канонада выстрелов и залпы артиллерии отдавались эхом среди мертвых деревьев, он понял, что это конец. Чейнджлинги пришли, чтобы покончить с восстанием раз и навсегда.\n\nГероический лидер сопротивления с болью наблюдала за разрушением леса. Когда-то давно, в лучшие времена Зекора построила свой дом в уединенных глубинах этого леса. Теперь же её святилище - одно из последних мест в Эквестрии, где магия дикой природы по-прежнему оставалась неукротимой - превратилось в пепел, а вместе с ним и последние остатки свободной Эквестрии. Но Зекора всё равно оскалила зубы и потерла глаза, а затем повернулась лицом к собравшимся перед ней пони, не обращая внимания на слёзы, что текли по её лицу. Огонь позади освещал её, как ангела из самого Тартара, а налитые кровью глаза горели даже среди густеющего дыма.\n\n— Пони Эквестрии, это ещё не конец, — сказала Зекора, качая головой, — за наши действия даже судьба должна воздать должное. Наши земли и наша страна ещё не потеряны, ибо победа была куплена страшной ценой. Армии чейнджлингов бросили против нас стальных чудовищ, но даже сейчас мы отказываемся преклонить колени перед ними. Возможно Кризалис и была права в том, что было глупо сражаться...\n\nВсе присутствующие наблюдали, как Зекора подняла с земли винтовку и взмахнула ею в воздухе. Даже несмотря на то, что чейнджлинги отняли у неё её лесное убежище, смогли победить чудовищную фауну и флору, которые защищали лес и называли своим домом, у Зекоры всё ещё оставался один инструмент, которым, несмотря на его грубость, она могла сражаться. Пока у неё было оружие, Зекора была полна решимости биться до последнего. — Но даже если мы можем умереть, это не значит, что мы не попытаемся дать чейнджлингам отпор!\n\nЕё сторонники подняли своё оружие и издали боевой клич. Среди них был и Ваниш. Все они знали, что теперь сдаваться смысла не имеет. Чейнджлинги казнят их сразу же, как только партизаны попадут в их копыта. Единственное, что они могли сейчас сделать - это сражаться, даже если это будет последним, что они смогут сделать.\n\nНачалась последняя битва за Вечнодикий лес."
changelings_paxchrysalia.401.a:0 "Не отступать! Не сдаваться! За Эквестрию!"

changelings_paxchrysalia.8401.t:0 "Потерянный рай"
changelings_paxchrysalia.8401.d:0 "Финикус Весали прошел мимо тлеющих останков гигантского лиственного дерева, его кора почернела от огня и побелела от мха, который пировал жизненной силой древа, прежде чем угаснуть самому. Скрюченные и сломанные хищные лозы тянулись к небу, будто отчаянно надеясь, что оттуда спустится кто-то и спасёт их прежде, чем огнеметы и напалм превратят их в уголь. Скелет гидры лежал неподалеку, позвонки на одной её шее были раздавлены гусеницами танка. Чуть в стороне в братской могиле гнили тела пони и ужасное зловоние отравляло воздух.\n\nФиникус посмотрел вверх, где над головой пролетела ещё одна волна тяжёлых бомбардировщиков. Люки их бомбоотсеков были открыты и машины были готовы сбросить свой груз. День за днём, ночь за ночью бомбардировщики уничтожали и сжигали лес, работая вместе с таким количеством артиллерии, которое прежде никогда не работало по одной цели. А когда промышленник открывал рот и пробовал воздух на вкус, то чувствовал языком слабый металлический привкус. То были осадки от детонации магической ядерной бомбы, которые всё ещё парили в воздухе. В его ушах всё ещё слышался слабый звон, вызванным воздействием остаточной радиации.\n\nКаким-то образом армии удалось это. Вечнодикий лес, возможно, и мог быть источником дикой, неукротимой магии, но лес, как и пони, которых он пытался защитить, не смог справиться с мощью военной машины чейнджлингов. В конце концов, магия не могла противостоять современной армии. В столкновении магии и стали бесспорно победила сталь. Теперь от некогда внушавшего благоговейный трепет леса не останется ничего, кроме костей и пепла.\n\nКак жаль, что всё закончилось именно так. Кто знает, чему могли бы научиться ульи, получив возможность изучить дикую магию леса, а также его уникальную флору и фауну? Чего бы мог достигнуть вид чейнджлингов в новой эре с помощью этих знаний? Теперь это были вопросы без ответов.\n\nКогда ветер дул сквозь скелеты деревьев, их ветви гремели, как кости мертвецов, создавая жуткую какофонию, раздававшуюся над этой проклятой землёй.\n\nПора уходить отсюда."
changelings_paxchrysalia.8401.a:0 "Все наши победы оставляют за собой лишь смерть"

changelings_paxchrysalia.402.t:0 "Пожирающий лес"
changelings_paxchrysalia.402.d:0 "Генерал-майор Яхс стоял на балконе кантерлотского замка и смотрел, как по узким извилистым дорогам, ведущим в Кантерлот, один за другим проносятся фары грузовиков. Это была отступающая армия. Если бы он посмотрел чуть дальше на юго-запад, то увидел бы, как пожары в Вечнодиком лесу угасают с наступлением ночи, а оранжевые огоньки уступают место всепожирающей тьме вокруг них. Он уже отозвал бомбардировщики три часа назад, заметив, насколько тщетны были все дальнейшие попытки сдержать Вечнодикий лес. Он просто разросся и стал слишком мощным и большим. Столь сильным, что теперь армия уже не могла её остановить.\n\n— Генерал-майор? — Оберстлейтенант Алкиппе стояла у арочного проёма, ведущего обратно в замок, и на её морде было написано беспокойство. — Вы... в порядке?\n\n— Да, — ответил ей Яхс. — По крайней мере, на данный момент. Я не знаю, на кого наша королева возложит вину за то, что мы не смогли сдержать Вечнодикий лес, но вряд ли этот неудачник долго проживёт.\n\nАлкиппе озабоченно закусила губу. — Хорошо... не всё так плохо, у меня есть и хорошие новости, Яхс, — сказала она, медленно подходя ближе. — Наши разведчики говорят, что лес перестал расширяться. Его магической энергии, должно быть, не хватает, чтобы продолжать двигаться дальше.\n\n— А может быть, он просто удовлетворён своей победой, — сказал Яхс, качая головой. — Мы вытащили всех, кого смогли, и в ближайшие дни решим, куда их перебросить. Сердце Эквестрии теперь потеряно для нас навсегда. Это тревожный знак.\n\n— Яхс?\n\nЯхс вздохнул. — Оставьте меня, оберстлейтенант, — устало сказал он. — Со мной всё будет в порядке. Мне нужно время, чтобы подумать.\n\nАлкиппе склонила голову, её печальные глаза смотрели на генерала, которым она так восхищалась. Только вот сейчас он был совершенно побеждён поражением со стороны леса. — Генерал-майор... Яхс... если вам что-нибудь понадобится...\n\n— Я буду в порядке, — упорствовал на своём Яхс. Больше он ничего не мог ответить."
changelings_paxchrysalia.402.a:0 "Поражение - это горькая пилюля."

changelings_paxchrysalia.403.t:0 "Поезд в лесу"
changelings_paxchrysalia.403.d:0 "Оберпионьер Маурик как раз вовремя прикрыл уши. Через мгновение после этого огромный локомотив бросил вызов Вечнодикому лесу оглушительным ревом своего клаксона. Наступление бронепоезда казалось неумолимым, когда острие копья армии всё глубже и глубже проникало в лес. Под защитой целого полка сапёров, вооружённых огнемётами и бронированными бульдозерами, безжалостное продвижение поезда уничтожало на своём пути лес и чудовищ, которые называли его своим домом. Холодной эффективность этого продвижения была сравнима лишь с жестокостью военной полиции на борту поезда: с помощью хлыстов, дубинок и штыка они заставляли оборванную группу пони-путеукладчиков класть шпалы и рельсы на пути поезда до полного своего изнеможения. Морис уже прошёл мимо уже такого количества тел пони, что это зрелище перестало его волновать.\n\nЭто была нелёгкая задача для армии. Ну, точно, далеко не простая. Партизаны под защитой леса и рыскающих в нём чудовищ своими засадами и набегами заставляли чейнджлингов платить за каждый дюйм продвижения по лесу. И по мере того, как военный поезд и его окружение продвигались всё глубже в Вечнодикий лес, чейнджлинги всё дальше отдалялись от внешнего мира. Арьергард, оставленный для защиты проложенных рельсов, страдал не только от набегов партизан и монстров, но и от самого Вечнодикого леса - десятки раз сапёров отправляли обратно, чтобы восстановить путь, который захватили разросшиеся растения.\n\nНо толстая броня поезда и тяжелая артиллерия сдерживали натиск леса и его обитателей. И всё же продвижение было крайне медленным. Хищные лозы регулярно прорывались между шпалами, опутывая колеса поезда, пока их не сжигали огнемётами, а фоновая магия леса и удушающая влажность постоянно разъедали и разрушали тонкую электронику на борту поезда. Оказалось, что курьеры обеспечивают наилучшую связь, поскольку рации регулярно переставали работать всего через несколько часов после того, как их доставляли на поезд. Несмотря на всё это, движение поезда, каким бы медленным и мучительным оно ни было, не было остановлено.\n\nРазведчик свистнул, и солдаты вокруг поезда немедленно бросились к своим боевым постам, готовясь использовать орудия, установленные в вагонах поезда, против всего, что лес бросит против них на этот раз. Сам Маурик быстро поднялся в бронированную кабину поезда вместе с остальными сапёрами, надеясь убраться подальше от опасности. — Вступи в сапёрный корпус, говорили они, всё будет хорошо, — с горечью отметил про себя Маурик. — Это лучше, чем быть на передовой, говорили они."
changelings_paxchrysalia.403.a:0 "Когда я вербовался, никто не сказал, что мне придётся сражаться с волшебным лесом!"

changelings_paxchrysalia.404.t:0 "Курьеры"
changelings_paxchrysalia.404.d:0 "— Ты думаешь, что в армии тебя ждёт лишь слава, личинка? — Седой ветеран смотрит на тебя пустым взглядом, его глаза, казалось, запали глубоко в череп после бесчисленных ночей, когда он прижимал к ним копыта и кричал. Полдюжины пустых рюмок валяются на стойке перед ним, и это только те, которые бармен ещё не убрал. — Ты ничего не видел. Ты даже не знаешь, во что ввязываешься.\n\n— Армия - это лучший способ заработать себе имя, — протестуешь ты, пытаясь оправдаться перед пьяным ветеринаром, стоящим перед тобой. — Кроме того, война уже закончилась. Остались лишь партизаны в лесу. Как долго они смогут продержаться?\n\nБывший солдат бросается к тебе и внезапно сильные копыта ударяют тебя по плечам, прижимая к сиденью табурета. — Слушай, личинка, — рычит он. — Я тоже когда-то был таким же глупым, как и ты. Я получал медали в Великой войне. Я штурмовал дворец в Кантерлоте. Я был членом ягдкоманды-айнзатцгруппы. У меня было всё, что я хотел. Рабы, шекели, статус. Всё. — В его глазах промелькнуло что-то такое ... может быть, проблеск ностальгии по старым добрым временам? Но это исчезло через долю секунды. — А потом я записался в Фернспехер, потому что того, что у меня было, мне было недостаточно. И именно поэтому они послали меня прямо в центр Вечнодикого леса.""
changelings_paxchrysalia.404.a:0 "И... что произошло в Вечнодиком?"

changelings_paxchrysalia.8404.t:0 "Кошмарные ночи"
changelings_paxchrysalia.8404.d:0 "— Твои худшие кошмары оживают, — рычит бывший егерь. — Ты думаешь, что Вечнодикий лес - это просто волшебные растения и кучка культистов, которые нападают на тебя время от времени? Именно так я и думал вначале. И это ещё ничего. Ничего. Я мог бы справиться с этим, только вот дело было совсем в другом. К тому времени я слишком часто попадал в засады, чтобы это могло меня напугать. Нет, дело кое в чём совсем другом. До тебя добираются совсем другие вещи.\n\nВетеран на мгновение задерживает свой взгляд на пустой рюмке, стоящей перед ним, и делает знак бармену принести ещё одну. Он тут же появляется, и чейнджлинг, не теряя времени, засовывает рюмку себе в отверстие в копыте и одним глотком выпивает содержимое. Он кашляет, морщится, и прежде чем ты успеваешь спросить, всё ли с ним в порядке, он снова впивается в тебя своими затравленными глазами. — Это деревья, личинка. Они разговаривают с тобой. Они стонут и причитают, когда наступает ночь. У них тоже есть лица. Ночь полна шёпота и криков. Они пытаются заставить тебя что-то сделать, пытаются заставить тебя убивать своих друзей, вышибать себе мозги. Если ты ляжешь спать слишком близко к одному из них, то оно задушит тебя своими корнями, утащит в грязь без единого крика.\n\n— А ещё есть древесные волки. Просто волки, только сделанные из дерева, верно? Только вот дерево не чувствует боли, и оно не истекает кровью. Тебе нужны противотанковые патроны, чтобы убить одного. Пули тут бесполезны. И удачи тебе найти достаточно топлива для огнемета, когда ты находишься глубоко в лесу, далеко от остальной части твоего подразделения. Пожалуй, единственное, что меня поддерживало - это контрабанда, на которую я мог наложить свои копыта. Я усовершенствовал рецепт коктейля из стимуляторов и транквилизаторов, приготовленного из промышленной любви, просто чтобы поддерживать себя на копытах. Это сводило меня с ума, личинка. Клянусь, я десятки раз стрелял одной и той же пони в лицо, но никогда не мог убить её. Я до сих пор не знаю, была ли она настоящей или нет.\n\nОн грустно смотрит на тебя в последний раз. — Так что если ты сам хочешь пережить эти кошмары, то давай. Но если ты на это решишься... не слушай деревья. Не слушай эти проклятые деревья, личинка."
changelings_paxchrysalia.8404.a:0 "Потому что если ты это сделаешь, то не вернёшься из леса прежним."

changelings_paxchrysalia.405.t:0 "Брифинг по Вечнодикому лесу"
changelings_paxchrysalia.405.d:0 "Оберстлейтенант Алкиппе закрыла за собой дверь, заходя во временную оперативную базу генерал-оберстабсарцта Марсилио в Кантерлоте, пока армия работала над тем, чтобы сдержать стремительный рост Вечнодикого леса. Она увидела Марсилио, который сидел за своим столом, уткнувшись носом в какие-то отчёты, и стукнула копытами в знак приветствия и чтобы привлечь его внимание. — Генерал-оберстабсарцт, вы сказали, что у вас есть донесения для генерал-майора?\n\n— Да, сказал, — ответил Марсилио, заметив, что вошла лишь Алкиппе. — А где же он?\n\n— Ему очень нужно отдохнуть, — сказала Алкиппе, подавляя собственный зевок. — Я решила, что займусь некоторыми простыми вещами для него, пока он спит. Например, получу некоторые его отчёты.\n\n— Похоже, что тебе самой тоже нужно отдохнуть, Алкиппе, — сказал Марсилио. Когда Алкиппе отрицательно покачала головой, он отмахнулся и жестом указал на стул напротив себя. -Ну, моя команда добилась некоторого прогресса с тех пор, как мы в последний раз говорили на эту тему, — сказал он, когда Алкиппе села. - Короче говоря, при той скорости, с которой растет Вечнодикий лес, у нас есть, возможно, чуть меньше двух месяцев, чтобы сдержать его распространение, прежде чем положение армии в центральной Эквестрии станет очень плохим. Нам нужно что-то сделать до этого момента, чтобы сдержать лес."
changelings_paxchrysalia.405.a:0 "А если не сокращать рассказ?"

changelings_paxchrysalia.8405.t:0 "60 дней до полуночи"
changelings_paxchrysalia.8405.d:0 "— Лес растет во все стороны с постоянной скоростью, — объяснил Марсилио. Он положил перед Алкиппе карту, на которой были обозначены границы Вечнодикого леса, а затем множество расширяющихся кольца, расходящихся от леса. — Хищные лозы — вот первый признак вторжения. Эти лозы разрывают дороги, разрушают мосты и целиком поглощают города. Затем появляются деревья, за ними следуют монстры и, конечно же, сами партизаны. Более того, лес усиливает свой внутренний рост. Солдаты и разведывательные отряды, которые мы посылаем в лес, несут большие потери, а многие просто пропадают без вести в течение нескольких следующих дней. Участки леса, которые вырубает армия, почти полностью зарастают на следующий день. Нам нужно прилагать очень много постоянных усилий лишь для того, чтобы сдерживать лес и не терять свой прогресс. Чем больше ресурсов мы выделяем на обуздание леса, тем больше мы добиваемся успехов. Но при этом мы теряем персонал и оборудование с ошеломляющей скоростью. Мы не сможем долго продержаться в том же духе.\n\n— Итак, — сказала Алкиппе, глядя на карту между ними. — И каков же тогда вывод? Что мне сказать Яхсу, когда он проснётся?\n\n— Скажи ему, что по моим расчетам у нас есть около двух месяцев, чтобы сдержать лес, — сказал Марсилио. — Если лес полностью захватит соседние регионы, то он станет слишком большим и плотным, чтобы мы могли надеяться предпринять какие-либо усилия по обращению вспять его экспансии. Нам придётся отступить и окопаться по новому периметру, просто чтобы убедиться, что он не захватит всю Эквестрию. Прямо сейчас присутствие армии по краю замедляет рост леса, но скоро мы не сможем остановить этот рост."
changelings_paxchrysalia.8405.a:0 "Что-то нужно сделать, и быстро."

changelings_paxchrysalia.406.t:0 "Засеивание леса"
changelings_paxchrysalia.406.d:0 "Финикус Весали ворвался в кабинет генерал-майора Яхса. — Генерал-майор, вы совершаете огромную ошибку! — Прокричал Финикус, подбегая к столу Яхса и бросая несколько папок на те бумаги, которые генерал-майор читал до прибытия своего гостя. — Огромную ошибку, которая погубит нас обоих!\n\n— Что ты здесь делаешь, Финикус? — Рявкнула Алкиппе, делая шаг вперед, чтобы перехватить промышленника. — Ты не договаривался о встрече с генерал-майором!\n\n— Нет, потому что время крайне очень важно! — Финикус постучал по папкам, которые бросил на стол Яхса. — Я слышал, что армия планирует использовать объект "Омега" в качестве дефолианта, чтобы остановить рост Вечнодикого леса. Ты ведь планируешь сбрасывать споры с низколетящих кукурузников, верно? После чего они превратятся в мох, который начинает паразитировать на всех органических веществах, к которым он прикасается. Он питается и размножается на своём хозяине, пока не убивает его и себя в течение нескольких часов. Гениальный подход к решению неортодоксальной проблемы, верно?\n\n— Да, — сказал Яхс, прищуривая глаза. — И где же мы совершаем огромную ошибку? Мы принимаем надлежащие меры предосторожности, а землю вокруг леса мы подожжём и расчистим, чтобы мох не рос там, где его не должно быть...\n\n— Но ты же покупаешь самое слабое средство! — Воскликнул Финикус. - Компания, которая поставляет вам споры, принадлежит одному из закадычных дружков Ласина. Капитан королевской гвардии обошёл всех остальных конкурентов нечестными методами, а предлагаемая им субстанция слаба и неэффективна. Мне ли это не знать, я сам тоже боролся за этот контракт.\n\n— Ладно, — Сказал Яхс, нахмурившись. — И ты хочешь, чтобы я воспользовался твоим...?\n\nФиникус выразительно кивнул. — Да, — сказал он. — Мой мох растёт быстрее, он более эффективен, и самое главное, он распространяется не так быстро. Это самая большая проблема штамма, который вы используете. Если его оставить без присмотра, то рост мха может выйти из-под контроля. Но если вы подпишете парочку бумаг и потянете за несколько ниточек, то сможете получить гораздо более качественную замену для вашего проекта..."
changelings_paxchrysalia.406.a:0 "Я всё же оставлю первый вариант штамма."
changelings_paxchrysalia.406.b:0 "Незаметно начните использовать лучший штамм."

changelings_paxchrysalia.407.t:0 "Последствия применение дефолианта"
changelings_paxchrysalia.407.d:0 "Стабсарзт Катидид повернула голову в сторону неба, услышав отдаленный гул винтов. Пока она смотрела, над Вечнодиким лесом пронеслась тройка модифицированных кукурузников. Из сопел под их крыльями вырывалось зелёное облако, которое оседало на лесной полог внизу. С того места, где она стояла, Катидид не могла видеть, куда выпадают споры, но ближе к своему посту в полевом госпитале армии она могла видеть белую, как кость, кору деревьев, где мох приземлился, попировал, а впоследствии вымер. Мало-помалу последний план армии по остановке продвижения леса стал казаться успешным. Их действия резко замедлили скорость продвижения леса к выложенному бетоном рву, который армия поспешно возвела вокруг леса.\n\nНо цена, которую требовал этот прогресс, быть ужасной. В больницу доставляли непрерывный поток пони и чейнджлингов, павших жертвой спор. Пони часто оказывались простыми гражданскими лицами, которые лишь оказались не в том месте и не в то время, а чейнджлинги - членами Фернспехера, действовавшего глубоко внутри Вечнодикого леса. Мох поражал не только растения. Он нападал на всё органическое, и как пони, так и чейнджлинги одинаково страдали, когда мох поражал их плоть. У большинства из них не было шансов выжить. Как только мох попадал в кровоток существа, их было уже не спасти, когда мох начинал пировать на их внутренних органах. Катидид могла лишь давать пациентам тройную дозу морфия, чтобы облегчить их боль. Это было крайне непросто, и её страхи лишь усилились, когда один из санитаров под её командованием заразился этими спорами.\n\nЕё краткий миг самоанализа закончился, так что Катидид вновь изобразила свою привычную бесстрастную маску стоицизма и вернулась к своей работе, когда шум самолетов стих вдали. Да, "Fall Grün" работал, но требовал ужасной платы за свой успех."
changelings_paxchrysalia.407.a:0 "Должен быть другой вариант, получше."

changelings_paxchrysalia.408.t:0 "Проект "Королевский колокол""
changelings_paxchrysalia.408.d:0 "РАПОРТ ОТ ОБЕРФИЗИКЕРА ДОКТОРА ФИЛИ ВЕРХОВНОМУ КОМАНДОВАНИЮ АРМИИ:\n\nТЕСТЫ КОРОЛЕВСКОГО КОЛОКОЛА ЗАВЕРШИЛИСЬ ОГРОМНЫМ УСПЕХОМ. УСТРОЙСТВО СПОСОБНО НЕЙТРАЛИЗОВАТЬ МАГИЧЕСКИЕ ЭНЕРГИИ В РАДИУСЕ 2 КИЛОМЕТРОВ. ДОПОЛНИТЕЛЬНОЕ КОБАЛЬТОВОЕ ДИСПЕРСНОЕ ПОКРЫТИЕ ПОЗВОЛИТ ПОДДЕРЖИВАТЬ АНТИТАУМАТИЧЕСКИЕ ЭФФЕКТЫ НА ВСЕЙ ПРИЛЕГАЮЩЕЙ ТЕРРИТОРИИ НА ПРОТЯЖЕНИИ ТЕЧЕНИЕ ПРИМЕРНО 24 МЕСЯЦЕВ. СЛЕДУЕТ ОЖИДАТЬ НЕОБРАТИМОГО ПОВРЕЖДЕНИЯ ОКРУЖАЮЩЕЙ ОРГАНИЧЕСКОЙ МАТЕРИИ. МОЩНОСТЬ ПРОГНОЗИРУЕМОЙ УДАРНОЙ ВОЛНЫ ПРИ ВЗРЫВА СОСТАВЛЯЕТ ПРИМЕРНО 70 КПА. СЛЕДУЕТ ОЖИДАТЬ СЕРЬЕЗНОГО И НЕПОПРАВИМОГО УЩЕРБА ОКРУЖАЮЩЕЙ МЕСТНОСТИ.\n\nКОРОЛЕВСКИЙ КОЛОКОЛ ГОТОВ К РАЗВЁРТЫВАНИЮ В 06-00 ЧАСОВ. ПЕРВОНАЧАЛЬНАЯ ЦЕЛЬ - ЗАМОК ДВУХ СЕСТЕР, РЕКОМЕНДОВАННЫЙ ИЗ-ЗА КОНЦЕНТРАЦИИ ПАРТИЗАН В ЭТОМ РЕГИОНЕ. ДИРЕКТИВА ОТ ВЕЛИКОЙ КОРОЛЕВЫ КРИЗАЛИС ТРЕБУЕТ, ЧТОБЫ ДЕТОНАЦИЯ БЫЛА ПРОВЕДЕНА НАД ГУСТЫМ ЛЕСНЫМ МАССИВОМ В ПЯТНАДЦАТИ КИЛОМЕТРАХ К ЮГО-ЗАПАДУ ДЛЯ СОХРАНЕНИЯ ЭТОЙ СТРУКТУРЫ, СОГЛАСНО ДИРЕКТИВЕ 15-0A1L, ДЕТАЛИЗИРУЮЩЕЙ РЕКОНСТРУКЦИЮ СТРУКТУРЫ В ПОСЛЕВОЕННЫЙ МУЗЕЙ. ЭФФЕКТ КОРОЛЕВСКОГО КОЛОКОЛА, ВЕРОЯТНО, БУДЕТ СНИЖЕН НА 63%. ЗАПРАШИВАЮ НЕМЕДЛЕННОЕ ПОДТВЕРЖДЕНИЕ ДАННОГО КУРСА ДЕЙСТВИЙ СО СТОРОНЫ ВЕРХОВНОГО КОМАНДОВАНИЯ АРМИИ."
changelings_paxchrysalia.408.a:0 "Ударьте по замку двух сестёр."
changelings_paxchrysalia.408.b:0 "Ударьте по скорректированным координатам."

changelings_paxchrysalia.409.t:0 "Ядерный удар по Вечнодикому лесу"
changelings_paxchrysalia.409.d:0 "[This.GetNewspaperHeader]Сегодня стало известно, что Гегемония чейнджлингов взорвала таумато-ядерное устройство в эпицентре печально известного Вечнодикого леса, расположенного в центральной части Эквуса. Это, по-видимому, не было испытанием, поскольку выбранное место затруднило бы проведение наблюдений. Скорее всего, это был военный ответ мятежникам из Вечнодикого леса. Другие источники заявляют, что взрыв был задуман как особенно экстравагантное средство дефолиации для борьбы со сверхъестественным и экспоненциальным увеличением роста Вечнодикого леса, который угрожает поглотить владения королевского армии чейнджлингов в этом регионе. Хотя Великая война закончилась, саму Эквестрию умиротворить не удалось. А это недавнее событие является доказательством решимости Гегемонии (или же её отчаяния) сохранить свою власть над Эквусом."
changelings_paxchrysalia.409.a:0 "Подвергнуть ядерной бомбардировке кучу растений? Какой абсурд!"

changelings_paxchrysalia.410.t:0 "Пункт об отказе от конкуренции"
changelings_paxchrysalia.410.d:0 "— Что всё это значит? — Спросил генерал-майор Яхс, протягивая через стол лист бумаги Финикусу Весали. Он нахмурился, когда промышленник взял его между копыт и внимательно прочитал. — Я изо всех сил стараюсь остановить распространение Вечнодикого леса, но мне кажется, что каждый чейнджлинг в гегемонии пытается указывать мне, как это делать.\n\nФиникус закатил глаза и передал письмо обратно Яхсу. — Мои коллеги пронюхали о вашем новом плане относительно Вечнодикого леса. Бомбить этот лес напалмом каждый час каждый день на протяжении двух недель подряд?\n\n— В самой простой интерпретации - да, — сказал Яхс. — Высокоточные бомбардировки в течение первой недели создадут огненный периметр, который, питаемый рециркуляционным струйным потоком, созданным с помощью манипуляций с погодой, станет самоподдерживающимся. А потом последует бомбардировка для насыщения, которая создаст огненный шторм, пока всё не превратится в угли и пепел. Но в этом письме, подписанном всеми твоими друзьями, мне приказано сократить свои бомбардировки.\n\nФиникус быстро вытащил из портфеля пачку бумаг. — Вы должны знать о звёздных пауках. Я слышал, что на них приходится целых два процента потерь наших солдат в Вечнодиком лесу. — Видя, что генерал-майор нахмурился ещё сильнее, Финикус продолжал настаивать на своём. — Я не ожидаю, что вы в курсе того, насколько ценным активом они станут для будущих научных разработок. Точнее, их шёлк. Я слышал, что даже новые модели наших пантер с трудом выпутываются из их паутины. — Ближе к делу, — отрезал Яхс.\n\n— Я хочу сказать, что Вечнодикий лес потенциально является самым значительным источником всё ещё неразработанных природных ресурсов во всём Эквусе. Шёлк звездного паука - лишь вершина сокровищ Вечнодикого леса. А теперь ты говоришь, что хочешь превратить весь этот потенциал в пепел и прах.\n\n— Отчаянные времена требуют отчаянных мер, — почти прорычал Яхс. — Моя работа состоит в том, чтобы не дать Вечнодикому лесу - позволь мне напомнить тебе, что мы здесь говорим о том самом проклятом богами Вечнодиком лесе — захватить всю центральную Эквестрию, а ты лишь говоришь о том, что потеряешь немного прибыли."
changelings_paxchrysalia.410.a:0 "Армия должна остановить Вечнодикий лес любыми необходимыми средствами."
changelings_paxchrysalia.410.b:0 "Мы не можем пожертвовать потенциальными инновациями и прогрессом."

changelings_paxchrysalia.411.t:0 "Как можно спать на горящих кроватях?"
changelings_paxchrysalia.411.d:0 "Роузлак спрятала голову под подушку, когда гудение двигателей бомбардировщиков возобновилось почти ровно через час. Было четыре часа утра, и каждый час в течение последних нескольких дней над Понивиллем пролетало очередное крыло бомбардировщиков чейнджлингов, направлявшихся к Вечнодикому лесу. Каждый раз, когда она слышала этот гул, её сердце подскакивало к горлу из-за возвращающихся травмирующих воспоминаниях о бомбардировщиках, разрушающих её город во время Великой войны. Ну, хотя бы она начала привыкать к такой регулярности бомбёжек...\n\nНо это совсем не помогало Роузлак, когда она пыталась заснуть. Она высунула голову из-под подушки и сердито посмотрела на задернутые плотные шторы в углу своей комнаты. Огненная буря, бушевавшая в самом сердце Вечнодикого леса, была так велика, что её апокалиптическое пламя освещало сам Понивилль окрашивая её комнату в янтарные тона, несмотря на то, что Роузлак сделала всё возможное, чтобы покрыть штору чёрной краской, чтобы не дать любому свету проникнуть внутрь. Она знала, что завтра утром ей придётся часами разгребать пепел с дорожки, а потом снова делать это перед тем, как лечь спать. Из-за работы, недосыпа и удушливой оранжевой дымки, окутавшей Понивилль, Роузлак почти серьёзно желала, чтобы один из этих бомбардировщиков сбросил свой груз на её дом и избавил её от страданий.\n\nПочти."
changelings_paxchrysalia.411.a:0 "Сколько ещё это будет продолжаться?"

changelings_paxchrysalia.412.t:0 "Что скрывается в глубинах леса"
changelings_paxchrysalia.412.d:0 "Гауптфельдфебель Вексель положил свою винтовку между двумя камнями на краю окопа и прицелился в цель - единорога, разукрашенную зелёной краской, пока та бежала с одной стороны улицы на другую. Прежде чем она успела спрятаться, Вексель выстрелил из своего оружия, пуля пронзила шею пони и оставила её умирать в собственной крови на земле. Ответный огонь остальных партизан, находившихся чуть дальше по улице, ударил по его позиции, и сержант скользнул глубже в свой окоп.\n\nРядом с ним стояла оберлейтенант Цисифус, чья офицерская фуражка была потеряна где-то в боях вокруг Понивилля. Она прижимала к голове гарнитуру радиоприемника, и на её клыках отражались оранжевые огни, горевшие вокруг города, пока оберлейтенант кричала в микрофон. — Что значит - нет никакой артиллерии?! Ты же должен был держать хищные лозы подальше от пушек! Вот для чего нужны были бетонные огневые точки!\n\nПо городу пронесся рёв, и грязь посыпалась в окоп, когда его перепрыгнула Малая Медведица. Её сияющие когти легко расплющили вездеход, который обеспечивал Векселю и оберлейтенанту огневую поддержку. Земля задрожала под копытами, когда Малая Медведица продолжала неистовствовать. Солдаты-чейнджлинги побежали вниз по улице в паническом бегстве, и Вексель понял, что их ряды рассыпаются и скоро их сокрушат. Стиснув зубы, Вексель подбежал к Цисифус и схватил её за плечо. — Оберлейтенант, нам нужно отступать! Наши ряды дрогнули, и если мы не передислоцируемся...\n\n— Я не сдам Понивилль кучке растений! — Крикнула в ответ Цисифус. — Я не хочу, чтобы меня запомнили как офицера, потерявшего Понивилль! Я не сдамся этому лесу! Я буду сражаться до победного конца, если придётся! Всё, что нам нужно сделать, так это продержаться, пока не прибудут бомбардиро...\n\nОна так и не успела договорить. Вокруг оберстлейтенанта внезапно взорвалась земля, отбросив Векселя назад. Сержант упал в дальнем конце окопа и увидел, как там, где мгновение назад стояла оберлейтенант, в небо подобно гейзеру извергается сверкающая пурпурная труба, превышающая по толщине ствол дерева. Эта штука была увенчана змееподобной головой, которая раскрылась, как распустившийся цветок, явив свету тройку лепестков, усеянных узкими глазами глаз. Глаза на лепестках всё ещё взмывающего ввысь тацлвурма смотрели вниз на убегающих солдат с жестокой злобой. Тварь издала жуткий визг, набрасываясь на строй истребителей люфтваффе, круживших над городом. Она поймала своими хлыстоподобными языками тройку машин и обрушила их на крыши домов мощным движением своего тела. От лейтенанта не осталось ничего, кроме её рации.\n\nПосле ужасной кончины своего командира остатки армии в Понивилле вскоре начали беспорядочно отступать, преследуемые партизанами Вечнодикого леса и их чудовищными союзниками."
changelings_paxchrysalia.412.a:0 "Отступаем! Отступаем!"

changelings_paxchrysalia.413.t:0 "Анализ поражения"
changelings_paxchrysalia.413.d_1:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Анти-тауматическое ядерное устройство было использовано соответствующим образом, — заявил Марсилио. — Центральный хаб сопротивления и сам Вечнодикий лес получили колоссальные повреждения. Тут всё было в порядке.\n\n— Мы пытались сжечь весь лес дотла, несмотря на желание друзей Финикуса, — заявила Алкиппе. — Мы не пытались сдерживаться в тщетной надежде, что сможем позже выгодно использовать этот лес.\n\n— Мы использовали не тот тип мха, — сказал Финикус. — Он был абсолютно неэффективен в сдерживании роста леса. Нам следовало бы воспользоваться моим штаммом.\n\nЯхс покачал головой. — Мы скомпрометировали нашу стратегию, стараясь угодить королевской гвардии, — заключил он. — Вот почему мы потерпели неудачу. Использование штамма Финикуса было бы намного эффективнее для сдерживания роста леса, но королевская гвардия хотела заработать денег на своём образце. Я надеюсь, что они довольны полученной прибылью, которая для них, по-видимому, оказалась важнее эффективности." ## A = fail because of the MILITARY-INDUSTRIAL COMPLEX ##
changelings_paxchrysalia.413.d_2:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Мы пытались сжечь весь лес дотла, несмотря на желание друзей Финикуса, — заявила Алкиппе. — Мы не пытались сдерживаться в тщетной надежде, что сможем позже выгодно использовать этот лес.\n\n— Мы использовали правильный штамм мха, — сказал Финикус. — Мой штамм мха, заметьте. Он исключительно хорошо замедлял скорость роста леса.\n\n— Цель, которую мы выбрали для детонации анти-тауматического ядерного устройства, была неправильной, — заявил генерал-оберштабсарцт Марсилио. — Вместо того, чтобы ударить по центру сопротивления, мы нацелились на случайный участок леса, дабы спасти Замок Двух Сестёр.\n\n— Так значит во всём виновато эго королевы, — Заключил Яхс. — Она хотела превратить замок в ещё один военный трофей, и поэтому мы выбрали не ту цель, чтобы успокоить её. Мы не задели центральный хаб сопротивления, чем позволили им продолжать распространять магию и продолжать свои атаки, что в конечном итоге привело к тому, что рост леса вышел из-под контроля." ## B = fail because of CHRYSALIS'S EGO ##
changelings_paxchrysalia.413.d_3:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Мы использовали правильный штамм мха, — сказал Финикус. — Мой штамм мха, заметьте. Он исключительно хорошо замедлял скорость роста леса.\n\n— Анти-тауматическое ядерное устройство было использовано соответствующим образом, — заявил Марсилио. — Центральный хаб сопротивления и сам Вечнодикий лес получили колоссальные повреждения. Тут всё было в порядке.\n\n— Мы пошли на компромисс относительно бомбардировок леса, чтобы успокоить капиталистов, — сказала Алкиппе, многозначительно взглянув на Финикуса. — Мы пытались ограничивать ущерб от бомбёжек, чтобы они могли получить свою прибыль.\n\n— Ограничение урона лесу повредило нам в долгосрочной перспективе, — заключил Яхс. — У нас было все необходимое, чтобы уничтожить лес, но мы не смогли нанести решительный удар, потому что хотели оставить от него что-то. — Он вздохнул. — Ну, я надеюсь, что промышленники теперь готовы финансировать свои собственные экспедиции в Вечнодикий лес, потому что их желанные сокровища всё ещё находится в лесу. Только вот армия больше не будет тратить ресурсы и жизни чейнджлингов, пытаясь отбить его обратно." ## C = fail because of EXTRACTIVIST COLONIALISM ## 
changelings_paxchrysalia.413.d_4:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Мы пытались сжечь весь лес дотла, несмотря на желание друзей Финикуса, — заявила Алкиппе. — Мы не пытались сдерживаться в тщетной надежде, что сможем позже выгодно использовать этот лес.\n\n— Мы использовали не тот тип мха, — сказал Финикус. — Он был абсолютно неэффективен в сдерживании роста леса. Нам следовало бы воспользоваться моим штаммом.\n\n— Цель, которую мы выбрали для детонации анти-тауматического ядерного устройства, была неправильной, — заявил генерал-оберштабсарцт Марсилио. — Вместо того, чтобы ударить по центру сопротивления, мы нацелились на случайный участок леса, дабы спасти Замок Двух Сестёр.\n\n— Значит, это была комбинация этих двух ошибок, - сделал заключение Яхс. — Неправильный мох не смог замедлить рост Вечнодикого леса, а выбор не той цели для ядерной атаки не смог нанести партизанам и их магии достаточный ущерб. Мы могли бомбить лес сколько угодно, но мы лишь убивали старые деревья, которые быстро заменялись новыми. Один только огонь не мог победить в этой битве, ведь мы ничего не делали, чтобы остановить магию, питающую рост этого леса."
changelings_paxchrysalia.413.d_5:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Анти-тауматическое ядерное устройство было использовано соответствующим образом, — заявил Марсилио. — Центральный хаб сопротивления и сам Вечнодикий лес получили колоссальные повреждения. Тут всё было в порядке.\n\n— Мы использовали не тот тип мха, — сказал Финикус. — Он был абсолютно неэффективен в сдерживании роста леса. Нам следовало бы воспользоваться моим штаммом.\n\n— Мы пошли на компромисс относительно бомбардировок леса, чтобы успокоить капиталистов, — сказала Алкиппе, многозначительно взглянув на Финикуса. — Мы пытались ограничивать ущерб от бомбёжек, чтобы они могли получить свою прибыль.\n\n— Значит, это была комбинация этих двух ошибок, - сделал заключение Яхс. — Неправильный мох не смог замедлить рост Вечнодикого леса, а мы, пойдя на компромисс с промышленниками, не смогли эффективно уничтожать уже растущие деревья. Это сделало нанесение ядерных ударов по сердцу Вечнодикого леса совершенно бесполезным. Мы приостановили магический рост с помощью этой бомбы, но из-за неэффективности остальных наших действий лес смог залечить этот шрам и продолжить расти. Мы не смогли развить наше преимущество, и это сделало анти-тауматическую бомбу совершенно бесполезной."
changelings_paxchrysalia.413.d_6:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Мы использовали правильный штамм мха, — сказал Финикус. — Мой штамм мха, заметьте. Он исключительно хорошо замедлял скорость роста леса.\n\n— Цель, которую мы выбрали для детонации анти-тауматического ядерного устройства, была неправильной, — заявил генерал-оберштабсарцт Марсилио. — Вместо того, чтобы ударить по центру сопротивления, мы нацелились на случайный участок леса, дабы спасти Замок Двух Сестёр.\n\n— Мы пошли на компромисс относительно бомбардировок леса, чтобы успокоить капиталистов, — сказала Алкиппе, многозначительно взглянув на Финикуса. — Мы пытались ограничивать ущерб от бомбёжек, чтобы они могли получить свою прибыль.\n\n— Значит, это была комбинация этих двух ошибок, - сделал заключение Яхс. — Мох смог замедлить скорость роста леса, но мы не смогли нанести ему достаточный ущерб, чтобы значительно помешать росту. Мы старались смягчить ущерб от огня, что оставляло довольно большие участки деревьев, способных расти. А так как мы не уничтожили место, где концентрация партизан и их магии была максимальной, лес смог адаптироваться к мху. Его иммунная система уничтожила наш мох как микроба. — Яхс вздохнул. — Лес стал сильнее, чем когда-либо прежде, и больше мох никогда на него не подействует. Мы не нанесли достаточно урона, пока лес был слаб, а теперь вообще ничего не можем сделать."
changelings_paxchrysalia.413.d_7:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Мы использовали не тот тип мха, — сказал Финикус. — Он был абсолютно неэффективен в сдерживании роста леса. Нам следовало бы воспользоваться моим штаммом.\n\n— Цель, которую мы выбрали для детонации анти-тауматического ядерного устройства, была неправильной, — заявил генерал-оберштабсарцт Марсилио. — Вместо того, чтобы ударить по центру сопротивления, мы нацелились на случайный участок леса, дабы спасти Замок Двух Сестёр.\n\n— Мы пошли на компромисс относительно бомбардировок леса, чтобы успокоить капиталистов, — сказала Алкиппе, многозначительно взглянув на Финикуса. — Мы пытались ограничивать ущерб от бомбёжек, чтобы они могли получить свою прибыль.\n\nЯхс нахмурился, услышав весь список совершённых ими неудач. — У нас с самого начала был чёткий план, — начал он, — и мы шли на компромисс в каждом пункте. Мы использовали самый слабый штамм мха. Мы атаковали не то место в Вечнодиком лесу. А затем, в довершение всего, мы почти не усиливали наши атаки на этот практически не ослабленный лес. — Он вздохнул и откинулся на спинку стула, потирая глаза. — Мы нерешительно атаковали Вечнодикий лес, а он лишь смеялся над нашими попытками. Честно говоря мы заслужили оказаться по уши в текущих проблемах. Мы заслужили это и многое другое."
changelings_paxchrysalia.413.d_8:0 "Генерал-майор Яхс оглядел собравшихся перед ним чейнджлингов, его доверенных советников по борьбе с кризисом Вечнодикого леса. Все знали, что стратегия, на которую они сделали свою ставку, провалилась. Теперь им оставалось лишь понять, почему это произошло. Стоит надеяться, что благодаря в будущем они смогут извлечь пользу из своих ошибок.\n\n— Ладно, — начал Яхс. Он перевёл взгляд с оберстлейтенанта Алкиппе на генерал-оберстабсарцта Марсилио и, наконец, на промышленника Финикуса Весали. — Что же случилось? Что мы должны сказать Кризалис?\n\n— Я не знаю, как объяснить ей это, - пожала плечами Алкиппе. — Мы не выполнили все этапы нашего плана. То ли потому, что у нас закончилось время, то ли из-за недостатка нужных ресурсов, но мы попросту не смогли остановить Вечнодикий лес, даже если и начали двигаться в верном направлении.\n\nЯхс вздохнул и откинулся на спинку стула, покачав головой. — Мы нерешительно атаковали Вечнодикий лес, а он лишь смеялся над нашими попытками. Честно говоря мы заслужили оказаться по уши в текущих проблемах. Мы заслужили это и многое другое."
changelings_paxchrysalia.413.a:0 "Нам стоило придерживаться первоначальной стратегии."

changelings_paxchrysalia.414.t:0 "Злая ведьма Вечнодикого леса"
changelings_paxchrysalia.414.d:0 "Генерал-майор Яхс, капитан Ласин Кардо и директор УОБВ Васпир Орн Кладисиум низко поклонились королеве Кризалис, когда та вошла в зал заседаний кантерлотского замка. Кризалис не обратила на них никакого внимания, она сразу же подошла к столу и поставила копыта на его край, широко улыбаясь при этом. — Вечнодикого леса больше нет, — гордо провозгласила она. — Этот проклятый лес превратился лишь в обугленные палки и обгоревшие камни. Отличная работа, генерал-майор. Я всегда знала, что могу на тебя рассчитывать.\n\nЯхс смиренно опустил голову. — Благодарю вас, моя королева.\n\n— Ну а теперь, — начала Кризалис, — что насчёт самой ведьмы? Той зебры, что доставляла нам столько проблем?\n\n— Мои лучшие и храбрейшие шпионы уверены, что зебра, известная как Зекора, всё ещё жива и находится где в пределах Вечнодикого леса, — сказал Васпир, поджигая сигарету и беря её в рот. — Её партизанское движение полностью уничтожено, но у зебры всё ещё сохранилась разношерстная группа выживших. Там уже почти не осталось лесов, в которых она могла бы спрятаться. Рано или поздно её время придёт.\n\n— Так давайте же выкурим её оттуда! — Воскликнул Ласин. — Теперь у нас есть шанс нанести смертельный удар этой глупой ведьме. Теперь, когда лес больше не представляет угрозы, как долго она сможет прятаться там?\n\n— Я мобилизовал специальную оперативную группу, которая прочешет Вечнодикий лес с земли и воздуха, — сказал Яхс, двигая папку в центр стола. — Нам нужен лишь ваш приказ, моя королева, и мы начнём.\n\nКризалис на мгновение задумалась, а потом улыбнулась ещё шире. — Я должна лично поохотиться на зебру, — заявила она. — Лишь величайшая из королев чейнджлингов могла бы получить в качестве трофея голову зебры, которая причинила нам столько хлопот!\n\nТрое одновременно обменялись озабоченными взглядами. — Э... прошу прощения, моя королева, — сказал Васпир. — Но лес слишком опасен для вас, даже в его ослабленном состоянии. Я уверен, что оперативная группа сможет и сама справиться. Если с вами что-нибудь случится..."
changelings_paxchrysalia.414.a:0 "Чепуха! Я великая королева чейнджлингов! И я ничего не боюсь!"
changelings_paxchrysalia.414.b:0 "С другой стороны, возможно, ты и прав..."

changelings_paxchrysalia.415.t:0 "Неурядицы при охоте на ведьму"
changelings_paxchrysalia.415.d:0 "Глубоко в лесу охотники тряслись от страха. Они разбили свой лагерь там, где от леса не осталось ничего, кроме сажи и пепла, и сгрудились вокруг незажжённых костров. Костры же было нечем разжечь из-за отсутствия листвы, которая могла бы послужить топливом. Чейнджлинги рассказывали друг другу истории о чудовищах, которые всё ещё скрывались в темноте.\n\nНесмотря на свой страх перед лесом, солдаты Фернспехера гордились своей службой, ибо только лучшие из лучших чейнджлингов могли углубиться в Вечнодикий лес и вернуться обратно. Они отбились от медвежуков и параспрайтов, выдержали атаки лесных партизан, но даже в выжженном и мёртвом Вечнодиком лесу его самая печально известная обитательница по-прежнему оставалась непокорённой и свободной.\n\nВедьма Зекора шла в бой с лицом, скрытым за шаманской маской. Некоторые говорили, что она могла менять своё тело как настоящий чейнджлинг. Ни один чейнджлинг не видел лица этой ведьмы. Ну, или не прожил достаточно долго, чтобы рассказать об этом. Партизаны, которые разукрашивали свои тела рудиментарным, эзотерическим камуфляжем отдавали дань уважения своему лидеру своими повторениями племенных знаков зебр. Чейнджлинги охотились именно на неё, одновременно боясь эту зебру до дрожи.\n\nОни рассказывали друг другу о том, что случилось с их товарищами-охотниками, вспоминая те обрывки информации, что ускользнули от внимания цензоров и пропагандистов. Они пили тосты за павших братьев по оружию: майора Пагнакса, лидера обреченной кампфгруппы, чьё окостеневшее под воздействием колдовства тело было найдено торчащим из башни его же танка. Или же трёх дюжин фаллширмджагеров, которых сбросили в самое сердце леса. Храбрые бойцы исчезли под кронами деревьев и лес их поглотил. Лишь спустя несколько дней патруль обнаружил их тела: весь взвод висел на своих парашютных ремнях, превращённых в импровизированные петли.\n\nКомандиры чейнджлингов в Кантерлоте изучали донесения, поступавшие от охотников, что смогли вернуться из леса живыми. Они приходили с пустыми копытами и страдали как от физических, так и от психологических травм. Когда стало ясно, что армия не сможет выследить ведьму, отчеты были подшиты и отложены куда подальше, чтобы о них тихо забыли. Охотников же назначили на другие, менее опасные должности, а зебра была попросту вычеркнута из всех официальных записей. В конце концов, то, чего не существует, не может быть угрозой."
changelings_paxchrysalia.415.a:0 "Зекора может забрать остатки своего леса."

changelings_paxchrysalia.416.t:0 "Конец восстания"
changelings_paxchrysalia.416.d:0 "Вечнодикий лес не ровня магии великой королевы чейнджлингов. Ее сила велика как никогда, усиленная поглощением свежесобранной любви. Королева Кризалис оставляла за собой полосу разрушений, продвигаясь через больное сердце Вечнодикого леса. Её сопровождала и поддерживала оперативная группа лучших и умнейших чейнджлингов армии. Охотники с Кризалис в авангарде без особого труда пробирались сквозь выгоревшие остатки леса, направляясь к последнему бастиону, где пряталась сама зебра-ведьма.\n\nКогда Кризалис ворвалась на поляну, партизаны встретили её градом выстрелов. Но мощнейший щит королевы смог защитить её саму и телохранителей. Завывая как гончие, чейнджлинги ворвались на поляну, горя желанием наброситься на немногочисленных усталых и измученных партизан, которым как-то удалось уцелеть под натиском армии. Бой не был честным: он был больше похож на тренировку стрельбы по мишеням, поскольку пони один за другим падали под натиском пуль и штыков.\n\n— Покажись, ведьма! — Заревела Кризалис, разрывая палатку за палаткой и разбрасывая обломки во все стороны. — Сдайся, и я, возможно, пощажу тебя. А лучше не сдавайся, так будет веселее. — Она закрыла глаза и подняла нос к небу, делая глубокий вдох, чтобы произнести заклинание. Затем, усмехнувшись, она повернулась к дальнему углу леса и пошла в ту сторону как кошка, преследующая загнанную в угол мышь. — Я чувствую твой страх, зебра, и он восхитителен на вкус...\n\nЕе магия ухватилась за непритязательную палатку и разорвала ткань пополам..."
changelings_paxchrysalia.416.a:0 "Выходи, ведьма!"

changelings_paxchrysalia.8416.t:0 "Ведьма наносит ответный удар"
changelings_paxchrysalia.8416.d:0 "Там, среди остатков палатки, отыскалась сама зебра. Она выглядела весьма жалко. Черный пепел испачкал линии между её полосками, зеленая племенная краска почти стерлась, а ожоги покрывали всё лицо, шею и передние ноги. Передняя нога висела на перевязи и была прижата к груди, а глаза налились кровью от лихорадки. Она пережила попытки армии уничтожить Вечнодикий лес, но лишь на первый взгляд.\n\n— Вот ты где, — промурлыкала Кризалис, схватив своей магией Зекору за горло и вытащив её из палатки. Зебра кашляла и вырывалась, но была слишком слаба, чтобы серьёзно сопротивляться. — Как ты могла пасть так низко, — поддразнила её Кризалис. — Ты слишком долго была занозой в моём боку, понимаешь? Но теперь я тебя, наконец, поймала.\n\n— Так ты думаешь... что меня поймала? — Зебра начала задыхаться в хватке Кризалис. — Как бы тебе... не показалось мало!\n\nКопыто зебры ударило Кризалис по рогу, и королева чейнджлингов выронила Зекору, внезапно почувствовав резкую боль. Телохранители Кризалис бросились в атаку, но Зекора ударила копытом по земле, и стена хищных лиан вырвалась из земли, отрезая их от королевы. Зекора и Кризалис остались вдвоём, и чейнджлинг оскалила клыки на зебру. — Ах ты, полосатая шавка! Да я тебе голову оторву!\n\nОна бросилась вперед, чтобы атаковать Зекору, но зебра быстро, как молния, выхватила из своей перевязи пузырек с голубой жидкостью и швырнула его в Кризалис. Стекло разбилось о её морду, а жидкость зашипела, прожигая хитин Кризалис, заставив королеву чейнджлингов завыть от боли. Затем Зекора начала распевать:"
changelings_paxchrysalia.8416.a:0 "Что она творит?!"

changelings_paxchrysalia.9416.t:0 "Проклятье ведьмы"
changelings_paxchrysalia.9416.d:0 ""Changeling queen, can't you hear?\nThe collapse of your empire is near.\nThough you may have won today,\nWe will soon find another way.\nEverything it is was built on lies,\nAnd therein lies the path of its demise.\nWhat has been taken we will retake,\nAnd in that way the Hives shall break.\n\nAnd as for you, Queen Chrysalis?\nIt is time that you listen to this:\nAll will know the mark of your shame,\nAnd it will become inseparable from your name.\nPoison Joke magic will scar your face,\nAnd take from you what defines your race.\n\nNo longer shall your ilk command our fright,\nFor daybreak's bright light will put them to flight;\nNo longer shall the Hives prolong our plight::\nEquestria will serve no parasite!"\n\nКризалис слишком сильно мучалась от боли, чтобы ответить. Её лицо практически плавилось, хитиновые пластинки трескались и опадали, когда зелье из флакона творило свою грязную магию. Стиснув зубы, Зекора сплюнула на землю, прежде чем развернуться и убежать в самое глубокое, самое тёмное сердце Вечнодикого леса. Того бастиона, который так и не покорился всей мощи армии чейнджлингов. Лес, казалось, смыкался прямо за ней, деревья пододвигались всё ближе друг к другу, а их ветви переплетались, образуя непроницаемую стену.\n\nЛишь через час егерям удалось прорваться сквозь хищные лозы и добраться до своей королевы. К тому времени она уже потеряла сознание, и нервный шепот пронёсся по рядам чейнджлингов, когда они немедленно вызвали доктора."
changelings_paxchrysalia.9416.a:0 "Что случилось с нашей королевой?!"

changelings_paxchrysalia.417.t:0 "Чейнджлинг, что не может измениться"
changelings_paxchrysalia.417.d:0 "— Представьте себе форму, Ваше Величество. Вообще любую форму.\n\nКризалис зарычала на доктора, стоявшего напротив неё. — Я пытаюсь, бесполезный ты болван, — огрызнулась она. Оскалив зубы от отчаяния, Кризалис прижала Копыта к лицу, пытаясь призвать магию, которая была столь естественна для неё всю жизнь.\n\n— Э... осторожнее, моя королева. Хирурги приложили немало усилий, чтобы восстановить ваше лицо. Если вы слишком сильно напряжётесь, то можете повредить хитин...\n\nКризалис хотела что-то рявкнуть ему, но не видела в этом смысла. Потребовались усилия лучших хирургов ульев, чтобы исправить её лицо. Ну, или хотя бы сделать его похожим на прежнее. Которое было у неё до того, как проклятая зебра прокляла её той ядовитой шуткой из флакона. Но никто не смог исправить наложенное на неё настоящее проклятие, и это беспокоило её намного больше внешнего вида. В основном потому, что она больше не могла изменять свою форму и внешность.\n\nТем не менее, она сделала так, как просил доктор, и почувствовала, как волна магии вспыхнула кольцом зелёного огня вокруг неё. Теперь на неё из зеркала смотрела хорошенькая розовая фигурка принцессы Каденс, почти идеальная... но всё же не настолько: её рог был немного длинноват, глаза были неправильного оттенка синего, и даже градиент фиолетового на её крыльях был некорректным! — Почему это не сработает?! — Кризалис провыла голосом Каденс. — Не идеально! Всё это неправильно!\n\nДоктор осторожно записал что-то в свой блокнот и попытался ободряюще улыбнуться своей королеве. — Но моя королева... всё выглядит идеально. Вы выглядите точно так же, как принцесса Каденс. В точности как тогда, когда вы проникли на королевскую свадьбу в Кантерлоте. — Он поколебался, потом добавил. — Моя королева... возможно, так называемое "проклятие" Зекоры повлияло на ваш разум, а не на ваши силы. Ведьма обманула вас, заставив думать, что ваши преображения не идеальны, хотя на самом деле они безупречны как и всегда.\n\nКризалис схватила доктора своей магией. — Лжец! — заорала королева на него. — Не надо меня опекать и поддерживать! Превращения неправильны! Я знаю, что это так! — Она вышвырнула доктора за дверь и выбежала из комнаты, прежде чем сбросить своё обличье и вернуться к естественной форму. — Зекора, проклятая ты ведьма! — закричала Кризалис. — Что ты со мной сделала?!"
changelings_paxchrysalia.417.a:0 "Я буду мучить её всеми мыслимыми и немыслимыми способами!"

changelings_paxchrysalia.418.t:0 "Последние дни Нового Понивилля"
changelings_paxchrysalia.418.d:0 "Глубокой ночью Кэррот Топ всё ещё бодрствовала и смотрела на звёзды. За её садом, над крышами Понивилля во всей красе предстало ночное небо.\n\nВсего несколько недель назад Вечнодикий лес ворвался в Понивилль подобно цунами, вытеснив гарнизон чейнджлингов потоком буйной растительности. Даже после того, как самая агрессивная часть леса отступила, некоторые из его обитателей остались в городе и поселились среди кварталов, ныне заросших экзотической растительностью.\n\nТеперь лесные волки бродили по улицам, время от времени вступая в драки с медвежуком, который устроил себе логово в развалинах ратуши. В пустых остовах домов прятались плотоядные параспрайты, звёздные пауки или даже кокатрисы. А ещё была большая медведица, мать дюжины молодых детёнышей, которые всё ещё жили в пределах самого Вечнодикого леса, но сделали недавно покрывшийся лесом Понивилль частью своих охотничьих угодий. Огромная, усыпанная звездами громада матери-медведицы сливалась с ночным небом.\n\nКэррот Топ наблюдала как медведица исчезает в предместьях города. Она задумалась о том, как изменится топография города после визита большой медведицы. На рассвете она отправится на новый фермерский рынок, построенный на остатках Барньярд Баргэинс, и будет продавать там морковь тем немногим пони, которые всё ещё называли Понивилль своим домом.\n\nЭто не будет лёгким путешествием. Сначала ей придётся обойти ферму семьи Пирл, где окопался взвод пехотинцев-чейнджлингов, брошенный позади во время панического бегства армии. Иногда, когда она чувствовала себя особенно храброй, она подползала настолько близко, насколько она осмеливалась. Она подслушивала разговоры застрявших там чейнджлингов, слушала, как они препираются между собой и мечтают вернуться на свою холодную северную родину. Что-то в окружающей магии, которая теперь была повсюду в воздухе, не давало им менять обличье.\n\nПонивилль не был ничейной землей. Некоторые звери, бродившие по улицам, не испугались бы одинокого пони, даже их рядов бойцов зебры Зекоры. Экспедиция лесных партизан в город закончилась резней, когда в центре города они спровоцировали медвежука. Они, хоть и отрезанные от остальной части Эквестрии, всё ещё были верны гармоническому сопротивлению и лелеяли мечты о Понивилле, восстановленном в своём прежнем великолепии в качестве оплота дружбы. Между ними и сторонниками Зекоры существовало непрочное перемирие. Ни одна из сторон не претендовала на пустой замок Дружбы, хотя это было единственное строение в городе, не тронутое лесом. Некоторые из его окон были широко распахнуты, призывая к безрассудных зайти внутрь.\n\nБольшая часть оставшегося населения Понивилля жила на единственной улице, отгороженной от остального города баррикадами, которые охраняли осторожные пони с дробовиками и вилами. Стены были снесены, чтобы создать проходы среди рядов домов. Сейчас в каждой комнате жило по одной семье. В подвале находилась школа, которая импровизированно обучала жеребят и кобылок общины. Кэррот Топ предпочитала уединение своей морковной фермы, но была счастлива вести дела с выжившими. Они были её друзьями, и её поставки моркови, хотя и недостаточно регулярные, были способом показать, что она всё ещё заботится о своих бывших соседях."
changelings_paxchrysalia.418.a:0 "Мир меняется, но друзья остаются прежними."

changelings_paxchrysalia.419.t:0 "Более странно, чем фанфики"
changelings_paxchrysalia.419.d:0 "ЗАКЛЮЧИТЕЛЬНЫЙ ДОКЛАД ОТНОСИТЕЛЬНО ТРАЙСА ФОЛИ, БЫВШЕГО ФИЗИКА-ТЕОРЕТИКА ИНСТИТУТА ПЕРЕДОВОЙ ФИЗИКИ Г. ВРАКСА:\n\nПредставлено на рассмотрение, только для В.О. Кладисиума.\n\nДва месяца назад доктор Трайс Фоли, физик-теоретик института передовой физики города Вракса, был захвачен нашими агентами для проведения широкого психологического теста после того, как в агентство просочились подробности его работы. В лаборатории нашлись записи, содержимое которых можно описать только как бред индивидуума, находящегося на грани серьезного психического срыва. Его записи включали гипотезы о разрушении Замка Дружбы в Понивилле с помощью теоретической гипермагической сингулярности, которая увеличила бы локальную гравитацию в городе до более чем 50 000 G в радиусе 30 метров от бесконечно малой точки внутри замка, что мгновенно уничтожило бы его. Хотя его работы посчитали непрактичными и противоречащими всем известным законам физики и магии, мы считаем, что некоторые другие его исследования заслуживают особого внимания со стороны УОБВ.\n\nОдна из больших папок была заполнена гипотезами о возможном расширении Вечнодикого леса из-за его нестабильных и неисследованных магических свойств. Учёный предположил, что если лес будет магически расширяться, то текущих возможностей армии будет недостаточно для сдерживания его роста. Трайс предположил, что лишь целенаправленные бомбардировки с использованием биологических, химических и ядерных боеприпасов смогут сдерживать рост леса. В других частях его записей обсуждается эффективность развёртывания бронепоездов в качестве мобильных оперативных баз, а также создание специальных егерских отрядов для операций в Вечнодиком лесу. Эти опасения должны быть доведены до сведения командования армии в том случае, если произойдет самое худшее. Хотя, как указано в данных докладах, это представляется маловероятным развитием событий.\n\nЧто же касается психологического состояния доктора, то здесь мы почти ничего не добились. Он редко бывает достаточно адекватен для прямого допроса и с трудом выполняет базовые вещи вроде еды, питья, сна и гигиены. Похоже, что психику доктора можно восстановить только с помощью многолетней психологической терапии. Мы рекомендуем поместить его в учреждение, где он сможет прожить оставшееся ему время, вместо того, чтобы тратить время и усилия на восстановление его разума без гарантий на успех."
changelings_paxchrysalia.419.a:0 "Подпись: Полковник-Психолог Мэйфлай."

## Canterlot Finale ##
changelings_paxchrysalia.500.t:0 "Добро пожаловать в Кантерлот!"
changelings_paxchrysalia.500.d:0 "Оберстлейтенант Алкиппе поприветствовала двух чейнджлингов, что вышли из бронепоезда. Их телохранители стремительно заняли позиции по всей платформе и сделались практически невидимыми. — Добро пожаловать, генерал-оберштабсарцт! — Весело сказала она первому чейнджлингу, тряся его копыто. Затем она кивнула второму и поприветствовала его с такой же радостью, почти переходящей в энтузиазм. — И Финикус Весали, президент компании "Мейн-Хайв Индастриз". Надеюсь, ваша поездка прошла без происшествий?\n\n— Как обычно без происшествий, — заметил генерал-оберштабсарцт Марсилио. — И я рад такому исходу. Я бы предпочёл позволить армии разбираться с партизанами, подрывающими рельсы, чем лично сходить с них.\n\n— А где же новый губернатор? — Спросил Финикус, оглядываясь вокруг. — Он слишком важен и занят, чтобы встретить нас сейчас?\n\nАлкиппе уловила легкомысленный и дразнящий тон в голосе Финикуса и поэтому ответила ему лёгкой улыбкой вместо резкой и хмурой. — К сожалению, повышение для Яхса означало лишь то, что ему нужно делать в два раза больше бумажной работы за половину прежнего времени. Теперь он должен уделять внимание и гражданским делам Эквестрии, а не только операциям армии. Но к обеду он будет свободен, и тогда мы сможем его поздравить.\n\n— Так что же нам делать всё это время? — Спросил Финикус. — Я не для того ехал так долго в поезде, чтобы просидеть тут ещё восемь часов.\n\n— Как насчёт экскурсии по городу? — Спросила их Алкиппе. — После окончания войны мы часто бывали в Кантерлоте, но лишь по делам. Я думаю, что пришло время немного расслабиться и осмотреть достопримечательности, не будучи ограниченной какой-то официальной миссией."
changelings_paxchrysalia.500.a:0 "Звучит просто отлично!"

changelings_paxchrysalia.8500.t:0 "Встреча с новым старым губернатором"
changelings_paxchrysalia.8500.d:0 "Алкиппе встала, увидев разрешающий это кивок адъютанта, и жестом пригласила Марсилио и Финикуса сделать то же самое. При этом она изо всех сил старалась подавить свой зевок: путешествовать целый день по Кантерлоту, конечно, весьма забавно, хотя и утомительно. Было приятно побывать в архивах Кантерлота и старых музеях города, даже если передвижение по Кантерлоту было довольно напряжённым. Она, конечно же, не упустила из виду, как телохранители силой освободили эти места от всех присутствовавших там пони ещё до их прибытия. Просто предосторожности на всякий случай...\n\nНо сейчас всё это было совершенно неважно: пришло время поприветствовать нового губернатора Кантерлота. Поэтому, ведя своих друзей к двери генерала-майора Яхса, она постучала в неё лишь раз, прежде чем ворваться внутрь с весёлым выкриком: — Поздравляю!\n\nЯхс подскочил на своём стуле, явно удивлённый внезапным появлением. Ситуацию не успокоило и то, что Финикус громко открыл бутылку шампанского со звуком, похожим на выстрел. Однако, увидев, что внутрь вошли его друзья, Яхс радостно вздохнул и встал. — Не пугай меня так, — поддразнил он Алкиппе. — Я думал, что чиновники королевы вернулись ради второго раунда.\n\n— Головорезы Криззи ведь не принесли бы шампанское, верно? — Спросил Финикус, быстро разливая шипучий напиток по четырём стаканам и раздавая их присутствующим. — Поздравляю с новым званием. Хотя, насколько я поняла, вы бы предпочли обойтись без повышения, да?\n\n— Это немалая честь, даже если ответственность этой должности пугает, — Признал Яхс. — Теперь я должен не только координировать стратегию армии по всей Центральной Эквестрии, но и заниматься гражданскими делами. По крайней мере, в этом мне сможет помочь Алкиппе.\n\n— А я займусь лабораториями и продолжением исследований тут, в Кантерлоте, — сказал Марсилио. — Тебе не придётся беспокоиться об этом.\n\n— Это хорошо, — сказал Яхс. Затем он приподнял бровь и посмотрел на Финикуса. — А что привело президента и генерального директора "Мейн-Хайв" в Кантерлот?\n\n— Ну, официально я тут в качестве директора штаб-квартиры "Мейн-Хайв" в Кантерлоте, — начал Финикус, но тут же добавил, подмигнув. — Но на самом деле мне просто был нужен отпуск. Жукам нужно иногда расслабляться, понимаете? — Затем он поднял свой бокал. — Так чего же мы ждем? Мы поднимем тост за нового губернатора или нет?"
changelings_paxchrysalia.8500.a:0 "Поздравляем, генерал-майор!"

changelings_paxchrysalia.501.t:0 "Старые добрые деньки"
changelings_paxchrysalia.501.d:0 "Последние несколько недель были полны такой бешеной активности, что генерал-майор Яхс едва мог заметить смену дней. Его повышение до губернатора Кантерлота было одновременно и шансом, что выпадает раз в жизни, и невероятной ответственностью, что легла на его плечи. Одной из вещей, которой он пожертвовал ради гладкой работы на новой должности, был хороший ночной сон.\n\nНо когда он сидел на балконе, наслаждаясь видом на Кантерлот со стаканом виски, его мысли начали возвращаться к более простым временам. Просто невероятно думать о том, какой путь он прошёл от полковника 96-й пехотной дивизии, известной в просторечии как "Das 96-й". От полковника, брошенного в одну из самых тяжёлых и отвратительных битв за всю войну, до губернатора Кантерлота и всей Центральной Эквестрии... просто удивительно, как быстро летит время.\n\nМысли про старую 96-ую заставили Яхса вспомнить о солдатах, с которыми он служил раньше. Все они прошли через наихудшие проявления современной войны, но каким-то образом выжили. Они видели всё - от осады Акорнейджа до бомбёжки Клаудсдейла и падения Кантерлота. Многие из его старых товарищей вернулись к гражданской жизни в конце войны, часть назначили командовать другими дивизиями, а некоторые даже стали частью королевской гвардии. А из-за необходимости демобилизации 96-ая дивизия, как одна из самых пострадавших, была расформирована. То, что не удалось сделать войне, сделал мир: солдат 96-ой дивизии раскидал по свету ветер. Это была мрачная мысль - знать, что они никогда не будут служить вместе в эти новые мирные времена.\n\nНо было ли это так на самом деле? Яхс нахмурился, глядя в свой стакан. Его недавнее повышение по службе, как бы он ни сетовал по своей ответственности, открыло двери, которые давно были закрыты перед ним. Он мог принимать окончательные решения по поводу всего, что происходило в Кантерлоте, который он теперь непосредственно контролировал. В старой столице побежденной страны он мог делать всё, что хотел.\n\nТак что же теперь его останавливает?"
changelings_paxchrysalia.501.a:0 "Посмотрим к чему могут привести несколько телефонных звонков..."

changelings_paxchrysalia.8501.t:0 "Собирая старую команду"
changelings_paxchrysalia.8501.d:0 "Оберстлейтенант Алкиппе вышла на балкон, держа магией досье перед собой. — Генерал-майор... Что всё это все такое? — спросила она, откладывая бумаги в сторону и поворачиваясь к Яхсу, который, казалось, со спокойным интересом наблюдал за облаками, нависшими над городом. — Мы обрабатывали документы о повторном зачислении в армию очень многих ветеранов... Вы что-то задумали?\n\n— Старый жук просто вспоминает славные деньки, — сказал Яхс, взглянув на Алкиппе и приглашая её садиться. - Я хочу посмотреть и узнать, кто из них всё ещё здесь и заинтересован в том, чтобы приехать в Кантерлот и что-то изменить.\n\nАлкиппе подавила свой небольшой смешок. — Ты точно не старый жук, Яхс, — сказала она. — А что ты имел в виду, говоря: "Приехать в Кантерлот и что-то изменить"?\n\n— Нам нужно больше жуков вроде нас в Кантерлоте, — объяснил Яхс. — Нам нужны чейнджлинги, которые не лезут вон из кожи ради королевы и страны. Нам нужны чейнджлинги, готовые найти баланс между благом ульев и пони, которыми мы правим. Сейчас в армии полно ревностных новобранцев и фанатиков. Они идеально подходят для гвардии королевы, но не для поддержания мира. И если я смогу собрать своих товарищей из старой 96-ой дивизии под моим командованием... если я смогу заставить нас стать образцом того, как чейнджлинги должны вести себя в Эквестрии... тогда я думаю, что у "Пакс Кризалия" появится шанс вы выживание.\n\n— Но откуда ты знаешь, что они все будут разделять твоё мнение, Яхс? — Спросила Алкиппе. — Война - это одно, но мир... это совсем другое дело.\n\n— Во время Великой войны нас семь раз наказывали за то, что мы были слишком снисходительны к пленным, — сказал Яхс, хмуро глядя на горизонт. — Мы были настолько умеренны и терпимы в этом, насколько это вообще было возможно для дивизии. И я очень сомневаюсь, что то, что видели мои старые товарищи после окончания войны, ожесточило их сердца вместо того, чтобы вновь подтвердить наши убеждения.\n\nОн смотрел прямо на Алкиппе, словно заглядывал ей прямо в душу. — Нам совсем не обязательно наступать сапогами на шею пони. Я снова соберу 96-ую, и мы покажем чейнджлингам и пони, что оккупация не обязательно означает угнетение."
changelings_paxchrysalia.8501.a:0 "Армии нужны умеренные чейнджлинги не только среди офицеров."

changelings_paxchrysalia.9501.t:0 "Солдаты Кантерлота"
changelings_paxchrysalia.9501.d:0 "Понадобилось некоторое время, всё же Яхсу удалась его задумка. Непрерывная череда телефонных звонков, телеграмм и личных встреч вели к этому моменту. А получить официальное разрешение от самой королевы было проще всего. Яхс просто представил ей бумагу на подпись и заявить, что этот приказ предназначен для набора большего количества солдат в гарнизон Кантерлота и поддержания мира. Кризалис было всё равно, кого хочет Яхс, когда он пообещал ей, что в столице пони будет больше солдат-чейнджлингов. Ей нравилось смотреть на маленькие цифры в бумагах и смеяться, когда математика была на её стороне, вместо того, чтобы подробно изучать смысл этих цифр.\n\nИ вот теперь, когда на площади Солнца стихли фанфары труб и топот копыт, генерал-майор Яхс ступил на трибуну в своем лучшем парадном мундире. Он был совершенно новым и сшитым специально для этого случая. Яхс лишь позволили себе сохранить старую нашивку 96-ой дивизии от предыдущей формы и нашить её на новую. Перед ним стояли чейнджлинги 96-ой "Кантерлотской" пехотной дивизии, где примерно половина солдат - включая большую часть сержантов и офицеров - состояла из членов первоначальной дивизии, а другая половина была новичками, которых Яхсу рекомендовали разделяющие его идеи единомышленники. Они были впечатляющей и прекрасной силой, и Яхс знал, что эти солдаты заставят его гордиться ими.\n\nУ него есть поддержка целой дивизии, так что настало время изменить "Пакс Кризалия" к лучшему. И начать стоит с Кантерлота."
changelings_paxchrysalia.9501.a:0 "Служить справедливо и преданно, всем без исключений."

changelings_paxchrysalia.502.t:0 "Смена гвардии"
changelings_paxchrysalia.502.d:0 "— Шевелитесь, шевелитесь! Двигайте ногами, кобылки! Вы называете это маршем? вы считаете это простой прогулкой? Партизаны не сдадутся, если вы попросите у них разрешения арестовать их!\n\nКоммандант Секонд Винд нахмурился, наблюдая, как новобранцы новоиспеченной кантерлотской гвардии безуспешно пытаются маршировать вперёд и назад по плацу позади кантерлотского замка. Всё в них было насмешкой над настоящей Королевской Гвардией Кантерлота, элитным полком, к которому он сам принадлежал до того, как чейнджлинги выиграли войну и уничтожили старую гвардию. Доспехи, в которые были облачены его новые рекруты, были покрыты золотом, чтобы напоминать золотую форму старой королевской гвардии, но посередине была нарисована толстая чёрная полоса, которая как будто разделяла каждого пони на две части. И вместо герба Сестёр на воротнике и боках формы теперь красовался трезубец чейнджлингов. Если бы Сёстры были здесь, им было бы стыдно за унижение их королевской гвардии жуками. Может быть, в этом и был смысл.\n\nНо Секонд Винду было все равно. До войны королевская гвардия была для него бесперспективной работой. У него не было достойной родословной, необходимой для карьеры в её рядах, поскольку сам он не вёл свой род из знатной семьи. А продвижение Секонд Винда по службе незадолго до окончания войны было вызвано лишь отчаянием, порожденным ухудшением ситуации на фронте. Он не испытывал любви к единорогам-аристократам, заполнившим верхние эшелоны Королевской гвардии, и, возможно, именно поэтому он стал самым высокопоставленным офицером, перешедшим из несуществующей Королевской гвардии в новую кантерлотскую гвардию. Теперь-то уж точно жаловаться было почти не на что. Ему нужно было лишь слушать жуков, и те давали ему почти полную свободу действий в формировании кантерлотской гвардии согласно собственным желаниям.\n\nВозможно, победа чейнджлингов в войне всё же не была такой уж плохой вещью."
changelings_paxchrysalia.502.a:0 "— Прибавьте шагу и следите, чтобы оставаться в своей проклятой шеренге!"

changelings_paxchrysalia.8502.t:0 "Именной детерминизм"
changelings_paxchrysalia.8502.d:0 "Секонд Винд встал и отдал честь, когда генерал-майор Яхс приблизился к столу в дальнем конце бара. — Генерал-майор. Рад тебя видеть, — сказал пегас, склонив голову в знак уважения к своему начальнику-чейнджлингу. В конце концов, своим новым положением он был обязан распоряжениям Яхса.\n\n— Коммандант, — сказал Яхс, сняв свою шляпу и бросив её на стол, прежде чем сесть. — Пожалуйста, присаживайся. Ты, наверное, весь день был на копытах.\n\n— Я не ожидал, что так долго провожусь с новобранцами. Я потратил целую кучу времени, чтобы просто научить их хоть как-то маршировать в строю, — признался Секонд Винд, садясь напротив генерал-майора. — Большинство пони с военной подготовкой просто не осмелились бы записаться в кантерлотскую гвардию. А большинство моих товарищей по старой гвардии, вероятно, содрали бы с меня шкуру заживо, если бы узнали, как я устроился в послевоенной жизни.\n\n— Ну, после окончания войны, ты определенно добился большего, чем многие, - сказал Яхс. Он хихикнул, когда ему в голову пришла одна мысль, и он покачал головой. — Разумеется, я читал твоё досье. Мне кажется забавным, что пони по имени Секонд Винд, который вывозил раненых товарищей из зоны боевых действий на голой спине так и не получил признания от своего старого начальства, но оказался во главе совершенно нового учреждения при новом режиме.\n\n— Полагаю, это вполне уместно, — сказал Секонд Винд, пожимая плечами. — Мне всегда казалось забавным, как работают наши имена, хотя я и не так сильно верю в их пророческую силу, как большинство. Очень жаль, что под моим командованием нет пони по имени Лонг Марш или Парейд Формэйшн.\n\nОба усмехнулись, объединённые духом товарищества в этот момент, но вскоре Секонд Винд начал медленно хмуриться. — Что же мне сейчас делать, генерал-майор? — Спросил он Яхса. — Да, надо признать, что я не очень-то любил королевскую гвардию, но Эквестрия по-прежнему мой дом. И я ненавижу видеть, как она страдает, а когда я сам тренирую новые войска, то чувствую себя частью этой проблемы. — Винд болезненно скривился и посмотрел на Яхса, ожидая ответа. — Так что же мне теперь делать?"
changelings_paxchrysalia.8502.a:0 "Не высовывайся и постарайся использовать всё, что у тебя есть."
changelings_paxchrysalia.8502.b:0 "Статус-кво не должен обязательно являться правильным положением вещей."

changelings_paxchrysalia.503.t:0 "Кантерлотские архивы"
changelings_paxchrysalia.503.d:0 "— Да, Финикус, это раздражает, но я надеюсь, что однажды архивы Кантерлота станут жемчужиной знаний, известной во всём мире.\n\nГенерал-оберстабсарцт Марсилио сделал глоток мимозы, приготовленной для него Финикусом. Оба чейнджлинга в данный момент сидели на балконе третьего этажа его нового поместья. Это было столь впечатляющее здание, что даже ученый, больше озабоченный своими исследованиям, чем анализом кантерлотской архитектуры, смог оценить здание по достоинству. Многие дворяне сбежали из Кантерлота задолго до того, как армия чейнджлингов приблизилась к подножию горы, и теперь все их древние фамильные дома были проданы с аукциона по очень низкой цене. Финикус, конечно же, не терял времени даром, и использовал полученную во время войны прибыль для покупки самого лучшего из особняков.\n\n— Не понимаю что тут особенного, — отмахнулся Финикус. — Архивы - это такая же добыча, как и всё остальное в этом городе. И конечно победители будут сражаться за самые лакомые кусочки.\n\n— Но это бесполезно для всех: как для чейнджлингов, так и для пони, — сказал Марсилио. — На бумаге архивы должны были быть открыты для всех существ, желающих ознакомиться с хранящимися там знаниями. Однако армия рыщет в архивах в поисках крупиц знаний о тёмной магии и давно потерянном оружии и заклинаниях, а корпорации, подобные твоей, заполняют ящик за ящиком эзотерическими томами, которые отправляются обратно в ульи. Я сомневаюсь, что эти книги когда-нибудь снова увидят свет, если в них найдётся хоть что-то интересное.\n\n— Этот просто бизнес, — отмахнулся Финикус. Но когда Марсилио нахмурился, промышленник прикусил губу и наклонился чуть ближе к своему другу. — Но... даю тебе слово, что позабочусь о том, чтобы всё вернулось в архив целым и невредимым, когда мы закончим с этим делом."
changelings_paxchrysalia.503.a:0 "Нет ничего более могущественного, чем знания, и каждый хочет получить их частичку."

changelings_paxchrysalia.504.t:0 "Тройная угроза"
changelings_paxchrysalia.504.d:0 "— Сколько сегодня?\n\nЭтот вопрос Яхс всегда первым задавал Алкиппе по утрам, когда она приносила ему нужные вещи. Предметом обсуждения были чёрные папки, которые Алкиппе положила поверх стопки. Эти папки, чёрные, как ночное небо, содержали информацию об угрозах, критически важных для поддержания стабильности и функционирования Кантерлотского комиссариата. Обычно их не было, хотя иногда она приносила одну или две. Но вот сегодня...\n\n— Три, — сказала Алкиппе, кладя стопку на стол Яхса и поднимая три верхние. — Зачитать их вам, генерал-майор?\n\nБрови Яхса поднялись на этих словах. — Три? Ну что же, продолжайте. Кратко, если сможете.\n\nАлкиппе кивнула и, открыв первую папку, быстро просмотрела её содержимое. — Послание от УОБВ, — начала она. — Они считают, что раскрыли подпольное общество сторонников превосходства единорогов здесь, в Кантерлоте. Они называют себя обществом "Рога Изобилия". УОБВ собирается усилить свои операции, чтобы выяснить больше подробностей, но пока они бы хотели, чтобы и вы знали.\n\nОна отложила эту папку в сторону и взяла следующую. — Письмо от нескольких обеспокоенных горожан, а также рапорт от королевской гвардии. Горожане утверждают, что на нижних уровнях Кантерлота существует какой-то подпольный наркопритон, вызывающий беспорядки; а королевская гвардия считает, что они являются частью ячейки гармонического сопротивления, и требуют, чтобы вы сделали что-то с этим, прежде чем сама королева посетит Кантерлот для своей великой коронации.\n\nЗатем Алкиппе схватила последнюю папку и нахмурилась, глядя на слова внутри. — А это... это письмо от Финикуса с предложением попробовать этот новый "любовный притон", который он нашел в нижнем Кантерлоте. — Она отшвырнула эту папку в сторону. — Значит, у нас есть только две важные вещи. Нам нужно напомнить Финикусу, чтобы он не использовал срочные папки для своей личной почты...\n\nЯхс задумчиво почесал подбородок. — Культ сторонников превосходства, убежище сопротивления и притон наркоманов... сколько ты хочешь поставить на то, что они все как-то связаны?"
changelings_paxchrysalia.504.a:0 "Я не думаю, что соглашусь на это пари, сэр."

changelings_paxchrysalia.8504.t:0 "Юникорния Блюз"
changelings_paxchrysalia.8504.d:0 "Это был, мягко говоря, весьма напряжённый день, и Яхс был более чем счастлив наконец вернуться домой к ночи и снять свою шляпу. Последние несколько дней он наблюдал за противоповстанческой операцией по проникновению и уничтожению этого так называемого общества "Рога Изобилия", и у него не осталось абсолютно никаких опасений, что что-то пойдет не так. Войска были неплохо обучены, а оперативный план хорошо продуман и многократно отточен после множества иных уже проведённых операций по борьбе с повстанцами. Это была не первая ячейка Яхса, которую он должен был уничтожить во что бы то ни стало. Хотя к этому моменту он уже начал задаваться вопросом о том, когда же у него, наконец, появится шанс покончить с последней ячейкой. Если ему повезет, то может быть и скоро.\n\nОднако, когда он открыл дверь в свою спальню, то с удивлением заметил письмо, лежащее на подушке. Сгорая от любопытства, он придвинул его поближе магией и внимательно осмотрел. Там не было ничего, что указывало бы на отправителя или то, как попало сюда. На конверте была написана простая фраза: "губернатору Кантерлота". Нахмурившись, Яхс открыл конверт и вытащил оттуда изящный листок бумаги, на котором были аккуратно выведены два предложения:\n\n"Общество сердечно приглашает вас посетить наше следующее собрание, которое пройдёт в 2 часа ночи во время следующего новолуния. Приходите в одиночку на угол улиц Бит и Бридл в нижнем городе.\n\nКонечно, это было весьма зловещее послание, и на следующий день Яхс решил обсудить его с Алкиппе и Марсилио. Объяснив им ситуацию и прочитав содержание письма, генерал-майор хотел услышать соображения его подчиненных по этому поводу.\n\nАлкиппе, разумеется, тут же отрицательно помотала головой. — Это слишком рискованно, — сказала она. — Это определенно ловушка. Они ведь партизаны, верно? Они хотят встретиться с вами только для того, чтобы убить вас, это точно.\n\n— Мы не знаем, партизаны ли они. По крайней мере, не совсем уверены, — заметил Марсилио. — По правде говоря, мы вообще пока не знаем, что именно представляет из себя это общество "Рог изобилия". И всё же я должен согласиться с Алкиппе. Это слишком опасно. Ничего хорошего из этого точно не выйдет."
changelings_paxchrysalia.8504.a:0 "Вероятно... вероятно не выйдет."

changelings_paxchrysalia.505.t:0 "Отель Калихорния"
changelings_paxchrysalia.505.d:0 "Генерал-майор Яхс поднялся на крышу ближайшей радиостанции, где высота здания давала ему прекрасную возможность наблюдать за операцией, которая должна была состояться в нескольких кварталах чуть дальше по улице. Оберстлейтенант Алкиппе сопровождал его вместе с отрядом связистов, которые должны были держать их в курсе предстоящего сражения.\n\nНиже по улице несколько отрядов чейнджлингов уже направились к предполагаемой штаб-квартире общества "Рог изобилия" - отелю Калихорния. Отклонив приглашение общества, Яхс проанализировал карту местности, прилегающей к пересечению Бит-Стрит и Бридл-авеню, и пришёл к выводу, что роскошная, но всё ещё закрытая гостиница могла бы стать идеальным штабом для ячейки сопротивления, действующей прямо у него под носом. Инфильтраторы подтвердили активность пони в предположительно пустующем здании, и это было всё, что требовалось Яхсу для начала операции. Теперь его солдатам придётся захватить отель и достать всё ценное имущество, которое они смогут найти внутри.\n\nНо сначала солдатам нужно было добраться до отеля. Когда они были на полпути к месту назначения, стекло разлетелось вдребезги от множества выстрелов и на улице вспыхнула перестрелка. Солдаты рассредоточились, ныряя в любые доступные им укрытия, когда из высоких зданий по обеим сторонам открыли огонь мятежники.\n\nАлкппе повернулась, чтобы бросить на Яхса обеспокоенный взгляд, но генерал-майор не сводил глаз с улицы внизу. Теперь им лишь оставалось наблюдать и ждать."
changelings_paxchrysalia.505.a:0 "Мы должны верить в наших солдат."

changelings_paxchrysalia.8505.t:0 "Конец отеля Калихорния"
changelings_paxchrysalia.8505.d:0 "Не теряя ни секунды, солдаты-чейнджлинги разделились на две группы: первая группа бросилась в соседние здания, выбивая двери и разбивая окна, чтобы ворваться внутрь, а вторая группа взлетела и начала прикрывать их огнём, прежде чем долететь до крыш и закрепиться на возвышенностях. За пыльными окнами вспыхивали выстрелы, когда солдаты и партизаны вступали в ближний бой, и хотя у пони была надёжная и подготовленная оборона, солдаты-чейнджлинги были хорошо обучены, дисциплинированы и двигались как единое целое. Здание за зданием, комната за комнатой солдата Яхса уничтожали сопротивление, смело продвигаясь вперёд под безжалостным огнём пулеметов. Даже без поддержки бронетехники чейнджлинги были не по зубам партизанам, и пони начали отступать.\n\nКазалось, что прошла целая вечность, но вскоре за отрядами солдат начали двигаться пожарные команды. Закрепившись на своих позициях и подготовив заряды для прорыва во внутренние помещения, отряды снова приготовились пойти на штурм. Но, прежде чем они успели это сделать, отель содрогнулся от взрывов в подвале. Всё здание начало раскачиваться, когда его фундамент рухнул. Солдаты-чейнджлинги бежали так быстро, как только могли, преследуемые падающим мусором, и вскоре всё восьмиэтажное здание превратилось в лавину бетона и цемента, лавиной несущуюся вниз по улице. Страшный грохот сотряс весь город, и в воздух поднялось облако сухой и удушливой пыли. Алкиппе прикрыла свою изумленную морду, а Яхс недоверчиво наблюдал за происходящим. А когда пыль наконец осела, от отеля "Калихорния" не осталось и следа.\n\nНаконец Яхс повернулся к радисту, стоявшему рядом с ним. — Начинайте отзывать подразделения, и пусть поисково-спасательные службы просеивают обломки в поисках пропавших, — приказал он. - Сегодня наш день.\n\nРадист сделал, как ему было велено, и Яхс просто смотрел, как оседает пыль, когда его солдаты, хромая, покидают место кровавой бойни. Они победили, но отель был полностью разрушен. Если Яхс и надеялся побольше узнать об этом обществе "Рога изобилия", теперь эти надежды исчезли навсегда.\n\nНе то чтобы это имело большое значение. Ещё одна ячейка сопротивления была уничтожена, и королева может спокойно отправиться в Кантерлот ради своей грандиозной коронации."
changelings_paxchrysalia.8505.a:0 "И всё это за один день."

changelings_paxchrysalia.506.t:0 "Заигрывания с эзотерикой"
changelings_paxchrysalia.506.d:0 "— Я всё ещё не понимаю, зачем вы это делаете, генерал-майор. Это очень, очень опасно.\n\nЯхс, стоящий на углу Бит-Стрит и Бридл-Авеню, освещенным лишь мерцающим уличным фонарем над головой, нервно ёрзал. Он накинул тяжёлый плащ, но даже это не остановило холод, который, казалось, пробирался прямо под его экзоскелет. Ночь была слишком тихой, слишком спокойной, и даже присутствие егерей в соседних зданиях и Алкиппе, разговаривающей с ним через наушник, не очень-то успокаивало генерал-майора.\n\n— Я должен знать, — сказал Яхс, хмуро глядя на пустынные дороги. Микрофоны, встроенные в его одежду, улавливали его голос и передавали его обратно Алкиппе, позволяя им общаться на расстоянии. — Мне нужно знать, что всё это значит на самом деле. Кроме того, было бы невежливо отказаться от приглашения.\n\n— Дать себя убить было бы весьма грубо по отношению ко мне, — проворчала Алкиппе, и в её голосе зазвучали странные нотки, которые тут же исчезли. — Если вы попадете в беду, то превратитесь во что-нибудь сильное и выбирайтесь оттуда. Егеря доберутся до вас за шестьдесят секунд, а через пять минут у вас будет машина, готовая отвезти вас обратно во дворец.\n\n— Я всегда могу рассчитывать на тебя, не так ли? — Яхс слегка усмехнулся, а затем вздохнул, пытаясь избавиться от части нервного напряжения. Он взглянул на часы на передней лапе и нахмурился, когда секундная стрелка медленно сделала ещё один оборот вокруг циферблата. Было около двух часов ночи. Где же это так называемое общество "Рога изобилия"?\n\nДалекие колокольные башни начали играть мрачную мелодию, прежде чем закончить её двумя гулкими ударами, которые, казалось, эхом разнеслись по всему спящему городу навсегда. И именно тогда Яхс услышал слабое урчание приближающегося двигателя. Он осмотрел весь перекресток, а также прилегающие улицы, но ничего не увидел. Может быть, машина ехала в соседнем квартале... ?\n\nЗатем он услышал рокот двигателя прямо перед собой, и в воздухе замерцала магия, из которой, как мираж в пустыне, появился белый автомобиль. Яхс моргнул и потёр глаза, дабы убедиться, что ему ничего не мерещится. Но машина всё ещё стояла на дороге, ожидая его. И пока он смотрел, задняя дверь открылась сама по себе, открывая его взору пустое сиденье."
changelings_paxchrysalia.506.a:0 "Похоже, что машина приехала за мной..."

changelings_paxchrysalia.1506.t:0 "Общество "Рог изобилия""
changelings_paxchrysalia.1506.d:0 "— Ну, пока всё выглядит нормально...\n\nЯхс отошёл от столба и нерешительно приблизился к ожидавшей его машине. Он осторожно заглянул внутрь и обнаружил, что пассажирская часть салона отделена от водителя декоративной панелью. Сзади никого не было, и поэтому, глубоко вздохнув, Яхс уселся. — А куда мы едем? — спросил он вслух, но ответа так и не получил. Вместо этого дверь за ним закрылась, и он почувствовал, как машина начала ускоряться. Когда он попытался выглянуть из окна машины, то увидел только кружащиеся ночные звёзды, но не здания Кантерлота. Тот, кто зачаровал эту машину, проделал безупречную работу; Яхс практически ощущал магию, витающую в воздухе.\n\nПоездка была недолгой, но Яхс быстро потерял чувство направления, когда машина сворачивала от одного квартала к другому. Но наконец она остановилась, и дверца машины снова открылась сама по себе. Яхс на мгновение заколебался, ожидая, что появится пони с винтовкой окрасит заднее сиденье в цвет его крови, но ничего подобного не последовало, так что Яхс вышел из машины и огляделся.\n\nПоходе, что он был в каком-то гараже, единственным украшением которого были пятна воды на стенах и мусор в разных углах помещения. Это место выглядело так, будто оно уже было заброшено в течение некоторого времени, и единственным иным предметом в гараже была машина. Сгорая от любопытства, Яхс подошел к водительскому месту и заглянул через стекло, желая увидеть лицо пони, который привез его сюда, но с удивлением обнаружил лишь пустое сиденье. Неужели машина сама привезла его сюда?\n\nВ гараже была ещё одна достойная внимания вещь: простая дверь прямо перед машиной. Нахмурившись, Яхс медленно подошел к ней. — Я сейчас войду, — пробормотал он в микрофон. — Пожелай мне удачи.\n\nЗатем, глубоко вздохнув, Яхс постучал в дверь. На уровне глаз открылась щель, явив его взору пару глаз цвета глубокого аметиста. — Губернатор Яхс, — промурлыкал страстный голос, и он понял, что эти глаза улыбаются ему. — Это великая честь для меня. Минутку, если можно.\n\nЩель закрылась, и крепкие замки двери открылись один за другим. Затем она распахнулась внутрь, и на пороге показалась высокая кобыла-единорог в тонком платье, кокетливо улыбающаяся ему из-под маски. — Добро пожаловать в общество "Рог изобилия". Вы можете звать меня Глориосой. Пожалуйста, входите."
changelings_paxchrysalia.1506.a:0 "Прямиком в логово зверя..."

changelings_paxchrysalia.2506.t:0 "Тёплый прием"
changelings_paxchrysalia.2506.d:0 "Захлопнувшаяся за Яхсом дверь заставила его подпрыгнуть, когда он вошел в комнату, хотя чейнджлинг изо всех сил старался не показывать своего беспокойства. Стоявшая перед ним кобыла в маске внимательно оглядела его, её темно-фиолетовые глаза, казалось, пронизывали его насквозь. Затем она улыбнулась. Яхс, близко знакомый с ненавистью и страхом пони Эквестрии, никак не ожидал этой реакции. — Я хотела спросить: присоединишься ли ты к нам или нет, — сказала кобыла, магия хватая Яхса за пальто и ведя его вглубь здания. — Я чувствую, что мы так немало выиграем от общения друг с другом.\n\n— Я всегда готов поговорить, — сказал Яхс, нерешительно следуя за высокой единорожкой вглубь тёмных комнат. — Говорить гораздо лучше, чем драться, да и так страдает гораздо меньше существ.\n\nГлориоса хмыкнула. — Да, я склонна согласиться. И я верю, что вместе мы сможем сделать Кантерлот... чем-то особенным. — Они вошли на широкое открытое пространство, мягко освещённое красными и розовыми огнями. На ковре комнаты повсюду лежали плюшевые подушки и пустые стеклянные бутылки. По всей комнате валялись единороги в разных стадиях подпития, многие из них бормотали друг другу невнятные слова, другие же лениво хихикали, а ещё больше пони лежали без сознания на подушках и с улыбками на своих лицах. Глориоса провела Яхса мимо всех них, затем усадила его на краю комнаты и жестом копыта указала на остальных единорогов. — Мы и есть общество "Рог изобилия", — сказала она вместо приветствия. — Все мы единороги, кто-то родом из благородных домов, кто-то - нет. С учётом недавних событий - вроде Великой войны - наша численность в моем городе значительно возросла. Единороги ищут спасения... никто из нас не должен подчиняться другим расам, не говоря уже о других видах.\n\nЭта фраза заставила Яхса нахмуриться. — Если вы просите, чтобы я передал контроль над Кантерлотом вашему обществу, боюсь, мне придётся отказать вам, — заявил он. — Я пришел сюда, чтобы узнать о сути вашего "общества", и выяснить, может ли оно быть полезным для меня, а не для того, чтобы вы диктовали мне условия.\n\nУлыбка Глориосы не исчезла и даже ни разу не дрогнула; её было совершенно невозможно прочесть, да и позолоченная фарфоровая маска, закрывавшая верхнюю половину её лица, совсем не помогала в этом отношении. — Я понимаю, губернатор, и если бы я хотела получить контроль над Кантерлотом, то убила бы вас, а не беседовала. — Она сделала небольшую паузу, а затем подняла магией два бокалами Мартини и поставила их между ними. — Я делаю вам... предложение, — сказала она. — Это компромисс между вами и мной. Я думаю, что вы найдете его вполне удовлетворительным."
changelings_paxchrysalia.2506.a:0 "Хорошо... я хочу услышать его."

changelings_paxchrysalia.3506.t:0 "Скромное предложение"
changelings_paxchrysalia.3506.d:0 "— Единороги должны получить своё законное место в Эквестрии, — сказала Глориоса. — И оно не должно быть в самом низу. Мы не будем служить вам рабами вместе с пегасами и земными пони или, не дай Сёстры, фестралами. — Она вытащила пузырек с розово-фиолетовой жидкостью и налила по порции в каждый стакан. Розово-белый туман вырвался из пузырящегося варева, когда оно коснулось стекла, и выплеснулся за его края, как пар из охладительной системы. Яхс хмуро посмотрел предложенный ему странный напиток. — У общества есть лучшие из лучших из расы единорогов. У нас также есть способы... эвакуировать единорогов из неприятных ситуаций, в которой сейчас оказалось так много эквестрийцев. — Она жестом указала на стоящий перед ней бокал, а затем подняла его вверх своей магии. — Ты когда-нибудь задумывался, что произойдет, если взять любовь пони, очистить её и отдать обратно пони?\n\n — Я... не могу сказать, что знаю, — сказал Яхс, осторожно поднимая свой бокал.\n\n— Блаженство, — сказала Глориоса, закрывая свои затрепетавшие глаза. — Способ на время забыть о мире. Мы нашли способ усовершенствовать обработку любви. До этого не додумался даже ваш вид. Поэтому я предлагаю вам следующее: уменьшите нагрузку на единорогов в Кантерлоте. Дайте нам достойные посты по всему городу и в вашей администрации. Пусть единороги встанут рядом с чейнджлингами, а не на коленях перед ними, а взамен я дам тебе средства для достижения ваших амбиций. — Она покрутила стакан своей магией. — Озарение со дна бутылки.\n\n— А если я откажусь? — Спросил Яхс, приподнимая бровь. — А что, если я вместо этого прикажу армии расправиться с этим наркотическим притоном?\n\nНа этот раз улыбка Глориосы сменилась резким и хмурым взглядом. — Тогда мы будем сражаться так же яростно, как и остальные представители нашего вида, — сказала она. — И будут иные последствия.\n\nЗатем она жестом указала на бокал. — Мы договорились, губернатор?"
changelings_paxchrysalia.3506.a:0 "§CВзять§! напиток."
changelings_paxchrysalia.3506.b:0 "§RОтказаться§! от напитка."

changelings_paxchrysalia.4506.t:0 "Особое озарение"
changelings_paxchrysalia.4506.d:0 "— Яхс, не делай этого, — заорала ему в ухо Алкиппе. — Что бы ты ни собирался...\n\nЯхсу хотелось успокоить её, но он не мог этого сделать, не выдав того, что у него есть микрофоны. Вместо этого он окинул взглядом туманный напиток, который держал своей магией. — Ну... я поступил бы глупо, если бы отказался от помощи, — сказал Яхс, обращаясь и к кобыле в маске, и к Алкиппе. — Он поднял свой бокал. — Просто из вежливости. Не ждите, что я стану постоянным клиентом.\n\nГлориоса улыбнулась ему в ответ. — Конечно, — сказала она, хотя дразнящий тон её голоса ясно дал понять, что она не совсем ему верит. — За дружбу между губернатором Яхсом и обществом "Рога изобилия".\n\nОна поднесла бокал к губам, глубоко вдыхая клубящийся туман, а потом откинула голову назад и выпила переработанную любовь. Яхс на мгновение заколебался, задаваясь вопросом, не было ли это какой-то особо хитрой ловушкой, но потом он собрался с духом и сделал то же самое. Он чуть не закашлялся, когда почувствовал сладкий запах, а когда жидкость коснулась его губ, то практически задрожал, ощутив сладкий и пикантный вкус любви. Он заставил себя допить напиток, заметив, что Глориоса уже допила свой. Когда Яхс поставил свой бокал на стол, его магия мерцала и колебалась, пока тело чейнджлинга впитывало любовь, очищенную до невероятно высокой степени.\n\n— Наслаждайтесь, губернатор Яхс, — пробормотала Глориоса, откинув голову назад и прикрыв глаза. — Наслаждайтесь щедростью общества "Рог изобилия"..."
changelings_paxchrysalia.4506.a:0 "§CПозабыть§! о своих бедах..."

changelings_paxchrysalia.5506.t:0 "Мы живём в отеле Калихорния"
changelings_paxchrysalia.5506.d:0 "Яхс отшатнулся от стола неуклюжими и онемевшими копытами. Красные и розовые огни комнаты вспыхнули яркой радугой, а вялые единороги, лежащие вокруг, внезапно превратились в оживленных, хихикающих посетителей парка солнечным летним днём. Алкиппе что-то кричала ему на ухо, но её голос быстро превратился в пение птиц. В конце концов, Яхс больше не был на службе; он был рядом с прекрасным озером в Королевских Садах Кантерлота.\n\nОн обошёл вокруг озера из кристально чистой воды, чувствуя свежескошенную траву своими копытами. Прохладный ветерок делал жаркое летнее солнце вполне терпимым, и Яхс снял шляпу, бросив её на землю. Он остановился у пирса, что располагался у самой кромки воды, узнав стоящего там единорога. Точнее, чейнджлинга под маскировкой: он бесчисленное количество раз до этого видел, как Финикус использовал эту же самую личину жеребца-единорога. — Финикус? — спросил он, придвигаясь ближе. — Что ты здесь делаешь?\n\nФиникус удивленно обернулся, но на его морде появилась широкая улыбка, когда он увидел приближающегося Яхса. Его личина исчезла во вспышке зеленой магии, и два чейнджлинга встретились на середине пирса. — Яхс! А я всё думал, когда же ты ко мне присоединишься! — Финикус положил ногу на плечо Яхса и указал на толпу перед ними. — Посмотри на это... разве это не прекрасно? Это прекрасно, верно?\n\nЯхс оглянулся назад и его глаза расширились. Это был не тот уставший от последствий войны Кантерлот, к которому он так привык. Вместо пони, съежившихся под сапогами оккупантов, он видел пони и чейнджлингов, сидящих бок о бок, устраивающих пикники, поющих песни и наслаждающихся жизнью как равные между собой друзья. Он видел, как чейнджлинги сочиняли музыку, рисовали пейзажи и обсуждали загадочные философские вопросы. Исчезло гнетущее индустриальное общество ульев, где чейнджлинги изо всех сил трудились ради славы ульев и порочных капризов королевы, властвующей над своими подданными. Это была настоящая утопия, а не тот чудовищный кошмар, который представляло собой сегодняшнее общество чейнджлингов. А потом Яхс заметил, что у чейнджлингов, как и у их товарищей-пони, на боках были красочные картинки, знаки различия... \n\n— Верно... оно прекрасно, — сказал Яхс, с трудом подбирая слова. Он посмотрел в сторону и понял, что откуда-то достал ещё один клубящийся дымом напиток, а когда снова посмотрел на Финикуса, то заметил, что и его друг тоже держит бокал. Они одновременно поднесли бокалы к губам и запрокинули головы."
changelings_paxchrysalia.5506.a:0 "Мир может быть таким §Cиным§!..."

changelings_paxchrysalia.6506.t:0 "Похмелье"
changelings_paxchrysalia.6506.d:0 "Яхс проснулся, когда он скатился с кровати и ударился головой о тумбочку. Выругавшись, он схватился за свою пульсирующую голову, прежде чем волна тошноты заставила его свернуться калачиком на полу. Прошло несколько минут, прежде чем его состояние улучшилось и только тогда он смог осторожно подняться на копыта. Его ноги дрожали, и Яхс прислонился к стене, чтобы не упасть, но в конце концов собрался с силами и вышел из спальни.\n\nОн прошел по короткому коридору на кухню, где увидел двух чейнджлингов: Финикуса, который сидел за кухонным столом и потирал голову, и Алкиппе, которая готовила еду на плите. Она обернулась, услышав, как Яхс тяжело опустился на стул у стола, и на её лице друг друга последовательно сменили удивление, облегчение и гневом. Нахмурившись, Алкиппе поставила магией тарелку и столовые приборы перед Яхсом, а затем положила туда яичницу-болтунью. — Доброе утро, генерал-майор, — коротко поздоровалась она. — Хорошо спалось?\n\n— Нет, — простонал Яхс, снова потирая голову. Он огляделся и понял, что не помнит, как добрался домой прошлой ночью. — А как я...?\n\n— Сегодня рано утром мы нашли вас с Финикусом, когда вы бродили по улицам в одиночестве, — сказала Алкиппе. — Каким-то образом вам удалось проскользнуть мимо егерей, охранявших это место. Вам ещё повезло, что мы нашли вас раньше всех членов сопротивления! О чем вы только думали, соглашаясь выпить этот напиток?!\n\n— Эй, потише, — прорычал Финикус, кладя голову на стол. — Не так громко, пожалуйста. О, моя бедная голова...\n\nПока Алкиппе свирепо смотрела на него, Яхс покачал головой. — Прости, что заставил тебя волноваться, Алкиппе, — извинился он. — Но ты же слышала, что я сказал. Будет очень хорошо, если мы привлечём общество на нашу сторону. Я просто сделал то, что должен был сделать, чтобы скрепить сделку.\n\nАлкиппе вздохнула. — Ладно, хорошо. Но на какое-то время вам обоим лучше не принимать любви. Мы не знаем, насколько сильна эта штука, и что она может сделать с вами. Последнее, что нам нужно, это чтобы губернатор Кантерлота стал наркоманом. — Она сняла фартук и отбросила его в сторону. — Мне нужно выпить, если я собираюсь играть в сиделку. Странно, что я не начала пить ещё раньше...\n\nОна ушла, оставив Финикуса и Яхса одних за столом. Они посмотрели друг на друга, вспоминая то, что пережили прошлой ночью, и Финикус заговорил. — Яхс... те чейнджлинги, которых мы видели... ты видел, что у них было на боках?\n\n — Знаки отличия, — ответил Яхс, хмуро смотря на свою тарелку. — И они так гармонично жили с пони..."
changelings_paxchrysalia.6506.a:0 "Что же это значит?"

changelings_paxchrysalia.7506.t:0 "Неприятная правда"
changelings_paxchrysalia.7506.d:0 "Нахмурившись, Яхс поставил бокал обратно и покачал головой. — Я должен отказаться, — сказал он, вставая. Он кивнул Глориосе, которая резко и недовольно нахмурилась. — А теперь, когда я знаю, что это общество полно единорогов-сторонников превосходства, боюсь, мне придётся его распустить. Вы - угроза для гегемонии, и я не могу позволить вам существовать.\n\n— Это та часть, где ваши головорезы выбивают двери и арестовывают нас всех? — Глориоса усмехнулась. Из-под стола появился пистолет, явно заставший Яхса врасплох. — Они не сумеют добраться сюда достаточно быстро, чтобы спасти твою жизнь.\n\nЯхс покачал головой. — Конечно, нет. Я отвечу на вашу любезность своей собственной. Сейчас я уйду, а на рассвете мои егеря ворвутся в это место. Я бы посоветовал вам всем исчезнуть к тому времени. — Он отвернулся и пошёл к двери, оставив Глориосу рычать от злости позади него. — Доброго вечера, Глориоса.\n\nОн почти ожидал, что единорожка выстрелит, когда он будет уходить, но ничего такого не последовало. Вместо этого Яхс открыл дверь и выскользнул наружу, обойдя припаркованную машину и направляясь к лестнице, ведущей на поверхность. Через несколько минут он уже был на улице, где его встретили егеря, а штабная машина увезла генерал-майора в безопасное место. Алкиппе уже была внутри, и когда Яхс сел рядом с ней, на её губах появилась облегченная улыбка. — Я на мгновение испугалась за вас, — сказала она. — Я уже была готова послать егерей пораньше.\n\n— Я рад, что ты так веришь в меня, — слегка поддразнил её Яхс. Затем он вздохнул и закрыл глаза, откинувшись на спинку сиденья. — Эти единороги так или иначе захотят нанести свой удар. Усиль охрану на ближайшие несколько недель, хотя бы до коронации королевы. именно тогда они, вероятно, попытаются действовать.\n\n— А почему бы просто не взять это место штурмом прямо сейчас? — Спросила Алкиппе. — Зачем давать им время бежать?\n\n— Потому что они не убили меня, — ответил Яхс. — Будем считать это знаком взаимного уважения. Кроме того, у нас будет больше шансов поймать их во время операции, чем во время штурма укрепленного наркопритона.\n\nПохоже, что Алкиппе это совсем не убедило, но она всё равно кивнула. — Как скажете, Яхс...\n\nКогда на следующее утро прибыли пять рот егерей, то наркопритон был пуст."
changelings_paxchrysalia.7506.a:0 "Похоже, что мы заработали себе ещё одного врага."

changelings_paxchrysalia.8506.t:0 "Рогатые друзья на важных должностях"
changelings_paxchrysalia.8506.d:0 "— О, генерал-майор! А я то всё гадал, когда же ты вернёшься.\n\nЯхс подскочил, закрывая дверь, и, оглянувшись, увидел Васпира Орн Кладисиума который не только сидел за его столом, но и задрал на него свои ноги. — Васпир... Я тебя не заметил, — нахмурившись, произнёс Яхс и отошёл от двери. — Чему я обязан честью наслаждать вашим присутствием здесь и сейчас?\n\n— Просто небольшое опасение, которое я хотел бы лично развеять, — сказал Васпир. Он взял стопку бумаг со стола Яхса и помахал ими, как огромным веером. — УОБВ отслеживает подозрительно большое количество гражданских должностей, передаваемых единорогам среднего статуса по всему Кантерлоту в последнее время, — сказал он. — На большинстве из этих назначений есть твоя подпись. Мне это показалось странным, так что я хотел бы услышать твои доводы.\n\nЯхс отмахнулся от этого. — Это мой город, Васпир. Когда я был назначен губернатором, то думал, что получил хотя бы некоторую автономию и теперь каждый приближенный к королеве чейнджлинг не будет сомневаться в моих действиях. Но если ты действительно хочешь знать, то эти единороги - коллаборационисты, и возвращение некоторых элементов гражданской жизни вроде открытия музеев и университетов под бдительным присмотром преданных нам пони позволит нам контролировать этот город лучше, чем с помощью одной только военной силы.\n\nВаспир на мгновение задумался, словно пытаясь найти в словах Яхса хоть малейший признак слабости, а потом махнул головой и встал. — Ну, если вы считаете так, генерал-майор... Я оставлю эксперта заниматься охраной Кантерлота. Но я хотел бы предостеречь тебя по поводу этих единорогов. УОБВ считает, что они связаны с какой-то ячейкой нежелательных элементов, действующих внутри города. Было бы опасно ставить их на один пьедестал с нами, чейнджлингами.\n\nЗатем он усмехнулся. — Но ты ведь уже и так знаешь это, верно?"
changelings_paxchrysalia.8506.a:0 "Я был бы плохим губернатором, если бы не был в курсе."

changelings_paxchrysalia.507.t:0 "Среди элиты общества"
changelings_paxchrysalia.507.d:0 "Яхс и Алкиппе прибыли на вечеринку через полчаса после её начала, так как такое опоздание считалось весьма модным. Оба чейнджлинга были одеты в свои лучшие парадные мундиры, как и подобало солдатам армии на вечеринке высшего общества Кантерлота - ну или того, что от него осталось. Большинство аристократов сбежали из Кантерлота, когда к нему вплотную подошла армия чейнджлингов, но оставшиеся мелкие дворяне и прочие светские львицы были более чем готовы занять эти освободившиеся места. Под бдительным присмотром своих чейнджлингов-оккупантов, конечно. Похоже, что для некоторых пони было важнее получить лучшее место за обеденным столом, чем сохранять патриотизм по отношению к своей стране.\n\nПросторный особняк, принадлежавший какому-то выскочке из знатного рода, чьё имя Яхс так и не удосужился запомнить, был полон пони и чейнджлингов Яхс с первого взгляда понял, что на вечеринке было полно инфильтраторов, превратившихся в самых богатых и привлекательных дворян, перед которыми заискивали и лебезили все остальные скучные и глупые гости, но Яхс не обращал на них внимания. Он хотел поговорить только с одной пони: со знаменитой виолончелисткой, игравший успокаивающую, хотя и мрачную мелодию в бальном зале особняка.\n\nОн ждал на почтительном расстоянии окончания выступления Октавии Мелоди, и только когда она отложила свой смычок, чейнджлинг подошёл к ней. — Прекрасная мелодия, — сказал Яхс, подходя ближе. — Теперь я понимаю, почему вы так прославились ещё до войны.\n\n— И во время неё, — добавила Октавия, избегая встречаться взглядом с Яхсом. Пони отвернулась к маленькому столику, на котором стояли стакан воды и тарелка с едой. — А теперь, когда все концертные залы закрыты, новое правительство внесло меня в чёрный список за то, что я помогала пропаганде Эквестрии. Так что мне приходится играть на таких маленьких вечеринках вроде этой. Кстати, спасибо вам за эту возможность.\n\nЯхс не позволил колкому замечанию задеть его; Октавия была всего лишь одной из многих пони, чьи жизни перевернула с ног на голову война. — Прискорбный побочный эффект мерзкого дела, которое мы называем войной, — сказал Яхс, пытаясь таким образом выразить сочувствие. — Именно поэтому я хочу поговорить с вами. У меня есть предложение, которое, как мне кажется, пойдет на пользу нам обоим."
changelings_paxchrysalia.507.a:0 "..."

changelings_paxchrysalia.8507.t:0 "Блюз военнопленных"
changelings_paxchrysalia.8507.d:0 "— Я хочу, чтобы вы сыграли на великой коронации королевы Кризалис в Кантерлоте, — озвучил своё предложение Яхс. — Её Величество заслуживает того, чтобы величайшие музыканты всего Эквуса были на её коронации, где она станет королевой как Ульев, так и Эквестрии. Вы были одной из лучших. — Заметив равнодушное выражение лица Октавии, Яхс нахмурился и переступил с ноги на ногу. — Вам щедро заплатят...\n\n— Нет. — Октавия бросила сердитый взгляд на генерал-майора. — Я не буду ничего играть ни для вас, ни для вашей королевы. Моё сердце принадлежит Эквестрии, а не вашим проклятым Ульям. И даже если бы я захотела играть, то я знаю, что нужна вам не потому, что являюсь лучшей. Вы хотите меня, потому что я - символ прошлой Эквестрии. Вы хотите опутать верёвками мои копытам и заставить танцевать меня перед всем миром в качестве вашей марионетки. Это всё не более чем политика, и я ценю свои убеждения больше жизни. И я отказываюсь быть марионеткой, танцующей под дудку иной марионетки.\n\nПока Яхс пытался подобрать ответ, Алкиппе ощетинилась и шагнула вперед. — Боюсь, что у вас нет выбора, — прямо сказала она кобыле. — И вы обязаны проявлять больше уважения к генерал-майору.\n\n— Оберстлейтенант, — предостерег Яхс свою подчинённую, качая головой. Затем он снова повернулся к Октавии. — Но всё таки она права. Это не предмет обсуждений. Я здесь из вежливости, чтобы обсудить компенсацию за оказанные услуги. Поймите, другие чейнджлинги на моём месте посадили бы вас на цепь и заставили играть, ничего не дав взамен.\n\nПрошло несколько мгновений, прежде чем Октавия ответила. — Плати мне сколько хочешь. Это не та компенсация, которую я хочу. Я хочу две вещи. Во-первых, я хочу, чтобы Сапфир Шорс разрешили провести концерт для военнопленных эквестрийцев, которых, как я знаю, вы всё ещё держите в лагерях. Она, как и я, стала персоной нон грата и концерт поможет как ей, так и этим военнопленным. А во-вторых... — Она заколебалась, как будто не была уверена, стоит ли вообще озвучивать такую просьбу. — Не устраивайте парад военнопленных, который, как я знаю, вы планируете для коронации Кризалис. Проявите хоть немного милосердия, если оно вообще есть у чейнджлингов. Эквестрия уже повержена и сломлена; сколько ещё вы собираешься втаптывать нас в грязь?\n\nЭто застало Яхса врасплох. — Как вы вообще узнали про это? Парад должен быть тайной.\n\n— Вы бы удивилась, узнав, что можно услышать на вечеринках вроде этой, — сказала Октавия. Затем она взяла смычок и приложила его к струнам виолончели, готовясь начать играть следующую мелодию. — Пожалуйста, пересмотрите ваш план парада. И помогите Сапфир Шорс. Сделайте всё это, и я проведу своё выступление в день коронации."
changelings_paxchrysalia.8507.a:0 "Концерт для военнопленных никому не повредит."
changelings_paxchrysalia.8507.b:0 "Последнее, что нам нужно, так это давать сломленным пони ложную надежду."

changelings_paxchrysalia.508.t:0 "Концерт за колючей проволокой"
changelings_paxchrysalia.508.d:0 "Автобус прибыл ровно в девять утра, привезя Сапфир Шорс, Октавию Мелоди и прочих пони, которые должны были участвовать в концерте, а также их оборудование. Яхс и Алкиппе наблюдали за происходящим с балкона кабинета начальника тюрьмы, а позади них резко вздымалась гора Кантерхорн. У стен тюрьмы были выставлены дополнительные часовые, и двое солдат стояли у пулемёта, смотревшего на двор внизу, готовые открыть огонь в любой момент.\n\nВ одном конце двора была построена грубая сцена из дерева и стали, а напротив неё собрались военнопленные. Многие пони были покрыты шрамами и синяками, появившимися от стычек с их охранниками, а некоторые были очень худыми, практически истощенными. Но когда Сапфир и Октавия начали своё страстное и живое представление, то пони переменились: как будто часть энергии исполнительниц была поглощена самими заключенными, и у тех впервые за многие месяцы, а то и годы, появилась причина улыбнуться.\n\nКогда концерт закончился и охранники постепенно разогнали пленников по баракам, Яхс и Алкиппе спустились вниз, чтобы повидаться с Октавией. Виолончелистка только что закончила сердечно обнимать Сапфир Шорс, и даже когда она повернулась к Яхсу, то не смогла полностью избавиться от улыбки. — Благодарю вас за предоставленную возможность, генерал-майор, — сказала Октавия. — Этот концерт очень многое значил для заключенных. Может быть, вы не так уж и плохи... для чейнджлинга.\n\nЯхс слегка усмехнулся в ответ. — В последнее время я часто об этом слышу, хотя и не уверен, верю ли в это. Но возможно, что в этом есть доля правды.\n\n— Возможно, — согласилась Октавия. Затем она оглядела Яхса с ног до головы. — Надеюсь, вы не пытаетесь подлизываться ко мне, генерал-майор. Вы же знаете, что я жената на своей музыке.\n\nАлкиппе закатила глаза и встала между Яхсом и Октавией. — Знаешь, мы всё же не всегда охотимся за любовью. Генерал-майор лишь хочет поступить правильно со всеми нами: как чейнджлингами, так и пони.\n\n— Это была шутка, — сказала Октавия, слегка отступая назад. Затем она склонила голову. — Надеюсь, что сегодняшний день открыл вам глаза, генерал-майор. Подумайте о том, о чём я говорила чуть раньше - о параде. Если вы действительно пытаетесь поступать правильно...\n\nВторую часть этого предложения не обязательно было произносить вслух."
changelings_paxchrysalia.508.a:0 "Я подумаю об этом, обещаю."

changelings_paxchrysalia.509.t:0 "Позолоченные цепи"
changelings_paxchrysalia.509.d:0 "Коммандант Секонд Винд почувствовал, как у него мурашки бегут по коже, когда он бродил от стола к столу на званом вечере, ища хоть что-нибудь, что поможет скоротать время, пока ему не разрешат вернуться домой. Его беспокоила отнюдь не парадная форма, хотя эта новая форма кантерлотской гвардии была одной из самых неудобных, которые он когда-либо носил. Его, скорее, беспокоила сама цель этого званого вечера: вечеринка в честь предстоящего уничтожения Школы Одаренных Единорогов имени Селестии, на которой присутствовали все важные чейнджлинги, а также коллаборационисты-пони, старающиеся произвести хорошее впечатление на своих новых хозяев. Если бы у Секонд Винда был выбор, то его бы здесь не было, но как коммандант кантерлотской гвардии, он обязан был присутствовать на этом мероприятии.\n\nВечеринка и так была едва выносимой, но тут генерал-чейнджлинг подошла поприветствовать его. — Коммандант, — сказала генерал с отвратительной ухмылкой на своей клыкастой морде. — Рада видеть вас здесь. Всегда приятно видеть, как разумные пони извлекают максимум возможного в своём новом положении в жизни.\n\nСеконд Винд смог найти достаточно профессионализма, чтобы приветствовать генерала должным образом. — Генерал Актия, — сказал он, быстро вспоминая имя чейнджлинга. — Я тоже рад вас видеть, мэм. Надеюсь, у вас всё хорошо.\n\n— Лучше, чем когда-либо, — рассмеялась генерал Актия. — Хотя я, конечно, мечтаю об азарте войны. Мир - чудное дело. Скажи, как думаешь, мы когда-нибудь встречались на поле боя?\n\nОна усмехнулся и помахала пони, не дожидаясь ответа Секонд Винда. — Вы случайно не знаете Виндбрейк? Она тоже была солдатом во время войны. И я думаю, что она также была частью вашей королевской гвардии.\n\nСеконд Винд удивленно моргнул, когда встретился глазами с Виндбрейк. Кобыла сражалась вместе с ним на войне, но была захвачена в плен во время эвакуации из Бэйлса. Он думал, что она умерла... — Мы... наши пути пересеклись, — сказал Секонд Винд, кивнув пегаске, которая склонила голову. — Я рад видеть, что у неё всё хорошо.\n\n— Теперь, когда я взяла её под своё крылышко в качестве личной служанки, дела у неё идут лучше, чем когда-либо прежде. — Генерал Актия положила своё тонкое крыло на спину Виндбрейк, и Секонд Винд заметил, как кобыла подавила дрожь. Затем генерал вежливо приподнял свою шляпу. — Ну, мне пора. Продолжайте делать свою хорошую работу. Ты - вдохновение для таких пони, как Виндбрейк.\n\nГенерал повернулась и ушла, прихватив с собой Виндбрейк. Кобыла смотрела на Секонд Винда умоляющими глазами. Секонд Винду оставалось лишь смотреть, как она уходит, а медали на его мундире стали тяжелыми позолоченными цепями."
changelings_paxchrysalia.509.a:0 "Чейнджлинги превращают моих друзей в рабов, а я могу лишь улыбаться..."

changelings_paxchrysalia.510.t:0 "Вторые шансы"
changelings_paxchrysalia.510.d:0 "Секонд Винд решил пообедать в городе, а не в своем офисе в тот день. После тяжелого дня, когда он вовсю тренировал новобранцев и скармливал им пропаганду чейнджлингов, Винду нужно было ненадолго отвлечься от всего этого. И поэтому пегас полетел на один из нижних уровней Кантерлота, чтобы посетить один из его любимых баров. Хорошо, что жуки были слишком озабочены тем, чтобы верхние уровни выглядели красиво и презентабельно, так что они не беспокоили владельцев малого бизнеса внизу. И их дырявые копыта не добрались до того, чтобы конфисковать закусочную у владельца и отдать её начинающим предпринимателям-чейнджлингам.\n\nОн зашёл внутрь и сел, приветствуя хозяев, которых хорошо знал ещё с довоенных лет. Ему не нужно было брать меню; Свит Соти и её муж знали наизусть его обычный заказ. Он просто сидел у окна и смотрел, потягивая воду из стакана, как пони бродят по улицам.\n\n— Не возражаешь, если я присоединюсь к тебе? — Незнакомка улыбнулась, стоя рядом со стулом напротив него. Секонд Винд не узнал её, и не был уверен, что хочет говорить с кем-либо ещё, но она была крайне хорошенькой. Когда в последний раз хорошенькая кобыла приглашала его на ланч?\n\n— Конечно, — сказал он, указывая на стул. Когда пони села, он приподнял бровь и изобразил легкую улыбку, пытаясь вернуть себе хоть немного того обаяния, которым он так славился в колледже. — Я весь день ждал, чтобы хорошенькая кобылка заняла это место. Могу ли я узнать твоё имя?\n\nКобыла откинула назад свою гриву и наклонилась вперед. — Зови меня Блубелл, Секонд Винд. — Жеребец моргнул от удивления от того факта, что она знает его имя, но Блубелл продолжала. — Я уже давно хотела с тобой поговорить... ну, пони, с которыми я работаю. Твоё назначение коммандантом кантерлотской гвардии позволит тебе подобраться к чейнджлингам гораздо ближе, чем к любому иному пони в городе. Идеально, если, скажем, кто-то захочет что-то сделать с королевой чейнджлингов, которая планирует посетить город через пару недель.\n\nСеконд Винд нахмурился. — Тебе не следует говорить о таких вещах, — предупредил он её. — Мой долг - останавливать сопротивление, где бы я его ни обнаруживал\n\n— Долг перед твоими хозяевами-чейнджлингами, конечно, — сказала Блубелл. Потом положила перед ним на стол визитку и встала. — Но если у тебя есть хоть какой-то долг перед своей страной...\n\nОна подмигнула ему и исчезла, взмахнув хвостом. Секонд Винд поднял визитку, которую она оставила, и нахмурился. Её прощальные слова всё ещё звучали в ушах, пока он смотрел на написанный на ней номер телефона. Был ли он собакой, верно служившей хозяину, или невольным рабом режима... как Виндбрейк?"
changelings_paxchrysalia.510.a:0 "Неужели бой действительно проигран, если ещё есть пони, готовые выйти на ринг?"

changelings_paxchrysalia.8510.t:0 "Вторые шансы"
changelings_paxchrysalia.8510.d:0 "Секонд Винд решил пообедать в городе, а не в своем офисе в тот день. После тяжелого дня, когда он вовсю тренировал новобранцев и скармливал им пропаганду чейнджлингов, Винду нужно было ненадолго отвлечься от всего этого. И поэтому пегас полетел на один из нижних уровней Кантерлота, чтобы посетить один из его любимых баров. Хорошо, что жуки были слишком озабочены тем, чтобы верхние уровни выглядели красиво и презентабельно, так что они не беспокоили владельцев малого бизнеса внизу. И их дырявые копыта не добрались до того, чтобы конфисковать закусочную у владельца и отдать её начинающим предпринимателям-чейнджлингам.\n\nОн зашёл внутрь и сел, приветствуя хозяев, которых хорошо знал ещё с довоенных лет. Ему не нужно было брать меню; Свит Соти и её муж знали наизусть его обычный заказ. Он просто сидел у окна и смотрел, потягивая воду из стакана, как пони бродят по улицам.\n\n— Не возражаешь, если я присоединюсь к тебе? — Незнакомка улыбнулась, стоя рядом со стулом напротив него. Секонд Винд не узнал её, особенно в надетой маске, и не был уверен, что хочет говорить с кем-либо ещё, но она была крайне хорошенькой. Когда в последний раз хорошенькая кобыла приглашала его на ланч?\n\n— Конечно, — сказал он, указывая на стул. Когда пони села, он приподнял бровь и изобразил легкую улыбку, пытаясь вернуть себе хоть немного того обаяния, которым он так славился в колледже. — Жаль, что такой хорошенькой кобылке, как тебе, приходится прятать лицо. Могу ли я узнать твоё имя?\n\nКобыла откинула назад свою гриву и наклонилась вперед. — Зови меня Глориоса, Секонд Винд. — Жеребец моргнул от удивления от того факта, что она знает его имя, но Глориоса продолжала. — Я уже давно хотела с тобой поговорить. Твоё назначение коммандантом кантерлотской гвардии позволит тебе подобраться к чейнджлингам гораздо ближе, чем к любому иному пони в городе. Идеально, если, скажем, кто-то захочет что-то сделать с королевой чейнджлингов, которая планирует посетить город через пару недель.\n\nСеконд Винд нахмурился. — Тебе не следует говорить о таких вещах, — предупредил он её. — Мой долг - останавливать сопротивление, где бы я его ни обнаруживал.\n\n— Долг перед твоими хозяевами-чейнджлингами, конечно, — сказала Глориоса. Потом положила перед ним на стол визитку и встала. — Но если у тебя есть хоть какой-то долг перед своей страной...\n\nОна подмигнула ему и исчезла, взмахнув хвостом. Секонд Винд поднял визитку, которую она оставила, и нахмурился. Её прощальные слова всё ещё звучали в ушах, пока он смотрел на написанный на ней номер телефона. Был ли он собакой, верно служившей хозяину, или невольным рабом режима... как Виндбрейк?"
changelings_paxchrysalia.8510.a:0 "Неужели бой действительно проигран, если ещё есть пони, готовые выйти на ринг?"

changelings_paxchrysalia.511.t:0 "Не мы разожгли пламя"
changelings_paxchrysalia.511.d:0 "Грузовик за грузовиком с самого рассвета подъезжали к закрытой ставнями школе, выстраивались во дворе и ждали, пока в них не загрузят все ценности из здания. Секонд Винд и кантерлотская гвардия прибыли вскоре после этого, чтобы удержать любопытную толпу от приближения к школе. Его солдаты выстроились полукругом вокруг Школы Одарённых Единорогов имени Селестии, когда чейнджлинги избавляли здание от всех ценностей. Жуки выносили научное оборудование, исследовательские работы и магические артефакты, упакованные в картонные коробки и загружали их в ожидающие грузовики. Один за другим грузовики отъезжали, вывозя украденные из школы ценности. А когда не осталось ничего особо важного, королевская стража вытащила из здания всё, что не было прибито. Они ободрали всё, вплоть до самого последнего кусочка позолоты со стен. Вскоре некогда величественное здание выглядело не более чем обветшалой развалиной.\n\nТогда-то на сцене и появились огнемёты.\n\nСеконд Винд стиснул зубы, когда его солдаты делали всё возможное, чтобы сдержать разъяренную и испуганную толпу, когда солдаты королевской гвардии подожгли здание изнутри и снаружи. Ярко-оранжевое пламя взметнулось высоко в небо, и из окон полетел пепел, который начал образовывать в небе ядовитые облака. А затем затрещали опорные колонны, по вековой каменной кладке побежали трещины и школа сложилась как карточный домик, выбрасывая угли и обломки высоко в небо, как душа, покидающая тело на своём пути к загробной жизни.\n\nТолпа перестала сопротивляться, и Секонд Винд смог увидеть ужас в их глазах. Кто-то сзади зарыдал, и всхлипывания пони резко контрастировали с радостными возгласами и смехом чейнджлингов, плюющих на пепел рухнувшего здания. Пони Эквестрии потеряли ещё один кусочек своей истории и нации из-за действий чейнджлингов - и Секонд Винд стоял в неправильной толпе.\n\nКогда в тот вечер Секонд Винд, наконец, вернулся домой, он открыл ящик тумбочки и достал оттуда визитную карточку. Затем, взяв трубку телефона одним крылом, он вторым начал набирать номер."
changelings_paxchrysalia.511.a:0 "..."

changelings_paxchrysalia.512.t:0 "Этот день будет идеальным"
changelings_paxchrysalia.512.d:0 "Оберстлейтенант Алкиппе стояла в богато украшенном тронном зале кантерлотского дворца, пока пегасы и единороги усердно трудились, расставляя по всему залу украшения для предстоящей коронации королевы Кризалис. Последние несколько дней были полны очень бурной деятельности, да и следующие, вероятно, будут такими же. Алкиппе держала своей магией контрольный список и вычёркивала в нём ещё один пункт, пока пони заканчивали расставлять украшения. Это было легко сделать. Стоит надеяться, что и со всем остальным также не возникнет особых проблем.\n\nОна просмотрела список, развернулась и пошла обратно в свой кабинет. Алкиппе позаботилась о том, чтобы разослать приглашения остаткам знати Кантерлота, а также некоторым светским деятелям и коллаборационистам, которые играли важную роль в поддержании мира в городе. Повсюду была выставлена охрана, и каждое здание вдоль маршрута парада проверялось солдатами армии на тот случай, если в нём скрывались агенты сопротивления или пони, сочувствующие партизанам. Для охраны королевы во время парада был выделен отряд телохранителей, отобранных из наиболее талантливых коллаборационистов и перебежчиков, дабы показать, как сильно королева любима Эквестрией. А Секонд Винд и его кантерлотская гвардия будут стоять в почётном карауле.\n\nАлкиппе засунула свой список обратно в карман и, напевая себе под нос, пошла дальше. Всё пока шло гладко. Теперь чейнджлинги наконец-то смогут отомстить за поражение 1002 года. Тот день не был идеальным, но этот будет.\n\nОна была уверена в этом. "
changelings_paxchrysalia.512.a:0 "Что может пойти не так?"

changelings_paxchrysalia.513.t:0 "Одно последнее унижение?"
changelings_paxchrysalia.513.d:0 "— После того как королевская процессия пройдет по городу, Кризалис поднимется на трибуну тут, в королевском дворце, где и будет наблюдать за остальной частью парада, — сказал генерал-майор Яхс, обводя копытом маршрут парада. Другие генералы верховного командования армии, а также прочие высокопоставленные чиновники из королевской гвардии внимательно наблюдали за происходящим. — первыми пройдут полки королевской гвардии, которые завершат свой марш и расположатся на площади вокруг нашей королевы. Как только всё увидят её стойких защитников, пройдут егеря армии и сопровождающие их бронетанковые полки. Затем хайвсмаршал Триммель произнесёт свою речь, а Кризалис будет коронована императрицей Кантерлота и близлежащих земель, после чего она произнесёт свою собственную речь. Королевские фанфары от Октавии Мелоди, аплодисменты, пролёт авиации, а потом всё закончится. Вопросы?\n\nГенералы-чейнджлинги отрицательно покачали головами и пробормотали слова своего согласия. За исключением одного. — А как насчёт военнопленных, генерал-майор? — Спросил Ласин Кардо. — Вы же знаете, что Её Величеству было бы приятно увидеть, как эти грязные негодяи корчатся в цепях перед ней. Это будет просто вишенкой на торте.\n\nЯхс нахмурился. — Военнопленные пройдут впереди танков, — сказал он. — Я надеюсь, что вида побеждённых пони, которых гонят перед нашими металлическими монстрами, сломившими Эквестрию, будет достаточно, чтобы порадовать королеву.\n\n— Конечно, — согласился Ласин, самодовольно улыбаясь. — И это даст нам повод для гордости. Я не могу дождаться, чтобы увидеть это.\n\nВскоре после этого чейнджлинги разошлись, чтобы подготовиться к предстоящей коронации, оставив Яхса с его планами парада. Он нахмурился, глядя на свои записи и думая о марше военнопленных. Октавия умоляла его отменить всё это... но может ли он сделать такое? Можно ли внести такое изменение в последнюю минуту? Но лучше задать правильный вопрос... а должен ли он?\n\nПакс Кризалия была лишь жестоким унижением для пони Эквестрии. Сапог чейнджлинга никогда ещё не стоял так крепко на их шеях, как в последнее время. Вид некогда гордых эквестрийцев, которые сейчас пройдут через Кантерлот в качестве истощенных военнопленных, был бы последним оскорблением для побежденного населения.\n\nСможет ли Пакс Кризалия пережить ещё одно оскорбление от оккупантов-чейнджлингов?"
changelings_paxchrysalia.513.a:0 "Эта часть парада должна быть отменена."
changelings_paxchrysalia.513.b:0 "Это последнее оскорбление должно заставить пони осознать своё место раз и навсегда."

changelings_paxchrysalia.514.t:0 "Недостающий фрагмент"
changelings_paxchrysalia.514.d:0 "Оберстлейтенант Алкиппе пересмотрела расписание парада ещё раз, когда солдаты уже готовились к маршу через Кантерлот под взором своей королевы. Все уже отметились: от фанатиков из Королевской Гвардии до пони-коллаборационистов из Кантерлотской Гвардии. За исключением одного ключевого пони. Алкиппе нахмурилась, когда поняла, что Секонд Винд так и не отметился, а Кантерлотской Гвардии вряд ли могла пройтись маршем без своего командира. Возможно, что-то задержало его? Было бы разумно пойти и проверить.\n\nАлкиппе передала свой контрольный список лейтенанту и взяла с собой маленькую портативную рацию. — Проследите за тем, чтобы парад начался вовремя, — приказала она лейтенанту, отправляясь в путь. — Ничто не должно выбиться из графика. — Затем Алкиппе отправилась осматривать казармы в поисках Секонд Винда.\n\nОна много где была, но так и не нашла пегаса. Его не было ни в своей квартире, ни в офисе... Вообще нигде в комплексе. Алкиппе нахмурилась и уже собралась было вернуться, когда заметила, что тяжелая дверь в тюремный блок слегка приоткрыта. Сгорая от любопытства, чейнджлинг распахнула дверь и проскользнула внутрь. — Коммандант? — спросила она, услышав впереди какой-то шум. — Вы здесь?\n\nОна завернула за угол и остановилась. Перед ней стояли двое пони: Секонд Винд и кобыла по имени Блубелл, арестованная несколько дней назад за сговор с сопротивлением. У Секонд Винда на груди было что-то весьма похожее на жилет с взрывчаткой, и Блубелл только что закончила закреплять это на нём. Все трое потрясенно посмотрели друг на друга несколько мгновений, прежде чем резко начали действовать.\n\nБлубелл потянулась за своим пистолетом, лежащим на столе позади неё, но Алкиппе уже успела выхватить свой и сделать несколько быстрых выстрелов. Пули мгновенно убили партизанку на месте, но за это время Секонд Винд выпрыгнул в ближайшее окно и исчез в открытом небе. Алкиппе выругалась, зная, что никогда не сможет поймать пегаса в воздухе, и потянулась за рацией."
changelings_paxchrysalia.514.a:0 "Подкрепление! Мне нужно подкрепление! Секонд Винд - предатель!"

changelings_paxchrysalia.515.t:0 "Признания"
changelings_paxchrysalia.515.d:0 "Парад должен был вот-вот начаться, но у Яхса ещё оставалось немного времени для быстрого перекуса. Он знал, что маршировать на пустой желудок, а потом ещё часами наблюдать за войсками - не самая разумная затея, генерал-майор ушёл на столь необходимый ему обеденный перерыв, чтобы успокоиться перед бурей и подготовиться к предстоящему параду. Но даже тогда его смогли отыскать дела, когда пара солдат поспешно ворвалась в его кабинет после быстрого стука в дверь.\n\n— Лучше бы самой королеве быть в опасности, а иначе вам несдобровать, — прорычал Яхс, откладывая сэндвич в сторону. — В чём дело?\n\n— Пони утверждает, что у неё есть какая-то важная информация, но она будет говорить только с вами, — сказал один из солдат. — Она утверждает, что является... или же была членом Сопротивления... Это Октавия Мелоди, сэр.\n\nЯхс почувствовал себя так, будто получил пощёчину. — Октавия? — недоверчиво переспросил он. Потом встал, позабыв про свой обед. — Отведи меня к ней. Сейчас же.\n\nЧерез несколько минут он вошёл в комнату для допросов, где за голым столом сидела Октавия. Яхс даже не стал дожидаться, пока за ним закроется дверь, и стал сразу задавать вопросы. — Сейчас мне всё равно, состоишь ли ты в сопротивлении или нет. Что ты хотела мне сказать?\n\nОктавия посмотрела на Яхса и кивнула. — Отколовшаяся ячейка сопротивления в Кантерлоте хочет убить королеву Кризалис, — сказала кобыла. — Несмотря на желания остальных членов Сопротивления, радикалы хотят взорвать бомбу во время парада. Ваш собственный капитан кантерлотской гвардии собирается лично доставить бомбу.\n\nЯхс ошеломленно заморгал. — Секонд Винд? Ты... откуда ты это знаешь? И зачем мне это говорить?\n\n— Это не важно, — сказала Октавия, качая головой. — Важно лишь то, что сейчас к пони в Кантерлоте терпимо относятся, во многом благодаря именно вашим усилиям, но убийство королевы чейнджлингов лишь ухудшит ситуацию. Никаких репрессий не будет; если королевская гвардия будет мстить за свою королеву, то они прибегнут к массовому геноциду. — Октавия перегнулась через стол. — Делай со мной что хочешь, но ты должен остановить это ради всех нас.\n\nЯхс топнул копытом и выругался. — Я позабочусь об этом, — сказал он, резко развернувшись и направляясь к двери. — А ты вернись и приготовься играть, как мы и договаривались прежде!"
changelings_paxchrysalia.515.a:0 "Мы теряем драгоценное время!"

changelings_paxchrysalia.516.t:0 "Стадии Апокалипсиса"
changelings_paxchrysalia.516.d:0 "Яхс в считанные минуты приказал отрядам егерей распределиться по Кантерлоту для поисков Секонд Винда и бомбы, предназначенной для королевы. Сам Яхс тоже взлетел в воздух, отказавшись от участия в ранней стадии парада. Он бы полностью отменил его, но королева Кризалис уже выехала, и он не думал, что она остановится, даже если будет знать о грозящей ей опасности. Всё это было бы лишь пустой тратой драгоценного времени, так что теперь его единственной надеждой было найти Секонд Винда, пока не стало слишком поздно.\n\nКраем глаза Яхс заметил фигуру на вершине ближайшей колокольни, и тут же изменил курс. Он взлетел на вершину башни и одним движением выхватил пистолет, нацелив его на пегаса. — Секонд Винд! — Крикнул Яхс, заставив пегаса подпрыгнуть и обернуться. Два солдата встретились взглядами. Они находились на противоположных концах башни, и лишь большой медный колокол разделял их. — Не делай этого, — настаивал Яхс. — Что бы ты ни пытался сделать, тебе это не удастся.\n\nСеконд Винд заметно дрогнул, когда ответил. — Чейнджлинги слишком долго угнетали пони! — крикнул он в ответ с яростью и болью в голосе. — Вы пришли и забрали у нас всё, а когда и этого оказалось недостаточно, то превратили нас в рабов! Виндбрейк, кобыла, из королевской гвардии, которая когда-то была героем, теперь стала личной рабыней какой-то генеральши жуков, которая теперь может поступать с ней, как ей заблагорассудится! Эгоистичные завоевания вашей порочной королевы и презрение ко всему моему роду принесли Эквестрии такие беды и страдания, которых она ещё никогда не знала!\n\nОн коснулся копытом жилета с бомбой, надёжно закрепленного на его теле. — И я собираюсь остановить это, — крикнул Секонд Винд дрожащим от боли голосом. — Мне всё равно, что со мной будет, но она должна умереть. Она должна умереть ради свободы Эквестрии."
changelings_paxchrysalia.516.a:0 "Колокола начинают звонить..."

changelings_paxchrysalia.517.t:0 "Победа в поражении" ## Red Ending ##
changelings_paxchrysalia.517.d:0 "Яхс рискнул сделать ещё один шаг и когда Секонд Винд не дрогнул, сделал ещё один шаг, а потом и ещё. Он преодолел половину расстояния между ними, прежде чем придумал что сказать. — Ты лишь ухудшишь положение пони в Эквестрии, Секонд Винд, — сказал Яхс. — Королева Кризалис слишком поглощена собой, чтобы когда-либо обращать внимание на всё остальное. У неё хватает жестоких капризов и несбыточных фантазий, но покажи ей что-нибудь другое, чтобы отвлечь её, и королеву можно отговорить от этих идей. — Он указал на улицу внизу, где процессия медленно приближалась к колокольне. — Помнишь, я говорил тебе, что надо использовать всё, что у нас есть? Работать внутри системы и пытаться внести какие-то небольшие изменения? Я отменил парад военнопленных. Я знаю, что для пони по всей Эквестрии это было бы просто унизительно. Поэтому я использовал свои полномочия губернатора Кантерлота, чтобы положить этому конец. Я не стал говорить королеве, что это нарушит права пони или вызовет больше проблем. лучше просить прощения, чем разрешения. Я смогу изменить ситуацию, используя своё положение. Не всякое изменение должно происходить через насильственную революцию.\n\nОн сделал ещё несколько шагов вперед и положил копыто на плечо Секонд Винда. — Убийство Кризалис приведёт лишь к жестоким и суровым репрессиям со стороны королевской гвардии. Их будет далеко не так легко отвлечь, и они будут тратить каждое своё мгновение на месть пони. Мы не можем этого допустить, так что Кризалис должна жить. И вместе мы сможем использовать наши посты, чтобы сдержать худшие из её эксцессов, чтобы они не причиняли вреда вашему виду.\n\nСлёзы потекли по лицу Секонд Винда, и спустя практически вечность, он опустил голову. — Ты прав, — простонал он. — Просто я... так разозлился... мир не должен быть таким жестоким.\n\n— Не должен быть, — согласился Яхс. — И мы можем внести свою лепту, чтобы сделать мир менее опасным. А теперь пошли. Давай снимем с тебя эту штуку и вернемся на парад. Если мы поторопимся, то всё будет как и прежде."
changelings_paxchrysalia.517.a:0 "Одно существо не может изменить мир, но нескольким существам, работающим вместе, это по силам."

changelings_paxchrysalia.518.t:0 "Пакс Кризалия Магнифика" ## Red Ending ##
changelings_paxchrysalia.518.d:0 "Только когда Яхс понял, что стоит позади Кризалис перед королевским дворцом, его сердце, наконец, перестало бешено биться. Он не был уверен, что сможет остановить Секонд Винда на колокольне, но был рад, что пегас наконец-то прислушался к голосу разума. И было совершенно невозможно сказать, что этот пегас, ведущий процессию кантерлотских гвардейцев перед королевой Кризалис, совсем недавно хотел взорвать бомбой себя вместе с королевой.\n\nОстальная часть парада была совсем размытой для измученного чейнджлинга. Маршировали солдаты, катились танки, над головами ревели самолеты, а чейнджлинги из верховного командования по очереди произносили свои речи. Сам Яхс, как губернатор Кантерлота, должен был произнести свою собственную речь, и когда пришло время, он поднялся на трибуну и вытащил из внутреннего кармана пиджака пару сложенных бумажек. Затем, откашлявшись, он обратился к собравшимся чейнджлингам и пони, и его голос гулко разносился по площади.\n\n— Граждане Кантерлота, солдаты армии и все прочие, кто почтил нас своим присутствием здесь и сегодня, — начал он, оглядывая толпу. — Это было трудным путешествием, чтобы добраться до сегодняшнего дня. Нам пришлось делать нелёгкие выборы. Нам пришлось делать рискованные выборы. Мы упорно сражались, чтобы завоевать Эквестрию, и ещё упорнее, чтобы удержать её. Но мы справились. И сегодня наша великая королева получит свою законную корону и станет императрицей. Но это было бы невозможно без тяжёлой работы как пони, так и чейнджлингов, которые вместе сделали "Пакс Кризалия" действительно мирной. Нам предстоит ещё немало работы, и мы по-прежнему сталкиваемся как с внутренними, так и с внешними угрозами, но есть одна вещь, которую я знаю наверняка: мы преодолели самые тёмные времена. И теперь как пони, так и чейнджлинги, могут начать работать, чтобы приблизить наступление более светлых времён.\n\nЗатем он повернулся к королеве Кризалис и низко поклонился. — Да здравствует императрица Кризалис, истинная хранительница "Пакс Кризалии"!\n\nПоследовали громовые аплодисменты в честь Кризалис, и Яхс отступил в сторону, чтобы позволить королеве получить её новую корону. И когда королева подняла её с атласной подушки своей магией, весь мир понял, что поражение 1002 года, наконец-то, было отомщено."
changelings_paxchrysalia.518.a:0 "Да здравствует императрица!"

changelings_paxchrysalia.519.t:0 "Развязка" ## Red Ending ##
changelings_paxchrysalia.519.d:0 "Было уже далеко за полночь, когда празднества, связанные с коронацией Кризалис, наконец закончились. Яхс очень устал. Прилив адреналина после того, как он нашёл Секонд Винда перед парадом, давно покинул Яхса, а исполнение желаний императрицы Кризалис в последующие часы крайне опустошило его. Яхсу крайне хотелось забраться в постель и уснуть, но светила полная луна и была безоблачная ночью, так что он чувствовал себя просто обязанным провести несколько последних минут, любуясь сонным городом, прежде чем лечь спать.\n\nВыйдя на балкон, Яхс понял, что не одному ему пришла такая идея. Алкиппе, Марсилио, Финикус и даже Секонд Винд были там, тихо разговаривая и любуясь ночным небом. Их болтовня прекратилась, когда они услышали звук открытия двери, хотя и улыбнулись ему, когда тот закрыл дверь за собой. — Наслаждаетесь ночью? — спросил он трёх чейнджлингов (и одного пегаса).\n\n— Приятно немного побыть в тишине и покое, — сказала Алкиппе, а затем посмотрела в сторону пегаса, который опустил голову. — Мы только что разговаривали с Секонд Виндом. Он рассказал нам о том, что произошло.\n\n— Теперь это в прошлом, — сказал Марсилио. — И знание об этом не должно покинуть этот балкон. Это в интересах каждого из нас.\n\n— Хотя взорвать Кризалис было бы довольно забавно, — усмехнулся Финикус. Но потом он покачал головой. — Я просто шучу. Хорошо, что всё закончилось именно так, как закончилось. Это наилучший исход для всех нас.\n\nЯхс кивнул, присаживаясь с краю. — Это было долгое путешествие, но я рад, что оно закончилось, — сказал он, прислонившись спиной к стене и глядя на звезды над головой. — Так или иначе, мы сделали это, и это всё, о чём нас только можно было попросить. И мы можем попытаться сделать мир немного лучше, шаг за шагом.\n\n— Это всё, на что мы только можем надеяться, — сказал Секонд Винд. — Может быть, когда-нибудь пони и чейнджлинги будут равны.\n\n— Однажды, — сказал Яхс. — Я в этом уверен. Пока мы все работаем, чтобы сделать это действительностью."
changelings_paxchrysalia.519.a:0 "И мы сделаем это."

changelings_paxchrysalia.520.t:0 "Блаженны кроткие" ## Blue Ending - POW Parade ##
changelings_paxchrysalia.520.d:0 "Яхс осторожно сократил пространство между собой и Секонд Виндом, крепко держа пистолет в своей магической хватке. — Ты лишь ухудшишь положение пони, если убьешь её, — предупредил он пегаса. — Кризалис больше интересует личное удовлетворение, чем жестокость. И её всегда можно отвлечь, чтобы предотвратить реальный вред пони. Нужны лишь правильные существа, делающие правильные вещи в нужное время...\n\nНо Секонд Винд лишь указал на дорогу внизу, где уже начался парад военнопленных-пони. — И ты называешь это правильным поступком в нужное время? — Он плюнул на Яхса. — Это мои товарищи, мои братья и сёстры по оружию, выставленные напоказ перед всей вашей презренной армией. Они просто скот, униженный и сломленный! В этом нет никакой справедливости! В этом нет ничего хорошего! И если ты считаешь, что поступаешь правильно, то я больше не желаю быть твоей марионеткой!\n\n— Коммандант!— Крикнул Яхс, но пегас бросился на него и повалил на пол прежде, чем чейнджлинг успел выстрелить. Пистолет упал с колокольни, и Секонд Винд ударил голову Яхса о колокол, оглушив его. Затем, расправив крылья, пегас вылетел из башни и направился к проходящему внизу параду.\n\nЯхс вскочил на копыта и успел выскочить из башни вслед за мчавшимся пегасом. Но догнать его уже было невозможно. Вместо этого Яхс мог лишь выкрикнуть предупреждение солдатам на земле, и, к счастью, ему удалось привлечь внимание нескольких из них, прежде чем Секонд Винд достиг своей цели. Телохранители королевы Кризалис окружили её и начали стрелять в небо. Когда пегас-самоубийца приблизился, Яхс увидел брызги крови. Но Секонд Винд уже шёл верным курсом, так что гравитация делала за него оставшуюся работу. Прежде чем Яхс успел сделать хоть что-то, Секонд Винд потянул за шнур, свисавший с его плеча.\n\nЯркая вспышка света и раскат грома... Вот и всё, что смог запомнить Яхс, прежде чем рухнул с неба."
changelings_paxchrysalia.520.a:0 "Мир кончается не словами философов, а кровью мучеников."

changelings_paxchrysalia.521.t:0 "Действия важнее слов" ## Blue Ending - Idealistic ##
changelings_paxchrysalia.521.d:0 "Яхс осторожно сократил пространство между собой и Секонд Виндом, крепко держа пистолет в своей магической хватке. — Ты лишь ухудшишь положение пони, если убьешь её, — предупредил он пегаса. — Кризалис больше интересует личное удовлетворение, чем жестокость. И её всегда можно отвлечь, чтобы предотвратить реальный вред пони. Нужны лишь правильные существа, делающие правильные вещи в нужное время...\n\n— Именно это я и собираюсь сделать, — сказал Секонд Винд. — Тиранов нельзя свергнуть постоянным их умиротворением. Угнетение не закончится, если сказать "пожалуйста" и "спасибо". Реальные перемены могут быть вызваны только решительными действиями. Ты сам говорил мне, что статус-кво ещё не значит, что он верен. Просто нужны существа, готовые изменить его. И я готов стать мучеником смерть, чтобы освободить свою страну, если это необходимо!\n\n— Это не так, коммандант! — Крикнул Яхс, но пегас бросился на него и повалил на пол прежде, чем чейнджлинг успел выстрелить. Пистолет упал с колокольни, и Секонд Винд ударил голову Яхса о колокол, оглушив его. Затем, расправив крылья, пегас вылетел из башни и направился к проходящему внизу параду.\n\nЯхс вскочил на копыта и успел выскочить из башни вслед за мчавшимся пегасом. Но догнать его уже было невозможно. Вместо этого Яхс мог лишь выкрикнуть предупреждение солдатам на земле, и, к счастью, ему удалось привлечь внимание нескольких из них, прежде чем Секонд Винд достиг своей цели. Телохранители королевы Кризалис окружили её и начали стрелять в небо. Когда пегас-самоубийца приблизился, Яхс увидел брызги крови. Но Секонд Винд уже шёл верным курсом, так что гравитация делала за него оставшуюся работу. Прежде чем Яхс успел сделать хоть что-то, Секонд Винд потянул за шнур, свисавший с его плеча.\n\nЯркая вспышка света и раскат грома... Вот и всё, что смог запомнить Яхс, прежде чем рухнул с неба."
changelings_paxchrysalia.521.a:0 "Мир кончается не словами философов, а кровью мучеников."

changelings_paxchrysalia.522.t:0 "Восстановление" ## Blue Ending - Both ##
changelings_paxchrysalia.522.d:0 "Яхс проснулся от гудков оборудования и попытался сесть, но его тело болело так сильно, что через несколько секунд он сдался. До него донеслось тревожное бормотание, и он почувствовал, как кто-то мягко толкнул его копытом обратно на кровать. — Не вставай, Яхс, — раздался голос, и Яхс узнал Алкиппе. — Ты сильно пострадал при взрыве. Твой экзоскелет треснул во многих местах. Так что на выздоровление нужно какое-то время.\n\nКогда воспоминания о параде вернулись к Яхсу, генерал-майор заставил себя открыть глаза и снова попытался сесть, остро ощущая все места, где были повреждены пластины его экзоскелета. — Королева, — прохрипел он, остановив свой затуманенный взор остановилось на морде Алкиппе. — Она...?"\n\n— С ней всё в порядке, — сказала Алкиппе к большому облегчению Яхса. — Её телохранители-единороги подняли заклинание щита, чтобы спасти её от взрыва. Некоторые солдаты на земле были серьёзно ранены, а любимая машина королевы нуждается в некотором ремонте, чтобы снова ездить. После этого парад, конечно, был отменен. Сегодня вечером Кризалис будет коронована наедине, в присутствии лишь королевской гвардии и нескольких генералов из армии. А что касается Секонд Винда...\n\nЭту фразу не нужно было договаривать, и Яхс закрыл глаза и откинулся на подушку. — Думаю, меня за это понизят в должности, — сказал он.\n\n— У вас есть множество свидетелей, которые видели, как вы лично пытались остановить Секонд Винда, рискуя собственной жизнью, — сказала Алкиппе. — Так что я бы об этом не беспокоилась. Ты - герой, Яхс, хоть и немного опоздавший. — Затем она снова мягко попросила его лечь обратно. — Ложитесь, Яхс и отдыхайте. УОБВ скоро потребуют объяснений. Если что, то я скажу, что вы всё это время спали.\n\nЯхс неохотно подчинился и застонал, когда перенес свой вес на кровать. — Конечно... спасибо, Алкиппе.\n\n— Всегда пожалуйста, — ответила. — И я просто очень рада, что с вами всё в порядке."
changelings_paxchrysalia.522.a:0 "Да... я тоже."

changelings_paxchrysalia.523.t:0 "Последнее слово" ## Blue Ending - Both ##
changelings_paxchrysalia.523.d:0 "Васпир Орн Кладисиум выключил диктофон, когда Яхс закончил давать показания. Два чейнджлинга некоторое время сидели в весьма напряжённой тишине, прежде чем глава УОБВ нарушил её. — Итак, мы уже подошли к концу, — сказал он, сводя копыта вместе и смотря на что-то сбоку от стола. — Какая же это замечательная история. От поражения в 1002 году до эпохи "Пакс Кризалия"... Мы ведь действительно прошли весь этот путь, не так ли?\n\n— Совершенно верно, — согласился Яхс, — но я уверен, что ни один из нас не желал быть частью этого.\n\n— Верно, - согласился Васпир. Затем, вздохнув, он встал. — Я не нахожу никаких оснований полагать, что именно вы, генерал-майор, организовали это фиаско на параде. Возможно, некоторые вещи почти произошли благодаря мелким ошибкам тут и там, но никто не может отрицать, что вы сделали всё возможное, чтобы остановить теракт. Я передам это заявление УОБВ, так что мы оба сможем продолжить жить как и раньше.\n\nОн подошел к Яхсу, и генерал-майор встал, чтобы пожать его копыто. Затем Яхс покинул офис УОБВ и простоял некоторое время на солнце, прежде чем Алкиппе, Марсилио и Финикус не подошли поприветствовать его. Он немедленно заверил их всех, что всё в порядке. — Не о чем беспокоиться, — сказал он им всем. — Просто даю показания.\n\n— Что ж, приятно это слышать, — сказала Алкиппе, занимая своё обычное место рядом с Яхсом.\n\n— Я боялся, что если ты войдёшь туда, то больше не выйдешь, — добавил Финикус. Марсилио обогнул остальных, бросив взгляд на Яхса. — Ну, хотя бы твоя линька идёт хорошо, и скоро никто не сможет увидеть, что ты чуть не погиб от взрыва, который повредил твой экзоскелет. Ты хорошо себя чувствуешь? Что-нибудь болит?\n\n— Немного побаливает тут и там, но я в порядке, — сказал Яхс. — Всё достаточно хорошо, чтобы продолжать работать. И не делайте ошибок, у нас всё ещё есть немало работы, которую нужно выполнить. У каждого из нас. Время не ждёт ни чейнджлингов, ни пони, и мы должны извлечь максимум пользы из того, что у нас осталось."
changelings_paxchrysalia.523.a:0 "Так что давайте учиться на своих ошибках и стараться как можно лучше."

## Denouement Events ##
changelings_paxchrysalia.524.t:0 "Восхождение Глориосы"
changelings_paxchrysalia.524.d:0 "Глориоса усмехнулась, наблюдая, как заполняется отель Калихорния по мере приближения ночи. Благодаря договоренности с генералом-майором Яхсом ей удалось переместить общество "Рог изобилия" из подпольного наркопритона в весьма респектабельное заведение, где единороги и чейнджлинги могли спасаться от стрессов прошедшего дня. Битсы менялись на экзотические любовные эликсиры, а богатые доплачивали за отдельные комнаты и личную прислугу, в которых могли погрузиться на несколько часов в блаженство. Всё это делало само общество сильнее, а Глориосу - ещё более могущественной.\n\nОна отхлебнула свой коктейль, оставив сладкий привкус любви на языке. Её соглашение с чейнджлингами позволило расставить доверенных единорогов на многих гражданских постах по всему городу. Она даже начала размещать своих единорогов в нижних эшелонах оккупационного гарнизона, и у Глориосы не было никаких сомнений, что её деньги и услуги в своё время позволят им добиться многого. Благодаря её усилиям, а также ресурсам общества, единороги, наконец, достигли своего законного места на вершине пирамиды пони. Кантерлот станет ярким маяком превосходства единорогов, и вскоре она распространит свои усилия на соседние провинции и регионы. Благодаря ресурсам общества и партнёрству с чейнджлингами теперь всё возможно. Может быть, однажды ей даже не придётся больше работать с чейнджлингами. Возможно, скоро единороги заберутся на следующую ступеньку пирамиды и тогда уже чейнджлинги будут подчиняться им. В конце концов, единороги заслуживают того, чтобы править всеми. Сотрудничество было лишь кратковременным союзом.\n\nОна сделала ещё один глоток и отставила бокал в сторону. Однажды желание Глориосы осуществится. Она была в этом уверена. Но пока Яхс мог считать её верным партнёром.\n\nПока."
changelings_paxchrysalia.524.a:0 "Общество будет лояльно чейнджлингам, пока это будет выгодно единорогам."

changelings_paxchrysalia.525.t:0 "Бесславное падение"
changelings_paxchrysalia.525.d:0 "Пули свистели над головой Глориосы, когда она бежала по переулку. Она вслепую выстрелила из пистолета-пулемета, который держала своей магией, а когда оружие лишь щелкнуло, то она отбросила его в сторону. У неё кончились патроны, так что было бессмысленно цепляться за этот кусок металла.\n\nОна неслась сквозь ночь, стараясь увеличить дистанцию между той дырой, куда только что ворвались егеря. Она знала, что в конце концов генерал-майор Яхс придёт за ней; она просто надеялась, что этот дурак, Секонд Винд, взорвёт королеву чейнджлингов чуть раньше. Хаос дал бы обществу возможность захватить контроль над Кантерлотом, но королева выжила и все её надежды рухнули. А когда чейнджлинги застрелили последнего из её единорогов в новом импровизированном убежище, Глориоса поняла, что с обществом покончено.\n\nНаконец, спустя много миль, она остановилась у реки, протекавшей через Кантерлот. Её конечности дрожали от усталости, но Глориоса сумела скрыться от преследователей. Но она знала, что они не перестанут её искать. Пока Глориоса жива, она представляет угрозу для гегемонии. Ей придётся попытаться бежать из страны или, хотя бы, спрятаться в каком-нибудь безымянном городке и ждать, когда снова придет её время.\n\nОна сняла маску и посмотрела на неё. Никто из пони или же чейнджлингов не знал, как она выглядит под маской; Глориоса была маской, а не кобылой. В этом случае её истинное я станет идеальной маскировкой. Поэтому, сделав глубокий вдох, кобыла зашвырнула маску как можно дальше в реку. Может быть, жуки найдут её и решат, что она мертва. Вот бы ей так повезло!\n\nРазвернувшись, кобыла без имени растворилась во тьме ночи, и больше её никто и никогда не видел."
changelings_paxchrysalia.525.a:0 "Однажды общество снова возродится... когда придет время."

changelings_paxchrysalia.526.t:0 "Ветер перемен"
changelings_paxchrysalia.526.d:0 "Коммандант Секонд Винд поднял глаза, когда в его кабинет вошел пони. — Коммандант, — сказала кобыла, отдавая честь и ожидая его ответа.\n\n— Рядовая Парснип, — сказал он, быстро отсалютовав крылом и кивнув. — Чем я могу тебе помочь?\n\nПастернак прикусила губу, словно колеблясь в последний момент и думая, а стоит ли вообще делиться причиной своего визита. — Я просто..... Коммандант, сэр... Я сожалею кое о чём.\n\n— Сожалеешь? — Секонд Винд пригласил Парснип сесть напротив него, и та повиновалась. Он посмотрел на её встревоженное лицо и медленно кивнул. — Ага. Вижу. Ты не считаешь, что поступаешь правильно, служа в кантерлотской гвардии, не так ли? — Когда та медленно покачала головой, Секонд Винд убрал свои бумаги и положил копыта на стол. — Можешь говорить свободно, рядовая. Ничто из того, что ты скажешь, не покинет этой комнаты. Даю своё слово.\n\nНаконец Парснип глубоко вздохнула и опустила голову. — Мне не нравятся законы чейнджлингов относительно наших собратьев-пони, — сказала она. — Я чувствую себя плохой кобылой. Я ведь должна помогать этим пони, верно? Я не должна давить их и помогать жукам угнетать нашу страну. Чейнджлинги покорили нас, и теперь я лижу ботинки жуков лишь для того, чтобы мне не нужно было платить любовный налог и чтобы я могла получше обеспечивать свою семью. Что со мной не так?\n\n— С тобой всё в порядке, — заверил её Секонд Винд. — Ты делаешь то, что и должна. И посмотри на это с другой стороны, рядовая. — Он встал и указал на карту Кантерлота, висевшую на стене кабинета. — Кто, по твоему, лучше подходит для патрулирования улиц Кантерлота: мы или солдаты-жуки, только что прибывшие из Весалиполиса? Кто будет лучше относиться к пони: мы или солдаты-жуки, только что прибывшие из Весалиполиса? Кого бы ты предпочла: нас или...?\n\n— ...солдат-жуков, только что прибывших из Весалиполиса, — сказала Парснип, закончив фразу за Секонд Винда. — Я... Мне кажется, я понимаю, что вы имеете в виду. Лучше мы, чем жуки. — Ей даже удалось слегка улыбнуться. — Благодарю вас, коммандант. Разговор многое прояснил.\n\nСеконд Винд кивнул. - Обращайся в любое время, рядовая. И если у кого-нибудь из твоих друзей возникнут подобные мысли, скажи им, чтобы они сразу шли ко мне. Мы пони, и мы должны держаться вместе, понимаешь?"
changelings_paxchrysalia.526.a:0 "У кантерлотской гвардии есть шанс изменить жизнь пони Кантерлота к лучшему."

changelings_paxchrysalia.527.t:0 "Соучастники по преступлению"
changelings_paxchrysalia.527.d:0 "Оберстлейтенант Алкиппе вздохнула и размешала напиток своей магией. После коронации Кризалис она много о чём думала и все эти мысли были мрачными. У неё было множество вопросов, на которые очень трудно было найти ответы.\n\nК счастью, она заметила как Яхс привычно вышел на балкон вечером, чтобы выпить, и подошла к нему. — Алкиппе, — сказал Яхс, сопровождая своё неформальное приветствие легким кивком. — Ты как, держишься?\n\n— Не слишком хорошо, — призналась Алкиппе. — Я так много думала после того, как Секонд Винд... ну, вы знаете. — Она вздохнула. — То, что мы делаем... оно неправильно.\n\nЯхс поднял бровь. — Что ты имеешь в виду?\n\n— Всё, — разочарованно призналась Алкиппе. — Всё, что мы делали лишь продолжало удерживать сапог чейнджлингов на шее у пони. Чем больше я вижу последствий наших действий, тем лучше понимаю это. А попытка Секонд Винда убить императрицу заставила меня открыть глаза. Мы - злодеи в этой истории, Яхс. Чейнджлинги ничем не лучше пони, мы все должны быть равны. И всё же абсолютно всё, что мы делали, было направлено на то, чтобы мы продолжали стоять выше их. Как мы будем с этим жить?"
changelings_paxchrysalia.527.a:0 "Я думала о себе как о хорошем чейнджлинге, но я больше не уверена в этом."

changelings_paxchrysalia.8527.t:0 "Дабы изменить хоть что-то"
changelings_paxchrysalia.8527.d:0 "Яхсу потребовалось несколько секунд, чтобы сформулировать свой ответ. — Я понимаю, к чему ты клонишь, Алкиппе, — наконец сказал он, ставя свой бокал и поворачиваясь к ней мордой. — Не ты одна такая. У меня тоже появлялись подобные мысли после окончания войны. Я думаю, что все сводится к... — Яхс сделал паузу, подыскивая нужные слова. — Я полагаю, это зависит от того, что считать наиболее значимым и существенным способом осуществления изменений. Я мог бы хоть прямо сейчас подать в отставку и присоединиться к сторонникам Торакса — ну, или к тому, что от них осталось. Но вышестоящие чейнджлинги просто назначили бы другого офицера на мое место, а после этого гвардия королевы тут же начала бы занимать все командные посты, обладающие хоть какой-то реальной властью... Я не думаю, что мой преемник продолжит мою разумную и умеренную политику. С рациональной точки зрения лучшее, что я могу прямо сейчас сделать для пони, это по-прежнему оставаться губернатором и сдерживать наихудшие импульсы и идеи наших коллег.\n\n— Но мораль работает совсем не так, — покачала головой Алкиппе. — То, что мы относимся к военнопленным чуть лучше, вовсе не означает, что мы не несем никакой ответственности за их страдания. Маленькие проявления доброты и милосердия совершенно не перевешивают того зла, которое мы совершили.\n\n— И ты права, — согласился Яхс. — Мы получили огромную выгоду из этого несправедливого статуса-кво. И мы являемся соучастниками, когда обеспечиваем соблюдение "Пакс Кризалии". Но значительные перемены вполне можно вызвать вызваны маленькими шагами. На наших сегодняшних действиях будут учиться офицеры завтрашнего дня. И последующее поколение будет учиться у них. Мало-помалу мы делаем всё возможное, чтобы изменить ситуацию к лучшему. Но изменения не могут произойти немедленно, на это не способен ни один чейнджлинг-одиночка. Понимаешь, о чём я говорю?\n\n— Да... Я думаю, что да — сказала Алкиппе, нерешительно кивая.\n\n— Хорошо, — ответил Яхс и похлопал её по спине. — Я знаю, что эта мысль далеко не сразу успокаивает. И весьма нелегко жить с таким грузом на совести. Но если мы все будем работать вместе... ну, возможно, когда-нибудь следующие поколения смогут оценить по достоинству не только причинённое нами зло, но и совершённое добро."
changelings_paxchrysalia.8527.a:0 "Маленькие шаги постепенно приближают более светлое завтра."

changelings_paxchrysalia.528.t:0 "Возможность отдохнуть"
changelings_paxchrysalia.528.d:0 "В кои-то веки Яхс, которому нужно было одновременно выполнять роли и генерал-майора в королевской армии, и губернатора Кантерлота и Центральной Эквестрии, смог найти в своём сумасшедшем расписании немного свободного времени, а звёзды выстроились в ряд и подарили ему свободные выходные. В кои-то веки Эквестрия не стояла на грани полномасштабного бунта, и это дало возможность Яхсу и его сослуживцам вздохнуть полной грудью. Поэтому он решил заняться чем-нибудь веселым и расслабляющим и пригласил Алкиппе в свою резиденцию на просмотр довоенных эквестрийских фильмов.\n\nАлкиппе появилась вскоре после восьми вечера. Она было одета в простое и скромное платье, что делало её неотличимой от прочих чейнджлингов. Яхс приветственно улыбнулся, взял бутылку вина магией и откупорил. Затем, разлив напиток по бокалам, он последовал за Алкиппе в гостиную, где уже был установлен его личный проектор с загруженной плёнка. Алкиппе присела на краешек дивана и посмотрела на стопку фильмов, лежащих рядом с проектором. — Сколько же тебе пришлось отдать за эту контрабанду? — спросила она, когда Яхс включил проектор.\n\n— Меньше, чем ты думаешь, но больше, чем тебе хотелось бы, — сказал Яхс со скромной улыбкой. — Но я знаю нескольких пони, которые были рады помочь мне.\n\n— И сколько у нас будет неприятностей, если УОБВ прознает про это? — Спросила Алкиппе с озорным огоньком в глазах.\n\n— Немало, - ответил Яхс. — Но держу пари, что Васпир в своё свободное время смотрит те же фильмы, так что всё будет в порядке.\n\nАлкиппе хихикнула, и вскоре из динамиков зазвучала вступительная музыка фильма. Сделав глоток вина, она устроилась поудобнее на диване, пока не оказалась рядом с Яхсом, прислонившись всем телом к его плечу. В ответ Яхс прикрыл её спину своим крылом, а после накинул им на плечи ближайшее одеяло. Двое чейнджлингов улыбнулись, потерлись носами и радостно переключили своё внимание обратно на экран. Они были счастливы, потому что наконец-то могут провести вместе некоторое время и позабыть о тяжести их обязанностей."
changelings_paxchrysalia.528.a:0 "Эпплвуд Филмс представляет..."

changelings_paxchrysalia.529.t:0 "Антидискриминационные меры"
changelings_paxchrysalia.529.d:0 "— Простите, сэр, но вы хотите нанять пони? Дать им работать квалифицированными техниками на наших заводах? И платить им зарплату?!\n\nФиникус закатил глаза, услышав этот возмущенный возглас от одного из членов совета директоров. — Да. И что в этом такого особенного?\n\n— Но, мистер Весали... они же пони, — запротестовал член правления. — Единственное, на что они годятся, - так это на физический труд, да и то не слишком хорошо. По правде говоря, это чудо, что их вид продержался так долго.\n\n— Просто чудо, что ты всё ещё в совете, проклятый идиот, — прорычал Финикус. Затем он встал и положил свои копыта на стол. — Что за чушь ты несешь? Неужели ты всерьез воспринимаешь тот мусор, которым тебя пичкает императрица и её дружки? Если бы пони были так плохи во всём, то война не продлилась бы так долго и не стоила бы нам так дорого. Правда заключается в том, что пони хороши во многих вещах. А пони, у которых на боку есть изображение шестерёнок и машин? Они разбираются лучше среднего дрона практически во всём, что есть на этой фабрике. Почему нам не хотеть нанимать их?\n\n— Но... сэр...\n\n— Пошёл вон отсюда, — сказал Финикус, свирепо глядя на чейнджлинга и указывая ему на дверь. — Тебе больше не рады в этой компании. И если мой ранг генерального директора и её президента не заставит тебя уйти в отставку, я попрошу генерал-майора Яхса или, возможно, саму императрицу разобраться с тобой. У меня сейчас немало влияния, так что я на твоём месте отнёсся к этому внимательно. — Вздохнув, Финикус посмотрел на остальную часть членов правления. — Ну, если достоинства пони не убедили вас в этой идее, то подумайте вот о чём. Мы можем быть первыми, кто примет квалифицированных техников-пони на наши заводы. Вы понимаете маркетинговую привлекательность этого? Вы понимаете, насколько более эффективной могла бы быть наша деятельность, когда на нас будут работать хорошо подготовленные специалисты-пони? Вы можете думать, что во время войны мы заработали много денег. Но вы даже не представляете, что нас ждёт, когда мы превзойдём наших конкурентов и станем монополистами в промышленном производстве! Звучит неплохо, а?"
changelings_paxchrysalia.529.a:0 "Мы получим прибыль, если будем работать с пони. Это действительно не так уж и трудно понять."

changelings_paxchrysalia.530.t:0 "Идеальная замена"
changelings_paxchrysalia.530.d:0 "— Клянусь, эти маленькие "пожертвования" с каждым разом становятся все легче, Марсилио. У нас хороший прогресс.\n\nГенерал-оберстабсарцт Марсилио кивнул и улыбнулся, глядя на распечатанные показания машины. В последние несколько недель он перенёс свою штаб-квартиру из Сиддла в Кантерлот, где юрисдикция Яхса защищала его работу от любопытных глаз королевской гвардии и УОБВ. Теперь он и его давний друг и партнер, доктор Спектрограф, изучали новый вопрос, который мог бы изменить мир. Они хотели создать искусственную любовь, которая была бы столь сильна, как и настоящая. — Рад это слышать, — сказал Марсилио, доставая отчёт из машины, как только он закончилась печать. Он прочитал его и нахмурился. — Ага... взгляни на это.\n\nДоктор Спектрограф убрал провода, приклеенные к телу, спрыгнул со стола и подошёл к Марсилио. Его глаза скользнули по строчкам и цифрам, а затем он присвистнул. — Сопоставимость в 37%? Это в два с лишним раза больше, чем у нас было неделю назад! Такими темпами мы уже через несколько месяцев получим приемлемую замену!\n\n— Ну, я бы не стал заглядывать так далеко, — сказал Марсилио. — Скорее всего мы выйдем на плато в какой-то момент, когда наткнемся на препятствие. Но да, это выглядит многообещающе. Если наша искусственная любовь обладает всего лишь в три раза уступает настоящей, то мы действительно достигли уже немалого прогресса.\n\nДоктор Спектрограф изумленно покачал головой. — Как удивительно... Ведь вскоре может наступить день, когда чейнджлингам не придётся насильно отнимать любовь у нас, пони. Как глубоко мы сможем сотрудничать друг с другом?\n\n— Я не могу и представить себе, — сказал Марсилио, но повернулся и ухмыльнулся Спектрографу. — Но думаю, что это будет выглядеть примерно так."
changelings_paxchrysalia.530.a:0 "Выпьем же за освобождение от калечащих оков любви!"

changelings_paxchrysalia.531.t:0 "Новая учебная программа"
changelings_paxchrysalia.531.d:0 "Оберстлейтенант Алкиппе наблюдала из-за трибуны, как новые кадеты-офицеры рассаживаются по местам в лекционном зале. Многие из них первый раз посетили Кантерлот и первый раз слушали лекцию от старшего офицера. Но и Алкиппе готовилась прочитать эту лекцию в первый раз. Она обратилась к Яхсу с просьбой реорганизовать учебную программу в офицерских школах, и каким-то образом генерал-майор нашел нужные ниточки, чтобы осуществить это. Теперь любой будущий офицер, которому предстояло получить назначение где-нибудь в Эквестрии или Олении, сначала должен был пройти обучение в Кантерлоте, а не в Весалиполисе, и это позволяло Алкиппе рассказывать им то, что она и хотела.\n\nЧасы академии звоном сообщили о начале нового часа, так что Алкиппе выпрямилась и откашлялась. — Доброе утро, кадеты. Добро пожаловать на ваш первый урок образования. Меня зовут оберстлейтенант Алкиппе, и я подчиняюсь непосредственно самому генерал-майору Яхсу. И сегодня мы будем учить вас тому, о чём вы должны постоянно помнить, если хотите быть офицером в армии: об уважении.\n\nОна включила проектор и на экране появился слайд с серией фотографий: на верхней была изображена императрица Кризалис, на левой - генерал-майор Яхс, а на третьей - единорог, земной пони и пегаса, стоящие бок о бок. — Уважение - это то, на чем строится офицерский корпус. Прежде всего, уважение к нашей императрице, ибо именно она принесла ульям славу. Во-вторых, уважение к вышестоящим офицерам, ибо субординация всегда должна соблюдаться. И, наконец, уважение к пони Эквестрии. Это страна не так давно принадлежала именно им, и большинство из них до сих пор возмущены нашей оккупацией. Они имеют право на недовольство. Я тоже была бы недовольна, если бы всё случилось наоборот.\n\nОна рассматривала собравшихся, отмечая тех, кто проявлял наибольшее внимание. Алкиппе знала, что именно на этих кадетов она сможет рассчитывать в будущем. — Мы - завоеватели. Но это не значит, что мы должны быть угнетателями. Чтобы сохранить "Пакс Кризалию" мы должны быть почтительны к нашим подданным. Мы должны уважать их права, интересы и культуру. Потому что если мы этого не делаем, то не сможем быть теми праведными чейнджлингами, коими мы себя и считаем. Так мы станем обычными преступниками. А это будет величайшим оскорблением для нашей гордой расы."
changelings_paxchrysalia.531.a:0 "Но сейчас мы можем стать лучше!"

changelings_paxchrysalia.532.t:0 "Особенная книга"
changelings_paxchrysalia.532.d:0 "Генерал-майор Яхс поставил свою подпись на последнем бланке, лежавшем у него на столе, и бросил его в ящик для исходящей почты, которая будет отправлена вечером. Это был напряженный день, который принесёт множество новых и захватывающих перемен в будущем. Кусочек за кусочком Яхс использовал свой авторитет как губернатора кантерлотского комиссариата, чтобы проталкивать реформы, которые сделали бы жизнь пони, живущих под властью чейнджлингов, чуть более терпимой. И после недавних реформ он почувствовал, что добивается хорошего прогресса. Когда он впервые приехал в Кантерлот, пони яростно сопротивлялись жестокому угнетению. Но теперь сапог больше не прижимает их к земле. Его сменило доброжелательное копыто, готовое вести их в будущее.\n\nОднако на его столе лежал последний предмет. Свёрток, спрятанный под стопкой посланий, которые должны были быть составлены и подписаны. Яхс с любопытством придвинул его к себе. Развернув сверток, он обнаружил там книгу, обёрнутую в простую коричневую суперобложку. Открыв обложку, он сразу же наткнулся на сообщение от Секонд Винда, нацарапанное в углу страницы:\n\n— Яхс, ты так много сделал для пони Кантерлота. Ты так много для меня сделал. Некоторые даже могут назвать это дружбой. Взгляни на эту книгу и скажи мне, согласен ли ты с ней.\n-Секонд Винд\n\nЯхс перевернул страницу и ахнул, увидев название. — Дневник дружбы Твайлайт Спаркл? — пробормотал он себе под нос. Это было просто невозможно. Все уцелевшие экземпляры этого дневника были первым делом сожжены, когда чейнджлинги заняли Эквестрию. Получить уцелевшую копию в свои копыта...\n\nЯхс закрыл книгу и вздрогнул. В его копытах лежало самое незаконное произведение во всей Гегемонии. УОБВ казнит его, если узнает о том, что у него есть эта книга. Было бы безопаснее просто уничтожить её.\n\nНо опять же...\n\nУлыбаясь, Яхс открыл свой ящик стола и сунул журнал внутрь вместе к остальным памятным вещам, собранным им за годы службы в армии и кантерлотском комиссариате. Избавляться от такой могучей книги было бы глупо. И может быть однажды он сможет открыто прочитать её и обсудить со своими друзьями."
changelings_paxchrysalia.532.a:0 "Разве это не стало бы замечательной историей?"

changelings_paxchrysalia.600.t:0 "Навёрстывание"
changelings_paxchrysalia.600.d:0 "Друг,\n\nПрошло уже довольно много времени с тех пор, как мы в последний раз собирались вместе после коронации императрицы Кризалис. Я знаю, что работа мешает нам встречаться и наслаждаться обществом друг друга, так как груз ответственности никогда не спадает с наших плеч, но всё же важно находить время, чтобы расслабляться и освежаться, прежде чем снова с головой окунаться в работу. В эту субботу я приглашаю тебе и остальных наших друзей присоединиться ко мне в моей резиденции за ужином с напитками. Я надеюсь, что ты сможешь найти время в своём расписании, чтобы присоединиться к нам.\n\nИскренне,\nГенерал-майор Яхс"
changelings_paxchrysalia.600.a:0 "Самое время снова собрать всю банду вместе!"

changelings_paxchrysalia.601.t:0 "Встреча умов"
changelings_paxchrysalia.601.d:0 "Алкиппе была очень рада снова увидеть Финикуса и Марсилио, а также Секонд Винда в доме Яхса. Все пятеро друзей целенаправленно делали всё возможное, чтобы избежать разговоров о работе во время ужина. Вместо этого разговор перешёл на события личной жизни каждого из них, и как они использовали возможности "Пакс Кризалии", чтобы наслаждаться своим свободным временем. Это создало непринужденную и беззаботную атмосферу, и после окончания ужина четверо чейнджлингов взяли свои напитки и расселись снаружи на крыльце Яхса, которое выходило на его просторный задний двор.\n\nТам их разговоры под воздействием алкоголя начали смещаться на другие темы, и Финикус, конечно же, был именно тем, кто поднял вопрос. — Эй, Яхс, помнишь тот раз, когда мы кайфовали в наркопритоне Глориосы? — Спросил он. — Это было нечто, не так ли?\n\nЯхс вздохнул и откинулся на спинку стула, потирая копытом свой висок. — Я помню ужасное похмелье на следующий день, даже слишком хорошо. Как бы мне ни хотелось забыть об этом.\n\n— Я же просила не пить этот напиток, — сказала Алкиппе, качая головой. — Я рада, что с тех пор ты туда не возвращался. Хотя не уверена, что могу сказать то же самое о Финикусе.\n\n— Послушай, иногда тебе просто нужно пробовать что-то другое, понимаешь? — Сказал Финикус, поднимая копыта в воздух. — Кроме того, я делаю это в исследовательских целях. Вполне уважительная причина."
changelings_paxchrysalia.601.a:0 "Исследовательских целей? Неплохое оправдание."

changelings_paxchrysalia.8601.t:0 "Вопрос о знаках"
changelings_paxchrysalia.8601.d:0 "— Я вам этого не говорил, но королевская гвардия недавно заключила гигантский контракт с несколькими военными исследовательскими фирмами, в том числе и "Мейн-Хайв", — сказал Финикус. — Они хотят получить каких-то суперсолдат или что-то в этом роде, но им на самом деле всё равно, как мы будем это делать. Поговаривают, что отдел закупок вооружений компании "Мэйфлай Электроникс" пытается создать магические экзоскелеты, которые позволили бы одному из наших егерей на равных сражаться с рыцарем-грифоном. Я также знаю, что университет в Сорифе планирует использовать генную инженерию и психологическую подготовку, чтобы вырастить новое поколение спроектированных личинок. Но у меня есть на примете кое-что получше: знаки отличия.\n\nАлкиппе фыркнула и покачала головой. — По-моему, ты слишком пристрастился к любви, — сказала она. — Это просто безумие. Наличие знака отличия не превратит чейнджлинга в суперсолдата.\n\n— Разве? — Финикус повернулся к Секонд Винду, который до сих пор молчал. — А ты как думаешь, Секонд? Ты здесь единственный с картинкой на заднице. Я бы сказал, что ты - самый квалифицированный специалист в этой сфере.\n\n— Ну, я не уверен насчёт чейнджлингов со знаками отличия, но лучшие солдаты и генералы в эквестрийской армии обладали очень подходящими знаками отличий, — сказал пегас. — Ты можешь обучить пони со стопкой кирпичей в качестве знака метко стрелять, но он никогда не будет стрелять так же хорошо, как кто-то с перекрестьем на своём боку. Даже наших генералов крайне сложно остановить, если у них был подходящий знак.\n\n— Как генерал Спирхэд, — сказал Яхс, после чего он и Алкиппе застонали и покачали головами. — Ульям очень повезло, что она стала командиром лишь ближе к концу войны. Она умела эффективно использовать и концентрировать танки, чтобы прорывать наши линии и постоянно угрожать флангам. Танковая дуэль между ней и Триммелем за пределами Лас-Пегасуса вошла в легенды, и мы победили её лишь тогда, когда у неё начались проблемы со снабжением и не она могла получать топливо для своих танков и грузовиков.\n\n— Звучит очень похоже на именной детерминизм, — согласился Марсилио. — Но как ты собираешься дать чейнджлингам знаки, Финикус?"
changelings_paxchrysalia.8601.a:0 "Это чуть сложнее, чем просто привести наших солдат в тату-салон."

changelings_paxchrysalia.9601.t:0 "Первородный грех"
changelings_paxchrysalia.9601.d:0 "— Понятия не имею, — признался Финикус. — У меня есть несколько первоначальных идей, но пока ничего конкретного. Нам нужно немало финансирования и помощи, чтобы запустить этот проект, но я уверен, что мы сможем добиться успеха. Кроме того, если мы осуществим всё то, то представьте чего сможем добиться! Подумайте обо всём, на что, в отличие от чейнджлингов, способны пони из-за отсутствия у них меток. Что было бы, если мы сумели найти недостающий фрагмент, который позволил бы расе чейнджлингов полностью раскрыть свой потенциал! Возможно, тогда нам не пришлось бы быть, — и тут Финикус понизил голос до театрального шепота, — паразитами, о чём так упорно твердит королева Кризалис.\n\n— Недостающий фрагмент? — Спросил Секонд Винд. — Что ты хочешь этим сказать? Ты думаешь, что знаки - это своего рода недостающая часть чейнджлингов?\n\n— Не знаю, разделяет ли мои чувства кто-нибудь из вас, — сказал Финикус, глядя на других чейнджлингов в комнате, — но мне всегда было интересно, как сложилась бы моя жизнь, если бы у меня был такой знак, как у пони. Очень здорово знать своё место в жизни. Не то чтобы мне не нравится занимать пост генерального директора "Мейн-Хайв", но...\n\n— После встречи с Твайлайт в шахтах, — сказал Марсилио, — она заставила меня задуматься о судьбе и индивидуальности. У пони всё это есть, и их знаки - огромная часть этого. И мне всегда было интересно, что произойдет, если мы дадим всем чейнджлингам эти самые знаки. Сможем ли мы придать индивидуальности виду чейнджлингов? Изменить нашу судьбу? Кто знает, чего мы могли бы достичь, если бы знаки, как считают пони, действительно меняли жизнь?\n\nСеконд Винд был шокирован этим утверждением. — Твайлайт? Твайлайт Спаркл? Она в шахтах под Кантерлотом?\n\n— Это долгая история, — сказал Яхс, — и я расскажу её тебе в другой раз. Важно лишь то, что мы должны держать это в секрете. — Он повернулся к Финикусу и остальным своим друзьям-чейнджлингам. — Но я должен признать... что это интересная идея. Сможем ли мы изменить общество чейнджлингов к лучшему, просто дав всем чейнджлингам знаки? Думаете, это может сработать?\n\n— Вероятно, — сказал Финикус и кивнул. Он покосился на Марсилио. — А как насчет тебя, господин учёный? Есть идеи?\n\nМарсилио пожал плечами. — Я полагаю, что это маловероятно, но отнюдь не невозможно. Я действительно считаю, что сейчас мы могли сделать поспешные выводы относительно того, что наличие меток будет означать для нас, чейнджлингов... но почему бы и нет? Мне бы хотелось верить, что в знаках заключается своя изменяющая жизнь внутренняя магия. И если мы объединим наши ресурсы, то, возможно, нам удастся что-то выяснить."
changelings_paxchrysalia.9601.a:0 "Давайте сделаем это!"

changelings_paxchrysalia.602.t:0 "Охота за талантами"
changelings_paxchrysalia.602.d:0 "— Это просто блестящая идея, — сказал Финикус чейнджлингу, идущему рядом с ним, когда они вдвоём гуляли по садам Кантерлота. — Красота, очевидно, заключается в простоте. Зачем тратить миллионы на передовые генетические или кибернетические исследования, когда мы можем использовать естественную щедрость окружающего мира, чтобы нанести картинки на наши бока и увеличить природные таланты чейнджлингов в двадцать раз?\n\nКапитан королевской гвардии Ласин Кардо нахмурился, когда они завернули за угол и продолжили путь по выложенной кирпичом дороге, извивающейся между садами. — Знаки - это символ пони, — сказал он. — Зачем нам извращать совершенство чейнджлингов, нанося эти знаки на наш хитин? Так мы признаем, что у пони есть преимущество, которого лишены чейнджлинги.\n\nФиникус закатил глаза. — А если мы прикрепим к нашим солдатам механические руки и превратим их в роботов, то это не "извратит совершенство чейнджлингов"? Пожалуйста. — Он ускорился, обогнал Ласина и стал идти задом наперед, чтобы они могли поговорить лицом к лицу. — Ты солдат, Ласин, и я знаю, что ты сражался с пони со знаками отличия. Правильный знак может практически превратить среднего пони в настоящего суперсолдата. Но если дать нашим солдатам хорошие знаки, то они станут не только прекрасными бойцами, но и великолепными инфильтраторами.\n\n— Великолепными инфильтраторами? — Спросил Ласин. — Как так?\n\n— Ты знаешь, как эквестрийцы разоблачали наших инфильтраторы? Они заставляли их демонстрировать особые таланты, связанный с их знаком. Наши инфильтраторы не могли делать эти вещи так же умело, как обладающие этим особым талантом пони, чем и раскрывали себя. Но если вы дадите инфильтратору настоящий знак и способности, присущие ему, то тогда они смогут более или менее неплохо выполнять проверки пони. Знаки - это то, что делает пони, собственно, пони и чейнджлинг со знаком значительно продвинется в том, чтобы стать великолепным инфильтратором — идеальным пони, так сказать.\n\nЛасин на мгновение задумался, но в конце концов кивнул в знак согласия. — Я понимаю твою мысль. Хорошо, хорошо. "Мэйн-Хайв" получит поддержку королевской гвардии, но мы ожидаем результатов. Особенно от амбициозного проекта вроде этого."
changelings_paxchrysalia.602.a:0 "О, мы предоставим результаты, Ласин. Вы можете на это рассчитывать."

changelings_paxchrysalia.603.t:0 "Неожиданный визит"
changelings_paxchrysalia.603.d:0 "Финикус покинул свои новые лаборатории в Кантерлоте после того, как убедился, что они получили всё необходимое исследователям оборудование для начала работы. Покупка помещения в густонаселённом городе на вершине горы и последующее оснащение его самым современным оборудованием стоили очень и очень немало, но поскольку теперь королевская гвардия готовилась финансировать его работу, он не слишком беспокоился про это. К тому же, если он действительно добьется успеха, то результаты многократно окупятся. Ему больше никогда в жизни не придётся работать. Может быть, он создаст себе какой-нибудь художественный знак, чтобы найти хобби на пенсию. Он всегда думал, что рисовать картины акварелью будет довольно интересно.\n\nОднако, когда он уже собирался выйти из здания и пойти пообедать, дорогу ему преградили члены королевской гвардии и сама императрица Кризалис. Финикус низко поклонился, когда понял, что стал объектом внимания императрицы, и улыбнулся ей. — Ах, Ваше Величество, как приятно видеть вас здесь сейчас. Как скромный чейнджлинг вроде меня может быть полезен вам?\n\n— Я пришла осмотреть помещения, где будут проводиться ваши исследования, — сказала она. — Капитан Кардо сообщил мне, что вы пытаетесь дать чейнджлингам знаки отличия. Весьма честолюбиво, скажу я вам. Я буду внимательно следить за вашими успехами.\n\nЗатем она наклонилась так, чтобы оказаться почти нос к носу с Финикусом. — Но не заблуждайся, — предупредила она, — пони уступают нам. Не забывай об этом. Если бы ты смог украсть их знаки и отдать их нам, то так можно наделить чейнджлингов ещё большей силой, одновременно ещё сильнее унизив пони и лишив их данного им по праву рождения. И я не смогла придумать ничего более справедливого в этом мире.\n\nПотом она встала и улыбнулась ему. — О, я придумала. Если бы ты мог дать мне знак Селестии и её способность двигать солнце, ты стал бы настоящим героем всех чейнджлингов. О, что я могла сделать с этой силой... — Она хихикнула про себя и прошла мимо Финикуса. — Приятного аппетита, мой верный подданный. Не могу дождаться, когда увижу твой прогресс."
changelings_paxchrysalia.603.a:0 "Я не разочарую вас, императрица. Не сомневайтесь в этом."

changelings_paxchrysalia.1603.t:0 "Желание сердца"
changelings_paxchrysalia.1603.d:0 "Всю прошлую неделю Марсилио корпел над книгами, имевшимися в его распоряжении, многие из которых были украдены из кантерлотских архивов. В этих книгах была немало старых и неясных ссылок на вещи, о которых чейнджлинги мало что знали. Марсилио был просто счастлив, что ему удалось узнать так много во время оказания помощи проекту Финикуса. Но и не только это, ему удалось привлечь к работе над проектом многих старых друзей, вроде его коллеги-пони доктора Спектрограф. В конце концов, они могли изменить общество чейнджлингов изнутри и снаружи...\n\n— А как насчет этого? — Доктор Спектрограф пододвинул через стол книгу к Марсилио, постукивая копытом по изображению пони, покрытого знаками отличия. — В старых текстах упоминается "Оспа знаков отличия", поразившая маленький городок много веков назад. Граждане случайным образом получали знаки отличия, иногда десятки сразу, и они демонстрировали таланты от всех этих знаков, пока они у них оставались.\n\n— Это звучит невероятно, — сказал Марсилио, поднимая бровь и читая информацию из книги. — Но почему то, что дает пони так много талантов, считается оспой?\n\n— Потому что поражённые этой болезнью были вынуждены постоянно демонстрировать таланты их знаков, что нередко вело к истощению или даже смерти, — заявил спектрограф. — Никто тогда так и не узнал причину болезни, хотя теперь считается, что она была вызвана цветком под названием "Желание сердца", который растет в Вечнодиком лесу. В садах Кантерлота должно найтись что-то, что мы сможем использовать для тестов. Возможно, мы нащупали верный путь.\n\n— Вероятно, — согласился Марсилио. — Быть может, мы сумеем использовать магию, заключенную в цветке, для наших целей. Я позабочусь, чтобы Финикус узнал об этом."
changelings_paxchrysalia.1603.a:0 "Неплохое начало, это точно."

changelings_paxchrysalia.2603.t:0 "Несколько вопросов"
changelings_paxchrysalia.2603.d:0 "Первые испытания "Желания сердца" оказались многообещающими, но они не обеспечили того прорыва, которого так ждал Марсилио. Разбавленные растворы, сделанные из пыльцы растения, вызывали появление одной или двух дополнительных меток у испытуемых пони. Они держались примерно неделю, а затем исчезали. Однако если дать пони следующую дозу раствора, то у него появится тот же знак, что и в прошлый раз. Первые испытания на добровольцах-чейнджлингах были гораздо менее успешными: знаки отличия появлялись на боках или шеях чейнджлингов лишь на несколько секунд, а затем снова исчезали. Это было лишь начало, но нужно было сделать что-то ещё.\n\nМарсилио принял во внимание природу этого источника магии и разыскал биолога, специализировавшегося на изучении Вечнодикого леса, которая переехала в Кантерлот после войны. У доктора Грин Хуф был скромный маленький домик рядом с раскинувшимися парками Кантерлота. Она, несомненно, выбрала его, чтобы быть ближе к зелени, которую она так любила. Доктор согласилась встретиться с Марсилио, чтобы обсудить свою работу. Хотя поначалу Грин Хуф неохотно желала сотрудничать, но её убедило обещание позволить присоединиться к экспедициям, которые будут изучать остатки Вечнодикого леса.\n\nИменно так и получилось, что в субботу днём Марсилио оказался на кухне доктора Грин Хуфа, пил чай и объяснял, что именно ему нужно. — "Желание сердца" - мощное магическое средство, но оно неустойчиво, — объяснил он ботанику. — Армия хочет использовать свойства этого растения для наших проектов, но нам нужно его как-то стабилизировать. Как я, так и армия надеемся, что вы сможете предоставить нам информацию о том, что можно использовать для этой цели.\n\nГрин Хуф потёрла подбородок и задумалось. — Ну, что-то может и найтись, — сказала она. — Конечно, никто и никогда не пыталась использовать "Желание сердца" для чего-либо, учитывая его побочные эффекты. Но вам, вероятно, смогут помочь растения из рода Инкредибилус."
changelings_paxchrysalia.2603.a:0 "И какие же растения относятся к роду Инкредибилус, доктор?"

changelings_paxchrysalia.3603.t:0 "Парочка растений"
changelings_paxchrysalia.3603.d:0 "— Ну, первым на ум приходит очевидная и печально известная Инкредибилус Хьюморос, более известная как "Ядовитая шутка", — сказала Грин Хуф. — Если пыльца этого растения попадёт на кожу или панцирь живого существа, то само растение будет совершать "смешные" шалости над жертвой, нередко основываясь на имени. Эффекты "Ядовитой шутки" хаотичны, но не случайны, так что она в некоторой степени надёжна. Пыльца "Ядовитой шутки" в малых дозах может усиливать другие вещества. К примеру, с её помощью можно превратить слабую кислоту в сильную, а если начать принимать её с обезболивающими, то можно впасть в кататонию.\n\nМарсилио нахмурился. — Всё ещё слишком непредсказуемо, — сказал он. — Есть что-то ещё на примете?\n\n— Есть, — кивнула Грин Хуф. — Семена Инкредибилус Веритас, также известные как "Семена истины", традиционно использовались на эквестрийском юго-востоке как лекарство от всех видов психических заболеваний и недугов вроде шизофрении и слабоумия. Принципы их действия непонятны даже для такого опытного ботаника, как я, но считается, что он выявляет и усиливает "истинное я" существа, которое глотает их порошок. Хотя, конечно, всё не так просто: скорее всего, эти семена просто усиливают текущее состояние существа во время их приёма. У пациентов с деменцией симптомы резко ухудшаются, если они принимают семена во время приступа, но если съесть их в моменты ясности, то умственные способности значительно повысятся. Важно верно подобрать момент.\n\nМарсилио кивнул и улыбнулся ботанику. — Спасибо, доктор, — сказал он, протягивая ей копыто на прощание. - Это было невероятно полезно. Если мне понадобится разгадать ещё какие-то ботанические тайны, то я приду прямо к вам.\n\n— Конечно, главный хирург, — ответила Грин Хуф. - И, пожалуйста, помните про ваше обещание. Вечнодикий лес сейчас опаснее, чем когда-либо прежде, и я хотел бы посетить его снова под охраной. Пожалуйста, возьмите меня с собой, когда будет организована следующая экспедиция."
changelings_paxchrysalia.3603.a:0 "Я обязательно это сделаю, доктор."

changelings_paxchrysalia.4603.t:0 "Ответственное решение"
changelings_paxchrysalia.4603.d:0 "— И вот что я смог придумать, — сказал Марсилио, закрывая папку перед собой своей магией. Когда речь хирурга окончилась, Яхс, Алкиппе и Финикус сделали то же самое. — "Желание сердца" - это основа того, что мы ищем. У это растения есть возможность сделать так, чтобы у чейнджлингов появились знаки, но оно недостаточно стабильно, чтобы сделать эффект долговечными. Поэтому нам нужна либо "Ядовитая шутка", которая может значительно усилить силу сыворотки "Желания сердца", либо "Семена истины", которые, как предполагается, способны усилить "истинное я" существа. Теперь нам нужно принять решение о дальнейших действиях.\n\n— Почему бы просто не использовать оба растения? — Спросил Финикус.\n\n— Эти растения можно найти лишь в Вечнодиком лесу или в небольших регионах юго-востока, — объяснил Марсилио. — И если принять во внимание хаос на юго-востоке и текущее состояние Вечнодикого леса, я думаю, что нам на самом деле будет легче сосредоточиться на лесу. Однако для этого понадобится хорошо вооружённая и быстрая экспедиция, которое поможет без задержек найти искомое и покинуть лес. У нас нет времени искать синие цветы, а затем выкапывать их семена. Мы можем получить лишь одно растение, так что я хотел бы услышать ваши мнения.\n\nЯхс пожал плечами и отодвинул папку от себя. — Не спрашивай меня, — сказал он. — Я бесполезен, когда дело касается биологии и ботаники.\n\n— Это ничего не значит, — сказал Финикус. — Я тоже бесполезен, но из того, что сказал Марсилио, совершенно ясно, что "Ядовитая шутка" - это правильный выбор. Да ладно, как можно сомневаться в растении, которое делает сильнее всё, к чему только прикасается?\n\n— Но "Семена истины", вероятно, более безопасный кандидат, — сказала Алкиппе. — Вообще-то я недолго изучала биологию, прежде чем пойти в армию, так что немного знакома с этим растением. "Семена истины" будут более безопасной альтернативой, чем "Ядовитая шутка". Кто знает, что может пойти не так, если этот голубой цветок решит сыграть с нами весьма злую шутку?\n\n— У нас ещё есть время всё обдумать, — сказал Яхс. — Мне все равно придётся подготовить экспедицию, на что уйдёт некоторое время. — Он кивнул своим спутникам. — Поразмыслите об этом, и мы обсудим это позже. Может быть, тогда мы сможем найти чёткий и ясный путь вперёд."
changelings_paxchrysalia.4603.a:0 "Как скажешь, Яхс."

changelings_paxchrysalia.604.t:0 "Суть вопроса"
changelings_paxchrysalia.604.d:0 "Финикус вздохнул и потёр глаза, отложив в сторону последний отчет. Он так долго просматривал результаты своих исследований и предварительные выводы, что его взгляд просто остекленел и он уже не мог сосредоточиваться на чём-либо ещё. Поэтому, заворчав, Финикус встал из-за стола и прошёл в другой конец своего личного кабинета, где его ждало лекарства от головной боли: открытая бутылка коньяка и набор хрустальных бокалов.\n\n— Хочешь немного? — сказал он через плечо другому чейнджлингу в комнате. Алкиппе лежала на плюшевом диване из искусственной кожи в дальнем конце комнаты. Она упиралась задними лапами в стену, свешиваясь головой почти до самого пола, и держала магией отчёты перед своим лицом. Она провела здесь так же много времени, как и Финикус, и они вместе долгими часами просматривая записи промышленника, пока Яхс и Марсилио были заняты другими аспектами своей работы.\n\n— Конечно, — сказала Алкиппе, бросая заметки на пол и с кряхтением возвращаясь в сидячее положение. Она взяла предложенный бокал магией и сделала большой глоток, тут же сморщившись и закашлявшись, когда коньяк попал ей на язык. — Коньяк?! Нужно было уточнить подробности, прежде чем соглашаться.\n\n— Такое полезно для тебя, это закаляет характер, — ухмыльнулся Финикус, потягивая напиток из своего бокала. Затем он уселся напротив Алкиппе и посмотрел на груду бумаг и папок, разложенных веером вокруг её дивана. — Ну как? Можешь похвастать каким-нибудь потрясающим прорывом?\n\n— Не сильно больше того, что мы уже и так знаем. — Алкиппе вздохнула и, несмотря на своё прежнее отвращение к напитку, сделала ещё один глоток коньяка. — Честно говоря, я даже не знаю, дадут ли "Семена истины" возможность появиться знакам отличия. У существ, принимающих их, случаются мощные галлюцинации, но, похоже, но этом всё.\n\nФиникус задумался на мгновение, и, сделав ещё один глоток коньяка, нахмурился. — Знаешь... я читаю все эти отчеты... и мне кажется, что я кое-что понял."
changelings_paxchrysalia.604.a:0 "Да? И что же?"

changelings_paxchrysalia.1604.t:0 "Смысл жизни"
changelings_paxchrysalia.1604.d:0 "— Я понял... ну, что мне плевать на знак отличия, — сказал Финикус. — Я не ищу свой знак, чтобы быть лучше в чём-то. Я ищу знак, который скажет мне, что делать со своей жизнью. Я почти всю свою жизнь посвятил одному-единственному делу: зарабатыванию денег. Мне было плевать на способы, которыми я этого добивался, я просто хотел это сделать просто потому, что думал, что деньги дадут мне ответ на вопрос о том, что делать со своей жизнью. Мне просто нужно было насытиться деньгами, и в конце концов я бы понял, что со всем этим делать.\n\n— А теперь у меня есть все эти деньги, — продолжал он, обводя комнату копытом. — У меня больше денег, чем я мог себе представить, ведь я - генеральный директор и президент "Мейн-Хайв". Они, деньги позволили мне приобрести этот удивительный дом, а также обеспечивают ежедневные удобства. Но что всё это мне даёт на самом деле? Ничего. И теперь, когда Великая Война и все сопутствующие ей отвратительные смерти и разрушения закончились, я больше не хочу быть частью всего этого. Так что я просто не знаю... что хочу делать со своей жизнью? — Финикус пожал плечами. — Может быть, эти семена помогут мне. В конце концов, какой смысл в том, чтобы получить знак отличия, если я даже не знаю, какой знак мне нужен? Я бы предпочёл просто знать, чем я должен заниматься всю оставшуюся жизнь, а потом приняться за дело своей жизни.\n\nАлкиппе, хоть и удивилась поначалу этому признанию, чуть позже медленно кивнула в ответ. — Да... Я понимаю, что ты имеешь в виду. Я никогда не знала, что именно хочу делать со своей жизнью. Я четыре раза меняла специальности в колледже, прежде чем в конце концов бросила учёбу и пошла в армию. Теперь я служу здесь Яхсу... но иногда мне кажется, что я являюсь лишь правым копытом Яхса. И я с радостью помогу ему в случае необходимости, не пойми меня неправильно... но если завтра Яхс уйдет на пенсию, то я не знаю, что мне делать дальше. Я не знаю, что сделает меня счастливой. Иногда мне хочется, чтобы можно было просто расспросить кого-то и выяснить у него, чем я должна заниматься в своей жизни...\n\nДвое чейнджлингов медленно встретились взглядами, и в этот момент приняли решение. — К Дискорду знаки и всё подобное им дерьмо, — сказал Финикус. — "Семена истины" дадут нам то, чего мы хотим. Жизнь - это нечто большее, чем просто маленькая картинка на твоей заднице. Это то, что ты делаешь с ним, а не то, что у тебя хорошо получается."
changelings_paxchrysalia.1604.a:0 "Будем надеяться, что наши друзья поймут это."

changelings_paxchrysalia.2604.t:0 "Meeting"
changelings_paxchrysalia.2604.d:0 "Alcippe was nervous while Yahs and Marsilio were settling into their seats, joining her and Finicus at the meeting. Yahs rubbed his eyes, which hurt after another night full of work, and did not waste any time, starting a discussion. —So, Marsilio informed me just last night that, based on information from one of his buddies in Vesalipolis, the Royal Guard had somehow heard about our attempts to stabilize the 'Desire of the Heart' with the extract of the 'Poisonous Joke' to give signs to the Changelings. And now they have initiated their own research in this area. Someone from the WABB must have warned them. I still can't figure out which of our employees reports to Vaspir and who doesn't. I'll probably never understand it. But now that the Queen's royal guard and, consequently, the Empress Chrysalis herself know that "Heart's Desire" and "Poisonous Joke" can be a very powerful combination capable of giving signs, they insist on conducting research in this area. And that's what we're going to do. Alkippe and Finikus, do you have any good arguments in favor of the "Seeds of Truth"? I know that the two of you have done a lot of research on this topic.pAlkippe and Finikus looked at each other, and the industrialist was the first to take the initiative. — Well, there's a funny thing here. Alkippe and I had some interesting conversations last night, and we thought about it... we thought about that... that we don't need signs. The "Seeds of Truth" will not give changelings marks, but they can be used to make a changeling or pony experience very vivid hallucinations or, in other words, a real epiphany. If you combine this effect with the "Desire of the Heart"... well, I think that's how any changeling can understand the meaning of life... or at least HIS life. And this, it seems to us, is more important than any picture on the side of a changeling.Pyahs and Marsilio exchanged glances, as if they weren't sure they'd heard the words correctly, and then Yahs frowned. — Do you want to give up the idea of giving signs to changelings? Give up on the greatest discovery in the history of our species just because you can't figure out what you want to do with your lives?"That's extremely selfish,— Marsilio said. — Well, maybe it sounds too rude. But it's definitely short-sighted and impulsive. We have a chance to improve our species in innumerable ways. And some intense narcotic trip won't help it in any way. If you really want to dream about what to do with your life, then just go to Gloriosa and ask her for drugs. At least this way you won't waste our resources just to show off."
changelings_paxchrysalia.2604.a:0"It's a waste of time and resources. A "poisonous joke" is the way to success."

changelings_paxchrysalia.3604.t:0 "Solution"
changelings_paxchrysalia.3604.d:0 "— You won't make the world a better place just by giving changelings insignia," Alkippe objected. "Do you think that any discoveries we make will leave the jurisdiction of the Royal Guard?" Sure, they can let you guys get your own insignia, but not the average changeling. They will only give signs to their best soldiers or infiltrators, and will only make the stranglehold of Pax Chrysalia even tighter. You will simply create an even stronger and more oppressive regime with this. But with the Seeds of Truth, we can help our species gain the individuality we crave. We will be able to show each changeling what he really wants in life. Even after our society itself has crushed all their hopes and dreams in their youth.\n\n— You're missing the point," said Alkippe Finikus. "Even if we give Chrysalis the sign of Celestia, it won't make her kind and compassionate. Although, of course, it will greatly increase her strength. Our artificial insignia will simply become another way to give changelings additional talent in a particular task, or simply increase their effectiveness in some area. But in order to fundamentally change our whole appearance and our whole essence, it will take more than just a picture on the side. The obsession to turn artificial signs into reality only blinds you. And you don't see what these signs will do to the world. They definitely won't change it for the better.Marsilio opened his mouth to protest, but Yahs stopped him with a raised hoof. "I don't want this to escalate into a row and shouting at each other," he said. "I went to bed late last night and I have a headache, so I'd like you to keep your voice down." But more importantly, we're friends, and friends don't have to tear each other apart. So let's make a final decision here, in this room, and just between us. Ok?  When all the changelings nodded, Yahs put his hooves on the table. — great. I'm not going to get involved in this case and take sides. The three of you can handle this on your own.Marsilio and Finicus immediately made eye contact. Alkippe realized that neither of them would back down. With horror, she realized that the final decision depended on her. So what did she want: a way to give changelings insignia? Or the opportunity to understand the meaning of their lives?"
changelings_paxchrysalia.3604.a:0 "We will use a "Poisonous joke" to give changelings the insignia."
changelings_paxchrysalia.3604.b:0 "We will use the "Seeds of Truth" to understand the meaning of our lives."

changelings_paxchrysalia.605.t:0 "Hunting for a joke"
changelings_paxchrysalia.605.d:0 "Oberstleutnant Alkippe took a deep breath as she got out of the armored personnel carrier and felt the wet earth under her hooves. In front of her towered the mighty trees of the Everglades Forest, which looked as if they were ready to swallow her whole. The bone-like tree branches and ash-covered trunks stood in stark contrast to the still-living plants. The whole sight was a reminder of the scars the army had inflicted on the magical forest in an attempt to quell the rebellion that had broken out in it.Pona left the car behind and took a few steps towards a clearing where several changelings were looking at a battered map. She immediately recognized Marsilio, as well as several soldiers from the Yahsa 96. Canterlonian division, who had been specially selected for this assignment, but the rest were unfamiliar to her. As she approached, she cleared her throat, after which the soldiers raised their heads and saluted her."Gentlemen," Alcippe greeted them, and then turned her attention to Marsilio. "Well, General-oberstabsartst?" How are things going here?\n\n[CHN_scripted_loc_event_1605]\n\nThe ground pony nerd next to Marsilio, his friend named Green Hoof, nodded. — The army's attempts to pacify the forest had a detrimental effect on the local flora. Most of the "Poison Joke" locations that I knew about have now been burned to the ground. We will have to go deeper into the forest to try to find these plants."Don't worry,— the captain standing next to Alkippe said, grinning confidently at the assembled changelings. "My soldiers will guard us with all their might. We'll quickly enter and exit the forest before trouble catches up with us.\n\n— I'm glad to hear that,— said Alkippe. — Well, can we go on the road?"We're as ready as ever,— Marsilio replied, folding the map and stuffing it into his jacket pocket. "Let's move out."
changelings_paxchrysalia.605.a:0 "The sooner we find the right plant, the sooner we can leave this creepy place."

changelings_paxchrysalia.1605.t:0 "In search of the truth"
changelings_paxchrysalia.1605.d:0 "Oberstleutnant Alkippe took a deep breath as she got out of the armored personnel carrier and felt the wet earth under her hooves. In front of her towered the mighty trees of the Everglades Forest, which looked as if they were ready to swallow her whole. The bone-like tree branches and ash-covered trunks stood in stark contrast to the still-living plants. The whole sight was a reminder of the scars the army had inflicted on the magical forest in an attempt to quell the rebellion that had broken out in it.Pona left the car behind and took a few steps towards a clearing where several changelings were looking at a battered map. She immediately recognized Marsilio, as well as several soldiers from the Yahsa 96. Canterlonian division, who had been specially selected for this assignment, but the rest were unfamiliar to her. As she approached, she cleared her throat, after which the soldiers raised their heads and saluted her."Gentlemen," Alcippe greeted them, and then turned her attention to Marsilio. "Well, General-oberstabsartst?" How are things going here?\n\n[[CHN_scripted_loc_event_1605]\n\nThe ground pony nerd next to Marsilio, his friend named Green Hoof, nodded. — The army's attempts to pacify the forest had a detrimental effect on the local flora. Most of the tree trunks from which I used to collect the "Seeds of Truth" have now been burned out. We need to find some completely intact trees if we want to find intact seed pods. We will have to go deeper into the forest to try to find these trees."Don't worry,— the captain standing next to Alkippe said, grinning confidently at the assembled changelings. "My soldiers will guard us with all their might. We'll quickly enter and exit the forest before trouble catches up with us.\n\n— I'm glad to hear that,— said Alkippe. — Well, can we go on the road?"We're as ready as ever,— Marsilio replied, folding the map and stuffing it into his jacket pocket. "Let's move out."
changelings_paxchrysalia.1605.a:0 "The sooner we find the right plant, the sooner we can leave this creepy place"

CHN_event_1605_Everfree_destroyed:0 "Look for yourself,— Marsilio said, pointing to the dead and withered trees around the crowd. - The forest has received a significant blow from the army. Of course, we did away with the guerrillas that were hiding inside it, but we also destroyed a lot of plant and animal life. It won't be easy to find the plants we need, that's for sure. But on the other hand, we don't have to worry about monster attacks or guerrilla ambushes."
CHN_event_1605_Everfree_not_destroyed:0 "Look for yourself,— Marsilio said, pointing to the overhanging trees, whose dense crowns blocked the sunlight. "This forest defeated the army. He withstood everything we threw at him, and now we're trying to slip inside the forest with only a small escort to quickly find the plant we need and get out immediately. If we're lucky, we'll be able to get in and out unnoticed. But I'm sure I'm not the only bug that feels like someone is watching us from behind the trees. Hopefully, our escort will be enough to fend off any monsters or guerrillas we may encounter."

changelings_paxchrysalia.606.t:0 "In search of seeds" ## No Seeds of Truth ##
changelings_paxchrysalia.606.d:0 "Alkippe woke up after another night of restless sleep in a camp in the middle of an ominous Everglades Forest. Although the forest was destroyed and battered by the army, it did not become any less creepy, and Alcippa found it difficult to get a good night's sleep for fear that terrifying monsters might prowl right outside the camp. They had already suffered quite a few losses during this week spent in the forest. Many members of the expedition and escort died due to treefolk attacks and Manticore ambushes. So now their squad has decreased in size by a quarter. The longer they stayed in the forest, the higher the risk that none of them would make it out alive.pAlkippe left her room and headed to the table, where Marsilio and Green Hoof were already gathered next to the coffee pot in an attempt to gain strength for another fruitless day of searching for the "Seeds of Truth." —I know none of us got enough sleep last night," Alkippe said, sitting down and pouring herself a cup of coffee. — How much longer do you think we can hold out here?\n\n—Not long at all, to tell the truth," Marsilio replied. — This place gets on everyone's nerves. Didn't you hear the whispering of the trees last night? I know it's true.\n\n— All the old places for collecting the "Seeds of Truth" have now been destroyed, — complained Green Hoof. — The trees suitable for them grow only on swampy soil, and all the swamps on the periphery of the Everglades Forest have dried up. We'll have to dig even deeper into the forest to find something... but I'm sure you can understand why I really don't like this option.\n\n— That's right,— Alkippe said with a sigh. Even the coffee didn't make her feel better. But, swallowing the lump in her throat, she turned to Marsilio. "So what are we going to do?" Should we turn around and go home with empty hooves? Or are we going to keep looking until everyone here is dead?"Fuck those seeds," he muttered, tossing aside his empty coffee cup. "We won't find anything here. Let's pack up and get out of this forest to a safe place. Maybe we can find some kind of "Poisonous Joke" on the way back, as I originally wanted. This is a more reliable option than some pods with seeds from a swamp."
changelings_paxchrysalia.606.a:0 "Apparently, we will never know the truth..."

changelings_paxchrysalia.1606.t:0 "In search of seeds" ## Seeds of Truth Recovered ##
changelings_paxchrysalia.1606.d:0 "The escort guarding Alcippe, Marsilio and Green Hoof moved deeper and deeper into the forest. The nerd pony quickly realized that their best chance of finding seeds was to travel to the almost untouched heart of the Everglades Forest. It took a lot of effort to get that deep.: skirmishes with the guerrillas were common due to the army's failure to conquer this terrible place many years ago, so the escort suffered considerable losses. Even Hauptman Skolitin, who seemed so cocky and self-confident at the beginning of the journey, became more and more depressed and serious as the losses of soldiers in the forest increased. They had already lost half of their guards, and Alcippe wondered if any of them would survive by the time they decided to return home.The mechanized transport in which Alcippe was traveling with Marsilio, Green Hoof and Scolitin suddenly stopped, crashing into something invisible ahead. —An ambush!  Someone shouted from the other side of the bulletproof metal, and Alkippe could have sworn she heard someone else yell "It's a witch!" before the shooting started. It lasted for several minutes. The intensity of the gunfire, as well as the volume of the screams, slowly subsided until an ominous silence settled outside.Palsipp, Marsilio, and Green Hoof huddled in a corner of the car, while Skolitin grabbed a rifle and cautiously headed for the door. He had just opened it and peeked around the corner when a bamboo pole hit him in the throat, crushing it. The changeling fell to the ground and began to suffocate. Another blow to the head stopped his agony, and then a striped figure appeared in the doorway, whose eyes seemed to burn under a green mask.pAlkippe reached for her pistol, but zebra was faster, instantly burst into the transport and slammed the changeling's head against the wall. Alkippe heard muffled screams between flashes of pain in her head, and when her vision cleared, the changeling realized that she, Marsilio, and Green Hoof had been dragged out of the zebra transport. It was only then, in the dim light of the Everglades Forest, that Alkippe realized who exactly she was looking at."
changelings_paxchrysalia.1606.a:0 "This is Zekora... The witch of the Everglades Forest..."

changelings_paxchrysalia.2606.t:0 "Deal with the Witch" ## 1606 Continued ##
changelings_paxchrysalia.2606.d:0 "— Who do I see in my forest?  Zekora said, looking around at her three captives. — Changelings who couldn't leave the forest alone, and now they came here only to die? But I'll give you a chance to speak out before you die.\n\n— Stop!  Green Hoof shouted, jumping up on his hooves. Zekora frowned and readied her staff, while nerd nervously stepped back. — This is not a military expedition, honestly!  The nerd pleaded. "That's all we need.".. that is, what changelings want is to find the "Seeds of Truth." They're looking for a way to change their whole look, to give it a little personality. They decided that "Seeds of Truth" would be better suited than "A Poisonous Joke." Changelings want to understand their true path forward, to find a way to become something else... Well, than what they are now.\n\n— We are not here to attack your forest again," Marsilio tried to convince Zecora. "We've given up on that. You defeated us. You've overcome everything the army had at its disposal, and we're not going to try again. We just want to collect some plants from the Evergreen Forest. And if we turn out to be right, then this project will benefit both changelings and ponies. We can work together in the future.Zekora squinted at them for a long time. "You are too aggressive, and until that changes, there will be no peace between us," she said. But in the end, the zebra rummaged in the bag on its side and threw a small bag to Green Hoof, who caught it with her hooves. — But I want to believe in your honesty, so take your seeds and leave. But don't linger in this forest. Otherwise, you can stay here forever.After these words, Zekora took her staff, put it under her belt and began to walk away. Bushes rustled, trees stirred, and somewhere a tree wolf howled. The zebra disappeared into the darkness of the Evergladen Forest, and the three survivors, who already had the seeds they were looking for, chose not to waste time and not to tempt fate."
changelings_paxchrysalia.2606.a:0 "Let's get out of here. Immediately."

changelings_paxchrysalia.3606.t:0 "Poison Joke" ## Poison Joke, Defeated Everfree ##
changelings_paxchrysalia.3606.d:0 "— Over there! A poisonous joke! I think I see her!Alcippe and I felt like a hoof lifted off when the transport stopped. Green Hoof was the first to run to the transport door, opened it and jumped out. She was followed by Hauptmann Skolitin, with his weapon ready in case of an attack. Marsilio and Alcippe got out after them, and the Oberstleutnant's eyes widened when she saw a faintly glowing blue patch of flowers just thirty meters away. The flower patch was located directly under the moss-covered branches of a huge willow, completely invisible to aerial reconnaissance. Only blind luck led the team to this place.Marsilio smiled broadly as his team immediately set about carefully collecting samples of the dangerous flower. — "A poisonous joke", "A poisonous joke". I knew we'd find you sooner or later. I can't wait to study these flowers in my laboratory.\n\n— Let's hope it works,— Alkippe said. — At least it will justify all the trouble we've been through.The team spent almost an hour carefully collecting and cataloging the plants, but then an eerie roar interrupted them. — Teddy bear! From the west!  A soldier shouted, and the infantry escorts took up a position to destroy the monster with heavy weapons. Hauptmann Skolitin approached Alcippe and Marsilio. "You'd better hurry," he told them. — If there is one bear here, then surely there are others nearby. — He then left to join his soldiers as the monster approached the convoy.pAlkippe and Marsilio took the warning seriously and therefore quickly finished picking flowers. By that time, the anti-tank rifles of their escort had already dealt with the bear. So soon, a convoy with dozens of flowers safely hidden in glass jars inside armored vehicles set off from the forest."
changelings_paxchrysalia.3606.a:0 "It's time to see what these flowers are capable of!"

changelings_paxchrysalia.4606.t:0 "Poison Joke" ## Poison Joke, Victorious Everfree ##
changelings_paxchrysalia.4606.d:0 "— Over there! A poisonous joke! I think I see her!Alcippe and I felt like a hoof lifted off when the transport stopped. Green Hoof was the first to run to the transport door, opened it and jumped out. She was followed by Hauptmann Skolitin, with his weapon ready in case of an attack. Marsilio and Alcippe got out after them, and the Oberstleutnant's eyes widened when she saw a faintly glowing blue patch of flowers just thirty meters away. The flower patch was located directly under the moss-covered branches of a huge willow, completely invisible to aerial reconnaissance. Only blind luck led the team to this place.Marsilio smiled broadly as his team immediately set about carefully collecting samples of the dangerous flower. — "A poisonous joke", "A poisonous joke". I knew we'd find you sooner or later. I can't wait to study these flowers in my laboratory.\n\n— Let's hope it works,— Alkippe said. — At least it will justify all the trouble we've been through.\n\n It was at that moment that a firefight broke out. A deafening battle cry rang out and the guerrilla ponies jumped out of the thicket, shooting at the confused changelings. —An ambush!  One soldier shouted, who was immediately killed. His comrades fell into the mud and grabbed their weapons to fight back. Alcippe, Green Hoof and Marsilio were still picking flowers when the shooting started. Realizing the danger they were in, the changelings immediately left the grove and raced back to the waiting cars. Bullets whizzed over Alkippe's head, and she blindly fired her pistol into the thicket around them, trying to buy at least some time. But when they jumped into the back of a mechanized transport, Green Hoof tripped and fell. Marsilio jumped back out to drag her into the transport. But before the earth pony could get inside, Marsilio screamed and fell to the ground. The blood stained his clothes and soaked them through in a matter of seconds. "Marsilio!"  Alkippe screamed, stopping to grab her friend, but Hauptman Skolitin managed to drag her inside the car and slam the door. — no!  Alcippe tried to go back for Marsilio, but Scolit pinned her to the bottom of the car and kicked her against the side of the transport.\n\n— Go ahead! Go ahead! — he shouted to the driver, and after a few seconds the transport moved, escaping from the ambush. When the shooting subsided, Alkippe continued to cry and tremble, knowing that she had left her friend for dead... Even if there was nothing she could do in the depths of the Evergreen Forest to save him."
changelings_paxchrysalia.4606.a:0 "These flowers are not worth it. They're not worth it!"

changelings_paxchrysalia.607.t:0 "It's time to get to work" ## Poison Joke Ending - Marsilio Alive ##
changelings_paxchrysalia.607.d:0 "Marsilio proudly showed off a blue flower in a glass jar to his friends, who leaned closer to get a better look at it. "It's beautiful, isn't it?"  He said with a grin. — One small flower with unprecedented potential.\n\n— You better be careful with this thing," warned Second Wind, who found some time to visit friends. — Every foal in Equestria has heard stories about the dangers of "Poison Jokes." The name here is deceptive, the effects of these colors are not funny at all."I'm the army's chief surgeon, one of the hives' greatest scientists," Marsilio objected. "Don't worry about me. I know what I'm doing.\n\n— So do you think it will really work? "That we're about to receive insignia?—\n\n— I have some volunteers who will help us figure this out. As soon as we get a stable composition, we will start testing it.\n\n— I still think we should have bet on the Seeds of Truth,— said Finikus, crossing his front paws. — But what is, what is. If this thing really works, I'll consider it all a success.\n\n— But how do you know that this will really help all changelings in general?  Alkippe asked. — most likely, the Royal Guard is just going to use our discovery for their own purposes, creating the best soldiers and infiltrators. What is the use of this for ordinary changeling?\n\n— Benefit... eventually she will," Marsilio said, waving the question away with a hoof. — As soon as the insignia is widely distributed in the army and the Royal Guard, they will become available to ordinary citizens. There will be huge changes in politics, culture, and even the economy. Once the army sees how useful the insignia is, it's only a matter of time before they allow civilian use of them.  Marsilio picked up a glass jar, tapped it, and smiled at the rest of his friends. "Now I have to get to work." Discoveries are not waiting for anyone!"
changelings_paxchrysalia.607.a:0 "I hope this will work..."

changelings_paxchrysalia.608.t:0 "Directive from UOBV"
changelings_paxchrysalia.608.d:0 "It's been a few days since Marsilio started looking for the perfect combination for a mix of "Heart Desire" and "Poisonous Joke." The experiments were conducted strictly and methodically. The concentrations of each plant varied until an optimal solution was formed. But there were much more difficulties than successes along this path of trial and error. Fortunately, Marsilio had all the "Poison Joke" he needed, and he was even able to set aside some of the harvest to grow more plants. If he had enough time, he could have found the perfect solution that would help him give the changeling insignia.\n\nthat's just that he didn't have time. A week after he reported on the successful collection of the "Poisonous Joke" by the WOBW and the Royal Guard, he found an urgent directive on his desk. It contained an order from Vaspir Orn Cladisium to begin experimenting with test subjects immediately. It seemed that WOBB wanted the signs even more than Yahs and Marsilio had anticipated. Although Marsilio didn't want to rush things, he knew that trying to convince the WOBW to wait wasn't the smartest thing to do. So, choosing the best composition that he had developed, Marsilio sent a request for brave volunteers for the latest secret program of the Royal Guard."
changelings_paxchrysalia.608.a:0 "You can't rush science, but scientists can."

changelings_paxchrysalia.609.t:0 "Test number 1 — "Dead Eye"-Sniper"
changelings_paxchrysalia.609.d:0 "RESEARCHER'S NAME: Dr. Marsilio\n\EXPERIMENT IDENTIFIER: 242aVIcVDa\n\SUBJECT'S IDENTIFIER: 007 'Dead Eye'\n\N SUBJECT's origin: 244 Jaeger squad\n\n Notes ON THE EXPERIMENT: The subject was known in the jaeger corps as an excellent marksman. The subject was given an insignia depicting a crosshair and a target. The accuracy of shooting increased by about 500%, and the subject was able to hit targets at a distance of up to 1 km using a rifle without sight. The subject was given an experimental magic submachine gun, with which he fired 30 targeted shots at moving targets in 30 seconds. When the subject reloaded the weapon and tried to continue firing, a catastrophic malfunction occurred with the overheated weapon, and the subjects received severe thermal plasma burns.\n\nSTATUS: DIED"
changelings_paxchrysalia.609.a:0 "What a misfortune."

changelings_paxchrysalia.1609.t:0 "Test number 2 — Gastronomic genius"
changelings_paxchrysalia.1609.d:0 "RESEARCHER'S NAME: Dr. Marsilio EXPERIMENT ID: 090Im46s0Y SUBJECT ID: 024'Baker'\n\nThe origin of THE SUBJECT: The Infiltrator squad of the OOBV number 046\n\n Notes ON THE EXPERIMENT: The subject was initially involved as an understudy for the famous griffin chef Gustave Le Grand, who served the emperors of Griffonia in the past before emigrating to Equestria. Originally, the test subject was supposed to go to Gryphonstone disguised as Gustav and ingratiate herself with the local court, but she was initially denied a baking-related distinction to enhance her abilities. She received a badge of distinction with the image of a huge dessert cake. The tests were successful, even despite the fact that the insignia did not appear in the griffin disguise. The subject demonstrated abilities at the level of the best bakers in the world, although she was not famous for her cooking skills before. She began experimenting with creating more and more sumptuous dishes, before a strange accident involving an overly sealed can of whipped cream catastrophically opened next to the subject's face, separating her head from her body.\n\nSTATUS: "
changelings_paxchrysalia.1609.a has PASSED AWAY:0 "It seems that this is the first changeling who was killed by milk..."

changelings_paxchrysalia.2609.t:0 "Test number 3 — The Smasher"
changelings_paxchrysalia.2609.d:0 "RESEARCHER'S NAME: Dr. Marsilio EXPERIMENT ID: 565JmKyn3u SUBJECT ID: 033 'Gladiator' SUBJECT'S ORIGIN: 43 Assault sapper battalion EXPERIMENT NOTES:The subject was a member of the assault brigades tasked with exploiting the slightest gaps in Equestrian defenses to break through, and he is also an experienced sapper and expert in close combat. The subject was given an insignia depicting a hoof piercing a brick wall. He immediately experienced increased skill in close combat, knocking out every sparring partner he fought, including a fight in which he was attacked by fifteen opponents at once. The subject also showed increased physical strength and pain tolerance, as well as resistance to injury. The subject tried to break through a brick wall during a demonstration of his strength, but the wall collapsed right on top of him, killing the changeling on the spot.\n\nSTATUS: The "
changelings_paxchrysalia.2609.a:0 "has PASSED AWAY... It's ironic."

changelings_paxchrysalia.3609.t:0 "Test number 4 — Acrobat Aeronaut"
changelings_paxchrysalia.3609.d:0 "RESEARCHER'S NAME: Dr. Marsilio\n\EXPERIMENT ID: 785VKhBZf1\n\SUBJECT ID: 050'Vogel'\n\nThe origin OF THE SUBJECT: Luftwaffe Fighter Squadron number 50\n\n EXPERIMENTAL NOTES:The subject was a fighter ace during the war and personally shot down an enemy ace named Rainbow Dash at the end of the war. The subject received a badge of distinction with the image of a fighter hovering above the clouds. The flight abilities of the subject were tested on an experimental jet fighter. He demonstrated excellent machine control skills, despite the fact that he was not familiar with this type of aircraft. The subject also performed very well in firing tests: he hit dummy tanks and other towed targets with an accuracy of 98.7% on the first approach and 100% on the second. During the attacks on the airships, the wreckage of one of them seriously damaged the jet, forcing the subject to make an emergency landing. Although he survived the landing, his wings were severely damaged in the crash. When the subject was discharged from the hospital and he tried to take off, a sudden gust of wind blew him right under the wheels of a moving truck.\n\nSTATUS: "
changelings_paxchrysalia.3609.a:0 " has PASSED AWAY, it will not take off anymore..."

changelings_paxchrysalia.610.t:0 "Killer joke"
changelings_paxchrysalia.610.d:0 " Marsilio stared out the window of his office, watching the sun set over Canterlot once again. In the corner of his desk lay a discarded note describing the latest trials of the "Poisonous Joke." The same thing happened every time. Even though the insignia gave the subjects what Marsilio had planned, even though they worked great in the short term, there was always some strange accident that killed the subject. Each trial ended with the death of the changeling, as if the universe itself was saying that all this violated the natural order of the world. Maybe it was. Maybe that's why the WABB told him to stop.\n\He let the letter slip out of his magic. The program itself has not been officially cancelled. Rather, the UOBV and the Royal Guard decided to reallocate almost all of the funding to other, more promising projects. But the effect was the same. The project was dead, and without the funds to continue his research, Marsilio had no choice but to stop. There was no other way to describe what had happened: he had failed.Only now could Marsilio understand what had been clouding his vision for so long. He and Yahs were extremely passionate about creating insignia. But not so that the changeling species as a whole can benefit from this. Oh no. They were talking about themselves. They wanted to get their own insignia, as if it would help them grab their fate by the horns and direct it, which was not previously available to any changeling. How many changelings and ponies died before he received this letter from the WOBW? And how many more would have died if WOBB hadn't canceled the project?Finally, Marsilio realized how stupid he had been. This whole project has been a fool's errand from day one. But it's good that he was able to figure it out before the project swallowed him up."
changelings_paxchrysalia.610.a:0 "The laws of nature are stronger than the will of creatures."

changelings_paxchrysalia.611.t:0 "Despair"
changelings_paxchrysalia.611.d:0 "Marsilio ran into a worried Finicus right in front of the train that was supposed to take all the notes and materials on the failed project with insignia back to Vesalipolis. "Finicus?"  Marsilio asked, making the industrialist jump in surprise. "What are you doing here?""It's a pity that the project was canceled," said Finikus, frowning at the train. "He was so promising. We could have done so many great things with his help."It's too dangerous," Marsilio said, shaking his head. — And we were idiots when we pursued this goal. It's better to just quietly and permanently remove this project from the scene.\n\n— How can you say that?  Finicus barked, catching Marsilio off guard. — After everything we've been through to finally give the Changelings the insignia... How can we just give up now? How can we give up when our fate is right there?!\n\n— This is not our destiny,— Marsilio objected. — We tried to take control of forces that we don't understand. No one, neither a changeling nor a pony, can know about their true fate. Our destiny is what we choose to do with our lives, not what our lives tell us to do.\n\n— Fuck it all!  Finikus exclaimed. — Yes, I wanted to use the "Seeds of Truth" to tell me what to do with my life! I feel so confused and apathetic, like a ship without a captain. These seeds could help me find my place in this stupid world I live in! Yes, we don't have the seeds, but we got the "Poison Joke." It was a good consolation prize, with which I can choose what I want to do in my life. But now it's going to the trash too. What am I supposed to do now?He rushed to Marsilio, grabbed him by the lapels of his jacket and pulled him towards him. — You have everything you need to create at least one more potion that gives you the insignia. I know it's true. Please just give me a label with something like a watercolor. I always wanted to be an artist, but life had other plans for me. I've been trained for this stupid job since I was a kid. I had no say in this matter. But now I know. Now I want to go back to my dreams. And you can help me.  He gave Marsilio a desperate smile. "You're going to help me, Marsilio. Isn't that right?"
changelings_paxchrysalia.611.a:0 "Me... I can, Finicus. Yes, I will help."
changelings_paxchrysalia.611.b:0 "Finicus, no. This has to stop. This has to stop immediately."

changelings_paxchrysalia.612.t:0 "Gloomy picture"
changelings_paxchrysalia.612.d:0 "— Is something bothering you, Marsilio?  Yahs asked, putting down his fork and knife. "It's like you've been out all dinner."Marsilio sighed and shook his head. — Do you remember the cancelled project "Badge of Distinction"?\n\n — How can you forget about this, — said Yahs. — What a disaster it turned out to be! Well... At least it's over now.\n\n— Yes, but...  Marsilio hesitated, and when Yahs looked at him a little more closely, he sighed and shook his head. — That's not quite true. Finicus begged me to give him one of my last potions. He needed a badge of distinction related to painting. And I... I gave it to him.\n\n Yahsa's eyes widened. "What did you do?" "What is it?" he asked, but was immediately interrupted by the adjutant who ran into the restaurant and saluted him. He showed a hoof to Marsilio and turned to the adjutant. "What's the matter?"\n\n— Major General... Oberstleutnant Alkippe called me to inform you that your friend, Finikus Vesali, has been found dead in his apartment in Vesalipolis.  The soldier hesitated, seeing the shock on Yahs' face, and bowed his head. "I... I'm sorry, sir.\n\n— Dead," Yahs muttered to himself and, looking at Marsilio, saw the horror on his friend's face. "How did he die, soldier?"\n\n is His body... They found it in the study, surrounded by all kinds of paintings," said the soldier. — There were traces of toxic heavy metals in the paints he used. The coroner believes that the paint got from the canvas of the painting into the coffee cup, and that's how he got poisoned.  When neither Yahs nor Marsilio responded to this, the soldier awkwardly saluted once more and took a step back. "I will... arrange a trip to Vesalipolis so that you can attend the funeral, sir. I'm very sorry, sir.\n\When he left, Yahs and Marsilio looked at each other in shock for a long time, not quite believing the soldier's words."
changelings_paxchrysalia.612.a:0 "What have we done?"

changelings_paxchrysalia.613.t:0 "It's time to cancel everything" ## Escape Event from 611 ##
changelings_paxchrysalia.613.d:0 "After the confrontation with Marsilio on the train, Finikus went to his house in Canterlot for a few days to think about everything. The complete failure of the Badge of Distinction program just devastated him. He desperately wanted some kind of divine intervention to be able to show him his fate. He refused to believe that he was destined to spend the rest of his life at the top of a corporation profiting from death and destruction. At least he hoped to find an excuse that would confirm his desire to put it all behind him and do something else, something better. But that didn't happen. Neither with the help of a "Poisonous joke", nor with the help of "Seeds of Truth". He stayed where he was, helpless and adrift, and the only thing Finicus could hold on to now was the status quo.But gradually he understood what Marsilio meant. Subject after subject died, receiving their insignia. All this was just an attempt to play God, and they were punished for it. Marsilio was right: his destiny is to choose what to do with his life, not what life tells him to do. And right now, he had a choice. He could be moping because he didn't get what he wanted. Or Finicus could actually take on some responsibility and, as president and CEO of Main Highway Industries, do everything possible to make things a little better. Maybe when he finishes making the world a better place, he will be able to direct his efforts to improve himself in a very old-fashioned way. In any case, the idea of getting a badge of distinction in the field of painting was a simple hoax. But what about the feeling of pride and satisfaction?Taking a deep breath, Finicus went to his office and began to write a note announcing Main Highway's refusal to participate in the Badge of Distinction project. And then, when things calm down a bit, he will be able to direct his company to something better than just war and death.\n\nThe time has come to change the world."
changelings_paxchrysalia.613.a:0 "Life is what you do to it, not what it does to you."

changelings_paxchrysalia.614.t:0 "Cracks in friendship" ## Marsilio is big dead ##
changelings_paxchrysalia.614.d:0 "Yahs was sitting in his office with the curtains drawn. The only source of light inside the room was the faint sunlight that filtered through the cracks. The day was too clear and cheerful, and the last thing Jax wanted to do was look at the blue sky and fluffy white clouds. The Everglades Forest had taken away one of his oldest friends, and the world didn't even have the decency to pretend to share Yahs' suffering.The door to his office swung open, and Yahs jumped when Finikus burst inside. —Unbelievable," he growled, stamping his hooves on the floor. — A disaster has happened! A complete disaster! Marsilio feeds the tree wolves, and the army is after my ass because of his death. As if it was me, and not them, who failed to pacify the forest, who was to blame for Marsilio's death! Main Highway will be blacklisted by the army and the Royal Guard forever, and I'll be lucky if I can keep my company afloat by selling toothpicks!\n\Pyahs sighed and shook his head. "We knew the risks," he muttered. — There was always a chance that something like this could happen. I was hoping that an escort would be enough...\n\n— Well, that wasn't enough, was it, Yahs? — Finicus spat at him. — Everything is falling apart, absolutely everything! Everything we were hoping for! I was trying to tell you idiots that a "Poisonous joke" wouldn't do us any good, and we should have looked for the "Seeds of Truth" instead... \n\n— That's enough!  Yahs shouted, getting up and hitting the table with his hooves. —Did you come here just to complain about me and rub my nose in the dirt because of Marsilio's death?" Yes, it's my fault that the Everglades Forest wasn't contained, so Marsilio's death is on my hooves! If you want to say it, then just say it directly!Finicus's eyes narrowed, and he stepped back. "All right, Yahs. You killed him, if that's what you want to hear. But I didn't come here to tell you that. I came here to inform you that I am leaving for Vesalipolis and it is unlikely that I will return to Canterlot. I have to save my company by starting with a report to the board of directors at headquarters. And it's not a fact that I'll still have a job in a month.There was silence in the room for several long seconds, and then Finikus turned around and left. — Goodbye, Yahs. Maybe we'll meet again someday."
changelings_paxchrysalia.614.a:0 "Canterlot has started to empty..."

changelings_paxchrysalia.615.t:0 "The End of Friendship" ## Marsilio version ##
changelings_paxchrysalia.615.d:0 "— Alkippe?Hearing Yahs's voice behind her, Alkippe shuddered and, clenching her teeth, tried to calm down. She hoped that he wouldn't visit her before she left, but her dreams didn't come true. — Yes, Major General?  She said, throwing the folders into the briefcase with her magic. She couldn't bring herself to look over her shoulder at the approaching Yahs, for fear that if she looked Yahs in the eye, her resolve would disappear.\n\n— What's going on here?  Yahs asked, finally catching up with Alkippe. "Are you going somewhere?"  He blinked, and then his jaw dropped as he realized the meaning of everything that was happening. —You didn't...?\n\n—I requested a transfer to Manhattan,— Alkippe finally said, closing her eyes to hold back tears. "Lady Protector Lilac has her own ideas on how to improve Pax Chrysalia for all her subjects. And after all that's happened here in the last few weeks... I need a change.\n\n— Alkippe...  Yahs tried to put a hoof on Alkippe's shoulder, but she abruptly shook him off and stepped aside. The Major General stood on three hooves for a few moments, and clumsily held the fourth in the air. But then he slowly lowered him back to the ground. If you think it's right...pAlkippe took a deep breath and nodded. "I... yes, I do," she finally said. "I wasn't good enough to protect Marsilio in the field. I wasn't a good soldier, but on top of that, I watched this whole stupid insignia project tear us apart. We were very, very close friends, and then it all drove wedges between us. That's what we were trying to do... Well, it works on paper. But in reality, this project has failed us all... I don't know.  She lifted her hooves into the air. "I just.....can't be here anymore, Yahs. I need more space. I just hope I can get it in Manhattan. You've always been good to me... But now I need my own way.\n\Pyahs was silent for a while before nodding. "Thank you, Oberstleutnant," he said in a low voice, "I... I'm sorry that it ended like this." But you have to do what you have to do. Just like me.  He pursed his lips, swallowed hard, and then turned around. He was halfway to the door when he stopped and turned back around again. —Will you... say goodbye to me when you're ready to leave?"\n\n— I... yes, Major General,— Alkippe said. She didn't look up to see if Yahs nodded at her, but soon she heard him leave the office, leaving her alone with a bare desk and empty shelves. And there, in the quiet solitude of the place that had been her home for the past few years, Alcippe lowered her head and cried."
changelings_paxchrysalia.615.a:0 "I'm so sorry, Marsilio. I'm really sorry, Yahs."

changelings_paxchrysalia.1615.t:0 "The End of friendship" ## Finicus version ##
changelings_paxchrysalia.1615.d:0 "— Alkippe?Hearing Yahs's voice behind her, Alkippe shuddered and, clenching her teeth, tried to calm down. She hoped that he would not come to her before she left, but her dreams did not come true. — Yes, Major General?  She said, throwing the folders into the briefcase with her magic. She couldn't bring herself to look over her shoulder at the approaching Yahs, for fear that if she looked Yahs in the eye, her resolve would disappear.\n\n— What's going on here?  Yahs asked, finally catching up with Alkippe. "Are you going somewhere?"  He blinked, and then his jaw dropped as he realized the meaning of everything that was happening. —You didn't...?\n\n—I requested a transfer to Manhattan,— Alkippe finally said, closing her eyes to hold back tears. "Lady Protector Lilac has her own ideas on how to improve Pax Chrysalia for all her subjects. And after all that's happened here in the last few weeks... I need a change.\n\n— Alkippe...  Yahs tried to put a hoof on Alkippe's shoulder, but she abruptly shook him off and stepped aside. The Major General stood on three hooves for a few moments, and clumsily held the fourth in the air. But then he slowly lowered him back to the ground. If you think it's right...pAlkippe took a deep breath and nodded. "I... yes, I do," she finally said. "We weren't there for Finicus when he needed us the most. He desperately needed something that would help him understand his life, make it better... And we failed him.  Alkippe shook her head, feeling tears start to drip from under her eyelids. "I don't think I can forgive Marsilio for giving him this potion and not telling us. I should have tried harder to comfort Finicus after the project stalled. I had to help him use the Seeds of Truth, even if the Poison Joke project failed. I should have done something, but I still didn't do anything. And now I have to start all over again...  She lifted her hooves into the air. "I just.....can't be here anymore, Yahs. I need more space. I just hope I can get it in Manhattan. You've always been good to me... But now I need my own way.\n\Pyahs was silent for a while before nodding. "Thank you, Oberstleutnant," he said in a low voice, "I... I'm sorry that it ended like this." But you have to do what you have to do. Just like me.  He pursed his lips, swallowed hard, and then turned around. He was halfway to the door when he stopped and turned back around again. —Will you... say goodbye to me when you're ready to leave?"\n\n— I... yes, Major General,— Alkippe said. She didn't look up to see if Yahs nodded at her, but soon she heard him leave the office, leaving her alone with a bare desk and empty shelves. And there, in the quiet solitude of the place that had been her home for the past few years, Alkippe lowered her head and cried."
changelings_paxchrysalia.1615.a:0 "I'm so sorry, Finikus. I'm really sorry, Yahs."

changelings_paxchrysalia.616.t:0 "Acquired desire"
changelings_paxchrysalia.616.d:0 "Alkippe immediately realized how great it was to be back in Canterlot. She had spent so much time in the Evergreen Forest that she did not feel safe until she returned to the palace grounds. She even had to stop herself from running out to meet Yahs and hugging him when he and Finikus came over for debriefing.Judging by the smile on his face, Yahs was also relieved when he saw that his friends were back. But that smile turned to a worried expression when he realized that only Alcippe, Marsilio, and Green Hoof had returned from the expedition. "What happened there?" What happened to the others? "They all died, one by one," Alkippe said. —Zekora personally killed Skolitin and the rest of our guards when we reached the heart of the Everglades Forest. We were lucky to get out of there alive."If Dr. Green Hoof hadn't been with us, we wouldn't have gotten out of there," Marsilio said, nodding at the Earth pony, who blushed and lowered her head. — Make sure she gets funding from the army for helping us. But the most important thing is that we got what we went to the forest for.  He pointed at Green Hoof, who held up a bag full of seeds she had received from Zecora.\n\n— Give them to me!  Finicus exclaimed, grabbing the pouch with his magic before Green Hoof could even blink. He poured them out onto his outstretched hoof and giggled like a schoolboy, his wings buzzing excitedly. "Marsilio, you'd better start working with these kids as soon as possible.\n\n— I will be able to get the first results within a month," Marsilio assured him, taking the seeds from Finicus. "What about you and Main Highway?" After all, this wasn't what the Royal Guard wanted.\n\n— Who needs them?  Finicus asked, waving his hoof away. "I'll just tell them that we failed at making insignia. They'll slap Main Highway in the face, and then everything will go back to normal. They didn't risk much in this project, and given Main Highway's track record, failures are acceptable from time to time. We'll be fine."
changelings_paxchrysalia.616.a:0 "Now let's get to work!"

changelings_paxchrysalia.617.t:0 "Almost done"
changelings_paxchrysalia.617.d:0"— So do you think it will work? Is this really going to work?Marsilio sighed and rubbed his itchy temple with the tip of a pencil as Finicus practically loomed over his shoulder in the lab. — It will eventually work. It may take some time to figure out the details, but we'll figure it out. Now, please, sit on the stool and don't touch anything.Finicus did as he was told, but he was still literally shaking with excitement. "I wonder what I'll see when I take my first sip,— he said, staring at the ceiling and daydreaming. — It's not every day that someone manages to unravel the meaning of their own life."I'll tell you when it's ready,— Marsilio grumbled. He was already regretting that he had allowed Finikus to visit him in the laboratory while he was working on the potion. —Tell me, was everything okay with the Royal Guard?"\n\n— Hmmm? Oh, yes, it went exactly as I said. Lasin and Vaspir weren't happy that I couldn't give them my own ass pictures, so they confiscated all of Main Highway's research and notes on the project, as well as cut off our funding. But beyond that, they didn't do anything. Like I said, it was just a slap in the face.He jumped off the stool and looked at the clock hanging on the wall above Marsilio's laboratory table. "I still need to go and talk to the board about this whole badge thing." When do you think it will be ready?\n\n—Within a week,— Marsilio replied. — I've spent the last two weeks trying to see if the Seeds of Truth can work together with the Desire of the Heart and make the insignia appear. And everything was fine. Now that the Royal Guard doesn't interfere with our project, we can work on our own ideas. You won't have to wait too long for the result."
changelings_paxchrysalia.617.a:0 "And then you can stop asking me about my progress after a day."

changelings_paxchrysalia.618.t:0 "Turmoil with potion"
changelings_paxchrysalia.618.d:0 "Finicus could barely contain himself as Marsilio carefully placed a tray full of shining blue bubbles on the table. Finally, after so many weeks of work, he can find out his fate. It was like stealing fire from the gods-a sip of this potion could open up other facets in a changeling's life besides serving the hive. Individuality seemed to be within reach.This is all we have,— warned Marsilio Finicus, as well as Yahsa and Alcippe, who also came to his laboratory to observe the result. — I took two seeds and tried to grow more, but they are unlikely to grow without completely recreating the natural conditions of the swamps of the Everglades Forest. Everyone else went to make these four potions. Hopefully that's what we're looking for."I don't doubt you for a second, Marsilio," said Finicus, taking one of the magic potions. He pulled out the cork and smelled a fragrance that seemed to be like both a nut and a cherry. "Well, this thing has a great smell. Well, should I drink it down?\n\n— Yes, — said Marsilio. — The seeds were given to ponies in crushed form, so they should work with such ingestion.\n\n— To the bottom!  With that exclamation, Finicus raised the vial to his lips and tilted his head back. The potion touched his tongue and slid down his throat. They looked like syrup and even fizzed slightly, like soda. The rest of Finikus's friends watched him sit in place, waiting for something to happen... Finicus just blinked and frowned. —So, uh... how soon should it take effect?"I'm not really sure,— Marsilio said, checking his notes. — Sometimes the effect worked instantly, and sometimes it took only a few hours. I do not know how soon it will happen now.\n\n— Hmm. Well, I don't like to drink alone.  He pointed at the tray and looked at his friends. "What about you?" There are three of you, and there are three potions left. Aren't you going to participate in this too?Pyahs frowned as if he wasn't sure about this, but Alkippe grabbed the vial and took a sip. She licked her lips and nodded. "Well, it sure tastes good," she said, and turned to Marsilio. — Will this really show us our fate?"I can only hope," Marsilio admitted, taking one of the vials. — It's worth a try."I feel like I'm back in Gloriosa's lair," Yahs said, taking the last vial. "She wasn't.Finicus grinned and opened his mouth to say something, but was speechless when the world around him began to sway. He fell off his chair, scaring his friends. The dizziness became even stronger than him, and he felt like he was going to be sick. And just when Finicus thought he couldn't take it anymore..."
changelings_paxchrysalia.618.a:0 "...the darkness swallowed him up."

changelings_paxchrysalia.619.t:0 "Captain of the Industry"
changelings_paxchrysalia.619.d:0 "Finicus woke up in the middle of an endless space full of bright stars. He looked around, but saw nothing but galaxies scattered across the universe. It was as if he and infinity had been completely alone here since the beginning of time.Then he saw some movement. A purple alicorn made of starlight was approaching him. He cowered, afraid that the pony was about to knock him down, but her horn lit up with the light of magic and lifted his chin. —Come on,— she said, beckoning him over. Finicus felt compelled to follow in her footsteps. He started to move, and then the stars went out and darkness enveloped him.When he regained the ability to see, he found himself inside the factory when the hum and rumble of machinery deafened him. He moved forward and passed an endless row of cars, behind which ponies in worn uniforms worked tirelessly, chained to their equipment. The stallion collapsed onto his workbench, and a changeling guard ran up to him and began beating the stallion until the bloodied pony forced himself to get up and get back to work. It was then that Finikus realized that this was not a factory, but a real death camp disguised as it.He climbed the stairs from the workshop and opened the doors of the boss's office to express his disgust, but stopped in shock. He was sitting at the table with a glass of booze in his hoof, and the loud music in the office drowned out the screams of the workers from the workshop. His mirror double didn't seem to notice anything that was happening outside until the soldier walked past Finicus and addressed his double. "The workers are running out of steam fast, sir," the guard told non—Finicus. "We'll need a fresh batch soon.\n\n— A new batch will arrive soon," said ne—Finikus, setting his glass aside and getting up from his chair. —Discord damn those lazy ponies. They work as if they don't need today's rations. Well, if they don't want it, they won't get it. No one will fall asleep full today. Maybe they'll work harder tomorrow.The guard nodded and left, and Finicus could only watch in shock as his heartless doppelganger stood up and casually followed him. He didn't even move when his doppelganger approached the real Finicus, and when the reflection passed through him, the whole world exploded with bright light."
changelings_paxchrysalia.619.a:0"Ya.. I was a monster..."

changelings_paxchrysalia.620.t:0 "The Butcher of Canterlot"
changelings_paxchrysalia.620.d:0 "Alkippe realized that she was wandering through the ruins of the city moments after she followed the purple alicorn. She didn't know how she got here, but it didn't take her long to identify Canterlot in the city. But in this Canterlot, or rather, in its ruins, the banners of the Equestrian army and princesses still hung on flagpoles, the fabric of which was blackened by the fire that had recently gone out. The smoke rising from the coals under the rubble clearly testified to this.pAlkippe shuddered as she walked past the skeletal ponies, many of whom were frozen in horrific poses, their blackened bones still bearing charred flesh. She stopped when she saw a large skeleton curled up above a small one... Is this a mother and her foal? The sight made Alcippe feel sick. Countless dead ponies lay around her, their bones frozen in time to emphasize their final agonizing moments. And when she couldn't find rifles or uniforms on the corpses, she realized they were civilians, not soldiers.But then she heard laughter ahead and, tearing her eyes away from the bones, she took off and raced forward. She was greeted by a terrifying sight: she saw herself kicking a pony's skull galloping over charred cobblestones. Her doppelganger was not wearing an army uniform, but a royal guard uniform. Through a haze of shock, she saw Captain Laseen approaching her with a wide smile on his face, matching the smile of her doppelganger. "You're good with incendiary projectiles, Alkippe,— Laseen praised the impostor. — The wind successfully fanned the flames to smoke the parasites out of their holes. Oh, I'd give a lot to look into the heart of a firestorm, to see those pitiful ponies screaming in agony as their flesh boils.\n\n— I didn't see it either, but I heard it perfectly," the impostor told Alkippe. — It was just music to my ears. I made the guns stop firing for fifteen minutes just to listen to their screams.pLasin grinned, reached into his uniform pocket with magic, pulled out a medal and pinned it to Alcippe's chest. — I think it deserves a raise. How does that sound, Oberst? There are already too many Oberstleutnants in the army.pAlkippe watched in horror as her doppelganger grinned. —That's right, Captain Cardot. I can't wait to do the same show in Manhattan."
changelings_paxchrysalia.620.a:0 "It's not... It's not me!"

changelings_paxchrysalia.621.t:0 "In the name of science"
changelings_paxchrysalia.621.d:0 "Marsilio tried in vain to find a way out of the building he found himself in. There were so many corridors and rooms, so he had no idea where to go. Whenever he stopped to ask the changeling for directions, they would pass by as if he wasn't even there. In the end, after the fifth attempt, he gave up, realizing that something strange was going on. Has he become a ghost? Is he really dead? He didn't know, but it was scientifically impossible. So what's going on?The double doors opened, and four changelings came out, holding the exhausted pony. Her legs were shackled together so that it was very difficult for her to walk. At first he thought she was an Earth pony, but then he saw that her horn had been amputated. He blinked in shock: removing a unicorn's horn is like depriving a changeling of the ability to transform. It's like removing a key part of a pony's personality. What kind of monster would do that? After all, even a simple crack in the horn did not allow the unicorn to create anything more complicated than elementary spells? Marsilio turned and slipped inside the room before the doors could close.\n\pOn immediately regretted his decision.\n\n I came across something similar to a warehouse. The entire room was lined from floor to ceiling with stainless steel cages. In each of them sat a sick and exhausted pony. There was so little room that the pony couldn't even turn around. The ponies in the cages below were covered in sewage from those who were "lucky" to be taller. The whole place smelled of garbage and disease. The ponies looked like animals that had been driven to the slaughterhouse, and most of them had no hope left to cry about their situation. Marsilio could tell from their dull eyes that they had already given up a long time ago.The door opened again, and Marsilio saw himself entering, accompanied by other scientists and assistants. "The normal living conditions of the test subjects do not increase the amount of love these ponies produce,— he heard his doppelganger chastise the assistant. — They will produce the same amount of love both in a cage and in freedom. Of course, love can be slightly sweetened if the subjects have the right relationship with other ponies, but this would quadruple the cost of their maintenance. And our artificial sweeteners during the purification process of love may well compensate for this disadvantage. Industrialization, Pedipalp. She holds the future of love's prey!Marsilio could only watch in horror and disgust as his doppelganger turned the corner and disappeared behind a wall of caged poor ponies."
changelings_paxchrysalia.621.a:0 "This is not science! This is industrial brutality on the highest scale!"

changelings_paxchrysalia.622.t:0 "Guardians of the Royal World"
changelings_paxchrysalia.622.d:0 "Yahs did not know how and why he ended up in this studio. He only remembered the purple alicorn in the middle of the stars, and then he found himself here. But there were sounds of activity ahead, and he quickened his pace, hoping to find someone who would explain to him what had happened.\n\n— Seats, take your seats! — Yahs heard the director's scream and stopped dead in his tracks - it was HIS voice. Now he was more interested than worried. Yahs cautiously stepped forward to get a better look at what was happening. The studio scene depicted a picturesque Equestrian farm, and he saw the changeling actors getting ready for filming. — So, Pupa, your character, — the double of Yahsa reminded one of the actors, and the changeling giggled in slight embarrassment, turning into a cheerful earthly pony. When everyone had gone to their places, Yahs saw his doppelganger raise the megaphone again. —Okay, it's okay. Let's try to take it all off one last time, okay? Lights, camera, motor!The actors on stage immediately began their rehearsed routine, and the changeling soldier, along with a civilian, went to the front door of the farm and knocked on it, raising his voice to be recorded by microphones. "Miss Joonbug?" Are you at home?Paktris, who had transformed into an Earth pony, immediately opened the door and went outside, nodding with exaggerated joy at the uniformed soldier. "Oh, yes, sir, Mr. Tarsus!" Yes, sir! How can I help you, sir?The soldier and the civilian laughed, and the pony giggled along with them. —Miss Joonbug, have you forgotten what day it is?" Today is harvest day! My friend, Karaps, said that you forgot to give your share of love today!\n\Njunbag slapped her hoof on the head. —Oh, no, mister! I keep forgetting about it! Thank the queen that you remind me of this! How about I give my love right now, since you're here?\n\n— Oh, that's a great option!  Tarsus exclaimed, and the actress portraying the civilian stepped forward and opened her mouth as if she were sucking love, after which the earth pony giggled again. This scene lasted for a few more seconds before the imposter Boss raised his megaphone again. — Cut! Then we'll add a voiceover. Great job, changelings! Just gorgeous!When the changelings began to disperse after filming, the real Yahs could only look at them in disbelief. Did he go from a soldier to a filmmaker whitewashing the occupation regime? There was no way he would stoop so low! What's going on here?"
changelings_paxchrysalia.622.a:0 "I've never tried to avoid the truth. I'm solving problems, not pretending they don't exist!"

changelings_paxchrysalia.623.t:0 "Incident report"
changelings_paxchrysalia.623.d:0 "When Finikus finally came to his senses, the first thing he saw was the flickering of fluorescent lights overhead. The second thing he noticed was a table, under which he was partially lying, and a fallen chair. Then he felt a headache, and it made him straighten up.He realized that he was still in the room where he had taken the potion, the empty vial of which was lying on the floor next to him. The rest of his friends were also lying around him, who were now slowly recovering. Yahs was the first to say something and immediately groaned, clutching his head. — Wow... I really need to stop taking drugs. It's unprofessional.Finicus grunted and leaned back against the wall. —I get it," he said, closing his eyes for a moment. But then the memory of what he had seen came back to him, and he nervously looked at Yahs and the rest of his friends. —I, uh... And what did you see?"Apparently, I was a filmmaker whitewashing the bitter truth of our occupation," Yahs grumbled. "If that's my fate, then I don't believe in it a bit.\n\n— I... - Alkippe began softly, trembling all over. "I served in the Royal Guard during the Battle of Canterlot... I caused a firestorm that killed countless civilians... and I was proud of it."I turned my lab into a slaughterhouse,— Marsilio said. "I treated ponies like cattle... That's not what I believe in. I wrote a whole manifesto about it!nFinicus nodded. "I was just a slave owner," he said. "I turned Main Highway into a death camp disguised as a factory. I don't... I'm not that bad, am I?\n\n — Not at all, - Yahs assured him. But then he frowned. — None of our visions looked like the truth at all. We're all better than the ones we've seen. So.."
changelings_paxchrysalia.623.a:0 "...What does it all mean?"

changelings_paxchrysalia.624.t:0 "In search of my destiny"
changelings_paxchrysalia.624.d:0 "For a moment, silence reigned in the room, everyone present thought about what had happened, but Marsilio was the first to come to the right conclusion. "The seeds showed us what our lives would have been like if we hadn't met," he said. "They showed us what our lives would be like if we followed Chrysalis' worst orders to maintain her vision of Pax Chrysalia. Our visions have shown us how low we could fall...\n\n... and how high we went instead," Alkippe said with a nod. "Have the others seen the purple alicorn?" Because I saw her... I think it was Twilight. She showed me how much good I had done, considering how much evil I could have done.\n\n— I think you're right, — Yahs agreed. — If I hadn't got control of the Canterlot commissariat, then I could have resigned and found something else to do. I probably wouldn't have known all the true horrors of Pax Chrysalia myself.Finicus thought for a moment, and a smile slowly appeared on his face. "You know what? I think these seeds have shown me my destiny after all.pAlkippe raised her eyebrows in surprise. "What do you mean?" You're not going to become a slave owner, are you?!\n\n— No, no! Quite the opposite. I mean, I know what I'm going to do now. I will try my best to make Main Highway the opposite of what I saw in this vision. I'm going to work ethically and honestly. Screw it all! I'll hire ponies myself, pay them a decent salary, and exempt them from the love tax to help them get out of this mess!\n\n— You know what? I like that idea," Marsilio said. — I'm going to use my lab to find a safer and easier way to collect love. Maybe one day I'll find a way to make artificial love as good as real love. Then we wouldn't have to put ponies in a stable and regularly take away their love.\n\n— I will do my best to become a role model for the entire army," Alkippe said. "There shouldn't be a single officer left in the army who thinks ponies should be treated harshly. We must stop these ideas in the upper echelons if we want them to spread among the rank and file.\n\n— And I will make sure that we correct the injustices of Pax Chrysalia one by one, rather than hiding them under a cloth and pretending that the problems do not exist, — said Yahs. — Working together, we can create a better future for everyone. Whether it's for changelings, ponies, or even deer. Tomorrow's changes begin today."
changelings_paxchrysalia.624.a:0 "We will become the progenitors of a better future."

changelings_paxchrysalia.701.t:0 "Decree on the formation of the KuKC Erforschung- und Extraktion Konzern Posthaste"
changelings_paxchrysalia.701.d:0 "ADMINISTRATIVE DECREE No. 696.9\n\n Taking INTO ACCOUNT the supreme need for Hegemony in the import and consumption of natural resources; Bearing IN MIND that the resources of these lands under the jurisdiction of local intermediaries belong directly to the Changeling Hegemony; Bearing in MIND that currently the junior members of the Hegemony have not yet paid all their contributions and debts in terms of resources and material resources; Therefore, I, the Queen Chrysalis and sole ruler of the United Changeling Hives and sole ruler of both Olenia and Equestria, I order with my absolute authority to create a new institution., which will directly control the extraction of resources and materials from the junior members of the Hegemony. This organization will be officially called Das Königin und Kaiserin Chrysalis Erforschung und Extraktion Konzern and will be authorized to unilaterally manage the extraction of resources and materiel throughout the territory of the Hegemony. This new institution will be responsible only to me and those to whom I entrust administrative authority. The powers of KuKC Konzern will take effect immediately.\n\n Signed by the great Queen Chrysalis"
changelings_paxchrysalia.701.a:0 "Direct control over the resources of our subjects will strengthen us."

changelings_paxchrysalia.702.t:0 "Retreat from the Evergladen Forest"
changelings_paxchrysalia.702.d:0"Oberstleutnant Alkippe frowned at the reports on her desk and reviewed their contents before handing them to Major General Yahsa. Reports stating that army soldiers were leaving their outposts located around and inside the Everglades Forest had been received here since yesterday morning, and although Alkippe had initially planned to postpone these reports and deal with the obvious problem of discipline on her own, the increasing frequency of these reports worried her. The soldiers who escaped from the forest reported a significant increase in the number of monster attacks and guerrilla ambushes, resulting in more casualties than the army had anticipated when setting up these garrisons. The increased number of attacks, coupled with the extremely hostile environment, wiped out half of the garrison personnel before they could retreat. Even a squad of the Royal Guard, the bravest and most fanatical soldiers in the entire hegemony, escaped from the Everglades Forest, claiming that the shadow ponies were hunting them in the center of the Two Sisters' Castle, which they were tasked with searching. It was all very strange, and Alkippe had the feeling that there was something else going on in the forest that the army didn't understand yet. It may be worthwhile to mobilize some troops and place them around the perimeter of the forest... just in case."
changelings_paxchrysalia.702.a:0 "Trees, as you know, do not resist, but we are dealing with an Ever-wild forest..."

cityfall.310.added:01 "Business outside the two countries"
the fall of the city.310.day:0 "[This.Get a new article in the title]The Metesquestrian guerrilla in an Ever-wild form is a practical adjunct. The Changeling forces occupied the Castle of the Two Sisters and captured probably the last major rebel stronghold in the forest. Information about the conflict between the Changeling Hegemony and the rebels led by a zebra named Zekora is scarce and unreliable due to the active censorship of the Changelings. However, observers in Canterlot report massive bombing of the forest and the deployment of hundreds of thousands of Changeling soldiers to quell this uprising. There are also rumors about a possible thermonuclear strike on the forest itself. As reports of irreversible environmental damage, serious civilian casualties, and the brutality of the regime's changeling forces arrive, it becomes clear that Pax Chrysalia still dominates all of Equestria."
cityfall.310.guests:0 ""Pax Crisalia"can't be stopped!"
cityfall.310.b:0 "We will fight on! The dream is not dead!"
cityfall.310.c:0 "Changelings are new opportunities."

