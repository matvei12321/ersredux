 ##### CHARACTERS

 POLITICS_AURANTIA_DESC:0 ""I swear that we will exterminate them all, and if anyone remains alive, I will personally find them and destroy them!"\n\n Among the other queens of the hives, Aurantia is the youngest, but old enough to have time to witness the brutal attack of the Olenian Vikings on the lands of Lyctida several generations ago.\n\n She grew up as a rather soft and promising heir to the throne of Lyctda, someone even said that Aurantia sympathizes with foreign ideas of harmony. But the deer invasion turned her idea of this world upside down. This may seem like an exaggeration to some, but Aurantia definitely saw something that others did not see.\n\n Yes, she has no doubt - every deer must pay for the crimes of their ancestors. Moreover, since then the deer have not been punished by fate - they did not die out from the famine, did not suffer from terrible diseases. And this contradicts the principle of justice - the whole people of Olenia should be punished. Moreover, the horned creatures probably still harbor hatred for changelings, especially for the inhabitants of Lyctida. With such a thought, Aurantia wakes up every morning and falls asleep with hopes that one day she will be able to implement the project of the "Olenia Extermination Zone" in order to ensure justice.\n\n "...to be honest, everything else doesn't matter to me.""
