 lyc.33.a:0 ""
 
 lyc.34.t:0 "Aurantia's Diary, [GetDateText]"
 lyc.34.d:0 ""I am Queen Aurantia, and I... yes, that's still me.\n\nSomething came over me recently. I remember that on that day I became very ill because of the deer gods. I remember how I personally went to Olenia, accompanied by my generals. I did it. I killed them, Ukko and Pellervo, the gods who have terrorized the changeling race for hundreds of millions of years, are now dead. But what happened next, I remember very vaguely. I felt in a terrible state and, according to Verneks, looked completely exhausted. Speaking of him... Since that day, he's been acting like nothing of the sort happened, but... I don't remember where I spent the night that night, but for some reason I remember exactly that he was there. Or so it seemed to me? I don't know what to think. I hope I didn't say something stupid. I haven't talked to him about this incident, but he's behaving as usual.\n\nI recently remembered how many times he helped me out and how many times he watched me go rogue. And after all this, he remains devoted to me. Although, the same Krieger was also always loyal, like the rest of the command ... No, Vernex somehow stands out among them. I feel like he's different."
 lyc.34.a:0 "I want to know him better.""
 
 lyc.35.t:0 "Aurantia's Diary, [GetDateText]"
 lyc.35.d:0 ""§RI am the Queen Aurantia, and I hate the Olenians.\n\nFrom now on, I'll be writing with deer blood taken from §!\n\nOkay, I admit, writing in blood wasn't a good idea - it's spreading all over the page. Though maybe if I get used to it... Er, never mind. It's even natural. Deer blood itself is good for nothing. Just red biological garbage. Anyway, I wanted to write about the fact that in [GetDateText] Von Krieger already brings stunningly positive results of purification Olenia. I'd be in charge of excising this tumor myself, but I need to be in Lyctida with my people. And lately..."
 lyc.35.a:0 "I often have a headache"
 
 lyc.36.t:0 "The Connection with Krieger is Lost"
 lyc.36.d:0 "Von Krieger achieved his goal - he destroyed Olenia to the ground, after which he sent the entire garrison back to Lyctida. But Krieger himself never returned. The last time a message was received from him about the successful completion of all tasks, and then silence. Some soldiers who returned from the Extermination Zone claim that Krieger stayed in the Dead Land voluntarily, but does that make sense?"
 lyc.36.a:0 "We hope he will be able to return."
 
 lyc.37.t:0 "Anxiety"
 lyc.37.d:0 "Ауранция проснулась в своих покоях, но почувствовала, что что-то не так. С тех пор, как она прошла обряды обучения эзотерическим техникам, все её чувства сильно обострились. Она не только чутко улавливала все звуки, но также могла почувстовать присутствие незримой чёрной энергии. И сейчас ей казалось, что вся её спальня была пропитана некой магией. Клубы тёмно-пурпурного тумана переплели стены, а из двери издавалось неестественное свечение. Встав с кровати и быстро одевшись, Ауранция открыла дверь, и обнаружила, что попала в неизвестный ей раньше город. Всюду ходили существа, являющиеся странной помощью котов, птиц и пони и о чём-то беседовали, не обращая на Ауранцию внимания. Перед Ауранцией появилась тропа, ведущая вперёд, и она знала, что лучше идти прямо. Разглядывая город, она увидела то, что повергло её в ужас. Группа вооружённых оленийцев перемещалась среди птицесуществ, и они явно что-то искали. Заметив Ауранцию, они ускорившись направились к ней. Не теряя ни секунды, Ауранция помчалась вперёд по тропе и наткнулась на дверь. Войдя в неё, королева вновь оказалась в своей спальне. Вновь всё было окутано туманом, и вновь она увидела сияющую дверь. Войдя в неё, она вновь вышла на тропу, но на этот раз город был другим. Её окружали белые пони с чёрными полосами на теле, но и здесь она заметила очередной отряд оленийцев. Промчавшись по тропе, она вновь открыла дверь оказавшись в своей спальне.\n\nТак она прошла через множественные порстранственные коридоры, в панике пытаясь вернуться в Ликтиду. И вот, у неё получилось. Оказавшись в своей спальне в очередной раз, она уже не видела пурпурного тумана. Но непонятное, противное чувство страха связало её. Она чувствовала их присутствие. Да, она была в Ликтиде. в своём дворце, но оони были здесь. Это значит, что всё потеряно. Всё то, ради чего она боролась, обрушилось в один миг. Она своими глазами увидела, как стены её мира разрушаются, превращаясь в размытые очертания самих себя. Долго оставаться с=здесь нельзя. Молясь всем богам, которых она знала, Ауранция открыла дверь, надеясь, что откроется проход в её родные серые дворцовые коридоры. Но вместо них были лишь размытые очертания. Олени уже начали разрушать основу мироздания. Тяжело дыша, Ауранция оглянулась. Ей на встречу шла чёрная фигура. Она была размытая, но приближалась медленно, словно издеваясь над беспомощностью Ауранции. Она поняла, что это олениец, который пришёл с одной целью. Королева почти потеряла силы, но смогла противостоять чёрной магии и устоять на копытах.\n"НЕ... НЕ ПРИБЛИЖАЙСЯ КО МНЕ!"\nФигура остановилась на мнговение. Но продолжмда подходить к Ауранции уже быстрее, чем раньше. В ушах зазвенело. Ауранция попятилась назад, крича о помощи, но смерть было не остановить. Она приблизилась к Ауранции достаточно, чтобы коснуться паникующей королевы своим копытом.\n\nАуранция, лишённая сил, провалилась в тёмные глубины безвременья, из которых уже никогда не вернётся."
 lyc.37.a:0 "This is the End."
 lyc_37_event_tt:0 ""WAKE UP, MY QUE--"\n\n§YVerneks' familiar voice called out to her from nowhere.§!"
 
 lyc.38.t:0 "Awakening... Again"
 lyc.38.d:0 "Открыв глаза, Ауранция увидела лишь белый свет, окружающий её. Наконец она обрела покой... По крайней мере, таковы были её первые мысли.\n\n"Алло, доктор Айзен... мне кажется, она очнулась. Да, первая палата. К сожалению, у нас подозрения на..."\n\nАуранция услышала знакомый голос одного из врачей ликтидианского королевского лазарета.\n\n*Тем временем в штабном командовании Ликтиды*\n\nВсе важные ликтидианские генералы и командущие собрались в штабе, чтобы обсудить будущее их страны. Королева находится в критическом состоянии, и последнее, что известно - младший генерал Вернекс был с ней.\n\n- Клянусь, я не знаю, в чём дело! Я просто проходил мимо ей покоев, когда она вышла! Она смотрела на меня, будто призрака увидела и поэтому кричала!\n\nЖёсткий стук копыта о стол разразился по помещению.\n\n- Молчать, мелкий ублюдок! Думаешь, тебе кто-то поверит?! Из-за тебя пострадала Ауранция, ты, диверсант!\nЧейнджлинг, старший по званию, сорвался с места к Вернексу. - Да я тебя в порошок сотру, грёбаный уё-\n\n- Орификс? Вернекс?..\n\nВ сопровождении трёх врачей и двух гвардейцев, в штаб вошла Ауранция. По ней было видно, что слабость отошла не до конца, но она могла стоять, опираясь на чейнджлинга-солдата. Присутствующие генералы заметили, что на Ауранцию были надеты очки - то, чего королева раньше не носила никогда.\n\n- Вы... кхм...\n- Не утруждайтесь, - прервал её врач, - вам ещё нужно восстановить силы. Кхм, состояние Ауранции приходит в норму! Похоже, на фоне постоянного стресса у неё произошёл приступ острого невроза, из-за чего её организм пострадал. Её зрение значительно ухудшилось, но в остальном всё в порядке.\n- Что вы собирались сделать с Вернексом, герр Орификс?.. -  речь королевы была неуверенной и чуть замедленной, но в целом связанной, - прошу, объяснитесь.\n- А, прошу простить, моя королева... Просто... Посмотрите, что он сделал с вами! Разве он не заслуживает наказания?\n- Он ни в чём не виновен.\n- А...\n- Все свободны."
 lyc.38.a:0 "When the doctors escorted her back to the ward for recovery, the generals breathed a sigh of relief."
 
 
 
 
 
 