#### EVENTS
 
 lyc.1.t:0 "Quiet hive"
 lyc.1.d:0 "Tourists are very rare in Lyctida. Especially foreign ones. But sometimes changelings from other hives come to these gloomy lands for various reasons. For example, Werner, a Wesalipolian, recently came to Lyctida to meet his old comrade Ixidor, a Lyctidian. After meeting, they started a friendly conversation, and, not long after, decided to celebrate the meeting at a local bar. After ordering a mug of Lictidian beer, the two Changelings took an empty table.\n\n - I still can't believe that we finally met, Ixidor. It's nice to meet an old friend!\n\n Is for sure. Yes.\n\n As always, he was laconic. However, as well as all other visitors of the bar. Werner had heard that the Lyctida changelings were silent and stern, but even in a simple pub, all Lyctidians were gloomy and uncommunicative, which created an unnatural silence, interrupted by the sounds of glasses and pouring beer.\n\n - Well. I know that Lyctida is called a "Quiet Hive", but not so much! Seriously, why is everyone so silent here?\n\n "The fact is that in a few months half of the families of these Changelings will no longer see their fathers. And they know about it," that's how Ixidor would answer. But taking into account the fact that he would have been heard by all the Lyctidians nearby, he replied that he would tell about everything later."
 lyc.1.a:0 ""
 
 lyc.2.t:0 "Extermination Report"
 lyc.2.d:0 "DEER EXTERMINATION REPORT IN REGION No. 302\n\n About 85% of the region's population was destroyed. According to reports, several deer escaped during the cleanup, and some deer escaped from the extermination squads. Additional operations are required to completely clean up the regoin.\n\nHeil Aurantia!"
 lyc.2.a:0 "Accepted."
 
 lyc.3.t:0 "Alliance with the separatists?"
 lyc.3.d:0 "Queen Arginnis' agents found out and informed her that we were preparing an independent military campaign against the deer and that we were not interested in subjugating Chrysalis. Arginnis suggests that we join their pact when Vraks starts a rebellion against the power of Chrysalis. This will give us an additional powerful ally to defeat the chariots. But do we want to cooperate with the Queen of the Hive of War?"
 lyc.3.a:0 "Only if they do not claim the lands of the Olenians!"
 lyc.3.b:0 "We will fight alone. This will be OUR revenge."
 
 lyc.4.t:0 "Aurantia's Diary, [GetDateText]"
 lyc.4.d:0 ""I am the Queen Aurantia, and I hate the Olenians.\n\nToday, a venison was brought to Lyctida from the extermination zone by my order. Finally, I was able to see a modern deer from the time of the invasion. I decided to start studying it, because I alone can learn more about deer than all the scientists of Soryth combined.\n\nAs soon as he was brought into the immobilized device, I saw fear in his eyes. The modern deer is cowardly. The appearance of a modern deer is extremely unattractive.\n\nHe begged for food. The modern deer is greedy and voracious.\n\nI ordered to give him ten lashes. The modern deer is weak and not hardy. The blood of a modern deer is dirty and takes a long time to wash off.\n\nI asked him if he felt guilty for what his ancestors had done. The modern deer is selfish. The modern deer has no sense of guilt and a sense of justice.\n\nGeneral Vernex told me that this deer participated in genetic experiments - he basically has less than a month to live. I like General Vernex. I made the final tests."
 lyc.4.a:0 "The skull of the deer does not withstand a bullet.""
 
 
 
 lyc.6.t:0 "Total Krieg"
 lyc.6.d:0 "- So, Aurantia, Queen of Lyctida, what are your requirements for our armies during the period of hostilities?\n\n This changeling had to write down every wish of Aurantia about the military doctorine. The military staff is starting reforms, and, of course, the Queen's opinion should be taken into account.\n\n - "Let them destroy everyone", Aurantia replied coldly.\n\n - Sorry... what?\n\n - That's right. Let them spare no one. No more experiments on horned carcasses. No exploitation. They don't even deserve this kind of life.\n\n - I'm sorry, but what about the strategy in relation to other countries? We're not going to focus all the efforts of our army on the Olenians alone, are we?\n\n - Who told you that?!\n\n At this moment, the changeling realized that it was not worth taking the question in this direction. Aurantia now seemed enraged, and after almost every word she beat her hoof on the table of her office.\n\n - Our army was created to destroy deer! To cleanse the land of their infection, and to spit on other non-species! Pegasus? These fuckers are forever stuck in the tribal ages, so let them cut each other! And the Earthponies? Unicorns? I'M FUCKING NOT INTERESTED IN THEM! We must act as if only we and the Olenians exist in the world. We and the Olenians! And in the course of our dripping, only WE should remain! We, like gods, must direct lightning bolts of pure rage at every deer! Not a single horned fuck should walk on the continent, they should all be devoted to the fire of our HEILIGER KRIEG!\n\n - T-that's right, I understand you. So I will tell the supreme command!\n\pChangeling did not ask for permission to exit anymore - he flew out of the office like a bullet.\n\n Aurantia was left alone again. During her speech, she created a mess in her workplace. All the documents and folders were mixed up, or knocked to the floor. The Queen sighed heavily."
 lyc.6.a:0 ""What a mess.""
 
 lyc.7.t:0 "Total Krieg"
 lyc.7.d:0 "- We are sure that the Olenians have almost the same weaknesses as the Changelings. A wound in the side can leave them alive, but a hit in the head practically guarantees instant death. Contrary to a common stereotype, horns are not a weak point of the Olenians - their loss almost does not reduce their viability...\n\n Such an instruction was carried out in almost every military point of Lyctida. Adults and younger changelings were taught the most effective way to kill a deer, as well as instilled a sense of hatred for the enemy. And it seems that the last point was mastered by the changelings of the Quiet Hive for a long time: the ancestors passed on stories about terrifying horned raiders from generation to generation.\n\n But now the stories have become more violent, and calls for the physical destruction of the Olenians are being heard more and more often. This ensures that when our soldiers set foot on the lands of Olenia, they will not spare anyone. This is exactly the principle envisaged by the new military doctrine in Lyctida."
 lyc.7.a:0 "For the sake of a successful Heiliger Krieg!"

 lyc.8.t:0 "Aurantia's Diary, [Get Date Text]"
 lyc.8.d:0 ""I am the Queen Aurantia, and I hate the Olenians.\n\nWhy do they have the audacity to walk on this planet? I simply don't understand. I've been thinking about it for a long time today. I used to study the mythology of deer, and they have their own pagan gods - Ukko and Pellervo. And I realized that they are one of the main reasons for the survival of the Olenians. After all, justice should have been done a long time ago, but still... Yes, these pathetic gods protect the Olenians from extinction. It is thanks to them that no deer has yet experienced real punishment. That means I have to destroy these gods. I will have to turn to the esotericists from Soryth to get certain skills. As soon as I become equal among the greatest warriors of Valgraala, I will be able to defeat the deer gods in a great duel of the forces of good and evil, and the sun of victory and prosperity will rise over Lyctida, and thousands of deadly stars will fall on Olenia."
 lyc.8.a:0 "I only need to destroy them.""
 
 lyc.9.t:0 "Superiority of weapons"
 lyc.9.d:0 "Shots were heard all day at the secret Lyctida training ground. Different shots: from rifles, machine guns, pistols. Throughout the day, the actions were closely watched by the queen of the Quiet Hive herself.\n\n- How I like it. I could watch it all day.\n\n- So you are happy with today's military exercises, Queen Aurantia?\n\n- Exercises? They interest me to a small extent. I know that the changeling can defeat the deer. I'm here for the sound. Those cannon shots... A real symphony for the ears!\n\n- ...As you say, Queen. But in half an hour the flight tests of the bombers will begin, and therefore you should leave the field far away.\n\n- Why? I want to hear what the Olenians will hear when our squadrons and air armadas cross the borders.\n\n- The fact is that we will test the bombers... with non-standard weapons. And the most advanced gas masks cannot save from such "weapons". It is a mixture of chemical elements that possess some corrosive properties of the acid. The radius of destruction is thoroughly unknown, so you'd better go to your residence.
 lyc.9.a:0 "There is no hope for the Olenians. The Queen is pleased."
 lyc.9.b:0 "I'd rather stay at a safe distance and watch the trials."
 
 lyc.10.t:0 "Pale mare"
 lyc.10.d:0 "Aurantia was excited. She will see the real instruments of death. Unfortunately, she and her entourage had to drive away from the training ground for some distance, but they stayed close enough to witness the tests. None of Aurantia's attendants dared to object to her decision to stay. As soon as the planes began to take off, Aurantia watched them admiringly. The wind blowing in their direction was blowing her mane.\n\n- Juggernaut, this is Olfland, do you hear? Reception.\n- Olfand, this is a Juggernaut. Dropping bombs. Reception.\n-Olfland drops bombs, over.\n\nBombs fell to the ground with a whoosh. When they touched the ground, a pale green cloud formed. Several Olenians were specially left at the training ground to check the power of the weapon. Through the binoculars, Aurantia saw that the Olenians fell dead almost instantly. Unsurprisingly, they were in the epicenter of a chemical explosion. It's a pity she couldn't hear their screams, Aurantia thought when she saw that the cloud didn't stop at the landfill. The wind began to blow harder. The last thing Aurantia remembered were the desperate cries of the retinue and the commander's excuses that the gas should not have reached them at such a distance."
 lyc.10.a:0 "So, Lyctida plunged into chaos."
 
 lyc.11.t.:0 "Aurantia's Diary, [GetDateText]"
 lyc.11.d:0 ""I am the Queen Aurantia, and I hate the Olenians.\n\nGeneral Vernex gave me great news. I loved hearing his voice when he said, "At least a hundred thousand ndeer have been killed on the battlefield by our soldiers." It's finally happening. JUSTICE IS TRIUMPHING I think Vernex deserves a raise He always brings such good news I hope one day he brings the skull of the leader of the deer state along with the good news I will craft an exquisite cup out of the deer skull and drink the best drinks until all the memory of olenians will be erased"
 lyc.11.a:0 "День этот будет идеальным...""
 
 lyc.17.t:0 "Aurantia's Diary, [GetDateText]"
 lyc.17.d:0 ""I am the Queen Aurantia, and I hate the Olenians.\n\nIt's done. The deer have laid down their arms. They are destroyed. They are defeated. They have lost the battle.\nThe news of their defeat haunts my mind. I am visited by various thoughts, even to some extent vulgar. For the third day in a row, I can not sleep from excitement and glee. But now is not the time for that. The real bright future will come when the last female of the deer race is destroyed. This will mean the beginning of the irreversible extinction of deer. I have to tell the generals who is the priority. Female deer, especially pregnant ones, and foals. The reindeer bucks won't be able to do anything... They won't be able to reproduce and will soon die out.\n\nThough my army still shoots everyone in a row, and this does not reduce the effectiveness of clearing the world of deer in the least. I just like the idea that I can influence their inevitable end.\n\nI'll change the ink soon. I will keep my diary with deer blood."
 lyc.17.a:0 "Я могу слышать их крики..."
 
 lyc.19.t:0 "TO QUEEN AURANTIA"
 lyc.19.d:0 "This is von Krieger. I'm going to Olenia. I will destroy every deer that comes my way. But to destroy them even more effectively, I need power. Approve my request to assign me the position of Uberfuhrer of the Extermination Zone, and then tomorrow we will use gas to wipe out everyone who is hiding in basements and shelters."
 lyc.19.a:0 "Approved."
 lyc.19.b:0 ""Welcome to Hell, rookie!""
 
 lyc.20.t:0 "Preparation for Training"
 lyc.20.d:0 "Aurantia was determined to teach esoteric battle tactics. She prepared everything for the expedition: ancient ritual knives, intoxicating herbs, took out the teeth, hair and other parts of the bodies of the deer, and also took with her ancient pagan runes and several packs of pervitin. During the trip, she traveled with General Vernex in the most ordinary car, so that rumors would not spread in other hives that Aurantia had left Lyctida. Finally, reaching the borders of Soryth, the car passed the warm zones near the shores of the Key Lake and reached the snow-covered caves, where fires were burning.\n\n- We have arrived, Your Majesty. It seems that these are the caves of Sorythian neo-pagan shamans.\n\nEven despite the fact that Aurantia put on a warm down jacket (of course, from the skin of a deer), she felt that she was about to freeze through. But she understood that this was her first test. The damn frost can't be a big deal.\n\nAurantia quickly brought the shamans living in these caves up to speed. They replied that this could be a dangerous business, as the pagan deer gods are dangerous opponents, and an ill-trained warrior may not survive an encounter with them.\n\n- THEN MAKE ME A PREPARED WARRIOR OF ME!\n\nThe shamans spoke quietly among themselves and agreed to begin her training.\n\nThe first skill she must master is entering the astral world. To do this, you need to set fire to a decent amount of intoxicating herbs ..."
 lyc.20.a:0 "Nothing Will Stand in Her Way."
 LYC_aurantia_goes_to_soryth_tt:0 "§YAurantia will be trained in the cold lands of Soryth.§!"
 
 lyc.21.t:0 "The Last Test"
 lyc.21.d:0 "For seven days, Aurantia had to prepare for battle with Ukko and Pellervo - dirty, monstrous deities that protect deer. All these seven days she was forbidden to sleep, eat and rest. "To defeat two gods in one battle - you need to train the endurance of the body and spirit," said the supreme shaman Erich Schimmler. For seven days, Aurantia inhaled intoxicating fumes without interruption and took Pervitin regularly to improve her results. She had already learned to enter the semi-astral with her teachers, and even managed to inflict a mortal wound on one in another world. This indicated that Aurantia's spiritual energy was growing.\n\n"We have never seen such results before. It seems that fate itself protects you, as well as your pure hatred. Remember: hatred is stronger than any money and power in this world. If you are the most powerful ruler in the world - you are still mortal, but if anger and hatred overwhelm you - you will destroy all obstacles in your path.I heard that even in politics, world hatred is considered, called "World Tension".If this "tension" will reach its peak - a hatred so strong will surge into the world that nothing can stop it."\n\n\nAurantia carefully memorized every word and every spell of the shamans. And so, on the seventh day, the time of the last test came - the entrance directly to the Astral, where the gods live. The shamans summoned an ethereal gate, through which Aurantia passed without much trouble. She entered a dimension beyond words, but there were no gods there... at least not in the first minute.\n\n- Who are you, pitiful mortal, who dares to oppose us?\n\nTwo large deer, dressed in armor made of bones and skulls. They spoke at the same time, and both were magically holding sharp deer weapons of strange shapes.\n\n- I remember her, my dearest Brother. This little animal was my personal victim on one of the days of the invasion. However, she survived... To die now, I think!\n\nThe deer gods laughed wickedly in unison, mocking how pathetic the queen before them was.\n\n-We will destroy you, underdeveloped beetle. Like all your dirty people! Deer Vikings tried years ago to wipe your filthy existence from the earth, but you fought back. Now everything will be the other way around. The reindeer will again enter your cities. They will idolize us! They will kill, dismember and rape changelings for the glory of the deer race and become saints for it! They'll finish what they should've done years ago!\n\nThe day flashed before Aurantia's eyes. The same day when..."
 lyc.21.a:0 "DIE-"
 
 lyc.22.t:0 "Awakening"
 lyc.22.d:0 "- YOU BASTARDS!\n\nAurantia woke up in a cold sweat, in Lictida's Royal Infirmary, surrounded by doctors. They breathed a sigh of relief, though they didn't expect such an awakening.\n\n- Where am I? Where are Ukko and Pellervo?\n\n- Your Majesty, I'm afraid to say...\n\nAurantia was lying in a medical bed, connected to all sorts of life support systems. The next moment, she jumped out of bed and attacked the nearest doctor.\n\n- WHERE ARE THEY? WHERE DID THEY GO? OUR BATTLE HAS NOT EVEN STARTED!\n\n- Let me explain! It seems that you... somehow ended up in the shamanic caves of Soryth. We don't think you remember it, so we'll tell you what happened. When the shamans began to kindle intoxicating herbs, you fell into unconsciousness along with all the shamans. General Vernex was also affected by this, but he miraculously woke up before the others. According to him, you were lying with flowing foam from the mouth, and he was very worried. You were taken to Soryth's infirmary, where you miraculously saved your life, and sent here..\n\nAurantia was shocked. In response, she said nothing and only left the ward, accompanied by Vernex, who supported her still weakened body, helping her move around.\n\n- Where do you think the remains of Pervitin come from in her blood?\n\n- We have no concepts. In addition to Pervitin, other substances and plants were found in her blood, available only to the shamans of Soryth.\n\n- Yes. Very strange. But Vernex told the whole truth. Why would he hide anything?"
 lyc.22.a:0 "After that, the Aurantia Departed for Several More Days."
 
 lyc.23.t:0 "Killing God"
 lyc.23.d:0 "The headache now tormented Aurantia without ceasing. But it wasn't just pain. Anxiety. Aurantia was suddenly seized with anxiety. Animal terror, causing her expression to twist into a cry of despair.\n\n- I... I need to go there. I need to go to Olenia. Aurantia stuttered to her advisors, among whom was General Vernex.\n\n- But Queen Aurantia... No doubt Deer fell to our forces, but... we don't think it's safe for you to go there. After all, the partisans, or...\n\nAurantia took off without listening to some adviser. "I need to go there. I need to go there. I need to go there."\n\nAurantia hastily ordered a convoy to be sent straight to the deer capital. All the way, Aurantia felt that something was about to happen. Something terrible.\n\nAurantia has arrived in Hjertland. This is the first time she ever visits the Olenian city... She saw burning houses and ashes, crowds of Oleny residents who were subduedly dying at gunpoint.\n\n- Yes, they are here. BRING ALL THE DEER HERE! - after this phrase, Aurantia screamed heart-rendingly, as if someone had hammered a nail into her skull.\n\nThe soldiers, not understanding anything, began to somehow round up the surviving people. Standing out among the crowd were two reindeer deers, who grinned impudently as they looked at Aurantia and glowed with an unnatural purple-dark aura. At least that's what Aurantia saw.\n\n- I'm still in their world. Although, no. Even then, in the caves, the ritual was not completed properly. I have not completely left the Astral. I am partly in their world and partly in ours. That's why I can see you, right? - said Aurantia in an angry voice, looking at the two deer gods. They spoke again in diabolical unison.\n\n- That's right, mortal. The two reindeer continued to grin impudently, as if mocking her. - Your pain the last few days - our hooves business. We've been trying to kill you all this time. Yes, brother Ukko, yes, brother Pellervo? And now we will finally kill you. However, in order to get into your world, we took over the physical bodies of these deer - and, therefore, are terribly vulnerable. But you don't pose a threat to us, mongrel. In the next moment, you will die, and the divine army of Viking deer will rush towards Lyctida!\n\nAurantia pounced on the nearest soldier and managed to take away his machine gun. She then shot two of the reindeer, screaming into nowhere, although she probably hit other deer in the crowd.\n\nThe pain was gone. Aurantia breathed a sigh of relief. Looking at the bodies, she saw a deer mother and a deer daughter. Tears of happiness flowed from her eyes.\n\n- There's nothing more for me to do here. Bye.\n\nAurantia's convoy left as unexpectedly as it arrived. And the soldiers still could not understand why Aurantia muttered unrelated nonsense and why she shot at some random mother and daughter."
 lyc.23.a:0 "..."
 
 lyc.24.t:0 "Meeting"
 lyc.24.d:0 "Having killed the deer gods, Aurantia, terribly tired, but with a calm heart, returned to Lictida. No one paid much attention to her little trip... except General Vernex.\n\n- Queen Aurantia! It's... it's... reckless! How could you go to Olenia, and even without my accompaniment? It's too dangerous, you could get hurt! Not that I claim to be the best bodyguard, but still...\n\nAurantia just smiled at Vernex.\n\n- Do you mind talking in private? Come to the Dark Garden by the Dead River. I'll be there tonight.\n\nVernex didn't quite expect this. Aurantia went about her business, and the general after only languidly saluted, not expecting what the queen had told him a few moments ago. However, he did return to his duties for the day.\n\nIn the evening, Vernex arrived at Lictida's Dark Garden. The trees here were not too dense, and he easily found Aurantia. What surprised him, she was sitting on a coastal bench, looking at the evening sky, it seemed, completely without protection. A warm wind blew her pale green mane.\n\n- Queen... Did you want to discuss something?\n\n- Oh, you really came. Sit down with me.\n\nDespite Vernex's having seen many manifestations of psychosis in his queen, even this situation surprised him a little. But no matter what happens this time, it is better to fulfill her order than to regret later. Vernex sat down on the bench. It wasn't big, and the two Changelings found themselves in an uncomfortably close position to each other. Inconvenient for Vernex, at the very least.\n\n- So... what did you want to discuss?\n\nAurantia remained mysteriously silent as she looked up at the evening sky. When the first star flashed, she gasped in admiration, admiring the distant luminary. Vernex, meanwhile, was not entirely comfortable, expecting a trick. Still, in such an environment, it is impossible to relax. Looks like something terrible could happen to Aurantia at any moment-\n\nShe casually laid her head on his shoulder. Vernex almost panicked, afraid to make any move. He expected Aurantia to start saying something, but she only muttered something unintelligible. Soon he heard a light sniffle. The general breathed a sigh of relief."
 lyc.24.a:0 "She must be tired."
 
 lyc.25.t:0 "Gray Days after the War"
 lyc.25.d:0 "Окончание войны - долгожданное событие для каждого чейнджлинга Ликтиды. Но после войны военный пыл приутих. Всё понемногу начало возвращаться в мирное русло, и простые жители начали обращать внимание на то, насколько плохи условия проживания в Ликтиде. Во время подготовки к войне большая часть предпринимательских организаций обанкротилась, что вынудило чейнджлингов поступать в Вооружённые Силы Ликтиды. Но уже сейчас заметен спад престижа профессии военного - виден острый недостаток администраторов, бухгалтеров, продавцов, банкиров и многих других... Народ Ликтиды недоволен. И, хотя на улицах наших ульев вовсю проходят парады победы, стреляют салюты, общая атмосфера отчаяния для простого трутня кажется безысходной."
 lyc.25.a:0 "Они же должны праздновать и радоватсья!"
 
 lyc.26.t:0 "We Returned Home"
 lyc.26.d:0 "После долгого похода, Ликтида наконец вернулась в состав Гегемонии Чейнджлингов. С тех пор, как мы вышли из неё, изменилось немало, но это всё-таки старая добрая конфедерация чейнджлингских ульев. Конечно, Верховная Королева не будет против нашего возвращения, но стоит определить, хотим ли мы быть зависимыми от Весалиполиса или же хотим автономии как полноценное государство..."
 lyc.26.a:0 "Мы хотим большой автономии..."
 lyc.26.b:0 "Пусть всё будет, как раньше."
 lyc.26.c:0 "Мы готовы подчиняться лидеру Гегемонии."
 
 lyc.27.t:0 "Social Reformist Protests"
 lyc.27.d:0 "Социал-реформисты - звучит как название каких-то омерзительных коммунистов или демократов, но в Ликтиде этим словом нарекли тех активистов, что призывают к снижению милитаризации страны. До войны они вели более-менее активные кампании, хотя и не добивались успеха. В самый разгар войны, когда народ пылал патриотизмом и работал на победу, они, казалось, исчезли... Но появились внось, когда война закончилась. Теперь эти придурки манипулируют народом, используя аргументы того, что тысячи семей лишились отцов, повысилась послевоенная безработица и начался голод в малых селениях. Это не значит, что этоих проблем нет, но эти реформисты ничем не помогают, а только радикализуют народ против власти.\n\nНо они всё ещё ликтидианцы, и официально заявляют, что не следуют идеологии коммунизма или демократии, поэтому мы не можем просто брать и расстреливать протестующих..."
 lyc.27.a:0 "Что же с нимим делать?"
 
 lyc.28.t:0 "Loss"
 lyc.28.d:0 "There were three changelings in the brood of the Apeiris family - a mother, a father and an only son. In peacetime, Zir worked as an engineer in a prestigious organization, and his wife, young Aria, always stayed at home and was busy with her son Tarris, because for health reasons she could not afford to work, but she gave herself to the family, and the love she gave to her husband, she could feed the whole Vesalipolis if she was a pony. Unfortunately, at the beginning of the war, Zir was called to the front as a military technician, and the neighbors helped his wife and son in every possible way. The Apeiris waited for letters from the front, but only waited for the postman, who brought grief to their home.\n\n"Mr. Zir died valiantly on the battlefield. Their squad was repairing the tank's chassis when the deer took them by surprise."\n\nAria decided not to tell Zir about this, because he is only five years old - it is not worth hurting him. But from that moment on, Aria's desire for life faded away, her positive and cheerfulness flew somewhere far away. The neighbors, having learned about this, decided to continue helping Aria, but for some reason she refused. Days, weeks and months have passed since then. But at one point, a familiar changeling named Swares approached her. He was a Lyctidian, but was not fit for service due to health reasons.\n\n– Listen, Aria... Maybe you should start over? Life doesn't end there. I can help your family, I can look after Tarris. Besides, I am still unmarried...\n\nAria looked at this self-assured changeling. She answered with a nod and returned to the house, which was a mess that she didn't have the energy or desire to clean up.\n\n- Start over...\n\nSuddenly, something clicked in her head. Her pupils dilated, and her mind filled with thoughts known and understood by her alone. She fussed and looked for warm clothes for her son and herself among the rubbish scattered around the apartment.\n\n- Sonny! Get ready, we're going on a hike.\n\nThey lived in one of the villages in the Apsychos region, and high and steep mountains stretched nearby. It was easy for tourists to climb one of them, which Aria and her son did. Aria stood on the edge and looked into the distance. There were villages, small towns, and a large, by local standards, hive city, Apsychos. Tarris, who was silent all the way, approached his mother, who was standing on the edge of the cliff, and asked: "Mom, why did we come here?"\n\nAria looked at her son. She had a sincere smile on her face, and her eyes sparkled with the moisture. But something made Tarris feel uneasy. As if something bad is about to happen.\n\nAria suddenly hugged her son tightly and said in a low voice:"
 lyc.28.a:0 ""You want to see Dad again, don't you?""
 
 lyc.29.t:0 "СР'цы формализируют коалицию!"
 lyc.29.d:0 "Сегодня ДСР и ЛСР окончательно сформировали свою "реформистскую" коалицию. Для этого они приняли Манифест социал-реформизма, который официально указывает политику этих движений. Каждый уважающий себя чейнджлинг бы ужаснулся, глядя на текст Манифеста, ведь два движения отныне называют себя "Партиями" (что уже говорит о том, что они метят на пост правителей Ликтиды), а также признают каждый свои принципы. Например, Левые социал-реформисты наконец-то признают, что являются лишь грязными коммунистами - в Манифесте они указывают на то, что их приоритет - права рабочего и свобода пролетариата, ужас! Демократические социал-реформисты ничем не лучше. Они заявляют, что "государство должно признавать высшей ценностью права и свободы каждого существа"... Какая беспрецедентная чушь! Оба эти принципа в корне противоречат тому, чем сейчас является власть в Ликтиде. И, на основании этого, Ауранция наконец может смотреть на СР'цев не как на подданых, а как на дегенеративных червей, отравленных идеями коммунизма и демократии. Теперь этих тварей можно... нужно подавить, как предателей нации!"
 lyc.29.a:0 "Вот они  и показали свою истинную сущность."
 
 lyc.30.t:0 "Всё ещё не коммунисты"
