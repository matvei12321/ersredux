 lyc.32.t:0 "Lyctida is leaving the Hegemony!"
 lyc.32.d:0 "Taking advantage of the internal strife within the Hegemony, Aurantia independently and without warning announced her intentions to attack Olenia! Thus, in fact, she indicated that the power of the Supreme Queen now means nothing to her. Meanwhile, the Supreme Queen herself is starting political reforms with might and main, and a war with a highly militarized hive will not be such a promising idea for her."
 lyc.32.a:0 "Who does she think she is?"
 
