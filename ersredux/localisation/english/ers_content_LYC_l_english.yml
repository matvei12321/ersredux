 ##### NATIONAL FOCUS
 #------start tree
 LYC_our_queen:0 "Queen of the Quiet Hive"
 LYC_our_queen_desc:0 "Aurantia has never been a cruel queen. On the contrary, she knows what justice is, and knows who, according to the principle of justice, deserves the strictest punishment."
 LYC_militarisation:0 "Preparing for Militarization"
 LYC_militarisation_desc:0 "Our industry was not famous for huge military factories, like Vrax. But using the industrial base that we have now, we can start building a terrifying war machine that we use in the fight against the under-creatures - deer."
 LYC_expand_current_industry:0 "Develop the Current Industry"
 LYC_expand_current_industry_desc:0 "Although we are preparing for the invasion of Olenia, we should not forget about our strong point - the civilian industry."
 LYC_obey_to_chryssy:0 "Support the Global Militarism of Chrysalis"
 LYC_obey_to_chryssy_desc:0 "To be honest, we are not interested in Chrysalis' plans for "global domination of changelings". But we can support this idea, hoping that one day our armies will march together across the border of the horned Olenians. And our soldiers will definitely be the first to enter the deer cities."
 LYC_kill_deers:0 "The real enemy of Every Changeling"
 LYC_kill_deers_desc:0 "To be honest, we are not interested in Chrysalis' plans for "global domination of changelings". All we want is to take revenge on all the deer for the fact that a few generations ago these ugly creatures almost exterminated the entire people of our hive. Of course, we are grateful to Chrysalis for her support during those difficult times, but now we will focus on a really important goal.\n\n §RExterminate. All. Of. The. Olenians.§!\n\n "And let no one stay alive...""
 LYC_wait:0 "Wait for the Right Moment..."
 LYC_wait_desc:0 "We don't have the ability to act alone. To realize the long-standing dream of Lyctida, we need to wait until Chrysalis announces a great march to the East."
 LYC_monster_awakens:0 "Awakening of the Silent Monster"
 LYC_monster_awakens_desc:0 "To hell with waiting. While we are waiting for the order of Chrysalis to attack Olenia, these artiodactyls live quietly in their cozy homes and do not even feel a drop of guilt for the fact that their ancestors attacked us several decades ago. Such monstrous selfishness must be punished.\n\n And Aurantia will be the main judge in the fate of the Olenians."
 LYC_punishment_for_302:0 "Natural Punishment"
 LYC_punishment_for_302_desc:0 "Hogland is the region that Lyctida occupied after the united forces of changelings crushed the artiodactyls. For a long time, the local Olenians were belittled and used as consumables, but they never received the punishment they deserve. Aurantia will announce the total extermination of the entire horned population of the Hoglanta region and the settlement of its changelings."
 LYC_develop_302:0 "Develop a Backward Region"
 LYC_develop_302_desc:0 "Everything here testifies to the degradation that is unique to deer - backward culture, backward buildings, backward heritage. All this should be erased, and the new future of the Lyctida changelings will proudly rise in place of degradation."
 LYC_prepare_302:0 "Build a Wall"
 LYC_prepare_302_desc:0 "Unfortunately, we were unable to find and destroy all the Olenians in the region. Some of them are still hiding and waiting for an opportunity to escape home to Olenia. To prevent this, we will build a wall that will prevent the Olenians from escaping from their imminent fate. In the end, not a single deer should be left alive. This is the principle of justice."
 LYC_chemical_warfare:0 "Chemification of the Army" 
 LYC_chemical_warfare_desc:0 "Chemical attacks proved to be on the good side during the war of Vesalipolis and Vrax. We are confident that this technology will be just as effective against the vile olenians."
 LYC_insane_war:0 "Death Squads"
 LYC_insane_war_desc:0 "War is what the Lyctidians have been preparing for for generations. Our ancestors will bless us for a successful campaign, because then we will avenge their death, as well as establish justice in this world."
 
 ##### KILL OLE tree 
 LYC_prepare_executions:0 "Wait for the Executioners..."
 LYC_prepare_executions_desc:0 "Spending days and nights in her palace, Aurantia prepares plans for the administration of justice. And all Lyctida's changelings support her in this endeavor."
 LYC_tell_them_about_justice:0 "The Concept of Justice"
 LYC_tell_them_about_justice_desc:0 ""Everyone will be rewarded exactly to the extent that the crime was committed. Thieves should lose their goods, torturers should be tortured, and murderers should be killed. And such should be the fate, and if fathers and mothers did not suffer that punishment, then their children and their children's children should be punished. Then there will be peace and order on the earth we walk on, and everyone will live in prosperity.""
 LYC_standalone:0 "We are Alone in Our Goal"
 LYC_standalone_desc:0 "Every queen wants to achieve her ridiculous ideas. The only one we could rely on is Queen Chrysalis. But her plans are too banal - she wants to rule over the deer, while our goal is more... radical. She is so radical that other queens will definitely not support her. That's why we have to fight alone."
 LYC_loyalty:0 "Loyalty"
 LYC_loyalty_desc:0 ""What? An adequate foreign policy? Normal attitude towards national minorities? Not an aggressive ideology of the state? Stop talking nonsense! Get up, Aurantia knows that you are ready to begin the fulfillment of a great duty.""
 LYC_agressive_militarization:0 "Aggressive Militarization"
 LYC_agressive_militarization_desc:0 "The military industry should become a priority. We must reject the idea that Liquidators are a quiet hive whose changelings quietly produce resources. Changelings Liquidators are preparing for the inevitable. And no one will dare to resist them."
 LYC_agressive_industry:0 "Death Gear"
 LYC_agressive_industry_desc:0 "We just don't have enough equipment. We need tons of deadly weapons. And when Aurantia demands "deadly" weapons, she means DEADLY weapons."
 LYC_army_upgrade:0 "Prepare the Army"
 LYC_army_upgrade_desc:0 "As bad as it may sound, our army in its current state is too small to crush the Olenian forces. We need to increase attention on the development of the army, especially on the creation of new effective doctorines."
 LYC_air_upgrade:0 "Heavenly Punishment"
 LYC_air_upgrade_desc:0 "Aurantia admires the idea of using bombers against the Olenian state. She is delighted with the idea that the Olenians will die not only at the front, but also be subjected to terrifying bombardments in the rear. In the end, they deserved it.Aurantia also has interesting ideas on how bombers and other aircraft can be used so that the Olenians meet the most fair fate."
 LYC_army_total_destruction:0 "Total War"
 LYC_army_total_destruction_desc:0 "Truly, deer are the worst creatures in the world. And it's not even that we consider ourselves an "uber-race", no... It's just that the existence of the Olenians is a mistake. The deer, which according to the principle of justice should be destroyed, still live. This is what Aurantia is trying to convey to her subjects. The death of horned creatures is the only right solution."
 LYC_army_spare_someone:0 "They Can Still Benefit"
 LYC_army_spare_someone_desc:0 "The Olenians are essentially not completely useless. Their bodies contain resources that we can use in biological research, and also some deer are strong enough to perform simple tasks like carrying resources. Of course, the brain of a deer is too small to engage in scientific research and difficult brain activity (which has been repeatedly proven by our scientists), so we will not just capture and unify the deer, but will slowly benefit from them. In addition, under such circumstances, the Olenians will sooner or later die out from the backbreaking physical labor that awaits them."
 LYC_deadly_air:0 "SpecialBombing Methods"
 LYC_deadly_air_desc:0 "Bombers will be able to inflict some damage to the Olenians. But perhaps this will not be enough for the Olenians to pay for their deeds. Then we will resort to special methods of punishment. The region of the small Apsychos hive seems to be a quiet and unremarkable place. It's ideal to start developing a real weapon of death."
 LYC_navy_upgrade:0 "In a Quiet Hive"
 LYC_navy_upgrade_desc:0 "Our fleet will be like our hive -quiet, deadly."
 LYC_army_of_fate:0 "Army of Revenge"
 LYC_army_of_fate_desc:0 "Our army is growing in size. And it should become the national symbol of Lyctida. Yes, the best soldiers usually train in Vrax, but we will still show the whole world, especially the dirty artiodactyls in the northwest, what our great army of revenge is capable of."
 LYC_start_independence:0 "Sever Ties with Vesalipolis"
 LYC_start_independence_desc:0 "In order to fully carry out our revenge, we need to deal with the enemy on our own. The duel of fate is a changeling against a doe. To do this, we will begin to increase the degree of independence of Lyctida, and we will also replace some Vesalipolian officers with Lyctidian ones to ensure their greater loyalty."
 LYC_start_independence_l:0 "Tariffs for Resources"
 LYC_start_independence_l_desc:0 "We are an industrial hive of Hegemony, and other queens think they have the right to take away our industrial resources from us with impunity. Since we are not yet a completely independent hive, we cannot simply prohibit other hives from receiving our resources. However, we can impose brutal tariffs to scare the queens away from our wealth. Chrysalis will not be able to object, since we are still subordinate to her and transfer resources to her. It's just that we won't be subordinate to other queens."
 LYC_fight_for_queen:0 "Life for the Queen"
 LYC_fight_for_queen_desc:0 "There can only be one will -the Queen's will! You're just a drone who has to do her orders weakly. This is the only way we can come to a bright future where all the Olenians rot in the ground."
 LYC_fight_for_idea:0 "Life For an Idea"
 LYC_fight_for_idea_desc:0 "There can be only one correct philosophy - the Olenians deserve extermination! No one, not even the Queen herself, can contradict this idea. This is the only way we can come to a bright future where all the Olenians are rotting in the ground."
 LYC_army_upgrade_2:0 "Motorization"
 LYC_army_upgrade_2_desc:0 ""
 LYC_start_independence_r:0 "Raise the Lyctidian spirit"
 LYC_start_independence_r_desc:0 "The Lyctidian should see his advantages in comparison with the changelings of other hives. The Lyctidian is not just a changeling, it is a quiet killing machine, ready to plunge a dirk into the throat of every horned artiodactyl. And the Lyctidians should be proud of the fact that they can destroy the Olenians most effectively."
 LYC_start_independence_industrial_hive:0 "The Great Hive"
 LYC_start_independence_industrial_hive_desc:0 "We don't care what the other queens say,  Lyctida is the greatest hive among all the others."
 LYC_full_win:0 "Only Complete Victory"
 LYC_full_win_desc:0 "Aurantia will not allow any plans "B"! No "strategic retreats"! Only full speed ahead, an inexorable wave on the country that should be erased from Equus."
 LYC_unspeakable_result:0 "Unthinkable Outcome"
 LYC_unspeakable_result_desc:0 "Of course, this can't happen, absolutely can't. But in case of an emergency, we will build a network of underground bunkers, which we will use to deter theoretically possible attacks by the Olenians.\nBut such a scenario is absolutely unlikely. Aurantia just wants to be ready for anything."
 LYC_tank_brigades:0 "Tank Doctorine"
 LYC_tank_brigades_desc:0 "Tanks are no longer considered exotic in hives. For example, Vraks has long launched these iron monsters into mass production. It's worth thinking about doing the same - wild Olenians will definitely be terrified of what they will take for growling iron beasts."
 LYC_artillery_brigades:0 "National Artillery"
 LYC_artillery_brigades_desc:0 "Well, who doesn't like artillery? Except for a deer, in whose face a fragmentation artillery shell is flying."
 LYC_next_step:0 "On the way to the highest goal"
 LYC_next_step_desc:0 "§CWhen the lightning strikes through the storm\nEarth is shaking down to the core\nAnd the thunder clouds above roar\nThen you know we’re going to war...§!"
 
 ##### AFTER WAR
 
 LYC_quiet_peace:0 "Quiet Place"
 LYC_quiet_peace_desc:0 "With the end of the war, Lyctida will once again become a quiet hive. The drums of war will be silenced, the population will return to their usual life, but already with the realization that the greatest threat to the Changeling family - the Olenians - has been eliminated. But will this idyll last long? Queen Aurantia feels that a new storm is coming, but for now it is possible to arrange a respite."
 LYC_praise_army:0 "Reward the Army"
 LYC_praise_army_desc:0 "Every soldier who took part in the battlefields is a hero who deserves awards. We will have to buy a large number of printing presses from Ditrisium in order to produce a sufficient number of award medals on time."
 LYC_parades:0 "Parades in Lyctida"
 LYC_parades_desc:0 "Loud parades are a rarity for Lyctida. The last time the parade was held in 998 in honor of the formalization of the creation of the Hegemony. Columns of Lyctidian and Vesalipolian vehicles walked through the Dark Square, demonstrating the power of the allied states. But it wasn't our holiday. These were just the whims of Chrysalis, which she was so eager to satisfy. Lavish parades? Loud military music? Such solemnity should be carried out only on exceptional occasions, and not at the request of one individual. But the victory over the Deer is really a worthy reason for a parade and joy."
 LYC_minute_of_silence:0 "A Minute of Silence"
 LYC_minute_of_silence_desc:0 "Many of our soldiers were killed by the hooves of dirty Olenians. They performed their sacred duty and deserve universal respect."
 LYC_back_to_hives:0 "Returning Home"
 LYC_back_to_hives_desc:0 "WIP"
 LYC_standalone_2:0 "Independent Lyctida"
 LYC_standalone_2_desc:0 "The war with Olenia has shown that Lyctida can exist as an independent state that does not need outside supervision. An impressive army, a decent industry and the advantage of chemical weapons - all this makes the new Lyctida equal to Vesalipolis or any other hive of Hegemony. Such reasoning suggests that, perhaps, Lyctda can compete with Vesalipolis in power..."
 LYC_dreams_of_our_changelingia:0 "Dreams of our Changelingia"
 LYC_dreams_of_our_changelingia_desc:0 "Aurantia has been watching the decline of Hegemony for many years. The tyranny of the foolish Chrysalis did not lead to anything good, but only aggravated all possible conflicts. Aurantia is a being who knows what justice and piety are. Under her rule, сhangelingы will live and prosper.\n§RIn addition, there are rumors that settlements of Olenians have been found both in Gryphonia and in Zebrica. In fact, we will simply squeeze all the resources out of the Hegemony in order to organize invasions across the oceans.§!"
 LYC_forces_against_vesalipolis:0 "Open Assault Divisions"
 LYC_forces_against_vesalipolis_desc:0 "WIP"
 LYC_mobilize_army_for_crusade_against_vesalopolis:0 "To Mobilize Forces for a Campaign to Vesalipolis"
 LYC_mobilize_army_for_crusade_against_vesalopolis_desc:0 "WIP"
 LYC_forces_against_vesalipolis_toxic:0 "Chemical Assault Divisions"
 LYC_forces_against_vesalipolis_toxic_desc:0 "WIP"
 LYC_prepare_for_future_war:0 "Re-Mobilization"
 LYC_prepare_for_future_war_desc:0 "The respite is over. A new war is coming! Although it will not be as important and significant for us as the war with the Queendom of wild animals in the west, but it will still play a big role in the history of Lyсtida. The regime that rules in Vesalipolis must be overthrown in the name of the power of Aurantia. She will become a much more suitable ruler of a changeling state than [251.owner.getleader]!"
 LYC_adapt_vpk:0 "Adapt the Military-Industrial Complex"
 LYC_adapt_vpk_desc:0 "We are preparing for the fact that a war is coming, but so that the mobilization does not cause too serious damage to the civilian economy, we will take a number of measures that will allow the military-industrial complex to function without harming the civilian sector.."
 LYC_lyctida_uber_alles:0 "Lyctida Above All"
 LYC_lyctida_uber_alles_desc:0 "Приоритетом для каждого чейнджлинга должна быть защита Ликтиды. Ликтида - наш дом, и одновременно точка, вокруг которой вращается вся Вселенная."
 LYC_patriotic_propaganda:0 "Patriotic Propaganda"
 LYC_patriotic_propaganda_desc:0 "The Lyctidian is a super-being, standing much higher than the Vraxian, Vesalipolian and other peoples of the Hegemony. Propaganda should drive this into the people's heads in order to awaken the spirit of competition, because why are there only Vesalipolians in the administration of Chrysalis, which controls the entire Hegemony, and there has never been a single Lyctidian? Indeed, an injustice."
 LYC_forward_my_army:0 "Forward, My Armies!"
 LYC_forward_my_army_desc:0 "WIP"
 LYC_coronation_of_vesalipols:0 "Coronation of Aurantia"
 LYC_coronation_of_vesalipols_desc:0 "WIP"
 LYC_coronation_of_dytrisium:0 "Queen of Dytrysium"
 LYC_coronation_of_dytrisium_desc:0 "WIP"
 LYC_coronation_of_vraks:0 "Queen of Vraks"
 LYC_coronation_of_vraks_desc:0 "WIP"
 LYC_coronation_of_soryth:0 "Queen of Soryth"
 LYC_coronation_of_soryth_desc:0 "WIP"
 LYC_integrate_volistad:0 "Integrate Volistad"
 LYC_integrate_volistad_desc:0 "A small spot called Volistad is just an administrative unit, within the boundaries of which the Changelings living consider themselves to be some kind of unique people. But, admittedly, Volistad has no great value for us. And, besides, Aurantia is already pretty tired of traveling around the hives for the purpose of coronation, so we can limit ourselves to the usual formal integration into our Queendom."
 LYC_stop_opposition:0 "Opposition"
 LYC_stop_opposition_desc:0 "Even after we have conquered all the Changeling lands, there are dissatisfied and protesting. Aurantia is a simple changeling - she will simply give the order to shoot them. From tank guns and gas installations, if necessary."
 LYC_destroy_communists:0 "Destroy the Communists"
 LYC_destroy_communists_desc:0 "Due to the inept rule of Chrysalis, many hidden cells of communists appeared in the territories of Vesalipolis. They have been waiting for the perfect moment to attack for a long time, and their strength is growing every day. We will not allow the Communists to undermine the power of our Aurantia! Destroy them!" 
 LYC_pax_lyctidia:0 "Пакс Ликтидия"
 LYC_pax_lyctidia_desc:0 "A glorious day for all Changelings. Aurantia-the fairest being in the world-has risen above the other queens! Many were whispering behind her back, plotting, but nothing came of it. Aurantia will now wisely rule the Queendom of Changelingia, not allowing the unworthy to jeopardize the safety of our race. Safety, for which a great price was paid."
 
 LYC_leave_this_fools:0 "Попирательства глупцов нас не волнуют"
 LYC_leave_this_fools_desc:0 "WIP"
 LYC_sphere_of_defence:0 "Наша оборона"
 LYC_sphere_of_defence_desc:0 "WIP"
 
 LYC_justify_olenian_occupation:0 "Let the World Know that We Were Right"
 LYC_justify_olenian_occupation_desc:0 "Despite the fact that we fought for justice for the deer race, the rest of the powers of the world, including our hives, look at us with suspicion. These scum don't understand that there is real justice, but we need to somehow restore our political reputation, right? We will create a number of "real" documents that contain orders to attack Lyctida and exterminate the entire Changeling people. We will announce these documents to the whole world so that the worms of the "civilized world community" understand that we fought for a holy cause."
 
 
 LYC_see_economic_problems:0 "Go to Problems"
 LYC_see_economic_problems_desc:0 "WIP"
 LYC_support_local_business:0 "Private Business Support"
 LYC_support_local_business_desc:0 "WIP"
 LYC_demobilisation:0 "Demilitarization of the Economy"
 LYC_demobilisation_desc:0 "WIP"
 LYC_send_industrial_equipment:0 "Transfer Industrial Equipment"
 LYC_send_industrial_equipment_desc:0 "WIP"
 LYC_upgrade_banks:0 "Revive the National Bank"
 LYC_upgrade_banks_desc:0 "Aurantia has long signed a decree on the establishment of the national bank of Lyctida. Initially, it was supposed to be a structure that would allow the poorer segments of the population to take loans and work them off, finance promising private projects and so on. But recently, the national bank has turned into another champion of taxes with the introduction of absurd "mandatory payments for the benefit of the state." Of course, it should bring income to Lyctida, but its initial goal is to help the population, and Aurantia will make sure that the national bank becomes the organization it was originally conceived to be.."
 LYC_calm_protesters:0 "Solve the Problem of Protests"
 LYC_calm_protesters_desc:0 "Protests are not at all the method by which the problems of Liquidism should be solved. A Lyctidian must endure all the trials with fortitude before fate grants him the opportunity to enjoy a quiet life, but these individuals do not think so. They believe that Lyctida needs a "revolution", that "Aurantia has only devastated the country with its wars." They need to be... dealt with. Immediately."
 LYC_support_borning:0 "Fertility Improvement Program"
 LYC_support_borning_desc:0 "Many of our soldiers died in an unequal battle, which created a large demographic hole in Lyctida. It's worth fixing it."
 LYC_reabilitation_centres:0 "Rehabilitation Centers"
 LYC_reabilitation_centres_desc:0 "Many Changelings did not return home from the war, and some of those who returned are not the same as before. The war with rabid animals has shaken their minds, and it is difficult for them to adapt to the old peaceful life. A number of social centers should be organized to help the injured soldiers forget the horrors of war and return to normal to their loving families.."
 LYC_industry_of_lyctida:0 "Machine Labor"
 LYC_industry_of_lyctida_desc:0 "WIP"
 LYC_upgrade_life:0 "Improve the Standard of Living"
 LYC_upgrade_life_desc:0 "WIP"
 LYC_send_arms_factories:0 "Transfer Military Equipment"
 LYC_send_arms_factories_desc:0 "WIP"
 LYC_afterwar_military_reforms:0 "Military Reforms"
 LYC_afterwar_military_reforms_desc:0 "Fighting with savages, we gained a lot of experience in the field of warfare."
 LYC_pojar_corpus:0 "Modernization of the Army"
 LYC_pojar_corpus_desc:0 "WIP"
 LYC_standartize_doctrines:0 "СStandardization of Doctrines"
 LYC_standartize_doctrines_desc:0 "WIP"
 LYC_new_ordens:0 "Initiative of New Orders"
 LYC_new_ordens_desc:0 "Active citizens of Lyctida on their own initiative have created so-called "Orders" that spread the doctrine that deer are God-abominable creatures that need to be exterminated. Their activities are more aimed at young people, so that the memory of the great feat of the Lyctidians and the memory of the Olenian scum will always remain in the minds of new generations."
 LYC_heavy_tanks:0 "Support Tank Building"
 LYC_heavy_tanks_desc:0 "WIP"
 LYC_magical_weapons:0 "Uber Rifles"
 LYC_magical_weapons_desc:0 "WIP"
 LYC_professional_army:0 "Lyctida 's Professional Army"
 LYC_professional_army_desc:0 "WIP"
 LYC_optimise_gas_production:0 "Optimization of Gas Production"
 LYC_optimise_gas_production_desc:0 "Chemical weapons have greatly helped us in achieving justice. It is worth developing new methods for creating such wonderful weapons."

 
 LYC_evil_science:0 "The Philosophy of the knife"
 LYC_evil_science_desc:0 "Those soldiers of Olenia who survived after our offensive are the most disgusting, but still a miracle. The fact that they resisted the righteous fury of our fighters shows that they have some biological advantages over their degraded brethren... It is necessary to catch the members of the Olenia army that remained alive, and to open their insides for a detailed study of the structure of their body."
 LYC_rely_on_krieger:0 "Rely on Krieger"
 LYC_rely_on_krieger_desc:0 "Von Krieger is a real Beast of the West, and he deserved this nickname. Not every sadist will be able to come up with so many ways to destroy dirty Olenians. In a relatively short time, he burned, bombed and simply slaughtered dozens and hundreds of deer villages... Well, let him continue, and Aurantia will award Krieger with a distinctive title, which officially "crowns" him the Beast of the West."
 LYC_esoterica_in_anti_olenia:0 "Send the Wrath of the Gods"
 LYC_esoterica_in_anti_olenia_desc:0 "Aurantia claims to have killed the Olenian deities. Of course, there are questions whether such an underdeveloped people as deer had gods at all, but our gods definitely exist. With the help of prayers and countless rituals, we will ask for help from the entities of Valhalla, who will help Krieger erase our enemies."
 
