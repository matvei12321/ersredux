l_english: 
SVR_kolcokkonsolidiruetvlast:0 "Koltsok consolidates power"
SVR_kolcokkonsolidiruetvlast_desc:0 "Tsarina Elena took the situation into her own hands and called an emergency meeting of the top command staff. There, with his fiery speech, Koltsok was able to convince the generals to rally around the tsarist government and put aside all differences until the final victory over the revolutionaries."
SVR_provalbolshogopohoda:0 "Failure of the "Big Hike""
SVR_provalbolshogopohoda_desc:0 "Despite the liberation of Petershoof (and the chatter of our propaganda), the higher-ranking Northerners are forced to admit the failure of the "Great Campaign": the Reds have not only not been dislodged from an impressive part of our lands, but have also been given time and opportunity to strengthen. This is causing a split and panic in our ranks."
SVR_oppoziciyadelaethod:0 "The opposition is making a move"
SVR_oppoziciyadelaethod_desc:0 "The opposition manages to make a move and intercept the important General Ponikin and the Democratic officers on its side before an urgent meeting is called, disrupting all Elena's plans. Now that such a bright personality as Ponikin is on the side of the opposition, victory is almost in your pocket."
SVR_prilyadnayakaznkolcoka:0 "Koltsok's demonstrative execution"
SVR_prilyadnayakaznkolcoka_desc:0 "Koltsok may seem like a hero, but his political views and deeds have no justification. The only thing he deserves is to be hanged. And with Koltsok, all thoughts of tyranny and loyalty to the Romanovs will disappear."
SVR_poisksovyonkova:0 "The Search for Sovenkov"
SVR_poisksovyonkova_desc:0 "Sovenkov and his "Sovenkovites" are nothing more than terrorists who revel in power and want to drive the Northerners into a new bloody turmoil. They need to be crushed. Sovenkov must die like the bandit he is!"
SVR_voennayaneobhodimost:0 "Military necessity"
SVR_voennayaneobhodimost_desc:0 "Despite the difference of views between Korenilov and Ponikin, they must unite to stop the anarchy in the army and prepare it for a new Great Campaign!"
SVR_vynuzhdennyysoyuz:0 "Forced union"
SVR_vynuzhdennyysoyuz_desc:0 "The right monarchists, harmonists, moderate Social Democrats and true patriots are forced to unite against the threat of the final loss of the Northerners in the blood of the Civil War or under the hooves of the Unicorns. And a new figure rises above all this..."
SVR_vstrechassovyonkovym:0 "Meeting with Sovenkov"
SVR_vstrechassovyonkovym_desc:0 "Tsarina Elena was extremely interested in an unusual political figure. Sovenkov is a peasant who was able to create an entire political organization during the Civil War, but he did not side with the rebels..."
SVR_arestovatnedovolnyh:0 "Arrest the discontented"
SVR_arestovatnedovolnyh_desc:0 "Harmonists, Social Democrats, and other cosmopolitan whiners have no right to exist. Also... they are to blame for the defeat of the "Great March", and their fate is the gallows!"
SVR_kaznitpretendentov:0 "Execute applicants"
SVR_kaznitpretendentov_desc:0 "The heirs of the Rurikovich family are dangerous precedents for the stable power of Tsarina Elena and the Romanovs in general. It is possible that they staged a revolution to regain the throne! We have to find and eliminate them all. History has shown that they have outlived their usefulness."
SVR_partnyorynonedruzya:0 "Partners, but not friends."
SVR_partnyorynonedruzya_desc:0 "Tsarina Elena is going to go further than her predecessors to achieve order and stability of her homeland. We will start removing open and ardent Unicorns from all posts, while bowing to the "highly respected" Unicorn King, but holding a knife behind his back."
SVR_drugayacarica:0 "The Other Queen"
SVR_drugayacarica_desc:0 "Perhaps Koltsok has much more power than Elena thought. The attempt to remove Koltsok and replace him with Korenilov provoked the Black Baron to take preventive action: Elena Romanovskaya was "killed by vile Marxists during the bombing of the carriage", and the heir took the throne more obedient to Koltsok's Rate..."
anastasia_first_tree_flag:0 "Elena loses power"
elena_first_tree_flag:0 "Elena and Koltsok continue their policy"
svr_rurikovisch_comes:0 "The opposition is united and ready to fight, but it still does not have a popular or at least legitimate leader. But that may change..."

