 CHN_communism_party:0 "ЧОГМ"
 CHN_communism_party_long:0 "Чёрные отряды Голд Маффина\n§W-----------------§!\n §WИдеология:§! Маффинизм\n §WПолитическая повестка:§! Национальная Революция\n§W-----------------§!\n §gЗАЦЕНЗУРЕНО§!\n§W-----------------§!\n"
 CHN_fascism_party:0 "Имперская администрация"
 CHN_fascism_party_long:0 "Имперская администрация\n§W-----------------§!\n §WИдеология:§! Автократия\n §WПолитическая повестка:§! Национализм и Экспансионизм\n§W-----------------§!\n §gИмперская администрация Весалиполиса подчиняется автократу - Верховной Королеве Чейнджлингов. ИА была сформирована после того, как Кризалис реформировала §Lхайв-стаг§!, бывшую правящую администрацию, которая не справлялась со своими задачами с тех пор, как была сформирована Гегемония. Сейчас ИА является самой крупной административной организацией в Гегемонии, и решает вопросы мобилизации, экономики, политики, шпионажа и прочие. И хотя формально ей должны подчиняться все чейнджлинги ульев, главную роль в государстве всё равно играет Верховная Королева, от и до контролирующая Имперскую Администрацию.§!\n§W-----------------§!\n"
 CHN_democratic_party:0 "Национал-возрожденцы"
 CHN_democratic_party_long:0 "Национал-возрожденцы\n§W-----------------§!\n §WИдеология:§! Национал-эволюционизм\n §WПолитическая повестка:§! Национальная Эволюция\n§W-----------------§!\n §gКто он? Очередной предатель, которого давно нужно было сослать в Сориф? Безумный безумец? Известно только одно, что Торакс желает сместить текущую власть, за что долгое время преследовался УОБВ, хоть и безуспешно.\n\n Торакс утверждает, что стремится совершить революцию, но социалистом его точно не назовёшь. Ещё в 989-м году он выдвинул теорию национал-эволюции, что бы она не значила... Так или иначе, его партия числится оппозиционной и враждебной.§!\n§W-----------------§!\n"
