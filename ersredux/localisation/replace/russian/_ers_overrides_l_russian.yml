 #### VANILLA IDEAS

 zebrica_legacy_of_storm3_desc:0 "Когда король Шторм со своей армией напал на нас, нам удалось избежать его гнева различными способами: скромной данью, искусной дипломатией, хитрым обманом или же прочими средствами. Мы отдали все наши ценности и артефакты, а взамен король Шторм по большей части оставил нас в покое, ограбив и разрушив лишь несколько городов. После этого мы начали платить ему дань. Некоторые из наших граждан недовольны тем, что мы не дали отпора этому военачальнику, но такой курс действий позволил нам сохранить свою страну."


 political_divisions:0 "Политические разногласия"
 political_divisions_desc:0 "Чейнджлинги раздроблены: у них отсутствуют общие цели, а Гегемония трескается с каждым днём."

 queen_argynnis:0 "Королева Вракса\n- §LТитул правителя Вракса передаётся по наследству старшей дочери предыдущего монарха, то есть, во Враксе матриархальная монархия. Королева Вракса считается главнокомандующей армии и единственным авторитарным правителем. Примечательно, что в большинстве своём королевы Вракса были воинственны и амбициозны, что, скорее всего, передаётся по наследству§!."
 queen_helvia:0 "Королева Дитрисиума\n- §LМонархия в Дитрисиуме устроена очень... необычным образом. Вместо передачи власти по наследству, власть передаётся той дочери или сыну монарха, кто накопил больше капитала и считается наиболее богатым. Но если у монарха Дитрисиума лишь один отпрыск, то он в любом случае получит трон. Из-за таких тонкостей монархию Дитрисиума часто называют §Yплутократией§!.§!"
 queen_aurantia:0 "Королева Ликтиды\n- §LМонархия в Ликтиде, кажется, не отличается особыми тонкостями. После смерти предыдущего правителя власть передаётся старшему отпрыску вне зависимости от его или её пола§!."
 queen_yaria:0 "Королева Сорифа\n- §LВозможно, получить титул монарха Сорифа - самая тяжелая задача для чейнджлинга. Даже если будущая королева родилась в королевской семье, она должна пройти ряд испытаний, чтобы доказать свою готовность к правлению. В эти испытания входят проверка знаний в области математических, физических, юридических и социологических наук, знание основ философии и управления, а также базовые знания эзотерики. Только тот отпрыск из выводка королевской династии, который безупречно прошёл всё это, будет править.§!"
 
 pony_race:0 "Общепонийская раса"
 
 pegasi_desc:0 "Пегасы."

 thestral_race_trait_desc:0 "§LФестралы или бэтпони - подгруппа пони, которая отличается кожаными крыльями, как у летучих мышей, и острыми клыками. Из-за многовекового разделения их часто считают отдельной расой, несмотря на то, что у них немало общего с другими подгруппами пони. Как и у пони, у них на боках есть магические метки отличия. Они могут видеть в темноте, но у них нет магических возможностей, превосходящих возможности земных пони и пегасов. Многие фестралы,§! §Yхоть и не все§!, §Lведут ночной образ жизни. Юнвунега ("иноземцы")  иногда называют их бэтпони, хоть и среди них это считается более оскорбительным вариантом. Проживая по большей части в джунглях, бэтпони в основном травоядные, но иногда едят мясо.§!"
 
 POLITICS_PRINCERUTHERFORD_DESC:0 "За Кристальными горами принц Резерфорд возглавляет гордый народ Якякистана. Принц Резерфорд – оспариваемый многими правитель традиционно изоляционистских яков, и он только недавно появился на глобальной сцене. Резерфорд готов сделать что угодно для своего народа, если только не придётся поступиться гордостью народа яков."



