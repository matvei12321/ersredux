 queen_argynnis:0 "Queen of Vraks\n- §LТитул правителя Вракса передаётся по наследству старшей дочери предыдущего монарха, то есть, во Враксе матриархальная монархия. Королева Вракса считается главнокомандующей армии и единственным авторитарным правителем. Примечательно, что в большинстве своём королевы Вракса были воинственны и амбициозны, что, скорее всего, передаётся по наследству§!."
 queen_helvia:0 "Queen of Ditrysium\n- §LThe monarchy in Ditrysium is arranged... in an unusual way. Instead of transferring power by inheritance, power is transferred to the daughter or son of the monarch who has accumulated more capital and is considered the richest. But if the monarch of Ditrysium has only one offspring, then he will get the throne anyway. Because of such subtleties, the monarchy of Ditrysium is often called a §Yplutocracy§!.§!"
 queen_aurantia:0 "Queen of Lyctida\n- §LThe monarchy in Lyctida does not seem to be distinguished by special subtleties. After the death of the previous ruler, power is transferred to the eldest offspring, regardless of his or her gender§!."
 queen_yaria:0 "Queen of Soryth\n- §LВозможно, получить титул монарха Сорифа - самая тяжелая задача для чейнджлинга. Даже если будущая королева родилась в королевской семье, она должна пройти ряд испытаний, чтобы доказать свою готовность к правлению. В эти испытания входят проверка знаний в области математических, физических, юридических и социологических наук, знание основ философии и управления, а также базовые знания эзотерики. Только тот отпрыск из выводка королевской династии, который безупречно прошёл всё это, будет править.§!"
 
