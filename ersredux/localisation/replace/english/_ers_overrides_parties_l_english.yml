 CHN_communism_party_long:0 "Gold Muffin's Black Troops\n§W-----------------§!\n §WIdeology:§! Muffinism\n §WPolitic agenda:§! National Revolution\n§W-----------------§!\n §gCENSORED§!\n§W-----------------§!\n"
 CHN_fascism_party:0 "Imperial Administration"
 CHN_fascism_party_long:0 "Imperial Administration\n§W-----------------§!\n §WIdeology:§! Autocracy\n §WPolitic Agenda:§! Nationalism and Expansionism\n§W-----------------§!\n §gThe Imperial Administration of Vesalipolis is ruled by an autocrat, the High Queen of the Changelings. The IA was formed after Chrysalis reformed the §Lhive-stag§!, the former ruling administration that had been failing to perform its tasks since the Hegemony was formed. The IA is now the largest administrative organization in Hegemony, and decides on issues of mobilization, economics, politics, espionage and others. And although formally all hive changelings must obey her, the main role in the state is still played by the Supreme Queen, who controls the Imperial Administration from start to finish.§!\n§W-----------------§!\n"
 CHN_democratic_party:0 "National Revivalists"
