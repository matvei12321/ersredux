 harmonic_constitutionalism:0 "Democratic Monarchism"
 harmonic_constitutionalism_desc:0 "§YDemocratic Monarchism§! is a utopian ideology that combines republican and monarchical elements. The most common example is a constitutional monarchy. The monarch plays a limited role and controls a democratically elected parliament. But this ideology is often not very balanced. For example, if it leans too much towards republicanism, it becomes a ceremonial monarchy."
 liberalism:0 "Utopian Republicanism"
 liberalism_desc:0 "§Yutopian Republicanism§! is heavily influenced by the philosophy of utopianism, but its adherents believe that a true utopia is only possible with democratically elected leaders. Therefore, they oppose monarchies or dictatorships, sometimes even utopian ones. The adherents of this ideology are ardent defenders of personal freedom and confident builders of Utopia, which distinguishes them from the mainstream republican movement."
 socialism:0 "Utopian Socialism"
 socialism_desc:0 "§YUtopian Socialism§! seeks to establish equality in society and build a socialist state through reforms. This ideology seeks to mitigate or gradually eliminate the shortcomings of capitalism through a mixed economy and a social welfare system, while maintaining a democratic system."
 holy_order_h:0 "Noble Knightly Order"
 holy_order_h_desc:0 "This §Yknightly order§! follows a fundamental religious or military code, which it refers to when making decisions. The state is governed by a military order that upholds sacred rituals and customs. The order's code serves as a guiding light, helping society uphold utopian values."
 harmonic_libertarianism:0 "Utopian Libertarianism"
 harmonic_libertarianism_desc:0 "§YUtopian Libertarianism§! is a philosophy that holds liberty as a key principle and seeks to protect the rights of individual citizens in accordance with utopian ideals. The state governs the country in partnership with the people through a democratic form of government."
 harmonic_magocracy:0 "Utopian Magocracy"
 harmonic_magocracy_desc:0 "§YMagocracy§! is a regime of spellcasters, often unicorns. In this regime, magical talent is the most valuable trait among the population. In a magocracy, a peasant with magical ability can quickly become a member of the upper class of society. In a utopian magocracy, the rule of the mages is very benevolent, and they act as caretakers of the common people."
 
 marxism:0 "Marxism"
 marxism_desc:0 "§YMarxists§! rely on the teachings of the political activist Caramel Marx. Class struggle and the need to move to a society based on public ownership of the means of production characterize this ideology. Marxist societies claim to fight the capitalist exploitation of the working class, usually through a centrally planned economy. If democracy is present in a Marxist state, it is usually defective, since it only allows political activity to other socialist parties or groups."
 leninism:0 "Novosocialism"
 leninism_desc:0 "§YNovosocialism§! seeks to create a socialist state with a vanguard party leading the revolution, with the primary goal of overthrowing capitalist society. The party controls the entire system, and there is open debate when making decisions. This form of communism includes elections of party leaders."
 stalinism:0 "Stallionism"
 stalinism_desc:0 "The ideology of §Ystallionism§! uses and develops Marxist-Equestrian socialist policies. It emphasizes the importance of rapid industrialization and collectivization, as well as the need to create a strong and authoritarian socialist state to eliminate any counter-revolutionary elements. The name of this ideology is based on the harsh, but probably necessary policies of Steel Stallion, who led the Winter Revolution against the Equestrian monarchy."
 anti_revisionism:0 "Anti-revisionism"
 anti_revisionism_desc:0 "§YAnti-revisionism§! is a reaction to the many ideologies that claim to be the successors of Marxism, and seeks to adhere to the core tenets of the original revolutionary theory. It generally opposes the incorporation of capitalist economic elements into socialist systems, and is hostile to communist states that deviate from orthodox Marxism, considering them to be "state capitalist" and "social imperialist". This hostility complicates interactions between anti-revisionists and other Marxist movements."
 anarchist_communism:0 "Anarcho-communism"
 anarchist_communism_desc:0 "For §Yanarcho-communists§!, communism is a classless society without a state. They dislike the idea of ​​a transitional socialist state, and advocate a society based on voluntary ties and mutual aid."
 primitive_communism:0 "Agrarian Socialism"
 primitive_communism_desc:0 "§YAgrarian Socialism§! advocates the construction of a peaceful, traditional, rural society, where property is collectively owned by all villagers and all important decisions are made by peasant councils. Certain forms of agrarian socialism may also emerge in less developed societies."
 oligarchical_collectivism:0 "Oligarchic Collectivism"
 oligarchical_collectivism_desc:0 "The political theory of §Yoligarchy Collectivism§! was developed by the Socialist Party of the New Mareland, also known as MARESOC. This ideology seeks to realize communist ideals by placing the means of production in the hands of a select group of bureaucrats who manage them on behalf of the people. This bureaucracy is a rigid hierarchical and meritocratic structure, in which deviation from the ideology of the party is not tolerated. In oligarchic collectivism, there is no concept of past or future, there is only the present, and all social achievements are based solely on adherence to the purity of the ideas of the party. The only goal of oligarchic collectivism is power."
 equalism:0 "Equalism"
 equalism_desc:0 "Based on the original ideas of Starlight Glimmer, §Yequalism§! seeks to reform society by reducing everyone to a single value. When society is the same for everyone, then it will find itself in a true utopia. After all, you won't have nightmares if you never dream."
 rozenkampism:0 "Rosenkampism"
 rozenkampism_desc:0 "A radical populist, anti-capitalist and nationalist ideology. §YRosenkampism§! seeks to create a strong, all-encompassing state to achieve national revolution and eliminate both the capitalist bourgeoisie and any foreign elements that dilute the "purity" of the nation and its people."
 democratic_socialism:0 "Democratic Socialism"
 democratic_socialism_desc:0 "§YDemocratic Socialism§! is a left-wing ideology that seeks to preserve democratic institutions while abolishing private property, as it believes capitalism is incompatible with true freedom and equality."
 syndicalism:0 "Syndicalism"
 syndicalism_desc:0 "§YSyndicalism§! is a left-wing ideology that advocates self-organization by local workers and the advancement of socialism through strikes. Their ultimate goal is to replace the central state with a "federation" of trade unions and other social organizations. It is distinct from Marxism, and often battles with it for dominance on the left. Where Marxism tends to see a strong state as necessary to advance workers' interests, syndicalism sees it as another form of tyranny, and argues that any significant change must come through direct popular action."
 socialist_monarchism:0 "Socialist Monarchism"
 socialist_monarchism_desc:0 "§YSocialist Monarchism§! is a strange system that combines a socialist economy with a hereditary head of state such as emperor, king, or queen. Many more orthodox Marxists condemn such states and do not consider them to be truly socialist, pointing to the conservative and inegalitarian nature of the monarchy, as well as the fact that most of these states arose as a result of reforms rather than revolution."
 religious_socialism:0 "Religious Socialism"
 religious_socialism_desc:0 "§YTheocratic Socialism§! is based on religious values. It views capitalism as idolatry and a sin that contradicts the teachings of religious leaders. According to proponents of this ideology, the gods wanted all living beings to be equal and not to oppress each other."
 juche:0 "Ultratyrannical Socialism"
 juche_desc:0 "The ideology of §Yultratyrannical Socialism§! is the belief that the masses cannot regulate themselves, but must be ruled by a "Great Leader" who is the inspiration of the working class. The Great Leader is flawless and never makes mistakes, is always benevolent, and always rules the masses wisely. The army is the greatest of all institutions, ruled by the Great Leader."
 dengism:0 "Pragmasocialism"
 dengism_desc:0 "§YPragmasocialism§! describes the construction of "developing socialism" - socialism that is only developing and not ready for final construction. Pragmasocialism puts pragmatism above all else and considers an open market economy vital for modernization and economic growth, while maintaining the primacy of the ruling party. Its opponents call this ideology a blatant form of state capitalism and are confident that pragmasocialism cannot be considered true socialism."
 
 nazism:0 "Autocracy"
 nazism_desc:0 "In an §Yautocracy§!, one individual (often a monarch) wields absolute power. An autocratic state often has great success in suppressing dissident and rebellious ideas. Autocrats typically seek to increase their personal power and wealth through expansionist policies."
 falangism:0 "Authoritarian Theocracy"
 falangism_desc:0 "The head of state is a member of the clergy or a proclaimed god. An §YAuthoritarian Theocracy§! uses faith to unite the nation, and the leader's word is law."
 fascism_ideology:0 "Fascism"
 fascism_ideology_desc:0 "§YFascism§! originally originated in Wingbardy. This ideology is based on the ideas of loyalty to the state and the unification of the people under a strong leader. Fascism emphasizes nationalism, militarism, and expansionism. Economically, this ideology usually advocates corporatism and state intervention."
 rexism:0 "Rexism"
 rexism_desc:0 "The ideology of §YRexism§! advocates monarchical values, the integration of religious elements into society, and national renewal. This ideology is strongly opposed to liberalism and socialism, and combines elements of monarchism, theocracy, and nationalism."
 bandit:0 "Kleptocracy"
 bandit_desc:0 "§YKleptocracy§! is a government of crooks and thieves, where corrupt leaders use their power to exploit the citizens and natural resources of the nation to increase their personal wealth, power, and reputation. This form of government is typical of failed states whose economies are based entirely on plunder, pillage, and robbery."
 magocracy:0 "Tyrannical Magocracy"
 magocracy_desc:0 "§YMagocracy§! is a government of spellcasters, often unicorns. In this regime, magical talent is the most valuable asset. A peasant with magical ability can quickly become a member of the upper class of society, while those less talented must serve those better than them. In a tyrannical magocracy, powerful sorcerers lead the government, and magical research is more important than the well-being of the people of the nation."
 plutocracy:0 "Plutocracy"
 plutocracy_desc:0 "§YPlutocracy§!, or rule by the rich, is rarely considered an ideology in its own right. While the previous governing institutions of a given country (whether hereditary succession, democratic elections, or other variations) may remain, they are carefully co-opted to ensure that the wealthiest ruling class of society retains power."
 reformisten:0 "Reformism" #Needs to be a separate subideology for the unique subideology icon
 reformisten_desc:0 "The Reformist ideology is a young movement, born on the griffon frontier. While its precise dogma, philosophy, and mythology vary widely and vary greatly depending on individual leaders, they are united by a fanatical belief in the greatness of the griffon race, an absolute hostility to the independent pony nations of the griffon continent, and a need to enforce their ideas through the most brutal military means possible."
 kratokracy:0 "Kratokracy"
 kratokracy_desc:0 "In a kratokracy government, the strongest rule directly. The ruler who has gained power, whether through alliance, force, threat, or cunning, is considered the strongest in the land, and maintains his power through a combination of respect and fear. This form of government is usually found only in primitive, savage, or lawless lands. Or in those where society has recently collapsed."
 stratocracy:0 "Stratocracy"
 stratocracy_desc:0 "The term "§Ystratocracy§!" covers military juntas, military republics, and military dictatorships. In this form of government, generals and admirals are the rulers and administrators. If elections are held in such a society, only soldiers and veterans may vote. Peace is seen as a sign of weakness, and war is a glorious cause in which citizens are proud to take part."
 ultranationalism:0 "Ultranationalism"
 ultranationalism_desc:0 "§YUltranationalism§! believes that the nation itself is the highest good, taking nationalist ideas to extremes. Unlike fascism, this ideology is not always authoritarian, as the nation is above all else, even the leader of the state or the gods. Ultranationalists believe that their nation is superior to all others, and treat foreigners with disdain."
 corporatocracy:0 "Corporatocracy"
 corporatocracy_desc:0 "Under a §Ycorporatocracy§!, the state itself is merely an extension of industry and big business. Laws are passed to protect monopolies and punish strikes, and any regulatory ministries are effectively incapable of making independent decisions. Bankruptcy under such a regime can be replaced by debt slavery, and any crimes against corporations are punished quickly and harshly."
 maarite_minion:0 "The Cult of Maar"
 maarite_minion_desc:0 "Maar, the griffin god of murder, cruelty, and evil, is rarely worshiped. However, in this state, worship of the dark god is mandatory. Occultism, blood sacrifice, necromancy, and even demonology are considered glorious deeds. Orthodox ideas are heresy. Death is life. Evil is good."
 undead_horde:0 "Necrocracy"
 undead_horde_desc:0 "In a §Ynecrocracy§!, the dead are at the helm of the state. Ghouls and other intelligent undead make up the bulk of the citizenry, and employ mindless armies of zombies and skeletons. The few living citizens are necromancers, and most of them eventually become immortal. The rulers of a necrocracy are powerful liches or vampire ladies (lords)."
 national_communism:0 "National Communism"
 national_communism_desc:0 "An unusual ideology that considers itself a variant of communism is a radically expansionist and totalitarian movement that also creates a cult of personality. The leader of the nation is omnipotent and all-good, and the state exists to help the leader in his brilliant goals. The nation is obliged to free all other peoples of the world from the shackles of capitalism, and there is no greater honor than to die for the nation and its leader."
 holy_order_f:0 "Zealous Knightly Order"
 holy_order_f_desc:0 "This knightly order follows a fundamental religious or martial code, which it refers to when making decisions. The state is ruled by a military order that observes sacred rituals and customs. In pursuit of the code, the leadership of the order is willing to go to extreme measures, and insufficiently loyal members are subject to ruthless purges."
 neofeudalism:0 "Neofeudalism"
 neofeudalism_desc:0 "§YFeudalism§! was once a very common political system in many countries, but as societies progressed and the industrial age arrived, it began to become a forgotten relic of the past. Neofeudalism demands a radical return to traditional hierarchies, in which the nobility owned all the land in the country, and the peasants were tied to that land. Factory workers were no better off than the peasants, since they were also tied to the factories they worked in. Peasants and urban workers had few rights and were little more than slaves. At any time, the nobility could call upon the peasants and workers to work, or mobilize them for their own purposes. Neofeudalism recognizes the usefulness of modern society, such as factories and science, but does not allow them to destroy the old hierarchies that it considers necessary for its existence."
 esotericism:0 "Esoterism"
 esotericism_desc:0 "While most authoritarian governments seek power primarily for its own sake, the same cannot be said of esoteric authoritarians. This ideology is not a specific political movement; it is a classification of governments that wish to establish a national cult in their country. They are fanatically loyal to a set of mystical and perhaps even insane ideals. Their views are so radical that it is difficult to imagine how such beings managed to come to power in the first place."
 surveillance_state:0 "Surveillance State"
 surveillance_state_desc:0 "While nearly all supremacist regimes monitor their populations, surveillance states take surveillance to new heights. They seek to catalog every personal relationship, every business transaction, and ultimately every thought of their subjects in order to maximize efficiency and preempt threats. The paranoia of leaders quickly spreads to all levels of society, since anyone can be an informant. But is it really paranoia if you're actually being watched?"
 celestial_cult:0 "Celestial Cult"
 celestial_cult_desc:0 "For a thousand years, the immortal alicorns ruled Equestria. With their magic, wisdom, and incredible experience accumulated over thousands of years, they ensured harmony in Equestria and allowed the little ponies to live freely, ignoring the dangers of the world. However, this also increased Equestria's dependence on the princesses. After their disappearance, Equestria was left without leadership. But some still believe that the princesses are out there somewhere, and that one day they will return and boldly lead Equestria forward. All these rumors, theories, hypotheses, and misconceptions have fallen upon the new princess of Equestria, and now the Celestia Regent, Twilight Sparkle. \n\nThe former home of the ponies, the birthplace of the magic of friendship, has become something else entirely. Now it is held together by fear, nostalgia, and a fierce hatred for all potential enemies Celestia and her little ponies. The Celestia cult's sole purpose is to hasten the return of the alicorns to Equestria. To this end, the regent and her followers are willing to mobilize all of Equestria's resources to hasten Celestia's return. They hope that the princess will return once the regent and her ponies have learned enough lessons in friendship to prove themselves worthy of her favor.\n\nThe Celestia cult's followers are willing to systematically eliminate any opposition to their vision of Equestria in general and Celestia in particular. They also force friendship on everyone and build grandiose monuments to "friendship," "harmony," or Celestia. Their system of surveillance and brutal punishment is inspired by, if not copied from, a very marginal group in New Mareland.\n\nHowever, the long-term stability of this regime is unclear. With each day that passes without Celestia's return, the cult, its followers, and even Celestia herself The regent is becoming increasingly desperate. They fear that very soon there will be no Equestria to which Celestia can return."
 
 despotism:0 "Despotism"
 despotism_desc:0 "§YDespotism§! is an ancient form of government in which all absolute power is wielded by a single individual, usually a hereditary monarch. However, the ruler's policies are usually moderate and conservative, as the leader seeks to maintain the status quo."
 oligarchism:0 "Oligarchy"
 oligarchism_desc:0 "§YOligarchy§! is a form of government in which absolute power is wielded by a small group of privileged individuals, such as aristocrats, merchants, or chieftains. They care for little other than maintaining their own power and prestige."
 centrism:0 "Centrism"
 centrism_desc:1 "Centrists avoid both the political extremes of the left and right, promoting moderate and pragmatic reforms aimed at compromise. While centrists are often found in republics, they are also common in constitutional monarchies."
 anarchism:0 "Anarchism"
 anarchism_desc:0 "§YAnarchism§! is a rejection of all authority. It advocates the division of society into self-governing collectives instead of a single centralized state."
 technocracy:0 "Technocracy"
 technocracy_desc:0 "§YTechnocracy§! is a system of government in which decision makers are selected based on their expertise, preferably scientific or technical. While this is the opposite of democracy, it does not necessarily mean the elimination of elected representatives. But leaders are judged by their expertise, not their political affiliation. A technocratic government attempts to use the scientific method to solve social problems, and uses logic and calculation to find the most rational solution to any problem based on the information available."
 libertarianism:0 "Libertarianism"
 libertarianism_desc:0 "The ideology of §Ylibertarianism§! advocates freedom above all else. They typically oppose government authority and restrictions on freedom. Libertarian capitalism, unlike socialist libertarianism, supports the free market and defends private property rights. Libertarians' tolerance of government ranges from anarchism to minarchism. They typically oppose any government social programs or intervention in the economy."
 tribal_council:0 "Tribal Council"
 tribal_council_desc:0 "In this form of government, leaders are elected and determined by a council made up of the chiefs of the various tribes. Leaders are not elected by the people, but by the chiefs, and remain in power until new elections are called. Tribes often wish to be left alone, but circumstances may force them to interact with the outside world."
 republicanism:0 "Republicanism" #We needed a generic Neutrality Republic sub-ideology
 republicanism_desc:0 "§YRepublicanism§! encompasses a broad range of ideologies that argue that the people, not a king or queen, should rule. This ideology holds that the only legitimate government is one elected by the people, and is vehemently opposed to monarchies and feudalism. Republican government is based on political parties, and employs a system of checks and balances to prevent excessive radicalism."
 populism:0 "Populism"
 populism_desc:0 "§YPopulism§! broadly describes ideals that praise the people and criticize the elite. There are both left-wing populism and right-wing populism, which differ primarily in economic policy. Most populist governments have at least some support from the lower class, and failures are usually attributed to sabotage by "others" or "the elite."
 holy_order_n:0 "Knightly Order"
 holy_order_n_desc:0 "This knightly order follows a fundamental religious or military code, which it refers to when making decisions. The state is governed by a military order that observes sacred rituals and customs. The policies of such an order are very moderate, and change is approached carefully and gradually."
 theocracy_subideology:0 "Theocracy"
 theocracy_subideology_desc:0 "In a §Ytheocracy§!, the nation is led by priests or shamans who attempt to preserve their traditions in a changing world. Their politics are moderate, as they believe that the only way to preserve their faith is to avoid radical change. Some theocracies may have a nominal secular leader (often a monarch), but all real power rests with the clergy."
 conservative_liberalism:0 "Conservative Liberalism"
 conservative_liberalism_desc:0 "Conservative Liberalism combines liberal political values ​​such as strong constitutional government and equality before the law with conservative views on social and ethical issues."
 khakistocracy:0 "Military Government"
 khakistocracy_desc:0 "Such a state is ruled by an authoritarian government, where political power is vested in the armed forces. These countries are usually led by a dictator with complete control over the army, or by a dictatorship of top generals or admirals - a military junta. Such states are often described as "an army with a state". A state previously under civilian rule may first acquire such features after a military coup, and then turn into a full-fledged stratocracy."