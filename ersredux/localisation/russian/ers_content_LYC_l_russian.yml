 ##### CHARACTERS

 POLITICS_AURANTIA_DESC:0 ""Я клянусь, что мы истребим их всех. Как зачем? Это наш священный долг. Эти бюрократы могут говорить что угодно, но я уверена в своей правоте. Я делаю то, что правильно."\n\nСреди остальных королев ульев Ауранция является самой младшей, но достаточно взрослой, чтобы успеть стать свидетельницей жестокого нападения оленийских викингов на земли Ликтиды несколько поколений назад.\n\nОна росла как довольно мягкая и многообещающая наследница трона Ликтиды, кто-то даже говорил о том, что Ауранция симпатизирует иностранным идеям гармонии. Но вторжение оленей перевернуло её представление об этом мире. Кому-то это покажется преувеличением, но Ауранция определённо видела то, чего не видели другие.\n\nДа, она не сомневается - каждый олень должен заплатить за преступления своих предков. Тем более, с тех пор олени не были наказаны судьбой - они не вымерли от голода, не страдали от ужасающих болезней. А это противоречит принципу справедливости - весь народ Олении должен быть наказан. Тем более, наверняка рогатые существа до сих пор таят ненависть к чейнджлингам, особенно к жителям Ликтиды. С такой мыслью Ауранция просыпается каждое утро и засыпает с надеждами о том, что в один прекрасный день она сможет осуществить проект "Экстерминационной зоны Олении", чтобы обеспечить справедливость.\n\n"...если честно, всё остальное не имеет значения для меня.""
 LYC_normie_aurantia_desc:0 ""Кажется, я сделала всё, что было в моих силах. Теперь я могу увидеть чистый мир, в котором звёзды сияют ярче прежнего.""
 
