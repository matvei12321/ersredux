 #### EVENTS
 
 lyc.1.t:0 "Тихий улей"
 lyc.1.d:0 "В Ликтиде туристы - это большая редкость. Тем более, иностранные. Но иногда в эти мрачные земли по разным причинам прибывают и чейнджлинги из других ульев. Например, в Ликтиду недавно приехел Вернер - весалиполианец, чтобы встретиться со своим старым товарищем Иксидором - ликтидианцем. Встретившись, они начали дружескую беседу, и, недолго погодя, решили отпраздновать встречу в местном баре. Заказав по кружке ликтидианского пива, двое чейнджлингов заняли свободный столик.\n\n- До сих пор не верится, что мы наконец встретились, Иксидор. Приятно повстречать старого приятеля!\n\n- Это точно. Да.\n\nКак всегда, он был немногословен. Впрочем, как и все остальные посетители бара. Вернер слышал, что чейнджлинги Ликтиды молчаливы и суровы, но даже в простой пивнушке все ликтидианцы были хмурые и необщительные, из-за чего создавалась неестественная тишина, прерывающаяся звуками стаканов и льющегося пива.\n\n- Ну вы даёте. Я знаю, что Ликтиду называют "Тихим ульем", но не настолько же! Ну серьёзно, почему тут все такие молчаливые?\n\n"Дело в том, что через несколько месяцев половина семей этих чейнджлингов больше не увидит своих отцов. И они знают об этом", так ответил бы Иксидор. Но с учётом того, что его бы услышали все ликтидианцы рядом, он ответил, что расскажет обо всём позже."
 lyc.1.a:0 ""
 
 lyc.2.t:0 "Отчёт об изничтожении"
 lyc.2.d:0 "ОТЧЁТ ПО ИСТРЕБЛЕНИЮ ОЛЕНЕЙ В РЕГИОНЕ №302\n\nУничтожено около 85% населения региона. По имеющимся данным, несколько оленей сбежали в ходе проведения очистки, а некоторые олени скрылись от отрядов уничтожения. Требуется проведение дополнительных операций для полной зачистки региона.\n\nХайль Ауранция!"
 lyc.2.a:0 "Принято."
 
 lyc.3.t:0 "Союз с сепаратистами?"
 lyc.3.d:0 "Агенты королевы Аргиннис узнали и сообщили ей о том, что мы готовим независимую военную кампанию против оленей и что мы не заинтересованы в подчинении Кризалис. Аргиннис предлагает, чтобы мы присоединились к их пакту, когда Вракс начнёт восстание против власти Кризалис. Это даст нам дополнительного мощного союзника для победы над оленийцами. Но хотим ли мы сотруднисать с королевой Улья Войны?"
 lyc.3.a:0 "Только если они не будут претендовать на земли Олении!"
 lyc.3.b:0 "Мы удем вовать одни. Это будет НАША месть."
 
 lyc.4.t:0 "Дневник Ауранции, [GetDateText]"
 lyc.4.d:0 ""Я королева Ауранция, и я ненавижу оленийцев.\n\nСегодня из экстерминационной зоны по моему приказу в Ликтиду привезли оленийца. Наконец-то я смогла увидеть современного оленя со времён вторжения. Я решила начать его изучение, ведь я одна могу узнать об оленях больше, чем все учёные Сорифа вместе взятые.\n\nКак только его занесли в обездвиженном устройстве, я увидела страх в его глазах. Современный олениец труслив. Внешность современного оленийца крайне непривлекательна.\n\nОн умолял дать ему еды. Современный олениец жаден и прожорлив.\n\nЯ приказала нанести ему десять ударов плетью. Современный олениец слаб и не вынослив. Кровь современного оленийца грязна и долго отстирывается.\n\nЯ спросила у него, чувствует ли он вину за то, что натворили его предки. Современный олениец эгоистичен. У современного оленийца нет чувства вины и чувства справедливости.\n\nГенерал Вернекс сказал мне, что этот олениец участвовал в генетических экспериментах - ему в принципе осталось жить меньше месяца. Мне нравится генерал Вернекс. К слову, этот чейнджлинг является довольно способным генералом моей армии. Я бы даже сказала, что он - лучший из лучших. Я произвела финальные испытания на рогатом зверёныше."
 lyc.4.a:0 "Череп оленийца не выдерживает попадения пули.""
 
 lyc.6.t:0 "Тотальная война"
 lyc.6.d:0 "- Итак, Ауранция, королева Ликтиды, каковы ваши требования к нашим армиям в период военных действий?\n\nЭтот чейнджлинг должен был записать каждое пожелание Ауранции насчёт военной доктрины. Военный штаб начинает реформы, и, конечно, мнение королевы должно учитываться.\n\n- Пусть уничтожают всех, - холодно ответила Ауранция.\n\n- Простите... Что?\n\n- Всё верно. Пусть не щадят никого. Больше никаких опытов над рогатыми тушами. Никакой эксплуатации. Они не заслуживают даже такой жизни.\n\n- Простите, но что насчёт стратегии по отношению к другим странам? Мы же не будем сосредотачивать все усилия нашей армии на одних только оленийцах, да?\n\n- Кто тебе так сказал?!\n\nВ этот момент чейнджлинг понял, что не стоило уводить вопрос в эту сторону. Ауранция теперь казалась разъярённой, и почти после каждого слова она била копытом по столу своего кабинета.\n\n- Наша армия создана ДЛЯ ТОГО, чтобы уничтожать оленей! Чтобы очищать земли от их заразы, и плевать на другие унтер-виды! Пегасы? Эти дикари навечно застряли в племенных веках, так пусть они режут друг друга! А земные пони? Единороги? ОНИ МЕНЯ НЕ ИНТЕРЕСУЮТ! Мы должны действовать так, будто в мире существуем только мы и оленийцы. Мы и оленийцы! И в ходе нашей капании должны остаться только МЫ! Мы, словно боги, должны направить молнии чистой ярости на каждого оленийца! Ни один рогатый уродец не должен ходить по континенту, они все должны быть преданы огню нашего ХАЙЛИГЕР КРИГА!\n\n- Т-так точно, я вас понял. Так и передам верховному командованию!\n\nЧейнджлинг уже не спросил разрешения на выход - он вылетел из кабинета пулей.\n\nАуранция вновь осталась наедине. В ходе своей речи она создала совершенный беспорядок на своём рабочем месте. Все документы и папки оказались перемешаны, или же сбиты на пол. Королева тяжело вздохнула."
 lyc.6.a:0 ""Какая досада.""
 
 lyc.7.t:0 "Тотальная война"
 lyc.7.d:0 "- Мы уверены, что оленийцы обладают почти такими же слабыми местами, что и чейнджлинги. Ранение в бок может оставить их в живых, но попадение в голову практически гарантирует мнгновенную смерть. Вопреки распространённому стереотипу, рога не являются слабым местом оленийцев - их потеря почти не снижает их жизнеспособности...\n\nТакой инструктаж проводили почти в каждом военном пункте Ликтиды. Взрослых и младших чейнджлингов обучали наиболее эффективному способу уничтожения оленя, а также прививали чувство ненависти к врагу. И, кажется, последний пункт чейнджлингами Тихого Улья был освоен уже давно: предки передавали истории об ужасающих рогатых налётчиках из поколения в поколение.\n\nНо теперь истории стали более жестокими, а призывы к физическому уничтожению оленийцев звучат всё чаще. Это гарантирует, что когда наи солдаты ступят на земли Олении, они не будут щадить никого. Именно такой принцип предусматривала новая военная доктрина Ликтиды."
 lyc.7.a:0 "Ради успешного Хайлигер Крига!"
 
 lyc.8.t:0 "Дневник Ауранции, [GetDateText]"
 lyc.8.d:0 ""Я королева Ауранция, и я ненавижу оленийцев.\n\nПочему они имеют дерзость ходить по этой планете? Я не понимаю. Сегодня я долго размышляла об этом. Недавно я (являясь самым образованным чейнджлингом Гегемонии) решила изучить мифологию оленей, и узнала, что у них есть свои языческие боги - Укко и Пеллерво. И я поняла, что именно они являются одной из основных причин выживания оленийцев. Ведь справедливость уже давно должна была свершиться, но всё же... Да, эти жалкие божки оберегают оленийцев от вымирания. Именно благодаря им ни один олень ещё не постиг настоящей кары. Их боги вряд ли планируют исчезнуть в скором времени, ровно как и вряд ли смертный захочет от них избавиться. Это значит, что я, руководствуясь чистым помыслом, должна уничтожить этих богов. Мне придётся обратиться к эзотерикам из Сорифа для получения определённых навыков. Как только я стану равной среди величайших воинов Вальгаалы, я смогу сразить оленийских божков в великом поединке сил добра и зла, и над Ликтидой взойдёт солнце победы и процветания, а на Олению упадут тысячи смертоносных звёзд."
 lyc.8.a:0 "Нужно только уничтожить их.""
 
 lyc.9.t:0 "Превосходство оружия"
 lyc.9.d:0 "На секретном полигоне Ликтиды целый день были слышны выстрелы. Разные выстрелы: из винтовок, пулемётов, пистолетов. На протяжении всего дня за действиями внимательно наблюдала сама королева Тихого Улья.\n\n- Как мне это нравится. Я могла бы смотреть на это целыми днями.\n\n- Значит, вы довольны сегодняшними военными учениями, королева Ауранция?\n\n- Учения? Они меня интересуют в малой степени. Я знаю, что чейнджлинг сможет победить оленийца. Я здесь ради звучания. Эти выстрелы пушек... Настоящая симфония для ушей!\n\n- ...как скажете, Королева. Но через полчаса начнутся лётные испытания бомбардировщиков, и поэтому вам следует уйти с поля подальше.\n\n- Зачем? Я хочу слышать то, что услышат оленийцы, когда наши эскадроны и воздушные армады пересекут границы.\n\n- Дело в том, что мы испытаем бомбардировщики... с нестандартным вооружением. И от такого "вооружения" не могут спасти самые совершенные противогазы. Это смесь химическх элемментов, которые обладают некоторыми разъедающими свойствами кислоты. Радиус поражения досконально неизвестен, поэтому вам лучше отправиться в свою резиденцию."
 lyc.9.a:0 "Надежды для оленийцев нет. Королева довольна."
 lyc.9.b:0 "Я предпочту остаться на безопасном расстоянии и наблюдать за испытаниями."
 
 lyc.10.t:0 "Белая кобыла"
 lyc.10.d:0 "Ауранция была взаолнована. Она увидит настоящие орудия смерти. К сожалению, ей и её свите пришлось отъехать от полигона на некоторое расстояние, но они остались достаточно близко, чтобы лицезреть испытания. Никто из сопровождащих Ауранции не осмелился возразить против её решения остаться. Как только самолёты начали взлетать, Ауранция восхищённо наблюдала за ними. Ветер, дующий в их сторону, развевал её гриву.\n\n- Джаггернаут, это Ольфланд, как слышно? Приём.\n- Ольфанд, это Джаггернаут. Сбрасываю бомбы. Приём.\n- Ольфланд сбрасывает бомбы, приём.\n\nБомбы со свистом падали на землю. Когда они коснулись земли, образовалось бледно-зелёное облако. На полигоне специально оставили несколько оленийцев, чтобы проверить мощность оружия. В бинокль Ауранция увидела, что оленийцы пали замертво почти мнгновенно. Неудивитильно - они находились в эпицентре химического взрыва. Жаль, что она не могла слышать их криков, думала Ауранция, когда увидела, что облако не останавливается на полигоне. Ветер начал дуть сильнее. Последнее, что Ауранция помнила - отчаянные крики свиты и оправдания командира, что на таком расстоянии газ не должен был до них добраться."
 lyc.10.a:0 "Так, Ликтида погрузилась в хаос."
 
 lyc.11.t.:0 "Дневник Ауранции, [GetDateText]"
 lyc.11.d:0 ""Я королева Ауранция, и я ненавижу оленийцев.\n\nГенерал Вернекс сообщил мне прекрасные новости. Мне нравилось слышать его голос, когда он сказал "Моя королева, спешу сообщить, что на полях сражений нашими солдатами была уничтожена минимум сотня тысяч оленийцев". Наконец-то, это свершается. СПРАВЕДЛИВОСТЬ ТОРЖЕСТВУЕТ. Я думаю, что Вернекс заслуживает повышения. Он всегда приносит такие хорошие новости. Надеюсь, что однажды вместе с хорошими новостями он принесёт череп лидера государства оленийцев. Я создам из черепа оленийца изысканную чашу и буду пить лучшие напитки, пока вся память об оленийцах будет стираться из этого пространства."
 lyc.11.a:0 ""Заметка: не забыть похвалить Вернекса за хорошие новости.""
 
 lyc.16.t:0 "Идеальный момент для нас"
 lyc.16.d:0 "- Нет, я приказываю напасть на них сейчас! ОНИ ВПАЛИ В ГРАЖДАНСКУЮ ВОЙНУ, ДАВАЙТЕ УНИЧТОЖИМ ИХ! СМЕТЁМ ИХ СВОЕЙ ВОЛНОЙ!\n\n- Королева Ауранция, при всём нашем уважении, военное командование НЕ МОЖЕТ в данный момент осуществить вторжение. Даже если мы вмешаемся в их войну, то останется одна из сторон, у которой даже после войны будет армия большего размера, чем у нас! Тем более, мы всё ещё зависим от Кризалис. Она явно не планировала такого нападения в ближайшее время. Мы просто рекомендуем вам дать нашей промышленности время на милитаризацию. Королева?..\n\nКажется, они убедили Ауранцию. Но это ей явно не понравилось. По непонятной причине она почувствовала себя беспомощной и жалкой, и что генералы будто отчитали её за безрассудность. Покинув своих генералов, Ауранция долго записывала что-то в своём дневнике и заперлась в своём кабинете на несколько часов.\n\nПотом она, как ни в чём не бывало, продолжила обычнй темп своего правления. Но некоторые генералы серъёзно забеспокоились о безопасности своих шкур, ведь до этого ещё никто не осмеливался говорить что-то в противовес Ауранции."
 lyc.16.a:0 "Момент упущен, чтобы напасть с большей силой."
 
 lyc.17.t:0 "Дневник Ауранции, [GetDateText]"
 lyc.17.d:0 ""Я королева Ауранция, и я ненавижу оленийцев.\n\nЭто свершилось. Оленийцы сложили оружие. Они разгромлены. Они побеждены. Они проиграли бой. Грязные животные ГРЯЗНЫЕ ЗВЕРИ\nОх, новость об их поражении будоражит мой разум. Меня посещают разные мысли, даже в какой-то степени пошлые. Уже третий день подряд я не могу уснуть от волнения и ликования. Но сейчас не время для этого. Настоящее светлое будущее наступит тогда, когда последняя самка оленийской расы будет уничтожена. Это будет означать начало бесповоротного вымирания оленей. Я должна сказать генералам, кто является приоритетом. Оленийки-самки, особенно беременные, и жеребята. Самцы-оленийцы не смогут ничего сделать... Они не смогут воспроизвести потомство и вскоре вымрут.\n\nХотя моя армия всё равно расстреливает всех подряд - и от этого эффективность очищения мира от оленей ничуть не снижается. Просто мне нравится мысль о том, что я могу повлиять на их неизбежный конец.\n\nСкоро я поменяю чернила. Я буду вести свой дневник... кровью оленийцев."
 lyc.17.a:0 "Я слышу их крики в своей голове."
 
 lyc.19.t:0 "КОРОЛЕВЕ АУРАНЦИИ"
 lyc.19.d:0 "Это фон Кригер. Я отправляюсь в Олению. Я уничтожу каждого оленийца, который встретится на моём пути. Но чтобы уничтожить их ещё эффективнее, мне нужна власть. Одобрите мой запрос на присвоение мне должности уберфюрера Экстерминационной Зоны, и тогда уже завтра мы с помощью газа вытравим всех, кто прячется в подвалах и убежищах."
 lyc.19.a:0 "Одобрено."
 lyc.19.b:0 ""Добро пожаловать в Ад, новобранец.""
 
 lyc.20.t:0 "Подготовка к обучению"
 lyc.20.d:0 "Ауранция была решительна в вопросе обучения тактикам эзотерических битв. Она подготовила для экспедиции всё: древние ритуальные ножи, одурманивающие травы, достала зубы, волосы и прочие части тел оленийцев, а также взяла с собой древние языческие руны и несколько пачек первитина. Во время поездки она передвигалась с генералом Вернексом на самом обычном автомобиле, чтобы в других ульях не пошли слухи о том, что Ауранция покинула Ликтиду. Наконец, добравшись до границ Сорифа, автомобиль миновал тёплые зоны у берегов Ключ-Озера и добрался заснеженных пещер, у которых горели костры.\n\n- Мы прибыли, Ваше Величество. Кажется, это пещеры сорифских неоязыческих шаманов.\n\nДаже несмотря на то, что Ауранция надела тёплый пуховик (естественно, из шкуры оленя), она чувствовала, что вот-вот промёрзнет насквозь. Но она понимала, что это её первое испытание. Чёртов мороз не может быть серьёзным препятствием.\n\nАуранция быстро ввела шаманов, живущих в этих пещерах, в курс дела. Они ответили, что это может быть опасное дело, ведь языческие боги оленей - опасные соперники, и плохо подготовленный воин может не пережить встречу с ними.\n\n- ТОГДА СДЕЛАЙТЕ ИЗ МЕНЯ ПОДГОТОВЛЕННОГО ВОИНА!\n\nШаманы тихо переговорились между собой и согласились начать её обучение.\n\nПервый навык, который она должна освоить - вхождение в астральный мир. Для этого потребуется поджечь приличное количество одурманивающих трав..."
 lyc.20.a:0 "Ничто не встанет у неё на пути."
 LYC_aurantia_goes_to_soryth_tt:0 "§YАуранция будет обучаться в холодных землях Сорифа.§!"
 
 lyc.21.t:0 "Последнее испытание"
 lyc.21.d:0 "В течение семи дней Ауранция должна была готовиться к сражению с Укко и Пеллерво - грязными, чудовищными божествами, оберегающими оленей. Все эти семь дней ей было воспрещено спать, есть и отдыхать. "Чтобы сразить двух богов в одной битве - нужно тренировать выносливость тела и духа", так говорил верховный шаман Эрих Шиммлер. Семь дней Ауранция без перерыва вдыхала одурманивающие пары и регулярно принимала первитин, чтобы улучшить свои результаты. Она уже научилась входить в полу-астрал вместе со своимим учителями, и даже смогла нанести одному смертельное ранение в ином мире. Это говорило о том, что духовная энергия Ауранции растёт.\n\n"Раньше мы никогда не видели таких результатов. Похоже, тебя оберегает сама судьба, а также твоя чистая ненависть. Запомни: сильнее любых денег и власти в этом мире ненависть. Если ты самый могущественный правитель в мире - ты всё ещё смертен, но если злость и ненависть переполняет тебя - ты уничтожишь все преграды на своём пути. Я слышал, что даже в политике рассматривается мировая ненависть, именуемая "Мировой Напряжённостью". Если эта "напряжённость" достигнет пика - в мир нахлынет ненависть столь сильная, что ничто не сможет её остановить."\n\n\nАуранция внимательно запоминала каждое слово и каждое заклинание шаманов. И вот, на седьмой день пришло время последнего испытания - вход непосредственно в Астрал, где проживают боги. Шаманы вызвали эфирные врата, через которые Ауранция прошла без особых проблем. Она попала в измерение, которое не описать словами, но богов там не было... по крайней мере, в первую минуту.\n\n- Кто ты, жалкая смертная, что смеет противостоять нам?\n\nПред Ауранцией предстали двое крупных оленей, облачённых в броню из костей и черепов. Они говорили одновременно, и оба магией держали острые оленийские оружия непонятных форм.\n\n- А я помню её, брат Пеллерво. Этот зверёныш был моей личной жертвой в один из дней вторжения. Однако, она выжила... Думаю, чтобы умереть сейчас!\n\nОленийские боги мерзко захохотали в унисон, насмехаясь над тем, насколько жалкая была королева, стоящая перед ними.\n\n-Мы уничтожим тебя, недоразвитый жук. Как и весь твой грязный народ! Викинги-олени много лет назад пытались стереть ваше грязное существование с земли, но вы дали им отпор. Сейчас всё будет наоборот. Оленийцы вновь войдут в ваши города. Они будут боготворить нас! Они будут убивать, расчленять и насиловать чейнджлингов во славу оленийской расы и станут за это святыми! Они закончат то, что должны были сделать много лет назад!\n\nПеред глазами Ауранции внось всплыл тот день. Тот самый день, когда..."
 lyc.21.a:0 "СДОХНИТЕ-"
 
 lyc.22.t:0 "Пробуждение"
 lyc.22.d:0 "- УБЛЮДКИ!\n\nАуранция очнулась в холодном поту, в Королевском лазарете Ликтиды в окружении докторов. Те с облегчением вздохнули, хотя и не ожидали такого пробуждения.\n\n- Где я? Где Укко и Пеллерво?\n\n- Ваше Величество, боюсь сообщить...\n\nАуранция лежала в медицинской кровати, подсоединённая ко всяким системам жизнеобеспечения. В следующий миг она сорвалась с постели и накинулась на ближайшего доктора.\n\n- ГДЕ ОНИ? КУДА ОНИ ДЕЛИСЬ? НАША БИТВА ДАЖЕ НЕ НАЧАЛАСЬ!\n\n- Позвольте объяснить! Кажется, что вы... каким-то образом оказались в шаманских пещерах Сорифа. Мы не думаем, что вы это помните, поэтому расскажем, что произошло. Когда шаманы начали разжигать одурманивающие травы, вы впали в бессознание вместе со всеми шаманами. Генерал Вернекс тоже был этому подвержен, но он чудом очнулся раньше остальных. По его словам, Вы лежали с текущей пеной изо рта, и он очень волновался. Вас отвезли в лазарет Сорифа, где чудом спасли жизнь, и отправили сюда..\n\nАуранция была шокирована. В ответ она ничего не сказала и лишь вышла из палаты в сопровождении Вернекса, который поддерживал её ещё ослабленное тело, помогая ей передвигаться.\n\n- Как думаете, откуда в её крови остатки первитина?\n\n- Мы не имеем никакого понятия. Кроме первитина в её крови обнаружены и иные вещества и растения, доступные только шаманам Сорифа.\n\n- Да. Очень странно. Но ведь Вернекс сказал всю правду. Зачем ему утаивать что-то?"
 lyc.22.a:0 "После этого Ауранция отходила ещё несколько дней."
 
 lyc.23.t:0 "Убивая бога"
 lyc.23.d:0 "Головная боль теперь не перестававя мучила Ауранцию. Последние три часа это была не просто боль. Тревога. Ауранцию резко охватила тревога. Животный ужас, из-за чего выражение её морды скривилось в отчаянии.\n\n- Мне... мне нужно туда. Мне нужно в Олению. - заикаясь, заявила Ауранция своим советникам, среди которых был генерал Вернекс.\n\n- Но, королева Ауранция... Без сомнения, Оления пала под натиском наших войск, но мы не думаем, что вам безопасно туда отправляться лично. Ведь партизаны, или...\n\nАуранция сорвалась с места, не дослушав какого-то нудного советника. "Мне нужно туда мне нужно туда мне нужно туда"\n\nАуранция наспех приказала снарядить конвой прямо до оленийской столицы. Всю дорогу Ауранция чувствовала, что что-то должно произойти, а когда конвой пересёк границу с Оленией, Ауранцию стошнило.\n\nНо наконец Ауранция прибыла в Хъёртланд. Это первый раз, когда она вообще бывает в оленийском городе... Она увидела горящие дома и пепелища, толпы оленийских жителей, снующих туда-сюда под дулами автоматов.\n\n- Да, они здесь. ПРИВЕДИТЕ СЮДА ВСЕХ МОЛОДЫХ ОЛЕНИЙЦЕВ! - после этой фразы Ауранция схватилась за голову, чувствуя такую боль, словно кто-то пытался вбить гвоздь в её череп.\n\nСолдаты, ничего не понимающие, начали кое-как сгонять выживший народ. Среди толпы выделялись два оленийца, которые нагло ухмылялись, глядя на Ауранцию и светились неестественной пурпурно-тёмной аурой. По крайней мере, это то, что видела Ауранция.\n\n- Я всё ещё в их мире. Хотя, нет. Ещё тогда, в пещерах, ритуал не был окончен должным образом. Я не полностью вышла из Астрала. Я частично в их мире, а частично в нашем. Поэтому я могу видеть вас, так? - сказала Ауранция озлобленным голосом, смотря на двух оленийцев. Они вновь заговорили в дьявольский унисон.\n\n- Всё верно, смертная. - Два оленийца продолжали нахально ухмыляться, будто издеваясь над ней. - Твоя боль последние несколько дней - наших копыт дело. Мы всё это время пытаемся убить тебя. Да, брат Укко, да, брат Пеллерво? И сейчас мы окончательно убъём тебя. Однако, чтобы попасть в ваш мир, мы вселились в физические тела этих оленей - и, следовательно, ужасно уязвимы. Но ты не представляешь для нас угрозы, шавка. В следующий миг ты умрёшь, а на Ликтиду хлынет божественная армия оленей-викингов!\n\nАуранция набросилась на ближайшего солдата и умудрилась отобрать его автомат. Затем онаф, крича в никуда, расстреляла двоих оленийцев, хотя, наверняка, задела других оленей из толпы.\n\nБоль прошла. Ауранция с облегчением вздохнула. Взглянув на тела, она увидела оленийскую мать и оленийскую дочь. Слёзы счастья потекли из её глаз.\n\n- Здесь мне больше делать нечего. Пока-пока.\n\nКонвой Ауранции уехал так же неожиданно, как и приехал. А солдаты всё не могли понять, почему Ауранция бормотала несвязанный бред и зачем выстрелила в молчащих мать и дочь."
 lyc.23.a:0 "..."
 
 lyc.24.t:0 "Встреча"
 lyc.24.d:0 "Убив оленийских богов, Ауранция, кошмарно уставшая, но со спокойным сердцем, вернулась в Ликтиду. Никто особо не обратил внимание на её небольшое путешествие... кроме генерала Вернекса.\n\n- Королева Ауранция! Это... это... безрассудно! Как вы могли отправиться в Олению, и даже без моего сопровождения? Это черезчур опасно, вы же могли пострадать! Не то, чтобы я претендую на роль лучшего телохранителя, но всё же...\n\nАуранция лишь улыбнулась, смотря на Вернекса.\n\n- Не против пообщаться наедине? Приходи в Тёмный Сад у Мёртвой реки. Я там буду сегодня вечером.\n\nВернекс не совсем ожидал этого. Ауранция ушла по своим делам, а генерал вслед лишь вяло отдал честь, не ожидая того, что сказала ему королева несколько мнгновений назад. Но он всё таки вернулся к исполнению своих обязанностей на сегодняшний день.\n\nВечером Вернекс прибыл в Тёмный Сад Ликтиды. Деревья здесь были не слишком густыми, и он с лёгкостью нашёл Ауранцию. Что его удивило, она сидела на прибрежной скамейке, смотря на вечернее небо, казалось, совсем без охраны. Тёплый ветер развевал её бледно-зелёную гриву.\n\n- Королева... Вы хотели что-то обсудить?\n\n- Ох, ты и в правду пришёл. Присядь со мной.\n\nНесмотря на то, что Вернекс видел множество проявлений психоза у своей королевы, даже такая обстановка его немного удивила. Но, что бы не происходило на этот раз, лучше исполнить её приказ, чем потом пожалеть. Вернекс сел на скамью. Она не была большой, и два чейнджлинга оказались в неудобно близком друг к другу положении. По крайней мере, неудобном для Вернекса.\n\n- Так... что вы хотели обсудить?\n\nАуранция таинственно хранила молчание, смотря на вечернее небо. Когда сверкнула первая звезда, она восхищённо ахнула, любуясь далёким светилом. Вернекс же в это время чувстовал себя не совсем уютно, ожидая подвоха. Ещё бы, в такой обстановке расслабляться нельзя. Похоже, с Ауранцией в любой момент может произойти что-то ужас-\n\nОна непринуждённо положила свою голову ему на плечо. Вернекс почти запаниковал, боясь сделать любое телодвижение. Он ожидал, что Ауранция начнёт что-то говорить, но она лишь пробормотала что-то невнятное про звёздное небо. Вскоре он услышал лёгкое сопение. Генерал вздохнул с облегчением."
 lyc.24.a:0 "Должно быть, она устала."
 
 lyc.25.t:0 "Серые будни после войны"
 lyc.25.d:0 "Окончание войны - долгожданное событие для каждого чейнджлинга Ликтиды. Но после войны военный пыл приутих. Всё понемногу начало возвращаться в мирное русло, и простые жители начали обращать внимание на то, насколько плохи условия проживания в Ликтиде. Во время подготовки к войне большая часть предпринимательских организаций обанкротилась, что вынудило чейнджлингов поступать в Вооружённые Силы Ликтиды. Но уже сейчас заметен спад престижа профессии военного - виден острый недостаток администраторов, бухгалтеров, продавцов, банкиров и многих других... Народ Ликтиды недоволен. И, хотя на улицах наших ульев вовсю проходят парады победы, стреляют салюты, общая атмосфера отчаяния для простого трутня кажется безысходной. Хотя, определённой части народа нравится текущее пололжение дел. Вы уже читали в газете статью о том, как в одном оленийском поселении солдаты проводили состязание по отрезанию голов?"
 lyc.25.a:0 "Ликтида всё равно никогда не была слишком жизнерадостной."
 
 lyc.26.t:0 "Мы вернулись домой"
 lyc.26.d:0 "После долгого похода, Ликтида наконец вернулась в состав Гегемонии Чейнджлингов. С тех пор, как мы вышли из неё, изменилось немало, но это всё-таки старая добрая конфедерация чейнджлингских ульев. Конечно, Верховная Королева не будет против нашего возвращения, но стоит определить, хотим ли мы быть зависимыми от Весалиполиса или же хотим автономии как полноценное государство..."
 lyc.26.a:0 "Мы хотим большой автономии..."
 lyc.26.b:0 "Пусть всё будет, как раньше."
 lyc.26.c:0 "Мы готовы подчиняться лидеру Гегемонии."
 
 lyc.27.t:0 "Протесты социал-реформистов"
 lyc.27.d:0 "Социал-реформисты - звучит как название каких-то шакалов в виде коммунистов или демократов, но в Ликтиде этим словом нарекли тех активистов, что призывают к снижению милитаризации страны. До войны они вели более-менее активные кампании, хотя и не добивались успеха. В самый разгар войны, когда народ пылал патриотизмом и работал на победу, они, казалось, исчезли... Но появились внось, когда война закончилась. Теперь эти придурки манипулируют народом, используя аргументы того, что тысячи семей лишились отцов, повысилась послевоенная безработица и начался голод в малых селениях. Это не значит, что этоих проблем нет, но эти реформисты ничем не помогают, а только радикализуют народ против власти.\n\nНо они всё ещё ликтидианцы, и официально заявляют, что не следуют идеологии коммунизма или демократии, поэтому мы не можем просто брать и расстреливать протестующих..."
 lyc.27.a:0 "Что же с нимим делать?"
 
 lyc.28.t:0 "Потеря"
 lyc.28.d:0 "В выводке семьи Апейрисов было трое чейнджлингов - мать, отец и единственный сын. В мирное время отец Зир работал инженером в престижной организации, а его жена, молодая Ария, всегда оставалась дома и возилась с сыном Таррисом, ведь по состоянию здоровья она не могла себе позволить трудиться, но она всю себя отдавала семье, а любовью, которую она дарила мужу, она могла бы прокормить целый Весалиполис, если бы была пони. К несчастью, в начале войны Зира призвали на фронт в качестве военного техника, и оставшимся дома жене с сыном всячески помогали соседи. Апейрисы ждали писем с фронта, но дождались лишь почтальона, который принёс горе в их дом.\n\n"Господин Зир доблестно погиб на поле боя. Их отряд ремонтировал шасси танка, когда оленийцы застали их врасплох."\n\nАрия решила не говорить об этом Таррису, ведь ему всего пять лет - не стоит его травмировать. Но с того момента в Арии угасля тяга к жизни, её позитив и жизнерадостность улетели куда-то далеко. Соседи, узнав об этом, решили продолжить помощь Арии, но она, почему-то, отказалась от этого. С тех пор прошли дни, недели и месяцы. Но в один момент к ней обратился знакомый чейнджлинг по имени Сварес. Он был ликтидианцем, но по состоянию здоровья не был годен к службе.\n\n– Слушай, Ария... Может, тебе начать всё с начала? Жизнь на этом не заканчивается. Я могу помогать вашей семье, могу присматривать за Таррисом. К тому же, я всё ещё не был в браке...\n\nАрия посмотрела на этого самоуверенного чейнджлинга. Она ответила отрицательным кивком и вернулась в дом, в котором её ждал беспорядок, на уборку которого у неё не было сил, как и желания.\n\n- Начать с начала...\n\nВнезапно, что-то щёлкнуло в её голове. Зрачки расширились, а разум заполнили мысли, известные и понятные ей одной. Она суетилась и искала тёплую одежду для сына и её самой среди хлама, раскиданного по квартире.\n\n- Сынок! Собирайся, мы идём в поход.\n\nОни жили в одном из селений региона Апсихоса, и рядом простирались высокие и крутые горы. На одну из них было несложно подняться туристам, что и сделали Ария с сыном. Ария стояла на краю и смотрела вдаль. Там лежали деревни, малые города и большой по местным меркам город-улей Апсихос. Таррис, молчавший всю дорогу, подошёл к матери, стоявшей на краю скалы, и спросил: "мам, зачем мы сюда пришли?"\n\nАрия взглянула на сына. На ней была искренняя улыбка, а глаза сверкали от влаги, накопившейся в ней. Но из-за чего-то Таррису стало не по себе. Словно скоро должно случиться что-то нехорошее.\n\nАрия неожиданно крепко обняла сына и тихим голосом проговорила:"
 lyc.28.a:0 ""Ты же хочешь увидеть папу вновь?""
 
 lyc.29.t:0 "СР'цы формализируют коалицию!"
 lyc.29.d:0 "Сегодня ДСР и ЛСР окончательно сформировали свою "реформистскую" коалицию. Для этого они приняли Манифест социал-реформизма, который официально указывает политику этих движений. Каждый уважающий себя чейнджлинг бы ужаснулся, глядя на текст Манифеста, ведь два движения отныне называют себя "Партиями" (что уже говорит о том, что они метят на пост правителей Ликтиды), а также признают каждый свои принципы. Например, Левые социал-реформисты наконец-то признают, что являются лишь грязными коммунистами - в Манифесте они указывают на то, что их приоритет - права рабочего и свобода пролетариата, ужас! Демократические социал-реформисты ничем не лучше. Они заявляют, что "государство должно признавать высшей ценностью права и свободы каждого существа"... Какая беспрецедентная чушь! Оба эти принципа в корне противоречат тому, чем сейчас является власть в Ликтиде. И, на основании этого, Ауранция наконец может смотреть на СР'цев не как на подданых, а как на дегенеративных червей, отравленных идеями коммунизма и демократии. Теперь этих тварей можно... нужно подавить, как предателей нации!"
 lyc.29.a:0 "Вот они  и показали свою истинную сущность."
 
 lyc.30.t:0 "Всё ещё не коммунисты"
 lyc.30.d:0 "WIP"
 lyc.30.a:0 "WIP"
 
 lyc.31.t:0 "Всё ещё не утописты"
 lyc.31.d:0 "WIP"
 lyc.31.a:0 "WIP"
 
 lyc.32.t:0 "Ликтида покидает Гегемонию!"
 lyc.32.d:0 "Воспользовавшись внутренними распрями внутри Гегемонии, Ауранция самостоятельно и без предупреждения объявила о своих намерениях напасть на Олению! Таким образом она, по факту, обозначила, что власть Верховной Королевы теперь для неё ничего не значит. А тем временем сама Верховная Королева вовсю начинает политические реформы, и война с вышедшим и сильно военизированным ульем для неё будет не такой уж и перспективной идеей."
 lyc.32.a:0 "Что она о себе возомнила?"
 
 lyc.33.t:0 "Попытка переворота!"
 lyc.33.d:0 "Демократы и коммунисты уже в открытую противостоят власти Королевы. Из-за её нерешительных действий касательно коалиции СРД и СРЛ, две эти фракции набрали политическую власть и теперь представляют для Ауранции серьёзную угрозу."
 lyc.33.a:0 "Разгоните протесты, расстреляйте протестующих."
 lyc.33.b:0 "Народ Ликтиды торжествует!"
 
 lyc.34.t:0 "Дневник Ауранции, [GetDateText]"
 lyc.34.d:0 ""Я королева Ауранция, и я... да, это всё ещё я.\n\nНедавно на меня нашло что-то. Я помню, что в тот день мне стало очень плохо из-за оленийских богов. Я помню, как лично отправилась в Олению в сопровождении своих генералов. Я сделала это. Я убила их, Укко и Пеллерво, боги, которые терроризировали расу чейнджлингов сотни миллионов лет, теперь мертвы. Но, что было потом, я помню весьма смутно. Я чувствовала себя в ужасном состоянии и по словам Вернекса, выгдялела совсем истощённой. Кстати о нём... С того дня он ведёт себя, словно ничего такого не произошло, но... Не помню, где я ночевала в ту ночь, но я почему-то точно помню, что он был рядом. Или мне так показалось? Не знаю, что и думать. Надеюсь, я не сказала глупостей. Об этом случае я не общалась с ним, но и он ведёт себя как обычно.\n\nЯ недавно вспоминала, сколько раз он меня выручал и сколько раз он наблюдал, как я выходила в разнос. И после всего этого, он остаётся преданным мне. Хотя, тот же Кригер тоже всегда был лояльным, как и остальное командование... Нет, Вернекс чем-то выделяется среди них. Я чувствую, что он другой."
 lyc.34.a:0 "Я хочу знать его лучше.""
 
 lyc.35.t:0 "Дневник Ауранции, [GetDateText]"
 lyc.35.d:0 ""§RЯ королева Ауранция, и я ненавижу оленийцев.\n\nС сегодняшнего дня я буду вести записи кровью оленйца, досталвенной из§!\n\nЛадно, признаюсь, вести записи кровью было не лучшей идеей - она растекается по всей странице. Хотя, может быть, если приноровиться... Ладно, плевать. Это даже в какой-то степени логично. Сама кровь оленийца ни на что не годна. Просто красный биологический мусор. В любом случае, я хотела написать о том, что Фон Кригер уже приносит ошеломляюще положительные результаты очищения Олении. Я бы сама руководила процессом вырезания этой опухоли, но мне нужно быть в Ликтиде, со своим народом. А ещё..."
 lyc.35.a:0 "В последнее время у меня часто болит голова.""
 
 lyc.36.t:0 "Связь с Кригером теряется"
 lyc.36.d:0 "Фон Кригер достиг своей цели - он уничтожил Олению до основания, но после чего отправил весь гарнизон обратно в Ликтиду. Но вот сам Кригер так и не вернулся. В последний раз от него было получено сообщение об успешном выполнении всех задач, а затем - молчание. Некоторые солдаты, вернувшиеся из Экстерминационной Зоны, утверждают, что Кригер остался в Мёртвой Земле добровольно, но разве в этом есть смысл?"
 lyc.36.a:0 "Надеемся, он сумеет вернуться."
 
 lyc.37.t:0 "Тревога"
 lyc.37.d:0 "Ауранция проснулась в своих покоях, но почувствовала, что что-то не так. С тех пор, как она прошла обряды обучения эзотерическим техникам, все её чувства сильно обострились. Она не только чутко улавливала все звуки, но также могла почувстовать присутствие незримой чёрной энергии. И сейчас ей казалось, что вся её спальня была пропитана некой магией. Клубы тёмно-пурпурного тумана переплели стены, а из двери издавалось неестественное свечение. Встав с кровати и быстро одевшись, Ауранция открыла дверь, и обнаружила, что попала в неизвестный ей раньше город. Всюду ходили существа, являющиеся странной помощью котов, птиц и пони. Все они о чём-то беседовали друг с другом, не обращая на Ауранцию внимания. Перед Ауранцией появилась тропа, ведущая вперёд, и она знала, что лучше идти прямо. Разглядывая город, она увидела то, что повергло её в ужас. Группа вооружённых оленийцев перемещалась среди птицесуществ, и они искали что-то или кого-то. Заметив Ауранцию, они, ускорив шаг, направились к ней. Не теряя ни секунды, Ауранция помчалась вперёд по тропе, но внезапно перед ней возникла дверь. Войдя в неё, королева вновь оказалась в своей спальне. Вновь всё было окутано туманом, и вновь она увидела сияющий выход. Войдя через него, она вновьоказалась на тропе, но на этот раз город был другим. Её окружали белые пони с чёрными полосами на теле, но и здесь она заметила очередной отряд оленийцев. Промчавшись по тропе, она вновь открыла дверь и оказалась в своей спальне.\n\nТак она прошла через множественные пространственные коридоры, в панике пытаясь вернуться в Ликтиду. И вот, у неё получилось. Оказавшись в своей спальне в очередной раз, она уже не видела пурпурного тумана. Но непонятное, противное чувство страха связало её. Она чувствовала их присутствие. Да, она была в Ликтиде. в своём дворце, в своём доме, но они были здесь. Это значит, что всё потеряно. Всё то, ради чего она боролась, обрушилось в один миг. Она своими глазами увидела, как стены её мира разрушаются, превращаясь в размытые очертания самих себя. Долго оставаться здесь нельзя. Молясь всем богам, которых она знала, Ауранция открыла дверь, надеясь, что откроется проход в её родные серые дворцовые коридоры. Но вместо них были лишь размытые очертания. Это плохой знак - олени уже начали разрушать основу мироздания. Тяжело дыша, Ауранция оглянулась. Ей на встречу шла чёрная фигура. Она была размытая, но приближалась медленно, словно издеваясь над беспомощностью Ауранции. Она поняла, что это олениец, который пришёл с одной целью. Королева почти потеряла силы, но смогла противостоять чёрной магии и устоять на копытах.\n"НЕ... НЕ ПРИБЛИЖАЙСЯ КО МНЕ!"\nФигура остановилась на мнговение. Но продолжмда подходить к Ауранции уже быстрее, чем раньше. В ушах зазвенело. Ауранция попятилась назад, крича о помощи, но смерть было не остановить. Она приблизилась к Ауранции достаточно, чтобы коснуться паникующей королевы своим копытом.\n\nАуранция, лишённая сил, провалилась в тёмные глубины безвременья, из которых уже никогда не вернётся."
 lyc.37.a:0 "Это конец."
 lyc_37_event_tt:0 ""ОЧНИТЕСЬ, МОЯ КОРОЛЕ-"\n\n§YЗнакомый голос Вернекса взывал к ней из ниоткуда.§!"
 
 lyc.38.t:0 "Пробуждение... снова"
 lyc.38.d:0 "Открыв глаза, Ауранция увидела лишь белый свет, окружающий её. Наконец она обрела покой в лушчем мире... По крайней мере, таковы были её первые мысли, которые прервались знакомым голосом.\n\n"Алло, доктор Тайвран... мне кажется, она очнулась. Да, первая королевская палата. К сожалению, у нас подозрения на..."\n\nАуранция услышала знакомый голос одного из врачей ликтидианского королевского лазарета и медленно пошла на его голос.\n\n*Тем временем в штабном командовании Ликтиды*\n\nВсе важные ликтидианские генералы и командущие собрались в штабе, чтобы обсудить будущее их страны. Королева находится в критическом состоянии, и последнее, что известно - младший генерал Вернекс был с ней.\n\n- Клянусь, я не знаю, в чём дело! Я просто проходил мимо её покоев, когда она вышла! Она смотрела на меня, будто оленийца увидела!\n\nЖёсткий стук копыта о стол разразился по помещению.\n\n- Молчать, мелкий ублюдок! Думаешь, тебе кто-то поверит?! Из-за тебя пострадала Ауранция, ты, диверсант! Что ты с ней сделал?\nЧейнджлинг, старший по званию, сорвался с места к Вернексу. - Да я тебя в порошок сотру, грёбаный уё-\n\n- Орификс? Вернекс?..\n\nВ сопровождении трёх врачей и двух гвардейцев, в штаб вошла Ауранция. По ней было видно, что слабость отошла не до конца, но она могла стоять, опираясь на чейнджлинга-солдата. Присутствующие генералы заметили, что на Ауранцию были надеты очки - то, чего королева раньше не носила никогда.\n\n- Вы... кхм...\n- Не утруждайтесь, - прервал её врач, - вам ещё нужно восстановить силы. Кхм, мы рады сообщить, что состояние Ауранции приходит в норму! Похоже, на фоне постоянного стресса у неё произошёл приступ острого невроза, из-за чего её организм пострадал. Её зрение значительно ухудшилось, но в остальном всё в порядке.\n- Что вы собирались сделать с Вернексом, герр Орификс?.. -  речь королевы была неуверенной и чуть замедленной, но в целом связанной, - прошу, объяснитесь.\n- А, прошу простить, моя королева... Просто... Посмотрите, что он сделал с вами! Разве он не заслуживает наказания?\n- Он ни в чём не виновен.\n- А...\n- Все свободны."
 lyc.38.a:0 "Когда врачи сопроводили её обратно в палату для восстановления, генералы вздохнули с облегчением."
 
 lyc.39.t:0 "Наконец-то покой"
 lyc.39.d:0 "Вернекс решил навестить королеву Ауранцию. Последние две недели она проводила в сеансах с психологом, и Вернекс немного беспокоился о том, как всё проходит. Во время пеперыва он подошёл ко входу в резиденцию королевы. Вздохнув и выдохнув, чейнджлинг вошёл внутрь. Для другого генерала это было бы слишком дерзко, но он почему-то ощущал, что Ауранция не будет против её визита. За дверьми был небольшой коридор, а рядом со входом в сам кабинет Ауранции, на небольшой софе, сидел незнакомый Вернексу чейнджлинг.\n\n"Здравствуйте. Вы лечащий врач Ауранции?"\n\n"Да, так и есть." Голос чейнджлинга казался мягким и успокаивающим. Самое то, чтобы вести диалог с такой личностью, как Ауранция. "А вы, должно быть, генерал Вернекс?"\n\nВернекс наторожился от неожиданности. "Как вы узнали?"\n\n"Ауранция много о вас рассказывала. Много хорошего, прошу заметить."\n\n"И... как она?" Молодой генерал оказался немного смущён, услышав, как о нём отзывалась сама Королева.\n\n"Знаешь, намного лучше, чем в наш первый день. Только всё ещё не стоит упоминать оленийцев, а то знаешь, хе-хе... Придётся с ней долго возиться."\n\n"Я рад это слышать. Могу ли я навестить её?"\n\n"Боюсь, что нет."\n\n"Но почему?"\n\n"Я же сказал... её состояние улучшается. Она уже здраво мыслит, может отличать реальное от нереального. Ты ведь готов исчезнуть?"\n\n"Что... что ты сказал? Тебе самому помощь не нужна?!" Исчезнуть? Что он имеет ввиду? Если он имеет наглость угрожать, то Вернекс точно сможет защитить себя.\n\n"Уже нет смысла скрывать это, парень. Ты - всего лишь мысленная проекция. Духовный друг Ауранции. Видишь ли, во время вторжения йомсвикингов, она потеряла не только честь и рассудок, но и всех родных и близких. Она не могла вылечить такую травму сама и не могла довериться другим, поэтому доверилась своему подсознанию. Так ты и был создан. Образ, который всегда будет с ней рядом. Который всегда поможет и поддержит в трудную минуту. Ты ведь это и делал, да? И ты хорошо справился со своей работой. Без тебя Ауранция бы пропала."\n\nВернекс погрузился в молчание. Найдя в себе смелость, он произнёс: "Значит, ей становится лучше?"\n\n"Врач с улыбкой кивнул. Вернекс улыбнулся ему в ответ и посмотрел в сторону открытого окна, словно заметив что-то удивительное.\n\n"Доктор Варзен, вы с кем-то разговаривали? Я вас заждалась, между прочим."\n\nИз кабинета вышла Ауранция. Её грива была ухожена, а мешки под глазами исчезли. В помещении она увидела лишь врача, наслаждающегося кратким мигом покоя."
 lyc.39.a:0 ""Солнце в Ликтиде светит особенно ярко.""
 
 lyc.40.t:0 "Обещание"
 lyc.40.d:0 "Сегодня Королева Ауранция официально поклялась в верности текущему правителю Гегемонии. Эта клятва была закреплена рядом документов, а также встречей Ауранции и Верховной Королевы.\n\nПусть некоторые глупцы из Верховного Улья будут считать нас ненадёжными союзниками. Они просто не видят полной картины и не понимают, чего на самом деле достигли ликтидианцы. А Ауранция точно не положит глаз верховный на трон - её цели уже были достигнута, а все амбиции - удовлетворены."
 lyc.40.a:0 "Мир для Тысячелетней Гегемонии!"
 
 lyc.41.t:0 "Та..."
 lyc.41.d:0 "Казалось, этот день теперь невозможно испортить. Ауранция бросила взгляд на новую карту Гегемонии, которая теперь висела в её резиденции. Все земли чейнджлингов были окрашены в тёмно-зелёный цвет, что означало, что всё это приналдежит ей. Ей и только ей одной. Уже прошёл день с того момента, как Ауранция была коронована Верховной Правительницей Королевства, но, возможно, она ещё не понимала масштабов своей ответственности. Поэтому она стала чаще лично общаться с Вернексом, который за столько лет их дружбы неофициально стал первым королевским советником.\n\n- Возможно, вам стоит вступить в переговоры с волистадскими сепаратистами. Ваш приказ о незамедлительной интеграции рассматривается ими как акт тирании, и они просто не хотят смириться с этим.\n\n- Вернекс, ты говорил мне то же самое и о сепаратистах в Ларкориксе. Напомни, почему мы не можем просто расстрелять их?\n\n- Чтож, ваша власть хотя и закрепилась железной хваткой, но вам лучше следует зарекомендовать себя как достойную Верховную Королеву, прежде чем идти против народа.\n\nАуранция очарованно смотрела на Вернекса, пропуская его замечания мимо ушей. В конце-концов, она теперь стоит выше всех. Её воля - закон. Не воля каких-то отдельно взятых дронов.\n\n- Я смогла принести мир и порядок в Ликтиду. Я уничтожила тех, кто пытался помешать мне, я лично уничтожила всех оленей - и, я чувствую, что в награду за это небеса сделали меня бессмерным божеством. Божественные голоса говорят мне, что я должна продолжать свою работу, и я согласна с ними. Не думаю, что процесс будет сильно отличаться от того, что я делала раньше. Управлять Ликтидой и править Гегемонией для меня одно и то же. - Ауранция засмеялась, но непохоже, чтобы Вернекс разделял её позитива. Молодой генерал лишь вздохнул, поняв, что мнение Королевы неизменно. По крайней мере, она счастлива. Хотя, казалось, что пятна под её глазами от бессонницы стали только больше, но непохоже, чтобы её беспокоили такие мелочи.\n\n- Вас понял, моя Королева. Думаю, я могу идти.\n\n- Стой! - Ауранция окликнула своего подчинённого, когда тот почти вышел из кабинета.\n\n- Да?\n\n- Ты не против вечером присоединиться к трапезе? - Затем, немного смутившись, добавила: Обычно я ужинаю одна, но..."
 lyc.41.a:0 "...кто будет править тысячу лет."
 
 
 
 
 
 
 
 
 