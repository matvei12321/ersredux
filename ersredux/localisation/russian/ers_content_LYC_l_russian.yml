 LYC_fon_krieger:0 "Фон Кригер"
 KRIEGER_ARMY_DESC:0 "Title: Lyctidian Marshal, a leading specialist in the development of chemical technologies\nAge: ???\nPlace of birth: presumably, Gardis\n\nФон Кригер, чьё настоящее имя, предположительно, Альберт фон Кригер Гардианский, является тёмной личностью в армии Ликтиды. Даже реальность его имени и места рождения (Гардис, Ликтида) до сих пор остаётся под вопросом.\n\nНо точно известно, что под таким именем он поступил в медицинский университет Весалиполиса. Он не планировал начинать военную карьеру, но судьба, к несчастью для многих, имела на него другие планы. В университете Альберт проявлял высокий интеллект и образованность. Он очень интересовался учёным Габером, который изобрёл химическое оружие много лет назад, жадно поглощая каждую книгу с ним, которую мог найти. Преподаватели списывали это на простое восхищение умом Габера, но Кригеру было глубоко плевать на какого-то там учёного. после окончания университета, Кригер поступил на работу в госпиталь Ликтиды. К удивлению многих, Кригеру попадались лишь те пациенты, которым было суждено умереть на его операционном столе... Лучше бы им не знать, что творилось в его голове, когда он медленно резал ещё живых пациентов на части.\n\nОн бросил работу врачом, и также неожиданно поступил в армию. Тогда он попал в ещё новый 1-й ликтидианский химический батальон. Он проявил свои знания химического оружия, помогая в его развитии. Его идеи смертоносного оружия были столь гениальны, что сама Ауранция заметила его талант. С такой опорой, Кригеру не составило труда добраться до высшего командования армией Ликтиды. И он не перестаёт радовать Ауранцию своей садистской изощрённостью... Хотя, поговаривают, что даже сама Королева его в некоторой степени побаивается."
 
 ##### NATIONAL FOCUS
 #------start tree
 LYC_our_queen:0 "Королева Тихого улья"
 LYC_our_queen_desc:0 "Ауранция никогда не была жестокой королевой. Наоборот - она знает, что такое справедливость, и знает, кто по принципу справедливости заслуживает строжайшего наказания."
 LYC_militarisation:0 "Подготовка к милитаризации"
 LYC_militarisation_desc:0 "Наша промышленность не славилась огромными военными заводами, как у Вракса. Но используя ту индустриальную базу, что у нас есть сейчас, мы можем начать строительство ужасающей машины войны, которую мы используем в борьбе против недо-существ - оленей."
 LYC_expand_current_industry:0 "Развивать текущую промышленность"
 LYC_expand_current_industry_desc:0 "Хотя мы готовимся к вторжению в Олению, не следует забывать о нашей сильной стороне - гражданской промышленности."
 LYC_obey_to_chryssy:0 "Поддержать глобальный милитаризм Кризалис"
 LYC_obey_to_chryssy_desc:0 "Честно говоря, нас не интересуют планы Кризалис о "глобальном господстве чейнджлингов". Но мы можем поддерживать эту идею, надеясь, что в один прекрасный день наши армии сообща пойдут маршем через границу рогатых оленийцев. И наши солдаты точно будут первыми, кто войдёт в города оленей."
 LYC_kill_deers:0 "Настоящий враг каждого чейнджлинга"
 LYC_kill_deers_desc:0 "Честно говоря, нас не интересуют планы Кризалис о "глобальном господстве чейнджлингов". Всё, чего мы хотим - это отомстить всем оленям за то, что несколько поколений назад эти уродливые твари почти истребили весь народ нашего улья. Мы, конечно, благодарны Кризалис за её поддержку в те трудные времена, но сейчас мы сконцентрируемся на действительно важной цели.\n\n§RИстребление. Всех. Оленийцев.§!\n\n"И пусть никто не останется в живых...""
 LYC_wait:0 "Ждать подходящего момента..."
 LYC_wait_desc:0 "У нас нет возможности действовать в одиночку. Чтобы осуществить давнюю мечту Ликтиды, нам нужно ждать, пока Кризалис не объявит великий поход на Восток."
 LYC_monster_awakens:0 "Пробуждение тихого монстра"
 LYC_monster_awakens_desc:0 "К чёрту ожидания. Пока мы ждём приказа Кризалис об атаке на Олению, эти парнокопытные спокойно живут в своих уютных домах и даже не чувствуют ни капли вины за то, что их предки несколько десятилетий назад напали на нас. Такой чудовищный эгоизм должен быть наказан.\n\nИ Ауранция станет главной судьёй в судьбе оленийцев."
 LYC_punishment_for_302:0 "Естественное наказание"
 LYC_punishment_for_302_desc:0 "Бортбайтинг Хогланд - регион, который Ликтида оккупировала после того, как единые силы чейнджлингов сокрушили парнокопытных. Долгое время местные оленийцы принижались и использовались в качестве расходных материалов, но они никогда не получали того наказания, которого заслуживают. Ауранция объявит о тотальном истреблении всего рогатого населения региона Хогланта и заселении его чейнджлингами."
 LYC_develop_302:0 "Развивать отсталый регион"
 LYC_develop_302_desc:0 "Здесь всё свидетельствует о деградации, которая присуща исключительно оленям - отсталая культура, отсталые строения, отсталое наследие. Всё это должно быть стёрто, а на месте деградации будет гордо возвышаться новое будущее чейнджлингов Ликтиды."
 LYC_prepare_302:0 "Построить Стену"
 LYC_prepare_302_desc:0 "К сожалению, мы не смогли найти и уничтожить всех оленийцев в регионе. Некоторые из них ещё скрываются и ждут возможности сбежать домой, в Олению. Чтобы предотвратить это, мы построим стену, которая предотвратит побег оленийцев от их неминуемой судьбы. В конце-концов, ни один олень не должен остаться в живых. Это и есть принцип справедливости."
 LYC_chemical_warfare:0 "Химификация армии" 
 LYC_chemical_warfare_desc:0 "Химические атаки показали себя с хорошей стороны во время войны Весалиполиса и Вракса. Мы уверены, что эта технология будет столь же эффективна и против мерзких оленийцев."
 LYC_insane_war:0 "Эскадры смерти"
 LYC_insane_war_desc:0 "Война - то, к чему ликтидианцы готовились многие поколения. Наши предки будут благославлять нас на успешный поход, ведь тогда мы отомстим за их смерть, а также установим справедливость в этом мире."
 
 ##### KILL OLE tree 
 LYC_prepare_executions:0 "Ждите палачей..."
 LYC_prepare_executions_desc:0 "Проводя дни и ночи в своём дворце, Ауранция готовит планы по осуществлению правосудия. И все чейнджлинги Ликтиды поддерживают её в этом стремлении."
 LYC_tell_them_about_justice:0 "Понятие справедливости"
 LYC_tell_them_about_justice_desc:0 ""Каждому будет воздано ровно в той степени, в которой преступление было совершено. Воры должны лишиться благ своих, мучители должны быть измучены, а убийцы должны быть убиенны. И такова должна быть судьба, и если отцы и матери не понесили того наказания, то должны быть наказаны их дети, и дети их детей. Тогда будет мир и порядок на земле, по которой мы ходим, и будут все жить в процветании.""
 LYC_standalone:0 "Мы одиноки в своей цели"
 LYC_standalone_desc:0 "Каждая королева хочет добиться своих смехотворных идей. Единственная, на кого мы могли бы положиться - это королева Кризалис. Но и её планы слишком банальны - она хочет властвовать над оленями, в то время как наша цель более... радикальна. Радикальна настолько, что другие королевы её точно не поддержат. Именно поэтому мы вынуждены сражаться в одиночку."
 LYC_loyalty:0 "Беспрекословная преданность"
 LYC_loyalty_desc:0 ""Что? Адекватная внешняя политика? Нормальное отношение к национальным меньшинствам? Не агрессивная идеология государства? Хватит говорить чепуху! Вставай, Ауранция знает, что ты готов начать исполнение великого долга.""
 LYC_agressive_militarization:0 "Агрессивная милитаризация"
 LYC_agressive_militarization_desc:0 "Военная промышленность должна стать приоритетной. Мы должны отбросить идеи о том, что Ликтида - тихий улей, чьи чейнджлинги спокойно производят ресурсы. Чейнджлинги Ликтиды готовятся к неизбежному. И никто не осмелится им противостоять."
 LYC_agressive_industry:0 "Снаряжение смерти"
 LYC_agressive_industry_desc:0 "Нам не хватит просто достаточного количества снаряжения. Нам нужны тонны смертоносных орудий. И когда Ауранция требует "смертоносные" орудия, она имеет ввиду СМЕРТОНОСНЫЕ орудия."
 LYC_army_upgrade:0 "Подготовить армию"
 LYC_army_upgrade_desc:0 "Как бы это плохо не звучало, наша армия в нынешнем состоянии слишком мала, чтобы сокрушить оленийские силы. Нужно усилить внимание на развитии армии, особенно на создании новых эффективных доктрин."
 LYC_air_upgrade:0 "Небесная кара"
 LYC_air_upgrade_desc:0 "Ауранция восхищается идеей использования бомбардировщиков против оленийского государства. Она в восторге от мысли, что оленийцы будут погибать не только на фронте, но также подвергаться ужасающим бомбардировкам в тылу. В конце-концов, они этого заслужили.\nИ у Ауранции есть интересные идеи, как можно использовать бомбардировщики и прочие самолёты, чтобы оленийцы встретили максимально справедливую судьбу."
 LYC_army_total_destruction:0 "Тотальная война"
 LYC_army_total_destruction_desc:0 "Воистину, олени - худшие создания на свете. И дело даже не в том, что мы считаем себя "сверх-расой", нет... Просто существование оленийцев - ошибка. Олени, которые по принципе справедливости должны быть уничтожены, всё ещё живут. Именно это Ауранция пытается донести до своих подданых. Смерть рогатых существ - вот единственно верное решение."
 LYC_army_spare_someone:0 "Они ещё могут принести пользу"
 LYC_army_spare_someone_desc:0 "Оленийцы по сути своей не совсем бесполезны. Их тела содержат ресурсы, которые мы можем применить в биологических исследованиях, а также некоторые олени достаточно сильны, чтобы выполнять простейшие поручения вроде переноски ресурсов. Конечно, мозг оленийца слишком мал, чтобы заниматься научными исследованиями и трудной мозговой деятельностью (что уже неоднократно было доказано нашими учёными), поэтому мы не просто захватим и унитожим оленийцев, а будем медленно извлекать из них пользу. К тому же, при таких обстоятельствах, оленийцы рано или поздно вымрут от того непосильного физического труда, который их ожидает."
 LYC_deadly_air:0 "Особые методы бомбардировок"
 LYC_deadly_air_desc:0 "Бомбардировщики смогут нанести определённый урон оленийцам. Но, возможно, этого не хватит, чтобы оленийцы заплатили за свои деяния. Тогда мы прибегнем к особым методам наказания.\nРегион небольшого улья Апсихоса кажется тихим и непримечательным местом. Идельно, чтобы начать разработку настоящего оружия смерти."
 LYC_navy_upgrade:0 "В тихом омуте"
 LYC_navy_upgrade_desc:0 "Наш флот будет подобен нашему улью - тихим, смертоносным."
 LYC_army_of_fate:0 "Армия мести"
 LYC_army_of_fate_desc:0 "Наша армия растёт в размере. И она должна стать национальным символом Ликтиды. Да, лучшие солдаты обычно тренируются во Враксе, но мы ещё покажем всему миру, особенно грязным парнокопытным на северо-западе, на что способна наша велика армия мести."
 LYC_start_independence:0 "Разорвать связи с Весалиполисом"
 LYC_start_independence_desc:0 "Чтобы полноценно осуществить нашу месть, нам необходимо самостоятельно расправиться с врагом. Дуэль судьбы - чейнджлинг против оленийца. Для этого мы начнём повышать степень независимости Ликтиды, а также будем заменять некоторых весалипольских офицеров ликтидианскими, чтобы обеспечить их большую лояльность."
 LYC_start_independence_l:0 "Тарифы на ресурсы"
 LYC_start_independence_l_desc:0 "Мы являемя промышленным ульем Гегемонии, и другие королевы думают, что имеют право безнаказанно отнимать у нас наши промышленные ресурсы. Так как мы пока что не совсем независимый улей, мы не можем просто запретить другим ульям получать наши ресурсы. Однако, мы можем ввести зверские тарифы, чтобы отпугнуть королев от наших богатств. Кризалис не сможет возразить, так как мы всё ещё находимся в её подчинении и передаём ресурсы ей. Просто мы не будем находиться в подчинении других королев."
 LYC_fight_for_queen:0 "Жизнь за королеву"
 LYC_fight_for_queen_desc:0 "Может существовать только одна воля - воля королевы! Ты - всего лишь трутень, который должен безвольно исполнять её приказы. Только так мы сможем прийти к светлому будущему, где все оленийцы гниют в земле."
 LYC_fight_for_idea:0 "Жизнь за идею"
 LYC_fight_for_idea_desc:0 "Может существовать только одна правильная философия - оленийцы заслуживают истребления! Никто, даже сама королева, не может противоречить этой идее. Только так мы сможем прийти к светлому будущему, где все оленийцы гниют в земле."
 LYC_army_upgrade_2:0 "Моторизация"
 LYC_army_upgrade_2_desc:0 "При помощи грузовиков и моторизированных дивизий мы сможем захватить оленийцев быстрее, чем их отупевший за годы деградации мозг может среагировать."
 LYC_start_independence_r:0 "Поднять ликтидианский дух"
 LYC_start_independence_r_desc:0 "Ликтидианец должен видеть свои преимущества в сравнении с чейнджлингами других ульев. Ликтидианец - это не просто чейнджлинг, это тихая машина убиства, готовая вонзить кортик в глотку каждого рогатого парнокопытного. И ликтидианцы должны гордиться тем, что именно они могут уничтожать оленийцев эффективнее всех."
 LYC_start_independence_industrial_hive:0 "Великий Улей"
 LYC_start_independence_industrial_hive_desc:0 "Плевать, что говорят другие королевы, Ликтида - величайший улей среди всех других."
 LYC_full_win:0 "Только полная победа"
 LYC_full_win_desc:0 "Ауранция не допустит никаких планов "Б"! Никаких "стратегических отступлений"! Только полный вперёд, неумолимой волной на страну, которая должна быть стёрта с Эквуса."
 LYC_unspeakable_result:0 "Немыслимый исход"
 LYC_unspeakable_result_desc:0 "Конечно, такого не может произойти, абсолютно не может. Но на случай чрезвычайной ситуации мы построим сеть подземных бункеров, которые мы будем использовать, чтобы сдерживать теоретически возможные атаки оленийцев.\nНо такой сценарий абсолютно маловероятен. Ауранция просто хочет быть готова ко всему."
 LYC_tank_brigades:0 "Танковая доктрина"
 LYC_tank_brigades_desc:0 "Танки уже не считаются экзотикой в ульях. Например, Вракс давно запустил этих железных чудищ в массовое производство. Стоит задуматься о том, чтобы сделать так же - дикие оленийцы точно будут в ужасе от того, что они примут за рычащих железных зверей."
 LYC_artillery_brigades:0 "Национальная артиллерия"
 LYC_artillery_brigades_desc:0 "Ну кому не нравится артиллерия? Разве что оленийцу, в морду которого летит осколочный артиллерийский снаряд."
 LYC_next_step:0 "На пути к высшей цели"
 LYC_next_step_desc:0 "§CЗначит война.§!"
 
 ##### AFTER WAR
 
 LYC_quiet_peace:0 "Тихое место"
 LYC_quiet_peace_desc:0 "С окончанием войны, Ликтида вновь станет тихим ульем. Замолчат барабаны войны, население вернётся к привычной жизни, но уже с осознанием того, что величайшая угроза роду чейнджлингскому - оленийцы - устранена. Но продлится ли эта идилля долго? Королева Ауранция чувствует, что грядёт новый шторм, но пока что можно устроить передышку."
 LYC_praise_army:0 "Наградить армию"
 LYC_praise_army_desc:0 "Каждый солдат, что принимал участие на полях сражений - герой, заслуживающий наград. Придётся скупить большое количество печатных прессов у Дитрисиума, чтобы произвести достаточное количество наградых медалей в срок."
 LYC_parades:0 "Парады в Ликтиде"
 LYC_parades_desc:0 "Громкие парады - большая редкость для Ликтиды. В последний раз парад был проведён в 998-м году в честь формализации создания Гегемонии. Колонны ликтидианской и весалиполианской техники прошлись по Тёмной Площади, демонстрируя мощь союзных государств. Но это был не наш праздник. Это были лишь прихоти Кризалис, которые она так жаждала удовлетворить. Пышные парады? Громкая военная музыка? Такая торжественность должна проводиться только по исключительным поводам, а не по пожеланию одного индивидуума. Но победа над Оленией - действительно достойный повод для парада и радости."
 LYC_minute_of_silence:0 "Минута молчания"
 LYC_minute_of_silence_desc:0 "Многие наши солдаты погибли от копыт грязных оленийцев. Они исполняли свой священный долг и заслуживают всеобщего уважения."
 LYC_back_to_hives:0 "Возвращение в гавань"
 LYC_back_to_hives_desc:0 "WIP"
 LYC_promise_of_loyalty:0 "Дать обещание"
 LYC_promise_of_loyalty_desc:0 "WIP"
 LYC_share_war_experience:0 "Поделиться опытом войны"
 LYC_share_war_experience_desc:0 "Вряд ли Чейнджлингия будет воевать с оленийцами, ведь эту работу мы уже сделали. Однако, некоторые наши достижения в военной сфере могут быть полезны Весалиполису."
 LYC_industrial_hive_again:0 "Мирный улей снова"
 LYC_industrial_hive_again_desc:0 "WIP"
 LYC_help_vesalipolis:0 "Помощь Весалиполису"
 LYC_help_vesalipolis_desc:0 "WIP"
 LYC_love_export:0 "Открыть экспорт любви"
 LYC_love_export_desc:0 "WIP"
 LYC_peace_for_aurantia:0 "Мир для Ауранции"
 LYC_peace_for_aurantia_desc:0 "WIP"
 
 LYC_standalone_2:0 "Самостоятельная Ликтида"
 LYC_standalone_2_desc:0 "Война с Оленией показала, что Ликтида может существовать как самостоятельное государство, не нуждающееся в надзоре со стороны. Внушительная армия, достойная промышленность и преимущество в виде химического оружия - всё это делает новую Ликтиду равной Весалиполису или любому другому улью Гегемонии. Такие рассуждения наталкивают на мысль, что, возможно, Ликтида может и соперничать с Весалиполисом в мощи..."
 LYC_dreams_of_our_changelingia:0 "Мечты о нашей Чейнджлингии"
 LYC_dreams_of_our_changelingia_desc:0 "Ауранция уже много лет наблюдает за упадком Гегемонии. Тирания глупой Кризалис ни к чему хорошему не привела, а только усугубила все возможные конфликты. Ауранция - то существо, которое знает, что такое справедливость и благочестие. Под её правлением род чейнджлингов будет жить и процветать.\n§RК тому же, поступают слухи, что поселения оленийцев обнаружены как в Грифонии, так и в Зебрике. На самом деле, мы просто выжмем все ресурсы из Гегемонии для того, чтобы организовывать вторжения за океаны.§!"
 LYC_forces_against_vesalipolis:0 "Дивизии открытого штурма"
 LYC_forces_against_vesalipolis_desc:0 "Весалиполис представляет собой серьёзную крепость, для взятия которой понадобятся определённые усилия. Даже если мы будем превосходить Весалиполис по качеству армии, нам всегда нужно иметь несколько дивизий в запасе, если мы планируем успешное наступление."
 LYC_mobilize_army_for_crusade_against_vesalopolis:0 "Мобилизовать силы для похода на Весалиполис"
 LYC_mobilize_army_for_crusade_against_vesalopolis_desc:0 "WIP"
 LYC_forces_against_vesalipolis_toxic:0 "Дивизии химического штурма"
 LYC_forces_against_vesalipolis_toxic_desc:0 "WIP"
 LYC_prepare_for_future_war:0 "Повторная мобилизация"
 LYC_prepare_for_future_war_desc:0 "Передышка окончена. Грядёт новая война! Хотя, она будет не такая важная и значимая для нас, как война с царством диких зверей на западе, но всё же сыграет большую роль в истории Ликтиды. Режим, который правит в Весалиполисе, должен быть свергнут во имя власти Ауранции. Она станет намного более подходящим правителем чейнджлингского государства, чем [251.owner.getleader]!"
 LYC_adapt_vpk:0 "Адаптировать ВПК"
 LYC_adapt_vpk_desc:0 "Мы готовимся к тому, что грядёт война, но чтобы мобилизация не нанесла слишком серьёзного ущерба гражданской экономике, мы примем ряд мер, которые позволят функционировать военно-промышленному комплексу без ущерба гражданскому сектору."
 LYC_lyctida_uber_alles:0 "Ликтида превыше всего"
 LYC_lyctida_uber_alles_desc:0 "Приоритетом для каждого чейнджлинга должна быть защита Ликтиды. Ликтида - наш дом, и одновременно точка, вокруг которой вращается вся Вселенная."
 LYC_patriotic_propaganda:0 "Патриотическая пропаганда"
 LYC_patriotic_propaganda_desc:0 "Ликтидианец - это сверх-существо, стоящее намного выше, чем враксианец, весалиполианец и другие народы Гегемонии. Пропаганда должна вбить это народу в голову, чтобы пробудить дух конкуренции, ведь почему в администрации Кризалис, управляющей всей Гегемонией, одни лишь весалиполианцы и никогда не было ни одного ликтидианца? Действительно, несправедливость."
 LYC_forward_my_army:0 "Вперёд, мои армии!"
 LYC_forward_my_army_desc:0 "WIP"
 LYC_coronation_of_vesalipols:0 "Коронация Ауранции"
 LYC_coronation_of_vesalipols_desc:0 "WIP"
 LYC_coronation_of_dytrisium:0 "Королева Дитрисиума"
 LYC_coronation_of_dytrisium_desc:0 "WIP"
 LYC_coronation_of_vraks:0 "Королева Вракса"
 LYC_coronation_of_vraks_desc:0 "WIP"
 LYC_coronation_of_soryth:0 "Королева Сорифа"
 LYC_coronation_of_soryth_desc:0 "WIP"
 LYC_integrate_volistad:0 "Интегрировать Волистад"
 LYC_integrate_volistad_desc:0 "Маленькое пятно, именуемое Волистадом - всего лишь административная единица, в границах которой живущие чейнджлинги считают себя каким-то уникальным народом. Но, стоит признать, большой ценности для нас Волистад не имеет. И, к тому же, Ауранция уже порядком устала разъезжать по ульям с целью коронации, поэтому можно ограничиться обычной формальной интеграцией в наше Королевство."
 LYC_stop_opposition:0 "Оппозиция"
 LYC_stop_opposition_desc:0 "Даже после того, как мы покорили все земли чейнджлингов, остаются недовольные и протестующие. Ауранция простой чейнджлинг - она просто отдаст приказ расстрелять их. Из танковых орудий и газовых установок, если потребуется."
 LYC_destroy_communists:0 "Уничтожить коммунистов"
 LYC_destroy_communists_desc:0 "Из-за неумелого правления Кризалис, на территориях Весалиполиса появилось много скрытых ячеек коммунистов. Они уже долгое время ждут идеального момента для нападения, а силы их растут с каждым днём. Не позволим коммунистам подорвать власть нашей Ауранции! Уничтожить их!" 
 LYC_pax_lyctidia:0 "Пакс Ликтидия"
 LYC_pax_lyctidia_desc:0 "Славный день для всех чейнджлингов. Ауранция - самое справедливое существо в мире - возвысилась над остальными королевами! Многие шептались за её спиной, плели заговоры, но у них ничего не вышло. Ауранция отныне будет мудро править Королевством Чейнджлингией, не позволяя недостойным поставить под угрозу безопасность нашей расы. Безопасность, за которую была заплачена большая цена."
 
 LYC_leave_this_fools:0 "Попирательства глупцов нас не волнуют"
 LYC_leave_this_fools_desc:0 "WIP"
 LYC_sphere_of_defence:0 "Наша оборона"
 LYC_sphere_of_defence_desc:0 "WIP"
 
 LYC_justify_olenian_occupation:0 "Пусть мир узнает, что мы были правы"
 LYC_justify_olenian_occupation_desc:0 "Несмотря на то, что мы сражались за справедливость для оленийской расы, остальные державы мира, в том числе наши ульи, смотрят на нас с подозрением. Этим отбросам не понять, что есть настоящая справедливость, но нам нужно как-то восстанавливать свою политическую репутацию, верно? Мы создадим ряд... "настоящих" документов, в которых содержатся приказы по нападению на Ликтиду и истребление всего чейнджлингского народа. Эти документы мы огласим на весь мир, чтобы черви "цивилизованного мирового сообщества" поняли, что мы сражались за святое дело."
 
 
 LYC_see_economic_problems:0 "Перейти к проблемам"
 LYC_see_economic_problems_desc:0 "WIP"
 LYC_support_local_business:0 "Поддержка частного бизнеса"
 LYC_support_local_business_desc:0 "WIP"
 LYC_demobilisation:0 "Демилитаризация экономики"
 LYC_demobilisation_desc:0 "WIP"
 LYC_send_industrial_equipment:0 "Перенести промышленное оборудование"
 LYC_send_industrial_equipment_desc:0 "WIP"`
 LYC_upgrade_banks:0 "Возродить нацбанк"
 LYC_upgrade_banks_desc:0 "Ауранция давно подписала указ о создании национального банка Ликтиды. Изначально он должен был быть структурой, которая позволит беднеющим слоям населения брать кредиты и отрабатывать их, финансировать перспективные частные проекты и прочее. Но в последнее время нацбанк превратился в очередного поборника налогов с введением абсурдных "обязательных выплат на благо государства". Конечно, он должен приносить доход Ликтиде, но его первоначальная цель - помощь населению, и Ауранция позаботится о том, чтобы нацбанк стал той организацией, какой он был задуман изначально."
 LYC_calm_protesters:0 "Решить проблему протестов"
 LYC_calm_protesters_desc:0 "Протесты - это совсем не тот метод, которыми должны решаться проблемы Ликтиды. Ликтидианец должен стойко стерпеть все испытания, прежде чем судьба дарует ему возможность радоваться спокойной жизни, но эти индивиды так не считают. Они считают, что Ликтиде нужна "революция", что "Ауранция только опустошила страну своими войнами". С ними нужно... разобраться. Немедленно."
 LYC_support_borning:0 "Программа повышения рождаемости"
 LYC_support_borning_desc:0 "Множество наших солдат погибло в неравном бою, что создало большую демографическую дыру в Ликтиде. Стоит это исправить."
 LYC_reabilitation_centres:0 "Центры реабилитации"
 LYC_reabilitation_centres_desc:0 "Многие чейнджлинги не вернулись домой с войны, а часть из тех, кто вернулся, уже не такие, как прежде. Война с бешеными зверями пошатнула их разум, и им сложно адаптироваться к старой мирной жизни. Следует организовать ряд социальных центров, которые помогут пострадавшим солдатам забыть ужасы войны и вернуться в нормальное русло к своим любящим семьям."
 LYC_industry_of_lyctida:0 "Машинный труд"
 LYC_industry_of_lyctida_desc:0 "WIP"
 LYC_upgrade_life:0 "Улучшить уровень жизни"
 LYC_upgrade_life_desc:0 "WIP"
 LYC_create_universities:0 "Заново открыть университеты"
 LYC_create_universities_desc:0 "Ради войны многие государственные организации были подавлены в угоду военной промышленности. Это произошло и с системой образования. Необходимо выделить средства на то, чтобы открыть образовательные учрежения и нанять преподавателей. Студенты вновь смогут изучать физику, медицину, инженерное дело и другие отрасли. Так мы в будущем получим новых специалистов, от чего выиграют все."
 LYC_lyctidian_philosophy:0 "Ликтидианская философия"
 LYC_lyctidian_philosophy_desc:0 "WIP"
 LYC_send_arms_factories:0 "Перенести военное оборудование"
 LYC_send_arms_factories_desc:0 "WIP"
 LYC_afterwar_military_reforms:0 "Военные реформы"
 LYC_afterwar_military_reforms_desc:0 "Сражаясь с дикарями, мы получили много опыта в сфере ведении войны."
 LYC_pojar_corpus:0 "Модернизация армии"
 LYC_pojar_corpus_desc:0 "WIP"
 LYC_standartize_doctrines:0 "Стандартизация доктрин"
 LYC_standartize_doctrines_desc:0 "WIP"
 LYC_new_ordens:0 "Инициатива новых орденов"
 LYC_new_ordens_desc:0 "Активные граждане Ликтиды по своей инициативе создали так называемые "Ордены", которые распространяют учение о том, что олени - богомерзкие создания, которых нужно истреблять. Их деятельность в большей степени нацелена на молодёжь, чтобы память о великом подвиге ликтидианцев и память об оленийских мразях всегда оставалась в умах новых поколений."
 LYC_heavy_tanks:0 "Поддержать танкостроение"
 LYC_heavy_tanks_desc:0 "WIP"
 LYC_magical_weapons:0 "Убер-винтовки"
 LYC_magical_weapons_desc:0 "WIP"
 LYC_professional_army:0 "Профессиональная армия Ликтиды"
 LYC_professional_army_desc:0 "WIP"
 LYC_nuclear_tech:0 "Тепловой контакт"
 LYC_nuclear_tech_desc:0 "Наши учёные давно думают об идее создания атомного оружия. [ROOT.getleader] тоже заинтересована в укрощении силы атома - если Ликтида получит такую мощь, ничто не остановит её."
 LYC_optimise_gas_production:0 "Оптимизация производства газа"
 LYC_optimise_gas_production_desc:0 "Химическое оружие сильно помогло нам в достижении справедливости. Стоит разработать новые методы создания такого чудесного вооружения."
 LYC_nuclear_race:0 "Неудержимое производство урана"
 LYC_nuclear_race_desc:0 "WIP"
 LYC_evil_science:0 "Философия ножа"
 LYC_evil_science_desc:0 "Те солдаты Олении, что выжили после нашего наступления - самое омерзительное, но всё же чудо. То, что они сопротивлялись праведной ярости наших бойцов, показывает, что они имеют какие-то биологические преимущества перед своими деградировавшими собратьями... Нужно выловить членов армии Олении, что остались в живых, и вспороть их внутренности для детального изучения строения их организма."
 LYC_rely_on_krieger:0 "Положиться на Кригера"
 LYC_rely_on_krieger_desc:0 "Фон Кригер - настоящий Зверь Запада, и это прозвище он получил заслуженно. Не каждый садист сможет придумать столько способов для того, чтобы уничтожать грязных оленийцев. За относительно короткие сроки он сжёг, разбомбил и просто вырезал десятки и сотни оленийскх селений... Чтож, пусть он продолжает, а Ауранция наградит Кригера отличительным званием, которое официально "коронует" его Зверем Запада."
 LYC_esoterica_in_anti_olenia:0 "Наслать гнев богов"
 LYC_esoterica_in_anti_olenia_desc:0 "Ауранция утверждает, что убила оленийских божеств. Конечно, возникают вопросы, были ли вообще боги у столь недоразвитого народа, как олени, но наши боги точно существуют. При помощи молитв и бесчисленных ритуалов мы попросим помощи у сущностей Вальгаллы, которые помогут Кригеру стереть наших врагов."
 
