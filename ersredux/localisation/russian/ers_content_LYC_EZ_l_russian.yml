 ##### CHARACTERS
 OLE_EZ_ixiod_eidrich:0 "Иксиод Эйдрих"
 OLE_EZ_maris_mandelis:0 "Мариса Манделис"
 OLE_EZ_oscar_dirlewanderer:0 "Оскар Дирлевандерер"
 OLE_EZ_oscar_dirlewanderer_desc:0 "Оскар Дирлевандерер был пять раз пожизненно осуждён за преступления высшей степени тяжести, но его связи в военных кругах чудом помогали ему оставаться на свободе. В один момент терпение Кризалис иссякло, и она лично вынесла указ о поимке генерала-штурмовика, служившего в вооружённых силах Весалиполиса. Однако, к тому моменту он пропал, и никто ничего о нём не слышал до тех пор, пока в Олении не был установлен марионеточный режим Ликтиды. Это наводит на мысль о том, что Дирлевандерер находился в хороших отношениях с фон Кригером. Достаточно хороших, чтобы тот скрывал преступника и позволил ему стать одним из его приближённых правителей Царства Смерти."

 ##### NATIONAL FOCUS
 #------start tree
 OLE_EZ_dawn_of_the_hope:0 "В этом мраке нет надежды"
 OLE_EZ_dawn_of_the_hope_desc:0 "Мы не справились. Мы пали. Мы - обречённые ничтожества, мы просто твари, недостойные жизни. Теперь наше будущее туманно, а наши новые хозяева не щадят никого на своём пути. Воистину, это конец для нации оленийцев."
 OLE_EZ_expluatation:0 "Борьба за вымирание"
 OLE_EZ_expluatation_desc:0 "Хотя Ауранция дала нам чёткие указания по тому, как нам нужно действовать, у Кригера есть... свои планы. Он наслаждается не столько смертью оленей, сколько фактом того, что они страдают.\nФон Кригер приказал устраивать в оленийских поселениях "соревнования" среди оленийцев. В эти соревнования войдут такие испытания, как полная отдача любви вместе с жизненными силами, вынесение пыток, убийство сородичей, марафоны через минные поля и многое... МНОГОЕ другое. Наградой за победу будет быстрая и благородная смерть."
 OLE_EZ_cages:0 "Клетки для дикого зверья"
 OLE_EZ_cages_desc:0 "Как только мы уничтожили государство оленей, они показали свою ИСТИННУЮ натуру. Хуже, чем муравьи - они неорганизованы, в панике снуют туда-сюда от деревни к деревне в страхе за свою жизнь. Точно дикие животные. И для таких диких животных нужны соответствующие клетки, чтобы сгонять их на одну территорию."
 OLE_EZ_destroy_culture:0 "Дегенеративная культура"
 OLE_EZ_destroy_culture_desc:0 "Везде по территории Олении были построены замки, храмы, святилища, школы, музеи... Мерзость, честное слово. Оленийцы считают это проявлением культуры, но на деле эти постройки  не стоят ничего. У оленей нет культуры. Они - животные, и они никогда не могли сами построить такое. Может ли олениец написать картину? Может ли он сочинить симфонию? Ответ очевиден: нет.\n\nВсё, на что олениец способен - жечь кострища и самовольно бросаться в пламя ради своих лживых богов."
 OLE_EZ_poverty:0 "Отнять всё, что у них есть"
 OLE_EZ_poverty_desc:0 "У оленийцев есть то, чего они абсолютно не заслуживают. Деньги, машины, одежда, предметы интерьера, дом, пища. Это и многое другое должно быть насильно конфисковано у каждого оленийского поселения."
 OLE_EZ_flame:0 "Сжечь всё"
 OLE_EZ_flame_desc:0 "Я залью ваши глаза керосином."
 OLE_EZ_wack_woman:0 "Остановить рождение"
 OLE_EZ_wack_woman_desc:0 "Оленийские самки - источник проклятой заразы, их утробы носят поколения ужаса. Если в живых останутся самцы-олени - они вымрут сами по себе, но если выживет хоть одна самка - род оленей будет продолжать бездумно размножаться, пока не он не поглотит и не уничтожит весь мир."
 OLE_EZ_spread_gas:0 "Распространить газ"
 OLE_EZ_spread_gas_desc:0 "Сам воздух отравлен, ибо сотни лет в нём сосуществовали дикие и вредоносные животные. Такой воздух может быть очищен только одним путём..."
 OLE_EZ_brainwash:0 "Промывка разума"
 OLE_EZ_brainwash_desc:0 "Оленийцы не должны считать себя разумными существами, ведь они ими в действительности не являются. Мы запретим им мыслить, а также будем внушать им, что они - дикие животные. В этом нам помогут не только психологическая корректировка выжившего населения, но и особые радиволны, разработанные по технологиям наших учёных. Эта система будет называться "Выжигатель мозгов"."
 OLE_EZ_watchtowers:0 "За вами наблюдают"
 OLE_EZ_watchtowers_desc:0 "Нам нужно установить башни для слежки за зверями, чтобы никто из них не сбежал. На этих башнях будут находиться снайперы, которые стреляют по беглецам отравленными охотничьими снарядами без предупреждения.\nКогда дикое животное сбегает из-под надзора - это не хорошо."
 
 OLE_EZ_burn_sakhara:0 "Испытать атомную бомбу на Сакаре"
 OLE_EZ_burn_sakhara_desc:0 "Новое оружие создаётся в землях Ликтиды. Смертоносное, но чрезвычайно дорогое - оно использует энергию атома и магических кристаллов для создания взрыва невиданной ранее мощи. Но у Кригера есть идея более эффективного оружия, пусть даже никто не прислушается к нему. Эта "грязная атомная бомба" будет содержать в себе сотни тысяч тонн отравляющих веществ, которые за счёт кинетической энергии взрыва будут распространяться на километры. Оскар Дирлевандерер пошутил, что такая бомба за один взрыв не снесёт и города, и Кригер принял это, как вызов. Мы в спешке создадим грязную атомную бомбу из того, что у нас есть, и активируем её в Сакаре. Результат должен быть удовлетворительным."
 OLE_EZ_burn_tservus:0 "Разбомбить Цервус"
 OLE_EZ_burn_tservus_desc:0 "Пилоты Ликтиды со времён войны так и не практиковались непосредственно в воздушных боях. На каких-то учебных аэродромах пилоты опыта не наберутся... Нужно срочно призвать к нам эскадроны ликтидианской авиации, желательно самолёты, которые могут наносить урон по площади. Этим самолётам будет позволено производить уже не учебные бомбардировки по Цервусу. Надеюсь, это ублюдское подобие города будет разбито в труху."
 OLE_EZ_nuke_researches:0 "Отряд 241"
 OLE_EZ_nuke_researches_desc:0 "WIP"
 OLE_EZ_burn_weiverfront:0 "Стереть население Вейверфронта"
 OLE_EZ_burn_weiverfront_desc:0 "Вейверфронт - крупный город, находящийся на границе с Поньолдом. Государство [PGV.getname] является примером того, как грязные копыта оленийцев могут дотянуться до других берегов. Если бы мы их не остановили, оленийцы бы распространили всоё влияние на весь мир. Вейверфонт, как центр распространения оленийства в другие страны, должен быть очищен."
 OLE_EZ_burn_hjortland:0 "Изнасиловать Хъёртланд"
 OLE_EZ_burn_hjortland_desc:0 "Столица Олении, оплот грязи и вырождения. Раньше местные оленийцы копошились здесь, словно опарышы, поклоняясь своим мерзким богам грязи и вырождения. Теперь же мы уничтожим все святые памятники, каждую реликвию, а на алтари мы сложим горы оленийских трупов. Хотя... нет, этого недостаточно. Сама столица дегенеративного народа должна превратиться в сущий ад. Здесь не должна больше появиться жизнь, не должна расти трава, а Солнце не должно освещать руины Хъёртланда. Нужно более тщательное уничтожение не только оленийцев, но и самой природы, которая проклята грязным язычеством."
 OLE_EZ_toxic_researches:0 "Отряд 731"
 OLE_EZ_toxic_researches_desc:0 "Отряд 731 ("Einheit 731") - специальный отряд вооружённых сил Анти-Олении, занимающийся исследованиями в области биологического оружия, опыты производятся на живых оленийцах. В этом отряде проводятся опыты с целью установления количества времени, которое олениец может прожить под воздействием разных факторов (высушивание, лишение пищи, лишение воды, обморожение, воздействие кипятком, электротоком, вивисекция и другое)."
 
 
 OLE_EZ_but_theres_somthing:0 "§RМясорубка§!"
 OLE_EZ_but_theres_somthing_desc:0 "Я убью их всех. Я убью каждого. Я содру шкуру, содру кожу, буду вырывать их глаза и языки только для того, чтобы они осознали. О да, однажды они осознают. Но сейчас их ждёт только судьба, которой управляю я.\nЯ прекрасен. Я словно архитектор! Я композитор, писатель и филосов в одном лице. Я создаю мир, в котором нет их. Мир, живущий по новым законам, пока не уничтожит сам себя.\nВозможно, я являюсь Богом, что спустился сюда для спасения земли обетованной. Ведь я действительно безгрешен. По моей воле все язычники вспыхнули. Я вижу, как кучи трупов беспорядочно разбросаны по каждому городу Олении. Я вижу каждый город одновременно. Потому что все они одинаковые. Зловоние от трупов уже начинает кружить мне голову..."
 OLE_EZ_who_dies_first:0 "Кто сдохнет первым?"
 OLE_EZ_who_dies_first_desc:0 "Наши солдаты уже давно насилуют выжившее оленийское население как физически, так и морально. Давайте проверим, готовы ли они признать свою судьбу и отказаться от территорий, которые они сотни лет считали своими."
 OLE_EZ_second_wave:0 "Волна-2"
 OLE_EZ_second_wave_desc:0 "WIP"
 OLE_EZ_traitors:0 "Разобраться с бесхребетными предателями"
 OLE_EZ_traitors_desc:0 "Поступают сообщения о солдатах, которые не убивают оленийцев. Они отказываются выполнять свой священный долг. Сволочи, подонки, грязные черви - вот кто они. Таким кошмарным отродьям с их зловещими помыслами оставить оленей в живых нет места среди нас. Их место среди всего скотного двора. И они пойдут на убой, как и весь скотный двор."
 OLE_EZ_no_science:0 "Прогнать учёных"
 OLE_EZ_no_science_desc:0 "Разрушение стало не простым процессом - это теперь целый ритуал, полный символов и смысла. Разрушение - вот что есть эта земля, но не созидание. Учёные Ликтиды хотят приезжать сюда, дабы изучать трупы оленийцев, но мы им не позволим. Учёные - это созидатели, творящие науку, им нет места на земле разрушения."
 OLE_EZ_ritual_samoubiystva:0 "Ритуальные самопожертвования"
 OLE_EZ_ritual_samoubiystva_desc:0 "Звери на этой земле мрут, как мухи, как и должно быть. Но чейнджлинги остаются в живых. Страшная правда в том, что эта земля, превратившись в отдельную сущность, не потерпит тех, кто считает, что достоин жизни. Королева об этом не узнает: чтобы спасти нас, мы должны приносить себя в жертву. Вы же понимаете - это смертельная необходимость, иначе она разразится тысячей огней против нас..."
 
 
 OLE_EZ_corpses_corpses_corpses_corpses:0 "Трупы, трупы, трупы"
 OLE_EZ_corpses_corpses_corpses_corpses_desc:0 "WIP"
 OLE_EZ_erase_small_cities:0 "Только дымящиеся руины"
 OLE_EZ_erase_small_cities_desc:0 "В некоторых городах дикие звери уже были истреблены. Нет смысла держать там гарнизон.\n\nВозвращайтесь домой, ребята."
 
