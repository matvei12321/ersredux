 #### GUI
 OLE_extermination_name:0 "Степень §Rопустошения§! Олении"
 LYC_EZ_extermination_desc:0 "Когда §Rстепень опустошения§! достигнет §Y100%§!, солдаты Ликтиды покинут Олению, а Оления потеряет всё население и станет изолированной страной-пустошью."
 
 #### EVENTS
 
 ez.1.t:0 "Страх в их глазах"
 ez.1.d:0 "Дома были сожжены, семьи были убиты, земля была отравлена. Но этого недостаточно для Ауранции. Мы должны достичь того, чтобы Оления была опустошена, чтобы ни одно рогатое существо больше не смело ступать по этим землям.\n\n- Пусть первыми выйдут кобылы, а также самые младшие из вашего выводка!\n\nУже началось. Этот отряд чейнджлингов оккупировал и принял на себя задачу экстерминирования всех жителей небольшой деревеньки. Оленей под прицелом вышвырнули из их собственных домов, заставляя спотыкаться и падать своими отвратительными мордами в грязь. Деревенщин согнали на небольшую площадь, на которой они были вынуждены вместиться. Их окружало несколько солдат, готовых выстрелить в них в любой момент.\n\n- Повторяю ещё раз. МАТЕРИ И ДЕТИ, ВЫХОДИТЕ ИЗ ТОЛПЫ ВПЕРЁД!\n\n- Штантер, у меня есть подозрения, что они не понимают нашего языка. Посмотрите в их глаза. Они словно видят инопланетян. Они в ужасе, они не понимают, что происходит.\n\n- Хм.\n\nВсе они толпились в беспомощной шумной кучке. Какое жалкое зрелище.\n\n- Выйдите вперёд те из вас, кто понимает наш язык!\n\nЧейнджлинг сказал это грозно и чётко, и оленийцы притихли. Из толпы вышел один.\n\n- Ха. Ха-ха! Свинья вышла по зову хозяина. Ну и насколько ты владеешь нашим языком?\n\n- Пожалуйста... Не убивайте нас. Мы простой народ, нам многого не надо. Пожалуйста. Мы даже будем вам отдавать провизию, чтобы вы не голодали. Просто не трогайте-\n\nЧейнджлинг с усталым взглядом достал свой револьвер. В следующий момент тело оленийца упало в грязь.\n\n- Каков приказ?\n\n- Начинайте сгонять их вон в тот большой амбар. Мне кажется, они туда поместятся все."
 ez.1.a:0 "А амбар потом сожгите."
 
 ez.2.t:0 "На границе"
 ez.2.d:0 "- Ты уверен, что мы встретим что-то интересное, патрулируя вдоль границы? Это скучно. Я предлагаю остаться на посту.\n\n- Да ладно тебе! Давай, пройдёмся. А то так всю службу на посту и просидишь.\n\nДвое чейнджлингов охранали пост, находящийся неподалёку от Ликтидио-оленийской границы. Но с тех пор, как Оления капитулировала, они, по сути, охраняли границу между Ликтидой и колонией Ликтиды, поэтому ничего интересного не происходило. Их прогулка не должна была занять много времени.\n\n- Эй, смотри. Что это такое?\n\nВдалеке виднелись какие-то пики. Огромная линия из пик, торчащих из земли.\n\n- Ах, это. Так мы отграничиваем территорию Ликтиды и Олении. То есть, это и есть граница.\n\n- Подожди, это не просто пики. На них что-то есть...\n\nЧейнджлинги подошли ближе к границе. И правда - на пики были насажены черепа с рогами.\n\n- Креативно, правда? Это Ауранция придумала. Я бы даже сказал...\n\nДругой чейнджлинг согнулся - его стошнило прямо на месте.\n\n- М? Да ладно тебе, это ещё не столь страшно.\n\nВытирая морду салфеткой, чейнджлинг копытом указал на один из шипов. На него был насажен целый олениец. И, кажется, он был ещё жив, несмотря на то, что его проткнули ржавым металлом. Но, похоже, птицы не посчитали его живым, и на тело слетелась стая ворон, начавшая обклёвывать оленийца."
 ez.2.a:0 ""Это ещё не столь страшно"."
 
 ez.3.t:0 "Чёрный Бог"
 ez.3.d:0 "- Я несу смерть, следственно, я существую. Я пришёл на эту землю с единственной целью - и эту цель я выполню. Затем на костях и пепелище восстанет новое царство, моими поддаными станут Смерть и Горесть. И в новом царстве я стану известен как Веден, и стану я подобен богам за всё то, что я сделал."\n\nФон Кригер удобно расположил временную штаб-квартиру в бывшем оленийском храме. Оставаясь наедине, Кригер читал молитвы богам, известным лишь ему. Воистину, эта земля была обречена с тех пор, как Зверь ступил на неё."
 ez.3.a:0 "Я езмь Смерть, я езмь Разрушение."
 
 ez.4.t:0 ""Собираясь в поход...""
 ez.4.d:0 "Рядом с городом Ховенхамном расположился зловещий конценрационный лагерь, коих уже успело появиться великое множество в Олении. Лагерь не оборудовали в самом городе, потому что разрушения и концентрация газа в нём были невыносимыми для самых стойких солдат-чейнджлингов с лучшим снаряжением.\n\nУтром на улицу вывели пленных оленийцев. Их было несколько сотен или около того. Более точный подсчёт должен был осуществить сержант Горакс. Он был молодой и имел пылкий нрав, и когда началась война, он с радостью записался в добровольцы, чтобы "испытать новых ощущений на войне". Он убил немало солдат и был горд своим превосходством. Он мог во время обхода пристрелить любого оленийца - и ему бы ничего не сделали. С этими мыслями, присвистывая, он продолжил расчёт выстроившихся в колонну оленийцев. Но среди них он наткнулся на то, чего не ожидал. В колонне стоял и смотрел прямо на чейнджлинга маленький оленёнок. Совсем молодой, лет десяти. Горакс хоть и повстречал оленей на поле боя, но такого юного оления так близко он видел впервые. А малыш смотрел на солдата и что-то про себя мычал.\n\n- Ты чего мычишь? Хочешь неприятностей? Давай, помолчи, и никто тебе ничего не сделает.\n\nНо оленёнок не останавливался. Лишь тогда Горакс понял, что он напевает мелодию. Странную для чейнджлинга - она казалась одновременно меланхоличной и обнадёживающей. Не зная, как его остановить, Горакс просто пошёл дальше. Пройдя несколько пленных, он услышал, что и они начали напевать мелодию. Так, очень скоро вся цепочка оленийцев распевала народный мотив, вводя чейнджлингов в ступор. Со временем толпа осмелела, и вместо мычания оленийцы начали напевать слова песни на оленийском языке. Песня пронеслась по всему лагерю.\n\nК командиру лагеря привели оленийца-коллаборанта. Хотя с верхушки был приказ не жалеть никого, иметь возможность общаться с толпой оленийцев была очень кстати.\n\n- Что они делают?\n\n- Они поют, герр командир. Поют песню, которая стара, как мир.\n\n- Это ясно, ЧТО они поют?\n\n- Это песня о юном викинге, который влюбился в молодую оленийку. Но он решил, что будет игнорировать это чувство, и пойдёт в поход, грабить земли со своими товарищами. Во время похода викинг почувствовал, что что-то не так, и вернулся на родину. Там он обнаружил, что его дом был разрушен, и, что более важно - его любовь была похишена жуками-иноверцами с востока. Песня оканчивается тем, что викинг наконец признаёт, что любит оленийку и клянётся отправиться в земли неприятеля и, может, пожертвовать собой, чтобы спасти её.\n\nКомандир с презрением взглянул на толпу. У присутствующих чейнджлингов реакция была разная, но именно Горакс чувствовал что-то странное, вспоминая малыша. Что-то, что не давало ему покоя.\n\n- Ясно. Приказываю гарнизону пристрелить пару-тройку певцов, чтобы заткнулись.\n\nГоракс отправился выполнять приказ. Он без усилий пристрелил двоих взрослых самцов, но вновь наткнулся на того малыша. Оленёнок смотрел на него с ненавистью.\n\n- Ты... Это ведь ты виноват. Ты виноват, что их убили. Если бы не ты...\n\nВ его голосе звучала неестественная для солдата дрожь."
 ez.4.a:0 "Ты только что сделал себя злейшим врагом Ликтиды, а к врагам подход один."
 ez.4.b:0 "Хотя, ты ни в чём не виноват."
 
 # ez.5.t:0 "Разбейте их"
 # ez.5.d:0 "Двое снайперов в концентрационном лагере Хъёртланда наблюдали со своей вышки за жизнью внутри стен. Обычное дело, когда оленийцев выводят из клеток, а затем расстреливают по одному. Двоим снайперам уже поднадоело ставить ставки на то, кто сдохнет первым. И именно сегодня начался процесс, который привлёк их внимание.\n\nКак обычно, оленийцев выгнали в кучу, а затем построили их в несколько рядов. Перед колоннами оленийцев встал комендант лагеря. Снайперы не слышали, что он говорил, но он явно разразил тираду о чём-то серъёзном. Затем ему принесли ящик. Из ящика он достал некий мешок. Такой маленький, но снайперы видели, что в нём было что-то живое и шевелящееся. Комендант грозно поднял мешок ввысь, словно угрожая бросить его на бетонный пол, но из толпы выбежала некая оленийская самка. Было видно, что она взвыла, преклонившись перед комендантом. Снайперам это показалось нелепым и забавным зрелещем.\n\nЗатем комендант со всей силы ударил оленийку по морде свободным копытом, поливая её словесной грязью, словно коря за проступок. Со свёрстком, левитирующим от магии его рога, он подошёл к бетонной стене. Оленийка, только сейчас оправившаяся от удара, встала и вопила настолько истошно, что крик её голоса достиг снайперов, хотя слов было всё ещё не разобрать.\n\nКомендант подошёл к стене лагеря  почти вплотную. Собрав всю свою силу, он ударил мешком по вертикальному бетону. Затем ещё, и ещё, пока мешок не перестал дрыгаться и окрасился кровью изнутри.\n\nОленийка, смотревшая на это, молчала. На её морде застыло выражение ужаса и отчаяния, и вскоре она пала на землю без сил.\n\nКогда один из снайперов вернулся с перерыва, он рассказал, что случилось. Солдаты, наблюдавшие за процессом вблизи, сказали, что всё началось так. Вчера вечером трутни-смотрители обнаружили, что некая оленийка прятала новорождённого оленёнка..."
 # ez.5.a:0 ""Блажен, кто разобъёт о камень головы твоих младенцев.""
 
 ez.6.t:0 "Больше ничего"
 ez.6.d:0 "Солдат из западного лагеря номер 81 скучающе пялился в небо, затянутое чёрной пеленой. Говорят, что такое небо теперь везде - это дым от пожарищ, костров и печей, в которых прямо сейчас сжигаются трупы диких зверей. Каждый раз его физиономия наполнялась волнением, когда среди клуб дыма ему удавалось рассмотреть солнечный луч. Периодически эта идилия прерывалась сильным кашлем - как на зло, он был из тех, кому не достались противогазы. Он был вынужден вдыхать нефильтрованный отравленный смрадом химии и свинца воздух, хотя командир утверждал, что большого вреда здоровью это принести не должно. К нему присоединился сослуживец, и вот они уже оба смотрели на монотонное чёрное небо.\n\nЧерез несколько часов Ганс уже стоял на плаце вместе со всеми другими содатами. Их командир объявил, что наконец-то все солдаты могут вернуться домой. Разгласив о сборах, сроках и задачах, которые нужно выполнить перез отъёздом, командир отпустил солдат.\n\nВот Ганс уже собирает свои вещи, а также помогает своим в консервации временного лагеря.\n\nВскоре он уже мчался к колонне грузовиков, готовящейся к отправке. Солдаты курили и что-то между собой обсуждали, а кто-то был молчалив, но разделял всеобщую радость скромной улыбкой. Хотя, Ганс едва мог разглядеть истинные эмоции сослуживцев через противогазы. Как солдат, так и машины обработали какой-то чрезвычайно вонючей дрянью, говорят - дезинфекция.\n\nПо пути Ганс смотрел в окно кузова. Иногда на глаза попадались города, вернее, то что от них осталось. Чёрная земля и руины, дымящиеся и пустые, мелькали и исчезали, напоминая обо всех тех днях, что Ганс провёл здесь.\n\nЭто правильно. Слишком долго они засиделись на этой земле. Земле, которая отныне является отныне неофициально называлсь Мёртвой. Колонна грузовиков проехала через железные ворота, которые затем закрылись навсегда.\n\nУ Ганса не было семьи и он просто вернулся к одиночеству в свой небольшой дом. Даже когда он покинул Мёртвую землю, кашель не покинул его, а только усиливался, иногда выплёвывая кровь.\n\nГанс не попросил ни у кого помощи. Он просто лежал на кровати, смотря на небо через окно и радуясь, что в последние минуты видит синее небо."
 ez.6.a:0 "И никто не придёт."
 
 