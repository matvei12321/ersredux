OLE_currupt_government2:0 "Коррумпированное правительство"
OLE_currupt_government2_desc:0 "Правление короля Йохана «Дьявулена» Джелжека медленно разрушало моральные устои правительства и бюрократов. В настоящее время ничего не делается без привлечения взяток и даже после этого всегда требуется ещё немного. В результате богатые олени в Олении увеличили свое богатство и привилегии."
OLE_support_the_oligarchs_idea:0 "Поддержка олигархии"
OLE_support_the_oligarchs_idea_desc:0 "Мы решили встать на сторону крупных промышленников. К чему это приведёт? Увидим."
OLE_industrialists_idea:0 "Поддержка промышленников"
OLE_industrialists_idea_desc:0 "Нами было образовано Королевское управление оленийской промышленности. Тут крупные промышленники оказывают влияние на экономические реформы через своих представителей."
OLE_support_the_oligarchs_idea_full:0 "Коренная аграрная реформа"
OLE_support_the_oligarchs_idea_full_desc:0 "Мы решили встать на сторону крупных промышленников. А затем провели коренную аграрную реформу, отменив все дворянские привилегии. Но менять предстоит ещё многое."
OLE_support_the_oligarchs_idea_part:0 "Частичная аграрная реформа"
OLE_support_the_oligarchs_idea_part_desc:0 "Мы решили встать на сторону крупных промышленников. А затем провели умеренную аграрная реформу. Наметился постепенный рост экономики."
OLE_free_capitalism:0 "Олигархократия" 
OLE_free_capitalism_desc:0 "Государство покинуло рынок. И вся экономическая власть оказалась в копытах крупной буржуазии. А вместе с экономикой их власть давлеет и над политикой. Впрочем, мы не желауемся: экономика растёт. А вместе с ней растут и наши общие опетиты: и мы и олигархи хотим одного - новые земли, новых рабочих, новые ресурсы"
OLE_support_the_oligarchs_idea_fullstate:0 "Социально-ориентированная смешанная экономика"
OLE_support_the_oligarchs_idea_fullstate_desc:0 "Дворянство и крупные землевладельцы были полностью стёрты с наших земель. После чего государство и Корона встали на стражу рынка, прогресса и простых оленей. Король направляет экономику и наших граждан, и все как один подчиняются его приказам!"
OLE_support_the_oligarchs_idea_partstate:0 "Союз всех сословий"
OLE_support_the_oligarchs_idea_partstate_desc:0 "Социальное сотрудничество и духовное доверие между всеми классами, кастами и группами интереса двигает нашу страну вперёд. Солидарность и стремление к компромиссу под чутким руководством Короля приведут нашу нацию к процветаю. Как единое целое!"
OLE_support_the_noble_families_idea:0 "Поддержка дворянских семей"
OLE_support_the_noble_families_idea_desc:0 "Мы решили встать на сторону знати. К чему это приведёт? Увидим."
OLE_support_the_noble_families_idea_part:0 "Поддержка дворянских семей"
OLE_support_the_noble_families_idea_part_desc:0 "Мы решили встать на сторону знати. А затем провели умеренную аграрная реформу. Наметился постепенный рост экономики."
OLE_support_the_noble_families_idea_no:0 "Поддержка предприимчивых крестьян"
OLE_support_the_noble_families_idea_no_desc:0 "Знать и крупные землевладельцы более не боятся за свои земли. Вместо них мы решили сделать упор на крестьянах, которые проявили задатки предприимчивости - выкупили землю или пока ещё арендуют её, но уже работая на самих себя или даже нанимая других сезонных работников. Запустив программу выдачи льгот, кредитов и субсидий для таких уникумов мы безусловно разовьём конкуренцию в стране."
OLE_support_the_noble_families_idea_nomer:0 "Меритократическая иллюзия"
OLE_support_the_noble_families_idea_nomer_desc:0 "Дворяне управляют государством. Чиновники работают над законами. Служащие исполняют решения. Рабочие работают на заводах. Крестьяне пашут. А солдаты - защищают нацию. Все строго на своих местах, в соответствии со их талантами и заслугами. Впрочем, ничто не мешает усердному человеку прорасти выше. Если он достаточно умён, трудолюбив и... хитёр."
OLE_support_the_noble_families_idea_partstate:0 "Клановая диктатура"
OLE_support_the_noble_families_idea_partstate_desc:0 "После череды реформ в стране образовались несколько корпораций, принадлежащих разным дворянским кланам. И единственная конкуренция, которая осталась в стране, это конкуренция между этими кланами: за сырьё, за товары, за власть. Каждый рабочий верен своей корпорации как своей семье. И только в борьбе его жизнь обретает смысл. И эта бесконечная борьба и есть то, что движет нашу страну вперёд." 
OLE_support_the_noble_families_idea_nostate:0 "Бюрократический нобилитет"
OLE_support_the_noble_families_idea_nostate_desc:0 "Хотя в стране и развивается рыночная экономика, а во главе стоит Сенат с лучшими из лучших дворян, но, фактически, экономическая и политическая власть осуществляется черех огромный бюрократический аппарат. Указы исполняются, но после кучи инстанций они исполняются уже в намного другом виде. Впрочем, с другой стороны это ограничивает и власть самих дворян. Таким образом бюрократический аппарат выступает в роли весов, удерживающих положение в эдаком равновесии. Разрастаясь, чтобы удовлетворять нужды разрастающейся бюрократии."
OLE_land_owners_idea:0 "Поддержка землевладельцев"
OLE_land_owners_idea_desc:0 "Имущественный ценз на парламентских выборах был реформирован в пользу крупных землевладельцев. Теперь вес их голоса самый тяжёлый."
OLE_reinforce_old_hierarchies_idea:0 "Старые иерархии усилены"
OLE_reinforce_old_hierarchies_idea_desc:0 "Кастовая система продолжает определять судьбу человека. Зато каждый на своём месте. И когда каждый знает свою цель - только тогда мы можем действовать как единый механизм. Под властью Короля."
OLE_reinforce_new_hierarchies_idea:0 "Классовая система"
OLE_reinforce_new_hierarchies_idea_desc:0 "Касты были оконгчательно разрушены и наша экономика смогла вздохнуть спокойно. Теперь каждый, кто докажет свою полезность своей предприимчивостью, пройдя имущественный ценз, с лёгкостью может перейти в другой класс. Или же наоборот - упасть с пьедестала..."
OLE_a_dynasty_to_last_idea:0 "Династия на века!"
OLE_a_dynasty_to_last_idea_desc:0 "Правление короля Йохана неоспоримо и абсолютно. Несогласные подвергаются арестам и казням."
OLE_a_dynasty_to_last_idea2:0 "Династия на века!"
OLE_a_dynasty_to_last_idea2_desc:0 "Правление короля Йохана неоспоримо и абсолютно. Несогласные подвергаются арестам и отправляются отрабатывать свои преступления в лагеря."
OLE_raising_dissent:0 "Нарастающие разногласия"
OLE_raising_dissent_desc:0 "Правлению короля Йохана сопротивлялись с самого начала, но жёсткие меры гарантируют, что открытого восстание не произойдет. Тем не менее, одна искра может изменить все это..."
OLE_empowered_church_idea:0 "Привилегии церкви"
OLE_reopen_the_seers_college_idea:0 "Колледж Провидца"
OLE_underdeveloped_economy:0 "Неразвитая экономика"
OLE_the_true_queen_idea:0 "Гармонисты-диссиденты"
OLE_the_changeling_threat_idea:0 "Угроза Чейнджлингов"
OLE_the_changeling_threat_idea_desc:0 "Независимо от их положения или роли в жизни, каждый олень беспокоится о надвигающейся угрозе со стороны чейнджлингов. Они должны быть готовы к ним."
OLE_all_stags_must_serve_idea:0 "Все олени должны служить"
OLE_all_stags_must_serve_idea_desc:0 "Каждый олень гордится тем, что сражается ради Олении против черного роя. Мы будем сражаться, если нас вынудят."
OLE_strike_first_idea:0 "Подготовить атаку"
OLE_strike_first_idea_desc:0 "Жуки - слабы, а их угрозы пусты. Мы ударим по их ульям и сожжём их все!"
OLE_let_them_come_idea:0 "Подготовить защиту"
OLE_let_them_come_idea_desc:0 "За каждую захваченную милю нашей земли, чейнджлинги заплатят десятками своих жизней!"
OLE_squash_the_bugs_idea:0 "Оления твердо стоит"
OLE_squash_the_bugs_idea_desc:0 "Оления уже пережила множество штормов, и это ещё один, который нужно преодолеть. Мы не падём! Боевой дух оленей победит хищных насекомых!"
OLE_changeling_advisors_idea:0 "Чейнджлинги-советники"
