OLE_husband:0 "Муж-олень"
OLE_husband_desc:0 "Официальным браком Король Дьявулен является Королём-консортом при Королеве Чейнджлингов."
OLE_helvia_waifu:0 "Хельвия - жена"
OLE_helvia_waifu_desc:0 "Официальным браком Королева Хельвия и Король Дьявулен стали мужем и женой и теперь совместно правят государством. Способности Королевы в бизнесе помогают развитию экономики нового единого государства, но поговаривают, что она также неофициально покрывает различных левых и профсоюзных деятелей."
OLE_arginis_waifu:0 "Аргиннис - жена"
OLE_arginis_waifu_desc:0 "Официальным браком Королева Аргиннис и Король Дьявулен стали мужем и женой и теперь совместно правят государством. Способности Королевы Аргиннис, её воля, твёрдость и амбициозность помогают Королевству становиться единым функциональным дисциплинированным механизмом для дальнейшего расширения на Восток."
OLE_yaria_waifu:0 "Ярия - жена"
OLE_yaria_waifu_desc:0 "Официальным браком Королева Ярия и Король Дьявулен стали мужем и женой и теперь совместно правят государством. Способности Королевы Ярии, её тяга к науке, прагматизм и беспринципность создают уникальные условия в виде разветвлённых сетей НИИ, появлению академгородков и развёртыванию научно-медицинских концлагерей для содержания прочих рас, кроме оленей и чейнджлингов, и проведения массовых экспериментов над ними."
