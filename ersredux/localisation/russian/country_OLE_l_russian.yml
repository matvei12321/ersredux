OLE_currupt_government:0 "Коррумпированное правительство"
OLE_currupt_government_desc:0 "Правление короля Йохана «Дьявулена» Джелжека медленно разрушало моральные устои правительства и бюрократов. В настоящее время ничего не делается без привлечения взяток и даже после этого всегда требуется ещё немного. В результате богатые олени в Олении увеличили свое богатство и привилегии."
OLE_currupt_government3:0 "Коррумпированное правительство"
OLE_currupt_government3_desc:0 "Правление короля Йохана «Дьявулена» Джелжека медленно разрушало моральные устои правительства и бюрократов. В настоящее время ничего не делается без привлечения взяток и даже после этого всегда требуется ещё немного. В результате богатые олени в Олении увеличили свое богатство и привилегии."
