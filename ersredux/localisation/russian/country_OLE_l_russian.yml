 OLE_lilak_desc:0 "Хотя Лилак обучалась в престижной военной академии Весалиполиса, она, тем не менее, занималась административной работой в генштабе королевы. Пока её товарищи зарабатывали славу для Земель Чейнджлингов на поле боя, Лилак сидела в Весалиполисе, пресмыкаясь перед Кризалис. Однако её служба при королеве, кажется, окупилась, хоть и не так, как она рассчитывала..."
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
 
