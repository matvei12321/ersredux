 #### EVENTS
 dodge.1.t:0 "Полёт мысли"
 dodge.1.d:0 "Чёрная ночь.\n\nФигуры с факелами.\n\nОни так громко кричат...\n\nСопротивление. Подчинение. Изничтожение."
 dodge.1.a:0 "Что это?.."
 
 dodge.2.t:0 "Рабы для наших нужд"
 dodge.2.d:0 "Тёмной ночью саранцисты и их союзники из других демонопоклонческих культов объединились и пересекли юго-западные границы. Там они наткнулись на несколько незащищённых поселений бизонов. Это была большая удача, так как бизоны вместо оседлого образа жизни предпочитают свободный кочевой быт.\n\nНекоторые бизоны, особенно взрослые и молодые самцы, яростно защищали своих родных и близких. Но у культистов было преимущество в виде магии. Защитники пали.\n\nПотом произошёл ещё один курьёз - никто из оставшихся бизонов не соглашался покидать родной дом. Чтобы решить эту проблему, саранцисты сожгли дома и изуродовали трупы бизонов-защитников.\n\n- Теперь у вас нет дома, нет тех, кто был готов вас защитить. У вас нет выбора! Присоединяйтесь к нам!\n\nТе, кто уже не мог сопротивляться и был подавлен, с пустыми взглядами, закованные в ржавые цепи, пошли за налётчиками. Кто не хотел идти - был забит до бессознания, и их туши пришлось носить с помощью совместной магии.\n\nИх насильственно вырвали из своего дома, и, прибыв в Додж-Сити, они в миг потеряли все свои права. К ним каждый мог относиться, как к расходному материалу. Дети же не понимали, что происходит, и всё время спрашивали взрослых бизонов, когда они вернутся домой."
 dodge.2.a:0 "Они никогда не вернутся к прежней жизни."
 
 dodge.3.t:0 "Город, который никогда не увидит света"
 dodge.3.d:0 "Грязные и шумные улицы, шлюхи, фанатики и работорговцы - казалось, что существование такого дикого места вблизи Святых Земель невозможно, но оно существовало вопреки здравому смыслу. Додж-Сити всё своё существование тянул себя в бездну, но каким-то чудом стабильно держался и, в каком-то смысле, развивался. Если, конечно, увелчиение объёмов работорговли в последнее время можно назвать развитием.\n\n-Эй, уважаемый! Не подскажете, кто у вас тут за главного? Мы тут привезли живого товара - гиппогрифы - морская экзотика!\n\n- У нас здесь нет главных. Если вы хотите торговать, как весь цивилизованный мир, за деньги, вам лучше уйти в Эпплузу.\n\n- Не за деньги? Не вопрос! Примем любое встречное предложение, только вот кто всё-таки тут всем командует?\n\nОтветов грифоны-работорговцы не получили. Они прибыли из Вингбардии сюда - и всё зря? Но, к счастью, они получили наводку на некоего "Валентайна", мол, он и его банда считают себя лидерами в этих землях. Они нашли его. Но после пяти минут переговоров, они решили свалить из города и больше никогда не возвращаться на этот проклятый континент.\n\n- Блядь, Кастелло, чё это за хуйня была?\n\n- Ты не понял? Он конченый. Слетевший с катушек. Пизданутый! И весь город такой. Говорил я тебе, что в Зебрике стабильная торговля, а здесь? Хорошо хоть, что мы уцелели, и с товаром ничего не произошло. Кстати о птичках. Что-то они там притихли...\n\nОни перевозили рабов на машинах, в клетках, которые были закрыты в больших кузовах. Проверив клетки, они увидели лишь кровавые ошмётки и истерзанные тела гиппогрифов. К черепу одного из них была намеренно прибита записка..."
 dodge.3.a:0 "§R"Возвращайтесь в наш уютный городок!"§!"
 
 dodge.4.t:0 "Самый большой жертвенник в мире"
 dodge.4.d:0 "Саранцисты долгое время суетились и что-то строили на окраине Додж-Сити. И они начали этот загадочный проект не месяц и не год назад. Даже с магией единорогов непонятная всем постройка несколько лет находилась в состоянии строительства. Что это было - никто не понимал.\n\nНо теперь, когда саранцисты захватили сотню крепких рогатых рабов, дело пошло куда быстрее. То ли потому, что бизоны могли перевозить тонны грузов в день, то ли потому, что единороги за счёт их жизненной энергии усиляли свою магию. Вероятнее всего, и то и другое. В итоге, в рекордно быстрые сроки было завершено...\n\nНечто.\n\nЭта конструкция не походила ни на крепость, ни на какое-то адекватное здание. В большинстве своём бесформенное, украшенное уродливыми шипами и черепами разных существ, оно стояло на невозможно тонких опорах. Это было достигнуто за счёт использования Чёрных Камней из одноимённой шахты. Этот материал мог воистину творить чудеса и ломать все законы магии и строительства. Например, как города пегасов на облаках.\n\nНо если облачные города вроде Клаудсдейла выглядят эстетически красивым элементом пегасьей культуты, то эта конструкция лишь вызывла отвращение и головную боль каждого, кто пытался понять, как она вообще стоит. Когда здание было закончено, зевакам было любопытно посмотреть на него со всех сторон. И каждый выдвигал свои предположения, что это такое.\n\nОдин земной пони осмелился подойти непосредственно к саранцисту и прямо задал вопрос, что это за "неведомую хрень они установили". Ответ последовал незмамедлительно, и культист произнёс его с такой жуткой интонацией, что у пони пробежали мурашки по спине."
 dodge.4.a:0 ""Это Алтариум, место разрывания душ. И твоя душа тоже окажется там.""
 
 dodge.5.t:0 "Разрывая плоть, время назад пойдёт"
 dodge.5.d:0 "Это не конец. Я ЗНАЮ Я ЗНАЮ Я ЗНАЮ Я ЗНАЮ\n\nМои возможности ограничены. Я застрял в этом потоке стали и стекла. Грязь льётся по моим венам. Очистить меня может только она. Но где она где она ГДЕ ТЫ\n\nИскусство плоти - искусство во плоти\n\nМой разум обновится, всё обновится, сейчас я не могу ничего сделать.\n\nОстаётся только ждать. Я буду ждать обновления Вселенной. И ТОГДА Я НАЧНУ ВСЁ С НАЧАЛА."
 dodge.5.a:0 "Я найду тебя, моё сияние. Любой ценой."
 and_we_will_cry:0 "§RИ весь мир зарыдает от нашего несчастья.§!"
 
 dodge.6.t:0 "Ода"
 dodge.6.d:0 "Когда часы пробъюь двенадцать\n\nИ кто-то тень мою найдёт\n\nЯ НЕНАВИЖУ Я НЕНАВИЖУ Я НЕНАВИЖУ\n\nОно идёт"
 dodge.6.a:0 "В королевстве кривых"
 
 dodge.7.t:0 "Вся нечистая сила пирует в моей голове"
 dodge.7.d:0 "§RМНЕ НУЖНА ТВОЯ АРТЕРИЯ§!\n\nОкружение Валентайна было довольно... своеобразным. Не принимая во внимание голоса и демонов в его разуме, его сопровождпли вполне реальные существа. Взять, хотя бы, Потерянного.\n\nКогда-то в землях Весалиполиса жил чейнджлинг. И он ненавидел своё тело. Он был глубоко убеждён, что он родился чистокровным единорогом в Юникорнии, но омерзительные жуки украли его из утробы кобылы-единорогини и превратили в себе подобного. Каждый день он пытался избавиться от постоянно чещущейся оболочки тошнотворного создания, которое именуется "чейндджлинг". В один день его боль стала настолько сильной и невыносимой, что он в ярости содрал с себя весь жучий хитин с крыльями до мяса. Тогда он решил, что начнёт своё перерождение с получения настоящего меха единорога.\n\nПроникнув в Юникорнию, он выпотрошил одного  бездомного бедолагу. Он применил нити, что украл из местного бутика, чтобы пришить истинно-чистую оболочку к совему телу. И у него получилось! Но общество единорогов отвергло его. Он был слишком уродлив для них.\n\nПокинув родной дом, Потерянный много лет скитался по Эквусу, пока не обосновался в Додж-Сити. Там он встреитл Валентайна - единорога, который смог принять его натуру. С тех пор Потерянный бесприкословно служит делу культа."
 dodge.7.a:0 "Я покажу тебе настоящую кровь из земли."
 
 dodge.8.t:0 "Я могу видеть в прошлое"
 dodge.8.d:0 "Эту комнату вполне можно было назвать кабинетом Валентайна. Без окон, без дверей, без стен, без пола, без потолка, без воздуха. Валентайн знал, как здесь нужно находиться. Он даже обустроил небольшую кровать из соломы, чтобы после своих видений просыпаться не на жёстком и грязном полу. Это и было единственным предметом интерьера.\n\nВсе опытные маги в культе знали, что вход в это пространоство убъёт всех, кроме Понифера, поэтому никто не смел побеспокоить его, когда он там запирался.\n\n"Мне кажется, что у Мастера там проблемы со здоровьем. Должны ли мы ему помочь?"\n\n"Нет, Май. Ты ещё молод и не понимаешь всей нашей системы. Просто жди... И Он вернётся с новой проповедью, которую услышит от божественных уст".\n\nВ это время Валентайн лежал на импровизированной кровати. Он весь покрылся потом, глаза покраснели и заливались влагой, а горло терзал нестерпимо резкий кашель, словно внутри сами собой образовались тысячи ржавых ножичков. С каждым кашлем из него выходило немного крови. Красной и грязной.\n\nНо Валентайн наконец дождался. Из стен вышли пророчицы сегодняшнего дня. На этот раз это были три гарпии.\n\n"Тебе нужна тысяча молодых жеребят. Убей треть из них, а на остальных построй свой Дом", молвила первая.\n\n"Узнай её и не забудь. Кровь на камнях никогда не должна остыть", молвила вторая.\n\nТретья лишь шипела и билась в конвульсиях, изрыгая гной из раны на шее.\n\nНесколько часов члены культа ждали своего Мастера. Но лишь на следующий день он смог выйти, весь покрытый тошнотворными массами, кровью и прочей неописуемой грязью.\n\n"Снаряжайте... экспедицию в Чернокаменны шахты... И приготовьте чистую книгу с пером... Сделайте мне надрез в области шеи... Ещё столько всего... нужно...\n\n"Мастер, что же вы, держитесь на копытах! Вам нельзя падать на землю!"
 dodge.8.a:0 "А будущее вырывает мои глаза"
 
 dodge.9.t:0 "Падающие колесницы"
 dodge.9.d:0 "Имя: Май. Должность в культе: младший помощник аббрезиатора. Возраст - 15,5 лет. Раса - единорог. Сознание - стабильно в порядке.\n\n"Старший Аббрезиатор, у меня есть вопрос. Валентайн существует? Просто за всё время, пока я здесь, я ни разу не видел его вживую."\n\n"Его не существует. Он - вымысел песков и времени, рождённый из фантазии черноты. По крайней мере, так он говорит... А то, что он говорит - является константой, единственным верным определением."\n\n"Так вы видели его или нет?"\n\n"Конечно. Он вполне материален... Не отвлекайся, нам нужно продолжать твоё обучение. Второй основой кровопускания из чужого тела является правильное видение души..."\n\nПо сути, младший помощник Аббрезиатора должен был не мешаться во время работы и подавать мастеру различные материалы, а также быстро обеспечивать Аббрезиатора энергией. Говорят, что каждый сорванный с дерева листок убивает чью-то жизнь.\n\nМай не особо понимал, зачем он пришёл сюда. Возможно, он просто не хотел умереть со скуки в этом омерзительнос во всех смыслах городе.\n\nИ в один день, он встретил Его.\n\nОни пересеклись взглядами в тёмном переулке. В фигуре в плаще, покрытом свежей кровью, Май узнал Валентайна. От ужаса он не мог говорить или хотя бы пошевелиться. А Понифер стоял также неподвижно, мёртвым и явно отделённым от реальности взглядом всматриваясь в глаза юного единорога.\n\nОн же и прервал молчание спустя несколько минут.\n\n"Со временем ты узнаешь, сколь велики были мои неудачи."\n\nСказав эту единственную фразу, Валентайн обошёл Мая и скрылся за поворотом."
 dodge.9.a:0 "Новая северная земля"
 
 dodge.10.t:0 "Скоро время..."
 dodge.10.d:0 "Внеочередное, срочное собрание Культа. Все саранцисты собрались перед лидером - он казался шокированным, по-настоящему испуганным. §RГрань была безвозвратно пробита.§!\n\n"ВРЕМЯ! РАЗБЕЙТЕ ВСЕ ЧАСЫ!"\n\n"Мастер, мы говорим единым разумом от того, что видели невыносимое. Мы терпим боль столь сильную, что сама земля стонет от наших страданий."\n\n"ЭТО ВСЁ ВРЕМЯ! РАЗБЕЙТЕ ЧАСЫ, ИХ ОСКОЛКИ ПРОГЛОТИТЕ! ИНАЧЕ ВРЕМЯ ПОЙДЁТ НАЗАД!"\n\n"ЧТО? Не может быть, Мастер-"\n\n"Уже поздно. Мы все опоздали. Есть лишь один выход... Я УБЬЮ ВСЕХ! ВСЕ УБЪЮТ МЕНЯ! ЗДЕСЬ, СЕЙЧАС! СКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!"\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!\n\nСКОРО ВРЕМЯ ПОЙДЁТ НАЗАД!"
 dodge.10.a:0 "§RРАССКАЖИТЕ ОБ ЭТОМ КАЖДОМУ§!"
 
 dodge.11.t:0 "..."
 dodge.11.d:0 ""Ну так что вас всё-таки беспокоит, уважаемый?"\n\n"Вы знаете, поток мыслей пронзает мне голову. Вот... поток. Знаете, словно мысль растекается по дереву, звучат голоса в голове, прячутся от меня, играют в хороводы, то вспоминаю одни песни, то другие, то мне навязывает слова, то небесная ко-."\n\n"Так, секундочку, подождите... Что значит "звучат голоса в голове? Чьи это голоса?"\n"Пожалуйста, ответьте, это важно."\n\n"Это Её голос. Она отнимает мои мысли, да. Губит и подстраивает свои мысли в меня. Я вижу себя со стороны и мне кажется, что я могу сделать всё. Я расскажу вам о небе. Однажды оно смотрело на меня..."\n\n"Знаете, мы... я знаю одно место. Там работают хорошие специалисты. Они ещё могут вам помочь."\n"Что случилось? Я что-то не так сказал?"\n"Пожалуйста, вот успокоительное, давайте всё ещё раз обсудим!"\n"Если уйдёте сейчас, в будущем у вас шанса не будет.""
 dodge.11.a:0 "§1§!§2!§!§b"§!§5Й§!№)§3;*§!Г?(§R9§!""
 
 dodge.12.t:0 "Прошлое"
 dodge.12.d:0 "Это произошло около года назад в юникорнийской Академии одарённых единорогов. Проводились выпускные экзамены, и каждый демонстрировал перед преподавателями свои полученные за годы обучения и практики знания.\n\nНо в тот день... одна студентка-единорог устроила скандал.\n\n- Что это значит? Почему совет директоров исключает меня, профессор Йозес?\n\n- Уважаемая, такой грязной магии, которую ты нам тут показала, нет места в великой Юникорнии! Это аморально, не этично, это варварство! Именно поэтому совет директоров уже принял решение о твоём исключении.\n\n- Я даже не продемонстрировала свои способности в полную силу! Да, у нас такую магию не преподают, но поверьте, я достигла в ней таких высот, которые позволят-\n\n- РОЗА МАЛЕДИКТА! Убирайся из Академии, грязная некромантка! И ещё лучше, убирайтся из этой страны, потому что власти очень скоро узнают о твоих ужасающих практиках. Тогда тебя точно ждёт судьба, которую заслуживает каждый, кто издевается над мёртвыми.\n\nТогда Роза решила, что никогда не вернётся в это общество. Она долго искала место, где её дар примут, и в один день она его нашла. Додж-Сити. В этом городе её приняли такой, какая она есть. Особенно оценил её способности Понифер Валентайн, лидер местных магов. Хотя его культ специализировался на несколько другой магии, некромантические способности Розы могут здесь пригодиться.\n\nТак она присоединилась к культу саранцистов."
 dodge.12.a:0 "Здесь её новый дом."
 
 dodge.13.t:0 "Хоть розой назови её..."
 dodge.13.d:0 "Меня зовут Роза Маледикта, и я живу в Додж-Сити уже достаточно долгое время. И я не скажу, что мне здесь нравится.\n\nДа, я могу здесь практиковаться и улучшать свои навыки некромантии в открытую, и никто и слова об этом не скажет. Культ Валентайна даёт мне... защиту? Хотя против местных пьяниц и прочих грязных бандитов я и сама могу справиться. Всё же, я не понимаю, зачем нужен культ саранцистов. Они всё время что-то делают, но их действия никогда не приводят к какому-то результату. И, этот Понифер... Я всё ещё не привыкла. Он говорит так, что его невозможно понять, если мыслить логически. Нужно мыслить, как... Как сумасшедший. Я не хочу сходить с ума. Хотя, мне кажется, что скоро сойду.\n\nНедавно я проходила по улице от своего дома до кладбища, чтобы набрать свежего материала. Но кто-то с верхних этажей скинул на меня ведро с... мерзостью. Помои, и кажется, чьи-то испражнения попали на меня. Я знаю, что должна быть сильной, но это немного вывело меня из себя. Я поднялась на второй этаж того дома и одим заклинанием распотрошила его владельца.\n\nНо это не всё. Я проводила межпространственный ритуал призыва, требующий особенной концентрации и больщого количества энергии. Резко прерывать его нельзя ни в коем случае, иначе может случиться непоправимое. И пока я, полностью сконцентрированная, проводила ритуал, в мой дом вломился какой-то неадекватный псих. Я могла его прогнать или убить,  но мне ни в коем случае нельзя было прерывать ритуал. Этот псих перевернул в моём доме всё вверх дном, разбил различные алхимические образцы, по-дикому скакал вокруг меня. Он даже пытался сделать со мной... непотребства. Но прерывать ритуал я НЕ могла.\n\nКак на зло, призываемые духи Севера не ответили. Когда я убедилась в этом, я осторожно закончила ритуал и убила того дикаря. Его труп я отдала Пожирательнице, которую недвно приручили пешки Валентайна.\n\nТакое происходит почти ежедневно. Я не знаю, сколько ещё продержусь. Я иногда думаю о самоубийстве. Но во время того ритуала, я почуствовала что-то... духи Севера мне не ответили, но они точно позвали меня. На другой континент, на Север. По какой-то причине я чувствую, что нужна именно там. И я не вижу ни одной причины оставаться здесь."
 dodge.13.a:0 "Север Грифонии зовёт меня."
 dodge.13.b:0 "Но я останусь здесь..."
 
 dodge.14.t:0 "Приготовления"
 dodge.14.d:0 "Единорог поднял кинжал над обездвиженной жертвой. В её глазах не было ничего, кроме дикого ужаса. Эту земную пони схватили, заперли в сыром подвале и не выпускали несколько дней - таков был приказ Валентайна.\n\n- Я вверяю плоть этой жертвы божественному голосу. Да будут её раны многочисленны, а оставшиеся дни скоротечны. Проливая кровь врагов наших, мы становимся на шаг ближе к бездне. УСЛЫШЬ!\n\nОчередная жертва была принесена. Осталось лишь доставить Мастеру то, что ему было нужно.\n\n- Нет, нет, нет, нет, нет, нет, это не подходит. Нам всё ещё нужно сердце чёрных созвездий. Она же не с ними связи не имела... теперь исчезни."
 dodge.14.a:0 "Мы будем вспоминать тебя с истинной любовью."
 
 dodge.15.t:0 "Надежда на спасение"
 dodge.15.d:0 "Покончить с Додж-Сити и уничтожить Понифера Валентайна - это была цель их жизни на данный момент. Группа священников (24 земных пони из Пандории) пересекла черту, где стираются границы морали и чести. Они пришли к Додж-Сити.\n\n- Святой Отец Энрико, - начал жаловаться самый молодой священник, - мне не по себе от этого места. Если сама Инквизиция не смогла одолеть чёрную силу этих мест, то что сможем сделать мы?\n- Не бойся тьмы, дитя. Как только Пандора услышит наш зов, мы будем в безопасности. Мы  сможем очистить эти земли от скверны, которая её пожирает. Нам нужно лишь найти того, чьё сердце черно, а разум полон немоизмеримой ненависти к самой реальности.\n\n\n\n- Святые паломники? Я вам всем оторву ваши чресла, ЧТО ЭТО ЗНАЧИТ?! УНИЧТОЖЬТЕ ИХ УНИЧТОЖЬТЕ ИХ УНИЧТОЖЬТЕ ИХ! РАЗБЕЙТЕ ИМ СПИНЫ!\n- Мастер, мы бы с радостью преваликсировали их, но у них есть Оно. Распятие. Мастер?..\n\nВалентайн упал на пол прямо на глазах у своих подчинённых. Приняв позу эмбриона, он достал ржавый скальпель из-под своего плаща и начал медленно выводить им какие-то символы на лбу. Нет, даже не символы... он просто нежно делал надрезы.\n\n- Если у этих гнилых ходячих масс есть Распятие... выпускайте Пожирательницу, - такой он отдал приказ, так и не встав с пола. От боли от порезов его глаза намокли, и слёзы смешались с тонкими ручейками крови.\n\nЭтот приказ был услышан. Не всем понравилась идея выпускать нечто, что пожирало всю живую материю на своём пути. Но если таков был приказ Валентайна...\n\n\n\nПаломники уже были в Додж-Сити. И даже успели психологически излечить некоторых его обитателей. Кого-то получилось настроить против саранцистов, а кто-то набрался смелости, чтобы бежать. Паломники оказывали помощь всем на своём пути, принося мир и спокойствие в Додж-Сити.\n\n- Святой Отец... Несмотря на все наши успехи, я чувствую злое присутствие. Кажется, нас ждёт ужасающая ночь."
 dodge.15.a:0 "Только вера спасёт нас."
 
 dodge.16.t:0 "Конец кровавого гнёта"
 dodge.16.d:0 "- Остановитесь. Я чувствую его присутствие: он рядом и жаждет смерти...\n\nПаломники долгое время освящали Додж-Сити. Они встречались с каждой душой, которая была поражена злом этого города. Но несмотря на то, что Додж-Сити не был таким уж и большим городом, всё это время у них не было никаких зацепок о том, где искать сердце чёрной магии - Валентайна. Через месяц и несколько дней они смогли выследить его и логово его культа.\n\n- Слушайте, что говорит вам Свет, и будет ваша жизнь сохранна. Мы не имеем права погибнуть здесь. Мы выполним священную миссию. - Святой отец был, как всегда, невозмутим. Благословение Пандоры давало ему силу пережить всё это.\n\nНо, ко всеобщему удивлению, не паломники покончили с гниющим злом.\n\nОни обнаружили ужасающую картину. Молодой единорог склонился над окровавленным и изуродованным телом другого единорога, одетого в тёмный плащ. Тёмно-красные глаза давно не показывали признаков жизни, но Май продолжал вонзать ритуальный клинок в бездыханное тело Валентайна. Раза за разом, пока не заметил священников. На мнгновение он остановился и осознал, что сделал.\n\n- Я... Это... Это были голоса. Они заставили меня это сделать. Но ведь я не сошёл с ума, как он. Я не убил его. Я не убил его. Я НЕ УБИЛ ЕГО!\n\n- Юноша, не нужно паниковать. Голос, что ты слышал, был голосом Пандоры. Земля страдала от всего того, что этот грешник творил. Твоё деяние не убиение, ведь ты - спаситель.\n- Правда?..\n- Да, это так. А теперь, скажи мне, есть ли в этом городе ещё души, которые следовали за ним?\n\n- Нет... По крайней мере, я так думаю. В последние дни члены культа начали исчезать, а я начал слышал голос, который приходил ко мне во снах. Он говорил мне убить его...\n\n- Распятие, что было у нас. Вот, что направляло тебя на этот путь.\n\nС Понифером было покончено. Священники нашли ст=отни останков бизонов по всему городу и почётно захоронили их. Ужасающее бесформенное строение - Алтариум - было уничтожено. Тело Понифера было сожжено под молитвы паломников, а Май, который изначально присоединился к ужасающему культу, вступил в ряды паломников. Кажется, он нашёл своё истинное призвание."
 dodge.16.a:0 "Аминь."
 
 dodge.17.t:0 "Счастиливый финал"
 dodge.17.d:0 "Додж-Сити был простым и неприметным городком на окраине Пандории. По неизвестным причинам, индустриализация не дошла до него. Но к счастью, власти страны [ERP.getname] наконец обратили внимание на эту пустынную область.\n\nЭтот город был в довольно скверном пооложении, но благодаря группе добровольцев-апостолов, порядок был частично восстановлен. При поддержке пандорийской полиции преступники были пойманы, и город стал приемлем для проживания в нём. Всё возвращается на свои места.\n\nНекоторые жители этого города говорят, что их терроризировал ужасный культ, ведомый психопатом, но свидетельств о его существовании не было найдено."
 dodge.17.a:0 "Секреты и ужасы этой земли навсегда будут позабыты."
 
 dodge.18.t:0 "Тошновторная камера медленных пыток"
 dodge.18.d:0 "Святой отец очнулся запертым в клетке грязного подвала. Всё, что он помнил - на них напало яростное существо, которое было неуязвимо к силам Пандоры. Оно сожрало паломников, но по каким-то причинам, Святой Отец был всё ещё жив.\n\nКлетку охранял молодой единорог. На вид ему было около восемнадцати лет, и ему явно было не очень комфортно нахожиться здесь.\n\n- Юноша... Ты же не сделаешь греха. Я вижу твою невинность, которую плохие существа хотят испорить. Ты не принадлежишь этому месту. Освободи меня.\n\nМай смотрел на священнослужителя и испытывал смешанные эмоции. В какой-то момент он подумал, что выпустить его на свободу - хорошая идея. Но всё же...\n\n - Мастер! Он очнулся!\n\nС этого момент судьба священнослужителя была предрешена. Его смерть обещала быть долгой и мучительной.\n\nЧерез некоторе время после того, как май позвал "Мастера", в подвал спустился жуткого вида единорог, одетый в тёмный плащ, а половину его лица покрывала окровавленная маска.\n\n- Покинь нас, и воздай чёрному металлу. Позволь ему поглотить себя полностью. Я же в это время буду приносить эйфорию и счастье в мир смерти. Мы никогда не прекращаем.\n\nПока Валентайн говорил, Май смотрел на него с ужасом в глазах и дрожью в теле. Он не понял, о каком чёрном металле говорил Мастер, но он точно понял, что ему лучше уйти. Уходя, он нашёл в себе смелость обернуться. Он увидел, что Валентайн заклинанием обездвижил священника. Он достал Распятие из-под плаща и медленно начал вонзать его в глаз пленику. Май покинул этих двоих почти мнгновенно после увиденного.\nВ течение трёх дней из подвала доносились истошные крики агонии. Никто не находил в себе смелости спуститься туда и прервать действо, которое приносило Валентайну истинное наслаждение."
 dodge.18.a:0 "И великие земли поднимаются из пустоты."
 
 dodge.19.t:0 "Наказание"
 dodge.19.d:0 "Логово культистов напоминало муравейник. Сеть туннелей, которые были расположены далеко за пределами осознания. Юный культист Май вместе со своим учителем, Маракиром, готовился отправиться на очередной сеанс обучения.\n\nПл пути внимание Мая привлекла единорожка, забившаяся в угол и схватившаяся за свой живот. Она была одета в тёмный плащ с кроваво-красными узорами, что означало, что она - одна из них, а не очередная жертва. Рядом с ней лежала странного вида куча аморфного чёрного мяса. Её задние копыта были измазаны в такой же чёрной жидкости непонятного происхождения.\n\n- Учитель, что это такое? Разве может Мастер позволить кому-то из своих сторонников так страдать?\n\nМай хотел было подойти к пони, но учитель одёрнул его.\n\n- Не приближайсся к ней. Не думай о ней. Веди себя так, будто её не существует. Она проходит Наказание.\n\n- Наказание? Что она сделала?\n\n- Неважно, что она сделала. Но всё то, может навредить нам, должно выйти из неё. Она должна очиститься.\n\n- "Выйти из неё?" О чём вы го-\n\nМай вновь взглянул на бесформенный кусок чернильной массы. От неё тянулся небольшой след к пони, словно она пыталась от него отползти. И этот след вёл прямо в...\n\nМай отвёл глаза. Он больше не хотел думать об этом.\n\nКогда учитель и ученик пошли дальше, Май услышал хлюпающий звук и лёгкое постанывание единорожки за спиной. Он обернулся и увидел, что чёрная масса увеличилась."
 dodge.19.a:0 "..."
 
 dodge.20.t:0 "Путь"
 dodge.20.d:0 "Единорог, заблудившийся во времени и пространстве, бродит по заброшенным залам несуществующего дворца. Странное чувство не отпускает его, словно что-то притягивает к большой каменной двери в глубине зала. Он чувствует странную магическую энергию, которая исходит от двери и словно манит его внутрь.\n\nПодняв голову, Валентайн замечает, что над дверью вырезано странное слово на незнакомом языке. Он приближается ближе и замечает, что это слово – «Хаос». Сердце его начинает биться быстрее, и он чувствует странную энергию, медленно начинающую охватывать его тело.\n\nТемнота поглощает его, и он начинает ощущать, что реальность разлагается на миллиарды ульев, и каждый круг имеет свою историю и взгляд на мир. Но оставаясь невредимым, он продолжает идти по залу, где на стенах рисуются странные символы и карты звездного неба.\n\nЕго внимание привлекает зеркало на стене, и он замечает, как его рог начинает мерцать странным светом. Он приближается к зеркалу, и его глаза начинают проникаться магическим светом, который активирует все его чувства. Он начинает видеть свои мысли и понимает, что его сознание связано с миром, полным магии и тайн.\n\nИ когда Валентайн смотрит на свою отраженную фигуру, он видит, что его глаза стали другими, они светятся мощным светом, и предсказывают конец света, куда-то смещенного и непонятного. Он понимает, что больше не может вернуться в прошлое."
 dodge.20.a:0 "Это не важно."

 dodge.21.t:0 "Это ведь не..."
 dodge.21.d:0 ""Неужели это ты?"\n\nВалентайн замер в ужасе и волнении. Это был голос, который он не слышал, казалось, уже десять циклов подряд. Всего одна-единственная фраза чуьт не лишила этого единорога жизни: настолько сильным был шок. Он обернулся в сторону голоса, но там уже никого не было. От ярости и осознания своей беспомощности Валентайн медленно сдирал со своеего лица кожу. Слой за слоем, он рыдал, осознавая, что больше никогда не встретит её. Но через потоки крови, стекающие в его глаза, он увидел яркую точку где-то вдалеке. Из этой точки шёл луч, и Валентайн пошёл по нему к свету. Где-то там, в конце, была... Он ускорил шаг. Вопя от дикой эйфории, он не заметил, что луч обрывается прямо над пропастью с тысячью ржавых и острых крестов. Упав на них, единорог разодрал своё тело и умер в страшных муках.\n\nИ затем он проснулся."
 dodge.21.a:0 "Я ничего не вижу. Я слеп, словно чёрное море."
 
 
 
