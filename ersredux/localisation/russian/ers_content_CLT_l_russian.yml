 ##### NATIONAL FOCUS
 #------main tree
 CLT_horrors_of_the_unknown:0 "Ужасы неизвестного"
 CLT_horrors_of_the_unknown_desc:0 "Мы прибыли не из этого измерения. Мы напуганы. Только Валентайн знает истину, и поэтому на моих плечах стоит Вселенная - Кровь, Эйфория и Эктоплазма.\n\nИм нужно обойти всю планету, после чего все начнут его бояться."
 CLT_visit_neibghours:0 "Дружелюбный визит к соседям"
 CLT_visit_neibghours_desc:0 "Они существуют, но знают границы трёх измерений\n\nМы же их не знаем, и это наша величайшая радость и печаль\n\nОни будут страдать точно так же, как голодные звёзды, сила небес."
 CLT_altar:0 "Завершить строительство Алтариума"
 CLT_altar_desc:0 "Чудесное место чудесные мысли\n\nНо когда они это поймут, будет них слишком для поздно/рано/свободно\n\nИ в первый день, они кусали зубами раскалённую сталь."
 CLT_usefulness:0 "Полностью добровольная помощь"
 CLT_usefulness_desc:0 "Рогатые существа оказались нашими друзьями\n\nВот они, там, в экстазе и раскрепощении заковали себя в бесконечно-эфирные соединения\n\nЭхо, эхо, эхо, небо."
 CLT_valentine_sistem:0 "Система Валентайна"
 CLT_valentine_sistem_desc:0 ""Ты слыхал новости? Этот чокнутый готовится к чему-то конкретно "вселенскому".\n\n"И? Думаешь, у него что-то... э... получится?"\n\n"Нет. У него бесконечно-вечное в башке, если понимаешь, о чём я. Хм... нет, а кто такая Истрид?""
 CLT_valentine_system_tt:0 "Следите за своими показателями §YОткровения.§\n\n§RНе принимайте решения, о которых можете пожалеть.§!"
 CLT_god_voices:0 "Божественные голоса"
 CLT_god_voices_desc:0 "Услышь, когда он оглохнет\n\nПрозрей, когда он ослепнет\n\nЖиви и властвуй, когда он покинет нас"
 CLT_god_voices_tt:0 "§YЛишь следуя видениям Мастера мы становимся на путь истины.§!" 
 CLT_expand_cult_army:0 "Наша сила за гранью реальности"
 CLT_it_calls_us:0 "Слышать божественные голоса"
 CLT_talk_to_citizens:0 "Проповедовать истину"
 CLT_talk_to_citizens_desc:0 "Сожги церковь - обрети новую мечту. Так говорил Валентайн, и так говорят все земные твари. Всё святое, что есть в этих землях - отрава, от которой гибнут миллиарды жизней.\n\nНо не всё потеряно.\n\nНе для нас.\n\nМы обречены.\n\nНебеса чернеют.\n\nСделка с судьбой.\n\nСмерть ведёт к подчинению."
 CLT_can_nationalise_capital_tt:0 "§YЛишь через насилие и массовые волевые пытки мы сможем убедить местных жителей в том, что наше правление неоспоримо.§!"
 CLT_destroy_priests:0 "Избавиться от священников"
 CLT_destroy_priests_desc:0 "Оторвите им головы. Сожгите их, бросьте их в землю. Разбейте им черепа, сломайте спинные кости, выгрызите все позвонки. Чёрные когти. Пропасть горы. Медные черепа. Мне нужны их медные черепа - остальное... уничтожьте. Я страдаю от одного их существования в этой вселенной. ТАК ПОМОГИТЕ ВСЕЛЕННОЙ УНИЧТОЖИТЬ ТЕХ, КТО ЕЁ РАЗРУШАЕТ, ПОДОБНО ТРУПНЫМ ЧЕРВЯМ. Затем я раскрошу черепа всех существ в этом мире. Столько лет... столько лет..."
 CLT_has_to_destroy_priests_flag:0 "§RОНИ ХОТЯТ НАС УНИЧТОЖИТЬ НАМ НЕОБХОДИМО ОБЕСПЕЧИТЬ НАШЕ ВЫЖИВАНИЕ ПУСТЬ ЖИВОТНЫЕ ИНСТИНКТЫ СПАСУТ НАШИ ДУШИ§!"
 CLT_prepare_new_plan:0 "Подготовить новый план"
 CLT_prepare_new_plan_desc:0 "Блажен, кто воздаст тебе за то, что ты сделала нам! Блажен, кто возьмет и разобьет младенцев твоих о камень."
 CLT_has_plan_flag:0 "§YПорочная Троица мнила нам§!"
 CLT_melting_skin:0 "Расплавленная кожа"
 CLT_melting_skin_desc:0 "Жара в триллионы градусов - истинное наслаждение... Внутрненние органы горят и раазрываются. Подайте им его.\n\nИх работа превратится в развращающую разум эйфорию.\n\nКогда вырезается глазное яблоко, необходимо взывать к высшей энергии.\n\nШансы высоки."
 CLT_make_clouds_fall:0 "Падающие небеса"
 CLT_make_clouds_fall_desc:0 "Эта земля хранит свои секреты\n\nИ однажды свершится неизбежное\n\nМы можем только ждать..."
 CLT_next_step:0 "Чудеса самосожжения"
 CLT_next_step_desc:0 "§RНАЧИНАЕТСЯ\n\nЖИЗНЬ ЗАКАНЧИВАЕТ СВОЙ ЦИКЛ\n\n\nПАДЕНИЕ В АВАЛОН§!"

