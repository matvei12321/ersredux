 ##### CHARACTERS
 CLT_valentine:0 "Понифер Валентайн"
 valentine_desc:0 ""§RПОЧЕМУ ЛУНА ПЛАЧЕТ КРОВЬЮ?§!"\n\nНеизвестно, кто такой Валентайн, или каковы его мотивы. Однажды он просто взял и появился в гнилой дыре под названием "Додж-Сити" со своей бандой головорезов. Понифер не следует никакой идеологии, целям, или вообще стремлениям - для всех окружающих он просто ходячая масса, изрыгающая поток несвязанных мыслей. Лишь каким-то чудом у него получается находить сторонников и единомышленников."
 CLT_pinkie:0 "Пинкамина Диана Пай"
 CLT_devourer:0 "???"
 ers_devourer:0 "???"
 devourer_desc:0 "§RОно§! §Lхочет есть...§!"
 CLT_lost:0 "Потерянный"
 CLT_lost_desc:0 "§LВ этом мире каждый гонется за неким идеалом. Но к чему может привести эта погоня в конце пути?§!"
 CLT_death:0 "Пятый Всадник"
 clt_5_pony_desc:0 "§LВ пандорийской вере есть четыре всадника "Апокалипсиса" - Смерть, Чума, Война и Голод. Однако, этот пони утверждает, что он является Пятым всадником конца света - всадником Туманного Разума.§!"
 CLT_endostazis:0 "Эндостазис"
 CLT_rosa_maledicta:0 "Роза Маледикта"
 CLT_rosa_maledicta_desc:0 "§LНекромантка-единорог. Изгнана из Юникорнии, когда народ узнал о её тёмных навыках. Она не кажется настолько безумной, как все остальные, и изо всех сил старается сохранить кусочки здравого разума.§!"
