 CLT_fucking_madness_cat:0 "Откровения"
 CLT_fucking_madness_cat_desc:0 "§RПОМОГИ МНЕ\n\nМЫ ЗАБЫЛИ БУДУЩЕЕ\n\nСЖЕЧЬ, РАСПОТРОШИТЬ, ЗАКОПАТЬ - НАШЕ СЧАСТЬЕ\n\nЕСЛИ ОДИН ИЗ ЭТИХ ПОКАЗАТЕЛЕЙ ДОСТИГНЕТ КРИТИЧЕСКИХ УРОВНЕЙ, ЗЕМЛЯ ПОЖРЁТ ЦЕЛОСТНОСТЬ ВСЕГО МИРА§!\n\nГлаза окружающих: [CLT_eyes_of_the_people]\n\nГолоса в голове: [CLT_voices_in_the_head]\n\nСтатус психики: [CLT_shizo_status]\n\nВнутренняя фантомоплазма: §Y[?CLT.inner_phantoplasma_var].00%§!\n\nСостояние звёзд: §6наблюдают и насмехаются§!\n\nТечение времени: §Yприемлемо§!\n\nЛиния: §Rпотеряна§!\n\nГнилые мозговые массы: §Rвозглавляют страны всего мира§!"
