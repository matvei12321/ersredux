 ##### NATIONAL FOCUS
 
 OLE_R_beats_of_heart_tell_me_im_not_dead:0 "Удары сердца твердят мне, что я не убит"
 OLE_R_beats_of_heart_tell_me_im_not_dead_desc:0 "У НАС ЕЩЁ ЕСТЬ СИЛЫ СРАЖАТЬСЯ У НАС ЕЩЁ ЕСТЬ СИЛЫ СРАЖАТЬСЯ У НАС ЕЩЁ ЕСТЬ СИЛЫ СРАЖАТЬСЯ У НАС ЕЩЁ ЕСТЬ СИЛЫ СРАЖАТЬСЯ"
 OLE_R_i_see_dawn_through_my_burned_eyes:0 "Сквозь обожённые веки я вижу рассвет"
 OLE_R_i_see_dawn_through_my_burned_eyes_desc:0 "Солнце продолжает сиять и подниматься каждый день, но с каждым днём оно тускнеет. Мы всё ещё можем видеть свет. Когда погаснет последний солнечный луч, мы найдём Солнце внутри себя. Тьма будет ослеплена, нам нужно только сражаться до конца.\n\nНо даже если мы проиграем битву, дороги назад нет. Мы пойдём вперёд, и даже проигрывая битву за битвой мы будем продолжать наш путь. Ибо все другие дороги закрыты.\n\nВсё, что остаётся - идти на встречу самой смерти."
 OLE_R_i_open_my_eyes_and_see_it:0 "Я открываю глаза, надо мною стоит"

 OLE_R_great_horror_that_has_no_name:0 "Великий Ужас, которому имени нет"
 OLE_R_great_horror_that_has_no_name_desc:0 "Это монстр - монстр без имени! Чудовище, которое не знает добра. Королева, которая будет уничтожена."
 OLE_R_they_came_like_snow_drop:0 "Они пришли, как лавина, как Чёрный Поток"
 OLE_R_they_came_like_snow_drop_desc:0 "Тошнотворные жуки напали на нас неожиданно, когда мы были к этому не готовы. Мы не планировали оборону против них. Но это было бы бесполезно. Поток чёрного огня с востока обрушился на нас, и мы ничего не смогли бы сделать. У нас не было плана. И сейчас у нас нет ничего, кроме одной абстрактной цели. Жить. Умереть ради того, чтобы другие жили. Запомнить имена других, чтобы они не забыли сами.\n\nМы помним. Мы помним, что того оленёнка звали Ярно, а тех сестёр - Ката и Суви. И мы не позаолим чёрному огню отнять эту память у нас."
 OLE_R_they_crashed_us:0 "Они нас просто смели и втоптали нас в грязь"

 OLE_R_our_signs_are_burried:0 "Все наши стяги и вымпелы вбиты в песок"

 OLE_R_they_destroyed_everything:0 "Они разрушили всё"
 OLE_R_they_destroyed_everything_desc:0 "Не осталось ничего, что принадлежало нам раньше. Наша честь - растоптана, дома - сожжены, но наш дух не сломлен. Ещё не до конца. Эти насекомоподобные мрази не смогут сломить наш дух. ПОКА ЖИВ ПОСЛЕДНИЙ ОЛЕНИЕЦ - ЖИВА ОЛЕНИЯ. Пусть они разрушили всё. Пусть нам больше не за что сражаться. Ну и пусть.\n\nМы будем сражаться просто, чтобы жить."
 OLE_R_they_killed_all_of_us:0 "Они убили всех нас"
 OLE_R_they_killed_all_of_us_desc:0 ""

