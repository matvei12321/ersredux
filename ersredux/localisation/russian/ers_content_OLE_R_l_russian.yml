 olenian_resistance.1.t:0 "Сопротивление"
 olenian_resistance.1.d:0 "Кригера особо не волновало состояние гарнизонов в его протекторате. "Стальная воля и победоносный дух позволят ликтидианцам побеждать любых врагов на их пути", так он всегда говорил, когда речь заходила об армии. Однако, его помощники-администраторы, выполнявшие всю бумажную отчётную работу, волновались всё больше с каждым днём. Оружие пропадает. Склады с провизией сгорают. Патрульные уходят на пост и не возвращаются. Из самых отдалённых уголков Олении приходили подобные новости - оттуда, где чейнджлингские лагеря ещё не зукрепились должым образом.\n\nНо никто не сообщал об этом Кригеру - все боялись. Или просто знали, что это бесполезно.\n\n"Но вы, братия, не во тьме, чтобы день застал вас, как тать."\n\n--- Где-то на одном из прибрежных поселений Олении ---\n\n- Итак, каковы успехи пятого отряда?\n\n- Чейнджлингский склад с провизией был подорван. Кажется, они хранили оружие в одном месте с другими припасами. Сейчас мы ждём вестей о подрыве железнодорожных путей.\n\n- Отлично. Продолжайте в том же духе. И да, надеюсь, вы не забыли? Как вы считаете, какие имена были бы у звёзд на небе?\n\n- Хороший вопрос. Думаю, даже боги знают ответ, ибо каждая звезда - монстр.\n\n- Отлично. Можете идти.\n\n- Так точно, королева Вельвет!"
 olenian_resistance.1.a:0 "Сопротивление? Неприемлемо!"