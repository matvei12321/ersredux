 #### EVENTS
 
 srf_border_conflict.1.t:0 "Захвачены медведи"
 srf_border_conflict.1.d:0 "Неудивительно, что наши солдаты смогли пробиться через плохоукреплённые гарнизоны медвежьего государства. Теперь в нашем распоряжении есть несколько пленных медведей, которых можео использовать в наших Проектах. Из-за исключительных размеров и выносливости медведей, если переводить их в эквивалиент обычного пониресурса, можно сказать, что мы сорвали настоящий куш."
 srf_border_conflict.1.a:0 "Дикари никогда не устоят перед маршем прогресса."
 
 
 
 srf.1.t:0 "СОВЕРШЕННО СЕКРЕТНО"
 srf.1.d:0 "Отчёт n-415, уровень доступа: А-1\n\nЛаборатории |ZENSIERT|, |ZENSIERT|, |ZENSIERT| и |ZENSIERT| сообщают о прекращении исследований в области проекта |ZENSIERT| под кодовым названием "Гештаальт". Сотрудники лабораторий, разглашающие информацию о |ZENSIERT|, будут устранены независимо от занимемых должностей. Разглашение информации о |ZENSIERT| в будущем также будет караться как государственное преступление высшей степени виновности.\n\nВсе физические результаты проекта будут уничтожены, документация и теоретическая основа будут храниться в Генеральном Архиве Сорифа на уровне доступа "Эрика". Приложены комментарии |ZENSIERT|, ведущего учёного проекта.\n\n"Я надеялся, что "Гештаальт" будет нашим общим ошеломляющим достижением. Но я ошибался. Хорошо, что мы вовремя осознали главную вещь: независимо от амбициозности, невозможно прогнозировать точные последствия в случае успеха проекта |ZENSIERT|, а о его провале никто даже не хотел думать. Мы продолжим исследования в других областях во имя прогресса и Сорифа. Хайль Ярия.""
 srf.1.a:0 "Хайль Ярия!"
 
 srf.2.t:0 "Побег"
 srf.2.d:0 "Пегассо-чейнджлингскую границу пересекло нечто, что внешне напоминало чейнджлинга, но от какого-либо разумного существа в нём не было ничего. Согласно отчётам, абсурдная скорость передвижения твари не позволила пограничникам Вракса задержать её.\n\n- Фаринкс, подлец!\n\n- В чём дело, Зигстер?\n\n- Не притворяйся, что не знаешь, ЧТО покинуло границы Гегемонии. Всем давно было известно, над чем... над кем ваш отдел работал. Ярия в ваш проект столько вложила, как вы умудрились нарушить условия содержания?!\n\n- Мы уведомляли другие отделы о рисках. Проект "Альбионен" был биологическим э-э-э-экспериментом над ДНК чейнджлинга...\n\n- Давай ближе к сути. Что вы, черти, натворили?\n\n- Как скажешь. "Альбионен" имела тенденцию впадать в ярость, если не кормить её в достаточных объёмах. Собственно, вот, охрана нашего отдела не смогла её сдержать.\n\n- А у вас разве были недостаточные объёмы кормления? Я видел отчёты о транспортировке тонн пищевой продукции вам, и ЭТОГО было мало?!\n\n- Похоже, да. Или Альбионен захотела... другого вида пропитания. В любом случае, она уже не навредит чейнджлингам, ведь так?\n\n- Ты... ладно. Но после такого финансирование вам точно скоро сократят.\n\nЧерез несколько дней ужасающего вида тварь чудом оказалась в богом забытом городке к югу от Пандории. Хотя, уже не такая ужасающая, как раньше... Она встретила какого-то пони по пути и приняля его образ, насколько это было для неё возможно."
 srf.2.a:0 "Это уже не наши проблемы."

 srf.3.t:0 "В ледяные земли"
 srf.3.d:0 "Согласно данным недавней геологической разведки, в этом регионе должно быть огромное количество ценных для улья ресурсов. Но чтобы заполучить эти ресурсы, нужно овладеть этими землями - а такая задача была не под силу даже самым выносливым чейнджлингам. Только местные друиды и язычники-отшельники чудом выживали в этом регионе в мороз, который иногда превышал -45 градусов. Чтобы основать полноценно живущее поселение, нужно установить тепловые генераторы, которые обеспечат минимальную комфортную для обычного чейнджлинга температуру.\nГенератор был собран в Сорифе, а его перевозкой должны были заниматься каторжники под присмотром охранников. Им предстоял долгий путь от холодного Сорифа в безжизненные ледяные земли. По пути несколько каторжников погибло из-за холода. Появился риск того, что перевозка окончится провалом.\n\n"Твою же... Мне не нравится эта экспедиция. Мне не нравятся эти поселенцы. Мне не нравится этот оргомный генератор на углях! КАК МЫ ВООБЩЕ БУДЕМ ЕГО ЗАТАПЛИВАТЬ, КАКИМИ УГЛЯМИ?"\n\nЧтож, комиссар Гёзер, вам самим придётся разбираться с этим."
 srf.3.a:0 ""Мне вообще ничего не нравится!"""
 
 srf.4.t:0 "СОВЕРШЕННО СЕКРЕТНО"
 srf.4.d:0 "По приказу Её Величества королевы Ярии были созданы особые отделы RA-41 и LF-12. Начальником отдела RA-41 назначается |ZENSIERT|, начальником отдела LF-12 - |ZENSIERT|. Распространение информации о данных отделах приравнивается к государственной измене. Отчёты о езультатах исследований в вышеуказанных отделах не должны отправляться в имперскую канцелярию Весалиполиса или куда-либо ещё. Все разработки ведутся на секретном уровне.\n\nХайль Ярия!"
 srf.4.a:0 "Новые фокусы разблокированы."
 
 srf.5.t:0 "Нетида"
 srf.5.d:0 "Глубокая ночь, в кабинете Нетиды горит свет. Чейнджлинг, одетая в научную форму, что-то выискивала глазами в куче бумаг и каких-то книг. За годы работы её глаза уже развились и привыкли к таким нагрузкам, и к тому же небольшие базовые импланты помогали снизить нагрузку на глаза. Мимо кабинета прошёл другой чейнджинг, зашедший в кабинет без стука.\n\n— И ты смеешь вламываться в мой кабинет, Крикс? — Не отрываясь от записей и моментально прочитывая тексты целых страниц, Нетида продолжила жадно что-то выискивать.\n\n— Ваш кабинет никогда не заперт, Нетида. Таким образом, я предполагаю, что вы всегда ждёте посетителей. — Он подошёл ближе, подобрав один лист с различными записями и, прищурившись, принялся разбирать почерк своей коллеги.\n\n— Так... что именно ты пытаешься найти ночью?\n\nУчёная отложила последнюю стопку бумаг в сторону и откатиласт от стола на своём передвижном кресле.\n\n— Первоначальные наработки магических винтовок. Дараксис готовится представить их на будущей конференции, но он даже ни слова не скажет о том, что это была моя концепция! Моё творение!\n\n— И что с того? Ведь важен конечный результат. А то, что Дараксис представит завтра, может и вообще не будет реализуемой моделью. К чему так волноваться?\n\n— Это дело принципа. Стоит ему первым завяить об этих наработках, и уже неважно, кто создаст рабочую модель - изобретателем магической винтовки будут считать этого дикаря Дараксиса, а всё потому, что он начал говорить о них первый. Я всегда записываю даты, когда составлен чертёж. Это должно стать моим доказательством того, что именно я создала концепт магической винтовки...\n\n— Это случайно не он? — Чейнджлинг протянул ей тот листок, который всё время держал в копытах.\n\n— Точно... Он! Отлично. Я бы даже сказала, превосходно. Теперь нужно отложить его туда, чтобы я смогла его легко найти завтра...\n\nТолько сейчас Нетида ощутила, что её глаза всё-таки начали слипаться. Обменявшись с Нетидой парой новостей за день, Крикс удалился.\n\nИ только когда она уже рухнула в кровать, её посетила последняя осознанная мысль перед сном: "Что же Крикс делал так поздно в научных лабораториях?""
 srf.5.a:0 "Наука может подождать до завтра."
 
 srf.6.t:0 "Дараксис"
 srf.6.d:0 "Ярия не находила большого удовольствия в прогулках на природе, тем более в морозную и холодную погоду. Но всё-же иногда выйти, проветриться и освежить мысли бывает полезно. В такие моменты она предпочитает не заводить разговоров, чтобы её необязательное пребываение на морозе не растянулось на слишком долго. Она давно выстроила маршрут своей прогулки от королевского дворца до пары примечательных мест, таких как берег Ключ-Озера. На этом маршруте прогулки она, согласно плану, обычно не встречала кого-либо, но на этот раз ей не повезло встретить любующегося видами Ключ-Озера Дараксиса - лидера научного общества "Род". Только завидев Ярию, чейнджлинг в тёмной шубе направился к ней.\n\n— Хайль Ярия! — Вскинув копыто, проговорил он.\n\n— Вам что-то нужно? — Не особо зарнтересованно спросила королева. Внезапно усилившийся ветер заставил мех на её шубке заколыхаться.\n\n— Если бы мне не было что-то нужно, я бы не стал вас ждать здесь так долго. Сегодня погода особенно морозная, не особо приятно, так ведь?\n\n— Ты знал, что я приду сюда? — Ярия пыталась скрыть своё возмущение. Дараксис был одним из тех, кто является влиятельной фигурой в Сорифе, из-за чего Ярия не могла просто взять и отчитать его. Сам же Дараксис это знал и пользовался этим сполна. \n\n— Так точно, Королева. И, пользуясь случаем, что я вас наконец застал, я бы хотел обсудить одно предложение в разговоре один-на-один.\n\nТолько не беседы. Сейчас Ярия уже давно бы видела очертания своего дворца, но сейчас она стоит здесь, с этим чейнджингом. Ветер подул ещё раз.\n\n— Я бы хотел, чтобы вы стали членом нашего научного общества... Насколько мне известно, Нетида не сделала вам такого предложения насчёт её технократической компании. Если бы я предлолжил вам это в пределах Сорифа, то Нетида бы сразу об этом узнала и устроила очередной переполох с нами... Видите ли, она не любит, когда не попадает в чьи-то фавориты.\n\n— И почему я должна "официально поддержать вас"? — Лишь бы поскорее покончить с этим и вернуться в тёплый Улей.\n\n— Хороший вопрос, Ярия. "Род" всегда полагался на наши языческие корни в научном смысле... И мы уверены, что не слепая технократия, а чуткая суть Души может направить нас на верный путь. Впрочем, вы ведь это уже знаете. Надеюсь, вы подумаете о моём предложении на досуге.\n\nМороз стал слишком неприятным для Ярии, и она быстро развернулась в сторону Сорифа, быстро попрощавшись с Дараксисом. Конечно, она об этом подумает, если не отмерзнет сейчас."
 srf.6.a:0 "Слава Роду, я так полагаю?"
 
 
 
 
