 SRF_science_research:0 "Научные изыскания"
 SRF_science_research_desc:0 ""Научная эзотерика"? Мы считаем это и слово "абсурд" одним и тем же. Мы чтим различные языческие традиции, но не следует выходить за рамки этого. Пусть технократы ведут нас в это будущее."
 SRF_pagan_research:0 "Увлечённость эзотерикой"
 SRF_pagan_research_desc:0 "Относительно недавно в научных отделах стали формироваться группы язычников-эзотериков. Они предлагают смелые и оригинальные теории, основанные на древних языческих практиках. Нам стоит дать научной эзотерике шанс на развитие."
 SRF_lake:0 "Ключ-Озеро"
 SRF_lake_desc:0 "Ключ-Озеро - это просто уникальный феномен. От него исходит тепло, что позволяет чейнджингам комфортно жить на его берегах, в нём содержатся магические ресурсы... И много других классных штук. Было бы глупо не продолжать эксплуатировать это чудо природы."
 SRF_colonisation_hooves:0 "Нанять новых учёных"
 SRF_colonisation_tt:0 "Мы начнём колонизацию региона §YБелые Копытца§! для дальнейшей добычи ресурсов."
 SRF_colonisation_2_tt:0 "Мы начнём колонизацию региона §YСеверный Грустный Берег§! для дальнейшей добычи ресурсов."
 SRF_colonisation_hooves:0 "Колонизация снежных земель"
 SRF_colonisation_hooves_desc:0 "Эти земли потенциально богаты ресурсами. Но может быть, в них ничего и нет. Геологическая разведка в условиях холода была долгое время неосуществима. Но теперь, когда у нас есть чейнджлинги, которых нам не жалко, мы как минимум, освободим от них место в Сорифе. Если повезёт - найдём жилы ресурсов!"
 SRF_colonisation_bereg:0 "Колонизация ледяных берегов"
 SRF_colonisation_bereg_desc:0 "Эти берега потенциально богаты ресурсами. Но может быть, в них ничего и нет. Геологическая разведка в условиях холода была долгое время неосуществима. Но теперь, когда у нас есть чейнджлинги, которых нам не жалко, мы как минимум, освободим от них место в Сорифе. Если повезёт - найдём жилы ресурсов!"
 SRF_heat_generators:0 "Установка тепловых генераторов"
 SRF_heat_generators_desc:0 "Даже самые выносливые чейнджлинги падут перед суровым климатом Севера. Но если мы сможем победить суровую природу ледяных земель, в наши копыта попадут огромные запасы железа, аллюминия, алмазов, кристаллов и прочего."
 SRF_new_research_commands:0 "Нанять новых учёных"
 SRF_new_research_commands_desc:0 "Всегда важно иметь чейнджлингов со свежими взглядами на процесс исследований. Наши научные учреждения получат новых и многообещающих специалистов."
 SRF_hide_researches:0 "Ценность мысли"
 SRF_hide_researches_desc:0 "На каком основании мы отдаём все результаты деятельности наших пытливых умов Весалиполису? Это не есть справедливость. Мы лучше знаем, кто и как должен использовать наши технологии..."
 SRF_research:0 "Продолжайте изучать"
 SRF_research_desc:0 "Больше всего наш Улей подходит для исследований и экспериментов. Хотя иногда Кризалис относится к Сорифу не как к передовому центру Науки, а как к тюрьме для осуждённых. Чтож... Больше возможностей для экспериментов на живых существах!"
 SRF_native_people:0 "Развитие гражданского сектора"
 SRF_native_people_desc:0 "Наш Улей не ограничивается одними учёными и узниками, нет! У нас тоже есть гражданские, и с каждым годом из-за расширения тюремных лагерей они чувствуют себя всё менее уютно. Нужно расширить наш Сориф. Хайль гражданам Сорифа!"
 SRF_borning_program:0 "Программы рождения"
 SRF_borning_program_desc:0 "Статистика показывает, что всё меньше семей чейнджлингов хочет заводить семью в Сорифе. На это влияет и абсурдно холодный климат, и непривлекательность самого улья. Но стоит ввести материнский капитал и прочие гарантии матерям - всё должно начать постепенно налаживаться."
 SRF_manpower:0 "Рабочая сила из Весалиполиса"
 SRF_manpower_desc:0 "Прибывает очередная партия политических и прочих преступников из Весалиполиса. Создаётся ощущение, что чейнджлинги там совсем не уважают закон... Но нам ли об этом беспокоиться? Бесплатная рабочая сила - вот что действительно важно."
 SRF_manpower_workers:0 "На заводы!"
 SRF_manpower_workers_desc:0 "Работай, смена не закончится никогда!"
 SRF_workers_experiments:0 "Эксперименты с индустрией"
 SRF_workers_experiments_desc:0 "Мы не можем похвастаться титаническими фабричными комплексами, но определённо сможем улучшить то, что имеем сейчас."
 SRF_manpower_soldiers:0 "В армейские бригады!"
 SRF_manpower_soldiers_desc:0 "Служить Сорифу суждено тебе и мне,\nСлужить Сорифу - улью света в этой тьме,\nГде солнце серое встаёт...\nХайль Ярия!"
 SRF_army_experiments:0 "Эксперименты с войной"
 SRF_army_experiments_desc:0 "Вряд ли Сориф окажется втянутым в какую-либо крупную войну, ведь его защищает стойкий щит в виде Весалиполиса. Но на случай опасности мы должны быть готовы встретить врага с новейшим вооружением в нашем арсенале."
 srf_create_unit_tt:0 "Создаст §Yодну боевую единицу.§!"
 SRF_expand_camps:0 "Расширить лагеря для осуждённых"
 SRF_science_resources:0 "Технобуры"
 SRF_science_resources_desc:0 "Наши последние разработки позволят нам добывать железо, медь и прочие металлы с почти неограниченных глубин."
 SRF_pagan_resources:0 "Духовная связь с землёй и почвой"
 SRF_pagan_resources_desc:0 "Мы не будем вредить нашей природе в угоду ресурсам. Вместо этого мы можем тренировать рейхсшаманов для того, чтобы они научились превращать органическую материию в металлы. Так мы снизим нагрузку на нашу добывающую индустрию."
 SRF_form_secret_researches:0 "Сформировать серкетные отделы"
 chryssy_agro:0 "§YНемного§! увеличит §Rподозрительность§! Кризалис"
 SRF_science_army_cyber:0 "Стальные импланты солдатам"
 SRF_pagan_army:0 "Армия псионики"

 
 ##### DECISIONS 
 SRF_colonisation_cat:0 "Сориф - Колонизация ледяных земель"
 SRF_colonisation_cat_desc:0 "Запущено ячеек теплового генератора: [?SRF.colonisation_generator_var]/§Y3§!\nЕдиниц пищи на складах: §Y[?SRF.colonisation_food_var]§!, макс. - §Y500§!.\n§CНадежда поселенцев§!: [?SRF.colonisation_hope_var]%\n§RНедовольство поселенцев§!: [?SRF.colonisation_hope_var]%"
 
 SRF_special_projects_cat:0 "§1Особые§! §YПроекты§!"
 SRF_special_projects_cat_desc:0 "Виссенсштат требует, чтобы наука постоянно двигалась вперёд неустанным шагом. Если кто-то погибнет во имя науки - так тому и быть.\n\n£manpower_icon §YПониресурс§! для §1Проектов§!: [?ROOT.srf_special_ponypower]"
 SRF_collect_pony_resources:0 "Научная жатва"
 SRF_collect_pony_resources_desc:0 "Арестанты, политически неугодные нашему режиму чейнджлинги... все они могут однажды оказаться в полном нашем распоряжении, и они ничего с этим не поделают."
 SRF_raid_bears_for_ponypower:0 "Агрессивный сбор пониресурса"
 SRF_research_speed_for_ponypower:0 "Опыты над живыми существами"
 SRF_research_speed_for_ponypower_desc:0 "Классика научного жанра. Ничего скопытосшибательного, но проведение опытов над ещё живыми экземплярами позволяет добиться больших результатов.\n\nДа, не стоит беспокоиться об их судьбе и о том, что с ними произойдёт. Они - всего лишь цифры."
 
 
 
