 SRF_gw_tank_equipment:0 "Abteilung 7 Verkehrswesen"
 SRF_gw_tank_equipment_desc:0 "A7V был первым экспериментальным танком чейнджлингов. До недавнего времени чейнджлинги были ограничены в военном развитии из-за отсутствия промышленного потенциала, что резко изменилось, когда королева сделала акцент на стремительную индустриализацию ульев."
