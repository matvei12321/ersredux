 # SRF_queen_focus_desc:0 "Наша Королева - величайшая из всех. Она умна, интеллигентна и даже смогла предотвратить возможность конфликта с Весалиполисом. За всё приходится платить определённую цену...n\nНо это неважно! Хайль Ярия!"
 SRF_cancel_geshtalt:0 "Проект §g"Гештаальт"§!"
 SRF_cancel_geshtalt_desc:0 ""Гештаальт" был интересным, но обречённым на провал экспериментом. Нам пора прекратить его финансирование и направить ресурсы в более полезные отрасли."
