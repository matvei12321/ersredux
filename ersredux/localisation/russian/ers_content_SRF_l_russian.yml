 SRF_heavy_tank_artillery_equipment_2:0 "Sturmtiger"
 SRF_heavy_tank_artillery_equipment_2_short:0 "Sturmtiger"
 SRF_heavy_tank_artillery_equipment_3:0 "Geschützwagen Tiger"
 SRF_heavy_tank_artillery_equipment_3_desc:0 "Эта машина была создана на шасси Королевского Тигра, в ней должна использоваться пушка 170mm K72L/50."
 SRF_heavy_tank_artillery_equipment_3_short:0 "GW Tiger"
 SRF_heavy_tank_destroyer_equipment_1:0 "Selbstfahrlafette auf VK3001(A) Sturer Emil"
 SRF_heavy_tank_destroyer_equipment_1_desc:0 "Selbstfahrlafette auf VK3001(A) Sturer Emil был самоходным противотанковым орудием чейнджлингов, созданным на шасси Aurelia Armory VK3001."
 SRF_heavy_tank_destroyer_equipment_1_short:0 "Sturer Emil"
 SRF_heavy_tank_destroyer_equipment_2:0 "Panzerjaeger Tiger (CM)"
 SRF_heavy_tank_destroyer_equipment_2_desc:0 "Elefant (Слон) — тяжёлое противотанковое самоходное орудие, основанное на корпусе отменённого проекта Carpace Motors Tiger и оснащённый 88-мм пушкой Panzerabwehrkanone 43/2."
 SRF_heavy_tank_destroyer_equipment_2_short:0 "Elefant"
 SRF_heavy_tank_destroyer_equipment_3:0 "Panzerjaeger Tiger Ausf. B"
 SRF_heavy_tank_destroyer_equipment_3_desc:0 "Jagdtiger был самой тяжёлой бронированной боевой машиной, оперативно используемой армией чейнджлингов. Машина имеет 128-мм основную пушку PaK44L/55 и тяжёлую лобовую броню."
 SRF_heavy_tank_destroyer_equipment_3_short:0 "Jagdtiger"
 SRF_heavy_tank_equipment_1:0 "Grosstraktor"
 SRF_heavy_tank_equipment_1_desc:0 "Гросстрактор был серией прототипов для разработки более тяжёлого танка для армии чейнджлингов. До недавнего времени чейнджлинги были ограничены в военном развитии из-за отсутствия промышленного потенциала, что резко изменилось, когда королева сделала акцент на стремительную индустриализацию ульев. По инициативе самого генерала Векта, армия чейнджлингов взялась за секретную программу. В конце концов, под кодовым названием "Трактор" была начата разработка оригинальной бронетехники и артиллерии."
 SRF_heavy_tank_equipment_1_short:0 "Grosstraktor"
 SRF_heavy_tank_equipment_2:0 "Panzerkampfwagen VI Tiger"
 SRF_heavy_tank_equipment_2_desc:0 "Тигр I — чейнджлингский тяжёлый танк, разработанный в 1012 году."
 SRF_heavy_tank_equipment_2_short:0 "Tiger"
 SRF_heavy_tank_equipment_3:0 "Panzerkampfwagen VI Ausf. B Tiger II"
 SRF_heavy_tank_equipment_3_desc:0 "Известный под неофициальным названием Königtiger, что часто буквально переводится юникорнийскими солдатами как Королевский Тигр, танк следовал той же концепции, что и Тигр I, но был предназначен для того, чтобы быть ещё более грозным. Tiger II объединил толстую броню Tiger I с наклонной броней, используемой на среднем танке Panther. Танк весит почти семьдесят тонн, защищён бронёй толщиной от 100 до 180 мм и вооружён длинной пушкой 8,8 см Kampfwagenkanone 43L/71."
 SRF_heavy_tank_equipment_3_short:0 "Tiger II"
 SRF_light_tank_aa_equipment_1:0 "Flakpanzer I"
 SRF_light_tank_aa_equipment_1_desc:0 "Зенитная пушка, установленная на шасси танка Panzer I."
 SRF_light_tank_aa_equipment_1_short:0 "FlakPz I"
 SRF_light_tank_aa_equipment_2:0 "Flakpanzer Luchs"
 SRF_light_tank_aa_equipment_2_desc:0 "Зенитная пушка, установленная на шасси танка Panzer II."
 SRF_light_tank_aa_equipment_2_short:0 "FlakPz Luchs"
 SRF_light_tank_aa_equipment_3:0 "Flakpanzer 1602"
 SRF_light_tank_aa_equipment_3_desc:0 "Зенитная пушка, установленная на шасси танка VK1602."
 SRF_light_tank_aa_equipment_3_short:0 "FlakPz 1602"
 SRF_light_tank_artillery_equipment_1:0 "Sturmpanzer I Bison"
 SRF_light_tank_artillery_equipment_1_desc:0 "Буксируемые орудия, которыми оснащались артиллерийские роты полков моторизированной пехоты, часто не успевали за танками во время боя. Самым простым решением проблемы стала установка орудия на шасси танка. В случае с САУ Bison, она использует шасси танка Panzer I."
 SRF_light_tank_artillery_equipment_1_short:0 "Bison"
 SRF_light_tank_artillery_equipment_2:0 "Sd. Kfz. 124 Wespe"
 SRF_light_tank_artillery_equipment_2_desc:0 "Sd.Kfz. 124 Wespe является самоходной артиллерийской машиной чейнджлингов на базе модифицированного шасси Panzer II."
 SRF_light_tank_artillery_equipment_2_short:0 "Wespe"
 SRF_light_tank_artillery_equipment_3:0 "Waffentrager Leopard"
 SRF_light_tank_artillery_equipment_3_desc:0 "Waffentrager Leopard — это самоходная артиллерийская машина на базе шасси VK1602 Leopard."
 SRF_light_tank_artillery_equipment_3_short:0 "WT Leopard"
 SRF_light_tank_destroyer_equipment_1:0 "Panzerjaeger I"
 SRF_light_tank_destroyer_equipment_1_desc:0 "Panzerjaeger I был первым из чейнджлингских истребителей танков, который увидели служащие чейнджлингской армии. Он сконструирован с 47-мм противотанковой пушкой PaK на модифицированном шасси Panzer I Ausf."
 SRF_light_tank_destroyer_equipment_1_short:0 "Pzjager I"
 SRF_light_tank_destroyer_equipment_2:0 "7.5 cm PaK 40 auf Fahrgestell Marder II"
 SRF_light_tank_destroyer_equipment_2_desc:0 "Marder II — истребитель танков на основе шасси Panzer II."
 SRF_light_tank_destroyer_equipment_2_short:0 "Marder II"
 SRF_light_tank_destroyer_equipment_3:0 "Sturmgeschutz auf Leopard"
 SRF_light_tank_destroyer_equipment_3_desc:0 "JagdLeopard был противотанковой модификацией лёгкого танка VK1602 Leopard."
 SRF_light_tank_destroyer_equipment_3_short:0 "JagdLeopard"
 SRF_light_tank_equipment_1:0 "Panzerkampfwagen I"
 SRF_light_tank_equipment_1_desc:0 "Panzer I является лёгким танком, выпущенным в Землях Чейнджлингов в 1000-х годах. Спроектированный в 1005-ом и запущенный в производство в 1006-ом году, изначально предполагался как учебный танк для обучения солдат концепции танковой войны, однако в виду отсутствия более современных моделей PzKpfw I широко использовался на поле боя."
 SRF_light_tank_equipment_1_short:0 "Panzer I"
 SRF_light_tank_equipment_2:0 "Panzerkampfwagen II"
 SRF_light_tank_equipment_2_desc:0 "Panzer II был первоначально разработан как временная мера, в то время как разрабатывались более крупные и продвинутые танки, но он широко использовался в бою из-за отсутствия более развитых моделей."
 SRF_light_tank_equipment_2_short:0 "Panzer II"
 SRF_light_tank_equipment_3:0 "VK 1602 Leopard"
 SRF_light_tank_equipment_3_desc:0 "VK1602 Leopard — машина, изначально созданная для разведки и разработанная в 1012 году. Планировалось вооружить машину 75-мм пушкой Kwk41, но она была заменена на меньшую 50-мм пушку. VK 1602 имел наклонную лобовую броню, под влиянием танка Panther. Для того, чтобы увеличить вездеходные свойства, VK1602 был приспособлен к траку шириной 350 мм."
 SRF_light_tank_equipment_3_short:0 "VK1602 Leopard"
 SRF_medium_tank_aa_equipment_1:0 "Flakpanzer III Möbelwagen"
 SRF_medium_tank_aa_equipment_1_desc:0 "ЗСУ, получившая название "Мёбельваген" ("фургон") из-за угловатой формы башни в закрытом положении, была построена на шасси Pz III и вооружена счетверённой 20-мм пушкой."
 SRF_medium_tank_aa_equipment_1_short:0 "Möbelwagen"
 SRF_medium_tank_aa_equipment_2:0 "Flakpanzer IV Ostwind"
 SRF_medium_tank_aa_equipment_2_desc:0 "Flakpanzer IV "Оствинд" ("восточный ветер") — самоходная зенитная установка на шасси танка Pz IV. Она была создана в 1012-ом году для замены более ранней Flakpanzer III. Башня Pz IV была заменена открытой шестиугольной, с установленным орудием FlaK 43 калибра 37 мм. Закрытая башня была бы предпочтительней, но её применение оказалось невозможным из-за сильного задымления при стрельбе."
 SRF_medium_tank_aa_equipment_2_short:0 "Ostwind"
 SRF_medium_tank_aa_equipment_3:0 "Flakpanzer Coelian"
 SRF_medium_tank_aa_equipment_3_desc:0 "Flakpanzer "Коэлиан" — самоходная зенитная установка, разработанная концерном "Арсенал" для вооруженных сил Чейнджлингов. Она была вооружена спаренными пушками FlaK 43 калибра 37 мм, смонтированными в полностью закрытой вращающейся башне на корпусе среднего танка "Пантера"."
 SRF_medium_tank_aa_equipment_3_short:0 "Coelian"
 SRF_medium_tank_artillery_equipment_1:0 "Grille"
 SRF_medium_tank_artillery_equipment_1_desc:0 "Sd.Kfz.138/1 Grille — САУ, популярна в танковых дивизиях, сражавшихся на пересечённой местности."
 SRF_medium_tank_artillery_equipment_1_short:0 "Grille"
 SRF_medium_tank_artillery_equipment_2:0 "Hummel"
 SRF_medium_tank_artillery_equipment_2_desc:0 "Hummel — САУ на базе шасси Geschützwagen III/IV, вооружённая 15-сантиметровой гаубицей."
 SRF_medium_tank_artillery_equipment_2_short:0 "Hummel"
 SRF_medium_tank_artillery_equipment_3:0 "Grille 12"
 SRF_medium_tank_artillery_equipment_3_desc:0 "Концепция самоходной артиллерийской пушки, предложенная концерном "Арсенал" в 1014-ом году, и разработанная на основе компонентов Panther с гаубичной пушкой 12,8 см."
 SRF_medium_tank_artillery_equipment_3_short:0 "Grille 12"
 SRF_medium_tank_destroyer_equipment_1:0 "Sturmgeschütz III"
 SRF_medium_tank_destroyer_equipment_1_desc:0 "Штурмовое орудие Sturmgeschütz III — наиболее распространённая противотанковая САУ чейнджлингов. Она была создана на шасси проверенного танка Pz III (первоначально — как мобильное бронированное орудие для поддержки пехоты). За время войны StuG III не раз модернизировалось и широко применялось в качестве истребителя танков."
 SRF_medium_tank_destroyer_equipment_1_short:0 "StuG III"
 SRF_medium_tank_destroyer_equipment_2:0 "Jagdpanzer IV"
 SRF_medium_tank_destroyer_equipment_2_desc:0 "Jagdpanzer IV служил в противотанковых подразделениях танковых дивизий. Они были очень успешными истребителями танков, но были крайне неэффективны, когда использовались в качестве замены танков или штурмовых орудий."
 SRF_medium_tank_destroyer_equipment_2_short:0 "Stug IV"
 SRF_medium_tank_destroyer_equipment_3:0 "Jagdpanther"
 SRF_medium_tank_destroyer_equipment_3_desc:0 "Jagdpanther — истребитель танков, построенный на шасси танка Panther. Он поступил на вооружение в конце 1014. Jagdpanther сочетает в себе очень мощную 8,8-см пушку PaK43 от Тигра II и характерные наклонную броню и подвеску Пантеры."
 SRF_medium_tank_destroyer_equipment_3_short:0 "Jagdpanther"
 SRF_medium_tank_equipment_1:0 "Panzerkampfwagen III"
 SRF_medium_tank_equipment_1_desc:0 "Ещё в 1005-6 году генерал Вект предусмотрел два основных типа танков, которые будут выступать в качестве наиболее многочисленных единиц вооружения для будущих танковых дивизий. Первая машина должна была быть вооружена противотанковой пушкой и двумя пулеметами, а вторая — вспомогательная — вооруженна пушкой большего калибра, пехотной. Первый из них в конечном итоге стал известен как Panzerkampfwagen III, который должен был стать стандартным танком для трёх легких рот танкового батальона. Вторая стала именоваться Panzerkampfwagen IV."
 SRF_medium_tank_equipment_1_short:0 "Panzer III"
 SRF_medium_tank_equipment_2:0 "Panzerkampfwagen IV"
 SRF_medium_tank_equipment_2_desc:0 "Разработанный как танк поддержки, Panzer IV не предназначался для сражений с бронетехникой — эту функцию выполнял Panzer III. Однако при выявлении изъянов довоенной доктрины, становящихся всё более очевидными, и перед лицом сталлионградских Т-34, Panzer IV вскоре принял на себя роль старшего брата. Pz IV стал наиболее массово производимым и применяемым танком чейнджлингов, а его конструкция легла в основу многих других боевых машин."
 SRF_medium_tank_equipment_2_short:0 "Panzer IV"
 SRF_medium_tank_equipment_3:0 "Panzerkampfwagen V Panther"
 SRF_medium_tank_equipment_3_desc:0 "Panther это типовой средний танк, разработанный чейнджлингами в середине 1014 года. Он должен был стать ответом на сталлионградский Т-34 и постепенно заменить устаревшие Panzer III и Panzer IV. Однако полная замена так и не произошла, и Panther остался поддержкой для более тяжёлых танков Tiger. Превосходная комбинация огневой мощи, мобильности и брони позволила Panther стать образцом для многих поздних и послевоенных моделей танков, так что он по праву считается одним из лучших танков своего времени."
 SRF_medium_tank_equipment_3_short:0 "Panther"
 SRF_modern_tank_destroyer_equipment_1:0 "E-25 Standardpanzer"
 SRF_modern_tank_destroyer_equipment_1_desc:0 "Улучшенная версия Jagdpanzer IV, E-25, отличается высокой скоростью и броней."
 SRF_modern_tank_destroyer_equipment_1_short:0 "E-25"
 SRF_modern_tank_equipment_1:0 "E-50 Standardpanzer"
 SRF_modern_tank_equipment_1_short:0 "E-50"
 SRF_modern_tank_equipment_1_desc:0 "Серия Entwicklung была экспериментом чейнджлингов по созданию современного основного боевого танка, первый проект которой увидел свет в 1016 году. В рамках этой серии были созданы 6 стандартизированных моделей разных весовых категорий. E-50 Standardpanzer разрабатывался в качестве среднего танка на замену моделям Panther и Tiger, а также другим, сделанным на их основе."
 SRF_motorized_equipment_1:0 "Open Blitz"
 SRF_super_heavy_tank_aa_equipment_1:0 "Flakpanzer VIII Maus"
 SRF_super_heavy_tank_aa_equipment_1_desc:0 "Шасси танка Maus, вооружённое спаренным 88-мм зенитным орудием."
 SRF_super_heavy_tank_aa_equipment_1_short:0 "FlakMaus"
 SRF_super_heavy_tank_artillery_equipment_1:0 "Geschützwagen E-100 SPG"
 SRF_super_heavy_tank_artillery_equipment_1_desc:0 "210-мм артиллерийское орудие, установленное на шасси сверхтяжелого танка, может поспорить с некоторыми железнодорожными пушками, когда дело касается огневой мощи."
 SRF_super_heavy_tank_artillery_equipment_1_short:0 "GW E-100"
 SRF_super_heavy_tank_destroyer_equipment_1:0 "Sturmgeschütz auf Fahrgestell Maus"
 SRF_super_heavy_tank_destroyer_equipment_1_desc:0 "Шасси танка Maus с 150-мм орудием, зафиксированным в неподвижной бронированной рубке."
 SRF_super_heavy_tank_destroyer_equipment_1_short:0 "Jagdmaus"
 SRF_super_heavy_tank_equipment_1:0 "Panzerkampfwagen VIII Maus"
 SRF_super_heavy_tank_equipment_1_desc:0 "Panzerkampfwagen VIII Maus был сверхтяжелым танком чейнджлингов, построенным в конце 1014 года. Это была самая тяжеловесная бронированная боевая машина, которую когда либо видел мир. Маус был вооружен орудием 128 mm KwK44L/55 со спаренной 75-мм вспомогательной пушкой. К печали чейнджлингов, она не успела поучаствовать в боях."
 SRF_super_heavy_tank_equipment_1_short:0 "Maus"

