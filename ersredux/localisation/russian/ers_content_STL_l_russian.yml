 #### EVENTS
 ers_stl.1.t:0 "Наша Лучшая Просветительница"
 ers_stl.1.d:0 "Утром в Нашем Городе был обнаружен предатель. Он критиковал Нашу Просветительницу, утверждая, что "эта кобыла подобрала целый город-государство к своим копытам и установила в нём безумный культ". Наши карательные отряды быстро и слаженно устранили нарушителя порядка.\n\nНа следующий день в Наших домах были проведены кампании по разъяснению Нашим жителям сути такого феномена эпохи, как Старлайт Глиммер. Наша Просветительница не управляет массами, а лишь выводит всех на верный путь и не имеет каких-либо привелегий от этого. А Наше общество добровольно идёт за её духом истинного равенства, никто никого ни к чему не принуждает. А Она - такая же пони Нашего Общества, как мы, товарищ!"
 ers_stl.1.a:0 "Пусть молодое поколение берёт с Просветительницы пример!"
 
 ers_stl.2.t:0 "Эквалисты требуют смены нашей идеологии"
 ers_stl.2.d:0 ""
 ers_stl.2.a:0 "Опять эти безумцы..."
 
 ers_stl.3.t:0 "Северяна отказывается"
 ers_stl.3.d:0 "Коммуны продолжают жить в ослеплённом видении "равенства". Они отказываются признавать, что все пони должны жить под одним знаменем эквализма.\n\nНо мы знаем, что народ в коммунах действительно хочет свободы от угнетателей. Но партия тиранов, прикрывающихся идеями социализма, затмила их разумы.\n\nОднажды Наша Просветительница сможет донести до них правду! Она запустит великую машину эквализма, и даже после её смерти ничто не сможет её остановить."
 ers_stl.3.a:0 "Троекратное "Ура" нашему истинному видению равенства!"
 
 ers_stl.4.t:0 "Победа над кроваво-красной угрозой"
 ers_stl.4.d:0 "Элемент неожиданности вместе с пламенной преданностью солдат создают несокрушимую силу. Не успели они опомниться, как их склады со снаряжением и форпосты были уничтожены, а наши солдаты даже получили несколько боевых трофеев, которые будут переданы в общее владение Нашего обшества."
 ers_stl.4.a:0 "Ясно одно: именно мы решим судьбу всей Северяны."
 
 ers_stl.8.t:0 "В Нашем Городе..."
 ers_stl.8.d:0 "Вырезано"
 ers_stl.8.a:0 "Так хорошо, когда есть понимающие друзья."
 
 ers_stl.9.t:0 "В Нашем Городе..."
 ers_stl.9.d:0 "Вырезано"
 ers_stl.9.a:0 "Он так счастлив, что служит Нашему Обществу."
 
 ers_stl.10.t:0 "Улыбайся! Улыбайся! Улыбайся!"
 ers_stl.10.d:0 "Вырезано"
 ers_stl.10.a:0 "Улыбайся!"
 
 ers_stl.11.t:0 "Наша культура"
 ers_stl.11.d:0 "Вырезано"
 ers_stl.11.a:0 "Я хочу, чтобы гимн играл каждый день без перерыва!"
 ers_stl.11.b:0 "Я хочу, чтобы гимн играл 24 часа в день и 7 дней в неделю!"
 ers_stl.11.c:0 "Я хочу, чтобы гимн играл с 8 часов утра до 8 часов утра!"
 ers_stl.11.e:0 "Я хочу, чтобы гимн играл постоянно!"
 
 ers_stl.12.t:0 "Наше политбюро"
 ers_stl.12.d:0 ""В-вы не так меня поняли! Я, конечно, когда-то преданно служил дворянству, но я осознал, что жизнь при коммунизме намного лучше! Не думаю, что вы можете меня за что-либо наказать." Единорог почти заикался, когда предстал перед самими членами Политбюро, но держался молодцом. "Игорь Страйкер... какими бы ни были ваши оправдания, мы не можем допустить, чтобы вы продолжали рассказывать жеребятам о своей жизни при власти царистов. Как думаете, что важнее: ваши чувства или коллективная безопасность?" Некая земная пони, видимо, секретарша, сидела за соседним столом и что-то очень сосредоточенно била по клавишам печатной машинки после каждой фразы, произнесённой присутствующими. "Но ведь я не сделал ничего противозаконного..." "Да. Мы понимаем. Ну что там, Лилия?"\n\nЗемная пони поправила очки и простучала последние строчки, после чего перевела свой взгляд на того, чья судьба уже была предрешена до того, как он попал в эту комнату. "Я составила протокол. Ячейка Нашего Общества, Игорь Страйкер, был осуждён за государственную измену и оскорбление Просветительницы. Комиссия Политбюро вынесла приговор в виде обязательных работ в совкомцентрационном лагере "Совёнок" на пятнадцать лет." Пот выступил на лбу Игоря. "Стоп... Но это какая-то ошибка... Я же сказал, я не хотел никому навредить!"\n\nЧерез несколько часов единорог был сослан в трудовой лагерь "Совёнок". Там его бросили в грязную яму, чтобы вместе с другими предателями революции он до конца жизни добывал чернозём."
 ers_stl.12.a:0 "Одним предателем стало меньше."
 
 ers_stl.13.t:0 "Судьба тиранов"
 ers_stl.13.d:0 ""ПРИГОВОР ПО ДЕЛУ О ПРЕДАТЕЛЬСТВЕ РЕВОЛЮЦИИ, СОВЕРШЁННОМ ЧЛЕНАМИ ВСЕНАРОДНОЙ СЕВЕРЯНСКОЙ КОММУНИСТИЧЕСКОЙ ПАРТИИ (далее "ВСКП"):\n\nОБВИНЕНИЕ: Распространение идей фашизма, капитализма, олигархизма, рабовладельчества, геноцида. Продвижение практики голодомора, массовые расстрелы, репрессии и прочие методы террора над населением Северяны.\n\nПРИГОВОР:\n\nВасилий Панцушенко: приговорён к расстрелу.\nВайнос Костылев: приговорён к расстрелу.\nСинистер Серов: приговорён к расстрелу.\nДарк Винг: приговорён к расстрелу.\nЧернушка: обвиняемая сбежала из-под ареста, приказ организовать поиски в срочном порядке.\nДарк Винг: попытка обжалование приговора. Повторно приговорён к расстрелу.\nНестор Лунин: приговорён к расстрелу.\nВероника Краснова: приговорена к расстрелу.\n\nОстальные приговоры указаны в приложниях номер один и номер два."\n\nПОДПИСАНО: Старлайт Глиммер, Великой Просветительницей.\n\nОтложив указ в сторону, Старлайт откинулась на спинку кожаного кресла в своём новом кабинете, который раньше был временной штаб-квартирой кого-то из тех, кто был в списке. Уже завтра они поплатятся за свои преступления против коммунизма. Все они."
 ers_stl.13.a:0 ""Ты - революционер? Ты никто!""
 
 ers_stl.14.t:0 "Сила искусства"
 ers_stl.14.d:0 "С каждым днём поэт-футурист Фезер Бэнгс убеждался всё больше, что те методы, которые применяет товарищ Старлайт для обеспечения всеобщего равенства, не работают. Он видел респрессируемых и страдающих пони, и это только пуще разогревало в нём контр-революционное пламя. Конечно, всеобщее равенство должно быть достигнуто... Но не так. Совсем не так. Правильные методы уже были здесь, в его новой книге, которую он писал уже несколько лет.\n\nЕдинственный способ, которым можно направить страну в нужное русло - это тотальный переворот. Это неразумно, опасно и многие пострадают - но в долгосрочной перспективе это даст возможность родиться утопии.\n\n"Борцы со временем" - всего лишь литературный клуб писателей-футуристов, но разве они не имеют наибольшую силу? Через поэзию, через все эти строки можно управлять народом. И Фезер был уверен - с помощью пера он сможет распространить призыв на восстание."
 ers_stl.14.a:0 "Но его никто не услышал."
 ers_stl.14.b:0 "Вставай, завод, вставай, рабочий."
 
 
 
 
 
 
