 ##### CHARACTERS
 STL_sikarus_kir:0 "Сикарикус Кир"
 STL_mikhail_tushkevskiy:0 "Михаил Тушевский"
 
 ##### NATIONAL FOCUS
 #------main tree
 ers_STL_our_town:0 "Наш Тысячелетний Город"
 ers_STL_our_town_desc:0 "Наше общество - та небольшая утопия, в которой нет эгоистичных понятий "Я" или "Моё". И нет ничего "Партийного". Есть только "Наша личность", "Наше" и "Общественное". И это продлится многие поколения."
 ers_STL_our_politics:0 "Наш Порядок"
 ers_STL_our_politics_desc:0 "Не всем пони нравится жить в нашем счастливом обществе. Но они не смогут его покинуть, ведь они уже вышли на истинный путь света и равенства."
 ers_STL_buro:0 "Наше политбюро"
 ers_STL_buro_desc:0 "В нашу маленькую утопию стекается всё больше рабочих, ищущих идеального места для коммунистической жизни. Но не все они ожидают того, что наше общество окажется настолько идеальным, что они не поверят в его реальность. Они ищут подводные камни там, где их точно нет, и стоит создать орган, который бы отслеживал, чтобы никто не копал слишком глубоко."
 ers_STL_peoners:0 "Наше молодое поколение"
 ers_STL_peoners_desc:0 "Система пионеров в Красной Северяне - плевок в лицо коммунизма. Она с ранних лет обучает жеребят тому, что выделяться своим превосходством среди других - это почётно. Настоящий пионер должен с ранних лет проповедовать эквализм, а также быть готовым идти плечом к плечу со своими товарищами."
 ers_STL_upgrade_peoners:0 "Более совершенная Пионерия"
 ers_STL_upgrade_peoners_desc:0 "WIP"
 ers_STL_jobs:0 "§RБез недовольных§!"
 ers_STL_jobs_desc:0 ""Тебе не нравится наше общество? Чтож, я могу провести тебя к твоим единомышленникам. На том свете у вас будет очень много времени для того, чтобы передумать.""
 ers_STL_consumer_goods:0 "Наши нужды"
 ers_STL_consumer_goods_desc:0 "Если мы хотим потроить истинный коммунизм и победить капиталистов Сталлионграда, мы должны быть уверены, что каждый пони отдаёт обществу всё, что он может отдать. В конце-концов, это не "его" собственность.\n\nЭто Наша собственность."
 ers_STL_war_spirit:0 "Наш боевой дух"
 ers_STL_war_spirit_desc:0 "Очевидно, что коррумпированный новосоциализм - наш злейший враг. И наша священная миссия - уничтожить всех тех, кто извратил изначальную идею коммунизма!"
 ers_STL_patriotism:0 "Магия патриотизма"
 ers_STL_patriotism_desc:0 ""Солдат в Нашей армии" - это не особый статус, ведь каждый житель нашего общества одинаково разделяет функцию рабочего, солдата и любой другой профессии. Но недавно группа чистых добровольцев решила, что они хотят посвятить свою жизнь до самой смерти охране нашего государства. Прекрасно! В нашем городе в таком стремлении никому не откажут."
 ers_STL_STG_demands:0 "Наши требования"
 ers_STL_STG_demands_desc:0 "Правительство в городе Принцессин ещё может быть спасено. Мы отправим туда сообщение, в котором выдвинем требования о полной аннексии территории Красной Северяны и передаче вооружённых и промышленных сил Нашему Городу."
 ers_STL_raid:0 "Наши первые шаги к освобождению"
 ers_STL_raid_desc:0 "Хотя нас в разы меньше, это не делает нас слабее Северяны. Мы используем элемент неожиданности и покажем им, что нас не стоит воспринимать как фанатиков-изоляционистов."
 ers_STL_free_will:0 "Свобода воли"
 ers_STL_free_will_desc:0 "WIP"
 ers_STL_march_on_square:0 "Парад на площади Равенства"
 ers_STL_march_on_square_desc:0 "WIP"
 
 
 #------isolation tree
 ers_STL_positive_equalism:0 "Изоляционный эквализм"
 ers_STL_positive_equalism_desc:0 "Всё ясно, как белый день: капиталистические страны (то есть те, которые не следуют эквализму) падут в ближайшие десять лет и уничтожат сами себя изнутри. Мы уже построили утопию и будем наблюдать закат эпохи капитала."
 stl_no_way_further:0 "-----------------\n§RМы останемся оборонять утопию §PНашего Города.§!"
 ers_STL_p_eq_bunkers:0 "Наша современная оборона"
 ers_STL_p_eq_bunkers_desc:0 "Пусть враг-завистник бросаеся в нас хоть танками, хоть самолётами - ему не пробиться в нашу маленькую утопию."
 ers_STL_p_eq_factories:0 "Поддержка внутренней промышленности"
 ers_STL_p_eq_factories_desc:0 "Важно поддерживать наше внутреннее развитие. Хоть мы и достигли гармонии, нельзя отставать в развитии от наших соседей. Нет, мы не просто не будем отставать: мы превзойдём все ведущие империалистические державы! Даже объедининённая Грифония будет казаться насекомым по сравнению с Нашим Городом."
 ers_STL_p_eq_neutrality_policy:0 "Утихомирить милитаризм"
 ers_STL_p_eq_neutrality_policy_desc:0 "Желание войны было актуально до того, как мы осознали, что достигли наших целей. Теперь война рассматривается не как средство выполнения сверх-задачи, а как событие, из-за которого наши молодые офицеры могут погибнуть. Не допустим войны!"
 ers_STL_p_eq_neutrality_policy_2:0 "Не отступим!"
 ers_STL_p_eq_neutrality_policy_2_desc:0 "Приказ "Ни шагу назад, позади Наш Город" теперь применяется не просто в экстренных ситуациях, теперь это девиз наших вооружённых сил!"
 ers_STL_p_eq_neutrality_policy_3:0 "Армия наших защитников"
 ers_STL_p_eq_neutrality_policy_3_desc:0 "Наша военно-оборонительная мощь растёт! Вместе с ней растут и потребности армии. Не будет большим грехом, если мы прикажем некоторым пони служить в армии."
 #------influence tree
 ers_STL_social_equalism:0 "Психо-эквализм"
 ers_STL_social_equalism_desc:0 "Мы сможем захватить Северяну, не пролив ни капли крови. Усиленная пропаганда, шпионаж и немного политических преступлений сломят дух банды Серова, Панцушенко, Дарк Винга и всех лже-коммунистов."
 can_influence_zlatocvet:0 "Может накладывать негативные модификаторы на §YЗлатоцвет§!\n\n"
 can_influence_princessin:0 "Может накладывать негативные модификаторы на §YСтолицу Красной Северяны§!\n\n"
 can_influence_zayatsk:0 "Может накладывать негативные модификаторы на §YЗаятск§!\n\n"
 ers_STL_social_equalism_zayatsk:0 "Послать шпионов"
 ers_STL_social_equalism_zayatsk_desc:0 "Мы начнём шпионить за жителями Северяны. Мы найдём информацию о каждом её жителе и используем её так, чтобы исход событий обернулся не в пользу кровавого режима."
 ers_STL_social_equalism_zlatocvet:0 "Сеять хаос"
 ers_STL_social_equalism_zlatocvet_desc:0 "Мы отправим некоторые наши подготовленные ячейки прямо в города Северяны, чтобы они распространяли слухи и истину о том, что на самом деле ими манипулирует капитализм. Кроме того, некоторые диверсионисты будут в открытую дискредититровать Красное правительство. Это может занять долгое время, но такая психологическая атака пойдёт только на благо обеим сторонам - мы получим больше последователей, а северянцы освободятся от оков фашизма."
 ers_STL_social_equalism_princessin:0 "Воспряньте, жители столицы"
 ers_STL_social_equalism_princessin_desc:0 "Пора начать влияние на рассадник псевдокоммунистической заразы. И хотя столица Красной Северяны кишит приспешниками фашистов, это не остановит нас."
 ers_STL_social_equalism_steal_equipment:0 "Наши диверсии"
 ers_STL_social_equalism_steal_equipment_desc:0 "Когда слов и шпионажа недостаточно - мы прибегнем к методам, которые другие назвали бы "террором", но на деле мы будем уничтожать склады с провизией и снаряжением, а также дома северянцев. Наши шпионы и внедрившиеся ячейки подстроят всё так, словно это устроило само "благожелательное" правительство Красной Северяны. Это должно привести северянцев в ярость и настроить на борьбу с чудовищным капитализмом."
 ers_STL_social_equalism_send_spies:0 "Убедить их в нашей правоте"
 ers_STL_social_equalism_send_spies_desc:0 "Кто-то назовёт это "похищением". И этот "кто-то" будет грязным, зажравшимся капиталистом, не понимающим основ истинного коммунистического общества! Мы будем отправлять миссирнерские миссии в города для того, чтобы уводить граждан Северяны прямо из-под носа капиталистов."
 ers_STL_social_equalism_last_chance:0 "Последний довод"
 ers_STL_social_equalism_last_chance_desc:0 "Мы пытались достучаться до жителей Красной Северяны. Мы пытались показать им, что их якобы "социалистический" образ жизни - обман грязных капиталистов. Но они отказываются к нам прислушиваться. Это значит только одно...\n\nКАПИТАЛИСТЫ ИСПОЛЬЗУЮТ МАГИЮ ДЛЯ ПРОМЫВКИ МОЗГОВ СЕВЕРЯНЦЕВ! МЫ НЕ ПОДВЕРЖЕНЫ ЕЁ ВОЗДЕЙСТВИЮ, ВЕДЬ МЫ СЛЕДУЕМ ЕДИНСТВЕННО ВЕРНОМУ УЧЕНИЮ - ЭКВАЛИЗМУ, И ТОЛЬКО В НАШИХ СИЛАХ ОСВОБОДИТЬ СЕВЕРЯНЦЕВ ОТ ЭТОГО ПРОКЛЯТИЯ.\nПОСЛЕДНИЙ ДОВОД - ВОЙНА!"
 #------war tree
 ers_STL_military_equalism:0 "Военный эквализм"
 ers_STL_military_equalism_desc:0 "Жеребята и взрослые, рабочие и дипломаты: готовьтесь к бою, ибо до Красного Октября ещё далеко... и мы прорубим путь к нему чистой войной."
 ers_STL_teach_em_war:0 "Наши военные учения"
 ers_STL_teach_em_war_desc:0 ""За предательство идеи Карамель Маркс, за пытки над народом Северяны, за гибель миллионов несчастных, за намеренное распространение капитализма, за уничтожение Нашего детства... они заплатят. И мы знаем - они заплатят кровью!"\n\n- Из пропагандистского выступления жеребят-новапионеров"
 ers_STL_give_em_guns:0 "Винтовка для каждого"
 ers_STL_give_em_guns_desc:0 "Каждый жеребёнок и взрослый должен знать, как обращаться с оружием. И мы их научим."
 ers_STL_conversion_to_military:0 "На рельсы войны"
 ers_STL_conversion_to_military_desc:0 "Наши военные заводы должны производить больше снаряжения. Да, всё так просто: пусть они дадут нам больше пушек!"
 ers_STL_military_bandits_no:0 "Держите их в штрафных батальонах"
 ers_STL_military_bandits_no_desc:0 "Мы не допустим, чтобы грязные предатели, которые содержатся в концентрационном лагере "Совёнок", сражались бок о бок с истинными солдатами Нашего общества. Но да, нам катастрофически нужны пони ресурсы, поэтомы мы привлечём некоторых лагерных заключённых к службе - но они не будут играть главенствующей роли в новых дивизиях. Они будут содержаться в штрафных батальонах под бдительным присмотром эквалистических комиссаров."
 ers_STL_military_bandits_yes:0 "Внезапный прилив патриотизма"
 ers_STL_military_bandits_yes_desc:0 "Конечно, мы не допустим того, чтобы осуждённые в лагере "Совёнок" служили в нашей армии... но нам катастрофически нужны пони ресурсы. Тюремщики сообщают, что большая часть заключённых "Совёнка" внезапно испытала прилив патриотизма и желает массово идти на поле боя. Желающих настолько много, что комиссаров на них не хватит - придётся формировать полноценные дивизии из бывших заключённых."
 ers_STL_military_conscription:0 ""А ТЫ уже записался в армию?""
 ers_STL_military_conscription_desc:0 "В этот тёмный час мы должны затянуть пояса и ненадолго забыть о том, в чём была наша работа раньше. Сейчас мы все принимаем на себя роль солдата.\n\n§PМАРШ ЛЕВОЙ, ДВА, ТРИ!\nМАРШ ЛЕВОЙ, ДВА, ТРИ!§!"
 can_control_conscription_flag:0 "Позволит изменять §Yзакон о призыве§!"
 stl_create_division_tt:0 "§PДух истинного равенства§! позволит нам создать §Yполностью укомплектованную дивизию!§!"
 stl_antiair_antitank:0 "Изучит базовые §Yанти-воздушные§! и §Yпротивотанковые§! технологии"
 ers_STL_military_attack_STG:0 "Большой марш-бросок"
 ers_STL_military_attack_STG_desc:0 "Настал тот момент. Момент, которого ждали все - и жители Нашего общества, и многострадальные жители Красной Северяны. Мы начнём наш священный поход против капитализма, который нагло прикрывается идеями коммунизма. Но Старлайт знает правду. И как Просветительница, все мы посвятим себя уничтожению гнилой заразы на юге."
 ers_STL_military_STG:0 "Наш триумф"
 ers_STL_collaborants:0 "Комитет корректировки мнения"
 ers_STL_collaborants_desc:0 "На освобождаемых нами территориях будут объявляться диссиденты и аморальные реакционеры и анти-коммунисты, в том числе сталлионисты и марксисты. Избавиться от такой угрозы можно только путём формирования правильного мнения о нас у местномого населения. Этим займётся новый комитет, который возглавит Пати Фейвор."
 
 #------industry tree
 ers_STL_1_factory:0 "Наша индустриализация"
 ers_STL_1_factory_desc:0 "Для того, чтобы поддержать существование нашей Утопии, мы должны развивать свои промышленные мощности. И пусть малый размер Нашей страны никого не смутит - наша индустрия станет величайшей в мире..."
 ers_STL_2_factory:0 "Наше трудолюбие"
 ers_STL_2_factory_desc:0 "В Нашем Городе не получится построить слишком много промышленных заводов. Поэтому мы должны приложить все усилия к тому, чтобы использовать Наши ресурсы как можно более эффективно..."
 ers_STL_peoners_profiction:0 "Молодые и целеустремлённые"
 ers_STL_peoners_profiction_desc:0 "Жеребята-новапионеры - это наше будущее. И чтобы с ранних лет прочуствовать всю радость от службы Старлайт и Нашему Обществу, жеребята будут работать на фабриках в тех же условиях, что и взрослые. Какое чудесное детство!"
 ers_STL_military_factory:0 "Размеренный гул"
 ers_STL_military_factory_desc:0 "Сорваны цепи кровавого гнёта,\n\nДружно врага опрокинул народ.\n\nИ закпиела лихая работа:\n\nОжил рабочий, и ожил завод!"
 ers_STL_no_lazyness:0 "Товарищ, лень губительна!"
 ers_STL_no_lazyness_desc:0 "Самый страшный враг каждого рабочего - лень! Тунеядцы, которые не желают работать, пассивно разрушают нашу Утопию, в которой все должны исполнять свой долг во имя всеобщего счастья. Отныне каждый, кто отлынивает от исполнения своего долга на рабочем месте, будет наказан. Такова воля народа!"
 ers_STL_destroy_tsarist_culture:0 "Уничтожить культуру царистов"
 ers_STL_destroy_tsarist_culture_desc:0 "Когда-то эти земли принадлежали... омерзительной царской семье. Памятники этим чудовищам Романовским стоят тут и там! И хотя активные ячейки Нашего общества пытались разрушить эти мерзкие статуи, серьёзных попыток для этого предпринято не было. Старлайт прикажет окончательно покончить с этим ужасным наследием зверского режима Романовских."
 ers_STL_society_works:0 "Общественные работы"
 ers_STL_social_collectivism:0 "Социальный коллективизм"
 ers_STL_military_factory_left_1:0 "Все дороги ведут в Наш Город"
 ers_STL_military_factory_right_1:0 "Подготовка к военному положению"
 can_do_woyennoye_polozhenie_tt:0 "Позволяет вводить §Yвоенный налог§! и объявлять §Yвоенное положение§! через решения"
 ers_STL_military_factory_left_2:0 "Чистота разума на трудовом фронте"
 ers_STL_military_factory_right_2:0 "Использовать труд предателей"
