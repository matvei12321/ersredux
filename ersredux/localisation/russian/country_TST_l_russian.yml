 ###Персонажи
 
 TST_Miron:0 "Регент Мирон I"
 TST_Miron_desc:0 "Мирон с самого своего рождения был в достатке, действительно, какой бы ещё могла быть жизнь фестрала, родившегося в семье Аякачтлинской знати? Общественный статус его семьи позволил ему получить неплохое по меркам его сородичей религиозное образование, что позволило ему в более зрелом возрасте стать одним из членов регентского совета. После смерти Оцелотоса I, который был близким другом его семьи, Мирон с лёгкостью смог стать новым главой регентского совета, одновременно с этим взяв на себя проблемы, оставленные прошлым регентом."
 
