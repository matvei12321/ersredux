 ###Ивенты
 
 tst.1.t:0 "Солнечные шпионы"
 tst.1.d:0 "Сегодня в районе города Тоналцинтли мы заметили группу шпионов от солнечных фестралов"
 tst.1.a:0 "Окружить."
 tst.1.b:0 "Отпустить."
 
 tst.2.t:0 "Теночтитлан"
 tst.2.d:0 "Пришедшие известия из Теночтитлана очень нехорошие так как там недовольны нашими действиями с их шпионскими группами и взамен они требуют отдать город Тоналцинтли либо обьявят нам войну"
 tst.2.a:0 "Не отдавать."
 tst.2.b:0 "Отдать."
 
 tst.4.t:0 "поражение Теночтитлан"
 tst.4.d:0 "Пришедшие известия из Теночтитлана очень нехорошие так как наши войска не смогли отбить его от армии Нейгуанцев и некоторые бежали с фронта а некоторые попали в плен"
 tst.4.a:0 "Смирится с пораженением."
 tst.4.b:0 "Выразить протест."
 
 tst.9.t:0 "Предупреждение"
 tst.9.d:0 "Привет, игрок!\n\nСтрана находится на стадии активной разработки.\n\nНа данный момент доступен лишь 1 путь, однако в данный момент большая часть сюжетных ивентов отсутствуют.\n\nСтрана подходит для тех, кто обычно не читает ивенты при прохождении.\n\nУдачной игры!"
 tst.9.a:0 "Хорошо."
 
 tst.10.t:0 "Юбилей"
 tst.10.d:0 "Уже как двести лет торжествует и правит наше великое регентство, хоть это и не является официальным государственным праздником, члены правящей элиты завели традицию собираться в этот день и напиваться до посинения, а тут ещё и юбилей то какой!\n\n— Э-э-эй! Мирон!.. А вы почему не пьёте? Вам не стоит переживать, того, что вас кто-то осудит! — с пьяным видом сказал один из членов свиты, уже качаясь из стороны в сторону, от количества выпитого алкоголя.\n\n— Не до пьянки мне, знаете ли, у нас в стране слишком много проблем, чтобы просто игнорировать их, закатывая праздники! — решительно произнёс юный регент. Он прекрасно понимал о существующей проблеме крестьянских мятежей, но в процессе этой пьянки он стал замечать другую, не менее серьёзную: Безответственное поведение его окружения. А ведь это, на минуточку, представители древних родов и духовная элита!\n\nС задумчивый хмурым видом он просидел вплоть до окончания мероприятия."
 tst.10.a:0 ""Проблемы требуют решения.""