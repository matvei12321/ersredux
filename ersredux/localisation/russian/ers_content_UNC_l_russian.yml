 ##### NATIONAL FOCUS
 UNC_royal_busyness:0 "Единое Королевство"
 UNC_royal_busyness_desc:0 "Единороги живут в стабильности и ведут пассивную внешнюю политику уже много лет. Давайте держать этот курс."
 UNC_people_busyness:0 "И его счастилвый народ"
 UNC_people_busyness_desc:0 "Cытость, стабильность и всеобщее процветание - вот, что означает "Юникорния"."
 UNC_look_around:0 "Заняться делами Королевства"
 UNC_look_around_desc:0 "Мы находимся на пике нашей мощи, но это не означает, что работа окончена. Наш король - мудрый правитель, и он будет поддерживать величие Королевства."
 UNC_problem_moments:0 "Проблемные моменты"
 UNC_problem_moments_desc:0 "Возможно, есть несколько... нежелатеьлных элементовв нашем Королевстве: неподчиняющиеся вассалы, террористы и чума. Но ничто из этого не представляет реальной угрозы."
 UNC_STG_problem:0 "Дети революции"
 UNC_STG_problem_desc:0 "В их действиях нет абсолютно никакой логики или бескорыстных стремлений. Коммунисты просто захотели разрушить наше многовековое королевство за одну революцию! Но этому никогда не бывать. И сейчас мы решим их судьбу."
 UNC_STG_no:0 "Наша величайшая ошибка"
 UNC_baycall_reintegration:0 "Реинтеграция"
 UNC_baycall_reintegration_desc:0 "Изначально Байкалльский регион принаджлежал Северяне. Но под её контролем он достался мятежникам! Правительство Северяны не справилось со своими задачами, поэтому теперь Байкалл будет управляться прямиком из Бейлса."
 UNC_STG_no_desc:0 "Революционеры должны быть уничтожены! Необходимо подготовить силы для вторжения в Байкалл и продвижения вглубь Красной Северяны. Хотя такой шаг довольно радикальный и будет осуждён нашим обществом, мы готовы пойти на жертвы, чтобы вернуть наши законные земли."
 UNC_STG_yes:0 "Признать коммуны"
 UNC_STG_yes_desc:0 "Наших сил недостатночно для того, чтобы подавить революционеров. И мы в принципе не хотим, чтобы единороги погибали на войне, поэтому мы признаем Северянские Комммуны как независимое государство. Лояльная нам Северяна осудит это, но чего не сделаешь ради спокойствия на границах."
 finish_war_faster_tt:0 "\n§RВойну нужно завершить за 35 дней.§!\n§YВ случае успеха:§!\n     Мы §Gаннексируем пограничные земли§! коммун.\n§YВ случае поражения:§!\n     §R-5%§! стабильности.\n     §R-10%§! поддержки войны."
 UNC_our_puppets:0 "Как там вассалы?"
 UNC_our_puppets_desc:0 "Нащи самые крупные владения - Северяна и Пранция. Они постоянно хотят ускользнуть из нашей сферы влияния, но мы усилим хватку и покончим с северянскими коммунистами и пранцузскими националистами."
 can_influence_puppets_tt:0 "Разблокирует £decision_icon_small §Yрешения§!, позволяющие устранять §Rугрозы§! в §Cнаших вассальных землях.§!"
 UNC_SVR_problem:0 "Звезда Севера"
 UNC_SVR_problem_desc:0 "В последнее время в Северяне происходит что-то помимо борьбы с красными революционерами. Но мы не считаем, что это заслуживает особого винмания... Всё, чего мы требуем от Северяны - лояльность и подчинённость нам."
 UNC_prance_problem:0 "Подавлять пранцузский национализм"
 UNC_prance_problem_desc:0 "Проклятые пранцузы-реваншисты вряд ли успокоятся в скором времени. Но, по существу, Пранция ослаблена настолько, что не сможет представлять какой-то серьёзной угрозы. Ниакого восстановления "Великой Пранции" быть не может.\n\nПусть лучше они продолжат экспортировать нам своё вино!"
 UNC_northern_puppets:0 "Статус северных земель"
 UNC_MNH_problem:0 "Независимые торговые гильдии" 
 UNC_MNH_problem_desc:0 "Наш король продал некоторые земли под управление влиятельных торговых гильдий. Казалось бы, это решение идеально и не имеет минусов, но эти гидьдии как и раньше не зависели от Короны, так и сейчас вполне самостоятельны.\n"Федерация Мейнхеттена" должна быть нашим вассалом, и пора им об этом напомнить." 
 UNC_plague_focus:0 "Умирающий город" 
 UNC_plague_focus_desc:0 "Отчёты по смертности в Филлидельфии не искрят хорошими прогнозами. Нужно направить в зону отчуждения некоторую гуманитарную помошь." 
 UNC_hide_plague_info:0 "Никакой паники"
 UNC_hide_plague_info_desc:0 "До сих пор мы не разглашали тот факт, что в Филлидельфии бушует чума. Но просто молчать о ней - не слишком эффективный способ сохранить стабильность, поэтому мы будем пресекать все слухи о том, что в большом городе происходит что-то нехорошее."
 UNC_alliance:0 "Закрепить единство наших земель"
 UNC_alliance_desc:0 "Лучший способ обеспечить верность наших марионеток нам - сформировать с ними полноценный альянс. Более тесные связи обеспечат нам процветание на долгие годы вперёд."
 UNC_inside:0 "Внутренняя ситуация"
 UNC_inside_desc:0 "Как приятно иметь чиновников и феодалов, которые проявляют полное послушание и повиновение. Они эффективно управляют нашими землями и даже не думают об участии в коррупции.\nВедь коррупции в Юникорнии просто нет, благодаря нашему Королю."
 UNC_check_the_industry:0 "Только посмотрите на нашу промышленность!"
 UNC_industry_researches:0 "Воистину, мастерская мира"
 UNC_our_neibghours:0 "Отношения во внешней политике"
 UNC_our_neibghours_desc:0 "Хотя единороги превосходят все другие расы, мы не можем просто войти в изоляцию от остальных государств, какими дикими бы они не были."
 UNC_wild_pegasi:0 "Эти... дикари"
 UNC_wild_pegasi_desc:0 "Мы всегда видели пегасов как кровожадных, грязных и необразованных существ, в прочем, за много лет ничего не изменилось. В нашем королевстве царит мир и порядок, а пегасы вечно решают какие-то проблемы. Это значит, что наше общество превосходит пегасье в разы."
 UNC_support_los:0 "Скорее исключение"
 UNC_support_los_desc:0 "Лас-Пегасус - это настоящее чудо. Где ещё можно увидеть образованных и интеллигентных пегасов, которые не только умеют читать и писать, но ещё и не воюют со всеми подряд? Мы сделаем исключение, обратив на них своё внимание."
 UNC_wild_thestrals:0 "И ещё дикари"
 UNC_ERP:0 "Не такие великие, но верные друзья"
 UNC_crystal_ponies:0 "Кристальные пони"
 UNC_griffons:0 "Возобновить грифонью дипломатию"
 UNC_olenians:0 "Великое западное королевство"
 UNC_changelings_threat:0 "Мерзкие жуки"
 UNC_changelings_threat_desc:0 "Мы не имеем и не желаем иметь дел с чейнджлингами. Этому есть одна простая причина: они - мерзкие жуки. Если кому-то покажется это оскорбительным по отношению к чейнджлингам, вы сами их видели? Это всё равно, что встретить таракана, который в сто раз больше своих сородичей. Мерзость! Единороги никогда не опустятся до общения с такими существами."
 unc_no_effect:0 "§YВ данный момент эта ветка фокусов не имеет практических эффектов, но вы можете пробежаться по ней, чтобы через косметические ивенты узнать немного о лоре Юникорнии и её отношениях к другим странам.§!"
 UNC_aristocrats:0 "Дворяне и феодалы"
 UNC_more_aristocrats:0 "Выдать им больше привелегий"
 UNC_more_aristocrats_desc:0 "Пусть наши любимые феодалы купаются в деньгах и швыряют их в море."
 UNC_young_princess:0 "Юная наследница"
 UNC_young_princess_desc:0 "Монархия в Юникорнии представляет из себя сложную систему, по которой дети монарха считаются наследниками только с полных 18-ти лет. До тех пор они - просто принцы и принцессы, и в случае внезапной смерти текущего короля не получат прав на трон до совершеннолетия. Такой проверенной временем системе точно не нужны реформы."
 princess_in_3_years:0 "§YПринцесса§! получит права на престол по достижении совершеннолетия в §C1011-м году.§!\n\n§RЕсли с королём что-то случится и этот фокус не будет выполнен, ожидайте последствий.§!"
 UNC_party:0 "За наше единство!"
 UNC_party_desc:0 "Гранд Галлопинг Гала - грандиозный фестиваль, который проводится со дня основания Королевства. Он проводится с целью показать обществу, что Юникорния стабильна не смотря ни на какие испытания. Также это позволяет укпепить феодальное единство - приехавшие со всех уголков Юникорнии аристократы за бокалом пранцузского вина обязательно поклянутся в верности Короне."
 UNC_party_good:0 "За наше превосходство"
 UNC_party_good_desc:0 "Всё прошло хорошо. Что вообще могло пойти не так?"
 UNC_party_good_2:0 "Высшее общество"
 UNC_party_bad:0 "Иногда что-то идёт не по плану..."
 UNC_party_bad_desc:0 "Проклятые террористы!"
 UNC_party_bad_2:0 "Усилить меры безопасности"
 UNC_party_bad_2_desc:0 "В связи с недавним проишествием мы усилим полицейский контроль в наших землях... до тих пор, пока общество не успокоится."
 UNC_fin:0 "Свет среди невежества"
 UNC_fin_desc:0 "Как мы и ожидали, Королевство всё ещё уверенно стоит. Лишь периодически возникают несмертельные испытания, которые просто закаляют нас."
 UNC_servants_of_god:0 "Служители Бога"
 UNC_servants_of_god_desc:0 "Церковь на продяжении столетий поддерживала нашу династию во всех начинаниях. Кроме того, священнослужители в Кастельвании занимаются защитой всего мира от вселенского зла. Они точно заслужили особого статуса  в нашем обществе."
 UNC_lower_army:0 "Новый порядок призыва"
 UNC_lower_army_desc:0 "В ближайшие несколько десятилетий наши грамотные политики не прогнозируют никаких войн - ни у одного из наших соседей нет поводов нападать на нас. Тогда зачем нам нужно развивать армию? Она даже сейчас считается одной из крупнейших в мире, к тому же, мы обладаем непобедимыми машинами - танками. Нам следует снизить темпы призыва в нашу армию и вообще дать некоторым солдатам отдохнуть от службы. Период мира и процветания продолжается!"
 UNC_international_council:0 "Щит стабильного мира"
 UNC_peasants:0 "Подумать о проблемах низших сословий"
 UNC_lower_training:0 "Снизить военные расходы"
 
 mojet_osudit_pegasov_flag:0 "Если §Y[PGS.getname]§! нападёт на наших дружественных соседей (§G[ERP.getname]§!, §G[PRG.getname]§!, §G[MNH.getname]§!, §G[SVR.getname]§!, §G[CRY.getname]§!), мы сможем §Cосудить§! их."
 los_will_join_faction:0 "Если государство §Y[LOS.getname]§! согласится, оно вступят в наш альянс, когда мы выполним фокус §YЗакрепить единство наших земель§!"
 


 ##### DECISIONS 
 
 
 ##### IDEAS
 UNC_monarchy:0 "Устоявшая монархия"
 UNC_monarchy_desc:0 "Много лет Юникорния жила под славным правлением рода Платинум, стремительно развиваясь и делая большие шаги вперёд. Никакие крестьянские революции и даже вторжения чужаков с юга не смогли пошатнуть вечный режим монархии.\nБоги, храните Короля, Королеву и их детей!"
 UNC_monarchy_1:0 "Устоявшаяся монархия"
 UNC_monarchy_1_desc:0 "Даже несмотря на то, что наш благословлённый монарх чувствует себя не в лучшем состоянии, страна всё ещё стабильна как никогда. Надеемся, Платинум поправится."
 UNC_corrupted_aristocrats_idea_1:0 "Верная аристократия"
 UNC_intelligents:0 "Состояние общества: §GИнтеллигенция доминирует§!"
 UNC_intelligents_desc:0 "Если в Юникорнии ты не простой рабочий - то ты знатный дворянин, владеющий рабочим. Именно такой расклад привёл к восстанию крестьян в Санкт-Петерсфхуфе, но непохоже, чтобы события многолетней давности кого-то волновали.\nИнтеллигенция - дворяне и различные феодалы - являются богатой, культурной и высокоинтеллектуальной кастой в нашем обществе. Они продвигают вперёд науку и искусство, но тянут военное развитие вниз, считая, что так можно предотвратить наступление войны, которая лишила бы их знатного статуса."
 UNC_workers:0 "Декадентные"
 UNC_workers_desc:0 "Единороги-аристократы предпочитают скидывать тяжёлый труд на других, будь то слуги или менее влиятельные единороги. Некоторые владельцы крестьян в своём управлении заходят слишком далеко, что вызывает протесты в небольших городах."
 UNC_closed_from_griffonia:0 "Осторожная торговля"
 UNC_closed_from_griffonia_desc:0 "Однажды открытая торговля с грифонами уже принесла нам несчастья. Мы стараемся всеми силами не повторить прошлые ошибки вновь."
 UNC_rainbow_factory_effect:0 "§RНегативный эффект§! от Погодной фабрики"
 UNC_timed_trade_with_MNH:0 "Товары из лояльного Мейнхеттена"
 UNC_closed_politics_idea:0 "Застывшая внешняя политика"
 UNC_closed_politics_idea_desc:0 "Несмотря на громкие заявления о том, что Юникорния хранит стабильность и порядок на континенте, единороги за последние десятилетия не вмешались ни в один конфликт, который происходил в Эквусе, если он напрямую не угрожал стабильности страны."
 UNC_closed_politics_idea_1:0 "Застывшая внешняя политика"
 UNC_closed_politics_idea_1_desc:0 "Несмотря на громкие заявления о том, что Юникорния хранит стабильность и порядок на континенте, единороги за последние десятилетия не вмешались ни в один конфликт, который происходил в Эквусе, если он напрямую не угрожал стабильности страны."
 UNC_think_about_people_idea:0 "Незначительные уступки крестьянам"
 UNC_less_trainings:0 "Сокращённый военный бюджет"
 UNC_little_conscription:0 "Смягчение условий службы"
 UNC_sell_lands_for_UNC:0 "Продажа земли"
 UNC_sell_lands_for_MNH:0 "Заплатить за землю"
 UNC_unp_rising:0 "СНО на подъёме"

