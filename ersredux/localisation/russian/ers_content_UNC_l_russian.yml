l_russian:

 ##### PARTIES

 ##### CHARACTERS
 UNC_king_platinum:0 "Король Эрнест Платинум"
 KING_PLATINUM_DESC:0 ""Зачем менять что-то, если это что-то и так исправно работает? Прогресс может и подождать."\n\nДинастия Платинум - одна из древнейших в мире. На протяжении тысячи лет, ещё до образования первой Империи Грифонов, Единороги жили и развивались под единым знаменем рода Платинум.\nСам король Платинум в данный момент очень стар, хотя он с помощью магии поддерживает тело в относительно молодом возрасте. Он очень консервативен и считает, что Юникорния достигла пика стабильности и мощи. Но ещё неизвестно, как поведут себя в будущем торговцы Мейнхеттена, комиссары Филлидельфии и революционеры из Сталлионграда..."
 UNC_unknown_leader_of_unp:0 "Неизвестный лидер СНО"
 UNC_rarity:0 "Рэрити Мейденс"
 UNC_twilight:0 "Твайлайт Спаркс"
 UNC_twilight_desc:0 ""Я уверена, что магия не сможет спасти нас, когда начнётся война. А вот автоматоны и новые орудия вполне смогут."\n\nТвайлайт Спаркс - единорог-материалист, презирающий магию. Когда-то она пыталась научиться волшебству, но катастрофически провалилась на последнем экзамене, поняв, что годы обучения магии прошли впустую. Теперь она пытается найти себя в другой сфере науки, и, кажется, у неё это хорошо получается. Она - младший помощник Теслы Чарма, и иногда выполняет некоторые поручения за него."
 UNC_tesla:0 "Тесла Чарм"
 UNC_tesla_desc:0 ""Однажды, клянусь, что однажды я создам вечный двигатель. И не буду я знать сна и покоя, пока меня не постигнет озарение того, как же мне осуществить эту мечту"."
 UNC_trixie:0 "Триксис Ле-ла-мун"
 UNC_trixie_desc:0 ""Это совсем не дело - беспокоить Великую Триксис, наследницу могучего рода Ле-ла-мун. Но если такова воля короля, то так уж и быть, я сделаю ради него пару дел"."
 UNC_victoria_ouren:0 "Виктория Оурен"
 
 UNC_field_marshal_1:0 "Шайнинг Армор"
 UNC_field_marshal_2:0 "Мари Грейталон"
 UNC_corps_commander_1:0 "Отто де Кери"
 UNC_corps_commander_2:0 "Ирен Стормхорн"
 UNC_corps_commander_3:0 "Албрехт Джаурес"
 UNC_corps_commander_4:0 "Герхарт Санхуф"
 UNC_corps_commander_5:0 "Сара Мидландская"
 UNC_corps_commander_6:0 "Ева д'Орлеан"
 UNC_corps_commander_7:0 "Рикард Вебер"
 UNC_corps_commander_8:0 "Хайнз Хамелин"
 UNC_corps_commander_9:0 "Адоль Шмитлер"
 UNC_corps_commander_10:0 "Джульен Граф-Антонин-Хамелин-Берглен"
 
