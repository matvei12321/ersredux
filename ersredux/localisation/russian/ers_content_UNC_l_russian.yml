 unc.29.t:0 "Реванш"
 unc.29.d:0 "Не желая мириться со своим поражением, Эрнест Платинум приказал вновь снарядить повозку в кристальные земли."
 unc.29.a:0 "Реванш"
 
 unc.31.t:0 "Белый Ястреб"
 unc.31.d:0 "Не для кого ни секрет, что нашу страну пытаются разрушить террористы из ультранационалистической организации "Союз Национального Очищения". Мы всеми силами пытаемся их уничтожить, но, похожн, мы не одни в этой борьбе.\n\nНедавно большую популярность получила так называемая "Банда Ястреба". Эта шайка наёмников очень хорошо себя проявила в боях против групп террористов на территории Мидланда, не проиграв ни одного сражения и уничтожив бесчисленное множество наших врагов. Банда состоит из представителей разных рас, а возглавляет её пегас Гриффит, известный как "Белый Ястреб". Сообщается, что его стратегические навыки превышают любого нашего генерала, и Короля посетила мысль, что такой умелый лидер будет полезен великой юникорнийской армии..."
 unc.31.a:0 "Отправьте ему предложение вступить в королевскую армию в качестве командующего."
 unc.31.b:0 "ПЕГАС??? Он не может и мечтать оказаться равным среди наших единорогов-солдат!"
 
 unc.32.t:0 ""
 unc.32.d:0 "Двое дворян неспешно прогуливались по королевскому саду в Бейлсе. Здесь позволено быть очень немногим, но эти двое были достаточно влиятельными, чтобы позволить себе такую прогулку.\n\n— Эта юная наследница - заноза в нашем боку. Она так юна и от неё уже столько проблем. Представь, что она будет вытворять, если взойдёт на престол?\n\n— "Если?" Пф, она точно станет правительницей. Король-то не будет править вечно. Готов поспорить, он плюнет на все наши древние традиции и объявит её наследницей, когда ей ещё не будет восемнадцати!\n\n— Какой позор! Лучше бы к тому времени Баравия объявила о своей независимости от Юникорнии.\n\n— И почему же?\n\n— У меня есть связи с родственниками баравского герцога. Я смогу уехать отсюда. Лишь бы подальше от проклятого рода Платинумов. И от той занозы в частности.\n\n— АГА! Так вот, что дворяне обо мне думают!\n\nСловно из ниоткуда, за спиной дворян появилась юная единорожка. Она была одета в форму ученицы, но смотрела на них, словно они всего лишь её подданые. Внезапно пони встала в грозную, победоносную позу и пафосно указала копытом на двух дворян.\n\n— Стража! Казнить их!\n\n— Шарлотта!\n\nНа место, запыхаясь, добралась пони-единорог старших лет. Все знали её как Фернезу, няню юной четырнадцатилетней принцессы. В конце-концов, её мать погибла, а отец слишком занят королевскими делами, чтобы уделять ей больше времени.\n\n— Прошу простить Шарлотту, ваше превосходительство...\n\nФернеза долго и бессмысленно извинялась перед дворянами, на что в ответ они лишь фыркнули и ушли.\n\n— Шарлотта... Я ещё могла бы простить тебе то, что ты сбежала с уроков арифметики, но то, что ты им сказала... Ты собиралась "казнить" их?\n\n— Да-да! Я же принцесса! Ну, дочь короля. Значит, буду королевой. А я читала в книге, что короли могут казнить, кого хотят!\n\n— Что... где ты об этом прочитала?\n\n— В книге по истории. Мне понравился момент, когда Юникорния была на грани распада из-за тогдашнего правителя Юлиана. Он был настолько вспыльчивый и бестолковый, что казнил каждого, кто даже косо смотрел на его причудливую причёску...\n\n— Это была неправильная книга. Тебе стоит перестать её читать. Её наверняка написал какой-нибудь пранцуз. А теперь, пожалуйста, будь добра, вернись в класс."
 unc.32.a:0 "Как скажешь, Фернеза!"
 
 unc.33.t:0 "Слухи о Филлидельфии"
 unc.33.d:0 "WIP"
 unc.33.a:0 "WIP"
 
 unc.34.t:0 "Встреча"
 unc.34.d:0 "— Фернеза! Фернеза! Я видела пони с крыльями в нашем замке!\n\nЮная принцесса чуть ли не в слезах примчалась к воспитательнице.\n\n— Ну, спокойно. У этого пони случайно не белоснежный окрас и голубые глаза?\n\n— Вроде того. Жуть какая! Почему его всё ещё не поймали?\n\n— Понимаешь ли... этого пегаса зовут Гриффит. И хотя он пегас, он может... принести пользу нашей стране. Чем он и занимается в последнее время с тех пор, как король принял его в армию.\n\n— Глупости! Он просто пегас! У него нет никакого рога, а значит, нет никакой магии! Он не может принести пользу!\n\nПринцесса обернулась и увидела, как по залам дворца шёл тот самый Гриффит с некоторыми своими подчинёнными. Один из них, неприятного вида грифон, услышал претензии Шарлотты.\n\n— Ах ты, мелкая! Как ты смеешь говорить такое о Гриффите?! Я не посмотрю, что в тебе голубая кровь или какая-то другая чушь, я тебя-\n\n— Спокойно, Коркас. Соблюдай меры приличия.\n\nСам лидер отряда вмешался в разговор. Грифон умолк, а Гриффит взглянул на Шарлотту таким взглядом, что юную принцессу сковало на месте. Что-то было в его взгляде... нет, это был не страх, а какое-то другое чувство. Чувство, которое ввело Шарлотту в ступор.\n\n— А вы берегите себя, Ваше Величество. И прошу вас простить невежество моего боевого товарища.\n\n— У-гум... — вот всё, что она смогла ответить.\n\nПегас лишь искренне улыбнулся в ответ. Затем отряд ушёл, а громыхание доспехов продолжило эхом отражаться по залам замка. Кажется, они направлялись на военный совет. А Шарлотта лишь думала: что это было? Как этот пегас одним взглядом так повлиял на неё? В его глазах не было злобы, надменности, доброты или вообще какого-то другого известного Шарлотте чувства. Но он словно одним своим присутствием решил ситуацию так, как ему было нужно."
 unc.34.a:0 ""Ну нет... он точно обладает магией!""