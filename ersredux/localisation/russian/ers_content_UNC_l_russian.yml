 #### EVENTS
 
 
 unc.1.t:0 "Быт простого пони"
 unc.1.d:0 ""Наши аристократы пребывают, бех преувеличений, в блаженстве. У них есть десятки привелегий, Корона защищает их честь и имущество, а служба в армии для них вообще не предусмотрена. Но что же с простыми пони? Посмотрим на Северяну. Право, холодный и не самый развитый регион: неудивительно, что некоторые рабочие живут на грани бедности. Но когда видишь похожую картину у нас, в столице цивилизованности Эквуса-\n\n- Э, куда полез? Ты отчёт для Короля пишешь или жалобные мемуары? Давай как по методичке: все счастливы, а крестьяне блюют радугой.\n\n- Вообще-то, мы, канцеляры, должны писать правдивые отчёты...\n\n- Вот и напишешь правду! А про крестьян пару моментов упустишь.\n\nЭрврейст уже привык к такому положению дел. Пожалуй, он бросит попытки донести до Короны неприятную правду.\n\nРабочие счастливы и всецело верны своему правителю. И точно не устраивали забастовки в последнее время."
 unc.1.a:0 "Кому до них есть дело?"
 
 unc.2.t:0 "Большие владения - большая ответственность"
 unc.2.d:0 "Когда-то Энрих Гриммлер продал нам значительную часть Пранции, и так исчезло целое королевство. Теперь Пранция - всего лишь герцогство, и вряд ли пранцузы забудут и простят нам такое. Но пока в Пранции правит лояльный нам аристократ Юникорнийских кровей - всё должно быть а относительном порядке.\n\nСеверяна - одно сплощное недоразумение. Каждый житель Юникорнии верен своему Королю, а единороги холодных земель никак не могут разрешить свой социальный конфликт. Лидеры лояльной нам Северяны утверждают, что именно деспотия привела к революции, но им самим стоило получше следить за порядком на своей земле.\n\nМейнхеттен... Что в нём плохого? Пока эти торговцы действуют в наших интересах, мы можем назвать их зависимыми от нас. Они ведь подчиняются нам, да?\n\nА Филлидельфия... Отправленные оттуда отчёты о сотнях и тысячах смертей просто кошмарны. Мы будем молиться за Филлидельфию и её жителей."
 unc.2.a:0 "Но все проблемы всегда решаются сами собой, верно?"
 
 unc.3.t:0 "Юникорния требует подчинения"
 
 unc.4.t:0 "Частичное согласие"
 unc.4.d:0 "Торговцы Мейнхеттена услышали наши требования, но сообщили, что сейчас существуют некие обстоятельства, которые не позволят Гильдии войти в полную зависимость от Короны. Но Флим и Флем - лидеры Гильлии - согласны поставлять больше товаров, произведённых и приобретённых Мейнхеттеном."
 unc.4.a:0 "Ох уж эти капиталисты."
 
 unc.5.t:0 "Отказ торговцев"
 unc.5.d:0 "Похоже, что Торговая Гильдия не желает укреплять связи между Юникорнией и Мейнхеттеном, сославшись на то, что по договору продажи земли Мейнхеттена Гильдия имеет полное право вести любую деятельность независимо от воли Короны. Это подорвало наш авторитет."
 unc.5.a:0 "Проклятье!"
 
 unc.6.t:0 "Успешный поход против коммунизма"
 unc.6.d:0 ""Недавно начавшаяся операция по декоммунизации Байкалльской части Северяны оказалась успешной! В её исходе не сомневался никто. Наши офицеры планируют дальнейшее продвижение вглубь территории революционеров до самого Принцессина. Победа будет за нами!"\n\nЭто сообщение было получено Королём от генерального военного штаба в 15:00. Но уже в 15:46 пришла подобная телеграмма... Но уже не с такими радужными прогнозами.\n\n"Наши войска не могут продолжать продвижение. Наши силы провели операцию "Яблочко", которая заключалась в пересечении озера Байкалл напрямую для внезапной атаки вражеских сил на другом берегу. Но из-за... не самого компетентного командования и ненадлежащего оборудования множество солдат утонуло, так и не добравшись до суши. Это не принимая во внимание другие провалы на фронте. Возможно, мы продвинулись в наступлении, но наши потери просто абсурдны. Высшее военное командование Юникорнии объявляет об окончании операции по декоммунизации Северяны.""
 unc.6.a:0 "Но это всё равно успех, правда?"
 
 unc.7.t:0 "Провал похода"
 unc.7.d:0 "Это кошмар. Наши силы оказались недостаточными, чтобы хотя бы продвинуться в линии фронта вперёд! Король официально объявил, что этот поход будет завершён менее чем за 70 дней и совсем без потерь.. Похоже, он немного недооценил силы повстанцев. Кроме того, что крестьянская армия сдержала нашу атаку, партизанские отряды перешли в наступление и саботировали снабжение в наших лагерях. ПАРТИЗАНЫ перешли в наступление!\n\nПродолжать этот поход не следует. В конце-концов, у Юникорнии есть дела важнее северянских "социалистов"."
 unc.7.a:0 "Кхм."
 
 unc.8.t:0 "Льются вина"
 unc.8.d:0 "Гранд Галлопинг Гала - это не просто чудесная ночь, на которой богатые и знаменитые единороги со всей страны могут встретиться и хорошо провести время. Это кульминация нашего велчиия. Ежегодно, со дня основания Королевства, мы проводим этот праздник, и всегда он проходил шикарно: подаются лучшие вина, в воздухе искрят лучшие салюты, а на сцене играют последние шедевры юникорнийских композиторов. Именно эта роскошь означает, что единорог может себе позволить всё, в отлчие от других, менее великих рас. Вот, например, можно ли что-то подобное представить в грязном пегасьем Пегасополисе?\n\n— Ле Патрон, право, в этом году нас ожидает стабильный и мирный период, так говорят астрономы-звездочёты.\n— И вы верите в эту астрономическую чепуху? Хо, я бы на месте короля Платинума выделил больше финансов на закуски к столу, чем на эту псевдо-науку. Лобстеров постоянно не хватает!\n\nНо среди всей этой толпы подозрительно выделялись двое. Они не общались друг с другом, ни с кем не пересекались взглядами и стремились находиться ближе к крупным местам скопления гостей. Кроме того, один из них с дотошной осторожностью переносил довольно странную коробку.\n\nА тем временем мероприятие продолжалось."
 unc.8.a:0 "За ваше здоровье!"
 
 unc.9.t:0 "Тик."
 unc.9.d:0 "Атмосфера празднования держалась всю ночь. Аристократы культурно отдыхали, общались, а ближе к полуночи начали говорить о том, что скоро с обращением выйдет сам король.\n\n"Итак, на сколько минут ставим?"\n\n"Чёрт его не знает, когда этот дед высунется. Но болтать он будет долго. Заводим таймер на пятнадцать минут. За это время мы успеем слинять, и король свой круп сюда притащит."\n\n12:13. Так.\n\n"Этот год был трудным, в том числе лично для меня. Трагедия унесла жизнь моей единственной и любимой супруги Эрнессы. Проклятые террористы отняли её жизнь, но память о ней никогда не будет забыта. Именно поэтому, сегодняшний салют я посвящаю в её честь, и пусть она с небес увидит, что её всё ещё любят!"\n\nТик-так."
 unc.9.a:0 "Бум."
 
 unc.10.t:0 "Прекрасно проведённое время"
 unc.10.d:0 "— Чёрт, где же господин ле Патрон?\n"Смотри! Кажется, я нашёл его!"\n\nПробравшись через небольшую толпу, двое единорогов-доставщиков предстали перед графом ле Патроном.\n\n"Ваши лобстеры доставлены, температура не должна была измениться, если временное заклинание ещё не потеряло эффекта."\n"Отлично! Эта ночь воистину будет идеальной".\n\nТак всё и прошло. Когда часы пробили полночь, на главную сцену вышел сам король Платинум со своей единственной дочерью и стражей. Место королевы пустовало, но это ничуть не испортило его приподнятого настроения.\n\nКороль выступил с многообещающим обращением ко всем собравшимся аристократам и сообщил, что салют в эту ночь будет посвящён в память о его погибшей супруге. Яркое взрывное шоу в небе изображало саму Эрнессу Платинум и её жизненный путь. Почтив память своей любимой и единственной супруги, Платинум со своей дочерью свитой удалились во дворец."
 unc.10.a:0 "Кто будет доедать вчерашние салаты?" 

 unc.12.t:0 "Партия с дворянами"
 unc.12.d:0 "Король собрал своих придворных на сбор. Он объявил, что готов провести шахматную партию с тремя умнейшими единорогами, которые есть среди его окружения. И такие нашлись. И вот, было объявлено о начале шахматной партии."
 unc.12.a:0 "Пусть эта битва умов будет справедливой!"

 unc.13.t:0 "Разочаровние"
 unc.13.d:0 "— Всё подсужено! Это худшие партии в моей жизни!\n\nКазалось бы, король должен радоваться победе, ведь он разбил своих соперников в пух и правх. Но всё же он был крайне недоволен.\n\n— И вы думаете, что ЭТО честная игра? Вы не хотите побеждать, нет вы не хотите сопротивляться, чтобы не испортить свой имидж в моих глазах. Эта лёгкая победа для меня не значит абсолютно ничего, когда соперники намеренно поддаются. Что за унижение!"
 unc.13.a:0 "Мне нужны более достойные соперники."

 unc.14.t:0 "Последняя битва Баравии"
 unc.14.d:0 "Баравский герцог Гридрих среди всех юникорнийских вассалов известен своим умением играть в шахматы. Однако, он сильно удивился, когда получил письмо от самого Короля с приглашением сыграть партию. Варавский герцог размышлял над этим предложением - в конце-концов, Баравия, покорённая Юникорнией тысячу лет назад, получает шанс отстоять свою честь хотя бы в такой игре, как шахматы. Стоял вопрос о чести его предков. В конце-концов, Гридрих решился на поединок.\n\nПриехав во дворец Бейлса, Гридрих лишь обменялся с Эрнестом парой фраз для соблюдения формальностей. Он пришёл сюда с одной целю."
 unc.14.a:0 "Ваш ход, мисье."
 
 unc.15.t:0 "Выбор хода"
 unc.15.d:0 "Партия шла напряжённо. Эрнест видел силу в своём сопернике, но и сам был далеко не новичком. И вот, в одном ходу он увидел возможность. Переместив ладью в поле контроля противника, он откорет путь для грандиозной атаки. Это может стать комбинацией, которой ещё не видела шахматная история. Но если Гридрих поймёт ход мыслей Платинума... это означает тотальное поражение. С другой стороны, он может совершить ход ферзём, поставив шах. Этот ход будет банальнмым, но проверенным временем. Однако, расклад шахмат на доске позволял обоим игрокам в случае такого хода получить преимущество."
 unc.15.a:0 "Я совершу рискованный ход!"
 unc.15.b:0 "Пусть это будет размеренная партия без дерзостей."
 
 unc.16.t:0 "Победа"
 unc.16.d:0 "— Ха, возможно, это историческая закономерность, вы так не считаете, Гридрих? — с ухмылкой обратился Платинум к своему оппоненту.\n\n— Да. Остроумно.\n\nЭто всё, что ответил баравский герцог. После этой фразы он уверенно вышел из зала и дворца, также уверенно, когда входил в него. Но мутные и обидные мысли вертелись в его голове. Очередное поражение Барарвского королевства... Похоже, на него действительно наложена историческое клеймо поражения."
 unc.16.a:0 "Никто не сомневался."

 unc.17.t:0 "Неожиданность"
 unc.17.d:0 "— Мат! Чёрные побеждают!\n\nЭрнест не мог поверить своим глазам и ушам. Неужели какой-то выскочка из Баравии одолел его? Какой-то герцог побеждённого королевства смог победить юникорнийского монарха в честном шахматном поединке? Наверно, такова была действительность. Гридрих, несмотря на свою воспитанность и сдержанность, не мог не скрыть улыбки на своём лице. Радость за такую мелочь для других... Но такое разочарование для Эрнеста.\n\nПосле партии Гридрих ещё ненадолго задержался во дворце, чтобы пораздражать монарха. Он общался с местными дамами и кавалерами, и явно пребывал в приподнятом настроении.\n\nВечером, в конце того же дня, до короля дошла весть, что в Баравских землях запускали салюты за счёт казны герцога. Вряд ли Гридрих так отмечал обычный не-праздничный день."
 unc.17.a:0 "Мы ещё увидимся..."

 unc.18.t:0 "Реванш"
 unc.18.d:0 "Король Платинум не мог смириться с тем, что баравский герцог обыграл его. Реванш - вот единственно верное решение.\n\n- Мисье Платинум, - ехидно начал свою речь Гридрих, - вам известно, что до падения Баравии Юникорния пыталась совершить против неё более десяти военных походов, а три из них даже не начались из-за некомпетентности армии? Лично я нахожу это забавным.\n\nВ этот раз он даже взял с собой в сопровождение нескольких дворян из своего окружения. И, конечно, они пустили неприятный смешок, который раздражал короля. И этот нагец смеет насмехаться над самой Юникорнией?! Чтож, в этот раз ему точно не ждать победы."
 unc.18.a:0 ">"

 unc.21.t:0 "Просьба барона"
 unc.21.d:0 "Один влиятельный барон из  земель заявил, что ему необходимо заполучить своих крестьян обратно. Когда-то он отдал в армию огромное число крепостных "добровольцев", за что сыскал большую благосклонность короля. Однако, сейчас он считает, что пора вернуть собственность законному владельцу. В противном случае он угрожает настроить нескольких крупных дворян против короны."
 unc.21.a:0 "Вернуть крестьян барону."
 unc.21.b:0 "Они останутся в армии."

 unc.22.t:0 "Делегация в Кристальный город"
 unc.22.d:0 "Никто среди единорогов Юникорнии не сможет одолеть Короля в шахматах, а значит, нужно мыслить шире, за пределы Юникорнии. Он долгое время размышлял. Будет ли [ERP.getleader] хорошим противником? Сомнительно. Земные пони вечно копаются в земле, они шахмат-то не видели. Может, [OLE.getleader]? Олени - изящные и гордые существа. Наверняка они могут стать соперниками Королю. Вот только поездка в [OLE.getname] займёт слишком много времени.\n\nИ тут он вспомнил идельный вариант. Единорог, которая живёт сотни лет. Единорог, которая и провела первую шахматную партию с одним из юникорнийских королей. Одна из мудрейших правителей прошлых времён и современности. Точно. Поездка в [CRY.getname] не должна быть слишком долгой.\n\n---------\n-Где-то неподалёку от границ Юникорнии и Принцессштата-\n---------\n\n— Эй, Элен, смотри! Это ж дипломатический конвой с королевской каретой. — Солдат-пограничник казался взбодрённым. Не всегда можешь увидеть королевский конвой.\n\n— Неужели? Чудо какое-то. Король много лет не покидал столичного Бейлса десятилетиями, а тут решил отправиться заграницу? Это как-то... безррасудно.\n\n— Значит, дело государственной важности. Возможно, скоро будут решаться вопросы мирового масштаба...\n\nДвое стражников отдали честь конвою и молча пропустили их через границу. Потеряв конвой с королевской каретой каретой из виду, они помолились за благополучное возвращение Короля."
 unc.22.a:0 "Кто знает, что с ним может случиться по дороге."
 
 
 unc.24.t:0 "В кристальном дворце"
 unc.24.d:0 "— Ох, Эрнест Платинум? Мне сказали, что в Принцессштат направляется делегация из Юникорнии, но я не ожидала встретить вас лично... в такие времена.\n\n— О чём вы, принцесса Аморе?\n\n— Я слышала, что в Королевство пришла чума. Некие террористы постоянно совершают злодеяния, вассалы произвольничают...\n\n— Ах, это. Не обращайте внимания на эти слухи. Нелепые невежды просто хотят посеять панику. Королевство процветает, как никогда... уверен, то же самое можно сказать и о вашем государстве.\n\n— В моём... Да. Так, цель вашего визита...\n\n— Партия в шахматы.\n\n— Хм. Вероятно, вам известны истории о том, что первую игру в шахматы провели я и юникорнийский король. Это правда. Мы вдвоём придумали правила и разработали фигуры, их ходы... Не думайте, что вам так лего достанется эта победа. Хоть мне и приличное количество лет, я всё ещё помню способы, как выйти в победную для меня ситуацию из любого положения.\n\n— Конечно, принцесса. Но и вы не надейтесь, что такой пожилой жеребец как я, не может быть достойным соперником.\n\n"А? Пожилой? На вид ты выглядишь не старше 40-50..."\n\nКристальный шахматный стол был установлен, места для игроков тоже. Время пошло."
 unc.24.a:0 ">"
 
 
 unc.25.t:0 "Выбор хода"
 unc.25.d:0 "Для короля партия началась паршиво. Ситуация на доске развивалась стремительно и явно не в его пользу. Вот уже несколько пешек один пони были выбиты из игры, в то время как Платинум не смог лишить Аморе ни одной фигуры. Ни одной, чёрт возьми!\n\nИ вот, на доске образовалась любопытная картина. Эрнесту открылись три варианта пути. Он может нацелить свои силы на вражеского ферзя и уничтожить её через один ход - мощная фигура будет устранена. Однако, в это же время он увидел, что следующим ходом рискует потерять ладью. Не то, чтобы он расценивал потерю своей ладьи и вражеского ферзя равноценно... В конце-концов, он мог воздержаться от таких действий, ведь ситуация на доске позволяет ему организовать свою личную комбинацию: Юникорнийский Гамбит. Аморе точно не знает о такой комбинации, и вряд ли сможет ей что-либо противопоставить."
 unc.25.a:0 "Атаковать ферзя!"
 unc.25.b:0 "Защитить ладью!"
 unc.25.c:0 "Подготовить лучшие позиции для совершенного гамбита!"
 
 unc.26.t:0 "Выбор хода"
 unc.26.d:0 "Решение оставить ладью сейчас буквально спасало положение короля. В ходе партии ферзи обеих сторон столкнулись и были выбиты. И у Аморе, и у Платинума оставалось не так много фигур, поэтому приходилось исхитряться, чтобы получать преимущество.\n\nИ вот, чёрный король Платинума оказался окружён. Нет, это был не мат, но ситуация была критическая. К тому же, минута скоро должна была закончиться... Он не мог позволить себе ничью из-за какого-то таймера! Он - Король! Так пусть само время будет подвластно ему! В этот короткий промежуток времени Эрнесту в голову моментально пришло три варианта. Он мог поставить шах белому королю, спасти своего короля или совершить отчаянную атаку. Платинум отогнал от себя последнюю мысль, ведь в ходе такой авантюры он потеряет свои и так ничтожные остатки фигур..."
 unc.26.a:0 "Отрезать вражеские пути отхода!"
 unc.26.b:0 "Выбраться из окружения и контратаковать потом!"
 unc.26.c:0 "Всё, что есть у меня, я отдам просто так!"
 
 
 
