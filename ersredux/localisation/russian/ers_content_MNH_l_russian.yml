 ##### DECISIONS 
 MNH_companies_cat:0 "Деньги и Власть"
 MNH_companies_cat_desc:0 "Власть в  §Y[ROOT.getnamewithflag]§! достаётся тому, кто имеет самый большой капитал. Если одна из организаций получает слишком много ресурсов и нелояльна, она может принести ряд проблем.\n\n£GFX_harmony_texticon   Лояльность СЛЭ : §Y[?MNH.els_loyalty]%§!\n            Ресурсы СЛЭ: §Y[?MNH.els_money]§!\nЛиберализаторы экономики - это те предприниматели, которые недовольны текущей экономической политикой Федерации. Они выступают за снижение уровня зверства капитала и улучшение условий жизни простого народа.\n----------------------------\n£GFX_evolutionary   Лояльность капитал-коммунистов : §Y[?MNH.capital_communists_loyalty]%§!\n            Ресурсы капитал-коммунистов: §Y[?MNH.capital_communists_money]§!\n            Ресурсы СЛЭ: §Y[?MNH.els_money]§!\nКапитал-коммунисты считают, что капитал, производимый рабочим классом, должен распределяться между всеми поровну, а налоги должны быть уничтожены как таковые.\n----------------------------\n£GFX_pmc_text_icon   Лояльность Военных Корпораций: §Y[?MNH.military_companies_loyalty]%§!\n            Ресурсы Военных Корпораций: §Y[?MNH.military_companies_money]§!\n----------------------------\n£GFX_ff_text_icon   Лояльность F&F (TM): §Y100%§!\n            Ресурсы F&F (TM): §Y[?MNH.fnf_money]§!"
 
 
