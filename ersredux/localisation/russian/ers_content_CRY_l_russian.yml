 CRY_pacifism_desc:0 "Кристальные пони не очень воинственны по своей природе."
 CRY_pan_ponyism:0 "Кристальный пан-понизм"
 CRY_pan_ponyism_desc:0 "В кристальном государстве уживаются вместе кристальные пегасы, кристальные единороги и кристальные земные пони. Несмотря на то, что они считаются единым народом, три кристальных расы имеют ряд разногласий меж друг другом."
