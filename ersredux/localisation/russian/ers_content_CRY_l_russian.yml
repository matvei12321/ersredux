 CRY_crystal_state:0 "Кристальное государство"
 CRY_crystal_state_desc:0 "На территории государства [CRY.getname] находятся самые большие запасы магических кристалов в мире. Некоторые учёные выдвигают теорию, что такое количество сосредоточения кристальной энергии повлияло на развитие местных пони, что привело к их эволюционированию в новый вид - в кристальных пони."
