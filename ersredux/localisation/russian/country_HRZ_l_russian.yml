###Фокусы###
HRZ_raut:0"Ежегоный раут"
HRZ_raut_desc:0"В Имперской Федерации есть традиция: 15 февраля каждого года главы все государств Федерации собираются в Имперском дворце на раут, для обсуждение минувших и будущих планов. Мероприятие приурочено к становлению Хейнса Мольда регентом Гровера IV"

HRZ_go_to_Aquila:0"Встреча в Аквиле"
HRZ_go_to_Aquila_desc:0"С года создания Федерации Аквелийская республика оставалась одним из самых главных наших союзников. Эрцгерцог посетит Аквилу, чтобы встретиться с президентом Сеселией Гудро и обсудить совместные морские и военные учения"

HRZ_AUR_army_training:0"Учения наземных сил"
HRZ_AUR_army_training_desc:0"Армия Аквелии и Герцланда существуют уже более двух веком, и их тактики различаются, не смотря на то, что они находятся в одной Федерации. Их совместные маневры и учения придадут нашим армиям еще больше боевого и тактического опыта"

HRZ_AUR_fleet_training:0"Учения военно-морского флота"
HRZ_AUR_fleet_training_desc:0"Что у Герцланда, что у Аквелии внушительный флот с давней историей. Пора поделится своими знаними между собой в самых масштабных военно-морских учениях за всю историю этих стран"

HRZ_AUR_cash_finance:0"Аквелийские инвестиции"
HRZ_AUR_cash_finance_desc:0"Экономика Аквелии очень богата, и если мы сможем заствить их инвестировать в нашу экономику, то мы очень хорошо выйграем"

HRZ_go_to_Wingbard:0"Поездка в Вингбардию"
HRZ_go_to_Wingbard_desc:0"Вингбардия является жемчущиной юга и налаживания с ними еще более тесных отношений в экономическом плане, ключ к улучшению и расширениюнашей промышленности"

HRZ_Wingbard_fabric_HRZ:0"Общее развитие промышленности"
HRZ_Wingbard_fabric_HRZ_desc:0"Создав общие комитеты по строительству новых предприятий, мы сможем расширить свои гражданские сектора промышленности"

HRZ_Wingbard_war_factories_HRZ:0"Общее развитие военной индустрии"
HRZ_Wingbard_war_factories_HRZ_desc:0"Создав общие комитеты по строительству новых военных предприятий, мы сможем расширить свои военные сектора промышленности"

HRZ_Grover_vi:0"Смерть Гровера VI"
HRZ_Grover_vi_desc:0"К сожалению, после продолжительной болезни, наш Кайзер умер. Пришло время эрцгерцогу готовится к коронации"

HRZ_Grover_vii:0"Да здравствует Гровер VII"
HRZ_Grover_vii_desc:0"Эрцгерцог готов к коронации, и теперь может воссесть на трон и стать седьмым Кайзером нашей славной Империи \n\n§YДа здравствует Кайзер Гровер VII§!"


