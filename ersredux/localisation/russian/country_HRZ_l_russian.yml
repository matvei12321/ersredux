###Ивенты###
HRZ.1.t:0"Разослать приглашения"
HRZ.1.d:0"Габриэла Крамер сидела за письменным столом уже четвертый час, вырисовывая каллиграфическим почерком букву за буквой, предложение за предложением. На улице уже стемнело, и приходилось работать под светом свечи, да, у нее была лампа в комнате, но она привыкла к свечному освещению так сильно, что могла писать только при нем. В ее обязанности написание официальных королевских писем, а для этого ее выдержка, мягкая лапа и прекрасный почерк подходили просто прекрасно. Она каждый год писала эти приглашения, так что она их писала практически с закрытыми глазами. Наконец она завершила написание последнего приглашения, поставила точку и отложила лист в сторону. Завтра она отнесет эти листки на подпись Кайзера и их отправят по странам, а пока что она очень проголодалась..."
HRZ.1.a:0"Пора ужинать"

HRZ.2.t:0"Испорченный раут"
HRZ.2.d:0"—А где Эрцгерцог, Герр Кайзер?-поинтересовалась Сесилия Гудро, подойдя к престарелому грифону. \n\n—Он скоро придет, мадемуазель Гудро, он готовит нам какой-то обращение по поводу его будущего правления. \n\nОна кивнула и отошла в сторону, к Королю Вингбардии и главному рыцарю ордена Фронтира, что разговаривали о новом вооружении. Она, конечно, мало что понимала, но считала, что лучше было бы послушать их разговор. Через несколько мину главные двери открылись и в зал вошел эрцгерцог в своей парадной форме: голубой китель, красная лента через грудь, светло-серый плащ, награды и кепи Имперской Федерации тоже под цвет кителя. Он прошел в середину зала, а после привлек внимание всем, постучав бокалом об бокал, а затем поставил их назад. \n\n—Кхм...я хотел бы вам рассказать о проекте, что готовит я с моей командой знакомых министров-он вновь кашлянул, посмотрел на листок что держал в лапах, но понял, что здесь лучше говорить как есть. \n\nОн перемялся с лапы на лапу и начал говорить. \n\n—Нужно начать с истории...давайте все вспомним для чего был создан Фронтир. Это орден что защищает нас от орд пони с востока, так? Он существует около 200 лет, и все время доблестно охранял наши границы, но вот только,-он сделала паузу.-Граница давно проходит по более южной стране и занимает огромные расстояния, отношения с Речной Федерацией лучше любого другого момента в истории...Я думаю многие поняли к чему я клоню...Я считаю что пора расформировать рыцарский орден Фронтира, а его территории включить в состав Герцланда. \n\nСказать, что данное предложение повергло всех в шок, ничего не сказать. Самым резким был высший рыцарь Винрих фон Книпроде, что тут же начал ругаться. \n\n—Что значит расформировать?! Герр Кайзер, это вздор! Он хочет уничтожить нашу историю! Это возмутительно! \n\nСтарый грифон лишь посмотрел на своего сына, ничего ему не сказав, что вызвало у рыцаря еще большую злость, и он с руганью вышел из зала, направившись в свои покои. За ним выбежала мадемуазель Гудро, а эрцгерцог, пожав лапами, также вышел из зала и пошел в свой кабинет, даже не посмотрев на разговаривающих Винриха и Сесилию."
HRZ.2.a:0"Вечер был испорчен..."

HRZ.3.t:0"Упрямый грифон"
HRZ.3.d:0"Сесилия выбежала из зала, в надежде нагнать Винриха, и успела застать его в коридоре, окрикнув его. Он обратил на нее внимание и остановился. \n\n—Что вам нужно, мадемуазель Сесилия?! \n—Я думаю, что вы поспешили делать выводы, Герр фон Книхпроде...\n—Вот как? И почему же? \n\nСесилия была рада, что смогла остановить старого грифона.  \n\n—Ну понимаете...я уверена, что это черновой вариант его проекта, тем более, если рассуждать с точки зрения логики, а не эмоций, то он ведь прав, посудите сами.... \n—И вы за него!-он резко прервал Сесилию.-Он хочет разрушить наш орден, уничтожить его, а что он сделает потом? Потом он... \n—Это не должно вас волновать!-так же грубо прервала его мадемуазель президент, что грифон даже удивился.-Вы рыцарь! Вы охраняли границу Империи всю жизнь, и ваши предки это делали ведомые честью служения Кайзеру, и вот наконец-то наследник говорит, что ваша задача с честью выполнена и Империя в безопасности, и что делаете вы?! Вместо торжественного ухода с позиций и предоставление их новому поколению защитников Империи, вы словно баран уперлись в стену и не хотите отходить! Знаете что, когда эрцгерцог придет к власти, я буду первой, кто одобрит его план по ликвидации вашего ордена! \n\nОна прорычала, и развернувшись, горделиво пошла обратно в зал."
HRZ.3.a:0"Упертый баран!"

HRZ.4.t:0"Приезд в Аквилу"
HRZ.4.d:0"Эрцгерцог ехал в машине, которая находилась в центре дипломатической колоны, которая въезжала в Аквилу. В других машинах находилась его охрана и другие послы. Он очень любил посещать Аквилу из-за ее красивой архитектуры, часть которой осталась еще далеко в прошлом, особенно центральные кварталы. Подъехав к Максимилианскому Дворцу, колона въехала на его территорию. На ступеньках уже стояла президент и ее несколько министров, что тут же поприветствовали миссию и эрцгерцога. Зайдя внутрь дворца, министры ушли в одну сторону, а Гудро повела Гровера в другую сторону, чтобы поговорить со старым другом.\n\n—А где Мария?-поинтересовалась Сесилия.-Вы же с ней должны были приехать? \n—К сожалению, она заболела и осталась в Грифенхейме.-с небольшой грустью ответил грифон. \n—Ну это правильно,-кивнула мадемуазель президент,-лучшее для нее, это покой. \n—Очень жаль, что Мария не приехала домой в этот праздник голубой луны...\n—Она решила, что встретить его в кругу имперской семью будет лучше. \n\nСесилия вздохнула, так как хотела увидеть подругу, после чего развернулась и поняв, что им не о чем в принципе говорить, позвала его обратно к министрам."
HRZ.4.a:0"Лучше стоит обсудить военные планы..."

HRZ.5.t:0"Ночной разговор"
HRZ.5.d:0"Сесилия шла по коридору дворца, как заметила стоящего на балконе Эрцгерцога. Она удивилась, так как не ожидала увидеть его здесь в такое время, отчего подошла, немного покашляв, привлекая его внимание. \n\n—Ой, еще раз привет, Сесилия.-произнес грифон, разворачиваясь к президенту.\n—Ты что здесь делаешь?-с интересом спросила грифонка.\n—Да вот, отдыхаю и настраиваюсь на сон, наблюдая за звездами и просыпающейся от зимы природой...у вас более маленький город чем Грифенхейм, а поэтому звезды видны лучше, да и природа у вас тоже красивая...\n—Благодарю.-с небольшим сарказмом ответила Сесилия, подходя ближе к грифону и становясь рядом.-Мне кажется тебе одиноко...ты на несколько недель будешь оторван от Марии...\n—А я и не знал, спасибо что напомнила...-фыркнул грифон, отворачиваясь в другую сторону.\n\nСесилия незаметно попыталась положить свою лапу на лапу грифона, что сразу заметил эрцгерцог и быстро убрал лапу, повернувшись к президенту с раздражённой мордочкой. \n\n—Ты опять за свое?!-рявкнул грифон.-Прошло более 10 лет, а ты все продолжает ко мне преставать! \n—И что? Ты ее любишь на протяжении этих 10 лет, а я не могу также долго испытывать чувства?-в подобной же резкой манере, ответила грифонка.\n—Тебе больше никогда не быть со мной! Скоро я стану Кайзером все, и нет, я не изменю своего решения! Чем раньше ты это поймешь, тем легче тебе будет, я просто так разрывать с тобой дружбу я не хочу...-грифон начал агрессивно, но закончил слегка печально, так как действительно дорожил дружбой с ней, тем более если понимать, что это дружба между главами двух государств.\n—Нет! И не собираюсь. Она всегда была прекраснее любой, ей всегда доставались лучшие взгляды и лучшие грифоны, а что оставалось подруге? Ничего! Даже сейчас, ни одного нормального самца во круг меня нет! Одни придурки!\n\nОна резко развернулась и пошла прочь, оставляя эрцгерцога в недоумении и еще больших раздумьях. Вернувшись в свою комнату, она подавила в себе признаки слез и записала в дневник: «Четверг. Вечер. Небольшая ссора с Гровером...». После чего отложила его в сторону, и посмотрела на луну в свое окно, серп которой восходил над горизонтом."
HRZ.5.a:0"Еще несколько таких ссор, и я его точно разлюблю."

HRZ.6.t:0"Звездная ночь"
HRZ.6.d:0"Гровер и Мария стояли на заднем дворе своего коттеджа далеко на севере от Грифенхейма. Они занимались одним из самых их любимым совместным делом, а именно наблюдением за звездами. Рядом с ними стоял телескоп, столик с атласом, но самое главное для них, что они стояли рядом с друг другом и наслаждались звездным небом, в котором они постоянно находили что-то новое, и постоянно мечтали о том, что находится где-то там, далеко. Эрцгерцог рассказал своей жене о том, что родители и ее подруга были расстроены, что та не приехала домой в зимние праздники. \n\n—Я понимаю, но я должна была хоть раз встретить праздник голубой луны в новой семье...и еще до сих пор новый для меня праздник...Новый год. Да и я не открою тебе секрет, что твоему отцу мало осталось, возможно, даже это был последний праздник, так что я была обязана...\n—Я понимаю,-прервал ее грифон и, приобняв крылом, подтянул  к себе.-Но я обещаю тебе, что на следующие зимние праздники мы поедем к тебе в деревню, я знаю как тебя тяготит огромный город...а также я соскучился по гратену и фрикасе твоей матери. \n\nУлыбнувшись, он прижал жену к себе и поцеловал ее."
HRZ.6.a:0"Скоро мы поедем домой..."

HRZ.7.t:0"Покушение в Фалькоре"
HRZ.7.d:0"Эрцгерцог и герцогиня сошли поезда в Фалькоре, где их сразу встретил военный оркестр. Здесь им предстояло принять парад войск Вингбардии на центральной площади города. По этому поводу были развешаны флаги обоих государств, заголовки газет пестрили громкими заголовками, и даже был опубликован маршрут следования имперской колоны, чтобы каждый увидел наследника престола. Гровер и Мария сошли со ступеней вокзала и сели в автомобиль с открытым верхом, это было личная просьба эрцгерцога, так как в городе стояла невозможная жара, а герцогиня плохо переносила высокие температуру. Маршрут следования был специально выбран около реки, чтобы ее прохлада хоть как-то спасала герцогиню. \n\n—Какая же здесь жара... \n\nВсе повторяла Мария, но мордочка у нее все равно была веселая, чтобы не расстраивать огромное количество жителей, что собрались по пути следования колоны. «Я понимаю дорогая, но мы здесь на один день, потом мы поедем в Карфин, там более прохладная погода, я смотрел в прогнозе.»-пытался приободрить Гровер свою жену, специально обняв ее на глазах у всех, что сразу запечатлел ближайший фотограф.\n\nМария была тронута данным действием, и улыбнувшись немного успокоилась, как неожиданно взади прогремел взрыв и послышались крики. Обернувшись, они увидели перевернутую машину, что следовала за ними. Это устроил один из террористов Фалькора, что неудачно бросил гранату, и скоро был схвачен при попытке к бегству. \n\nЛичный водитель Гровера мгновенно сорвался с места и как можно скорее поехал куда подальше, руководясь приказами сидевшего рядом шефа полиции, что показывал дорогу. Приехав в ратушу Фалькора, Гровер резко обругал всех стоящих перед ним министров и губернатора. \n\n—Что будем делать, дорогой?-с нервозностью спросила Мария, прижавшись к мужу.\n—Я хочу провести этот день с моими друзьями, а не с этими...можете сказать, что парад отменяется!\n\nПосле чего Гровер развернулся и сев в машину, скомандовал везти его в больницу Фалькора, куда доставили раненых. Машина пересекла площадь и поехала по большой улице Фалькора, перед тем как повернуть направо. Проехав несколько метров, в машине раздался крик:"Не туда! Следующий съезд!". Это был шеф полиции что показал дорогу. Машина стала разворачиваться, после чего он вновь произнес, что можно было проехать все же и здесь. Этой замешкой воспользовался один из террористов, что случайно оказался на этой улице. Все услышали вскрик Гровера: «Мария!»-и прозвучавшие два выстрела, после чего ближайшие единороги-полицейские выбили оружие из рук грифона и напали на него.\n\nЛичный водитель, друг Гровера и Марии, развернулся и посмотрел на своих пассажиров: Мария была накрыта телом Гровера, на спине кителя которого виднелись два следа от пуль и из которых текла кровь. Гровер успел закрыть свою жену от выстрелов, тем самым, спася ей жизнь. Все вокруг стали пытаться как то помочь и звать скорую, а еле живой эрцгерцог лишь смог выдавить из себя несколько предложений, что кричал из всех сил, однако, совсем не громко и их слышали лишь двое: шеф полиции и личный водитель. \n\n—Ты...-он смотрел на жену, что пыталась хоть что-то сделать.-Ты...станешь наследницей...ты будешь Кайзериной! Все слышат...я...я передаю свой трон...ей... \n\nПосле данный слов глаза грифона закрылись и в объятиях жены, что истерично и со слезами на глазах звала на помощь, он перестал дышать."
HRZ.7.a:0"Гредет что-то страшное..."

HRZ.8.t:0"В честь Гровера"
HRZ.8.d:0"Мария зашла в комнату в отеле, где они с Гровер должны были переночевать и затем выехать в Карфин. Весь день она провела в больнице, оформляя документа и навещая раненых от первого взрыва. Она была полностью уничтожена, и ей уже ничего не хотелось, она потеряла часть себя. Пройдя на кухню, она увидела, как личный водитель сидит за столом с пистолетом в лапе и бутылкой шнапса. \n\n—Ты чего это, Рихтер?-боязно спросила Мария, подходя ближе.\n—Это я во всем виноват...это все я!-Грифон чуть ли не рыдал от отчаяния.-Это я загнал нас туда, и это я виноват в его смерти...Перед Бореем я могу искупиться только одним...\n—Э, ты что дурак что ли? Положи пистолет, ты не в чем не виноват.-она пыталась его успокоить и начала подходить ближе.\n—Кто нас туда повез?! Кто остановился на этом гребаном перекрестке и стал разворачиваться?-он выглядел еще хуже чем Мария, в его голосе чувствовалась нервозность а нерешимость.\n—Если так разбираться, то виноват шеф полиции, ты лишь выполнял приказы. Можешь не переживать, мы его потом осудим, но последнего чего хотел бы Гровер, так это то, чтобы его друг просто застрелился, оставив меня вообще одну.\n\nГрафиня подошла и выхватила пистолет из его лап, хотя он в принципе не сопротивлялся и сам ей его отдал. —Все.-она похлопала его по плечу.-Хватит это пить! Есть более лучший напиток.\n\nОна полезла в свою сумку и достала бутылку домашнего вина, из ее деревни. Пистолет же она разредила и положила туда же. \n\n—Мы ему уже не поможем, единственное что мы можем...-она поставила бутылку на стол.-Благородно проводить его к Борею.\n\nОна так же взяла бокалы, и налив в них вина, сила на противоположную сторону стола от Рихтера."
HRZ.8.a:0"За Гровера!"

HRZ.9.t:0"Известие"
HRZ.9.d:0"Гровер VI сел за стол, где его уже ждала жена Маргарет и слуги, что уже принесли все к завтраку. \n\n—Что читаешь, дорогая?-поинтересовался Гровер, разбивая ложкой куриное яйцо в пашотнице.\n—Да так...аквелийская фантастика: «Полет на луну»...\n—Интересно.\n\nКайзер поинтересовался у прислуги, приносили ли утреннюю газету, на что один из слуг принес к Гроверу совершенно свежую газету, прямо из типографии. Там писали о погоде, о новостях спорта, он любил почитать о жизни обычных грифонов, а узнать это можно было лишь из газет. Однако, лишь взглянув на первую страницу, он переспросил правильная ли это газета, а после того как ему ответили положительно, он уронил ее из лап и откинувшись на спинку стула, начал тяжело дышать. \n\n—Что такое, дорогой?-взволновано спросила супруга, кладя книгу на стол.\n\nВ глазах Гровера потемнело, а в груди ужасно сжало и закололо, от чего он схватился за нее, что вызвало панику у Маргарет, что быстро подбежала к мужу, в надежде помочь. На столе лежала газета, главным заголовком которой было: «Эрцгерцог застрелен в Фалькоре. Кто теперь станет наследником трона?». Принцессе тоже стало не хорошо, однако она не потеряла самообладание, и продолжила быть рядом с Кайзером, пока не приехала скорая которая констатировала, что у Кайзера случился обширный инфаркт, в следствии которого тот впал в кому."
HRZ.9.a:0"Ему осталось недолго..."

HRZ.10.t:0"Ложь во благо"
HRZ.10.d:0"Мария вместе с новым свои советником Рихтером, который раньше был их личным водителем и постоянно находясь рядом с ними набрался небольшого опыта в этих делах, прошла в имперские покои и сразу направилась в обеденный зал, где сидела принцесса, дочитывая ту книгу, что она начала читать, когда у ее мужа случился инфаркт, что очень сильно ударило по восприятию. Когда принцесса увидела этих двоих, она сняла очки и указала на грифона. \n\n—А это кто? Ты не хочешь сказать...\n—Что?! НЕТ!-резко прервала Мария.-Это мой новый советник и пока что единственный друг, на которого я могу положится. Так что теперь он будет ходить всегда со мной.\n\nПринцесса опустила глаза и, немного помотав головой, сняла очки, положив их на стол.\n\n—И зачем ты пришла?-поинтересовалась Маргарет.\n\nМария с Рихтером сели за стол, и она приготовилась к сложному разговору.\n\n—Дело в том...в это сложно поверить, но эрцгерцог, в момент смерти передал права на трон мне...\n\nМаргарет подняла бровь и было понятно, что она не верит ни одному слову.\n\n—Что он еще сделал?-с сарказмом спросила принцесса.\n—Это правда. Я конечно понимаю что это не слишком достоверный источник, но он,-она показала на рядом сидящего Рихтера,-и шеф полиции слышали это...Но даже если ты мне не веришь...я тебя прошу, нам нужно написать поддельное завещание Кайзера, кому он передает трон. Пойми...что будет лучше: если Империя останется в одиночестве и с вероятностью 100 процентов разрушится и начнется гражданская война за титул Кайзера, либо если придет к власти поддельный, но все же наследник, официальный, и на титул Кайзера никто претендовать не сможет? Ведь ты должна понимать, что в таком возрасте в коме просто не выживают. Ты должна понимать, что бывает ложь во благо, и здесь именно такой случай...или ты хочешь смерти миллионов невинных граждан, что погибнут в гражданской войне? Ты хочешь корить себя за это, хотя могла исправить? Я жду твоего ответа сейчас же, можешь подумать минуту, но жизнь отечества зависит от тебя...\n\nОна откинулась на спинку стула, а рядом сидящий грифон пристально следил за принцессой, у которой бегали глаза от незнания что делать. Спустя минуту, она выдохнула и спросила: "А что вам от меня то надо?"\n\n—Ты должна подтвердить подлинность документа, что это завещание написано в то время, пока Гровер еще был в сознании. Типа он решил, что его дни сочтены и необходим новый наследник.\n\nМаргарет опустила голову и сказала последние слова"
HRZ.10.a:0"Зови Габриэлу, будем писать."

HRZ.11.t:0"Обращение к народу"
HRZ.11.d:0"«Уважаемые граждане Ведины, Клаудбьюри, Аквелии, Францистрии, Талузы, Вингбардии, Сикамеона, Цианолизия, Астериона, Прайвена, Фронтира и Герцланда. Уже 20 день прошел с того самого времени, как наш Кайзер впал в кому. Это была ужасная новость, но хуже нее было известие о гибели наследника престола — Эрцгерцога Гровера VII. В болезненом состоянии, Кайзер все же успел составить свое послание, в случае если он сам не сможет объявить вам о новом наследнике трона, как мы видим...это послание, было составлено не зря. Послание о новом наследнике должно было быть прочитано только в случае смерти Кайзера, но как его жена, я считаю что сейчас лучшее время... «Я, Кайзер Имперской Федерации Гровер VI, в сложившихся обстоятельствах должен принять тяжелый выбор. Так как больше нет наследников мужского пола, я выбрал следующим наследником Империи графиню и жену Эрцгерцога Марию-Гровер Сержелию. Она не только имеет самую близкую кровь к Эрцгерцогу, если не брать его родителей, но и является самым близким грифоном по духу и характеру. Я не вижу других кандидатов на трон, так что это мой окончательный выбор. Я очень надеюсь, что жители Имперской Федерации разделят со мной мой выбор.». подпись внизу:"Опубликовать только после моей смерти.". На мой же взгляд, народ должен знать свою будущую Кайзерину до того, как она придет к власти. \n\nЯ выражаю такое же желание, что и мой муж, я хочу, чтобы в такой сложной ситуации вы приняли Марию как будущую Кайзерину, так как это единственный подходящий и самый близкий грифон для эрцгерцога, и я уверена, что он сам бы этого хотел.»"
HRZ.11.a:0"Еще ближе к концу..."

HRZ.12.t:0"Смерть Кайзера"
HRZ.12.d:0"Мария сидела за своим столом в Грифенхейме и изучала дела о пропавшем оружии со складов на севере, западе и юге Герцланда. Где-то украдут несколько винтовок, где-то десяток, а где-то и тысячу. Она пытались докопаться до сути, так как это не только истощало запасы гарнизонов, но и способствовало вооружению радикалов в регионе. Параллельно ей трудились лучшие инспекторы и полицейские Герцланда, но она предпочитала работать одна, чтобы использовать другие методы. \n\nВ какой-то момент к ней забежал слуга. Он отдышался и сказал, что ее срочно зовет к себе принцесса. Она бросила все свои дела, и направилась к Маргарет. \n\n—Что такое, Маргарет?-спросила Мари, заходя в имперские покои.\n—Гровер...умер...-она опустила голову и было видно, что она ее сдерживает слезы.\nГрафиня медленно подошла к принцессе, и обняла, поглаживая по голове, чтобы успокоить. \n\n—Он прожил долгую и хорошую жизнь, самую долгую из всех Кайзеров. Теперь он рядом с Бореем, и я уверена, что последнее чтобы он хотел, так это чтобы ты грустила...Так что давай, у нас много работы, еще нужно организовать похороны и так далее. Не время унывать.\n\nСложно было в это поверить, но слова успокоили принцессу и, утерев слезы с глаз, она кивнула графини и те принялись за работу."
HRZ.12.a:0"Оповестить народ"

HRZ.13.t:0"Стальная Армия"
HRZ.13.d:0"«...вы все воины великой Империи, а не этой дуры, что скоро воссядет на трон!-все говорил майор Даункло перед отрядами местного ополчения, что он собирал для похода на Грифенхем.-Империи нужен понимающий в стратегии Кайзер, а не баба, которой место у кухни! Империи нужен лидер, который поддерживает ее армию, который понимает жизнь народа и как ее направить в русло, полезное Империи! И я знаю, что вы знаете кто нужен Империи!» \n\nФердинанд Даункло!»-громко крикнули отряды, как вдруг в крытый склад на севере небольшого города у подножья горы вошли штурмовики из отрядов фон Катеринбурга — одного из самых радикальных грифонов мира. Все всполошились: отряды Даункло направили оружие на штурмовиков, а те на отряды Даункло. В склад зашел фон Катеринбург и взгляды двух грифонов пересеклись. \n\n—Я думаю ты забыл о кое чем еще.-ехидно проговорил Вингфрид.\n—Вот как? Можешь ли сказать...\n—В нашей новой Империи должны полностью исчезнуть грязные пони, что мешают нам жить, и что разлагают наше прекрасное общество!"
HRZ.13.a:0"Ты сказал...в нашей?"

HRZ.14.t:0"Герои новой революции"
HRZ.14.d:0"«...И таким образом, через несколько дней мы выдвинемся на Грифенхейм. Слишком долго Герцланд был монархическим! Пора строить республику.» С такими словами закончил военное заседание Артур Монте и распустил новых тайных генералов по своим отрядам и расположениям, чтобы в нужный день они захватили стратегические цели и объединившись, двинулись на Грифенхейм. Однако, после того как командующие ушли, грифон сел в кресло и вздохнул. Он понимал, что за каждым подобным приказом стоит сотня отнятых жизней, и не обязательно военных. Он любил свой народ, он любил Герцланд, и из-за этого он понимал, что Герцланд заслуживает называться и быть республикой словно Аквелия. И если придется пойти даже на самые крупные жертвы, сквозь боль в сердце, но он пойдет на это...во славу народа Герцланда! "
HRZ.14.a:0"Во славу республики!"

HRZ.15.t:0"Все на постах"
HRZ.15.d:0"«Под нашим контролем находятся почти все молодежные клубы юга, рабочие на нашей стороне, так что во время революции мы обеспечены нормальным производством необходимого оборудования, так же под нашим контролем почти все железные дороги, так что подвозить данное оборудование к линии фронта не составит труда. Что касается первоначальных запасов оружия, охрана складов либо на нашей стороне, либо подкуплены, так что оружие будет в распоряжении красных грифонов через несколько мину после вашего сигнала.»-отрапортовала кобылка-единорог с салатовыми волосами и беретом на голове. \n\nСерый грифон кивнул и поднялся со стула.\n\n—Тогда товарищи...последние приготовления и за день до коронации выступаем. Все свободны. \n\nОн сел обратно, а практически все, кто был рядом с ним, встали и вышли из комнаты, оставив его одного со своей помощницей.  «Налей-ка мне чего-нибудь...»-попросил грифон, а после подошел к окну, что выходило на центральную площадь Гринбэка. \n\n"
HRZ.15.a:0"Готовность...несколько дней..."

HRZ.16.t:0"Начало конца"
HRZ.16.d:0"—Графиня! Графиня!-закричал грифон в военной форме, который только что забежал в ее рабочий кабинет. \n—Вы даже не постучались!-она злобно прорычала, вскочив со стула.\n—Некогда, госпожа! На севере Герцланда активизировалась потерянная армия и она...враждебно настроена, они уже начали захват некоторых правительственных зданий!-Мария была в недоумении и ярости, однако это были не все новости.-Также есть новости о начале забастовок на юге, а на западе замечена активность республиканских войск.\nГрафиня сидела в небольшом шоке, слишком все быстро начало происходить. Она быстро выбежала из-за стола и приказала созывать совет генералов...которые остались в расположении и не перешли на север."
HRZ.16.a:0"Срочно!"

HRZ.17.t:0"Величайшее предательство "
HRZ.17.d:0"Во время первого заседания экстренного военного совета, графиня отослала всем членам Имперской Федерации просьбу о помощи, письма Аквелии и Клаудбьюри звучали скорее, как мольбы, а не просьбы. И вот, когда сегодня утром, она получила от всех ответ и хотела прочитать их за завтраком, ей просто не полез ни кусок в клюв ни даже капля чая...от всех ответ был строго отрицательным. Она понимала отказ какого-нибудь Прайвена, который находится далеко, или Ведины, даже отказ Клаудбьюри был оправдан такими же событиями, но Аквелия...Мария поняла, старая подруга просто ее ненавидит... \n\nОна встала из-за стола, одела свою куртку и вышла в город, ей нужно было отдохнуть и собраться с мыслями. Недавно она потеряла свою половину как обычный грифон, а теперь и как будущий правитель, и она даже не знала, какая потеря была серьезнее."
HRZ.17.a:0"За что ей всё это..."

HRZ.18.t:0"Начало гражданской войны"
HRZ.18.d:0"Марию разбудил по среди ночи Рихтер, что ворвался ей в комнату и в приказном тоне попросил прибыть в ее же кабинет. Сквозь сон она даже не поняла, что происходит, но стала одеваться. Через 10 мину тона уже подходила к своему кабинету. Сквозь окна она видела полную луну, что закатывалась за горизонт, значит было уже раннее утро. Однако, не это привлекло ее внимание, а толпа что стояла около ее кабинета и ждала ее. Она узнала здесь некоторых мэров городов, которые находятся в неспокойных регионах, узнала генералов, офицеров и даже министров. Как только те завидели графиню, то сразу как в один начали говорить о какой-то беде, каких-то столкновениях и прочем. Она хотела попросить их быть потише, однако Рихтер быстро громким, приказным голосом заткнул всех, открыл кабинет будущей Кайзерины и пустил всех внутрь. \n\n—Что случилось?-спросила Мария, садясь за свой стол.-Только по одному...давай-те выслушаем генералов.\n\nСамый смелый из них, вышел вперед. Это был голубой грифон, один из немногих с фуражкой, вместо кепи. Это был родоначальник немногочисленных танковых войск Герцланда — Рейнхолд Тандертейл.\n\n—Графиня...дело в том, что мои немногочисленные танковые войска начали попадать под обстрелы и атаки со стороны севера...боюсь что это не просто бунд...это настоящая гражданская война. У нас,-он показал лапой на генералов что стояли позади него,-у всех донесения о стычках военных, перестрелках, артиллеристских обстрелах и потерях с обоих сторон. Видимо мы смогли вовремя заметить и нанести удар по колонам, что двигались к столице, так что мы им хорошо смешали карты.\n—Удары по колонам?-переспросила графиня.-Кто дал приказ открывать столь мощный огонь, кто вообще приказал начать войну? У всех восставших должны быть цели и во первых, мы должны их выслушать, во втор...\n—Все дипломаты были убиты и по нам был открыт шквальный артиллеристский огонь на севере, мы же ответили по всему фронту и сорвали их планы! Если вы хотите наказать нас, то наказываете меня, как грифона, который отдал приказы. \n\nОн опустил голову, готовый принимать наказание, как тут все обернулись на дверь, в которую забежал командующий южного округа Герцланда, весь задыхающийся. Он сообщил еще более неприятную новость—начались бои на юге Герцланда. Возможно, он спас этим донесением Рейнхолда, подтвердив его опасения. \n\nМария окинула взглядом толпу, а потом спросила:”Как я понимаю, каждый пришел говорить мне о том же, о чем говорит Тандертейл?”. Когда вся толпа кивнула, она встала и подошла к генералу танковых войск, и положила лапу на его плечо. "
HRZ.18.a:0"Действуйте, фельдмаршал."

