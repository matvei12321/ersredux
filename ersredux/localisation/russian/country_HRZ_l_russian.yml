HRZ_out_industry:0"Отсталая промышленность"
HRZ_out_industry_desc:0"Промышленность данной страны находится еще в прошлом веке, если она быстро не догонит современность, она может там и остаться"
HRZ_communst_problem:0"Коммунистическая проблема"
HRZ_communst_problem_desc:0"С коммунистами в Герцланде очень неспокойно. Рабочие периодически устраивают демонстрации, а голосов в народе о том, что коммунисты хотят лишь блага для государства и народа, все больше"
HRZ_trade_contract_for_CHN:0"Торговый договор Герцланда и Чейнджлингов"
HRZ_trade_contract_for_CHN_desc:0"В начале нового тысячелетия был заключен договор с главным государством Грифонии. В основном договор касался обычных товаров, однако по секретному дополнительному протоколу грифоны также поставляют нам своих заключеных, которые, либо заключены на пожизненное, либо ожидают смертной казни. Здесь они полностью отрабатывают за свои совершенные грехи в Грифонии...а нашим жителям дополнительные порции любви всегда будут полезны."
HRZ_trade_contract_for_DTS:0"Торговый договор Герцланда и Чейнджлингов"
HRZ_trade_contract_for_DTS_desc:0"В начале нового тысячелетия Кризалис заключила торговый договор с Гровером VI, по секретному протоколу которого, грифоны также обязаны нам поставлять своих неисправимых заключеных для выкачки из них любви. Хоть договор и был между Гровером и Кризалис, но Королева Весалиполиса использует наши порты для торговли, так что мы с удовольствием можем брать небольшой...процент с этого договора."
HRZ_trade_contract_for_HRZ:0"Торговый договор Герцланда и Чейнджлингов"
HRZ_trade_contract_for_HRZ_desc:0"В начале нового тысячелетия был заключен торговый договор между Кайзером Гровером VI и Королевой Весалиполиса Кризалис. Этот договор дал нам возможность пользоваться удивительной технологией Чейнджлингов, а именно их супер крепкой и клейкой слизью...никто не знает как они ее производят, да и пусть лучше это остается тайной, но она дала нам возможность сократить время строительства наших зданий. Но договор также дал нам ясно понять, что мы отстаем от наших далеких партнеров. Был создан специальный комитет, которому была поставлена одна задача—сокращение технологического разрыва между нашими странами, исследованием техники из ульев. Однако, нам приходится расплачиваемся этим не только частью наших товаров, но и рабочей силой заключенных, отправляя часть в ульи для насильного извлечения любви, чтобы понизить цены на и так дорогую любовь. Мы не знаем, что с заключенными происходит дальше, но все грифоны с которыми я разговаривал, хотели бы и дальше пребывать об этом в неведении, как с ситуацией с супер слизью"

