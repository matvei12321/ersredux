 #Важные шишки
 NGC_Oswald:0 "Освальд"
 NGC_Oswald_desc:0 ""Не за эту страну отдавали жизни наши предки..."\n\nПоследний генерал старой гвардии, и тот для кого честь и мораль не пустые слова. Всю свою жизнь он жил верностью старым идеалам колонистам, борясь и защищая землю империи.\n\nПосле переворота Дреслера и начала правления Крайгера, он оказался единственным генералом который смог сохранить свою должность. Впрочем, совсем скоро он начал жалеть об таком "подарке" ибо на его глазах старый мир рухнул.\n\nТеперь всякие чужаки руководят армией, а власть губернатора, находятся в лапах какого-то самовлюбленного кузнеца..."
