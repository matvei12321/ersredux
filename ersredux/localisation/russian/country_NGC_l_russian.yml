 NGC_focuss_Democratia6_desc:0 ""
 NGC_focuss_Democratia7:0 "Поддержка"
 NGC_focuss_Democratia7_desc:0 ""
 
 NGC_focuss_Democratia_problem:0 "Новые ряли"
 NGC_focuss_Democratia_problem_desc:0 ""
 NGC_focuss_Democratia_problem1:0 "Чудо оружие"
 NGC_focuss_Democratia_problem1_desc:0 "Пока мы терпим поражение на всех фронтах, умники из "МММ" разработали концепцию чудо оружия. "Один удар, и пройдет перелом на фронте" Идиоты они или право угорать имеют? Даже если мы найдём это чудо орудие, остаётся проблема в его производстве..."
 NGC_focuss_Democratia_problem2:0 "Признать провал"
 NGC_focuss_Democratia_problem2_desc:0 "Ульбрих отчаянно пытается сохранить старые порядки и вернуть былую мощь авиации, вот только всё уже решено. Какой смысл контролировать небо, когда у бойцов нет даже винтовки? Зачем нам один самолёт, когда можно производить сотню винтовок? В нынешних рялях мы должны изменить наши приоритеты."
 
 NGC_focuss_Penal_battalion:0 "Штрафбат"
 NGC_focuss_Penal_battalion_desc:0 "- Мы переведем Нувскую оборонную промышленность в режим войны. Но сперва я и моих 40 слонов станцуем."
 NGC_focuss_motorization_battalion:0 "Мотострелковые дивизии"
 NGC_focuss_motorization_battalion_desc:0 "Любой мотоцикл прослужит вам до конца жизни, если ездить достаточно быстро."
 
