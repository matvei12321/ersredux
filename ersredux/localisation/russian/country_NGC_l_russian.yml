 ngc.84.t:0 "..."
 ngc.84.d:0 "Бежать куда глаза глядят, хоть куда, хоть в копыта бандитов, хоть в один из проклятых городов куда угодно, но только не в пустыню! Джекси уже давно мечтал о побеге, он ненавидел пустыню, войну, тупые анекдоты напарников. "Почему мы до сих пор не победили? Почему застряли и вынуждены бороться с пустотой?" он не знал ответов на эти вопросы, а лишь бежал под палящим солнцем. Совсем скоро он выбился из сил и упал на песок... Солнце казалось, высасывало из него силы и делало его слабее. Вдруг он почувствовал что что-то происходит, песок возле него начал двигаться вниз, унося его вниз..."
 ngc.84.a:0 "... "
 
 ngc.85.t:0 "..."
 ngc.85.d:0 "С трудом открыв глаза Джекси увидел солнце и круживших в небе стервятников. Осмотревшись он понял, что попал в яму полную черепов. "Стоп, что?" Перепугано поднялся он, не понимаю, как и почему здесь так много скелетов. Но помимо этого, вдалеке, он увидел блеск к которому незамедлительно пошёл. Подойдя ближе он увидел, что сиял меч с красовавшимся камушком на нём. Осмотревшись по сторонам, Джекси решил взять этот меч себе.\n"Извини дружок, но мне он нужнее."\n\nВот он, меч. Большой, красивый, и что самое главное явно дорогой... Стоп. Его кто-то тронул? Он медленно повернул голову, где увидел"
 ngc.85.a:0 "СМЭРТЬ"
 
 ngc.86.t:0 "Экстренное сообщение"
 ngc.86.d:0 "Связь с восточным фронтом потеряна! И что хуже, неизвестный туман начал окутывать наши города. Резервные войска УГУ уже прибыли во все крупные города и начали подготовку к худшему. Населению рекомендовано оставаться дома до выяснения обстоятельств."
 ngc.86.a:0 "Чего блять?"
 
