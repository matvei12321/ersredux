 NGC_heisenberg:0 "Капингеймер"
 NGC_heisenberg_desc:0 "Проблема многих великих учёных проста и известна, они родились во времена технологической отсталости. Если говорить про Каппингеймера, то он родился ещё и в беднейшей на науку стране. Написав сотню трудов на различные темы, он стал величайшим учёным континента (ну по крайне мере он так считает) К сожалению его ум ограничен технологиями страны. Если даже драка за микроскоп является обычным делом, как в таких условиях творить великое?"
