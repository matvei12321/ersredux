 #Северный Гарнизон
 NZZ_Hana_Wam:0 "Комиссар знает ваши"
 NZZ_Hana_Wam_desc:0 ""
 
 NZZ_Hana_Wam1:0 "...Желания"
 NZZ_Hana_Wam1_desc:0 "Ты счастлив, счастлив, счастлив. Да-да-да, ты тот кому удалось получить счастье. Миллиарды ищут то, что есть у тебя по праву. Береги работу, защищай работу, люби работу. Лишь работая, ты получаешь счастье. Лишь работая, ты становишься тем, кем являешься. Лишь работая, ты становишься лучше"
 
 NZZ_Hana_Wam2:0 "...Страхи..."
 NZZ_Hana_Wam2_desc:0 "Они везде, они ждут, они хотят. Они твой враг, они зло, они слуги Октавии. Они враг, они зло, они те кто несут боль. Они враги, они зло, они уничтожили твою жизнь. Нуво Грифоника друг, Комиссар спаситель, грифоны защищают. Комиссар друг, УГУ защищает, забор твоя защита."
 
 NZZ_Hana_Wam3:0 "Мечты..."
 NZZ_Hana_Wam3_desc:0 "Не плачь, не бойся, не страдай. Я знаю, знаю, что ты ненавидишь свою ошибку и грехи. Я знаю, я знаю, я знаю, что ты хочешь их исправить, исправить, исправить. Любой даже самый тяжкий грех можно исправить, исправить, исправить. Да, своим трудом ты их исправишь, просто работая и трудясь на благо Нуво Грифоники ты спасешь себя и других. Твоя мечта искупить грех будет исполнена только работая"
 
 NZZ_Hana_Wam4:0 "...молитесь Комиссару"
 NZZ_Hana_Wam4_desc:0 "Он спасёт, он ведёт, он защитник, он герой, он жизнь, он смерть, он друг, он мечта, он правда, он истина, он товарищ, он спаситель, он первый, он всё"
 
 NZZ_Hana_Wam5:0 "Слушайте Комиссара..."
 NZZ_Hana_Wam5_desc:0 "Я знаю, что комиссар прав. Я знаю, что комиссар друг. Я знаю, что комиссар любит я знаю что комиссар спасёт. Я знаю без комиссара нет жизни. Я знаю жить значить работать ради комиссара. Я знаю комиссар прав..."
 
 NZZ_Hana_Wam6:0 "§RБОГОТВОРИТЕ КОМИССАРА§"
 NZZ_Hana_Wam6_desc:0 "§RЯБОГОТВОРЮЕГОЯБОГОТВОРЮЕГОЯБОГОТВОРЮЕГОЯБОГОТВОРЮЕГОЯБОГОТВОРЮЕГОЯБОГОТВОРЮЕГО§!"
 
 #Мммм Хта
 NGC_focuss_Democratia:0 "Наша гордость"
 NGC_focuss_Democratia_desc:0 "МММ- это союз самых влиятельных промышленников Нуво-Грифоники. Именно они выступили с предложением об проведением индустриализации и планом обьеденения Юго-Запа. Особый успех был достигнут в развитие и производстве авиации. Наши самолёты пользуются популярностью во всем мире, и мы намерены продолжить работы в данном направлении"
 NGC_focuss_Democratia1:0 "Труд освобождает"
 NGC_focuss_Democratia1_desc:0 "После недавних военных конфликтов у нас накопилось приличное число военнопленных. Их судьба обычно сводится к отбыванию наказания в лагерях, или запись в икупительные отряды Каина. Но зачем им сидеть сложа копыта, когда они могут помочь в нашей борьбе? Заменяя часть персонала на военнопленных, мы значительно расширим наши промышленные возможности"
 NGC_focuss_Democratia2:0 "Небесный фронт"
 NGC_focuss_Democratia2_desc:0 "Небесный фронт"
 NGC_focuss_Democratia3:0 "Привлечь инвестиции"
 NGC_focuss_Democratia3_desc:0 ""
