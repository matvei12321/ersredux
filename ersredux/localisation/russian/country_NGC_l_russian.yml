 NGC_Rudol_desc:0 "Сказал себе я: брось писать, -\nНо копыта сами просятся.\nОх, мама моя родная, друзья любимые!\nСижу в посольстве - косятся,\nНе сплю: боюсь - набросятся, -\nВедь рядом - психи тихие, неизлечимые. "
