 ending.31.d:0 "Внимание, данная страна не рекомендуется для серьёзной игры. Идите лучше погоняйте Оленей в §GЛиктиде.§!"
 
 ngc.1.t:0 "Под солнцем"
 ngc.1.d:0 "”А кто умеет? Сколько помню никто ничего и не умел. И чему вас только учат в колледжах?”\n\nГрифон вновь осмотрел напарника. Слишком молод, слишком слаб, слишком сияющий от будущей работы. Такие обычно в первый день работают на всю, чтоб потом, устало отлежаться целый день в постели, корчась от невыносимой боли. Но выбирать не приходится.\n\n”Наша группа. В меру ленивые, в меру жрущие. В общем идеальные работяги. Искусство класть рельсы быстро освоили, а ты тем более”\n”И от куда они?”\nГрифон пожал плечами. ”Эти вот из пустыни. Те из джунглей, и так собрали группу. Как говорит лист А4 "Вчера они голодали, а сегодня сытые и помогают в общем деле." И теперь мы вынуждены нести за них ответственность. Чтоб потом они благополучно разбежались кто куда”\n\nСказав это он задумался, и двинулся к рабочим"
 ngc.1.a:0 "За работу"
 
 ngc.45.t:0 "План выполнен"
 ngc.45.d:0 "-Таким образом если каждое поколение будет приумножажать заслуги предыдущего, то там где сейчас песок будет стоять льдины, и наоборот.\n-Зачем нам льдины?\n-Нам незачем, а вот политикам и другим лентяям это будет нужно.\n\nГрифон смотрел как поезд медленно двигался по рельсам, и рассказывал свои наблюдения. Да они были чистой воды философические и даже утопические. Но фестрал слушал это, и размышлял над сказанным.\n\n-Тогда почему нигде в пустынях нет льдин? Ведь прошло уже столько поколений, а казалось движение началось только при Крайгере. -Произнес фестрал.\n-Движение всегда есть, просто порой мы смотрим не туда. Вот если взглянуть в историю, бегство на западные земли это что?\n-Провал, и шаг назад\n-В технологическом и культурном плане да. Но вот в самостоятельности-прогресс. Мы стали независимыми от империи, объединив при этом самые разные виды. Как я и говорил, всё сводится к тому как посмотреть на дело. Крайгер конечно принес промышленность, но при этом продав Нуво-Грифонинс и пролив кровь народа. А про то что его УГУшники сделали с армией я вообще молчу. Мне порой кажется что приход Дреслера в УГУ это шаг назад, Хеншель хотя б не разваливал армию ради своей власти..."
 ngc.45.a:0 "...Хотя и не исключаю что правда выглядит иначе"
 
 ngc.58.t:0 "Интересное предложение "
 ngc.58.d:0 "-Сегодня посол чейнджлингов обратился к нам с интересным предложением. Он заявляет что может предложить чудо средство для нашей техники. -Циммери́т! Это чудо-средство от всех проблем. Легко намазал и технике нестрашны ни бомбы ни мины, которые враг может прикрепить к технике. Ну и бонус, Кризалис готова продать это средство по невиданной скидке, так сказать за наше сотрудничество.\n-Позже на опытном образце было показано применение этого чудо-средства. Любые попытки приклеить мину к танку, увенчались провалом. Теперь остаётся решить, нужен ли нам этот Циммерит? "
 ngc.58.a:0 "-Определенно, начать закупку "
 ngc.58.b:0 "-Зачем он нужен, когда у нас даже нет танков!"
 
 ngc.36.t:0 "Последняя мелодия"
 ngc.36.d:0 "Крайгер шел мимо камер с военнопленными. Обычно пленными занимался Дреслер, но по объективным причинам он не сможет продолжить эту работу. Идя по темному коридору, он все четче слышал музыку. Он не мог поверить, музыка здесь?\n "Дреслер приказал на время ее задержания выполнять все ее желания, конечно, в разумных пределах", - ответил охранник на вопрос Крайгера.\n"А как вам с ней?" - поинтересовался Крайгер.\n"Вначале было тяжело. Иногда целый день без передышки, ни от одного сапожника не услышишь таких слов, которые она говорит. Но в один момент она потребовала виолончель", - ответил охранник.\n"Виолончель?" - удивился Крайгер.\n"Мы сами удивились, но нашли инструмент. И теперь у нас вместо оскорблений звучит музыка, - сказал охранник и продолжил- Похоже, вы пришли вынести ей приговор вместо Дреслера?"\n"Да, так и есть. Изначально у Крайгера было два варианта, что с ней делать. Первый вариант, старая добрая казнь. Ее смерть станет символом конца старого порядка на Юго Востоке. Второй вариант был менее скучным, но эффективным - просто отравить ее и забыть. Она отработает свои грехи в землях Чейнджлингов. Но внезапно у него появился третий вариант - перевоспитать ее. Ее детство, судя по всему, было трудным. Но если сейчас он покажет ей, как прекрасен мир без бандитов, она изменится. И если она изменится, многие последуют ее примеру. Выбор был трудным, а времени было мало. Но все же он решил, что судьба Октавии...""
 ngc.36.a:0 "Гильотина- единственное что спасет ее"
 ngc.36.b:0 "Шахта ее заждалась"
 ngc.36.s:0 "Каждый имеет право на второй шанс "
 
 ngc.32.t:0 "Рапорт об казне"
 ngc.32.d:0 "Иногда приходится действовать жестко и четко. Мы должны признать, что итог немного иной и быть.\n9:00 - Все каналы Нувы начали транслировать казнь.\n9:05 - Октавия была выведена на площадь.\n9:10 - Прозвучала пафосная речь о новом порядке.\n10:00 - Октавию привели к гильотине.\n10:02 - Последние слова перед падением лезвия.\n10:03 - Тишина.\n10:04 - Радость охватила всю страну.\nГибель Октавии знаменует собой новую страницу в истории Нувы. Губернатор, народ целиком и полностью поддерживает ваше решение."
 ngc.32.a:0 "Ее гибель - начало нашего правления"
 
  ngc.34.t:0 "Рапорт об отправке"
 ngc.34.d:0 "3:00 - Октавия была выведена из тюрьмы.\n7:00 - Колонна прибыла в Южный порт.\n7:20 - Груз был передан чейнджлингам.\n8:00 - Корабль покинул гавань.\nДальнейшая судьба Октавии нам неизвестна. Впрочем, туда, куда ее везут, никогда больше никто не возвращался. Порой самое лучшее решение - это середина."
 ngc.34.a:0 "Скатертью дорога"
 
 ngc.33.t:0 "Рапорт об исправлении"
 ngc.33.d:0 "Ваше решение озадачило многих, однако никто не стал ему противоречить.\nДень 1:\nОктавию перевели в более достойную камеру. Началась работа по ее изменению.\nДень 3:\nОктавия выразила желание провести небольшой концерт перед "Старой бандой". Идея была одобрена.\nДень 6:\nСтроительство площадки почти завершено. Октавия выражает добрые намерения по отношению к окружающим.\nДень 7:\nОна была отведена в театр по своей просьбе. В целях безопасности здание было окружено охраной, а сама Октавия замаскирована, чтобы никто не узнал ее. Результат превзошел ожидания. За все время она не проявила признаков агрессии, а наоборот, активно обсуждала искусство (хоть и не очень успешно, но местные оценили). После представления, она попросила несколько книг о моде.\nДень 8:\nЗавтра намечается концерт. Октавия провела половину дня за чтением, а другую половину - осмотром площадки и репетицией."
 ngc.33.a:0 "Неужели даже монстр может стать порядочным?"
 
 ngc.35.t:0 "День 9 концерт"
 ngc.35.d:0 "12:00 бандитов "старой банды" и других завели на площадку. Отмечается их покорность\n12:05 Октавия выходит на площадку, и начинает свою речь\n12:10 Прозвучал взрыв и отключился свет\n12:11 Звук выстрелов из площадки. Заключённые в камерах начали буянить\n12:13 Со стороны леса, появилась неизвестная группа пони. Которая заминировала ближайшую стену\n12:14 Подрыв стены. Сообщение этой информации в штаб и вызов спец группы\n12:20 Группа прибыла. В коридорах тюрьмы были обнаружены трупы охранников. Руководство тюрьмы удалось уцелеть. Но Октавии и заключённых не было обнаружено "
 ngc.35.a:0 "Это была ошибка..."
 
 ngc.2.t:0 "Бумаги"
 ngc.2.d:0 "-Дальше просто некуда! Страна в долгах, продано всё что можно, а народ пережил годы страданий! Отец, как ты не поймёшь, уже слишком поздно что-то менять. Молю, не ради меня, а ради них, остановись!\n\nИзабелла показывала графики и документы, в которых красным маркером были обведены дыры в бюджете. Но Дреслер её не слушал, он смотрел в окно и думал об своём. Когда он только сверг прошлого губернатора, в Нуве не было ни промышленности, ничего. Двадцать лет идёт гонка со временем, и время, как обычно, побеждало с небольшим отрывом. Роук выходил из кризиса, а на востоке активизировались племена Фестралов. Так много всего, и так мало времени\n-Ты меня вообще слушаешь? План объединения проверен, армия при всех попытках Каина её реформировать всё также бездарна. Мы ещё можем остановиться, и спасти хоть что-то!\n-Останавливатся надо было двадцать лет назад. Тогда когда вы хлопали и поддерживали индустриализацию. А сейчас что поменялось? Устали? Ах, вам хорошо сидеть в своих кабинетах, когда рабочие день и ночь работают на промышленность. Вам хорошо, вам не нужно рассказывать матерям, ради чего погибли их сыновья. Вам то хорошо, вы всегда можете свалить в Пуэрто-Рико, оставив народ на произвол судьбы.\n\nИзабелла вновь посмотрела на отца, как обычно, спорить с ним было бесполезно. Кинув документы, она начала уходить из комнаты\n-Она бы это не одобрила "
 ngc.2.a:0 "-Я знаю, я знаю... "
 
 ngc.5.t:0 "Успех"
 ngc.5.d:0 "-Вычеркивай Куатликуэ. Ну вот теперь точно можно сказать - мы пытались мирно решить вопрос\nОчередной крестик появился на карте, убрав последнего возможного союзника. Осмотрев карту, Каин продолжил:\n\n-Упрямые бараны! Боятся якобы сородичи их не поймут. Хах, а вот когда нужно ограбить своих же, тут они первые. Так, а что там белокопытные, пожалуй снова вспоминают нам про дверь? Ну и Маар с ними! Вот 90% населения Юга-запада хотят объединения. А остальные 10% сидящих в креслах, только и ждут, чтоб вытворить какую-то херню, и доказать своё превосходство над остальными. Ну что ж, если мы не можем до них достучаться. То нам придётся выбить дверь\n-Тебе лишь бы что-то выбить! Ну да, Куатликуэ сейчас занимают нейтралитет. Но дайте нам десять лет, и они станут нашим союзником\n-Или бесполезной ямой для траты денег. Один удар, и от их стран ничего не останется\n\nСпор набирал обороты, и каждая сторона пыталась доказать свою правоту. Наивные, думают что их споры вообще что-то решат. Дреслер снова осмотрел карандаш, и наконец-то вмешался в спор\n-Договариватся с ними - равносильно бить горохом об стену. Впрочем, ещё глупее начинать войну со всеми сразу, и быть раздавленным войной на всех фронтах. Но, истинна, как обычно, находится в середине. Мы планомерно начнём расширение, делая всё, чтоб образумить этих глупцов."
 ngc.5.a:0 "-И вновь Юго-Запад в огне"
 
 ngc.3.t:0 "Кошмар" 
 ngc.3.d:0 "Толпа разорвала тело несчастного грифона, наслаждаясь его криками и болью. Кровь была повсюду, поражая в толпе первозданную звериную ярость.\n\nВ этот момент Дреслер в ужасе проснулся. Очередная ночь принесла новый кошмар. Сколько он уже страдает от этого? Месяц? Два? Каждый раз он видит свою смерть, и каждый раз менялись только декорации. Однажды он даже увидел как падал с самолёта, а после, его кожу использовали в качестве костюма. И что самое страшное, он буквально ощущал эту боль, будто он действительно там был..."
 ngc.3.a:0 "..."
 
 ngc.68.t:0 "Чувак, эта пустыня отстой"
 ngc.68.d:0 ""В нынешних реалиях ведение войны в пустыне считается невозможным. Бандиты Роука могут пересечь регион небольшими группами, но на большее они не способны. Поэтому, большая часть наших солдат будет выведена из пустыни" "
 ngc.68.a:0 "А?
 
 ngc.4.t:0 "Старая сделка"
 ngc.4.d:0 "Представь себе сотни и тысячи миров в которых события идут так же как и у нас, но при этом, они все отличаются разными мелочами. Твои кошмары это не более чем видения этих событий и жалкая попытка понять их значение.\n-Ты хочешь сказать что я был там? И все разы я умирал не находя Дорри?\n-К сожалению да. \nДреслер недоверчиво слушал бестелесного собеседника, который в очередной раз доказал свою беспомощность и бесполезность.\n-Тогда какой смысл мне исполнять сделку, если ты даже не способен предостеречь от смерти?\n-И потерять свой последний шанс её вернуть? Мы оба знаем что нужны друг другу. Пускай не в этом мире, не через тысечелетие, но наш договор будет выполнен. Всё что нам остатёся, это ждать."
 ngc.4.a:0 "-В отличие от вас, у нас смертных нет времени ждать!"
 
 ngc.7.t:0 "..."
 ngc.7.d:0 "-Ты хорошо поработал грифончик, но, путь наш ещё долог и тернист.\nСущность кружилась вокруг Дреслера осматривая истощенное тело Дреслера. Шрамы украшали его тело, а под глазами появились морщины.\n\n-СКВЕРНО выглядишь. Хах! Хахахаха! Впрочем, мы тут не ради шуток, жертва принята, узри награду!\nВ этот момент комната осветилась, и в центре появилась сущность грифоньего вида. Белый наряд и красный бантик скромно украшали её тело, а лицо излучало надежду. \n-Отец? \nДреслер молчал и смотрел на Дорри, но сил сказать что-либо не было. Всего секунда, и Дорри вновь пропала..."
 ngc.7.a:0 "-И помни, чем ценнее жертва, тем больше ты будешь её видеть."
 
 ngc.6.t:0 "Об жизни прошлой"
 ngc.6.d:0 "В те года он был совсем другим, и всё казалось таким простым и ясным. Учёба, прогулы, армия, офицерские курсы. И, конечно, была первая и единственная любовь.Прошли годы, свидания, совместная жизнь, и, наконец, свадьба. Но всё, чего так не хватало их браку, были дети. И вот на свет появилась Дорри, их первая и единственная дочурка. Прекрасная и скромная. Но со временем стало ясно, что ей не интересно общаться со сверстниками. Вместо этого она проводила время среди книг и животных. Тогда Дреслер принял решение бросить свою карьеру и уехать с семьёй в деревню. Жизнь стала сложнее, но когда он видел, как Дорри находит счастье в деревенской жизни в окружении леса и животных, он был готов пройти сквозь все трудности только ради неё. Через месяц он построил ей домик на дереве, а спустя неделю они вдвоём решили съездить на пикник. Тот день был прекрасен, солнце светило ярко, на небе не было ни единого облачка. Просто идеальный день для пикника! Приехав в лес, Дреслер начал готовить шашлыки. Но внезапно из леса раздался крик. Когда он прибежал на место крика, увидел лежащую Дорри с укусом на шее. Боль, крики, бегство в деревню.\n - Это укус Мантикоры! - сказала знахарка. - Её укус не убивает, но погружает в вечную кому\n - Можно что-нибудь сделать... - Дреслер не договорил.\n- Извините, лекарства от яда Мантикоры не существует и, скорее всего, никогда не будет. Ругань, больницы, лучшие врачи... Но это всё бесполезно.\n- Прости меня, прости Дорри, это моя вина. Я не уследил за тобой. - Дреслер раскаивался возле кровати, к которой его приковала больная Дорри. - Прости, - тихо прошептал он, поднимая лицо. - Я сделаю все, чтобы вновь увидеть снова твою улыбку. Вновь служба, карьера, и вот незаметно, он глава УГУ. С тех пор на его лапах защита грифоньего рода, и поиск средства что спасёт его Дори\n - И скоро это произойдёт- сказал он, глядя на домик на дереве. - Скоро мы снова увидимся, и наверстаем упущенное"
 ngc.6.a:0 "Обязательно наверстаем"
 
 ngc.100.t:0 "§RСовершенно скретно§"
 ngc.100.d:0 "Губернатор Крайгер-мертв. Жалкая клика партийных секретарей не нюхавших фронта, пыталась устроить государственный переворот. В стране вводится военное положение. Вся власть передается главнокомандующему УГУ"
 ngc.100.a:0  "Это тревожные времена"
 
 ngc.8.t:0 "Эфир наш!"
 ngc.8.d:0 "Как и планировалось, наши войска смогли разбить бандитов, и в ходе маленькой победоносной захватить Эфир"
 ngc.8.a:0 "Очередная победа Грифоньего рода"
 
 ngc.9.t:0 "Провал"
 ngc.9.d:0 "Мы потерпели поражение, и не смогли захватить Эфир"
 ngc.9.a:0 "Видимо кого-то расстреляют"
 
 ngc.11.t:0 "Альянс с Нуво Грифоникой?"
 ngc.11.d:0 "" 
 ngc.11.a:0 "Альянс? Грядет крупная драка"
 ngc.11.b:0 "Союз с ними? Никогда!"
 
 ngc.900.t:0 "Та что ждет"
 ngc.900.d:0 "Если вы когда-нибудь чувствовали себя бесполезным, то вспомните что в Нуве есть совет. Гордо находящиеся в "Бар три берёзы" (где и берёз нет) совет занимается важнейшими вопросами, такими как цвет тротуаров и покраской заборов в городах. Впрочем, участники совета исполняли свою работу гордо и под пиво. Иногда даже они расширили свои ряды, приглашая новых участников\n-Вот смотри. Она милая, образованная и что самое главное - красивая. Хотя бы будет на кого полюбоваться и поговорить.\n-Она культистка! Если бы каждого душевнобольного будем впускать, то во что превратится Нува?\n-Ну знаешь, Каин вообще Абиссинец, который ненавидит Бэтпони из-за цвета. Но разве ему это мешает быть главнокомандующим? Нет. И тут тоже самое, мы просто тихо её пригласим, и скрасим себе вечера. А по карьерной лестнице она точно не пойдет, не тех кровей\n\nЗакончив обсуждение началось голосование. Кто-то голосовал против, не желая видеть конкурентку. Кто-то просто пил, голосуя за. В конечном счёте, счёт был равным, и лишь один голос мог решить судьбу нового участника"
 ngc.900.a:0 "-Думаю им можно доверять"
 ngc.900.s:0 "-Этих сумасшедших к нам? Никогда!"
 
 ngc.901.t:0 "Запрос"
 ngc.901.d:0 "Сегодня Милла запросила расширение совета, при этом предложив новую кандидатку. Согласно отчётам УГУ, кандидат является одним из лидеров Культа. С одной стороны допускать её опасно. Но с другой, она имеет опыт нужный государству"
 ngc.901.a:0 "-Хорошо, приглашайте ее"
 ngc.901.s:0 "-Мы договаривались только на одну!"
 
 ngc.902.t:0 "Запрос"
 ngc.902.d:0 "Сегодня Милла снова запросила расширение совета, при этом предложив новую кандидатку. Согласно отчётам УГУ, кандидат является одним из лидеров Культа. С одной стороны допускать её опасно. Но с другой, она имеет опыт нужный государству"
 ngc.902.a:0 "§rСатана любит§! §1троицу§!"
 ngc.902.s:0 "-Достаточно! Мы, итак, сильно рискуем"
 
 ngc.26.t:0 "Ничего не произошло"
 ngc.26.d:0 "Та единственная секретная лаборатория \nЭто был самый спокойный и тихий день, который не предвещало ничего плохого. Но капитан Мануле намеревался это исправить. Ползя по вентиляционной шахте в своей любимой шляпе и с мешком, он медленно, но верно двигался на встречу своей главной цели. Мести! Ох, какая это будет месть, просто бомбезная, не такая, как год назад, но тоже ничего. Он двигался предвкушая, как после миссии он прочтёт о своём подвиге в новостях. Ох, а если там будет его новая фотография, день определённо будет идеальным. И нет, он не страдал какой-то манией величия и другой чушью. Он просто любил вечерами вырезать фотографии и делать мини сценки, любимое занятие после издевательства над Штрасери. Но тут он остановился, не в силах продолжить движение. Вперёд-нет, назад-нет. Определённо, он застрял, застрял как тот Маров диван (на котором, он любил часик полежать) Снова попытка двинуться, как ни странно, ничего не получилось. Зато, ниже он начал слышать голоса\n\n--Говорят, Ликтида готовится к войне с Оленями. -Голос был со странным акцентом \n-И правильно, давно пора наволять этим рогатым. Эх, а ведь так можем всё веселье пропустить. Вот сидим в этой Нуве, и каждый день как дне сурка\n-Если сидим, значить есть толк. Тут поговаривают что наши готовятся к смене руководства. Помнишь Шили? \n-А как же, уродина та ещё \n-Она самая, так вот, на неё заменили одного из главных учёных Нувы. Но, самое крутое, что мы смогли подменить...\nМануле не успел дослушать, ибо в один момент метал под ним, начинал гнутся и он благополучно упал. Правда упав на говоривших. Ими оказалась два грифона в форме УГУ. Осмотревшись по сторонам он понял, что попал туда куда нужно-в центр управления. \n-Ну что ж, да начнётся веселье. -Сказал Мануле, открывая сумку со взрывчаткой"
 ngc.26.a:0 "-Бомбезный день для диверсии"
 
 ngc.27.t:0 "Парад"
 ngc.27.d:0 "Для поняшки Молли этот день выдался не самым приятным, впрочем, как и последние несколько месяцев. Нува менялась, год назад даже обычного кофе днём с огнём не сыскать. А сегодня что? Целых восемь видов кофе, выбирай любой какой хочешь. И подобное происходило везде, но, особенно сильно перемены затронули её семью. Сын вдохновлённый победами против белокопытных записался в УГУ. "-Как ты не поймёшь! Грифония нуждается нас, ведь мы, последний бастион Грифонизма на континенте!" -и теперь он уже месяц как не появится. Впрочем, этот "чемодан" и никогда не любил её как мать. Муж Вильгельм, просто ушёл добровольцем на войну с Роуком. И теперь она одна, одинокая сидит, попивая кофе смотрит на парад. \n-Чистые, нарядные, натренированные уничтожать наших. -Взглянув на часы, она взяла сумку, лежавшую на полу, и бросила в колонну солдат. Взрыв, паника, бегство, арест"
 ngc.27.a:0 "Но это было лишь начало"
 
 ngc.21.t:0 "Судьба Роука"
 ngc.21.d:0 ""Господин Ульбрих, спешим вас порадовать замечательной новостью. В связи с нашей победой, возникла необходимость в опытных кадрах. Ваш опыт в руководстве и нейтральность к какой-либо фракции, делает вас пусть и не идеальным, но подходящим к посту руководителя "Оккупационной зоны Роук" Просьба как можно скорее прибыть в Нуво-Грифонинск, для получения дальнейших указаний""
 ngc.21.b:0 "Славная новость"
 
 ngc.50.t:0 ""Писатель судьбы""
 ngc.50.d:0 "В помещение зашла зебра с зелёными глазами, а на её спине находилась сумка. В конце помещения находился трон на котором гордо сидел Дреслер.\n-Ах, вот и она! Наша гадалка или шарлатанка? Вот в чём вопрос. Всю историю мы приходили к тебе, а теперь ты пришла ко мне.\n-Наиграно, слишком наиграно. Да и твой предшественник встречал более пафосно -Зебра шла, подходя к столу, находившимся в центре помещения. -Ты сам захотел узнать своё будущее, а я лишь исполнила твою маленькую просьбу. -Она подмигнула, и начала доставать карты из сумки.\n-Ты уверен? Для многих звёзды уготовили то, что лучше не знать и ес...\n-Не сомневайся, я уверен, звезды там наверху просто светят, а я тут вершу историю.\n-Она не слушала его, а медленно начала раскладывать карты по столу, после начиная переворачивать их.\n-Ты прав, история тебе была уготована другая, менее величественная, но героическая. -После перевернула другую карту. -Её звали Дорри?\n-Да, первая дочка.\n-Она стала тем, из-за кого твоя жизнь изменилась кардинально. -Перевернула карту -Хах, звезды тебе улыбаются, ты тот кто начнёт золотое время. -Перевернула карту. -Черепа, произнесла она быстро начав открывать карты. Чем больше она открывала карты, тем больше становился ужас на её лице. В конечном итоге открыв последнюю карту, она начала уходить.\n-Стой! -Приказал Дреслер, достав пистолет. -Что ты увидела?!\n-Ты ведь сам вершишь судьбу, стало интересно? -Обернулась она и начала заигрывать\n-Говори!\n-Ты хочешь её вернуть! Остановить смерть, стать тем кто нарушит порядок вещей. Цель благородная, но, пытаясь вернуть её ты погубишь свой народ. Остановись, ты не виноват в её гибели! Остановись, и ты спасешь остальных. -Дреслер выронил пистолет, и попытался сказать, но она уже знала вопрос.\n-Нет, нет иного варианта! -После этих слов она убежала, а Дреслер погрузился в размышления"
 ngc.50.a:0 "."
 
 ngc.53.t:0 "Троица"
 ngc.53.d:0 "На стол кинули очередной мешочек с золотом.\n-Другой разговор. -Сказала зебра, начав раскладывать карты. -Сами виноваты, никто вас не просил называть меня жуликом.\n-Извините. Покраснев, сказала Лири\n-Ваши идеалы далеки, вера крепка, но цель абсолютно бесполезна.\n-Как это бесполезна?\n-Ну даже не знаю, вспомнить бы об чём один из знаков. -Она постукала копытом по столу, после чего на стол кинули ещё один мешочек. -Буду честен, всё что вы надумали, это лишь чья-то глупая шутка. Все ваши сны насчёт фиолетовой пони, являются не более чем сном. А не пророчеством, которые вы напридумывали.\n-Шарлатанка! Прокричала Лири. -Я же говорила что ничего от неё не узнаем, говорила!\n-Ну как же, вы узнали что вам нужно бросить свои детские выходки. -Подмигнув сказала она, после чего вызвала охрану."
 ngc.53.a:0 "-Генри, выведи их подальше!"
 
 ngc.54.t:0 "Карта Крайгера"
 ngc.54.d:0 "-Хочешь узнать судьбу? Тут и гадать не надо, открой карту. -Она копытом указала на карту, после чего Крайгер перевернул карту.\n-Пустота ?\n-Доволен? Можешь открыть другую, правда итог не изменится ни в следующей, и ни в последней. -Крайгер начал переворачивать карты, и каждый раз была пустота. -Но это же невозможно! -Вскричал Крайгер. -Должно быть хоть что-то, хоть какая-то картинка!\n-Должно, но не у тебя. С некоторой грустью сказала зебра. -Звёзды игнорируют тебя, а значить ты сам написал своё прошлое.\n-Что это значит?\n-Скажи, что ты сделал чтобы... -Она задумалась. -Ну скажем, чтобы стать Губернатором?\n-Эм.., ну хорошо. Я работал в библиотеке.\n-Открывай дальше. -Не обращая внимания сказала она, после чего положила колоду карт. -Эти тоже открывай, может повезти.\n*Час спустя*\n-Крайгер держался за голову, смотря на пустые карты, он не мог поверить, не хотел признавать что это вообще возможно. Как? Почему? Почему именно он, почему судьба так не благосклонна к нему?\n-Как видишь, твоё прошлое и настоящее предсказуемо. Но, открой эту карту. -Она положила на стол ещё одну мятую карту. С неохотой Крайгер открыл её, и тут же засиял от радости, на карте красовалась "
 ngc.54.a:0 "-Белая пони"
 
 ngc.55.t:0 "Белая пони"
 ngc.55.d:0 "-Сара? Ах, Сара, я ведь знала что ты приедешь к нам\n-Знали? Кто вам сказал об этом?\n-Звезды дорогая. Когда я рассказывала Крайгеру его судьбу, там была ты. -Сказав это, она перевернула карту. И ты явно пришла сюда не ради любви.\n-Как раз из-за любви, мне действительно нравится Крайгер. Да и я хотела попутешествовать...\n-Врешь и не краснеешь. -Подмигнула она. -Впрочем, я не журналист, чтобы задавать тебя, зато я могу рассказать твоё будущее. -Перевернула карту, на которой красовался падший орёл. -Его час пришёл, с грустью сказала зебра и продолжив. -Перепутье, что же посмотрим куда ведут пути. Один ведёт к твоему успеху, а другой к потере. Другой лучше, ты обретаешь счастье которое так хотела.\n-Угу.\n-Ну и третий путь. -Она перевернула карту и тихо произнесла. -Алая кровь, моя прабабушка лишь однажды увидела эту карту, после чего написала пророчество\n-Пророчество, и о чём оно?\n-Да так, ничего особенно. -Зебра начала быстро собирать вещи. -Живи, люби, и всё будет хорошо. Нет! Просто лучше живи, нам всем так будет лучше. -Собрав вещи она выпроводила Сару из здания.\n-А когда к вам можно ещё подойти?\n-Никогда, мы закрываемся! -После чего закрыла дверь, и увидела Генри.\n-Уже...? -С печалью спросил он\n-Уже"
 ngc.55.a:0 "Собирайся, мы едем в Зебрику"
 
 ngc.60.t:0 "Три туза"
 ngc.60.d:0 "Как и ожидалось, Дреслер находился в баре "Три берёзы" в окружение его дочери, и старого кота комиссара Каина. Их всех объединяло одно - игра в карты и судя по их лицам, кот выигрывал.\n-А вот и наш самец! -Гордо произнес Дреслер завидев Крайгера. -А ну давай к нам, втроём явно этого обыграем\n-Нет, я просто узнать насчёт Сары, и дальше...\n-Что узнать? Учебник биологии возьми, там всё чётко написано, как и что бывает. -Съязвил Каин, кидая карту. -Хотя в твоём случае, задача на её копытах.\n-Узнать ваше мнение о ней.\n-Сразу на расстрел за шпионаж, разжигание ненависти, и приставание к сорокалетнему идиоту!\n-С первым двумя я не согласен, а вот последнее всегда можно исправить. -Начал Дреслер. -Я говорил с ней, девчонка смышлёная, но либо что-то скрывает, либо стала такой с детства.\n-Ой, ну что вы престали к ней, посмотрела бы я на вас, если вы бы уехали из родного дома ради любви. -После чего Каин и Дреслер переглянувшись начали смеяться.\n-Да-да, ради любви она гонялась за ним по всей библиотеке. Одного привета хватило, чтобы довести нашего губернатора до полусмерти. -Дреслер продолжал говорить, пока Крайгер всё слушал и слушал. Ему было противно слушать такие слова от единственного друга и он решил:"
 ngc.60.a:0 "Продолжать слушать"
 ngc.60.b:0 "-Что же, я услышал достаточно"
 
 ngc.87.t:0 "Протекторат по освоению Юго-востока создан"
 ngc.87.d:0 "В том протекторате нет анекдотов, поэтому расскажу один на дорогу. Во время секретного совещания в бункер Дреслера с шашкой наголо ворвался Фестрал и закричал:\n— Порублю, гады.\nГады скинулись по рублю. Фестрал собрал деньги и ушел."
 ngc.87.a:0 "Нет анекдотов? Я остаюсь в Нуве!"
 ngc.87.b:0 "Спасибо, время подчинить этих черн..."
 
 ngc.83.t:0 "Третий месяц войны"
 ngc.83.d:0 "Спустя три месяца войны мы наконец-то решили большинство проблем армии. Впрочем, коррупционная проблема продолжает быть занозой в з..."
 ngc.83.a:0 "А?"
