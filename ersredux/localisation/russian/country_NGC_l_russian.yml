 NGC_Ger_Drem:0 "Герр Дрим"
 NGC_Ger_Drem_desc:0 ""Скупой платит дважды, а Кризалис всегда"\n\nБудем честны, Нуво-Грифоника НИКОМУ не нужна! Эту страну кинула своя же метрополия, так какое дело должно быть чейнджлингам до них?\n\nКризалис всегда хочет быть первой, той кто превосходит других королев во всём. И вот скажите, у других королев есть колонии где-то за пределами Гегемонии? А у Кризалис есть! Причём богатые, развитие, и те кто почитают королеву. А у Аргиннис есть колонии? Нет? Ну и лохушка.\n\nОгромные средства тратятся на поддержание образа. И эти же средства, уходят в наши карманы. И когда амбиции погубят Кризалис, мы будем уже далеко."
 NGC_Ger_Drem:0 "Охранник бункера Дреслера"
 
 NGC_Zulgus:0 "Зулгус"
 NGC_Zulgus_desc:0 "Да, у Дреслера есть личный бункер. Если вы не знали это, то поздравляю, вы знаете меньше чем этот охранник.\n\Честно говоря, даже высшее руководство УГУ слабо знает об этом таинственном бункере и его местоположение. Попытки выяснить это не увенчались успехом. А охранник на все вопросы просто кивает.\n\n(Хм, мне вот стало интересно что там? Может там чудо оружие для уничтожения Аякатачли, разработанное самим Каппингеймером?)"
 NGC_mussolini_minister_of_education:0 "Охранник бункера Дреслера"
 
 
 
 NGC_Shredder:0 "Шредер"
 NGC_Shredder_desc:0 "- Сколько недоделок вы обнаружили в новой квартире? - Пока одну! - Это же классно! - А какую? - Никак не могу открыть входную дверь."
