 NGC_Taras:0 "Тарас"
 NGC_Taras_desc:0 "Простой ценитель житья в коробке и питание из мусорки, вот он, типичный Тарас. \n\nПроснутся, поработать, уснуть, такой был день Тараса. Но потом что-то прилетело в его дом, и он бросив всё стал простым бомжом. Коробка и мусорка, казалось бы ничего нет, а Тарас счастлив так жить.\n\nРаз в месяц Тарас любит покинуть своё скромное жилье и отправиться в путешествие по Югу. Там он находит новых друзей, врагов, и иногда даже вдохновение для своей книги под названием "Книга""
 NGC_Taras_king:0 "Просто §YТарас§!"
 
 NCH_Quisling:0 "Квислинг"
 NCH_Quisling_desc:0 "Подобно лисам §G"Квислинг"§! со своими бойцами проникает в чужой курятник, забирает куриц, и под громкую кананаду артиллерии сваливает в закат.\n\nПравда вместо курочек, Рихтгофен предпочитает выкрасть всякие прототипы с континента. Ходят слухи, что однажды он украл диван у самого императора Гровера (на котором лежал какой-то грифон)"
 NCH_intelligence_officer:0 "Руководитель §G"Лис"§!"
 
 NCH_Hellmut:0 "Гельмут" 
 NCH_Hellmut_desc:0 "Спроси §Y"Гельмута"§! когда конец света, то он чётко ответит что в любой будущий день (кроме четверга)\n\nСамо же учение §Y"Вчерашнего часа"§! сложно объяснить ибо кроме §Y"Гельмута"§! никто не понимает его сути. Вроде нужно что-то разорвать, поломать, починить, потом снова поломать, и закопать(главное не в четверг, и не глубоко)\n\nВпрочем, наибольший интерес представляют его связи в религиозных кругах (Ну и небольшая коллекция артефактов, которую он где-то закопал(Хотя будем честны, он простой алкаш который понавыдумывал эти сказки))"
 NCN_travel_enthusiast:0 "Проповедник §Y"Вчерашнего часа"§!" 
 
