 NGC_Dressler_desc:0 "Родившись в семье кузнеца, Дреслер смог буквально выковать свою судьбу, и превратить Нуво Грифонику в стальное сердце Юго-Запада. Для простого народа он лишь тихий защитник и прекрасный семьянин, но за кулисами он тот, кто позволяет государству функционировать и достигать всё больших высот"
 NGC_rearmament_proponent:0 "Властелин ничего"
 
 
