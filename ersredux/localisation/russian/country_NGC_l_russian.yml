 NGC_Richthofen_desc:0 ""Если мой план провалится, я построю здесь парк аттракционов!""
 NGC_Fili:0 "Фили"
 NGC_Pystina:0 "Пустынный Джек"
 NGC_Pystina_desc:0 "Лучшую характеристику получила пустыня, у нее не оказалось теневых сторон."
 NGC_iasabela:0 "Иззабела"
 NGC_Commissioner_Cain:0 "Комиссар Каин"
 NGC_Kommisar:0 "Экспеот в области тотальной партизанской войны"
 YGY_Dreslers:0 "Дреслер"
 YGY_Dreslers_desc:0 "Падение с самолёта разделило его жизнь, на до и после. Без ничего, ползя сантиметр за сантиметром, он был обречён на смерть. Питаясь ягодами, и спя под дождём он продолжал бороться за жизнь. Дни спустя он дополз до реки, но обессиленный потерял сознание. Так бы и закончилась история. Но, у судьбы были другие планы. Местные Бэтпони смогли обнаружить его, перенести в лагерь, а после вылечить. Для них он стал воплощением старинной легенды, об существе которое приведёт их процветанию. Когда Дреслер выздоровел, он воспользовался этим чтоб укрепить влияние Нуво Грифоники в регионе. Но, узнав что происходит с его родиной, он поменял планы и намеревается избавиться от эксперимента Крайгера"
