 NGC_balance_of_power:0  "Противостояние в УГУ"
 NGC_YGY_lev_side:0  "Левое крыло\n\n- §g"Кретины застрявшие в детских мечтах"\nОни как были левыми, так и остались левыми с идеалами свободной Нуво Грифоники. В своих идеях они предполагают возвращения к корням и разделение власти на три части. УГУ должно заняться соблюдением порядка и стабильности, совет стать законодательной основой, а функция исполнительной власти будет в когтях губернаторов§!"
 NGC_YGY_Prav_side:0  "Правое крыло\n\n- §g"Кретины с манией величия и большими пушками"\n Исторически правое крыло боролось за превосходство грифоньего вида и продолжение колонизации на континенте. Но со временем идеи о превосходстве вида сменились превосходством организации, а цель колонизация сменилась концепцией "Тотальная война" Они считают что Нуво Грифоника является лишь ресурсом на пути к великой цели.§!" 
