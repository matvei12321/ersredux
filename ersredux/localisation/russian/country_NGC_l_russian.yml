 NGC_Dobrovolez:0 "Добровольный корпус"
 NGC_Dobrovolez_desc:0 "Офицер по вербовке добровольцев в армию обрадовался, когда увидел молодого, входящего в его офис.\n- Я прочитал ваш плакат с призывом вступать в армию, - сказал молодой \n- Очень хорошо! Значит, решили стать добровольцем?\n- Нет.\n- Нет? Зачем же вы тогда пришли к нам?\n- Я хотел сказать, чтобы вы на меня не рассчитывали."

#Их идеи актульны до поломки
NGC_left_alone:0 "Неизвестная Гордость Империи"
 NGC_left_alone_desc:0 "Мы давно забыли, когда лапы грифона в первый раз ступили на эту землю. А кто был первым губернатором этой колонии? Это не столь важно. Важно одно: мы помним нашу священную миссию по освоению этих диких земель. Мы станем... величайшей колонией Империи Грифонов в мире! Гровер свяжется с нами через океаны и сообщит, что пора продолжить колонизацию.\n\nНас точно не бросили. Империя бы ни за что с нами так не поступила"
 NGC_genocide_idea:0 "Истребление туземцев"
 NGC_genocide_idea_desc:0 "Эта земля по праву принадлежит нашему сюзерену, великой Грифоньей Империи. Никакие грязные дикари не имеют права здесь буйствовать!"
 NGC_genocide_Z:0 "Коррумпированная Армия"
 NGC_genocide_Z_desc:0 "Армия Нуво грифоники, это феномен мирового масштаба. Что туда не положи, вечно пропадает. Оттуда выносятся все что не прибито, коррупция процветает на всех уровнях. Но, хуже этого то, что солдаты толкают то что надо толкать, и носят то что надо носить. Это где такое видно? Но благо Дреслер намеревается положить этому конец. Его реформы заставят солдат красить траву, и делить снег!"
 NGC_genocide_Z1:0 "§tБездарная армия§!"
 NGC_genocide_Z2:0 "§O Армейский бардак§!"
 NGC_genocide_Z3:0 "§Y Слабые и коррумпированые§!"
 NGC_jagers_of_NGC:0 "Штурмовые Отряды"
 NGC_genocide_Iskra:0 "Группа искра"
 NGC_genocide_Koll:0 "Коллаборационизм"
 NGC_genocide_Koll1:0 "Коллаборационизм"
 NGC_genocide_V:0 "Пакт Губернаторов"
 NGC_genocide_V1:0 "Пакт Губернаторов"
 NGC_genocide_V2:0 "Пакт Губернаторов"
 NGC_genocide_V_desc:0 "Уверяю вас, им можно доверить Нуво-Грифонинск"
 NGC_genocide_idea_Dom_V:0 "Дом народов"
 NGC_genocide_idea_Dom_V_desc:0 "Южный регион не самое спокойное место. Тут либо сидят бандиты, которые украдут все до нитки, привет Роук. Либо культисты, которые несут вас в качестве жертв, привет Додж сити. А про местные племена я вообще молчу, ибо они вечно куда-то бегают, а по пути что-то крадут. В общем по сравнению с ними, Нуво Грифоника кажется раем. У нас есть все условия для спокойно жизни в условиях диктатуры"
 NGC_IdVoznesenie:0 "Пропажа Граждан"
 NGC_Don_idea:0 "Бандиты Капитана Мануле"
 NGC_Don_idea_desc:0 "« Вы чувствуете, генерал? Теперь ты старая и немощная. И сегодня твой судный день.  \n Капитан Мануле - настоящая заноза нашего государства. Упорно проникая на секретные объекты и разрушая их, он словно напоминает нам о своем присутствии. Почему же он поступает так беспощадно? Ответ прост - он мстит за уничтоженную дачу. В тот день за минуту было уничтожено то, что он строил годами. И теперь он живет ради мести"
 NGC_Don1_idea:0 "Восстание Капитана Мануле"
 NGC_Don1_idea_desc:0 "«Такие, как ты... Вы всюду сеете смерть и разрушение. Имей в виду, в конце концов... История нас рассудит. И не по тому, что мы разрушили, а по тому, что мы создали.» \n Вторжение в Роук не только стало сигналом к началу массового восстания под руководством Мануле, но и превратило нашу жизнь в настоящий ад. Наши враги делают все возможное, чтобы замедлить наше наступление, изо всех сил стремясь ослабить нашу армию и подорвать наше влияние. В то время как они все делают для того, чтобы подорвать нашу стратегию, нам приходится искать новые пути и тактики, чтобы противостоять им и вернуть контроль над ситуацией."
 NGC_Don2_idea:0 "Борьба Капитана Мануле"
 NGC_Don2_idea_desc:0 "«— Война кончилась. Всё кончилось. Нет больше никаких полков.\n— Нет. Война не кончилась. Вон сколько грифонов вокруг ходит!» \n Война на Юге окончена, но не для Мануле. Он как и раньше подрывает дороги"
 NGC_Blada_idea:0 "Государство всеобщего благосостояния"
 NGC_Mobulizasia_idea:0 "Интенсивная милитаризация"
 NGC_remember_idea:0 "Мы помним"
 NGC_Kult_Z:0 "Коллапс Армии"
 NGC_Kult_Z_desc:0 "Кто наш? Кто чужой?"
 GC_Kult_EV:0 "Массовая эвакуация"
 GC_Kult_EV_desc:0 "Остатки УГУ удерживают порт в Хейстине, и проводят эвакуацию гражданских. Мы должны положить конец этому!"
 NGC_Kult_OP:0 "Опустошение"
 NGC_Kolonia:0 "Регион-колония"
 NGC_Kolonia_desc:0 "Регион-колония"
 NGC_radio_silence:0 "Уничтоженное государство"
 NGC_Neitrall:0 "Оборванные связи"
 NGC_Neitrall_desc:0 ""Что значить мы должны вам помогать? Не-не-не, вы эту кашу заверили, сами и расхлебывайте. И вам всего хорошего!"\nНе смотря на сохранение лояльности, Оккупационная зона и Куатликуэ неспособны помочь Крайгеру. Обе стороны погрузили в своих проблемах, и сейчас борются за выживание. Впрочем, из-за отсутствия выбора, они охотно присоединятся к победившей фракции"
 NGC_Tiw:0 "Тишина на ЮГЕ"
 NGC_Tiw_desc:0 "Тихо, слишком тихо. Во время похода в Роук, солдаты Нувы страдали от партизан. Но сейчас все иначе, абсолютная тишина. Впрочем, если в Нуве §Rслучится не предвиденное§, то тишине придёт конец"
 NGC_Wostanie:0 "Легионы Бэтпони"
 NGC_Wostanie_desc:0 "У нас нет огневых палок, жестяных монстров, да и одежда не самая практичная. Зато, у нас есть вера в нашего избранного. Он поведёт нас к эпохе золота, и после мы придадим его священному пламени."
 NGC_Wera_YGY:0 "Армия поддерживает УГУ"
 NGC_Wera_Heittal:0 "Нейтральная Армия"
 NGC_Wera_GYB:0 "Армия за Крайгера"
 NGC_puppet_economic_control:0 "Чейнджлинги контролируют экономику"
 NGC_changeling_advisors_idea:0 "Советники чейнджлингов"
 NGC_Plan_V_idea:0 "Последний рывок "
 NGC_Plan_V_idea_desc:0 "Прошли времена большой стройки и смертей, и сейчас мы готовы к последнему рывку, в результате которого Нуво Грифоника станет современной страной. Рабочие с северных регионов уже сообщили о полной готовности предприятий, осталось лишь достроить железную дорогу, и тогда наша промышленность начнёт работать на полную мощность"
 NGC_W_Rok_idea:0 "В земли Роука"
 NGC_Skam_idea:0 "Покупка циммерита"
 NGC_Smert_mozga:0 "Проект точка"
 NGC_Smert_mozga1:0 "Проект точка"
 NGC_Smert_mozga2:0 "Проект точка"
 NGC_Smert_mozga3:0 "Проект точка"
