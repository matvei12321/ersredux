NGC_focuss_Z:0 "Двадцать лет мира"
 NGC_focuss_Z_desc:0 "§Y"Выпьем за Крайгера, того кто спас Нуву от погибели"§! \n\n Наша история не славится великими победами или историями, а даже наоборот, мы известны своим постоянным бегством. Мы бежали от дикарей Бэтпони, от белокопытных племён, и в конечном счёте прибежали к океану, где вынуждены были остановиться. Сейчас наша миссия состоит в возвращении утеряных земель, и наконец-то исполнить свой долг перед Империей"
 NGC_focuss_V:0 "...амбиции..."
 NGC_focuss_V_desc:0 "§Y"В библиотеке нашёл? Что ж, пару лет пусть посидит, а потом в расход в след за предыдущим"§!\n\n Хотим ли мы мира? Да, и желательно весь! Но для начала нам достаточно будет Юго-запада. И пока наши политики кричат об мирном объединение под нашим флагом, генералы готовятся к войне. Мы отправим послов в соседние страны с предложением об формировании федерации, и расширение торговли между странами "
 NGC_focuss_S:0 "...враги"
 NGC_focuss_S_desc:0 "§Y"На каждую наглую Октавию найдётся своя клетка!"§!\n\nРоук исторически был пристанищем всякого сброда и отребья. Но ведь им этого мало, и они вечно пытаются проникнуть к нам и навести свои порядки. Особое внимание заслужили бандиты Октавии с девизом "Бери что не прибито" ибо за наш счет они получают большую часть своих денег. Что ж, посмотрим как они будут проходить через наши новые укрепления"
 NGC_focuss_X:0 "Наши успехи..."
 NGC_focuss_X_desc:0 "§Y"Вас бы всё равно продали, вопрос только в цене"§!\n\nГубернаторы хоть и считались избранными богами, но их интересовали лишь вечеринки и утехи. Правда… Крайгер избрал другой подход бросив все силы на развитие промышленности. Цена нашей индустриализации - кровь народа. Но даже тогда мы были вынуждены уступить Нуво-Грифонинс за поддержку нашей промышленности. Кто-то считает это изменой, но это был единственный шанс наверстать упущенное"
 NGC_focuss_Skam:0 "В будущее!"
 NGC_focuss_Skam_desc:0 "§Y"Дреслер наивный грифон. Но, лучше его никого нет"§!\n\nСлова об единстве это конечно хорошо, всем рассказываете какие вы хорошие и позитивные, но что насчёт доказать это действиями? Мы пригласим всех лидеров Юго-западных стран за стол переговоров, и наконец-то объединимся против внешних угроз. Слава федерации!"
 NGC_focuss_U:0 ""Смена планов""
 NGC_focuss_U_desc:0 ""Мирного решения не будет, все слишком заняты набиванию своих карманов" \n\nПервый этап плана Дреслера удался. Наш народ верит что мы первые миротворцы и борцы за благое дело, и самое время распространить эти идеалы на весь регион. Да захлебнется в крови тот, кто усомнился в нашем миролюбии, ибо милосердие наше беспощадно "
 NGC_focuss_CN:0 "Прогулка по огороду" 
 NGC_focuss_CN_desc:0 "Ах, пустынные земли, чудесное место которое никому не нужно. Почему? Оно всегда было кладбищем армий и абсолютной пустотой. По слухам, именно здесь белокопытные потеряли 70% своей армии, обходя горы. А поскольку эта пустыня никому не нужна, мы просто заберём её себе, и как раз насолим нашему северному соседу. Главное провести маленькую победоносную быстро, и не застрять в этих пустынях"
 NGC_focuss_CN1:0 "Найти неудач... патриотов"
 NGC_focuss_CN1_desc:0 "Учительница спрашивает: чем дети занимались во время войны.\nПетя: - Я на заводе работал. Снаряды делал.\nУчительница: - Молодец Петя! А что ты делал, Вовочка?\nВовочка: - А я на передовой помогал, патроны бойцам подносил.\nУчительница: - Да? И что они тебе говорили?Вовочка: О я-я, зеэр гут Вольдемар, зеэр гут"
 NGC_focuss_CN2:0 "Южный Рывок"
 NGC_focuss_CN2_desc:0 "Белокопытные в прошлом являлись хозяевами всего Юго-востока, а ныне они лишь тень былого могущества. У них нет промышленности, а вся их армия - сборище отсталых от жизни племен, оснащённых чем попало. И даже прошлая война за дверь их ничему не научила, и они всё также продолжают жить прошлым. Что же, нам же от этого легче. По данным армии война будет быстрой, но может поднять шум среди наших соседей."
 NGC_focuss_CNA:0 "Все херня, по новой"
 NGC_focuss_CNA_desc:0 "У Дресела всегда были противники разной степени опасности, но особое место занял старый офицер Хеншель. В своё время он легко мог развязать гражданскую войну против Доеслера, но неожиданное отравление и смерть не позволили этому случиться. С тех пор армия погрязла в коррупции и грехе, а опытные кадры дали клятву верности УГУ. Сейчас наши бойцы могут только гонять голубей, и то не известно кто победит. Сейчас мы переведём армию на военные рельсы, попутно оторвав лапы ворам и жуликам."
 NGC_Armi:0 "Глава УГУ §CДреслер§! намерен реформировать §RАрмию§! или добить их"
 NGC_New_Focys:0"Рекомендуем изучить все прошлые фокусы, ибо в зависимости от ваших решений §CОткрывает фокусы!§"
 NGC_VooZ:0 "§CНо§ ,помимо этого они займутся проектом §r Вознесение§"
 NGC_Oskor:0 "§CПеред пожиманием этого фокуса, рекомендую §Rсотню раз подумать как хороша жизнь§"
 NGC_Opperat:0 "§CДает доступ к операциям§"
 NGC_focuss_CNA5:0 "Это вам не Дурдом!"
 NGC_focuss_CNA5_desc:0 "Представьте, если бы армия была подобна обезьянами сбежавших из зоопарка. Целая орда несущая хаос и разрушения, считающая своим долгом прыгать по фонарным столам и красть шляпы у местных. Нам нужно что-то подобное, но при этом управляемое. Наша армия уподобится управляемому хаосу, который враг не то что не остановит, а даже не сможет понять основные направления удара и цели. Естественно для этого нужны тренировки, тренировки, и ещё раз тренировки. Благо офицеры УГУ готовы передать знания, а если надо, вбить их в головы солдат."
 NGC_focuss_CNA6:0 "Каждому патриоту по пушке"
 NGC_focuss_CNA6_desc:0 "Как в теории крестьянин может избить вилами рыцаря, так и наши солдаты смогут избить бандита палками. Вопрос только в том, а нужно ли использовать подобные методы в современной войне? Нет, даже в самые тяжёлые часы у наших бойцов должны быть нормальные пушки. Это не только сохранит эффективность всей армии, но и позволит сохранить жизни наших бойцов. Благо нынешняя промышленность и запасы на складах позволят каждому патриоту получить по пушке."
 NGC_focuss_CNA7:0 "Элита элитой элитила да не доэлитила"
 NGC_focuss_CNA7_desc:0 "Комиссар Каин многое повидал, воюя против короля Шторма. Но особенно ему понравилась концепция штурмовых групп, особых отрядов напичканных всем чем можно, и прорывающих бреши в обороне врага. Нам бы крайне пригодились пару таких дивизий в предстоящем конфликте. Враг на своей шкуре познает все прелести современной войны."
 NGC_focuss_CNA8:0 "Дать свободу Очкарику"
 NGC_focuss_CNA8_desc:0 "Зачем нужны учёные? Чтобы разбивать вазы битой, в попытках узнать сколько этой вазе лет. Впрочем, наши учёные только и живут на "инициативности" их не поддерживают и не финансируют. Но особое место занимает Каппингеймер, единственный учёный который живёт наукой и своими безумными идеями. Мы можем предложить ему и ещё группе талантливых учёных особый отдел, оснащённый по последнему слову науки. И остается надеяться, чтобы они нас не подвели"
 NGC_focuss_CNA9:0 "План Стрелкова"
 NGC_focuss_CNA9_desc:0 "Имеем ли мы армию для уничтожения Роука? Да! Имеем ли мы армию для войны с Югом? Нет! Одного этого факта достаточно для перестройки мобилизационной системы. В наше время нам не нужна сотня незаменимых бойцов. Нам нужны тысячи легко заменяемых дивизий! Поэтому мы разработали новый призывной план, с этого момента каждый житель должен уметь обращаться с оружием и быть готовым пасть за свою родину и семью!"
 NGC_focuss_CNA1:0 "Северные учения"
 NGC_focuss_CNA1_desc:0 ""Какая такая агрессия? Это наша земля и мы просто проводим ежегодные учения.""
 NGC_focuss_CNA2:0 "Операция Эфир"
 NGC_focuss_CNA2_desc:0 "Эфирные земли, земли от куда большинство бандитов попадают в Нуво Грифонику. Помимо этого, данный регион заселён и обладает значимой для Роука промышленностью. Мы намерены провести небольшую "Репетицию" перед крупномасштабной войной. Наши элитные отряды начнут пограничный конфликт, и в ходе маленький победоносной завладеют регионом"
 NGC_focuss_CNG:0 "Хорошее время для договоров"
 NGC_focuss_CNG_desc:0 ""Друзья, вы готовитесь к войне с Роуком? Ох, друзья, жаль вы раньше не обратились ко мне, ибо у нашей королевы есть куча перспективных штуковин, которые явно помогут вам в предстоящем конфликте. Вот вы знаете о, ну скажем о вертолёте? Нет? А хотели бы получит чертежи этих монстров? Что же, мы готовы вам предоставить их взамен на не существенную мелочь, скажем за доступ наших корпораций к вашим ресурсам. А как бонус, вы получите все самое лучшее и совершенное""
 NGC_focuss_CNG1:0 "Воспользоваться опытом коллег"
 NGC_focuss_CNG1_desc:0 "Наши друзья чейнджлинги всю свою историю живут в состоянии войны. Они не знают ничего другого как сражаться за свою жизнь во имя своей королевы. Правда, всё это только по словам их посла, как в действительности обстоят дела трудно сказать. Но, они готовы предоставить своих советников в качестве помощи для скорейшей модернизации нашей армии по современным стандартам."
 NGC_focuss_CNG2:0 "Расширение Пакта"
 NGC_focuss_CNG2_desc:0 "На новых землях были обнаружены обширные запасы нефти. Но, к сожалению, мы не обладаем достаточной технической базой для их добычи. А вот чейнджлинги, весьма заинтересованы в этих месторождениях, и готовы выкупить их за технологии. Бурили на воду, а полилась нефть. Теперь я и без участка, и без нефти"
 NGC_focuss_CNG3:0 "Спиз... позаимствовать технологии"
 NGC_focuss_CNG3_desc:0 "Новые грифоньи танки будут оснащены непропиваемой броней."
 NGC_focuss_CNG4:0  "Взглянуть в забытое"
 NGC_focuss_CNG4_desc:0  "Ждём Апрельскую обнову"
 NGC_focuss_CN14:0 "На рельсы войны"
 NGC_focuss_CN14_desc:0 "Эти глупцы из Роука думают, что созданный ими альянс нас остановят? Нет, нет нет, этот жалкий союз лишь даёт нам повод для нанесения удара. Сегодня будет объявлена мобилизация, а дальше мы намерены провести ряд операций перед началом войны."
 NGC_focuss_CN15:0 "Легион "ЮГ""
 NGC_focuss_CN15_desc:0 ""
 NGC_focuss_CN16:0 "Не брат ты мне, гнида черножёпая"
 NGC_focuss_CN16_desc:0 "Хотя агенты и докладывают, что население Куатликуэ нас поддерживает, но где гарантии что в будущем они не сменят мнение? Однажды предки уже закрыли глаза на их выходки, и чуть не поплатись жизнями. В этот раз мы не допустим этого, мы должны быть готовы в любой момент вступить с ними в противостояние и окончательно ликвидировать их недо-государство"
 NGC_focuss_CNG5:0  "Южные Учения"
 NGC_focuss_CNG5_desc:0  ""Да учения, а что такого? Ну подумаешь у нас нет флота, с каких пор для морской учений нужен флот?" "
 NGC_focuss_CNG6:0  "Операция Отпуск"
 NGC_focuss_CNG6_desc:0  ""Бизоны? А сколько у них дивизий?" Избавившись от одних дикарей, мы вышли на границу с другими дикарями которые в альянсе с Роуком... Мда, они сами выбрали свою печальную судьбу. Наше командование планирует совершить небольшой рейд, и в результате перенести границу чуть дальше за восток. Ну а дальше там уже до Куатликуэ недалеко"
 NGC_focuss_CNG7:0  "Небесный кошмар"
 NGC_focuss_CNG7_desc:0  ""
 NGC_focuss_CNG8:0  "Было наше"
 NGC_focuss_CNG8_desc:0  "Стало тоже наше, только теперь заводы находятся в Нуво Грифонике"
 NGC_focuss_CNGP:0 "Северная угроза"
 NGC_focuss_CNGP_desc:0 "Роук - последняя наша преграда на пути к господству на Юго-западе, и дальнейшему расширению на восток. Избавившись от Роука мы покончим с бандитской чумой и криминалом. Естественно перед началом войны нам следует хорошо подготовиться, ибо провал вторжения недопустим"
 NGC_focuss_Betpons:0 "Истинный враг"
 NGC_focuss_Betpons_desc:0 "§CВ РАЗРАБОТКЕ§!\n\n"Вы хотите сказать что за полгода какой-то Мааров сын превратил села в мегаполисы? И за это время они вместо палок начали воевать танками? Вы че совсем там!?! Я знал что ваша контразведка поехавшая, но не настолько же! Что это? Гребаное дерьмо... Двадцать лет сидим сухари доедаем чтоб дорогу построить, а они там пируют на всю. Немедленно свяжитесь с руководством Роука, у меня к ним серьёзный разговор""
 NGC_focuss_Betpons1:0 "Покорители пустынь"
 NGC_focuss_Betpons1_desc:0 "Фестрал шёл в Карфинск с трудом разбирая дорогу. На утро железная дорога от Роука до Карфинска была полностью разобрана..." 
 NGC_focuss_Betpons2:0 "Они познают страх"
 NGC_focuss_Buuuun1:0 "Закупка снаряжения"
 NGC_focuss_Buuuun2:0 "Тянуть время"
 NGC_focuss_Buuuun:0 "План "Цитадель""
 NGC_focuss_Buuuun_desc:0 "§CВ РАЗРАБОТКЕ§!"
 NGC_focuss_CNGP1:0 "Операция "Отпуск""
 NGC_focuss_CNGP1_desc:0 ""Бизоны? А сколько у них дивизий?" Избавившись от одних дикарей, мы вышли на границу с другими дикарями которые в альянсе с Роуком... Мда, они сами выбрали свою печальную судьбу. Наше командование планирует совершить небольшой рейд, и в результате перенести границу чуть дальше за восток. Ну а дальше там уже до Куатликуэ недалеко"
 NGC_focuss_CNGP2:0 "Операция Эфир"
 NGC_focuss_CNGP2_desc:0 "Эфирные земли, земли от куда большинство бандитов попадают в Нуво Грифонику. Помимо этого, данный регион заселён и обладает значимой для Роука промышленностью. Мы намерены провести небольшую "Репетицию" перед крупномасштабной войной. Наши элитные отряды начнут пограничный конфликт, и в ходе маленький победоносной завладеют регионом"
 NGC_focuss_CNGP3:0 "Как прекрасен юг ночами"
 NGC_focuss_CNGP3_desc:0 ""
 NGC_focuss_CNGP4:0 "Врата в Юго-Восток"
 NGC_focuss_CNGP4_desc:0 "Успешное размещение войск усилило наш контроль над регионом. Правда местный вождь всё чаще и чаще встречается с восточными лидерами, явно пытаясь о чём-то договориться. Что же, один удар нашей армии уничтожит это дитя истории. А после местный губернатор возглавит расширение на восток"
 NGC_focuss_CNGP5:0 "Диванные войска"
 NGC_focuss_CNGP5_desc:0 "Падение Роука привело к резкому увеличению числа коллаборантов и желающих помочь нашим идеалам. Что же, мы готовы предложить им прекрасную роль "Диванных солдат" их задача просто, всячески искажать прошлое, делая наши идеалы привлекательными в глазах простого народа. Со временем, даже абсолютная ложь будет неотличима от правды"
 NGC_focuss_CNGP6:0 "Кастрировать шизов"
 NGC_focuss_CNGP6_desc:"Джодж сити подобен гнили на теле существа, оно медленно, но необратимо уничтожает всё больше и больше пока в конечном счёте не уничтожит своего носителя изнутри. Что же, благо науке уже известен самый простой способ ликвидации гнили - ампутация заражённой конечности"
 NGC_focuss_CNGP7:0 "Выбить всю дурь"
 NGC_focuss_CNGP7_desc:0 "Блистательная победа над Джодж-Сити открыла нам страшную картину их города. Поклонение безумцам в купе с бедностью и безграмотностью породили поистине ужасное место. Если мы хотим вытащить город из этой гнили, нам придётся воспользоваться жёсткими методами. Сжигайте и уничтожайте всё их наследие!"
 NGC_focuss_CNGP10:0 "Последний аккорд"
 NGC_focuss_CNGP10_desc:0 "Спустя столько лет Юго-Запад наконец-то един как никогда. Наши знамёна гордо развиваются над побеждённым, а войска маршируют под ликования толпы. Сейчас наша задача закрепить успех, и готовится к новым походам..."
 NGC_focuss_CNGP8:0 "Выбить дверь"
 NGC_focuss_CNGP8_desc:0 ""
 
 
 
 
 
 
 
 
 
 
 NGC_focuss_VES:0  "Весна в Нуво Грифонике"
 NGC_focuss_VES_desc:0 "Да! да! да! Юг наш, бандиты разбиты, а народ славится наших лидеров. Что ж, пора переходить к новому этапу плана Крайгера, и сегодня мы начнём менять облик Нуво Грифоники. Как жаль, что многие не увидят нашу мечту. Но ради великой цели, можно многими пожертвовать "
 NGC_focuss_VES1:0  "Все равны, но.."
 NGC_focuss_VES1_desc:0 "Никаких – НО! Нуво Грифоника должна стать примером равенства народов, и примером хорошей жизни. С этого дня, гражданином нашей страны сможет стать любой, в независимости от вида или прошлой жизни."
 NGC_focuss_VES2:0  "Национальные Автономии"
 NGC_focuss_VES2_desc:0 "С самого своего появления, Нуво Грифоникой всегда правили Грифоны. Так было всегда, но, сейчас пора уступить место другим народам. Нуво Грифоника будет перестроена, и у каждого народа появится своя земля, где они смогут жить по своим правилам. Естественно, жить в рамках закона"
 NGC_focuss_VES3:0  "Вы имеете право"
 NGC_focuss_VES3_desc:0 "Вы имеете право! Почему бизон не может получить образование, только потому что он бизон? С этого дня каждый житель имеет право на помощь со стороны государства, и как следствие, возможность жить, а не выживать"
 NGC_focuss_VES4:0  "Победителей судят!"
 NGC_focuss_VES4_desc:0 "Бандиты Роука совершили чересчур много преступлений, как на территории Нуво Грифоники, так и в странах союзниках. К сожалению, это касается и наших солдат. Знаменитая резня в Роуке лишь маленькая часть прошлых ошибок. Мы не имеем права оставлять их в живых, и должны немедленно провести разбирательство. Особый взгляд будет на солдатах и офицерах УГУ "
 NGC_focuss_VES5:0  "Никогда снова!"
 NGC_focuss_VES5_desc:0 "Одно дело солдаты, в большинстве случаев они лишь выполняли приказы и у них не было выбора. Поэтому нужно избавиться от тех, кто составлял эти приказы. Среди нашего руководства полно тех, для кого жизни не стоят ничего. Что ж, если для них смерть ничего не значить, то почему мы должны жалеть об них?"
 NGC_focuss_VES6:0  "Ликвидация УГУ"
 NGC_focuss_VES6_desc:0 "УГУ- стало синонимом ужасного прошлого, и преступлений на территории Юга. Дальнейшее существование такой организации недопустимо. Организация будет запрещена, а все руководители пойдут в расход."
 NGC_focuss_VES7:0  "Это ваш шанс!"
 NGC_focuss_VES7_desc:0 "Наша победа привела к стабилизации региона. Немыслимое раньше - возможно сейчас. Богатство как ресурсами, так и дешёвой рабочей силой, делает Нуво Грифонику великолепным местом для инвестиций. Особенно инвестиции коснутся предпринимателей. Им нужно только помочь, и завтра у нас будет новое предприятие"
 NGC_focuss_VES8:0  "Гранты для Бизнеса"
 NGC_focuss_VES8_desc:0 "Шестерёнки начали свою работу. Но, нужно больше! Увеличив количество инвестиций, мы ускорим прогресс. Да это обойдётся в солидную сумму, но в будущему это обязательно окупится"
 NGC_focuss_VES9:0  "Конец Монополий"
 NGC_focuss_VES9_desc:0 "Борьба против монополий началась недавно, но уже начала приносить свои плоды. Множество мелких предприятий начали свою работу, ещё столько на подходе. К тому же, чейнджлинги согласились ослабить хватку. Правда, касаемо ресурсов договор поменять не удалось"
 NGC_focuss_VES10:0  "Новый день"
 NGC_focuss_VES10_desc:0 "Было ваше"
 NGC_focuss_VES15:0  "Вернуть Рудники"
 NGC_focuss_VES15_desc:0 "Ни для кого не секрет, что чейнджлинги владеют большинством рудников в нашей стране. К сожалению, вернуть их сейчас - значить начать конфликт с чейнджлингами. Единственное, что можно сделать, это поменять условия сделки. Мы откажемся от их услуг, а в замен, они покинут родники в течение трех лет. Ну а пока, новости покажут это в качестве очередной победы"
 NGC_focuss_VES16:0  "Армия мира"
 NGC_focuss_VES16_desc:0 "Невозможно исправить прошлые ошибки. Но, в наших силах сделать всё чтобы этого не произошло снова! Армия будет перестроена наподобие Юникорской. А место её лидера, займёт наша любимая Сара. Пускай у неё мало опыта, но она определённо справится с этой работой"
 NGC_focuss_K1:0 "Наш Звездный час"
 NGC_focuss_K1_desc:0 "Фокусы не покажу, зато есть решение на воскрешение Твайлайт. Кабанчик, сало ты такое, когда ты уже наконец прославишь Империю?"
 NGC_focuss_YGY1:0 "Только свистни он появится"
 NGC_focuss_YGY1_desc:0 "Как жаль, но наш дорогой Крайгер был предан его любимыми пони. Что ж, его смерть показала всем нам, главный союзник грифонов - сами грифоны. Завладев полным руководством в государстве, можно заняться окончательным уничтожением Роука"
 NGC_focuss_YGY2:0 "Вынос мусора"
 NGC_focuss_YGY3:0 "Заставьте их работать!"
 NGC_focuss_YGY4:0 "Новые офицеры"
 NGC_focuss_YGY5:0 "Бомбезный день"
 NGC_focuss_YGY6:0 "Вскрыть склады"
 NGC_focuss_YGY7:0 "Вновь в Роук"
 NGC_focuss_YGY8:0 "Шашлык готов"
 NGC_focuss_YGY9:0 "ДреслерЮгент"
 NGC_focuss_YGY10:0 "В земли Бизонов"
 NGC_focuss_YGY11:0 "Юг чей? ЮГ НАШ!"
 NGC_focuss_WAS:0 "Как там юг?"
 NGC_focuss_WAS_desc:0 "По результатам войны, нам достался весь Юго-Западный регион, обладающий достаточными ресурсами и населением. К сожалению, не все народы испытывают радость от освобождения. Поэтому мы разделим регион на три оккупационные зоны. Нува - займется реформированием страны и белокопытными. Оккупационная зона - поддержанием порядка. А Бэтпони - кушаньем манго"
 NGC_focuss_WAS1:0 "Разбитая мелодия"
 NGC_focuss_WAS1_desc:0 "Октавия - в прошлом лидер Роука. Ныне, пленница находящиеся в заточение. На её копытах реки крови, и целый ряд смертельных преступлений. Попытки поменять её и сделать лояльной режиму абсолютно бесполезны. А если поменять не получится, решение лишь одно..."
 NGC_focuss_WAS2:0 "Добейте выживших!"
 NGC_focuss_WAS2_desc:0 "На данный момент большинство бандитов ушли в подполье и ждут своего момента. Их решение остатся - фатальная ошибка. Завладев Роуком, мы получили достаточно информации об них. Одним ударом мы намерены очистить Юго-восток, и поставить точку в нестабильности региона"
 NGC_focuss_WAS3:0 "Северный путь"
 NGC_focuss_WAS3_desc:0 "Нуво-Грифонинс, это город подобный неограненному алмазу. Но, мы можем легко это исправить. Постройка железной дороги между Нуво-Грифониском и Эфиорм, позволит не только эффективно перевозить ресурсы с севера. Но и укрепит влияние в оккупационной зоне"
 NGC_focuss_WAS4:0 "Порты в Нуво-Грифонинске"
 NGC_focuss_WAS4_desc:0 "Всё чаще и чаще, в Нуво-Грифоненске начинают останавливаться торговые корабли разных стран. И как следствие, появилась идея сделать этот город перевалочным лагерем. В теории, тут можно спокойно отремонтировать корабль и пополнить запасы. К сожалению, для расширения города понадобится время и значительные средства"
 NGC_focuss_WAS5:0 "Южный путь"
 NGC_focuss_WAS5_desc:0 "Племя Куатликуэ было прекрасным союзником в нашей борьбе. Но, при этом остаются разобщенными племенами. Чтоб укрепить центральное племя, мы намерены поддержать их технологиями. А постройка железной дороги, обеспечит бесперебойно сообщение между нами"
 NGC_focuss_WAS6:0 "Награда за верность"
 NGC_focuss_WAS6_desc:0 "Постройка дороги и передача технологий, это конечно хорошо. Но, они явно достойны большего. За их верность Грифоньему роду, мы предложим им стать часть нашей великой истории. Лишь объединившись с нами, они смогут подняться до невиданных ранее высот"
 NGC_focuss_WAS7:0 "А врагов еще ближе"
 NGC_focuss_WAS7_desc:0 "Помимо врагов внутренних, появились новые внешние проблемы. На севере активизировались племена пегасов. На юге, нелояльные бэтпони продолжают совершать набеги. К сожалению, сейчас мы не можем ликвидировать эти проблемы, но, старый добрый забор поможет укрепить границу. И покажет, что мы не рады иностранцам"
 NGC_focuss_WAS8:0 "Держи друзей близко"
 NGC_focuss_WAS8_desc:0 "Как когда-то наши предки прибыли на Эквус, так наши поселенцы начнут осваивать Роук. Да, места там не самые безопасные. Но, мы замотивировать поселенцев свободной землёй и разрешением на "средства самообороны" Кому какое дело если пострадают другие?"
 NGC_focuss_WAS9:0 "Жемчужина юга"
 NGC_focuss_WAS9_desc:0 "Наши действия начинают давать свои плоды. Множество инвесторов из разных стран, уже выразили своё желание инвестировать в город. И как следствие, расширяются слухи об нашем прекрасном городе. Некоторые даже называют его будущей "Жемчужиной Юга". Что ж, нам остаётся только сделать всё возможное, чтобы оправдать это название"
 NGC_focuss_WAS10:0 "Объединенное командование"
 NGC_focuss_WAS10_desc:0 "Успех, наши друзья Бэтпони теперь часть нашей нации. Но, их вооружённые силы желают оставлять лучшего. Оставлять их в таком состоянии нельзя, но, можно их объединить с нашей армией. Обеим сторонам будет крайне выгодно такое объединение. Наша армия получит больше новобранцев, а им остаётся кушать манго"
 NGC_focuss_WAS11:0 "Копай, продавай, богатей"
 NGC_focuss_WAS11_desc:0 "Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука Нуве не обойтись без угля Роука"
