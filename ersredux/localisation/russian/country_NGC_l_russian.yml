 NGC_Aviasia:0 "Продажа самолетов"
 NGC_Aviasia_desc:0 ""Зачем драться на земле, когда можно просто разбомбить врага?"\nЕсли промышленность Нувы в чем-то то и преуспела, то это явно в авиостроенние. Пускай наши самолёты похожи на чейнджлинговские аналоги (хотя по факту это они и есть) Но они пользуются популярностью во всём мире, составляя приличную часть доходов"

