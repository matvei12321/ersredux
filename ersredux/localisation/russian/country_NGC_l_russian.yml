 NGC_Woda_idea:0 "Утопить жуков"
 NGC_Mertvtz_idea:0 "Закопать мертвеца"
 NGC_deserttribes:0 "Удивительно, но тут только пустыня"
 NGC_deserttribes_desc:0 "Глупо было считать что захват этих мест принесёт хоть что-то хорошее. Есть даже особо одарённые которые умудряются проигрывать этой пустыне. Впрочем, давай я лучше анекдот расскажу:\n\nПолзет Грифон по пустыне. Пить хочет, изнемогает. Видок у него тот еще.. На последнем издыхании, в общем. Вдруг смотрит — впереди колодец! Грифон падает на колени и надтреснутым голосом кричит:\n— Вода-а!\nИз колодца мигом появляется рожа фестрала, еще круче выглядящая, с диким ревом:\n— Где-е?!"
 NGC_Blitcrig:0 "Блицкриг"
 NGC_Blitcrig_desc:0 "Наш враг силён и опасен, мы вынуждены бросить все имеющиеся ресурсы ради победы! (Иначе как бараны будем стоять и смотреть на песок)"
 
 NGC_Smert_tela:0 "Жить как скот"
 NGC_Smert_tela_desc:0 "§RРаботаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработаработа§!"
 
