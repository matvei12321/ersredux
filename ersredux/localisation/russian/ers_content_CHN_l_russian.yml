l_russian:
 
 #### Characters
 CHN_chrysalis_vesalipolia:0 "Королева Кризалис Весалиполианская"
 CHN_dremes_desc:0 "Если вы хоть раз смотрели в экономические отчёты, вы могли заметить что перед пунктом "Новые шубы для королевы" есть пункт "Поддержка колоний в Зебрике". Вроде ничего необычного для империи, но у Весалиполиса вообще нет колоний на южном континенте. Хотя министерство, связанное с ними, есть. Кто-то говорит, что это олицетворение амбиций Гегемонии.\n\n"Рано или поздно, копыто чейнджлинга покорит последнее государство на Эквусе, а затем под натиском Пакс Чейнджлингии падут Зебрика и Грифония. Так почему бы не подготовиться заранее?"\n\nПропаганда активно продвигает подобные идеи, хотя большая часть руководства считает это пустой ресурсов. А УОБВ уже давно прозвало это министерство "Главным рассадником коррупции"."
 
 #### Focuses
 

 CHN_family_problems:0 "Проблемы Гегемонии"
 CHN_family_problems_desc:0 "Нация чейнджлингов не едина и никогда не была таковой. Из поколения в поколения королевы ульев отдельно друг от друга правят своими землями, и их не заботят проблемы других. Королева Кризалис поставила перед собой чёткую цель - объединить чейнджлингский народ путём улучшения отношений с другими правительницами."
 CHN_helvia:0 "Королева Моря"
 CHN_helvia_desc:0 "Хотя Хельвия не так сильно любит Кризалис, как её предшественница, но, в конце-концов, она понимает, что хорошие отношения с Весалиполисом важнее личной неприязи. Она готова сотрудничать с Кризалис.\n\nПо крайней мере, она так думает..."
 CHN_argynnis:0 "Топор Войны"
 CHN_argynnis_desc:0 "Аргиннис считает, что достойна быть Верховной Королевой Ульев и прикладывает все усилия к тому, чтобы подорвать власть Кризалис. Кроме того, во время последней войны мать Аргиннис покончила с собой, чтобы не столкнуться с гневом Кризалис, и её старшая дочь, коей является Аргиннис, винит в этом непосредственно Верховную Королеву."
 CHN_yharia:0 "Королева Науки"
 CHN_yharia_desc:0 "Ярия может казаться дружелюбной, но на деле она холодна, как и её улей Сориф. Она скрывает это, но Кризалис знает, что Ярия относится к ней как к инвестору, а не как к уважаемому правителю."
 CHN_aurantia:0 "Опъянённая Местью"
 CHN_aurantia_desc:0 "По неизвестной причине Ауранция начала отдаляться от других Королев и стала непредсказуемой. Лучше навестить её и проверить, всё ли в порядке."
 
 CHN_helvia_left:0 "Объединить усилия"
 CHN_helvia_left_desc:0 "Похоже, Хельвия - одна из тех, кто осознает важность единства Гегемонии. На неё можно положиться и сотрудничать с ней."
 CHN_helvia_right:0 "Равзивать флот"
 CHN_helvia_right_desc:0 "Мечта Хельвии - владеть огромным флотом. Следует выделить средства из нашего бюджета для того, чтобы спонсировать строительство кораблей в Дитрисиуме. В конце-концов, морская мощь Дитрисиума - это морская мощь всей Гегемонии."
 CHN_argynnis_left:0 "Совместная военная промышленность"
 CHN_argynnis_left_desc:0 "Чтобы укрепить связь двух ульев, нужно связать нас общим военно-промышленным комплексом."
 CHN_argynnis_right:0 "Общие военные учения"
 CHN_argynnis_right_desc:0 "Аргиннис известна как "Королева Войны", и, возможно, Кризалис сможет улучшить с ней отношения, если организует качественные военные учения войск Весалиполиса и Вракса. Даже если мнение Аргиннис не поменяется, учения пойдут на пользу обеим ульям."
 CHN_yharia_left:0 "Сослать больше преступников"
 CHN_yharia_left_desc:0 "Сориф - неплохое место на дпльнем севере для создания концентрационных лагерей, в которые мы можем ссылать предателей режима."
 CHN_yharia_right:0 "Перенять их опыт"
 CHN_yharia_right_desc:0 "Сориф известен своими научными опытами, как над не-живыми, так и живыми объектами. Такие эксперименты позволяют совершать невероятные прорывы в области медицины, ведь тело чейнджлингов может быть изучено в реальном времени. Но, точно также, как Сориф не занимается лишь исследовании, Весалиполис также развивается самостоятельно. Мы можем вести свои опыты и даже делать собственные прорывы в науке."
 CHN_aurantia_left:0 "Импорт древесины"
 CHN_aurantia_left_desc:0 "Ликтида производит ряд ресурсов для Гегемонии, в том числе качественную древесину. Почему бы нам не приобрести её?"
 CHN_aurantia_right:0 "Поддержать плацдарм"
 CHN_aurantia_right_desc:0 "Ходят слухи, что Ауранция готовит нападение на Олению. Однако, это звучит глупо. Сравнивая размеры и мощности нашего улья и Олении, нельзя сказать о том, что у Ликтиды есть какие-то шансы. Впрочем, Кризалис уже двано мечтает пройтись танками по землям оленей... возмножно, стоит заранее подготовиться к такому событию."
 CHN_invite_everyone:0 "Собрать всех"
 CHN_invite_everyone_desc:0 "Чтобы решить вопрос единства Гегемонии раз и навсегда, следует организовать важное собрание, на котором обязательно будут присутствовать все королевы. Только так другие правительницы наконец поймут, что от них требуется."
 CHN_light_ruling:0 "Мягкое правление"
 CHN_light_ruling_desc:0 "Кризалис не смогла объединить чейнджлингов в короткие сроки потому, что её политика была слишком жёсткой. Ей следует сменить уклон с диктаторской пропаганды на политическое сближение чейнджлингских народов."
 CHN_light_ruling_tt:0 "§YБольшая часть бонусов этой ветки§! будет §Rудалена§!, если произойдёт §Rнеобратимое.§!"
 CHN_light_ruling_l_1:0 "Культурная синергия"
 CHN_light_ruling_l_1_desc:0 "WIP"
 CHN_light_ruling_r_1:0 "Акт об имперской государственности"
 CHN_light_ruling_r_1_desc:0 "WIP"
 CHN_light_ruling_l_2:0 "Имперская конституция"
 CHN_light_ruling_l_2_desc:0 "WIP"
 CHN_light_ruling_centre_2:0 "Королевский род Кризалис"
 CHN_light_ruling_centre_2_desc:0 "WIP"
 CHN_light_ruling_r_2:0 "Объединить экономику ульев"
 CHN_light_ruling_r_2_desc:0 "WIP"
 CHN_light_ruling_l_l_3:0 "Общая вера"
 CHN_light_ruling_l_l_3_desc:0 "WIP"
 CHN_light_ruling_l_3:0 "Культ Пяти"
 CHN_light_ruling_l_3_desc:0 "WIP"
 CHN_light_ruling_r_3:0 "Великий союз"
 CHN_light_ruling_r_3_desc:0 "WIP"
 CHN_light_ruling_r_r_3:0 "Патриотический национализм"
 CHN_light_ruling_r_r_3_desc:0 "WIP"
 CHN_light_ruling_start_integration:0 "Постепенная интеграция"
 CHN_light_ruling_start_integration_desc:0 "WIP"
 CHN_light_ruling_diplomacy_for_the_final_time:0 "Новая королева Войны"
 CHN_light_ruling_diplomacy_for_the_final_time_desc:0 "Аргиннис - не лучшая, но и не единственная предендентка на трон Вракса. И хотя она всеми силами пыталась отстранить других наследников, Кризалис считает, что такой буйной особе, как Аргиннис, нет места на троне. Для Вракса и всей Гегемонии будет лучше, если престол займёт более покорная Королева."
 CHN_light_ruling_ultimatun:0 "Ультиматум!"
 CHN_light_ruling_ultimatun_desc:0 "Достаточно! Королева Аргиннис, подлая поджигательница войны, слишком долго пыталась предотвратить наше единение и всячески вредила нам. За эти преступления она должна быть отречена от престола! Хайль Кризалис!"
 CHN_queen_in_the_high_castle:0 "Королева в высокой башне"
 CHN_queen_in_the_high_castle_desc:0 "Согласно проекту, это будет самым высоким зданием в землях чейнджлингов. Башня из бетона и стекла в форме пирамиды высотой 400 метров будет расположена в центре Весалиполиса и будет полностью обвивать и скрывать бывший шпиль улья. Предполагается, что оно будет символизировать силу и власть королевы, а также всей нации чейнджлингов. Это здание — официальная резиденция королевы Кризалис, а заодно и место размещения различных правительственных учреждений и бюрократического аппарата. Современные коммуникации и структура позволят упростить управление и улучшить организацию государства."
 CHN_military_marches:0 "Новая штаб-квартира Вермахта"
 CHN_military_marches_desc:0 "Долгое время у вооружённых сил Весалиполиса не было центрального штаба. Это следует исправить - для Вермахта будет построено здание, соседствующее с Башней Королевы. Оно будет более приземлённым, но имеющим бруталистский стиль, чтобы продемонстрировать мощь армии."
 CHN_ss_shtab:0 "Ввести в ход штурмовые отряды"
 CHN_ss_shtab_desc:0 "В прошлом штурмовые отряды помогли Кризалис в военных конфликтах с Враксом и Оленией. Теперь их следует направить в новое русло... они отлично подойдут для устранения диссилентов."
 CHN_commitee_of_unification:0 "Комитет объединения"
 CHN_commitee_of_unification_desc:0 "Относительно спокойный период правления Кризалис с 1007-го по сегодняшний год показало эффективность политического метода объединения. Дружба ульев - это намного лучше чем война, и пришла пора пожинать плоды дипломатии. Будет создан специальнй Комитет Объединения Чейнджлингских народов, который выполнит задачу соединения политческой, административной и экономической системы других ульев. Врядли ульи захотят просто так потерять независимость, поэтому Комитет выделит им ресурсы, чтобы мотивировать на согласие войти в наше государство."
 CHN_invite_soryth:0 "Пригласить Сориф"
 CHN_invite_soryth_desc:0 "WIP"
 CHN_invite_volistad:0 "Пригласить Волистад"
 CHN_invite_volistad_desc:0 "WIP"
 CHN_invite_lyctida:0 "Пригласиить Ликтиду"
 CHN_invite_lyctida_desc:0 "WIP"
 CHN_invite_dytrisium:0 "Пригласить Дитрисиум"
 CHN_invite_dytrisium_desc:0 "WIP"
 CHN_unified_hehemony:0 "Великая Гегемония"
 CHN_unified_hehemony_desc:0 "WIP"


 
 CHN_heavy_ruling:0 "Жёстким копытом"
 CHN_heavy_ruling_desc:0 "Неподчинение от других ульев недопустимо. Кризалис - верховная королева, и все должны ей подчиниться! Кто будет ей сопротивляться, тот будет заклеймён предателем нации."
 CHN_heavy_ruling_l_1:0 "Автократическая империя"
 CHN_heavy_ruling_l_1_desc:0 "Королева Кризалис - лучшая! Она должна быть единоличным тоталитарным правителем. Верховная Правительница Империи всех чейнджлингов! Пока другие ульи не осознают, кто здесь главный, придётся применять самые различные санкционные меры против них."
 CHN_heavy_ruling_tt:0 "§YВсе бонусы этой ветки§! §Gостанутся§!, если произойдёт §Rнеобратимое.§!"
 CHN_heavy_ruling_r_1:0 "Милитаризация"
 CHN_heavy_ruling_r_1_desc:0 "Весалиполис должен милитаризоваться и превратиться в военный улей. Ибо нужно готовиться к тотальной войне, захваты континкнта ради амбиций Кризалис... и, если придётся, для уничтожения мятежников."
 CHN_heavy_ruling_l_2:0 "Центр Гегемонии"
 CHN_heavy_ruling_l_2_desc:0 "Точно так же, как Кризалис должна стать абсолютным лидером, Весалиполис должен возвыситься над другими ульями. Он должен воссиять, даже если своимм светом затмит других."
 CHN_heavy_ruling_centre_2:0 "Имперские штурмовики"
 CHN_heavy_ruling_centre_2_desc:0 "Солдат Вермахта следует использовать для подавления любого инакомыслия, интегрировав часть из них в военную полицию. Также имеет смысл направить их в другие ульи, чтобы они следили за порядком, раз местные королевы не справляются с этой задачей."
 CHN_heavy_ruling_centre_2_tt:0 "§CКризалис будет усилять железную хватку ради личной власти.§!"
 CHN_heavy_ruling_r_2:0 "Агрессивное УОБВ"
 CHN_heavy_ruling_r_2_desc:0 "WIP"
 CHN_heavy_ruling_l_l_3:0 "Охота на ведьм"
 CHN_heavy_ruling_l_l_3_desc:0 "WIP"
 CHN_heavy_ruling_l_3:0 "Претензии на титул всех ульев"
 CHN_heavy_ruling_l_3_desc:0 "Кризалис должна стать королевой всех ульев, которые есть в Гегемонии. Что это? Другие королевы не согласны с этим? Кризалис плевать на их мнение. Единственное мнение, которое важно - это мнение Кризалис, и она в корне не согласна с концепцией независимых ульев."
 CHN_heavy_ruling_r_3:0 "Культ личности"
 CHN_heavy_ruling_r_3_desc:0 "Кризалис - твоя Королева. Ты подчиняешься ей. Ей подчиняются военные, политики, рабочие и даже твои соседи. Будь как все - будь умницей, и отдай свою жизнь Королеве."
 CHN_heavy_ruling_r_r_3:0 "Вырезать оппозиионную опухоль"
 CHN_heavy_ruling_r_r_3_desc:0 "Проклятые коммунисты и утописты - они скрываются от нас везде. И не только в Весалиполисе, но также и в других ульях - поэтому, уничтожив оппозицию в Весалиполисе, останутся очаги сопротивления в других местах. Но это ведь неважно, не так ли? Только политически очищенный Весалиполис сможет объединить Гегемонию."
 CHN_long_swords_night:0 "Ночь длинных мечей"
 CHN_long_swords_night_desc:0 "Грядёт ночь, во время которой штурмовые группы восславят террор и смерть. По всей Гегемонии будут обнаружены случаи 'таинственных' убийств тех чейнджлингов, которые не согласны с правлением Кризалис. Страх и трепет перед тиранией нашей Королевы охватит всю Гегемонию. Это будет самая масштабная кампания по очищению, которую мы когда-либо организовывали."
 CHN_vraks_coronation:0 "Коронация"
 CHN_vraks_coronation_desc:0 "Мы уже решили проблему Вракса. Проклятые предатели сокрушены... осталось только объявить Кризалис единоличной королевой Весалиполиса и Вракса. Неважно, что об этом подумают враксианцы - никто не смеет перечить Кризалис."
 CHN_heavy_ruling_vraks_intervention:0 "Удар по сепаратистам"
 CHN_heavy_ruling_vraks_intervention_desc:0 "Достаточно! Королева Аргиннис, подлая поджигательница войны, слишком долго пыталась предотвратить наше единение и всячески вредила нам. За эти преступления она должна быть брошена в темницу, а Вракс должен перейти под немедленную оккупацию войск Весалиполиса!"
 CHN_prepare_inner_invasion:0 "Следуя нашей природе"
 CHN_prepare_inner_invasion_desc:0 "Сотни и тысячи лет различные ульи боролись за выживание и доминирование. В ходе этой борьбы множество ульев погибало и стиралось с лица планеты, пока не остались самые сильные. В современную эру кто-то пытался предложить мирный союз всех наших государств, но дипломатическое объединение просто невозможно. Война друг с другом находится в крови чейнджлингов.\nИ Весалиполис докажет, что ничто не встанет на его пути."
 CHN_prepare_invasion_dytrysium:0 "Подготовить вторжение в Дитрисиум"
 CHN_prepare_invasion_dytrysium_desc:0 "WIP"
 CHN_prepare_invasion_lyctida:0 "Подготовить вторжение в Ликтиду"
 CHN_prepare_invasion_lyctida_desc:0 "WIP"
 CHN_prepare_invasion_soryth:0 "Подготовить вторжение в Сориф"
 CHN_prepare_invasion_soryth_desc:0 "WIP"
 CHN_prepare_invasion_volistad:0 "Подготовить вторжение в Волистад"
 CHN_prepare_invasion_volistad_desc:0 "Волистад - слабый улей, и даже если бы королевский род Волис не прервался, этот улей ничего не смог бы предложить Гегемонии. Аргиннис пыталась захватить его, но то были её мечты об экспансии для личного обогащения, в то время как наша война должна быть расценена как ещё один шаг к объединению чейнджлингов под единым знаменем."
 CHN_heavy_ruling_guards_on_hives:0 "Армия сохраняет порядок"
 CHN_heavy_ruling_guards_on_hives_desc:0 "На завоёванных территориях действуют партизаны и сепаратисты. Чтобы подавить их, нужно использовать всё, что есть в вооружении нашей армии - артиллерию, самолёты, танки, огнемёты, чтобы терроризировать и сокрушать любое вооружённое сопротивление." 
 CHN_heavy_ruling_fate_of_queens:0 "Судьба королев"
 CHN_heavy_ruling_fate_of_queens_desc:0 "WIP"
 CHN_heavy_ruling_destroy_hives_opposition:0 "Уничтожение несогласных"
 CHN_heavy_ruling_destroy_hives_opposition_desc:0 "Теперь под прямым контроем УОБВ находятся все ульи. Больше ничто не останавливает наше агенство от того, чтобы безнаказанно вести свою деятельность во всех ульях чейнджлингов. Где бы не прятались предатели, их обязательно найдут."
 CHN_changelingia:0 "Чейнджлингия"
 CHN_changelingia_desc:0 "Великое государство, которое будет простираться от Сорифа до Ликтиды - Чейнджлингия, или же Пакс Весалиполис, будет страной, которая объединит чейнджлингов Эквуса. Более никаких раздоров и внутренних войн - Кризалис, наш объединитель, сумела справиться с множеством проблем и доказала, что достойна титула Верховной Королевы. И наша империя, наш Пан-Чейнджлингский Рейх, будет стоять и выстоит тысячи лет."
 CHN_i_am_the_state:0 "Я - Государство"
 CHN_i_am_the_state_desc:0 "Я, Кризалис, королева Весалиполиса, Вракса, Ликтиды, Дитрисиума, Волистада, Сорифа и Верховная Королева Чейнджлингов, объявляю о том, что моё правление, безусловно, приведёт чейнджлингов к победе. Следуйте за мной, мои армии: я обещаю, что подарю вам весь мир."
 
 
 
