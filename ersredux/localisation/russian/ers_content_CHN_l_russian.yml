 #### EVENTS
 chn.1.t:0 "Встреча с Хельвией"
 chn.1.d:0 "- Ты же знаешь, Кризалис, что я против всех этих политических интриг, направленных на вредительство друг другу.\n\nДве Королевы ульев организовали совещание один-на-один, и королева Хельвия - скорее всего, единственная, кому Кризалис хотя бы симпатизирует, но непохоже, что эти чувства были взаимны.\n\n- Хельвия, скажи мне вот что. Твоя предшественница активно поддерживала мою политику объединения нации и в целом положительно ко мне относилась. Как мне заработать уважение от тебя?\n\nХельвия усмехнулась.\n\n- К чему всё это? Ты можешь избавиться от меня и провозгласить себя двойной королевой Весалиполиса и Дитрисиума. Но в таком случае народ моего улья обратится против тебя.\n\nВозможно, стоит дать Хельвии время, чтобы она привыкла к власти Кризалис. Или же объявить себя королевой Весалиполиса и Дитрисиума прямо сейчас? Кризалис не знала. Но пока Хельвия открыто не противостоит ей, всё должно быть в порядке.\n\n- Хельвия...\n\n- Да?\n\n- ...ничего, забудь."
 chn.1.a:0 ""Хоть кто-то кроме меня делает что-то, лишь бы всё не рухнуло.""
 
 chn.2.t:0 "Письмо Аргиннис"
 chn.2.d:0 "Королева Кризалис решила посвятить эту неделю попыткам наладить отношения с Враксом. Она направила десятки писем Аргиннис, и получила десятки однотипных ответов, в которых не было и капли уважения королеве Весалиполиса. Такое ощущение, что Аргиннис не хочет приложить минимума усилий для объединения чейнджлингских народов. Значит ли это, что она хочет, как раз, посеять раздор в Гегемонию? Значит ли это, что она - предатель, и всё, что её волнует - это трон Верховной Королевы?\n\nКризалис отогнала эти мысли. В конце-концов, они же обе - здравомыслящие правительницы, и обе понимают, что очередная война Весалиполиса и Вракса ни к чему не приведёт. И наверняка Аргиннис забыла старые обиды, хотя по какой-то причине не хочет сближаться с Кризалис. Странно."
 chn.2.a:0 ""Я ведь не ненавижу её, правда?""
 
 chn.3.t:0 "Встреча с Ярией"
 chn.3.d:0 "- Приветствую вас, Кризалис, Верховная Королева Чейнджлингов...\n\nЯрия, королева Сорифа, преклонилась перед Кризалис и произнесла эту фразу. Но Кризалис понимала, что что-то не так. Её приветствие было совсем неискренним, а поклон - совсем необязательным. Как и всегда, Ярия просто пыталась произвести впечатление очень преданной королевы.\n\n- Приветствую, Ярия. Как продвигаются исследования?\n\n- Вполне приемлемо. Но их прогресс можно было бы ускорить, если бы ви прислали нам больше... "подопытного материала". И, естественно, нам нужны хайвсмарки.\n\n- Да, конечно. Со следующей недели Весалиполис привезёт вам группы террористов. И инвестиции мы тоже увеличим.\n\n- Прекрасно.\n\nКризалис хотела обсудить что-то ещё с королевой научного улья. Но, казалось, что их разговор был окончен, а продолжить его было бы бессмысленно.\n\nЧтож, Ярия хотя бы соглашается сотрудничать на благо Гегемонии."
 chn.3.a:0 ""Сотрудничество - признак дружбы, верно?""
 
 chn.4.t:0 "Где Ауранция?"
 chn.4.d:0 "Ликтида никогда не была приветливым местом. Ни для иностранцев, ни для чейнджлингов, ни даже для Кризалис. Она давно не посещала этот улей, и надеялась, что местные обратят на неё внимание или хотя бы прошепчутся между собой: "прибыла Королева"... Но ничего этого не было. Казалось, что все чейнджлинги здесь работали как тихий и слаженный механизм. Какое им дело до какой-то Верховной Королевы.\n\nНо цель её визита была другая. Она надеялась встретиться с Ауранцией и лично обсудить, почему военные расходы Ликтиды за последние четыре года увеличились в десять раз. Кризалис было искренне любопытно, зачем Ауранция готовила армию. Неужели и она предательница? Она в сговоре с Аргиннис? А может...\n\n- Что значит "Ауранция не может встретиться с нами"? Ты хоть понимаешь, кому это говоришь, чёртов трутень! Я, Верховная Королева Чейнджлингов, Кризалис! Вы обязаны сопроводить меня в резиденцию Ауранции!\n\n- К сожалению, это невозможно. Ауранция уехала на секретные испытатательные полигоны и прибудет минимум через неделю.\n\n- Полигоны? И что это она там делает?\n\n- Это секретная информация. Гражданским ничего не выдаём.\n\nГражданским? ГРАЖДАНСКИМ? Этот стражник-ликтидианец только что посчитал Кризалис простой гражданкой?!! Кризалис вскипела от злобы, но хайвсмаршал Синовиал, сопровождавший её в этой поездке, успокоил своего монарха. Королева решила покинуть Ликтиду. Может, она попытается связаться с Ауранцией вновь. Или нет."
 chn.4.a:0 ""Надеюсь, ей станет лучше.""
 
 chn.5.t:0 "Армия превышает полномочия"
 chn.5.d:0 "Сегодня до Кризалис дошло сообщение о том, что хайвсмаршал Синовиал организовал арест нескольких гражданских чейнджлингов Сорифа. Он обосновал это тем, что они планировали подрыв работы рейхслагерей Сорифа путём массового освобождения заключённых. Поскольку, как он утверждает, времени сообщать об этом Верховной Королеве, не было, он единолично принял решение послать элитный отряд и задержать подозреваемых. Эти чейнджлинги действительно оказались сочувствующими заключённым предателями, которые разработали целый план по подрыву стен лагерей и нейтрализации охраны.\n\nСо стороны закона данный поступок непростителен, но общественность считает, что Синовиал поступил правильно."
 chn.5.a:0 "Пока он не выходит за рамки разумного..."
 
 chn.6.t:0 "Хайвсмаршал и генерал"
 chn.6.d:0 "Похоже, что недавно между хайвсмаршалом Синовиалом и генералом Триммелем разразился конфликт. Никто не может сказать точно, что между ними произошло, но теперь Синовиал требует немедленной отставки Триммеля.\n\nСиновиал считает Триммеля "некомпетентным", "не соблюдающим субординацию" и "последним подлецом". Учитывая то, что хайвсмаршал - это более высокий ранг, чем генерал, а также то, что Синовиал обладает колоссальным военным опытом, вполне возможна вероятность того, что молодой Триммель и правда не оправдывает надежд Королевы. Он успел зарекомендовать себя как вполне перспективный командующий танковых бригад, но, похоже, успел нажить себе врагов среди своего начальства..."
 chn.6.a:0 "§CТриммель§! останется с нами."
 chn.6.b:0 "§gХайвсмаршал§! всегда прав."
 
 chn.8.t:0 "Когда все в сборе"
 chn.8.d:0 "Часы в зале 17:00, и, к большому удивлению Кризалис, она наблюдала перед своими глазами всех четырёх монархов. Кто бы мог подумать, что на приглашение на королевский ужин соберёт их всех вместе. Однако... другие королевы, кажется, не разделяли такого же восхищения.\n\nОсобенно Кризалис удивило то, что явилась сама Ауранция. Королева, которую она не видела уже достаточно долго.  она сильно похудела, под её глазами были все признаки недосыпа, а также она нервно кусала края своего копыта, забыв о манерх приличия. На других королев она не особо обращала внимания и лишь изредка смотрела в сторону Кризалис.\n\n- Чтож, дорогие монархи, - начала Кризалис. - Я надеюсь, что этим вечером наши отношения станут более ясными, чем раньше...\n\n- Не нужно слащавых речей, королева Весалиполиса, - язвительно упрекнула Аргиннис, рассматривая кубок с вином. - Твой план вполне неплох. Но вот только ты забыла, что у нас есть родственники, а у кого-то даже и наследники, поэтому ты уж проиграла.\n\n- О чём вы, Аргиннис?\n\n- Это очевидно. Сегодняшний вечер должены был стать для нас последним. Вся та еда и напитки, что вы приготовили, очевидно, отравлены. Ты считаешь, что можно отравить всех одним ходом и узурпировать наши титулы, но нет. Этого не будет!\n\nКризалис была в шоке. - Да как... Да как ты смеешь меня обвинять в этом?!\n\n- Обвинять? Ха. Я не обвиняю, я ЗНАЮ, что ты задумала. На самом деле, знала заранее, и приехала в этот улей только для того, чтобы убедиться в этом. Больше моих копыт в Весалиполисе не будет.\n\nОстальные присутствующие молча наблюдали, не желая попасть под горячее копыто двух диктаторов."
 chn.8.a:0 "Это абсурд!"
 
 chn.9.t:0 "Политический скандал"
 chn.9.d:0 "Две королевы вступили в жаркий спор... Точнее, не в спор. Это было больше похоже на взаимные оскорбления. В один момент Аргиннис швырнула фарфоровое блюдо в Кризалис, к счастью, промахнувшись. После этого она покинула обеденный зал, демонстративно хлопнув дверьми. Кризалис, тяжело вздыхавшая после такой ситуации, наконец села.\n\n- Надеюсь, моя репутация в ваших глазах не пострадала...\n\nКоролева Ульев продолжила беседу с Ауранцией, Ярией и Хельвией уже в более спокойной обстановке. Хотя Ярия и Хельвия вели себя адекватно, Ауранция вместо ответа на вопрос о том, почему военные расходы Ликтиды увелиились почти в десять раз, лишь пробормотала что-то невнятное. За исключением инцидента с Аргиннис (королевы притворились, что ничего не было), вечер прошёл вполне спокойно. Королевы покинули Весалиполис, а Кризалис получила информацию о том, какие проблемы есть в других ульях и в целом отношение королев к её политике.\n\nПозже Кризалис сообщили, что королева Вракса покинула территорию Весалиполиса, и кроме того, отозвала посольство Вракса.\n\nКогда Кризалис вернулась в свой тихий кабинет, она обдумала всё произошедшее. И она решила..."
 chn.9.a:0 "Я прислушаюсь к ним."
 chn.9.b:0 "Их дурачество мне осточертело. Я сокрушу свою оппозицию, как и должно быть."
 chn.9.c:0 "Я так устала решать чужие проблемы..."
 
 
 chn.7.t:0 "Чрезвычайное положение"
 chn.7.d:0 "Согласно данным Вермахта, другие Королевы уже собирают войска у наших границ. Мы окружены потенциальными врагами со всех сторон, и кажется, что мы обречены. Хайвсмаршал Синовиал требует введения немедленного военного положения и временной передачи полномочий правителя ему.\n\nОн утверждает, что только в том случае мы сможем победить предателей, когда он будет иметь полный контроль над ситуацией."
 chn.7.a:0 "Королева справится!"
 chn.7.b:0 "Хайвсмаршал захватывает власть... временно."
 
 
 chn.10.t:0 "Новая королева для беспокойного улья"
 chn.10.d:0 "WIP"
 chn.10.a:0 "WIP"
 
 chn.11.t:0 "Степень полномочий Вермахта"
 chn.11.d:0 "Решено, что Кризалис будет использовать Вермахт для устрашения соперников в лице оппозиционных королев. Но насколько она готова доверить организацию политического террора хайвсмаршалу Синовиалу?"
 chn.11.a:0 "Пусть не зазнаётся."
 chn.11.b:0 "Умеренность - ключ к победе."
 chn.11.c:0 "Пусть делает всё, что считает нужным."
 
 
 chn.12.t:0 "Весалиполис собирает войска на границе"
 chn.12.d:0 "Похоже, Кризалис настроена серьёзно. Мы либо подчиняемся ей, либо противостоим в одиночку."
 chn.12.a:0 "К оружию!"
 chn.12.b:0 "Плохой день для Аргиннис."
 
 chn.13.t:0 "Ультиматум от [CHN.getleader]"
 chn.13.d:0 "WIP"
 chn.13.a:0 "Проигнорировать ультиматум."
 chn.13.b:0 "Так точно!"
 chn.13.c:0 "Мы подчинимся на правах автономии."

 chn.14.t:0 "Этот идеальный день"
 chn.14.d:0 "Сегодня Кризалис проснулась особенно взбодрившейся, и не без причины. Она быстро оделась, привела взъерошенную гриву в порядок и даже надела солнечные очки. Взглянув в зеркало, она подумала о том, как же внушительно (и совершенно не "мило"!) она выглядит в этом образе. Выйдя из спальни в залы улья, она ожидала увидеть толпу, которая... а впрочем, всё равно никого не было. Только один охранник патрулировал свой периметр. Неужели Кризалис проснулась слишком рана? Нет, на часах уже 9:12, даже в обычные дни в это время Весалиполис кишит чейнджлингами. Кризалис уверенно подошла к стражнику.\n\n- Отвечай, где все?\n\n- Все? А... кажется, гвардия и персонал что-то делают во дворе. Что - не знаю.\n\n- Ясно... А ты случайно не знаешь, что сегодня за день?\n\n-Простите, понятия не имею. Мне нужно продолжать патруль. Хацль Кризалис!\n\nЧто это такое? Нет, это неправильно! Кто в здравом уме мог забыть про этот день? Страж сказал что-то про двор. Кризалис галопом направилась туда.\n\n- Объяснитесь, что-\n\nВо дворе был весь персонал, гвардия и даже военное командование Весалиполиса, благо двор имел очень большую площадь. Все суетились, а в центре двора стояло нечто огромных размеров, прикрытое брезентом. Когда все заметили Кризалис, собравшиеся хором, независимо от своего статуса, подняли правое переднее копыто вверх и вскрикнули: "Хайль Кризалис!"\n\nКоролева была очень смятена и не совсем понимала, что происходит. Но к ней подошёл хайвсмаршал Синовиал, и всё прояснилось.\n\n- Выглядите бесподобно, королева. Чтож, похоже, мы недостаточно торопились... Сюрприз на ваш день рожденья теперь будет иметь не такой эффект, потому что ещё не всё было организовано-\n\n- ТАК ВЫ НЕ ЗАБЫЛИ?\n\nКризалис не снимала солнечных очков, но по её голосу и интонации было видно, что она была в Вальгалле от счастья.\n\n- Так точно, королева! И я, как хайвсмаршал подготовил вам небольшой презент...\n\n- Право, не стоило. В прошлый раз я получила от Васпира крупнокалиберную артиллерию "Дора"... не думайте, что это можно переплюнуть.\n\nСиновиал ухмыльнулся и приказал стащить брезент с огромной конструкции. Увидев, что было под ним, Кризалис ахнула и сняла очки, чтобы видеть его лучше."
 chn.14.a:0 "Далее"

 chn.15.t:0 "Этот идеальный день"
 chn.15.d:0 "Это был танк... точнее, нечто, что олицетворяет танк, но слишком больших размеров. Метров семь в высоту и чёрт знает сколько в длину, огромный титан грозно возвышался над чейнджлингами, словно над мухами.\n\n- Это МНЕ?\n\n- Точно, Кризалис. К сожалению, это только макет, но уверяю, все компоненты созданы из металла. Этот танк находится только в мечтаниях наших инженеров, ведь ещё не изобрели такого двигателя, который может тянуть такое шасси...\n\nКризалис, словно маленькая кобылка, осматривала и приближалась к гиганту. Подойдя к дулу, она встала под него, устремив взгляд вверх. В её глазах словно сияли звёзды - тень от дула полностью закрывала её мордочку.\n- Воа-а-а... Какое большое...\n- Точно. Калибр 550 миллиметров-\n\n- СКОЛЬКО? Да не может быть... Если бы он был рабочим, таким можно было бы целые здания сносить!\n\nНа это всё со стороны смотрел Триммель. Он был профессионалом в сфере танков, но его талант ещё был недостаточно оценён. Но он знал достаточно, чтобы с уверенностью думать - эта штука в жизни бы не заработала. И её бы никто не смог сдвинуть с места, какие бы не были двигатели и гусеницы. Как на зло, Кризалис поймала раздражённый взгляд Триммеля.\n\n- Эй, Триммель! Смотри, что у меня теперь есть! - она обратилась к нему, будто того тут раньше не было, что только больше взбесило Триммеля. - И как ты можешь называться пионером танковой доктрины? Это должно быть звание Синовиала! Только посмотри, что он мне приподнёс, ха-ха!\n\n- А я сделаю лучше, моя королева. - Триммель прозвучал громко и все его услышали, теперь же пути назад не было. А в Кризалис разгорелся интерес.\n\n- Продолжай.\n\n - То, что здесь стоит - это... не будет работать. И это не ваша вина, а вина Синовилала, или кто там проектировал этого монстра... А я... Да. Я смогу разработать танк, который будет лучше! Бронированнее, быстрее и мощнее! А главное - полностью функционирующий.\n\n- И что дальше? - нагло вмешался Синовиал.\n\n- Если я разработаю и создам такой танк... Своими средствами... За пять, нет... ЗА ТРИ года! Вы, Синовиал, наконец признаете моё мастерство, а я стану фельдмаршалом наравне с вами.\n\n- Если не справишься, то попрощаешься с той жалкой должностью генерала, которая у тебя есть сейчас.\n\nНаблюдая за спором, Кризалис усмехнулась, пробормотав: "Ну и подхалимы..." Однако, те двое её не услышали.\n\nТриммель и Синовиал, ухмыльнувшись, протянули друг другу копыта, после чего посмотрели на Кризалис. Та медленно подошла к ним и не без удовольствия утвердила пари. Казалось, что Кризалис восприняла это как что-то несерьёзное. Подхватив бокал для гостей, она произнесла: "Чтож, за меня, за Пакс Кризалию... и пусть лучший из вас победит!"\n\nВ течение дня другие генералы хвалили Триммеля за его смелость, а сам генерал купался в лучах кратковременной славы. Но вечером я Триммель начал копаться в мыслях, обдумывая, что он натворил."
 chn.15.a:0 ""У меня же есть целых три года, ведь так?..""

 chn.16.t:0 "Дипломатическая миссия [FROM.getname] в [ROOT.getname]"
 chn.16.d:0 "[FROM.getleader] отправляет [ROOT.getleader] предложение о присоединении. Приложив столько усилий к стабилизации Гегемонии, [FROM.getleader] считает, что пора забыть любые старые разногласия между нашими ульями и воссоединиться братским народам.\n\nЕсли мы согласимся, то получим покровительство Весалиполиса, а также крупное финансирование наших государственных проектов."
 chn.16.a:0 "Мы готовы. Подписать соглашение!"
 chn.16.b:0 "Что они о себе возомнили? [ROOT.getname] останется независимым государством."

 chn.17.t:0 "Отказ [FROM.getleader]"
 chn.17.d:0 "К сожалению, глава государства [FROM.getleader] отказался присоединяться к Гегемонии."
 chn.17.a:0 "Ох."

 