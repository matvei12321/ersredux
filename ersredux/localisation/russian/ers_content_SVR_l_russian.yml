l_russian: 
SVR_kolcokkonsolidiruetvlast:0 "Колцок консолидирует власть"
SVR_kolcokkonsolidiruetvlast_desc:0 "Царица Елена взяла ситуацию в свои копыта и созвала экстренное совещание высшего командного состава. Там своей пламенной речью Колцок смог убедить генералов сплотиться вокруг царской власти и отбросить все расхождения до момента окончательной победы над революционерами."
SVR_provalbolshogopohoda:0 "Провал "Большого похода""
SVR_provalbolshogopohoda_desc:0 "Несмотря на освобождение Петерсхуфа (и болтовню нашей пропаганды) вышестоящий состав Северяны вынужден констатировать провал "Большого похода": красные не только не выбиты с внушительной части наших земель, но и получили время и возможность на укрепление. Это вызывает раскол и панику в наших рядах."
SVR_oppoziciyadelaethod:0 "Оппозиция делает ход"
SVR_oppoziciyadelaethod_desc:0 "Оппозиция успевает сделать ход и перехватить на свою сторону важного генерала Поникина и офицеров-демократов до созыва срочного совещания, срывая все планы Елены. Теперь, когда такая яркая личность как Поникин на стороне оппозиции - победа почти в кармане."
SVR_prilyudnayakaznkolcoka:0 "Показательная казнь Колцока"
SVR_prilyudnayakaznkolcoka_desc:0 "Колцок может казаться героем, но его политические взгляды и деяния не имеют оправданий. Единственное, что он заслуживает - это виселицы. А вместе с Колцоком исчезнут и все мысли о тирании и верности Романовским."
SVR_poisksovyonkova:0 "Поиски Совёнкова"
SVR_poisksovyonkova_desc:0 "Совёнков и его "совёнковцы" - не более чем террористы, которые упиваются властью и хотят вогнать Северяну в новую кровавую смуту. Их надо раздавить. Совёнков должен умереть как подобает бандиту, которым он и является!"
SVR_voennayaneobhodimost:0 "Военная необходимость"
SVR_voennayaneobhodimost_desc:0 "Несмотря на различие взглядов Коренилова и Поникина, они должны объединиться, чтобы остановить анархию в армии и подготовить её к новому Великому походу!"
SVR_vynuzhdennyysoyuz:0 "Вынужденный союз"
SVR_vynuzhdennyysoyuz_desc:0 "Правильные монархисты, гармонисты, умеренные социал-демократы и настоящие патриоты вынуждены объединиться против угрозы окончательной потери Северяны в крови Гражданской войны или под копытами юникорнийцев. И над всем этим возвышается новая фигура..."
SVR_vstrechassovyonkovym:0 "Встреча с Совёнковым"
SVR_vstrechassovyonkovym_desc:0 "Царица Елена была крайне заинтересована одним необычным политическим деятелем. Совёнков - выходец из крестьян, который смог создать целую политическую организацию во время Гражданской войны, но он не встал на сторону бунтовщиков..."
SVR_arestovatnedovolnyh:0 "Арестовать недовольных"
SVR_arestovatnedovolnyh_desc:0 "Гармонисты, социал-демократы и прочие нытики-космополиты не имеют права на существование. К тому же... именно они виноваты в поражении "Большого похода", и их судьба - виселица!"
SVR_kaznitpretendentov:0 "Казнить претендентов"
SVR_kaznitpretendentov_desc:0 "Наследники Рюриковичей - опасные прецеденты для стабильной власти царицы Елены и Романовских в целом. Вполне возможно, что именно они устроили революцию, чтобы вернуть себе трон! Мы должны найти и устранить их всех. История показала, что они уже изжили своё."
SVR_partnyorynonedruzya:0 "Партнёры, но не друзья."
SVR_partnyorynonedruzya_desc:0 "Царица Елена собирается зайти дальше, чем её предшественники, для достижения порядка и стабильности своей Родины. Мы начнём снимать открытых и ярых юникорнийцев со всех постов, попутно делая поклоны "многоуважаемому" Королю Единорогов, но держа нож за спиной."
SVR_drugayacarica:0 "Другая царица"
SVR_drugayacarica_desc:0 "Возможно, Колцок обладает гораздо большей властью, чем думала Елена. Попытка убрать Колцока и заменить его Корениловым спровоцировала Чёрного Барона на превентивные действия: Елена Романовская была "убита подлыми марксистами в ходе подрыва кареты", а трон занял более послушный Ставке Колцока наследник..."
anastasia_first_tree_flag:0 "Елена теряет власть"
elena_first_tree_flag:0 "Елена и Колцок продолжают свою политику"
svr_rurikovisch_comes:0 "Оппозиция едина и готова к борьбе, но у неё до сих пор нет поддерживаемого народом или хотя бы законного лидера. Но это может измениться..."

