#ивенты

    wig_kostyl_name_1:0 "КОСТЫЛЬ, ИГНОРИРУЙТЕ"
    
    wig_politcs.1.t:0 "Выборы в парламент" # выборы, выборы, кандидаты...
    wig_politcs.1.d:0 "Указом короля Гарибальда III, было назначено проведение выборов на 19 февраля 1007. И вот, биллютени подсчитаны, победили..."
        
    wig_politcs.1.a:0 "...ВСДРП!"
    wig_politcs.1.b:0 "...НФВК!"
    wig_politcs.1.c:0 "...КПВ!" 
    
    wig_politcs.2.t:0 "Кандидаты на победу"
    wig_politcs.2.d:0 "ВСДРП - Вингбардийская Социал-Демократическая Рабочая Партия отстаивает права рабочих и социальное равенство. Партия возникла под влиянием аквилейского республиканизма и идей Карамель Маркс.\n\nНФВК - Национальный Фронт Восстановления Карфинии поддерживает идеалы протекционистской экономической доктрины и карфинский национализм - идею о возрождении величия Карфинской Империи.\n\nКПВ - Конституционалистская Партия Вингбардии за создание конституциональной монархии в Вингбардии и приверженцы рыночной экономики."
    
    wig_politcs.2.a:0 "Хм, интересно"
    
    wig_politcs.3.t:0 "Рапорт"
    wig_politcs.3.d:0 "[GetDateText]\n\nСРОЧНО\n\nНАЧАЛЬНИКУ ПОЛИЦИИ ГОРОДА ФАЛЬКОР\n\nВо время поездки в Фалькор, неизвестным было совершенно покушение на жизнь Эрцгерцога Гровера Седьмого. Уже ведётся расследование. По предварительным данным, террорист состоял в группировке "Молодой Фалькор". В городе введён комендантский час."
    
    wig_politcs.3.a:0 "Этого не хватало..."
    
    wig_politcs.4.t:0 "В Фалькоре"
    wig_politcs.4.d:0 ""Держи, Барт" - сказал грифон, передавая своему другу старое ружьё.\n\n Барт взял его и сказал: "Тео, скоро начинаем?"\n\n"Как по радио передадут сигнал, так и пойдём." - ответил ему Тео.\n\nСпустя несколько минут, по радио передавали: "Восстаньте, фалькорцы! Настало время обрести свободу от этих проклятых вингбардийских захватчиков! СЛАВА ФАЛЬКОРУ!"\n\n"Слышал? Пошли. Пора за дело." - произнёс Тео, после чего он, а за ним и Барт встали и вышли с оружием из дому."
    wig_politcs.4.a:0 ""Настало время нашей свободы.""   

    wig_politcs.5.t:0 "Переворот"
    wig_politcs.5.d:0 "Утро в Карфине. "
    wig_politcs.5.a:0 ""
    
