    WIG_kemerskai_doctrine:0 "Доктрина Кемерская"
    WIG_kemerskai_doctrine_desc:0 "Кемерскай не просто так в свои сорок три года стал маршалом артиллерии. К его словам стоит прислушаться."
    
    WIG_gun_konkurs:0 "Программа "Греццо""
    WIG_gun_konkurs_desc:0 "Армии нужна новая, современная винтовка."
    
    WIG_vnii_tochmag:0 "ВНИИ ТочМаг"
    WIG_vnii_tochmag_desc:0 "Вингбардийский Научно-исследовательский институт Точного Магостроения является одним из национальных достояний Вингбардии сейчас находится в плачевном состоянии. С этим нужно разбираться."
    
    WIG_new_arty:0 "Обновить артиллерию"
    WIG_new_arty_desc:0 "Артиллерия - бог войны, а если наш бог хромой - то он бесполезен."
    
    WIG_modern_army:0 "Современная армия"
    WIG_modern_army_desc:0 ""
    
    WIG_standart_militia:0 "Унификация винтовок"
    WIG_standart_militia_desc:0 "Пора уже отправить старые винтовки на склады, или хотя бы доработать их."
    
    WIG_national_arsenal:0 "Карфинский арсенал"
    WIG_national_arsenal_desc:0 ""
    
    WIG_gotta_go_fast:0 "Быстро и ещё быстрее"
    WIG_gotta_go_fast_desc:0 "Скорость в наше время решает крайне многое на поле боя."

    WIG_regia_marina_shared:0 "Региа Марина"
    WIG_regia_marina_shared_desc:0 "да, я не пользуюсь флотом, как ты узнал?"

    WIG_king_speaks_shared:0 "Речь короля"
    WIG_king_speaks_shared_desc:0 "Сегодня, король Вингбардии Гарибальд Талонуэль выступит по радио с речью о будущем страны."
    
    WIG_call_parliament:0 "Перевыборы в парламент"
    WIG_call_parliament_desc:0 "Король в своей недавней речи объявил о перевыборах в парламент."
    
    WIG_commies_path:0 "ВСДРП" 
    WIG_commies_path_desc:0 "На выборах победили ВСДРП."
    
    WIG_trudovoi_kodeks:0 "Трудовой кодекс"
    WIG_trudovoi_kodeks_desc:0 "В Вингбардии до сих пор нет четкого трудового законодательства, однако у многих стран Грифонии оно уже давно есть. Чем мы хуже?"
    
    WIG_grifsomol:0 "Молодёжные организации"
    WIG_grifsomol_desc:0 "Создание молодёжных организаций поможет нам воспитать верных патриотов своей страны, своей великой родины - Вингбардии."
    
    WIG_increase_industrial:0 "Пятилетний план"
    WIG_increase_industrial_desc:0 "С помощью пятилетнего плана развития экономики мы улучшим нестабильное экономическое положение Вингбардии."
    
    WIG_workers_samoupr:0 "Профсоюзы рабочих"
    WIG_workers_samoupr_desc:0 ""После принятия закона о легитимизации профсоюзов рабочие будут уверены в том, что завтра их не уволят по надуманной причине, будут уверены в том, что свою плату они будут получать вовремя и соразмерно труду, будут уверены в том, что их права всегда соблюдены!" \n\- Джованни Гаччи, [GetYear]"
    
    WIG_nazi_path:0 "НФВК" # национал-популисты
    WIG_nazi_path_desc:0 "На выборах победили НФВК."
    
    WIG_nationalise_heavy:0 "Национализация военпрома"
    WIG_nationalise_heavy_desc:0 "Военная промышленность является важнейшей для национальной безопасности отраслью экономики, и нельзя допустить чтобы она попала ни в когти проклятых буржуев, стремящихся максимально съэкономить, ни в когти иностранных шпионов."
    
    WIG_free_food:0 "Раздача еды беднякам"
    WIG_free_food_desc:0 "Раздача еды бедным слоям населения поможет им не помереть с голодухи, а нам повысит репутацию."
    
    WIG_empower_stazi:0 "Учреждение тайной полиции"
    WIG_empower_stazi_desc:0 "Тайная полиция следит за каждым приезжим не-вингбардийцем, так, ни один антивингбардийский элемент не проникнет в наше общество."
    
    WIG_talont_massacre:0 "Облава на инсургентов"
    WIG_talont_massacre_desc:0 "Пора устроить парочку показательных облав на этих тварей, зовущих себя "борцами за свободу", а на деле являющихся лишь терроистами, дестабилизирующими наше общество."
    
    WIG_neutral_path:0 "КПВ" # Конституционалисты
