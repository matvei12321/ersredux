    WIG_alexander_kemerskai_char:0 "Маршал Кемерскай"
    WIG_alexander_kemerskai_char_desc:0 "Александр Кемерскай Второй, герцландец по происхождению и культурной принадлежности, родился в 964 году в усадьбе своей семьи близ Виннина. Будучи самым младшим сыном он не расчитывал на наследство, а поэтому, как любой другой юный дворянин оказавшийся в его положении метался от одного занятия к другому. Судьба привела его в артиллерийские войска, в которой он быстро сделал карьеру. В 1005 году его назначили на пост военного губернтора Вингбардии, который он занимет и по сей день."
    
    WIG_parliament_char:0 "Парламент"
