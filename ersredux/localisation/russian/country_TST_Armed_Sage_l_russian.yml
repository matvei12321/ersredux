 ### IDEAS
 
 TST_Armed_Sage_declaration_of_equality_idea:0 "Гражданские права"
 
 TST_Armed_Sage_island_of_hope_idea:0 "Островок надежды"
 TST_Armed_Sage_island_of_hope_idea_desc:0 "Хоть мало кто о нас слышал, но уже есть существа, которые знают о нас как о вольной гавани открытой для всех. Это помогает нам привлекать пускай и маленький, но стабильный ручеек желающих присоединится к делу построения нашего социалистического государства."
 TST_Armed_Sage_island_of_hope_idea1:0 "Островок надежды"
 TST_Armed_Sage_island_of_hope_idea1_desc:0 "Хоть мало кто о нас слышал, но уже есть существа, которые знают о нас как о вольной гавани открытой для всех. Это помогает нам привлекать пускай и маленький, но стабильный ручеек желающих присоединится к делу построения нашего социалистического государства."
 
 TST_Armed_Sage_modern_army_idea:0 "Новая Красная Армия"
 TST_Armed_Sage_modern_army_idea_desc:0 "Будучи изгнанными из Северяны, наши офицеры не так давно находились с ними в одном штабе. Мы использовали наши знания что бы создать новую красную армию в джунглях, даже лучше той что осталась на далеком севере."
 
 TST_Armed_Sage_tamers_of_nature_idea:0 "Укротители природы"
 TST_Armed_Sage_tamers_of_nature_idea_desc:0 "Больше не местность диктует нам как жить, а мы сами! Природа вынуждена подстраиваться под наши желания, пока мы можем спокойно вычищать целые квадраты ранее непроходимых джунглей, ради посевных, железнодорожных полотен и домов для наших граждан. Для нас не осталось местности, которую мы не смогли бы обжить."
 
 TST_Armed_Sage_project_alpha_idea:0 "Проект "Альфа""
 TST_Armed_Sage_project_alpha_idea_desc:0 "Наша армия была полностью перевооружена на новое поколение магических винтовок. Гораздо более стабильные и простые в эксплуатации чем свои более ранние аналоги, эти винтовки отлично показали себя как в испытаниях, так и на поле боя."
 
 TST_Armed_Sage_cultural_revival_idea:0 "Культурное возрождение"
 TST_Armed_Sage_cultural_revival_idea_desc:0 "Под новым, социалистическим курсом фестральская культура пережила значительное развитие, уйдя гораздо дальше от причудливых племенных ритуалов, приобретя популярность даже за рубежом. Молодежь мира слушает нашу музыку, наши фильмы оказываются на фестивалях, наши картины появляются в галереях, а наши книги – в университетах."
 
 TST_Armed_Sage_public_medicine_idea:0 "Общедоступная медицина"
 TST_Armed_Sage_public_medicine_idea_desc:0 "Много кто говорил об этом, но мы стали первыми кто по-настоящему это сделал. Именно в нашей стране каждый гражданин может получить абсолютно бесплатную медицинскую помощь любой сложности, вне зависимости от материального положение или иерархии в обществе. А значительные инвестиции со стороны государства позволяют нашей медицине оставаться самой передовой в мире."
 
 TST_Armed_Sage_mass_media_idea:0 "Средства массовой информации"
 TST_Armed_Sage_mass_media_idea_desc:0 "Умело комбинируя развлекательный, образовательный и пропагандистский контент мы оказались способны создать телеканалы и радиостанции интересные самым разным группам населения, как в нашей стране, так и за ее пределами."
 
 TST_Armed_Sage_modern_production_idea:0 "Современное производство"
 TST_Armed_Sage_modern_production_idea_desc:0 "Десятки метров конвейерных лент, новейшие машины, уменьшающие количество требуемых рабочих для каждой задачи, позволяют нам создать непрерывный цикл производства, в котором сырье проходит все этапы до готового изделия в пределах одного завода. Это значительно облегчает нашу логистику и увеличивает объемы выпускаемой продукции."

### EVENTS

 armed_sage_news.1.t:0 "Резня в Аякачтли!"
 armed_sage_news.1.d:0 "[This.GetNewspaperHeader]По всему южному Эквусу прошлись тревожные слухи о том, что в Аякатчли произошло крупное крестьянское восстание. Разгневанные фестралы ворвались в город и убивали как крупных землевладельцев, так и простых жителей.\n\nРегент и вся правящая верхушка, по полученной информации, были жестоко растерзанны на части.\n\nГоворят что власть взяли на себя коммунисты, из числа изгнанных северянских офицеров фестралов, мало что известно об их целях, но по слухам все идет к неизбежной борьбе за власть."
 armed_sage_news.1.a:0 "Юг Эквуса не становится безопаснее."
 
 armed_sage_news.2.t:0 "Объединение Юго-Востока"
 armed_sage_news.2.d:0 "[This.GetNewspaperHeader]Сегодня с территорий Юго-Востока Эквуса поступила довольно шокирующая новость. Все племена фестралов, впервые за долгие десятилетия, были объединены в одно единое государство. Ранее были подтверждения, что каждое из них ненавидели друг друга, готовые в случае ослабления противника объявить войну и покорить врага. Но недавние сообщения доказывают, что Аякачтлинские социалисты смогли захватить и объединить под своим социалистическим знаменем все враждующие племена. Теперь на территории всех племён лежит государство с неимоверным потенциалом и экономической мощью, это второе успешное социалистическое государство в мире. Весь мир и мировая пресса затаили дыхание, наблюдая за подъёмом новой державы."
 armed_sage_news.2.a:0 "Великий гегемон пробуждается!"

 armed_sage.1.t:0 "Таинственный волшебник"
 armed_sage.1.d:0 "Сегодня утром стражники обнаружили на окраинах поселения Аякачтли таинственного чужеземца женственного вида, одетого в необычные одеяния, невиданные ранее в наших землях, кроме того, при попытке его задержать, он применил магию огня используя свой жезл и назвал патрульных "дикарями". Он заявил что не желает никому вредить и просто желает найти себе новый дом."
 armed_sage.1.a:0 "Он может быть полезен."
 armed_sage.1.b:0 "Колдуну не место среди нас!"
 
 armed_sage.2.t:0 "Сладости народу"
 armed_sage.2.d:0 "Недавно объявившийся волшебник стал угощать жителей Аякачтли неведомым ранее сладким блаженством, затирая какие-то свои сказки. Это явно не к добру."
 armed_sage.2.a:0 "Он явно что-то задумал..."
 
 armed_sage.9.t:0 "Мятеж"
 armed_sage.9.d:0 "Это был очередной спокойный день для юного юного регента, он тщательно готовится к предстоящему выступлению. Он прервался, услышав свист пуль за окном, который становился всё более частым. Начался вооружённый крестьянских мятеж.\n\nСтражники не справлялись с хлынувшей толпой разгневанных и вооружённых крестьян. В конечном счёте толпа настигла Мирона, жестоко убив.\n\nУже через несколько минут на место прибыли лидеры восстания – Армед Сейдж и Маша Норушкина.\n\n— Чёртовы идиоты! Был же приказ! Живьём его брать! Вы! Вы все! Вы пойдёте под трибунал! — яростно кричала Норушкина, уже замахиваясь для нанесения удара, но была остановлена.\n\n— Генерал, не опускайтесь до этого уровня. Не получилось взять живым – пускай, это на самом деле не так уж и критично. Для нас это в любом случае победа, хоть и не такая грандиозная, какой могла бы быть.\n\n— Да, извините, товарищ Сейдж, — успокоившись, произнесла кобыла."
 armed_sage.9.a:0 "Слава революции!"
 
 armed_sage.10.t:0 "Недовольства реформами"
 armed_sage.10.d:0 "Консервативная часть населения отказывается принимать наши реформы касающиеся религии. Что нам делать?"
 armed_sage.10.a:0 "Возможно, перемены должны быть более плавными."
 armed_sage.10.b:0 "Мне плевать! Арестуйте их!"
 armed_sage.10.c:0 "§RМертвецы не рассказывают сказок.§!"
 
 armed_sage.25.t:0 "Мы победили в пограничном конфликте."
 armed_sage.25.d:0 "WIP"
 armed_sage.25.a:0 "WIP"
 
 armed_sage.26.t:0 "Мы проиграли в пограничном конфликте."
 armed_sage.26.d:0 "WIP"
 armed_sage.26.a:0 "WIP"
 
 armed_sage.50.t:0 "Сопротивление соляристов"
 armed_sage.50.d:0 "Мы испытыаем определённые трудности при удержании земель Нейгуа. Наиболее радикальные из соляристов устраивают диверсии, довольно серьёзная часть местного населения поддерживает их."
 armed_sage.50.a:0 "Они не понимают от чего отказываются, нужно потратить больше сил на развитие региона."
 armed_sage.50.b:0 "Любой кто укрывает мятежников должен быть наказан!"
 armed_sage.50.c:0 "§RСожгите пару деревень, это быстро вправит им мозги.§!"
 
 armed_sage.81.t:0 "Государство [FROM.GetName] приняло наше предложение."
 armed_sage.81.d:0 "WIP"
 armed_sage.81.a:0 "Отлично!"
 
 armed_sage.82.t:0 "Государство [FROM.GetName] отказалось от нашего предложения."
 armed_sage.82.d:0 "WIP"
 armed_sage.82.a:0 "Печально."
 
 armed_sage.99.t:0 "Мои тревожные мысли"
 armed_sage.99.d:0 ""День 3706 с момента побега."\n\n"Мой дорогой дневник, хотел бы я, поведать о том, как всё налаживается, но я мягко говоря с каждый днем всё больше разочаровываюсь в собственных гражданах. Осознание факта, что многие из них ещё вчера были туземцами, не слишком помогает мне смириться с происходящим. Я бы очень хотел дать им то, чего у них никогда не было: Мораль, счастье и чувство собственной безопасности. Я не хочу становиться тираном в глазах этого народа, да и героем тоже, но видимо, хоть кем-то мне всё равно стать придётся."\n\n"Пока была возможность, я решил отвлечься, задремав буквально на полчаса, мои кошмары продолжают посещать меня, я продолжаю испытывать чувство вины, хоть мой разум и говорит мне, что я ничего не мог сделать. Все эти невинно убитые пони ради одноразового развлечения, изуродованные в угоду чужой похоти, похоже, что справедливости не последует. Никогда."\n\n"Весь остаток дня меня не покидали мысли об этом сне. Те уроды не получат наказания. Не получат. Что я могу сделать для этого? "Забвение". В голове звучало хорошо, на деле не очень. Я ещё подумаю над названием, хотя, какая разница? Это всего-лишь глупая фантазия.""
 armed_sage.99.a:0 ""Надеюсь, я найду душевный покой.""
 
 armed_sage.100.t:0 "Первые перемены"
 armed_sage.100.d:0 "Жизнь на юго-востоке не была особо роскошной, но никто никогда особо не жаловался, в том числе и Шэдоу Винг. Он был простым фермером, который ежегодно выращивал манго, кукурузу и прочие виды зерновых и травяных культур. Зарабатывал фестрал не шибко много, но на пропитание ему хватало, он даже порой иногда побаловать себя вкусной выпивкой в местном баре. Так бы Шэдоу Винг и прожил всю свою жизнь, каждый день работая в поле, используя ручные инструменты, пока однажды к власти не пришёл загадочный Армед Сейдж. Шэдоу Винг никогда особо не интересовался политикой, да и зачем фермеру что-то о ней знать? Но политика вскоре сама пришла в его дом. \n\nПроснувшись рано утром от непонятного шума, фестрал вскочил с постели и выбежал из дома, а после взлетел в воздух и направился в поисках источника звука. Лететь ему пришлось не долго, поскольку он быстро обнаружил несколько громоздких металлических монстров, которые катились вдоль трапы в сторону его деревни. Шэдоу Винг приземлился прямо перед катящейся колонной и к нему на встречу вышел другой фестрал в строительной униформе.\n\n— Во имя Мецтли, это что ещё такое? — возмущенно спросил Шэдоу, указывая на непонятную машину.\n\n— Ах, это? Это "трактор", сэр. По последнему постановлению правительства нам необходимо поставить в деревни новые виды сельскохозяйственной техники.\n\nШэдоу Винг попытался было открыть рот, но его тут же прервал подоспевший начальник команды, который так же был одет в строительную униформу.\n\n— Знаю-знаю, вам не нужны всякие "непонятные железные монстры" и советы по тому, как лучше заниматься фермерством, но поверьте, эти самые "железные монстры" значительно облегчат вам жизнь. Просто дайте нам шанс показать принцип работы этой машины, — тихим, но вполне уверенным голосом произнес начальник. По его уставшим глазам было видно, что он уже не раз ввёл подобные беседы, так что Шэдоу Винг решил не препираться и отошёл в сторону, позволяя колонне продолжить свой путь."
 armed_sage.100.a:0 "— Но я всё равно пока этим штукам не доверяю!"
 
 armed_sage.101.t:0 "Плоды труда"
 armed_sage.101.d:0 "Шэдоу Винг лежал на закрытых коробках, каждая из которых была до краёв заполнена манго, пшеницей и кукурузой. С его носа свисали солнцезащитные очки, пока сам фестрал попивал манговый сок из трубочки, глядя на своё обширную обработанную землю. Трактор действительно сделал его жизнь лучше, с его помощью фестрал выполнял свою работу в разы быстрее, продуктивнее и эффективнее, позволяя ему зарабатывать куда больше прибыли. Коробки, на которых он сейчас лежал, должны были в скором времени отправится в город, а там уже его продукцию раскупят на местном рынке.\n\n— Должен признать, — сказал Шэдоу Винг, выпуская трубочку изо рта, — эта ваша индустриализация действительно полезна. Столько прибыли у меня ещё никогда не было.\n\n— Знаешь, если бы мне платили каждый раз, когда я это слышу, то я бы давно смог купить себе целый особняк в каком-нибудь пригороде, — с улыбкой на лице проговорил Найт Шторм, тот самый начальник команды, который и научил Шэдоу Винга пользоваться трактором и прочими новыми технологиями. Он был весь в чёрном масле и комбинезоне, поскольку только закончил ремонтировать один из тракторов, — ладно, мне с командой пора уезжать, работа не ждёт.\n\nШэдоу Винг вскочил с коробок и приземлился напротив Найт Шторма, протягивая ему своё копыто.\n\n— Желаю удачи, друг. И это...ну, спасибо за всё. Я редко говорю это слово, но я действительно благодарен тебе. Заезжай к нам в деревню в любое время! Будем всегда рады.\n\n— Обязательно как-нибудь заеду, правда, к тому времени, ваша деревня может уже превратится в полноценный город, но ты ведь теперь не боишься изменений, верно? — пошутил начальник, пожимая тому копыто.\n\nВскоре Найт Шторм и вся его команда покинула деревню, а Шэдоу Винг продолжал смотреть на плоды своего труда и по-настоящему радоваться прошедшим изменениям."
 armed_sage.101.a:0 "— Стоп, а он точно пошутил?"
 
 armed_sage.102.t:0 "Борьба с джунглями"
 armed_sage.102.d:0 "Местная община проснулась от крайне громких звуков, казалось, что сама земля содрогалась в ужасе. Лидер общины направился в сторону джунглей вместе с остальными жителями и те имели "честь" лицезреть страшную картину. Огромная куча деревьев были под чистую спилены бригадой рабочих, многие из них держали в копытах бензопилы, пока остальные управляли специальной тяжелой техникой, вроде бульдозерами и тракторами. Увидев приближающуюся толпу, начальник бригады свистом приказал остальным остановится, а после пошёл на встречу к толпе.\n\n— Что здесь происходит? Почему вы срубаете наши прекрасные деревья? Почему нас не предупредили? Почему никто даже не поинтересовался нашим мнением? — возмущенно спросил лидер общины, с явным раздражением смотря в глаза начальника.\n\n— Прошу вас, успокойтесь. Сейчас ведутся работы по вырубке лесов и джунглей, чтобы потом строительные бригады могли спокойно тут проложить железную дорогу. Приносим извинения за неудобства. Мы хотели отложить работу до обеда, чтобы мы могли спокойно вас предупредить, но начальство приказало начать работу немедленно. К сожалению, я не могу это остановить, но поверьте, всё это ради вашего блага. И потом, мы ведь не собираемся срубать все деревья, — спокойно ответил фестрал, держа в копытах планшет.\n\n— Но это возмутительно! Мы всю жизнь прожили в гармонии с природой и нам больно наблюдать за тем, как вы срубаете наши деревья! — продолжил свою речь лидер общины, словно не обращая внимания на слова начальника.\n\nИх громкая дискуссия продолжалась ещё некоторое время, напряжение росло с каждой минутой и любое неосторожное слово могло привести к массовой драке. К счастью, на место происшествия во время подоспели полицейские силы, которые попросили толпу разойтись, обещая, что с ними поговорят позже. Наличие дубинок стало весовым аргументов для жителей общины и они смиренно вернулись по домам, пускай и не сразу.\n\nВскоре работы по вырубке деревьев продолжились и к концу дня было срублено достаточно, чтобы можно было начать прокладывание столь необходимой железной дороги."
 armed_sage.102.a:0 "Порой прогресс даётся большой ценой."
 
 armed_sage.103.t:0 "Копыто помощи"
 armed_sage.103.d:0 "Новость об открытии новой государственной больницы быстро разлетелись по всей Арии, местные жители тут же направились туда ради качественной, и, что самое главное, бесплатной медицины. И Литтл Мун не стала исключением. Она была вдовой, имела двух маленьких жеребят и ей было трудно заботиться о них. Её маленькие жеребята родились со слабым здоровьем и иммунитетом, они вновь заболели простудой несколько дней назад, но в их небольшом городе было трудно получить качественные лекарства, не говоря уже о том, что у неё не было достаточно денежных средств для этого, так что часто приходилось выкручиваться разными способами. \n\nПопав в больницу, Литтл Мун и её жеребят тут же отвели в кабинет доктора, который быстро поставил диагноз и попросил своих помощниц заняться лечением больных пациентов.\n\n— Ваши дети некоторое время полежат в больнице, не волнуйтесь, мэм, мы за ними хорошенько присмотрим. У них будет трёхразовое питание и за ними постоянно будут приглядывать медсёстры. Вы сможете их навещать почти в любое время, — с лёгкой улыбкой сказал врач и сел за свой рабочий стол, чтобы продолжить разбирать какие-то документы.\n\n— Спасибо вам огромное, доктор! Скажите, сколько с меня? — Литтл Мун потянулась за сумкой, но смех доктора прервал её.\n\n— О чём вы, Литтл Мун? Обследование и дальнейшее лечение абсолютно бесплатно, вам вовсе не нужно платить. Хотя вы можете потом отблагодарить медсестёр, подарив им какие-нибудь конфеты, всё же они работают почти без перерыва и очень стараются, — ответил фестрал в белом халате и поправил свои очки.\n\nНесколько секунд Литтл Мун стояла в ступоре, не веря своим ушам. Бесплатно? Она, конечно, знала, что государство начало хорошо заботиться о своих гражданах, предоставляя им доступное жилье и всё в таком духе, но она никогда бы не поверила, что за такие хорошие врачебные услуги ей не придётся платить ровном счётом ничего. Придя в себя, она тихо заплакала и расплылась в улыбке, доктор же лишь молча встал со стула и подошел к ней, чтобы приобнять."
 armed_sage.103.a:0 "Больше ни один жеребёнок не погибнет из-за обычной простуды!"
 
 armed_sage.104.t:0 "Конец бандитизма"
 armed_sage.104.d:0 "В пустом поле, недалеко от города Джемтаун, стоял одинокий полузаброшенный амбар. В обычной ситуации никто бы и не обратил на это унылое место никакого внимания, но ударная оперативная группа знала, зачем она здесь. В этих землях, от Фоаледо до Роквилля, долгое время правили бандиты Октавии Мелоди, которые терроризировали местное население самыми изощренными способами, начиная простым рэкетом, заканчивая целенаправленными убийствами. Когда же сюда вторглись войска Красной Армии, то быстро разгромили почти все бандитские группировки и семейные кланы, однако самой Октавии удалось сбежать вглубь страны вместе со своими последними бойцами. Они укрылись в том самом амбаре, намереваясь перевести дух и после отправиться к побережью, чтобы уплыть на небольшой лодке, которая должна была их встретить через два дня. Однако её планам не суждено было сбыться.\n\nПод покровом ночи отряд фестралов и земных пони медленно и тихо приблизился к зданию, окружив его со всех сторон. Они выжидали удобного момента и намеревались подслушать разговоры бандитов, в надежде узнать какую-нибудь новую и ценную информацию, вроде предполагаемого места встречи с остальными группировками. Внезапно в амбаре раздался чей-то голос и солдаты начали внимательно слушать, прижавшись к стенам.\n\n— Твою мать! Всё должно было закончиться не так! Сраные фестралы! — это был голос Октавии, которая в порыве ярости скинула со стола тарелку с едой и ударила копытом в стену. Она глубоко вздохнула и заметно успокоилась, — так, ладно. Для начала просто съебёмся отсюда, а там дальше видно будет. Так, сколько нас осталось?\n\n— Десять, включая Вас, — ответил ей один из бандитов, его голос звучал хрипловато, по всей видимости, он был заядлым курильщиком, — завтра утром нам пора выдвигаться дальше. Патроны у нас ещё есть, но их явно надолго не хватит. Доберёмся до моря и свалим. Думаю, стоит какое-то время залечь на дно где-нибудь на островах, подлечим раны и вернёмся в игру.\n\nВ этот момент командир ударного отряда узнал достаточно. Он молча отдал приказ своим товарищам, несколько фестралов тут же ворвались с главного входа, открыв огонь по бандитам, остальные же не отставали и пробились через старую крышу, начав стрелять по целям уже сверху. Эффект неожиданности сделал своё дело и буквально за десять секунд все бандиты, кроме Октавии Мелоди, были мертвы. Она лежала вдоль стены с двумя пулевыми отверстиями в груди, её пистолет лежал далеко в сторонке. Командир подошёл к ней и направил винтовку в её сторону.\n\n— Погоди... — почти из последних сил сказала кобыла, пока из её рта шла кровь, — дай хоть закурить напоследок, — она медленно достала из кармана своего пальто пачку сигарет, достала одну и положила себе в рот. Фестрал же лишь молча преподнёс свою зажигалку и помог ей закурить. Та сделала свою последнюю затяжку и скончалась с улыбкой на лице. Командир подобрал сигарету и положил себе в рот, а после обернулся к своим."
 armed_sage.104.a:0 "— Дело сделано. Мы уходим."
 armed_sage_104_tt:0 "§gОктавия §Rмертва§!, а вместе с ней и эра бандитизма и бессмысленного насилия.§!"
 
 armed_sage.105.t:0 "Очередная кровь"
 armed_sage.105.d:0 "Ровно полдень. Несколько вооружённых отрядов бандитов под командованием своего атамана двигались вдоль одной из широких троп, по которой обычно двигались грузовики. Они держались немного дальше дороги, оставаясь в лесах и густых зарослях. Атаман надеялся снова поживиться добычей, как в прошлый раз, когда они захватили военный конвой, забрав всё вооружение и продав машины через чёрный рынок. Его лишь настораживало то, что по этой дороге уже несколько дней никто не ездил, а ведь он регулярно и беспорядочно менял их, меняя также и места для атаки.\n\nНаконец разведчики заприметили пару грузовиков, что стояли на дороге, около их капотов возились механики, безоружный народ, даже убивать жалко. Не раздумывая, атаман приказал захватить груз вместе с водителями.\n\nБыстро и внезапно, на машины вылетели четыре группы бандитов, что сразу же окружили механиков, прижав их мордами к земле, несколько из них пошли осматривать груз.\n\nК несчастью для бандитов, груза там не оказалось, а та парочка фестралов резко пропали, а через секунду на них выскочили вооружённые отряды в военной форме Красной Армии Аякачтли, начав расстреливать рейдеров. Атаман уже сталкивался с подставными грузовиками раньше, именно поэтому он не отправлял всю банду разом, а наблюдал. Как только солдаты выскочили, атаман скомандовал остальным своим группам вступить в бой, но он явно не ожидал, что здесь были не только солдаты.\n\nЧего не мог ожидать капитан, так это того, что против него выставят спецназ. Солдаты врага совершенно не были новичками, которых ставили в дозор, что затягивало битву. А через 15 минут атаман понял, что отпускать их или давать шанс на отступление никто не намерен. Против них применили авиацию. Штурмовики с гулом пикировали, скидывая на бандитов лёгкие бомбы и поливая их из своих орудий, раз за разом. Уже через минуту его подчинённые начали пытаться убежать в страхе, но их встретил позади ещё один отряд спецназа, они были окружены, бросили оружие на землю и сели, поднимая копыта вверх. Но это не сильно помогло им, их начали расстреливать.\n\nВ конце концов, самого атамана настигла незавидная участь. Видя, как его парней убивают, осознавая своё поражение, он пытался бежать, но меткий выстрел в голову не дал ему уйти. Тот рухнул на землю, на которой начала образовываться красная лужица крови. Командир солдат, оказавшийся одним из механиков, переоделся, и подошёл чтобы посмотреть на мёртвого атамана."
 armed_sage.105.a:0 "— Дорога свободна, передайте это в штаб."
 
 armed_sage.106.t:0 "Новое время"
 armed_sage.106.d:0 "Сегодня верховный пленум партии на совещании единогласно принял билль о гражданских правах, что гласит вкратце: "Каждый гражданин, независимо от статуса, благосостояния и религии, равен в своих правах, как и остальные граждане, имеет право на получение работы, жилья и достойного образования.". Этот билль, по заявлениям самих верховных членов партии, является одной большой победой над аристократическим и религиозным гнётом прошлых веков, что нависали над жителями Аякачтли. В честь этого сегодняшний день вносится в календарь, как праздничный и выходной. Ура, товарищи!\n\nМуншайн не мог поверить своим ушам. Эти слова диктора прокручивались у него в голове раз за разом, будто его мозг не мог воспринять то, что он услышал. Уличные громкоговорители, которые поставили совсем недавно для оповещения населения не могли быть неисправны, а у него самого не могло быть слуховых галлюцинаций. На улицах кричали и радовались толпы фестралов, что до этого слушали оповещение на улице. Счастливые жители выбегали из домов, присоединяясь к мирному параду. Это не была галлюцинация. От шока фестрал решил прогуляться по парку недалеко от дома.\n\nИдя по расчищенному тротуару, он всё думал, видя, как радуются все вокруг. Если всё вокруг правда, то это многое меняет. Он сам работал извозчиком, работа сложная, зато платили нормально, правда этого едва хватало, чтобы он и его сын Зиари сводили концы с концами. Сам Муншайн образование не получал, он не мог его получить, поскольку у его семьи не было денег, да даже если бы и были, никто не согласился бы обучать какого-то крестьянина. Его сын тоже до этого времени не мог ходить в школу из-за сословия отца. Но теперь всё менялось.\n\nВернувшись поздно вечером, заботливый отец всё ещё витал в своих мыслях. Он разобьёт лоб в кровь, но даст своему сыну лучшее образование, лучшее будущее, лучше, чем есть у него сейчас. Зайдя в комнату к сыну, что была немного скудной по мебели из-за финансового состояния семьи, тот увидел, что жеребёнок уже спит во сне, кусая подушку и подрыгивая копытом. В этот момент Муншайн расплакался. Его глаза намокли, а по щекам потекли слёзы, но не печали, а счастья. Счастья от того, что его сын будет жить лучше, чем он."
 armed_sage.106.a:0 ""Спокойной ночи, Зиари.""
 
 armed_sage.107.t:0 "Наконец-то едины!"
 armed_sage.107.d:0 "В кабинет к Армед Сейджу неслась фестралка с важными вестями с фронта. Пройдя мимо нескольких охранников со специальным донесением, что она держала в папке, кобылка подбежала к нужной двери и принялась барабанить по ней.\n\n— Товарищ Главнокомандующий, откройте! Важные донесения с фронта!\n\nДверь со скрипом открылась, а фестралка чуть не полетела носом в пол, но удержалась подбегая и передавая ему документ. Фестрал был немного на нервах, всё-таки война, что сейчас шла, была очень важной не только с точки зрения экономической, но и политической. Объединение под своим знаменем всех четырёх племён, что враждовали друг с другом долгие столетия, уничтожение старых порядков расовой ненависти и превосходства, всё это должно быть окончено, пусть даже спустя около тысячи лет взаимной ненависти.\n\nВзяв в копыта документ и раскрыв его Армед Сейдж начал читать его про себя, медленно пробегая глазами по строчкам.Его конечно интересовали боевые потери, но больше всего интересовал результат этого документа, раз он такой срочный. Листая и листая страницы с отчётами, он наконец добрался до нужной строчки. «Последнее крупное сопротивление племён сдало оружие и сдалось, Эквестрийские земли под нашим контролем». После этих слов главнокомандующий вздохнул с облегчением, а на лице выступила усталость, что он скрывал долгое время, всё, что тот хотел теперь, это крепкий сон и отдых. Наконец, Эквестрия едина, впервые за многие столетия."
 armed_sage.107.a:0 "— Ура, товарищи!"
 
 armed_sage.108.t:0 "Письмо из Весалиполиса"
 armed_sage.108.d:0 "Армед Сейдж как обычно сидел в своём кабинете и разбирал какие-то документы, пока к нему не явился помощник и не вручил какое-то важное письмо от самой Королевы Кризалис. Фестрал поблагодарил своего помощника и как только он вновь остался один, открыл конверт и начал вслух зачитывать содержимое.\n\n"Армед Сейдж, надеюсь, это письмо найдёт Вас в не добром здравии. Мне, Великой Королеве Кризалис, стало известно, что Ваша "Красная Армия" совсем недавно вероломно захватила нашу стратегически важную базу на юго-западе континента. \n\nЯ надеюсь, что...ай, в Тартар все эти формальности и любезности! Слушай меня внимательно, жалкая мышь, скоро ты очень пожалеешь о том, что решил выступить против меня и моего улья. Я растопчу тебя и твою гнусную армию, уничтожу всё до основания! Радуйся маленькой и незначительной победе, пока ещё можешь, ведь совсем скоро ты будешь лично наблюдать за тем, как мой рой уничтожает всё то, что тебе так дорого. \n\nС наихудшими пожеланиями, Королева Кризалис"\n\nПредседатель ещё какое-то время молча перечитывал письмо, пытаясь понять, не розыгрыш ли это от какого-то шутника, поскольку почерк был просто ужасен. Не может же сама Королева Ульев писать так отвратительно и неразборчиво? Впрочем, сейчас это было не важно. Армед просто скомкал бумагу в копытах и выбросил её в мусорку, а затем продолжил работать."
 armed_sage.108.a:0 ""Смешная шутка.""
 
 armed_sage.500.t:0 "То, чему следовало быть забытым"
 armed_sage.500.d:0 "Группа пони поднималась по заснеженному склону горы Эверхуф, шла страшнейшая метель, которая, казалось, лишь усиливалась.\n\n— Я очень польщён вашим участием в нашем походе, товарищ Генеральный секретарь, но не слишком ли это опасно для Вас? Честно говоря, мы с ребятами очень хотели бы знать, что такого находится на вершине, что вы сами решили отправиться туда. Не подумайте ничего такого.\n\nАрмед Сейдж немного хмыкнул, посмотрев на возглавляющего экспедицию единорога.\n\n— Нас с вами ждёт величайшее сокровище, это всё, что вам необходимо знать.\n\nОставшаяся часть пути прошла в тишине, пока группа не наткнулась на невидимое поле. Все были удивлены этому, но не Армед Сейдж, он снял с себя рюкзак и достал оттуда необычное устройство, похожее на шип, в нём можно было заметить кристаллы. Надев прибор на копыто, он воткнул его в поле, после чего шип начал расходиться, открывая небольшой проход в поле, через который, однако, спокойно мог пройти пони. Вожатый в очередной раз хотел спросить о цели похода, но побоялся.\n\nЧлены экспедиции вошли в большую пещеру, в центре которой красовался пьедестал, на котором стоял немного потрёпанный старый колокольчик. Один из участников всё же таки набрался смелости задать вопрос:\n— Что это такое? \n\n— О, мой юный друг, это то, ради чего мы здесь. \n\nФестрал подошёл к алтарю, взяв в копыто древний артефакт, немного ухмыляясь. \n\n— Этот колокольчик был жемчужиной арсенала Грогара, но глупый старик был опьянён своей властью, из-за чего и проиграл. В этом предмете сосредоточено такая невероятная сила, что ни одно живое существо не способно раскрыть его истинную силу. Но кто сказал, что его может использовать лишь живое существо?"
 armed_sage.500.a:0 "§HКолокол звонит по всем нам.§!"
 armed_sage_500_tt:0 "§HБудут доступны новые фокусы.§!"
 
 armed_sage.502.t:0 "Отголостки прошлого"
 armed_sage.502.d:0 "— Армед. Армед, просыпайся, соня, — повторял добрый женский голос.\n\nФестрал чувствовал на себе нежные прикосновения чужих копыт. Он приоткрыл глаза, радостно улыбнувшись чейнджлингу, что его будила, на её мордахе была тёплая улыбка. Армед Сейдж потянулся к ней.\n\nВ этот момент он раскрыл слипшиеся веки, обнаружив себя лежащим на полу лаборатории. Это немного напомнило ему "старые добрые" времена его юности, когда он мог неделями не покидать своего пристанища, разбирая и собирая различную технику. Из-за частых кошмаров фестрал предпочёл бы и вовсе не видеть сны, но сейчас была ровно обратная ситуация, при которой он бы хотел навсегда застрять у себя в сновидениях. Прошли годы, а Армед Сейдж так и не смог принять того факта, что его старой жизни никогда не было, но эмоции продолжали убеждать его в обратном. Ему начинает казаться, что этот чёртов колокольчик сводит его с ума."
 armed_sage.502.a:0 "§H"Работа должна быть завершена."§!"
 
 armed_sage.1000.t:0 "Безмолвие"
 armed_sage.1000.d:0 "Завершение проекта "Забвение" прошло успешно. Научные сотрудники праздновали этот день как могли, один лишь Армед Сейдж хмуро смотрел на детище их трудов, никто не желал его отвлекать. Вскоре, он остался в этой секции комплекса абсолютно один, наедине с результатом их долгой работы. Жеребец потянулся в свою сумку, достав оттуда довольно старый пистолетовидный прибор, собранный буквально из хлама, но который, похоже благодаря правильному уходу сохранил свою работоспособность. "Моё первое научное достижение, благодаря которому я всё ещё жив и нахожусь здесь, пришло время, использовать тебя в последний раз", - мысленно сказал жеребец, применив его. Посреди зала открылся портал, за которым виднелось серое, закутанное дымом небо, а вдалеке - ульеподобного вида огромнейший город, уходящий высоко в небеса. Фестрал направил оружие прямо в портал, его копыта немного дрожали, от осознания того, что ему предстоит совершить, но всё же, набравшись сил, он указал максимальную мощность, выстрелив лучом, который прошёл сквозь портал. Жеребец сел у портала став смотреть через него, наблюдая как появившееся в небе чёрное пятно медленно начинает расти.\n\n- Не уходи смиренно, в сумрак вечной тьмы,\n\nНачал вслух зачитывать фестрал, пока его глаза становились влажными.\n\n- Пусть тлеет бесконечность в яростном закате.\n\nПятно быстро разрасталось по небу, создавая на той стороне порывы ветра.\n\n- Пылает гнев на то, как гаснет смертный мир,\n\nПо мордочке фестрала сошла первая слеза.\n\n- Пусть мудрецы твердят, что прав лишь тьмы покой.\n\nЧёрное пятно заняло уже половину неба, стало видно, огромное количество летательных средств, покидающих город, однако сила притяжения чёрной дыры пересиливала земное, из-за чего те устремлялись ввысь.\n\n- И не разжечь уж тлеющий костёр.\n\nГород и земля вокруг начали разрушаться, сотни тысяч обломков устремились ввысь, в небо, навстречу своей погибели, по щекам фестрала уже текли потоки из слёз.\n\n- Не уходи смиренно в сумрак вечной тьмы,\n\nВскоре гравитация чёрной дыры начала действовать и сквозь портал, поняв это фестрал отключил свой устройство, после чего проход закрылся, а сам Армед Сейдж без сил упал."
 armed_sage.1000.a:0 ""Пылает гнев на то, как гаснет смертный мир...""
 
 ### IDEAS
 

 
 ### FOCUSES

 ###Фокусы Армеда
 
 TST_Armed_Sage_focus:0 "Гамбит Армед Сейджа"
 TST_Armed_Sage_focus_desc:0 "Не без проблем, но у нас получилось. Хотя сейчас наши условия далеки от идеальных, но с визионером у власти наш взгляд простирается куда дальше наших территорий. Армед Сейдж поведет всех пони в будущее!"
 
 TST_Armed_Sage_focus_1:0 "Борьба с примитивизмом"
 TST_Armed_Sage_focus_1_desc:0 "Мы не можем двигаться в будущее, если наше собственное население застряло в прошлом. Это займет далеко не один день, но мы сделаем все, чтобы местные фестралы как можно скорее отбросили свои примитивные племенные верования и начали двигаться в будущее."
 
 TST_Armed_Sage_focus_2:0 "Билль о правах"
 TST_Armed_Sage_focus_2_desc:0 "В стране должны царить порядок и закон, граждане с большим желанием служат своей стране, если та гарантирует им свободу и безопасность."
 
 TST_Armed_Sage_focus_3:0 "Островок надежды"
 TST_Armed_Sage_focus_3_desc:0 "В последнее время мир становится все более безумным и жестоким местом, не более чем кривым зеркалом самого себя. Именно в такой момент приятно знать, что в мире еще есть надежда. Именно мы станем тем самым спокойным островком посреди цунами, который примет к себе любого, кто хочет спастись от безумия внешнего мира. И, мы можем только надеяться, что много кто захочет воспользоваться такой возможностью."
 TST_Armed_Sage_focus_3_tt:0 "§0Эффект будет слабеть по мере расширения наших территорий.§!"
 
 TST_Armed_Sage_focus_4:0 "Школа в каждое село"
 TST_Armed_Sage_focus_4_desc:0 "Дети - наше будущее, так что, как режим смотрящий вперед, мы должны обеспечивать их всем необходимым. Создание системы младших и средних школ, позволит распространить бесплатное образование в любой, даже самой глухой местности нашей страны, а профессия учителя станет одной из самых почетных в новом обществе."
 
 TST_Armed_Sage_focus_5:0 "Прогрессивное правительство"
 TST_Armed_Sage_focus_5_desc:0 "К сожалению, даже наши бывшие товарищи социалисты не смогли оставить расовые предрассудки, даже для них классовое равенство "не для всех". Мы не пойдем по этому пути, в нашем государстве, в какой бы дальней глуши для обычного пони оно не находилось будет открыто для любого, кто хочет сбежать от ужасов этого мира. В наше новое правительство смогут войти представители любой расы, без каких-либо ограничений."
 TST_Armed_Sage_focus_5_tt:0 "§0Будут доступны решения по интеграции земель Юго-Востока.§!"
 
 TST_Armed_Sage_focus_6:0 "Современные методы войны"
 TST_Armed_Sage_focus_6_desc:0 "Если мы хотим победы революции - мы не можем полагаться на старое племенное ополчение. Пускай смена приоритета на механизированные и танковые части будет сложной, но именно это даст нам необходимое преимущество перед нашими врагами."
 
 TST_Armed_Sage_focus_7:0 "Промышленная революция"
 TST_Armed_Sage_focus_7_desc:0 "Форсированная индустриализация - вот два слова которые нужны этой стране. Если мы хотим выйти на уровень других стран, то фабрики и заводы должны расти один за другим, а штат рабочих расти с каждым днем. Упустив хоть один день в этой гонке, потери будут слишком велики что бы даже думать даже о возможности их допущения."
 
 TST_Armed_Sage_focus_8:0 "Железнодорожная сеть"
 TST_Armed_Sage_focus_8_desc:0 "Кто-то говорит, что это невозможно, мы же говорим - сделаем! Пускай создание сети железных дорог через непроходимые джунгли будет тяжелым и сложным, но это позволит связать нашу страну вместе как никогда прежде. Что может быть лучшим показателем прогресса как возможность преодолеть за несколько часов маршрут что ранее мог занимать несколько недель?"
 
 TST_Armed_Sage_focus_9:0 "Новые методы сельского хозяйства"
 TST_Armed_Sage_focus_9_desc:0 "Так как все больше пони идут в города, наши поля и плантации испытывают сокращение числа рабочих копыт. Тем не менее это не значительная проблема - немедленно внедрив механизацию и новейшие методы сельского хозяйства, мы можем значительно увеличить производство еды на все расширяющихся посевных для нашего стремительно растущего населения."
 
 TST_Armed_Sage_focus_10:0 "Переосмысление быта"
 TST_Armed_Sage_focus_10_desc:0 "Когда то местные пони жили в лачугах и занимались охотой, собирательством, или, в лучше случае, примитивным фермерством. Теперь же им доступна разнообразная еда, чистая и новая одежда, большие дома и прочие удобства современного мира. Конечно процесс адаптации к таким переменам будет не самым быстрым, но мы сможем создать достаточно располагающую себе среду в городах, что бы уже в этом поколении фестралы стали ничем не хуже любого другого современного пони."
 
 TST_Armed_Sage_focus_11:0 "Жемчужина Юго-Востока"
 TST_Armed_Sage_focus_11_desc:0 "Титаническими усилиями, но от старого Аякачтли мало что осталось. Теперь это крупнейший город ВСЕГО юга - сверкающий современный мегаполис, врата в будущее и дом для миллионов живых существ. Теперь любой, кто посмотрит на бьющееся сердце нашего государства, поймет, что имеет дело больше не с дикарями, но с нацией способной разжечь факел прогресса даже в самом темном и опасном месте! И это только малая часть того что мы еще собираемся сделать."
 
 TST_Armed_Sage_focus_12:0 "Аякачтлинский договор"
 TST_Armed_Sage_focus_12_desc:0 "Нам нет цели устраивать бессмысленную войну со всеми, кто с нами не согласен. Местные племена пострадали от хватки империалистических колонизаторов не меньше, чем обычные пролетарии. Это еще и говоря о том, что наши силы по меньшей мере... слишком скромные для того что бы объединить их всех под одним знаменем силой. Пускай они и не до конца понимают нашей идеологии, мы дадим четкую и понятную цель для нашего общего будущего любым племенам, которые будут готовы согласится присоединится к нашему делу."
 TST_Armed_Sage_focus_12_tt:0 "§0Нашим соседям будет предложено сотрудничество в обмен на некоторые уступки.§!"
 
 TST_Armed_Sage_focus_13:0 "Экономическая помощь"
 TST_Armed_Sage_focus_13_desc:0 "Хоть мы и смогли значительно развить наши территории, давно уйдя дальше племенного уровня – у наших новых союзников не было такой роскоши. Мы не сможем в сжатые сроки полностью интегрировать их на наш уровень развития, но при помощи значительной экономической и гуманитарной помощи мы постараемся насколько возможно дать им площадку для собственного развития."
 TST_Armed_Sage_focus_13_tt:0 "§0Каждый член Аякачтлинского договора получит §Y1 фабрику§!§0 и §G1 военный завод§!§0.§!"
 
 TST_Armed_Sage_focus_14:0 "Совместная военная подготовка"
 TST_Armed_Sage_focus_14_desc:0 "В альянсах подобных нашему, боеспособность самой слабой нации, будет бить по всему союзу в целом. Мы попытаемся так же реформировать их армии, путем совместных учений, минимальной стандартизации и модернизации обмундирования, а также введением, пускай и упрощенной, иерархии и дисциплины. Предположительно в результате этого армии союзных племен смогут достигнуть уровня качества стандартного ополчения красной армии."
 TST_Armed_Sage_focus_14_tt:0 "§0Каждый член Аякачтлинского договора получит §!£army_experience 10 §YОпыта армии§!§0.§!\n§0За каждого члена Аякачтлинского договора мы получим §!£army_experience 10 §YОпыта армии§!§0.§!"
 
 TST_Armed_Sage_focus_15:0 "Южный автопром"
 TST_Armed_Sage_focus_15_desc:0 "Новый век сделал переноску всего снаряжения на упряжках, которые тянут сами солдаты, в лучшем случае устаревшим, в худшем - примитивным. Мы вложим значительные ресурсы в развитие машиностроительных заводов на юге, чтобы обеспечить нашу армию и граждан достаточным количеством автотранспорта, что покроет все нужды нашей логистики."
 
 TST_Armed_Sage_focus_16:0 "Роты поддержки"
 TST_Armed_Sage_focus_16_desc:0 "Армия сильна настолько, - насколько силен ее тыл. Изучив опыт других стран, мы сможем подчерпнуть больше знаний, чтобы лучше интегрировать вспомогательные дивизии в нашу армию."
 
 TST_Armed_Sage_focus_17:0 "Стальные чудища"
 TST_Armed_Sage_focus_17_desc:0 "Со своего первого появления на поле боя, танки все еще внушают животный ужас в сердца любого солдата, который видит их на стороне противника. Конструкторское бюро получит задание на создание проекта танка, который будет достаточно простым для наших производственных мощностей, но все еще способным на равных сражаться с аналогичными машинами противника."
 
 TST_Armed_Sage_focus_18:0 "Современная химия"
 TST_Armed_Sage_focus_18_desc:0 "Второй жизненно необходимой индустрией для войны, после металлургической,  является химическая. Благодаря ей создаются отравляющие вещества, такие как хлор, фосген, иприт и многие другие. Она же ответственна за порох, целлюлозу и даже красители без которых не выжить ни одной армии. Именно потому наращивание современной химпромышленности будет стоять высоко в списке приоритетов индустриализации."
 
 TST_Armed_Sage_focus_19:0 "К бою готовы!"
 TST_Armed_Sage_focus_19_desc:0 "Сложно представить какой путь мы прошли - от племенных воинов с копьями и ополченцев с ржавыми ружьями до профессиональных солдат и бронетехники! Шаг за шагом мы двигались к современной армии, способной на равных противостоять любым врагам. Наши успехи навсегда войдут в исторические книги, а недруги будут с дрожью в сердце вспоминать понесённые потери!"
 
 TST_Armed_Sage_focus_20:0 "Объединительная война"
 TST_Armed_Sage_focus_20_desc:0 "Юг - опасное место. Колонизаторы, бандиты, культисты. Это то чем мы НЕ можем заняться сейчас Тем не менее у нас уже достаточно сил что бы захватить те местные племена фестралов, которые отказались присоединится к нам добровольно. Остается только надеяться что от этого мы получим достаточно что бы пойти дальше. Сегодня мы объединим фестралов, что бы завтра сделать так со всеми пони."
 TST_Armed_Sage_focus_20_tt:0 "§0Будет объявлена война всем странам Юго-Востока, не входящим в Аякачтлинский договор."
 TST_ayakachtli_treaty_faction:0 "Аякачтлинский договор"
 
 TST_Armed_Sage_focus_21:0 "Первый шаг к индустриализации"
 TST_Armed_Sage_focus_21_desc:0 "Земли юго-востока не славятся своими промышленными мощностями. Это если говорить мягко. На самом же деле наши земли полны труднопроходимых джунглей, нормальных железнодорожных путей как таковых нет. Если мы хотим утвердить свою власть на континенте, то нам необходимо начать первые важные шаги к индустриализации."
 
 TST_Armed_Sage_focus_22:0 "Культурная революция"
 TST_Armed_Sage_focus_22_desc:0 "Забыты старые обычаи, выкинуты на свалку бесполезные суеверия! Теперь мы можем смело заявлять об создании современного южного пони, пропитанного нашей культурой на всех уровнях. А новая музыка, кино и литература только помогают закрепить новые ценности в головах всех наших жителей, а так же привлечь к ней значительное внимание на мировой арене."
 
 TST_Armed_Sage_focus_23:0 "Мегаполисы средь джунглей"
 TST_Armed_Sage_focus_23_desc:0 "Программа урбанизации дает уверенные плоды. Пускай и не такие величественные как наша столица, но многие города прошли похожий путь, превратившись при нашем активном содействии в наполненные жизнью крупные мегаполисы, приклекающие к себе все больше и больше существ которых мы только можем уместить."
 
 TST_Armed_Sage_focus_24:0 "Современная бронетехника"
 TST_Armed_Sage_focus_24_desc:0 "С расширением наших индустриальных возможностей, мы наконец-то можем перестать спрашивать: "А что мы можем?" и полностью отказаться от любых компромиссов в конструкции. Мы проведем дальнейшее изучение всей информации о танках других государств, которую только сможем собрать, чтобы силой наших передовых технологий создать машины, во всем превосходящие то, что может найтись у кого угодно готового бросить нам вызов."
 
 TST_Armed_Sage_focus_25:0 "Общедоступная медицина"
 TST_Armed_Sage_focus_25_desc:0 "Право на жизнь - это право каждого существа. Наши граждане не должны умирать от обычной простуды или мучиться от боли только лишь потому, что у них нет денег на качественную медицину. Мы откроем государственные больницы по всей стране, предоставив гражданам бесплатную медицину."
 TST_Armed_Sage_focus_25_tt:0 "§0Мы будем имунны к воздействию чумы из Филлидельфии.§!"
 
 TST_Armed_Sage_focus_26:0 "Наказать бандитов"
 TST_Armed_Sage_focus_26_desc:0 "К западу от нас лежат земли, в которых царит полное беззаконие, не говоря уже о наличии откровенно абсурдных и тиранических режимов. Мы укрепили свои позиции на юго-востоке и теперь можем смело двигаться дальше, и запад станет нашей первой целью на пути к полному объединению земель пони."
 
 TST_Armed_Sage_focus_27:0 "Сокрушить шовинизм Пандории"
 TST_Armed_Sage_focus_27_desc:0 "Говорят, когда-то очень давно, когда весь остальной мир переживал эпоху феодализма, земные пони жили в одной из первых республик. Правда это или нет - сейчас Пандория не более чем родина шовинизма, жители которой добровольно ослепили себя религиозным догматизмом. Хотят они того или нет - но мы заставим их прозреть."
 
 TST_Armed_Sage_focus_28:0 "Сердце капиталистического мира"
 TST_Armed_Sage_focus_28_desc:0 "Единороги и грифоны на удивление похожи друг на друга. Жадные, надменные, сварливые. Не удивительно насколько Юникорния и империя Герцланда похожа в своем декадансе. И пускай со вторыми мы не можем ничего, Юникорния и ее вассалы падут под натиском прогресса. Мы перекуем сущность единорогов, сделав их подобным другим пони."
 
 TST_Armed_Sage_focus_29:0 "Радарная техника"
 TST_Armed_Sage_focus_29_desc:0 "Как показали исследования - радары гораздо эффективнее и многократно дешевле чем постоянные воздушные или наземные патрули, старающиеся перехватить информацию о воздушных патрулях противника. Мы уделим внимание дальнейшему усовершенствованию радарных технологий и полном покрытии нашей страны радарной сеткой, достаточной, что бы убрать все "серые зоны" в нашем небе."
 
 TST_Armed_Sage_focus_30:0 "Экспериментальная авиация"
 TST_Armed_Sage_focus_30_desc:0 "Новые достижения в изучении самолетов, использующих реактивные двигатели, позволяют предположить, что они смогут стать во всём лучше наших нынешних винтовых дизайнов. Менее чувствительные к качеству топлива, способные набирать большую высоту и даже преодолевать звуковой барьер. Это станет настоящим чудо-оружием для нашей авиации, если только мы сможем пустить их в по-настоящему массовое производство."
 
 TST_Armed_Sage_focus_31:0 "С небес на землю"
 TST_Armed_Sage_focus_31_desc:0 "Пегасы - исторически армия, сращенная с государством. Каждый пегас воин, каждый политик - офицер или генерал. Некоторые спросят есть ли вообще смысл интегрировать подобную расу в наше общество, особенно на равных с остальными. Но Армед Сейдж знает, что иначе просто нельзя. В этот раз мы будем освободителями, которые собьют с пегасов цепи милитаризма..."
 
 TST_Armed_Sage_focus_32:0 "Эндшпиль"
 TST_Armed_Sage_focus_32_desc:0 "Дом. Как он много значит для каждого и как тяжело его терять. Память об изгнании все еще свежа у слишком многих из нас, как и гнев к тем предателям, что прогнали нас на юг. Но теперь настоящие революционеры вернулись домой, а с ними НАСТОЯЩЕЕ продолжение учения Маркс Последние ставки сделаны, пони Эквуса станут едиными, мы слишком долго шли к этому."
 
 TST_Armed_Sage_focus_33:0 "Средства массовой информации"
 TST_Armed_Sage_focus_33_desc:0 "Радио, телевизор. Когда-то о них даже не знали, но теперь мы сделали все что бы у каждого жителя был каждый из этих приборов. А централизованное и структурированное вещание позволило идеально рассчитать все что пони потребляют с их помощью, конечно же с целью дальнейшего улучшения нашего общества. Говорят, наши зарубежные сетки вещания пользуются широкой популярностью, не смотря на все попытки их запретить как "вражеские голоса"."
 
 TST_Armed_Sage_focus_34:0 "Чёрное золото"
 TST_Armed_Sage_focus_34_desc:0 "Современный мир не может существовать без нефти, горючее лишь самое очевидное ее применение. Потому что бы питать машину прогресса сырьем для топлива, полимеров и синтетики мы должны эксплуатировать каждое найденное нами месторождение. Некогда скрытые за неприступной хваткой дикой природы, здешние запасы настолько богаты, что мы не сможем выжать их до капли еще очень долгое время."
 
 TST_Armed_Sage_focus_35:0 "Автоматизация производства"
 TST_Armed_Sage_focus_35_desc:0 "Создание конвейера позволило сократить время создания обычного автомобиля с месяца, до всего лишь чуть больше одной недели. Нам нужно развивать этот успех и внедрять все более и более современные методы автоматизации с производство, таким образом нагнав мировых лидеров по количеству выпускаемой продукции."
 
 TST_Armed_Sage_focus_36:0 "Социалистический атом"
 TST_Armed_Sage_focus_36_desc:0 "Мы смогли это! Наши ученные подобрались к успешному расщеплению атома, а вместе с тем и запредельными количествам энергии выделяемых при этом процессе. Подобное открывает для нас новые, почти безграничные возможности как в гражданском так и военном применении. Остальные могут попробовать повторить наш успех, но на данный момент, только мы держим в своих копытах ключ к самому ультимативному оружию против любой, даже самой могучей империи. Финальная гонка началась."
 
 TST_Armed_Sage_focus_37:0 "Ракетные технологии"
 TST_Armed_Sage_focus_37_desc:0 "Изучив ракетные двигатели лучше, мы смогли совершить прорыв в управляемых ракетах. Их дальность стала просто феноменальной, позволяя отправлять их в любую точку нашего мира, или даже за его пределы. Это позволило нам доставлять научное оборудование в самые дальние уголки космоса. А нашему ультимативному оружию достичь любого, кто осмелится угрожать нашей утопии. Теперь мы можем дотянутся до ВСЕХ."
 
 TST_Armed_Sage_focus_38:0 "Популяризация науки"
 TST_Armed_Sage_focus_38_desc:0 "Теперь героями для детей будут не рыцари и могучие войны, но гениальные ученые-первооткрыватели. Построив нашу культуру вокруг превосходства науки, мы принимаем все попытки что бы воспитать в каждом пони с самого детства максимальный интерес к этой сфере. Пускай не каждый сможет стать великим ученым, но мы сделаем все что бы все испытывали глубокое уважение и благодарность перед каждым у кого это получилось."
 
 TST_Armed_Sage_focus_100:0 "Славься, Эквестрия!"
 TST_Armed_Sage_focus_100_desc:0 "Невероятно. Немислимо... Непостижимо.\nМногие историки будущего будут называть это не иначе как чудом. Из кучки племен и беженцев из далекой, отвергнувшей их страны, пони Аякачтли смогли сделать то, о чем даже не мыслили все остальные на протяжении тысячи лет - объединить все расы пони под единым знаменем, под единым именем...\nЭквестрия... Страна всех пони. И её лидер, визионер, мессия, тот кто сделал это все возможным - Армед Сейдж."
 TST_Armed_Sage_focus_100_tt:0 "§0Спасибо за игру!§!"
 
 ###Фокусы Машки
 
 TST_Masha_Norushkina_focus:0 "Маша Норушкина"
 
 TST_Masha_Norushkina_focus_1:0 "Трудовые лагеря"
 TST_Masha_Norushkina_focus_1_desc:0 "Отныне в нашей стране нет места духовникам, дворянам и им подобным, сейчас для них найдётся слегка иное предназначение..."
 
 TST_Masha_Norushkina_focus_2:0 "Патриотический призыв"
 
 TST_Masha_Norushkina_focus_3:0 "Разграбить караваны"
 TST_Masha_Norushkina_focus_3_desc:0 "По нашим территориям проходят несколько торговых маршрутов, хоть они и несут некую пользу нашей экономике, в то же время, торговцы промывают мозги наших граждан своими глупыми идеями."
 
 TST_Masha_Norushkina_focus_4:0 "Политические комиссары"
 
 TST_Masha_Norushkina_focus_5:0 "Политика автаркии"
 
 TST_Masha_Norushkina_focus_6:0 "Работа за победу"
 
 TST_Masha_Norushkina_focus_7:0 "Тактика партизанских действий"
 
 TST_Masha_Norushkina_focus_8:0 "Пролетарское ополчение"
 
 TST_Masha_Norushkina_focus_9:0 "Едины под луной"
 
 TST_Masha_Norushkina_focus_10:0 "Пожар на Юго-Востоке"
 
 TST_Masha_Norushkina_focus_11:0 "Лагеря для сорялистов"
 
 TST_Masha_Norushkina_focus_12:0 "Искупление для ревизионистов"
 
 TST_Masha_Norushkina_focus_14:0 "Добить дикарей"
 
 TST_Masha_Norushkina_focus_16:0 "Взор на Юго-Запад"
 
 TST_Masha_Norushkina_focus_21:0 "Старые обиды не забыты"
 TST_Masha_Norushkina_focus_21_tt:0 "§RВ будущем может привести к войне.§!"
 
 TST_Masha_Norushkina_focus_22:0 "Наши Северянские товарищи"
 
 TST_Masha_Norushkina_focus_23:0 "Южная Советская Республика"
 
 TST_Masha_Norushkina_focus_24:0 "План "Возмездие""
 TST_Masha_Norushkina_focus_24_desc:0 "Долгие годы монархисты Юникорнии презрительно относились к нам и нашим сородичам, считая дикарями. Многие наши сородичи умирали в юникорнийском рабстве. Пришло время возмездия."
 
 TST_Masha_Norushkina_focus_25:0 "Импорт Северянских технологий"
 
 TST_comm_ec_1:0 "Первый шаг к индустриализации"
 
 TST_comm_ec_2:0 "Литейни Аякачтли"
 
 TST_comm_ec_3:0 "Проект "Альфа""
 TST_comm_ec_3_desc:0 "Разработка пехотного оружия новой эпохи. Создав магическую винтовку на замену старых пороховых ружей, мы не только модернизируем нашу армию, но сделаем ее самой современной в мире. Пускай ее производство может выйти многократно дороже любого другого стандартного вооружения других армий, наши природные запасы кристаллов должны с лихвой покрыть производство."
 
 TST_comm_ec_4:0 "Современные мануфактуры"
 TST_comm_ec_4_tt:0 "§GЭффект изменится от выбранного лидера.§!"
 TST_comm_ec_4_alt_tt:0 "§YФокус может быть пропущен при взятии фокуса "Промышленная революция"§!"
 
 TST_comm_ec_5:0 "Зарубежные специалисты"
 TST_comm_ec_5_desc:0 "В деле наверстывания сотен лет прогресса нельзя полагаться только на себя. Что бы развиваться нам нужна значительная помощь извне, которую ныне не так уж и сложно получить. Будучи островком стабильности в бушующем море современного безумия мы привлекаем к себе широчайший контингент профессионалов своего дела. всех рас, со всего мира. Радушно открыв двери этим специалистам и обеспечив их работой, мы получим знания, которые смогут ускорить нашу модернизацию на десятилетия."
 
 TST_comm_ec_6:0 "Радиотехника"
 
 TST_comm_ec_7:0 "Массовое производство оружия"
 
 TST_comm_ec_8:0 "Тяжёлая артиллерия"
 
 TST_comm_ec_9:0 "Общедоступное продовольствие"
 
 TST_comm_ec_10:0 "Железные орлы"
 TST_comm_ec_10_desc:0 "Опыт конфликтов прошлого доказал одно - контроль над воздухом дает неоспоримое преимущество солдатам на земле. Создание легкомоторной авиации станет самым легким решением для нашей индустрии. для скорейшего наращивания присутствия еще и в воздухе."
 
 TST_comm_ec_11:0 "Укрощение природы"
 TST_comm_ec_11_desc:0 "Наша природа поистине прекрасна, но и столь же неудобна. Зелёные джунгли мешают нашему дальнейшему развитию, нам трудно прокладывать новые железнодорожные пути, возводить новые города и соединять уже существующие. Хотим мы того или нет. но нам придётся пойти на крайние меры и начать борьбу с природой ради нашей революции и нашего процветания."
 TST_comm_ec_11_tt:0 "§0Будут открыты решения по повышению уровня регионов.§!\n§RПРИМЕЧАНИЕ:§! §0Для повышения для соответствующего уровня региона, требуется определённое количество инфраструктуры.§!"
 
 TST_comm_ec_12:0 "Юго-восточное научное содружество"
 TST_comm_ec_12_desc:0 "Существа извне считают население этих краев нищим как интеллектуально, так и физически. Но, конечно же, это не так, земля здесь богата талантами не меньше других. Отыскав самые сверкающие самородки среди местных умов, мы объединим их в единую организацию, позволив спокойно обмениваться идеями между собой и служить на благо общей родины. Настоящие таланты, вне зависимости от происхождения, поведут нас в будущее."
 
 TST_comm_ec_13:0 "Южный университет"
 TST_comm_ec_13_desc:0 "Пришло время позаботится о судьбе высшего образования. Найдя достаточно ресурсов, мы наконец-то можем построить в Аякачтли монструозный по-своему масштабу университет, превосходящий в этом даже самые древние и престижные заведения Тимбакту и Йеля. Именно тут все существа смогут на равных получать лучшее из доступных образований в любой сфере, а его бесчисленные кафедры смогут подготавливать армию специалистов, готовых встать на службу нашему государству."
 
 TST_comm_ec_14:0 "Черное золото"
 
 TST_comm_ec_15:0 "Дополнительное оснащение"
 
 TST_comm_ec_16:0 "Новые средства передвижения"
 TST_comm_ec_16_tt:0 "§YФокус может быть пропущен при взятии фокуса "Южный автопром"§!"
 
 TST_comm_ec_17:0 "Экспериментальная механизация"
 
 TST_comm_ec_18:0 "Тяжёлая и средняя авиация"
 TST_comm_ec_18_desc:0 "Цеппелин это достаточно простое и в некотором роде даже примитивное летательное средство. Однако простота их конструкции делает их более предпочтительными на фоне более комплексных многомоторных самолетов, что в условиях нашей промышленности является решающим."
 
 TST_comm_ec_19:0 "Продвинутая электроника"
 TST_comm_ec_19_desc:0 "Сложно переоценить значимость вычислительных технологий. Направив ресурсы на проектирование и введение в эксплуатацию все новых и новых электрических устройств, мы сможем не только развивать наши основные «рабочие инструменты» но и значительно улучшить жизни в равной степени как наших солдат, так и простых граждан."
 
