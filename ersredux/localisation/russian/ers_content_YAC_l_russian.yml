 yac_can_start_revival:0 "У Чифтесс появился §Yплан дальнейших действий§!"
 yac_search_for_marx_decisions_unlocked_tt:0 "Откроет особые §Cрешения§!"
 yac_search_for_marx_event_tt:0 "§YБудет сформирована бригада самых преданных делу Маркс яков-поисковиков§!).\n§YПортные получили приказ сшить робу, чтобы та в точности повторяла одеяния Маркс на портрете§!."
 yac_add_holy_corpse_tt:0 "Добавить §YСвятые Останки§!"
 yac_has_holy_corpse:0 "Обладает §YСвятыми Останками§!"
 give_marks_corpse_to_shamans_tt:0 "§YТело Маркс§! будет передано шаманам."
 yac_event_10_tt:0 "§YВНИМАНИЕ: Вероятность успеха очень мала. Вам следует укрепить свою веру, товарищ§!.\n\n§YДля укрепления веры прочтите следующую молитву вслух и уверуйте в Маркс§!.\n\n§CМаркс, намайг сонс, энэ дэлхийд ир. Маркс, чиний унэнч зарц чамайг дуудаж байна. Оглоо эрт сэрэхэд миний бух бодол зовхон чиний тухай байдаг, учир нь зовхон чи л надад аврал авчирч чадна. Итгэл минь ган шиг хучтэй, тэмуулэл минь хаврын царс шиг хувиршгуй§!."
 YAC_nationalisation_tt:0 "В категории "§YЯкс-политика Чифтесс§!" появятся §Cрешения§! о §Yнационализации местной промышленности§! в любом регионе, которым мы владеем (§G+1 военный завод§! от каждой национализации)"
 YAC_miners_villages_tt:0 "В категории "§YЯкс-политика Чифтесс§!" появятся §Cрешения§! о §Yсоздании шахтёрских посёлков§! в любом регионе, которым мы владеем. Шахтёрские посёлки §Gувеличивают местные ресурсы§! и §Rуменьшают процент военнообязанного населения и скорость строительства§! выбранного региона. §gИмеет смысл создать пару таких§!."
 YAC_support_churches_tt:0 "Разблокирует §Yполитических советников§!, дающих §Gмощные бонусы§!, но §Rснижающих§! популярность §Yкоммунизма§!."
 YAC_the_web_tt:0 "Создание §YСети§! позволит нам находить §Rревизионеров§! и §Rконтрреволюционеров§!."
 yac_nationalising_factory_flag:0 "Национализирует местную промышленность в другом регионе"
 yac_creating_mines_flag:0 "Создаёт шахтёрский посёлок в другом регионе"

 #### EVENTS
 yac.1.t:0 "Начало революции"
 yac.1.d:0 "Чифтесс закончила свою ежедневную молитву. Окружённая портретами Маркс со всех сторон, она неустанно пыталась связаться с миром духов, чтобы достучаться до ныне погибшей революционерки. Но, должно быть, её духовная сила не настолько сильна, чтобы связываться с миром мёртвых. Но шаманы из Матхан Крикхе точно должны это уметь. В ближайшее время она найдёт их."
 yac.1.a:0 "Маркс, дай нам силы сражаться дальше."
 
 yac.2.t:0 "Безумная идея"
 yac.2.d:0 "Группа старых шаманов во главе с Уфорсом ожидали своей участи в малом якском городке. Они слышали, что новое правительство расстреливало несогласных и неугодных направо и налево - значит, и шаманам недолго осталось. Но к их удивлению, сама лидер революции, Чифтесс, прибыла к ним на встречу.\n\n'Так что вам от нас нужно?'\n\nЧифтесс вкратце рассказала им суть нынешней идеологии. Принципы равенства классов, общей земли и имущуества, мировой революции. Шаманы не совсем понимали, к чему всё это, но потом Чифтесс сообщила, что все эти принципы были придуманы некой пони, а точнее единорогом, по имени Карамель Маркс.\n\n'Нам лишь нужно, чтобы вы, великие якские шаманы, вернули Маркс к жизни.'\n\nШаманы незамедлительно начали возмущаться и возражать. Они бы ни за что не стали пытаться "возродить" невесть какого единорога, который к тому же имел идеи странного "коммунизма".\n\nЧифтесс выстрелом из небольшого револьвера вверх успокоила шаманов. Луч света проник через дыру в юрте.\n\n'Мы, члены Первой Якской Коммунистической Партии, глубоко уважаем ваше решение. Но я думаю, что вы недооцениваете значимость фигуры Карамель Маркс для якского общества. Вскоре вы поймёте это.'\n\nЗатем Чифтесс оставила шаманов в юрте. И, что интересно, все они остались живы."
 yac.2.a:0 "Маркс, направь их на истинный путь..."
 
 yac.3.t:0 "Только марксизм"
 yac.3.d:0 "Только марксизм может привести все народы мира к счастью. Учение Карамель Маркс открыло новую веху сознания для наших яков...  Можно сказать, яки Карсагака вознеслись над всеми остальными народами. Только марксизм может оказать такое влияние на массы. Героизм, отверженность, патриотизм, трудолюбие - всё это может возникнуть только если мы чётко следуем идеологии Маркс. И ни шагу в сторону."
 yac.3.a:0 "Только марксизм..."
 
 yac.4.t:0 "Только Маркс"
 yac.4.d:0 "Никакой лидер не способен на объединение мирового пролетариата для борьбы с реакционизмом и империализмом. Никто не может вселить уверенность и создать коммунистическую утопию... никто, кроме Маркс. И пока её нет с нами - это величайшая печаль. Это скорбь. Каждый день мы страдаем и впадаем в отчаяние из-за того, что Маркс не ведёт нас в бой. Но затем мы вспоминаем, что мы сражаемся за её идею. И Чифтесс - проводник идей Маркс. Чифтесс Шейяк, наш лидер, молится за победу пролетариата день и ночь, но этих молитв недостаточно. Ибо нам нужно нечто большее, чем идея. Нам нужна Маркс."
 yac.4.a:0 "Только Маркс..."
 
 yac.5.t:0 "Истинный антиревизионизм"
 yac.5.d:0 ""Это возмутительно!", твердит предатель. "Это не истинный марксизм! Вы утверждаете, что вы фундаментально следуете идеям Маркс, но это наглая ложь!"\nОн пытается посеять панику и неверие среди нас. Сначала его схватят и он понесёт физические наказания в соответствии с древними традициями Золотой Рабочей Орды, которые позабыли антикоммунисты. Затем он должен осознать, что наша идеология - это чистейший антиревизионизм, который только может быть. Мы уничтожаем любую реакцию, которая искажает идеологию Маркс.\n\nЗатем он будет убит, и уже в мире духов Маркс решит его судьбу, ибо в мире духов именно дух Карамель Маркс занимет позицию всевышнего божества. Какое бы решение она не приняла, оно будет справедливым."
 yac.5.a:0 "Слава Маркс!"
 
 yac.6.t:0 "Агенты ничего не нашли"
 yac.6.d:0 "Якские агенты под видом добровольцев-интернационалистов внедрились в указанный регион. К сожалению, они так ничего и не обнаружили, хотя проверили каждое возможное место захоронения великой революционерки.\n\nНо есть и хорошие новости. Во время поисков наши агенты собрали несколько слухов, которые могут помочь выявить точное место, где находится нужное нам захоронение."
 yac.6.a:0 "Ох, боги..."
 
 yac.7.t:0 "Святой труп"
 yac.7.d:0 "Поисковой отряд уже сбился со счёта, сколько захоронений они осмотрели. Всё было бы намного проще, если бы эти тупые пони догадались увековечить память о Маркс каким-нибудь мемориалом, где она же и была бы захоронена. Но вот, сегодня они получили одно из самых ценных сведений за свё время их поисков.\n\n- Я слышал, вы, красные паломники, ищете, где покоится тело Карамель Маркс? Не знаю, сколько и где вы блуждали, но сейчас вы точно приблизились к истине. Дело в том, что именно в этом регионе Маркс проводила свои последние дни жизни. Говорят, проблемы со здоровьем сильно подкосили её, и это заставило её временно осесть где-то в этих краях. И... дальше она уже не смогла продолжить своё дело.\n\nК сожалению, более точных сведений добиться у них не удалось. Но всё-же они, уже решив бросить это дело, почти случайно наткнулись на небольшой холмик со скромным надгробием. На нём грубо было выцарапано на северянском языке "Здесь покоится Карамель М., мать революции. Года жизни неразборчивы."\n\nЯки помолились, чтобы загладить вину за то, что они собирались сделать, ибо их подвиг служит гораздо большей цели.\n\nПосле десяти минут выкапывания земли, они смогли поднять скелет. Простой безжизненный скелет единорога. За разграблением могили их застал местный житель, после чего убежал в неизвестную сторону. Должно быть, он отправился звать на помощь тех, кто может наказать яков-поисковиков. Но им плевать на мнение каких-то млабых пони. Они наконец нашли то, что искали.\n\nСкорее всего то, что искали."
 yac.7.a:0 "Самое ценное сокровище во Вселенной."

 yac.8.t:0 "Что мы вообще ищем?"
 yac.8.d:0 "Прошло несколько месяцев со дня переговоров с шаманами Матхан Крикхе. В течение этого времени, к счастью для нас, некоторые из них всё-таки приняил факт того, что Маркс должна быть возрождена. Эти обратившиеся шаманы будут продвигать идеи марксизма своим духовным товарищам, а пока Чифтесс Шейяк пригласила одного из них в свою юрту, чтобы, наконец, обсудить детали ритуала возрождения.\n\n- На самом деле, этот ритуал - не самая лёгкая задача. - Красный шаман Доргун покуривал трубку, задумчиво осматривая портрет Маркс, висевший в юрте Чифтесс. - Его успех прямо зависит от того, сколько у нас есть ресурсов.\n\n- Какие ресурсы нужны? Можете просить всё, что хотите.\n\n- На самом деле, это по большей части зависит не от вас. Наша задача - это обратиться к миру духов, воззвать конкретно к духу Маркс, а также провести разные ритуальные действия, которые вам не особо нужно знать. С вашей же стороны должно быть предоставлено тело.\n\n- Тело?.. - Чифтесс догадывалась, что это означало, но всё-таки решила переспросить.\n\n- Так точно, тело. В лучшем случае - свежий труп, в худшем - сохранившийся скелет.\n\nЧифтесс уже обдумывала, как ей заполучить останки Карамель Марск. Если бы только кто-то построил в честь неё Мавзолей и сохранил её тело, то всё было бы куда проще. Но вместо этого её псевдо-товарищи оставили её труп где-то в землях, которые известны как Красная Северяна. Северяна... Точно. Если где-то и надо начинать поиски, то только там. Нужно обыскать каждое кладбище, каждую могилу. Ревизионеры не могли просто оставить её святой труп в случайном месте.\n\n- И не забудьте приказать сшить для неё подходящие одеяния. Когда она возродится, кожа, мех и все органы восстановятся, чего нельзя сказать об её одежде."
 yac.8.a:0 "Поиски начинаются."
 
 yac.9.t:0 "Рядом с Ней"
 yac.9.d:0 "Чифтесс Шейяк была в восторге, узнав об успехе поисков тела Маркс, а когда скелет был доставлен - ей чуть не стало плохо от того, насколько ей было хорошо. Останки Маркс переносилсь в небольшом ящике, который Чифтесс поместила в свою юрту, считая, что только она сможет оберегать останки Величайшей. Солдатам, охраняющим юрту Чифтесс, было приказано не входить, а также не впускать никого внутрь в течение следующих двух часов.\n\n- Я так рада, что могу встретить Тебя. Ты всё это время была лучом света в моей жизни, именно Ты значишь для меня всё.\n\nЧифтесс разговаривала с портретом Маркс, как будто та слышала яка в том мире. После очередной молитвы Чифтесс впилась глазами в ящик. Не удержавшись, она открыла его.\n\nВнутри была куча костей в перемешку с землёй. Обратив внимание на череп с рогом, она убедилась, что скелет принадлежит Маркс. Она оглянулась, будто опасаясь, что кто-то войдёт в юрту, после чего достала череп из ящика. Держа в копыте череп, як смотрела в его бездонные глазницы, не в силах сдержать улыбку.\n\n- Я знаю, Ты слышишь меня. И я знаю, что Ты можешь оценить мои старания, как никто другой. Что они сделали с Тобой? Какое чудовище могло тебя погубить?\n\nЕй показалось, что череп что-то проговорил ей в ответ. Всё же, показалось.\n\n- И наши поисковики. Как они могли привезти Тебя в таком виде? В пыли, в грязи... Я это исправлю. Я омою кости Твои самой чистой водой из благословлённого ручья. Я буду защищать Тебя. Я смогу позаботиться о Тебе, пока Ты не прибудешь к нам. Вместе мы добьёмся многого. Обещаю.\n\nЧереп молчал в ответ."
 yac.9.a:0 "Это так волнительно."

