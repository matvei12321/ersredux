 ##### DECISIONS 
 
 YAC_purify_BAD:0 "Сжечь библиотеку Бара'дур"
 YAC_purify_BAD_desc:0 "Этот старый глупый як Барадур построил целую библиотеку, в которую завозил книги со всего мира, в том числе здесь находятся и сами "Учения Барадура". Наш комитет революционной безопасности признает это сборище текста еретичексими писаниями, после чего мы избавимся от них и уничтожим наследие самого глупого яка в истории."
 YAC_purify_JAK:0 "Повесить националистов"
 YAC_purify_JAK_desc:0 "Йакистанцы - первые, против кого мы восстали в качестве простых партизан, но теперь мы представляем из себя великое социалистическое государство. Необходимо выследить остатки лоялистов Брэдфорда и предать их справедливому суду."
 YAC_purify_MNT:0 "Разрушить языческие святилища"
 YAC_purify_MNT_desc:0 "Якрунцы поклоняются ужасному божеству Якруну, принося всё больше и больше жертв с каждым днём. Мы прервём эту варварскую традицию поклонению бога безумия, и начнём с того, что запретим поклонение Якруну и уничтохим все алтари, посвящённые ему."
 YAC_purify_NAK:0 "Снести памятники старого режима"
 YAC_purify_YAK:0 "Снести памятники старого режима"
 
 YAC_search_marks_corpse_decision:0 "Искать останки Маркс в регионе [FROM.getname]"

 
 YAC_marks_revival_cat:0 "Культ Маркс"
 YAC_marks_revival_cat_desc:0 "Мы верим, что она вернётся.\n\nМы надеемся.\n\nМы ждём."
 YAC_decisions_cat:0 "Якс-политика Чифтесс"
 YAC_MARKS:0 "Вставай, проклятьем заклемённый..."
 YAC_MARKS_desc:0 "Данное решение не является полноценной частью контента и служит плейсхолдером для дальнейшей механики эзотерического коммунизма. Полноценного контента дальше нет..."
 YAC_MARKS_tt:0 "МАРКС, ВОССТАНЬ, ОСВОБОДИ МИР ПРОЛЕТЕРИАТА.\n\nНЕ ПРОТЕСТИРОВАНО И МОЖЕТ ПРИВЕСТИ К НЕПРЕДВИДЕННЫМ ПОСЛЕДСТВИЯМ В ВИДЕ РАЗРЫВА СВЯЗИ МЕЖДУ МИРОМ ЖИВЫХ И МИРОМ МЁРТВЫХ."
