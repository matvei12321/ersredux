 yac.6.t:0 "Агенты ничего не нашли"
 yac.6.d:0 "Якские агенты под видом добровольцев-интернационалистов внедрились в указанный регион. К сожалению, они так ничего и не обнаружили, хотя проверили каждое возможное место захоронения великой революционерки.\n\nНо есть и хорошие новости. Во время поисков наши агенты собрали несколько слухов, которые могут помочь выявить точное место, где находится нужное нам захоронение."
 yac.6.a:0 "Ох, боги..."
 
 yac.7.t:0 "Святой труп"
 yac.7.d:0 "Поисковой отряд уже сбился со счёта, сколько захоронений они осмотрели. Всё было бы намного проще, если бы эти тупые пони догадались увековечить память о Маркс каким-нибудь мемориалом, где она же и была бы захоронена. Но вот, сегодня они получили одно из самых ценных сведений за свё время их поисков.\n\n- Я слышал, вы, красные паломники, ищете, где покоится тело Карамель Маркс? Не знаю, сколько и где вы блуждали, но сейчас вы точно приблизились к истине. Дело в том, что именно в этом регионе Маркс проводила свои последние дни жизни. Говорят, проблемы со здоровьем сильно подкосили её, и это заставило её временно осесть где-то в этих краях. И... дальше она уже не смогла продолжить своё дело.\n\nК сожалению, более точных сведений добиться у них не удалось. Но всё-же они, уже решив бросить это дело, почти случайно наткнулись на небольшой холмик со скромным надгробием. На нём грубо было выцарапано на северянском языке "Здесь покоится Карамель М., мать революции. Года жизни неразборчивы."\n\nЯки помолились, чтобы загладить вину за то, что они собирались сделать, ибо их подвиг служит гораздо большей цели.\n\nПосле десяти минут выкапывания земли, они смогли поднять скелет. Простой безжизненный скелет единорога. За разграблением могили их застал местный житель, после чего убежал в неизвестную сторону. Должно быть, он отправился звать на помощь тех, кто может наказать яков-поисковиков. Но им плевать на мнение каких-то млабых пони. Они наконец нашли то, что искали.\n\nСкорее всего то, что искали."
 yac.7.a:0 "Самое ценное сокровище во Вселенной."

 yac.8.t:0 "Что мы вообще ищем?"
 yac.8.d:0 "Прошло несколько месяцев со дня переговоров с шаманами Матхан Крикхе. В течение этого времени, к счастью для нас, некоторые из них всё-таки приняил факт того, что Маркс должна быть возрождена. Эти обратившиеся шаманы будут продвигать идеи марксизма своим духовным товарищам, а пока Чифтесс Шейяк пригласила одного из них в свою юрту, чтобы, наконец, обсудить детали ритуала возрождения.\n\n- На самом деле, этот ритуал - не самая лёгкая задача. - Красный шаман Доргун покуривал трубку, задумчиво осматривая портрет Маркс, висевший в юрте Чифтесс. - Его успех прямо зависит от того, сколько у нас есть ресурсов.\n\n- Какие ресурсы нужны? Можете просить всё, что хотите.\n\n- На самом деле, это по большей части зависит не от вас. Наша задача - это обратиться к миру духов, воззвать конкретно к духу Маркс, а также провести разные ритуальные действия, которые вам не особо нужно знать. С вашей же стороны должно быть предоставлено тело.\n\n- Тело?.. - Чифтесс догадывалась, что это означало, но всё-таки решила переспросить.\n\n- Так точно, тело. В лучшем случае - свежий труп, в худшем - сохранившийся скелет.\n\nЧифтесс уже обдумывала, как ей заполучить останки Карамель Марск. Если бы только кто-то построил в честь неё Мавзолей и сохранил её тело, то всё было бы куда проще. Но вместо этого её псевдо-товарищи оставили её труп где-то в землях, которые известны как Красная Северяна. Северяна... Точно. Если где-то и надо начинать поиски, то только там. Нужно обыскать каждое кладбище, каждую могилу. Ревизионеры не могли просто оставить её святой труп в случайном месте.\n\n- И не забудьте приказать сшить для неё подходящие одеяния. Когда она возродится, кожа, мех и все органы восстановятся, чего нельзя сказать об её одежде."
 yac.8.a:0 "Поиски начинаются."

 yac.9.t:0 "Рядом с Ней"
 yac.9.d:0 "Чифтесс Шейяк была в восторге, узнав об успехе поисков тела Маркс, а когда скелет был доставлен - ей чуть не стало плохо от того, насколько ей было хорошо. Останки Маркс переносилсь в небольшом ящике, который Чифтесс поместила в свою юрту, считая, что только она сможет оберегать останки Величайшей. Солдатам, охраняющим юрту Чифтесс, было приказано не входить, а также не впускать никого внутрь в течение следующих двух часов.\n\n- Я так рада, что могу встретить Тебя. Ты всё это время была лучом света в моей жизни, именно Ты значишь для меня всё.\n\nЧифтесс разговаривала с портретом Маркс, как будто та слышала яка в том мире. После очередной молитвы Чифтесс впилась глазами в ящик. Не удержавшись, она открыла его.\n\nВнутри была куча костей в перемешку с землёй. Обратив внимание на череп с рогом, она убедилась, что скелет принадлежит Маркс. Она оглянулась, будто опасаясь, что кто-то войдёт в юрту, после чего достала череп из ящика. Держа в копыте череп, як смотрела в его бездонные глазницы, не в силах сдержать улыбку.\n\n- Я знаю, Ты слышишь меня. И я знаю, что Ты можешь оценить мои старания, как никто другой. Что они сделали с Тобой? Какое чудовище могло тебя погубить?\n\nЕй показалось, что череп что-то проговорил ей в ответ. Всё же, показалось.\n\n- И наши поисковики. Как они могли привезти Тебя в таком виде? В пыли, в грязи... Я это исправлю. Я омою кости Твои самой чистой водой из благословлённого ручья. Я буду защищать Тебя. Я смогу позаботиться о Тебе, пока Ты не прибудешь к нам. Вместе мы добьёмся многого. Обещаю.\n\nЧереп молчал в ответ."
 yac.9.a:0 "Это так волнительно."

 yac.10.t:0 "Воскрешение, часть I"
 yac.10.d:0 "Шаманы Матхан Крикхе, которые, наконец, встали на сторону Чифтесс, устроили временную священную резиденцию в Карсакаге. Новый храм находился в быстрой досягаемости от штаб-квартиры Чифтесс, поэтому перенести тело Маркс непосредственно в храм не было проблемой.\n\n- Я, конечно, не понимаю, что вы будете делать с Ней. Но обещаю, если вы повредите Её тело, ожидайте последтствий. - В этот момент Чифтесс была серьёзна как никогда. - Надеюсь, вы понимаете, что вас ждёт, если наша священная миссия провалится.\n\nЯки-шаманы уже тащили ящик со скелетом из юрты Чифтесс в свой храм. Говоря с их предводителем, Шейяк постоянно оглядывалась на то, бережно ли они транспортируют Маркс.\n\n- Но и вы должны понимать, к чему стоит готовиться вам, если у нас всё получится. Обряды возрождения, конечно, известны старейшинам, но они не практиковались сотни лет, поскольку в этом не было необходимости. Если мы и вернём её, то, ведают духи, с каким-нибудь дефектом.\n\n- Ч-что? - сердце Чифтесс сжалось. Ей было больно даже думать о том, что имелл ввиду шаман.\n\n- Согласно нашим расчётам, Маркс будет возрождена не в идеальном состоянии. Может, её конечность не будет функционировать, может, неправильно обрастёт мехом. Или же она может ожить, но быть буквально ходячим трупом без мыслей.\n\n- Не смей говорить такое! Если у вас что-то пойдёт не так, вы все за это поплатитесь. Единственная причина, по которой вы живы - ваша польза.\n\n- Да, да. Ох, мы уже дошли до территорий святилищ. Дальше проход открыт только шаманам-старейшниам. мы сообщим, когда будут результаты.\n\nЧифтесс явно нервничала. Она наблюдала, как ящик со святым трупом исчез за стенами, ограждающими храмовую префектуру, после чего галопом помчалась в свою юрту и начала чтение молитв на древнеякском перед портретом Маркс."
 yac.10.a:0 "Я буду молиться за Тебя."

 yac.11.t:0 "Воскрешение, часть II"
 yac.11.d:0 "Последние несколько часов Чифтесс не покидала юрты и повторяла молитвы, ожидая хоть каких-то вестей. Казалось, прошли годы, как снаружи послышался голос посла, который сообщил о том, что для Шейяк и всего революционного дела есть хорошие новости. И для Чифтесс не нужно было повторять дважды.\n\nДобравшись до территорий святилищ, она абсолютно проигнорировала данный ранее запрет на вхождение. Миновав главные ворота, она мчалась к храму, и когда прибыла туда, увидела множество шаманов в ритуальных одеждах, собравшихся вокруг алтаря. В воздухе витал аромат горных трав, а от алтаря влиась тонкая струйка дыма. Похоже на жертвоприношение. Но самое важное было на самом святилище, взор на который для Чифтесс был заблокриован толпой шаманов, которые продолжали стоять молча, даже когда вбежала посторонняя.\n\nКазалось, они впвли в транс, сохраняя полную тишину. Чифтесс, пересиливая усталость от бега, тоже постаралась издавать как можно меньше шума. И в этой тишине она услышала чьё-то дыхание. Кого-то, кто был на шаманском алтаре. Старейшины расступились перед Шейяк, открывая вид на Неё.\n\nОна была чиста, как ранний снег холмов. Она дышала, но непохоже, что была в сознании. Чифтесс преклонилась, что сделали и остальные шаманы. Приглядевшись, Шейяк убедилась, что это точно та пони, чей портрет сопровождал её уже не первый год.\n\n- Этому телу нужно время, чтобы адаптироваться к возвращению в бренный мир. - Прервал тишину предводитель старейшин, - Её внутренние и внешние органы восстановлены, но её сознание всё ещё проходит через перенос. До тех пор она должна быть под нашей охраной.\n\nУфорс немного подумал, но понял, что бессмысленно останавливать ту, кто имела смелость ворваться в храм в самый разгар ритуала.\n\n- Я смогу приходить сюда?\n\n- Хорошо. Но не беспокойте её до момента пробуждения."
 yac.11.a:0 "Скоро Она очнётся, так?"

 yac.12.t:0 "Воскрешение, часть III"
 yac.12.d:0 "Последнюю неделю Чифтесс провела в храме Крикхе, практически не покидая его. Внутри храм был объят полумраком, но свечи, хотть и немного, но развеивали его. Все пять дней она следила за тем, чтобы Маркс не пострадала и проснулась в самых благоприятных условиях. Также для большей безопасности по периметру вокруг храма были организованы патрули вооружённых солдат.\n\nСама Маркс была помещена в самую тёплую часть храма - в усыпальню. Шейяк старалась находиться рядом с ней постоянно, и даже в ночь не смыкала глаз, чтобы никакая угроза не разрушила всё, к чему якри стремились. Но пока Маркс не могла оценить усилия Чифтесс, ведь все эти пять дней она провела во сне и не очнулась. Чифтесс регулярно проверяла пульс и сердцебиение, но не осмеливалась беспокоить Маркс, как ей указали шаманы.\n\nПериодически шаманы тоже навещали Святую. По их словам, с телом Маркс всё в полном порядке, а её разум почти перешёл из духовного мира в наш. Но не все шаманы разделяли той же надежды, которая була у Чифтесс. Одним из сомневающихся был шаман Сигурд.\n\n- Как думаете, всё пойдёт по плану? - спросил Сигурд у Чифтесс, смотря на спящее тело единорога.\n\n- А вы сомневаетесь? Вы не должны сомневаться. Всё пройдёт так, как должно быть. Иначе вы же сами от этого и пострадаете.\n\n- Я имел ввиду однють не успех воскрешения - в нём я не сомневаюсь. Вы ведь уже проводили политическую пропаганду, так? Благодаря образу "Карамель Маркс, которая является реинкарнацияей Великого Хана", вы собрали много сторонников. Но я считаю, что народ ожидает от Маркс... другого. Как думаете, сколько яков поверит в то, что эта маленькая хрупкая пони - действительно та, кто им нужен?\n\nЧифтесс взглянула на Маркс, чьё тело жило, но ещё не имело разума. Затем вновь взглянула на Сигурда. - Вы не имеете права сомневаться в святости Маркс. Никто не имеет. Несогласные будут расценены как вероотступники революции. И если вы понесёте ваши мысли в массы - вы станете первым, на кого Маркс обрушит свой гнев."
 yac.12.a:0 "Она невинна и чиста, как утренняя степь."

 yac.13.t:0 "Воскрешение, Финал"
 yac.13.d:0 "Кажется, это было на девятый день после Ритуала. Чифтесс продолжала нести свой пост, исполняя священную миссию по сохранению Маркс. С каждым днём тепло её тела всё больше усиливалось, а сейчас Чифтесс заметила то, чего она ждала, казалось, всю жизнь.\n\nМаркс, укрытая одеялом, на несколько мнгновений перестала дышать. Сначала Чифтесс запаниковала, но затем она услышала глубокий выдох, отличавшийся от привычного ей сопения. Шейяк пригляделась, и увидела, как закрытые глаза Маркс начали подрагивать, а её ресницы медленно отлипли друг от друга. Смотря на это, Чифтесс не могла собрать свои мысли воедино. Ей казалось, что она сейчас видит благословеное чудо, и это чудо, после стольких дней ожидания, медленно открывало свои очи.\n\nМаркс приоткрыла свои глаза наполовину за несколько секунд, но Чифтесс они казались вечностью. Сначала Маркс смотрела на Шейяк, а затем медленно оглянулась вокруг. Выражение её мордочки укащывало на то, что Маркс находилась в смятении. Она не переставала осматривать Чифтесс и полумрачное, но тёплое помещение, в котором пробудилась. Наконец, она заговорила.\n\n- Где я?..\n\n- Вы в безопасности, товарищ Маркс. - Чифтесс пыталась скрыть слёзы счастья, но от её ответа пони, по какой-то причине, явно лучше не стало. Полминуты они сидели в неудобной тиине, смотря друг на друга, одна - с верой и надеждой, другая - со страхом и недопониманием. В голове Маркс крутилось множество вопросов, и она сама не знала, что следует спросить, а что нет.\n\n- Кто ты и почему я здесь?\n\nЯк преклонилась перед Маркс, прочитала короткую молитву на древнеякском, что заставило пони попятиться от неё на кровати.\n\n- Вы чем-то недовольны? Что я сделала не так? Каждый день я взывала к вам, как ваша самая преданная слуга. Неужели до вас не дошли мои молитвы?\n\n- Х-хватит говорить чепуху! Что тебе от меня нужно? Почему я здесь? Почему я... я...\n\nВ голове Маркс возникло лишь больше вопросов, чем ответов. И один возникший вопрос словно ударил громом."
 yac.13.a:0 ""Кто я?""

 yac.14.t:0 "Лидерство божества"
 yac.14.d:0 "Два существа молча смотрели друг на друга в полупрозрачном помещении храма. Одна из них не могла поверить в то, что только что услышала, а другая не могла понять, зачем она здесь.\n\n- Вы... вы не знаете, кто вы? Нет, невозможно. Вы должны хотя бы помнить меня. Я - та, по чьей инициативе мы вернули вас. Вы же помните? Там, в измерении духов, вы должны были услышать мои молитвы. Тепло моих слов должно было согревать ваш дух, разве нет? - Карамель Маркс продолжала смотреть на Чифтесс. - Разве нет? Я оказалась недостойной? Почему вы меня отвергате? Вы хоть знаете, сколько яков погибло ради вас?!?\n\nВ порыве гнева, Шейяк повысила свой голос, из-за чего выражение Маркс сменилось на ужас. И Чифтесс это заметила, продолжив монолог уже полуподавленным тоном.\n\n- Нет... Всё в порядке. Как я посмела это сделать? Должно быть, память о прошлом не вернулась с телом. Но я оскорбила вас. Я оскорбила весь мой род. - Як достала пистолет и дрожа приставила дуло к виску. - Нет мне прощения.\n\n- Стой!\n\nКрик Маркс привёл Чифтесс в чувство. Повиновавшись приказу, та с улыбкой убрала оружие.\n\n- Вы хотите, чтобы я жила? Это... это... - Глаза Чифтесс заблестели от влаги, - это то, чего я ждала всю жизнь. Я обещаю... под правлением вашим наступит истинный коммунизм. То, к чему мы все стремимся. Карамель Маркс, реинкарнация Великого Хана, лидер пролетариата... Вы согласны править родом яков?\n\nМаркс молча кивнула в ответ.\n\n- Отлично, товарищ Маркс. С этого момента я передаю вам полномочия председателя Первой Якской Коммунистической партии свободного государства [ROOT.getname]. Я помогу вам в вопросах правления. Но это потом. Сейчас нужно сообщить шаманам о вашем пробуждении. Затем вы сможете выйти в народ, словно святой проповедник.\n\n- У-гум."
 yac.14.a:0 "Краткость - сестра таланта. Гениально, товарищ Маркс!"

 yac.15.t:0 "Проблемы нового тела"
 yac.15.d:0 "Маркс начала свою новую жизнь в храме Матхан Крикхе, и с момента пробуждения не покидала его два дня. Как сказал священник, тело пробуждённого может выйти на свет только на третий день разумного существования. Маркс не знала, что это значит. И её это особо не волновало. Она не выходила из усыпальни, где очнулась, и контактировала лишь с Чифтесс, когда та заносила еду. Она боялась местных священников, хотя и Чифтесс до сих пор опасалась не меньше. Из-за этого Шейяк старалась сократить время взаимодействия, чтобы позволить разуму Маркс окрепнуть.\n\n---- Утро четвёртого дня. ----\n\nВ этот раз Чифтесс зашла раньше обычного. Маркс ещё лежала в кровати, повернувшись к стене. Похоже, она уже не спала, хотя нельзя утверждать, что она вообще спала эти три дня.\n\n- Как вы себя чувствуете, Хан? Как ваши сны? Уже прошло три дня, и вы можете выйти на свет.\n\n- Кажется, ночь прошла хорошо. Не помню, чтобы были сны. И, ещё...\n\nВсё ещё лежа в кровати, Маркс повернулась к Чифтесс.\n\n- Мне, наверно, кажется, но всё ли в порядке с моим...\n\nЭто было ужасно. Чифтесс испуганно ахнула и отправилась звать шаманов на помощь. Через минуту в усыпальню прибыл старейшина. И он сразу понял в чём дело.\n\nМаркс, казалось, была в порядке, но... Её глаз. Его просто не было. Вместо глаза зияла дыра, открывающая вид на внутренности черепа. На подушке Маркс обнаружилось странное красноватое пятно.\n\n- Чтож. Всё прошло не идеально. Но это и не худший исход.\n\n- Что вы имеете ввиду? Почему вы допустили, чтобы с Маркс случилоась ТАКОЕ?\n\n- Спокойно. Худший исход - это оживление безмозголго трупа без чувств и мыслей. Маркс смогла вернуться в этот мир, но, как я сказал, не в совершенном состоянии. Память о прошлом - это цена, которая была заплачена, и кроме того... Маркс будет исчезать. По сути, она должна быть трупом. По законам мироздания, конечно же. Но мы нарушили эти законы. Мы вернули жизнь в мёртвое тело, которое обросло плотью и кровью, но наше мироздание не принимает этот факт. В рамках Вселенной, Маркс - это иссохший скелет. Она будет постепенно терять своё тело, поскольку мироздание пытается вернуть нарушенный баланс.\n\n- Что мы можем с этим сделать?\n\n- Способы есть. Мы, шаманы, в них не разбираемся. Но вам просто нужы те средства, при помощи которых вы бы сохраняли самый обычный труп свежим.\n\nДва яка обратили внимание на Маркс. Она была переполнена несколькими эмоциями сразу: страх, шок, злость."
 yac.15.a:0 "- ЧТО ЭТО ВСЁ ЗНАЧИТ?"

 yac.16.t:0 "Проблемы нового тела"
 yac.16.d:0 "- ЧТО ЭТО ВСЁ ЗНАЧИТ?\n\n- Успокойтесь, восставшая. Вы должны быть благодарны за то, что хотя бы можете дышать. И, судя по всему, вам присущи чуства и эмоции. Вы обязаны благодарить нас, шаманов Матхан К-\n\n- ЗАТКНИСЬ! ЗАТКНИСЬ! ЗАТКНИСЬ!\n\nМаркс обрушила свой гнев на старейшину. Наступила тишина, и Маркс медленно встала с кровати. Оставшийся глаз был широко раскрыт и не моргал.\n\n- Я была мертва?\n\n- Вы не знали об этом?\n\nМаркс издала звук, похожий на смесь нервного смешка и выдоха.\n\n- Уфорс, я думаю, вам стоит оставить нас наедине.\n\nШаман молча покинул усыпальню, захлопнув дверь. Остались только они вдвоём.\n\nЧифтесс села на кровать рядом с Маркс.\n\n- Я не думала об этом. Я не знала. Все три дня я пыталась вспомнить хоть что-то. Я пыталась понять, зачем я здесь. Что такое революция, о которой ты говорила. Не могла уснуть. Все мои попытки впасть в сон были неудачными. Я даже не знаю, когда я лишилась глаза. Я просто этого не почувствовала. Я подумала, что наступившая тьма означает начало сна. Я ошиблась. Зачем я здесь?..\n\nМаркс проговаривала каждую фразу медленно и робко, словно говоря в пустоту. Затем она прижалась к Чифтесс. Шейяк почувствовала влагу на своей шерсти.\n\n- Маркс, вы плачете?\n\n- Н... нет.\n\nМаркс неуверенно отстраниллась. Это действительно были не слёзы. На том месте, куда недавно прильнула Маркс, блестела кровь, вытекшая из зеницы пони.\n\n- Я знаю, вы справитесь, товарищ Маркс. Потому что я верю в вас. Всегда верила. Вместе мы сделаем мир лучше.\n\nВновь наступила тишина. Только настенные факела тихо потрескивали в полумраке.\n\n- Что мы будем делать с телом? Я... я не хочу. Я не хочу пропасть. Я хочу жить, правда.\n\n- Не волнуйтесь. Мы что-нибудь придумаем.\n\nВскоре Чифтесс вышла из помещения и вернулась, принеся чёрную глазную повязку.\n\n- Придётся пользоваться этим."
 yac.16.a:0 ""Я тоже хочу, чтобы ты жила.""

 yac_flavour.1.t:0 "Деиндустриализация"
 yac_flavour.1.d:0 "Наши первые шаги деиндустриализации общества уже начинают приносить успех! Машинные фабрики, работающие на угле, обнаруженные в регионах Улуса, Барадура и Йакистана уже подвергаются сносу. Мы надеемся, что на месте этих машин однажды взрастут поля с пшеницей, и работа в поле, а не работа на фабричного начальника станет основой жизни славного якскоко народа.\n\nК счастью, местные варханы не успели обременить слишком многих работой на заводах. Некоторые потеряют работу, но это не столь страшно, ведь для них всегда есть работа в сельскохозяйственных коллективах."
 yac_flavour.1.a:0 "Агрокультурная революция! Удар!"

 yac_flavour.2.t:0 "Ни богачей, ни бедняков"
 yac_flavour.2.d:0 "Трое яков окружили жилище. Они уже очистили все дома этой деревни от капитала, но только не этот. Владелец дома, пожилой як, использовал своё крупное по размерам жильё как мини-отель для путников, и, конечно, получал за это плату. Трое яков-коллекторов уже второй час пытались добраться до самого богатого яка в окрестностях, но тот отказывался выходить. Лишь изредка он появлялся на балконе, чтобы обменяться парой фраз с коллекторами. И, похоже, он был вооружён.\n\n- Идите прочь! Я не отдам вам ни монеты, проклятые воры!\n\n- Хорвитз, будь ты проклят! Ты понимаешь, что партия может расценивать твоё поведение как измену? Тогда с тобой заговорят уже совсем по-другому, и придут уже совсем другие яки.\n\n- Пусть приходят! Я им надеру задницы, если посмеют меня обворовать! Я всегда был свободен, мой отец и отец отца были свободны. Мы были вольны делать, что хотим, и всё благодаря этому дому! Вы не посмеете отнять его у меня!\n\nСборщики денег потеряли терпение и решили сдаться.\n\n- Если через три дня ты не сдашь все свои сбережения партии... То не жалуйся, что тебя никто не предупреждал.\n\nЯки наконец отправились в другие селения. Через три дня Хорвитз не сдался. Хоть постояльцев и не было, ведь местных лишили денег, он был счастлив, что может жить так, как он захочет.\n\nНо три дня прошло. Его срок истёк."
 yac_flavour.2.a:0 "Ни тиранов, ни господ."

 yac_flavour.3.t:0 "Полюби того, кого нет"
 yac_flavour.3.d:0 "- Как вы считаете, вы владеете древнеякским языком в совершенстве?\n\n- Би та ойлгох боломжтой байх болно илуу их зуйлийг хэлж чадна.\n\n- Ха-ха... Муу биш, дарга аа.\n\nДля реализации плана воскрешения Чифтесс должна была добиться расположения шаманов. Последние несколько недель она занималась визитами в Як Матхан Крикхе - столицу бывшего шаманистского государства. Иногда ей удавалось добиться аудиенции с самим Верховным Шаманом Уфорсом. Они обсуждали политику, вопросы жизни и смерти, иногда общались на отвлечённые темы - всё для того, чтобы Уфорс принял социализм. Но он оказался крепким орешком. Кроме того, он всё ещё недолюбливал Чифтесс из-за того, что та покорила Шаманат Матхан Крикхе.\n\n- Вы знаете, а я не ожидал, что противник, который поднял меч на мои земли, окажется столь образованным. И всё же вы считаете, что нам нужно провести ритуал. Интересно.\n\n- Уфорс, я знаю достаточно, чтобы дать вам совет. Научитесь любви.\n\n- Неожиданно. Что вы имеете ввиду?\n\n- Конечно, я не про любовь в приземлённом смысле. Любовь должна исходить не от сердца, а от разума, ибо разум должен верить. Верить в того, кто вам больше всего дорог.\n\n- И как вы считаете, кто дорог мне?\n\n- Вероятно, Нур-Зул-Гур - якский бог. Но ведь его не существует в нашем мире, и вы считаете, что отдаёте свою жизнь службе ему. Я же люблю Карамель Маркс, ибо моя вера несоизмерима. Однако, сейчас и её не существует. Две несуществующих материи. Почему мы не можем утверждать, что Нур-Зул-Гур и Маркс - это не одно и то же?\n\nУфорс хмыкнул. Чифтесс не смогла понять, было ли это одобрением, насмешкой или упрёком.\n\n- Но согласитесь. Разве можно утверждать, что возродив Маркс, мы не дадим жизнь Нур-Зул-Гуру?\n\nШаамн кивнул головой.\n\n- Я подумаю над вашими словами."
 yac_flavour.3.a:0 "Учир нь тэр л биднийг аварч чадна."
 yac_flavour_2_tt:0 "Он проиграл битву, но смог унести двоих вслед за собой."

 yac_flavour.4.t:0 "Спокойный сон"
 yac_flavour.4.d:0 "WIP"
 yac_flavour.4.a:0 "WIP"

 yac_flavour.5.t:0 "Теперь Она везде"
 yac_flavour.5.d:0 "Совсем недавно рабочие закончили развешивать портреты Маркс в последнем правительственном здании республики Карсакаг, и теперь каждый як мог видеть Её лик. Не обошлось и без небольших "жертв". Портреты вышивались и писались на основе образа, запечатлённого на принадлежащего Чифтесс полотне. Чифтесс никогда не говорила, откуда она достала этот портрет, но одного взгляда на него было достаточно, чтобы понять - это работа мастера. И у яков-художников не всегда получалось точно воспроизвести изображение Маркс, из-за чего общее качество рисунка пострадало. Но свою цель они выполняют. Проходя мимо размещённых портретов, яки кивают в небольшом поклоне, прежде чем пройти дальше.\n\nИ вся эта ситуация сделала Чифтесс особенной, хотя бы по её мнению. Ведь, хоть портеты Маркс и были везде - оригинал был только у неё. И только она может видеть истинный образ, а не искажённое представление. Мысль о своей исключительности добавилась к ней во время прочтения ежедневных молитв перед полотном.\n\n- Я сделаю всё, чтобы они были готовы к Твоему возвращению. И даже неважно, каковы их ожидания по поводу Тебя. У них не будет выбора. Они либо согласятся подчиниться Тебе, либо познают Твой гнев.\n\nЧифтесс мигом взглянула на небольшой пистолет, лежавший в её юрте. Он был заряжен на случай самообороны, но теперь Чифтесс пришла в голову более подходящая перспектива его использования.\n\n- Хотя, нет. Они не стоят Твоих усилий. Они - те, кто не примут тебя. Я позабочусь о них. Я - Твоя самая верная последовательница. Я должна буду это сделать."
 yac_flavour.5.a:0 "В свете свечей, полотно смотрело молча."

