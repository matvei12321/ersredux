 YAC_alt_history:0 "Настоящая история"
 YAC_alt_history_desc:0 "Многие считают, что Карамель Маркс была революционером родом из одной из стран единорогов. Якобы она участвовала в неких северянских революциях, а затем пропала.\nНо это ложь.\nКарамель Маркс была великим ханом. Она объединила якские народы от Вайннипега до Ойт Тщилджина. Она правила великим каганатом в соответствии со своей марксисткой идеей равенства рабочих, расширяя империю пролетария на весь Эквус. В какой-то период она захватила континенты Грифонии и Зебрики, и весь мир сиял в лучах истинного коммунизма. Но завистники и капиталисты разрушили империю рабочих и подло устранили саму Маркс. С тех пор имперские пони и грифоны обрели независимость от яков, а сами яки оказались на пороге эры раздробленности.\nТакова история. Такова истина."
 YAC_holy_portraits:0 "Священные портреты"
 YAC_holy_portraits_desc:0 "Портрет Карамель Маркс должен быть размещён в каждом правительственном здании на самом видном месте. Каждый як должен ежедневно видеть воочию мать революции, чтобы мысль о том, что она вернётся, никогда не покидала никого. Священные портреты всегда должны находиться в идеальном состоянии и регулярно очищаться. Если будет обнаружено, что Её портрет осквернён, это будет приравниваться к государственной измене."
 YAC_communes:0 "Автономные коммунарии"
 YAC_communes_desc:0 "WIP"
 YAC_crusade:0 "Найдите то, что нам нужно"
 YAC_crusade_desc:0 "Шаманы наконец поведали Чифтесс о том, что нужно заполучить для того, чтобы Маркс вернулась в этот мир. Самое время отправить наших яков на поиски."
 
 
 
 ##### IDEAS 
 
 YAC_alt_history_idea:0 "Настоящая история"
 YAC_alt_history_idea_desc:0 "Многие считают, что Карамель Маркс была революционером родом из одной из стран единорогов. Якобы она участвовала в неких северянских революциях, а затем пропала.\nНо это ложь. Наглая и антинаучная.\nКарамель Маркс была великим ханом. Она объединила якские народы от Вайннипега до Ойт Тщилджина. Она правила великим каганатом в соответствии со своей марксисткой идеей равенства рабочих, расширяя империю пролетария на весь Эквус. В какой-то период она захватила континенты Грифонии и Зебрики, и весь мир сиял в лучах истинного коммунизма. Но завистники и капиталисты разрушили империю рабочих и подло устранили саму Маркс. С тех пор имперские пони и грифоны обрели независимость от яков, а сами яки оказались на пороге эры раздробленности.\nТакова история. Такова истина."
 YAC_homeland_of_revolution:0 "Революционное сознание"
 YAC_homeland_of_revolution_desc:0 "Мы, яки Карсагака, приняли революционный образ жизни... нет, мы приняли революционный разум, чтобы нести свободу для нашего народа."
 YAC_homeland_of_revolution_2:0 "Революционное сознание II"
 YAC_homeland_of_revolution_2_desc:0 "Мы, яки Карсагака, приняли революционный образ жизни... нет, мы приняли революционный разум, чтобы нести свободу для нашего народа."
 YAC_primitive_esoterism:0 "Красный эзотеризм"
 YAC_primitive_esoterism_desc:0 "Стоит признать, что мировая революция провалилась. От коммунизма осталось лишь пара социалистических стран, и мы - одна из немногих. Дело Карамель Маркс, которое было начато много лет назад, провалено.\n\n§RНо если мы сможем вернуть её§!..."
 YAC_modern_esoterism:0 "Красный эзотеризм"
 YAC_modern_esoterism_desc:0 "Стоит признать, что мировая революция провалилась. От коммунизма осталось лишь пара социалистических стран, и мы - одна из немногих. Дело Карамель Маркс, которое было начато много лет назад, провалено.\n\n§RНо если мы сможем вернуть её§!..."
 YAC_no_money:0 "Уничтожение денежной валюты"
 YAC_agrarian_industry_idea:0 "Аграрное общество"
 YAC_agrarian_industry_idea_desc:0 "Индустриализация приводит к расслоению общества и появлению такой язвы, как буржуазия. В "Капитале" Маркс написано, что рабочий класс должен подняться на борьбу с буржуазией, но зачем позволять им появляться вообще? Плюнув в лицо дымным фабрикам, мы сделаем так, чтобы буржуазия не появилась никогда. Все будут работать в рамках новой аграрной экономической политики."
 YAC_safety_lar:0 "Обезопасить режим"
 YAC_safety_no_lar:0 "Обезопасить режим"
 YAK_commissars:0 "Красные комиссары"
