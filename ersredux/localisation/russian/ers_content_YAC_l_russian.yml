 ##### PARTIES

 ##### CHARACTERS
 YAC_marx_leader:0 "Карамель Маркс, великая хан пролетариата"
 YAC_chieftess_desc:0 ""Хуч чадал тэвчээр бэйна. Та миний дуудлагыг сонсож, хулээн авахын тулд би ямар ч сорилтыг тэсвэрлэхэд бэлэг байна, Маркс! Хийк зуйл маш их байна..."\n\nЧифтесс начинала как простой як-партизан, которой были близки идеи свободы и всеобщего равенства. Нет точных данных, когда и в какой обстановке она познакомилась с трудами Карамель Маркс, но они оказали на неё мощнейшее влияние. Она вдохновилась на великую борьбу - борьбу не просто за свободу пролетариата... а за что-то большее, что-то светлое.\n\nСражаясь среди партизан против йякистанских националистов, Чифтесс добилась признания и стала лидером небольших территорий в Шитедгасаре. Затем она возглавила наступление на Карсакаг. Это была кровавая битва, но клика Шейяк вышла победителем, освободив важный город от тирании хана Брэдфорда. Тогда южная часть ханства оказалась отрезана от столичного Керех Давсага, и коммунисты добили разрозненные группы йяков. Чифтесс предпринимала попытку наступления на Керех Давсаг, но была вынуждена подписать договор о перемирии, как и другие ханства яков. Но это всё-таки значит, что остальные варханы признали Социалистическую Республику Яков как полноценного противника, и Чифтесс с нетерпением ждёт, когда сможет завершить революционный поход. Но одним Керех Давсагом он точно не ограничится..."
 
