 change_marks_portrait_desc:0 "Изменить портрет Карамель Маркс"
 yac_marx_search_tt:0 "Наши агенты начнут поиск останков Карамель Маркс в этом регионе.\n\n£alert_texticon_icon §gЧем больше регионов мы исследовали, тем выше шанс успеха поисков§!.\n"
 
