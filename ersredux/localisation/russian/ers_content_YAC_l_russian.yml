 ##### NATIONAL FOCUS
 
 YAC_war_win:0 "Сокрушительная победа революции"
 YAC_war_win_desc:0 "Мы победили! Красный Хан Чифтесс привела нас к победе! Теперь пора приступить к подготовке настоящей революции."
 YAC_basis_of_communism:0 "Основы коммунизма"
 YAC_basis_of_communism_desc:0 "Свобода и равенство. Рабочий класс больше никогда не будет страдать."
 YAC_basis_of_new_society:0 "Основы нового общества"
 YAC_basis_of_new_society_desc:0 ""
 yac_basis_of_new_society_tt:0 "Разблокирует решения §Yполитических чисток§!"
 YAC_equal_property:0 "Общая собственность"
 YAC_equal_property_desc:0 ""
 YAC_shamans:0 "Шаманизм"
 YAC_shamans_desc:0 "Для общения с духами революции мы используем своих шаманов, но главные цели, которые мы преследуем... могут осуществить только шаманы Матхан Крикхе. Они не должны пострадать ни под каким предлогом. Чтобы обеспечить их безопасность, следует держать их под охраной, пока они не согласятся сотрудничать с нами."
 YAC_party_propaganda:0 "Партийная пропаганда"
 YAC_party_propaganda_desc:0 ""
 YAC_spread_marks_personality:0 "Насколько велика Её личность"
 YAC_spread_marks_personality_desc:0 "Мы не знаем, какая Маркс была при жизни. Но мы точно можем сказать, что Она уважала якскую культуру и была превосходным лидером.\nК сожалению, о существовании такой яркой личности знают не многие яки. Нужно рассказать всем о ней."
 YAC_religion:0 "Народная вера в Неё"
 YAC_religion_desc:0 "Дух Маркс соизволит сойти в наш мир, только если мы будем верить в Неё. Ни богов, ни господ, ибо только Маркс может называться Богом."
 YAC_spread_marks_books:0 "Книги, что написала Она"
 YAC_spread_marks_books_desc:0 "Карамель Маркс написала величайшую книгу в истории - 'Капитал'. На самом деле, это единственная книга, которая должна распространяться среди народа. Не лживое 'Учение Барадура', не еретические письмена якрунцев, а священный 'Капитал'.\nВсякий, кто будет обнаружен читающим или имеющим любую литературу, кроме 'Капитала', будет наказан, а та книга - сожжена."
 YAC_agrarian_industry:0 "Сельское хозяйство"
 YAC_agrarian_industry_desc:0 "Индустриализация приводит к расслоению общества и появлению такой язвы, как буржуазия. В "Капитале" Маркс написано, что рабочий класс должен подняться на борьбу с буржуазией, но зачем позволять им появляться вообще? Плюнув в лицо дымным фабрикам, мы сделаем так, чтобы буржуазия не появилась никогда. Все будут работать в рамках новой аграрной экономической политики."
 YAC_burn_moneys:0 "Уничтожить деньги"
 YAC_burn_moneys_desc:0 "Деньги - основа капитала, капитал - основа губительной рабской системы. Мы будем бороться с капиталистической системой, уничтожая денежную валюту."
 YAC_religious_colkhoz:0 "Религиозные колхозы"
 YAC_religious_colkhoz_desc:0 "Наша задача - объединить яков для повышения производительности, и это будет реализовано через создание коллективных хозяйств. Аграрная работа в поле плечом к плечу с товарищами - вот что может сплотить простых граждан."
 YAC_nationalisation:0 "Национализация кустарной промышленности"
 YAC_nationalisation_desc:0 "WIP"
 YAC_more_red_guns:0 "Больше красных бабахал"
 YAC_more_red_guns_desc:0 "WIP"
 YAC_miners_villages:0 "Основать шахтёрские посёлки"
 YAC_miners_villages_desc:0 "WIP"
 YAC_no_class_utopy:0 "Бесклассовая утопия"
 YAC_no_class_utopy_desc:0 "У каждого рабочего есть свои потребности, и никто не должен уйти обиженным. В нашем славном государстве начнётся строительство истинного коммунизма, в котором каждый як сможет чувствовать себя связанным единой целью даже с высшими членами ПЯКП."
 YAC_sheyak_pyramid:0 "Пирамида Шейяк"
 YAC_sheyak_pyramid_desc:0 "У каждого рабочего есть свои потребности, которые нужно удовлетворить, и эту задачу берёт на себя государство. Но невозможно угодить всем и сразу, поэтому Шейяк разработала особую социальную пирамиду, в соответствии с которой определённые категории граждан будут получать больше привелегий в нашем обществе, чем другие. На вершие пирамиды стоят жрецы и члены Генерального Совета ПЯКП, в середине - простые рабочие, а в самом низу - бывшие преступники, дезертиры, тунеядцы и иностранцы, которые не принесли особой пользы для государства [ROOT.getname]."




 
