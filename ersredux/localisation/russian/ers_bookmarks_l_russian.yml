 PGS_GATHERING_STORM_DESC:0 "Лишь год назад закончилась последняя гражданская война, а в воздухе уже витает новая. Ни один пегас из-за уверенности в своих идеалах никогда не согласится на компромиссы, даже если это грозит разрушением внутренней стабильности в стране. Именно так, проливая кровь своих сородичей, жили племена пегасов всю свою историю, и так в войнах закалялась сталь.\nНа этот раз власть в стране захватила военная фракция во главе с блестящим фельдмаршалом Андреасом Харрикейном, но чёрно-красные знамёна угнетённых угрожающе реют на горизонте. Но кто знает, может этот сомнительный период мира продержится ещё какое-то время... или же пегасы навсегда утонут в потопе собственной жестокости?"
 ERP_GATHERING_STORM_DESC:0 "Пандория - страна земных пони, которая управляется религиозными организациями, но так было не всегда. Когда-то давно, ещё до Великого Переселения пони, Пандория имела прототип демократического государства. Но полноценная республика не успела реализоваться, так как религия уже играла слишком большую роль в жизни пони, и народ находил защиту не в основах правового государства, а в молитвах и благословениях.\nНо времена меняются, и сама Пандория должна измениться и отказаться от теократии, чтобы уверенно шагнуть в будущее. Тем более, сам народ ждёт перемен..."
 UNC_GATHERING_STORM_DESC:0 "Юникорния - страна чудес. По крайней мере, так о ней говорят иностранцы, которые никогда здесь и не бывали.\nЮникорнийская династия Платинум, в отличие от пегасьей династии Неос, за многие поколения не пострадала и ни разу не попадала в кризис, наоборот: королевство всегда считалось центром стабильности не только Эквуса, но и всего мира. И нынешний король, Эрнест Платинум... справляется. Как и при его всех предшественниках, общество счастливо.\nНе считая инцидентов в Северяне, Филлидельфии, Пранции и усилившегося националистического движения "Союз Национального Очищения"."
 ers_CHN_GATHERING_STORM_DESC:0 "Земли чейнджлингов объяты раздором. Королева Кризалис, хотя и формально короновала себя Верховной Королевой, в действительности не имеет и малой части власти над другими Ульями.\nЭпоха войн между ульями закончилась лишь несколько лет назад, но... Закончилась ли она по-настоящему?"
 ers_NGC_GATHERING_STORM_DESC:0 "Двадцать лет прошло с назначения Крайгера на пост губернатора Нуво Грифоники и начала модернизации. За двадцать лет страна смогла стать промышленным центром всего Юго-Запада и догнать многие передовые державы мира. С такими феноменальными успехами Крайгер готов переходить к следующей части своего плана под названием: "Объеденение Юга"\nВпрочем за ширмой успехов находится печальная картина. Нынешний Губернатор не более чем марионетка местных военных у которых уже давно возник кризис касаемо будущего развития государства, а хваленная индустриализация обошлась не только жизнью рабочих, но и зависимостью Нуво Грифоники от чейнджлингов. Лишь абсолютная власть Дреслера и его монополия над промышленностью и армией позволяют держать Нуво Грифонику в относительной стабильности и порядке.\nСтанет ли в будущем Нуво Грифоника ядром новой империи или последней страницей в истории колонистов Грифонии? Покажет лишь время "
 ers_VRX_GATHERING_STORM_DESC:0 ""Востань Вракс! И пусть грянет буря!"  \n\nМного лет прошло с последней войны между ульями, и пока победили пируют и празднуют победу, Вракс помнит! Мы помним былые унижения и позор. Мы поним ту ноч, когда мать Аргиннис была вероломно убита Кризалис. Мы помним и никогда не забудем! И пока другие королевы подобно стаду идут за Кризалис, мы боремся за своё существование, и выживание нашего народа. Уподобится ли Вракс феникусу, или окончательно потухнет под своих амбиций-покажет лишь время"

 ers_YAK_GATHERING_STORM_DESC:0 "Формально яки жили в изоляции под руководством принца, но на деле каждое мини-государство (ханство) занималось своими делами. Когда Нова Грифония со своими колониальными амбициями вторглась в эти земли и нанесла сокрушительное поражение якам, эти ханства начали во всём обвинять своих соседей, что со временем вылилось в кровавую вражду.\nКогда Нова Грифония второй раз предприняла попытку захватить якские земли, то народ яков, видя смертельную угрозу, объединился и отбил нападение.\nНо барабаны войны ещё не утихли. Якам предстоит... решить вопрос об объединении и навсегда изгнать наглых котоптиц."
 
 
 ROK_GATHERING_STORM_DESC:0 "WIP"
 ers_CRY_GATHERING_STORM_DESC:0 "WIP"
 PRA_GATHERING_STORM_DESC:0 "Пранция была независимым государством, удерживающим уверенные позиции одной из могущественных единорожьих стран. Но из-за трагического стечения обстоятельств, Пранция пришла в упадок. В ходе хаоса и смуты войска Юникорнии вошли на территорию королевства, чтобы "обезопасить пранцузский народ". После этого вмешательства Пранция практически утратила независимость, а также многие земли.\nИ эти события многолетней давности давно не дают покоя реваншистам..."
 LYC_GATHERING_STORM_DESC:0 "Ликтида - промышленный улей Гегемонии Чейнджлингов. Его цель - снабжать другие ульи древесиной, сталью и прочими ресурсами, но, похоже, что у королевы Ауранции другие планы.\n\nВ последнее время в Ликтиде наблюдается увеличение темпов милитаризации экономики. Что бы это могло значить?"
 VRX_GATHERING_STORM_DESC:0 "WIP"
 SRF_GATHERING_STORM_DESC:0 "WIP"
 LOS_GATHERING_STORM_DESC:0 "Лас-Пегасус - государство-изгой, которое отклолось от Племён Пегасов во время одной из многочисленных гражданских войн. Идея создания страны с демократией в таких условиях кажется не очень разумной, но на удивление, это сработало. Пока племена пегасов постоянно восстанавливались и опять впадали в затянутые внутренние войны, республика Лас-Пегасуса продолжала относительно спокойно выживать.\nНо новому лидеру республики кажется, что народ Лас-Пегасуса в лице бежавших аристократов, монархистов и некоторых рабочих был слишком пассивен всё это время. Нужно решить вопрос тиранов метрополии раз и навсегда."
 STL_GATHERING_STORM_DESC:0 ""Это моё последнее сообщение всем выжившим. На юге северянских коммун лежит чрезывчайно тоталитарное и почти эзотерическое общество эква-\n(АНТИОБЩЕСТВЕННЫЙ ЭЛЕМЕНТ УСТРАНЁН В СООТВЕТСТВИИ С НАРОДНОЙ ВОЛЕЙ ПРОСВЕТИТЕЛЬНИЦЫ. ПОДГОТВАЛИВАЕТСЯ НОВЫЙ ТЕКСТ.)\n"Та-ак, должно быть что-то такое: "Коммунизм! Коммунизм! У нас много коммунизма! Покидайте фашистские концлагеря лже-социалистов! Идите к нам!" Нет, это не подойтёт. Стоп, штука того жеребца всё ешё записывает? Как её отключить...""
 CLT_GATHERING_STORM_DESC:0 "Разврат, пьянство, алчность, убийства - и это не полный список грехов, ежедневно совершаемых в Додж-Сити. Здесь нет власти или какого-то подобия порядка.\nЗападнее находится небольшой городок Эпплуза. В нём ситуация немного лучше: его хотя бы можно считать пригодным и относительно безопасным для жизни.\n\nЭти земли абсолютно недееспособны как государство и о расширении не может быть и речи, только если не произойдёт настоящего чуда."
 UNP_GATHERING_STORM_DESC:0 "WIP"
 NEI_GATHERING_STORM_DESC:0 "Среди джунглей юго-восточного Эквуса раположилось великое множество племён фестралов, не покорённых прогрессом Севера. Каждое из них стремится сохранить свою независимость, но напряжение в регионе поднимают такие племена, как воинственная Рабовладельческая Республика Чилчотль, жестокие Разорители и фанатичное племя Нейгуа.\nНейгуа - фестралы, возводящие поклонение Солнцу в абсолют. В то время, как другие племена, верующие в соляризм, обычно ведут умеренную политику, Нейгуа стремятся навязать свою веру каждому фестралу. И ситуацию не делает лучше тот факт, что племя, поклоняющееся Солнцу, соседствует с племенем, поклоняющимся Луне... Жрецы Нейгуа под видом "дипломатической миссии" до сих пор пытались сохранить подобие мира между двумя племенами, но продлится ли этот мир долго?"
 ers_HRZ_GATHERING_STORM_DESC:0"   Герцланд—одно из самых крупнейших и могущественных государств, центр грифоньего континента. Образованное как центр новой Имперской Федерации в 828 году, он остается им до сих пор. Столица Герцланда—Грифенхейм, стоящая на сплетение огромнейших рек на континенте, является торговым гигантом городов, которые не стоят на берегу. Грифштрайткрефте считаются самой сильной армии не только в Грифонии, но и в истории. Научный прогресс движется огромными шагами, а огромное количество ресурсов половины континента, делают, не только Герцланд, но и всех членом Имперской Федерации самыми богатыми странами...\n\n   Все эти слова были про прошлый Герцланд, про прошлую Имперскую Федерацию...сейчас это лишь яркая, но угасающая звезда всей Грифонии, 130 лет мира и сотрудничества, просто загнали всю Имперскую Федерацию в стагнацию, из которой ее может выгнать только сильное потрясение, однако...переживет ли Имперская Федерация такое? Кайзер Гровер 6 стареет с каждым днем и совсем скоро может отправится к Борею, сможет ли эрцгерцог Гровер 7 вывести Имперскую Федерацию из кризиса и решить одну из главных проблем—огромный разрыв доходности населения, из-за чего по всей Имперской Федерации начинаются коммунистические волнения, хотя в Герцланде больше всего? Большой вопрос..."
 GUA_GATHERING_STORM_DESC:0 "Куатликуэ. Государство столь малое, что сразу и не найти на карте, но под оболочкой маленького, племенного государства скрывается нечто ужасное и прекрасное в тоже время. Государство охваченно уже многие годы настоящей бойней между тремя партиями. Партией военных "Хунта шести племйн" во главе с генералом Адалардом, партией коммунистов "Красное знамя" во главе с Гуальни, и конечно же нейтрали "Племенной совет" во главе с Иксацином.\n\nБудущее этой страны столь туманно, а когда в небе веет отсутствие средст к существованию и возможность получить эти деньги быстрым и "безопасням" путём становится и вовсе не по себе"
 HOR_GATHERING_STORM_DESC:0 "Племена Белокопытных пережили множество невозгод и радостей. Множество взлётов и падений, но они всё ещё здесь, всё ещё на карте мира. Их история не ясна и мало кто её помнит, НО !\n\nИх вождь Ойравика Медное Сердце осознала этот ужасный факт и сделает всё, что в её силах, чтобы лично понять историю Белокопытных и лишний раз убедиться в том, что сохранение страого и традиций, это единственный выход ! Или же нет ?"
 
 MNH_GATHERING_STORM_DESC:0 ""Нельзя создать государство исключительно с помощью денег!", говорили они. Чтож. Флим и Флем (тм) в очередной раз доказали, что c помощью капитала можно сделать всё, что угодно!"
 