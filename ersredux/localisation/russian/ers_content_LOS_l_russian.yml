 #### EVENTS
 
 los.1.t:0 "Надежда"
 los.1.d:0 "- Вы уверены, что именно... он?\n\nЛидеру республики наконец прислали фото и информацию об истинном наследнике голубой крови. Но результат оказался... не совсем тем, что он ожидал.\n\n- Мистер Орион, мы сами перепроверили все факты по несколько раз. Да, этот пегас возраста пятнадцать лет жил и воспитывался в крестьянской семье. Но его принадлежность династии неоспоримо подтверждает этот королевский указ, который мы нашли.\n\nОриону показали документ с королевской печатью и подписью. Амидис работал в канцелярии короля много лет, и лучше других знал, как определить подлинность монаршей печати. Сомнений нет - это не подделка.\n\nВ документе король излагает свои мысли о грядущем мятеже. Он словно знал, что грядёт катастрофа для его рода, и приказал эвакуировать нескольких его детей в отдалённые от столицы поместья лояльных дворян. В этом и был весь указ. К сожалению, вышеупомянутые поместья вместе с наследниками династии Неос были сожжены в ходе революции, но один из сыновей Неоса попал в крестьянскую деревню в регоне Аркедонии при неизвестных обстоятельствах. Местные крестьяне, увидев королевский экипаж, напали на него и разграбили, но обнаружили совсем юного жеребёнка. Они спасли его, приютили и воспитали, как родного. Но несмотря на то, что королевский документ был прямо перед ним, Орион сомневался.\n\n- Мы всё ещё можем ошибаться. Один из признаков принадлежности к династии Неос - родимое пятно в форме звезды на шее, оно...\n\n- Присутствует, мистер Орион. Вы, кажется, устали. Не утруждайтесь, мы, монархисты, возьмём того жеребца под свою защиту и ответственность. Это настоящий праздник для нас..."
 los.1.a:0 "Новый луч света"
 
 los.5.t:0 "Новая конституция"
 los.5.d:0 "Наше республиканское-тире-роялистское правительство способно защитить свои идеалы, но до сих пор мы оказывали покровительство только пегасам. В последнее время остро стоит вопрос создания новой конституции, которая, по сути, ыбла бы просто сбором наших прошлых законов, но в ней бы все права принадлежали не только пегасам, но и единорогам и земным пони.\n\nОднако, не все монархисты поддерживают столь демократичную идею. Они предлагают признать, что другие пони имеют базовое право на жизнь, имя и так далее, но пегасы будут иметь больше привелегий.\n\nНекоторые вообще недовольны предложением о создании нового закона и не хотят, чтобы грязные земные пони и эгоистичные единороги стояли на одном правовом положении, что и пегасы."
 los.5.a:0 "Всепони, вперёд!"
 los.5.b:0 "Мало демократии не бывает."
 los.5.c:0 "Чтобы земной пони равнялся тому, кому подвластно небо? Фу!"
 
 los.6.t:0 "Обучение"
 los.6.d:0 "Новый наследник был воспитан крестьянами - и поэтому монархистам нужно было... перенастроить его образ мышения. Обучить основам управления, принципам монархической власти. Лидер республики, как бывший глава королевской канцелярии, мог бы в этом сильно помочь.\n\nСогласен ли Орион принимать участие в обучении Кристофера основам управления?"
 los.6.a:0 "Да"
 kris_will_get_political_bonus:0 "§YНаследник§! получит §Gдополнительный бонус§! в §C5% к приросту политической власти.§!"
 los.6.b:0 "Нет"
 
 los.7.t:0 "Предложение сотрудничества"
 los.7.d:0 "Наши ожидания оправдались - после победы Демократического движения в Пандории свергнули диктатуру теократии, а текущий лидер, земная пони Сильва Хоупстар, кажется, не против того, чтобы сотрудничать с другимим расами. Должны ли мы предпринять попытку сотрудинчества?"
 los.7.a:0 "Пошлите Сильве письмо с предложением о взаимной обороне."
 los.7.b:0 "Мы справимся со своимим проблемами в одиночку."
 
 los.8.t:0 "Предложение сотрудничества"
 los.8.d:0 "После победы на выборах Сильва стала немного более суетливой, чем раньше. Пока она привыкала к своему рабочему кабинету и обустраивала его так, чтобы его интерьер подходил статусу кабинета правителя демократической страны, она совсем забыла проверить письма, адресованные ей.\n\n- Аргх, да что это такое...\n\nСильва быстро начала проверять почту, привезённую за несколько предыдущих дней. И среди похдравлений с победой от близких и писем с угрозами от неприятелей, она нашла официалное письмо от республики Лас-Пегасус. В нём Орион Амидис, глава республики,предложил Сильве заключить пакт взаимной обороны - "Демократический блок", чтобы защищать интересы друг друга против внешних угроз."
 los.8.a:0 "Ура! Новые друзья!"
 los.8.b:0 "Мы справимся со своимим проблемами в одиночку."
 
 los.9.t:0 "Пандория соглашается"
 los.9.d:0 "Сильва Хоупстар наконец прислала ответное письмо - она соглашается на формирование альянса. Наши страны уже открыли друг другу границы."
 los.9.a:0 "Отлично!"
 
 los.10.t:0 "Пандория отказывается"
 los.10.d:0 "Сильва Хоупстар наконец прислала ответное письмо - она не согласна на формирование альянса."
 los.10.a:0 "Досадно."
 los.10.b:0 "К чёрту земных пони! Мы сами сможем защитить себя!"
 
 
