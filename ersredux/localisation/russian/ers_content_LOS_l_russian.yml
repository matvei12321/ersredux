 LOS_national_republicans_desc:0 "Некоторые из тех пегасов, что поддерживают идею свободы и анти-стратократической системы, придерживаются идей национализма и превосходства пегасов, а некоторые из них и вовсе настолько радикальны, что чуть ли не призывают к свержению нашего "слабого режима".\nВ любом случае, мы - правильные демократы, а они - неправильные."
 LOS_food_problem:0 "Пустые хранилища"
