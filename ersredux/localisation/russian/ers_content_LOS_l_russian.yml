 LOS_monarch_cat:0 "§3Лос Пегасус§! - монархисты"
 LOS_monarch_cat_desc:0 "Монархисты, сбежавшие в Лас-Пегасус, стремятся восстановить прежнюю династию и вернуть монарха на трон правителя единых пегасьих земель. В отличие от оставшихся в Пегасополисе единомышленников, они не столь воинственны и жестоки и предпочитают иметь влияние на решения монарха.\n\n£small_crown_icon §GОчки легитимности нашего монарха:§! §Y[?LOS.los_legicimicy_point]§!\n\nЗа каждое очко легитимности:\n +5% прироста к политической власти\n +1% стабильности\n +1% поддержки войны\n +0.5% лимита капитуляции\n\nПомимо изменения количества очков, параметры наследника могут быть изменены §Yсобытиями§! и §Yрешениями.§!"
