failure_red_army:0 "Провал Красной армии"
failure_red_army_desc:0 "Мы претерпели слишком много поражений и потярели половину страны, но великая революция во главе с дорогим вождём товарищем Альтидией не может так просто завершиться. Мы должны извлечь уроки из наших промашек."
prepare_weapons:0 "Заготовить оружие"
prepare_weapons_desc:0 "Победа в войне может быть достигнута только силой оружия. Не хватает только лишь одних людей, им нужно дать столько винтовок, сколько мы сможем. И чтобы патронов хватило всем!"
infrastructure_projects:0 "Инфраструктурные проекты"
infrastructure_projects_desc:0 "Инфраструктура - кровь любого государства. Решено, пока у нас есть время на передышку, проложить такую инфраструктуру, чтобы наши бойцы могли наступать без остановки."
propaganda:0 "Пропаганда"
propaganda_desc:0 "Причинами поражений была недостаточная заинтересованность простых людей. Следует лучше и тщательнее разъяснять им суть советской власти и тогда мы сможем победить!"
here_and_now:0 "Здесь и сейчас"
here_and_now_desc:0 "У нас нет времени на раскачку. Нам нужны винтовки здесь и сейчас. Поэтому долгосрочным проектам мы вынуждены предпочесть краткосрочные кустарные заводы."
compromiss:0 "Единство Партии?"
compromiss_desc:0 "Товарищ Альтидия постепенно угасает после покушения на её жизнь, но ни одна из фракций не нашла себе достаточно силы, чтобы победить все остальные. В таких условиях провозглашённое партийное единство не более чем прикрытие для постоянных междоусобиц."
conditions:0 "Раздоры"
conditions_desc:0 "Даже смерть товарища Альтидии не сплотила высшее партийное руководство - в постоянных склоках и грызне ни одно постановление не может быть принято или исполнено. Вся советская власть висит на волоске."
after_conditions:0 "Это есть наш последний..."
after_conditions_desc:0 "Состояние партии и Революции вызвало окончательное разочарование в СНК и Политбюро у председателя ВЧК Вайноса Костылева. При поддержке генерала Лунина силы ВЧК и армии совместно арестовали всех этих болтологов и объявили о возвращении к делу Альтидии."
keep_polya:0 "Аудиенция"
keep_polya_desc:0 "Товарищ Серов, давний друг вождя Альтидии, смог добиться выступления дорогого вождя, хоть и в лежачем положении, но на съезде партии. Товарищ Альтидия, предварительно ведшая диалог с Синистером, обрушилась с критикой на товарища Пантюшенко за грубость и перегибы в работе, порекомендовав снять того с поста Генерального Секретаря, что и было единогласно принято."
new_leaders:0 "Опора на Поньсомол"
new_leaders_desc:0 "Многие партийцы - яростные лоялисты Пантюшенко и несмотря на его опалу они продолжают сохранять ему верность. Но у товарища Серова есть другой план: поднять поньсомольцев. Пусть молодёжь обрушивается с постоянной критикой в газетах, выступлениях, митингах, взывая к кадровым перестановкам. Синистер будет опираться на молодых!"
after_new_leaders:0 "Радикальный поворот"
after_new_leaders_desc:0 "Партия имеет слишком много власти и это сыграло злую шутку. После смерти вождя Альтидии товарищ Серов был избран Председателем СНК и под его давлением должность Генерального секретаря была отменена, партия вернулась к коллективному правлению, а полномочия Председателя СНК были значительно расширены."
purge:0 "Чистки!"
purge_desc:0 "Пока товарищ Альтидия, чьё здоровье сильно ухудшилось после покушения, сильно недомогает сторонники Пантюшенко решили обвинить в заговоре против вождя Альтидии и, следовательно, в покушении на неё различных беспартийных политиков, которые ранее отказались вступать в компартию и поддержать Альтидию, но из двух зол выбрали красных, а не белых."
elections:0 "Создать Верховный Совет"
elections_desc:0 "Товарищ Альтидия в коме, но никто не должен об этом узнать. Пока наш великий вождь ещё не умерла, нам следует упрочнить власть, чтобы потом не случилась смута: ЦИК и Съезд Советов будут объединены в единый орган, который теперь будет избираться на всеобщем тайном голосовании от членов коммунистической партии, которую возглавляет товарищ Пантюшенко."


