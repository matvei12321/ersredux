 l_russian:
 
 LOADING_TIP_0:0 "Эти свято веры из Пандории думали, что возможно существование мутанта, обладающего одновременно признаками величественного пегаса, грязного земнопони и единорога. Неудивительно, что их в конечном итоге свергли.\n- Верховный командующий Андреас Харрикейн"
 LOADING_TIP_1:0 "Покайтесь в грехах своих, ибо все мы однажды предстанем перед Страшным Судом.\n— Проповедь священника в Святом Царстве Пандории"
 LOADING_TIP_2:0 "Я разнесу всех соседей и буду безраздельно править якскими землями!\n— Обычный як-военачальник"
 LOADING_TIP_3:0 "Я бы предпочёл избавиться от недовольных вместо того, чтобы вести с ними переговоры.\n— Андреас Харрикейн"
 LOADING_TIP_4:0 "СМЕРТЬ\nВсем, кто посягнёт на свободу простого народа!\n— Пропаганда пегасов-коммунистов"
 LOADING_TIP_5:0 "???\n— ???"
 LOADING_TIP_6:0 "Мы познаем счастье только тогда, когда во всём мире воцарится вечный мир.\n— Флаттершай"
 LOADING_TIP_7:0 "Катастрофический пиз... набор событий.\n— Единорог-рассовед при изучении истории пегасов"
 LOADING_TIP_8:0 "Это моя винтовка. В мире есть много винтовок, но эта - моя.\n— Пегасий солдат"
 LOADING_TIP_9:0 "Дайте войне шанс!\n— Член Союза Национального Очищения Юникорнии"
 LOADING_TIP_10:0 "ВОССЛАВЬТЕ КОШМАР\n— Пропаганда Чёрной Троицы"
 LOADING_TIP_11:0 "Красота - страшнейший грех.\n— Понифер Валентайн"
 LOADING_TIP_12:0 "Согласитесь, невозможно победить в споре с голосами в своей голове.\n— Понифер Валентайн"
 LOADING_TIP_13:0 "Никто же не осмелится применить оружие столь разрушительной мощи, и все будут жить в мире.\n— Флаттершай, после получения отчёта после завершения расчётов ядерного взрыва"
 LOADING_TIP_14:0 "Смотрю в зеркало и думаю: какой же я базированный в этих очках.\n— Голд Маффин"
 LOADING_TIP_15:0 "Эх, была б жакетка, а в ней брюнетка... всё остальное - трын-трава!\n— Неизвестный пегас-анарохокоммунист"
 LOADING_TIP_16:0 "И неслась неудержимо, с гривой чёрного коня\nанархическая сила наступающего дня!\n— Из песни пегасов-анархокоммунистов"
 LOADING_TIP_17:0 "Давайте, товарищ, женимся.\n— Локальная шутка пегасов-анархокоммунистов"
 LOADING_TIP_18:0 "Хаос - весело. Шизофрения - не лечится.\n— Дискорд про Понифера Валентайна"
 LOADING_TIP_19:0 "Глупцы! Вереницей неудач вы все обрекаете себя на неизбежную смерть!\n— Понифер после свержения власти своего культа"
 LOADING_TIP_20:0 "Каждая раса пони уникальна, это точно. Но это совсем не повод убивать друг друга.\n— Джет Сет о радикальном национализме"
 LOADING_TIP_21:0 "Весалиполис требует подчинения, но делает это без уважения.\n— Чейнджлинги Дитрисиума"
 LOADING_TIP_22:0 "Мы сможем держать оборону от полугода до года. Сверх этого психика наших солдат не выдержит.\n— Бэд Крауч о войне с Додж-Сити"
 LOADING_TIP_23:0 "Иногда лучше не знать ничего, чем знать хоть что-то.\n— Вольный путешественник, побывавший в Додж-Сити"
 LOADING_TIP_24:0 "Как можно желать смерти кому-либо? Сколько злости должно быть в таком пони?\n— Флаттершай"
 LOADING_TIP_25:0 "Тик-так, тик-так.\n— Сара Твайборицкая"
 LOADING_TIP_26:0 "Почему небеса отвергнули нас в самый тёмный час?\n— Последние слова священника Пандории перед казнью"
 LOADING_TIP_27:0 "Они просто паразиты, как и все остальные не-единороги.\n— Террорист из СНО оправдывает массовую казнь грифонов"
 LOADING_TIP_28:0 "Может быть, мы сможем договориться с ними? \n— Флаттершай"
 LOADING_TIP_29:0 "Оставьте меня. Королю нужен временный покой.\n— Эрнест Платинум"
 LOADING_TIP_30:0 "Наш судьба зависит от нашего стремления сеять фантасмагорию по нашему телу, и, по-моему, в частной причинности.\n— Понифер Валентайн"
 LOADING_TIP_31:0 "Тебя зовут Аянями Рей."
 LOADING_TIP_32:0 "Представьте мир, в котором все три расы пони живут в единой стране, в мире и гармонии! Дивный мир, не правда ли?\n— Из "Гармонического эквестрийства""
 LOADING_TIP_33:0 "Добавить немного скорости...\n— Артонен Анто"
 LOADING_TIP_34:0 "Ладно, признаю, военные преступления веселят меня.\n— Андреас Харрикейн"
 LOADING_TIP_35:0 "Нам не нужны самолёты, идиот. У пегасов уже есть крылья!\n— Андреас Харрикейн"
 LOADING_TIP_36:0 "Я хочу перерезать ей глотку и смотреть в её бездонные глаза в ночной тишине.\n- Понифер Валентайн" 
 LOADING_TIP_37:0 "Расы пони должны объединиться под властью одного лидера, одного государства. И тогда чёртовы грифоны, олени, жуки - все они узнают, что такое настоящая сила!\n— Сторонник фашистского эквестрийства"
 LOADING_TIP_38:0 "Союз Национального Очищения признан террористической организацией на территории Юникорнии по указу Его Величества. Мы не одобряем и осуждаем их действия."
 LOADING_TIP_39:0 "Грифония - мертвецы из Лиги Ужаса, Эквус - демоны-умбрумы. Даже если нам кажется, что всё спокойно, у нас и наших собратьев всегда много работы.\n— Рыцарь Ордена Света"
 LOADING_TIP_40:0 "Все одно, п*ни дрисня\n— Владимир Язов, авторитетный комментатор из Союза Мододелов (ВК)"
 LOADING_TIP_41:0 "Не верьте цитатам из интернета: они могут быть исключительно фейковыми.\n— Владимир Ленин"
 LOADING_TIP_42:0 "Я спрашиваю вас: вы хотите тотальной индустриализации?\n— Эпплджек"
 LOADING_TIP_43:0 "В отличие от многоуважаемой королевы Кризалис, я не считаю, что есть "высшие" и "низшие" расы. Просто некоторые... Заслуживают уничтожения.\n— Королева Ауранция"
 LOADING_TIP_44:0 "Одно сверх государство может удерживать два континента и не распадаться несколько лет, хотя это будет бюрократический, административный и культурный ад. Но три континента...\n— Отрывок из "Аргументов против глобализма""
 LOADING_TIP_45:0 "Вся нечистая сила пирует в моей голове.\n— Понифер Валентайн"
 LOADING_TIP_46:0 "Я благословлён. Я вечен!\n— Дормамансер"
 LOADING_TIP_47:0 "И на руинах старого мира мы создадим социалистический рай.\n— Голд Маффин"
 LOADING_TIP_48:0 "Грифоны и пони никогда не могут жить вместе в обществе.\n— Пикет Фенс"
 LOADING_TIP_49:0 "И-и-и-и-и-и-и-и-и-и!\n— Боевой клич фестралов"
 LOADING_TIP_50:0 "Я обожаю свою жизнь. В этом Бореем забытом месте. Да...\n— Губернатор Крайгер"
 LOADING_TIP_51:0 "Кошмар! Наша страна находится в катастрофическом положении дел... в погребах не осталось пранцузского вина.\n— Пранц ле Шорс"
 LOADING_TIP_52:0 "— Почему ле Шорс пьёт столько вина?\n— Герцог пранцузский приболел, а как известно, при болезни нужно больше пить.\n— А не от того ли он приболел, что много пьёт?"
 LOADING_TIP_53:0 "У грифонов. Нет. Прав.\n— Жан Дарм Ранодель"
 LOADING_TIP_54:0 "§YЯ ВЗЫВАЮ К НЕБЕСАМ И С ДРОЖЬЮ НАБЛЮДАЮ, КАК БЛЕСК ТЫСЯЧ МОЛНИЙ ОСЛЕПЛЯЕТ МОИХ ВРАГОВ.§!\n— Книга Последней Молитвы Сернера, 17:2"
 LOADING_TIP_55:0 ""Я клянусь сражаться за нашего короля, за славу нашего народа и нашу древнюю историю."\n— Из клятвы юникорнийского спецназа "Хуфсфорс""
 LOADING_TIP_56:0 "Вы никогда не разочаруетесь от того, что ваши мечты не сбылись, если вы никогда не будете мечтать.\n— Старлайт Глиммер"
 LOADING_TIP_57:0 "Каждый день - праздник, если вы научились действовать и жить, как все.\n— Старлайт Глиммер"
 LOADING_TIP_58:0 "У нас каждый день - как сказка! Если вы голодны, напуганы, приходите в Наш Город! У нас есть еда и тёплая одежда.\n— Пропагандистский плакат эквалистов"
 LOADING_TIP_59:0 "Нельзя просто... взять и уравнять всех.\n— Синистер Серов об идеях Старлайт Глиммер"
 LOADING_TIP_60:0 "Разве победа достанется нам?\n— Антивоенный лозунг марионеточной Пранции"
 LOADING_TIP_61:0 "Править страной, полной идиотов, не так уж и сложно, но крайне утомительно.\n— Мундаунер"
 LOADING_TIP_62:0 "В современном мире нужно критическое и атеистическое мышление, а кто-то всё ещё молится высшим силам. Что же, я бы посмотрел на то, как боги срывают оковы капитализма.\n— Мартис Лютер"
 LOADING_TIP_63:0 "Кем бы ты ни был, что с тобою стало... не так уж важно, ни тебе, ни мне."
 LOADING_TIP_64:0 "Все безумства хороши.\n— Понифер Валентайн"
 LOADING_TIP_65:0 "Я думаю, что друг, это тот... кто равен мне.\n— Гриффит, "Белый Пегас""
 LOADING_TIP_66:0 "Ни одна война не сможет определить, кто прав.\n— Жозеф Искандер"
 LOADING_TIP_67:0 "Я не умру в одиночестве. Нет, я вообще не умру никогда.\n— Понифер Валентайн"
 LOADING_TIP_68:0 "Нация земных пони должна стать осью мирового коммунизма! Хайль Пандория!\n— Товарищ Маузер"
 LOADING_TIP_69:0 "Я клянусь, что стану чище и добрее\nИ в беде не брошу друга никогда."
 LOADING_TIP_70:0 "Слышу голос и спешу на зов скорее\nПо дороге, на которой нет следа..."
 LOADING_TIP_71:0 "Я не управляю волей других - я лишь вдохновляю массы на великие свершения.\n— Старлайт Глиммер"
 LOADING_TIP_72:0 "Я не знаю, что произойдёт со мной, если я зайду на их территорию. Никто оттуда не возвращался.\n— Житель Северянских Коммун об Эквалистском Сообществе"
 LOADING_TIP_73:0 "Пегасы Поньолда заявляют о своей исключительной культурно-национальной уникальности и объявляют независимость от всяких других держав.\n— Хъорда Буревестница официально объявляет о независимости Поньолда" 
 LOADING_TIP_74:0 "Всё, что построено оленями - это грязь, мерзость, оно должно быть уничтожено.\n— Королева Ауранция"
 LOADING_TIP_75:0 "Мои мысли и действия совершенно безоблачны. Я действую в интересах моего народа и во имя справедливости.\n— Королева Ауранция"
 LOADING_TIP_76:0 "Регентские правительства никогда не приводят к чему-то хорошему.\n— Розье Маферри"
 LOADING_TIP_77:0 "Почитали бы "Гармонический эквестризм" от Виктории Оурен, стали бы чу-уточку умнее.\n— Маркус Фэйлвей, сторонник гармонического эквестрийства"
 LOADING_TIP_78:0 "Однажды, клянусь, что однажды я создам вечный двигатель. И не буду я знать сна и покоя, пока меня не постигнет озарение того, как же мне осуществить эту мечту.\n— Тесла Чарм"
 LOADING_TIP_79:0 "Магия? Хмф! Хоть я и единорог, но я бы не стала сильно на неё полагаться.\n— Твайлайт Спаркс, младший помощник Теслы Чарм"
 LOADING_TIP_80:0 "— Мой дедушка говорит, что, когда народы пони сильно-сильно поссорятся, мы все замёрзнем. Это правда?\n— Дурак твой дед.\n— Разговор жеребёнка и взрослого земного пони"
 LOADING_TIP_81:0 "Все они (пегасы-воины) - убийцы и свиньи. А мы, мля, революционеры!\n— Элеферий "Красное Пламя""
 LOADING_TIP_82:0 "Для мирного населения война никогда не поменяется.\n— Товарищ Маузер"
 LOADING_TIP_83:0 "Ради веры мы живём и умираем.\n— Инквизитор Расс"
 LOADING_TIP_84:0 "Твои глаза выглядят иначе. Клянусь, они светились раньше.\n— Понифер Валентайн"
 LOADING_TIP_85:0 "Цель всегда оправдывает средства.\n— Данглар Хуфстронг"
 LOADING_TIP_86:0 "ЧТО БЫЛО - ТО БУДЕТ, ЧТО БУДЕТ - ТО БЫЛО.\n— Королева Спектр"
 LOADING_TIP_87:0 "Пары дыма на фабрике ценнее и полезнее чистого воздуха. Поэтому наши заводы не должны иметь вентиляционных систем.\n— Эпплджек"
 LOADING_TIP_88:0 "Я не хочу сделать свою расу идеальной. Я просто ненавижу её такой, какая она есть сейчас.\n— Торакс"
 LOADING_TIP_89:0 "Мы свергнем кровавый режим олигархов и спасём расу земных пони!\n— Товарищ Маузер"
 LOADING_TIP_90:0 "Будем одобрять мы всячески погромы\nА на остальное просто наплевать!\n— Из народной песни пегасов-анархокоммунистов"
 LOADING_TIP_91:0 "Что я сделаю, когда анархисты захватят власть? Буду наслаждаться жизнью на полную катушку, пока не помру.\n— Элеферий, лидер пегасов-анархокоммунистов"
 LOADING_TIP_92:0 "Что будет с теми фермами? Мы снесём их. Сожжём, если нужно. Фермеры останутся нищими изгоями без ничего, а мы на месте их ферм построим заводы. Таков капитализм.\n— Эпплджек"
 LOADING_TIP_93:0 "Следите за уровнем мировой напряжённости. Кто знает, что может произойти, когда она достигнет ста процентов."
 LOADING_TIP_94:0 "Следите за уровнем мировой напряжённости. Кто знает, что может произойти, когда она достигнет ста процентов."
 LOADING_TIP_95:0 "Я НЕНАВИЖУ ГРИФОНОВ Я НЕНАВИЖУ ГРИФОНОВ Я НЕНАВИЖУ ГРИФОНОВ\n— Жан Дарм Ранодель"
 LOADING_TIP_96:0 "На поле боя смерти всё равно, кто перед ней - простопони, дворянин или монарх. Неудачникам суждено умереть.\n— Гриффит, Белый Пегас"
 LOADING_TIP_97:0 "Я считаю, что Рай и Ад - это одно и то же.\n— Понифер Валентайн"
 LOADING_TIP_98:0 "Я приношу в жертву... себя!\n— Королева Спектр"
 LOADING_TIP_99:0 "Откуда мы? Из Пранции. Где мы живём? В Пранции. Кто наши сторонники? Все они пранцузы. В чём заключается наша работа? Мы работаем на пранцузский народ.\n— Жан Дарм Ранодель"
 LOADING_TIP_100:0 "Какую бы дичайшую хуйню вы ни творили, всегда найдутся те, кто поддержит её.\n— Элеферий "Красное Пламя""
 LOADING_TIP_101:0 "Я могу представить лишь несколько более серьёзных угроз для рода единорожьего, чем угроза чейнджлингов. Хищники, обладающие интеллектом и хитростью, и они существуют с единственной целью - размножаться в огромном количестве и сеять полный хаос на своём пути.\n— Жан Дарм Ранодель"
 LOADING_TIP_102:0 "Мы попадём в Вальгаллу, а они просто сдохнут.\n— Королева Кризалис об оппозиции"
 LOADING_TIP_103:0 "Высшая и самая характерная черта ликтидианцев - это чувство справедливости и жажда её.\n— Королева Ауранция"
 LOADING_TIP_104:0 "Я могу стать Богом, который вам нужен.\n— Цакламант Покоритель"
 LOADING_TIP_105:0 "Он Флим! Он Флем! Мы всемирно известные братья Флим и Флем, и наши пушки просто разнесут вам мозги!\n— Слоган F&F (TM)"
 LOADING_TIP_106:0 "Когда капитал вернётся к нам, ура, ура!\nМы встретим его с тёплыми объятиями, ура, ура!\n— Из Гимна Мейнхеттенской Торговой Федерации"
 LOADING_TIP_107:0 "Я рисую на картине смерть луны на гильотине,\nСолнца крик под выстрел пушек, я люблю свои игрушки.\n— Фезер Бенгс"
 LOADING_TIP_108:0 "Ой,\nВесь мир сломался.\n— Фезер Бенгс"
 LOADING_TIP_109:0 "Под моим пером сейчас возникнет правда.\n— Фезер Бенгс"
 LOADING_TIP_110:0 "Мои мысли - это отмычка, а за дверью застрелился кто-то.\n— Фезер Бенгс"
 LOADING_TIP_111:0 "Убивайте всех! Оправдывайте убийства особой тяжести! Пропагандируйте каннибализм! Жрите дерьмо! Вот мои политические взгляды.\n— Гримуара"
 LOADING_TIP_112:0 "Это... город, которого нет.\n— Юго-западный географ о Додж-Сити"
 LOADING_TIP_113:0 "...It makes no difference who we are \n- When we have wished upon a black star..."
 LOADING_TIP_114:0 "130 лет мира - это слишком много\n — Неизвестный грифон"
 LOADING_TIP_115:0 "В хороший день и подружиться хорошо\n — Твайлайт Спаркл"

 ###


 ###