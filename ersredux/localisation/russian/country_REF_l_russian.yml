    ###Страна###
    REF:0 "Речная Федерация"
    REF_DEF:0"Речная Федерация"
    REF_ADJ:0"Речн.Фед."
    
    ###Альянс###
    river_coalition_union:0 "Речная коалиция"
    
    ###Персонажи###
    REF_Pumpkin_swirl:0"Президент Памкин Свирл"
    REF_Zeren:0"Зерен"
    REF_Zeren_desc:0"Торговец, бизнесмен-министр экономики Речной Федерации. Месторождение данного зебры доподлинно не известно, однако первые упоминания о нем появились еще в 950году, как торговец с мало  известных  земель Зебрики. В 959 Зерен оседает в относительно независимой части Речной Федерации Казе. В городе Фирпорт он основывает свою компанию и начинает быструю и успешное расширение своего бизнеса по всей Речной Федерации. В 967году   Зерен был известен как президент Казы, однако доподлинно, так и не известно каким образом он выиграл президентские выборы. В 969году народ Казы, прочувсвтвовал всю боль иметь президента торговца-промышленника. В 975году Зерен извесетен среди народа Речной Федерации, как беспринципный-промышленник и коррупционер в этом же году он становится министром Речной Федерации. Далее его история не блещет ничем, кроме как постоянных осад в судах и вечных баталий с коммуническими элементами(в том числе прибывающих из Имперской Федерации) в Речной Федерации. В 1007году Зерен так же является министром экономики Речной Федерации, а его компания "Зерен-Индастриз", так же всеми мыслимыми и не мыслимыми способами продолжает свое расширение."
    REF_Estern:0"Эстерн"
    REF_Estern_desc:0"Пони выросший в бедных районах крупного города Речной Федерации Светиграда. Рожден в 970году, родных не знал вырос в приюте. В 980 году сбежал из приюта в поисках знаний(Эстерн всегда завидовал пони и не только им,  поскольку они умели грамотно писать и считать.). В этом же году Эстерн попадает к доброму старцу-грифону, который взял его под свое крыло, он отметил его способность к учебе и усвоения знаний. В 985 году Эстерн  под крылом старца заканчивает всю школьную программу Речной Федерации, так же сразу же поступает в университет Речкограда на политологический факультет. В 990году успешно заканчивает университетскую программу и так же поступает на второе образование педагога, которое экстерном заканчивает в 986году всю программу. После он работает след. 5 лет в учебных заведениях, постоянно отмечая что образование в Речной Федерации на сверх низком уровне.  В 992году он вступает в правящую партию утопизма речной Федерации. С 1000года является министром образования Речной Федерации."
    REF_Ulf_Indor:0"Ульф Индор"
    REF_Ulf_Indor_desc:0"Рожден в 960году г. Речкоград. Выходец из семьи потомственных военных. В 980году вступает в вооруженные силы Речкой Республики, участник подавления мятежей в Грифийской Сечи 984года. Не коррупционер. В 990 году заканчивает свою службу в звании генерал-майора. В 994году основывает партию UfA - Союз для Всех. Данная партия, так же придерживается идеалов Карфинской демократии, с некоторыми поправками. На президентских выборах не побеждал. "
    
    ###Нац. духи###
    unstable_federation:0"Нестабильная Федерация"
    unstable_federation_desc:0"Хотя Речная Федерация была образована в 925 году с посредничества Имперской Федерации, единой она была лишь в центре и на востоке, а в остальном лишь на бумаге. Во внешних же регионах Федерации набираются сепаратисткие настроения."
    unstable_federation1:0"Нестабильная Федерация"
    unstable_federation1_desc:0"Хотя Речная Федерация была образована в 925 году с посредничества Имперской Федерации, единой она была лишь в центре и на востоке, а в остальном лишь на бумаге. Во внешних же регионах Федерации набираются сепаратисткие настроения."
    unstable_federation2:0"Нестабильная Федерация"
    unstable_federation2_desc:0"Хотя Речная Федерация была образована в 925 году с посредничества Имперской Федерации, единой она была лишь в центре и на востоке, а в остальном лишь на бумаге. Во внешних же регионах Федерации набираются сепаратисткие настроения."
    unstable_federation3:0"Нестабильная Федерация"
    unstable_federation3_desc:0"Хотя Речная Федерация была образована в 925 году с посредничества Имперской Федерации, единой она была лишь в центре и на востоке, а в остальном лишь на бумаге. Во внешних же регионах Федерации набираются сепаратисткие настроения."
    unstable_federation4:0"Нестабильная Федерация"
    unstable_federation4_desc:0"Хотя Речная Федерация была образована в 925 году с посредничества Имперской Федерации, единой она была лишь в центре и на востоке, а в остальном лишь на бумаге. Во внешних же регионах Федерации набираются сепаратисткие настроения."
    unstable_federation5:0"Нестабильная Федерация"
    unstable_federation5_desc:0"Хотя Речная Федерация была образована в 925 году с посредничества Имперской Федерации, единой она была лишь в центре и на востоке, а в остальном лишь на бумаге. Во внешних же регионах Федерации набираются сепаратисткие настроения."
    bad_industry:0"Слаборазвитые регионы"
    bad_industry_desc:0"Практически вся промышленность Речной Федерации сосредоточена в центре - речной Республике, промышленность во внешних же регионах оставляет желать лучшего."
    beacon_utopism:0"Маяк Утопизма"
    beacon_utopism_desc:0"Речная Федерация является единственной крупной страной придерживающейся Утопических идей, а точнее, Карфинской демократии."
    army_republic:0"Армия республики - децентрализовано"
    army_republic_desc:0"В Речной Федерации армия не централизована. Еще с объединения в 925году было установлено, что обороной каждого региона, вошедшего в Федерацию, будет заниматся армия того гос-ва, которое вошло в Федерацию."
    guardians_federation:0"Хранители Федерации"
    guardians_federation_desc:0"Нимбусия- это одна из первых стран желающих основания Речной        Федерации, и первые кто встали на оборону Федерациии в целом, и Карфинской демократии в частности. Нимбусия всегда славилась проффесионализмом своих боевых частей и еще ни разу не подвели Федерацию."
    fleet_federation:0"Флот Федерации"
    fleet_federation_desc:0"Флот Федерации представляет из себя малочисленные корабли Нимбусии и крупный флот Бакары, однако правительство вошедшей в Федерацию Бакары так и не выдало контроль над флотом единому правительству Федерации. Объесняется это тем, что в бакарской	 войсковой структуре флот является частью армии."
    corruption_kaza_ref:0"ОЭЗК"
    corruption_kaza_ref_desc:0"Особая экономическая зона Каза дает приятные пополнения в бюджет, обратной сторонй данной медали является то, что нам нужно терпеть этого старикашку Зерена."
    corruption_kaza:0"ОЭЗК"
    corruption_kaza_desc:0"Каза является особой экономической зоной. Через нее проходит вся торговля Речной Федерации с континентом Зебрика. Находится под управление зебры Зерена - торговца из Зебрики."
    bespredel_oleny:0"Гражданские беспорядки"
    bespredel_oleny_desc:0"Земли Эйстрланда были спокойны многие годы. Но, некоторое время назад на них массово прибывали беженцы с континента Зебрика. В итоге это привело к массовым гражданским столкновениями между корреными жителями и беженцами."
    proletariat_problem:0"Рабоче-коммумнистические митинги"
    proletariat_problem_desc:0"По всей промышленной зоне Речной Федерации идут полномастабные рабочие митинги и забастовки."
    finance_police:0"Увеличенное финансирование полиции"
    finance_police_desc:0"Отчаяные времена, требует серьезных мер!"

    ###Ивенты###
    REF.1.t:0"Сводка, часть 1 - Речная Федерация"
    REF.1.d:0"На данный момент в Федерации намечаются явные сепаратистские настроения во внешних регионах. Подробности ожидайте в последующих информационных сводках."
    REF.1.a:0"Надесь не все так плохо?"
    
    REF.2.t:0"Сводка, часть 2 - Виттенленд"
    REF.2.d:0"На землях Республики Виттенленд наши полицейские силы отмечают явную активность оппозиционной партии, по местным слухам она спонсируется королевской семьей Виттенленда"
    REF.2.a:0"Мелочь, хоть и не приятно"
    
    REF.3.t:0"Сводка, часть 3 - Север"
    REF.3.d:0"На севере Речной Федерация - Республика Бакара, все так же противится политической, экономической и флотской интеграции в единую систему Речной Федерации. Так же замечена незначительная активность островных жуков."
    REF.3.a:0"Хех, рано или поздно они поймут всю силу Дружбы!"
    
    REF.4.t:0"Сводка, часть 4 - Запад"
    REF.4.d:0"На землях Республик Озерград и Депония обнаружена действие неизственой силы. На данный момент однако за ними ничего противозаконного не замечеено. На землях республики Псов на данный момент все спокойно."
    REF.4.a:0"Серьезная новость, однако вдруг сборище старых друзей?"
    
    REF.5.t:0"Сводка, часть 5 - Юго-Запад"
    REF.5.d:0"На землях Люши все спокойной, хотя и происходят редкие митинги. В противовес этому земли Каивской Республики, уже который год там происходят митинги, восстания и прочие сепаратистские действия. Так же на границе в Грифусом замечене переброска войск."
    REF.5.a:0"Ситуация серьезна, обязательно подниму этот вопрос на сьезде!"
    
    REF.6.t:0"Сводка, часть 6 - Юг"
    REF.6.d:0"В ОЭЗК(Особая Экономическая Зона Каза) все без изменений, там все так же процветает коррупция и компания этого клятого зебры Зерена. В Барраде же, все спокойно хотя чем занимаются эти маги откровенно не понятно и это заставляется напрягатся. В протекторате Оленей все так же творится черт пойми что."
    REF.6.a:0"Как бы закончить с ними веми А!?"
    
    REF.7.t:0"СРОЧНОЕ СООБЩЕНИЕ!!"
    REF.7.d:0"Президент Памкин! Срочная информация! Что случилось? - Практически на всех фабриках в центральной части Федерации вспухнули массовые беспорядки, митинги и уже дошло до кровопротилия!Рано или поздно это должно было случится. Пора созывать экстренное заседание совета!"
    REF.7.a:0"Пора действовать!"
    
    REF.8.t:0"ПОКУШЕНИЕ НА МИНИСТРА ПРОМЫШЛЕННОСТИ"
    REF.8.d:0"Сегодня в пригороде Речкограда на министра промышленности, зебру Зерена во время его инспекции в фабричный район было совершенно покушение! Со слов очевидцев покушение устроил неприметный пони в форме работника фабрики. Полиция отказывается давать какие либо комментарии, кроме того, что нападавший скорее всего состоит в коммунистической-рабочей партии. Как сообщает официальный представитель мистера Зерена, министр не пострадал."
    REF.8.a:0"Так ему и надо!"
    
    REF.9.t:0"Внезапное письмо"
    REF.9.d:0"Госпожа президент Памкин Свирл извещаю вас, что я министр промышленности зебра Зерен слагаю с себя возложенные на меня полномочия с 975 года. Так же извещаю, что я остаююсь на посту прездиента ОЭЗК."
    REF.9.a:0"Проблемой меньше!"
    
    REF.10.t:0"Внезапня встреча"
    REF.10.d:0"Речкоград. Вечером дома министра образовая Эстерна. \n\n-Приветствую вас, господин Эстерн.-сказал Неизвестный.  \n\n-Кто? Как вы проникли в мой дом? И что вам нужно!?-произнес Эстерн. \n\n-Кто я? Это не так важно. Проникать это моя специализация, однако это тоже не важно. Меня просили передать вам, господин минист образования, что вам не следует появлятся на следующем собрании парламента. \n\n-И почему же?-грозно спросил Эстерн. \n\n-О, все просто. Вы будете убиты, однако убивать вас не хотят - вы хороший пони, посему повторяю, покиньте пост министра образования или это может привести к грустны, для вас последствия. А теперь удачного вам вечера.-встав, произнес Неизвестный и удалился из дому. \n\n-Какая, нехорошая ситуация.."
    REF.10.a:0"Сяду писать письмо.."
    
    REF.11.t:0"Еще одна отставка"
    REF.11.d:0"Госпожа президент Памкин Свирл извещаю вас, что я министр образования земнепони Эстерн слагаю с себя возложенные на меня обязанности. Сие решение было спровацировано, неспокойной внутри-политической обстановкой страны."
    REF.11.a:0"Это плохо. Очень-очень плохо!"
    
    
    
    ###Фокусы(циганские)###
    REF_focus1:0"Смотр Федерации"
    REF_focus1_desc:0"Очередное заседание парламента прошло отвратительно. Эхх, запрошу ка я еще раз сводку по ситуации внутри Федерации."
    REF_focus2:0"Смотр Федерации продолжается"
    REF_focus2_desc:0"Взглянука я на наш Север, хихик"
    REF_focus3:0"Смотр продолжается - запад"
    REF_focus3_desc:0"На западе Федерации находятся, такие республики как: Озерград, Депония и Республика Псов"
    REF_focus4:0"Смотр продолжается - юго-запад"
    REF_focus4_desc:0"На юго-западе Федерации находятся такие страны, как: Люши и Каивская Республика"
    REF_focus5:0"Смотр продолжается - Юг"
    REF_focus5_desc:0"На юге расположены ОЭЗК(Особая Экономическая Зона Каза), протекторат Эйстюрланд и магократическая Респубика Баррад."
    REF_focus6:0"Только их нехватало!"
    REF_focus6_desc:0"Неожиданная весть: по всей центральной части на заводах начались массовые митинги рабочих!!"
    REF_step2:0"Инспекция имущества"
    REF_step2_desc:0"За своим имуществом всегда нужно следить, иначе и не поймешь, когда оно у тебя пропало."
    REF_step3:0"Игры закулисные"
    REF_step3_desc:0"???-???"
    REF_step4:0"Он нам нужен!"
    REF_step4_desc:0"Пора пригласить страго генерала"
    REF_step5:0"Срочное заседание парламента"
    REF_step5_desc:0"На повестке дня: как нам быть и что нам делать?"
