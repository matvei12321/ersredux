    APL_cultists:0"Набеги культистов"
    APL_cultists_desc:0"Каждое утро начинается с вопроса: кто не проснулся сегодня? Их лица вырезают на деревьях. Их символы — на стенах наших амбаров. Додж-Джанкшен, городок, который мы кормили своими яблоками, стал гнездом смерти. Они идут не за едой. Они идут за нашими жизнями. И с каждым набегом мы теряем не только запасы и пони — мы теряем веру в то, что утро будет мирным."
    
