    ###Ideas###
    ZAU_no_electriacal2:0"Отсутствие электричества"
    ZAU_no_electriacal2_desc:0"В данной стране практически отсутствует электричество и места его произодства, а лампочка большинством жителей страны воспринимается за чудо"
    ZAU_society_disintegration2:0"Праздное аристократство"
    ZAU_society_disintegration2_desc:0"В данной стране возможность быть офицером имеет лишь аристократство, в которое входят грифоны и единороги что показали себя как могущественные маги...Ну, когда-то это было так. Теперь аристократство здесь синоним лени, сам титул передается по наследству, а значит детям аристократов нет смысла напрягаться. Аристократство постоянно устраивает раскошные пиры и гулянки, от чего, естественно, местное население и государство не богатеют, а если еще вспомнить про то, что только аристократы могут быть офицерами, достается и армии..."
    ZAU_army_disintegration2:0"Разложение армии"
    ZAU_army_disintegration2_desc:0"Вслед за офицерами и аристократами солдаты тоже занимаются непойми чем, офицеров все равно нет на постах. Многие солдаты не понимают что они вообще здесь забыли и скорее всего, в случае войны многие просто уйдут домой"
    ZAU_out_industry:0"Промышленность 10 века"
    ZAU_out_industry_desc:0"Промышленность здесь давно устарела"
    
    ###Party###
    ZAU_neutrality_short_start:0"Совет дворянства"
    ZAU_neutrality_long_start:0"§WСовет дворянства§!§W\n--------------------------\n§W"Ратдесаделс" является вторым по важности совещательным органом при Короле. На деле, лишь объединяет всех дворян вокруг Короля, так что дворяне не имеют какой либо власти на государственном уровне.§ \n"
    
    ZAU_fascism_short_start:0"Совет сторонников Хаагенти"
    ZAU_fascism_long_start:0"§WСовет сторонников Хаагенти§!§W\n--------------------------\n§WПри Короле существует специальный совещательный орган, как "Ратдермагиер" в который входит королевская семья, то есть на данный момент Стелла, а так же самые сильные маги, получившие все 4 знака отличия...то есть в данный совет входят всего 6 единорогов и один грифон. Именно они определяют характер внешней и внутренней политики, влияя на Хаагенти, который как известно, не очень интересуется положением дел в государстве§ \n"
    
    ZAU_communism_short_start:0"§RНесуществует!§"
    ZAU_communism_long_start:0"§RНесуществует!§!§W\n--------------------------\n§WОфициально коммунистов здесь нет и правительство даже отказывает признавать что такая идеология вообще существует. Но это все официально, на самом деле все понимают что число коммунистов среди обычного бедного народа§  §Rнеуклонно растет§ \n"
    
    ZAU_democratic_short_start:0"§RНесуществует!§"
    ZAU_democratic_long_start:0"§RНесуществует!§!§W\n--------------------------\nПравительство не признает данную идеологию и считает ее абсолютно странной. Официально этой идеологии просто нет в государстве, но все понимают что официальная позиция не выражает реальную ситуацию§ \n"
    
