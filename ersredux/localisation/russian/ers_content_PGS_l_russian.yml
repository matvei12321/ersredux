 ##### NATIONAL FOCUS
 PGS_warriors_first:0 "В очередной раз"
 PGS_warriors_first_desc:0 "И в очередной раз каста воинов победила крестьян в результате кровавой гражданской войны. Многим кажется, что это - лишь затишье перед очередной бурей, но у нашего лидера, Верховного генерала Андреаса Харрикейна, есть план... реформ, которые закрепят верховенство воинской касты в пегасьем обществе раз и навсегда."
 PGS_warriors_question:0 "Необходимые перемены"
 PGS_warriors_question_desc:0 "Солдаты могут обеспечить порядок, но этого недостаточно. Мы перешли в новый век, и нам нужна идеология и сильные лидеры. Все эти вопросы решит Совет Воинов."
 PGS_monarchy:0 "Монархия"
 PGS_monarchy_desc:0 "Многим не понравится идея восстановления монархии... Хотя бы потому, что последний наследник трона был как раз убит воинами в последней гражданской войне. Мдам. Но! Ещё не всё потеряно. Есть шансы того, что в живых остался как минимум один §Yзаконный§! наследник, и мы найдём его, и мы посадим его на престол."
 PGS_military_trap:0 "Диктатура"
 PGS_military_trap_desc:0 "Андреас Харриркейн показал себя как сильного и по-настоящему достойного лидера. В отличие от прошлых правителей, он может восстановить железный порядок навсегда.\nТак считали все прошлые диктаторы из касты воинов, но он - особенный. У него точно получится."
 PGS_peacemakers:0 "Миротворцы"
 PGS_peacemakers_desc:0 "История показала - ни одна из ранее воюющих фракций воинов, рабочих и монархистов не могла удержаться в качестве правящей слишком долгое время. Их взгляды всегда сталкивались между собой, из-за чего возникали всё новые конфликты. Цель Миротворцев - примирить ненавидящие друг друга стороны, чтобы мир и спокойствие наконец-то пришли в наши земли."
 PGS_smash_the_revolution:0 "Новые методы подавления"
 PGS_smash_the_revolution_desc:0 "Главной ошибкой прошлых правителей было очень мягкое отношение к крестьянскому сброду. Крепостное право всегда было и является естественным порядком вещей, ведь главная цель рабочих - очевидно, работа! Но эти неблагодарные рабы никогда не ценили то, что воины любезно предоставляли им защиту под сильным крылом. Если они не хотят нас уважать, мы их заставим."
 PGS_soldiers_cult:0 "Культ воинов"
 PGS_soldiers_cult_desc:0 "Что может ещё эффективнее закрепить превосходство касты воинов, чем романтизация их образа? В представлении народа "воин" должен стать доблестным защитником слабых, который во имя государства и нации готов пожертвовать собой."
 PGS_hurrikane_cult:0 "Культ личности"
 PGS_hurrikane_cult_desc:0 "Воины избрали достойного лидера, который будет управлять государством пегасов. Чтобы у простого населения не возникло сомнений на счёт правителя, его слава и сила станет одним из основных элементов пропаганды нашего режима."
 PGS_propaganda_vs:0 "Пропаганда опасности революций"
 PGS_propaganda_vs_desc:0 "Революция - опасное явление, и не только для нашей страны. Почему какие-то единороги на Севере взбунтовались, раскололи страну на две части и теперь по своей же вине живут в нищете и в голоде? Сталлионград, отделившись от Юникорнии, показал, что социалистические революции приносят боль и страдания не только мнимым "угнетателям", но и самим рабочим. Именно эту мысль нужно донести до каждого пегаса."
 PGS_reward_for_loyalty:0 "Награда за верность"
 PGS_reward_for_loyalty_desc:0 "Кому-то кажется, что это неправда, но среди крестьян есть пегасы, которые верны касте воинов и согласны со своим низким положением. Хотя такая практика ещё не встречалась в нашем государстве, отныне особенно лояльные правящему режиму крестьяне смогут официально перевестись из рабочего слоя в воюющий. Они будут пополнять нашу армию и помогать нам в нашей диктаторской политике."
 PGS_kills:0 "Массовые показательные казни"
 PGS_kills_desc:0 "Какой самый эффективный способ избавиться от недовольных? Перевешать их! Если мы сможем до них добраться, конечно же."
 PGS_kill_revolution_leader:0 "Смерть одного"
 PGS_kill_revolution_leader_desc:0 "Революция никогда не сможет полностью организоваться простой массой. Лидер движения "Свобода или смерть" достаточно умён и харизматичен, чтобы вести угнетённых крестьян за собой. Устраним его - и без идейного вдохновителя революция остановится сама собой."
 PGS_order_restored_question_mark:0 "Порядок восстановлен?"
 PGS_order_restored_question_mark_desc:0 "Мы сделали всё так, как и планировали. Но всё же по неясным причинам рабочие не возвращаются на фабрики, не восславляют нашего лидера. Несколько групп крестьян дезертировали из сопротивления, но результат не является тем, чего мы ожидали.\nМы просто приложим побольше усилий..."
 PGS_police:0 "Стражи порядка"
 PGS_police_desc:0 "Мы определились с тем, каким будет наш будущий режим. Но как бы превосходно мы не управляли государством, всегда будут находиться те, кто недоволен правительством и просто не хочет соблюдать законы. Чтобы решить эту проблему, нужно создать аппарат подавления - военную милицию, которая будет следить за порядком."
 PGS_cancel_execequtions:0 "Программа поддержки крестьянства"
 PGS_cancel_execequtions_desc:0 "Наша судебная система так абсурдна! Мы уверены, что все "преступники" всего лишь пытаются выжить, но за это получают несоизмеримо жестокие наказания. Все заслуживают второй шанс."
 PGS_but:0 "Отмена неэффективной судебной системы"
 PGS_but_desc:0 ""
 PGS_talks:0 "Переговоры"
 PGS_talks_desc:0 "У наших так называемых "врагов" всё ещё есть чувство доброты и голос разума, даже если они сами так не считают. Нам нужно лишь показать им, что у нас нет никаких злых намерений по отношению к ним. Флаттершай клянётся: ни одна капля крестьянской крови не будет пролита!"
 PGS_talks_ok:0 "Успешное начало сотрудничества"
 PGS_talks_ok_desc:0 "В Лас-Пегасусе, что находится к югу от нас, живут аристократы и могущественные дворяне, которые сбежали из страны. И их можно понять: никому не захочется жить в обществе, где все ненавидят всех. Но наше общество изменилось, и дворяне вновь могут вернуться в мирный дом."
 PGS_our_pegasi:0 "Постулат гармонии"
 PGS_our_pegasi_desc:0 "У Миротворцев всё ещё не было какого-либо кодекса или чёткого свода правил. Это пора исправить! Верховная Командующая составит Постулат миротворцев, опираясь на идеи гармонической идеологии, которая существует за рубежом."
 PGS_peace_propaganda:0 "Распространить идеи"
 PGS_peace_propaganda_desc:0 "Теперь, когда наша идеология чётко сформулирована, пора распространять идею пацифизма и всеобщего взаимоуважения среди всех наших солдат."
 PGS_harmony:0 "Мир и гармония?"
 PGS_black_squads:0 "Чёрные отряды Гардиуса"
 PGS_black_squads_desc:0 "Сторм Гардиус и его Чёрные отряды - одни из самых жёстких и дисциплинированных военных образований, что у нас есть. Их можно внедрить в нашу новообразованную военную милицию для осуществления более жёсткого контроля общественного порядка."
 PGS_white_squads:0 "Сёстры и братья милосердия"
 PGS_step_forward:0 "Шаг вперёд"
 PGS_step_forward_desc:0 "Мы справились. Проблема крестьян решена. Наш мудрый лидер [root.getleader] применил самые эффективные методы борьбы с революционным мышлением. Теперь крестьяне довольны и будут нам служить, не жалуясь ни на что.\nНикакой революции. Мы избежали коллапса. Мы выстояли."
 PGS_new_focus_tt:0 "Загрузит §Yновое древо фокусов§! §Rпри условии, что всё идёт так, как было задумано.§!"
 PGS_please_revolution:0 "Войти в их положение"
 PGS_please_revolution_desc:0 "Главной ошибкой прошлых правителей было очень пренебрежительное отношение к рабочему классу. Именно с жестокого обращения с ними, как с рабами, начался бесконечный цикл гражданских войн, и в каком состоянии наша страна сейчас? Этот порочный круг братоубийтственных войн должен быть прекращён путём максимально мирных переговоров."

 #### CIVIL WAR
 PGS_carnage:0 "Резня в Полисе"
 PGS_carnage_desc:0 "Что происходит? Диверсанты-революционеры смогли пробраться через охраняемые границы, проникли в нашу столицу и устроили терракт! Как это вообще допустили? Кто ответствененн за гарнизон?! Найдите его! Или найдите партизан... КОГО-НИБУДЬ!"
 PGS_garnizon:0 "Нападения на фронт"
 PGS_garnizon_desc:0 "Со всего фронта приходят ужасные новости. Пегасы с чёрно-красными знамёнами на тачанках штурмуют отдельные плохоукреплённые оборонные пункты. Командиры объявляют мобилизацию."
 PGS_flame:0 "Наша неизбежная судьба"
 PGS_flame_desc:0 "ПОДГОТОВИТЬ ВИНТОВКИ!\nГОТОВЬСЯ!\nЦЕЛЬСЯ!\n\n§RЗА НАЦИЮ!§!"
 PGS_civil_war_focus_started:0 "Гражданская война началась"
 PGS_civil_war_focus_started_desc:0 "Многие предполагали, что именно этим всё и закончится. Похоже, наших методов было недостаточно, чтобы остановить революцию... Но теперь думать об этом поздно."
 PGS_civil_war_cloudsdale:0 "Переоборудовать погодную фабрику"
 PGS_civil_war_cloudsdale_desc:0 "У нашего врага есть мобильное преимущество, и он использует его по полной. У нас тоже есть козырь в рукаве - Погодная Фабрика в Клаудсдейле. Дожди и ураганы мятежников не остановят, но фабрика готова преобразоваться для военных нужд. Она не сможет выполнять свою прямую задачу, но нам сейчас остро нужна промышленность для фронта."
 PGS_civil_war_total_mobilization:0 "Собрать всех воинов"
 PGS_civil_war_total_mobilization_desc:0 "Сейчас нам нужны рабочие копыта как никогда! Хотя фракции касты воинов имеют разные политические убеждения, все они понимают, что у нас сейчас есть общий красный враг, и только объеднинившись мы сможем подстрелить крылья революции."
 PGS_church_help:0 "Попросить поддержку духовенства"
 PGS_church_help_desc:0 "Церковь и религия в последнее время стали меньше цениться в нашем обществе. Но это не означает, что пегасы, идя в бой, не вспоминают, что высшие силы охраняют их жизнь. Мы можем обратиться к духовенству, чтобы они благославили наших воинов и подняли их моральный дух."
 PGS_knights_in_the_elder_castle:0 "Рыцари древнего замка"
 PGS_knights_in_the_elder_castle_desc:0 "Драконья гора - одно из самых опасных мест в мире. Именно там живут и тренируются пегасы-крестоносцы, семьи которых дали клятву о том, что они защитят родные земли от захватчиков. Пришло время исполнить долг! Они обладают невероятными боевыми и военными навыками, и их генералы пригодятся нам."
 PGS_economy_militarization:0 "Милитаризация экономики"
 PGS_economy_militarization_desc:0 "Сейчас в нашей власти находится экономика. И почему воины не понимали этого ранее? Есть мануфактуры, которые производят то, что нам не нужно в военное время. Но следует лишь дать толчок - и эти предприятия с товаров гражданского производства перейдут на службу фронту."
 PGS_civil_war_attack:0 "Последний рывок"
 PGS_civil_war_attack_desc:0 "Мы успешно ведём боевые действия, а соединения в рядах крестьян уже теряют организацию. Это идеальный момент, чтобы нанести сокрушительный удар по мятежникам. И его нельзя упускать."
 PGS_civil_war_the_end:0 "Чистое небо"
 PGS_peacemakers_help:0 "Помощь миротворцев"
 PGS_peacemakers_help_desc:0 "Даже сейчас, в критический момент, Миротворцы не поддерживают братоубийство, хотя их мнение ни на что не влияет. Мы ЗАСТАВИМ их сражаться за наше общее будущее, даже если это будет означать применение ещё большего насилия."
 PGS_gardyers_help:0 "Помощь Гардиуса"
 PGS_civil_war_defence:0 "Держать позиции"
 PGS_civil_war_defence_desc:0 "Мятежники могут радоваться тому, что захватили несколько важных точек. Но это не критично. Зная опыт прошлых гражданских войн, мы не станет рваться вперёд и освобождать их. Мы укрепим позиции, восстановимся и обязательно контратакуем."
 PGS_civil_war_the_end_desc:0 "Пули не свестят над нами, и кровь наших братьев больше не проливается. Но сделали ли мы достаточно? Выбрали ли мы правильный путь? Сейчас никого это не волнует. Завтра наступит новый день и будет поставлено много новых целей. А до тех пор, мы будем наслаждаться моментами мира и спокойствия."
 
 can_control_unicornia_weather_tt:0 "Позволяет контролировать погоду в государстве §Y[UNC.getname]§!"
 can_control_pandoria_weather_tt:0 "Позволяет контролировать погоду в государстве §Y[ERP.getname]§!"
 can_control_ponyold_weather_tt:0 "Позволяет контролировать погоду в государстве §Y[PGV.getname]§!"
 can_control_los_weather_tt:0 "Позволяет контролировать погоду в государстве §Y[LOS.getname]§!"
 
 #### ECONOMIC RECOVERY
 PGS_economic_recovery:0 "Восстановить экономику"
 PGS_economic_recovery_desc:0 "Мы не будем скрывать, что не только анархисты натворили дел. С нашей стороны тоже шли разрушения зданий, дорог, фабрик... Придётся много восстанавливаться после войны. Что посеешь - то и пожнёшь."
 PGS_repair_civilian:0 "Восстановление сельского хозяйства"
 PGS_repair_civilian_desc:0 "Годы гражданских войн не позволили нам развить сильную промышленность, и мы жили в основном за счёт урожайных посевов, часть из которых производили даже не мы. Сейчас вопрос продовольствия из Пандории врятли решится в нашу, поэтому нам стоит самим заняться обработкой своих земель."
 PGS_repair_industry:0 "Тяжёлая промышленность"
 PGS_repair_industry_desc:0 "Как мы и планировали, мы будем развивать тяжёлую промышленность - гул военных фабрик будет слышен по всем нашим землям!"
 PGS_repair_railroads:0 "Соединить две столицы"
 PGS_repair_railroads_desc:0 "Пегасополис и Фаргополис - два наших крупнейших города. Именно в Фаргополисе сейчас идёт активное сопротивление, и нам нужно создать больше дорог, чтобы вовремя приводить подкрепления для подавления восстаний."
 PGS_repair_railroads_2:0 "Восстановить крупные города"
 PGS_repair_railroads_2_desc:0 "Крупнейшие бои велись в крупнейших городах - и они знатно пострадали от этого. Нам нужно восстановить наши промышленные центры."
 PGS_repair_railroads_3:0 "Восстановить сельскую местность"
 PGS_repair_railroads_3_desc:0 "Но сельские территории, которые составляют большую часть нашей страны, пострадали не меньше. Понадобится много времени на восстановление разрушенных мастерских и сожжёных домов."
 PGS_rainbow_factory_militarize:0 "Окончательная милитаризация Погодной Фабрики"
 PGS_rainbow_factory_militarize_desc:0 "Уже нет смысла использовать Погодную Фабрику как регулятор погоды. Она принесёт нам гораздо больше пользы как военно-промышленный комплекс."
 PGS_dont_call_workers:0 "Военные отделы восстановления"
 PGS_dont_call_workers_desc:0 "Поскольку наше общество состоит в основном из воинов, все рабочие должны быть наравне с солдатами включены в специальные группы экономического восстановления. Такая кооперация несколько снизит эффективность производства, но увеличит большую вовлечённость крестьян в армию, чем когда-либо."
 PGS_call_workers:0 "Работа в тылу"
 PGS_call_workers_desc:0 "Нельзя отрицать, что не все воины готвы заниматься строительством и восстановлением инфраструктуры. Мы сохраним прежние порядки и в роли строителей будут выступать опытные крестьянские группы."
 PGS_rainbow_factory_back:0 "Активировать погодные генераторы"
 PGS_rainbow_factory_back_desc:0 "Энергия, производимая Погодной Фабрикой, позволила нам произвести много оружия в период войны. Но сейчас нам нужно вернуть инструмент, который позволит нам пользоваться погодными преимуществами."
 PGS_rainbow_factory_pandoria_weather:0 "Погода земных пони"
 PGS_rainbow_factory_unicornia_weather:0 "Погода единорогов"
 PGS_rainbow_factory_ponyold_weather:0 "Погода других пегасов"
 PGS_arms_factories_2:0 "Стандартизированное производство"
 PGS_fargopolis_research:0 "Кампусы Фаргополиса"
 PGS_fargopolis_research_desc:0 "До революций Фаргополис был, можно сказать, научным центром страны настолько, насколько это для нас возможно. В кампусах учёные проводили исследования, но сейчас нет даже этого. Нужно восстанавливать нашу научную сферу, чтобы технологически не отставать от наших соседей."
 PGS_fargopolis_hire_scientists:0 "Новые светлые умы"
 pgs_unlocks_scientists_decisions_tt:0 "Появятся £decision_icon_small §Yрешения§! для исправления проблемы нехватки учёных"
 PGS_fargopolis_new_researches_electronics:0 "Электроника? Что это такое?"
 PGS_fargopolis_new_researches_electronics_desc:0 "Электричество пугало и одновременно завораживало пегасов. Но мы приручим электричество и сможем его воссоздавать, как сделали это когда-то с огнём."
 PGS_fargopolis_new_researches_industry:0 "Методы перехода к мануфактурам"
 PGS_fargopolis_new_researches_industry_desc:0 "Не стоит недооценивать технологические достижения наших соседей, особенно когда вместо самих пони на заводах работают машины. Нам нужно изучить подобную отрасль."
 PGS_arms_factories_1:0 "Поддержать оружейников Эретрии"
 PGS_arms_factories_1_desc:0 "В мирное время в Эретрии производилось немного оружия, но оно было качественным. Чтобы снизить нагрузку на наши крупнейшие города, мы должны развивать военную промышленность здесь."
 PGS_arms_factories_3:0 "Привлечь молодое поколение к восстановительным работам"
 PGS_arms_factories_3_desc:0 "Некоторые пегасы слишком юны, чтобы обучаться военному делу. Они с дества будут привлечены к восстановительно-строительным работам."
 PGS_race_technologies:0 "Магические технологии"
 PGS_race_technologies_desc:0 "В кампусах Фаргополиса можно проводить не только исследования в области промышленности и военного дела, но также исследовать некоторые вещи, которые позволят нам... скажем так, повлиять на этот мир не только в сфере управления погодой."
 PGS_recover_resources:0 "Восстановить шахты"
 PGS_recover_resources_desc:0 "Наши земли богаты природными ресурсами. Во времена беспорядков они не были приоритетной целью, но сейчас они нужны для нашей восстанавливающейся экономики."
 PGS_last_steps_economic_recovery:0 "Последние шаги в восстановлении"
 PGS_last_steps_economic_recovery_desc:0 "Отличная работа! Мы смогли выполнить весь план восстановления нашей и без того шаткой экономики. Но есть одна проблема... мы всего лишь вернулись к тому состоянию промышленности, каким оно было до гражданской войны. В будущем нам придётся приложить большие усилия, если мы хотим создавать новые проекты."
 PGS_decrease_illiteracy:0 "Обучить народ грамоте"
 PGS_decrease_illiteracy_desc:0 "Хотя среди нас есть пегасы, которые умеют читать, считать и писать, всё ещё остаётся довольно большая доля населения, которая не обучена базовой грамоте - в основном это крестьяне. Нужно создать школы для таких слоёв населения."
 PGS_develop_society:0 "Учиться на иностранном примере"
 PGS_develop_society_desc:0 "Большая часть наших соседей перешла из состояния индустриального общества в так называемую "отсталую промышленность". В этих странах устанавливают радио, телеграфы, строят железные дороги и канализации... Нам нужно изучить эти технологии и сделать то же самое, чтобы не отставать от соседей, а может, и превзойти их."
 PGS_modern_buildings:0 "Новые методы строительства"
 PGS_modern_buildings_desc:0 "Используя полученные знания и навыки, мы можем приступить к масштабным строительным работам. Пора построить больницы, школы, обустроить наши города канализациями. Старые системы жизнеобеспечения населения будут модернизированы под новые стандарты."
 PGS_develop_tracktors:0 "Новые орудия труда"
 PGS_develop_tracktors_desc:0 "WIP"
 PGS_quality_of_life:0 "Улучшить качество жизни"
 PGS_quality_of_life_desc:0 "WIP"
 PGS_destroy_poverty:0 "Покончить с бедностью"
 PGS_destroy_poverty_desc:0 "WIP"
 PGS_inscreace_society:0 "Почти современная страна"
 PGS_inscreace_society_desc:0 "WIP"
 PGS_subcasts:0 "Субкасты"
 PGS_subcasts_desc:0 "В нашей стране помимо крестьян, военных и правителей, всегда были те, кто не относятся к этим кастам, так называемые "субкасты". Торговцы, учёные, строители, кузнецы. Следует обратить на них внимание и сделать эти субкасты полноценными сферами общественной деятельности."
 PGS_new_proffessions:0 "Гражданские профессии"
 PGS_new_proffessions_desc:0 "Гражданские профессии"
 PGS_something_economical:0 "Что-то на экономическом"
 
 #### ARMY EFFORT
 PGS_army_reforms:0 "Армейская реформа"
 PGS_army_reforms_desc:0 "Долгое время наши вооружённые силы не развивались. Возможно, мы и получили какой-то опыт из гражданских войн, но у нас совершенно нет опыта современных войн с иностранными государствами."
 PGS_army_reforms_old_school:0 "Проверенные стратегии"
 PGS_army_reforms_old_school_desc:0 "Уроки, которые мы вынесли из гражданских войн в прошлом, не стоит забывать. Наоборот, мы адаптируем полученные военные знания и будем их развивать в дальнейшем."
 PGS_army_reforms_old_school_2:0 "Neos Omades"
 PGS_army_reforms_old_school_2_desc:0 "Neos Omades - пегасий военный принцип, согласно которому солдат в бою полагается не на мощное оружие, а на свой боевой дух и своих товарищей."
 PGS_army_reforms_old_school_3:0 "Воины Зерса"
 PGS_army_reforms_old_school_3_desc:0 "Судьба распорядилась так, что не все пегасы могут познать, каково это - находиться в полёте. Поэтому в нашей армии существуют отдельный вид войск - наземные дивизии для таких "ограниченных" пегасов. Однако, мы должны продолжать делать акцент на развитии летающих сил - в конце-концов, они составляют основу нашей армии."
 PGS_army_reforms_new_thoughts:0 "Нововведения"
 PGS_army_reforms_planning_strategy:0 "Грандиозное планирование"
 PGS_army_reforms_planning_strategy_desc:0 "Когда Харрикейн начинал восстание несколько лет назад, он смог победить благодаря своим навыкам планирования. Грамотное использование имеющихся пони-ресурсов - ключ к победе."
 PGS_army_reforms_artilleria_strategy:0 "Удары из далека"
 PGS_army_reforms_artilleria_strategy_desc:0 "У нас есть опыт использования артиллерии. Эти чрезвычайно эффективные орудия заслуживают большего внимания."
 PGS_army_reforms_blitzkrig_dreams:0 "Мечты о железных зверях"
 PGS_army_reforms_blitzkrig_dreams_desc:0 "Мы слышали о таких технологиях, которые позволяют создавать кошмарные машины. Этим машинами не страшны пули и они готовы идти напролом, разнося всё на своём пути. Это может показаться не слишком подходящей стратегией, учитывая возможности нашего военно-промышленного комплекса, но..."
 PGS_army_reforms_blitzkrig_dreams_2:0 "Первые модели"
 PGS_army_reforms_blitzkrig_dreams_2_desc:0 "Нам потребовалось много времени, чтобы хотя бы убедить генералов в том, что эти мифические "танки" могут быть полезны на поле боя. Теперь нам следует подумать над тем, какую технику мы будем производить."
 PGS_army_reforms_artilleria_strategy_2:0 "Пополнить запасы гаубиц"
 PGS_army_reforms_artilleria_strategy_2_desc:0 "Прежде чем начать развитие новых видов артиллерии, мы должны убедиться, что все батальоны имеют опыт работы с подобными орудиями. Гаубицы - старое оружие, но очень похожее на современную артиллерию. Мы можем использовать их запасы для тренировки солдат."
 PGS_army_reforms_planning_strategy_2:0 "Порядок на нашем поле боя"
 PGS_army_reforms_expand_military:0 "Военный комплекс"
 PGS_army_reforms_support_equipment:0 "Разработать доп. экипировку"
 PGS_army_reforms_new_command:0 "Новое высшее командование"
 
 
 #### HURRICANE PATH 
 PGS_big_hunt:0 "§RБольшая охота§!"
 PGS_big_hunt_desc:0 "На этот раз они от нас не скроются. Они падут. Готовьте петли..."
 pgs_they_will_die_tt:0 "§YРождается царство армейского террора.§!"
 PGS_hurricane_political_aftermath:0 "Последствия"
 PGS_hurricane_political_aftermath_desc:0 "Нет времени отдыхать. Наш Командующий уже готовит новые планы по восстановлению нашего общества. И они более грандиозные, чем когда-либо..."
 PGS_hurricane_new_purges:0 "По второму кругу"
 PGS_hurricane_new_purges_desc:0 "Лишь сейчас я осознал, что Совет Воинов - это абсурд. В настоящей армии всё подчиняется фельдмаршалу, всё подчиняется МНЕ. А куча пегасов-солдат не имеет права решать вопросы масштабов страны. Я объявлю об устранении Совета Воинов, и всё в этой чёртовой стране будет зависеть от меня, а не от мнения большинства."
 PGS_hurricane_kill_all_monarchists:0 "Никакой надежды для монархистов"
 PGS_hurricane_kill_all_monarchists_desc:0 "Хватит этим пегасам нежить себя мечтами о том, что монархия в Пегасополисе может восстановиться. Они должны перестать считать себя третьей альтернативой между пацифизмом и милитаризмом и наконец решить, за нас они или против нас!"
 PGS_hurricane_get_rid_of_pacifism:0 "Больше никакой слабости"
 PGS_hurricane_get_rid_of_pacifism_desc:0 "Пацифизм прямо противоположен самой сути пегасьего мышления. Пегас всегда знает, что можно и нужно дать отпор вездесущим врагам и стать сильнее, захватив слабых соседей. Поэтому нам нужно §Rизбавиться§! §Pот ВСЕХ§!, кто считает, что война не присуща нашей природе."
 PGS_hurricane_accept_pacifism:0 "Принять Миротворцев"
 PGS_hurricane_accept_pacifism_desc:0 "Миротворцы могут показаться слабыми пацифистами, но они всё ещё действуют ради нашего обшего блага. Если они не хотят воевать, они могут помочь в тылу, в гражданском секторе. Но Харрикейн... то есть, мы, воины, запретим им распространять антивоенные настроения."
 PGS_hurricane_hunt_him_down:0 "Найдите этого ублюдка"
 PGS_hurricane_hunt_him_down_desc:0 "Этот анархический уродец, возглавляющий восстание, всё ещё жив. Мы предпринимали попытки устранить его, но они были смехотворными. Пара солдат-убийц? Нет, мы должны призвать всех, всех солдат для того, чтобы его нашли. Он должен быть убит, иначе сохранится риск нового восстания." 
 PGS_hurricane_start_army_society:0 "Армия и государство - понятия равнозначные"
 PGS_hurricane_start_army_society_desc:0 "Совершенно то общество, в котором всё работает чётко и без проблем, словно в машине. Это означает отсутствие протестов, подчинение правящей партии и чистосердечная служба Родине. Но гражданская диктатура может привести к недовольству населения, демократия - к слишком большой свободе, коммунизм просто пожрёт страну изнутри... Поэтому Пегасьи Племена должны быть стёрты с лица Эквуса как государство, и реформированы в новое общество, которое представляет собой чистую армию, где всё решает не жестокость или мягкость режима, а дисциплина и военный порядок."
 PGS_hurricane_trainings:0 "Всеобщие военные учения"
 PGS_hurricane_trainings_desc:0 ""
 PGS_hurricane_forced_patriotism:0 "Навязанный патриотизм"
 PGS_hurricane_forced_patriotism_desc:0 ""Неважно, хочешь ли ты того или нет - твоя родная страна требует от тебя, чтобы ты всем сердцем и душой любил её. А любовь к стране может выражаться во многих формах - активное презирание коммунизма, подчинение старшему по званию, обязательное вступление в армию, когда станешь старше...\nЕсли же ты не будешь любить свою родину, то жди от неё наказания."\n\n      - Из обучающей листовки для несовершеннолетних жеребят"
 PGS_hurricane_kazarmi:0 "Дома в казармы"
 PGS_hurricane_kazarmi_desc:0 "Настоящий воин-пегас должен быть испытан всеми трудностями жизни: даже когда-то уютный и тёплый дом должен приносить минимум комфорта для закалки характера. Наши строители и инспекторы перестроят жилые дома под новые военные стандарты, превращая их в бараки."
 PGS_hurricane_kommisariats:0 "Создать сеть военных комиссариатов"
 PGS_hurricane_kommisariats_desc:0 "Наши новые подконтрольные высшему командованию органы будут следить, чтобы каждый пегас имел статус и опыт военнослужащего. Тех, кто уколняется от вступления в армию перестанет считаться гражданином и понесёт наказание, которое вынесет начальник комиссариата."
 PGS_hurricane_military_trial:0 "Военные суды"
 PGS_hurricane_military_trial_desc:0 "Возможно, идея дать командующим комиссариатов полномочия по назначению наказаний была слишком непредусмотрительной. Для предотвращения комиссарского произвола будут созданы особые военные суды для вынесения строгого наказания не только уклонистам, но и всем преступникам. Теперь даже простой вор будет судиться по законам военного времени военным судом."
 PGS_hurricane_hunt_his_dogs:0 "Найдите его псов"
 PGS_hurricane_hunt_his_dogs_desc:0 "Убийство одного пегаса может и облегчит наше бытие, но его самые ярые последователи -  аморальные красные предатели, у которых нет шанса на искупление. Нужно выследить их всех до одного и покончить с ними.\nНе допустите смерти простых гражданских."
 PGS_hurricane_ban_communism:0 "Запретить коммунизм во всех его проявлениях"
 PGS_hurricane_ban_communism_desc:0 "Анархокоммунизм? Новосоциализм? Синдикализм? Всё это дерьмо равнозначно губительно для нашего обшества. Мы запретим любое распространение околосоциалистических идей в нашей армии."
 PGS_hurricane_burn_anarchist_books:0 "Покончить с анархическиой "эстетикой""
 PGS_hurricane_burn_anarchist_books_desc:0 "Эти анархисты утверждали, что матерные песни о полном беззаконии и пьянство могут привести их к исинной свободе. Такое ошибочное утверждение должно быть опровергнуто, а подобное... народное творчество должно быть устранено."
 PGS_hurricane_organized_cleaning_groups:0 "Организованные группы зачистки"
 PGS_hurricane_organized_cleaning_groups_desc:0 "Мы предлагали им жить мирно - они возмущались. Мы пытались успокоить их силой - они сопротивлялись. Не выборочные казни, но полное физическое вычищение и навязываение правильных идей обеспечит, что новые революционеры никогда не появятся вновь. Для этих целей мы расширим чёрную гвадию Гардиуса, дав им ещё больше полномочий и обязанностей в сфере выявления и уничтожения предателей и диверсантов."
 PGS_hurricane_health_propaganda:0 "Пропаганда ЗОЖ"
 PGS_hurricane_health_propaganda_desc:0 "Пьянство, курение, употребление различных веществ снизит общую эффективность нащих солдат. Наравне с пропагандой милитаризма и национализма мы будем распространять идею здорового образа жизни, чтобы каждый солдат-гражданин нашего общества мог дать отпор врагу."
 PGS_hurricane_ban_alchogol:0 "Ввести запрет на алкоголь"
 PGS_hurricane_ban_alchogol_desc:0 "Практически все анархокоммунисты были беспросветными пьяницами. Неудивительно, что они не смогли противостоять нашим дивизиям. Алкоголь губит организм и боевой дух - этой отраве нет места в нашей армии!"
 PGS_hurricane_let_work_some:0 "Минимум рабочих"
 PGS_hurricane_let_work_some_desc:0 "В конце-концов, кто-то должен выполнять грязную работу, чтобы обеспечить функционирование нашей армии. Машинисты, чтобы управляли поездами, кузнецы, чтобы ковали доспехи..."
 PGS_hurricane_no_workers_only_warriors:0 "Нет рабочих - лишь солдаты"
 PGS_hurricane_no_workers_only_warriors_desc:0 "Не может быть исключений. Все подлежат воинскому призыву в нашу армию.\n\n§RАбсолютно все§!."
 PGS_hurricane_clean_nation:0 "Чистота нации"
 PGS_hurricane_clean_nation_desc:0 "Не только милитаризм обеспечит нашей стране процветание. Наш путь - национализм, учение о том, что лишь величественные пегасы могут быть высшим видом.\nОднако, если представители других рас будут нам покорно служить, они смогут присоединиться к нешей армии. Но занимать высокие должности вроде генералов и командиров им будет запрещено."
 PGS_hurricane_loyalty_principe:0 "Принцип Верности"
 PGS_hurricane_loyalty_principe_desc:0 "Настоящий Гражданин должен быть бесконечно предан идеалам нашего государства."
 PGS_hurricane_heroism_principe:0 "Принцип Героизма"
 PGS_hurricane_heroism_principe_desc:0 "Настоящий Гражданин должен жертвовать собой, если это будет нужно."
 PGS_hurricane_clear_mind_principe:0 "Принцип Чистого Разума"
 PGS_hurricane_clear_mind_principe_desc:0 "Настоящий Гражданин должен помнить, что нет никакого другого верного пути, чем пути, который прокладывает Верховный Главнокомандующий."
 PGS_hurricane_proffesionalism_principe:0 "Принцип Профессионализма"
 PGS_hurricane_proffesionalism_principe_desc:0 "Настоящий Гражданин должен храбро сражаться и использовать в бою все навыки и умения, которыми он обладает."
 PGS_hurricane_a_new_law:0 "Создать новый Высший Закон"
 PGS_hurricane_a_new_law_desc:0 "Пора создать новое общество, чьим основателем будет Верховный Главнокомандующий Харрикейн. Отбросив все ненужные вещи вроде гражданских нужд, пегасы превратили свою нацию в огромную армию, которая подчиняется исключительно своему Верховному Лидеру."
 pgs_new_law_tt:0 "Активация бонусов от фокусов §YПринцип Верности§!, §YПринцип Героизма§!, §YПринцип Чистого Разума§! и §YПринцип Профессионализма§!"
 pgs_proffesionalism_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nСкорость восстановления дивизии: §G+5.00%§!\nСтоимость командующего армией: §G-10%§!\nОрганизация дивизии: §G+5.00%§!"
 pgs_heroism_principe_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nЛимит капитуляции: §G+10.00%§!\nПоддержка войны: §G+10.00%§!"
 pgs_loyalty_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nЗащита от смены идеологии: §G+10.00%§!\nЗащита дивизии на национальной территории: §G+7.50%§!"
 pgs_clean_mind_tt:0 "§CНовый Воинский Кодекс§! добавит следующие бонусы при выполнении фокуса §YСоздать новый Высший Закон§!:\n\nТемпы исследований: §G+2.50%§!\nПоддержка войны в неделю (потери в бою): §G+0.50%§!"
 PGS_prepare_war_centre:0 "Пропаганда мировой войны"
 PGS_prepare_war_centre_desc:0 "Оглянись, солдат! Юг и север, запад и восток - враги окружают тебя повсюду! Так возьми свою винтовку и лети в бой плечом к плечу со своими боевыми товарищами."
 PGS_prepare_war_right:0 "Объединить пегасов"
 PGS_prepare_war_right_desc:0 "Наш народ разрознен. Проклятые оленийцы несколько веков назад нагло совершили ряд набегов на наши прибрежные земли и осели там, в результате чего появилось чудовище под названием Поньолд. Смесь оленийской и пегасьей культуры - это должно быть уничтожено до основания.\nЛас-Пегасус - это всего лишь вольный город простых предателей, коих мы уже повстречали бесчисленное множество. Стереть их с Эквуса не составит никакого труда. Конечно, если они уже не нашли себе союз с такими же трусами, как и они сами..."
 PGS_prepare_war_left:0 "Заявить о своих правах на мировое господство"
 PGS_prepare_war_left_desc:0 "Слишком долго другие нации видели в нас лишь дикарей, способных только воевать. Хотя... если они хотят, чтобы мы были такими, то так тому и быть."
 PGS_declare_war_on_los:0 "Вернуть Лас-Пегасус"
 PGS_declare_war_on_pgv:0 "Изгнать оккупантов"
 PGS_destroy_olenian_culture:0 "Уничтожить инородную культуру"
 PGS_declare_war_on_erp:0 "Покорить земных пони"
 PGS_declare_war_on_erp_desc:0 "Земные пони хорошо обрабатывают землю, значит, они хорошо роют траншеи. Такие навыки пригодятся в нашей армии. Но они вряд ли добровольно вступят в наши ряды. Значит, мы их заставим."
 PGS_fields_of_pandoria:0 "Пополнить склады с провизией"
 PGS_learn_to_defend:0 "Использовать их физическую силу"
 PGS_integrate_erp:0 "Массовый призыв земных пони"
 PGS_declare_war_on_unc:0 "Уничтожить королевство"
 PGS_declare_war_on_unc_desc:0 "Единороги. Одно это слово вызывает неприязнь. Надменные, высокомерные, всегда на вершине. Мы покончим с этим. Единороги НЕ ДОСТОЙНЫ править этим миром, и именно мы, пегасы, спустим их с небес на землю."
 PGS_exploit_unicorn_people:0 "Эксплуатация юникорнийского народа"
 PGS_exploit_unicorn_people_desc:0 ""
 PGS_parade_of_victory:0 "Парад Великой победы"
 PGS_parade_of_victory_desc:0 ""
 PGS_parade_of_victory_desc:0 "Мы победили!"
 PGS_integrate_unc:0 "Начать призыв единорогов"
 PGS_integrate_unc_desc:0 "Единороги по своей сути не бесполезны. Если исключить из их характера высокомерность, то из них получатся мощные боевые единицы, хотя, к сожалению, и использующие §Rмагию§!. В любом случае, нам нужно в ближайшее время заняться формированием добровольческих единорожьих корпусов, а со временем и ввести полноценный призыв для единорогов. Конечно, они не будут иметь права стать генералами и командирами, так что пусть не задирают нос."
 PGS_declare_war_on_south_west:0 "Укрощение юго-запада"
 PGS_declare_war_on_south_west_desc:0 "Юго-запад - одна большая мусорная яма. Сборная солянка из самого низшего сброда. Здесь нет ничего полезного кроме живой рабочей силы, которая будет пополнять ряды нашей бесконечно растущей армии."
 PGS_develop_los_territories:0 "Чистки среди дворян"
 PGS_develop_los_territories_desc:0 "Плешивые предатели. Выследить и уничтожить."
 PGS_rebuild_empire:0 "Едины вновь"
 PGS_rebuild_empire_desc:0 "Харрикейн смог добиться того, чего не добились его предвешственники. Он смог объединить народ пегасов, и теперь, когда всё государство функционирует, как единая военная машина, народ больше никогда не распадётся вновь."
 PGS_new_army_great:0 "Великая армия, единая и неделимая"
 PGS_new_army_great_desc:0 ""Оглядываясь на то, что мы сделали в последнее время, я задаю себе вопрос: а стоило ли оно того?  Чёрт возьми, да. Нация пегасов теперь считается самой могущественной в Эквусе, если не во всём мире. Земные пони и единороги, хотя и считаются солдатами, никогда не смогут обрести истинной свободы. Они обречены вечно оставаться в звании рядовых. Это обеспечит, что пегасы будут в безопасности. Больше никто не посмеет смотреть на нас свысока.\nНИКТО.\nПегасы достигли вершины пищевой цепи. Осталось только поглотить жалкие остатки того, что может представлять для нас угрозу...""
 PGS_declare_war_on_thestrals:0 "Захватить северные племена"
 PGS_declare_war_on_thestrals_desc:0 ""
 PGS_declare_war_on_who_is_left:0 "Добейте оставшихся"
 PGS_declare_war_on_who_is_left_desc:0 ""
 PGS_tst_full_citizenship:0 "Военное гражданство"
 PGS_tst_full_citizenship_desc:0 ""
 PGS_tst_worsip:0 "Использование труда"
 PGS_tst_worsip_desc:0 ""
 PGS_declare_war_on_yaks:0 "Якская угроза"
 PGS_declare_war_on_yaks_desc:0 "Якская угроза"
 PGS_declare_war_on_grf:0 "Сразить грифоньих рыцарей"
 PGS_declare_war_on_grf_desc:0 "Сразить грифоньих рыцарей"
 PGS_declare_war_on_chn:0 "Конфронтация с чейнджлингами"
 PGS_declare_war_on_chn_desc:0 ""
 
 PGS_hurricane_reforms:0 "Реформация"
 PGS_hurricane_reforms_desc:0 "Основы и базисы нашего общества установлены. Кажется, практически всё население понимает, что отныне все являются частью великого Пегасьего Воинства. Пора отредактировать почти идеальное общество парой изменений."
 PGS_hurricane_reforms_researches:0 "Роты военных исследователей"
 PGS_hurricane_reforms_researches_desc:0 ""
 PGS_hurricane_academy:0 "Милитария"
 PGS_hurricane_academy_desc:0 ""
 PGS_hurricane_propaganda_machine:0 "Машина пропаганды"
 PGS_hurricane_culture:0 "Неопегасья культура мышления"
 PGS_hurricane_culture_desc:0 ""Неопегас" - это новый вид пегаса, следующая ступень нашей эволюции. Видя перед собой угрозу, неопегас не думает о том, как с ней справиться, ибо он уже умеет постоять за себя на уровне инстинктов. Вместо этого его мозг постоянно должен обрабатывать только информацию, входящую из уст старшего по званию. К сожалению, мы не можем залезть в головы других пегасов, чтобы правильно настроить их мышление, но мы будем стремиться к этому."
 PGS_hurricane_reforms_update_pegasopolis:0 "Обновить Пегасополис"
 PGS_hurricane_reforms_update_pegasopolis_desc:0 "Есть пегасы, которые предали наше дело. Дезертиры. Тунеядцы. Уклонисты. Все они провинились перед Главнокомандующим и нет им прощения. Им нет места среди нас, гордых воинов... но мы можем в качестве наказания использовать их труд. Для начала мы заставим их перестроить Пегасополис так, как это нам нужно. Бесчисленные военные зоны, стрельбища и полигоны должны появиться в кратчайшие сроки."
 PGS_new_pegasus:0 "Тотальная субординация"
 PGS_new_pegasus_desc:0 "После того, как Харрикейн объявил всё наше население военнообязанным, количество рекрутов в армии прибавилось настолько, что уже можно не волноваться о потерях, как боевых, так и гражданских. Это предоставит возможность окончательно закрепить принцип верности в нашей армии. Отныне за любое неподчинение командиры могут казнить своих подчинённых. Мы потеряем несколько  товарищей, но это покажет другим пример, кроме того, казнённых можно будет легко заменить."
 PGS_hurricane_unity:0 "Энотита"
 PGS_hurricane_unity_desc:0 "Энотита - с пегастего языка "единство", "сплочённость". Солдат должен быть не просто дисциплинирован и хорошо обучен, но он должен чувствовать духовную связь с сослуживцами, как если бы они были его семьёй."
 PGS_military_order:0 "Военная вера"
 PGS_military_order_desc:0 ""
 
 
 
 #### PEGASI FOCUS - ARMY ####
 PGS_army_reforms:0 "Армейская реформа"
 PGS_army_reforms_desc:0 "Долгое время наши вооружённые силы не развивались от слова совсем. Возможно, мы и получили какой-то опыт из бесчисленных гражданских войн, но у нас совершенно нет опыта современных войн с иностранными государствами. Мы умеем убивать друг друга, но нам нужно научиться сражаться с чужаками."
 PGS_army_reforms_old_school:0 "Проверенные стратегии"
 PGS_army_reforms_old_school_desc:0 "Уроки, которые мы вынесли из гражданских войн в прошлом, не стоит забывать. Наоборот, мы адаптируем полученные военные знания и будем их развивать в дальнейшем."
 PGS_army_reforms_old_school_2:0 "Neos Omades"
 PGS_army_reforms_old_school_2_desc:0 "Neos Omades - древняя пегасья военная традиция, согласно которой солдат в бою полагается не на мощное оружие, а на свой боевой дух и своих товарищей."
 PGS_army_reforms_old_school_3:0 "Воины Зерса"
 PGS_army_reforms_old_school_3_desc:0 "Судьба распорядилась так, что не все пегасы могут познать, каково это - быть в полёте. Поэтому в нашей армии существуют отдельный вид войск - наземные дивизии для таких "ограниченных" пегасов. Однако, мы должны продолжать делать акцент на развитии летающих сил - в конце-концов, они составляют основу нашей армии."
 PGS_army_reforms_new_thoughts:0 "Нововведения"
 PGS_army_reforms_planning_strategy:0 "Грандиозное планирование"
 PGS_army_reforms_planning_strategy_desc:0 "Когда Харрикейн начинал восстание несколько лет назад, он смог победить своих врагов благодаря своим навыкам планирования. Грамотное использование имеющихся пони-ресурсов - ключ к победе."
 PGS_army_reforms_artilleria_strategy:0 "Удары из далека"
 PGS_army_reforms_artilleria_strategy_desc:0 "У нас есть опыт использования артиллерии. Эти чрезвычайно эффективные орудия заслуживают большего внимания."
 PGS_army_reforms_blitzkrig_dreams:0 "Мечты о железных зверях"
 PGS_army_reforms_blitzkrig_dreams_desc:0 "Мы слышали о таких технологиях, которые позволяют создавать кошмарных зверей. Этим зверям не страшны мечи и пули, и они готовы идти напролом, разнося всё на своём пути. Это может показаться не слишком подходящей стратегией, учитывая возможности нашего военно-промышленного комплекса, но..."
 PGS_army_reforms_blitzkrig_dreams_2:0 "Первые модели"
 PGS_army_reforms_blitzkrig_dreams_2_desc:0 "Нам потребовалось много времени, чтобы хотя бы убедить генералов в том, что эти мифические "танки" могут быть полезны на поле боя. Теперь нам следует подумать над тем, какую технику мы будем производить."
 PGS_army_reforms_artilleria_strategy_2:0 "Пополнить запасы гаубиц"
 PGS_army_reforms_artilleria_strategy_2_desc:0 "Прежде чем начать развитие новых видов артиллерии, мы должны убедиться, что все батальоны имеют опыт работы с подобными орудиями. Гаубицы - старое оружие, но очень похожее на современную артиллерию. Мы можем использовать их запасы для тренировки солдат."
 PGS_army_reforms_planning_strategy_2:0 "Порядок на нашем поле боя"
