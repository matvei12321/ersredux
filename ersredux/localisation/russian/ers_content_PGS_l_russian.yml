 PGS_fluttershy:0 "Флаттершай"
 PGS_fluttershy_advisor_desc:0 ""Мы не хотим никому навредить. Наша цель - мир без насилия."\n\n§YУмница, комсомолка и просто красавица!§!"
 PGS_still_will:0 "Элеферий "Красное пламя""
 PGS_demos_fortis:0 "Деймос Фортрис"
 PGS_moondowner:0 "Мундаунер"
 PGS_solidus_rei:0 "Солидус Рей"
 PGS_magnus_olister:0 "Магнус Олистер"
 PGS_kaylo_nestor:0 "Кайло Нестор"
 PGS_christofer:0 "Арий Неос"
 PGS_christofer_desc:0 ""Возможно, я не совсем понимаю, как управлять государством... Но я уверен, что смогу научиться! Я не подведу свой народ!""
