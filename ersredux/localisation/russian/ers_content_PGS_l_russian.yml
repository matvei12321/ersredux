 ##### PARTIES
 PGS_communism_party:0 "СИС"
 PGS_communism_party_long:0 ""Свобода или смерть\n§W-----------------§!\n §WИдеология:§! Анархо-коммунизм\n §WПолитическая повестка:§! Революция\n§W-----------------§!\n §RМЫ СВЕРГНЕМ КРОВАВЫЙ РЕЖИМ ТИРАНОВ И ЗАЛЬЁМ ВСЕ РЕКИ ПИВОМ!§!\n§W-----------------§!"
 PGS_neutrality_party:0 "ПКД"
 PGS_neutrality_party_long:0 "Прерванная королевская династия\n§W-----------------§!\n §WИдеология:§! Монархизм\n §WПолитическая повестка:§! -\n§W-----------------§!\n §gНет повести печальнее на свете, чем повесть о королевской династии Неос.\n В дни рассвета молодого пегасьего государства расцветала монархия. Но народ пегасов, видимо, проклят на то, чтобы постоянно жить в тревожные времена, поэтому правление монархов постоянно сопровождалось кресьтянскими восстаниями. Отчасти виной тому были жёсткие характеры самих членов семьи Неос, но всё же.\n Для борьбы с крестьянами пегасьи короли начали усиливать армию и восхлавлять военных, за что потом поплатились. Генералы захватили власть, и дальше началался известный ураган гражданских войн. И этот ураган окончательно снёс династию Неос в 1002-м году, когда Андреас Харрикейн лично убил каждого члена династии.\n Какой-то период монархисты не теряли надежду. Но в такое чёрное время они начали сдаваться и переходить на сторону военных, крестьян или миротворцев, в результате чего фракция, фактически, перестала существовать.§!\n§W-----------------§!"
 PGS_fascism_party:0 "Военная хунта Харрикейна"
 PGS_fascism_party_long:0 "Военная хунта Харрикейна\n§W-----------------§!\n §WИдеология:§! Стратократия\n §WПолитическая повестка:§! Милитаризм\n§W-----------------§!\n §gВоенные - это одна из каст пегасьего общества. Их внутренняя структура жёстко дисциплинирована иерархическими принципами, и на вершине иерархии стоит Верховный Главнокомандующий. Однако, Главнокомандующий не является абсолютным лидером армии, так как присутствует Военный Совет, который следует принципам своеобразной военной демократии.\n\n Военные сыграли большую роль в истории государства пегасов. Изначально они поддерживали королевскую династию в войне против крестьян, но со временем стали отдельной фракцией, противостоящей не только коммунизму, но и монархии.\n\n В настоящее время воинов возглавляет Андреас Харрикейн, избранный Советом Воинов в качестве их лидера после смерти предыдущего Главнокомандующего.§!\n§W-----------------§!"
 PGS_democratic_party:0 "Миротворцы"
 PGS_democratic_party_long:0 "Миротворцы\n§W-----------------§!\n §WИдеология:§! Пацифизм\n §WПолитическая повестка:§! Умиротворение Общества\n§W-----------------§!\n §gМиротворцы - довольно молодая фракция среди военных, сформировавшаяся примерно в конце 999 года под руководством скромной §CФлаттершай§!. Вместо попыток заполучить власть и влияние, миротворцы поставили цель закончить вечную гражданскую войну любой ценой. Не самое популярное движение, но даже у него есть ряд сторонников§!.\n§W-----------------§!"
 PGS_legal_dinastiya_party_name:0 "Династия Неос"
 PGS_legal_dinastiya_party_name_long:0 "Династия Неос"
 PGS_illegal_dinastiya_party_name:0 "Династия Мундаунер"
 PGS_illegal_dinastiya_party_name_long:0 "Династия Мундаунер"
