 PGS_comissariats_desc:0 "Пегасьи военные комиссариаты ответственны за набор в армию, а также наделены некоторыми мелкими полномочиями по решению судьбы солдат после их прибытия в армию. Теперь число военнослужащих пегасов значительно увеличится."
