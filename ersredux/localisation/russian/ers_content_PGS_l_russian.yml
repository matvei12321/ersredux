 PGS_red_flame_desc:0 ""Я возьму обманом, города измором\nБуду бить, калечить, вешать и стрелять\nБуду одобрять я всячески погромы\nА на остальное просто наплевать!""
 
 ##### CHARACTERS
 
 PGS_hurrikane:0 "Андреас Харрикейн"
 PGS_hurrikane_desc:0 ""Думаю, не нужно объяснять, что сильные и достойные всегда сокрушали слабых. Такова наша природа... таков естественный порядок вещей."\n\nАндреас Теодорис родился и вырос в семье потомственных солдат. Молодость он провёл в тренировках в казармах, и в возрасте 14 лет был отправлен на свою первую боевую миссию. Тогда все его товарищи погибли, и выжил лишь он, используя свой ум и силу. Тогда он понял - в этой жизни нет места для слабых, и выживут только сильнейшие. В течение нескольких лет Андреас, следуя своей философии, уверенно и стремительно поднимался вверх в иерархии пегасьей армии. Его слава, сила и стойкость стали известны на всех пегасьих землях, и он получил прозвище Харрикейн в честь легендарного воина пегасьей мифологии. Когда ему было 28, солдаты избрали его своим Верховным Главнокомандующим. Андреас, будучи превосходным теоретиком и отменным практиком, начал готовить планы по военному захвату власти в стране.\n\nВ 1002-м году Андреас равзязал очередную гражданскую войну против правящей тогда монархии, и лично убил всю королевскую семью, что означало конец монархисткого режима.\n\nС тех пор Харрикейн пытается удержать власть военной хунты, но рано или поздно вспыхнет пожар новой революции."
 PGS_stormbreeze:0 ""Штормовой Бриз""
