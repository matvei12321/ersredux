 pegasi_h.13.t:0 "Послы из Вингбардии"
 pegasi_h.13.d:0 "Сегодня утром к Харрикейну обратился один из младших генералов с весьма интересными новостями.\n\n- Сер Верховный Главнокомандующий, на аудиенцию к вам прибыли грифоны из фашистской Вингбардии!\n\n- ...чего?\n\n- Грифоны. Сами говорят, что из Вингбардии.  По их словам, лидер Вингбардии, Джулио Бикколини, ищет потенциальных союзников на Эквусе. Он узнал, что наш режим очень схож с вингбардийским фашизмом, поэтому он решил, что может с нами вступить в военный союз в будущем.\n\n- Погоди. Грифоны? Это ещё кто? Какие-то очередные дикари? А Винфартия - это очередное недоразвитое племя?\n\n- Вообще-то, не совсем-\n\n- Хватит с меня этой чуши. Я не буду вести переговоры с очередными пищащими пожирателями фруктов. Расстреляйте их за такую дерзость.\n\n- Но, Главнокомандующий...\n\n- Это приказ!\n\n- Вас понял."
 pegasi_h.13.a:0 "Хмф, "грифоны"..."

 pegasi_h.14.t:0 "Это было когда-то..."
 pegasi_h.14.d:0 "В ночь с последнего дня месяца жатвы на первый день месяца осветления, в мире появилась ещё одна живая душа. Мать была счастлива, что всё прошло благополучно, однако отец жеребёнка не разделял никакого оптимизма.\n\n- Надеюсь, на этот раз ты родила мне сына, Андрея. Я сильно разочаруюсь, если узнаю обратное. И ты знаешь, что станет с чадом, если это окажется не великий воин.\n\n- Это точно сын... Какое мы дадим ему имя?\n\nСизиф Теодорис был известен как один из сильнейших пегасьих воинов, а на поле боя его свирепости и мастерству не было равных. Рождение жеребёнка для него не означало ничего плохого, однако его не радовала перспектива взятия обязанности воспитания.\n\nКогда юному жеребёнку, которому дали имя Андреас, было лишь два года, мать и отец сильно повздорили. Андреас тогда ничего не понимал, но мать после этого случая он больше никогда не увидит.\n\nПрошло три года. Сизиф был вынужден заниматься воспитанием Андреаса, но всё-таки подходил к этому с большой серьёзностью. "Мы, Теодорисы - воины. Мой отец, дед, и его предки были величайшими воинами, но запомни одну истину. Я - сильнейший. Я непобедим. И, как думаешь, почему меня уважают? Потому что у меня есть сила. Сила несокрушимого." Почти каждый день Сизиф вливал в Андреаса эту философию, и Андреас впитывал её до капли, поскольку не знал ничего другого. Уже тогда он стремился стать сильнейшим, как его отец. Рассказы о его подвигах вдохновляли Андреаса стать таким же.\n\nАндреас научился летать раньше своих сверстников благоаря изнуряющим тренировкам, проводимым его отцом. Примерно это же время он уже научился пользоваться мечом, и Сизиф без промедления начал тренировки на настоящих клинках. Во время обучения отец не сдерживал себя абсолютно, из-за чего Андреас получил глубокий шрам на щеке, который останется у него на всю жизнь. "Ты жалок, проклятый нытик. Кончай свой плач и сразись со мной! Отродью, которое не может защитить себя в бою, нет места в этом мире! И не смей так на меня смотреть. Я - сильнейший, а ты ничего из себя не представляешь. Думаешь, я полюблю того, кто слаб?" Андреаса это взбесило так, что казалось, закипела кровь. Он бросился в отчаянную атаку на своего отца, но тот с лёгкостью перебросил мальца через спину, из-за чего у Андреаса сломалась пара рёбер. "Что и требовалось доказать. Ты сможешь носить гордое звание Сына Непобедимого только тогда, когда докажешь, что достаточно силён, чтобы быть достойным жизни.""
 pegasi_h.14.a:0 ""Да, отец.""


 pegasi_f.1.t:0 "Самый страшный негодяй"
 pegasi_f.1.d:0 "В назначенное время, в назначенном месте, встретились две группы пегасов. С одной стороны прибыли солдаты, вооружённые на чрезвычайный случай, с другой стороны - анархисты, вооружённые, потому что так хотят. Прибывшие сохраняли дистанцию и обменивались презрительными взлядами, готовясь выстрелить в любой момент. Затем из обеих групп вышли два пони. Флаттершай и Элеферий, лидер анархического движения, приблизились друг к другу.\n\n- Ну? Чего звали? Получил я ваше письмо, черти. И вот он, я. Пришёл. А ты кто, милашка? Давай, колись, что хочешь предложить мне, а?\n\nТакое приветствие немного сбило Флаттершай с толку, но она быстро собралась с мыслями.\n\n- Я - Флаттершай, новый лидер Племён Пегасов. Я предлагаю вам заключить сделку. Солдаты с моей стороны не будут вам мешать, а вы перестанете грабить и прикажете сделать то же самое своим подопечным.\n\nЭлеферий оглянулся на своих солдат. Все они уже хихикали, да и сам он не удержался.\n\n- Ха-ха! Чего? А как же тот упырь, который всех дворян перерезал? Он же вами заправлял. А, насрать. Перифий! Закурить.\n\nК лидеру анархистов подшёл солдат и передал спички и сигарету-самокрутку. Ловко зажгя сигарету, он затянулся, и облако дыма полетело в Флаттершай, из-за чего та поперхнулась. Запах самокрутки был действительно ужасен.\n\n- Хочешь мира? Чтобы мы не стреляли? Тогда дай нам независимость. Все вояки уйдут с нашмх территорий и никогда больше не вернутся. Организуем мы там свою республику и будем жить сами по себе. А вы нам ещё и в этом поможете. Денег там дадите, оружия, снаряги в придачу.\n\n- Идёт.\n\nЭлеферий приподнял бровь, не ожидая такого ответа. Самокрутка упала на землю, но он без брезгливости поднял её и закурил вновь.\n\n- Это было легче, чем я ожидал. Ну, документы к договорам я презираю, так что ограничимся копытопожатием?\n\n- Как скажете. - Элеферий протянул и пожал копыто Флаттершай. И в тот момент он подошёл неприятно близко, будто пытаясь разглядеть пегаску получше.\n\n- Отойдите... пожалуйста... от вас дурно пахнет.\n\nЭлеферий рассмеялся, после чего развернулся и пошёл к своим, объявив отбой. Перед тем, как сесть в тачанку с другими бандитами, он произнёс: "А я даже почти разочаровался тому, что мы теперь в мире. Я бы такую милашку для себя завоевал!"\n\nТолпа на тачанках дико загоготала, после чего отъехала куда подальше."
 pegasi_f.1.a:0 "Какой... неприятый тип."

 pegasi_f.2.t:0 "Новое государство"
 pegasi_f.2.d:0 "Похоже, что Элеферий и его бандиты уже закрепились в северных регионах страны. Бездействие со стороны воинов укрепило их боевой дух, а объявление создания "Пегасьей Вольной Территории" и вовсе вскружило им голову. Также, согласно договору Элеферия и Флаттершай, анархистам было передано вооружение. Такой расклад дел не устраивал подчинённых Флаттершай - некоторые призывали уничтожить молодое крестьянское государство, но та считала иначе.\n\nНо больше всех недоумевал Андреас Харрикейн.\n\n- Он пообещал, что не будет нападать на нашу территорию, Андреас. У нас ведь получилось остановить войну, так? И всё разрешилось, стоило нам только поговорить. Дружба - это чу...\n\n- Чушь. Они провели тебя, вот увидишь. Я советую начать укрелпение границ и тренировку солдат. Война будет, и я в этом уверен.\n\n- Что? Никакой войны! Ты же знаешь, чем это обернётся. Они нападут, только если мы прояявим агрессию первыми. Нам лишь стоит соблюдать перемирие.\n\nХаррикейн хотел что-то возразить, но понял, что Флаттершай стала более уверенной и настойчивой после получения власти. Спорить было не лучшей идеей.\n\n- Как насчёт прогуляться в Сайрусе? Когда дым от военных кузниц не заполоняет небо, там очень красиво."
 pegasi_f.2.a:0 "Мир, но надолго ли?"

