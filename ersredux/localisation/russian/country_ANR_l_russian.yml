 ANR_war_support_decision:0 "Анархические песни"
 ANR_war_support_decision_desc:0 ""В слепую пушка лупит\nНа отмашь шашка рубит\nИ ворон большекрылый над битвою кружит\nА пуля знает точно, кого она не любит\nКого она не любит, в земле сырой лежит.""
 ANR_beer_politics:0 "Официальная пивная политика"
 ANR_beer_politics_desc:0 "Число пива в погребах: £beer_small_icon §Y[?ANR.beer_variable]§! ед.\n\nЕжемесячный прирост: £beer_small_icon §Y[?ANR.beer_variable_production_var]§! ед. в месяц\n\nЕсли окажется, что в наших погребах не осталось пива:\n§R-10.00%§! стабильности единовременно\n§R-5.00%§! стабильности ежемесячно до тех пор, пока запасы не будут восстановлены\n§R-5.00%§! поддержки войны ежемесячно до тех пор, пока запасы не будут восстановлены"
 ANR_palyenoye_pivo:0 "Палёнка"
 ANR_palyenoye_pivo_desc:0 "Не всем понравится пиво дешёвого качества, но у нас его сейчас просто практически нет!"
 ANR_stop_palyenoye_pivo:0 "Вернуть нормальное пиво"
 
