 ### Events ###
 anr.1.t:0 "Счастье"
 anr.1.d:0 "Элеферий Политис, известный среди своих сторонников как "Красное Пламя", пил, не переставая. Ему казалось, что он на пятьдесят процентов состоял из пива и водки (что было отчасти правдой), и сегодняшнее утро началось для него особенно хреново.\n\nРаньше ему удавалось на некоторое время опохмеляться, но в конечном итоге он всё равно оказывался в шумной компании друзей-анархистов и напивался до бессознания под групповые хмельные песни.\n\nНо... он был уверен, что всё под контролем."
 anr.1.a:0 "Несите ещё бутылку!"
 
 anr.2.t:0 "Горячий нрав"
 anr.2.d:0 "Среди сторонников Элеферия в основном были борзые жеребцы, но было и одно исключение. Пегаска Агалис по прозвищу Розовые Ушки была одной из приближённых лидера революции. И, несмотря на его отношение к кобылкам, он её уважал. Что следует делать и другим анархистам.\n\nВо время обычного и спокойного дня, к Агалис подошёл неприятного вида бандит. Покрытый небритой щетиной, в рваных одеждах и с запахом перегара изо рта. И явилася он не один, а с целой группой таких же бродяг.\n\n- Эй, девочка-сосочка. Это ж ты, эта самая, подружка батьки?\n\nВ ответ Агалис лишь презренно взглянула на него и весь отряд. Его друзья тупо улыбались и хихикали.\n\n- Чё молчишь, м? Или ты более разговорчива в постели? Ну же, мы же знаем, почему батька так за тебя впрегается. Если ты ухажоришь за ним, то чё бы и не позабавиться с нами? Он один, вечно занят. А нас целая толпа, хоть на целую ночь. А, ребята?\n\nОстальные одобрительно заржали в ответ.\n\n- Ну же, красотка, не ломайся. Мы больно не сделаем. Даже наобо-\n\nБандит подошёл уже черезчур близко к Агалис. Из его рта так воняло смесью водки и дешёвого табака, что казалось, её стошнит. Но уже в мнгновение ока бандит упал на землю и скорчился от боли, схватившись за своё достоинство, которое Агалис знатно лягнула, выполнив свой боевой приём. Затем она достала свой трофейный 'Маузер' и выстрелила ему прямо в глаз.\n\nДругие бандиты, словно протрезвев, поняли всё без слов и быстро отступили."
 anr.2.a:0 "Кто ещё хочет отведать комиссарского тела?"
 
