 ### National Focuses ####

 ANR_we_are_at_fucking_war:0 "Анархия - мать порядка!"
 ANR_we_are_at_fucking_war_desc:0 "ХАОС - ПОРЯДКА ОТЕЦ!"
 ANR_partizans:0 "Активизировать партизан"
 ANR_partizans_desc:0 "Что тут надо объяснять? Внедрился в тыл, нашёл наших, начал шмалять по всем вражинам. Наши точки в глубинах вражеского тыла уже с нетерпением ждут приказа о наступлении."
 anr_can_create_partizans_tt:0 "Позволит активизировать §Yпартизанские дивизии§! в тылу государства §R[PGS.getname]§!"
 ANR_find_guns:0 "Жаль, нет ружья"
 ANR_find_guns_desc:0 "Только что мы обнаружили нехватку огнестрела у наших пехотинцев. Тащите на поле боя всё, что есть, снимайте винтовки с трупов! У каждого должна быть хотя бы разбитая бутылка, которой можно прибить вражеского солдата в ближнем бою!"
 ANR_recover:0 "Наладить организацию на фронте"
 ANR_recover_desc:0 "В чём сила нашего противника? В организации. Каждый знает и осознаёт, кто кому подчиняется, а в наших рядах откровенный командный срач. Потому что...\nТакова наша стратегия! Да, именно так!"
 ANR_reorganize_people:0 "Вытащить всех на фронт"
 ANR_reorganize_people_desc:0 "Больше половины наших пегасов не прибыли на поле резни! Эти придурки решили заранее отпраздновать нашу победу. Хватит веселиться в пьяном угаре в тылу, скорее валите на фронт!"
 ANR_recover:0 "Половина крестьян токлом не умеет стрелять из тех ржавых пушек, что у них есть. Но кто сказал, что это может быть проблемой? Всему можно научиться на поле боя!"
 ANR_build_tachankas:0 "Изобретение пегасьего гения"
 ANR_build_tachankas_desc:0 "Тачанки - самое охрененное оборудование, которое есть у нас. И плевать на его сомнительную практичность, ведь атака на этих бандурах выглядит просто потрясно!"
 ANR_even_more_soldiers:0 "Привлечь сброд к нашему делу"
 ANR_even_more_soldiers_desc:0 "Нечего важничать и выбирать более опытных солдат из кучи пьяниц и прочего сброда. Свобода для всех, так пусть все борются за неё!"
 anr_hire_bad_diviisons_tt:0 "Создать много §Rужасно укомплектованных и необученных дивизий§! §Y(8)§!\n§YМожет, количество, а не качество обеспечит нам победу...§!"
 ANR_build_industry:0 "Опять работа..."
 ANR_build_industry_desc:0 "Наша волна революции рушит всё на своём пути. И наши позиции тоже. Мы можем найти крайних, чтобы они отвечали за восстановление инфар... инст... короче, чтобы они ремонтировали дороги и все дома."
 ANR_more_military:0 "Отправить оружейников в тыл"
 ANR_more_military_desc:0 "Возможно, лучший способ получать оружие - не воровать его с трупов врагов, а производить его прямо в тылу. Звучит в какой-то степени логично."
 ANR_again_not_ok:0 "Опять что-то не так"
 ANR_again_not_ok_desc:0 "WIP"
 ANR_no_religion:0 "Боги не остановят пуль"
 ANR_no_religion_desc:0 "WIP"
 ANR_motivation:0 "§RМОТИВАЦИЯ§!"
 ANR_motivation_desc:0 "Чтобы замотивировать всех братьев на атаку, мы сосредоточим удары на тех городах и сёлах, в которых хранится и производится водка, пиво и все подобные высшие ценности анархистов."
 ANR_decisions_focus:0 "Разве у нас есть план?"
 ANR_decisions_focus_desc:0 "Вряд ли."
 anr_unlock_anarchy_civ_war_decisions_tt:0 "Разблокирует особые £decision_icon_small §Yрешения.§!"
 ANR_red_flag:0 "Поднять красные флаги"
 ANR_red_flag_desc:0 "То были дни восстания народа\nСражались бешенно воспрявшие рабы\nИ гибли сотнями от сабли и стрельбы\nС могучим возгласом: "Да здравствует свобода!""
 ANR_civil_war_finale:0 "Чёрно-красное небо"
 ANR_civil_war_finale_desc:0 ""
 ANR_after_c_w_bottles:0 "Каждому по бутылке..."
 ANR_after_c_w_bottles_desc:0 "Теперь, когда все пивные склады и пивоварни находятся под нашим контролем, алкоголь потечёт в народ рекой. И даже если бы мы хотели что-то сделать против этого... мы не будем делать этого."
 ANR_after_c_w_mares:0 "...и каждому по кобылке!"
 ANR_after_c_w_mares_desc:0 "Наши парни очень хорошо потрудились на славу революции. Они имеют право расслабиться и провести несколько бурных ночей с пленными пегасками."
 
 
 ANR_super_tachanka:0 "Все четыре колеса"
 ANR_super_tachanka_desc:0 "Тачанки с прикреплёнными пулемётами сильно помогли нам во время войны. Теперь мы можем использовать их для осуществления рейдов на крестьянские дома, чтобы насильно навязать всем диктатуру безвластия."
 ANR_anarchic_power:0 "Анархическая сила"
 ANR_anarchic_power_desc:0 "WIP"
 ANR_trin_trava:0 "§RВСЁ ОСТАЛЬНОЕ - ТРЫН-ТРАВА!§!"
 ANR_trin_trava_desc:0 "WIP"
 ANR_dont_touch_its_not_yours:0 "Ты не лапай - не твоё!"
 ANR_did_you_get_it_good:0 "Заграбастал? Умница!"
 ANR_total_celebration:0 "Бухают все!"
 ANR_total_celebration_desc:0 "Неважно, кто сражался за нашу революцию, а кто отсиживался в тылу. Анархия для всех, и хлеб тоже для всех!"
 ANR_only_who_worked:0 "Кто не работал - тот не жрёт"
 ANR_only_who_worked_desc:0 "Если ты не воевал и не рисковал жизнью - пшёл вон! Только ветераны могут вдоволь отдохнуть."
 ANR_apple:0 "Эх, яблочко"
 ANR_apple_desc:0 "WIP"
 ANR_stop_dengi:0 "Стоп деньги!"
 ANR_stop_dengi_desc:0 "Никаких денег не должно существовать! Деньги - это инструмент, с помощью которого буржуи пытаются поработить нас. Но на деле, в деньгах нет ценности! А на нашей территории ценится только свобода."
 ANR_stop_state:0 "Стоп государство!"
 ANR_stop_state_desc:0 "Сотни лет государство медленно порабощало рабочий народ. Мы это остановили! Сотни лет крестьяне боролись ради того, чтобы уничтожить угнетающую систему. Так давайте отменим все законы старого режима, отменим границы и просто будем радоваться тому, что каждый из нас теперь волен делать всё, что пожелает!"
 ANR_stop_politika:0 "Стоп политика!"
 ANR_stop_politika_desc:0 "Политика - это хрень, которую выдумали буржуи. Никто в рядах нашего сопротивления никогда не интересовался политикой, и разве это помешало славной революции? Наоборот, это сплотило нас против страшного врага. Политика должна быть уничтожена."
 ANR_train_anarchy:0 "Паровоз 'Анархия'"
 ANR_train_anarchy_desc:0 "WIP"
 ANR_more_guns:0 "Каждый сам за себя"
 ANR_more_guns_desc:0 "Нельзя вечно полагаться на своих товарищей. Другими словами, харе ездить на чужих спинах! Как получить винтовку и пожрать - так всегда готовы, а как помереть на поле боя - так сразу возмущаться. Пусть каждый делает, что хочет. В конце только истинные революционеры выживут."
 ANR_only_villages:0 "Города и сёла"
 ANR_only_villages_desc:0 "WIP"
 ANR_motivated_terror:0 "Мотивированный террор"
 ANR_motivated_terror_desc:0 "WIP"
