 ANR_ignore_illiteracy:0 "Игнорировать неграмотность"
 ANR_ignore_illiteracy_desc:0 "Со временем неграмотные вымрут."
 ANR_support_banditism:0 "Бандитская солидарность"
 ANR_support_banditism_desc:0 "Анархисты... это тоже своего рода бандиты. Так почему мы должны считать грабежи и налёты чем-то плохим? Не должны. Эти бандиты всего лишь продолжают революцию и отстаивают свою свободу. Наоборот. Давайте поддержим погромы! Давайте поддержим грабежи! Давайте поддержим революцию!"
 
 
