 ANR_anti_neutrality:0 "Антимонархизация"
 ANR_anti_neutrality_desc:0 "WIP"
 ANR_sing_revolution:0 "Пой, революция!"
 ANR_sing_revolution_desc:0 "Ветер зовёт\nЗнамя горит\nНебо поёт\nВ небе пылает песня:\n"Пой, революция!""
 ANR_sing_revolution_tt:0 "§YЛюбая захваченная нами страна будет сразу же интегрирована.§!"
 ANR_ignore_poverty:0 "Игнорировать бедность"
 ANR_ignore_poverty_desc:0 "Со временем бедные вымрут."
 ANR_from_farmers_to_maroders:0 "Из фермеров в мародёры"
