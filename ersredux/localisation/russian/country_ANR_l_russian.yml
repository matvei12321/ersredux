 ANR_farmers_to_raders:0 "Негативная социальная мобильность"
 ANR_farmers_to_raders_desc:0 "Ситуация с бандитизмом в стране стала настолько неконтролируемой, что гражданам приходится опускаться до мародёрства и грабежа вне зависимости от того, чем они занимались в прошлой жизни."
 ANR_destroy_occipied_territories:0 "Террор на оккупированных территориях"
 ANR_anti_state:0 "Мы дали вам свободу, и отнимем у вас государство"
 ANR_anti_state_desc:0 "WIP"
 ANR_civil_war_ignorance:0 "Мы больше не живём в государстве"
 ANR_civil_war_ignorance_desc:0 "Если бы мы жили в государстве, мы бы были озабочены тем, что нужно восстанавливать его после гражданской войны. Но зачем выполнять лишнюю работу, если государства нет? Мы все свободны. Ты и я. Наплюй на государство. Наплюй на благополучие других.  Докопайся до авторитетов, плюнь на их моральные стандарты, создай анархию и смешай их с грязью. Устрой столько хаоса и беспорядка, сколько сможешь!"
 
