 anr.5.t:0 "Гуляйполе"
 anr.5.d:0 "Закончилась гражданская война, и началась настоящая анархия. Большая часть милитаристов была забита во время войны, но ещё оставались те, кто жил и даже вёл сопротивление. Одним из таких был ни кто иной, как Андреас Харрикейн.\n\nСвинья. Подонок. Убийца. Словами его не описать, и тем более не сосчитать тех преступлений, которые эта мразь совершила против свободы народа. И, к счастью, этот стервятник был наконец пойман. Он оборонял позиции в Пегасополисе долгое время, пока у гарнизона не осталось боеприпасов, и эта трусливая крыса с солдатами сдалась.\n\nЕствественно, что его ждёт лишь казнь. И казнить его должен наш светлый батька, наш вдохновитель - Элеферий. Для такого знаменательного события была организована небольшая деревянная площадка в Пегасополисе, чтобы пегасы со всех сторон видели происходящее. Связанный по крыльям и копытам, Харрикейн был заволочён анархистами на подиум. Собравшиеся кричали и требовали его немедленно пристрелить, но все ждали Элеферия.\n\nКогда он наконец прибыл, у площади собралась толпа пегасов. На земле уж не осталось места, и некоторым зрителям пришлось наблюдать, пархая над землёй. С чувством триумфа, революционер взошёл к бывшему фельдмаршалу. Толпа радостно завопила, увидев его.\n\nЧтобы ещё сильнее обрадовать своих, Элеферий решил провернуть казнь эффектно. Под шум толпы он достал свой трофейный револьвер, после чего быстро и грубо засунул ствол в пасть пленнику. От такого удара у него раскрошились два передних зуба. Без слов, Элеферий взвёл курок, и мозги Харрикейна отлетели на пол. Толпа радостно загалдела, кидая шапки вверх, но Элеферий выстрелил ещё, на этот раз в воздух. Значит, будет пламенная речь.\n\n- Желаю, чтобы все...\n\nТут он понял, что не подготовил речи. Значит, нужно импровизировать! А, хотя... похуй. Дело-то уже сделано. Элеферий достал из своей наспинной сумки бутылку и разбил её о бездыханное тело Харрикейна. Горлышко разлетелось, и он начал пить пиво прямо из него. Пиво попадало ему в рот, но в большей степени растекалось по морде, из-за чего он вымок, будто попал под дождь.\n\nТолпа восприняла этот жест как хорошее завершение для казни, и над площадью подняли чёрно-красный флаг. Смотря на него, пьяный Элеферий думал..."
 anr.5.a:0 ""Грязная тряпка...""
 
 anr.6.t:0 "Не моя забота!"
 anr.6.d:0 "Элеферий, как настоящий революционер-анархист, отрицал любое государство, и, кроме того, отрицал понятие "дом." Тех, кто свободен, ничего не держит, а место, которое ты называешь малой родиной, рано или поздно будет напоминать о себе. Именно поэтому Элеферий никогда не упоминал, где он родился или чем занимался до революции, да и в принципе этого никто не знал. Со своей небольшой свитой бандитов, он постоянно кочевал от города к городу. У лидеров революции не было штаба, только переносные палатки. Как бы то ни было, в большей степени он презирал непосредственно тех пони, кто привязан к своему дому.\n\n- Умоляю, сделайте же что-нибудь! - взрослая пегаска взвыла, умоляя Элеферия. - Они сожгли поля моей семьи, застрелили мужа за то, что он им сопротивлялся, а сына и дочь забрали с собой!\n\n- И?\n\n- Я знаю, кто они! Они сказали, что они - отряд Церориса! Вы же можете их найти, правда? Они же вас послушаются? Вы вернёте моих детей?\n\n- Элеферий курил трубку с табаком, в который было намешано много разных одурманивающих трав. Немного увеселительным тоном, он сказал: - Раздевайся.\n\n- Ч-что?..\n\n- Сделай моим парням приятно, кобылка. И тогда я подумаю.\n\n- Но... я...\n\n- Хочешь спасти своих жеребят?\n\nПегаска растерянно осмотрелась. Товарищи Элеферия уже хихикали между собой, осматирвая жертву. Следующие несколько часов пони думала только об одном: она делает это ради любимых детей...\n\nАнархисты уже наигрались с ней. Униженная и подавленная, она вернулась к Элеферию.\n\n- Пожалуйста.. сделайте что-нибудь...\n\n- О чём? Ты кто, сука? А. Стоп. Та самая, которая детей ищет?\n\nОна кивнула в ответ.\n\n- Так хер ли ко мне припёрлась-то? Дети твои, вот сама и спасай. А это - не моя забота!\n\nЕё мир перевернулся. Крича, она набросилась на пегаса, но сильные копыта бандитов оттащили её далеко от лагеря, и бросили в лужу грязи.\n\n- Ну чё, пристрелим наглую сволоту?\n\n- Дак это... приказу такого не было.\n\n- Да чё мне эти приказы? Ай. А я кое-что выдумал. Давай я серебрянную подброшу. Орёл - стреляем. Решка - не стреляем."
 anr.6.a:0 "И..."
 
 
 
 
 
 
 