 cld.12.t:0 "Последнее живое существо"
 cld.12.d:0 "Когда в твоём родном Руане началась буря, ты не бежал из города, как многие другие. С группой храбрых единорогов вы остались в городе, решив, что бурю можно переждать. Вам показалось, что ничего аномального не предвидится - ведь весна обязательно наступит. Вы обустроили небольшое убежище с костром и припасами, укутались в меховое снаряжение, но ваше выживание вскоре превратилось в кошмар. С каждым днём температура зверски снижалась.\n\nВас было семеро. Элизия исчезла первой. Она устала терпеть мёрзлый и голодный Тартар и ушла в бурю, не вернувшись.\n\nВторым погиб Марсель. Лежа на мёрзлой постели, он признался в любви Елиане, чем сильно растрогал её. Затем он уснул и больше не проснулся никогда.\n\nПогода всё ухудшалась. Однажды вы увидели, что над убежищем пролетели некие духи. Братья Ольгимские замёрзли насмерть, когда одно существо посмотрело на них. Затем духи ушли дальше.\n\nКостёр не горел уже неделю. Осталось трое. Всё, что сдерживало вас от смерти - твоё заклинание. С помощью него ты мог держать температуру в убежище хотя бы на сорока градусах мороза.\n\nСлучился обвал. Толстый слой снега покрыл всех вас. В этой снежной могиле двое оставшихся единорогов отдалились от тебя, и, скорее всего, погибли в тот же момент. Но ты смог сконцентрировать тепло на своём теле и удержаться под слоем снега. Однако, в таком положении ты не можешь двигаться или хотя бы открыть глаза.\n\nТы не знаешь, сколько дней ты провёл в снежной могиле. Ты больше не думаешь о том, как спастись. Ты думаешь о том, как выжить. О том, что наступит весна.\n\nНо с каждой минутой снег над тобой становится всё тяжелее. Ты хочешь уснуть и не проснуться.\n\nНо какая-то часть в тебе ещё верит, что однажды наступит весна."
 cld.12.a:0 "Бороться!"
 cld.12.b:0 "Перестать дышать..."
