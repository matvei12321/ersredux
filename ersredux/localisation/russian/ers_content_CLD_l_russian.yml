 cld.1.a:0 "Я знаю."
 
 cld.2.t:0 "Путь к замку"
 cld.2.d:0 "Она бежала вперёд по тропе. Бежала до тех пор, пока не достигла её пропасти. Пропасти, ведущей в никуда.\n\nКогда она обернулась, то увидела лишь непроглядную тьму. Кобылка увидела, что всё это время бежала по тропе, уселеной окоченелыми телами живых существ. Вне пределов этой тропы была лишь чёрная пропасть.\n\nОна посмотрела вперёд. Оно там! Место, куда она спешила попасть всю свою жизнь. Сияющий замок стоял так далеко на другом конце этой чёртовой пропасти. Но до него не добраться - тропа из тел оборвалась.\n\nИ тогда её посетила лишь одна мысль."
 cld.2.a:0 "Этой тропы недостаточно... Это неправильно! Я должна была дойти до замка!"
 cld.2.b:0 "Это несправедливо. Эта тропа столь узкая, что по ней мог пробежать только один."
 cld.2.c:0 "Если этой тропы не хватает - я расширю её."
 
 cld.3.t:0 "Жертва"
 cld.3.d:0 "Маленькая кобылка предстала перед Ним. Вокруг шумели тысячи звуков и сотни голосов, но среди них не было никого, кто мог бы прервать их разговор.\n\n- Я чувствую в тебе тепло. Тебя греет и ведёт твоя мечта. Через сотни испытаний и лишений Я стал тем, кто вершит судьбы существ. Но такова была моя мечта, а какова твоя?\n\nКобылка завороженно смотрела на Него, а он на неё. Вскоре она нашла в себе силы признаться.\n\n- ...я хочу собственное королевство.\n\nОн медленно и понимающе кивнул головой.\n\n- Это очень смелая мечта. И путь к ней не будет лёгким.\n\nКобылка вспомнила, как бежала от всех. От тех, кто смотрел на неё не так, как на остальных.\n\n- И этот путь будет лежать через множнство лишений. Ты понимаешь это?\n\n"Моя маленькая плакса. Почему ты так хочешь выделяться среди остальных?"\n\nКобылка услышала чей-то до боли знакомый голос. Но чей... Она обернулась, но никого не было.\n\n- Да... теперь я понимаю.\n\nНазад она не вернётся. Больше никогда.\n\n"Я жертвую", тихо пробормотала кобылка.\n\nВсе звуки в мнгновение ока прекратились. И не зазвучат они в целой вечности больше никогда. Северный ветер начал окутывать её тело.\n\n- Я..."
 cld.3.a:0 "§R"Я приношу в жертву... себя!"§""
 
 cld.4.t:0 "Сколько?"
 cld.4.d:0 "- В холодном пространстве время чувствуется иначе, не так ли? - Он всё ещё был рядом, окутывая пони морозной пеленой.\n\n- Я готова отдать всё время, которое у меня осталось.\n\n- Значит, ты не веришь в судьбу? Всё может пойти иначе, чем ты планируешь, и ты можешь об этом даже не узнать.\n\n- Моя цель - это всё, что важно в мире.\n\n- Стремления других тебя не волнуют? Сколько ты готова погубить на своём пути к замку?\n\n- Я не собираюсь убивать. Я буду мудрой правительницей.\n\nОн перенёс кобылку в другое место. Они оказались там, где она закончила свой путь физически. Вход в ледяную пещеру был уже завален снегом, но рядом со входом лежал небольшой холм. Под этим холмом покоилось уже окоченевшее тело маленькой голубой единорожки с белоснежной гривой.\n\n- Ты уже убила себя на этом пути. Если твоя решимость позволила тебе сделать это, то что помешает тебе избавиться от других?\n\nКобылка ничего не ответила. Подойдя к холму снега, она откопала тело. Его глаза смотрели прямо на неё.\n\n- Меня зовут #F!S9 Gjvv/. Ты ведь тоже #F!S9 Gjvv/.?\n\n- Да, я та, кого называют #F!S9 Gjvv/.. И ты пойдёшь со мной.\n\nПони возложила тело на свою спину. Тем временем Он молча смотрел на неё, а когда пони была готова отправляться, Он, наконец, вернул их обратно."
 cld.4.a:0 "Никто не умрёт на моём пути."
 
